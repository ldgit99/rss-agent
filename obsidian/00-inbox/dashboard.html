<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-04-08 23:37</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

const PAPERS = [{"id": "0", "source": "ARXIV", "score": 18, "day": "2026-04-06", "title": "EduIllustrate: Towards Scalable Automated Generation Of Multimodal Educational Content", "content": "---\ntitle: EduIllustrate: Towards Scalable Automated Generation Of Multimodal Educational Content\nauthors: [Shuzhen Bi, Mingzi Zhang, Zhuoxuan Li, Xiaolong Wang, Keqian Li, Aimin Zhou]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2604.05005v1\nresearch_type: 실험적 연구\nmethodology: 벤치마크 개발 및 평가\ndata_type: 문제 세트\nsample: 230개의 K-12 STEM 문제\ncontext: K-12 교육\ntheoretical_framework: 멀티미디어 학습 이론\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 EduIllustrate라는 벤치마크를 제안하여 K-12 STEM 문제에 대한 텍스트-다이어그램 설명 생성을 평가한다. 이 벤치마크는 230개의 문제로 구성되며, 다섯 개의 과목과 세 개의 학년을 포함한다. 연구 결과, Gemini 3.0 Pro Preview 모델이 87.8%의 성능을 기록하며 가장 높은 점수를 보였고, Kimi-K2.5는 비용 효율성에서 우수한 성과를 나타냈다. 연구는 또한 시각적 일관성을 개선하기 위한 순차적 앵커링의 효과를 확인하였다. 전문가 평가를 통해 LLM의 신뢰성을 검증하였으나, 주관적 시각 평가의 한계도 드러났다.\n\n# Research Logic\n## Problem\nK-12 교육에서 멀티미디어 교육 콘텐츠 생성의 필요성이 존재하며, 기존 LLM의 평가가 주로 질문-응답 및 튜터링 작업에 집중되어 있음.\n## Theory\nCognitive Load Theory, Dual Coding Theory, Multimedia Learning Principle에 기반하여 시각적 다이어그램과 텍스트적 추론의 조화가 인지 부담을 줄이고 개념 이해를 심화시킴.\n## Design\n230개의 문제를 포함한 벤치마크를 개발하고, 8차원 평가 루브릭을 통해 텍스트 및 시각적 품질을 평가함.\n## Findings\nGemini 3.0 Pro Preview가 87.8%로 가장 높은 성능을 보였으며, Kimi-K2.5는 80.8%의 비용 효율성을 기록함. 순차적 앵커링이 시각적 일관성을 13% 개선함.\n## Conclusion\nEduIllustrate는 LLM의 멀티미디어 교육 콘텐츠 생성 능력을 평가하는 데 중요한 도구가 될 수 있으며, 교육적 가치가 높은 설명 생성을 위한 기준을 제공함.\n\n# Key Findings\n- Gemini 3.0 Pro Preview 모델이 87.8%의 성능을 기록함.\n- Kimi-K2.5는 80.8%의 비용 효율성을 보임.\n- 순차적 앵커링이 시각적 일관성을 13% 개선함.\n\n# Contributions\n## Theoretical\n멀티미디어 학습 이론에 기반한 새로운 평가 기준을 제시함.\n## Methodological\nK-12 STEM 문제에 대한 텍스트-다이어그램 설명 생성을 위한 표준화된 생성 프로토콜을 개발함.\n## Practical\n교육 현장에서 LLM을 활용한 멀티미디어 콘텐츠 생성의 가능성을 제시함.\n\n# Limitations\n- 주관적 시각 평가의 한계가 드러남.\n- 다양한 LLM의 성능 차이가 크며, 특정 모델에 대한 의존성이 존재함.\n\n# Transferable Insights\n- LLM의 멀티미디어 콘텐츠 생성 능력을 평가하기 위한 기준이 필요함.\n- 교육적 맥락에서 LLM의 활용 가능성을 탐색할 수 있음.\n\n# Idea Seeds\n1. EduIllustrate를 기반으로 한 다양한 과목의 교육 콘텐츠 생성 시스템 개발.\n2. LLM의 평가 기준을 확장하여 다른 교육 수준에 적용 가능성 탐색.\n3. 주관적 평가의 한계를 극복하기 위한 새로운 평가 방법론 개발.\n\n# Citation Snippets\n> Bi, S., Zhang, M., Li, Z., Wang, X., Li, K., & Zhou, A. (2026). EduIllustrate: Towards Scalable Automated Generation Of Multimodal Educational Content. arXiv. https://arxiv.org/abs/2604.05005v1\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy", "link": "https://arxiv.org/abs/2604.05005v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Shuzhen Bi", "Mingzi Zhang", "Zhuoxuan Li"], "categories": ["cs.CY", "cs.AI", "cs.CL"]}, {"id": "1", "source": "ARXIV", "score": 16, "day": "2026-04-07", "title": "AI-Driven Modular Services for Accessible Multilingual Education in Immersive Extended Reality Settings: Integrating Speech Processing, Translation, and Sign Language Rendering", "content": "---\ntitle: AI-Driven Modular Services for Accessible Multilingual Education in Immersive Extended Reality Settings: Integrating Speech Processing, Translation, and Sign Language Rendering\nauthors: \n  - N. D. Tantaroudas\n  - A. J. McCracken\n  - I. Karachalios\n  - E. Papatheou\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2604.05591v1\nresearch_type: 실험적 연구\nmethodology: 기술 벤치마킹 및 시스템 평가\ndata_type: 정량적 데이터\nsample: 750개의 IS 제스처 녹화\ncontext: 몰입형 확장 현실 환경에서의 다국어 교육\ntheoretical_framework: 접근성 및 포용성 이론\nkeywords: [AI, 다국어 교육, 접근성, 확장 현실, 수화, 음성 인식, 번역]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 몰입형 확장 현실(XR) 환경에서 접근 가능한 다국어 교육을 위한 모듈형 플랫폼을 소개한다. 이 플랫폼은 OpenAI Whisper를 통한 자동 음성 인식, Meta NLLB를 통한 다국어 번역, AWS Polly를 이용한 음성 합성, RoBERTa를 통한 감정 분류, flan-t5-base-samsum을 통한 대화 요약, Google MediaPipe를 통한 국제 수화(IS) 렌더링 등 여섯 가지 AI 서비스를 통합한다. 연구 결과, AWS Polly는 낮은 지연 시간(50-100ms)과 경쟁력 있는 가격으로 음성 합성에서 가장 우수한 성능을 보였으며, EuroLLM 1.7B Instruct 변형은 BLEU 점수 84.34를 기록하여 NLLB를 초과하였다. 이러한 결과는 XR 환경 내에서 접근 가능한 다국어 언어 교육을 위한 AI 서비스의 조정 가능성을 입증한다.\n\n# Research Logic\n## Problem\n현재의 XR 기반 언어 교육 플랫폼은 청각 장애인을 위한 접근성 요구를 간과하고 있다.\n\n## Theory\n접근성과 포용성을 강조하는 이론적 틀을 바탕으로 다양한 언어 사용자와 청각 장애인을 위한 교육 기술의 필요성이 제기된다.\n\n## Design\n모듈형 AI 서비스 통합 플랫폼을 설계하여 다양한 교육 맥락에 맞게 독립적으로 확장 및 조정 가능하도록 하였다.\n\n## Findings\n기술 벤치마킹 결과, AWS Polly는 가장 낮은 지연 시간과 높은 성능을 보였으며, EuroLLM 모델은 NLLB 모델보다 우수한 번역 성능을 나타냈다.\n\n## Conclusion\n모듈형 설계는 다양한 교육 환경에 적합한 공평한 학습 솔루션의 기초를 제공하며, 유럽연합의 디지털 접근성 목표와 일치한다.\n\n# Key Findings\n- AWS Polly는 음성 합성에서 가장 낮은 지연 시간(50-100ms)을 기록하였다.\n- EuroLLM 1.7B Instruct 변형의 BLEU 점수는 84.34로 NLLB를 초과하였다.\n- 1,000명의 동시 사용자 시뮬레이션에서 평균 응답 시간은 800ms 이하로 유지되었다.\n\n# Contributions\n## Theoretical\n접근성과 포용성을 강조하는 새로운 교육 기술 모델을 제시하였다.\n\n## Methodological\n모듈형 AI 서비스의 기술 벤치마킹 및 성능 평가 방법론을 개발하였다.\n\n## Practical\n다국어 교육을 위한 접근 가능한 XR 플랫폼의 설계 및 구현을 통해 교육 현장에서의 실제 적용 가능성을 높였다.\n\n# Limitations\n- 청각 장애인을 위한 수화 인식의 정확성 향상 필요.\n- 다양한 언어와 문화적 맥락에 대한 AI의 적응력 부족.\n\n# Transferable Insights\n- XR 환경에서의 AI 서비스 통합은 교육 접근성을 향상시킬 수 있다.\n- 다양한 사용자 요구를 충족하는 교육 기술의 필요성이 더욱 강조된다.\n\n# Idea Seeds\n1. 다양한 언어와 문화적 맥락에 맞춘 AI 기반 교육 콘텐츠 개발.\n2. 청각 장애인을 위한 실시간 수화 번역 시스템 연구.\n3. XR 환경에서의 사용자 경험 개선을 위한 감정 인식 기술 적용.\n\n# Citation Snippets\n> Tantaroudas, N. D., McCracken, A. J., Karachalios, I., & Papatheou, E. (2026). AI-Driven Modular Services for Accessible Multilingual Education in Immersive Extended Reality Settings: Integrating Speech Processing, Translation, and Sign Language Rendering. arXiv. \n\ntags: #AI, #다국어교육, #접근성, #확장현실, #수화, #음성인식, #번역", "link": "https://arxiv.org/abs/2604.05591v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["N. D. Tantaroudas", "A. J. McCracken", "I. Karachalios"], "categories": ["cs.CE", "cs.AI", "cs.CL", "cs.CY", "cs.ET"]}, {"id": "2", "source": "ARXIV", "score": 15, "day": "2026-04-07", "title": "Evaluating Learner Representations for Differentiation Prior to Instructional Outcomes", "content": "---\ntitle: Learner Representations의 평가: 교육적 결과 이전의 차별화\nauthors: [Junsoo Park, Youssef Medhat, Htet Phyo Wai, Ploy Thajchayapong, Ashok K. Goel]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2604.05848v1\nresearch_type: 실험적 연구\nmethodology: 쌍별 거리 기반 평가\ndata_type: 학생 질문 데이터\nsample: 200명의 학습자, 8,838개의 질문\ncontext: 온라인 학습 환경\ntheoretical_framework: 개인화 학습, 차별화된 교육\nkeywords: [Learner representations, Personalization evaluation, Representational differentiation, Teacher-centered AI, Online education]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 교육 AI 시스템에서 학습자 표현이 학생 간의 의미 있는 차이를 유지하는지를 평가하는 방법을 제시한다. 'Distinctiveness'라는 새로운 측정 지표를 도입하여, 학습자 간의 쌍별 거리를 기반으로 차별화를 평가하였다. 연구 결과, 학습자 수준의 표현이 상호작용 수준의 표현보다 더 높은 차별화와 신뢰할 수 있는 쌍별 구분을 제공함을 보여주었다. 이러한 결과는 학습자 표현이 교육적 결과와 독립적으로 평가될 수 있음을 나타내며, 개인화 모델링을 지원하는 데 있어 실용적인 기준을 제공한다.\n\n# Research Logic\n## Problem\n학습자 표현이 교육적 결과가 없거나 맥락 의존적일 때, 학생 간의 의미 있는 차이를 유지하는지의 여부가 불분명하다.\n\n## Theory\n차별화된 교육 및 개인화 학습의 이론적 기초에 기반하여, 학습자 간의 차이를 식별하는 것이 개인화의 전제 조건임을 강조한다.\n\n## Design\n학생이 작성한 질문을 기반으로 두 가지 표현 방식(상호작용 수준 vs. 학습자 수준)을 비교하여 차별화를 평가하였다.\n\n## Findings\n학습자 수준의 표현이 상호작용 수준의 표현보다 평균적으로 34% 더 높은 차별화를 보였으며, 신뢰도 있는 쌍별 구분을 제공하였다.\n\n## Conclusion\n학습자 표현은 교육적 결과와 독립적으로 평가될 수 있으며, 개인화 모델링을 위한 진단 지표로서의 가능성을 제시한다.\n\n# Key Findings\n- 학습자 수준의 표현이 상호작용 수준의 표현보다 더 높은 차별화를 나타냄.\n- 'Distinctiveness' 지표가 학습자 간의 차이를 효과적으로 평가함.\n- 학습자 수준의 표현이 더 강한 클러스터 구조를 형성함.\n\n# Contributions\n## Theoretical\n학습자 표현의 차별화가 개인화 학습의 기초가 됨을 이론적으로 뒷받침함.\n\n## Methodological\n'Distinctiveness'라는 새로운 평가 지표를 도입하여 학습자 표현의 평가 방법론을 발전시킴.\n\n## Practical\n교육 AI 시스템의 설계 및 개인화 모델링에 대한 실용적인 기준을 제공함.\n\n# Limitations\n- 연구는 특정 온라인 학습 환경에 국한됨.\n- 결과의 일반화 가능성에 대한 추가 검증이 필요함.\n\n# Transferable Insights\n- 학습자 표현의 차별화가 개인화 교육의 효과성을 높일 수 있음.\n- 'Distinctiveness' 지표는 다양한 교육적 맥락에서 활용 가능함.\n\n# Idea Seeds\n1. 다양한 교육적 맥락에서 'Distinctiveness' 지표의 적용 가능성 탐색.\n2. 학습자 표현의 차별화가 개인화된 피드백에 미치는 영향 연구.\n3. AI 기반 교육 시스템에서 학습자 표현의 지속적인 개선 방안 모색.\n\n# Citation Snippets\n> Park, J., Medhat, Y., Wai, H. P., Thajchayapong, P., & Goel, A. K. (2026). Evaluating Learner Representations for Differentiation Prior to Instructional Outcomes. arXiv. https://arxiv.org/abs/2604.05848v1\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy", "link": "https://arxiv.org/abs/2604.05848v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Junsoo Park", "Youssef Medhat", "Htet Phyo Wai"], "categories": ["cs.CL", "cs.AI"]}, {"id": "3", "source": "ARXIV", "score": 15, "day": "2026-04-06", "title": "Investigating Ethical Data Communication with Purrsuasion: An Educational Game about Negotiated Data Disclosure", "content": "---\ntitle: Investigating Ethical Data Communication with Purrsuasion: An Educational Game about Negotiated Data Disclosure\nauthors: [Krisha Mehta, Sami Elahi, Alex Kale]\nyear: 2026\njournal: 명시되지 않음\ndoi: 명시되지 않음\nresearch_type: 혼합 방법 연구\nmethodology: 게임 기반 학습 및 데이터 분석\ndata_type: 게임 플레이 데이터\nsample: 27명의 학부 데이터 과학 학생\ncontext: 데이터 과학 수업\ntheoretical_framework: 윤리적 시각화 및 시각화 문해력\nkeywords: [데이터 커뮤니케이션, 윤리, 시각화, 교육 게임, 데이터 공개, 혼합 방법]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 데이터 커뮤니케이션에서의 윤리적 딜레마를 탐구하기 위해 Purrsuasion이라는 오픈 소스 시각화 게임을 개발하였다. 이 게임은 참가자들이 데이터 제공자와 데이터 수요자의 역할을 맡아 데이터 공개 제약을 고려한 시각화를 설계하고 정보를 요청하는 과정을 통해 진행된다. 연구는 27명의 학부 데이터 과학 학생을 대상으로 하여 게임 플레이 데이터를 수집하고, 학생들의 커뮤니케이션 역학, 문제 해결 및 신뢰 형성을 분석하였다. 결과적으로, 이상적인 시각화 솔루션을 구상하는 데 어려움이 있어 시각화 저작에서 만족스러운 결과를 도출하고 저자 의도를 귀속시키는 데 어려움을 겪는 것으로 나타났다. 이러한 문제를 해결하기 위해, 연구진은 데이터 공개 준수를 평가하는 데 도움을 주는 휴리스틱 루브릭을 개발하였다.\n\n# Research Logic\n## Problem\n데이터 커뮤니케이션에서의 윤리적 딜레마와 데이터 공개 문제를 해결하기 위한 교육적 접근이 부족하다.\n\n## Theory\n윤리적 시각화와 시각화 문해력의 관계를 탐구하며, 데이터 제공자와 수요자 간의 상호작용을 강조한다.\n\n## Design\nPurrsuasion 게임을 통해 학생들이 데이터 공개 문제를 해결하도록 유도하며, 역할 기반 학습을 적용한다.\n\n## Findings\n학생들은 이상적인 시각화 솔루션을 구상하는 데 어려움을 겪으며, 이는 시각화 저작에서의 만족스러운 결과와 저자 의도 귀속의 어려움으로 이어진다.\n\n## Conclusion\n윤리적 데이터 공개를 위한 시각화는 보다 상호작용적인 지원이 필요하며, 게임 플랫폼이 이러한 지원을 제공할 수 있다.\n\n# Key Findings\n- 학생들은 이상적인 시각화 솔루션을 구상하는 데 어려움을 겪는다.\n- 시각화 저작에서 만족스러운 결과를 도출하는 데 어려움이 있다.\n- 데이터 공개 준수를 평가하기 위한 휴리스틱 루브릭이 필요하다.\n\n# Contributions\n## Theoretical\n윤리적 시각화와 시각화 문해력의 관계를 명확히 하고, 데이터 공개 문제를 탐구하는 새로운 관점을 제시한다.\n\n## Methodological\n게임 기반 학습을 통해 데이터 커뮤니케이션의 윤리적 측면을 연구하는 방법론을 개발한다.\n\n## Practical\nPurrsuasion 게임을 통해 교육 현장에서 데이터 공개 문제를 효과적으로 다룰 수 있는 도구를 제공한다.\n\n# Limitations\n- 샘플 크기가 작아 일반화에 한계가 있다.\n- 게임의 특정 설정이 실제 데이터 커뮤니케이션 상황을 완전히 반영하지 않을 수 있다.\n\n# Transferable Insights\n- 데이터 공개 문제를 해결하기 위한 교육적 접근이 필요하다.\n- 역할 기반 학습이 학생들의 윤리적 판단 능력을 향상시킬 수 있다.\n\n# Idea Seeds\n1. 다양한 데이터 공개 시나리오를 포함한 추가 게임 모듈 개발.\n2. 다른 학문 분야에서의 데이터 커뮤니케이션 윤리 교육에 Purrsuasion 게임 적용.\n3. 게임 기반 학습의 효과를 평가하기 위한 장기 연구 설계.\n\n# Citation Snippets\n> Mehta, K., Elahi, S., & Kale, A. (2026). Investigating Ethical Data Communication with Purrsuasion: An Educational Game about Negotiated Data Disclosure.\n\ntags: #데이터커뮤니케이션, #윤리, #시각화, #교육게임, #데이터공개, #혼합방법, #시각화문해력\n\n---\n\n요약: 본 연구는 Purrsuasion이라는 오픈 소스 시각화 게임을 통해 데이터 커뮤니케이션에서의 윤리적 딜레마를 탐구하였다. 27명의 학부 데이터 과학 학생을 대상으로 한 연구에서, 학생들은 이상적인 시각화 솔루션을 구상하는 데 어려움을 겪었으며, 데이터 공개 준수를 평가하기 위한 휴리스틱 루브릭이 필요함을 발견하였다. 이 연구는 윤리적 데이터 공개를 위한 보다 상호작용적인 지원의 필요성을 강조한다.", "link": "https://arxiv.org/abs/2604.05200v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Krisha Mehta", "Sami Elahi", "Alex Kale"], "categories": ["cs.HC"]}, {"id": "4", "source": "ARXIV", "score": 13, "day": "2026-04-07", "title": "Exclusive Unlearning", "content": "---\ntitle: Exclusive Unlearning\nauthors: [Mutsumi Sasaki, Kouta Nakayama, Yusuke Miyao, Yohei Oseki, Masaru Isonuma]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2604.06154v1\nresearch_type: 이론적 연구\nmethodology: 실험적 방법론\ndata_type: 텍스트 데이터\nsample: Llama-3.2 및 OLMo 모델\ncontext: 의료 및 교육 분야\ntheoretical_framework: 기계 학습, 언어 모델\nkeywords: [human-ai collaboration, ai tutoring, instructional design, ai literacy, education, learning analytics, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구에서는 대형 언어 모델(LLM)을 산업 응용 분야에 도입할 때 발생할 수 있는 유해 콘텐츠 생성의 위험을 다룬다. 기존의 기계적 잊기 방법이 특정 유해 지식과 표현을 지우는 데 한계가 있음을 지적하며, 'Exclusive Unlearning' (EU)이라는 새로운 접근 방식을 제안한다. EU는 보존하고자 하는 지식과 표현을 제외한 모든 것을 광범위하게 잊는 것을 목표로 하며, 이를 통해 다양한 입력에 대한 안전성을 보장하면서도 특정 도메인 관련 지시사항에 응답할 수 있는 능력을 유지할 수 있음을 실험적으로 입증한다.\n\n# Research Logic\n## Problem\n대형 언어 모델의 유해 콘텐츠 생성 위험.\n## Theory\n기존의 잊기 방법의 한계와 EU의 필요성.\n## Design\nEU 방법론을 통한 실험적 접근.\n## Findings\nEU는 기존 방법들보다 유해 입력에 대한 방어 성능이 우수함을 입증.\n## Conclusion\nEU는 특정 도메인에서의 안전성과 성능을 동시에 유지할 수 있는 효과적인 방법임.\n\n# Key Findings\n- EU는 기존의 유해 데이터 열거 방식보다 더 효과적으로 유해 입력을 잊을 수 있다.\n- 의료 및 수학 도메인에서의 실험을 통해 EU의 효과성을 입증하였다.\n- EU는 다양한 유해 입력에 대한 방어 성능을 크게 향상시켰다.\n\n# Contributions\n## Theoretical\n기존의 잊기 방법론에 대한 새로운 관점을 제시.\n## Methodological\n유해 데이터 열거 없이도 효과적인 잊기 방법론을 구현.\n## Practical\n의료 및 교육 분야에서의 안전한 LLM 응용 가능성을 제시.\n\n# Limitations\n- 특정 도메인에 국한된 적용 가능성.\n- 일반적인 LLM에 대한 적용의 어려움.\n\n# Transferable Insights\n- 특정 도메인에서의 LLM 안전성 향상 가능성.\n- 잊기 방법론의 새로운 접근 방식이 다른 분야에도 적용될 수 있음.\n\n# Idea Seeds\n1. EU 방법론을 다른 산업 분야에 적용해 볼 수 있다.\n2. 다양한 도메인에서의 유해 입력에 대한 방어 성능을 비교 연구할 수 있다.\n3. EU의 효과를 극대화하기 위한 최적의 파라미터 조정 연구.\n\n# Citation Snippets\n> Sasaki, M., Nakayama, K., Miyao, Y., Oseki, Y., & Isonuma, M. (2026). Exclusive Unlearning. arXiv. https://arxiv.org/abs/2604.06154v1\n\ntags: #human-ai collaboration, #ai tutoring, #instructional design, #ai literacy, #education, #learning analytics, #ai pedagogy", "link": "https://arxiv.org/abs/2604.06154v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Mutsumi Sasaki", "Kouta Nakayama", "Yusuke Miyao"], "categories": ["cs.CL"]}, {"id": "5", "source": "ARXIV", "score": 12, "day": "2026-04-05", "title": "CODE-GEN: A Human-in-the-Loop RAG-Based Agentic AI System for Multiple-Choice Question Generation", "content": "We present CODE-GEN, a human-in-the-Loop, retrieval-augmented generation (RAG)-based agentic AI system for generating context-aligned multiple-choice questions to develop student code reasoning and comprehension abilities. CODE-GEN employs an agentic AI architecture in which a Generator agent produces multiple-choice coding comprehension questions aligned with course-specific learning objectives, while a Validator agent independently assesses content quality across seven pedagogical dimensions. Both agents are augmented with specialized tools that enhance computational accuracy and verify code outputs. To evaluate the effectiveness of CODE-GEN, we conducted an evaluation study involving six human subject-matter experts (SMEs) who judged 288 AI-generated questions. The SMEs produced a total of 2,016 human-AI rating pairs, indicating agreement or disagreement with the assessments of Validator, along with 131 instances of qualitative feedback. Analyses of SME judgments show strong system performance, with human-validated success rates ranging from 79.9% to 98.6% across the seven pedagogical dimensions. The analysis of qualitative feedback reveals that CODE-GEN achieves high reliability on dimensions well suited to computational verification and explicit criteria matching, including question clarity, code validity, concept alignment, and correct answer validity. In contrast, human expertise remains essential for dimensions requiring deeper instructional judgment, such as designing pedagogically meaningful distractors and providing high-quality feedback that reinforces understanding. These findings inform the strategic allocation of human and AI effort in AI-assisted educational content generation.", "link": "https://arxiv.org/abs/2604.03926v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Xiaojing Duan", "Frederick Nwanganga", "Chaoli Wang"], "categories": ["cs.AI", "cs.CY"]}, {"id": "6", "source": "ARXIV", "score": 12, "day": "2026-04-03", "title": "Noise Steering for Controlled Text Generation: Improving Diversity and Reading-Level Fidelity in Arabic Educational Story Generation", "content": "Generating diverse, pedagogically valid stories for Arabic early-grade reading assessments requires balancing tight constraints on vocabulary, reading level, and narrative structure against the need to avoid repetitive plots that undermine assessment validity. We investigate noise steering, injecting calibrated Gaussian perturbations into the internal representations of transformer models at inference time, as a training-free diversity method evaluated across five small Arabic-centric language models (7-9B parameters). We compare four injection strategies against high-temperature sampling baselines, measuring diversity, quality, constraint adherence, and reading grade level. Residual stream noise consistently improves narrative diversity with minimal quality or constraint cost and preserves early-grade reading level across all models. Attention entropy noise injection (AENI) stabilizes the otherwise unreliable attention-logit noise while recovering quality. High-temperature sampling inflates reading grade level and causes catastrophic collapse on several models. We find internal representation-level perturbation to be a more suitable diversity strategy than output-level stochasticity for constrained educational content generation.", "link": "https://arxiv.org/abs/2604.03380v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Haziq Mohammad Khalid", "Salsabeel Shapsough", "Imran Zualkernan"], "categories": ["cs.CL"]}, {"id": "7", "source": "ARXIV", "score": 11, "day": "2026-04-07", "title": "SpeakSoftly: Scaffolding Nonviolent Communication in Intimate Relationships through LLM-Powered Just-In-Time Interventions", "content": "Conflicts are common in text-based communication, particularly in intimate relationships, where misunderstandings can easily escalate into verbal aggression. To address this, we present SpeakSoftly, a system that applies Nonviolent Communication (NVC) principles to scaffold couples' conflict communication through LLM-powered just-in-time interventions. Informed by formative interviews with couples and NVC principles, we designed two core features: NVC-Prompt, which detects verbal aggression and suggests revisions to prevent escalation, and NVC-Guide, which analyzes dialogues to uncover users' feelings and needs, fostering self-awareness and perspective-taking. These features were implemented across three progressive intervention modes, each varying in intervention depth and tone: Basic Reminder, Neutral Guide, and Empathetic Guide. We conducted a mixed-methods user study with 18 couples across simulated and real-life conflict settings to evaluate the effectiveness of each mode. Results showed that Empathetic Guide significantly facilitated both behavioral and cognitive changes, while Neutral Guide was effective only for behavioral changes in simulated conflicts. In real-life conflicts, Neutral Guide showed distinct advantages due to lower cognitive load demands. We discuss the mechanisms behind these findings and propose design implications for in-situ interventions in high-stakes communication contexts.", "link": "https://arxiv.org/abs/2604.05382v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Ka I Chan", "Hongbo Lan", "Jun Fang"], "categories": ["cs.HC"]}, {"id": "8", "source": "ARXIV", "score": 11, "day": "2026-04-06", "title": "Scalable and Explainable Learner-Video Interaction Prediction using Multimodal Large Language Models", "content": "Learners' use of video controls in educational videos provides implicit signals of cognitive processing and instructional design quality, yet the lack of scalable and explainable predictive models limits instructors' ability to anticipate such behavior before deployment. We propose a scalable, interpretable pipeline for predicting population-level watching, pausing, skipping, and rewinding behavior as proxies for cognitive load from video content alone. Our approach leverages multimodal large language models (MLLMs) to compute embeddings of short video segments and trains a neural classifier to identify temporally fine-grained interaction peaks. Drawing from multimedia learning theory on instructional design for optimal cognitive load, we code features of the video segments using GPT-5 and employ them as a basis for interpreting model predictions via concept activation vectors. We evaluate our pipeline on 77 million video control events from 66 online courses. Our findings demonstrate that classifiers based on MLLM embeddings reliably predict interaction peaks, generalize to unseen academic fields, and encode interpretable, theory-relevant instructional concepts. Overall, our results show the feasibility of cost-efficient, interpretable pre-screening of educational video design and open new opportunities to empirically examine multimedia learning theory at scale.", "link": "https://arxiv.org/abs/2604.04482v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Dominik Glandorf", "Fares Fawzi", "Tanja Käser"], "categories": ["cs.AI"]}, {"id": "9", "source": "ARXIV", "score": 11, "day": "2026-04-05", "title": "Teacher Professional Development on WhatsApp and LLMs: Early Lessons from Cameroon", "content": "AI in education is commonly delivered through web-based systems such as online forms and institutional platforms. However, these approaches can exclude teachers in low-resource contexts, where everyday mobile platforms like WhatsApp serve as primary digital infrastructure. To address this gap, we present a field pilot in Cameroon that deploys a WhatsApp-based chatbot with LLM-supported content for teacher professional development (TPD), compared with an online form baseline. The system was evaluated through a mixed-methods study with 47 primary school teachers, integrating quantitative measures with qualitative insights from interviews and participant feedback. Results show that the chatbot was rated higher in perceived usability and overall experience, while learnability remained comparable. These improvements were driven by platform familiarity, low interaction overhead, and the modular structure of LLM-supported content, but were constrained by connectivity limitations, prepaid data costs, and multilingual needs (English/French). Building on these findings, we outline design directions for multilingual, culturally grounded interaction and for supporting prompting and reflection in AI use. More broadly, this work points to Thoughtful AI that supports reflection, relevance, and sustained professional growth.", "link": "https://arxiv.org/abs/2604.04139v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Vikram Kamath Cannanure", "Bruno Yinkfu", "Douglas Bryan"], "categories": ["cs.HC"]}];
let PAGE_SIZE = 10;
let currentTab = 'all';
let currentSource = 'ALL';
let currentSort = 'score';
let currentPage = 1;
let currentCategory = '';
let currentMinDate = '';
let currentMaxDate = '';
let hideVisited = false;
let filtered = [];
let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
let searchHistory = JSON.parse(localStorage.getItem('searchHistory')) || [];
let visited = JSON.parse(localStorage.getItem('visited')) || [];

function toggleTheme() {
  const html = document.documentElement;
  const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
  html.dataset.theme = next;
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  localStorage.setItem('theme', next);
}

function toggleTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSource(btn) {
  currentSource = btn.dataset.source;
  document.querySelectorAll('#sourceFilters .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSort(btn) {
  currentSort = btn.dataset.sort;
  document.querySelectorAll('#sortGroup .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  render();
}

function toggleFavorite(id, e) {
  e.stopPropagation();
  const idx = favorites.indexOf(id);
  if (idx === -1) {
    favorites.push(id);
  } else {
    favorites.splice(idx, 1);
  }
  localStorage.setItem('favorites', JSON.stringify(favorites));
  applyFilters();
}

function recordVisit(id) {
  if (!visited.includes(id)) {
    visited.push(id);
  }
  localStorage.setItem('visited', JSON.stringify(visited));
}

function recordSearch(query) {
  if (query.trim() && !searchHistory.includes(query)) {
    searchHistory.unshift(query);
    if (searchHistory.length > 10) searchHistory.pop();
    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
  }
}

function downloadJSON() {
  const data = JSON.stringify(filtered, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadCSV() {
  const headers = ['제목', '출처', '스코어', '리뷰여부', '링크'];
  const rows = filtered.map(p => [
    '"' + p.title.replace(/"/g, '""') + '"',
    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
