<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-03-06 23:27</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "OPENALEX", "score": 19, "day": "2026-01-01", "title": "The Implementation of AI-Enhanced Dialogic Writing Scaffolding (AI-DWS) In a Malaysian Private Secondary ESL Classroom in Johor", "content": "---\ntitle: AI 강화 대화식 글쓰기 스캐폴딩(AI-DWS)의 말레이시아 사립 중등 ESL 교실에서의 구현\nauthors: Moganambigai Jayasankar, Jade Patynolian Anak Peter, Mohd Haniff Mohd Tahir\nyear: 2026\njournal: INTERNATIONAL JOURNAL OF RESEARCH AND INNOVATION IN SOCIAL SCIENCE (IJRISS)\ndoi: https://dx.doi.org/10.47772/IJRISS.2026.10100365\nresearch_type: 혼합 방법 개입 사례 연구\nmethodology: 혼합 방법\ndata_type: 정량적 및 정성적 데이터\nsample: 30명의 학생과 1명의 교사\ncontext: 말레이시아 사립 중등 ESL 교실\ntheoretical_framework: Vygotsky의 근접 발달 영역(ZPD), TPACK\nkeywords: [AI, 대화식 글쓰기, 스캐폴딩, ESL 교육, 교사 중재, 학습자 자율성]\n---\n\n# APA 7th style\n\n# Summary\n이 연구는 말레이시아 사립 중등 ESL 교실에서 AI 강화 대화식 글쓰기 스캐폴딩(AI-DWS)의 구현을 조사하였다. 혼합 방법 개입 사례 연구를 통해 학생과 교사의 인식 및 도구의 참여도와 글쓰기 품질에 미치는 영향을 탐구하였다. 30명의 학생과 1명의 교사로부터 설문조사, 인터뷰 및 교실 관찰을 통해 데이터를 수집하였다. 연구 결과, AI-DWS는 개인화된 스캐폴딩을 제공하여 학생의 자신감과 참여도를 유의미하게 향상시키는 것으로 나타났다. 학생들은 어휘와 아이디어 생성이 개선되었다고 보고하였으나, AI가 단순한 답변 생성기가 아닌 인지적 안내자로 작용하도록 보장하기 위해 교사의 중재가 여전히 필수적임을 강조하였다. 결과적으로 AI-DWS는 ESL 글쓰기에서 학습자 자율성을 촉진하는 효과적인 교수 도구로 제안되었다.\n\n# Research Logic\n## Problem\nAI 도구의 효과적인 활용이 ESL 교육에서의 학생 참여와 글쓰기 품질에 미치는 영향.\n## Theory\nVygotsky의 근접 발달 영역(ZPD)과 TPACK 이론을 기반으로 한 대화식 교수법.\n## Design\n혼합 방법 개입 사례 연구를 통해 학생과 교사의 인식을 조사.\n## Findings\nAI-DWS는 학생의 자신감과 참여도를 높이며, 어휘와 아이디어 생성에 긍정적인 영향을 미침.\n## Conclusion\nAI-DWS는 ESL 글쓰기 교육에서 학습자 자율성을 증진시키는 효과적인 도구로 확인됨.\n\n# Key Findings\n- AI-DWS는 학생의 자신감과 참여도를 유의미하게 향상시킴.\n- 학생들은 어휘와 아이디어 생성에서 개선을 보고함.\n- 교사의 중재가 AI의 효과적인 활용에 필수적임.\n\n# Contributions\n## Theoretical\nAI-DWS의 효과를 Vygotsky의 ZPD와 TPACK 이론을 통해 설명함.\n## Methodological\n혼합 방법을 통해 정량적 및 정성적 데이터를 통합하여 심층적인 통찰 제공.\n## Practical\nAI-DWS를 통한 ESL 교육에서의 학습자 자율성 증진을 위한 실질적인 지침 제공.\n\n# Limitations\n- 연구는 특정 학교와 학생 집단에 국한되어 일반화에 한계가 있음.\n- 교사의 AI 도구 활용 능력에 따라 결과가 달라질 수 있음.\n\n# Transferable Insights\n- AI 도구는 ESL 교육에서 학생의 자율성을 증진시키는 데 효과적일 수 있음.\n- 교사의 중재는 AI 도구의 효과적인 활용에 필수적임을 강조함.\n\n# Idea Seeds\n1. AI-DWS의 효과를 다양한 교육 환경에서 비교 연구.\n2. 교사의 AI 도구 활용 교육 프로그램 개발.\n3. AI 도구의 장기적인 효과를 평가하기 위한 후속 연구.\n\n# Citation Snippets\n> Jayasankar, M., Patynolian Anak Peter, J., & Mohd Tahir, M. H. (2026). The Implementation of AI-Enhanced Dialogic Writing Scaffolding (AI-DWS) In a Malaysian Private Secondary ESL Classroom in Johor. INTERNATIONAL JOURNAL OF RESEARCH AND INNOVATION IN SOCIAL SCIENCE (IJRISS).\n\ntags: #AI, #대화식글쓰기, #스캐폴딩, #ESL교육, #교사중재, #학습자자율성, #교육기술", "link": "https://doi.org/10.47772/ijriss.2026.10100365", "altLink": "https://openalex.org/W7128294232", "hasDoi": true, "hasReview": true, "authors": ["Moganambigai Jayasankar", "Jade Patynolian Anak Peter", "Mohd Haniff Mohd Tahir"], "categories": ["Dialogic", "Vocabulary", "Mathematics education", "Pedagogy", "Psychology"]}, {"id": "1", "source": "OPENALEX", "score": 16, "day": "2025-11-18", "title": "Report on the Scoping Workshop on AI in Science Education Research 2025", "content": "---\ntitle: AI in Science Education Research 2025 Workshop Report\nauthors: [Marcus Kubsch, Marit Kastaun, Peter Wulff, Nicole Graulich, Moriah Ariely, Sebastian Gombert, Bor Gregorcic, Hendrik Härtig, Benedikt Heuckmann, Andrea Horbach]\nyear: 2025\njournal: OpenAlex\ndoi: https://openalex.org/W4417210278\nresearch_type: Workshop Report\nmethodology: 문헌 검토 및 전문가 워크숍\ndata_type: 질적 및 양적 데이터\nsample: 명시되지 않음\ncontext: 과학 교육 연구에서 AI의 역할\ntheoretical_framework: 시스템 사고\nkeywords: [AI, 과학 교육, 교육 연구, 교수 설계, 윤리, 데이터 거버넌스, 교사 전문성 개발]\n---\n\n# APA 7th style\n\n# Summary\n이 보고서는 과학 교육 연구에서 인공지능(AI)의 역할에 대한 국제 전문가 워크숍의 결과를 요약한다. AI는 과학적 실천, 교실 학습 및 연구 방법을 급격히 변화시키고 있으며, 이에 따라 새로운 기회와 도전 과제가 발생하고 있다. 보고서는 AI의 주요 개념을 명확히 하고, AI가 과학적 작업, 교수 관행 및 학문적 학습에 미치는 영향을 검토한다. 또한 AI가 커리큘럼 개발, 평가, 인식론적 인지, 포용성 및 교사 전문성 개발과 같은 주요 분야와 어떻게 교차하는지를 식별하며, AI가 인간의 추론을 지원할 수 있는 경우와 공정성 또는 유효성에 위험을 초래할 수 있는 경우를 강조한다. 마지막으로, AI의 책임 있는 통합을 위한 시스템 사고 접근법을 제시하고, 교육 연구 커뮤니티를 위한 실행 가능한 권장 사항을 제시한다.\n\n# Research Logic\n## Problem\nAI의 급속한 발전이 과학 교육 연구에 미치는 영향과 그에 따른 도전 과제.\n## Theory\nAI의 개념적 명확화 및 시스템 사고를 통한 책임 있는 통합.\n## Design\n전문가 워크숍을 통한 질적 데이터 수집 및 문헌 검토.\n## Findings\nAI는 과학 교육의 교수 방법, 학습 환경 및 교사의 역할을 변화시키고 있으며, 새로운 연구 방법론을 도입하고 있다.\n## Conclusion\nAI의 통합은 과학 교육 연구의 질적 향상을 가져올 수 있지만, 윤리적 고려와 함께 신중한 접근이 필요하다.\n\n# Key Findings\n- AI는 과학 교육의 교수 설계 및 평가 방식을 혁신하고 있다.\n- AI의 통합은 학생과 교사의 경험을 향상시키지만, 과도한 의존은 인지적 참여를 저하시킬 수 있다.\n- AI는 새로운 형태의 협력 학습을 촉진하고, 맞춤형 콘텐츠 생성의 경로를 열고 있다.\n\n# Contributions\n## Theoretical\nAI의 개념적 명확화와 교육 연구에서의 윤리적 고려를 강조.\n## Methodological\nAI 기반 시스템을 통한 새로운 연구 방법론의 도입.\n## Practical\nAI 통합을 위한 실행 가능한 권장 사항 제공.\n\n# Limitations\n- 연구 샘플이 명시되지 않음.\n- AI의 영향에 대한 장기적인 연구가 부족함.\n\n# Transferable Insights\n- AI의 통합은 교육 연구의 질적 향상을 가져올 수 있는 잠재력을 지님.\n- 시스템 사고 접근법은 다양한 이해관계자의 요구와 윤리적 제약을 고려하는 데 유용함.\n\n# Idea Seeds\n1. AI를 활용한 맞춤형 학습 도구 개발.\n2. AI 통합 교육 프로그램의 효과성 평가 연구.\n3. AI와 인간의 협력적 학습 모델 개발.\n\n# Citation Snippets\n> Kubsch, M., Kastaun, M., Wulff, P., Graulich, N., Ariely, M., Gombert, S., ... & Horbach, A. (2025). Report on the Scoping Workshop on AI in Science Education Research 2025. OpenAlex.\n\ntags: #AI, #과학교육, #교육연구, #교수설계, #윤리, #데이터거버넌스, #교사전문성개발\n\n---\n\n요약: 이 보고서는 AI가 과학 교육 연구에 미치는 영향을 다루며, AI의 통합이 교수 방법과 학습 환경을 혁신할 수 있는 가능성을 제시한다. 그러나 AI에 대한 과도한 의존은 인지적 참여를 저하시킬 수 있으며, 윤리적 고려가 필요하다.", "link": "https://doi.org/10.48550/arxiv.2511.14318", "altLink": "https://openalex.org/W4417210278", "hasDoi": true, "hasReview": true, "authors": ["Marcus Kubsch", "Marit Kastaun", "Peter Wulff"], "categories": ["OpenAlex"]}, {"id": "2", "source": "OPENALEX", "score": 16, "day": "2025-04-30", "title": "Generative AI in Language Education: Bridging Divide and Fostering Inclusivity", "content": "---\ntitle: Generative AI in Language Education: Bridging Divide and Fostering Inclusivity\nauthors: [Zhenjie Weng, Yao Fu]\nyear: 2025\njournal: 명시되지 않음\ndoi: https://openalex.org/W4410319442\nresearch_type: 체계적 리뷰\nmethodology: 정량적, 정성적, 혼합 방법\ndata_type: 명시되지 않음\nsample: 명시되지 않음\ncontext: K-12부터 고등 교육까지의 언어 교육\ntheoretical_framework: 명시되지 않음\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n이 체계적 리뷰는 언어 교육에서 생성적 인공지능(GenAI)의 구현에 관한 실증 연구를 분석하여 포용성을 촉진하고 교육 격차를 해소하는 데 미치는 영향을 강조한다. 리뷰는 K-12부터 고등 교육에 이르는 다양한 언어 교육 맥락에서 GenAI가 촉진하는 포용성과 교육 형평성에 중점을 두고 정량적, 정성적, 혼합 방법 연구를 포함한다. 분석 결과, GenAI는 실시간 피드백 제공과 매력적인 학습 자료 생성으로 학습자의 동기와 자신감을 상당히 증가시킬 수 있는 잠재력을 지닌 것으로 나타났다. 이러한 도구는 개별 학습자의 요구에 맞게 조정되며, 특별 교육 요구가 있는 학생들을 지원하고 경제적으로 불리한 학습자에게 권한을 부여할 수 있다. 또한, GenAI는 다양한 문화 콘텐츠를 언어 학습에 통합함으로써 문화 간 역량을 촉진한다. 현재 연구를 종합함으로써 이 리뷰는 GenAI가 공평하고 포용적인 언어 교육 환경을 만드는 데 있어 어떤 역할을 하는지를 포괄적으로 이해할 수 있도록 하며, 향후 연구, 교육 관행, 교사 훈련 및 정책 결정에 대한 지침을 제공한다.\n\n# Research Logic\n## Problem\n언어 교육에서의 포용성과 교육 격차 문제.\n## Theory\n명시되지 않음.\n## Design\n정량적, 정성적, 혼합 방법 연구를 통한 체계적 리뷰.\n## Findings\nGenAI는 학습자의 동기와 자신감을 증가시키고, 특별 교육 요구가 있는 학생들을 지원하며, 문화 간 역량을 촉진하는 데 기여한다.\n## Conclusion\nGenAI는 공평하고 포용적인 언어 교육 환경을 조성하는 데 중요한 역할을 한다.\n\n# Key Findings\n- GenAI는 실시간 피드백을 제공하여 학습자의 동기를 증가시킨다.\n- 다양한 문화 콘텐츠를 통합하여 문화 간 역량을 촉진한다.\n- 경제적으로 불리한 학습자에게 권한을 부여할 수 있는 잠재력을 지닌다.\n\n# Contributions\n## Theoretical\nGenAI의 포용적 교육 환경 조성에 대한 이해를 심화시킨다.\n## Methodological\n정량적, 정성적, 혼합 방법 연구의 통합적 접근을 제시한다.\n## Practical\n교사 훈련 및 정책 결정에 대한 실질적인 지침을 제공한다.\n\n# Limitations\n- 연구 샘플에 대한 구체적인 정보가 명시되지 않음.\n- 특정 교육 맥락에 대한 제한된 적용 가능성.\n\n# Transferable Insights\n- GenAI의 활용은 다양한 교육 환경에서의 포용성을 증진할 수 있다.\n- 실시간 피드백 시스템은 학습자의 참여를 높이는 데 효과적이다.\n\n# Idea Seeds\n1. GenAI를 활용한 맞춤형 학습 자료 개발.\n2. 다양한 문화 콘텐츠를 포함한 언어 교육 프로그램 설계.\n3. GenAI 기반의 교사 훈련 프로그램 개발.\n\n# Citation Snippets\n>\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy\n\n---\n\n요약: 이 체계적 리뷰는 생성적 인공지능(GenAI)이 언어 교육에서 포용성을 촉진하고 교육 격차를 해소하는 데 미치는 영향을 분석한다. GenAI는 학습자의 동기와 자신감을 증가시키고, 특별 교육 요구가 있는 학생들을 지원하며, 문화 간 역량을 촉진하는 데 기여한다. 이 연구는 향후 교육 관행과 정책 결정에 대한 지침을 제공한다.", "link": "https://doi.org/10.46328/ijte.1056", "altLink": "https://openalex.org/W4410319442", "hasDoi": true, "hasReview": true, "authors": ["Zhenjie Weng", "Yao Fu"], "categories": ["Bridging (networking)", "Generative grammar", "Linguistics", "Sociology", "Computer science"]}, {"id": "3", "source": "OPENALEX", "score": 16, "day": "2025-01-01", "title": "Synergistic mechanism Between Teachers' Technological Literacy and TBLT Strategies: A Situated Cognition-Based Framework Reconstruction", "content": "---\ntitle: 교사의 기술적 문해력과 TBLT 전략 간의 시너지 메커니즘: 상황 인지 기반 프레임워크 재구성\nauthors: Yanhua Li\nyear: 2025\njournal: Frontiers in Educational Research\ndoi: 10.25236/FER.2025.080412\nresearch_type: 이론적 연구\nmethodology: 상황 인지 이론에 기반한 이론적 프레임워크 구축\ndata_type: 문헌 연구 및 사례 분석\nsample: 명시되지 않음\ncontext: 교육 정보화 시대의 언어 교육\ntheoretical_framework: 상황 인지 이론, TPACK 프레임워크, 인지 부하 이론, 분산 인지 이론\nkeywords: [교사의 기술적 문해력, TBLT, 상황 인지 이론, 기술 매개 과제 상황, 이중 루프 피드백 메커니즘]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 교사의 기술적 문해력(Teachers' Technological Literacy, TTL)과 과제 기반 언어 교육(Task-Based Language Teaching, TBLT) 간의 시너지 메커니즘을 탐구한다. 상황 인지 이론에 기반하여 \"기술 매개 과제 상황(Technology-Mediated Task Situations, TMTS)\"의 이론적 프레임워크를 구축하고, TTL이 TBLT를 향상시키는 세 가지 경로를 제시한다: 과제의 진정성 향상, 인지 부하 최적화, 학습 증거 시각화. TPACK 프레임워크와 인지 부하 이론, 분산 인지 이론을 통합하여 TMT-시너지 동적 협력 모델을 제안하며, 교사의 기술적 문해력과 과제 설계 간의 동적 상호작용을 명확히 하기 위한 이중 루프 피드백 메커니즘을 설정한다. 이론적 검증 결과, 기술적 개입이 TBLT의 언어 학습 효율성을 유의미하게 향상시키며, 교사의 기술적 문해력이 도구 숙련에서 패러다임 혁신으로 발전하는 것을 촉진함을 보여준다.\n\n# Research Logic\n## Problem\n교사의 기술적 문해력과 TBLT 간의 시너지 메커니즘이 언어 교육의 효율성을 높이는 데 중요한 문제로 대두되고 있다.\n\n## Theory\n상황 인지 이론을 기반으로 하여 기술 매개 과제 상황의 이론적 프레임워크를 제안한다.\n\n## Design\nTMT-시너지 동적 협력 모델을 통해 기술적 호환성, 과제 복잡성, 상황 진정성, 데이터 기반 지향성의 네 가지 핵심 차원을 설정한다.\n\n## Findings\n기술적 개입이 TBLT의 언어 학습 효율성을 유의미하게 향상시키며, 교사의 기술적 문해력이 도구 숙련에서 패러다임 혁신으로 발전하는 것을 확인하였다.\n\n## Conclusion\n교사의 기술적 문해력과 TBLT 간의 상호작용을 통해 언어 교육의 질을 향상시킬 수 있는 새로운 접근 방식을 제시하였다.\n\n# Key Findings\n- 교사의 기술적 문해력이 TBLT의 효율성을 향상시킨다.\n- 기술 매개 과제 상황이 과제의 진정성을 높인다.\n- 이중 루프 피드백 메커니즘이 교사의 기술적 문해력 발전을 촉진한다.\n\n# Contributions\n## Theoretical\n상황 인지 이론과 TPACK 프레임워크를 통합하여 새로운 이론적 프레임워크를 제시하였다.\n\n## Methodological\n이중 루프 피드백 메커니즘을 통해 교사의 기술적 문해력과 과제 설계 간의 동적 상호작용을 명확히 하였다.\n\n## Practical\n기술적 개입을 통해 TBLT의 언어 학습 효율성을 향상시키는 실질적인 방법을 제안하였다.\n\n# Limitations\n- 연구 샘플이 명시되지 않아 일반화에 한계가 있다.\n- 특정 기술 도구에 대한 의존성이 존재한다.\n\n# Transferable Insights\n- 기술적 문해력 향상이 교육 효과를 높일 수 있다.\n- 이중 루프 피드백 메커니즘이 교육 현장에서 유용하게 적용될 수 있다.\n\n# Idea Seeds\n1. 다양한 기술 도구를 활용한 TBLT의 효과 분석.\n2. 교사의 기술적 문해력 향상을 위한 교육 프로그램 개발.\n3. 기술 매개 과제 상황의 실제 적용 사례 연구.\n\n# Citation Snippets\n> Li, Y. (2025). Synergistic mechanism Between Teachers' Technological Literacy and TBLT Strategies: A Situated Cognition-Based Framework Reconstruction. Frontiers in Educational Research, 8(4), 81-87. https://doi.org/10.25236/FER.2025.080412\n\ntags: #교사의기술적문해력, #TBLT, #상황인지이론, #기술매개과제상황, #이중루프피드백, #언어교육, #교육정보화", "link": "https://doi.org/10.25236/fer.2025.080412", "altLink": "https://openalex.org/W4411110215", "hasDoi": true, "hasReview": true, "authors": ["<p>Yanhua Li<\/p>"], "categories": ["Situated", "Mechanism (biology)", "Cognition", "Situated cognition", "Literacy"]}, {"id": "4", "source": "OPENALEX", "score": 16, "day": "2024-05-11", "title": "More than Model Documentation: Uncovering Teachers' Bespoke Information Needs for Informed Classroom Integration of ChatGPT", "content": "---\ntitle: More than Model Documentation: Uncovering Teachers' Bespoke Information Needs for Informed Classroom Integration of ChatGPT\nauthors: [Mei Tan, Hari Subramonyam]\nyear: 2024\njournal: 명시되지 않음\ndoi: https://doi.org/10.1145/3613904.3642592\nresearch_type: 질적 연구\nmethodology: 인터뷰\ndata_type: 질적 데이터\nsample: 22명의 중고등학교 ELA 및 사회 과목 교사\ncontext: ChatGPT의 교육적 통합\ntheoretical_framework: 명시되지 않음\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 ChatGPT가 교실에 도입됨에 따라 교사들이 필요로 하는 정보의 요구를 조사하였다. 22명의 중고등학교 ELA 및 사회 과목 교사를 인터뷰하여, AI 투명성과 문서화의 담론을 교육 기술 통합과 연결하였다. 연구 결과, 교사들은 ChatGPT의 기능을 탐색하는 데 필요한 정보가 부족하며, 다양한 학습자의 요구에 맞게 활용하는 데 어려움을 겪고 있음을 발견하였다. 이를 해결하기 위해, 교사들이 교육적 및 기술적 지식 간의 상호작용을 탐색할 수 있도록 돕는 인터랙티브 모델 문서화 프레임워크를 제안하였다.\n\n# Research Logic\n## Problem\n교사들이 ChatGPT의 기능을 효과적으로 활용하기 위한 정보의 부족.\n## Theory\nAI 투명성과 문서화가 교육 기술 통합에 미치는 영향.\n## Design\n22명의 중고등학교 교사를 대상으로 한 질적 인터뷰.\n## Findings\n교사들은 ChatGPT의 활용에 대한 명확한 정보가 부족하며, 다양한 학습자의 요구를 충족시키기 위한 지침이 필요하다.\n## Conclusion\n인터랙티브 모델 문서화 프레임워크가 교사들에게 필요한 정보를 제공할 수 있는 잠재력을 지닌다.\n\n# Key Findings\n- 교사들은 ChatGPT의 기능에 대한 정보가 부족하다.\n- 다양한 학습자의 요구에 맞는 활용 방법에 대한 명확한 지침이 필요하다.\n- 제안된 프레임워크는 교사들이 교육적 및 기술적 지식을 통합하는 데 도움을 줄 수 있다.\n\n# Contributions\n## Theoretical\nAI 문서화와 교육 기술 통합의 관계에 대한 새로운 통찰 제공.\n## Methodological\n질적 인터뷰를 통한 교사들의 정보 요구 분석.\n## Practical\n교사들이 ChatGPT를 효과적으로 활용할 수 있도록 돕는 프레임워크 제안.\n\n# Limitations\n- 연구 샘플이 제한적이며, 특정 과목에 국한됨.\n- 교사들의 정보 요구가 시간에 따라 변화할 수 있음.\n\n# Transferable Insights\n- AI 도구의 효과적인 통합을 위한 교사 지원의 중요성.\n- 교육 기술 문서화의 필요성과 그 개선 방향.\n\n# Idea Seeds\n1. 교사 교육 프로그램에 AI 활용 교육 포함.\n2. AI 도구에 대한 지속적인 지원 시스템 구축.\n3. 다양한 학습자의 요구를 충족시키기 위한 AI 활용 사례 연구.\n\n# Citation Snippets\n> Tan, M., & Subramonyam, H. (2024). More than Model Documentation: Uncovering Teachers' Bespoke Information Needs for Informed Classroom Integration of ChatGPT. \n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy\n\n---\n\n요약: 본 연구는 ChatGPT의 교실 통합에 있어 교사들이 필요로 하는 정보 요구를 조사하였다. 연구 결과, 교사들은 ChatGPT의 기능을 탐색하는 데 필요한 정보가 부족하며, 이를 해결하기 위한 인터랙티브 모델 문서화 프레임워크를 제안하였다.", "link": "https://doi.org/10.1145/3613904.3642592", "altLink": "https://openalex.org/W4396832366", "hasDoi": true, "hasReview": true, "authors": ["Mei Tan", "Hari Subramonyam"], "categories": ["Bespoke", "Documentation", "Vetting", "Computer science", "Transparency (behavior)"]}, {"id": "5", "source": "OPENALEX", "score": 16, "day": "2023-08-08", "title": "Digital equity and inclusion in education", "content": "Digital technologies can be used to support the inclusion of diverse student groups in education in a number of ways including enhancing accessibility of educational content, increasing personalisation and providing distance learning opportunities, as was the case during the COVID-19 pandemic. However, persistent digital inequalities can undermine digital equity and inclusion and equity and inclusion in education generally, particularly for the most disadvantaged students. This paper explores the themes of digital equity and inclusion, and maps some of the policies and practices adopted in OECD countries for the equitable and inclusive use of digital tools in education. It highlights the importance of inclusive design and implementation of digital technologies, as well as the need for education systems to focus on capacity building such as teacher training, as well as adequate resourcing of digital tools. It discusses advantages and disadvantages of different approaches, and concludes by highlighting research and policy gaps.", "link": "https://doi.org/10.1787/7cb15030-en", "altLink": "https://openalex.org/W4385663911", "hasDoi": true, "hasReview": false, "authors": ["Francesca Gottschalk", "C Weise"], "categories": ["Equity (law)", "Disadvantaged", "Inclusion (mineral)", "Digital inclusion", "Personalization"]}, {"id": "6", "source": "ERIC", "score": 15, "day": "명시되지 않음", "title": "Empowering Teachers to Integrate AI: Developing an LLM-Based Copilot", "content": "The digital transformation challenges teachers to constantly keep up to date with new technologies, often leading to a lack of time for further training and uncertainty in using these technologies. To address these challenges, this conceptual paper introduces the Teacher Copilot, a training and assistant system based on Large Language Models (LLM) and showcases its integration into the curriculum. The aim is to explore the use of generative AI in the teaching context, thereby supporting teachers in their continuous training, teaching, and work processes through AI-based educational technologies. We use the TPACK framework as a guiding structure to foster the types of knowledge necessary for effectively integrating generative AI tools into teaching. The prototype web application was integrated in a course design, serving as a sandbox for future and practicing teachers to experiment with AI-based learning scenarios and to design their own learning scenarios. The evaluation of the course design highlights the novel role of teachers as designers in an AI co-creation process and suggests a potential impact of generative AI on TPACK knowledge dimensions that extends beyond the mere integration of a new tool or technology. The challenges of uncertainty, interdisciplinarity and information overload can be addressed by empowering teachers to integrate AI through co-creation course designs and teacher support systems. [For the full proceedings, see ED665357.]", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Sabine Seufert", "Stefan Sonderegger"], "categories": ["ERIC"]}, {"id": "7", "source": "ERIC", "score": 15, "day": "명시되지 않음", "title": "Harnessing Artificial Intelligence and Its Impact on Pre-Service Teachers&apos; Technological, Pedagogical, and Content Knowledge Skills: A Meta-Analysis", "content": "As education shifts into the digital age, technology, especially artificial intelligence (AI), plays an increasingly vital role in improving teaching and learning. This metaanalysis investigates how AI impacts the development of Technological Pedagogical and Content Knowledge (TPACK) skills among pre-service teachers. By reviewing data from various studies published between 2010 and 2023, we explore how AI can help integrate technology into educational settings. Our findings reveal that AI interventions generally positively affect TPACK skills, although the extent of these effects varies significantly across studies. Factors such as sample size, duration of the intervention, and the quality of AI tools used all contribute to these differences. Importantly, larger sample sizes and well-designed AI applications lead to more significant improvements in TPACK skills. However, challenges still exist, particularly the need for adequate training and institutional support for pre-service teachers. This research highlights the necessity of establishing the best practices for incorporating AI into teacher training programs. By addressing the gaps in current literature, this study offers valuable insights into the effective use of AI in enhancing TPACK skills and advocates for further investigation in this critical area of educational technology.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Asri Widowati", "Arina Zaida Ilma"], "categories": ["ERIC"]}, {"id": "8", "source": "ERIC", "score": 15, "day": "명시되지 않음", "title": "Modeling English Teachers&apos; Behavioral Intention to Use Artificial Intelligence in Middle Schools", "content": "Artificial intelligence (AI) provides new opportunities for K-12 English as foreign language (EFL) teachers to improve their teaching. To address the emerging trend of integrating AI into teaching, this study investigated EFL teachers' perceptions, knowledge, and behavioral intention to use AI to support teaching and learning of English in middle schools. This study combined relevant aspects of the Unified Theory of Acceptance and Use of Technology (UTAUT) and Technological Pedagogical and Content Knowledge (TPACK) as the theoretical basis. A survey was conducted in an AI education demonstration district in China. This survey adopted a 5-point Likert scale which was developed from previous research and the interview records of EFL teachers. A total of 470 valid responses were collected. The reliability and validity of the scale were satisfied with eight constructs: Performance Expectancy (PE), Effort Expectancy (EE), Social Influence (SI), Facilitating Conditions (FC), AI language technological knowledge (AIL-TK), AI technological pedagogical knowledge (AI-TPK), AI-TPACK, and Behavioral Intention (BI). The results showed that the EFL teachers were positive with regard to the measured factors. PE, SI, AIL-TK, and AI-TPACK had significant positive predictive power on BI; and EE, FC, AI-TPK had indirect effects on BI. The complex interrelations were mapped out to provide educators and policymakers with a theoretically grounded scheme to foster teachers' BI to use AI in teaching.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["An, Xin", "Chai, Ching Sing", "Li, Yushun"], "categories": ["ERIC"]}, {"id": "9", "source": "ERIC", "score": 15, "day": "명시되지 않음", "title": "Strategic Integration of Artificial Intelligence in Faculty Development Grounded in Adult Learning Principles", "content": "As artificial intelligence (AI) rapidly transforms higher education, faculty are increasingly expected to integrate AI tools into curriculum design, assessment, and instruction, often without adequate preparation. This article examines how Centers for Teaching and Learning (CTLs) can effectively support faculty adopting AI technologies through professional development informed by adult learning principles. Drawing on experiential applications and the authors' development work, we examine four key instructional uses of AI: course design, inclusive teaching, scaffolding, and feedback. We present an approach for effective AI-focused faculty development that emphasizes contextual relevance, hands-on learning, reflective dialogue, and sustained support. Anchored in adult education theory, this article offers a practical, ethically informed roadmap to help faculty navigate AI's instructional possibilities while upholding teaching integrity and promoting equitable learning environments.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Simone C. O. Conceição", "Anita Samuel"], "categories": ["ERIC"]}];

    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
  }
}

    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
