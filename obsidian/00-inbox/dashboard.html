<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-04-11 23:32</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "ARXIV", "score": 21, "day": "2026-04-09", "title": "Neural-Symbolic Knowledge Tracing: Injecting Educational Knowledge into Deep Learning for Responsible Learner Modelling", "content": "---\ntitle: Neural-Symbolic Knowledge Tracing: Injecting Educational Knowledge into Deep Learning for Responsible Learner Modelling\nauthors: [Danial Hooshyar, Gustav Šír, Yeongwook Yang, Tommi Kärkkäinen, Raija Hämäläinen, Ekaterina Krivich, Mutlu Cukurova, Dragan Gašević, Roger Azevedo]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2604.08263v1\nresearch_type: 실험 연구\nmethodology: 신경-상징적 접근법\ndata_type: 실제 데이터셋\nsample: 6학년 학생들의 수학 상호작용\ncontext: 교육 AI\ntheoretical_framework: 책임 있는 AI\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 교육에서 인공지능(AI)의 사용 증가와 관련하여, 특히 대형 언어 모델(LLMs)의 한계를 지적하고, 책임 있는 학습자 모델링을 위한 신경-상징적 지식 추적 접근법인 Responsible-DKT를 제안한다. 이 모델은 상징적 교육 지식을 통합하여 학습자의 지식 변화를 추적하고, 예측 정확도를 향상시키며, 예측의 해석 가능성을 높인다. 실험 결과, Responsible-DKT는 기존의 신경-상징적 기준선 및 데이터 기반 DKT 모델보다 우수한 성능을 보였으며, 10%의 훈련 데이터로도 0.80 이상의 AUC를 달성하였다. 이 연구는 AI의 책임 있는 사용을 위한 설계 원칙을 강조하며, 교육적 지식과 기계 학습 방법의 융합을 통해 더 나은 AI 시스템을 개발할 수 있는 가능성을 제시한다.\n\n# Research Logic\n## Problem\nLLMs는 학습자의 지식 변화를 신뢰성 있게 모델링하는 데 한계를 보인다.\n## Theory\n책임 있는 AI 원칙에 기반한 신경-상징적 접근법이 필요하다.\n## Design\n상징적 교육 지식을 통합한 신경 모델을 사용하여 학습자 모델링을 수행한다.\n## Findings\nResponsible-DKT는 예측 정확도에서 기존 모델을 초과하며, 예측의 일관성을 높인다.\n## Conclusion\n신경-상징적 접근법은 AI의 해석 가능성을 높이고, 교육적 원칙과의 정렬을 개선한다.\n\n# Key Findings\n- Responsible-DKT는 10%의 훈련 데이터로 0.80 이상의 AUC를 달성하였다.\n- 예측의 일관성이 개선되어, 학생 반응과의 방향성이 유지되었다.\n- 반복적인 잘못된 응답이 예측 업데이트에 강한 영향을 미친다.\n\n# Contributions\n## Theoretical\n책임 있는 AI 설계 원칙을 교육 AI에 적용하는 새로운 이론적 틀을 제시한다.\n## Methodological\n신경-상징적 접근법을 통해 기존의 데이터 기반 모델의 한계를 극복한다.\n## Practical\n교육적 지식과 기계 학습의 통합을 통해 더 나은 학습자 지원 시스템을 개발할 수 있는 가능성을 제시한다.\n\n# Limitations\n- 연구는 특정 과목(수학)에 국한되어 있으며, 다른 과목에 대한 일반화가 필요하다.\n- 데이터의 질과 양이 모델 성능에 영향을 미칠 수 있다.\n\n# Transferable Insights\n- 신경-상징적 모델링 접근법은 다양한 교육적 맥락에서 적용 가능하다.\n- 책임 있는 AI 설계 원칙은 교육 외 다른 분야에서도 유용할 수 있다.\n\n# Idea Seeds\n1. 다른 과목에 대한 Responsible-DKT의 적용 가능성 연구.\n2. 다양한 학습자 특성을 고려한 모델 개선 방안 탐색.\n3. 교육적 피드백 시스템과의 통합 연구.\n\n# Citation Snippets\n> Hooshyar, D., Šír, G., Yang, Y., Kärkkäinen, T., Hämäläinen, R., Krivich, E., Cukurova, M., Gašević, D., & Azevedo, R. (2026). Neural-Symbolic Knowledge Tracing: Injecting Educational Knowledge into Deep Learning for Responsible Learner Modelling. arXiv. https://arxiv.org/abs/2604.08263v1\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy\n\n---\n\n요약: 본 연구는 AI의 교육적 활용에서 LLM의 한계를 극복하기 위한 신경-상징적 지식 추적 모델인 Responsible-DKT를 제안하며, 이 모델이 기존의 데이터 기반 모델보다 우수한 성능을 보임을 입증하였다. 연구 결과는 AI의 책임 있는 설계 원칙을 강조하며, 교육적 지식과 기계 학습의 융합을 통해 더 나은 학습자 지원 시스템 개발의 가능성을 제시한다.", "link": "https://arxiv.org/abs/2604.08263v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Danial Hooshyar", "Gustav Šír", "Yeongwook Yang"], "categories": ["cs.AI"]}, {"id": "1", "source": "ARXIV", "score": 17, "day": "2026-04-08", "title": "Google, AI Literacy, and the Learning Sciences: Multiple Modes of Research, Industry, and Practice Partnerships", "content": "---\ntitle: Google, AI Literacy, and the Learning Sciences: Multiple Modes of Research, Industry, and Practice Partnerships\nauthors: Victor R. Lee, Michael Madaio, Ben Garside, Aimee Welch, Kristen Pilner Blair, Ibrahim Oluwajoba Adisa, Alon Harris, Kevin Holst, Liat Ben Rafael, Ronit Levavi Morad, Ben Travis, Belle Moller, Andrew Shields, Zak Brown, Lois Hinx, Marisol Diaz, Evan Patton, Selim Tezel, Robert Parks, Hal Abelson, Adam Blasioli, Jeremy Roschelle\nyear: 2026\njournal: 명시되지 않음\ndoi: https://arxiv.org/abs/2604.07601v1\nresearch_type: 심포지엄\nmethodology: 발표, 논평, 그룹 토론\ndata_type: 명시되지 않음\nsample: 명시되지 않음\ncontext: AI 리터러시 교육을 위한 연구와 산업 간의 협력\ntheoretical_framework: 명시되지 않음\nkeywords: [AI 리터러시, 교육, 산업 협력, 학습 과학, Google]\n---\n\n# APA 7th style\n\n# Summary\n이 심포지엄은 AI 리터러시를 증진하기 위한 다양한 연구 및 산업 파트너십을 다룬다. Google과의 협력을 통해 진행된 여러 프로젝트를 통해 연구, 실천, 산업 간의 교차점과 파트너십의 방향성을 형성하는 요소들을 탐구한다. AI 리터러시의 필요성과 이를 위한 교육적 접근 방식에 대한 논의가 이루어지며, 향후 협력의 기회에 대한 통찰을 제공한다.\n\n# Research Logic\n## Problem\nAI 리터러시를 일반 대중에게 효과적으로 전달하는 것이 복잡한 도전 과제임.\n## Theory\nAI 리터러시의 정의와 그 중요성에 대한 다양한 관점이 존재함.\n## Design\nGoogle과의 협력을 통해 다양한 교육 프로그램과 자료를 개발함.\n## Findings\nAI 리터러시 교육의 필요성과 이를 위한 효과적인 파트너십 모델을 제시함.\n## Conclusion\nAI 리터러시 증진을 위한 연구와 산업 간의 협력이 필수적임.\n\n# Key Findings\n- AI 리터러시 교육을 위한 다양한 파트너십 모델이 필요함.\n- Google과의 협력이 AI 리터러시 교육의 효과성을 높임.\n- 교육자와 학생을 위한 맞춤형 자료 개발의 중요성이 강조됨.\n\n# Contributions\n## Theoretical\nAI 리터러시의 정의와 교육적 접근 방식에 대한 새로운 통찰 제공.\n## Methodological\n산업과 연구 간의 협력 모델을 통해 실천적 접근 방안 제시.\n## Practical\nAI 리터러시 교육을 위한 구체적인 프로그램과 자료 개발.\n\n# Limitations\n- 연구 샘플과 데이터 유형이 명시되지 않음.\n- 특정 지역이나 문화적 맥락에 대한 고려가 부족할 수 있음.\n\n# Transferable Insights\n- AI 리터러시 교육은 다양한 이해관계자 간의 협력이 필요함.\n- 교육 자료는 지역적 맥락에 맞춰 조정되어야 함.\n\n# Idea Seeds\n1. AI 리터러시 교육을 위한 새로운 커리큘럼 개발.\n2. 다양한 문화적 배경을 고려한 교육 자료 제작.\n3. 산업과 학계 간의 지속적인 협력 모델 구축.\n\n# Citation Snippets\n> Lee, V. R., Madaio, M., Garside, B., Welch, A., et al. (2026). Google, AI Literacy, and the Learning Sciences: Multiple Modes of Research, Industry, and Practice Partnerships. \n\ntags: #AI리터러시, #교육, #산업협력, #학습과학, #Google, #교육자료, #파트너십\n\n---\n\n요약: 이 심포지엄은 AI 리터러시를 증진하기 위한 연구와 산업 간의 협력 모델을 탐구한다. Google과의 협력을 통해 다양한 교육 프로그램이 개발되었으며, AI 리터러시 교육의 필요성과 효과적인 접근 방식에 대한 논의가 이루어진다.", "link": "https://arxiv.org/abs/2604.07601v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Victor R. Lee", "Michael Madaio", "Ben Garside"], "categories": ["cs.CY", "cs.AI"]}, {"id": "2", "source": "ARXIV", "score": 16, "day": "2026-04-08", "title": "PRISM: Evaluating a Rule-Based, Scenario-Driven Social Media Privacy Education Program for Young Autistic Adults", "content": "---\ntitle: PRISM: Evaluating a Rule-Based, Scenario-Driven Social Media Privacy Education Program for Young Autistic Adults\nauthors: Kirsten Chapman, Garrett Smith, Kaitlyn Klabacka, Joseph Thomas Bills, Addisyn Bushman, Terisa Gabrielsen, Pamela J Wisniewski, Xinru Page\nyear: 2026\njournal: Proceedings of The ACM Conference on Computer-Supported Cooperative Work and Social Computing (CSCW ’26)\ndoi: 명시되지 않음\nresearch_type: 교육 개입 연구\nmethodology: 혼합 방법론 (정량적 및 정성적 분석)\ndata_type: 설문조사, 수업 녹음, 사전 및 사후 평가\nsample: 29명의 자폐성 청년 (2단계 지원 필요)\ncontext: 자폐성 청년을 위한 소셜 미디어 프라이버시 교육\ntheoretical_framework: 규칙 기반 행동 이론\nkeywords: [social media privacy, autistic young adults, educational intervention, rule-based instruction, privacy literacy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 자폐성 청년을 위한 소셜 미디어 프라이버시 교육 프로그램인 PRISM을 개발하고 평가하였다. 14주간의 수업을 통해 29명의 자폐성 청년이 참여하였으며, 교육 개입은 규칙 기반의 시나리오 형식을 사용하여 안전한 프라이버시 관리 방법을 제공하였다. 사전 및 사후 지식 평가 결과, 참가자들은 소셜 미디어에서 더 안전한 프라이버시 결정을 내리는 데 있어 통계적으로 유의미한 향상을 보였다. 연구는 자폐성 청년의 프라이버시 문해력을 높이기 위한 교육적 접근 방식을 제안하며, 기술 설계자와 교육자에게 권장 사항을 제시한다.\n\n# Research Logic\n## Problem\n자폐성 청년은 소셜 미디어 사용 시 프라이버시 침해를 경험할 가능성이 높으며, 기존의 교육 개입은 이들을 위한 맞춤형 접근이 부족하다.\n\n## Theory\n규칙 기반 행동 이론을 바탕으로, 명시적 지침을 통해 자폐성 청년의 독립성을 증진할 수 있는 교육적 접근이 필요하다.\n\n## Design\nPRISM 프로그램은 14주 동안 진행된 50분 수업으로 구성되며, 자폐성 청년의 커뮤니케이션 스타일에 맞춘 규칙 기반 교육을 포함한다.\n\n## Findings\n교육 개입 후 참가자들은 소셜 미디어 프라이버시 결정에서 통계적으로 유의미한 향상을 보였으며, 수업 참여 패턴이 학습 결과와 관련이 있음을 발견하였다.\n\n## Conclusion\nPRISM 프로그램은 자폐성 청년의 프라이버시 문해력을 향상시키기 위한 효과적인 교육 개입으로, 향후 프라이버시 교육 및 기술 설계에 대한 통찰을 제공한다.\n\n# Key Findings\n- PRISM 프로그램을 통해 참가자들은 소셜 미디어 프라이버시 결정에서 유의미한 향상을 보였다.\n- 규칙 기반 교육이 자폐성 청년의 학습 스타일에 효과적임을 입증하였다.\n- 수업 참여 패턴이 학습 결과에 영향을 미치는 경향이 있었다.\n\n# Contributions\n## Theoretical\n자폐성 청년을 위한 프라이버시 교육의 필요성을 강조하고, 규칙 기반 행동 이론의 적용 가능성을 제시하였다.\n\n## Methodological\n혼합 방법론을 사용하여 정량적 및 정성적 데이터를 통합하여 교육 개입의 효과를 평가하였다.\n\n## Practical\n자폐성 청년을 위한 맞춤형 프라이버시 교육 프로그램 개발에 대한 실질적인 권장 사항을 제공하였다.\n\n# Limitations\n- 샘플 크기가 작아 일반화에 한계가 있다.\n- 연구 기간이 짧아 장기적인 효과를 평가하기 어렵다.\n\n# Transferable Insights\n- 자폐성 청년을 위한 교육 프로그램 설계 시 규칙 기반 접근 방식을 고려해야 한다.\n- 소셜 미디어 프라이버시 교육은 자폐성 청년의 독립성을 증진하는 데 기여할 수 있다.\n\n# Idea Seeds\n1. 자폐성 청년을 위한 다양한 소셜 미디어 플랫폼에 대한 맞춤형 교육 자료 개발.\n2. 프라이버시 교육의 장기적 효과를 평가하기 위한 후속 연구 설계.\n3. 다른 취약 집단을 위한 유사한 교육 개입의 개발 및 평가.\n\n# Citation Snippets\n> Chapman, K., Smith, G., Klabacka, K., Bills, J. T., Bushman, A., Gabrielsen, T., Wisniewski, P. J., & Page, X. (2026). PRISM: Evaluating a Rule-Based, Scenario-Driven Social Media Privacy Education Program for Young Autistic Adults. In Proceedings of The ACM Conference on Computer-Supported Cooperative Work and Social Computing (CSCW ’26).\n\ntags: #socialmedia #privacy #autism #education #intervention #neurodiversity #literacy\n\n---\n\n요약: 본 연구는 자폐성 청년을 위한 소셜 미디어 프라이버시 교육 프로그램 PRISM을 개발하고 평가하였다. 14주간의 수업을 통해 참가자들은 안전한 프라이버시 관리 방법을 배우고, 교육 개입 후 프라이버시 결정에서 유의미한 향상을 보였다. 이 연구는 자폐성 청년의 프라이버시 문해력을 높이기 위한 교육적 접근 방식을 제안한다.", "link": "https://arxiv.org/abs/2604.07531v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Kirsten Chapman", "Garrett Smith", "Kaitlyn Klabacka"], "categories": ["cs.CY", "cs.HC"]}, {"id": "3", "source": "ARXIV", "score": 13, "day": "2026-04-08", "title": "To Layer or Not to Layer? Evaluating the Effects and Mechanisms of LLM-Generated Feedback on learning performance", "content": "---\ntitle: To Layer or Not to Layer? Evaluating the Effects and Mechanisms of LLM-Generated Feedback on learning performance\nauthors: Jie Cao, Chloe Qianhui Zhao, Christian Schunn, Elizabeth A. McLaughlin, Jionghao Lin, Kenneth R. Koedinger\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2604.07469v1\nresearch_type: 실험 연구\nmethodology: 무작위 배정 실험\ndata_type: 양적 데이터\nsample: 199명\ncontext: 온라인 고등 교육\ntheoretical_framework: 학습자 중심 피드백 이론, 층화 피드백\nkeywords: [layered feedback, elaborated feedback, learner-centered feedback, behavioral engagement, LLM-generated feedback]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 LLM(대형 언어 모델) 생성 피드백의 층화 여부가 학습 성과에 미치는 영향을 평가하였다. 199명의 참가자를 무작위로 층화 피드백과 비층화 피드백 그룹에 배정하여 학습 성과, 행동적 및 인지적 참여, 정서적 인식을 측정하였다. 결과적으로, 층화 피드백은 약간 더 높은 행동적 참여를 유도했으나, 학습 성과는 비층화 피드백에 비해 유의미하게 낮았다. 이러한 결과는 층화 피드백이 참여와 긍정적 인식을 증진시키는 반면, 실제 학습 성과에는 부정적인 영향을 미칠 수 있음을 시사한다.\n\n# Research Logic\n## Problem\n층화 피드백이 학습 참여와 성과에 미치는 영향을 명확히 이해하지 못함.\n## Theory\n학습자 중심 피드백 이론과 층화 피드백의 효과를 기반으로 함.\n## Design\n199명을 대상으로 층화 피드백과 비층화 피드백을 비교하는 무작위 배정 실험 설계.\n## Findings\n층화 피드백이 행동적 참여를 증가시키지만, 학습 성과는 저하됨.\n## Conclusion\n층화 피드백은 긍정적 인식을 증진시키지만, 실제 학습 성과에는 부정적인 영향을 미친다.\n\n# Key Findings\n- 층화 피드백은 행동적 참여를 약간 증가시킴.\n- 학습 성과는 비층화 피드백에 비해 유의미하게 낮음.\n- 정서적 인식에서 긍정적인 경로가 발견되었으나, 행동적 경로는 부정적임.\n\n# Contributions\n## Theoretical\n층화 피드백의 효과에 대한 새로운 통찰 제공.\n## Methodological\n무작위 배정 실험을 통한 피드백 유형 비교 연구.\n## Practical\n자동화된 피드백 시스템 설계에 대한 실용적 지침 제공.\n\n# Limitations\n- 샘플 크기가 제한적일 수 있음.\n- 특정 교육 환경에 국한된 결과일 수 있음.\n\n# Transferable Insights\n- 피드백 설계에서 긍정적 인식을 증진시키는 요소의 중요성.\n- 학습 성과를 저해할 수 있는 피드백의 특성 인식 필요.\n\n# Idea Seeds\n1. 다양한 교육 환경에서 층화 피드백의 효과를 비교하는 연구.\n2. LLM을 활용한 피드백의 개인화 가능성 탐색.\n3. 피드백 설계에서 인지적 부담을 줄이는 방법 연구.\n\n# Citation Snippets\n> Cao, J., Zhao, C. Q., Schunn, C., McLaughlin, E. A., Lin, J., & Koedinger, K. R. (2026). To Layer or Not to Layer? Evaluating the Effects and Mechanisms of LLM-Generated Feedback on learning performance. arXiv.\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy\n\n---\n\n요약: 본 연구는 LLM 생성 피드백의 층화 여부가 학습 성과에 미치는 영향을 평가하였다. 층화 피드백은 행동적 참여를 증가시키지만, 학습 성과는 비층화 피드백에 비해 유의미하게 낮았다. 이러한 결과는 피드백 설계에서 긍정적 인식을 증진시키는 요소의 중요성을 시사한다.", "link": "https://arxiv.org/abs/2604.07469v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Jie Cao", "Chloe Qianhui Zhao", "Christian Schunn"], "categories": ["cs.HC"]}, {"id": "4", "source": "ARXIV", "score": 12, "day": "2026-04-09", "title": "An Agentic Evaluation Architecture for Historical Bias Detection in Educational Textbooks", "content": "---\ntitle: An Agentic Evaluation Architecture for Historical Bias Detection in Educational Textbooks\nauthors: [Gabriel Stefan, Adrian-Marius Dumitran]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2604.07883v1\nresearch_type: 실증 연구\nmethodology: 다중 에이전트 시스템\ndata_type: 텍스트\nsample: 270개의 루마니아 고등학교 역사 교과서 발췌\ncontext: 루마니아 역사 교과서의 편향 탐지\ntheoretical_framework: 다중 에이전트 시스템, 교육적 거버넌스\nkeywords: [AI in Education, Bias Detection, Multi-Agent Systems, Large Language Models, Curriculum Auditing]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 역사 교과서에서의 편향을 탐지하기 위한 에이전틱 평가 아키텍처를 제안한다. 이 아키텍처는 다중 모드 스크리닝 에이전트, 이질적인 평가 에이전트의 배심원, 그리고 판결 합성을 위한 메타 에이전트로 구성된다. 에이전틱 심의는 평균 심각도를 5.4/7에서 2.9/7로 낮추고, 270개의 발췌 중 83.3%를 교육적으로 수용 가능한 것으로 분류하였다. 이 연구는 교육 거버넌스를 위한 경제적으로 실행 가능한 의사 지원 도구로서의 가능성을 제시한다.\n\n# Research Logic\n## Problem\n역사 교과서의 편향, 민족주의적 프레이밍 및 선택적 생략을 대규모로 감사하는 것이 어렵다.\n## Theory\n다중 에이전트 시스템을 통한 편향 탐지 및 평가.\n## Design\n다중 모드 스크리닝 에이전트와 이질적인 배심원 시스템을 통한 평가.\n## Findings\n83.3%의 발췌가 교육적으로 수용 가능하다고 분류되었으며, 평균 심각도가 2.9/7로 감소하였다.\n## Conclusion\n에이전틱 평가 아키텍처는 교육 거버넌스에 유용한 도구로 자리잡을 수 있다.\n\n# Key Findings\n- 270개의 발췌 중 83.3%가 교육적으로 수용 가능하다고 평가됨.\n- 평균 심각도가 5.4/7에서 2.9/7로 감소함.\n- 독립적 심의 구성에서 64.8%의 경우에서 선호됨.\n\n# Contributions\n## Theoretical\n다중 에이전트 시스템을 통한 교육 자료의 편향 탐지 이론 발전.\n## Methodological\n에이전틱 평가 아키텍처의 설계 및 구현 방법론 제시.\n## Practical\n교육 거버넌스를 위한 경제적이고 실행 가능한 의사 지원 도구로서의 활용 가능성.\n\n# Limitations\n- 특정 문화적 맥락에서의 편향 탐지의 한계.\n- 다중 에이전트 시스템의 복잡성으로 인한 실행 비용.\n\n# Transferable Insights\n- 다중 에이전트 시스템의 활용 가능성.\n- 교육 자료의 편향 탐지에 대한 새로운 접근법.\n\n# Idea Seeds\n1. 다른 국가의 역사 교과서에 대한 유사한 평가 아키텍처 적용.\n2. 다양한 문화적 배경을 가진 평가 에이전트의 추가.\n3. 실시간 교육 자료 평가 시스템 개발.\n\n# Citation Snippets\n> Gabriel Stefan, Adrian-Marius Dumitran. (2026). An Agentic Evaluation Architecture for Historical Bias Detection in Educational Textbooks. arXiv. https://arxiv.org/abs/2604.07883v1\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy", "link": "https://arxiv.org/abs/2604.07883v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Gabriel Stefan", "Adrian-Marius Dumitran"], "categories": ["cs.AI", "cs.CL", "cs.CY", "cs.MA"]}, {"id": "5", "source": "ARXIV", "score": 12, "day": "2026-04-09", "title": "Mitigating Distribution Sharpening in Math RLVR via Distribution-Aligned Hint Synthesis and Backward Hint Annealing", "content": "Reinforcement learning with verifiable rewards (RLVR) can improve low-$k$ reasoning accuracy while narrowing solution coverage on challenging math questions, and pass@1 gains do not necessarily translate into better large-$k$ performance. Existing hint-based approaches can make challenging questions trainable, but they leave two issues underexplored: teacher-student distribution mismatch and the need to reduce hint exposure to match no-hint evaluation. We address these issues through two components. Distribution-Aligned Hint Synthesis (DAHS) constructs verified teacher hints conditioned on student-style responses. Backward Hint Annealing (BHA) anneals hint exposure across difficulty buckets and uses per-question hint dropout to preserve no-hint updates throughout RL training. We evaluate the method in math RLVR under the DAPO training framework across AIME24, AIME25, and AIME26 using $\\texttt{Qwen3-1.7B-Base}$ and $\\texttt{Llama-3.2-1B-Instruct}$. On $\\texttt{Qwen3-1.7B-Base}$, our method improves both pass@1 and pass@2048 relative to DAPO across the three AIME benchmarks. On $\\texttt{Llama-3.2-1B-Instruct}$, the gains are concentrated in the large-$k$ regime. These results suggest that, in math RLVR, hint scaffolding is effective when it restores learnable updates on challenging questions early in training and is then gradually removed before no-hint evaluation.", "link": "https://arxiv.org/abs/2604.07747v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Pei-Xi Xie", "Che-Yu Lin", "Cheng-Lin Yang"], "categories": ["cs.AI", "cs.CL", "cs.LG"]}, {"id": "6", "source": "ARXIV", "score": 12, "day": "2026-04-08", "title": "TR-EduVSum: A Turkish-Focused Dataset and Consensus Framework for Educational Video Summarization", "content": "This study presents a framework for generating the gold-standard summary fully automatically and reproducibly based on multiple human summaries of Turkish educational videos. Within the scope of the study, a new dataset called TR-EduVSum was created, encompassing 82 Turkish course videos in the field of \"Data Structures and Algorithms\" and containing a total of 3281 independent human summaries. Inspired by existing pyramid-based evaluation approaches, the AutoMUP (Automatic Meaning Unit Pyramid) method is proposed, which extracts consensus-based content from multiple human summaries. AutoMUP clusters the meaning units extracted from human summaries using embedding, statistically models inter-participant agreement, and generates graded summaries based on consensus weight. In this framework, the gold summary corresponds to the highest-consensus AutoMUP configuration, constructed from the most frequently supported meaning units across human summaries. Experimental results show that AutoMUP summaries exhibit high semantic overlap with robust LLM (Large Language Model) summaries such as Flash 2.5 and GPT-5.1. Furthermore, ablation studies clearly demonstrate the decisive role of consensus weight and clustering in determining summary quality. The proposed approach can be generalized to other Turkic languages at low cost.", "link": "https://arxiv.org/abs/2604.07553v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Figen Eğin", "Aytuğ Onan"], "categories": ["cs.CL", "cs.AI"]}, {"id": "7", "source": "ARXIV", "score": 11, "day": "2026-04-09", "title": "From Clicking to Moving: Embodied Micro-Movements as a New Modality for Data Literacy Learning", "content": "Widespread digital learning has expanded access to education but has resulted in highly sedentary, click-based interaction, contributing to digital fatigue, reduced cognitive flexibility, and health risks associated with prolonged passive screen time. Meanwhile, data literacy has become an essential competency in a data-driven society, yet it is typically taught through passive, disembodied interfaces that offer little physical engagement. We present Kinetiq (Kinetic+IQ), a novel system that integrates fun, full-body micro-movements directly into data and numeracy problem solving. Instead of selecting answers with a mouse, learners interact through natural gestures such as reaching, dodging, heading, elbowing, or knee-raising, thus turning abstract data problem-solving into embodied experiences that integrate thinking with movement. In a preliminary within-subjects study comparing Kinetiq with conventional platforms, participants reported significantly higher affective valence, enjoyment, engagement, and motivation, while maintaining comparable learning gains. We contribute: (1) a task-integrated movement paradigm for data learning, (2) a cross-platform web and mobile app system enabling full-body learning in constrained everyday spaces, and (3) preliminary empirical evidence that embodied micro-movements can enrich the affective experience of data literacy learning.", "link": "https://arxiv.org/abs/2604.07881v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Annabella Sakunkoo", "Jonathan Sakunkoo"], "categories": ["cs.HC"]}, {"id": "8", "source": "OPENALEX", "score": 11, "day": "2026-04-09", "title": "Quiz-based inquiry: embedding incrementally sequenced questions to enhance engagement and learning in synchronous online lectures", "content": "Abstract Synchronous online lectures often rely on static slide presentations and end-of-session quizzes, limiting sustained cognitive engagement and meaningful interaction. This study introduces quiz-based inquiry (QBI), an incremental, lecture-embedded instructional approach that distributes low-stakes quiz prompts across live sessions to regulate attention, stimulate reasoning, and integrate feedback within the progression of instruction. Rather than functioning as terminal assessments, quiz prompts serve as structural drivers of inquiry and dialogue. Using a quasi-experimental design, three groups of undergraduate students (N = 90) enrolled in an online public administration course were assigned to one control condition (LMS-based post-lecture quizzes) and two experimental conditions that implemented QBI via interactive presentation platforms ( Mentimeter and AhaSlides ). Data included online formative quiz performance, paper-based summative examination scores, technology acceptance, multidimensional engagement, perceived interaction, and course satisfaction. Students in the QBI conditions demonstrated significantly higher formative and summative performance compared with the control group. Formative performance strongly predicted final examination outcomes (β = 0.66, p &lt; .001), accounting for a substantial proportion of variance. QBI also yielded significant gains in behavioural, emotional, and cognitive engagement, along with enhanced perceived interaction. Qualitative findings revealed sustained attentional readiness, dialogic reasoning, and real-time conceptual clarification. Minimal differences between platforms indicate that instructional sequencing, rather than technological variation, accounted for observed effects. This study advances instructional design theory by reframing formative assessment as a structural component of instructional architecture that sustains inquiry, engagement, and cumulative understanding in synchronous online learning environments.", "link": "https://doi.org/10.1007/s11423-026-10614-1", "altLink": "https://openalex.org/W7152366775", "hasDoi": true, "hasReview": false, "authors": ["Zamzami Zainuddin", "Michael Sailer", "Shurui BAI"], "categories": ["Formative assessment", "Summative assessment", "Cognitive reframing", "Psychology", "Educational technology"]}, {"id": "9", "source": "ARXIV", "score": 11, "day": "2026-04-07", "title": "Trust in AI among Middle Eastern CS Students: Investigating Students' Trust and Usage Patterns Across Saudi Arabia, Kuwait and Jordan", "content": "Background and Context: Artificial intelligence (AI) tools have been reshaping computing and computer science education. Trust in AI is a determining factor in the adoption of these tools. Recent studies have shown different trust factors across gender and first-generation status among students. However, these studies have focused mainly on Western, Educated, Industrialized, Rich, and Democratic (WEIRD) populations, and their generalizability to other populations with different languages and cultures is unclear.   Objective: This study aims to evaluate trust in AI among Middle Eastern computer science students and the factors that can impact it.   Method. We replicate a recent study of trust in four universities in three Middle Eastern, Arabic-speaking countries: Saudi Arabia, Kuwait, and Jordan. We analyze trust among students across different factors such as gender and first-generation status.   Findings: Our results suggest that language fluency can predict trust in AI. Moreover, unlike the results from the US population where female students tended to trust AI more than their male peers, female students in Saudi Arabia indicated lower trust compared to their male counterparts, and we did not observe any noticeable differences across gender in the other countries. We also found a generally negative correlation between English language proficiency and students' confidence.   Implications: This study highlights differences in students' adoption and trust in AI even within the same region. It emphasizes the need for more investigation into students' adoption and interaction in non-WEIRD regions for equitable adoption of this technology. It also suggests a need for efforts in designing effective AI systems tailored to the cultural and linguistic needs of the region.", "link": "https://arxiv.org/abs/2604.06418v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Saleh Alkhamees", "Ali Alfageeh", "Bader Alkhazi"], "categories": ["cs.HC"]}];

  if (query.trim() && !searchHistory.includes(query)) {
    searchHistory.unshift(query);
    if (searchHistory.length > 10) searchHistory.pop();
    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
  }
}

function downloadJSON() {
  const data = JSON.stringify(filtered, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadCSV() {
  const headers = ['제목', '출처', '스코어', '리뷰여부', '링크'];
  const rows = filtered.map(p => [
    '"' + p.title.replace(/"/g, '""') + '"',
    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
