<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-03-11 23:25</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "OPENALEX", "score": 30, "day": "2025-10-09", "title": "Exploring teachers’ perceptions of integrating artificial intelligence (AI) in STEM education using the TPACK framework: an exploratory case study", "content": "---\ntitle: 인공지능(AI) 통합에 대한 교사의 인식 탐색: TPACK 프레임워크를 활용한 탐색적 사례 연구\nauthors: Moza Alkubaisi\nyear: 2025\njournal: Discover Artificial Intelligence\ndoi: https://doi.org/10.1007/s44163-025-00522-3\nresearch_type: 탐색적 연구\nmethodology: 온라인 설문조사\ndata_type: 정량적 데이터\nsample: 12명의 STEM 교사\ncontext: 카타르의 STEM 교육\ntheoretical_framework: TPACK 프레임워크\nkeywords: [인공지능, AI 도구, K-12 교육, 교사, 인식, STEM, TPACK, 사례 연구]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 카타르의 STEM 교사들이 인공지능(AI) 도구를 교육 실천에 통합하는 것에 대한 인식과 태도를 탐구하는 것을 목표로 한다. TPACK 프레임워크를 기반으로 한 설문조사를 통해 교사들의 기술적, 교수적, 내용 지식이 AI 도구 사용에 대한 태도에 미치는 영향을 조사하였다. 연구 결과, STEM 교사들은 AI 도구에 대한 중간 정도의 기술적 지식을 보유하고 있으며, AI가 개인화된 학습 경험을 제공할 수 있는 잠재력을 인식하고 있다. 그러나 AI 통합을 위한 교사의 준비성을 강화할 필요성이 강조되며, 전문성 개발의 중요성이 부각된다. 연구의 한계로는 제한된 표본 크기와 자기 보고 편향이 지적된다.\n\n# Research Logic\n## Problem\nAI 도구의 교육적 통합에 대한 교사의 인식 부족.\n## Theory\nTPACK 프레임워크를 통해 기술, 교수법, 내용 지식 간의 상호작용 탐구.\n## Design\n온라인 설문조사를 통해 12명의 STEM 교사 대상 데이터 수집.\n## Findings\n교사들은 AI 도구에 대한 중간 정도의 기술적 지식을 보유하며, AI의 개인화된 학습 가능성을 인식.\n## Conclusion\nAI 통합을 위한 교사의 준비성을 높이기 위한 전문성 개발 필요.\n\n# Key Findings\n- STEM 교사들은 AI 도구에 대한 중간 정도의 기술적 지식을 보유하고 있다.\n- AI는 개인화된 학습 경험을 제공할 수 있는 잠재력을 지닌다.\n- 교사들의 AI 통합 준비성을 높이기 위한 전문성 개발이 필요하다.\n\n# Contributions\n## Theoretical\nTPACK 프레임워크를 통한 AI 도구 통합에 대한 새로운 통찰 제공.\n## Methodological\n탐색적 연구 디자인을 통한 교사 인식에 대한 심층적 이해.\n## Practical\nAI 도구 통합을 위한 정책 및 전문성 개발 프로그램에 대한 실질적 제안.\n\n# Limitations\n- 제한된 표본 크기로 인해 결과의 일반화에 한계가 있다.\n- 자기 보고 편향과 시간 제약이 결과에 영향을 미칠 수 있다.\n\n# Transferable Insights\n- AI 도구의 효과적인 통합을 위해 교사의 기술적 준비성을 강화해야 한다.\n- 다양한 이해관계자를 포함한 연구가 필요하다.\n\n# Idea Seeds\n1. AI 도구 통합을 위한 교사 전문성 개발 프로그램 설계.\n2. 다양한 문화적 배경을 가진 교사들의 인식 비교 연구.\n3. AI 도구 사용에 대한 교사 교육 커리큘럼 개발.\n\n# Citation Snippets\n> Alkubaisi, M. (2025). Exploring teachers’ perceptions of integrating artificial intelligence (AI) in STEM education using the TPACK framework: an exploratory case study. Discover Artificial Intelligence, 5, 266. https://doi.org/10.1007/s44163-025-00522-3\n\ntags: #인공지능, #AI도구, #K12교육, #교사, #인식, #STEM, #TPACK, #사례연구\n\n---\n\n요약: 본 연구는 카타르의 STEM 교사들이 AI 도구를 교육에 통합하는 것에 대한 인식과 태도를 조사하였다. TPACK 프레임워크를 활용하여 교사들의 기술적, 교수적, 내용 지식이 AI 도구 사용에 미치는 영향을 분석하였다. 연구 결과, 교사들은 AI의 개인화된 학습 가능성을 인식하고 있지만, AI 통합을 위한 준비성을 높이기 위한 전문성 개발이 필요하다는 결론을 도출하였다.", "link": "https://doi.org/10.1007/s44163-025-00522-3", "altLink": "https://openalex.org/W4414995080", "hasDoi": true, "hasReview": true, "authors": ["Moza Alkubaisi"], "categories": ["Perception", "Affordance", "Psychology", "Exploratory research", "Affect (linguistics)"]}, {"id": "1", "source": "OPENALEX", "score": 21, "day": "2026-02-27", "title": "Artificial Intelligence in teacher education: A systematic review of its role in enhancing digital literacy and pedagogical content knowledge in STEM", "content": "---\ntitle: 인공지능이 교사 교육에서 디지털 리터러시 및 교수 내용 지식을 향상시키는 역할에 대한 체계적 검토\nauthors: Hassan Zahoor, Ayaz Ahmed, Junchao Zhang, Syeda Maria Zainab Gardezi, Wynn Marlar, Mohammad Naim Wahdat\nyear: 2026\njournal: 명시되지 않음\ndoi: 명시되지 않음\nresearch_type: 체계적 검토\nmethodology: 내용 분석, PRISMA 가이드라인\ndata_type: 명시되지 않음\nsample: 명시되지 않음\ncontext: STEM 교육\ntheoretical_framework: 명시되지 않음\nkeywords: [인공지능, 교사 교육, STEM, 디지털 리터러시, 교수 내용 지식, 교육 기술]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 STEM 분야에서 교사 교육 및 전문성 개발에 인공지능(AI) 도구의 통합을 체계적으로 검토하였다. 연구에서는 AI 기반 증강 현실, 지능형 튜터링 시스템, 개인화 학습, 수업 준비의 네 가지 주요 AI 도구를 식별하였다. 이러한 도구들은 교수 전략을 개선하고, 학습 과정에서 교사를 지원하며, STEM 수업에서 학습 참여를 증진시키는 데 기여할 수 있음이 나타났다. 그러나 적절한 교사 준비 및 훈련의 필요성, 데이터 보안 및 개인 정보 보호 문제, AI의 부정확하거나 관련 없는 답변 생성, 교육 기관의 기술 인프라 부족 등의 도전 과제가 여전히 존재한다. 또한 AI 관련 내용이 커리큘럼에서 소홀히 다루어지고 있다는 점도 지적되었다. 연구는 AI 도구가 개별 교사의 필요에 맞게 조정될 수 있어야 하며, AI 생성 데이터의 명확성 및 개인 데이터 보호의 강화를 요구하는 연구 격차가 존재함을 강조한다. 그러나 본 체계적 검토는 STEM 교사 교육에서 인공지능의 활용을 촉진하며, 교수 효율성을 향상시키고 전문적 성장을 촉진할 수 있음을 확인하였다.\n\n# Research Logic\n## Problem\nSTEM 교육에서 AI 도구의 효과적인 활용과 관련된 도전 과제.\n## Theory\nAI 도구가 교수 전략 및 학습 참여에 미치는 영향.\n## Design\n체계적 검토 및 내용 분석을 통한 AI 도구의 효과 분석.\n## Findings\nAI 도구는 교수 전략을 개선하고 학습 참여를 증진시키지만, 여러 도전 과제가 존재함.\n## Conclusion\nAI는 STEM 교사 교육의 효율성을 높이고 전문적 성장을 촉진할 수 있는 잠재력을 지님.\n\n# Key Findings\n- AI 도구는 교수 전략을 개선하고 학습 참여를 증진시킬 수 있음.\n- 적절한 교사 준비 및 훈련의 필요성이 강조됨.\n- 데이터 보안 및 개인 정보 보호 문제와 기술 인프라 부족이 도전 과제로 지적됨.\n\n# Contributions\n## Theoretical\nAI 도구의 교육적 활용에 대한 이론적 기초를 제공.\n## Methodological\n체계적 검토 및 PRISMA 가이드라인을 통한 연구 방법론 제시.\n## Practical\nSTEM 교육에서 AI 도구의 실제 적용 가능성을 제시.\n\n# Limitations\n- 연구 샘플 및 데이터 유형이 명시되지 않음.\n- AI 도구의 효과에 대한 구체적인 통계적 수치가 부족함.\n\n# Transferable Insights\n- AI 도구의 효과적인 활용을 위한 교사 교육의 중요성.\n- 데이터 보안 및 개인 정보 보호 문제 해결의 필요성.\n\n# Idea Seeds\n1. AI 도구의 효과를 측정하기 위한 구체적인 평가 기준 개발.\n2. 교사 훈련 프로그램에 AI 관련 내용을 포함하는 방안 모색.\n3. AI 도구의 개인화 가능성을 높이기 위한 기술적 접근 연구.\n\n# Citation Snippets\n>\n\ntags: #인공지능, #교사교육, #STEM, #디지털리터러시, #교육기술, #AI도구, #전문성개발\n\n---\n\n요약: 본 연구는 STEM 분야에서 인공지능 도구의 활용이 교사 교육 및 전문성 개발에 미치는 영향을 체계적으로 검토하였다. AI 도구는 교수 전략을 개선하고 학습 참여를 증진시키는 데 기여할 수 있지만, 데이터 보안 및 교사 훈련의 필요성과 같은 도전 과제가 존재함을 강조하였다.", "link": "https://doi.org/10.53378/ijemds.353317", "altLink": "https://openalex.org/W7131878056", "hasDoi": true, "hasReview": true, "authors": ["Hassan Zahoor", "Ayaz Ahmed", "Junchao Zhang"], "categories": ["Literacy", "Computer science", "Content analysis", "Professional development", "Educational technology"]}, {"id": "2", "source": "OPENALEX", "score": 21, "day": "2026-02-19", "title": "Generative artificial intelligence-driven adaptive learning for sustainable, personalized, and resilient education systems", "content": "---\ntitle: Generative artificial intelligence-driven adaptive learning for sustainable, personalized, and resilient education systems\nauthors: [Manjunath Munenakoppa, Nitin Liladhar Rane, Jayesh Rane, Shreeshail Heggond]\nyear: 2026\njournal: International Journal of Applied Resilience and Sustainability\ndoi: https://doi.org/10.70593/deepsci.0202011\nresearch_type: 문헌 리뷰\nmethodology: PRISMA 방법론을 통한 체계적 리뷰\ndata_type: 문헌\nsample: 명시되지 않음\ncontext: K-12 교육, 고등 교육, 전문 개발, 평생 학습\ntheoretical_framework: 인지 과학, 교육 심리학, 학습 과학, 컴퓨터 과학, 인공지능\nkeywords: [generative artificial intelligence, adaptive learning, personalized education, sustainability, intelligent tutoring systems, pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 문헌 리뷰는 생성적 인공지능이 적응형 학습 시스템을 변화시켜 지속 가능하고 개인화된 교육 시스템을 구축하는 데 미치는 파괴적 힘을 탐구한다. 기존 문헌을 바탕으로, 생성적 AI 기술이 교육 전달 메커니즘을 어떻게 변화시키고 있는지를 요약하며, K-12 교육, 고등 교육, 전문 개발 및 평생 학습의 맥락에서 AI의 통합 가능성을 제시한다. 연구 결과는 실시간 콘텐츠 생성, 개인화된 피드백 시스템, 자동화된 평가 시스템 및 커리큘럼 수정의 진전을 나타내며, 생성적 AI 기반 시스템이 학습 성과를 개선하는 방법을 논의한다. 또한 알고리즘 편향, 데이터 프라이버시 문제, 디지털 형평성 차이와 같은 중요한 이슈를 다룬다.\n\n# Research Logic\n## Problem\n전통적인 교육 설계가 개인의 학습 속도와 스타일을 지원하는 데 어려움을 겪고 있다.\n## Theory\n생성적 AI는 적응형 학습 시스템의 혁신을 통해 지속 가능하고 개인화된 교육을 가능하게 한다.\n## Design\nPRISMA 방법론을 사용하여 문헌을 체계적으로 검토하였다.\n## Findings\n생성적 AI는 학습 성과를 개선하고, 환경 지속 가능성을 높이며, 개인화된 학습 경험을 제공한다.\n## Conclusion\n생성적 AI 기반의 적응형 학습 시스템은 교육의 지속 가능성과 형평성을 증진할 수 있는 잠재력을 지닌다.\n\n# Key Findings\n- 생성적 AI는 실시간 콘텐츠 생성 및 개인화된 피드백 시스템을 통해 학습 성과를 개선한다.\n- 알고리즘 편향과 데이터 프라이버시 문제는 중요한 도전 과제이다.\n- 교육 시스템의 지속 가능성을 높이는 데 기여할 수 있는 다양한 기회가 존재한다.\n\n# Contributions\n## Theoretical\n생성적 AI와 적응형 학습의 교차점에 대한 포괄적인 이해를 제공한다.\n## Methodological\nPRISMA 방법론을 통해 체계적이고 재현 가능한 리뷰를 수행하였다.\n## Practical\n교육자와 정책 결정자에게 생성적 AI 도구의 효과적인 구현 방안을 제시한다.\n\n# Limitations\n- 생성적 AI 기반 적응형 시스템의 장기 학습 결과에 대한 연구가 부족하다.\n- 특정 교육 이론과의 관계에 대한 심층 분석이 필요하다.\n\n# Transferable Insights\n- 생성적 AI는 다양한 교육 환경에서 개인화된 학습을 가능하게 한다.\n- 교육 기술의 지속 가능성과 형평성을 증진하는 데 기여할 수 있다.\n\n# Idea Seeds\n1. 생성적 AI를 활용한 개인화된 학습 경로 개발.\n2. 알고리즘 편향을 줄이기 위한 교육 정책 개발.\n3. 지속 가능한 교육 생태계를 위한 AI 기반 프레임워크 구축.\n\n# Citation Snippets\n> Munenakoppa, M., Rane, N. L., Rane, J., & Heggond, S. (2026). Generative artificial intelligence-driven adaptive learning for sustainable, personalized, and resilient education systems. *International Journal of Applied Resilience and Sustainability*, 2(2), 279-311. https://doi.org/10.70593/deepsci.0202011\n\ntags: #generativeAI, #adaptiveLearning, #personalizedEducation, #sustainability, #intelligentTutoring, #pedagogy, #educationTechnology\n\n---\n\n### 압축 요약\n본 문헌 리뷰는 생성적 인공지능이 적응형 학습 시스템을 통해 지속 가능하고 개인화된 교육을 가능하게 하는 방법을 탐구한다. 연구 결과는 AI가 학습 성과를 개선하고, 환경 지속 가능성을 높이며, 개인화된 학습 경험을 제공할 수 있음을 보여준다. 그러나 알고리즘 편향과 데이터 프라이버시 문제와 같은 도전 과제가 존재한다.\n\n### Reviewer Comments\n본 논문은 생성적 인공지능과 적응형 학습의 통합에 대한 체계적인 분석을 제공하며, 교육의 지속 가능성과 형평성을 증진할 수 있는 잠재력을 제시한다. 그러나 장기적인 학습 결과에 대한 연구가 부족하다는 점은 아쉬운 부분이다.", "link": "https://doi.org/10.70593/deepsci.0202011", "altLink": "https://openalex.org/W7130650353", "hasDoi": true, "hasReview": true, "authors": ["Manjunath Munenakoppa", "Nitin Liladhar Rane", "Jayesh Rane"], "categories": ["Computer science", "Artificial intelligence", "Generative grammar", "Adaptive learning", "Personalized learning"]}, {"id": "3", "source": "OPENALEX", "score": 21, "day": "2025-09-15", "title": "Voices from the Flip: Teacher Perspectives on Integrating AI Chatbots in Flipped English Classrooms", "content": "---\ntitle: Voices from the Flip: Teacher Perspectives on Integrating AI Chatbots in Flipped English Classrooms\nauthors: [Yingxue Ling, Jariah Mohd Jan]\nyear: 2025\njournal: MDPI Education\ndoi: https://doi.org/10.3390/educ15n9\nresearch_type: 질적 연구\nmethodology: 사례 연구\ndata_type: 인터뷰 데이터\nsample: 대학 영어 교사\ncontext: 플립드 영어 수업\ntheoretical_framework: TPACK(기술적 교수 내용 지식)\nkeywords: [AI 챗봇, 플립드 교실, 교수법, TPACK, 교육 기술, 언어 교육, 교사 주도성]\n---\n\n# APA 7th style\n\n# Summary\n이 연구는 TPACK 프레임워크를 바탕으로 대학 영어 교사들이 플립드 교실에서 AI 챗봇을 통합하는 방법을 질적으로 조사하였다. 연구 결과, 교사들은 어휘 지원, 문법 설명, 대화 시뮬레이션, 창의적 콘텐츠 생성 등 다양한 교수적 기능을 위해 챗봇을 활용하였으며, 이는 수업 전 준비와 수업 중 협업에 목적에 맞게 통합되었다. 교사들은 이러한 도구를 수동적으로 채택하기보다는 학생의 자율성, 자신감 및 상호작용을 증진시키기 위해 전략적으로 배치하였다. 그러나 AI 챗봇 콘텐츠에 대한 과도한 의존과 모호하거나 부정확한 응답으로 인한 혼란을 인식하고, 구조화된 안내를 개발하며 콘텐츠 전달자가 아닌 촉진자로서의 역할을 재정립하였다. 이 연구는 AI 매개 언어 교육에서 교사의 주도성에 대한 새로운 통찰을 제공하며, 플립드 학습 환경에 신기술을 의미 있게 통합하기 위한 복잡한 교수법적 협상이 필요함을 강조한다.\n\n# Research Logic\n## Problem\nAI 챗봇을 플립드 교실에 통합하는 과정에서 교사들이 직면하는 도전과 기회.\n## Theory\nTPACK 프레임워크를 통해 기술, 교수법, 콘텐츠의 상호작용을 분석.\n## Design\n질적 사례 연구 디자인으로, 대학 영어 교사들의 경험을 심층 인터뷰를 통해 수집.\n## Findings\n교사들은 챗봇을 다양한 교수적 기능에 활용하며, 학생의 자율성과 상호작용을 증진시키기 위해 전략적으로 배치하였다. 그러나 AI 챗봇의 한계와 위험성도 인식하였다.\n## Conclusion\nAI 챗봇의 효과적인 통합을 위해 교사들은 새로운 역할을 수용하고, 구조화된 안내를 개발해야 한다.\n\n# Key Findings\n- 교사들은 AI 챗봇을 어휘 지원, 문법 설명 등 다양한 기능에 활용하였다.\n- 챗봇 사용이 학생의 자율성과 상호작용을 증진시키는 데 기여하였다.\n- AI 챗봇의 부정확한 응답에 대한 우려로 교사들은 새로운 교수 역할을 재정립하였다.\n\n# Contributions\n## Theoretical\nTPACK 프레임워크를 통해 AI 통합의 복잡성을 이해하는 데 기여.\n## Methodological\n질적 사례 연구 접근법을 통해 교사의 경험을 심층적으로 탐구.\n## Practical\nAI 챗봇 통합을 위한 실질적인 교수법적 전략을 제시.\n\n# Limitations\n- 연구 샘플이 제한적이어서 일반화에 한계가 있다.\n- AI 챗봇의 효과에 대한 장기적인 연구가 필요하다.\n\n# Transferable Insights\n- AI 기술 통합 시 교사의 역할 변화가 중요하다.\n- 구조화된 안내가 AI 도구 사용의 효과성을 높일 수 있다.\n\n# Idea Seeds\n1. AI 챗봇을 활용한 다양한 교수법 개발.\n2. 교사와 학생 간의 상호작용을 증진시키는 새로운 플랫폼 설계.\n3. AI 기술 통합에 대한 교사의 전문성 개발 프로그램.\n\n# Citation Snippets\n> Ling, Y., & Jan, J. M. (2025). Voices from the Flip: Teacher Perspectives on Integrating AI Chatbots in Flipped English Classrooms. MDPI Education.\n\ntags: #AI챗봇, #플립드교실, #TPACK, #교사주도성, #교육기술, #언어교육, #교수법\n\n---\n\n요약: 이 연구는 대학 영어 교사들이 플립드 교실에서 AI 챗봇을 통합하는 방법을 질적으로 조사하였다. 교사들은 챗봇을 다양한 교수적 기능에 활용하며, 학생의 자율성과 상호작용을 증진시키기 위해 전략적으로 배치하였다. 그러나 AI 챗봇의 한계와 위험성도 인식하고, 새로운 교수 역할을 재정립하였다.", "link": "https://doi.org/10.3390/educsci15091219", "altLink": "https://openalex.org/W4414200152", "hasDoi": true, "hasReview": true, "authors": ["Yingxue Ling", "Jariah Mohd Jan"], "categories": ["Chatbot", "Flipped classroom", "Vocabulary", "Agency (philosophy)", "Grammar"]}, {"id": "4", "source": "ARXIV", "score": 20, "day": "2026-03-07", "title": "From Passive Consumption to Active Interaction: Exploring Interactive LLM Scaffolding to Support Learning Engagement", "content": "---\ntitle: From Passive Consumption to Active Interaction: Exploring Interactive LLM Scaffolding to Support Learning Engagement\nauthors: [Zixin Chen, Haotian Li, Zhe Liu, Huamin Qu, Xing Xie]\nyear: 2026\njournal: Extended Abstracts of the 2026 CHI Conference on Human Factors in Computing Systems\ndoi: https://doi.org/10.1145/3772363.3798931\nresearch_type: 실험 연구\nmethodology: 실험실 내 피험자 연구\ndata_type: 정량적 및 정성적 데이터\nsample: N=8\ncontext: 대학 수준의 수학 증명 이해 과제\ntheoretical_framework: ICAP 프레임워크\nkeywords: [interactive scaffolding, large language model, learning engagement]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 대형 언어 모델(LLM)을 활용한 학습 지원에서 상호작용적 요소를 통합하여 학습자의 참여를 촉진하고 단기 학습 성과를 향상시킬 수 있는지를 탐구하였다. 연구는 8명의 대학생을 대상으로 진행된 실험실 내 피험자 연구로, 상호작용적 스캐폴딩과 비상호작용적 스캐폴딩 조건에서의 학습 성과를 비교하였다. 결과는 상호작용적 스캐폴딩이 학습자의 참여도와 집중력을 증가시키며, 단기 학습 성과를 지원하는 초기 증거를 제공하였다. 연구는 LLM 기반 스캐폴딩에 상호작용을 통합하기 위한 설계 시사점을 제시한다.\n\n# Research Logic\n## Problem\n현재 LLM 기반 학습 시나리오에서 스캐폴딩 콘텐츠는 주로 수동적으로 소비되어 학습자의 능동적 참여를 제한하고 있다.\n\n## Theory\n효과적인 교육적 스캐폴딩은 제공되는 지원의 내용뿐만 아니라 학습자가 그것에 어떻게 참여하는지에 따라 달라진다. ICAP 프레임워크에 따르면, 학습자의 참여는 수동적에서 능동적, 구성적, 상호작용적으로 나뉜다.\n\n## Design\n연구는 상호작용적 요소를 포함한 LLM 기반 학습 시스템을 설계하고, 두 가지 조건(상호작용적 스캐폴딩과 비상호작용적 스캐폴딩)에서 학습 성과를 비교하였다.\n\n## Findings\n상호작용적 스캐폴딩은 학습자의 인식된 참여도(M=5.75, SD=0.46)와 학습 성과(M=80.0%, SD=11.95)를 증가시켰으며, 비상호작용적 조건보다 더 높은 점수를 기록하였다.\n\n## Conclusion\n상호작용적 스캐폴딩은 학습자의 능동적 참여를 촉진하고 단기 학습 성과를 향상시키는 데 기여할 수 있음을 보여준다.\n\n# Key Findings\n- 상호작용적 스캐폴딩이 학습자의 참여도와 집중력을 증가시킴.\n- 학습 성과가 상호작용적 스캐폴딩 조건에서 더 높음(M=80.0%).\n- 상호작용적 스캐폴딩이 학습자의 인식된 유용성을 높임(M=5.50).\n\n# Contributions\n## Theoretical\n학습 참여의 개념을 확장하고, LLM 기반 스캐폴딩의 효과를 이론적으로 뒷받침함.\n\n## Methodological\n실험실 내 피험자 연구를 통해 상호작용적 스캐폴딩의 효과를 정량적으로 평가함.\n\n## Practical\nLLM 기반 학습 시스템 설계에 대한 실용적인 시사점을 제공함.\n\n# Limitations\n- 샘플 크기가 작음(N=8).\n- 연구는 특정 학습 과제에 국한됨.\n\n# Transferable Insights\n- 상호작용적 요소가 학습자의 참여를 촉진할 수 있음.\n- LLM 기반 학습 시스템에서의 상호작용 설계가 학습 성과에 긍정적인 영향을 미칠 수 있음.\n\n# Idea Seeds\n1. 다양한 상호작용 디자인을 통한 스캐폴딩의 효과를 탐구.\n2. LLM의 응답에서 실시간 피드백을 제공하는 시스템 개발.\n3. 학습자의 질문에 대한 동적 응답 시스템 설계.\n\n# Citation Snippets\n> Chen, Z., Li, H., Liu, Z., Qu, H., & Xie, X. (2026). From Passive Consumption to Active Interaction: Exploring Interactive LLM Scaffolding to Support Learning Engagement. In Extended Abstracts of the 2026 CHI Conference on Human Factors in Computing Systems (CHI EA ’26), April 13–17, 2026, Barcelona, Spain. ACM, New York, NY, USA.\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #ai literacy, #education\n\n---\n\n요약: 본 연구는 LLM을 활용한 학습 지원에서 상호작용적 요소가 학습자의 참여와 단기 학습 성과에 미치는 영향을 조사하였다. 실험 결과, 상호작용적 스캐폴딩이 학습자의 집중력과 참여도를 증가시키며, 학습 성과를 향상시키는 데 기여함을 보여주었다.", "link": "https://arxiv.org/abs/2603.07277v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Zixin Chen", "Haotian Li", "Zhe Liu"], "categories": ["cs.HC"]}, {"id": "5", "source": "OPENALEX", "score": 20, "day": "2026-01-19", "title": "Teachers’ and students’ needs for supporting digital research skills in secondary STEM education", "content": "This qualitative study explores the support needed for the acquisition of digital research skills (DRS) in secondary STEM education. We approached this from both teachers’ and students’ perspectives, based on semi-structured focus group interviews. The findings reveal a strong consensus among participants on the importance of incorporating DRS into regular lessons. Teachers emphasize the need for better curriculum integration and specific support structures, while students primarily seek practical, step-by-step guidance for applying DRS. After combining these findings with a literature search, we propose ten suggestions to enhance support for guiding and developing DRS in secondary (STEM) education. These ten suggestions initiate concrete steps to bridge the gap between secondary and higher education in DRS. In doing so, we contribute to the ongoing discussion on strengthening essential skills in education and provide actionable insights for curriculum developers, educational institutions, publishers, tool developers, and teachers.", "link": "https://doi.org/10.20897/ejsteme/17755", "altLink": "https://openalex.org/W7125230113", "hasDoi": true, "hasReview": false, "authors": ["Kim N. Blankendaal-Tran", "Ralph F.G. Meulenbroeks", "Wouter van Joolingen"], "categories": ["Curriculum", "Bridge (graph theory)", "Focus group", "Qualitative research", "Medical education"]}, {"id": "6", "source": "OPENALEX", "score": 20, "day": "2025-11-01", "title": "Enhancing STEM Learning Through AI‐Driven Mind Mapping: A Study on the Educational Impact of Napkin AI on Student Outcomes and Knowledge Retention", "content": "ABSTRACT This study examines the impact of Napkin AI, a generative artificial intelligence tool, on student learning outcomes and knowledge retention via creative mind mapping. The research model, which combines the Unified Theory of Acceptance and Use of Technology 2 (UTAUT2) with the Information Adoption Model (IAM), comprises six principal independent variables: Social Influence, Learning Support Environment, Ease of Use, Perceived Benefit, Information Quality of Mind Mapping, and Usefulness of Mind Mapping. Mediating variables comprise Behavioral Intention to Use, Actual Use of Mind Mapping, and Cognitive Engagement in Mind Mapping, while Knowledge Retention and Learning Outcome serve as dependent variables. The study employed a quantitative approach with a sample of 570 Vietnamese university students majoring in STEM. Data analysis was conducted using Structural Equation Modeling (SEM) with IBM SPSS 25 and AMOS 24. The model exhibited a satisfactory fit ( χ ²/ df = 1.906, GFI = 0.889, CFI = 0.935, TLI = 0.929, RMSEA = 0.040, PCLOSE = 1.000), with all direct routes being statistically significant ( p &lt; 0.001 to p = 0.037). The findings underscore the significance of user perception and involvement in improving the educational efficacy of AI‐driven mind mapping tools, providing practical implications for technology integration in higher education.", "link": "https://doi.org/10.1002/cae.70106", "altLink": "https://openalex.org/W4416729741", "hasDoi": true, "hasReview": false, "authors": ["Vi Loi Truong", "T. Q. Nguyen"], "categories": ["Structural equation modeling", "Psychology", "IBM", "Perception", "Technology acceptance model"]}, {"id": "7", "source": "ARXIV", "score": 19, "day": "2026-03-09", "title": "Integrating Virtual and Augmented Reality into Public Education: Opportunities and Challenges in Language Learning", "content": "Virtual Reality (VR) and Augmented Reality (AR) are emerging as transformative tools in education, offering new possibilities for engagement and immersion. This paper explores their potential in language learning within public education, focusing on their ability to enhance traditional schooling methods and address existing educational gaps. The integration of VR and AR in schools, however, is not without challenges, including usability, technical barriers, and the alignment of these technologies with existing curricula. Drawing on two empirical studies, this work investigates the opportunities and challenges of VR- and AR-assisted language learning and proposes strategies for their effective implementation in the public sector. The findings show that VR increases motivation and immersion but has an unclear impact on vocabulary retention, with technical limitations and cognitive overload identified as key challenges. AR enhances contextual learning and accessibility but faces usability constraints and limited personalization. To facilitate effective adoption, this paper recommends improving interface design, reducing cognitive load, increasing adaptability, and ensuring adequate infrastructure and teacher training. Overcoming these barriers will enable a more effective integration of immersive technologies in language education.", "link": "https://arxiv.org/abs/2603.08970v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Tanja Kojić", "Maurizio Vergari", "Giulia-Marielena Benta"], "categories": ["cs.HC"]}, {"id": "8", "source": "OPENALEX", "score": 19, "day": "2026-02-21", "title": "Collaborative Learning Approaches in Secondary School STEM Education: A Systematic Literature Review", "content": "HRMARS - STEM education plays a critical role in preparing students to become competitive, innovative, and future-ready citizens equipped with 21st-century skills. This study aims to conduct a Systematic Literature Review (SLR) on the use of collaborative learning approaches in secondary school STEM education. A total of 51 empirical studies were selected from an initial pool of 938 articles retrieved from major databases based on strict inclusion and exclusion criteria. Through a systematic analysis and synthesis of existing evidence, this review identifies the core characteristics, implementation strategies, and educational impacts of collaborative learning in STEM contexts. Findings indicate that such approaches enhance academic achievement, higher-order thinking skills (HOTS), communication, motivation, and teamwork among students. Based on these findings, a conceptual framework was developed to integrate the key features, strategies, and outcomes of collaborative learning for STEM education. This review provides valuable insights for educators, researchers, and policymakers seeking to strengthen collaborative pedagogical practices in STEM classrooms.", "link": "https://doi.org/10.6007/ijarped/v15-i1/27603", "altLink": "https://openalex.org/W7130821101", "hasDoi": true, "hasReview": false, "authors": ["Khaled Saufi Bin Raisin", "Nurazidawati Binti Mohd Arsad"], "categories": ["Collaborative learning", "Systematic review", "Inclusion (mineral)", "Teamwork", "Psychology"]}, {"id": "9", "source": "OPENALEX", "score": 19, "day": "2025-12-30", "title": "Educating in the Age of AI: Preparing Cambodian Teachers and Students for an AI-Augmented Learning Future", "content": "This current academic explores Cambodia’s readiness to adopt artificial intelligence (AI), particularly generative tools like ChatGPT, in its national education system. It assesses current gaps in teacher training, student digital literacy, curriculum integration, and institutional infrastructure using global and local data. While interest in AI grows, its implementation is impeded by limited professional development opportunities, unequal internet access, and a lack of established AI policy frameworks. Promising trends, including pilot initiatives, students’ unofficial use of artificial intelligence, and more government attention, suggest, however, the likelihood of radical transformation. The argument outlines a strategic approach to AI-augmented education in Cambodia, with an emphasis on teacher capacity building, curricular reform, student empowerment, and ethical governance. Policymakers, teachers, and academics should find useful advice here. Future research should concentrate on pilot evaluations, longitudinal effects of AI on learning outcomes, and comparative ASEAN-level studies to enable context-sensitive, inclusive, and long-term AI integration in Cambodian schools.", "link": "https://doi.org/10.54536/jeteli.v1i2.5170", "altLink": "https://openalex.org/W7119114251", "hasDoi": true, "hasReview": false, "authors": ["Sovanna Huot", "Sovanna Loch"], "categories": ["Government (linguistics)", "Curriculum", "Argument (complex analysis)", "Generative grammar", "Political science"]}];

let currentPage = 1;
let currentCategory = '';
let currentMinDate = '';
let currentMaxDate = '';
let hideVisited = false;
let filtered = [];
let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
let searchHistory = JSON.parse(localStorage.getItem('searchHistory')) || [];
let visited = JSON.parse(localStorage.getItem('visited')) || [];

function toggleTheme() {
  const html = document.documentElement;
  const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
  html.dataset.theme = next;
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  localStorage.setItem('theme', next);
}

function toggleTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSource(btn) {
  currentSource = btn.dataset.source;
  document.querySelectorAll('#sourceFilters .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSort(btn) {
  currentSort = btn.dataset.sort;
  document.querySelectorAll('#sortGroup .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  render();
}

function toggleFavorite(id, e) {
  e.stopPropagation();
  const idx = favorites.indexOf(id);
  if (idx === -1) {
    favorites.push(id);
  } else {
    favorites.splice(idx, 1);
  }
  localStorage.setItem('favorites', JSON.stringify(favorites));
  applyFilters();
}

function recordVisit(id) {
  if (!visited.includes(id)) {
    visited.push(id);
  }
  localStorage.setItem('visited', JSON.stringify(visited));
}

function recordSearch(query) {
  if (query.trim() && !searchHistory.includes(query)) {
    searchHistory.unshift(query);
    if (searchHistory.length > 10) searchHistory.pop();
    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
  }
}

function downloadJSON() {
  const data = JSON.stringify(filtered, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadCSV() {
  const headers = ['제목', '출처', '스코어', '리뷰여부', '링크'];
  const rows = filtered.map(p => [
    '"' + p.title.replace(/"/g, '""') + '"',
    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
