<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-04-17 23:38</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

const PAPERS = [{"id": "0", "source": "ARXIV", "score": 19, "day": "2026-04-16", "title": "CogEvolution: A Human-like Generative Educational Agent to Simulate Student's Cognitive Evolution", "content": "---\ntitle: CogEvolution: A Human-like Generative Educational Agent to Simulate Student's Cognitive Evolution\nauthors: [Wei Zhang, Yihang Cheng, Zhirong Ye, Kezhen Huang]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2604.14786v1\nresearch_type: 이론적 연구\nmethodology: 실험적 연구\ndata_type: 양적 데이터\nsample: 1,245명의 8학년 학생\ncontext: 인공지능 교육\ntheoretical_framework: ICAP 이론, 아이템 반응 이론 (IRT), 진화 알고리즘\nkeywords: [Generative Agents, Cognitive Evolution, Educational Psychology, Artificial Intelligence in Education]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 CogEvolution이라는 인간과 유사한 교육 에이전트를 제안하여 학생의 인지 진화를 시뮬레이션하는 방법을 탐구한다. 기존의 교육 에이전트는 정적인 페르소나에 의존하여 학습 행동을 모사하는 데 한계가 있었으며, 본 연구는 ICAP 이론을 기반으로 한 인지 깊이 퍼셉트론을 구축하고, 아이템 반응 이론을 활용한 기억 회수 방법을 제안한다. 또한, 진화 알고리즘을 통해 학생의 학습 행동과 인지 진화 과정을 실시간으로 통합하는 동적 인지 업데이트 메커니즘을 설계하였다. CogEvolution은 행동 충실도 및 학습 곡선 적합성에서 기존 모델을 초월하며, 교육 심리학의 기대에 부합하는 인지 진화 경로를 재현하는 데 성공하였다.\n\n# Research Logic\n## Problem\n기존 교육 에이전트는 정적인 페르소나에 의존하여 인지적 깊이를 반영하지 못하는 문제를 지적한다.\n## Theory\nICAP 이론과 아이템 반응 이론을 기반으로 한 인지 모델링을 통해 학습자의 인지적 참여를 정량화한다.\n## Design\nCogEvolution 에이전트는 인지 깊이, 기억 회수, 동적 인지 업데이트를 포함하는 세 가지 주요 구성 요소로 설계되었다.\n## Findings\nCogEvolution은 기존 모델에 비해 행동 충실도와 학습 곡선 적합성에서 유의미한 개선을 보였다.\n## Conclusion\nCogEvolution은 교육 에이전트의 새로운 패러다임을 제시하며, 인지 진화 경로를 효과적으로 시뮬레이션할 수 있는 가능성을 보여준다.\n\n# Key Findings\n- CogEvolution은 기존 정적 모델에 비해 행동 충실도가 높다.\n- 학습 곡선 적합성에서 유의미한 성과를 보인다.\n- 교육 심리학의 기대에 부합하는 인지 진화 경로를 재현한다.\n\n# Contributions\n## Theoretical\nCogEvolution은 인지 진화의 동적 과정을 모델링하는 새로운 이론적 틀을 제공한다.\n## Methodological\nICAP 이론과 IRT를 통합하여 인지적 참여를 정량화하는 방법론을 제시한다.\n## Practical\n교육 현장에서의 인공지능 에이전트 활용 가능성을 확장한다.\n\n# Limitations\n- 연구에서 사용된 데이터셋은 특정 학년의 학생들로 제한되어 있다.\n- CogEvolution의 실제 교육 환경에서의 적용 가능성은 추가 연구가 필요하다.\n\n# Transferable Insights\n- 인지 심리학 이론을 기반으로 한 에이전트 설계의 중요성을 강조한다.\n- 동적 인지 업데이트 메커니즘의 필요성을 제시한다.\n\n# Idea Seeds\n1. 다양한 학습 환경에서 CogEvolution의 적용 가능성 탐색.\n2. 다른 인지 이론과의 통합을 통한 모델 확장.\n3. 실시간 학습 분석을 위한 추가 기능 개발.\n\n# Citation Snippets\n> Zhang, W., Cheng, Y., Ye, Z., & Huang, K. (2026). CogEvolution: A Human-like Generative Educational Agent to Simulate Student's Cognitive Evolution. arXiv. https://arxiv.org/abs/2604.14786v1\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy\n\n---\n\n요약: 본 연구는 CogEvolution이라는 인간과 유사한 교육 에이전트를 제안하여 학생의 인지 진화를 시뮬레이션하는 방법을 탐구한다. 기존의 교육 에이전트는 정적인 페르소나에 의존하여 학습 행동을 모사하는 데 한계가 있었으며, 본 연구는 ICAP 이론을 기반으로 한 인지 깊이 퍼셉트론을 구축하고, 아이템 반응 이론을 활용한 기억 회수 방법을 제안한다. CogEvolution은 행동 충실도 및 학습 곡선 적합성에서 기존 모델을 초월하며, 교육 심리학의 기대에 부합하는 인지 진화 경로를 재현하는 데 성공하였다.", "link": "https://arxiv.org/abs/2604.14786v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Wei Zhang", "Yihang Cheng", "Zhirong Ye"], "categories": ["cs.AI"]}, {"id": "1", "source": "ARXIV", "score": 16, "day": "2026-04-16", "title": "Governing Reflective Human-AI Collaboration: A Framework for Epistemic Scaffolding and Traceable Reasoning", "content": "---\ntitle: Reflective Human-AI Collaboration: A Framework for Epistemic Scaffolding and Traceable Reasoning\nauthors: [Rikard Rosenbacke, Carl Rosenbacke, Victor Rosenbacke, Martin McKee]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2604.14898v1\nresearch_type: 이론적 연구\nmethodology: 개념적 프레임워크 제안\ndata_type: 명시되지 않음\nsample: 명시되지 않음\ncontext: 인공지능과 인간의 협력\ntheoretical_framework: System-2 학습 이론\nkeywords: [human-ai collaboration, epistemic scaffolding, reasoning, AI governance, reflective reasoning]\n---\n\n# APA 7th style\n\n# Summary\n본 논문은 대형 언어 모델이 언어적 시뮬레이션에 국한되어 있으며, 진정한 이해가 결여되어 있음을 지적한다. 저자들은 인간과 모델 간의 관계를 통해 반영적 추론을 재구성하는 프레임워크를 제안하며, 이를 통해 인간의 판단과 기계의 속도, 기억, 연관 능력을 결합한 협력적 지능을 강조한다. '건축가의 펜'이라는 방법론을 통해 인간은 모델을 외부 매체로 활용하여 구조화된 반성을 수행할 수 있다. 이 프레임워크는 EU AI 법안 및 ISO/IEC 42001과 같은 새로운 거버넌스 기준과의 정렬을 지원하며, 투명하고 책임 있는 AI 사용을 위한 실질적인 경로를 제공한다.\n\n# Research Logic\n## Problem\n대형 언어 모델이 진정한 반영적 추론을 수행하지 못하는 문제.\n## Theory\n추론을 인간과 모델 간의 관계적 과정으로 재구성하는 이론.\n## Design\n'건축가의 펜' 방법론을 통한 인간-AI 상호작용 설계.\n## Findings\n인간과 AI의 협력을 통해 더 나은 추론 능력을 달성할 수 있음을 발견.\n## Conclusion\nAI의 사용을 보다 투명하고 책임감 있게 만들기 위한 거버넌스 구조의 필요성을 강조.\n\n# Key Findings\n- 대형 언어 모델은 진정한 이해 없이 언어적 시뮬레이션만 수행한다.\n- 인간과 AI 간의 관계적 상호작용이 반영적 추론을 가능하게 한다.\n- '건축가의 펜' 방법론은 구조화된 반성을 촉진한다.\n\n# Contributions\n## Theoretical\n인간-AI 협력의 새로운 이론적 프레임워크 제안.\n## Methodological\n반영적 추론을 위한 실질적인 방법론 개발.\n## Practical\nAI 사용의 투명성과 책임성을 높이는 경로 제공.\n\n# Limitations\n- 실증적 데이터 부족.\n- 제안된 프레임워크의 실제 적용 가능성에 대한 검증 필요.\n\n# Transferable Insights\n- 인간-AI 상호작용의 구조적 설계가 중요하다.\n- 반영적 추론을 촉진하는 방법론이 필요하다.\n\n# Idea Seeds\n1. 다양한 분야에서 '건축가의 펜' 방법론을 적용한 연구.\n2. 인간-AI 협력의 효과를 측정하기 위한 실증적 연구 설계.\n3. AI 거버넌스 기준과의 정렬을 위한 추가 연구.\n\n# Citation Snippets\n> Rosenbacke, R., Rosenbacke, C., Rosenbacke, V., & McKee, M. (2026). Governing Reflective Human-AI Collaboration: A Framework for Epistemic Scaffolding and Traceable Reasoning. arXiv. https://arxiv.org/abs/2604.14898v1\n\ntags: #human-ai_collaboration, #epistemic_scaffolding, #reasoning, #AI_governance, #reflective_reasoning\n\n---\n\n요약: 본 논문은 대형 언어 모델의 한계를 지적하고, 인간과 AI 간의 협력을 통해 반영적 추론을 가능하게 하는 프레임워크를 제안한다. '건축가의 펜' 방법론을 통해 구조화된 반성을 촉진하며, AI 사용의 투명성과 책임성을 높이는 경로를 제시한다.", "link": "https://arxiv.org/abs/2604.14898v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Rikard Rosenbacke", "Carl Rosenbacke", "Victor Rosenbacke"], "categories": ["cs.AI", "cs.CY", "cs.HC"]}, {"id": "2", "source": "ARXIV", "score": 14, "day": "2026-04-16", "title": "Rethinking Patient Education as Multi-turn Multi-modal Interaction", "content": "---\ntitle: Rethinking Patient Education as Multi-turn Multi-modal Interaction\nauthors: [Zonghai Yao, Zhipeng Tang, Chengtao Lin, Xiong Luo, Benlu Wang, Juncheng Huang, Chin Siang Ong, Hong Yu]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2604.14656v1\nresearch_type: 실험적 연구\nmethodology: 다중 턴 상호작용 기반 평가\ndata_type: 사례 연구\nsample: 150개의 방사선학 사례\ncontext: 방사선 환자 교육\ntheoretical_framework: 다중 모달 교육 이론\nkeywords: [patient education, multimodal interaction, radiology, evidence-based learning, AI in healthcare]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 방사선 환자 교육을 위한 MedImageEdu라는 새로운 벤치마크를 소개한다. 이 벤치마크는 환자가 이해할 수 있도록 다중 턴의 상호작용을 통해 방사선 보고서와 이미지를 기반으로 교육하는 시스템을 평가한다. 연구는 150개의 사례를 통해 DoctorAgent와 PatientAgent 간의 상호작용을 분석하며, 다섯 가지 평가 차원(상담, 안전 및 범위, 언어 품질, 그림 품질, 이미지-텍스트 응답 품질)을 통해 결과를 도출한다. 연구 결과, 언어의 유창성이 시각적 근거보다 우선하는 경향이 있으며, 안전성은 질병 범주에 따라 가장 약한 차원으로 나타났다. MedImageEdu는 다중 모달 에이전트가 단순히 텍스트에서 답변하는 것이 아니라 증거를 기반으로 교육할 수 있는지를 평가하는 통제된 테스트베드 역할을 한다.\n\n# Research Logic\n## Problem\n기존의 환자 교육 시스템은 주로 텍스트 기반이며, 시각적 증거를 활용하지 못하는 한계가 있다.\n## Theory\n다중 모달 교육 이론을 바탕으로, 환자가 이해할 수 있도록 시각적 자료와 텍스트를 결합한 교육 방식이 필요하다.\n## Design\nDoctorAgent와 PatientAgent 간의 상호작용을 통해 환자 질문에 대한 시각적 지원을 제공하는 시스템을 설계하였다.\n## Findings\n언어의 유창성이 시각적 근거보다 우선하며, 안전성은 가장 약한 차원으로 나타났다. 감정적으로 긴장된 상호작용은 교육 수준이 낮거나 건강 문해력이 낮은 경우보다 더 어려운 것으로 평가되었다.\n## Conclusion\nMedImageEdu는 다중 모달 에이전트가 증거를 기반으로 교육할 수 있는지를 평가하는 유용한 도구로 기능한다.\n\n# Key Findings\n- MedImageEdu는 150개의 방사선학 사례를 포함한다.\n- 상담 과정과 최종 다중 모달 응답을 다섯 가지 차원에서 평가한다.\n- 언어의 유창성이 시각적 근거보다 우선하는 경향이 있다.\n\n# Contributions\n## Theoretical\n다중 모달 교육 이론에 대한 새로운 통찰을 제공한다.\n## Methodological\n다중 턴 상호작용 기반의 평가 프레임워크를 제안한다.\n## Practical\n의료 교육에서 다중 모달 접근법의 필요성을 강조한다.\n\n# Limitations\n- 연구는 특정 방사선학 사례에 국한되어 있다.\n- 감정적 상호작용의 복잡성을 충분히 반영하지 못할 수 있다.\n\n# Transferable Insights\n- 다중 모달 교육 접근법은 다양한 교육 환경에 적용 가능하다.\n- 환자 맞춤형 교육의 중요성을 강조한다.\n\n# Idea Seeds\n1. 다른 의료 분야에 대한 다중 모달 교육 시스템 개발.\n2. 환자 교육의 효과성을 높이기 위한 AI 기반 도구 설계.\n3. 다양한 교육 수준을 가진 환자에 대한 맞춤형 교육 전략 연구.\n\n# Citation Snippets\n> Yao, Z., Tang, Z., Lin, C., Luo, X., Wang, B., Huang, J., Ong, C. S., & Yu, H. (2026). Rethinking Patient Education as Multi-turn Multi-modal Interaction. arXiv. https://arxiv.org/abs/2604.14656v1\n\ntags: #환자교육, #다중모달상호작용, #방사선학, #증거기반학습, #AI의료, #교육기술, #의료교육", "link": "https://arxiv.org/abs/2604.14656v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Zonghai Yao", "Zhipeng Tang", "Chengtao Lin"], "categories": ["cs.AI", "cs.CL", "cs.CV"]}, {"id": "3", "source": "ARXIV", "score": 12, "day": "2026-04-16", "title": "Pangu-ACE: Adaptive Cascaded Experts for Educational Response Generation on EduBench", "content": "---\ntitle: Pangu-ACE: Adaptive Cascaded Experts for Educational Response Generation on EduBench\nauthors: [Dinghao Li, Wenlong Zhou, Zhimin Chen, Yuehan Peng, Hong Ni, Chengfu Zou, Guoyu Shi, Yaochen Li]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2604.14828v1\nresearch_type: 실험적 연구\nmethodology: 샘플 수준의 적응형 캐스케이드 시스템\ndata_type: 정량적 데이터\nsample: 7013개의 샘플\ncontext: 교육적 응답 생성\ntheoretical_framework: 이중 과정 추론, 비용 인식 라우팅\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 교육적 응답 생성을 위한 Pangu-ACE 시스템을 제안하며, 샘플 수준에서의 1B에서 7B로의 캐스케이드 구조를 통해 효율적인 라우팅을 구현하였다. 실험 결과, Pangu-ACE는 기존 시스템에 비해 품질과 형식 유효성을 각각 0.081과 0.159 향상시켰으며, 19.7%의 요청을 1B 단계에서 직접 수용하였다. 그러나 현재 배포된 시스템은 지연 시간 개선을 보이지 않으며, 라우팅 선택성에 기반한 효율성 이야기가 필요하다. 이 연구는 교육적 응답 생성의 질을 높이기 위한 새로운 접근 방식을 제시하며, 향후 GPT-5.4와의 정렬 문제 해결이 필요하다.\n\n# Research Logic\n## Problem\n교육적 응답 생성에서의 효율성과 품질 간의 균형 문제.\n## Theory\n이중 과정 추론 및 비용 인식 라우팅 이론을 기반으로 함.\n## Design\n1B 튜터-라우터와 7B 전문 프롬프트를 사용하는 샘플 수준의 캐스케이드 시스템 설계.\n## Findings\nPangu-ACE는 품질을 0.538로 향상시키고, 형식 유효성을 0.866으로 개선함.\n## Conclusion\n효율적인 라우팅을 통해 교육적 응답의 질을 높일 수 있으며, 향후 연구는 GPT-5.4와의 정렬 문제를 해결해야 함.\n\n# Key Findings\n- Pangu-ACE는 품질을 0.538로 향상시킴.\n- 형식 유효성이 0.866으로 개선됨.\n- 19.7%의 요청이 1B 단계에서 직접 수용됨.\n\n# Contributions\n## Theoretical\n이중 과정 추론 및 비용 인식 라우팅에 대한 새로운 통찰 제공.\n## Methodological\n샘플 수준의 적응형 캐스케이드 시스템 설계 및 구현.\n## Practical\n교육적 응답 생성의 질 향상 및 효율성 증대.\n\n# Limitations\n- 현재 시스템은 지연 시간 개선을 보이지 않음.\n- GPT-5.4와의 정렬 문제 해결이 필요함.\n\n# Transferable Insights\n- 교육적 응답 생성에서의 라우팅 선택성이 중요함.\n- 비용 인식 라우팅이 교육적 품질 향상에 기여할 수 있음.\n\n# Idea Seeds\n1. 다양한 교육적 시나리오에 대한 추가 연구.\n2. GPT-5.4와의 정렬 문제 해결을 위한 인프라 개선 연구.\n3. 다른 교육적 모델과의 비교 연구.\n\n# Citation Snippets\n> Li, D., Zhou, W., Chen, Z., Peng, Y., Ni, H., Zou, C., Shi, G., & Li, Y. (2026). Pangu-ACE: Adaptive Cascaded Experts for Educational Response Generation on EduBench. arXiv. https://arxiv.org/abs/2604.14828v1\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy", "link": "https://arxiv.org/abs/2604.14828v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Dinghao Li", "Wenlong Zhou", "Zhimin Chen"], "categories": ["cs.CL"]}, {"id": "4", "source": "ARXIV", "score": 11, "day": "2026-04-16", "title": "Uncertainty-aware Generative Learning Path Recommendation with Cognition-Adaptive Diffusion", "content": "---\ntitle: Uncertainty-aware Generative Learning Path Recommendation with Cognition-Adaptive Diffusion\nauthors: [Xiangrui Xiong, Hang Liang, Baiyang Chen, Zifei Pan, Yanli Lee]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2604.14613v1\nresearch_type: 이론적 연구\nmethodology: 생성적 모델링\ndata_type: 공개 데이터셋\nsample: 3개의 공개 데이터셋\ncontext: 개인화된 교육을 위한 학습 경로 추천\ntheoretical_framework: 확률적 인지 상태 모델링\nkeywords: [학습 경로 추천, 생성적 모델, 인지 적응 확산]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 개인화된 교육을 위한 학습 경로 추천(LPR) 시스템의 발전을 다룬다. 제안된 U-GLAD 모델은 역사적 상호작용의 불확실성을 고려하고, 다양한 학습 목표에 적응할 수 있는 능력을 갖춘다. 이 모델은 인지 상태를 확률 분포로 모델링하고, 목표 지향적 개념 인코더를 통해 개인의 학습 목표에 맞춘 추천을 제공한다. 세 가지 공개 데이터셋에서의 평가 결과, U-GLAD는 기존의 대표적인 방법들보다 우수한 성능을 보였다. 또한, 상호작용의 불확실성을 인식하고 안정적이며 목표 지향적인 추천 경로를 제공하는 능력이 뛰어남을 확인하였다.\n\n# Research Logic\n## Problem\n기존의 학습 경로 추천 방법들은 역사적 상호작용의 불확실성을 고려하지 않으며, 다양한 학습 목표에 대한 적응력이 부족하다.\n\n## Theory\nU-GLAD는 인지 상태를 확률 분포로 모델링하고, 생성적 확산 모델을 통해 다음 최적 개념의 잠재 표현을 예측한다.\n\n## Design\n모델은 불확실성 인식 상태 인코더와 목표 지향적 개념 인코더를 포함하며, 생성적 디퓨전 모델을 디코더로 사용한다.\n\n## Findings\nU-GLAD는 세 가지 공개 데이터셋에서 기존 방법들보다 우수한 성능을 보였으며, 상호작용의 불확실성을 효과적으로 처리할 수 있음을 입증하였다.\n\n## Conclusion\nU-GLAD는 개인화된 학습 경로 추천의 새로운 기준을 제시하며, 불확실성을 고려한 추천 시스템의 필요성을 강조한다.\n\n# Key Findings\n- U-GLAD는 역사적 상호작용의 불확실성을 효과적으로 모델링한다.\n- 목표 지향적 개념 인코더를 통해 개인 맞춤형 추천을 제공한다.\n- 세 가지 공개 데이터셋에서 기존 방법들보다 우수한 성능을 기록하였다.\n\n# Contributions\n## Theoretical\n학습 경로 추천에서의 불확실성 모델링에 대한 새로운 접근법을 제시하였다.\n\n## Methodological\n생성적 디퓨전 모델을 활용한 새로운 추천 시스템 설계를 제안하였다.\n\n## Practical\n개인화된 교육 경험을 제공하기 위한 실용적인 도구로 활용될 수 있다.\n\n# Limitations\n- 특정 데이터셋에 대한 성능 평가로 일반화의 한계가 있다.\n- 모델의 복잡성으로 인해 실시간 적용에 어려움이 있을 수 있다.\n\n# Transferable Insights\n- 불확실성을 고려한 모델링이 추천 시스템의 성능을 향상시킬 수 있다.\n- 목표 지향적 접근이 개인화된 학습 경험을 개선하는 데 기여할 수 있다.\n\n# Idea Seeds\n1. 다양한 학습 환경에서의 U-GLAD 적용 가능성 탐색.\n2. 다른 유형의 불확실성 모델링 기법과의 비교 연구.\n3. U-GLAD의 실시간 적용을 위한 경량화 연구.\n\n# Citation Snippets\n> Xiong, X., Liang, H., Chen, B., Pan, Z., & Lee, Y. (2026). Uncertainty-aware Generative Learning Path Recommendation with Cognition-Adaptive Diffusion. arXiv. https://arxiv.org/abs/2604.14613v1\n\ntags: #학습경로추천, #생성적모델, #인지적응, #교육기술, #개인화교육, #AI교육, #불확실성모델링\n\n---\n\n요약: 본 연구는 U-GLAD 모델을 통해 개인화된 학습 경로 추천의 불확실성을 고려한 접근법을 제시하며, 세 가지 공개 데이터셋에서 기존 방법들보다 우수한 성능을 보였다. 이 모델은 인지 상태를 확률적으로 모델링하고, 목표 지향적 추천을 통해 개인 맞춤형 학습 경험을 제공한다.", "link": "https://arxiv.org/abs/2604.14613v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Xiangrui Xiong", "Hang Liang", "Baiyang Chen"], "categories": ["cs.IR", "cs.AI"]}, {"id": "5", "source": "ARXIV", "score": 11, "day": "2026-04-12", "title": "Make it Simple, Make it Dance: Dance Motion Simplification to Support Novices' Dance Learning", "content": "Online dance tutorials have gained widespread popularity. However, many novices encounter difficulties when dance motion complexity exceeds their skill level, potentially leading to discouragement. This study explores dance motion simplification to address this challenge. We surveyed 30 novices to identify challenging movements, then conducted focus groups with 30 professional choreographers across 10 genres to explore simplification strategies and collect paired original-simplified dance datasets. We identified five complexity factors and developed automated simplification methods using both rule-based and learning-based approaches. We validated our approach through three evaluations. Technical evaluation confirmed our complexity measures and algorithms. 20 professional choreographers assessed motion naturalness, simplification adequacy, and style preservation. 18 novices evaluated learning effectiveness through workload, self-efficacy, objective performance, and perceived difficulty. This work contributes to dance education technology by proposing methods that help make choreography more approachable for beginners while preserving essential characteristics.", "link": "https://arxiv.org/abs/2604.10490v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Hyunyoung Han", "Murad Eynizada", "Son Xuan Nghiem"], "categories": ["cs.HC"]}, {"id": "6", "source": "ARXIV", "score": 10, "day": "2026-04-15", "title": "Block-Based Pathfinding: A Minecraft System for Visualizing Graph Algorithms", "content": "Graph theory is a cornerstone of Computer Science education, yet entry-level students often struggle to map abstract node-edge relationships to practical applications. This paper presents the design and architecture of a Minecraft-based educational tool specifically built to visualize graph traversal and shortest-path algorithms. We propose a three-layer system: (1) a Grid Traversal module where terrain types (e.g., soul sand, ice) represent edge weights, allowing for the gamified study of shortest path algorithms; (2) a \"Sky Graph\" module for interactive 3D manipulation of both directed and undirected graphs; and (3) lessons and quizzes available through books. The system grounds its design in Constructionist learning theory, transitioning students from passive observers to active protagonists who physically manipulate algorithmic behavior. We additionally present a planned empirical evaluation using NASA-TLX and in-game telemetry to validate the system's pedagogical efficacy.", "link": "https://arxiv.org/abs/2604.13957v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Luca-Stefan Pirvu", "Bogdan-Alexandru Maciuca", "Andrei-Ciprian Rabu"], "categories": ["cs.HC", "cs.CY", "cs.DS"]}, {"id": "7", "source": "ARXIV", "score": 10, "day": "2026-04-13", "title": "RAG-KT: Cross-platform Explainable Knowledge Tracing with Multi-view Fusion Retrieval Generation", "content": "Knowledge Tracing (KT) infers a student's knowledge state from past interactions to predict future performance. Conventional Deep Learning (DL)-based KT models are typically tied to platform-specific identifiers and latent representations, making them hard to transfer and interpret. Large Language Model (LLM)-based methods can be either ungrounded under prompting or overly domain-dependent under fine-tuning. In addition, most existing KT methods are developed and evaluated under a same-distribution assumption. In real deployments, educational data often arise from heterogeneous platforms with substantial distribution shift, which often degrades generalization. To this end, we propose RAG-KT, a retrieval-augmented paradigm that frames cross-platform KT as reliable context constrained inference with LLMs. It builds a unified multi-source structured context with cross-source alignment via Question Group abstractions and retrieves complementary rich and reliable context for each prediction, enabling grounded prediction and interpretable diagnosis. Experiments on three public KT benchmarks demonstrate consistent gains in accuracy and robustness, including strong performance under cross-platform conditions.", "link": "https://arxiv.org/abs/2604.10960v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Zhiyi Duan", "Hongyu Yuan", "Rui Liu"], "categories": ["cs.AI"]}, {"id": "8", "source": "ARXIV", "score": 9, "day": "2026-04-16", "title": "The LLM Fallacy: Misattribution in AI-Assisted Cognitive Workflows", "content": "The rapid integration of large language models (LLMs) into everyday workflows has transformed how individuals perform cognitive tasks such as writing, programming, analysis, and multilingual communication. While prior research has focused on model reliability, hallucination, and user trust calibration, less attention has been given to how LLM usage reshapes users' perceptions of their own capabilities. This paper introduces the LLM fallacy, a cognitive attribution error in which individuals misinterpret LLM-assisted outputs as evidence of their own independent competence, producing a systematic divergence between perceived and actual capability. We argue that the opacity, fluency, and low-friction interaction patterns of LLMs obscure the boundary between human and machine contribution, leading users to infer competence from outputs rather than from the processes that generate them. We situate the LLM fallacy within existing literature on automation bias, cognitive offloading, and human--AI collaboration, while distinguishing it as a form of attributional distortion specific to AI-mediated workflows. We propose a conceptual framework of its underlying mechanisms and a typology of manifestations across computational, linguistic, analytical, and creative domains. Finally, we examine implications for education, hiring, and AI literacy, and outline directions for empirical validation. We also provide a transparent account of human--AI collaborative methodology. This work establishes a foundation for understanding how generative AI systems not only augment cognitive performance but also reshape self-perception and perceived expertise.", "link": "https://arxiv.org/abs/2604.14807v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Hyunwoo Kim", "Harin Yu", "Hanau Yi"], "categories": ["cs.AI", "cs.CL"]}, {"id": "9", "source": "ARXIV", "score": 8, "day": "2026-04-16", "title": "Text2Arch: A Dataset for Generating Scientific Architecture Diagrams from Natural Language Descriptions", "content": "Communicating complex system designs or scientific processes through text alone is inefficient and prone to ambiguity. A system that automatically generates scientific architecture diagrams from text with high semantic fidelity can be useful in multiple applications like enterprise architecture visualization, AI-driven software design, and educational content creation. Hence, in this paper, we focus on leveraging language models to perform semantic understanding of the input text description to generate intermediate code that can be processed to generate high-fidelity architecture diagrams. Unfortunately, no clean large-scale open-access dataset exists, implying lack of any effective open models for this task. Hence, we contribute a comprehensive dataset, \\system, comprising scientific architecture images, their corresponding textual descriptions, and associated DOT code representations. Leveraging this resource, we fine-tune a suite of small language models, and also perform in-context learning using GPT-4o. Through extensive experimentation, we show that \\system{} models significantly outperform existing baseline models like DiagramAgent and perform at par with in-context learning-based generations from GPT-4o. We make the code, data and models publicly available.", "link": "https://arxiv.org/abs/2604.14941v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Shivank Garg", "Sankalp Mittal", "Manish Gupta"], "categories": ["cs.CL"]}];
let PAGE_SIZE = 10;
let currentTab = 'all';
let currentSource = 'ALL';
let currentSort = 'score';
let currentPage = 1;
let currentCategory = '';
let currentMinDate = '';
let currentMaxDate = '';
let hideVisited = false;
let filtered = [];
let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
let searchHistory = JSON.parse(localStorage.getItem('searchHistory')) || [];
let visited = JSON.parse(localStorage.getItem('visited')) || [];

function toggleTheme() {
  const html = document.documentElement;
  const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
  html.dataset.theme = next;
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  localStorage.setItem('theme', next);
}

function toggleTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSource(btn) {
  currentSource = btn.dataset.source;
  document.querySelectorAll('#sourceFilters .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSort(btn) {
  currentSort = btn.dataset.sort;
  document.querySelectorAll('#sortGroup .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  render();
}

function toggleFavorite(id, e) {
  e.stopPropagation();
  const idx = favorites.indexOf(id);
  if (idx === -1) {
    favorites.push(id);
  } else {
    favorites.splice(idx, 1);
  }
  localStorage.setItem('favorites', JSON.stringify(favorites));
  applyFilters();
}

function recordVisit(id) {
  if (!visited.includes(id)) {
    visited.push(id);
  }
  localStorage.setItem('visited', JSON.stringify(visited));
}

function recordSearch(query) {
  if (query.trim() && !searchHistory.includes(query)) {
    searchHistory.unshift(query);
    if (searchHistory.length > 10) searchHistory.pop();
    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
  }
}

function downloadJSON() {
  const data = JSON.stringify(filtered, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadCSV() {
  const headers = ['제목', '출처', '스코어', '리뷰여부', '링크'];
  const rows = filtered.map(p => [
    '"' + p.title.replace(/"/g, '""') + '"',
    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
</html>
