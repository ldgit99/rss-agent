<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-03-10 23:27</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "OPENALEX", "score": 28, "day": "2025-08-20", "title": "Integrating AI literacy into teacher education: a critical perspective paper", "content": "---\ntitle: AI 리터러시를 교사 교육에 통합하기: 비판적 관점 논문\nauthors: Rami Farouk Daher\nyear: 2025\njournal: Discover Artificial Intelligence\ndoi: https://doi.org/10.1007/s44163-025-00475-7\nresearch_type: 비판적 관점 논문\nmethodology: 문헌 기반 내러티브 방법론\ndata_type: 문헌 및 사례 연구\nsample: 명시되지 않음\ncontext: 교육 기술 및 AI 통합\ntheoretical_framework: EQUIP 프레임워크 (윤리적 거버넌스, 자격 있는 전문 학습, 통합 협력 파트너십, 실행 준비성, 점진적 적응)\nkeywords: [AI 리터러시, 교사 교육, 전문 학습, 디지털 격차, EQUIP 프레임워크, 윤리적 함의]\n---\n\n# APA 7th style\n\n# Summary\n오늘날의 교육 환경에서 교육자에게 AI 리터러시를 제공하는 것은 공정하고 효과적인 학습 환경을 조성하는 데 필수적이다. 이 논문은 교사들이 AI 리터러시를 개발하는 데 직면한 도전 과제를 탐구하고, 기본 기술을 넘어 AI의 메커니즘, 응용 및 윤리적 함의를 깊이 이해하는 교육을 옹호한다. 이러한 기초 없이 교육자들은 디지털 격차를 심화시킬 위험이 있다. 문헌 기반 내러티브 방법론을 사용하여, 미국 E-rate 프로그램과 인도의 \"AI for All\" 이니셔티브와 같은 최근 연구 및 사례 연구를 통합하여 AI 형평성을 촉진하기 위한 확장 가능한 솔루션 모델을 제시한다. EQUIP 프레임워크를 소개하여 교육자들이 교육에서 책임감 있게 AI를 사용할 수 있는 지식, 기술 및 윤리적 원칙을 갖추도록 한다. 효과적인 구현을 위한 주요 고려 사항으로는 전문 학습 프로그램의 맞춤화, 자원의 전략적 배분 및 강력한 모니터링 및 평가 프로세스 수립이 포함된다.\n\n# Research Logic\n## Problem\n교육자들이 AI 리터러시를 효과적으로 통합하는 데 필요한 준비 부족.\n## Theory\nAI 리터러시는 기술적 이해를 넘어 AI의 작동 방식과 윤리적 함의를 포함해야 한다.\n## Design\n문헌 기반 내러티브 방법론을 통해 다양한 연구 및 사례를 통합.\n## Findings\nAI 리터러시의 통합이 교육자 준비와 형평성을 증진하는 데 필수적임을 확인.\n## Conclusion\nAI 리터러시를 교사 교육 프로그램에 통합하는 것이 중요하며, 이를 통해 포괄적이고 미래 지향적인 교육 시스템을 구축할 수 있다.\n\n# Key Findings\n- AI 리터러시는 교육자들이 AI 도구를 효과적으로 활용하는 데 필수적이다.\n- EQUIP 프레임워크는 교육자들이 책임감 있게 AI를 사용할 수 있도록 돕는 구조적 접근 방식을 제공한다.\n- AI 리터러시의 부족은 디지털 격차를 심화시킬 위험이 있다.\n\n# Contributions\n## Theoretical\nAI 리터러시의 중요성을 강조하며, 교육자 준비의 새로운 이론적 틀을 제시.\n## Methodological\n문헌 기반 내러티브 접근법을 통해 AI 리터러시 통합의 복잡성을 탐구.\n## Practical\nAI 리터러시 통합을 위한 실용적인 전략과 권장 사항을 제공.\n\n# Limitations\n- 특정 사례 연구에 의존하여 일반화의 한계가 있을 수 있다.\n- 데이터 수집 방법의 제한으로 인해 일부 정보가 누락될 수 있다.\n\n# Transferable Insights\n- AI 리터러시 통합은 교육자와 학생 모두에게 필수적이다.\n- 다양한 교육 맥락에서 AI 리터러시를 적용할 수 있는 방법론이 필요하다.\n\n# Idea Seeds\n1. AI 리터러시 교육을 위한 온라인 플랫폼 개발.\n2. 교사와 학생 간의 AI 활용 사례 공유 프로그램.\n3. AI 리터러시 관련 윤리적 문제에 대한 워크숍 개최.\n\n# Citation Snippets\n> Daher, R. F. (2025). Integrating AI literacy into teacher education: a critical perspective paper. Discover Artificial Intelligence, 5, 217. https://doi.org/10.1007/s44163-025-00475-7\n\ntags: #AI리터러시, #교사교육, #전문학습, #디지털격차, #EQUIP프레임워크, #윤리적함의, #교육기술", "link": "https://doi.org/10.1007/s44163-025-00475-7", "altLink": "https://openalex.org/W4413352622", "hasDoi": true, "hasReview": true, "authors": ["Rami Farouk Daher"], "categories": ["Perspective (graphical)", "Literacy", "Critical literacy", "Mathematics education", "Pedagogy"]}, {"id": "1", "source": "OPENALEX", "score": 27, "day": "2025-11-24", "title": "The Role of AI in Shaping Future Educators: Ethics, Instructional Design, and Lifelong Learning", "content": "---\ntitle: AI가 미래 교육자를 형성하는 역할: 윤리, 교수 설계 및 평생 학습\nauthors: [Оксана Чайка, Serhii Kubitskyi, Наталя Анатоліївна Березовська-Савчук]\nyear: 2025\njournal: International Journal of Changes in Education\ndoi: 10.47852/bonviewIJCE52027087\nresearch_type: 혼합 방법 연구\nmethodology: 순차적 설명적 설계\ndata_type: 정량적 및 정성적 데이터\nsample: 룩셈부르크 및 우크라이나의 교육자 및 학생\ncontext: 다문화 및 다언어 환경에서의 교사 준비\ntheoretical_framework: ADDIE, TPACK, 다문화 교육 이론\nkeywords: [AI 교육, 미래 교육자, 윤리, 평생 학습, 다언어 고등 교육, 다문화 맥락, 다문화 교수법, AI 문해력]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 인공지능(AI)의 고등 교육 통합이 미래 교육자 준비에 미치는 영향을 조사하였다. 룩셈부르크와 우크라이나의 교육자와 학생들이 AI를 어떻게 인식하고 채택하는지를 분석하기 위해 혼합 방법 연구를 수행하였다. 연구 결과, AI의 인식된 이점은 교수 통합 준비성과 긍정적인 상관관계를 보였으며(r = 0.61, p < .001), 윤리적 우려는 AI 채택 의지와 부정적인 상관관계를 나타냈다(r = -0.45, p < .001). 룩셈부르크 참가자들은 품질과 교수법에 대한 예방적 우려를 표현한 반면, 우크라이나 참가자들은 전쟁 상황에서의 즉각적인 윤리적 딜레마를 설명하였다. 연구 결과는 AI가 교수 혁신을 향상시킬 수 있지만, 언어 편향과 접근성 격차를 통해 불평등을 심화시킬 수 있음을 강조한다.\n\n# Research Logic\n## Problem\nAI 통합에 대한 교육자와 학생의 인식 및 채택 방식의 차이.\n\n## Theory\nAI의 교육적 잠재력과 윤리적 우려의 상관관계.\n\n## Design\n혼합 방법 연구로 정량적 설문조사와 정성적 인터뷰를 결합.\n\n## Findings\nAI의 이점은 교수 통합 준비성과 긍정적 상관관계, 윤리적 우려는 AI 채택 의지와 부정적 상관관계.\n\n## Conclusion\nAI는 교육 혁신을 촉진할 수 있지만, 불평등을 심화시킬 수 있는 잠재력을 지님.\n\n# Key Findings\n- AI의 인식된 이점은 교수 통합 준비성과 긍정적 상관관계(r = 0.61, p < .001).\n- 윤리적 우려는 AI 채택 의지와 부정적 상관관계(r = -0.45, p < .001).\n- 룩셈부르크와 우크라이나 참가자 간의 윤리적 우려의 성격 차이.\n\n# Contributions\n## Theoretical\nAI 통합의 윤리적 및 교육적 함의를 다문화 교육 이론과 연결.\n\n## Methodological\n혼합 방법 연구 설계를 통해 다양한 데이터 수집 방식 사용.\n\n## Practical\n교사 준비 프로그램에 대한 실질적인 지침 제공.\n\n# Limitations\n- 연구 샘플이 특정 지역(룩셈부르크 및 우크라이나)에 국한됨.\n- 윤리적 우려의 질적 분석이 제한적임.\n\n# Transferable Insights\n- AI 통합의 이점과 윤리적 우려를 균형 있게 고려해야 함.\n- 다문화 교육 환경에서의 AI 활용에 대한 구체적인 지침 필요.\n\n# Idea Seeds\n1. AI 문해력을 포함한 교사 교육 프로그램 개발.\n2. 다문화 교육 환경에서의 AI 윤리 교육 강화.\n3. AI 도구의 효과적인 통합을 위한 교수 설계 프레임워크 개발.\n\n# Citation Snippets\n> Chaika, O., Kubitskyi, S., & Berezovska-Savchuk, N. (2025). The Role of AI in Shaping Future Educators: Ethics, Instructional Design, and Lifelong Learning. *International Journal of Changes in Education*, 00(00), 1-11. https://doi.org/10.47852/bonviewIJCE52027087\n\ntags: #AI교육, #미래교육자, #윤리, #평생학습, #다문화교육, #교수설계, #AI문해력", "link": "https://doi.org/10.47852/bonviewijce52027087", "altLink": "https://openalex.org/W4416599842", "hasDoi": true, "hasReview": true, "authors": ["Оксана Чайка", "Serhii Kubitskyi", "Наталя Анатоліївна Березовська-Савчук"], "categories": ["Lifelong learning", "Multiculturalism", "Psychology", "Ukrainian", "Quality (philosophy)"]}, {"id": "2", "source": "OPENALEX", "score": 26, "day": "2025-09-08", "title": "Investigating Student Teacher Engagement with Data-Driven AI and Ethical Reasoning in a Graduate-Level Education Course", "content": "---\ntitle: Investigating Student Teacher Engagement with Data-Driven AI and Ethical Reasoning in a Graduate-Level Education Course\nauthors: [Μaria Meletiou-Mavrotheris, Dionysia Bakogianni, Yianna Danidou, Efi Paparistodemou, Alexandros Kofteros]\nyear: 2025\njournal: 명시되지 않음\ndoi: https://openalex.org/W4414213471\nresearch_type: 질적 연구\nmethodology: 사례 연구\ndata_type: 질적 자료\nsample: 대학원 교육 과정의 학생 교사\ncontext: AI in STEAM Education 과정\ntheoretical_framework: 다차원 데이터 참여 프레임워크\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 대학원 온라인 과정인 AI in STEAM Education에서 학생 교사들이 데이터 과학 및 기계 학습에 어떻게 참여했는지를 조사한다. 연구는 EU 자금 지원을 받은 DataSETUP 프로젝트 내에서 개발된 모듈인 Responsible AI & Data Science: Ethics, Society, and Citizenship의 파일럿 구현에 초점을 맞춘다. 이 모듈은 학생 교사들에게 데이터 과학 및 AI/ML 개념을 소개하며, 윤리적 반성과 사회적 영향을 강조한다. 분석은 다섯 가지 차원에서 참가자들의 사고를 검토하며, 학생 교사들이 기술적 및 윤리적 인식을 높이고 자발적인 교육적 연결을 형성했음을 보여준다. 이러한 결과는 교사 준비 과정에 비판적으로 반영된 데이터 과학 교육의 통합 가치를 강조한다.\n\n# Research Logic\n## Problem\n학생 교사들이 데이터 과학 및 AI/ML에 대한 참여와 윤리적 사고의 필요성.\n## Theory\n다차원 데이터 참여 프레임워크를 통한 사고 분석.\n## Design\n파일럿 모듈의 구현 및 질적 자료 수집.\n## Findings\n학생 교사들은 기술적 및 윤리적 인식이 증가하였으며, 자발적인 교육적 연결을 형성하였다.\n## Conclusion\n비판적이고 실천 기반의 데이터 과학 교육이 교사 준비에 있어 중요함을 강조.\n\n# Key Findings\n- 학생 교사들은 데이터와 관련된 질문을 제기하고, 데이터를 수집 및 조작하는 능력을 보였다.\n- 윤리적 반성과 사회적 영향을 고려한 데이터 과학 교육의 필요성이 강조되었다.\n- 자발적인 교육적 연결이 형성되었으며, 이는 교사 역할에 대한 새로운 인식을 가져왔다.\n\n# Contributions\n## Theoretical\n다차원 데이터 참여 프레임워크의 적용을 통해 데이터 과학 교육의 이론적 기초를 확립.\n## Methodological\n질적 사례 연구를 통해 학생 교사의 참여를 심층적으로 분석.\n## Practical\n교사 준비 과정에서 데이터 과학 교육의 통합 필요성을 제시.\n\n# Limitations\n- 연구 샘플이 제한적이며, 일반화 가능성이 낮다.\n- 데이터 수집 방법의 주관성이 결과에 영향을 미칠 수 있다.\n\n# Transferable Insights\n- 데이터 과학 교육의 윤리적 측면이 교사 교육에 통합될 필요가 있다.\n- 학생 교사들의 자발적인 교육적 연결을 촉진하는 방법에 대한 추가 연구가 필요하다.\n\n# Idea Seeds\n1. 데이터 과학 교육의 윤리적 측면을 강조하는 커리큘럼 개발.\n2. AI 기술을 활용한 교사 교육 프로그램의 설계.\n3. 학생 교사들의 데이터 참여를 촉진하는 다양한 교수법 탐색.\n\n# Citation Snippets\n> Meletiou-Mavrotheris, M., Bakogianni, D., Danidou, Y., Paparistodemou, E., & Kofteros, A. (2025). Investigating Student Teacher Engagement with Data-Driven AI and Ethical Reasoning in a Graduate-Level Education Course. \n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy", "link": "https://doi.org/10.3390/educsci15091179", "altLink": "https://openalex.org/W4414213471", "hasDoi": true, "hasReview": true, "authors": ["Μaria Meletiou-Mavrotheris", "Dionysia Bakogianni", "Yianna Danidou"], "categories": ["Student engagement", "Psychology", "Mathematics education", "Coding (social sciences)", "Fluency"]}, {"id": "3", "source": "OPENALEX", "score": 25, "day": "2026-01-27", "title": "Development and evaluation of artificial intelligence literacy training for teacher education students", "content": "---\ntitle: 인공지능 리터러시 교육 프로그램 개발 및 평가\nauthors: Tam Hong Le, Luna Huynh, Belle Dang, Hiep‐Hung Pham, Nga Thi Viet Nguyen, Andy Nguyen\nyear: 2026\njournal: British Journal of Educational Technology\ndoi: 10.1111/bjet.70047\nresearch_type: 디자인 기반 연구\nmethodology: 워크숍 프로토타입 평가\ndata_type: 양적 데이터\nsample: 14명의 석사 학생 및 29명의 교사 교육 학생\ncontext: 교사 교육 프로그램\ntheoretical_framework: AI 역량 프레임워크\nkeywords: [인공지능 리터러시, 교사 교육, 생성적 인공지능, 교육 기술, 비판적 사고, 평생 학습]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 교사 교육 학생을 위한 생성적 인공지능(GenAI) 리터러시 교육 프로그램의 개발 및 평가를 다룬다. 기존의 AI 리터러시 프로그램은 기술적 지식에 치중하거나 GenAI 플랫폼의 기능에 국한되어 있어 비기술적 차원, 즉 윤리, 맥락 이해 및 인간 중심의 비판적 사고를 다루지 못하고 있다. 본 연구는 디자인 기반 연구를 통해 GenAI 리터러시 교육을 위한 설계 원칙을 개발하고, 이를 워크숍 형태로 구현하여 평가하였다. 연구 결과, 참가자들은 AI 역량에 대한 자기 효능감, GenAI에 대한 태도 및 비판적이고 윤리적인 참여 의지가 유의미하게 향상되었다. 이는 교사 교육 프로그램이 AI 중심의 교육 환경에서 교사의 역할 변화에 대응할 수 있도록 GenAI 리터러시를 통합해야 함을 강조한다.\n\n# Research Logic\n## Problem\n교사 교육 학생들이 GenAI의 영향을 효과적으로 탐색할 수 있는 교육이 부족하다.\n## Theory\nAI 리터러시 교육은 기술적, 윤리적, 사회문화적 차원을 포함해야 한다.\n## Design\n디자인 기반 연구 방법론을 통해 GenAI 리터러시 교육 프로그램을 개발하고 평가하였다.\n## Findings\n참가자들은 AI 역량에 대한 자기 효능감과 비판적 참여 의지가 유의미하게 향상되었다.\n## Conclusion\n교사 교육 프로그램은 GenAI 리터러시를 통합하여 교사의 역할 변화에 대응해야 한다.\n\n# Key Findings\n- GenAI 리터러시 교육이 교사 교육 학생의 자기 효능감을 향상시킴.\n- 비판적이고 윤리적인 GenAI 참여 의지가 증가함.\n- 교육 프로그램이 AI 중심 교육 환경에서의 교사 역할 변화에 기여함.\n\n# Contributions\n## Theoretical\nAI 리터러시 교육의 필요성과 설계 원칙을 제시함.\n## Methodological\n디자인 기반 연구 방법론을 통해 교육 프로그램의 효과를 평가함.\n## Practical\n교사 교육 프로그램에 GenAI 리터러시를 통합할 수 있는 실질적인 지침을 제공함.\n\n# Limitations\n- 연구 샘플이 제한적임.\n- 시간 제약으로 인해 교육 프로그램의 범위가 제한됨.\n\n# Transferable Insights\n- AI 리터러시 교육은 기술적 지식뿐만 아니라 윤리적 사고를 포함해야 함.\n- 교사 교육 프로그램은 변화하는 기술 환경에 적응할 수 있도록 지속적으로 업데이트되어야 함.\n\n# Idea Seeds\n1. GenAI 리터러시 교육을 위한 온라인 플랫폼 개발.\n2. 다양한 교육 환경에서의 GenAI 활용 사례 연구.\n3. 교사 교육 학생을 위한 지속적인 AI 역량 개발 프로그램 설계.\n\n# Citation Snippets\n> Tam Hong Le, L., Huynh, L., Dang, B., Pham, H.-H., Nguyen, N. T. V., & Nguyen, A. (2026). Development and evaluation of artificial intelligence literacy training for teacher education students. *British Journal of Educational Technology*. https://doi.org/10.1111/bjet.70047\n\ntags: #인공지능리터러시, #교사교육, #생성적인공지능, #교육기술, #비판적사고, #평생학습, #AI교육\n\n---\n\n요약: 본 연구는 교사 교육 학생을 위한 생성적 인공지능 리터러시 교육 프로그램을 개발하고 평가하였다. 연구 결과, 참가자들은 AI 역량에 대한 자기 효능감과 비판적 참여 의지가 유의미하게 향상되었으며, 이는 교사 교육 프로그램이 AI 중심 교육 환경에서 교사의 역할 변화에 대응해야 함을 강조한다.", "link": "https://doi.org/10.1111/bjet.70047", "altLink": "https://openalex.org/W7125769179", "hasDoi": true, "hasReview": true, "authors": ["Tam Hong Le", "Luna Huynh", "Belle Dang"], "categories": ["Mindset", "Lifelong learning", "Competence (human resources)", "Literacy", "Teacher education"]}, {"id": "4", "source": "ARXIV", "score": 24, "day": "2026-03-08", "title": "AI Misuse in Education Is a Measurement Problem: Toward a Learning Visibility Framework", "content": "---\ntitle: AI Misuse in Education Is a Measurement Problem: Toward a Learning Visibility Framework\nauthors: [Eduardo Davalos, Yike Zhang]\nyear: 2026\njournal: 명시되지 않음\ndoi: https://arxiv.org/abs/2603.07834v1\nresearch_type: 이론적 연구\nmethodology: 문헌 연구 및 이론적 프레임워크 제안\ndata_type: 명시되지 않음\nsample: 명시되지 않음\ncontext: 교육 환경에서의 AI 사용\ntheoretical_framework: Learning Visibility Framework\nkeywords: [AI in Education, Learning Visibility, Cognitive Offloading, Learning Analytics, AI Ethics]\n---\n\n# APA 7th style\n\n# Summary\n본 논문은 교육 환경에서의 대화형 AI 시스템 통합이 학문적 진실성, 공정성 및 학생의 인지 발달에 대한 윤리적 우려를 증대시켰음을 논의한다. AI 오용을 탐지 문제로 보기보다는 학습 과정의 가시성 상실에 뿌리를 둔 측정 문제로 재구성하며, Learning Visibility Framework를 제안한다. 이 프레임워크는 AI 사용의 명확한 규정, 학습 과정의 평가 가능성 인식, 학생 활동의 투명한 타임라인 수립을 중심으로 한다. 이를 통해 교육적 가치와 신뢰를 유지하면서 AI 통합의 윤리를 강조한다.\n\n# Research Logic\n## Problem\nAI의 교육적 오용 문제는 단순한 탐지 문제가 아니라 학습 과정의 가시성 상실로 인한 측정 문제이다.\n\n## Theory\nLearning Visibility Framework는 AI 사용의 명확한 규정과 학습 과정의 평가 가능성을 강조한다.\n\n## Design\n문헌 연구를 통해 AI 오용의 윤리적 문제와 학습 분석의 필요성을 논의하고, 세 가지 원칙을 제안한다.\n\n## Findings\nAI 사용이 학습 과정의 가시성을 저해하며, 이는 교육자와 학생 간의 신뢰를 약화시킬 수 있음을 발견하였다.\n\n## Conclusion\nAI 통합의 윤리를 위해서는 학습 과정의 가시성을 높이고, AI 사용에 대한 명확한 기준을 설정해야 한다.\n\n# Key Findings\n- AI 오용은 탐지 문제보다 측정 문제로 이해해야 한다.\n- 학습 과정의 가시성을 높이는 것이 교육적 신뢰를 유지하는 데 중요하다.\n- Learning Visibility Framework는 AI 사용의 윤리적 통합을 위한 세 가지 원칙을 제시한다.\n\n# Contributions\n## Theoretical\nAI 오용 문제를 탐지에서 측정으로 재구성하는 이론적 기여를 한다.\n\n## Methodological\nLearning Visibility Framework를 통해 교육적 AI 사용에 대한 새로운 접근 방식을 제안한다.\n\n## Practical\nAI 사용의 명확한 규정을 통해 교육자와 학생 간의 신뢰를 구축할 수 있는 실용적 방안을 제시한다.\n\n# Limitations\n- 연구의 샘플 및 데이터 유형이 명시되지 않음.\n- 제안된 프레임워크의 실용성 검증이 필요함.\n\n# Transferable Insights\n- AI 사용의 가시성을 높이는 것이 교육적 신뢰를 구축하는 데 필수적이다.\n- 학습 과정의 투명성을 확보하기 위한 정책적 노력이 필요하다.\n\n# Idea Seeds\n1. AI 사용에 대한 명확한 규정을 교육 과정에 통합하는 방안.\n2. 학습 과정의 가시성을 높이기 위한 기술적 도구 개발.\n3. 교육자와 학생 간의 신뢰 구축을 위한 커뮤니케이션 전략.\n\n# Citation Snippets\n> Davalos, E., & Zhang, Y. (2026). AI Misuse in Education Is a Measurement Problem: Toward a Learning Visibility Framework. \n\ntags: #AI교육, #학습가시성, #인지오프로드, #학습분석, #AI윤리, #교육기술, #AI통합", "link": "https://arxiv.org/abs/2603.07834v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Eduardo Davalos", "Yike Zhang"], "categories": ["cs.CY", "cs.AI", "cs.HC"]}, {"id": "5", "source": "OPENALEX", "score": 24, "day": "2026-01-06", "title": "Teachers’ perceptions of generative AI in inclusive classrooms: enhancing engagement for students with learning disabilities", "content": "Educational systems worldwide face ongoing challenges that require innovative teaching approaches to effectively assist students with learning disabilities, especially in a rapidly evolving technological landscape. This study examined elementary school teachers’ perceptions of generative artificial intelligence (GenAI) tools for enhancing classroom engagement among students with learning disabilities in Saudi Arabia. Using a descriptive survey design, data were collected from 268 teachers in Najran public schools through a validated questionnaire assessing three domains: perceived effectiveness, adoption willingness, and implementation challenges. The findings revealed a moderate level of perceived effectiveness of GenAI tools (M = 2.84, SD = 0.82), with tools viewed as particularly beneficial for promoting student autonomy. Teachers’ willingness to integrate GenAI was also moderate, with their confidence in using the tools being the strongest influencing factor. Key implementation challenges included concerns about student overreliance, the need for continuous technical support, and a lack of clear school policies. These results underscore the need for: (1) professional development programs to strengthen teacher competence with GenAI, (2) clear ethical guidelines for responsible implementation, and (3) infrastructure enhancements to support inclusive classrooms. This study contributes to the growing literature on AI in special education by emphasizing the central role of teacher perceptions in effective technology integration.", "link": "https://doi.org/10.1007/s10209-025-01301-8", "altLink": "https://openalex.org/W7119059495", "hasDoi": true, "hasReview": false, "authors": ["Turki Mahdi Alqarni"], "categories": ["Competence (human resources)", "Perception", "Psychology", "Medical education", "Inclusion (mineral)"]}, {"id": "6", "source": "OPENALEX", "score": 23, "day": "2026-03-05", "title": "Exploring innovative pedagogies in primary education: pathways for 21st century learning", "content": "In the evolving landscape of 21st-century education, innovative pedagogical approaches have become essential for addressing diverse learner needs, integrating technology, and fostering higher-order thinking skills. This study explores and analyses the global adoption of innovative pedagogies in primary education, focusing on how these approaches reshape teaching practices, learner engagement, and educational outcomes. Using a qualitative, desktop-based comparative research design, the study synthesises evidence from international case studies, policy documents, and peer-reviewed literature to examine emerging trends, implementation contexts, and systemic enablers of pedagogical innovation. The findings reveal that innovative pedagogies—such as learner-centred instruction, collaborative learning, and technology-mediated practices—are associated with improved student engagement, creativity, and critical thinking. However, their successful implementation remains highly dependent on contextual factors, including teacher preparedness, institutional support, digital infrastructure, and policy alignment. The study further identifies persistent equity challenges, particularly in under-resourced contexts, where access to technology and professional development remains uneven. By foregrounding cross-contextual comparisons, this research contributes to comparative pedagogy and informs policy discourse on sustainable educational reform. It highlights the need for systemic investment in teacher professional development and adaptive curriculum frameworks to ensure that innovative pedagogies translate into meaningful and inclusive learning experiences for all learners.", "link": "https://doi.org/10.20525/ijrbs.v15i1.4592", "altLink": "https://openalex.org/W7133727941", "hasDoi": true, "hasReview": false, "authors": ["Thivhavhudzi Muriel Badugela"], "categories": ["Foregrounding", "Pedagogy", "Curriculum", "Sociology", "Equity (law)"]}, {"id": "7", "source": "OPENALEX", "score": 23, "day": "2025-12-19", "title": "Artificial Intelligence in Primary Education: A Systematic Literature Review 2020–2025", "content": "Artificial Intelligence (AI) is reshaping primary education across literacy, numeracy, inclusion, and classroom orchestration. This systematic review synthesizes empirical research from 2020 to 2025 to clarify how AI enhances learning and teaching in primary education. Drawing on 94 studies identified through a PRISMA-guided process, the evidence shows that AI adds the greatest value when it (a) personalizes feedback and practice, (b) scaffolds inquiry and computational thinking, and (c) augments teacher decision-making through learning analytics. Reported gains include reading fluency, problem-solving, motivation, and participation among diverse learners. Yet progress remains constrained by uneven teacher AI-TPACK and assessment literacy, infrastructural inequities, and ethical concerns regarding transparency, bias, and data governance. Across studies, the most sustainable outcomes emerged from human-in-the-loop approaches where teachers interpret and moderate AI insights. The review argues that adequate and equitable AI integration depends less on technical sophistication than on pedagogically grounded design, robust professional development, and policy frameworks ensuring accountability and equity by design. These findings inform future directions for educational policy, teacher preparation, and the ethical governance of AI-supported learning ecosystems.", "link": "https://doi.org/10.15388/infedu.2025.24", "altLink": "https://openalex.org/W7117470340", "hasDoi": true, "hasReview": false, "authors": ["Jurgita Bagdonaitė", "Valentina Dagienė"], "categories": ["Sophistication", "Accountability", "Systematic review", "Equity (law)", "Corporate governance"]}, {"id": "8", "source": "OPENALEX", "score": 23, "day": "2025-09-02", "title": "Artificial Intelligence as a Catalyst for Changes in University-Level Science Education", "content": "Artificial intelligence is widely seen not just as a technological advancement in education, but as a catalyst for rethinking the epistemological, pedagogical, and institutional foundations of university-level science instruction. This article is a theoretical and literature-based study that does not present empirical data but instead synthesizes existing research and conceptual frameworks to explore AI’s transformative potential. It examines how AI can redefine university-level science education across five interconnected dimensions: cognition, epistemology, pedagogy, institutional de-sign, and ethics. Utilizing recent studies in science education, educational technology, and artificial intelligence, the paper contends that intelligent systems – such as adaptive tutors, learning analytics platforms, and generative models – can facilitate inquiry-based, student-centered learning environments that are congruent with genuine scientific practices. Nonetheless, their integration presents significant issues related to teacher autonomy, algorithmic bias, and institutional equity. The article contextualizes AI within extensive dialogues on knowledge creation and educational reform, promoting a values-oriented strategy that harmonizes technological advancement with humanistic objectives. This work reframes AI as a philosophical lens rather than merely a tool, contributing to the redefinition of science education’s future in a swiftly changing digital environment.", "link": "https://doi.org/10.59652/jetm.v3i3.618", "altLink": "https://openalex.org/W4413939556", "hasDoi": true, "hasReview": false, "authors": ["Konstantinos Τ. Kotsis"], "categories": ["Science education", "Psychology", "Engineering physics", "Mathematics education", "Engineering"]}, {"id": "9", "source": "OPENALEX", "score": 22, "day": "2026-03-05", "title": "GenAITEd Ghana as a Context-Aware and Curriculum-Aligned Conversational AI Agent for Teacher Education", "content": "<title>Abstract<\/title> Global frameworks increasingly call for Responsible Artificial Intelligence (AI) in education, yet they provide limited guidance on how ethical, culturally responsive, and curriculum-aligned AI can be operationalized within functioning teacher education systems, particularly in the Global South. This study addresses this gap through the design and evaluation of GenAITEd Ghana, a context-aware, region-specific conversational AI prototype developed to support teacher education in Ghana. Adopting a Design Science Research approach, the study developed GenAITEd Ghana as a school-mimetic digital infrastructure aligned with the organizational logic of Ghanaian Colleges of Education. The platform provisions NaCCA-aligned course environments based on users’ institutional affiliation, academic year, semester, and course specialization. Teacher educators create course-specific AI agents and invite student teachers into individual or collaborative learning spaces using cryptographic passkeys. The system operates as a multi-agent, retrieval-augmented conversational AI that coordinates multiple AI models for curriculum-grounded dialogue, automatic speech recognition, voice synthesis and cloning, and multimedia processing. Two complementary prompt pathways were embedded: system-level prompts enforcing curriculum boundaries, ethical constraints, retrieval scope, and teacher-in-the-loop oversight, and interaction-level semi-automated prompts that structure live pedagogical dialogue through clarification, confirmation, and guided response generation. Evaluation findings show that the system features and prompt logics addressed key Responsible AI framework requirements, including transparency, accountability, cultural responsiveness, privacy, and human oversight. Human expert evaluations further indicated that GenAITEd Ghana is pedagogically appropriate for Ghanaian teacher education and consistently perceived the system as capable of promoting student engagement while preserving educators’ professional authority. However, some implementation challenges were noted, particularly regarding the successful deployment of teacher voice cloning and avatar generation for AI agents. Experts also highlighted the risk of student teachers over-relying on AI agents without sufficiently engaging other domains of learning that require human judgment, social interaction, and affective engagement. The study therefore advocates for the scalable advancement of context-aware educational AI through enhanced model integration, sustained professional development, and critical AI literacy for both teachers and student teachers.", "link": "https://doi.org/10.21203/rs.3.rs-8564669/v1", "altLink": "https://openalex.org/W7133747708", "hasDoi": true, "hasReview": false, "authors": ["Matthew Nyaaba", "Patrick Kyeremeh", "Macharious Nabang"], "categories": ["Operationalization", "Curriculum", "Teacher education", "Computer science", "Software deployment"]}];

    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));

}

    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
