<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-05-16 23:51</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "OPENALEX", "score": 19, "day": "2026-05-14", "title": "Evaluating an AI-Supported Revision Module for Project-Based Research in Teacher Education", "content": "---\ntitle: AI 지원 수정 모듈의 평가: 교사 교육에서의 프로젝트 기반 연구\nauthors: Assylzhan Yessimbekova, Ainash Issabekova, Karlygash Almenbetova, Araily Shakirova\nyear: 2026\njournal: 명시되지 않음\ndoi: 명시되지 않음\nresearch_type: 혼합 방법 연구\nmethodology: 사례 연구\ndata_type: 양적 및 질적 데이터\nsample: 158명의 초등 교육 전공 학생 교사\ncontext: 교사 교육의 프로젝트 기반 연구 과정\ntheoretical_framework: 명시되지 않음\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 생성적 인공지능(GenAI)을 활용한 AI 지원 수정 모듈(AIRM)의 효과를 평가하며, 교사 교육의 프로젝트 기반 연구(PBR) 과정에서 학습자의 자율성과 학문적 무결성을 보장하기 위한 교육적 설계의 필요성을 강조한다. AIRM은 Moodle에 통합되어 교수자의 피드백에 기반한 수정 프롬프트를 생성하며, 학생들에게 구조화된 피드백을 제공한다. 158명의 학생 교사를 대상으로 한 혼합 방법 연구에서, AI 그룹은 전통적인 그룹보다 구조와 종합성에서 더 큰 개선을 보였으며, 학습자들은 평균 14.2%의 초안 내용을 수정하고 39.7%의 AI 제안을 거부하였다. 연구 결과는 GenAI가 피드백 과정에서 학습자의 주체성을 존중하며 효과적으로 활용될 수 있음을 보여준다.\n\n# Research Logic\n## Problem\nAI의 도입이 대학 교육에서 필요하지만, 학습자의 자율성과 학문적 무결성을 보장하는 교육적 설계가 부족하다.\n## Theory\n명시되지 않음\n## Design\n혼합 방법 연구로 158명의 초등 교육 전공 학생 교사를 대상으로 AIRM을 평가하였다.\n## Findings\nAI 그룹은 구조와 종합성에서 더 큰 개선을 보였으며, 학습자들은 AI 제안을 적극적으로 활용하였다.\n## Conclusion\nGenAI는 피드백 과정에서 학습자의 주체성을 존중하며 효과적으로 활용될 수 있다.\n\n# Key Findings\n- AI 지원 수정 모듈은 학생들에게 구조화된 피드백을 제공하여 수정 과정을 지원한다.\n- AI 그룹은 전통적인 그룹보다 구조와 종합성에서 더 큰 개선을 보였다.\n- 학습자들은 AI 제안을 적극적으로 활용하였으며, 상당 부분의 초안 내용을 수정하였다.\n\n# Contributions\n## Theoretical\nAI와 교육의 통합에 대한 새로운 통찰을 제공한다.\n## Methodological\n혼합 방법 연구를 통해 AI의 효과를 평가하는 새로운 접근 방식을 제시한다.\n## Practical\n교사 교육 과정에서 AI를 활용한 피드백 방법론을 제안한다.\n\n# Limitations\n- 연구의 샘플 크기가 제한적이다.\n- 특정 교육 환경에 국한되어 일반화에 한계가 있다.\n\n# Transferable Insights\n- AI 도구는 학습자의 자율성을 존중하면서도 효과적인 피드백을 제공할 수 있다.\n- 교육 과정에서 AI의 활용은 교수자의 피드백 방식을 변화시킬 수 있다.\n\n# Idea Seeds\n1. AI 지원 도구의 다양한 활용 방안을 탐색하는 연구.\n2. 다른 교육 분야에서의 AI 도구 효과성 비교 연구.\n3. AI와 인간 교사의 협업 모델 개발.\n\n# Citation Snippets\n>\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #ai literacy, #teacher ai, #education, #learning analytics, #ai pedagogy\n\n---\n\n요약: 본 연구는 AI 지원 수정 모듈(AIRM)의 효과를 평가하며, 교사 교육의 프로젝트 기반 연구 과정에서 학습자의 자율성과 학문적 무결성을 보장하기 위한 교육적 설계의 필요성을 강조한다. AI 그룹은 전통적인 그룹보다 구조와 종합성에서 더 큰 개선을 보였으며, 학습자들은 AI 제안을 적극적으로 활용하였다. GenAI는 피드백 과정에서 학습자의 주체성을 존중하며 효과적으로 활용될 수 있음을 보여준다.", "link": "https://doi.org/10.34190/ejel.24.3.4432", "altLink": "https://openalex.org/W7161146486", "hasDoi": true, "hasReview": true, "authors": ["Assylzhan Yessimbekova", "Ainash Issabekova", "Karlygash Almenbetova"], "categories": ["Rubric", "Mathematics education", "Process (computing)", "Computer science", "Autonomy"]}, {"id": "1", "source": "OPENALEX", "score": 18, "day": "2026-05-14", "title": "Perspective Chapter: Integrating AI in Massive Open Online Courses – Teachers’ Roles in Facilitating Human–AI Collaboration and Critical Engagement in MOOCs", "content": "---\ntitle: \"Perspective Chapter: Integrating AI in Massive Open Online Courses – Teachers’ Roles in Facilitating Human–AI Collaboration and Critical Engagement in MOOCs\"\nauthors: Ammar Bahadur Singh\nyear: 2026\njournal: 명시되지 않음\ndoi: http://dx.doi.org/10.5772/intechopen.10153153\nresearch_type: 이론적 분석\nmethodology: 비판적 개념적 종합\ndata_type: 문헌 연구\nsample: 명시되지 않음\ncontext: 대규모 온라인 교육\ntheoretical_framework: 문화-역사적 이론\nkeywords: [generative artificial intelligence, MOOCs, human–AI collaboration, cultural-historical theory, collaborative learning]\n---\n\n# APA 7th style\n\n# Summary\n이 장에서는 생성적 인공지능(AI)을 대규모 공개 온라인 강좌(MOOCs)에 통합하는 방법을 분석하여 협력적 학습, 비판적 참여 및 학생의 개념적 발전을 강화하는 방안을 모색한다. 학습을 사회적으로 조직된 도구 매개 활동으로 간주하며, 대화, 안내 및 집단 문제 해결을 통해 고차원적 사고를 배양하는 문화-역사적 이론적 관점을 채택한다. MOOC 교육학과 인간-AI 협력에 관한 문헌을 비판적으로 종합하여 대규모 환경에서 지속적인 인식론적 결함을 식별하고, 교사가 학습 설계자로서 집단적 추론 공간을 설계하고 유지하는 역할을 강조한다. 마지막으로, AI 매개 인식론적 실천에 대한 연구 의제를 제시한다.\n\n# Research Logic\n## Problem\nAI 통합이 MOOC에서의 학습 경험을 어떻게 변화시킬 수 있는가?\n## Theory\n문화-역사적 이론에 기반하여 학습은 사회적으로 조직된 활동으로 이해된다.\n## Design\n비판적 개념적 종합을 통해 MOOC 교육학과 인간-AI 협력의 문헌을 분석한다.\n## Findings\nAI는 협력적 학습을 지원할 수 있지만, 교사의 역할이 필수적이다.\n## Conclusion\nAI는 교사의 안내 아래에서만 효과적으로 활용될 수 있으며, 교육 설계의 재구성이 필요하다.\n\n# Key Findings\n- AI는 MOOC에서 협력적 학습을 지원할 수 있는 잠재력을 가지고 있다.\n- 교사는 AI 도구를 통합하여 학습자의 집단적 활동을 촉진해야 한다.\n- AI의 사용은 명확한 교육적 설계 없이는 표면적인 참여를 초래할 수 있다.\n\n# Contributions\n## Theoretical\nAI 통합에 대한 문화-역사적 이론적 관점을 제시한다.\n## Methodological\n비판적 개념적 종합 방법론을 통해 기존 연구를 재조명한다.\n## Practical\n교사가 AI 도구를 효과적으로 활용할 수 있는 설계 원칙을 제안한다.\n\n# Limitations\n- 연구 샘플이 명시되지 않음.\n- 특정 교육 환경에 대한 일반화의 한계가 존재함.\n\n# Transferable Insights\n- AI 도구는 교육적 맥락에서 효과적으로 설계되어야 한다.\n- 교사의 역할은 AI 통합에서 필수적이며, 이를 통해 학습자의 참여를 증진할 수 있다.\n\n# Idea Seeds\n1. AI 도구를 활용한 협력적 학습 환경 설계 방안 연구.\n2. MOOC에서의 AI 사용에 대한 교사의 인식 조사.\n3. AI와 인간의 협력적 학습 모델 개발.\n\n# Citation Snippets\n> Singh, A. B. (2026). Perspective Chapter: Integrating AI in Massive Open Online Courses – Teachers’ Roles in Facilitating Human–AI Collaboration and Critical Engagement in MOOCs. \n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy", "link": "https://doi.org/10.5772/intechopen.1015315", "altLink": "https://openalex.org/W7161167884", "hasDoi": true, "hasReview": true, "authors": ["Ammar Bahadur Singh"], "categories": ["Dialogic", "Sociology", "Structuring", "Generative grammar", "Perspective (graphical)"]}, {"id": "2", "source": "ARXIV", "score": 8, "day": "2026-05-12", "title": "BEHAVE: A Hybrid AI Framework for Real-Time Modeling of Collective Human Dynamics", "content": "---\ntitle: BEHAVE: A Hybrid AI Framework for Real-Time Modeling of Collective Human Dynamics\nauthors: Helene Malyutina\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2605.12730v1\nresearch_type: 이론적 연구\nmethodology: 수학적 모델링, 신경망 기반 예측\ndata_type: 관찰 가능한 신체 신호\nsample: 7명의 에이전트 협상 사례\ncontext: 집단 행동, 위기 관리, 교육\ntheoretical_framework: 복잡계 이론, 동적 시스템 이론\nkeywords: [집단 역학, 행동 필드, 위기 신호, 복잡계, 기계 학습, 하이브리드 AI 시스템, 설명 가능한 AI, 사회 물리학, 임계성 지수, 인간-루프, 동적 시스템, 상호작용 루프, 조기 개입, 스케일 불변성, 계산 모델링]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 집단 행동 모델링을 위한 BEHAVE 프레임워크를 제안한다. 기존 AI 시스템은 개인 수준에서 행동을 모델링하거나 사건 발생 후 이를 감지하는 방식으로 집단의 동적 특성을 포착하지 못한다. BEHAVE는 상호작용하는 인간 집단을 복잡한 동적 시스템으로 정의하고, 관찰 가능한 신체 신호를 기반으로 집단 역학을 연속적인 행동 필드로 모델링한다. 이 프레임워크는 신경망 모델을 활용하여 데이터 기반 학습과 시스템 동적 예측을 가능하게 하며, 7명의 에이전트 협상 사례를 통해 실용성을 입증한다.\n\n# Research Logic\n## Problem\n기존 행동 분석 시스템은 집단의 동적 특성을 포착하지 못하고, 사건 발생 후에만 분석을 수행한다.\n\n## Theory\n집단 행동은 개별 에이전트의 특성이 아닌 상호작용 필드에서 발생하는 집합적 특성으로 이해되어야 한다.\n\n## Design\nBEHAVE는 9단계의 계산 아키텍처를 통해 신체 신호를 기반으로 집단의 상태를 실시간으로 분석하고 예측한다.\n\n## Findings\nBEHAVE는 집단의 현재 상태, 임계 전환 가능성, 최적 개입 방안을 동시에 제공할 수 있다.\n\n## Conclusion\nBEHAVE 프레임워크는 집단 행동 분석의 새로운 패러다임을 제시하며, 다양한 분야에 적용 가능성을 보여준다.\n\n# Key Findings\n- BEHAVE는 집단 행동을 연속적인 행동 필드로 모델링하여 집단 역학을 실시간으로 분석한다.\n- 신경망 모델을 통해 데이터 기반 학습 및 예측이 가능하다.\n- 7명의 에이전트 협상 사례를 통해 프레임워크의 실용성을 입증하였다.\n\n# Contributions\n## Theoretical\n집단을 복잡한 동적 시스템으로 정의하고, 행동 필드 개념을 도입하여 집단 역학을 설명한다.\n\n## Methodological\n9단계의 계산 아키텍처를 통해 집단 행동 분석의 추적 가능성을 높인다.\n\n## Practical\n위기 관리, 교육 등 다양한 분야에서 실시간 집단 행동 분석 및 개입 방안을 제공한다.\n\n# Limitations\n- 현재 모델은 특정 상황에 국한되어 있으며, 일반화 가능성에 대한 추가 연구가 필요하다.\n- 실험적 검증이 진행 중이며, 다양한 환경에서의 적용 가능성은 아직 명시되지 않음.\n\n# Transferable Insights\n- 집단 행동 분석에 대한 새로운 접근법을 제시하여 다양한 분야에 적용할 수 있는 가능성을 제공한다.\n- 신체 신호를 활용한 데이터 기반 분석의 중요성을 강조한다.\n\n# Idea Seeds\n1. BEHAVE 프레임워크를 교육 현장에 적용하여 학습 동기 및 협력 행동을 분석하는 연구.\n2. 위기 관리 상황에서의 조기 개입 방안을 탐색하는 실험적 연구.\n3. 다양한 사회적 맥락에서의 집단 행동을 모델링하기 위한 확장 연구.\n\n# Citation Snippets\n> Malyutina, H. (2026). BEHAVE: A Hybrid AI Framework for Real-Time Modeling of Collective Human Dynamics. arXiv. https://arxiv.org/abs/2605.12730v1\n\ntags: #집단역학, #행동필드, #AI, #교육, #위기관리, #동적시스템, #기계학습\n\n---\n\n요약: 본 연구는 BEHAVE 프레임워크를 통해 집단 행동을 연속적인 행동 필드로 모델링하고, 실시간 분석 및 예측을 가능하게 한다. 기존 AI 시스템의 한계를 극복하며, 다양한 분야에 적용 가능성을 제시한다.", "link": "https://arxiv.org/abs/2605.12730v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Helene Malyutina"], "categories": ["cs.AI", "cs.GR", "cs.MA", "physics.soc-ph"]}, {"id": "3", "source": "ARXIV", "score": 8, "day": "2026-05-11", "title": "LLMs for Secure Hardware Design and Related Problems: Opportunities and Challenges", "content": "---\ntitle: LLMs for Secure Hardware Design and Related Problems: Opportunities and Challenges\nauthors: [Johann Knechtel, Ozgur Sinanoglu, Ramesh Karri]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2605.10807v2\nresearch_type: 문헌 리뷰\nmethodology: 체계적 문헌 분석\ndata_type: 문헌\nsample: 명시되지 않음\ncontext: 반도체 산업 내 LLM 통합\ntheoretical_framework: 명시되지 않음\nkeywords: [Large Language Models, Hardware Security, Electronic Design Automation, Logic Locking, Hardware Trojans, Machine Unlearning, Multi-Agent Systems, Red-Teaming]\n---\n\n# APA 7th style\n\n# Summary\n이 논문은 대형 언어 모델(LLM)의 전자 설계 자동화(EDA) 및 하드웨어 보안 통합이 반도체 산업에 미치는 영향을 분석한다. LLM은 레지스터 전송 수준(RTL) 코드 생성, 테스트 벤치 자동화 및 고급 사양과 실리콘 간의 의미적 격차를 해소하는 데 있어 전례 없는 능력을 제공하지만, 동시에 심각한 취약점을 초래한다. 이 리뷰는 LLM 기반 하드웨어 설계의 최신 발전을 EDA 합성, 하드웨어 신뢰, 보안을 위한 설계 및 교육의 주요 발전을 중심으로 체계적으로 분석한다. 또한 데이터 오염 및 적대적 기계 학습 회피와 같은 최근의 혁신적인 방법론을 확장하고, 데이터 기억 방지를 위한 동적 벤치마킹 및 강력한 보안 평가를 위한 공격적인 레드 팀과 같은 주요 대응책에 대한 논의를 통합한다. 마지막으로, 안전하고 신뢰할 수 있으며 자율적인 설계 생태계를 위한 미래 연구 방향을 제시한다.\n\n# Research Logic\n## Problem\nLLM의 통합이 하드웨어 설계 및 보안에 미치는 영향과 관련된 취약점.\n\n## Theory\nLLM의 발전과 그에 따른 하드웨어 설계의 변화.\n\n## Design\n체계적 문헌 분석을 통해 LLM 기반 하드웨어 설계의 최신 동향을 정리.\n\n## Findings\nLLM은 하드웨어 설계의 효율성을 높일 수 있지만, 데이터 오염 및 보안 취약점과 같은 새로운 문제를 초래한다.\n\n## Conclusion\nLLM의 안전하고 신뢰할 수 있는 사용을 위한 연구 방향과 방법론적 접근이 필요하다.\n\n# Key Findings\n- LLM은 RTL 코드 생성 및 테스트 벤치 자동화에서 전례 없는 성능을 보인다.\n- 데이터 오염 및 적대적 공격에 대한 취약점이 존재한다.\n- 동적 벤치마킹과 레드 팀을 통한 보안 평가가 중요하다.\n\n# Contributions\n## Theoretical\nLLM의 하드웨어 설계 및 보안에 대한 이론적 기초를 제공.\n\n## Methodological\n체계적 문헌 분석을 통해 LLM 기반 하드웨어 설계의 최신 동향을 정리.\n\n## Practical\nLLM을 활용한 하드웨어 설계의 실제 적용 가능성을 제시.\n\n# Limitations\n- 특정 사례 연구에 대한 데이터 부족.\n- LLM의 보안 취약점에 대한 구체적인 해결책 부족.\n\n# Transferable Insights\n- LLM의 활용이 하드웨어 설계의 효율성을 높일 수 있지만, 보안 문제를 동반한다.\n- 동적 벤치마킹과 같은 새로운 접근 방식이 필요하다.\n\n# Idea Seeds\n1. LLM을 활용한 하드웨어 설계의 보안 강화 방안 연구.\n2. 데이터 오염 방지를 위한 새로운 벤치마킹 기법 개발.\n3. LLM의 하드웨어 설계 적용 사례 분석.\n\n# Citation Snippets\n> Knechtel, J., Sinanoglu, O., & Karri, R. (2026). LLMs for Secure Hardware Design and Related Problems: Opportunities and Challenges. arXiv. https://arxiv.org/abs/2605.10807v2\n\ntags: #LLM, #하드웨어보안, #전자설계자동화, #데이터오염, #적대적기계학습, #레드팀, #반도체산업\n\n---\n\n요약: 이 논문은 LLM의 전자 설계 자동화 및 하드웨어 보안 통합이 반도체 산업에 미치는 영향을 분석하며, LLM의 장점과 함께 데이터 오염 및 보안 취약점과 같은 문제를 다룬다. LLM의 안전하고 신뢰할 수 있는 사용을 위한 연구 방향이 필요함을 강조한다.", "link": "https://arxiv.org/abs/2605.10807v2", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Johann Knechtel", "Ozgur Sinanoglu", "Ramesh Karri"], "categories": ["cs.CR", "cs.AR", "cs.LG"]}, {"id": "4", "source": "ARXIV", "score": 6, "day": "2026-05-14", "title": "On the Cultural Anachronism and Temporal Reasoning in Vision Language Models", "content": "---\ntitle: On the Cultural Anachronism and Temporal Reasoning in Vision Language Models\nauthors: [Mukul Ranjan, Prince Jha, Khushboo Kumari, Zhiqiang Shen]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2605.15071v1\nresearch_type: 실증 연구\nmethodology: 데이터 세트 구축 및 시스템 평가\ndata_type: 질적 및 양적 데이터\nsample: 1,600개의 인도 문화 유물\ncontext: 문화 유산 자료의 디지털 아카이브 및 교육 플랫폼\ntheoretical_framework: 문화적 아나크로니즘 이론\nkeywords: [문화 아나크로니즘, 비전-언어 모델, 시간적 추론, 데이터 세트, 인도 문화 유물]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 비전-언어 모델(VLM)이 역사적 유물을 해석하는 데 있어 발생하는 문화적 아나크로니즘을 규명하고, 이를 정량화하기 위한 시간적 아나크로니즘 벤치마크(TAB-VLM)를 제안한다. TAB-VLM은 1,600개의 인도 문화 유물에 대한 600개의 질문으로 구성되어 있으며, 현재의 VLM들이 시간적 추론에서 상당한 결함을 보임을 발견하였다. 특히, 가장 성능이 좋은 모델인 GPT-5.2조차도 58.7%의 정확도에 그쳤으며, 이는 다양한 아키텍처와 규모에 걸쳐 일관되게 나타났다. 연구 결과는 VLM의 현재 능력과 문화 유산 자료를 정확하게 해석하기 위한 요구 사항 간의 불일치를 강조한다.\n\n# Research Logic\n## Problem\n비전-언어 모델이 역사적 유물을 해석할 때 시간적 맥락을 무시하고 부적절한 개념을 적용하는 경향이 있다.\n## Theory\n문화적 아나크로니즘은 역사적 유물에 대한 부적절한 시간적 해석을 설명하는 이론이다.\n## Design\n600개의 질문을 포함하는 TAB-VLM 데이터 세트를 구축하고, 10개의 최신 모델을 평가하였다.\n## Findings\n현재 VLM들은 시간적 추론에서 심각한 결함을 보이며, 특히 비서구 문화에 대한 해석에서 부족함이 드러났다.\n## Conclusion\n문화적 아나크로니즘은 VLM의 중요한 평가 차원으로 자리 잡아야 하며, 이는 문화 유산 자료의 정확한 해석을 위한 기초를 제공한다.\n\n# Key Findings\n- VLM들은 문화적 아나크로니즘을 보이며, 이는 역사적 유물 해석에 심각한 영향을 미친다.\n- TAB-VLM 데이터 세트는 600개의 질문으로 구성되어 있으며, 다양한 시간적 추론 능력을 평가한다.\n- GPT-5.2 모델조차도 58.7%의 정확도에 불과하며, 이는 모델의 규모와 아키텍처에 관계없이 일관되게 나타난다.\n\n# Contributions\n## Theoretical\n문화적 아나크로니즘을 VLM 평가의 중요한 차원으로 제안하였다.\n## Methodological\nTAB-VLM 데이터 세트를 통해 VLM의 시간적 추론 능력을 정량적으로 평가할 수 있는 방법론을 제공하였다.\n## Practical\n문화 유산 자료의 정확한 해석을 위한 AI 시스템의 개선 방향을 제시하였다.\n\n# Limitations\n- 연구는 인도 문화 유물에 국한되어 있으며, 다른 문화권에 대한 일반화가 필요하다.\n- VLM의 성능 평가가 특정 모델에 집중되어 있어, 다양한 모델에 대한 포괄적인 분석이 부족하다.\n\n# Transferable Insights\n- 문화적 아나크로니즘은 다른 AI 시스템에서도 고려해야 할 중요한 요소이다.\n- VLM의 시간적 추론 능력 향상을 위한 데이터 세트 구축의 필요성이 강조된다.\n\n# Idea Seeds\n1. 다양한 문화권의 유물을 포함한 시간적 아나크로니즘 벤치마크 개발.\n2. VLM의 문화적 이해를 향상시키기 위한 교육 프로그램 개발.\n3. AI 시스템의 문화적 민감성을 높이기 위한 정책 제안.\n\n# Citation Snippets\n> Ranjan, M., Jha, P., Kumari, K., & Shen, Z. (2026). On the Cultural Anachronism and Temporal Reasoning in Vision Language Models. arXiv. https://arxiv.org/abs/2605.15071v1\n\ntags: #문화아나크로니즘, #비전언어모델, #시간적추론, #데이터세트, #인도문화유물, #AI교육, #문화유산\n\n---\n\n요약: 본 연구는 비전-언어 모델이 역사적 유물을 해석할 때 발생하는 문화적 아나크로니즘을 규명하고, 이를 정량화하기 위한 시간적 아나크로니즘 벤치마크(TAB-VLM)를 제안하였다. 연구 결과, 현재의 VLM들은 시간적 추론에서 심각한 결함을 보이며, 특히 비서구 문화에 대한 해석에서 부족함이 드러났다.", "link": "https://arxiv.org/abs/2605.15071v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Mukul Ranjan", "Prince Jha", "Khushboo Kumari"], "categories": ["cs.CV", "cs.AI", "cs.CL"]}, {"id": "5", "source": "ARXIV", "score": 6, "day": "2026-05-13", "title": "Context Matters: Auditing Gender Bias in T2I Generation through Risk-Tiered Use-Case Profiles", "content": "Text-to-image (T2I) generative models are increasingly used to produce content for education, media, and public-facing communication, and are starting to be integrated into higher-impact pipelines. Since generated images tend to reinforce stereotypes, producing representational erasure via \"default\" depictions and shaping perceptions of who belongs in certain roles, a growing body of work has proposed metrics to quantify gender bias in T2I outputs. Yet existing evaluations remain fragmented. Metrics are often reported without a shared view of what they measure, what assumptions they entail, or how their results should be interpreted under different deployment contexts. This limits the usefulness of gender bias measurement for both technical auditing and emerging governance discussions. We propose a risk-aligned auditing framework for gender bias in T2I models composed of three constituents that connects risk categories, evaluation metrics, and harms. First, we identify risk-tiered use-case profiles aligned with the EU AI Act's risk categories to motivate why auditing expectations may vary with deployment contexts and stakeholder exposure. Second, we construct a metric catalog that consolidates gender-bias evaluation methods and organizes them in three measurement categories: gender prediction, embedding similarity, and downstream task. Third, we introduce a harm typology that maps context-dependent harm categories (e.g., representational, quality-of-service) to specific risk-tired scenarios. Finally, we introduce THUMB cards (Text-to-image Harms-informed Use-case-aligned Metrics of gender Bias) that help formulate auditing systematically by the incorporation of context, scenario and bias manifestation, harm hypotheses, and audit strategy.", "link": "https://arxiv.org/abs/2605.13113v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Jose Luna", "Yankun Wu", "Xiaofei Xie"], "categories": ["cs.CY", "cs.AI"]}, {"id": "6", "source": "ARXIV", "score": 6, "day": "2026-05-13", "title": "Language-Based Agent Control", "content": "This paper introduces language-based agent control (LBAC), a new programming model for agentic applications that brings techniques from programming languages and language-based security to the problem of agent control. In conventional programming, combinations of static typing and runtime enforcement have long been used to guarantee that well-typed programs satisfy user-specified policies, including policies for access control, information flow, data provenance, and more. The key idea behind LBAC is to extend these guarantees to agentic applications by requiring agents to generate programs that are themselves well typed in the context of the surrounding scaffolding code. Unsafe programs are rejected by the type-checker before execution, allowing policies to apply uniformly across the entire application, including both agent-generated behavior and developer-written scaffolding. At the same time, LBAC preserves substantial expressiveness: agents may perform arbitrary side-effect-free computation and recursively invoke subagents, which retain full tool access subject to the same -- or potentially more restrictive -- policies. We demonstrate LBAC with three case studies: I/O sandboxing via filesystem capabilities, data provenance, and information-flow control.", "link": "https://arxiv.org/abs/2605.12863v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Timothy Zhou", "Loris D'Antoni", "Nadia Polikarpova"], "categories": ["cs.PL", "cs.AI", "cs.CR"]}, {"id": "7", "source": "ARXIV", "score": 6, "day": "2026-05-12", "title": "Predicting Disagreement with Human Raters in LLM-as-a-Judge Difficulty Assessment without Using Generation-Time Probability Signals", "content": "Automatic generation of educational materials using large language models (LLMs) is becoming increasingly common, but assigning difficulty levels to such materials still requires substantial human effort. LLM-as-a-Judge has therefore attracted attention, yet disagreement with human raters remains a major challenge. We propose a method for predicting which LLM-generated difficulty ratings are likely to disagree with human raters, so that such cases can be sent for re-rating. Unlike prior approaches, our method does not rely on generation-time probability signals, which must be collected during rating generation and are often difficult to compare across LLMs. Instead, exploiting the fact that difficulty is an ordinal scale, we use a separate embedding space, such as ModernBERT, and identify disagreement candidates based on the geometric consistency of the rating set. Experiments on English CEFR-based sentence difficulty assessment with GPT-OSS-120B and Qwen3-235B-A22B showed that the proposed method achieved higher AUC for predicting disagreement with human raters than probability-based baselines.", "link": "https://arxiv.org/abs/2605.12422v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Yo Ehara"], "categories": ["cs.CL", "cs.CY"]}, {"id": "8", "source": "ARXIV", "score": 6, "day": "2026-05-12", "title": "Deep Reasoning in General Purpose Agents via Structured Meta-Cognition", "content": "Humans intuitively solve complex problems by flexibly shifting among reasoning modes: they plan, execute, revise intermediate goals, resolve ambiguity through associative judgment, and apply formal procedures to well-specified subproblems. Current LLM agents lack this flexibility, as their scaffolds hard-code such reasoning decisions in advance. These scaffolds are effective when their prescribed structure matches the task, but brittle when solving the task requires adapting the structure of reasoning itself. We introduce Deep Reasoning -- an inference-time approach for constructing task-specific scaffolds through structured meta-reasoning. Deep Reasoning uses a formal language that represents meta-reasoning as executable decompositions over associative inference, formal computation, and recursive subproblem solving, enabling decomposition principles to be encoded as in-context examples that guide test-time scaffold construction. We instantiate this approach in a general-purpose agent (DOLORES) that distributes complex tasks across more controlled reasoning threads. We evaluate it against state-of-the-art scaffolding methods across four hard benchmarks: multi-hop reasoning, long-chain question answering, long-context aggregation, and deep research-style information seeking. DOLORES outperforms all evaluated scaffolds across three model sizes and two model families, improving over the strongest evaluated scaffold baseline by 24.8% on average. DOLORES distributes cognition across structured, lower-load reasoning threads, thereby reducing premature termination and hallucinations. This advantage can even bridge the scaling gap, with an 8B version surpassing all evaluated 32B baselines from the same family in more than half the settings. These results point toward future agentic systems that treat scaffolding as adaptive reasoning, constructing the structure each task requires just-in-time.", "link": "https://arxiv.org/abs/2605.11388v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Dean Light", "Michael Theologitis", "Kshitish Ghate"], "categories": ["cs.CL", "cs.AI"]}, {"id": "9", "source": "ARXIV", "score": 6, "day": "2026-05-10", "title": "Who embraces AI in play? Exploratory modeling of player preference profiles toward game AI", "content": "Artificial intelligence is increasingly entering digital games through diverse functions. While prior work has shown that player attitudes toward game AI are strongly context-dependent, less is known about how these attitudes are structurally combined within different groups of players. This study addresses this gap by modeling players' cross-context AI acceptance as interpretable attitude profiles. Based on questionnaire data from 771 digital game players, we apply Archetypal Analysis (AA) to centered acceptance ratings across eight representative AI application contexts in games. The analysis identifies seven distinctive profiles: AI-Skeptics, Broad AI-Supporters, Creative-Play Explorers, Experience-Oriented Supporters, Systemic Order Advocates, Emotion-Centered Supporters, and Governance-Skeptics. Exploratory one-vs-rest (OvR) logistic regressions further suggest that profile membership is associated with players' perceived AI literacy, gaming habits, disciplinary background, personality traits, and application-specific priorities. By shifting attention from isolated acceptance judgments to patterned preference structures, this study provides an exploratory empirical vocabulary for segmenting game AI audiences and offers preliminary design implications for more context-sensitive and player-sensitive AI integration in digital games.", "link": "https://arxiv.org/abs/2605.09550v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Ting-Chen Hsu", "Jiangxu Lin", "Wenran Chen"], "categories": ["cs.HC"]}];

    favorites.push(id);
  } else {
    favorites.splice(idx, 1);
  }
  localStorage.setItem('favorites', JSON.stringify(favorites));
  applyFilters();
}

function recordVisit(id) {
  if (!visited.includes(id)) {
    visited.push(id);
  }
  localStorage.setItem('visited', JSON.stringify(visited));
}

function recordSearch(query) {
  if (query.trim() && !searchHistory.includes(query)) {
    searchHistory.unshift(query);
    if (searchHistory.length > 10) searchHistory.pop();
    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
  }
}

function downloadJSON() {
  const data = JSON.stringify(filtered, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadCSV() {
  const headers = ['제목', '출처', '스코어', '리뷰여부', '링크'];
  const rows = filtered.map(p => [
    '"' + p.title.replace(/"/g, '""') + '"',
    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
