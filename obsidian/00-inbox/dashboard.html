<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-03-13 23:27</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

const PAPERS = [{"id": "0", "source": "OPENALEX", "score": 33, "day": "2025-10-17", "title": "AI-Integrated Instructional Design to Enhance AI Literacy among Pre-Service Teachers", "content": "---\ntitle: AI-Integrated Instructional Design to Enhance AI Literacy among Pre-Service Teachers\nauthors: [Pawarit Pingmuang, Prakob Koraneekij, Jintavee Khlaisang]\nyear: 2025\njournal: 명시되지 않음\ndoi: 명시되지 않음\nresearch_type: 양적 연구\nmethodology: 설문조사\ndata_type: 명시되지 않음\nsample: 1,673명의 예비 교사\ncontext: 태국\ntheoretical_framework: 디자인 기반 학습 원칙\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 교육 도구와 관행에 인공지능(AI)의 통합이 증가함에 따라 예비 교사들이 AI를 효과적으로 사용할 수 있도록 AI 리터러시를 향상시키기 위한 AI 통합 교육 설계 모델을 개발하는 것을 목표로 하였다. 1,673명의 태국 예비 교사를 대상으로 한 설문조사를 통해 AI에 대한 인식, 영향, 동기 및 현재 학습 생태계에 대한 신뢰성을 평가하였다. 연구 결과, STEM과 비STEM 그룹 간에 유의미한 차이가 없음을 발견하였고, AI 교육의 필요성이 공통적으로 나타났다. 최종적으로, 디자인 기반 학습 원칙에 기초하여 AI 리터러시를 포함하는 교육과정 개발을 위한 프레임워크가 제안되었다.\n\n# Research Logic\n## Problem\n예비 교사들이 AI를 효과적으로 활용할 수 있는 능력이 부족함.\n## Theory\n디자인 기반 학습 원칙을 바탕으로 한 AI 통합 교육 설계 모델 개발.\n## Design\n1,673명의 예비 교사를 대상으로 한 양적 설문조사.\n## Findings\nAI에 대한 인식, 영향, 동기에서 STEM과 비STEM 그룹 간 유의미한 차이가 없음.\n## Conclusion\nAI 리터러시를 포함하는 교육과정 개발을 위한 프레임워크가 필요함.\n\n# Key Findings\n- 예비 교사들은 AI 교육에 대한 공통된 필요성을 가지고 있음.\n- AI 리터러시 향상을 위한 학습 활동 및 자원에 대한 요구가 있음.\n- 디자인 기반 학습 원칙에 기초한 AI 통합 교육 설계 프레임워크가 개발됨.\n\n# Contributions\n## Theoretical\nAI 리터러시 교육을 위한 새로운 이론적 프레임워크 제안.\n## Methodological\n양적 연구 방법을 통한 신뢰성 있는 데이터 수집 및 분석.\n## Practical\nAI 통합 교육 설계 모델을 통해 교육과정 개선에 기여.\n\n# Limitations\n- 연구의 맥락이 태국으로 한정됨.\n- 설문조사에 의존하여 질적 데이터 부족.\n\n# Transferable Insights\n- AI 리터러시 교육의 필요성은 다양한 교육 환경에서 공통적임.\n- 디자인 기반 학습 원칙은 다른 교육 분야에서도 적용 가능.\n\n# Idea Seeds\n1. AI 리터러시 교육을 위한 다양한 학습 활동 개발.\n2. AI 통합 교육 설계 모델의 국제적 적용 가능성 탐색.\n3. 예비 교사 대상 AI 교육 프로그램의 효과성 평가 연구.\n\n# Citation Snippets\n> Pingmuang, P., Koraneekij, P., & Khlaisang, J. (2025). AI-Integrated Instructional Design to Enhance AI Literacy among Pre-Service Teachers.\n\ntags: #human-ai_collaboration, #classroom_ai, #ai_tutoring, #instructional_design, #scaffolding, #tpack, #ai_literacy, #teacher_ai, #education, #learning_analytics, #llm_classroom, #ai_pedagogy\n\n---\n\n요약: 본 연구는 예비 교사들의 AI 리터러시 향상을 위한 AI 통합 교육 설계 모델을 개발하였다. 1,673명의 예비 교사를 대상으로 한 설문조사 결과, AI 교육의 필요성이 공통적으로 나타났으며, 디자인 기반 학습 원칙에 기초한 프레임워크가 제안되었다.", "link": "https://doi.org/10.34190/ecel.24.1.3722", "altLink": "https://openalex.org/W4415323857", "hasDoi": true, "hasReview": true, "authors": ["Pawarit Pingmuang", "Prakob Koraneekij", "Jintavee Khlaisang"], "categories": ["Instructional design", "Psychology", "Reliability (semiconductor)", "Perception", "Literacy"]}, {"id": "1", "source": "OPENALEX", "score": 30, "day": "2025-12-17", "title": "Fostering preservice science teachers' AI-Tpack competence and reflections through an AI-focused pedagogical learning course", "content": "---\ntitle: Fostering preservice science teachers' AI-Tpack competence and reflections through an AI-focused pedagogical learning course\nauthors: Ronilo P. Antonio\nyear: 2025\njournal: Journal of Technology and Science Education\ndoi: https://doi.org/10.3926/jotse.3693\nresearch_type: 실험 연구\nmethodology: 사전-사후 실험 설계\ndata_type: 양적 및 질적 데이터\nsample: 84명의 예비 과학교사\ncontext: 필리핀의 주립대학교\ntheoretical_framework: TPACK, AI-TPACK, 사회 구성주의\nkeywords: [AI, TPACK, 예비 과학교사, 과학교육, 교육기술, 과정 기반 개입]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 인공지능(AI)의 교육적 통합을 위한 예비 과학교사(PSSTs)의 기술적 교수 내용 지식(AI-TPACK) 역량을 개발하기 위한 AI 중심의 교수 학습 과정을 설계하고 실행하였다. 사회 구성주의 원리에 기반하여, 구조화된 수업, 실습 활동, 협력적 수업 설계 및 반성적 실천을 통합하여 PSSTs의 AI 이해 및 적용 능력을 향상시켰다. 84명의 PSSTs를 대상으로 한 사전-사후 실험 설계에서, AI-TPACK 척도를 사용한 양적 데이터와 구조화된 인터뷰를 통한 질적 데이터를 수집하였다. 비모수 분석 결과, AI-TPACK의 모든 차원에서 통계적으로 유의미한 개선이 나타났으며(z = -6.900, p < .001, r = 0.76), 이는 큰 효과 크기를 나타낸다. PSSTs의 반성적 분석을 통해 교수 설계 향상, AI 리터러시 개선, 학생 참여 증가 등의 주요 장점이 확인되었으며, 도구의 한계, 윤리적 딜레마, 맥락적 장벽과 같은 제약도 나타났다. 연구 결과는 AI-TPACK 역량을 촉진하기 위한 전략적 교사 교육 개입의 잠재력을 강조한다.\n\n# Research Logic\n## Problem\nAI의 교육적 통합을 위한 예비 교사의 역량 부족 문제.\n## Theory\nTPACK 및 AI-TPACK 프레임워크를 통한 교육적 접근.\n## Design\nAI 중심의 교수 학습 과정 설계 및 실행.\n## Findings\nAI-TPACK의 모든 차원에서 유의미한 개선 발견.\n## Conclusion\n전략적 교사 교육 개입이 AI-TPACK 역량을 촉진할 수 있음을 입증.\n\n# Key Findings\n- AI-TPACK의 모든 차원에서 통계적으로 유의미한 개선(z = -6.900, p < .001, r = 0.76).\n- PSSTs의 반성적 분석에서 교수 설계 향상 및 AI 리터러시 개선 확인.\n- 도구의 한계 및 윤리적 딜레마와 같은 제약 사항 발견.\n\n# Contributions\n## Theoretical\nAI-TPACK 프레임워크의 실증적 증거 제공.\n## Methodological\n사전-사후 실험 설계를 통한 연구 방법론 강화.\n## Practical\nAI 통합을 위한 교사 교육 프로그램의 설계 및 실행에 대한 통찰 제공.\n\n# Limitations\n- 연구 샘플이 필리핀의 특정 대학교에 국한됨.\n- 질적 데이터 수집의 깊이가 제한적일 수 있음.\n\n# Transferable Insights\n- AI-TPACK 역량 개발을 위한 교육 과정 설계의 중요성.\n- 교육적 맥락에 맞춘 AI 도구의 활용 필요성.\n\n# Idea Seeds\n1. AI-TPACK 역량 개발을 위한 다양한 교육적 접근법 탐색.\n2. 다른 국가 및 교육 시스템에서의 AI 통합 연구.\n3. AI 윤리에 대한 교육적 논의 강화.\n\n# Citation Snippets\n> Antonio, R. (2025). Fostering preservice science teachers’ AI-TPACK competence and reflections through an AI-focused pedagogical learning course. Journal of Technology and Science Education, 15(3), 784-809. https://doi.org/10.3926/jotse.3693\n\ntags: #AI, #TPACK, #예비교사, #과학교육, #교육기술, #AI리터러시, #윤리적결정\n\n---\n\n요약: 본 연구는 예비 과학교사들의 AI-TPACK 역량을 개발하기 위한 AI 중심의 교수 학습 과정을 설계하고 실행하였다. 연구 결과, 모든 AI-TPACK 차원에서 유의미한 개선이 나타났으며, 교수 설계 향상과 AI 리터러시 개선이 확인되었다. 이러한 결과는 전략적 교사 교육 개입의 필요성을 강조한다.", "link": "https://doi.org/10.3926/jotse.3693", "altLink": "https://openalex.org/W4417436109", "hasDoi": true, "hasReview": true, "authors": ["Ronilo P. Antonio"], "categories": ["Competence (human resources)", "Affordance", "Thematic analysis", "Psychology", "Mathematics education"]}, {"id": "2", "source": "OPENALEX", "score": 25, "day": "2025-12-10", "title": "Next-Generation Mathematics Education: A Transformative Framework for Future Learning", "content": "---\ntitle: Next-Generation Mathematics Education: A Transformative Framework for Future Learning\nauthors: [Suchitra Dey, Akanksha Dubey]\nyear: 2025\njournal: 명시되지 않음\ndoi: 명시되지 않음\nresearch_type: 명시되지 않음\nmethodology: 명시되지 않음\ndata_type: 명시되지 않음\nsample: 명시되지 않음\ncontext: 명시되지 않음\ntheoretical_framework: 명시되지 않음\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 논문은 디지털 기술, 데이터 기반 학습 시스템, 인지 과학의 급속한 발전이 수학 교육의 환경을 어떻게 변화시키고 있는지를 다룬다. Next-Generation Mathematics Education (NGME)라는 새로운 교육 프레임워크는 인공지능, 개인화된 적응 학습 경로, 문제 해결 접근법, 역량 기반 평가 모델, 문화적으로 반응하는 교수법을 통합한다. AI 기반 플랫폼과 지능형 튜터링 시스템은 개별화된 교육, 실시간 피드백, 숙달 기반 진행을 가능하게 하며, 디지털 시뮬레이션과 수학적 시각화 도구는 개념 이해를 심화시킨다. 이 논문은 현재의 교수법에서의 주요 격차를 분석하고 NGME가 이러한 격차를 어떻게 해소할 수 있는지를 제안한다. 마지막으로, 수학 교육을 보다 매력적이고 포용적이며 공정하게 만들기 위한 실질적인 제안과 정책 권고를 제공한다.\n\n# Research Logic\n## Problem\n현재 수학 교육에서의 암기 위주의 교수법, 절차적 교육, 개인화 부족 등의 문제를 지적한다.\n\n## Theory\nNGME는 인공지능과 인지 과학을 기반으로 한 새로운 교육 패러다임을 제안한다.\n\n## Design\nAI 기반 도구와 개인화된 학습 경로를 통합한 교육 설계를 제안한다.\n\n## Findings\nNGME는 학생 중심의 학습 생태계를 통해 수학적 이해를 심화시키고, 학습자의 참여를 증대시킬 수 있음을 보여준다.\n\n## Conclusion\n수학 교육의 혁신을 위해 교육 개혁, 교사 역량 강화, 체계적 지원이 필요하다는 점을 강조한다.\n\n# Key Findings\n- NGME는 AI와 인지 과학을 통합하여 개인화된 학습 경험을 제공한다.\n- 현재 교수법의 격차를 해소하기 위한 포괄적인 프레임워크를 제안한다.\n- 수학 교육의 접근성을 높이고, 학습자의 참여를 증대시키는 방법을 제시한다.\n\n# Contributions\n## Theoretical\nNGME는 수학 교육의 새로운 이론적 틀을 제공한다.\n\n## Methodological\nAI 기반 도구와 개인화된 접근법을 통한 새로운 연구 방법론을 제안한다.\n\n## Practical\n수학 교육을 혁신하기 위한 실질적인 정책과 제안을 제공한다.\n\n# Limitations\n- 연구의 구체적인 방법론과 데이터 유형이 명시되지 않음.\n- 샘플 크기와 연구 맥락에 대한 정보가 부족함.\n\n# Transferable Insights\n- AI와 인지 과학의 통합이 교육 혁신에 기여할 수 있는 가능성.\n- 개인화된 학습 경로가 학생의 참여와 이해도를 높일 수 있는 방법.\n\n# Idea Seeds\n1. AI 기반의 맞춤형 학습 도구 개발.\n2. 수학 교육에서의 인지 과학 적용 방안 연구.\n3. 문화적으로 반응하는 교수법의 효과 분석.\n\n# Citation Snippets\n>\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy", "link": "https://doi.org/10.53022/oarjst.2025.15.2.0142", "altLink": "https://openalex.org/W4417184890", "hasDoi": true, "hasReview": true, "authors": ["Suchitra Dey", "Akanksha Dubey"], "categories": ["Transformative learning", "Computer science", "Mathematics education", "Scope (computer science)", "Digital learning"]}, {"id": "3", "source": "OPENALEX", "score": 23, "day": "2025-11-01", "title": "Toward a Coherent AI Literacy Pathway in Technology Education: Bibliometric Synthesis and Cross-Sectional Assessment", "content": "---\ntitle: Toward a Coherent AI Literacy Pathway in Technology Education: Bibliometric Synthesis and Cross-Sectional Assessment\nauthors: [Denis Rupnik, Stanislav Avsec]\nyear: 2025\njournal: 명시되지 않음\ndoi: 명시되지 않음\nresearch_type: 명시되지 않음\nmethodology: Web of Science bibliometric analysis, cross-sectional field study\ndata_type: 명시되지 않음\nsample: 145명 (중등 기술 학생 77명, 고등 교육 예비 교사 68명)\ncontext: 기술 및 공학 교육\ntheoretical_framework: 네 가지 기둥 프레임워크 (기초 지식, 비판적 평가, 참여적 설계, 교육적 통합)\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 인공지능(AI)의 급속한 발전이 교육과 직업에 미치는 영향을 분석하고, 기술 및 공학 교육에서 일관된 AI 리터러시 경로의 필요성을 강조한다. 연구는 두 가지 주요 목표를 가지고 있으며, 첫째는 지배적인 주제와 지적 기초를 맵핑하고, 둘째는 중등 기술 학생과 예비 기술 및 공학 교사 간의 AI 리터러시를 비교하여 커리큘럼 설계에 기여하는 것이다. 연구 결과, 예비 교사가 중등 기술 학생보다 높은 점수를 기록했으며, 성별 효과가 나타났다. 연구는 데이터 관행, 윤리/거버넌스 및 인간-AI 설계를 강조하는 구조화된 성과 기반 커리큘럼의 필요성을 결론짓는다.\n\n# Research Logic\n## Problem\n기술 및 공학 교육에서 일관된 AI 리터러시 경로의 부재.\n## Theory\nAI 리터러시의 네 가지 기둥 프레임워크.\n## Design\nWeb of Science를 통한 문헌 분석 및 교차 단면 연구.\n## Findings\n예비 교사가 중등 기술 학생보다 AI 리터러시 점수가 높았으며, 성별에 따른 차이가 관찰됨.\n## Conclusion\n구조화된 커리큘럼이 필요하며, 성별 격차 해소를 위한 조치가 요구됨.\n\n# Key Findings\n- 예비 교사가 중등 기술 학생보다 AI 리터러시 점수가 높음 (p = 0.02).\n- 성별에 따른 효과가 나타남, 남성이 여성보다 높은 점수를 기록함 (p = 0.01).\n- 비판적 AI 리터러시 구성 요소는 그룹 간 차이가 없으나, 예비 교사는 지능 이해와 프로그래밍 가능성에서 유리함 (p = 0.002, p = 0.045).\n\n# Contributions\n## Theoretical\nAI 리터러시의 네 가지 기둥 프레임워크 제안.\n## Methodological\nWeb of Science 분석 및 교차 단면 연구 방법론 적용.\n## Practical\nAI 리터러시 교육을 위한 커리큘럼 설계에 대한 실질적인 지침 제공.\n\n# Limitations\n- 연구의 샘플 크기가 제한적임.\n- 특정 교육 맥락에 국한된 결과일 수 있음.\n\n# Transferable Insights\n- AI 리터러시 교육의 필요성과 그 구조화된 접근 방식의 중요성.\n- 성별 격차 해소를 위한 교육적 개입의 필요성.\n\n# Idea Seeds\n1. AI 리터러시 교육을 위한 모듈화된 커리큘럼 개발.\n2. 성별 격차 해소를 위한 맞춤형 교육 프로그램 설계.\n3. AI 윤리 교육을 포함한 통합적 교육 접근 방식 연구.\n\n# Citation Snippets\n>\n\ntags: #human-ai collaboration, #ai literacy, #teacher ai, #education, #learning analytics, #ai pedagogy, #curriculum\n\n---\n\n요약: 본 연구는 기술 및 공학 교육에서 AI 리터러시의 필요성을 강조하며, 예비 교사가 중등 기술 학생보다 높은 점수를 기록한 결과를 제시한다. 성별에 따른 차이도 관찰되었으며, 구조화된 커리큘럼의 필요성이 강조된다.", "link": "https://doi.org/10.3390/educsci15111455", "altLink": "https://openalex.org/W4415812837", "hasDoi": true, "hasReview": true, "authors": ["Denis Rupnik", "Stanislav Avsec"], "categories": ["Curriculum", "Mathematics education", "Literacy", "Citizen journalism", "Field (mathematics)"]}, {"id": "4", "source": "OPENALEX", "score": 22, "day": "2025-09-14", "title": "Technology-enhanced language teacher education: Opportunities, challenges, and futures", "content": "---\ntitle: Technology-enhanced language teacher education: Opportunities, challenges, and futures\nauthors: [Daniel Xerri, Jaber Kamali, Hassan Mohebbi]\nyear: 2025\njournal: 명시되지 않음\ndoi: https://openalex.org/W4414268660\nresearch_type: 편집 논문\nmethodology: 명시되지 않음\ndata_type: 명시되지 않음\nsample: 명시되지 않음\ncontext: 언어 교사 교육\ntheoretical_framework: 명시되지 않음\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n이 편집 논문은 기술 강화 언어 교사 교육에 관한 특별 호를 소개하며, 현재의 논의 상황을 정리하고 기회, 도전 과제 및 미래를 탐색한다. LTE에서 \"기술 GITAL NATIVES THROUGH TECHNOLOGY", "content": "This conceptual article reviews the evolution of instructional scaffolding alongside the rise of digital technologies in education. Drawing on Vygotsky’s sociocultural framework and early contributions from Wood, Bruner, and Ross, traditional scaffolding centred on direct teacher-learner interaction. The shift towards online, blended, and hybrid education models now requires rethinking scaffolding approaches to meet the learning styles of digital natives. Digital scaffolding employs technological tools to deliver structured, adaptive support, while maintaining principles of contingency, gradual withdrawal, and fostering learner autonomy. This paper applies models such as Technological Pedagogical Content Knowledge (TPACK), the Community of Inquiry (CoI), and self-regulated learning (SRL) to explore effective ways of designing digital scaffolding. It also discusses barriers such as digital inequality, cognitive overload, and learner over-reliance. Finally, the paper outlines future pathways involving artificial intelligence, augmented and virtual reality, gamification, and mobile learning, offering practical insights for creating inclusive and effective pedagogical support in digital environments.", "link": "https://doi.org/10.35631/ijmoe.726051", "altLink": "https://openalex.org/W4415689045", "hasDoi": true, "hasReview": false, "authors": ["K. Hussein", "Fariha Diyana Awang Ali", "Khairul Firdaus Ne’matullah"], "categories": ["Sociocultural evolution", "Scaffold", "Digital native", "Computer science", "Mobile device"]}, {"id": "6", "source": "OPENALEX", "score": 19, "day": "2026-01-28", "title": "The Role of ICT-Based Learning Media in Improving the Quality of Islamic Religious Education Learning: A Study on the Use of Artificial Intelligence at MAN 2 East Aceh", "content": "This study addresses the increasing necessity for madrasahs to modify teaching methodologies in accordance with the requirements of 21st-century education, while maintaining fundamental Islamic spiritual values. The objective is to analyze the implementation, pedagogical advantages, and obstacles of incorporating Information and Communication Technology (ICT) and Artificial Intelligence (AI)–based learning media in Akidah Akhlak education at Madrasah Aliyah Negeri (MAN) 2 Aceh Timur. Utilizing a qualitative field research design, data were collected through systematic observations, comprehensive interviews, and document analysis including the school principal, Akidah Akhlak educators, and tenth-grade students. The data analysis comprised steps of reduction, data presentation, and conclusion formulation, utilizing triangulation to guarantee validity and trustworthiness. The results demonstrate that the utilization of digital platforms like Google Classroom, YouTube, Canva, and Quizizz, in conjunction with AI-driven applications such as ChatGPT and Islamic educational platforms, markedly improved students' motivation for learning and their comprehension of Islamic beliefs and ethical principles. These technologies empowered educators to convert abstract theological notions into more visible, contextual, and interactive learning experiences. Nonetheless, the survey revealed other problems, such as inadequate technological infrastructure, unreliable internet connectivity, and disparate levels of digital proficiency among educators and learners. These limits were mitigated by institutional initiatives including ongoing training, mentorship programs, and incremental enhancement of infrastructure. The amalgamation of ICT and AI enhances students' digital literacy while simultaneously fortifying spiritual literacy, so establishing technology as a potent instrument for reinforcing the principles of ta‘l?m, ta’d?b, and tarbiyah in modern Islamic education.", "link": "https://doi.org/10.56806/jh.v6i4.392", "altLink": "https://openalex.org/W7125944230", "hasDoi": true, "hasReview": false, "authors": ["Ainul Mardhiah", "Zulkarnaini Zulkarnaini", "Lathifah Hanum"], "categories": ["Islam", "Quality (philosophy)", "Sociology", "Islamic education", "Digital literacy"]}, {"id": "7", "source": "OPENALEX", "score": 19, "day": "2026-01-25", "title": "The transformative power of artificial intelligence in science education: a pedagogical perspective", "content": "The rapid integration of artificial intelligence (AI) into education is reshaping science pedagogy in ways that remain insufficiently explored. While early implementations of AI in teaching show promise – particularly through intelligent tutoring systems, virtual laboratories, and adaptive learning tools – there is a critical gap in understanding how these technologies affect conceptual learning across specific science disciplines. This review identifies underexplored areas, including AI’s impact on science epistemology, equity challenges, and educators’ professional readiness. Drawing on recent literature, the paper provides discipline-specific analysis across chemistry, physics, and biology, highlighting pedagogical benefits, ethical complexities, and future research needs. To strengthen theoretical contributions, we present an original framework grounded in Vygotsky’s sociocultural learning theory and Technological Pedagogical Content Knowledge (TPACK), integrating AI as a mediational tool. This novel analytical perspective allows us to evaluate AI not just as content delivery but as a culturally situated educational artefact. Ultimately, we advocate for a human-centred, critically reflective framework that supports personalised, inquiry-based, and ethical science education.", "link": "https://doi.org/10.55056/seq.1013", "altLink": "https://openalex.org/W7127171491", "hasDoi": true, "hasReview": false, "authors": ["Pearl Iheoma Nweke", "Godwin Udourioh"], "categories": ["Transformative learning", "Engineering ethics", "Perspective (graphical)", "Sociology", "Sociocultural evolution"]}, {"id": "8", "source": "OPENALEX", "score": 19, "day": "2026-01-22", "title": "From Lecture Halls to Learning Clouds: The Digital Turn in Business and Management Education", "content": "The digital transformation of business and management education epitomizes a paradigm shift from traditional lecture-based pedagogies to technology-enabled, cloud-based, and data-informed learning ecosystems. Cloud computing, artificial intelligence (AI), learning management systems, and blended learning models now constitute the core infrastructure supporting flexible, scalable, and personalized learning environments. This study synthesizes contemporary research to explore the pedagogical, technological, and institutional shifts driving this digital turn, based on peer-reviewed evidence from leading scholarly publications between 2014 and 2025. Findings emphasize that cloud-enabled platforms substantially enhance accessibility, collaboration, and continuity of learning, while well-designed blended learning models enhance student engagement and academic performance. Furthermore, AI-driven analytics support adaptive instruction, early identification of at-risk learners, and data-informed academic interventions. However, the success of digital transformation depends on robust digital infrastructure, strategic institutional commitment, faculty readiness, and efforts to mitigate digital inequities that influence learner participation.", "link": "https://doi.org/10.36948/ijfmr.2026.v08i01.66865", "altLink": "https://openalex.org/W7125525626", "hasDoi": true, "hasReview": false, "authors": ["J Madegowda"], "categories": ["Digital transformation", "Blended learning", "Knowledge management", "Learning analytics", "Digital learning"]}, {"id": "9", "source": "OPENALEX", "score": 19, "day": "2025-10-01", "title": "FROM PLATFORMS TO PRACTICE: A SYSTEMATIC REVIEW OF LEARNING MANAGEMENT SYSTEM INTEGRATION IN VOCATIONAL TEACHING", "content": "This systematic literature review examines the integration of Learning Management Systems (LMS) in vocational education and training, a sector undergoing rapid digital transformation. Although LMS adoption is widespread, vocational contexts face challenges of pedagogical alignment, digital competence, and contextual adaptability. Following PRISMA guidelines, articles indexed in Scopus and Web of Science were systematically searched using keywords such as “Learning Management System”, “Digital Learning”, and “Vocational Education”. From 8,828 initial results, 51 high-quality studies were included for analysis. Thematic synthesis identified three core themes. First, LMS adoption, implementation, and user interaction highlighted institutional readiness, user perceptions, and infrastructural limitations. Second, LMS integration with interactive elements, hybrid learning, and instructional design emphasized pedagogical innovations, content personalization, and digital tools. Third, the role of learning analytics, AI, and adaptive pathways underscored data-informed practices and personalized learning. Findings suggest LMS can enhance vocational training through engagement and instructional delivery but challenges persist in usability, hands-on skill development, and teacher training. Effective deployment requires alignment of platform features with vocational pedagogy, supported by infrastructure and professional development. This review contributes a thematic framework, practical recommendations, and future research directions, emphasizing context-sensitive strategies and the potential of AI and analytics to optimize LMS in vocational education.", "link": "https://doi.org/10.35631/ijmoe.727001", "altLink": "https://openalex.org/W4416305135", "hasDoi": true, "hasReview": false, "authors": ["Magendran Munisamy", "Siti Zuraidah Md Osman", "Mageswaran Sanmugam"], "categories": ["Vocational education", "Learning Management", "Knowledge management", "Thematic analysis", "Learning analytics"]}];

  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
