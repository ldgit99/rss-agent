<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-03-04 23:29</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "ARXIV", "score": 23, "day": "2026-02-18", "title": "CreateAI Insights from an NSF Workshop on K12 Students, Teachers, and Families as Designers of Artificial Intelligence and Machine Learning Applications", "content": "---\ntitle: CreateAI Insights from an NSF Workshop on K12 Students, Teachers, and Families as Designers of Artificial Intelligence and Machine Learning Applications\nauthors: [Yasmin Kafai, José Ramón Lizárraga, R. Benjamin Shapiro]\nyear: 2026\njournal: 명시되지 않음\ndoi: https://arxiv.org/abs/2602.16894v1\nresearch_type: 워크숍 보고서\nmethodology: 패널 토론 및 워크숍\ndata_type: 질적 데이터\nsample: K-12 교육자, 연구자, 학습 과학자\ncontext: K-12 교육에서 인공지능 및 기계 학습 응용 프로그램의 통합\ntheoretical_framework: 기술 사회적 변화 대리인\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n이 보고서는 K-12 교육에서 인공지능(AI) 및 기계 학습(ML) 응용 프로그램의 통합을 다루며, 학생과 교사가 AI의 사용자뿐만 아니라 창작자로서의 역할을 수행할 수 있는 방법을 탐구한다. CreateAI 워크숍에서는 학생과 교사가 AI/ML 응용 프로그램을 설계하고 구축하는 데 필요한 도구, 기술 및 지식을 논의하였다. 이 보고서는 도구 설계, 학습, 윤리, 교수법 및 평가에 대한 주요 통찰과 권장 사항을 제시하며, 학생들이 AI를 비판적으로 이해하고 책임 있는 창작자로 성장할 수 있도록 지원하는 방안을 모색한다.\n\n# Research Logic\n## Problem\nK-12 교육에서 AI/ML의 사용이 증가하고 있지만, 학생과 교사가 AI의 창작자로서의 역할을 수행하는 데 필요한 지원이 부족하다.\n\n## Theory\n기술 사회적 변화 대리인 개념을 통해 학생들이 AI 시스템을 이해하고 재설계할 수 있는 능력을 배양하는 것이 중요하다.\n\n## Design\n워크숍은 패널 토론과 실습 세션으로 구성되어, 다양한 배경을 가진 참가자들이 AI/ML 응용 프로그램 설계에 대한 통찰을 공유하였다.\n\n## Findings\n학생과 교사가 AI/ML 응용 프로그램의 설계자 역할을 수행할 수 있도록 하는 도구, 윤리적 고려사항, 교수법 및 평가 방법에 대한 권장 사항이 도출되었다.\n\n## Conclusion\n학생과 교사가 AI의 창작자로서 참여할 수 있는 교육적 환경을 조성하기 위해서는 적절한 도구와 지원이 필요하다.\n\n# Key Findings\n- AI/ML 응용 프로그램 설계를 위한 도구는 접근성과 유연성을 고려해야 한다.\n- 윤리적 탐구를 교육 과정에 통합해야 한다.\n- 학생들을 공동 창작자 및 비평가로 위치시켜야 한다.\n\n# Contributions\n## Theoretical\nAI/ML 교육에서 학생과 교사의 창작자 역할을 강조하는 새로운 이론적 틀을 제시하였다.\n\n## Methodological\n워크숍을 통한 질적 데이터 수집 및 분석 방법론을 활용하였다.\n\n## Practical\nAI/ML 교육을 위한 도구 및 교수법에 대한 실질적인 권장 사항을 제공하였다.\n\n# Limitations\n- 연구는 특정 워크숍 참가자들에 의해 제한되었으며, 일반화 가능성이 낮다.\n- AI/ML 교육의 실제 적용 사례에 대한 데이터가 부족하다.\n\n# Transferable Insights\n- AI 교육에서 학생의 창작자 역할을 강조하는 접근 방식은 다른 교육 분야에도 적용 가능하다.\n- 윤리적 고려사항을 교육 과정에 통합하는 것이 중요하다.\n\n# Idea Seeds\n1. AI/ML 응용 프로그램 설계를 위한 교육 프로그램 개발.\n2. 학생들이 AI 시스템을 비판적으로 평가할 수 있는 도구 설계.\n3. 윤리적 탐구를 포함한 AI 교육 커리큘럼 개발.\n\n# Citation Snippets\n> Kafai, Y. B., Lizárraga, J. R., & Shapiro, R. B. (2025, October). CreateAI: Insights from an NSF Workshop on K–12 Students, Teachers, and Families as Designers of Artificial Intelligence and Machine Learning Applications. Philadelphia, PA: University of Pennsylvania.\n\ntags: #human-ai_collaboration, #classroom_ai, #ai_tutoring, #instructional_design, #scaffolding, #tpack, #ai_literacy, #teacher_ai, #education, #learning_analytics, #llm_classroom, #ai_pedagogy", "link": "https://arxiv.org/abs/2602.16894v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Yasmin Kafai", "José Ramón Lizárraga", "R. Benjamin Shapiro"], "categories": ["cs.CY", "cs.HC"]}, {"id": "1", "source": "ARXIV", "score": 19, "day": "2026-02-27", "title": "Empowering Future Cybersecurity Leaders: Advancing Students through FINDS Education for Digital Forensic Excellence", "content": "---\ntitle: Empowering Future Cybersecurity Leaders: Advancing Students through FINDS Education for Digital Forensic Excellence\nauthors: \n  - Yashas Hariprasad\n  - Subhash Gurappa\n  - Sundararaj S. Iyengar\n  - Jerry F. Miller\n  - Pronab Mohanty\n  - Naveen Kumar Chaudhary\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2603.00222v1\nresearch_type: 실증 연구\nmethodology: 감독 기계 학습, 통계 모델링\ndata_type: 다중 코호트 데이터셋\nsample: 3년간의 데이터 수집\ncontext: 디지털 포렌식 교육 및 사이버 보안 인력 개발\ntheoretical_framework: 다중 의존성 역량 구축 그래프\nkeywords: [디지털 포렌식, 사이버 보안, 역량 구축, 인공지능, 교육, 데이터 분석]\n---\n\n# APA 7th style\n\n# Summary\n이 논문은 미국 육군 연구소의 지원을 받아 디지털 포렌식 공학 교육을 발전시키기 위한 FINDS 연구 센터의 통합 연구 교육 프레임워크를 제시한다. FINDS는 고성능 컴퓨팅, 안전한 소프트웨어 공학, 적대적 분석 및 경험적 학습을 결합하여 사이버 및 합성 미디어 위협에 대응한다. 다중 의존성 역량 구축 기술 그래프(MCBSG)는 AI 기반 포렌식 프로그래밍, 통계적 추론, 디지털 증거 처리 및 위협 탐지 간의 역량 간 의존성을 인코딩하는 모델로, 기술 숙련도 및 연구 준비성을 평가하는 데 사용된다. 감독 기계 학습 방법을 통해 3년간의 통계적 평가가 이루어졌으며, 포렌식 프로그래밍 정확도 및 HPC 기반 조사 워크플로우에서 유의미한 향상이 관찰되었다.\n\n# Research Logic\n## Problem\n디지털 포렌식 및 사이버 보안 분야에서의 전문 인력 부족과 교육 접근성의 불균형 문제.\n## Theory\nAI 및 머신러닝 기법을 활용한 디지털 포렌식 교육의 필요성.\n## Design\nMCBSG를 기반으로 한 역량 구축 프레임워크 설계.\n## Findings\n3년간의 데이터 분석을 통해 포렌식 프로그래밍 정확도 및 적대적 추론에서 유의미한 향상 발견.\n## Conclusion\nMCBSG는 데이터 기반의 포괄적인 사이버 보안 교육을 위한 확장 가능하고 해석 가능한 프레임워크로 입증되었다.\n\n# Key Findings\n- MCBSG 모델이 기술 숙련도 및 연구 준비성의 주요 예측 변수를 식별하는 데 유용함.\n- 3년간의 통계적 평가에서 포렌식 프로그래밍 정확도가 유의미하게 향상됨.\n- AI 기반 교육 접근 방식이 디지털 포렌식 교육의 효과성을 높임.\n\n# Contributions\n## Theoretical\nAI 및 머신러닝 기법을 통합한 새로운 교육 프레임워크 제안.\n## Methodological\n다중 의존성 그래프를 활용한 역량 평가 방법론 개발.\n## Practical\n소외된 집단을 위한 고품질 교육 접근 경로 구축.\n\n# Limitations\n- 연구 샘플이 특정 지역에 국한되어 있어 일반화에 한계가 있음.\n- 데이터 수집 과정에서의 잠재적 편향 가능성.\n\n# Transferable Insights\n- AI 기반 교육 모델이 다양한 교육 환경에 적용 가능함.\n- 다중 의존성 그래프를 통한 역량 구축 접근 방식이 다른 분야에도 활용될 수 있음.\n\n# Idea Seeds\n1. AI 기반 디지털 포렌식 교육 프로그램 개발.\n2. 다양한 배경을 가진 학생들을 위한 멘토링 프로그램 구축.\n3. 글로벌 협력을 통한 사이버 보안 교육 네트워크 확장.\n\n# Citation Snippets\n> Hariprasad, Y., Gurappa, S., Iyengar, S. S., Miller, J. F., Mohanty, P., & Chaudhary, N. K. (2026). Empowering Future Cybersecurity Leaders: Advancing Students through FINDS Education for Digital Forensic Excellence. arXiv. https://arxiv.org/abs/2603.00222v1\n\ntags: #디지털포렌식, #사이버보안, #역량구축, #인공지능, #교육, #데이터분석, #AI교육", "link": "https://arxiv.org/abs/2603.00222v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Yashas Hariprasad", "Subhash Gurappa", "Sundararaj S. Iyengar"], "categories": ["cs.CR", "cs.AI"]}, {"id": "2", "source": "ARXIV", "score": 19, "day": "2026-02-23", "title": "Distance Learning and Multilingual Education: A Case Study of Challenges and Pedagogical Perspectives in the Greek Border Region", "content": "---\ntitle: 원거리 학습과 다국어 교육: 그리스 국경 지역의 도전과 교육적 관점에 대한 사례 연구\nauthors: Ariadni Mandala, Alexandros Gazis, Theodoros Vavouras\nyear: 2026\njournal: International Journal of Changes in Education\ndoi: 10.47852/bonviewIJCEXXXXXXXX\nresearch_type: 질적 연구\nmethodology: 반구조화 인터뷰\ndata_type: 질적 데이터\nsample: 그리스 에브로스 지역의 공립 및 사립 교육에서 일하는 외국어 교사 5명\ncontext: 그리스 에브로스 지역\ntheoretical_framework: 원거리 교육과 다국어 교육에 관한 문헌\nkeywords: [원거리 학습, 다국어 교육, 디지털 언어 교육, 언어 교사 인식, MOOCs, 기계 번역, 적응형 학습 플랫폼, 문화적 정체성]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 다문화 및 다언어 사회에서 외국어 학습의 중요성을 강조하며, 원거리 교육이 다국어 교육을 촉진하는 역할을 탐구한다. 그리스 에브로스 지역의 공립 및 사립 교육에서 일하는 외국어 교사 5명을 대상으로 반구조화 인터뷰를 실시하였다. 연구 결과, 교사들은 MOOCs, 기계 번역 애플리케이션, 적응형 학습 플랫폼과 같은 디지털 도구의 잠재력을 인식하였으나, 개인화된 피드백 부족, 제한된 상호작용, 문화적으로 맥락화된 콘텐츠의 부재에 대한 우려를 표명하였다. 디지털 리터러시와 교육적 훈련의 중요성이 강조되었으며, 국경 지역의 교육자들에게 맞춤형 지원과 지역에 적합한 디지털 자원의 필요성이 제기되었다.\n\n# Research Logic\n## Problem\n다문화 및 다언어 사회에서 외국어 학습의 필요성과 원거리 교육의 효과성 부족.\n## Theory\n원거리 교육과 다국어 교육의 상관관계에 대한 문헌 검토.\n## Design\n반구조화 인터뷰를 통한 질적 연구.\n## Findings\n디지털 도구의 잠재력 인식, 그러나 개인화된 피드백과 문화적 맥락의 부재에 대한 우려.\n## Conclusion\n국경 지역 교육자들을 위한 맞춤형 지원과 지역적 디지털 자원의 필요성.\n\n# Key Findings\n- 디지털 도구가 다국어 학습을 지원할 수 있는 잠재력이 있음.\n- 개인화된 피드백과 상호작용의 부족이 문제로 지적됨.\n- 문화적으로 맥락화된 콘텐츠의 필요성이 강조됨.\n\n# Contributions\n## Theoretical\n다국어 교육과 원거리 교육의 관계에 대한 새로운 통찰 제공.\n## Methodological\n반구조화 인터뷰를 통한 질적 데이터 수집 방법론의 적용.\n## Practical\n국경 지역 교육자들을 위한 맞춤형 디지털 자원 개발 필요성 제기.\n\n# Limitations\n- 샘플 크기가 작아 일반화에 한계가 있음.\n- 특정 지역에 국한된 연구로, 다른 지역에 대한 적용 가능성 부족.\n\n# Transferable Insights\n- 디지털 도구의 효과적인 활용을 위한 교육자 훈련 필요.\n- 문화적 맥락을 반영한 교육 자료 개발의 중요성.\n\n# Idea Seeds\n1. 국경 지역을 위한 맞춤형 디지털 교육 자원 개발.\n2. 원거리 교육의 상호작용성을 높이기 위한 플랫폼 개선 연구.\n3. 다국어 교육을 위한 교사 훈련 프로그램 개발.\n\n# Citation Snippets\n> Mandala, A., Gazis, A., & Vavouras, T. (2026). Distance Learning and Multilingual Education: A Case Study of Challenges and Pedagogical Perspectives in the Greek Border Region. International Journal of Changes in Education.\n\ntags: #원거리학습, #다국어교육, #디지털교육, #교육기술, #교사인식, #MOOCs, #기계번역, #적응형학습\n\n---\n\n요약: 본 연구는 그리스 에브로스 지역의 외국어 교사 5명을 대상으로 원거리 교육이 다국어 교육에 미치는 영향을 조사하였다. 교사들은 디지털 도구의 잠재력을 인정하면서도 개인화된 피드백과 문화적 맥락의 부족을 우려하였다. 연구는 국경 지역 교육자들에게 맞춤형 지원과 지역적 디지털 자원의 필요성을 강조하였다.", "link": "https://arxiv.org/abs/2603.00128v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Ariadni Mandala", "Alexandros Gazis", "Theodoros Vavouras"], "categories": ["cs.CY", "cs.HC"]}, {"id": "3", "source": "ARXIV", "score": 19, "day": "2026-02-23", "title": "PedaCo-Gen: Scaffolding Pedagogical Agency in Human-AI Collaborative Video Authoring", "content": "---\ntitle: PedaCo-Gen: Scaffolding Pedagogical Agency in Human-AI Collaborative Video Authoring\nauthors: [Injun Baek, Yearim Kim, Nojun Kwak]\nyear: 2026\njournal: Proceedings of Extended Abstracts of the CHI Conference on Human Factors in Computing Systems (CHI EA ’26)\ndoi: https://arxiv.org/abs/2602.19623v1\nresearch_type: 실험적 연구\nmethodology: 혼합 방법론\ndata_type: 정량적 및 정성적 데이터\nsample: 23명의 교육 전문가\ncontext: 교육 비디오 제작 및 AI 협업\ntheoretical_framework: Mayer의 멀티미디어 학습 인지 이론 (CTML)\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 PedaCo-Gen이라는 인간-AI 협업 비디오 생성 시스템을 소개하며, 이는 Mayer의 멀티미디어 학습 인지 이론(CTML)을 기반으로 한 교육 비디오 제작을 지원한다. 기존의 \"원샷\" 생성 방식에서 벗어나, PedaCo-Gen은 중간 표현(IR) 단계를 도입하여 교육자가 AI 리뷰어와 상호작용하며 비디오 청사진을 검토하고 수정할 수 있도록 한다. 23명의 교육 전문가를 대상으로 한 연구 결과, PedaCo-Gen은 다양한 주제와 CTML 원칙에 따라 비디오 품질을 유의미하게 향상시켰으며, 참가자들은 AI의 안내를 메타인지적 스캐폴드로 인식하고 높은 생산 효율성과 가이드 유효성을 보고하였다. 이러한 결과는 원칙에 기반한 공동 창작을 통해 교육적 주체성을 회복하는 것의 중요성을 강조하며, 향후 AI 저작 도구의 기초를 제공한다.\n\n# Research Logic\n## Problem\n기존의 T2V 생성 모델은 시각적 충실도에 최적화되어 있으며, 교육적 효율성이 결여되어 있다.\n## Theory\nMayer의 멀티미디어 학습 인지 이론(CTML)을 기반으로 하여 교육 비디오의 효과성을 높인다.\n## Design\nPedaCo-Gen은 중간 표현(IR) 단계를 포함한 인간-AI 협업 시스템으로 설계되었다.\n## Findings\nPedaCo-Gen은 비디오 품질을 유의미하게 향상시켰으며, 참가자들은 높은 생산 효율성(M=4.26)과 가이드 유효성(M=4.04)을 보고하였다.\n## Conclusion\nPedaCo-Gen은 교육자가 AI와 협력하여 교육적 주체성을 회복할 수 있도록 지원하는 시스템이다.\n\n# Key Findings\n- PedaCo-Gen은 비디오 품질을 유의미하게 향상시켰다.\n- 참가자들은 AI의 피드백을 메타인지적 스캐폴드로 인식하였다.\n- 생산 효율성(M=4.26)과 가이드 유효성(M=4.04)이 높게 평가되었다.\n\n# Contributions\n## Theoretical\nMayer의 CTML 원칙을 기반으로 한 교육 비디오 제작의 새로운 접근법을 제시하였다.\n## Methodological\n혼합 방법론을 통해 정량적 및 정성적 데이터를 수집하고 분석하였다.\n## Practical\n교육자가 AI와 협력하여 비디오 제작 과정에서의 주체성을 회복할 수 있는 도구를 제공하였다.\n\n# Limitations\n- 연구 샘플 크기가 작아 일반화에 한계가 있다.\n- T2V 모델의 텍스트 렌더링 정확도가 낮아 비디오 품질에 영향을 미쳤다.\n\n# Transferable Insights\n- AI와의 협업을 통해 교육적 주체성을 강화할 수 있는 가능성이 있다.\n- 교육 비디오 제작 과정에서의 메타인지적 피드백의 중요성을 강조한다.\n\n# Idea Seeds\n1. PedaCo-Gen의 기능을 확장하여 다양한 교육 콘텐츠 유형에 적용할 수 있는 가능성 탐색.\n2. AI의 피드백을 더욱 개인화하여 교육자의 필요에 맞춘 맞춤형 지원 제공.\n3. 교육 비디오 제작 과정에서의 사용자 경험을 개선하기 위한 인터페이스 디자인 연구.\n\n# Citation Snippets\n> Baek, I., Kim, Y., & Kwak, N. (2026). PedaCo-Gen: Scaffolding Pedagogical Agency in Human-AI Collaborative Video Authoring. In Proceedings of Extended Abstracts of the CHI Conference on Human Factors in Computing Systems (CHI EA ’26).\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #ai literacy, #education", "link": "https://arxiv.org/abs/2602.19623v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Injun Baek", "Yearim Kim", "Nojun Kwak"], "categories": ["cs.CV", "cs.AI", "cs.HC"]}, {"id": "4", "source": "ARXIV", "score": 19, "day": "2026-02-18", "title": "Generative AI Usage of University Students: Navigating Between Education and Business", "content": "---\ntitle: 대학생의 생성적 AI 사용: 교육과 비즈니스 간의 탐색\nauthors: Fabian Walke, Veronika Föller\nyear: 2026\njournal: 20th International Conference on Wirtschaftsinformatik\ndoi: https://arxiv.org/abs/2602.16307v1\nresearch_type: 질적 연구\nmethodology: 근거 이론 접근법\ndata_type: 인터뷰 데이터\nsample: 11명의 파트타임 학생\ncontext: 독일의 원거리 학습 대학\ntheoretical_framework: 근거 이론\nkeywords: [생성적 인공지능, 대학생, 교육, 비즈니스, 파트타임 학생, 학습 효율성, 윤리적 고려]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 전문 경력을 쌓고 있는 대학생의 생성적 인공지능(GenAI) 사용을 조사하였다. 기존 문헌은 파트타임 학생과 교육과 비즈니스 간의 GenAI 사용의 교차점에 대한 관심이 부족하였다. 본 연구는 근거 이론 접근법을 통해 파트타임 학생의 GenAI 사용 특성을 분석하였으며, 11명의 원거리 학습 대학 학생을 인터뷰하였다. 연구 결과, GenAI 사용에 영향을 미치는 세 가지 인과 조건과 네 가지 중재 조건, 그리고 전략이 확인되었다. GenAI는 생산성과 학습 성과를 크게 향상시킬 수 있지만, 윤리적 문제, 신뢰성, 학문적 부정행위의 위험에 대한 우려도 존재한다. 개발된 근거 모델은 교육과 비즈니스 간의 간극을 해소하고자 하는 교육자, 정책 입안자 및 GenAI 도구 개발자에게 유용한 통찰을 제공한다.\n\n# Research Logic\n## Problem\n대학생의 GenAI 사용에 대한 연구가 부족하며, 특히 파트타임 학생의 교육과 비즈니스 간의 교차점에서의 사용에 대한 이해가 필요하다.\n\n## Theory\n근거 이론을 통해 GenAI 사용의 특성을 탐구하고, 교육과 비즈니스 간의 관계를 이해하고자 한다.\n\n## Design\n11명의 파트타임 학생을 대상으로 한 질적 인터뷰를 통해 데이터를 수집하고 분석하였다.\n\n## Findings\nGenAI 사용에 영향을 미치는 인과 조건과 중재 조건이 확인되었으며, 윤리적 고려와 신뢰성 문제도 논의되었다.\n\n## Conclusion\nGenAI는 교육과 비즈니스에서 유용하지만, 그 사용에 따른 윤리적 문제와 신뢰성 문제를 해결해야 한다.\n\n# Key Findings\n- GenAI 사용은 교육과 비즈니스 간의 경계를 허물 수 있는 잠재력을 지닌다.\n- 사용자의 개인적 경험과 호기심이 GenAI 사용에 긍정적인 영향을 미친다.\n- GenAI의 신뢰성과 윤리적 고려가 사용에 중요한 제약 요소로 작용한다.\n\n# Contributions\n## Theoretical\nGenAI 사용에 대한 새로운 근거 모델을 개발하여 교육과 비즈니스 간의 관계를 명확히 하였다.\n\n## Methodological\n근거 이론 접근법을 통해 질적 연구의 방법론적 rigor를 강화하였다.\n\n## Practical\n교육자와 정책 입안자에게 GenAI 사용의 잠재력과 도전 과제를 이해하는 데 도움을 주는 통찰을 제공하였다.\n\n# Limitations\n- 연구 샘플이 제한적이며, 특정 대학에 국한되어 있다.\n- 질적 연구의 특성상 일반화 가능성이 제한적이다.\n\n# Transferable Insights\n- GenAI의 교육적 활용 가능성을 탐구할 수 있는 기초 자료를 제공한다.\n- 파트타임 학생의 시간 관리와 학습 효율성을 지원하는 방안을 모색할 수 있다.\n\n# Idea Seeds\n1. GenAI의 윤리적 사용을 위한 교육 프로그램 개발.\n2. 다양한 전공 분야에서의 GenAI 사용 사례 연구.\n3. GenAI 도구의 신뢰성을 높이기 위한 기술적 개선 방안 탐색.\n\n# Citation Snippets\n> Walke, F., & Föller, V. (2026). Generative AI Usage of University Students: Navigating Between Education and Business. 20th International Conference on Wirtschaftsinformatik.\n\ntags: #생성적AI, #대학생, #교육, #비즈니스, #파트타임학생, #학습효율성, #윤리적고려\n\n---\n\n요약: 본 연구는 대학생의 생성적 AI 사용을 조사하며, 특히 파트타임 학생의 교육과 비즈니스 간의 교차점에서의 사용을 분석하였다. 11명의 학생 인터뷰를 통해 GenAI 사용의 특성과 윤리적 문제를 논의하며, 교육자와 정책 입안자에게 유용한 통찰을 제공한다.", "link": "https://arxiv.org/abs/2602.16307v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Fabian Walke", "Veronika Föller"], "categories": ["cs.CY", "cs.AI", "cs.HC"]}, {"id": "5", "source": "ARXIV", "score": 19, "day": "2026-02-17", "title": "\"Everyone's using it, but no one is allowed to talk about it\": College Students' Experiences Navigating the Higher Education Environment in a Generative AI World", "content": "Higher education students are increasingly using generative AI in their academic work. However, existing institutional practices have not yet adapted to this shift. Through semi-structured interviews with 23 college students, our study examines the environmental and social factors that influence students' use of AI. Findings show that institutional pressure factors like deadlines, exam cycles, and grading lead students to engage with AI even when they think it undermines their learning. Social influences, particularly peer micro-communities, establish de-facto AI norms regardless of official AI policies. Campus-wide ``AI shame'' is prevalent, often pushing AI use underground. Current institutional AI policies are perceived as generic, inconsistent, and confusing, resulting in routine noncompliance. Additionally, students develop value-based self-regulation strategies, but environmental pressures create a gap between students' intentions and their behaviors. Our findings show student AI use to be a situated practice, and we discuss implications for institutions, instructors, and system tool designers to effectively support student learning with AI.", "link": "https://arxiv.org/abs/2602.17720v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Yue Fu", "Yifan Lin", "Yessica Wang"], "categories": ["cs.CY", "cs.AI"]}, {"id": "6", "source": "ARXIV", "score": 18, "day": "2026-02-24", "title": "A Generalized Apprenticeship Learning Framework for Capturing Evolving Student Pedagogical Strategies", "content": "Reinforcement Learning (RL) and Deep Reinforcement Learning (DRL) have advanced rapidly in recent years and have been successfully applied to e-learning environments like intelligent tutoring systems (ITSs). Despite great success, the broader application of DRL to educational technologies has been limited due to major challenges such as sample inefficiency and difficulty designing the reward function. In contrast, Apprenticeship Learning (AL) uses a few expert demonstrations to infer the expert's underlying reward functions and derive decision-making policies that generalize and replicate optimal behavior. In this work, we leverage a generalized AL framework, THEMES, to induce effective pedagogical policies by capturing the complexities of the expert student learning process, where multiple reward functions may dynamically evolve over time. We evaluate the effectiveness of THEMES against six state-of-the-art baselines, demonstrating its superior performance and highlighting its potential as a powerful alternative for inducing effective pedagogical policies and show that it can achieve high performance, with an AUC of 0.899 and a Jaccard of 0.653, using only 18 trajectories of a previous semester to predict student pedagogical decisions in a later semester.", "link": "https://arxiv.org/abs/2602.20527v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Md Mirajul Islam", "Xi Yang", "Adittya Soukarjya Saha"], "categories": ["cs.LG", "cs.AI"]}, {"id": "7", "source": "ARXIV", "score": 18, "day": "2026-02-19", "title": "StoryLensEdu: Personalized Learning Report Generation through Narrative-Driven Multi-Agent Systems", "content": "Personalized feedback plays an important role in self-regulated learning (SRL), helping students track progress and refine their strategies. However, current common solutions, such as text-based reports or learning analytics dashboards, often suffer from poor interpretability, monotonous presentation, and limited explainability. To overcome these challenges, we present StoryLensEdu, a narrative-driven multi-agent system that automatically generates intuitive, engaging, and interactive learning reports. StoryLensEdu integrates three agents: a Data Analyst that extracts data insights based on a learning objective centered structure, a Teacher that ensures educational relevance and offers actionable suggestions, and a Storyteller that organizes these insights using the Heroes Journey narrative framework. StoryLensEdu supports post-generation interactive question answering to improve explainability and user engagement. We conducted a formative study in a real high school and iteratively developed StoryLensEdu in collaboration with an e-learning team to inform our design. Evaluation with real users shows that StoryLensEdu enhances engagement and promotes a deeper understanding of the learning process.", "link": "https://arxiv.org/abs/2602.17067v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Leixian Shen", "Yan Luo", "Rui Sheng"], "categories": ["cs.HC"]}, {"id": "8", "source": "ARXIV", "score": 18, "day": "2026-02-18", "title": "Expanding the Scope of Computational Thinking in Artificial Intelligence for K-12 Education", "content": "The introduction of generative artificial intelligence applications to the public has led to heated discussions about its potential impacts and risks for K-12 education. One particular challenge has been to decide what students should learn about AI, and how this relates to computational thinking, which has served as an umbrella for promoting and introducing computing education in schools. In this paper, we situate in which ways we should expand computational thinking to include artificial intelligence and machine learning technologies. Furthermore, we discuss how these efforts can be informed by lessons learned from the last decade in designing instructional programs, integrating computing with other subjects, and addressing issues of algorithmic bias and justice in teaching computing in schools.", "link": "https://arxiv.org/abs/2602.16890v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Yasmin Kafai", "Shuchi Grover"], "categories": ["cs.CY", "cs.HC"]}, {"id": "9", "source": "ARXIV", "score": 18, "day": "2026-02-17", "title": "EduEVAL-DB: A Role-Based Dataset for Pedagogical Risk Evaluation in Educational Explanations", "content": "This work introduces EduEVAL-DB, a dataset based on teacher roles designed to support the evaluation and training of automatic pedagogical evaluators and AI tutors for instructional explanations. The dataset comprises 854 explanations corresponding to 139 questions from a curated subset of the ScienceQA benchmark, spanning science, language, and social science across K-12 grade levels. For each question, one human-teacher explanation is provided and six are generated by LLM-simulated teacher roles. These roles are inspired by instructional styles and shortcomings observed in real educational practice and are instantiated via prompt engineering. We further propose a pedagogical risk rubric aligned with established educational standards, operationalizing five complementary risk dimensions: factual correctness, explanatory depth and completeness, focus and relevance, student-level appropriateness, and ideological bias. All explanations are annotated with binary risk labels through a semi-automatic process with expert teacher review. Finally, we present preliminary validation experiments to assess the suitability of EduEVAL-DB for evaluation. We benchmark a state-of-the-art education-oriented model (Gemini 2.5 Pro) against a lightweight local Llama 3.1 8B model and examine whether supervised fine-tuning on EduEVAL-DB supports pedagogical risk detection using models deployable on consumer hardware.", "link": "https://arxiv.org/abs/2602.15531v2", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Javier Irigoyen", "Roberto Daza", "Aythami Morales"], "categories": ["cs.AI", "cs.DB"]}];

  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadCSV() {
  const headers = ['제목', '출처', '스코어', '리뷰여부', '링크'];
  const rows = filtered.map(p => [
    '"' + p.title.replace(/"/g, '""') + '"',
    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
