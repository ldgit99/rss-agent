<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-03-14 23:27</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "OPENALEX", "score": 35, "day": "2026-03-01", "title": "Reimagining Teacher Education in India: AI-Enabled Pedagogy, Assessment, and Human–AI Collaboration for 21st Century Classrooms", "content": "---\ntitle: 인도 교사 교육의 재구상: 21세기 교실을 위한 AI 기반 교수법, 평가 및 인간-AI 협력\nauthors: Pradip Dutta\nyear: 2026\njournal: ShodhPatra: International Journal of Science and Humanities\ndoi: https://doi.org/10.70558/SPIJSH.2026.v3.i3.45588\nresearch_type: 질적 연구\nmethodology: 문헌 종합 및 정책 분석\ndata_type: 문헌\nsample: 명시되지 않음\ncontext: 인도\ntheoretical_framework: TPACK 모델, 구성주의 학습 이론, 인간-AI 증강 이론\nkeywords: [AI 기반 교수법, 인간-AI 협력, 교사 AI 문해력, 윤리적 AI 거버넌스, 역량 기반 평가]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 인도의 교사 교육에서 인공지능(AI)의 통합 필요성을 강조하며, AI가 교육 기관에 미치는 영향을 분석한다. AI 기반 도구가 역량 기반 평가, 반성적 교수법 및 개인화된 학습을 촉진할 수 있는 잠재력을 탐구하며, AI가 교육자의 대체가 아닌 협력 파트너로 작용해야 함을 주장한다. 연구는 AI 통합 교사 교육 모델(AITEM)을 제안하며, 이는 AI 기반 교수법, 스마트 역량 기반 평가, 교사 AI 문해력 및 윤리적 인간 중심 거버넌스의 네 가지 기둥으로 구성된다. AI와 인간의 균형 잡힌 파트너십이 인도 교사 교육의 미래에 필수적임을 강조한다.\n\n# Research Logic\n## Problem\nAI의 급속한 발전에 따른 인도 교사 교육의 재구성이 필요하다.\n## Theory\nTPACK 모델과 구성주의 학습 이론을 기반으로 AI 통합의 필요성을 설명한다.\n## Design\n문헌 종합 및 정책 분석을 통한 질적 연구 설계.\n## Findings\nAI는 교육자의 전문성을 향상시키고, 개인화된 학습 경로를 제공하며, 윤리적 거버넌스를 통해 교육의 질을 높일 수 있다.\n## Conclusion\nAI와 인간의 협력적 관계가 교사 교육의 혁신을 이끌어낼 수 있다.\n\n# Key Findings\n- AI는 역량 기반 평가와 반성적 교수법을 촉진할 수 있는 잠재력을 지닌다.\n- AI는 교육자의 전문성을 대체하는 것이 아니라 보완하는 역할을 해야 한다.\n- AI 통합 교사 교육 모델(AITEM)은 네 가지 기둥으로 구성된다.\n\n# Contributions\n## Theoretical\nAI 통합 교육 모델에 대한 새로운 이론적 프레임워크를 제시한다.\n## Methodological\n질적 연구 방법론을 통해 AI 통합의 복잡성을 탐구한다.\n## Practical\n교사 교육 프로그램에 AI를 효과적으로 통합할 수 있는 실천적 지침을 제공한다.\n\n# Limitations\n- 연구는 문헌 종합에 의존하므로 실증적 데이터 부족.\n- 특정 지역적 맥락에 국한된 결과.\n\n# Transferable Insights\n- AI 통합 교육 모델은 다른 국가의 교사 교육에도 적용 가능하다.\n- AI와 인간의 협력적 접근 방식은 교육 혁신에 기여할 수 있다.\n\n# Idea Seeds\n1. AI 기반 교육 도구의 효과를 평가하기 위한 실증 연구 필요.\n2. 교사 AI 문해력 향상을 위한 교육 프로그램 개발.\n3. AI 윤리적 거버넌스 원칙을 교육 정책에 통합하는 방안 모색.\n\n# Citation Snippets\n> Dutta, P. (2026). Reimagining Teacher Education in India: AI-Enabled Pedagogy, Assessment, and Human–AI Collaboration for 21st Century Classrooms. ShodhPatra: International Journal of Science and Humanities.\n\ntags: #AI기반교수법, #인간AI협력, #교사AI문해력, #윤리적AIG거버넌스, #역량기반평가\n\n---\n\n요약: 본 연구는 인도의 교사 교육에서 AI의 통합 필요성을 강조하며, AI가 교육 기관에 미치는 영향을 분석한다. AI 기반 도구가 역량 기반 평가, 반성적 교수법 및 개인화된 학습을 촉진할 수 있는 잠재력을 탐구하며, AI가 교육자의 대체가 아닌 협력 파트너로 작용해야 함을 주장한다. AI 통합 교사 교육 모델(AITEM)을 제안하며, 이는 AI 기반 교수법, 스마트 역량 기반 평가, 교사 AI 문해력 및 윤리적 인간 중심 거버넌스의 네 가지 기둥으로 구성된다.", "link": "https://doi.org/10.70558/spijsh.2026.v3.i3.45588", "altLink": "https://openalex.org/W7135066583", "hasDoi": true, "hasReview": true, "authors": ["Pradip Dutta"], "categories": ["Pedagogy", "Sociology", "Teacher education", "Mathematics education", "Agency (philosophy)"]}, {"id": "1", "source": "OPENALEX", "score": 28, "day": "2026-01-13", "title": "Artificial Intelligence in the Classroom: Implications for Pedagogical Design and Student Agency in Secondary Education", "content": "---\ntitle: 인공지능과 교실: 중등 교육에서의 교수 설계 및 학생 주체성에 대한 함의\nauthors: [Li Mingfeng, Yong Wang]\nyear: 2026\njournal: 명시되지 않음\ndoi: https://doi.org/10.21203/rs.3.rs-8166344/v1\nresearch_type: 질적 연구\nmethodology: 사례 연구\ndata_type: 인터뷰, 관찰, 수업 계획 분석\nsample: 15명의 교사\ncontext: 중국 저장성의 중등학교\ntheoretical_framework: 명시되지 않음\nkeywords: [인공지능, 교수 설계, 학생 주체성, 중등 교육, 중국 교육 개혁]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 인공지능(AI) 기술이 중국 중등학교에서 교수 전략과 학생 주체성에 미치는 영향을 조사하였다. 저장성의 세 개 AI 파일럿 학교를 중심으로 진행된 질적 사례 연구로, 15명의 교사와의 반구조화 인터뷰, 비참여 관찰, 수업 계획 및 디지털 자료 분석을 통해 데이터를 수집하였다. 연구 결과, 교사들은 AI를 교육의 대체물이 아닌 협력적 동반자로 인식하였으며, AI 플랫폼은 자기 주도 학습을 촉진하였으나 자동화 편향과 알고리즘 피드백에 대한 과도한 의존에 대한 우려도 제기되었다. 학생의 자율성은 인지적 자유뿐만 아니라 정서적 편안함과 교실 내 관계를 포함하였다. 연구는 AI의 교육적 잠재력을 실현하기 위해 교수적 유창성, 제도적 정렬, 윤리적 통합의 중요성을 강조하였다.\n\n# Research Logic\n## Problem\nAI 기술의 교육적 함의가 중등학교 맥락에서 충분히 탐구되지 않음.\n## Theory\nAI가 교수 설계와 학생 주체성에 미치는 영향에 대한 이론적 틀 부족.\n## Design\n질적 사례 연구를 통해 교사와 학생의 경험을 분석.\n## Findings\nAI는 교수 전략을 변화시키고 학생의 자율성을 증진시키지만, 교육적 혁신에 대한 제약이 존재함.\n## Conclusion\nAI의 효과적인 통합을 위해서는 윤리적이고 맥락에 맞는 접근이 필요함.\n\n# Key Findings\n- AI는 교수 전략의 협력적 동반자로 작용함.\n- 학생의 자율성은 정서적 요소와 밀접하게 연관됨.\n- AI 사용에 따른 자동화 편향과 알고리즘 피드백에 대한 우려가 존재함.\n\n# Contributions\n## Theoretical\nAI와 교육의 관계에 대한 새로운 통찰 제공.\n## Methodological\n질적 연구 방법론을 통해 실제 교실에서의 AI 통합 사례를 분석.\n## Practical\n교사와 교육 정책 입안자에게 AI 통합에 대한 실질적인 통찰 제공.\n\n# Limitations\n- 연구 샘플이 제한적이며, 특정 지역에 국한됨.\n- AI의 장기적인 교육적 효과에 대한 평가 부족.\n\n# Transferable Insights\n- AI 통합 시 교수적 유창성과 윤리적 고려가 중요함.\n- 학생의 정서적 편안함을 고려한 AI 활용 필요.\n\n# Idea Seeds\n1. AI 기반의 맞춤형 피드백 시스템 개발.\n2. 교사와 학생 간의 관계를 강화하는 AI 도구 설계.\n3. AI 사용에 대한 교사 교육 프로그램 개발.\n\n# Citation Snippets\n> Li, M., & Wang, Y. (2026). Artificial Intelligence in the Classroom: Implications for Pedagogical Design and Student Agency in Secondary Education. \n\ntags: #인공지능, #교수설계, #학생주체성, #중등교육, #교육개혁, #질적연구, #AI교육\n\n---\n\n요약: 본 연구는 중국 중등학교에서 AI 기술이 교수 전략과 학생 주체성에 미치는 영향을 조사하였다. AI는 교수의 협력적 동반자로 작용하며, 학생의 자율성을 증진시키는 동시에 자동화 편향에 대한 우려도 존재한다. 연구는 AI 통합의 윤리적 접근과 교수적 유창성의 중요성을 강조한다.", "link": "https://doi.org/10.21203/rs.3.rs-8166344/v1", "altLink": "https://openalex.org/W7123469507", "hasDoi": true, "hasReview": true, "authors": ["Li Mingfeng", "Yong Wang"], "categories": ["Agency (philosophy)", "Autonomy", "Psychology", "Pedagogy", "Class (philosophy)"]}, {"id": "2", "source": "OPENALEX", "score": 26, "day": "2026-01-28", "title": "Technology-Integrated Problem-Based Learning in Mathematics Education: A Scoping Review of Technological Trajectories, Pedagogy, Learning, and Challenges", "content": "---\ntitle: Technology-Integrated Problem-Based Learning in Mathematics Education: A Scoping Review of Technological Trajectories, Pedagogy, Learning, and Challenges\nauthors: [Diether C Montejo, Chris R Buscay, Roland A Nasayao]\nyear: 2026\njournal: Davao Research Journal\ndoi: 10.59120/drj.v17i1.490\nresearch_type: Scoping Review\nmethodology: PRISMA Framework\ndata_type: 문헌\nsample: 50개 연구\ncontext: 수학 교육\ntheoretical_framework: 구성주의, 자기주도 학습, 변혁적 학습 이론\nkeywords: [디지털 격차, 생성적 AI, 수학 교육, 문제 기반 학습]\n---\n\n# APA 7th style\n\n# Summary\n기술 통합 문제 기반 학습(TI-PrBL)은 디지털 도구, 인공지능 및 실제 문제를 결합하여 수학 교육을 향상시키는 접근 방식으로 주목받고 있다. 본 스코핑 리뷰는 TI-PrBL의 교육적 기초, 학생의 문제 해결 능력에 미치는 영향, 그리고 구현 시 직면하는 도전 과제를 평가한다. 리뷰 결과, 기술 사용의 진화, TI-PrBL의 이론적 기초, 학생의 문제 해결 능력에 대한 긍정적 영향, 그리고 교사의 준비 부족 및 디지털 격차와 같은 도전 과제가 도출되었다. TI-PrBL은 실제 과제와의 정렬, 포괄적인 기술 접근, 그리고 혼합 교수 모델을 통해 수학적 문제 해결 능력을 향상시킬 수 있는 잠재력을 지닌 것으로 나타났다.\n\n# Research Logic\n## Problem\n기존의 수학 교육에서 학생들이 문제 해결 능력을 개발하는 데 어려움을 겪고 있으며, 디지털 도구의 통합이 필요하다.\n\n## Theory\nTI-PrBL은 구성주의, 자기주도 학습, 변혁적 학습 이론에 기반하여 학생의 높은 사고 능력과 자율성을 강화한다.\n\n## Design\nPRISMA 프레임워크를 사용하여 TI-PrBL 관련 연구를 체계적으로 식별하고 매핑하는 스코핑 리뷰 디자인을 채택하였다.\n\n## Findings\nTI-PrBL은 학생들이 더 깊은 개념적 이해와 유연한 전략을 개발하도록 돕고, 협력적 추론을 촉진하는 긍정적인 영향을 미친다.\n\n## Conclusion\nTI-PrBL은 포괄적인 기술 접근과 기관의 투자가 뒷받침될 때 수학적 문제 해결 능력을 향상시킬 수 있는 강력한 잠재력을 지닌다.\n\n# Key Findings\n- 기술 사용의 진화가 효율성을 강조하는 도구에서 탐구와 협력을 촉진하는 플랫폼으로 이동하고 있다.\n- TI-PrBL은 학생의 높은 사고 능력과 자율성을 강화하는 데 기여한다.\n- 교사의 준비 부족과 디지털 격차가 TI-PrBL의 지속 가능성과 포괄성에 대한 우려를 초래한다.\n\n# Contributions\n## Theoretical\nTI-PrBL의 이론적 기초를 명확히 하여 교육적 접근 방식을 강화한다.\n\n## Methodological\nPRISMA 프레임워크를 통해 TI-PrBL 연구의 체계적 검토를 제공한다.\n\n## Practical\nTI-PrBL의 효과적인 구현을 위한 실질적인 권장 사항을 제시한다.\n\n# Limitations\n- TI-PrBL의 효과에 대한 장기적인 연구가 부족하다.\n- 디지털 격차와 관련된 문제의 심각성을 충분히 다루지 못했다.\n\n# Transferable Insights\n- TI-PrBL은 다양한 교육 환경에서 적용 가능하다.\n- 기술 통합 교육의 필요성을 강조하며, 교사 연수의 중요성을 부각시킨다.\n\n# Idea Seeds\n1. TI-PrBL을 활용한 교사 연수 프로그램 개발.\n2. 디지털 도구를 활용한 문제 해결 능력 향상 연구.\n3. TI-PrBL의 효과를 평가하기 위한 장기 연구 설계.\n\n# Citation Snippets\n> Montejo, D. C., Buscay, C. R., & Nasayao, R. A. (2026). Technology-Integrated Problem-Based Learning in Mathematics Education: A Scoping Review of Technological Trajectories, Pedagogy, Learning, and Challenges. Davao Research Journal, 17(1), 30-43. https://doi.org/10.59120/drj.v17i1.490\n\ntags: #기술통합, #문제기반학습, #수학교육, #AI, #교육기술, #디지털격차, #교사연수\n\n---\n\n요약: 기술 통합 문제 기반 학습(TI-PrBL)은 수학 교육에서 디지털 도구와 인공지능을 활용하여 문제 해결 능력을 향상시키는 접근 방식이다. 본 연구는 TI-PrBL의 이론적 기초와 학생의 문제 해결 능력에 미치는 긍정적 영향을 평가하며, 교사의 준비 부족과 디지털 격차와 같은 도전 과제를 강조한다. TI-PrBL은 포괄적인 기술 접근과 기관의 지원을 통해 수학적 문제 해결 능력을 강화할 수 있는 잠재력을 지닌다.", "link": "https://doi.org/10.59120/drj.v17i1.490", "altLink": "https://openalex.org/W7127045272", "hasDoi": true, "hasReview": true, "authors": ["Diether C Montejo", "Chris R Buscay", "Roland A Nasayao"], "categories": ["Transformative learning", "Point (geometry)", "Computer science", "Key (lock)", "Generative grammar"]}, {"id": "3", "source": "OPENALEX", "score": 24, "day": "2025-12-07", "title": "Extending AI-TPACK: Reframing Teacher Readiness for the Generative-AI Era", "content": "---\ntitle: AI-TPACK 확장: 생성적 AI 시대를 위한 교사 준비 태세 재구성\nauthors: [Sunaina Sharma, Monther M. Elaish]\nyear: 2025\njournal: Journal of Educational Thought\ndoi: https://openalex.org/W7135035417\nresearch_type: 이론적 연구\nmethodology: 문헌 검토 및 이론적 확장\ndata_type: 명시되지 않음\nsample: 명시되지 않음\ncontext: K-12 교육\ntheoretical_framework: AI-TPACK\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 교육에서 인공지능(AI)의 증가하는 존재가 K-12 교사 교육에 미치는 기회와 도전을 다룬다. 생성적 AI(GenAI) 도구를 교실에 통합하기 위한 교사의 준비 태세가 중요해짐에 따라, AI-TPACK 프레임워크를 확장하여 프롬프트 리터러시, 윤리적 AI 참여, 교사-AI-학생 파트너십의 세 가지 새로운 차원을 도입하고 이들이 교사 준비 및 전문 학습에 미치는 함의를 검토한다. 연구는 준비 태세, 역량 개발, 제도적 대응에 대한 세 가지 질문을 통해 현재의 GenAI 통합 연구를 종합하고, 커리큘럼 설계, 교수진 개발 및 윤리적이고 공평한 준비를 통해 확장된 AI-TPACK 모델을 운영화하는 전략적 로드맵을 제안한다.\n\n# Research Logic\n## Problem\nK-12 교육에서 AI 통합의 필요성과 교사의 준비 부족 문제.\n## Theory\nAI-TPACK 프레임워크를 기반으로 한 새로운 차원의 교사 준비 태세 개념화.\n## Design\n문헌 검토 및 이론적 확장을 통한 새로운 차원 도입.\n## Findings\n교사의 준비 태세는 프롬프트 리터러시, 윤리적 AI 참여, 교사-AI-학생 파트너십을 포함해야 함.\n## Conclusion\n확장된 AI-TPACK 모델과 전략적 로드맵은 GenAI에 대한 교사의 준비 태세를 교육적 사고와 실천의 패러다임 전환으로 자리매김한다.\n\n# Key Findings\n- 교사의 준비 태세는 프롬프트 리터러시, 윤리적 AI 참여, 교사-AI-학생 파트너십을 포함해야 함.\n- GenAI 통합을 위한 교사의 역량 개발이 필요함.\n- 교육 프로그램에서 GenAI 중심의 준비가 필수적임.\n\n# Contributions\n## Theoretical\nAI-TPACK 프레임워크의 확장을 통해 교사 준비 태세의 새로운 차원 제시.\n## Methodological\n문헌 검토를 통한 이론적 기초 강화.\n## Practical\n교사 교육 프로그램에 GenAI 통합을 위한 전략적 로드맵 제안.\n\n# Limitations\n- 연구 샘플 및 데이터 유형이 명시되지 않음.\n- 실증적 연구가 부족함.\n\n# Transferable Insights\n- AI 통합을 위한 교사의 준비 태세는 다차원적 접근이 필요함.\n- 윤리적 AI 사용에 대한 교육이 필수적임.\n\n# Idea Seeds\n1. GenAI 통합을 위한 교사 교육 프로그램 개발.\n2. 프롬프트 리터러시 교육 자료 제작.\n3. 교사-AI-학생 파트너십 모델 연구.\n\n# Citation Snippets\n> Sharma, S., & Elaish, M. M. (2025). AI-TPACK 확장: 생성적 AI 시대를 위한 교사 준비 태세 재구성. Journal of Educational Thought, 58(2), 111-134.\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy\n\n---\n\n### 압축 요약\n본 연구는 K-12 교육에서 AI의 증가하는 역할과 교사의 준비 태세를 다룬다. AI-TPACK 프레임워크를 확장하여 프롬프트 리터러시, 윤리적 AI 참여, 교사-AI-학생 파트너십을 포함한 새로운 차원을 제안하고, 이를 통해 교사의 GenAI 통합 준비 태세를 재구성한다. 연구는 교사 교육 프로그램의 필요성을 강조하며, 전략적 로드맵을 제시한다.", "link": "https://doi.org/10.55016/82737", "altLink": "https://openalex.org/W7135035417", "hasDoi": true, "hasReview": true, "authors": ["Sunaina Sharma", "Monther M. Elaish"], "categories": ["Cognitive reframing", "Curriculum", "Scope (computer science)", "Generative grammar", "Engineering ethics"]}, {"id": "4", "source": "OPENALEX", "score": 23, "day": "2026-02-10", "title": "Generative AI as a partner for teachers in building personalised learning paths for students with ease in Tanzania", "content": "---\ntitle: Generative AI as a partner for teachers in building personalised learning paths for students with ease in Tanzania\nauthors: Juliana Kamaghe\nyear: 2026\njournal: 명시되지 않음\ndoi: 명시되지 않음\nresearch_type: 실증 연구\nmethodology: 사례 연구\ndata_type: 정량적 데이터\nsample: 120명의 다르에스살람 및 도도마 교사\ncontext: 탄자니아\ntheoretical_framework: 명시되지 않음\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 탄자니아의 중학교 교사들이 생성적 인공지능(AI)을 활용하여 학생들을 위한 개인화된 학습 경로를 보다 효율적이고 효과적으로 구축할 수 있는 방법을 조사하였다. 많은 교육자들이 과밀한 교실과 제한된 자원으로 인해 학생들의 다양한 요구를 충족하는 데 어려움을 겪고 있다. 이를 해결하기 위해 120명의 다르에스살람 및 도도마 교사가 ChatGPT와 Grok과 같은 AI 기반 도구를 시험하였다. 결과적으로 학생 참여도와 학업 성취도가 유의미하게 향상되었으며, 교사들의 업무 부담이 감소하였다. 교사들은 이러한 AI 도구가 직관적이고 유용하다고 평가하였으나, 특히 농촌 지역에서는 불충분한 훈련과 인프라가 여전히 큰 장애물로 작용하고 있다. 연구는 생성적 AI가 적절한 지원과 함께 교육과 학습을 향상시키기 위한 확장 가능하고 포괄적인 솔루션을 제공한다고 결론지었다.\n\n# Research Logic\n## Problem\n과밀한 교실과 제한된 자원으로 인해 학생들의 다양한 요구를 충족하기 어려움.\n## Theory\n명시되지 않음.\n## Design\n120명의 교사를 대상으로 AI 도구를 활용한 사례 연구.\n## Findings\n학생 참여도와 학업 성취도 향상, 교사 업무 부담 감소.\n## Conclusion\n생성적 AI는 교육적 잠재력을 실현하기 위한 전략적 투자 필요.\n\n# Key Findings\n- AI 도구 사용으로 학생 참여도와 학업 성취도가 유의미하게 향상됨.\n- 교사들은 AI 도구가 직관적이고 유용하다고 평가함.\n- 농촌 지역에서의 불충분한 훈련과 인프라가 장애물로 작용함.\n\n# Contributions\n## Theoretical\n생성적 AI의 교육적 활용에 대한 새로운 통찰 제공.\n## Methodological\n사례 연구를 통한 실증적 데이터 수집 및 분석.\n## Practical\n교사들에게 AI 도구를 활용한 개인화된 학습 경로 구축 방법 제시.\n\n# Limitations\n- 연구의 범위가 특정 지역(탄자니아)로 제한됨.\n- AI 도구의 장기적인 효과에 대한 데이터 부족.\n\n# Transferable Insights\n- 생성적 AI는 다양한 교육 환경에서 활용 가능성이 있음.\n- 교사 훈련과 디지털 인프라의 중요성 강조.\n\n# Idea Seeds\n1. 생성적 AI를 활용한 교사 훈련 프로그램 개발.\n2. 농촌 지역을 위한 맞춤형 AI 도구 설계.\n3. AI 도구의 장기적 효과를 평가하는 연구 진행.\n\n# Citation Snippets\n>\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy\n\n---\n\n요약: 본 연구는 탄자니아의 중학교 교사들이 생성적 AI를 활용하여 개인화된 학습 경로를 구축하는 방법을 조사하였다. 120명의 교사를 대상으로 한 연구에서 AI 도구 사용이 학생 참여도와 학업 성취도를 향상시키고 교사 업무 부담을 줄이는 데 기여함을 발견하였다. 그러나 농촌 지역의 인프라와 훈련 부족이 여전히 문제로 남아있다.", "link": "https://doi.org/10.25304/rlt.v34.3594", "altLink": "https://openalex.org/W7128474728", "hasDoi": true, "hasReview": true, "authors": ["Juliana Kamaghe"], "categories": ["Tanzania", "Generative grammar", "Computer science", "Equity (law)", "Generative model"]}, {"id": "5", "source": "OPENALEX", "score": 18, "day": "2026-03-13", "title": "ChatGPT in Secondary Education", "content": "The rapid advancement of generative artificial intelligence (AI) has created opportunities and challenges for secondary education, particularly in resource-constrained contexts. This study examines the integration of ChatGPT in classroom learning through a qualitative instrumental case study conducted in a public secondary school in Indonesia. Data were collected through semi-structured interviews, classroom observations, and focus group discussions involving students, teachers, and school leadership. The findings reveal that ChatGPT is primarily used in concept-driven subjects such as Economics, Indonesian Language, and English, while its application in Mathematics remains limited. Students reported that ChatGPT supports learning efficiency, facilitates conceptual understanding, and enhances confidence in completing academic tasks. However, challenges related to information accuracy, potential dependency, and uncritical use were also identified. Importantly, the study highlights the central role of teacher mediation in shaping responsible and reflective ChatGPT use, particularly through strategies such as verification of ChatGPT-generated content and guided explanation in students’ own words. Based on these findings, the study proposes a teacher-mediated and context-sensitive framework to support pedagogically grounded ChatGPT integration. The study contributes empirical evidence from a Global South context and offers transferable insights for the responsible pedagogical integration of ChatGPT in under-resourced secondary education settings.", "link": "https://doi.org/10.25159/1947-9417/20308", "altLink": "https://openalex.org/W7135208223", "hasDoi": true, "hasReview": false, "authors": ["Sanggam Pardede", "D. Farida Sinaga", "Stevani Simamora"], "categories": ["Mediation", "Context (archaeology)", "Secondary education", "Indonesian", "Focus group"]}, {"id": "6", "source": "OPENALEX", "score": 18, "day": "2026-03-11", "title": "Something Old, Something New: WebQuests and GenAI in Teacher Education", "content": "Generative artificial intelligence (GenAI) has rapidly emerged as a transformative educational technology, raising questions about how educators and pre-service teachers critically engage with AI-produced content. This case study investigates how WebQuests, a long-established, inquiry-based pedagogical model, can foster critical engagement with GenAI tools. Situated within an initial teacher education programme, a WebQuest, incorporating GenAI sources, was implemented with 24 pre-service language teachers, who engaged with curated resources alongside ChatGPT and Copilot to produce infographics for secondary school audiences. Data were collected through semi-structured interviews and were analysed using Braun and Clarke’s thematic analysis. Findings indicate that scaffolded engagement with GenAI encouraged participants to compare AI-generated outputs with trusted sources, critically evaluate accuracy and reliability, and reflect on integration into their future practice. Whilst pre-service teachers valued GenAI’s accessibility and efficiency, they expressed concerns about clarity, verbosity, and trustworthiness. The WebQuest model effectively supported synthesis of multiple information sources, fostering functional AI engagement and critical evaluation of its affordances and limitations. This case study concludes that integrating GenAI within structured, inquiry-based pedagogies advances digital and AI literacy in initial teacher education, whilst highlighting the need for institutional guidance, professional development, and further research in this area.", "link": "https://doi.org/10.3390/aieduc2010007", "altLink": "https://openalex.org/W7135023004", "hasDoi": true, "hasReview": false, "authors": ["Peter Tiernan", "Enda Donlon", "Mahmoud Hamash"], "categories": ["Transformative learning", "Affordance", "Pedagogy", "Teacher education", "Thematic analysis"]}, {"id": "7", "source": "OPENALEX", "score": 18, "day": "2026-03-01", "title": "A Polya-Aligned Prompting Protocol for ChatGPT Scaffolding: Evidence from Eighth-Grade Systems-of-Linear-Equations Problem Solving", "content": "Generative artificial intelligence offers new opportunities to scaffold students’ mathematical reasoning, yet rigorous evidence of its impact on secondary students’ problem-solving remains limited. This study examined whether ChatGPT-driven adaptive learning improves eighth-grade students’ problem-solving performance on systems of linear equations in two variables (SPLDV) compared with conventional instruction. A pre–post-test control-group design was implemented with 47 eighth-grade students in Parepare, Indonesia (experimental n = 24; control n = 23) during the 2024/2025 academic year. The experimental group used ChatGPT as an adaptive tutor aligned with Polya’s stages (understand, plan, execute, look back) through guided prompts, hints, and feedback. In contrast, the control group received a lecture and practice. Students completed a six-item contextual SPLDV test scored with a Polya-based rubric. Between-group differences were tested on post-test scores and normalized gains after verifying normality and homogeneity assumptions. The experimental group achieved higher post-test performance (M = 68.33) than the control group (M = 59.57), with a significant difference (p = 0.019; η² = 0.117). Learning gains were also larger in the experimental group (mean N-gain = 0.34, medium) than in the control group (0.21, low; p = 0.001; η² = 0.372). Indicator-level patterns suggested the greatest improvements in understanding the problem and carrying out the plan, whereas devising a plan remained the most challenging stage in both groups. These findings indicate that ChatGPT-based adaptive scaffolding can enhance students’ mathematical problem-solving on SPLDV, but explicit teacher-guided routines are needed to strengthen strategic planning and the critical evaluation of AI outputs.", "link": "https://doi.org/10.55151/ijeedu.v8i1.331", "altLink": "https://openalex.org/W7133125877", "hasDoi": true, "hasReview": false, "authors": ["Marwati Abd. Malik", "Ranak Lince", "Husnaeni Husnaeni"], "categories": ["Normality", "Computer science", "Artificial intelligence", "Group (periodic table)", "Protocol (science)"]}, {"id": "8", "source": "OPENALEX", "score": 18, "day": "2026-01-18", "title": "AI-enhanced Flipped CLIL Models for ESP Education: A Systematic Review in Tourism and Hospitality Contexts", "content": "This study presents a systematic review of empirical research examining the integration of Artificial Intelligence (AI), flipped classroom strategies, and Content and Language Integrated Learning (CLIL) in English for Specific Purposes (ESP) instruction, with a particular focus on tourism and hospitality contexts. Guided by the PRISMA 2020 guidelines and the PSALSAR framework, peer-reviewed journal articles published between 2016 and 2024 were systematically identified, screened, and synthesized from major academic databases. A total of 18 empirical studies met the inclusion criteria and were included in the final analysis. The findings indicate that ESP instruction grounded in needs-based pedagogy is most effectively supported when AI, flipped learning, and CLIL operate as complementary pedagogical components. AI primarily functions as a pedagogical enabler by supporting personalization, formative feedback, and learner autonomy, while flipped classroom strategies restructure learning activities toward interactive and task-based engagement. CLIL further facilitates the integration of language development with domain-specific knowledge essential for professional communication. Notably, the synthesis suggests that these approaches collectively form an instructional ecology, in which instructional relevance, learning activities, and technological support are interdependently aligned. Despite promising outcomes, the review reveals a limited number of studies that holistically integrate all four dimensions. This study, therefore, provides a consolidated pedagogical perspective and identifies directions for future research on AI-enhanced flipped CLIL models in ESP education. This review contributes by conceptualizing AI-enhanced flipped CLIL in ESP education as an instructional ecology, in which Artificial Intelligence, flipped classroom pedagogy, and CLIL function as interdependent pedagogical mechanisms rather than isolated techniques.", "link": "https://doi.org/10.5539/hes.v16n1p234", "altLink": "https://openalex.org/W7124762491", "hasDoi": true, "hasReview": false, "authors": ["Weerapa Pongpanich", "Thada Jantakoon", "Rukthin Laoha"], "categories": ["Flipped classroom", "Inclusion (mineral)", "Formative assessment", "Pedagogy", "Empirical research"]}, {"id": "9", "source": "OPENALEX", "score": 18, "day": "2026-01-01", "title": "Chemistry Education and Artificial Intelligence (AI) In the 21st Century Nigeria: Prospects, Challenges, and the Way Forward. A Review Article", "content": "Nigeria stands at a crossroad in modernizing science education. Chemistry, an essential gateway to Science, Technology, Engineering, and Mathematics (STEM) careers continues to show uneven student outcomes, while artificial intelligence (AI) technologies are rapidly changing how Science is taught and learned worldwide. Artificial intelligence (AI) is increasingly recognized as a transformative force in global science education. In Nigerian school chemistry, AI can support conceptual understanding, foster inclusive education, improve evaluation processes, enhance practical competencies, improve instructional efficiency, bridge regional disparities, and expand access to laboratory-like experiences despite infrastructural constraints, digital literacy gaps, data privacy, and security concerns, lack of regulatory framework for integrating AI in Nigerian educational system, and socio-cultural challenges. In addition, the contextualization of AI to align with Nigeria’s diverse linguistics, cultural, and pedagogical needs are challenges that need to be addressed. This paper adopts a conceptual and narrative review approach, synthesizing national educational policy, peer-reviewed research, and global Artificial Intelligence in Education (AIED) evidence to address the research problem. The article synthesizes contemporary evidence and policy documents to map the prospects of deploying AI to strengthen chemistry teaching and learning in Nigeria, identify systemic challenges (infrastructure, teacher capacity, assessment integrity, equity, and ethics), and propose a pragmatic, evidence-informed recommendations for implementation. The review covers conceptual foundations, pedagogical applications, National Digital Learning Policy (NDLP), advantages of AI in chemistry education, some AI tools in chemistry education, international systematic reviews of AI in education, challenges, country-specific analyses of AI readiness, and systemic recommendations, targeted at policymakers, teacher educators, school leaders, and donor/industry partners. The paper argues that while national interest in AI-enabled teaching is rising, sustained policy support, improved infrastructure, teacher professional development linked to curricular aims, scalable blended AI tools for simulations and formative assessment, governance for data privacy, assessment validity, and inclusion are paramount. Limitations and avenues for research are also identified.", "link": "https://doi.org/10.47772/ijriss.2025.91200097", "altLink": "https://openalex.org/W7118184494", "hasDoi": true, "hasReview": false, "authors": ["Terngu Paul Ugosor", "Asemave Kaana", "Winifred Umbur Ukpoko"], "categories": ["Transformative learning", "Contextualization", "Engineering ethics", "Artificial intelligence", "Chemistry"]}];

function setSource(btn) {
  currentSource = btn.dataset.source;
  document.querySelectorAll('#sourceFilters .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSort(btn) {
  currentSort = btn.dataset.sort;
  document.querySelectorAll('#sortGroup .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  render();
}

function toggleFavorite(id, e) {
  e.stopPropagation();
  const idx = favorites.indexOf(id);
  if (idx === -1) {
    favorites.push(id);
  } else {
    favorites.splice(idx, 1);
  }
  localStorage.setItem('favorites', JSON.stringify(favorites));
  applyFilters();
}

function recordVisit(id) {
  if (!visited.includes(id)) {
    visited.push(id);
  }
  localStorage.setItem('visited', JSON.stringify(visited));
}

function recordSearch(query) {
  if (query.trim() && !searchHistory.includes(query)) {
    searchHistory.unshift(query);
    if (searchHistory.length > 10) searchHistory.pop();
    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
  }
}

function downloadJSON() {
  const data = JSON.stringify(filtered, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadCSV() {
  const headers = ['제목', '출처', '스코어', '리뷰여부', '링크'];
  const rows = filtered.map(p => [
    '"' + p.title.replace(/"/g, '""') + '"',
    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
