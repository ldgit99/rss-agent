<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-04-19 23:34</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "OPENALEX", "score": 16, "day": "2026-04-17", "title": "Responsible AI Integration in STEM Higher Education: Advancing Sustainable Development Goals", "content": "---\ntitle: Responsible AI Integration in STEM Higher Education: Advancing Sustainable Development Goals\nauthors: Adel R. Althubyani\nyear: 2026\njournal: Sustainability\ndoi: https://doi.org/10.3390/su18084005\nresearch_type: 혼합 방법 연구\nmethodology: 설명적 순차 혼합 방법 설계\ndata_type: 양적 및 질적 데이터\nsample: 324명의 STEM 대학 교수 및 12명의 전문가\ncontext: 사우디 아라비아의 STEM 고등 교육\ntheoretical_framework: 명시되지 않음\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n이 연구는 사우디 아라비아의 STEM 대학 교수들이 지속 가능한 개발 목표 4(양질의 교육)를 촉진하기 위해 인공지능(AI) 도구를 어떻게 통합하는지를 조사하였다. 연구는 설명적 순차 혼합 방법 설계를 사용하여 진행되었으며, 324명의 교수에게 설문조사를 실시하고 12명의 전문가와 반구조화된 인터뷰를 통해 질적 데이터를 수집하였다. 주요 양적 결과는 AI 통합이 중간 수준(평균 2.71, 표준편차 0.36)으로 나타났으며, 평가에서 가장 높은 통합 수준(평균 2.93)을 보였다. 교수들은 AI 도구 통합에 대해 긍정적인 인식을 보였으나, 과도한 사용이 학생의 고차원적 사고 능력에 미치는 영향에 대한 우려도 나타났다. 연구는 AI 도구 통합의 장벽으로 디지털 인프라의 약점, 전문성 개발 부족, AI 생성 콘텐츠의 신뢰성 부족, 윤리적 문제 등을 지적하였다.\n\n# Research Logic\n## Problem\nAI 도구의 통합이 교육의 질에 미치는 영향과 그에 따른 윤리적 고려사항.\n## Theory\nAI 통합의 교육적 가치와 교수의 인식.\n## Design\n설명적 순차 혼합 방법 설계를 통해 양적 및 질적 데이터를 수집.\n## Findings\nAI 통합 수준은 중간이며, 교수들은 긍정적인 인식을 보였으나 윤리적 우려가 존재.\n## Conclusion\n지속 가능한 디지털 환경 구축을 위한 인프라 개선 및 전문성 개발 필요.\n\n# Key Findings\n- AI 통합 수준은 평균 2.71로 중간 수준.\n- 교수들의 AI 도구에 대한 인식은 평균 4.00으로 높음.\n- AI 도구의 과도한 사용이 학생의 사고 능력에 미치는 부정적 영향에 대한 우려 존재.\n\n# Contributions\n## Theoretical\nAI 통합의 교육적 가치에 대한 새로운 통찰 제공.\n## Methodological\n혼합 방법 연구 설계를 통한 데이터 수집의 다양성 확보.\n## Practical\nAI 도구 통합을 위한 정책 및 인프라 개선 방안 제시.\n\n# Limitations\n- 연구 샘플이 사우디 아라비아에 국한됨.\n- AI 도구 통합의 장벽에 대한 심층적 분석 부족.\n\n# Transferable Insights\n- AI 도구 통합 시 교수의 인식이 중요한 요소임.\n- 지속 가능한 교육 환경을 위한 정책적 접근 필요.\n\n# Idea Seeds\n1. AI 도구 사용에 대한 교수의 전문성 개발 프로그램 설계.\n2. AI 통합의 윤리적 고려사항에 대한 교육 자료 개발.\n3. 디지털 인프라 개선을 위한 정책 제안.\n\n# Citation Snippets\n> Althubyani, A. R. (2026). Responsible AI Integration in STEM Higher Education: Advancing Sustainable Development Goals. Sustainability, 18(8), 4005. https://doi.org/10.3390/su18084005\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy\n\n---\n\n짧은 요약: 이 연구는 사우디 아라비아의 STEM 대학 교수들이 AI 도구를 통합하는 방식을 조사하였다. 연구 결과, AI 통합 수준은 중간이며 교수들은 긍정적인 인식을 보였으나 윤리적 우려도 존재하였다. 지속 가능한 교육 환경을 위한 정책적 접근이 필요하다는 결론을 도출하였다.", "link": "https://doi.org/10.3390/su18084005", "altLink": "https://openalex.org/W7154710428", "hasDoi": true, "hasReview": true, "authors": ["Adel R. Althubyani"], "categories": ["Transformative learning", "Scope (computer science)", "Knowledge management", "Sustainable development", "Psychology"]}, {"id": "1", "source": "ARXIV", "score": 6, "day": "2026-04-13", "title": "Towards Designing for Resilience: Community-Centered Deployment of an AI Business Planning Tool in a Small Business Center", "content": "---\ntitle: 회복력을 위한 설계: 소규모 비즈니스 센터에서의 AI 비즈니스 계획 도구의 커뮤니티 중심 배포\nauthors: [Quentin Romero Lauro, Aakash Gautam, Yasmine Kotturi]\nyear: 2026\njournal: CHI '26\ndoi: https://doi.org/10.1145/3772318.3791654\nresearch_type: 실증 연구\nmethodology: 로그 데이터 분석 및 반구조화 인터뷰\ndata_type: 정량적 및 정성적 데이터\nsample: 30명의 기업가 (로그 데이터 N=30, 인터뷰 N=10)\ncontext: 피츠버그의 페미니스트 메이커스페이스\ntheoretical_framework: 회복력 및 AI 리터러시\nkeywords: [소규모 비즈니스, 기업가 정신, 비즈니스 계획, 생성적 AI, 회복력]\n---\n\n# APA 7th style\n\n# Summary\n자원 제약이 있는 커뮤니티의 기업가들은 종종 아이디어를 실행 가능한 비즈니스 계획으로 전환하는 데 필요한 시간과 지원이 부족하다. 생성적 AI는 도움을 줄 수 있지만, 대부분의 시스템은 높은 디지털 리터러시를 가정하고 채택을 형성하는 커뮤니티 인프라를 간과한다. 본 연구는 피츠버그의 페미니스트 메이커스페이스에서 네 차례의 워크숍을 통해 도입된 AI 기반 비즈니스 계획 도구인 BizChat의 커뮤니티 중심 설계 및 배포를 보고한다. 로그 데이터(N=30)와 인터뷰(N=10)를 통해 기업가들이 AI 리터러시 개발을 통해 회복력을 구축하는 방식을 조사하였다. BizChat은 아이디어를 \"비즈니스 언어\"로 번역하여 자본 접근 장벽을 낮추었지만, 즉각적인 AI 출력이 계획에 필수적인 의미 형성을 저해할 수 있다는 질문을 제기하였다. 동료 지원이 기업가들이 이러한 긴장을 탐색하는 데 어떻게 도움이 되었는지를 보여준다.\n\n# Research Logic\n## Problem\n자원 제약이 있는 커뮤니티의 기업가들이 비즈니스 계획을 작성하는 데 필요한 지원 부족.\n## Theory\n회복력과 AI 리터러시의 상호작용을 통해 기업가들이 기술 변화에 적응하는 방식.\n## Design\nBizChat 도구를 커뮤니티 중심의 워크숍을 통해 배포하고, 기업가들이 AI를 활용하여 비즈니스 계획을 작성하도록 지원.\n## Findings\nBizChat은 자본 접근 장벽을 낮추었으나, 즉각적인 AI 출력이 의미 형성을 저해할 수 있다는 긴장을 드러냄.\n## Conclusion\n기업가들은 동료 지원을 통해 AI 도구의 사용을 탐색하며, 회복력을 구축하는 데 기여함.\n\n# Key Findings\n- BizChat은 기업가들이 비즈니스 계획을 작성하는 데 있어 자본 접근 장벽을 낮춤.\n- 즉각적인 AI 출력이 의미 형성을 저해할 수 있다는 우려가 제기됨.\n- 동료 지원이 기업가들이 AI 도구를 효과적으로 활용하는 데 중요한 역할을 함.\n\n# Contributions\n## Theoretical\n회복력과 AI 리터러시의 관계를 탐구하며, 기술 변화에 대한 집단적 적응의 중요성을 강조.\n## Methodological\n로그 데이터와 인터뷰를 통해 실증적 통찰을 제공하고, 회복력의 개념을 기술 채택에 적용.\n## Practical\nAI 시스템의 설계 및 배포에 대한 실용적인 함의를 제시, 특히 자원 제약이 있는 커뮤니티에서의 적용 가능성.\n\n# Limitations\n- 연구 샘플이 제한적이며, 특정 지역에 국한됨.\n- AI 도구의 장기적인 효과에 대한 평가가 부족함.\n\n# Transferable Insights\n- 회복력은 기술 변화에 대한 집단적 대응을 통해 강화될 수 있음.\n- AI 리터러시는 기업가들이 기술을 평가하고 활용하는 데 필수적임.\n\n# Idea Seeds\n1. AI 도구의 사용자 친화성을 높이기 위한 추가적인 디자인 개선.\n2. 커뮤니티 기반의 지속적인 지원 시스템 구축.\n3. 다양한 산업에 맞춘 AI 리터러시 교육 프로그램 개발.\n\n# Citation Snippets\n> Lauro, Q. R., Gautam, A., & Kotturi, Y. (2026). Towards Designing for Resilience: Community-Centered Deployment of an AI Business Planning Tool in a Small Business Center. In Proceedings of the 2026 CHI Conference on Human Factors in Computing Systems (CHI ’26), April 13–17, 2026, Barcelona, Spain. ACM, New York, NY, USA.\n\ntags: #소규모비즈니스, #기업가정신, #비즈니스계획, #생성적AI, #회복력, #AI리터러시, #기술변화\n\n---\n\n요약: 본 연구는 자원 제약이 있는 커뮤니티의 기업가들이 AI 기반 비즈니스 계획 도구인 BizChat을 통해 회복력을 구축하는 방식을 조사하였다. 연구 결과, BizChat은 자본 접근 장벽을 낮추었으나, 즉각적인 AI 출력이 의미 형성을 저해할 수 있다는 우려가 제기되었다. 동료 지원이 기업가들이 AI 도구를 효과적으로 활용하는 데 중요한 역할을 한다는 점이 강조되었다.", "link": "https://arxiv.org/abs/2604.10883v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Quentin Romero Lauro", "Aakash Gautam", "Yasmine Kotturi"], "categories": ["cs.HC"]}, {"id": "2", "source": "ARXIV", "score": 6, "day": "2026-04-12", "title": "Generating Multiple-Choice Knowledge Questions with Interpretable Difficulty Estimation using Knowledge Graphs and Large Language Models", "content": "---\ntitle: Generating Multiple-Choice Knowledge Questions with Interpretable Difficulty Estimation using Knowledge Graphs and Large Language Models\nauthors: Mehmet Can Şakiroğlu, H. Altay Güvenir, Kamer Kaya\nyear: 2026\njournal: 명시되지 않음\ndoi: https://arxiv.org/abs/2604.10748v1\nresearch_type: 실험적 연구\nmethodology: 지식 그래프와 대형 언어 모델을 활용한 MCQ 생성 방법론\ndata_type: MCQ 데이터셋\nsample: 38명의 독립적인 인간 평가자에 의해 평가된 MCQ\ncontext: AI 지원 교육에서의 자동화된 MCQ 생성\ntheoretical_framework: 지식 그래프, 대형 언어 모델, 데이터 기반 난이도 추정\nkeywords: [multiple-choice question generation, difficulty estimation, interpretability, knowledge graph, large language models]\n---\n\n# APA 7th style\n\n# Summary\n이 연구는 입력 문서에서 지식 그래프(KG)와 대형 언어 모델(LLM)을 활용하여 난이도 추정이 가능한 객관식 질문(MCQ)을 생성하는 새로운 방법론을 제안한다. 제안된 방법은 LLM을 사용하여 KG를 구성하고, 이를 기반으로 MCQ를 체계적으로 생성한다. 각 MCQ는 KG에서 키 노드를 선택하고 관련 트리플 또는 퀸튜플을 샘플링하여 LLM에 의해 질문의 본문이 생성된다. 또한, 각 MCQ에 대해 아홉 가지 난이도 신호를 계산하고 이를 데이터 기반 접근 방식으로 통합하여 통합 난이도 점수를 생성한다. 실험 결과, 제안된 방법이 고품질의 MCQ를 생성하며, 난이도 추정이 해석 가능하고 인간의 인식과 일치함을 보여준다.\n\n# Research Logic\n## Problem\n자동화된 MCQ 생성 시스템에서 난이도 추정이 어려움.\n## Theory\n지식 그래프와 대형 언어 모델의 통합을 통한 MCQ 생성.\n## Design\nLLM을 사용하여 KG를 구축하고, 이를 기반으로 MCQ를 생성.\n## Findings\n제안된 방법이 해석 가능한 난이도 추정을 제공하며, 고품질 MCQ를 생성함.\n## Conclusion\n지식 그래프와 LLM의 통합이 MCQ 생성의 효율성과 품질을 향상시킴.\n\n# Key Findings\n- 지식 그래프와 LLM을 활용한 MCQ 생성 방법론 제안.\n- 아홉 가지 난이도 신호를 통해 해석 가능한 난이도 추정 제공.\n- 실험 결과, 생성된 MCQ의 난이도가 인간의 인식과 일치함.\n\n# Contributions\n## Theoretical\n지식 그래프와 LLM의 통합을 통한 새로운 MCQ 생성 이론 제안.\n## Methodological\n데이터 기반 난이도 추정 모델을 통한 MCQ 생성 방법론 개발.\n## Practical\n지능형 튜터링 시스템 및 적응형 테스트 플랫폼에 적용 가능.\n\n# Limitations\n- 데이터셋의 크기와 다양성이 제한적일 수 있음.\n- 난이도 추정의 정확성은 인간 평가자에 의존함.\n\n# Transferable Insights\n- 지식 그래프와 LLM의 결합이 교육 기술에 미치는 영향.\n- 자동화된 평가 시스템에서의 난이도 추정의 중요성.\n\n# Idea Seeds\n1. 다양한 교육 분야에 적용 가능한 MCQ 생성 시스템 개발.\n2. 난이도 추정의 정확성을 높이기 위한 추가 데이터 수집.\n3. 다른 언어 및 문화적 맥락에서의 MCQ 생성 연구.\n\n# Citation Snippets\n> Şakiroğlu, M. C., Güvenir, H. A., & Kaya, K. (2026). Generating Multiple-Choice Knowledge Questions with Interpretable Difficulty Estimation using Knowledge Graphs and Large Language Models. arXiv:2604.10748v1.\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy\n\n---\n\n요약: 이 연구는 지식 그래프와 대형 언어 모델을 활용하여 난이도 추정이 가능한 객관식 질문을 생성하는 방법론을 제안한다. 실험 결과, 제안된 방법이 고품질의 MCQ를 생성하며, 난이도 추정이 해석 가능하고 인간의 인식과 일치함을 보여준다.", "link": "https://arxiv.org/abs/2604.10748v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Mehmet Can Şakiroğlu", "H. Altay Güvenir", "Kamer Kaya"], "categories": ["cs.CL", "cs.AI", "cs.LG"]}, {"id": "3", "source": "ARXIV", "score": 6, "day": "2026-04-11", "title": "From GPT-3 to GPT-5: Mapping their capabilities, scope, limitations, and consequences", "content": "---\ntitle: From GPT-3 to GPT-5: Mapping their capabilities, scope, limitations, and consequences\nauthors: [Hina Afridi, Habib Ullah, Sultan Daud Khan, Mohib Ullah]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2604.10332v1\nresearch_type: 비교 연구\nmethodology: 문헌 분석\ndata_type: 기술 보고서, 시스템 카드, API 및 모델 문서, 제품 발표, 출시 노트, 동료 검토된 2차 연구\nsample: 명시되지 않음\ncontext: GPT 모델의 발전 및 기술적 진화\ntheoretical_framework: 명시되지 않음\nkeywords: [GPT, 대형 언어 모델, 기초 모델, 최전선 모델, 다중 모달성, 정렬, AI 거버넌스]\n---\n\n# APA 7th style\n\n# Summary\n이 연구는 GPT 모델의 발전을 GPT-3부터 GPT-5까지 비교 분석한다. 연구는 기술적 프레임, 사용자 상호작용, 배포 아키텍처 및 거버넌스 관점에서의 진화를 다룬다. 주요 주제는 기술적 발전, 능력 변화, 배포 변화, 지속적인 한계 및 하류 결과이다. 후속 GPT 세대는 단순히 더 크거나 정확한 언어 모델로 해석되어서는 안 되며, 도구 지향적이고 다중 모달 시스템으로의 진화를 보여준다. 여러 세대에 걸쳐 환각, 프롬프트 민감도, 벤치마크 취약성 등의 한계는 여전히 존재한다. 연구는 GPT-3에서 GPT-5로의 전환이 모델 능력의 향상뿐만 아니라 배포 가능한 AI 시스템의 재구성을 포함한다고 결론짓는다.\n\n# Research Logic\n## Problem\nGPT 모델의 기술적 진화와 그에 따른 사회적, 경제적 영향.\n## Theory\n모델 간 비교의 복잡성과 AI 시스템의 배포 및 평가 방식의 변화.\n## Design\n기술 보고서, 시스템 카드, API 문서 등 다양한 자료를 통한 문헌 분석.\n## Findings\nGPT 모델은 단순한 텍스트 예측기를 넘어 다중 모달, 도구 지향 시스템으로 발전하였다.\n## Conclusion\nGPT-3에서 GPT-5로의 전환은 모델 능력의 향상뿐만 아니라 AI 시스템의 본질적 재구성을 의미한다.\n\n# Key Findings\n- GPT 모델은 기술적 진화와 함께 다중 모달 시스템으로 발전하였다.\n- 여러 세대에 걸쳐 지속적인 한계가 존재하며, 이는 AI 시스템의 신뢰성에 영향을 미친다.\n- GPT-5는 더 이상 단순한 언어 모델이 아닌, 복잡한 작업을 수행할 수 있는 시스템으로 자리잡았다.\n\n# Contributions\n## Theoretical\nAI 시스템의 정의와 평가 방식에 대한 새로운 관점을 제공한다.\n## Methodological\n다양한 자료를 통한 비교 연구 방법론을 제시한다.\n## Practical\n교육 및 소프트웨어 개발 분야에서의 AI 활용 방안을 제시한다.\n\n# Limitations\n- 문서화의 불균형으로 인해 일부 세대의 비교가 어려움.\n- 특정 기술적 세부사항이 공개되지 않아 완전한 이해가 제한됨.\n\n# Transferable Insights\n- AI 시스템의 발전이 사회적 및 경제적 구조에 미치는 영향.\n- 다중 모달 시스템의 설계 및 구현에 대한 통찰.\n\n# Idea Seeds\n1. AI 모델의 투명성을 높이기 위한 새로운 거버넌스 모델 개발.\n2. 교육 분야에서 AI 도구의 효과적인 활용 방안 연구.\n3. 다중 모달 AI 시스템의 사용자 경험 개선 방안 탐색.\n\n# Citation Snippets\n> Afridi, H., Ullah, H., Khan, S. D., & Ullah, M. (2026). From GPT-3 to GPT-5: Mapping their capabilities, scope, limitations, and consequences. arXiv. https://arxiv.org/abs/2604.10332v1\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy\n\n---\n\n요약: 이 연구는 GPT 모델의 발전을 비교 분석하며, 기술적 진화와 사회적 영향을 다룬다. GPT-3에서 GPT-5로의 전환은 단순한 모델 능력 향상을 넘어 AI 시스템의 본질적 재구성을 포함한다. 연구는 다양한 자료를 통해 AI 시스템의 복잡성과 지속적인 한계를 강조한다.", "link": "https://arxiv.org/abs/2604.10332v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Hina Afridi", "Habib Ullah", "Sultan Daud Khan"], "categories": ["cs.AI"]}, {"id": "4", "source": "ARXIV", "score": 6, "day": "2026-04-11", "title": "AI Achieves a Perfect LSAT Score", "content": "---\ntitle: AI Achieves a Perfect LSAT Score\nauthors: Bonmu Ku\nyear: 2026\njournal: cs.AI\ndoi: https://arxiv.org/abs/2604.10034v1\nresearch_type: 실험적 연구\nmethodology: 통제된 실험\ndata_type: LSAT 문제\nsample: 8개의 추론 모델\ncontext: LSAT 시험의 공식 문제\ntheoretical_framework: 인지 과학, 기계 학습\nkeywords: [human-ai collaboration, ai tutoring, instructional design, ai literacy, education]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 언어 모델이 공식적으로 발표된 법학대학원 입학시험(LSAT)에서 완벽한 점수를 기록한 최초의 사례를 보고한다. 8개의 추론 모델에 대한 통제된 실험을 통해 프롬프트 변경, 답변 선택지 섞기, 여러 응답 샘플링이 성능에 미치는 영향이 미미함을 확인하였다. 그러나 모델이 답변하기 전에 생성하는 사고 단계를 제거하면 정확도가 최대 8% 감소하며, 이는 주로 논리적 추론에서 두드러진다. 정제된 모델은 동일한 형식으로 전체 사고 흔적을 생성하지만 성능은 한계에 도달하지 못한다. 공식 LSAT 설명을 기반으로 QLoRA를 통해 미세 조정된 프로세스 보상 모델은 Best-of-5 선택을 통해 이 격차를 줄이며, 다시 논리적 추론에서 주로 성과를 보인다. LSAT는 1948년부터 엘리트 법학 교육의 관문 역할을 해왔으며, 이제는 인간의 인지 능력에만 국한되지 않는 인지 능력의 상한선이 드러났다.\n\n# Research Logic\n## Problem\n언어 모델의 추론 능력을 평가하는 데 있어 LSAT의 기준이 적절한가?\n## Theory\n언어 모델의 사고 과정을 분석하여 성능을 향상시킬 수 있는 방법을 모색한다.\n## Design\n8개의 추론 모델을 대상으로 통제된 실험을 실시하여 다양한 조건에서 성능을 비교한다.\n## Findings\n모델의 사고 단계를 제거하면 성능이 감소하며, 정제된 모델은 성능이 한계에 도달하지 못한다.\n## Conclusion\n언어 모델이 LSAT에서 완벽한 점수를 기록할 수 있는 가능성이 있음을 보여준다.\n\n# Key Findings\n- 언어 모델이 LSAT에서 완벽한 점수를 기록한 최초의 사례.\n- 사고 단계를 제거하면 최대 8%의 정확도 감소.\n- Best-of-5 선택을 통한 성능 향상.\n\n# Contributions\n## Theoretical\n언어 모델의 사고 과정이 성능에 미치는 영향을 규명.\n## Methodological\n통제된 실험을 통해 다양한 추론 모델의 성능을 비교하는 새로운 방법론 제시.\n## Practical\n법학 교육 및 AI 기반 교육 도구 개발에 대한 실질적인 통찰 제공.\n\n# Limitations\n- 연구에 사용된 모델의 수가 제한적임.\n- LSAT 문제의 특정 유형에만 초점을 맞춤.\n\n# Transferable Insights\n- AI 모델의 사고 과정을 이해하는 것이 성능 향상에 기여할 수 있음.\n- 교육 분야에서 AI의 활용 가능성을 탐색할 수 있는 기초 자료 제공.\n\n# Idea Seeds\n1. AI 모델의 사고 과정을 교육적 맥락에 적용하는 방법 연구.\n2. 다양한 유형의 시험에서 AI 모델의 성능을 비교하는 연구.\n3. AI 기반 교육 도구의 설계 및 개발을 위한 프레임워크 구축.\n\n# Citation Snippets\n> Ku, B. (2026). AI Achieves a Perfect LSAT Score. cs.AI. https://arxiv.org/abs/2604.10034v1\n\ntags: #human-ai collaboration, #ai tutoring, #instructional design, #ai literacy, #education, #learning analytics, #ai pedagogy\n\n---\n\n요약: 본 연구는 언어 모델이 LSAT에서 완벽한 점수를 기록한 최초의 사례를 보고하며, 사고 단계를 제거할 경우 성능이 감소함을 확인하였다. 이 연구는 AI 모델의 사고 과정을 이해하고 교육적 맥락에서 활용할 수 있는 가능성을 제시한다.", "link": "https://arxiv.org/abs/2604.10034v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Bonmu Ku"], "categories": ["cs.AI"]}, {"id": "5", "source": "ARXIV", "score": 6, "day": "2026-04-11", "title": "CoSToM:Causal-oriented Steering for Intrinsic Theory-of-Mind Alignment in Large Language Models", "content": "Theory of Mind (ToM), the ability to attribute mental states to others, is a hallmark of social intelligence. While large language models (LLMs) demonstrate promising performance on standard ToM benchmarks, we observe that they often fail to generalize to complex task-specific scenarios, relying heavily on prompt scaffolding to mimic reasoning. The critical misalignment between the internal knowledge and external behavior raises a fundamental question: Do LLMs truly possess intrinsic cognition, and can they externalize this internal knowledge into stable, high-quality behaviors? To answer this, we introduce CoSToM (Causal-oriented Steering for ToM alignment), a framework that transitions from mechanistic interpretation to active intervention. First, we employ causal tracing to map the internal distribution of ToM features, empirically uncovering the internal layers' characteristics in encoding fundamental ToM semantics. Building on this insight, we implement a lightweight alignment framework via targeted activation steering within these ToM-critical layers. Experiments demonstrate that CoSToM significantly enhances human-like social reasoning capabilities and downstream dialogue quality.", "link": "https://arxiv.org/abs/2604.10031v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Mengfan Li", "Xuanhua Shi", "Yang Deng"], "categories": ["cs.CL", "cs.AI"]}, {"id": "6", "source": "ARXIV", "score": 6, "day": "2026-04-10", "title": "Spoiler Alert: Narrative Forecasting as a Metric for Tension in LLM Storytelling", "content": "LLMs have so far failed both to generate consistently compelling stories and to recognize this failure--on the leading creative-writing benchmark (EQ-Bench), LLM judges rank zero-shot AI stories above New Yorker short stories, a gold standard for literary fiction. We argue that existing rubrics overlook a key dimension of compelling human stories: narrative tension. We introduce the 100-Endings metric, which walks through a story sentence by sentence: at each position, a model predicts how the story will end 100 times given only the text so far, and we measure tension as how often predictions fail to match the ground truth. Beyond the mismatch rate, the sentence-level curve yields complementary statistics, such as inflection rate, a geometric measure of how frequently the curve reverses direction, tracking twists and revelations. Unlike rubric-based judges, 100-Endings correctly ranks New Yorker stories far above LLM outputs. Grounded in narratological principles, we design a story-generation pipeline using structural constraints, including analysis of story templates, idea formulation, and narrative scaffolding. Our pipeline significantly increases narrative tension as measured by the 100-Endings metric, while maintaining performance on the EQ-Bench leaderboard.", "link": "https://arxiv.org/abs/2604.09854v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Peiqi Sui", "Yutong Zhu", "Tianyi Cheng"], "categories": ["cs.CL"]}, {"id": "7", "source": "ARXIV", "score": 6, "day": "2026-04-09", "title": "Figures as Interfaces: Toward LLM-Native Artifacts for Scientific Discovery", "content": "Large language models (LLMs) are transforming scientific workflows, not only through their generative capabilities but also through their emerging ability to use tools, reason about data, and coordinate complex analytical tasks. Yet in most human-AI collaborations, the primary outputs, figures, are still treated as static visual summaries: once rendered, they are handled by both humans and multimodal LLMs as images to be re-interpreted from pixels or captions. The emergent capabilities of LLMs open an opportunity to fundamentally rethink this paradigm. In this paper, we introduce the concept of LLM-native figures: data-driven artifacts that are simultaneously human-legible and machine-addressable. Unlike traditional plots, each artifact embeds complete provenance: the data subset, analytical operations and code, and visualization specification used to generate it. As a result, an LLM can \"see through\" the figure--tracing selections back to their sources, generating code to extend analyses, and orchestrating new visualizations through natural-language instructions or direct manipulation. We implement this concept through a hybrid language-visual interface that integrates LLM agents with a bidirectional mapping between figures and underlying data. Using the science of science domain as a testbed, we demonstrate that LLM-native figures can accelerate discovery, improve reproducibility, and make reasoning transparent across agents and users. More broadly, this work establishes a general framework for embedding provenance, interactivity, and explainability into the artifacts of modern research, redefining the figure not as an end product, but as an interface for discovery. For more details, please refer to the demo video available at www.llm-native-figure.com.", "link": "https://arxiv.org/abs/2604.08491v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Yifang Wang", "Rui Sheng", "Erzhuo Shao"], "categories": ["cs.HC"]}, {"id": "8", "source": "ARXIV", "score": 6, "day": "2026-04-08", "title": "Dynamic Context Evolution for Scalable Synthetic Data Generation", "content": "Large language models produce repetitive output when prompted independently across many batches, a phenomenon we term cross-batch mode collapse: the progressive loss of output diversity when a language model is prompted repeatedly without access to its prior generations. Practitioners have long mitigated this with ad hoc deduplication and seed rotation, but no principled framework exists. We introduce Dynamic Context Evolution (DCE), comprising three mechanisms: (1) verbalized tail sampling (the model labels each idea with a guess about how obvious it is, and obvious ideas are discarded), which filters high-probability candidates via model self-assessment; (2) semantic memory, which maintains a persistent embedding index to reject near-duplicates across batches; and (3) adaptive prompt evolution, which reconstructs the generation prompt each batch using memory state and rotating diversity strategies. In experiments across three domains (sustainable packaging concepts, educational exam questions, and creative writing prompts) and two model families (gpt-5-mini and claude-haiku-4-5), a component ablation across 2-3 random seeds per method shows that DCE achieves 0.0 +/- 0.0% collapse versus 5.6 +/- 2.0% for naive prompting, while producing 17-18 HDBSCAN clusters per seed versus naive's volatile 2-17, indicating reliably richer conceptual structure. These results are validated with an independent embedding model (all-MiniLM-L6-v2) and hold across sensitivity sweeps of the VTS threshold tau and dedup threshold delta. Deduplication and prompt evolution are individually insufficient but jointly effective, at approximately $0.50 per 1,000 candidates using only standard API calls, with no fine-tuning or custom architectures required.", "link": "https://arxiv.org/abs/2604.07147v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Ryan Lingo", "Rajeev Chhajer"], "categories": ["cs.CL", "cs.AI", "cs.LG"]}, {"id": "9", "source": "ARXIV", "score": 6, "day": "2026-04-07", "title": "Towards Resilient Intrusion Detection in CubeSats: Challenges, TinyML Solutions, and Future Directions", "content": "CubeSats have revolutionized access to space by providing affordable and accessible platforms for research and education. However, their reliance on Commercial Off-The-Shelf (COTS) components and open-source software has introduced significant cybersecurity vulnerabilities. Ensuring the cybersecurity of CubeSats is vital as they play increasingly important roles in space missions. Traditional security measures, such as intrusion detection systems (IDS), are impractical for CubeSats due to resource constraints and unique operational environments. This paper provides an in-depth review of current cybersecurity practices for CubeSats, highlighting limitations and identifying gaps in existing methods. Additionally, it explores non-cyber anomaly detection techniques that offer insights into adaptable algorithms and deployment strategies suitable for CubeSat constraints. Open research problems are identified, including the need for resource-efficient intrusion detection mechanisms, evaluation of IDS solutions under realistic mission scenarios, development of autonomous response systems, and creation of cybersecurity frameworks. The addition of TinyML into CubeSat systems is explored as a promising solution to address these challenges, offering resource-efficient, real-time intrusion detection capabilities. Future research directions are proposed, such as integrating cybersecurity with health monitoring systems, and fostering collaboration between cybersecurity researchers and space domain experts.", "link": "https://arxiv.org/abs/2604.06411v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Yasamin Fayyaz", "Li Yang", "Khalil El-Khatib"], "categories": ["cs.CR", "cs.AI", "cs.GL", "cs.LG"]}];

  if (query.trim() && !searchHistory.includes(query)) {
    searchHistory.unshift(query);
    if (searchHistory.length > 10) searchHistory.pop();
    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
  }
}

function downloadJSON() {
  const data = JSON.stringify(filtered, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadCSV() {
  const headers = ['제목', '출처', '스코어', '리뷰여부', '링크'];
  const rows = filtered.map(p => [
    '"' + p.title.replace(/"/g, '""') + '"',
    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
