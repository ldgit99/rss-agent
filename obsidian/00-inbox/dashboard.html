<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-03-27 23:31</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "ARXIV", "score": 23, "day": "2026-03-25", "title": "Representation Learning to Study Temporal Dynamics in Tutorial Scaffolding", "content": "---\ntitle: Representation Learning to Study Temporal Dynamics in Tutorial Scaffolding\nauthors: [Conrad Borchers, Jiayi Zhang, Ashish Gurung]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2603.24535v1\nresearch_type: 실증 연구\nmethodology: 혼합 효과 모델\ndata_type: 대화 데이터\nsample: 1,576개의 수학 튜터링 대화\ncontext: 원격 튜터링 및 대화형 AI 시스템\ntheoretical_framework: 의미적 정렬 이론\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n이 연구는 적응형 스캐폴딩이 학습을 향상시키는 방법을 탐구하며, 실제 튜터링 대화에서 이를 측정하기 위한 강력한 방법이 부족하다는 문제를 제기한다. 저자들은 대화 턴, 문제 진술 및 정답 간의 의미적 정렬을 분석하는 임베딩 기반 접근 방식을 소개한다. 1,576개의 실제 수학 튜터링 대화를 분석한 결과, 역할별 의미적 정렬이 튜터링 진행을 예측할 수 있음을 발견하였다. 튜터는 초기 상호작용에서 문제 내용에 더 강하게 정렬되었으며, 학생의 정답 정렬은 진행과 긍정적인 상관관계를 보였다. 이 연구는 스캐폴딩을 지속적이고 역할 민감적인 과정으로 이해하는 데 기여한다.\n\n# Research Logic\n## Problem\n적응형 스캐폴딩의 효과적인 측정 방법 부족.\n## Theory\n대화 턴 간의 의미적 정렬이 스캐폴딩의 동적 조정을 설명할 수 있음.\n## Design\n임베딩 기반 접근 방식을 사용하여 대화의 의미적 정렬을 분석.\n## Findings\n튜터와 학생의 역할에 따라 의미적 정렬이 다르며, 이는 튜터링 진행을 예측함.\n## Conclusion\n스캐폴딩은 지속적이고 역할에 민감한 과정으로, 대화의 의미적 정렬을 통해 분석할 수 있음.\n\n# Key Findings\n- 튜터의 기여는 문제 내용에 강하게 정렬됨.\n- 학생의 정답 정렬은 진행과 긍정적인 상관관계를 보임.\n- 의미적 정렬이 튜터링 진행을 예측할 수 있음.\n\n# Contributions\n## Theoretical\n스캐폴딩의 의미적 정렬 개념을 제안.\n## Methodological\n임베딩 기반 유사성을 통한 역할별 및 시간적 패턴 분석 방법 제시.\n## Practical\n대화형 튜터링 시스템의 평가를 위한 원칙적 방법 제공.\n\n# Limitations\n- 연구는 특정 데이터셋에 국한됨.\n- 대화의 맥락적 요소를 충분히 고려하지 않음.\n\n# Transferable Insights\n- 의미적 정렬을 통한 스캐폴딩 분석 방법은 다양한 교육적 맥락에 적용 가능.\n- 대화형 AI 시스템의 설계에 있어 역할별 상호작용의 중요성을 강조.\n\n# Idea Seeds\n1. 다양한 과목에 대한 스캐폴딩 분석 확장.\n2. 다른 대화형 AI 시스템과의 비교 연구.\n3. 스캐폴딩의 시간적 변화에 대한 장기적 연구.\n\n# Citation Snippets\n> Borchers, C., Zhang, J., & Gurung, A. (2026). Representation Learning to Study Temporal Dynamics in Tutorial Scaffolding. arXiv. https://arxiv.org/abs/2603.24535v1\n\ntags: #human-ai collaboration, #ai tutoring, #scaffolding, #instructional design, #learning analytics, #ai pedagogy, #education", "link": "https://arxiv.org/abs/2603.24535v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Conrad Borchers", "Jiayi Zhang", "Ashish Gurung"], "categories": ["cs.CL", "cs.CY"]}, {"id": "1", "source": "ERIC", "score": 19, "day": "명시되지 않음", "title": "Beyond Substitution: How Teacher Interpersonal Behaviours Empower Students to Communicate with AI--A Dual-Mediation Model of Enjoyment and Trust", "content": "---\ntitle: Beyond Substitution: How Teacher Interpersonal Behaviours Empower Students to Communicate with AI--A Dual-Mediation Model of Enjoyment and Trust\nauthors: Qinqing Zhang, Jiqun Fan\nyear: 명시되지 않음\njournal: ERIC\ndoi: 명시되지 않음\nresearch_type: 양적 연구\nmethodology: 구조 방정식 모델링\ndata_type: 설문조사 데이터\nsample: 557명의 중국 대학생\ncontext: AI-enhanced 언어 수업\ntheoretical_framework: 명시되지 않음\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 교사의 대인 행동과 AI의 특성(반응성 및 인간화)이 학생의 AI와의 의사소통 의지(WTC)에 미치는 영향을 조사하였다. 557명의 중국 대학생을 대상으로 한 설문조사 데이터를 통해 구조 방정식 모델링을 실시한 결과, 교사-학생 상호작용이 의사소통 의지를 직접적 및 간접적으로 예측하는 것으로 나타났다. 반응성은 간접 경로를 통해서만 작용하며, 인간화는 직접적 및 간접적 효과를 모두 미친다. 특히, 교실의 즐거움이 AI 신뢰를 증대시키며, 이는 정서적-인지적 시너지를 확인시킨다. 연구 결과는 AI 지원 교실에서 교사의 대체 불가능한 역할을 강조하며, 인간-AI 협력의 중요성을 부각시킨다.\n\n# Research Logic\n## Problem\nAI와의 의사소통에서 학생의 의지를 증진시키기 위한 교사의 역할을 이해하는 것이 필요하다.\n\n## Theory\n교사의 대인 행동과 AI의 특성이 학생의 의사소통 의지에 미치는 영향을 탐구하는 이론적 틀.\n\n## Design\n구조 방정식 모델링을 사용하여 설문조사 데이터를 분석하였다.\n\n## Findings\n교사-학생 상호작용이 의사소통 의지를 직접적 및 간접적으로 예측하며, 즐거움이 AI 신뢰를 증대시킨다.\n\n## Conclusion\nAI 지원 교육에서 교사의 역할은 대체 불가능하며, 인간-AI 협력의 중요성을 강조한다.\n\n# Key Findings\n- 교사의 대인 행동이 학생의 AI와의 의사소통 의지에 긍정적인 영향을 미친다.\n- AI의 반응성은 간접적으로만 의사소통 의지에 영향을 미친다.\n- 교실의 즐거움은 AI 신뢰를 증대시킨다.\n\n# Contributions\n## Theoretical\nAI와의 의사소통에서 교사의 역할에 대한 새로운 이해를 제공한다.\n\n## Methodological\n구조 방정식 모델링을 통한 데이터 분석 방법론을 제시한다.\n\n## Practical\nAI 통합 교육에서 교사의 대인 행동의 중요성을 강조한다.\n\n# Limitations\n- 연구의 샘플은 중국 대학생으로 제한되어 있어 일반화에 한계가 있다.\n- 연구의 출판 연도가 명시되지 않아 최신성을 평가하기 어렵다.\n\n# Transferable Insights\n- AI와의 의사소통을 증진시키기 위해 교사의 대인 행동을 강화할 필요가 있다.\n- AI의 반응성과 인간화 특성을 교육 설계에 통합해야 한다.\n\n# Idea Seeds\n1. AI와의 의사소통을 촉진하기 위한 교사 교육 프로그램 개발.\n2. 다양한 문화적 배경을 가진 학생들을 대상으로 한 추가 연구.\n3. AI의 인간화 특성을 강화하기 위한 기술적 접근법 탐색.\n\n# Citation Snippets\n> Zhang, Q., & Fan, J. (n.d.). Beyond Substitution: How Teacher Interpersonal Behaviours Empower Students to Communicate with AI--A Dual-Mediation Model of Enjoyment and Trust.\n\ntags: #human-ai_collaboration, #classroom_ai, #ai_tutoring, #instructional_design, #scaffolding, #tpack, #ai_literacy, #teacher_ai, #education, #learning_analytics, #llm_classroom, #ai_pedagogy\n\n---\n\n요약: 본 연구는 교사의 대인 행동과 AI의 특성이 학생의 AI와의 의사소통 의지에 미치는 영향을 조사하였다. 557명의 중국 대학생을 대상으로 한 연구 결과, 교사-학생 상호작용이 의사소통 의지를 직접적 및 간접적으로 예측하며, AI의 반응성은 간접적으로만 작용하고, 교실의 즐거움이 AI 신뢰를 증대시킨다는 점이 확인되었다.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Qinqing Zhang", "Jiqun Fan"], "categories": ["ERIC"]}, {"id": "2", "source": "OPENALEX", "score": 19, "day": "2026-02-02", "title": "Navigating The Landscape of AI-Powered Personalized Learning in Primary Education: A Systematic Literature Review", "content": "---\ntitle: AI 기반 개인화 학습의 초등 교육 내 탐색: 체계적 문헌 검토\nauthors: Naisya Erliana Zaidatul Fiza, Silvia Akhadiyah, Fika Ahyana, Syarah Aulia Rahmah, Hanisa Dwi Setyaningsih\nyear: 2026\njournal: Elementary Education: Journal of Studies, Analysis, and Development\ndoi: https://openalex.org/W7140330000\nresearch_type: 체계적 문헌 검토\nmethodology: PRISMA 프로토콜에 따른 체계적 문헌 검토\ndata_type: 문헌 데이터\nsample: 114개의 문서 중 33개의 과학 논문\ncontext: 초등 교육에서 AI 기반 개인화 학습\ntheoretical_framework: TPACK (Technological Pedagogical Content Knowledge), 인지 부하 이론\nkeywords: [AI, 개인화 학습, 초등 교육, 체계적 문헌 검토]\n---\n\n# APA 7th style\n\n# Summary\n이 연구는 AI의 통합이 초등 교육에 미친 변화를 체계적으로 검토하며, AI 기반 개인화 학습의 문헌을 종합적으로 정리하는 것을 목표로 한다. Scopus 데이터베이스에서 114개의 문서를 식별하고, 33개의 과학 논문을 분석하였다. 2025년에는 24개의 논문이 발표되어 이전 연도 평균에 비해 12배 증가한 것으로 나타났다. 인도네시아가 7개의 관련 출판물로 세계적으로 가장 많은 기여를 하였으며, 연구 결과는 학생의 고유한 요구에 맞춘 적응 학습 기술의 중요성을 강조한다. 그러나 교사의 자기 효능감 저하, 인프라 부족, 데이터 개인 정보 보호 위험 등 여러 도전 과제가 여전히 존재한다. 연구는 교육자의 전문성을 강화하고 안전한 디지털 생태계를 구축하는 것이 기술적 성공의 필수 조건임을 결론짓는다.\n\n# Research Logic\n## Problem\nAI 기반 개인화 학습의 문헌이 단편화되어 있으며, 초등 교육에서의 적용이 제한적이다.\n## Theory\nTPACK 및 인지 부하 이론을 기반으로 하여 AI 통합의 필요성을 설명한다.\n## Design\nScopus 데이터베이스에서 PRISMA 프로토콜에 따라 체계적 문헌 검토를 수행하였다.\n## Findings\n2025년에 AI 관련 논문이 급증하였고, 인도네시아가 주요 기여국으로 나타났다.\n## Conclusion\n교사 전문성 강화와 안전한 디지털 환경 구축이 AI 통합의 성공에 필수적이다.\n\n# Key Findings\n- 2025년 AI 관련 논문 발표가 급증하여 총 24개로 증가.\n- 인도네시아가 AI 기반 개인화 학습 연구에서 가장 많은 출판물 수를 기록.\n- 기술적 도전 과제로는 교사의 자기 효능감 저하와 데이터 개인 정보 보호 문제가 있음.\n\n# Contributions\n## Theoretical\nAI 기반 개인화 학습의 체계적 이해를 위한 이론적 프레임워크 제공.\n## Methodological\n체계적 문헌 검토 방법론을 통해 연구 결과의 신뢰성을 높임.\n## Practical\n교육자 전문성 개발을 위한 실질적인 제안 제공.\n\n# Limitations\n- 연구의 범위가 Scopus 데이터베이스에 한정되어 있음.\n- 특정 국가 및 지역의 연구 결과에 편향될 수 있음.\n\n# Transferable Insights\n- AI 통합을 위한 교사 교육의 재구성이 필요함.\n- 데이터 해석 능력을 강화하는 것이 AI 활용의 핵심임.\n\n# Idea Seeds\n1. AI 기반 개인화 학습의 효과를 측정하기 위한 표준화된 평가 도구 개발.\n2. 교사와 학생 간의 협력적 학습 환경 조성을 위한 AI 활용 방안 연구.\n3. AI 기술의 윤리적 사용을 위한 정책 개발.\n\n# Citation Snippets\n> Zaidatul Fiza, N. E., Akhadiyah, S., Ahyana, F., Rahmah, S. A., & Setyaningsih, H. D. (2026). AI 기반 개인화 학습의 초등 교육 내 탐색: 체계적 문헌 검토. Elementary Education: Journal of Studies, Analysis, and Development.\n\ntags: #AI, #개인화학습, #초등교육, #문헌검토, #TPACK, #교육기술, #교사전문성", "link": "https://doi.org/10.64850/elementary.v1i1.184", "altLink": "https://openalex.org/W7140330000", "hasDoi": true, "hasReview": true, "authors": ["Naisya Erliana Zaidatul Fiza", "Silvia Akhadiyah", "Fika Ahyana"], "categories": ["Restructuring", "Modalities", "Systematic review", "Field (mathematics)", "Scopus"]}, {"id": "3", "source": "ARXIV", "score": 18, "day": "2026-03-26", "title": "Beyond Detection: Rethinking Education in the Age of AI-writing", "content": "---\ntitle: Beyond Detection: Rethinking Education in the Age of AI-writing\nauthors: [Maria Marina, Alexander Panchenko, Vasily Konovalov]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2603.25329v1\nresearch_type: 이론적 연구\nmethodology: 문헌 연구 및 사례 분석\ndata_type: 질적 데이터\nsample: 명시되지 않음\ncontext: 교육 및 인공지능\ntheoretical_framework: 인지 심리학, 교육 이론\nkeywords: [AI, 교육, 작문, 인공지능, 인지 심리학, 교육 이론, AI 탐지]\n---\n\n# APA 7th style\n\n# Summary\n이 논문은 ChatGPT와 같은 생성적 AI 도구가 교육 현장에 도입됨에 따라 작문의 가치가 어떻게 변화하는지를 탐구한다. 저자들은 작문 과정이 단순한 출력이 아니라 사고를 배우는 중요한 방법임을 강조하며, 기계가 작문을 대신할 때 잃게 되는 인지적 가치에 대해 논의한다. 또한, AI 텍스트 탐지의 현재 가능성과 교육자들이 금지보다는 더 스마트한 교수법을 통해 적응할 수 있는 방법을 제시하고, 기계 생성 언어를 인식하는 능력이 21세기 필수 문해력이 될 것임을 주장한다.\n\n# Research Logic\n## Problem\n생성적 AI 도구의 사용이 작문의 인지적 가치를 감소시키고 있다.\n## Theory\n작문은 사고를 발전시키는 과정이며, 이는 인지 심리학과 교육 이론에 기반한다.\n## Design\n문헌 연구와 실제 사례 분석을 통해 AI 도구의 교육적 활용 방안을 모색한다.\n## Findings\nAI 도구의 사용이 작문 과정에서의 깊은 사고를 방해하며, 교육자들은 이를 통해 학생들의 사고 능력을 강화할 수 있는 방법을 찾아야 한다.\n## Conclusion\nAI 도구의 사용은 교육적 가치가 있으며, 이를 통해 학생들이 진정한 사고를 발전시킬 수 있도록 해야 한다.\n\n# Key Findings\n- 작문 과정은 사고를 발전시키는 중요한 과정이다.\n- AI 도구의 사용은 학생들의 인지적 성장에 부정적인 영향을 미칠 수 있다.\n- AI 생성 텍스트를 인식하는 능력이 21세기 교육에서 필수적인 문해력이 될 것이다.\n\n# Contributions\n## Theoretical\n작문 과정의 인지적 가치에 대한 새로운 통찰을 제공한다.\n## Methodological\nAI 도구의 교육적 활용에 대한 구체적인 사례를 제시한다.\n## Practical\n교육자들이 AI 도구를 효과적으로 활용할 수 있는 방법을 제안한다.\n\n# Limitations\n- 연구 샘플이 명시되지 않아 일반화에 한계가 있다.\n- AI 탐지 기술의 발전에 대한 논의가 제한적이다.\n\n# Transferable Insights\n- AI 도구를 활용한 작문 교육의 필요성을 강조한다.\n- 교육자들이 AI 도구를 통해 학생들의 사고 능력을 강화할 수 있는 방법을 제시한다.\n\n# Idea Seeds\n1. AI 도구를 활용한 작문 교육 프로그램 개발.\n2. AI 생성 텍스트 탐지 기술의 발전 방향 연구.\n3. 작문 교육에서의 인지적 가치 증진을 위한 교수법 개발.\n\n# Citation Snippets\n> \"Writing is not just output; it is how we learn to think.\"\n\ntags: #AI, #교육, #작문, #인지심리학, #교육이론, #AI탐지, #생성적AI", "link": "https://arxiv.org/abs/2603.25329v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Maria Marina", "Alexander Panchenko", "Vasily Konovalov"], "categories": ["cs.CL"]}, {"id": "4", "source": "ARXIV", "score": 18, "day": "2026-03-25", "title": "From Untamed Black Box to Interpretable Pedagogical Orchestration: The Ensemble of Specialized LLMs Architecture for Adaptive Tutoring", "content": "---\ntitle: From Untamed Black Box to Interpretable Pedagogical Orchestration: The Ensemble of Specialized LLMs Architecture for Adaptive Tutoring\nauthors: Nizam Kadir\nyear: 2026\njournal: 명시되지 않음\ndoi: https://arxiv.org/abs/2603.23990v1\nresearch_type: 실험적 연구\nmethodology: 몬테카를로 시뮬레이션, 전문가 평가\ndata_type: 학생 상호작용 로그\nsample: N=942,816\ncontext: 교육 대화에서의 대규모 언어 모델 활용\ntheoretical_framework: Bayesian Knowledge Tracing (BKT)\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 교육 대화에서 사용되는 대규모 언어 모델(LLMs)의 한계를 극복하기 위해 Ensemble of Specialized LLMs (ES-LLMs) 아키텍처를 제안한다. ES-LLMs는 결정론적 규칙 기반 오케스트레이터를 통해 튜터링, 평가, 피드백, 스캐폴딩 등 다양한 전문 에이전트를 조정하며, Bayesian Knowledge Tracing (BKT) 모델에 의해 학생의 학습 상태를 추적한다. 연구 결과, ES-LLMs는 기존의 단일 모델에 비해 91.7%의 선호도를 보였으며, 100%의 교육적 제약 준수를 달성하였다. 또한, 운영 비용을 54% 절감하고 지연 시간을 22% 단축하는 성과를 거두었다.\n\n# Research Logic\n## Problem\n대규모 언어 모델이 교육적 제약을 위반하고, 학생의 학습 성과를 왜곡하는 문제.\n## Theory\nBayesian Knowledge Tracing (BKT)를 기반으로 한 규칙 기반 결정 논리.\n## Design\nES-LLMs 아키텍처는 여러 전문 에이전트를 조정하는 결정론적 규칙 기반 오케스트레이터를 포함.\n## Findings\nES-LLMs는 단일 모델에 비해 교육적 품질에서 우수한 성과를 보였으며, 제약 준수와 힌트 효율성에서 개선을 이루었다.\n## Conclusion\n구조적 분리는 신뢰할 수 있고 검증 가능한 교육적 에이전트를 만드는 데 필수적이다.\n\n# Key Findings\n- ES-LLMs는 91.7%의 경우에서 선호되었다.\n- 100%의 교육적 제약 준수를 달성하였다.\n- 운영 비용을 54% 절감하고 지연 시간을 22% 단축하였다.\n\n# Contributions\n## Theoretical\nBKT 기반의 규칙 기반 결정 논리를 통해 교육적 제약 준수의 중요성을 강조.\n## Methodological\n몬테카를로 시뮬레이션을 통한 신뢰성 검증 방법론 제시.\n## Practical\n교육적 대화에서의 LLM 활용에 대한 실질적인 개선 방안 제공.\n\n# Limitations\n- 연구 샘플이 특정 데이터셋에 국한되어 있음.\n- 다양한 교육 환경에서의 일반화 가능성에 대한 검증 필요.\n\n# Transferable Insights\n- 교육적 제약 준수를 위한 구조적 분리의 중요성.\n- 다양한 전문 에이전트를 활용한 맞춤형 튜터링의 가능성.\n\n# Idea Seeds\n1. ES-LLMs 아키텍처를 다른 교육 분야에 적용할 가능성 탐색.\n2. 다양한 학생 유형에 맞춘 맞춤형 피드백 시스템 개발.\n3. 실시간 데이터 분석을 통한 교육적 의사결정 지원 시스템 구축.\n\n# Citation Snippets\n> Kadir, N. (2026). From Untamed Black Box to Interpretable Pedagogical Orchestration: The Ensemble of Specialized LLMs Architecture for Adaptive Tutoring. \n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #ai literacy, #education", "link": "https://arxiv.org/abs/2603.23990v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Nizam Kadir"], "categories": ["cs.CY", "cs.AI"]}, {"id": "5", "source": "ARXIV", "score": 16, "day": "2026-03-25", "title": "When AI Meets Early Childhood Education: Large Language Models as Assessment Teammates in Chinese Preschools", "content": "High-quality teacher-child interaction (TCI) is fundamental to early childhood development, yet traditional expert-based assessment faces a critical scalability challenge. In large systems like China's-serving 36 million children across 250,000+ kindergartens-the cost and time requirements of manual observation make continuous quality monitoring infeasible, relegating assessment to infrequent episodic audits that limit timely intervention and improvement tracking.   In this paper, we investigate whether AI can serve as a scalable assessment teammate by extracting structured quality indicators and validating their alignment with human expert judgments.   Our contributions include: (1) TEPE-TCI-370h (Tracing Effective Preschool Education), the first large-scale dataset of naturalistic teacher-child interactions in Chinese preschools (370 hours, 105 classrooms) with standardized ECQRS-EC and SSTEW annotations; (2) We develop Interaction2Eval, a specialized LLM-based framework addressing domain-specific challenges-child speech recognition, Mandarin homophone disambiguation, and rubric-based reasoning-achieving up to 88% agreement; (3) Deployment validation across 43 classrooms demonstrating an 18x efficiency gain in the assessment workflow, highlighting its potential for shifting from annual expert audits to monthly AI-assisted monitoring with targeted human oversight. This work not only demonstrates the technical feasibility of scalable, AI-augmented quality assessment but also lays the foundation for a new paradigm in early childhood education-one where continuous, inclusive, AI-assisted evaluation becomes the engine of systemic improvement and equitable growth.", "link": "https://arxiv.org/abs/2603.24389v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Xingming Li", "Runke Huang", "Yanan Bao"], "categories": ["cs.CL", "cs.AI", "cs.CY"]}, {"id": "6", "source": "ARXIV", "score": 16, "day": "2026-03-25", "title": "CodeExemplar: Example-Based Scaffolding for Introductory Programming in the GenAI Era", "content": "Generative AI (GenAI) can generate working code with minimal effort, creating a tension in introductory programming: students need timely help, yet direct solutions invite copying and can short-circuit reasoning. To address this, we propose example-based scaffolding, where GenAI provides scaffold examples that match a target task's underlying reasoning pattern but differ in contexts to support analogical transfer while reducing copying. We contribute a two-dimensional taxonomy, design guidelines, and CodeExemplar, a prototype integrated with auto-graded tasks, with initial formative feedback from a classroom pilot and instructor interviews.", "link": "https://arxiv.org/abs/2603.23830v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Boxuan Ma", "Shinichi Konomi"], "categories": ["cs.HC"]}, {"id": "7", "source": "ARXIV", "score": 16, "day": "2026-03-22", "title": "Assessing Data Literacy in K-12 Education: Challenges and Opportunities", "content": "Data literacy has become a key learning objective in K-12 education, but it remains an ambiguous concept as teachers interpret it differently. When creating assessments, teachers turn broad ideas about \"working with data\" into concrete decisions about what materials to include. Since working with data visualizations is a core component of data literacy, teachers' decisions about how to include them on assessments offer insight into how they interpret data literacy more broadly. Drawing on interviews with 13 teachers, we identify four challenges in enacting data literacy in assessments: (1) conceptual ambiguity between data visualization and data literacy, (2) tradeoffs between using real-world or synthetic data, (3) difficulty finding and adapting domain-appropriate visual representations and data visualizations, and (4) balancing assessing data literacy and domain-specific learning goals. Drawing on lessons from data visualization, human-computer interaction, and the learning sciences, we discuss opportunities to better support teachers in assessing data literacy.", "link": "https://arxiv.org/abs/2603.21382v2", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Annabel Goldman", "Yuan Cui", "Matthew Kay"], "categories": ["cs.HC"]}, {"id": "8", "source": "ARXIV", "score": 15, "day": "2026-03-23", "title": "Practitioner Voices Summit: How Teachers Evaluate AI Tools through Deliberative Sensemaking", "content": "Teachers face growing pressure to integrate AI tools into their classrooms, yet are rarely positioned as agentic decision-makers in this process. Understanding the criteria teachers use to evaluate AI tools, and the conditions that support such reasoning, is essential for responsible AI integration. We address this gap through a two-day national summit in which 61 U.S. K-12 mathematics educators developed personal rubrics for evaluating AI classroom tools. The summit was designed to support deliberative sensemaking, a process we conceptualize by integrating Technological Pedagogical Content Knowledge (TPACK) with deliberative agency. Teachers generated over 200 criteria - initial articulations spanning four higher-order themes (Practical, Equitable, Flexible, and Rigorous) - that addressed both AI outputs and the process of using AI. Criteria contained productive tensions (e.g., personalization versus fairness, adaptability versus efficiency), and the vast majority framed AI as an assistant rather than a coaching tool for professional learning. Analysis of surveys, interviews, and summit discussions revealed five mechanisms supporting deliberative sensemaking: time and space for deliberation, artifact-centered sensemaking, collaborative reflection through diverse viewpoints, knowledge-building, and psychological safety. Across these mechanisms, TPACK and agency operated in a mutually reinforcing cycle - knowledge-building enabled more grounded evaluative judgment, while the act of constructing criteria deepened teachers' understanding of tools. We discuss implications for edtech developers seeking practitioner input, school leaders making adoption decisions, educators and professional learning designers, and researchers working to elicit teachers' evaluative reasoning about rapidly evolving technologies.", "link": "https://arxiv.org/abs/2603.22588v2", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Dorottya Demszky", "Christopher Mah", "Helen Higgins"], "categories": ["cs.HC", "cs.ET"]}, {"id": "9", "source": "OPENALEX", "score": 14, "day": "2026-03-24", "title": "AI-enhanced STEM education: A bibliometric study of research trends toward achieving sustainable development goals", "content": "This study aims to explore AI trend studies in STEM education using documents from the Scopus Database. Between 2015 and 2025, 171 documents were selected by researchers using the PRISMA method. The R language, Biblioshiny, and VOSviewer were later used to conduct a comprehensive bibliometric study.&amp;nbsp; This review identifies the dominant and emerging trends in artificial intelligence applications in STEM education. The findings reveal a significant increase in studies on the use of AI in STEM education, with the dominant themes being personalized learning, machine learning, and, more recently, generative AI, such as ChatGPT. The findings revealed that integrating AI into STEM education can significantly contribute to achieving SDG 4 (quality education). It encourages equity, accessibility, and educational excellence. At the same time, it supports SDG 8 (decent work and economic growth) by means of workforce development initiatives. The initiatives prepare students for high-quality jobs in AI economies where demand for AI skills has grown exponentially. Different countries, such as the USA, China, and Singapore, lead the research landscape but have unbalanced collaboration networks. SDG 10 (reduced inequalities) is a point of concern raised by the limited extent of research on a few nations. This is due to the possibility that economically and educationally diverse international settings might not be helped by AI-driven solutions and research agendas from rich contexts, potentially triggering increasing economic and educational inequalities. This research informs the strategic planning of AI-based applications in STEM education worldwide and provides insights into policymakers, scientists, and educators, while remaining aligned with the Sustainable Development Goals.", "link": "https://doi.org/10.20897/ejsteme/18190", "altLink": "https://openalex.org/W7140228047", "hasDoi": true, "hasReview": false, "authors": ["Hanan Shaher Almarashdi", "Othman  Abu Khurma", "Khaleel AlArabi"], "categories": ["Scopus", "Workforce", "Sustainable development", "Work (physics)", "Benchmarking"]}];
let PAGE_SIZE = 10;
let currentTab = 'all';
let currentSource = 'ALL';
let currentSort = 'score';
let currentPage = 1;
let currentCategory = '';
let currentMinDate = '';
let currentMaxDate = '';
let hideVisited = false;
let filtered = [];
let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
let searchHistory = JSON.parse(localStorage.getItem('searchHistory')) || [];
let visited = JSON.parse(localStorage.getItem('visited')) || [];

function toggleTheme() {
  const html = document.documentElement;
  const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
  html.dataset.theme = next;
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  localStorage.setItem('theme', next);
}

function toggleTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSource(btn) {
  currentSource = btn.dataset.source;
  document.querySelectorAll('#sourceFilters .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSort(btn) {
  currentSort = btn.dataset.sort;
  document.querySelectorAll('#sortGroup .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  render();
}

function toggleFavorite(id, e) {
  e.stopPropagation();
  const idx = favorites.indexOf(id);
  if (idx === -1) {
    favorites.push(id);
  } else {
    favorites.splice(idx, 1);
  }
  localStorage.setItem('favorites', JSON.stringify(favorites));
  applyFilters();
}

function recordVisit(id) {
  if (!visited.includes(id)) {
    visited.push(id);
  }
  localStorage.setItem('visited', JSON.stringify(visited));
}

function recordSearch(query) {
  if (query.trim() && !searchHistory.includes(query)) {
    searchHistory.unshift(query);
    if (searchHistory.length > 10) searchHistory.pop();
    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
  }
}

function downloadJSON() {
  const data = JSON.stringify(filtered, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadCSV() {
  const headers = ['제목', '출처', '스코어', '리뷰여부', '링크'];
  const rows = filtered.map(p => [
    '"' + p.title.replace(/"/g, '""') + '"',
    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
