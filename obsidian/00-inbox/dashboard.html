<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-05-30 23:59</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "ARXIV", "score": 22, "day": "2026-05-28", "title": "AgentSchool: An LLM-Powered Multi-Agent Simulation for Education", "content": "---\ntitle: AgentSchool: An LLM-Powered Multi-Agent Simulation for Education\nauthors: Yulei Ye, Wenhao Li, Zhong Wen, Yunshu Huang, Yichen Hu, Zifan Wei, Yige Wang, Xinyu Xie, Haoxuan Yang, Yanjun Huang, Ruijia Li, Hong Qian, Yu Song, Bo Jiang, Bingdong Li, Lijun Li, Bo Zhang, Pinlong Cai, Xingcheng Xu, Shuangye Chen, Xia Hu, Liang He, Aimin Zhou, Jingjing Qu, Jing Shao, Xiangfeng Wang\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2605.30144v1\nresearch_type: 이론적 연구\nmethodology: 다중 에이전트 시뮬레이션\ndata_type: 시뮬레이션 데이터\nsample: 5개의 LLM 백본을 사용한 2x3 통제 수업 연구\ncontext: 교육 AI의 검증 및 시뮬레이션\ntheoretical_framework: 근접 발달 영역(ZPD) 이론\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 교육 현장에서 대규모 언어 모델(LLM)의 활용을 검증하기 위한 시뮬레이터인 AgentSchool을 소개한다. AgentSchool은 학습을 상태 전환으로 모델링하며, 인지적으로 성장 가능한 학생 에이전트와 적응형 교사 에이전트를 결합하여 근접 발달 영역(ZPD)을 기반으로 한 교수-학습 과정을 지원한다. 실험 결과, 구조화된 학생 에이전트가 기존 시뮬레이터보다 더 차별화된 숙련도와 오해의 흔적을 생성하며, 교사 에이전트 간 비교에서 ZPD에 기반한 적응 패턴이 나타났다. AgentSchool은 교육 연구 도구로서의 역할을 넘어, 교육을 사회적으로 의미 있는 테스트베드로 구성하여 장기 기억, 다중 에이전트 조정 및 조직적 압박 하의 미래적 추론을 탐구할 수 있는 환경을 제공한다.\n\n# Research Logic\n## Problem\n교육 AI의 검증이 어려운 이유는 개입이 학습자의 인지 및 사회적 궤적에 영향을 미치기 때문이다.\n\n## Theory\nAgentSchool은 근접 발달 영역(ZPD) 이론을 기반으로 하여 학습 과정을 모델링한다.\n\n## Design\n다중 에이전트 시뮬레이션을 통해 학생과 교사 에이전트를 구성하고, 다양한 시나리오를 설정할 수 있다.\n\n## Findings\n구조화된 학생 에이전트가 기존 시뮬레이터보다 더 나은 학습 결과를 도출하며, 교사 에이전트의 적응 패턴이 ZPD와 일치한다.\n\n## Conclusion\nAgentSchool은 교육 AI의 효과를 사전 검증할 수 있는 안전한 시뮬레이션 환경을 제공한다.\n\n# Key Findings\n- 구조화된 학생 에이전트가 더 차별화된 숙련도와 오해의 흔적을 생성함.\n- 교사 에이전트 간 비교에서 ZPD에 기반한 적응 패턴이 나타남.\n- 교육 사회 이론과 일치하는 주변 참여 및 클리크 형성의 흔적을 생성함.\n\n# Contributions\n## Theoretical\nAgentSchool은 근접 발달 영역(ZPD) 이론을 기반으로 한 새로운 교육 모델을 제시함.\n\n## Methodological\n다중 에이전트 시뮬레이션을 통한 교육 AI 검증 방법론을 개발함.\n\n## Practical\n교육 현장에서 AI의 효과를 사전 검증할 수 있는 도구를 제공함.\n\n# Limitations\n- 시뮬레이션의 결과가 실제 교육 현장과 다를 수 있음.\n- 에이전트의 행동이 실제 학습자의 행동을 완벽히 반영하지 않을 수 있음.\n\n# Transferable Insights\n- 교육 AI의 검증을 위한 새로운 방법론 개발 가능성.\n- 다중 에이전트 시뮬레이션을 통한 교육 혁신의 가능성 탐구.\n\n# Idea Seeds\n1. AgentSchool을 활용한 다양한 교육 시나리오 개발.\n2. 교육 정책 결정에 대한 시뮬레이션 결과 활용.\n3. AI 기반 교육 도구의 효과를 평가하기 위한 장기 연구 설계.\n\n# Citation Snippets\n> Ye, Y., Li, W., Wen, Z., Huang, Y., Hu, Y., Wei, Z., Wang, Y., Xie, X., Yang, H., Huang, Y., Li, R., Qian, H., Song, Y., Jiang, B., Li, B., Li, L., Zhang, B., Cai, P., Xu, X., Chen, S., Hu, X., He, L., Zhou, A., Qu, J., Shao, J., & Wang, X. (2026). AgentSchool: An LLM-Powered Multi-Agent Simulation for Education. arXiv. https://arxiv.org/abs/2605.30144v1\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy\n\n---\n\n요약: 본 연구는 AgentSchool이라는 LLM 기반의 다중 에이전트 시뮬레이터를 통해 교육 AI의 검증을 시도한다. 이 시뮬레이터는 학생과 교사 에이전트를 결합하여 근접 발달 영역 이론에 기반한 학습 과정을 모델링하며, 실험 결과 기존 시뮬레이터보다 더 나은 학습 결과를 도출함을 보여준다. AgentSchool은 교육 연구 도구로서의 역할을 넘어 교육 혁신을 위한 안전한 테스트베드를 제공한다.", "link": "https://arxiv.org/abs/2605.30144v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Yulei Ye", "Wenhao Li", "Zhong Wen"], "categories": ["cs.AI", "cs.MA"]}, {"id": "1", "source": "OPENALEX", "score": 22, "day": "2026-05-27", "title": "Scaffolded Generative AI in Instructional Planning: Supporting Teacher Candidates’ Culturally Responsive Teaching", "content": "---\ntitle: Scaffolded Generative AI in Instructional Planning: Supporting Teacher Candidates’ Culturally Responsive Teaching\nauthors: [Dr. Eun Kyung Ko, Xiaoning Chen, Vishodana Thamotharan, Julie Sidarous]\nyear: 2026\njournal: i.e.: inquiry in education\ndoi: https://openalex.org/W7162721314\nresearch_type: 혼합 방법론 연구\nmethodology: 종단적 연구\ndata_type: 양적 및 질적 데이터\nsample: 14명의 이중 언어 교사 후보\ncontext: 유아 교육 교사 레지던시 프로그램\ntheoretical_framework: AI/I-TPACK, CRT\nkeywords: [generative AI, culturally responsive teaching, teacher education, instructional planning, AI literacy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 생성적 인공지능(GenAI)이 교육 계획에 통합되는 과정에서 교사 교육 프로그램이 효율성 중심의 채택을 넘어 공평성 중심의 교육적 통합으로 나아가야 함을 강조한다. 혼합 방법론의 종단적 연구로, 14명의 이중 언어 교사 후보가 참여한 1년간의 GenAI 통합 접근 방식을 분석하였다. 연구 결과, 교사 후보의 문화적으로 반응적인 교수법(CRT) 자기 효능감이 통계적으로 유의미하게 증가하였으며, GenAI 도구가 효율성과 다국어 지원을 제공했지만 문화적 특수성이 부족하다는 한계도 드러났다. 이 연구는 GenAI의 공평한 통합을 위한 복제 가능한 설계 모델을 제시하며, 교사 후보들이 GenAI를 전문적 판단의 대체가 아닌 반성적 교육 도구로 활용할 수 있도록 준비하는 데 기여한다.\n\n# Research Logic\n## Problem\nGenAI의 통합이 교육의 공평성을 저해할 수 있는 가능성.\n## Theory\nAI/I-TPACK 및 CRT 프레임워크를 통한 교육적 접근.\n## Design\n혼합 방법론을 통한 종단적 연구 설계.\n## Findings\n교사 후보의 CRT 자기 효능감이 모든 기준에서 유의미하게 증가.\n## Conclusion\nGenAI와 CRT의 비판적 참여가 문화적으로 반응적인 교수 계획을 강화함.\n\n# Key Findings\n- 교사 후보의 CRT 자기 효능감이 모든 기준에서 통계적으로 유의미하게 증가함.\n- GenAI 도구는 효율성과 다국어 지원을 제공하였으나, 문화적 특수성이 부족함.\n- 비판적 평가와 맥락화가 필요함.\n\n# Contributions\n## Theoretical\nGenAI 통합을 위한 새로운 교육 이론 모델 제시.\n## Methodological\n혼합 방법론을 통한 교육 연구의 새로운 접근법 제공.\n## Practical\n교사 후보들이 GenAI를 반성적 교육 도구로 활용할 수 있도록 지원하는 방안 제시.\n\n# Limitations\n- 연구 샘플이 소수의 교사 후보로 제한됨.\n- 문화적 특수성 부족에 대한 해결 방안이 명시되지 않음.\n\n# Transferable Insights\n- GenAI의 교육적 활용에 대한 비판적 접근 필요.\n- 문화적 반응성을 고려한 교육 설계의 중요성.\n\n# Idea Seeds\n1. GenAI 도구의 문화적 특수성을 강화하기 위한 연구.\n2. 다양한 언어적 배경을 가진 학생들을 위한 GenAI 활용 방안 개발.\n3. 교사 교육 프로그램에서의 GenAI 통합을 위한 정책 제안.\n\n# Citation Snippets\n> Ko, E. K., Chen, X., Thamotharan, V., & Sidarous, J. (2026). Scaffolded Generative AI in Instructional Planning: Supporting Teacher Candidates’ Culturally Responsive Teaching. i.e.: inquiry in education, 18(1), Article 5. \n\ntags: #generativeAI, #culturallyResponsiveTeaching, #teacherEducation, #instructionalPlanning, #AIliteracy, #scaffolding, #TPACK", "link": "https://openalex.org/W7162721314", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Dr. Eun Kyung Ko", "Xiaoning Chen", "Vishodana Thamotharan"], "categories": ["Psychology", "Generative grammar", "Pedagogy", "Focus group", "Qualitative research"]}, {"id": "2", "source": "ARXIV", "score": 20, "day": "2026-05-26", "title": "Chameleon Clippers: A Tool for Developing Fine Motor Skills in Remote Education Settings", "content": "---\ntitle: Chameleon Clippers: A Tool for Developing Fine Motor Skills in Remote Education Settings\nauthors: [Gennie Mansi, Ashley Boone, Sue Reon Kim, Jessica Roberts]\nyear: 2026\njournal: 명시되지 않음\ndoi: https://arxiv.org/abs/2605.27749v1\nresearch_type: 실험적 연구\nmethodology: Wizard-of-Oz 사용성 테스트\ndata_type: 정량적 및 정성적 데이터\nsample: 12명의 4-7세 아동\ncontext: 원격 미술 교육 환경\ntheoretical_framework: Tangible technology, 피드백 이론\nkeywords: [remote learning, tangible interactions, art education]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 K-2 학습자의 미세 운동 기술 개발을 위한 원격 교육 환경에서의 Chameleon Clippers라는 도구를 개발하고 평가하였다. 연구 결과, 아동들은 실시간 피드백에 긍정적으로 반응하며 높은 참여도를 보였고, 도구 사용에 대한 즐거움을 표현하였다. 저비용 설계는 기존의 교실 도구와 통합될 수 있도록 하였으며, 향후 연구 방향으로 피드백의 빈도와 더 넓은 미술 교육 플랫폼으로의 통합 가능성을 제시하였다. 본 연구는 원격 K-2 학습 경험을 보다 상호작용적이고 지원적으로 만들기 위한 유망한 가능성을 보여준다.\n\n# Research Logic\n## Problem\n원격 교육 환경에서 K-2 학습자의 미세 운동 기술 개발을 위한 피드백 제공의 어려움.\n## Theory\nTangible technology와 실시간 피드백의 중요성.\n## Design\nChameleon Clippers라는 상호작용 가위를 개발하여 실시간 피드백을 제공.\n## Findings\n아동들은 긍정적 및 교정적 피드백에 잘 반응하며, 도구 사용에 대한 높은 참여도를 보임.\n## Conclusion\nChameleon Clippers는 원격 미술 교육에서 미세 운동 기술 개발을 지원하는 효과적인 도구임.\n\n# Key Findings\n- 아동들은 긍정적 피드백에 반응하여 지속적으로 원하는 행동을 유지함.\n- 교정적 피드백은 아동들이 시각적 피드백을 찾도록 유도함.\n- 도구 사용에 대한 아동의 즐거움이 높았으나, 편안함에 대한 개선이 필요함.\n\n# Contributions\n## Theoretical\nTangible technology의 교육적 활용에 대한 새로운 통찰 제공.\n## Methodological\nWizard-of-Oz 사용성 테스트를 통한 실험적 접근법 제시.\n## Practical\n저비용의 실시간 피드백 도구를 통한 교실 통합 가능성 제시.\n\n# Limitations\n- 연구 참여자의 수가 적어 통계적 분석이 불가능함.\n- 원격 교육 환경에서의 사용에 대한 추가 연구 필요.\n\n# Transferable Insights\n- 원격 교육에서의 피드백 제공 방식 개선 가능성.\n- Tangible technology의 활용이 아동의 참여도에 긍정적 영향을 미칠 수 있음.\n\n# Idea Seeds\n1. 다양한 미술 교육 도구에 대한 실시간 피드백 시스템 개발.\n2. 원격 교육 환경에서의 피드백 빈도 최적화 연구.\n3. Tangible technology를 활용한 협동 학습 경험 설계.\n\n# Citation Snippets\n> Mansi, G., Boone, A., Kim, S. R., & Roberts, J. (2026). Chameleon Clippers: A Tool for Developing Fine Motor Skills in Remote Education Settings. \n\ntags: #미술교육, #원격학습, #피드백, #상호작용기술, #미세운동기술, #교육기술, #K2교육\n\n---\n\n요약: 본 연구는 K-2 학습자의 미세 운동 기술 개발을 위한 Chameleon Clippers 도구를 원격 교육 환경에서 평가하였다. 아동들은 실시간 피드백에 긍정적으로 반응하며 높은 참여도를 보였고, 저비용 설계는 기존 교실 도구와 통합 가능성을 보여주었다.", "link": "https://arxiv.org/abs/2605.27749v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Gennie Mansi", "Ashley Boone", "Sue Reon Kim"], "categories": ["cs.HC"]}, {"id": "3", "source": "ARXIV", "score": 19, "day": "2026-05-28", "title": "Modularizing Educational LLM-Agency for Fostering Responsible Learning Assistance", "content": "---\ntitle: Modularizing Educational LLM-Agency for Fostering Responsible Learning Assistance\nauthors: [Julius Gabelmann, Felix Jahn, Kevin Baum, Sophie van Rossum, Emely Wuenscher, Timo P. Gros, Verena Wolf]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2605.30187v1\nresearch_type: 이론적 연구\nmethodology: 모듈화된 아키텍처 설계\ndata_type: 문헌 연구 및 개념적 개발\nsample: 명시되지 않음\ncontext: 교육에서의 AI 사용\ntheoretical_framework: 교육학적 원칙 및 책임 있는 AI 설계\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 교육에서 AI 챗봇의 책임 있는 사용을 위한 모듈화된 에이전틱 AI 챗봇 아키텍처를 제안한다. 대규모 언어 모델(LLM)은 교육적 개념을 준수하지 않아 학습 과정에 부정적인 영향을 미칠 수 있다. 연구자들은 문제 해결의 다양한 단계에 맞춘 모듈을 제안하여 학생들이 학습 과정을 보다 투명하고 통제 가능한 방식으로 진행할 수 있도록 돕는다. 이 아키텍처는 교육적 목표에 맞춘 맞춤형 지원을 제공하며, 학생의 인지적 주체성을 보존하는 데 중점을 둔다.\n\n# Research Logic\n## Problem\nAI 챗봇의 사용이 증가함에 따라 교육적 맥락에서의 책임 있는 배치가 중요해졌다. LLM은 교육적 개념을 준수하지 않아 부정적인 영향을 미칠 위험이 있다.\n\n## Theory\n교육학적 원칙에 기반하여, 책임 있는 AI 설계의 필요성을 강조한다. 이는 학생의 인지적 주체성을 보존하고, 교육적 개입을 명확하게 제어할 수 있도록 해야 한다.\n\n## Design\n모듈화된 아키텍처를 통해 문제 해결 과정의 각 단계에 맞춘 특정 모듈을 제안한다. 각 모듈은 교육적 목표에 맞춰 설계되어 있다.\n\n## Findings\n모듈화된 아키텍처는 학생의 학습 과정을 보다 효과적으로 지원하며, 교육적 개입의 투명성을 높인다. 이는 학생의 인지적 주체성을 보존하는 데 기여한다.\n\n## Conclusion\n책임 있는 AI 사용을 위해서는 모듈화된 접근 방식이 필요하며, 이는 교육적 목표와 일치하는 방식으로 학생을 지원할 수 있다.\n\n# Key Findings\n- 모듈화된 아키텍처는 교육적 개입의 명확성을 제공한다.\n- 학생의 인지적 주체성을 보존하는 데 중점을 둔다.\n- LLM의 행동을 교육적 목표에 맞춰 조정할 수 있다.\n\n# Contributions\n## Theoretical\n책임 있는 AI 설계의 원칙을 교육적 맥락에 적용하는 새로운 이론적 틀을 제시한다.\n\n## Methodological\n모듈화된 아키텍처 설계를 통해 교육적 개입의 효과성을 높이는 방법론을 제안한다.\n\n## Practical\n학생의 학습 과정을 지원하기 위한 실용적인 AI 도구의 설계를 제안한다.\n\n# Limitations\n- 연구의 실증적 검증이 부족하다.\n- 특정 교육적 맥락에 대한 적용 가능성이 명시되지 않았다.\n\n# Transferable Insights\n- 교육적 AI 설계에서의 모듈화의 중요성을 강조한다.\n- 학생의 인지적 주체성을 보존하는 방법론을 제시한다.\n\n# Idea Seeds\n1. 다양한 교육적 맥락에 맞춘 모듈 개발.\n2. AI 챗봇의 사용자 경험 개선을 위한 연구.\n3. 교육적 AI의 윤리적 사용에 대한 가이드라인 개발.\n\n# Citation Snippets\n> Gabelmann, J., Jahn, F., Baum, K., van Rossum, S., Wuenscher, E., Gros, T. P., & Wolf, V. (2026). Modularizing Educational LLM-Agency for Fostering Responsible Learning Assistance. arXiv. https://arxiv.org/abs/2605.30187v1\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #ai literacy, #education", "link": "https://arxiv.org/abs/2605.30187v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Julius Gabelmann", "Felix Jahn", "Kevin Baum"], "categories": ["cs.AI", "cs.CY"]}, {"id": "4", "source": "ARXIV", "score": 16, "day": "2026-05-27", "title": "Practitioner Beliefs and Behaviors in AI-Enhanced Education: DOT Framework Survey Evidence", "content": "---\ntitle: Practitioner Beliefs and Behaviors in AI-Enhanced Education: DOT Framework Survey Evidence\nauthors: [David Gibson, M. Elizabeth Azukas, Gerald Knezek]\nyear: 2026\njournal: 명시되지 않음\ndoi: https://arxiv.org/abs/2605.29041v1\nresearch_type: 양적 연구\nmethodology: 설문조사\ndata_type: 설문 데이터\nsample: 72명\ncontext: 고등 교육\ntheoretical_framework: DOT Framework\nkeywords: [AI, 교육, 설계 사고, 시스템 사고, 고등 교육, AI 통합]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 인공지능(AI) 통합에 대한 고등 교육 실무자들의 신념, 행동 및 제도적 조건을 조사하기 위해 실시된 단면 설문조사(n = 72)의 결과를 보고한다. 설계 사고와 개방 시스템 이론을 통합한 DOT Framework에 기반하여, AI 친숙도, 사용 패턴, 설계 지향적 관행 및 교수법 신념을 조사하였다. 19개의 신념 항목에 대한 탐색적 요인 분석 결과, AI 기능, 감독 및 거버넌스, 강사 협업 및 계획이라는 세 가지 요인 구조가 확인되었다(α = .90). 결과는 실무자들이 AI를 교수 지원 도구로 긍정적으로 평가하면서도 인간의 감독과 비판적 평가에 대한 강한 의지를 유지하고 있음을 나타낸다. 보고된 관행은 반복적인 프롬프트와 콘텐츠 생성에 중점을 두었으며, 요구 평가 및 피드백 루프의 사용은 일관성이 떨어졌다. 제한된 정책, 교육 및 인프라와 같은 제도적 장벽이 광범위하게 보고되었다. 이러한 결과는 DOT Framework이 실무자 신념 및 관행의 설명 모델로서의 초기 경험적 지원을 제공하며, 설계 지향적 이론과 현재 구현 간의 격차를 강조한다.\n\n# Research Logic\n## Problem\nAI 통합에 대한 실무자들의 신념과 행동 간의 불일치 및 제도적 장벽.\n\n## Theory\nDOT Framework를 통해 AI 사용의 설계 사고와 시스템적 관점을 통합.\n\n## Design\n단면 설문조사를 통해 실무자들의 AI 친숙도 및 사용 패턴을 조사.\n\n## Findings\n실무자들은 AI를 긍정적으로 평가하나, 인간의 감독과 비판적 평가를 중시하며, 제도적 지원이 부족함.\n\n## Conclusion\nAI 통합을 위한 명확한 정책과 교육이 필요하며, DOT Framework의 적용이 실무자 신념과 행동의 격차를 해소하는 데 기여할 수 있음.\n\n# Key Findings\n- 실무자들은 AI를 교수 지원 도구로 긍정적으로 평가함.\n- AI 사용의 일관성이 떨어지며, 특히 요구 평가 및 피드백 루프의 사용이 부족함.\n- 제도적 장벽이 AI 통합을 저해하고 있음.\n\n# Contributions\n## Theoretical\nDOT Framework의 초기 경험적 검토를 통해 AI 통합에 대한 이론적 기초를 제공.\n\n## Methodological\nAI 사용에 대한 설계 지향적 및 시스템 인식 차원을 포착하는 설문 도구 개발.\n\n## Practical\nAI 통합을 위한 정책 및 전문 개발 프로그램의 필요성을 강조.\n\n# Limitations\n- 표본이 고등 교육 분야의 특정 집단에 편향됨.\n- 제도적 지원의 불균형으로 인한 결과의 일반화 한계.\n\n# Transferable Insights\n- AI 통합을 위한 명확한 정책과 교육이 필요함.\n- 실무자들의 신념과 행동 간의 격차를 해소하기 위한 지속적인 연구 필요.\n\n# Idea Seeds\n1. AI 통합을 위한 정책 개발을 위한 실무자 의견 수렴.\n2. AI 사용에 대한 교육 프로그램 설계 및 실행.\n3. DOT Framework의 추가 검증을 위한 후속 연구 진행.\n\n# Citation Snippets\n> Gibson, D., Azukas, M. E., & Knezek, G. (2026). Practitioner beliefs and behaviors in AI-enhanced education: DOT framework survey evidence. \n\ntags: #AI, #교육, #설계사고, #고등교육, #AI통합, #DOTFramework, #교육기술", "link": "https://arxiv.org/abs/2605.29041v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["David Gibson", "M. Elizabeth Azukas", "Gerald Knezek"], "categories": ["cs.AI"]}, {"id": "5", "source": "ARXIV", "score": 15, "day": "2026-05-28", "title": "Double-Edged Sword or Sharp Tool? Designing and Evaluating Triadic LLM-Teacher Collaboration for K-12 Writing at Scale", "content": "The double-edged sword of integrating Large Language Models (LLMs) requires an effective triadic collaboration mechanism among LLMs, teachers and students, especially for K-12 education. By developing a triadic collaboration system to support K-12 writing learning, a multidimensional evaluation framework grounded in Systemic Functional Linguistics and the suggestion trajectory tracing pipeline, this paper contributes a large-scale empirical dataset involving $57,954$ essays from $10,195$ students across $120$ schools over two years. Our findings confirm the efficacy of this system in improving writing quality through a strategic labor division: the LLM serves as a generative engine to mitigate teacher burnout, and the teacher acts as a pedagogical gatekeeper and bridge to guarantee feedback quality. While both LLM and teacher are critical for skill improvement, we uncover a ceiling effect where excessive linguistic expansion yields diminishing marginal utility. These suggest a dynamically adaptive LLM-teacher collaboration as student proficiency increases.", "link": "https://arxiv.org/abs/2605.30200v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Canran Wang", "Yuwen Yang", "Zhen Wang"], "categories": ["cs.AI"]}, {"id": "6", "source": "ARXIV", "score": 15, "day": "2026-05-28", "title": "PEARL: Training Socratic Tutors with Pedagogically Aligned Reinforcement Learning", "content": "Large Language Models (LLMs) have shown promise as educational tutors, yet effective tutoring requires more than solving problems: it must provide progressive Socratic guidance and balance multiple pedagogical objectives across multi-turn interactions. However, training such tutors remains challenging due to limited-fidelity and weakly controllable student simulation, under-specified pedagogical reward modeling, and unstable multi-objective optimization. To overcome these limitations, we propose PEARL, a pedagogically aligned reinforcement learning framework for training Socratic tutoring agents, consisting of three key components. First, we introduce a controllable student simulator that decouples latent cognitive states from response generation to model diverse abilities and misconceptions. Second, we develop a generative reward model that jointly evaluates pedagogical quality and objective correctness for policy optimization. Finally, we propose a stable multi-objective RL scheme that discretizes rewards within each dimension and aggregates normalized advantages across dimensions, preventing high-variance objectives from dominating updates. Experiments on multiple benchmarks show that PEARL achieves the best performance among open-source models and remains competitive with leading proprietary LLMs, despite using only a 30B policy model.", "link": "https://arxiv.org/abs/2605.29582v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Qikai Chang", "Zhenrong Zhang", "Linbo Chen"], "categories": ["cs.LG", "cs.CL"]}, {"id": "7", "source": "ARXIV", "score": 13, "day": "2026-05-27", "title": "\"It's OK Because...\": The Wild West of Student Rationalization of AI Use in Academic Writing", "content": "Generative AI challenges academic integrity not only by enabling students to delegate substantial portions of their academic work, but also by blurring the ethical boundaries by which students distinguish acceptable assistance from misconduct. Drawing on semi-structured interviews (n=20), AI chat logs, and course documents (syllabi, submitted assignments), we investigated how students themselves make moral sense of AI use in academic writing. Our analysis results in a range of novel findings: First, there are at least five distinct sites of AI-use conceptualization, ranging from faculty's intended AI policy, to students' actual AI use. Second, students use over 20 distinct rationalizations to justify AI use, such as that copying AI-generated text is victimless; that any AI text reflecting their own beliefs or their own style is their own writing; or that they are learning more by using AI -- even extensively -- than otherwise. We present a taxonomy of these rationalizations, and show how some of them are employed to justify conscious violations of course policies. Third, student rationalizations occur in both an ad hoc and post hoc manner, and they are not necessarily self-consistent. These and other findings suggest that modern AI presents a steep, ethical, slippery slope which students conceptually slide down, landing far outside the pedagogical goals and expectations of instructors. We discuss implications for educational design and AI policy.", "link": "https://arxiv.org/abs/2605.29090v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Jiyoon Kim", "Kentaro Toyama", "Sangmi Kim"], "categories": ["cs.HC"]}, {"id": "8", "source": "ARXIV", "score": 13, "day": "2026-05-27", "title": "From Learning Resources to Competencies: LLM-Based Tagging with Evidence and Graph Constraints", "content": "Linking learning resources to a structured competency framework is key to enabling competency-based search and curriculum analytics in Learning Management Systems (LMS). However, manual tagging is labor-intensive, and fully automatic methods often lack transparency. In this paper, we present an end-to-end alignment pipeline that uses a large language model (LLM) as a constrained, evidence-producing tagger. LMS resources -both instructional content and assessments -are first segmented into meaningful pedagogical fragments. For each fragment, a small set of candidate competencies is retrieved from structured competency profiles enriched with graph-based context. The LLM then selects the most relevant competencies from this set and provides supporting evidence spans from the fragment text. These predictions are refined using the structure of the competency graph and aggregated at the resource level. We evaluate our approach on a dataset built from the Computer Science department's competency referential at the Université de Technologie de Compiègne (UTC), covering 22 competencies across multiple course materials. Our LLM+BM25+Graph (LBG) pipeline achieves strong results, with a micro-F1 of 0.57 and macro-F1 of 0.50 at the fragment level, 0.51 macro-F1 at the resource level, and an MRR of 0.82outperforming zero-shot and few-shot LLM variants, retrieval/similarity baselines, and supervised classifiers -while also producing more mechanically traceable evidence spans to support human auditing and educational analysis.", "link": "https://arxiv.org/abs/2605.28483v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Ngoc Luyen Le", "Marie-Hélène Abel", "Bertrand Laforge"], "categories": ["cs.AI", "cs.IR"]}, {"id": "9", "source": "ARXIV", "score": 12, "day": "2026-05-27", "title": "Error as a Lens: Probing LLM Reasoning through Synthetic Misconception Generation", "content": "Personalized tutoring, teacher training, and education research need access to \\emph{targeted} synthetic misconceptions, but privacy and IRB constraints make labelled corpora of real student errors scarce. LLMs could in principle generate synthetic errors at scale, but producing an arbitrary wrong answer is easy for a modern LLM while producing one that matches a specified cognitive failure mode is much harder. We present a framework that generates errors targeted to a five-class taxonomy adapted from the revised Bloom's taxonomy, evaluated on questions from the TheoremQA dataset. A Generation Agent (GA) drafts a candidate erroneous solution conditioned on a target class, and an Examination Agent (EA) judges whether the draft is incorrect and class-consistent. The framework yields a reusable recipe for building class-stratified synthetic error datasets where authentic student corpora are unavailable. As a secondary diagnostic, targeted error generation is substantially harder than free-form incorrect-answer generation, and answer-grounding contributes more than expanded examples or external textbook content.", "link": "https://arxiv.org/abs/2605.29007v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Xinming Yang", "Jun Li"], "categories": ["cs.CL"]}];

    if (searchHistory.length > 10) searchHistory.pop();
    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
  }
}

    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
