<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-04-22 23:44</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "OPENALEX", "score": 24, "day": "2026-04-20", "title": "Scaffolding Generative AI as a Tutor: A Quasi-Experimental Study of Learning Outcomes and Motivational, Cognitive and Metacognitive Processes", "content": "---\ntitle: Scaffolding Generative AI as a Tutor: A Quasi-Experimental Study of Learning Outcomes and Motivational, Cognitive and Metacognitive Processes\nauthors: [Chrysanthi Melanou, Maik Beege]\nyear: 2026\njournal: 명시되지 않음\ndoi: 명시되지 않음\nresearch_type: 준실험적 연구\nmethodology: 준실험적 사전-사후 연구\ndata_type: 양적 데이터\nsample: 175명의 1학기 학생\ncontext: 대학 교육\ntheoretical_framework: 명시되지 않음\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 생성적 인공지능(AI)이 상호작용하는 튜터로서의 역할을 수행하는 과정에서 다양한 수준의 스캐폴딩이 학습 결과 및 동기, 인지, 메타인지 과정에 미치는 영향을 조사하였다. 175명의 1학기 학생들이 세 가지 조건(완전 스캐폴딩, 경량 스캐폴딩, 비스캐폴딩) 하에서 동일한 학업 과제를 수행하였다. 연구 결과, 학생들은 지식, 비판적 사고, 반영적 사용에서 유의미한 향상을 보였으나, 동기는 안정적이었고 인지 부하는 감소하였다. 스캐폴딩 조건 간의 유의미한 차이는 관찰되지 않았으나, 스캐폴딩이 있는 조건에서 고차원 지식의 향상이 나타나는 경향이 있었다. 이는 AI 지원 학습 환경에서의 단기 학습 성과가 스캐폴딩의 강도에만 의존하지 않음을 시사한다.\n\n# Research Logic\n## Problem\nAI가 학습 지원 도구로서의 역할을 수행할 때 스캐폴딩의 필요성과 그 효과에 대한 이해가 부족하다.\n## Theory\n스캐폴딩이 학습 과정에서 인지 및 메타인지에 미치는 영향을 탐구한다.\n## Design\n준실험적 연구 디자인을 통해 세 가지 스캐폴딩 조건을 설정하고 비교하였다.\n## Findings\n스캐폴딩 조건 간의 유의미한 차이는 없었으나, 스캐폴딩이 있는 조건에서 고차원 지식의 향상이 나타나는 경향이 있었다.\n## Conclusion\nAI 지원 학습에서의 단기 학습 성과는 스캐폴딩의 강도보다는 학습자의 AI와의 상호작용 방식에 더 의존한다.\n\n# Key Findings\n- 학생들은 지식, 비판적 사고, 반영적 사용에서 유의미한 향상을 보였다.\n- 동기는 안정적이었고, 인지 부하는 감소하였다.\n- 스캐폴딩 조건 간의 유의미한 차이는 없으나, 스캐폴딩이 있는 조건에서 고차원 지식의 향상이 나타나는 경향이 있었다.\n\n# Contributions\n## Theoretical\nAI 지원 학습에서 스캐폴딩의 역할에 대한 새로운 통찰을 제공한다.\n## Methodological\n준실험적 디자인을 통해 스캐폴딩의 효과를 체계적으로 분석하였다.\n## Practical\nAI 튜터링 환경에서의 스캐폴딩 적용에 대한 실용적인 지침을 제시한다.\n\n# Limitations\n- 연구의 샘플 크기가 제한적이다.\n- 스캐폴딩의 구체적인 내용과 효과에 대한 추가적인 연구가 필요하다.\n\n# Transferable Insights\n- AI와의 상호작용 방식이 학습 성과에 미치는 영향을 고려해야 한다.\n- 스캐폴딩의 강도보다 학습자의 참여 방식이 중요할 수 있다.\n\n# Idea Seeds\n1. AI 튜터링 환경에서의 다양한 스캐폴딩 전략 개발.\n2. 스캐폴딩의 효과를 장기적으로 평가하는 연구.\n3. AI와의 상호작용을 극대화하기 위한 교수법 개발.\n\n# Citation Snippets\n>\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #ai literacy, #education\n\n---\n\n요약: 본 연구는 생성적 AI가 튜터로서의 역할을 수행할 때 스캐폴딩의 효과를 조사하였다. 175명의 학생을 대상으로 한 준실험적 연구에서, 스캐폴딩 조건 간의 유의미한 차이는 없었으나, AI와의 상호작용 방식이 학습 성과에 더 큰 영향을 미친다는 결과를 도출하였다.", "link": "https://doi.org/10.3390/educsci16040651", "altLink": "https://openalex.org/W7154999853", "hasDoi": true, "hasReview": true, "authors": ["Chrysanthi Melanou", "Maik Beege"], "categories": ["Metacognition", "Psychology", "Scaffold", "Cognition", "Moderation"]}, {"id": "1", "source": "ARXIV", "score": 21, "day": "2026-04-20", "title": "Teaching Usable Privacy in HCI Education: Designing, Implementing, and Evaluating an Active Learning Graduate", "content": "---\ntitle: Teaching Usable Privacy in HCI Education: Designing, Implementing, and Evaluating an Active Learning Graduate Course\nauthors: [Sanchari Das, Dhiman Goswami, Michelle Melo, Aditya Johri, Vivian G. Motti]\nyear: 2026\njournal: EduCHI\ndoi: https://doi.org/10.1145/3803869.3803883\nresearch_type: 교육 연구\nmethodology: 혼합 방법 평가\ndata_type: 정량적 및 정성적 데이터\nsample: 두 개의 연속적인 과정 제공 (2024-2025)\ncontext: HCI 교육\ntheoretical_framework: 현대 프라이버시 연구 및 현대 프라이버시 프레임워크\nkeywords: [Usable Privacy, Higher Education, Graduate Course, Education Intervention, Use Cases, Role Playing]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 HCI 교육에서 Usable Privacy를 가르치기 위한 15주 과정의 설계, 구현 및 평가를 다룬다. 이 과정은 실제 적용 중심의 교수법을 통해 학생들이 다양한 이해관계자의 관점에서 프라이버시를 사고할 수 있도록 지원한다. 연구 결과, 학생들의 참여도 증가, 프라이버시 설계에서의 트레이드오프를 명확히 설명하는 능력 향상, 이론과 실제 간의 강한 연결이 나타났다. 또한, 교육자들이 커리큘럼에 프라이버시를 통합할 수 있도록 구체적인 과제 설명 및 채점 기준을 제공한다.\n\n# Research Logic\n## Problem\n디지털 시스템의 데이터 수집 및 추론 의존도가 증가함에 따라, HCI 분야에서 Usable Privacy 교육의 필요성이 대두되고 있다. 그러나 기존의 프라이버시 교육은 단편적이고 이론 중심적이며 실제 응용과의 연관성이 부족하다.\n\n## Theory\n이 과정은 상황적 학습 이론에 기반하여, 지식이 맥락 속에서 동적으로 구성된다고 본다. 이는 사례 연구 및 역할 놀이를 통해 학생들이 프라이버시 문제를 실제 사회 기술적 맥락에서 사고하도록 유도한다.\n\n## Design\n15주 과정은 역할 놀이, 사례 기반 논의, 게스트 강의, 다단계 연구 프로젝트를 포함하여 구성된다. 이 과정은 학생들이 프라이버시를 동적인 사회 기술적 현상으로 인식하도록 돕는다.\n\n## Findings\n혼합 방법 평가 결과, 학생들의 참여도와 프라이버시 설계에서의 트레이드오프 설명 능력이 향상되었으며, 이론과 실제 간의 연결이 강화되었다.\n\n## Conclusion\n이 연구는 HCI 교육에서 Usable Privacy를 가르치기 위한 경험적으로 기반한 모델을 제시하며, 교육자들이 커리큘럼에 프라이버시를 통합할 수 있는 실행 가능한 지침을 제공한다.\n\n# Key Findings\n- 학생들의 참여도가 증가하였다.\n- 프라이버시 설계에서의 트레이드오프를 명확히 설명하는 능력이 향상되었다.\n- 이론과 실제 간의 연결이 강화되었다.\n\n# Contributions\n## Theoretical\nUsable Privacy 교육을 위한 경험적으로 기반한 모델을 제시하였다.\n\n## Methodological\n혼합 방법 평가를 통해 교육 효과를 정량적 및 정성적으로 분석하였다.\n\n## Practical\n교육자들이 프라이버시를 커리큘럼에 통합할 수 있도록 구체적인 과제 및 채점 기준을 제공하였다.\n\n# Limitations\n- 연구는 두 개의 연속적인 과정에 한정되어 있어 일반화에 한계가 있다.\n- 특정 교육 환경에 맞춰진 커리큘럼이므로 다른 맥락에서의 적용 가능성은 명시되지 않음.\n\n# Transferable Insights\n- Usable Privacy 교육을 위한 체계적인 커리큘럼 설계가 필요하다.\n- 상황적 학습 이론을 적용한 교수법이 효과적일 수 있다.\n\n# Idea Seeds\n1. Usable Privacy 교육을 위한 온라인 플랫폼 개발.\n2. 다양한 이해관계자의 관점을 반영한 사례 연구 데이터베이스 구축.\n3. 프라이버시 교육을 위한 국제적인 협력 프로그램 설계.\n\n# Citation Snippets\n> Das, S., Goswami, D., Melo, M., Johri, A., & Motti, V. G. (2026). Teaching Usable Privacy in HCI Education: Designing, Implementing, and Evaluating an Active Learning Graduate Course. In EduCHI 2026: 8th Annual Symposium on HCI Education (EduCHI ’26), May 20–22, 2026, Toronto, ON, Canada. ACM, New York, NY, USA.\n\ntags: #UsablePrivacy, #HCI, #교육, #프라이버시, #교수법, #혼합방법, #사회기술적\n\n---\n\n요약: 이 연구는 HCI 교육에서 Usable Privacy를 가르치기 위한 15주 과정의 설계 및 평가를 다룬다. 과정은 학생들이 다양한 이해관계자의 관점에서 프라이버시를 사고하도록 지원하며, 연구 결과 학생들의 참여도와 프라이버시 설계에서의 트레이드오프 설명 능력이 향상되었다.", "link": "https://arxiv.org/abs/2604.17796v2", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Sanchari Das", "Dhiman Goswami", "Michelle Melo"], "categories": ["cs.CY", "cs.HC"]}, {"id": "2", "source": "ARXIV", "score": 14, "day": "2026-04-21", "title": "Relational AI in Education: Reciprocity, Participatory Design, and Indigenous Worldviews", "content": "---\ntitle: 교육에서의 관계적 AI: 상호성, 참여적 디자인, 그리고 토착 세계관\nauthors: [Roberto Martinez-Maldonado, Vanessa Echeverria, Jenna Hawes, YJ Kim, Zara Maddigan, Mikaela Milesi, Todd Nelson, Yi-Shan Tsai]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2604.19099v1\nresearch_type: 이론적 연구\nmethodology: 참여적 디자인\ndata_type: 문헌 연구\nsample: 명시되지 않음\ncontext: 교육 기술 및 AI\ntheoretical_framework: 관계적 디자인 이론, 토착 세계관\nkeywords: [AI 교육, 관계적 디자인, 상호성, 참여적 디자인, 토착 지식, 메타인지, 데이터 추출주의]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 교육을 단순한 정보 전달이나 개인 성과 최적화가 아닌 사회적이고 관계적인 실천으로 재조명한다. 최근 생성적 인공지능(GenAI)의 발전은 효율성과 자동화, 개인화된 지원을 강조하며 관계적 학습 과정을 약화시킬 위험이 있다. 연구자들은 AI가 사회적 및 생태적 관계를 지속할 수 있도록 설계되어야 한다고 주장하며, 교육에서의 AI 상호작용을 맥락 특정 관계로 재구성할 필요성을 강조한다. 이들은 참여적 디자인 관행과 토착 세계관을 바탕으로, 교육적 AI가 인간 관계를 대체하는 것이 아니라 지원해야 한다고 주장한다. 또한, GenAI가 교육에 도입하는 주요 긴장 요소를 설명하고, 상호성을 중심으로 한 AI 교육 디자인 방향을 제시한다.\n\n# Research Logic\n## Problem\nAI의 발전이 교육의 관계적 특성을 약화시키고 있다는 문제 제기.\n## Theory\n관계적 디자인 이론과 토착 세계관을 바탕으로 AI 교육의 재구성을 제안.\n## Design\n참여적 디자인 방법론을 통해 AI와 학습자 간의 상호작용을 재설계.\n## Findings\nAI는 인간 관계를 대체하는 것이 아니라 지원해야 하며, 상호성을 중심으로 한 디자인 방향이 필요함.\n## Conclusion\nAI 교육은 사회적, 생태적 관계를 지속할 수 있도록 설계되어야 하며, 이를 통해 교육의 본질을 회복할 수 있다.\n\n# Key Findings\n- AI는 인간 상호작용을 대체하는 것이 아니라 지원해야 한다.\n- GenAI의 사용은 메타인지 및 사회적 학습 기회를 약화시킬 수 있다.\n- 교육에서 AI의 디자인은 상호성을 중심으로 해야 하며, 책임 있는 사용이 필요하다.\n\n# Contributions\n## Theoretical\nAI 교육을 관계적 디자인 문제로 개념화함.\n## Methodological\n참여적 디자인을 통한 AI 교육의 재구성을 제안함.\n## Practical\nAI 사용의 책임 있는 방향성을 제시하고, 교육적 맥락에서의 AI 활용 방안을 모색함.\n\n# Limitations\n- 연구의 샘플이 명시되지 않음.\n- 특정 교육 맥락에 대한 실증적 데이터 부족.\n\n# Transferable Insights\n- AI 교육 디자인에서 상호성을 강조하는 것이 중요함.\n- 토착 세계관을 포함한 다양한 문화적 관점을 반영해야 함.\n\n# Idea Seeds\n1. AI와의 상호작용을 통해 메타인지 능력을 강화하는 프로그램 개발.\n2. 토착 지식을 반영한 AI 교육 콘텐츠 설계.\n3. AI 사용의 사회적 책임을 강조하는 교육 커리큘럼 개발.\n\n# Citation Snippets\n> Martinez-Maldonado, R., Echeverria, V., Hawes, J., Kim, YJ, Maddigan, Z., Milesi, M., Nelson, T., & Tsai, YS. (2026). 교육에서의 관계적 AI: 상호성, 참여적 디자인, 그리고 토착 세계관. arXiv. \n\ntags: #AI교육, #관계적디자인, #상호성, #참여적디자인, #토착지식, #메타인지, #데이터추출주의\n\n---\n\n요약: 본 연구는 AI가 교육에서 인간 관계를 대체하는 것이 아니라 지원해야 한다고 주장하며, 관계적 디자인 이론과 토착 세계관을 통해 AI 교육의 재구성을 제안한다. GenAI의 사용이 메타인지 및 사회적 학습 기회를 약화시킬 수 있음을 지적하고, AI 교육 디자인에서 상호성을 강조할 필요성을 제시한다.", "link": "https://arxiv.org/abs/2604.19099v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Roberto Martinez-Maldonado", "Vanessa Echeverria", "Jenna Hawes"], "categories": ["cs.HC", "cs.AI"]}, {"id": "3", "source": "ARXIV", "score": 14, "day": "2026-04-20", "title": "Evaluating Answer Leakage Robustness of LLM Tutors against Adversarial Student Attacks", "content": "---\ntitle: LLM 튜터의 답변 유출 강건성 평가: 적대적 학생 공격에 대한 연구\nauthors: Jin Zhao, Marta Knežević, Tanja Käser\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2604.18660v1\nresearch_type: 실험적 연구\nmethodology: 다중 턴 대화 시뮬레이션\ndata_type: 텍스트 데이터\nsample: GSM8K 데이터셋\ncontext: 교육적 맥락에서 LLM 기반 튜터의 강건성 평가\ntheoretical_framework: 교육 심리학, 인공지능\nkeywords: [human-ai collaboration, ai tutoring, instructional design, scaffolding, ai literacy, education, learning analytics, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 교육에서의 대형 언어 모델(LLM)의 사용이 증가함에 따라, 학생들이 적대적으로 행동할 때 LLM 튜터의 답변 유출 강건성을 평가한다. 기존 연구는 협력적인 학습자를 가정하고 답변 유출을 평가했으나, 본 연구는 적대적 학생 행동을 고려하여 다양한 공격 기법을 적용한다. 연구 결과, LLM 튜터는 다양한 공격에 대해 종종 효과적으로 방어하지 못하며, 이를 해결하기 위해 튜터의 강건성을 평가할 수 있는 새로운 기준을 제안한다. 또한, 간단하지만 효과적인 방어 전략을 통해 답변 유출을 줄이는 방법을 제시한다.\n\n# Research Logic\n## Problem\nLLM 튜터가 학생의 적대적 행동에 대해 얼마나 강건한지를 평가하는 체계적인 방법이 부족하다.\n## Theory\n교육적 대화에서 LLM의 도움을 받는 과정에서 발생하는 답변 유출 문제를 다룬다.\n## Design\n다양한 적대적 공격 기법을 적용하여 LLM 튜터의 반응을 평가하는 다중 턴 대화 시뮬레이션을 설계하였다.\n## Findings\nLLM 튜터는 적대적 학생 공격에 대해 종종 효과적으로 방어하지 못하며, 새로운 적대적 학생 에이전트를 통해 강건성을 평가할 수 있는 기준을 제안하였다.\n## Conclusion\nLLM 기반 튜터의 강건성을 높이기 위한 방어 전략이 필요하며, 이를 통해 교육적 효과를 극대화할 수 있다.\n\n# Key Findings\n- LLM 튜터는 다양한 적대적 공격에 대해 종종 답변을 유출한다.\n- 새로운 적대적 학생 에이전트를 통해 튜터의 강건성을 평가할 수 있는 기준이 제안되었다.\n- 간단한 방어 전략이 답변 유출을 줄이는 데 효과적이다.\n\n# Contributions\n## Theoretical\nLLM 튜터의 교육적 강건성에 대한 새로운 평가 기준을 제시하였다.\n## Methodological\n적대적 학생 행동을 고려한 다중 턴 대화 시뮬레이션 방법론을 개발하였다.\n## Practical\n교육적 맥락에서 LLM 튜터의 효과성을 높이기 위한 방어 전략을 제안하였다.\n\n# Limitations\n- 연구에서 사용된 데이터셋이 특정 문제 유형에 국한되어 있다.\n- 적대적 공격 기법의 다양성이 제한적일 수 있다.\n\n# Transferable Insights\n- LLM 튜터의 강건성을 평가하기 위한 새로운 기준이 다른 교육적 도구에도 적용될 수 있다.\n- 교육적 대화에서의 적대적 행동을 이해하는 것이 중요하다.\n\n# Idea Seeds\n1. 다양한 교육적 맥락에서 LLM 튜터의 강건성을 평가하는 연구.\n2. 적대적 공격 기법의 확장을 통한 LLM 튜터의 방어 전략 개발.\n3. LLM 튜터의 교육적 효과성을 높이기 위한 사용자 인터페이스 개선.\n\n# Citation Snippets\n> Zhao, J., Knežević, M., & Käser, T. (2026). Evaluating Answer Leakage Robustness of LLM Tutors against Adversarial Student Attacks. arXiv. https://arxiv.org/abs/2604.18660v1\n\ntags: #human-ai collaboration, #ai tutoring, #instructional design, #scaffolding, #ai literacy, #education, #learning analytics, #ai pedagogy\n\n---\n\n요약: 본 연구는 LLM 튜터의 답변 유출 강건성을 적대적 학생 공격을 통해 평가하였다. 연구 결과, LLM 튜터는 다양한 공격에 대해 효과적으로 방어하지 못하며, 새로운 평가 기준과 방어 전략이 필요함을 제시하였다.", "link": "https://arxiv.org/abs/2604.18660v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Jin Zhao", "Marta Knežević", "Tanja Käser"], "categories": ["cs.CR", "cs.AI"]}, {"id": "4", "source": "OPENALEX", "score": 14, "day": "2026-01-01", "title": "AI Integration in Education: A Four-stage Cyclical Model Proposal", "content": "---\ntitle: AI Integration in Education: A Four-stage Cyclical Model Proposal\nauthors: [Ahmet Cançelik, Gamze BİLEN]\nyear: 2026\njournal: 명시되지 않음\ndoi: https://doi.org/10.47857/irjms.2026.v07i02.010881\nresearch_type: 명시되지 않음\nmethodology: 내러티브 문헌 검토\ndata_type: 명시되지 않음\nsample: 명시되지 않음\ncontext: 터키\ntheoretical_framework: 구성주의 학습 이론, 사회기술 시스템 접근법\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 교육 시스템에 AI를 통합하는 과정에서 교육적 및 기술적 관점이 주로 다루어지는 반면, 거버넌스 및 맥락적 차원이 충분히 고려되지 않음을 지적한다. 이에 따라, 본 연구는 AI 통합을 위한 네 단계 순환 모델(평가, 설계, 구현, 평가)을 제안하며, 이는 구성주의 학습 이론과 사회기술 시스템 접근법에 기반하고 있다. 제안된 모델은 AI 통합 과정에서 윤리적 고려사항을 지속적으로 반영할 수 있도록 피드백 및 평가 시스템을 포함하고 있다. 연구는 터키 맥락을 중심으로 하며, 다양한 교육적 맥락에 적응할 수 있는 모델로 설계되었으나, 다양한 시스템에서의 적용 가능성은 추가적인 실증 연구가 필요하다.\n\n# Research Logic\n## Problem\nAI 통합 과정에서 거버넌스 및 맥락적 차원의 부족.\n## Theory\n구성주의 학습 이론 및 사회기술 시스템 접근법.\n## Design\n네 단계 순환 모델 제안.\n## Findings\nAI 통합 과정에서의 지속적인 피드백 및 윤리적 고려의 필요성.\n## Conclusion\n제안된 모델은 다양한 교육적 맥락에 적응 가능하나, 실증적 검증이 필요.\n\n# Key Findings\n- AI 통합을 위한 네 단계 순환 모델 제안.\n- 윤리적 고려사항을 반영하는 피드백 시스템 필요.\n- 터키 교육 시스템의 특수성 강조.\n\n# Contributions\n## Theoretical\n구성주의 및 사회기술 시스템 이론에 기반한 새로운 모델 제안.\n## Methodological\n내러티브 문헌 검토를 통한 이론적 토대 구축.\n## Practical\nAI 통합을 위한 실용적인 프레임워크 제공.\n\n# Limitations\n- 실증적 데이터 부족.\n- 특정 맥락(터키)에 국한된 논의.\n\n# Transferable Insights\n- 다양한 교육적 맥락에 적용 가능한 모델의 필요성.\n- AI 통합 과정에서의 윤리적 고려의 중요성.\n\n# Idea Seeds\n1. AI 통합을 위한 교육적 정책 개발.\n2. 다양한 문화적 맥락에서의 실증 연구 수행.\n3. AI 윤리 교육 프로그램 개발.\n\n# Citation Snippets\n> Cançelik, A., & BİLEN, G. (2026). AI Integration in Education: A Four-stage Cyclical Model Proposal. \n\ntags: #human-ai_collaboration, #classroom_ai, #ai_tutoring, #instructional_design, #scaffolding, #tpack, #ai_literacy, #teacher_ai, #education, #learning_analytics, #llm_classroom, #ai_pedagogy\n\n---\n\n요약: 본 연구는 AI 통합을 위한 네 단계 순환 모델을 제안하며, 윤리적 고려사항을 반영하는 피드백 시스템의 필요성을 강조한다. 터키 교육 시스템을 중심으로 논의하였으나, 다양한 교육적 맥락에 적용 가능성을 제시한다. 실증적 검증이 필요하다.", "link": "https://doi.org/10.47857/irjms.2026.v07i02.010881", "altLink": "https://openalex.org/W7155089246", "hasDoi": true, "hasReview": true, "authors": ["Ahmet Cançelik", "Gamze BİLEN"], "categories": ["Process (computing)", "Computer science", "Narrative", "Knowledge management", "Corporate governance"]}, {"id": "5", "source": "ARXIV", "score": 13, "day": "2026-04-20", "title": "Students Know AI Should Not Replace Thinking, but How Do They Regulate It? The TACO Framework for Human-AI Cognitive Partnership", "content": "As generative artificial intelligence becomes increasingly embedded in educational practice, a central concern is whether students use AI as cognitive support or as a substitute for thinking. Prior research shows that learners recognise this boundary conceptually and acknowledge that \"AI should not replace thinking.\" However, whether such awareness translates into structured regulation during actual AI use remains unclear.   Drawing on data from Hong Kong secondary students, this study examines how learners perceive their management of the boundary between assistance and outsourcing in practice. Findings show that awareness did not consistently translate into regulation; ethical belief did not necessarily lead to strategic execution; and conceptual endorsement did not guarantee operational behaviour.   These findings suggest that the challenge is not teaching students that AI should not replace thinking, as they already know this, but providing them with structured mechanisms to regulate how AI is used within learning processes. In response, the study introduces the TACO framework (Think-Ask-Check-Own), a process-oriented model designed to operationalise the boundary between cognitive support and cognitive substitution. By shifting attention from ethical awareness to cognitive regulation, the study contributes a learner-grounded approach to sustaining AI as a dynamic cognitive partner in education.", "link": "https://arxiv.org/abs/2604.18737v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Cecilia Ka Yuk Chan"], "categories": ["cs.CY", "cs.HC"]}, {"id": "6", "source": "ARXIV", "score": 13, "day": "2026-04-18", "title": "The Reliance Negotiation Framework: A Dynamic Process Model of Student LLM Engagement in Academic Writing", "content": "Student engagement with large language models (LLMs) in academic writing is not a stable trait, an adoption decision, or a competency level; it is a continuously negotiated process that existing frameworks cannot adequately theorize. Typological models provide categories without mechanisms; technology acceptance models explain adoption but not post-adoption quality; AI literacy frameworks treat competency as a static predictor rather than a live input. None accounts for within-student variability across tasks, the developmental paradox whereby experience produces habituation rather than sophistication, or principled non-use as a form of ethical reasoning. This article introduces the Reliance Negotiation Framework (RNF), developed from a sequential explanatory mixed-methods study of 382 undergraduates at a public minority-serving institution in the United States (survey, N = 382; 14 semi-structured interviews; three qualitative survey strands; 1,435 coded instances). The RNF reconceptualizes LLM reliance as an ongoing negotiation among four concurrent inputs (perceived benefits, perceived risks, ethical commitments, and situational demands) with outputs that recursively modify subsequent decisions. A Two-Model Architecture accommodates the 13.0% of participants whose categorical ethical commitments foreclose negotiation entirely. The framework generates four falsifiable predictions with implications for AI literacy pedagogy, academic integrity policy, and equity-centered practice at minority-serving institutions.", "link": "https://arxiv.org/abs/2604.16772v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Shahin Hossain"], "categories": ["cs.CY", "cs.AI", "cs.HC"]}, {"id": "7", "source": "ARXIV", "score": 11, "day": "2026-04-20", "title": "Mix and Match: Context Pairing for Scalable Topic-Controlled Educational Summarisation", "content": "Topic-controlled summarisation enables users to generate summaries focused on specific aspects of source documents. This paper investigates a data augmentation strategy for training small language models (sLMs) to perform topic-controlled summarisation. We propose a pairwise data augmentation method that combines contexts from different documents to create contrastive training examples, enabling models to learn the relationship between topics and summaries more effectively. Using the SciTLDR dataset enriched with Wikipedia-derived topics, we systematically evaluate how augmentation scale affects model performance. Results show consistent improvements in win rate and semantic alignment as the augmentation scale increases, while the amount of real training data remains fixed. Consequently, a T5-base model trained with our augmentation approach achieves competitive performance relative to larger models, despite using significantly fewer parameters and substantially fewer real training examples.", "link": "https://arxiv.org/abs/2604.18087v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Nathikan Yodthapa", "Thanapong Intharah", "Sahan Bulathwela"], "categories": ["cs.CL", "cs.AI", "cs.CY"]}, {"id": "8", "source": "ARXIV", "score": 11, "day": "2026-04-19", "title": "CoAct: Co-Active LLM Preference Learning with Human-AI Synergy", "content": "Learning from preference-based feedback has become an effective approach for aligning LLMs across diverse tasks. However, high-quality human-annotated preference data remains expensive and scarce. Existing methods address this challenge through either self-rewarding, which scales by using purely AI-generated labels but risks unreliability, or active learning, which ensures quality through oracle annotation but cannot fully leverage unlabeled data. In this paper, we present CoAct, a novel framework that synergistically combines self-rewarding and active learning through strategic human-AI collaboration. CoAct leverages self-consistency to identify both reliable self-labeled data and samples that require oracle verification. Additionally, oracle feedback guides the model to generate new instructions within its solvable capability. Evaluated on three reasoning benchmarks across two model families, CoAct achieves average improvements of +13.25% on GSM8K, +8.19% on MATH, and +13.16% on WebInstruct, consistently outperforming all baselines.", "link": "https://arxiv.org/abs/2604.17501v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Ruiyao Xu", "Mihir Parmar", "Tiankai Yang"], "categories": ["cs.CL"]}, {"id": "9", "source": "ARXIV", "score": 10, "day": "2026-04-21", "title": "Fairness Audits of Institutional Risk Models in Deployed ML Pipelines", "content": "Fairness audits of institutional risk models are critical for understanding how deployed machine learning pipelines allocate resources. Drawing on multi-year collaboration with Centennial College, where our prior ethnographic work introduced the ASP-HEI Cycle, we present a replica-based audit of a deployed Early Warning System (EWS), replicating its model using institutional training data and design specifications. We evaluate disparities by gender, age, and residency status across the full pipeline (training data, model predictions, and post-processing) using standard fairness metrics. Our audit reveals systematic misallocation: younger, male, and international students are disproportionately flagged for support, even when many ultimately succeed, while older and female students with comparable dropout risk are under-identified. Post-processing amplifies these disparities by collapsing heterogeneous probabilities into percentile-based risk tiers. This work provides a replicable methodology for auditing institutional ML systems and shows how disparities emerge and compound across stages, highlighting the importance of evaluating construct validity alongside statistical fairness. It contributes one empirical thread to a broader program investigating algorithms, student data, and power in higher education.", "link": "https://arxiv.org/abs/2604.19468v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Kelly McConvey", "Dipto Das", "Maya Ghai"], "categories": ["cs.CY", "cs.AI", "cs.HC"]}];
let PAGE_SIZE = 10;
let currentTab = 'all';
let currentSource = 'ALL';
let currentSort = 'score';
let currentPage = 1;
let currentCategory = '';
let currentMinDate = '';
let currentMaxDate = '';
let hideVisited = false;
let filtered = [];
let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
let searchHistory = JSON.parse(localStorage.getItem('searchHistory')) || [];
let visited = JSON.parse(localStorage.getItem('visited')) || [];

function toggleTheme() {
  const html = document.documentElement;
  const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
  html.dataset.theme = next;
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  localStorage.setItem('theme', next);
}

function toggleTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSource(btn) {
  currentSource = btn.dataset.source;
  document.querySelectorAll('#sourceFilters .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSort(btn) {
  currentSort = btn.dataset.sort;
  document.querySelectorAll('#sortGroup .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  render();
}

function toggleFavorite(id, e) {
  e.stopPropagation();
  const idx = favorites.indexOf(id);
  if (idx === -1) {
    favorites.push(id);
  } else {
    favorites.splice(idx, 1);
  }
  localStorage.setItem('favorites', JSON.stringify(favorites));
  applyFilters();
}

function recordVisit(id) {
  if (!visited.includes(id)) {
    visited.push(id);
  }
  localStorage.setItem('visited', JSON.stringify(visited));
}

function recordSearch(query) {
  if (query.trim() && !searchHistory.includes(query)) {
    searchHistory.unshift(query);
    if (searchHistory.length > 10) searchHistory.pop();
    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
  }
}

function downloadJSON() {
  const data = JSON.stringify(filtered, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadCSV() {
  const headers = ['제목', '출처', '스코어', '리뷰여부', '링크'];
  const rows = filtered.map(p => [
    '"' + p.title.replace(/"/g, '""') + '"',
    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

  const state = {

    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
</html>
