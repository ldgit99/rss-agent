<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-03-05 23:50</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "ERIC", "score": 32, "day": "명시되지 않음", "title": "Enhancing Instructional Design Learning: A Comparative Study of Scaffolding by a 5E Instructional Model-Informed Artificial Intelligence Chatbot and a Human Teacher", "content": "---\ntitle: Enhancing Instructional Design Learning: A Comparative Study of Scaffolding by a 5E Instructional Model-Informed Artificial Intelligence Chatbot and a Human Teacher\nauthors: Shurui Bai, Chung Kwan Lo, Chen Yang\nyear: 명시되지 않음\njournal: 명시되지 않음\ndoi: 명시되지 않음\nresearch_type: 비교 연구\nmethodology: 실험적 연구\ndata_type: 양적 데이터\nsample: 학생들\ncontext: 교육 환경\ntheoretical_framework: 5E 교육 모델\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 5E 교육 모델에 기반한 인공지능(AI) 챗봇과 인간 교사의 스캐폴딩을 비교하여 학생들의 교육 설계 학습 성과와 인식을 조사하였다. 연구 결과, AI 챗봇이 인간 교사의 스캐폴딩과 결합될 경우, 학생들의 교육 설계 성과가 유의미하게 향상되었다. 챗봇은 \"탐색\" 단계에서 교육 설계 프레임워크와 수업 활동에 대한 유용한 제안을 제공하였으며, \"평가\" 단계에서는 학생들의 설계 계획에 대한 즉각적인 피드백을 제공하였다. 그러나 학생들은 챗봇의 평가 품질에 대한 우려를 표명하였고, 이는 과정 평가 기준과의 정렬이 부족하다고 지적하였다. 연구는 교육 설계 개념화를 위한 AI 챗봇의 사용을 권장하나, 최종 설계 작업 평가와 적시 지원 제공에 있어 인간 교사의 중요성을 강조하였다.\n\n# Research Logic\n## Problem\nAI 도구의 일반적인 한계를 극복하기 위한 교육 설계 지원 필요성.\n## Theory\n5E 교육 모델을 기반으로 한 AI 챗봇의 효과성.\n## Design\nAI 챗봇과 인간 교사의 스캐폴딩을 비교하는 실험적 연구 설계.\n## Findings\nAI 챗봇과 인간 교사의 결합이 학생들의 교육 설계 성과를 유의미하게 향상시킴.\n## Conclusion\nAI 챗봇은 교육 설계 개념화에 유용하나, 인간 교사의 역할이 여전히 중요함.\n\n# Key Findings\n- AI 챗봇과 인간 교사의 스캐폴딩 결합이 학생 성과 향상에 기여함.\n- 챗봇은 교육 설계 프레임워크에 대한 유용한 제안을 제공함.\n- 학생들은 챗봇의 평가 품질에 대한 우려를 표명함.\n\n# Contributions\n## Theoretical\n5E 교육 모델을 통한 AI 챗봇의 교육적 효과에 대한 새로운 통찰 제공.\n## Methodological\nAI와 인간 교사의 스캐폴딩 효과를 비교하는 실험적 접근법 제시.\n## Practical\nAI 챗봇을 교육 설계 과정에 통합하는 방법론적 지침 제공.\n\n# Limitations\n- 연구의 샘플 크기와 다양성이 명시되지 않음.\n- 챗봇의 평가 품질에 대한 학생들의 피드백이 제한적임.\n\n# Transferable Insights\n- AI 챗봇은 교육 설계 지원에 효과적일 수 있음.\n- 인간 교사의 피드백과 지원이 여전히 필수적임.\n\n# Idea Seeds\n1. AI 챗봇의 평가 품질 개선 방안 연구.\n2. 다양한 교육 환경에서 AI 챗봇의 효과성 비교.\n3. AI와 인간 교사의 협력 모델 개발.\n\n# Citation Snippets\n>\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #ai literacy, #education\n\n---\n\n요약: 본 연구는 5E 교육 모델에 기반한 AI 챗봇과 인간 교사의 스캐폴딩을 비교하여 학생들의 교육 설계 성과를 조사하였다. AI 챗봇은 학생들에게 유용한 제안을 제공하였으나, 평가 품질에 대한 우려가 제기되었다. 연구는 AI 챗봇의 활용을 권장하나, 인간 교사의 역할이 중요함을 강조하였다.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Shurui Bai", "Chung Kwan Lo", "Chen Yang"], "categories": ["ERIC"]}, {"id": "1", "source": "ERIC", "score": 29, "day": "명시되지 않음", "title": "Designing and Evaluating an AI-Integrated Curriculum for Teaching Methods Courses in Teacher Education", "content": "---\ntitle: AI 통합 커리큘럼 설계 및 평가: 교사 교육의 교수 방법 과정\nauthors: Ismail Kasarci\nyear: 명시되지 않음\njournal: ERIC\ndoi: 명시되지 않음\nresearch_type: 설계 기반 연구\nmethodology: 혼합 방법\ndata_type: 양적 및 질적 데이터\nsample: 86명의 3학년 예비 교사\ncontext: 에스키셰히르 오스망가지 대학교의 교수 원리 및 방법 과정\ntheoretical_framework: TPACK\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 에스키셰히르 오스망가지 대학교의 교수 원리 및 방법 과정에서 예비 교사의 교수법 AI 통합 역량을 향상시키기 위해 AI 통합 커리큘럼 모듈을 설계, 구현 및 평가하였다. 2024-2025 학년도 동안 다양한 전공의 86명의 3학년 예비 교사가 참여하였으며, 6주 동안 AI 지원 수업 계획, AI 출력의 비판적 평가 및 윤리적 및 교수적 기준을 사용한 자료 재설계를 포함하였다. 데이터는 AI 통합 역량 척도, 수업 계획 루브릭, 반성 저널 및 포커스 그룹 인터뷰를 통해 수집되었다. 양적 결과는 AI 통합 역량의 유의미한 증가(t = 5.84, p < 0.001)를 보여주었으며, 특히 교수적 적응 및 창의적 사용에서 두드러졌다. 질적 분석에서는 세 가지 주제가 도출되었다: emerging pedagogical confidence, AI의 한계 및 편향에 대한 비판적 인식, 향상된 교수적 창의성. 연구 결과는 구조화된 교수 중심의 AI 통합이 예비 교사를 기술 강화 교육에 효과적으로 준비시킬 수 있음을 시사한다.\n\n# Research Logic\n## Problem\n예비 교사의 AI 통합 역량 부족 문제.\n## Theory\nTPACK 이론을 기반으로 한 교수법 AI 통합.\n## Design\nAI 통합 커리큘럼 모듈 설계 및 구현.\n## Findings\nAI 통합 역량의 유의미한 증가 및 질적 주제 도출.\n## Conclusion\n구조화된 AI 통합이 예비 교사 교육에 긍정적 영향을 미침.\n\n# Key Findings\n- AI 통합 역량이 유의미하게 증가함(t = 5.84, p < 0.001).\n- 교수적 적응 및 창의적 사용에서 두드러진 향상.\n- AI 도구가 브레인스토밍, 차별화 및 반성적 사고를 지원함.\n\n# Contributions\n## Theoretical\nTPACK 이론을 통한 AI 통합 교육의 새로운 프레임워크 제안.\n## Methodological\n혼합 방법을 통한 데이터 수집 및 분석 접근법.\n## Practical\n교사 교육 커리큘럼에 AI 리터러시 및 교수법 혁신 통합 제안.\n\n# Limitations\n- 연구의 시간적 한계로 인한 결과의 일반화 제한.\n- 참여자의 전공 다양성으로 인한 결과 해석의 복잡성.\n\n# Transferable Insights\n- AI 통합 교육의 필요성과 효과성.\n- 예비 교사 교육에서의 윤리적 AI 사용의 중요성.\n\n# Idea Seeds\n1. AI 도구의 윤리적 사용에 대한 교육 프로그램 개발.\n2. AI 통합 교육의 장기적 효과에 대한 후속 연구.\n3. 다양한 교육 환경에서의 AI 통합 커리큘럼 적용 가능성 탐색.\n\n# Citation Snippets\n> Kasarci, I. (명시되지 않음). AI 통합 커리큘럼 설계 및 평가: 교사 교육의 교수 방법 과정. ERIC.\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Ismail Kasarci"], "categories": ["ERIC"]}, {"id": "2", "source": "ARXIV", "score": 20, "day": "2026-03-04", "title": "STEM Faculty Perspectives on Generative AI in Higher Education", "content": "---\ntitle: STEM Faculty Perspectives on Generative AI in Higher Education\nauthors: [Akila de Silva, Isabel Hyo Jung Song, Hui Yang, Shah Rukh Humayoun]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2603.04001v1\nresearch_type: 질적 연구\nmethodology: 포커스 그룹 연구\ndata_type: 질적 데이터\nsample: 29명의 STEM 교수진\ncontext: 미국의 대형 공립 대학\ntheoretical_framework: 명시되지 않음\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n이 연구는 미국의 대형 공립 대학에서 29명의 STEM 교수진을 대상으로 진행된 포커스 그룹 연구의 결과를 제시한다. 연구는 교수들이 생성적 인공지능(GenAI)을 수업에 통합하는 방법, 학생 학습에 대한 인식되는 이점과 도전 과제, 그리고 효과적이고 책임 있는 GenAI 채택을 위한 필요한 제도적 지원을 조사한다. 교수들은 GenAI의 사용이 학생의 개념 이해의 격차를 숨길 수 있다는 우려와 함께, 평가의 유효성에 대한 문제를 제기하였다. 연구 결과는 GenAI의 효과적인 통합이 기술적 채택뿐만 아니라 평가, 교수법 및 제도적 거버넌스를 재고해야 함을 시사한다.\n\n# Research Logic\n## Problem\n교수들이 GenAI 도구의 사용에 대해 다양한 반응을 보이며, 이는 교육적 전략과 제도적 정책 개발에 필수적이다.\n\n## Theory\nGenAI의 교육적 활용과 그에 대한 교수들의 인식을 이해하는 것이 중요하다.\n\n## Design\n포커스 그룹을 통해 교수들의 경험과 인식을 수집하였다.\n\n## Findings\n교수들은 GenAI의 사용이 학생 학습에 긍정적이지만, 평가의 유효성과 학문적 진실성에 대한 우려를 표명하였다.\n\n## Conclusion\nGenAI의 효과적인 통합은 기술적 채택을 넘어서는 접근이 필요하다.\n\n# Key Findings\n- 교수들은 GenAI 도구를 수업 설계와 학습 활동에 통합하고 있다.\n- GenAI 사용이 학생의 과제 제출률을 높일 수 있지만, 개념 이해의 격차를 숨길 수 있다.\n- 제도적 지원이 필요하며, 정책과 자원 배분의 균형이 중요하다.\n\n# Contributions\n## Theoretical\nGenAI 사용에 대한 교수들의 관점을 이해하는 데 기여한다.\n\n## Methodological\n포커스 그룹 연구를 통해 질적 데이터를 수집하는 방법론적 기여가 있다.\n\n## Practical\n제도적 지원을 위한 교수들의 권고사항을 제시한다.\n\n# Limitations\n- 연구는 특정 대학의 교수진을 대상으로 하여 일반화에 한계가 있다.\n- 질적 연구의 특성상 결과의 주관성이 존재할 수 있다.\n\n# Transferable Insights\n- GenAI의 교육적 활용에 대한 교수들의 다양한 관점을 반영할 수 있다.\n- 제도적 지원의 필요성을 강조하며, 다른 교육 기관에서도 적용 가능하다.\n\n# Idea Seeds\n1. GenAI 도구의 효과적인 사용을 위한 교수 연수 프로그램 개발.\n2. GenAI의 윤리적 사용을 위한 가이드라인 마련.\n3. GenAI 통합을 위한 평가 방법의 혁신.\n\n# Citation Snippets\n> de Silva, A., Song, I. H. J., Yang, H., & Humayoun, S. R. (2026). STEM Faculty Perspectives on Generative AI in Higher Education. arXiv. https://arxiv.org/abs/2603.04001v1\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy\n\n---\n\n요약: 이 연구는 STEM 교수들이 생성적 인공지능(GenAI)을 수업에 통합하는 방법과 그에 대한 인식, 그리고 필요한 제도적 지원을 조사하였다. 교수들은 GenAI의 사용이 학생 학습에 긍정적 영향을 미칠 수 있지만, 평가의 유효성과 학문적 진실성에 대한 우려를 표명하였다. 연구 결과는 GenAI의 효과적인 통합이 기술적 채택을 넘어서는 접근이 필요함을 시사한다.", "link": "https://arxiv.org/abs/2603.04001v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Akila de Silva", "Isabel Hyo Jung Song", "Hui Yang"], "categories": ["cs.CY", "cs.AI"]}, {"id": "3", "source": "ARXIV", "score": 19, "day": "2026-03-04", "title": "Bridging Pedagogy and Play: Introducing a Language Mapping Interface for Human-AI Co-Creation in Educational Game Design", "content": "---\ntitle: Bridging Pedagogy and Play: Introducing a Language Mapping Interface for Human-AI Co-Creation in Educational Game Design\nauthors: [Daijin Yang, Erica Kleinman, Casper Harteveld]\nyear: 2026\njournal: Extended Abstracts of the 2026 CHI Conference on Human Factors in Computing Systems\ndoi: https://doi.org/10.1145/3772363.3798862\nresearch_type: 실험적 연구\nmethodology: 웹 도구 설계 및 개발\ndata_type: 질적 데이터\nsample: 명시되지 않음\ncontext: 교육 게임 디자인\ntheoretical_framework: 언어 기반 협업 프레임워크\nkeywords: [LLM, Mixed-Initiative Co-Creation, AI, Educational Games]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 교육 게임 디자인에서 인간-AI 협업을 위한 언어 매핑 인터페이스를 소개한다. 기존의 교육 게임 디자인 도구들은 프로그래밍 전문 지식의 필요성을 줄이지만, 비전문가 디자이너가 AI 시스템의 불투명한 제안에 의존하게 만드는 문제를 해결하지 못한다. 연구팀은 언어를 LLM 지원 교육 게임 디자인의 주요 인터페이스로 설정한 웹 도구를 설계하였다. 이 도구는 사용자가 LLM 보조자와 협력하여 교육적 의도를 명시하고 편집할 수 있도록 하여 비전문가 디자이너의 디자인 장벽을 낮추고, 인간의 주체성을 보존하며, 교육적 의도와 게임 플레이 간의 정렬을 가능하게 한다.\n\n# Research Logic\n## Problem\n교육 게임 디자인에서의 비전문가 디자이너의 어려움과 AI의 불투명한 제안으로 인한 문제.\n## Theory\n언어 기반 협업 프레임워크를 통해 교육적 의도를 명시적으로 표현하고 조정할 수 있는 가능성.\n## Design\nLLM 지원 교육 게임 디자인을 위한 웹 도구 설계, 언어 매핑 프레임워크 적용.\n## Findings\n비전문가 디자이너가 교육적 의도를 명확히 하고 게임 디자인 결정을 내릴 수 있도록 지원함.\n## Conclusion\n제안된 도구는 교육적 의도와 게임 플레이 간의 정렬을 가능하게 하여 교육 게임 디자인의 효율성을 높일 수 있다.\n\n# Key Findings\n- 언어 매핑 프레임워크는 교육적 의도를 명확히 하고 편집 가능하게 만든다.\n- 비전문가 디자이너의 디자인 장벽을 낮추는 데 기여한다.\n- 인간의 주체성을 보존하며 AI와의 협업을 통해 교육적 목표를 달성할 수 있다.\n\n# Contributions\n## Theoretical\n언어 기반 협업의 중요성을 강조하고 교육 게임 디자인에서의 AI 활용 가능성을 제시.\n## Methodological\nLLM 지원 도구의 설계 및 개발을 통해 실험적 접근 방식을 제공.\n## Practical\n비전문가 디자이너를 위한 교육 게임 디자인 도구의 실용성을 높임.\n\n# Limitations\n- 연구 결과의 일반화 가능성에 대한 제한.\n- 실제 교육 환경에서의 적용 가능성에 대한 추가 연구 필요.\n\n# Transferable Insights\n- 언어 기반 협업 프레임워크는 다양한 교육적 맥락에서 활용 가능.\n- AI와의 협업을 통해 교육적 디자인 프로세스를 개선할 수 있는 방법 제시.\n\n# Idea Seeds\n1. 다양한 교육적 맥락에서의 언어 매핑 프레임워크 적용 연구.\n2. LLM 지원 도구의 사용자 경험 개선을 위한 피드백 시스템 개발.\n3. 교육 게임 디자인의 효과성을 평가하기 위한 실험적 연구 설계.\n\n# Citation Snippets\n> Yang, D., Kleinman, E., & Harteveld, C. (2026). Bridging Pedagogy and Play: Introducing a Language Mapping Interface for Human-AI Co-Creation in Educational Game Design. In Extended Abstracts of the 2026 CHI Conference on Human Factors in Computing Systems (CHI EA ’26), April 13–17, 2026, Barcelona, Spain. ACM, New York, NY, USA. https://doi.org/10.1145/3772363.3798862\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #education, #learning analytics, #ai pedagogy\n\n---\n\n요약: 본 연구는 교육 게임 디자인에서 인간-AI 협업을 위한 언어 매핑 인터페이스를 제안하며, 비전문가 디자이너가 교육적 의도를 명확히 하고 게임 디자인 결정을 내릴 수 있도록 지원하는 도구를 설계하였다. 이 도구는 교육적 목표와 게임 플레이 간의 정렬을 가능하게 하여 교육 게임 디자인의 효율성을 높일 수 있는 가능성을 보여준다.", "link": "https://arxiv.org/abs/2603.03644v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Daijin Yang", "Erica Kleinman", "Casper Harteveld"], "categories": ["cs.HC", "cs.AI"]}, {"id": "4", "source": "ARXIV", "score": 18, "day": "2026-03-04", "title": "Inclusive Mobile Learning: How Technology-Enabled Language Choice Supports Multilingual Students", "content": "---\ntitle: Inclusive Mobile Learning: How Technology-Enabled Language Choice Supports Multilingual Students\nauthors: [Phenyo Phemelo Moletsane, Michael W. Asher, Christine Kwon, Paulo F. Carvalho, Amy Ogan]\nyear: 2026\njournal: Proceedings of the 2026 CHI Conference on Human Factors in Computing Systems (CHI ’26)\ndoi: https://doi.org/10.1145/3772318.3791139\nresearch_type: 준실험 연구\nmethodology: 양적 연구\ndata_type: 설문조사 및 성적 데이터\nsample: 2,931명\ncontext: 우간다의 비공식 모바일 기반 공학 교육 과정\ntheoretical_framework: 다국어 교육 기술\nkeywords: [다국어 교육 기술, 원격 학습, 상호작용 라디오 교육, 교육 언어, 지역 언어, 언어 선택, 포괄적 모바일 학습]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 다국어 교육의 필요성을 강조하며, 우간다에서 2,931명의 참가자를 대상으로 한 준실험 연구를 통해 지역 언어인 Leb Lango, 영어, 또는 두 언어를 혼합한 교육 옵션을 제공하는 모바일 기반 공학 교육 과정의 효과를 분석하였다. 연구 결과, Leb Lango를 선택한 학습자들은 낮은 초기 성적에도 불구하고 더 높은 참여도와 빠른 학습 성과를 보였으며, 최종 시험 결과는 영어 및 혼합 언어 학습자와 유사한 수준에 도달하였다. 이러한 결과는 지역 언어 옵션이 교육 기술의 접근성을 높이는 효과적인 방법임을 시사한다.\n\n# Research Logic\n## Problem\n다국어 교육의 구현이 어려운 상황에서, 기술이 이를 어떻게 해결할 수 있는지에 대한 연구 필요성.\n## Theory\n다국어 교육 기술이 학습자의 접근성과 참여를 어떻게 증진시키는지를 탐구.\n## Design\n우간다의 비공식 교육 환경에서 언어 선택을 기반으로 한 준실험적 연구 설계.\n## Findings\nLeb Lango를 선택한 학습자들이 더 높은 참여도와 빠른 학습 성과를 보였으며, 최종 시험 결과가 유사함.\n## Conclusion\n지역 언어 옵션 제공이 교육 기술의 접근성을 높이는 효과적인 방법임을 확인.\n\n# Key Findings\n- Leb Lango 선택 학습자들은 더 높은 참여도를 보였다.\n- Leb Lango 학습자들은 빠른 학습 성과를 기록하였다.\n- 최종 시험 결과는 영어 및 혼합 언어 학습자와 유사하였다.\n\n# Contributions\n## Theoretical\n다국어 교육 기술의 중요성을 강조하며, 언어 선택의 맥락적 개인화 개념을 제시.\n## Methodological\n우간다의 자원 제한 환경에서 다국어 교육 기술에 대한 대규모 준실험적 증거 제공.\n## Practical\n다국어 지원을 고려한 교육 기술 설계 및 교수법에 대한 실용적 시사점 제시.\n\n# Limitations\n- 연구는 특정 지역(우간다)에 국한되어 일반화에 한계가 있다.\n- 언어 선택의 장기적 효과에 대한 데이터 부족.\n\n# Transferable Insights\n- 다국어 교육 기술이 다양한 학습자의 필요를 충족시킬 수 있는 가능성.\n- 지역 언어 사용이 교육 참여를 증진시키는 방법.\n\n# Idea Seeds\n1. 다양한 언어 선택 옵션을 제공하는 교육 플랫폼 개발.\n2. 지역 언어 기반의 교육 콘텐츠 확장.\n3. 다국어 교육 기술의 효과를 평가하기 위한 장기 연구 설계.\n\n# Citation Snippets\n> Moletsane, P. P., Asher, M. W., Kwon, C., Carvalho, P. F., & Ogan, A. (2026). Inclusive Mobile Learning: How Technology-Enabled Language Choice Supports Multilingual Students. In Proceedings of the 2026 CHI Conference on Human Factors in Computing Systems (CHI ’26). https://doi.org/10.1145/3772318.3791139\n\ntags: #다국어교육기술, #원격학습, #상호작용라디오교육, #교육언어, #지역언어, #언어선택, #포괄적모바일학습\n\n---\n\n요약: 본 연구는 우간다에서 2,931명의 참가자를 대상으로 다국어 교육 기술의 효과를 분석하였다. 지역 언어인 Leb Lango를 선택한 학습자들은 더 높은 참여도와 빠른 학습 성과를 보였으며, 최종 시험 결과는 영어 및 혼합 언어 학습자와 유사하였다. 이는 지역 언어 옵션이 교육 기술의 접근성을 높이는 효과적인 방법임을 시사한다.", "link": "https://arxiv.org/abs/2603.03675v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Phenyo Phemelo Moletsane", "Michael W. Asher", "Christine Kwon"], "categories": ["cs.HC"]}, {"id": "5", "source": "ARXIV", "score": 17, "day": "2026-03-01", "title": "VizQStudio: Iterative Visualization Literacy MCQs Design with Simulated Students", "content": "Multiple-choice questions (MCQs) are a widely used educational tool, particularly in domains such as visualization literacy that require broad conceptual coverage and support diverse real-world applications. However, designing high-quality visualization literacy MCQs remains challenging, as instructors must coordinate multimodal elements (e.g., charts, question stems, and distractors), address diverse visualization tasks, and accommodate learners with heterogeneous backgrounds. Existing visualization literacy assessments primarily rely on standardized, fixed item banks, offering limited support for iterative question design that adapts to differences in learners' abilities, backgrounds, and reasoning strategies. To address these challenges, we present VizQStudio, a visual analytics system that supports instructors in iteratively designing and refining visualization literacy MCQs using MLLM-powered simulated students. Instructors can specify diverse student profiles spanning demographics, knowledge levels, and learning-related traits. The system then visualizes how simulated students reason about and respond to different question components, helping instructors explore potential misconceptions, difficulty calibration, and design trade-offs prior to classroom deployment. We investigate VizQStudio through a mixed-method evaluation, including expert interviews, case studies, a classroom deployment, and a large-scale online study. Overall, this work reframes MLLM-based student simulation in assessment authoring as a design-time, exploratory aid. By examining both its value and limitations in realistic instructional settings, we surface design insights that inform how future systems can support instructor-centered, iterative, and responsible uses of AI for multimodal assessment design in visualization literacy and related domains.", "link": "https://arxiv.org/abs/2603.00994v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Zixin Chen", "Yuhang Zeng", "Sicheng Song"], "categories": ["cs.HC"]}, {"id": "6", "source": "ARXIV", "score": 17, "day": "2026-02-27", "title": "Designing AI Tutors for Interest-Based Learning: Insights from Human Instructors", "content": "Interest-based learning (IBL) is a paradigm of instruction in which educational content is contextualized using learners' interests to enhance content relevance. IBL has been shown to result in improved learning outcomes. Unfortunately, high effort is needed for instructors to design and deliver IBL content for individual students. LLMs in the form of AI tutors may allow for IBL to scale across many students. Designing an AI tutor for IBL, however, first requires an understanding of how IBL is implemented in teaching scenarios. This paper presents a study that seeks to derive this understanding from an analysis of how human instructors design and deliver IBL content. We studied 14 one-to-one online tutoring sessions (28 participants) in which tutors designed and delivered a lesson tailored to a student's self-identified interest. Using lesson artifacts, tutoring transcripts, interviews, and questionnaires, findings include themes on how tutors integrate interests during instruction and why. Finally, actionable design implications are presented for LLM-powered AI tutors that aim to deliver IBL at scale.", "link": "https://arxiv.org/abs/2602.24036v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Abhishek Kulkarni", "Sharon Lynn Chu"], "categories": ["cs.HC"]}, {"id": "7", "source": "ARXIV", "score": 17, "day": "2026-02-22", "title": "The Path to Conversational AI Tutors: Integrating Tutoring Best Practices and Targeted Technologies to Produce Scalable AI Agents", "content": "The emergence of generative AI has accelerated the development of conversational tutoring systems that interact with students through natural language dialogue. Unlike prior intelligent tutoring systems (ITS), which largely function as adaptive and interactive problem sets with feedback and hints, conversational tutors hold the potential to simulate high-quality human tutoring by engaging with students' thoughts, questions, and misconceptions in real time. While some previous ITS, such as AutoTutor, could respond conversationally, they were expensive to author and lacked a full range of conversational ability. Generative AI has changed the capacity of ITS to engage conversationally. However, realizing the full potential of conversational tutors requires careful consideration of what research on human tutoring and ITS has already established, while also unpacking what new research will be needed. This paper synthesizes tenets of successful human tutoring, lessons learned from legacy ITS, and emerging work on conversational AI tutors. We use a keep, change, center, study framework for guiding the design of conversational tutoring. We argue that systems should keep proven methods from prior ITS, such as knowledge tracing and affect detection; change how tutoring is delivered by leveraging generative AI for dynamic content generation and dialogic scaffolding; and center opportunities for meaning-making, student agency, and granular diagnosis of reasoning. Finally, we identify areas requiring further study, including efficacy testing, student experience, and integration with human instruction. By synthesizing insights from human tutoring, legacy ITS, and emerging generative AI technologies, this paper outlines a research agenda for developing conversational tutors that are scalable, pedagogically effective, and responsive to the social and motivational dimensions of learning.", "link": "https://arxiv.org/abs/2602.19303v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Kirk Vanacore", "Ryan S. Baker", "Avery H. Closser"], "categories": ["cs.HC"]}, {"id": "8", "source": "ARXIV", "score": 16, "day": "2026-02-28", "title": "Machine Learning Grade Prediction Using Students' Grades and Demographics", "content": "Student repetition in secondary education imposes significant resource burdens, particularly in resource-constrained contexts. Addressing this challenge, this study introduces a unified machine learning framework that simultaneously predicts pass/fail outcomes and continuous grades, a departure from prior research that treats classification and regression as separate tasks. Six models were evaluated: Logistic Regression, Decision Tree, and Random Forest for classification, and Linear Regression, Decision Tree Regressor, and Random Forest Regressor for regression, with hyperparameters optimized via exhaustive grid search. Using academic and demographic data from 4424 secondary school students, classification models achieved accuracies of up to 96%, while regression models attained a coefficient of determination of 0.70, surpassing baseline approaches. These results confirm the feasibility of early, data-driven identification of at-risk students and highlight the value of integrating dual-task prediction for more comprehensive insights. By enabling timely, personalized interventions, the framework offers a practical pathway to reducing grade repetition and optimizing resource allocation.", "link": "https://arxiv.org/abs/2603.00608v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Mwayi Sonkhanani", "Symon Chibaya", "Clement N. Nyirenda"], "categories": ["cs.AI"]}, {"id": "9", "source": "ARXIV", "score": 16, "day": "2026-02-20", "title": "\"How Do I ...?\": Procedural Questions Predominate Student-LLM Chatbot Conversations", "content": "Providing scaffolding through educational chatbots built on Large Language Models (LLM) has potential risks and benefits that remain an open area of research. When students navigate impasses, they ask for help by formulating impasse-driven questions. Within interactions with LLM chatbots, such questions shape the user prompts and drive the pedagogical effectiveness of the chatbot's response. This paper focuses on such student questions from two datasets of distinct learning contexts: formative self-study, and summative assessed coursework. We analysed 6,113 messages from both learning contexts, using 11 different LLMs and three human raters to classify student questions using four existing schemas. On the feasibility of using LLMs as raters, results showed moderate-to-good inter-rater reliability, with higher consistency than human raters. The data showed that 'procedural' questions predominated in both learning contexts, but more so when students prepare for summative assessment. These results provide a basis on which to use LLMs for classification of student questions. However, we identify clear limitations in both the ability to classify with schemas and the value of doing so: schemas are limited and thus struggle to accommodate the semantic richness of composite prompts, offering only partial understanding the wider risks and benefits of chatbot integration. In the future, we recommend an analysis approach that captures the nuanced, multi-turn nature of conversation, for example, by applying methods from conversation analysis in discursive psychology.", "link": "https://arxiv.org/abs/2602.18372v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Alexandra Neagu", "Marcus Messer", "Peter Johnson"], "categories": ["cs.HC", "cs.AI"]}];

function toggleFavorite(id, e) {
  e.stopPropagation();
  const idx = favorites.indexOf(id);
  if (idx === -1) {
    favorites.push(id);
  } else {
    favorites.splice(idx, 1);
  }
  localStorage.setItem('favorites', JSON.stringify(favorites));
  applyFilters();
}

  if (!visited.includes(id)) {
    visited.push(id);
  }
  localStorage.setItem('visited', JSON.stringify(visited));
}

function recordSearch(query) {
  if (query.trim() && !searchHistory.includes(query)) {
    searchHistory.unshift(query);
    if (searchHistory.length > 10) searchHistory.pop();
    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
  }
}

    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
