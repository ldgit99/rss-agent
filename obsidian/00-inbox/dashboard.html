<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-04-14 23:41</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "ERIC", "score": 32, "day": "명시되지 않음", "title": "Fostering Students&apos; AI Literacy Development through Educational Games: AI Knowledge, Affective and Cognitive Engagement", "content": "---\ntitle: Fostering Students' AI Literacy Development through Educational Games: AI Knowledge, Affective and Cognitive Engagement\nauthors: [Davy Tsz Kit Ng, Chen Xinyu, Jac Ka Lok Leung, Samuel Kai Wah Chu]\nyear: 명시되지 않음\njournal: 명시되지 않음\ndoi: 명시되지 않음\nresearch_type: 준실험 연구\nmethodology: 준실험적 접근 및 초점 그룹 인터뷰\ndata_type: 정량적 및 정성적 데이터\nsample: 명시되지 않음\ncontext: 중등 교육\ntheoretical_framework: 명시되지 않음\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 교육 게임을 통해 학생들의 AI 리터러시 개발을 촉진하기 위한 온라인 플랫폼 TreasureIsland를 개발하고, 이를 통해 학생들이 AI 리터러시를 효과적으로 향상시킬 수 있는지를 조사하였다. 준실험적 방법을 통해 게임화된 접근 방식의 효과를 평가하였으며, 정량적 결과를 보완하기 위해 초점 그룹 인터뷰를 실시하였다. 연구 결과, TreasureIsland를 이용한 학생들은 동기, 자기 효능감, 진로 관심 및 AI 개념과 윤리에 대한 이해가 향상되었으나, AI 사용에 대한 자신감 및 AI 적용, 평가, 창작 능력은 향상되지 않았다. 게임화된 접근 방식은 경쟁적이고 동기를 부여하는 학습 환경을 조성하고, 피드백을 제공하며, 복잡한 AI 개념을 시뮬레이션을 통해 시각화함으로써 학생들의 AI 리터러시를 촉진할 수 있음을 보여주었다.\n\n# Research Logic\n## Problem\nAI 개념을 효과적으로 스캐폴딩하고 적절한 동기 지원을 제공하는 데 어려움이 있음.\n## Theory\n게임 기반 접근 방식이 중등학생의 AI 리터러시와 학습 동기를 촉진할 수 있는 잠재력을 지님.\n## Design\n준실험적 연구 설계를 통해 게임화된 접근 방식의 효과를 평가.\n## Findings\nTreasureIsland 사용 학생들은 동기, 자기 효능감, 진로 관심 및 AI 개념 이해가 향상되었으나, AI 사용 자신감 및 고차원적 인지 능력은 향상되지 않음.\n## Conclusion\n게임화는 학습자의 AI 리터러시를 촉진하는 데 효과적이며, 교육 디자이너와 교사에게 유용한 pedagogical 지식을 제공함.\n\n# Key Findings\n- TreasureIsland 플랫폼은 학생들의 동기와 자기 효능감을 향상시킴.\n- AI 개념과 윤리에 대한 이해가 개선되었으나, AI 적용 능력은 향상되지 않음.\n- 게임 메커니즘을 통한 경쟁적 학습 환경 조성이 효과적임.\n\n# Contributions\n## Theoretical\nAI 리터러시 교육에 대한 경험적 및 이론적 기초 제공.\n## Methodological\n준실험적 접근 및 초점 그룹 인터뷰를 통한 데이터 수집 방법론 제시.\n## Practical\n게임화된 플랫폼을 통한 AI 리터러시 교육의 실제 적용 가능성 제시.\n\n# Limitations\n- 샘플 크기 및 특성이 명시되지 않음.\n- 연구 기간 및 환경에 대한 정보 부족.\n\n# Transferable Insights\n- 게임화된 접근 방식은 다양한 교육 환경에서 AI 리터러시를 촉진할 수 있음.\n- 피드백 및 스캐폴딩 모듈의 중요성을 강조.\n\n# Idea Seeds\n1. 게임화된 학습 환경에서의 AI 적용 능력 향상을 위한 추가 연구.\n2. flipped classroom 및 프로젝트 기반 학습 요소 통합 방안 모색.\n3. 다양한 교육 수준에서의 AI 리터러시 교육 효과 분석.\n\n# Citation Snippets\n>\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #ai literacy, #education\n\n---\n\n요약: 본 연구는 TreasureIsland라는 게임화된 플랫폼을 통해 학생들의 AI 리터러시를 향상시키는 방법을 탐구하였다. 연구 결과, 학생들은 동기와 자기 효능감이 향상되었으나, AI 사용에 대한 자신감은 증가하지 않았다. 게임화된 접근 방식이 AI 리터러시 교육에 효과적임을 보여주었다.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Davy Tsz Kit Ng", "Chen Xinyu", "Jac Ka Lok Leung"], "categories": ["ERIC"]}, {"id": "1", "source": "OPENALEX", "score": 30, "day": "2026-03-01", "title": "Reimagining Teacher Education in India: AI-Enabled Pedagogy, Assessment, and Human–AI Collaboration for 21st Century Classrooms", "content": "---\ntitle: 인도 교사 교육의 재구상: AI 기반 교수법, 평가 및 인간-AI 협력\nauthors: Pradip Dutta\nyear: 2026\njournal: ShodhPatra: International Journal of Science and Humanities\ndoi: https://doi.org/10.70558/SPIJSH.2026.v3.i3.45588\nresearch_type: 질적 연구\nmethodology: 문헌 종합 및 정책 분석\ndata_type: 문헌\nsample: 명시되지 않음\ncontext: 인도\ntheoretical_framework: TPACK 모델, 구성주의 학습 이론, 인간-AI 증강 이론, 역량 기반 교육 프레임워크\nkeywords: [AI 기반 교수법, 인간-AI 협력, 역량 기반 평가, 교사 AI 문해력, 윤리적 AI 거버넌스]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 인도의 교사 교육에서 인공지능(AI)의 통합 필요성을 강조하며, AI가 교육 기관에 미치는 영향을 분석한다. AI 도구가 역량 기반 평가, 반성적 교수법 및 개인화된 학습을 촉진할 수 있는 잠재력을 탐구하고, AI가 교육자의 대체가 아닌 협력 파트너로 작용해야 함을 주장한다. 연구는 AI 통합 교사 교육 모델(AITEM)을 제안하며, 이는 AI 기반 교수법, 스마트 역량 기반 평가, 교사 AI 문해력 및 윤리적 거버넌스의 네 가지 기둥으로 구성된다. AI와 인간의 균형 잡힌 파트너십이 인도 교사 교육의 미래에 핵심적이라는 점을 강조한다.\n\n# Research Logic\n## Problem\n인도의 교사 교육에서 AI의 통합 필요성과 그로 인한 교육 방법의 변화.\n## Theory\nTPACK 모델, 구성주의 학습 이론, 인간-AI 증강 이론을 기반으로 한 연구.\n## Design\n문헌 종합 및 정책 분석을 통한 질적 연구 설계.\n## Findings\nAI가 교사 교육에서 반성적 교수법과 개인화된 학습을 촉진할 수 있는 방법을 제시.\n## Conclusion\nAI는 교육자의 역할을 대체하는 것이 아니라, 협력적 파트너로서 교육의 질을 향상시킬 수 있다.\n\n# Key Findings\n- AI 도구는 역량 기반 평가와 개인화된 학습을 촉진할 수 있다.\n- AI는 교육자의 전문성을 강화하는 협력적 파트너로 작용해야 한다.\n- AI 통합 교사 교육 모델(AITEM)은 네 가지 기둥으로 구성된다.\n\n# Contributions\n## Theoretical\nAI 통합 교육 모델에 대한 새로운 이론적 프레임워크 제안.\n## Methodological\n문헌 종합 및 정책 분석을 통한 질적 연구 방법론의 적용.\n## Practical\nAI 기반 교수법과 평가 시스템의 실제 적용 방안 제시.\n\n# Limitations\n- 연구의 샘플이 명시되지 않음.\n- 특정 지역적 맥락에 국한된 결과.\n\n# Transferable Insights\n- AI 통합 교육 모델은 다른 국가의 교사 교육에도 적용 가능.\n- AI와 인간의 협력적 관계는 교육의 질을 향상시킬 수 있는 중요한 요소.\n\n# Idea Seeds\n1. AI 기반 교수법의 효과를 평가하기 위한 실증 연구.\n2. 교사 AI 문해력 향상을 위한 교육 프로그램 개발.\n3. AI와 인간의 협력적 관계를 탐구하는 추가 연구.\n\n# Citation Snippets\n> Dutta, P. (2026). Reimagining Teacher Education in India: AI-Enabled Pedagogy, Assessment, and Human–AI Collaboration for 21st Century Classrooms. ShodhPatra: International Journal of Science and Humanities.\n\ntags: #AI교육, #교사교육, #AI협력, #역량기반평가, #윤리적AI, #TPACK, #구성주의\n\n---\n\n요약: 본 연구는 인도의 교사 교육에서 AI의 통합 필요성을 강조하며, AI가 교육 기관에 미치는 영향을 분석한다. AI 도구가 역량 기반 평가, 반성적 교수법 및 개인화된 학습을 촉진할 수 있는 잠재력을 탐구하고, AI가 교육자의 대체가 아닌 협력 파트너로 작용해야 함을 주장한다. AI 통합 교사 교육 모델(AITEM)을 제안하며, 이는 AI 기반 교수법, 스마트 역량 기반 평가, 교사 AI 문해력 및 윤리적 거버넌스의 네 가지 기둥으로 구성된다.", "link": "https://doi.org/10.70558/spijsh.2026.v3.i3.45588", "altLink": "https://openalex.org/W7135066583", "hasDoi": true, "hasReview": true, "authors": ["Pradip Dutta"], "categories": ["Pedagogy", "Sociology", "Teacher education", "Mathematics education", "Agency (philosophy)"]}, {"id": "2", "source": "ERIC", "score": 29, "day": "명시되지 않음", "title": "Learning Design to Support Student-AI Collaboration: Perspectives of Leading Teachers for AI in Education", "content": "---\ntitle: Learning Design to Support Student-AI Collaboration: Perspectives of Leading Teachers for AI in Education\nauthors: [Kim, Jinhee, Lee, Hyunkyung, Cho, Young Hoan]\nyear: 명시되지 않음\njournal: 명시되지 않음\ndoi: 명시되지 않음\nresearch_type: 질적 연구\nmethodology: 심층 인터뷰\ndata_type: 질적 데이터\nsample: 10명의 한국 AI 교육 분야 선도 교사\ncontext: K-12 교육\ntheoretical_framework: 명시되지 않음\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 AI와의 협업을 지원하기 위한 학습 설계에 대한 한국의 선도 교사들의 관점을 탐구하였다. 연구 결과, 교사들은 AI와의 협업을 위한 최적의 학습 목표로 능력 및 주제 지식 구축을 인식하였다. 협업은 학제 간 학습, 실제 문제 해결, 창의적 과제를 통해 촉진될 수 있으며, 과정 중심 평가와 협업 성과 평가가 필요하다. 교사들은 AI 원칙, 데이터 리터러시, 오류 분석, AI 윤리 및 일상 생활에서의 AI 경험에 대한 교육이 중요하다고 강조하였다. 또한, AI는 학습 동반자로서의 특성을 가져야 하며, 협업 학습 문화를 조성하는 것이 필요하다고 언급하였다. 연구는 학생들이 AI와의 협업을 통해 세 가지 단계(1. AI에 대해 배우기, 2. AI로부터 배우기, 3. 함께 배우기)를 발전시킬 것이라고 예측하였다.\n\n# Research Logic\n## Problem\nAI와의 협업을 지원하는 학습 설계의 필요성.\n## Theory\nAI 교육의 효과적인 설계를 위한 교사들의 인식.\n## Design\n심층 인터뷰를 통한 질적 연구.\n## Findings\n교사들은 AI와의 협업을 위한 최적의 학습 목표와 환경을 제시하였다.\n## Conclusion\nAI와의 협업을 위한 학습 설계는 교사들의 인식과 경험에 기반하여 발전해야 한다.\n\n# Key Findings\n- AI와의 협업을 위한 최적의 학습 목표는 능력 및 주제 지식 구축이다.\n- 협업은 학제 간 학습과 실제 문제 해결을 통해 촉진될 수 있다.\n- 학생들은 AI와의 협업을 통해 세 가지 단계로 발전할 것이다.\n\n# Contributions\n## Theoretical\nAI 교육 설계에 대한 교사들의 인식을 체계적으로 정리함.\n## Methodological\n심층 인터뷰를 통한 질적 데이터 수집 방법론 제시.\n## Practical\nAI와의 협업을 위한 교육 정책 및 설계에 대한 실질적인 시사점 제공.\n\n# Limitations\n- 연구 샘플이 제한적이며, 일반화에 한계가 있다.\n- 연구 결과가 특정 문화적 맥락에 국한될 수 있다.\n\n# Transferable Insights\n- AI와의 협업을 위한 교육 설계는 교사들의 경험과 인식을 반영해야 한다.\n- 협업 학습 문화를 조성하는 것이 AI 교육의 성공에 기여할 수 있다.\n\n# Idea Seeds\n1. AI와의 협업을 위한 교육 과정 개발.\n2. 협업 학습 환경 조성을 위한 정책 제안.\n3. AI 교육을 위한 교사 연수 프로그램 개발.\n\n# Citation Snippets\n>\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #ai literacy, #education\n\n---\n\n요약: 본 연구는 AI와의 협업을 지원하기 위한 학습 설계에 대한 한국의 선도 교사들의 관점을 탐구하였다. 교사들은 AI와의 협업을 위한 최적의 학습 목표로 능력 및 주제 지식 구축을 인식하였으며, 협업은 학제 간 학습과 실제 문제 해결을 통해 촉진될 수 있다고 강조하였다.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Kim, Jinhee", "Lee, Hyunkyung", "Cho, Young Hoan"], "categories": ["ERIC"]}, {"id": "3", "source": "OPENALEX", "score": 28, "day": "2025-12-12", "title": "Generative <scp>AI<\/scp> in Mathematics, Science, and <scp>STEM<\/scp> Education: Research, Applications, and Emerging Themes", "content": "---\ntitle: Generative AI in Mathematics, Science, and STEM Education: Research, Applications, and Emerging Themes\nauthors: Adrienne Redmond‐Sanogo, Megan Burton, Jessica Ivy, Catherine Maiorca\nyear: 2025\njournal: 명시되지 않음\ndoi: https://openalex.org/W4417290804\nresearch_type: 문헌 리뷰\nmethodology: 문헌 분석\ndata_type: 명시되지 않음\nsample: 명시되지 않음\ncontext: 수학, 과학 및 STEM 교육\ntheoretical_framework: TPACK\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 논문은 생성적 인공지능(GenAI)이 수학, 과학 및 STEM 교육에 미치는 영향과 응용을 탐구한다. GenAI는 교육의 효율성과 창의성을 향상시킬 수 있는 잠재력을 지니고 있지만, 교사의 역할을 대체하는 것이 아니라 보완하는 도구로서의 중요성을 강조한다. 연구는 GenAI의 통합에 대한 교육자들의 인식, 교육적 적용, AI 리터러시 개발 전략을 중심으로 진행되었다. 또한, GenAI의 윤리적 고려사항과 교육적 맥락에서의 복잡한 상호작용을 다루며, 교육자와 학생 모두에게 AI 리터러시를 개발하는 것이 필수적임을 강조한다.\n\n# Research Logic\n## Problem\nGenAI의 교육적 통합에 대한 교육자들의 인식과 그에 따른 적용의 필요성.\n\n## Theory\nTPACK 이론을 기반으로 한 교육자 지식의 중요성.\n\n## Design\n문헌 분석을 통해 GenAI의 교육적 적용 사례와 교육자 인식을 조사.\n\n## Findings\n1. 교육자들의 긍정적인 인식이 GenAI의 통합에 긍정적인 영향을 미침.\n2. GenAI의 교육적 활용이 학생들의 학습 경험을 향상시킬 수 있음.\n3. AI 리터러시 개발이 교육자와 학생 모두에게 필수적임.\n\n## Conclusion\nGenAI는 교육의 혁신을 가져올 수 있는 잠재력을 지니고 있으며, 이를 효과적으로 통합하기 위해서는 교육자와 학생 모두의 AI 리터러시 향상이 필요하다.\n\n# Key Findings\n- GenAI는 교육의 효율성과 창의성을 향상시킬 수 있는 도구로 작용할 수 있다.\n- 교육자들의 긍정적인 인식이 GenAI의 효과적인 통합에 기여한다.\n- AI 리터러시 개발이 교육자와 학생 모두에게 필수적이다.\n\n# Contributions\n## Theoretical\nTPACK 이론을 통해 GenAI의 교육적 통합에 대한 새로운 통찰을 제공.\n\n## Methodological\n문헌 분석을 통해 GenAI의 다양한 응용 사례를 체계적으로 정리.\n\n## Practical\n교육자와 학생을 위한 AI 리터러시 개발의 필요성을 강조하고, 교육적 적용 방안을 제시.\n\n# Limitations\n- 연구의 샘플 크기와 범위가 제한적임.\n- 특정 교육적 맥락에 대한 깊이 있는 분석이 부족함.\n\n# Transferable Insights\n- GenAI의 교육적 통합은 교육자와 학생 모두의 인식 변화가 필요함.\n- AI 리터러시 개발은 교육의 질을 향상시키는 중요한 요소임.\n\n# Idea Seeds\n1. GenAI를 활용한 맞춤형 학습 경로 개발 연구.\n2. 교육자 대상 GenAI 활용 교육 프로그램 개발.\n3. GenAI의 윤리적 고려사항에 대한 심층 연구.\n\n# Citation Snippets\n> Redmond-Sanogo, A., Burton, M., Ivy, J., & Maiorca, C. (2025). Generative AI in Mathematics, Science, and STEM Education: Research, Applications, and Emerging Themes.\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy\n\n---\n\n요약: 본 논문은 생성적 인공지능(GenAI)의 수학, 과학 및 STEM 교육에서의 응용과 그에 따른 교육자들의 인식을 탐구한다. GenAI는 교육의 효율성을 높일 수 있는 도구로 작용할 수 있으며, 교육자와 학생 모두의 AI 리터러시 개발이 필수적임을 강조한다.", "link": "https://doi.org/10.1111/ssm.70002", "altLink": "https://openalex.org/W4417290804", "hasDoi": true, "hasReview": true, "authors": ["Adrienne Redmond‐Sanogo", "Megan Burton", "Jessica Ivy"], "categories": ["Transformative learning", "Generative grammar", "Sociology", "Frontier", "Cognitive science"]}, {"id": "4", "source": "ERIC", "score": 27, "day": "명시되지 않음", "title": "Integrating Generative AI in Teacher Education: A Qualitative Exploration of TPACK Growth and Critical Reflection", "content": "---\ntitle: Generative AI의 교사 교육 통합: TPACK 성장과 비판적 반성의 질적 탐색\nauthors: Min Jou, Tzu-Hsuan Kuo, Yu-Chun Chiang, Yungwei Hao, Chun-Chiang Huang\nyear: 명시되지 않음\njournal: 명시되지 않음\ndoi: 명시되지 않음\nresearch_type: 질적 연구\nmethodology: 주제 분석\ndata_type: 반성 저널, 인터뷰, 교수 자료\nsample: 명시되지 않음\ncontext: 직업 교육 맥락\ntheoretical_framework: TPACK\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n이 연구는 생성적 AI 기술이 예비 교사들의 교수적 사고와 교수 설계 관행에 미치는 영향을 조사하였다. 질적 프레임워크를 바탕으로, 연구는 ChatGPT와 이미지 생성기와 같은 도구를 통합한 과제 기반 학습 환경에서 학생들을 참여시켰다. 데이터는 반성 저널, 인터뷰, 교수 자료를 통해 수집되었으며, 주제 분석을 통해 세 가지 핵심 성장 경로가 드러났다: (1) AI 도구 사용에 대한 불확실성에서 자신감으로의 전환; (2) 반복적인 설계와 반성을 통한 TPACK의 상황적 발전; (3) AI 윤리, 정확성 및 편향에 대한 비판적 인식의 출현. 학생들은 AI가 교수적 창의성을 지원할 수 있는 방법을 탐구했을 뿐만 아니라, 콘텐츠 신뢰성과 자동화된 출력의 한계에 대한 우려를 표현하였다. 이들의 반성은 AI를 단순한 도구가 아닌 교수적 추론의 공동 참여자로 인식하는 진화하는 이해를 보여주었다. 연구 결과는 생성적 AI의 의미 있는 통합이 기술 교육 이상의 것을 요구하며, 교수적 프레이밍, 윤리적 담론, 반성적 공간이 필요함을 시사한다. 따라서 교사 교육 프로그램은 AI 유창성뿐만 아니라 AI 지원 교육의 복잡성을 탐색할 수 있는 비판적이고 적응적인 교수적 사고방식을 배양해야 한다.\n\n# Research Logic\n## Problem\n예비 교사들이 생성적 AI를 효과적으로 활용하지 못하는 문제.\n## Theory\nTPACK 이론을 통해 AI 도구의 통합을 탐구.\n## Design\n과제 기반 학습 환경에서 AI 도구를 활용한 질적 연구 설계.\n## Findings\n학생들은 AI 도구 사용에 대한 자신감을 얻고, TPACK이 발전하며, AI 윤리에 대한 비판적 인식을 갖게 됨.\n## Conclusion\nAI의 의미 있는 통합은 기술 교육을 넘어서는 교수적 접근이 필요함.\n\n# Key Findings\n- AI 도구 사용에 대한 불확실성이 자신감으로 전환됨.\n- 반복적인 설계와 반성을 통해 TPACK이 발전함.\n- AI 윤리에 대한 비판적 인식이 나타남.\n\n# Contributions\n## Theoretical\nTPACK 이론에 대한 새로운 통찰 제공.\n## Methodological\n질적 연구 방법론의 적용을 통한 심층적 이해.\n## Practical\n교사 교육 프로그램에 AI 통합의 필요성을 강조.\n\n# Limitations\n- 샘플 크기 및 다양성에 대한 정보 부족.\n- 연구 기간 및 맥락의 제한성.\n\n# Transferable Insights\n- AI 도구의 효과적인 통합을 위한 교수적 접근 필요.\n- 비판적 사고와 윤리적 담론의 중요성.\n\n# Idea Seeds\n1. AI 도구 사용에 대한 교육 프로그램 개발.\n2. AI 윤리에 대한 심층적 교육 과정 설계.\n3. TPACK 발전을 위한 지속적인 반성적 실천 촉진.\n\n# Citation Snippets\n> Jou, M., Kuo, T.-H., Chiang, Y.-C., Hao, Y., & Huang, C.-C. (명시되지 않음). Generative AI의 교사 교육 통합: TPACK 성장과 비판적 반성의 질적 탐색.\n\ntags: #human-ai_collaboration, #classroom_ai, #ai_tutoring, #instructional_design, #scaffolding, #tpack, #ai_literacy, #teacher_ai, #education, #learning_analytics, #llm_classroom, #ai_pedagogy\n\n---\n\n압축 요약: 이 연구는 생성적 AI 기술이 예비 교사들의 교수적 사고와 교수 설계에 미치는 영향을 질적으로 탐구하였다. 연구 결과, 학생들은 AI 도구 사용에 대한 자신감을 얻고, TPACK이 발전하며, AI 윤리에 대한 비판적 인식을 갖게 되었다. AI의 의미 있는 통합은 기술 교육을 넘어서는 교수적 접근이 필요함을 시사한다.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Min Jou", "Tzu-Hsuan Kuo", "Yu-Chun Chiang"], "categories": ["ERIC"]}, {"id": "5", "source": "ERIC", "score": 27, "day": "명시되지 않음", "title": "AI &amp; Data Competencies: Scaffolding Holistic AI Literacy in Higher Education", "content": "This chapter introduces the AI &amp; Data Acumen Learning Outcomes Framework, a comprehensive tool designed to guide the integration of AI literacy across higher education. Developed through a collaborative process, the framework defines key AI and data-related competencies across four proficiency levels and seven knowledge dimensions. It provides a structured approach for educators to scaffold student learning in AI, balancing technical skills with ethical considerations and sociocultural awareness. The chapter outlines the framework's development process, its structure, and practical strategies for implementation in curriculum design, learning activities, and assessment. We address challenges in implementation and future directions for AI education. By offering a roadmap for developing students' holistic AI literacy, this framework prepares learners to leverage generative AI capabilities in both academic and professional contexts.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Kathleen Kennedy", "Anuj Gupta"], "categories": ["ERIC"]}, {"id": "6", "source": "ERIC", "score": 27, "day": "명시되지 않음", "title": "Microlearning and Generative AI for Pre-Service Teacher Education: A Qualitative Case Study", "content": "The rapid emergence of generative artificial intelligence (GenAI) tools has underscored the urgent need for pre-service teachers to develop technological pedagogical content knowledge (TPACK) and self-regulated learning (SRL) strategies -- both critical for integrating AI into classrooms. However, existing teacher education programmes lack structured approaches to equip pre-service teachers with AI literacy and pedagogical adaptation skills. Traditional training models remain too generalised and fail to provide incremental, hands-on experiences for AI integration. This qualitative case study addresses these gaps by investigating the use of microlearning modules -- bite-sized, multimodal instructional units -- to enhance pre-service teachers' TPACK and SRL in English language teaching (ELT). Over 13 weeks, 19 participants engaged with GenAI-focused microlearning modules that progressively developed their ability to adapt AI tools such as ChatGPT, Twee, Mizou, Perplexity and MagicSchool for differentiated instruction, formative assessment and culturally responsive teaching. Thematic analysis of participants reflective journals and semi-structured interviews revealed three key findings: (1) microlearning facilitated a structured, low-cognitive-load approach to developing GenAI competencies, (2) participants gained confidence and autonomy in using AI for lesson planning, and (3) SRL strategies such as goal setting and iterative refinement were essential for AI integration. Participants mitigated challenges such as GenAI tool limitations and initial AI anxiety by refining prompt engineering techniques and cross-validating AI outputs. These findings highlight microlearning's potential to bridge AI literacy and pedagogical applications of AI, offering a scalable model for teacher education.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Lucas Kohnke", "Di Zou", "Haoran Xie"], "categories": ["ERIC"]}, {"id": "7", "source": "ERIC", "score": 27, "day": "명시되지 않음", "title": "A Survey Study on AI Literacy of Nakhon Sawan Rajabhat University&apos;s Digital Technology Teacher Students in Thailand", "content": "In the realm of education, the integration of AI literacy into computer science teaching is becoming increasingly crucial (Walsh et al., 2023; Voulgari et al., 2022; Velander et al., 2023). Teachers play a pivotal role in bridging the gap between research and practical knowledge transfer of AIrelated skills, necessitating a solid foundation in AI-related technological, pedagogical, and content knowledge (TPACK) (Velander et al., 2023). As AI systems permeate various aspects of society, including education, teachers must adapt and develop competencies in AI to effectively impart these skills to students (Kreinsen &amp; Schulz, 2023). The incorporation of AI ethics into the curriculum requires teachers to navigate complex issues such as biases related to race, gender, and social class, challenging both computer science and humanities educators to step out of their comfort zones and collaborate to provide high-quality instruction (Walsh et al., 2023). By leveraging their expertise in different domains and receiving support from research teams, teachers can create engaging learning experiences that prepare students for the ethical and technical challenges posed by AI systems (Walsh et al., 2023). This article aimed to study the AI literacy level of teacher students major in digital technology who study at Nakhon Sawan Rajabhat University in Thailand. There were 98 students responded the AI literacy questionnaire which contained of 4 factors (Knowledge and Use of AI 24 questions, Creation of AI 3 questions, AI Self-Efficacy 6 questions, and AI Self-Competency 7 questions). The results showed that, 1) there were no statistically significant differences in gender among Knowledge and Use, AI Self-Efficacy, and AI Self-Competency while has statistically highly significant as P &lt; 0.05 in Creation of AI factor, 2) there were no statistically significant different in level of study and use of time used of computer among AI literacy factors, and 3) there was relationship between AI literacy factors with statistically highly significant as P &lt; 0.01.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Nontachai Samngamjan", "Pakawat Phettom", "Kajohnsak Sa-ngunsat"], "categories": ["ERIC"]}, {"id": "8", "source": "ERIC", "score": 27, "day": "명시되지 않음", "title": "AI Literacy in the Classroom: Transforming Education through Educational Technologies", "content": "The integration of Artificial Intelligence (AI) literacy into college curricula is a pressing but complex challenge, particularly in non-technical fields like business. This paper presents a case study of a pedagogical intervention designed to embed AI literacy within a required college mathematics course. The intervention employed a Problem-Based Learning (PBL) framework where 120 business students used tools like ChatGPT and matrix calculators to solve an authentic data-driven business problem. We analyzed data from the final assessment artifact -- a digital magazine -- to evaluate the development of specific AI literacy competencies. Initial findings from this pilot implementation indicate that the PBL approach was effective in developing students' skills in data-driven argumentation, critical evaluation of AI-generated outputs, and the ability to connect abstract mathematical models to practical AI applications. The study demonstrates a promising replicable model for integrating AI literacy into foundational courses, but also highlights key challenges, including the need for explicit scaffolding in critical AI evaluation. This paper contributes empirical insights from an initial implementation, offering a practical framework and actionable lessons for educators designing AI literacy curricula.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Adriana Mejia Castaño"], "categories": ["ERIC"]}, {"id": "9", "source": "ERIC", "score": 27, "day": "명시되지 않음", "title": "Rethinking English Language Arts Classrooms with Artificial Intelligence Education: Teachers&apos; Confidence and Views", "content": "Artificial Intelligence (AI) literacy skills have become essential to prepare youths for 21st- century needs. Despite the efforts to broaden AI education in K-12 classrooms, teaching AI concepts is mostly limited to Computer Science classrooms. Nonetheless, approximately half of U.S. high school students cannot access any Computer Science classes. This causes unequal access to AI education. To tackle this challenge, the utilization of curriculum integration emerges as a potent and effective strategy to facilitate interdisciplinary learning. Integrating AI concepts into non-STEM classrooms, especially English Language Art (ELA) classrooms can broaden access to AI education and reduce inequalities. However, teachers are key stakeholders in effective curriculum integration. Their views and confidence level play a critical role in providing sustainable curriculum integration. The current literature is limited in explaining high school ELA teachers' level of confidence and views in the context of integrating AI concepts into their classrooms. Thus, this study aims to fulfill the gaps in the research of non-STEM teachers' pedagogical beliefs, confidence, and experiences in learning and teaching AI concepts. Specifically, this study answers four research questions: 1) What was ELA teachers' level of confidence in integrating AI into their classrooms before and after participating in a curricular professional development program? 2) What were ELA teachers' views of integrating AI into ELA classrooms after participating in a curricular professional development program? 3) What challenges and opportunities do high school ELA teachers identify after they implement AI curricula in their classrooms? 4) What recommendations do ELA teachers offer to their ELA colleagues for implementing AI curricula in their classrooms? By following the Social Cognitive Theory (SCT) and Technological Pedagogical Content Knowledge (TPACK), this study examines ELA teachers' experiences in a curricular professional development program and their classroom implementations. The findings of this study revealed that after attending the PD, teachers' level of confidence in presenting and explaining AI topics to their students and facilitating and supporting students around AI concepts increased significantly. Teachers considered several factors (e.g., relevancy of the topics, opportunities for their students, and opportunities for their professional growth) when they were sharing their views on the integration. Additionally, after teachers implemented an AI curriculum into their classrooms, they identified opportunities (e.g., introducing AI-empowered careers and supporting students' critical thinking skills), challenges (e.g., technology issues), and needs for changes (e.g., adding scaffolding activities). Regarding the findings, this study discussed the implications for curriculum developers, ELA teachers, and make suggestions for educational researchers in the field of AI education. [The dissertation citations contained here are published with the permission of ProQuest LLC. Further reproduction is prohibited without permission. Copies of dissertations may be obtained by Telephone (800) 1-800-521-0600. Web page: http://www.proquest.com/en-US/products/dissertations/individuals.shtml.]", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Cansu Tatar"], "categories": ["ERIC"]}];

  }
}

function downloadJSON() {
  const data = JSON.stringify(filtered, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadCSV() {
  const headers = ['제목', '출처', '스코어', '리뷰여부', '링크'];
  const rows = filtered.map(p => [
    '"' + p.title.replace(/"/g, '""') + '"',
    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
