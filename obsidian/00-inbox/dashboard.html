<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-03-08 23:22</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "OPENALEX", "score": 28, "day": "2026-02-28", "title": "ChatGPT in the Classroom: Student Perceptions and Learning Experiences in Higher Education", "content": "---\ntitle: ChatGPT in the Classroom: Student Perceptions and Learning Experiences in Higher Education\nauthors: [Nosipho Mavuso, Fezile Treasure Matsebula]\nyear: 2026\njournal: 명시되지 않음\ndoi: https://openalex.org/W7133244432\nresearch_type: 혼합 방법 연구\nmethodology: 설문조사 및 포커스 그룹 토론\ndata_type: 정량적 및 정성적 데이터\nsample: 248명의 학부생(설문조사), 36명의 학부생(포커스 그룹)\ncontext: 남아프리카 공화국의 고등 교육\ntheoretical_framework: 기술 수용 모델(TAM)\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n이 연구는 남아프리카 공화국의 고등 교육에서 ChatGPT가 학생들의 학습 경험에 미치는 영향을 조사한다. 혼합 방법 접근법을 통해 설문조사와 포커스 그룹 토론을 결합하여 학생들의 인식을 분석하였다. 248명의 학부생이 설문조사에 참여하였고, 36명이 포커스 그룹에 참여하여 심층적인 통찰을 제공하였다. 연구 결과, 학생들은 ChatGPT가 참여도를 높이고 창의성을 자극하며 개인화된 학습을 지원한다고 긍정적으로 평가하였으나, 학문적 진실성 및 비판적 사고의 저하에 대한 우려도 나타났다. 연구는 ChatGPT의 통합이 신중한 교육적 계획을 요구하며, AI의 윤리적 사용을 위한 지침 수립과 AI 리터러시 교육의 필요성을 강조한다.\n\n# Research Logic\n## Problem\nChatGPT의 교육적 통합이 학생들에게 미치는 영향과 그에 따른 윤리적, 교육적 고려사항.\n## Theory\n기술 수용 모델(TAM)을 기반으로 한 학생들의 인식 분석.\n## Design\n혼합 방법 연구로 설문조사와 포커스 그룹 토론을 활용.\n## Findings\n학생들은 ChatGPT의 긍정적인 효과를 인식하였으나, 학문적 진실성과 비판적 사고에 대한 우려를 표명.\n## Conclusion\nChatGPT의 효과적인 통합을 위해서는 교육적 계획과 윤리적 지침이 필요하다.\n\n# Key Findings\n- ChatGPT는 학생들의 참여도와 창의성을 높이는 데 긍정적인 영향을 미친다.\n- 학문적 진실성 및 비판적 사고의 저하에 대한 우려가 존재한다.\n- 다양한 학문 분야에서 ChatGPT의 유용성에 대한 인식 차이가 있다.\n\n# Contributions\n## Theoretical\n기술 수용 모델(TAM)을 통한 학생 인식의 새로운 통찰 제공.\n## Methodological\n혼합 방법 연구 설계의 적용으로 데이터의 신뢰성 및 깊이 강화.\n## Practical\nAI의 윤리적 사용을 위한 교육적 지침 및 AI 리터러시 교육의 필요성 제시.\n\n# Limitations\n- 표본의 대표성이 제한적일 수 있음.\n- 연구의 맥락이 특정 지역(남아프리카 공화국)에 국한됨.\n\n# Transferable Insights\n- AI 도구의 교육적 통합 시 윤리적 고려가 필수적임.\n- 다양한 학문 분야에서의 AI 활용에 대한 인식 차이를 이해할 필요가 있음.\n\n# Idea Seeds\n1. AI 리터러시 교육 프로그램 개발.\n2. ChatGPT의 윤리적 사용을 위한 가이드라인 수립.\n3. 다양한 학문 분야에서의 AI 도구 활용 사례 연구.\n\n# Citation Snippets\n> Mavuso, N., & Matsebula, F. T. (2026). ChatGPT in the Classroom: Student Perceptions and Learning Experiences in Higher Education.\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #ai literacy, #education\n\n---\n\n요약: 이 연구는 남아프리카 공화국의 고등 교육에서 ChatGPT의 학생 인식과 학습 경험을 조사하였다. 혼합 방법 연구를 통해 긍정적인 효과와 함께 학문적 진실성에 대한 우려를 발견하였다. AI의 윤리적 사용과 교육적 통합을 위한 지침이 필요함을 강조한다.", "link": "https://doi.org/10.26803/ijlter.25.2.39", "altLink": "https://openalex.org/W7133244432", "hasDoi": true, "hasReview": true, "authors": ["Nosipho Mavuso", "Fezile Treasure Matsebula"], "categories": ["Thematic analysis", "Psychology", "Higher education", "Discipline", "Nonprobability sampling"]}, {"id": "1", "source": "OPENALEX", "score": 24, "day": "2025-11-27", "title": "INTEGRATION OF ARTIFICIAL INTELLIGENCE IN ADAPTIVE LEARNING: OPPORTUNITIES AND CHALLENGES FOR TEACHERS IN THE ERA OF EDUCATION 5.0", "content": "---\ntitle: INTEGRATION OF ARTIFICIAL INTELLIGENCE IN ADAPTIVE LEARNING: OPPORTUNITIES AND CHALLENGES FOR TEACHERS IN THE ERA OF EDUCATION 5.0\nauthors: Imelda Darmayanti Manurung\nyear: 2025\njournal: Majority Science Journal\ndoi: https://doi.org/10.61942/msj.v3i4.481\nresearch_type: 문헌 리뷰\nmethodology: 체계적 문헌 검토\ndata_type: 문헌\nsample: 21개 연구\ncontext: 인도네시아 K-12 교육\ntheoretical_framework: 교육 5.0, TPACK\nkeywords: [인공지능, 적응 학습, 교사 역량, 교육 5.0, 디지털 교수법]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 인도네시아의 K-12 교육 시스템에서 적응 학습에 인공지능(AI)을 통합하는 기회와 도전을 분석한다. AI 기반 적응 시스템은 학습 경로를 개인화하고 형성 평가를 자동화하며 데이터 기반의 교수 추천을 제공하여 학생 성과를 향상시키는 능력을 보여준다. 연구 결과, AI는 차별화된 교수, 적시의 보정, 깊이 있는 학습 참여를 가능하게 하지만, 성공적인 도입은 교사의 디지털 교수법 문해력, 데이터 기반 의사결정, 알고리즘 시스템에 대한 윤리적 이해에 크게 의존한다. 주요 도전 과제로는 불균형한 인프라, 다양한 교사 준비도, 학생 데이터 관리의 프라이버시 위험, 제한된 정책 프레임워크가 있다. 연구는 AI가 교사의 대체가 아닌 교수적 파트너로 기능해야 하며, 교육의 공정성과 질을 강화하기 위한 전략적 역량 개발과 명확한 규제 지침이 필요하다고 결론짓는다.\n\n# Research Logic\n## Problem\n인도네시아 교육 시스템에서 AI 통합의 기회와 도전.\n## Theory\nAI는 교육 5.0의 비전과 일치하며, 인간 중심의 학습을 강조한다.\n## Design\n체계적 문헌 검토를 통해 AI와 적응 학습의 관계를 분석.\n## Findings\nAI는 교수의 차별화, 적시 보정, 학습 참여를 가능하게 하지만, 교사의 역량에 따라 성공 여부가 달라진다.\n## Conclusion\nAI는 교사의 역할을 대체하지 않고, 교수적 파트너로서의 역할을 강화해야 한다.\n\n# Key Findings\n- AI는 개인화된 학습 경로를 제공하여 학생 성과를 향상시킨다.\n- 교사의 디지털 교수법 문해력이 AI 도입의 성공에 중요한 요소이다.\n- 인프라 불균형과 교사 준비도의 차이가 AI 통합의 주요 도전 과제이다.\n\n# Contributions\n## Theoretical\nAI와 교육 5.0의 관계를 명확히 하여 교육 이론에 기여.\n## Methodological\n체계적 문헌 검토 방법론을 통해 연구의 신뢰성을 높임.\n## Practical\n교사 역량 개발을 위한 정책적 제안 제공.\n\n# Limitations\n- 연구는 문헌 검토에 기반하므로 실증적 데이터 부족.\n- 특정 지역(인도네시아)에 국한되어 일반화의 한계가 있음.\n\n# Transferable Insights\n- AI 통합 시 교사의 디지털 역량 강화 필요.\n- 교육 정책에서 AI의 윤리적 사용에 대한 명확한 지침 필요.\n\n# Idea Seeds\n1. AI 기반 교수법 훈련 프로그램 개발.\n2. 교사와 학생 간의 AI 활용에 대한 윤리적 논의 촉진.\n3. 지역별 인프라 개선을 위한 정책 제안.\n\n# Citation Snippets\n> Manurung I D. 2025. Integration Of Artificial Intelligence In Adaptive Learning: Opportunities And Challenges For Teachers In The Era Of Education 5.0. MSJ: Majority Science Journal, 3(4), 73-83.\n\ntags: #인공지능, #적응학습, #교사역량, #교육5.0, #디지털교수법\n\n---\n\n요약: 본 연구는 인도네시아 K-12 교육에서 AI의 적응 학습 통합을 분석하며, AI가 개인화된 학습 경로와 형성 평가 자동화를 통해 학생 성과를 향상시킬 수 있음을 보여준다. 그러나 교사의 디지털 역량과 인프라 불균형이 도전 과제로 지적된다. AI는 교사의 대체가 아닌 파트너로 기능해야 하며, 교육의 공정성과 질을 높이기 위한 전략적 접근이 필요하다.", "link": "https://doi.org/10.61942/msj.v3i4.481", "altLink": "https://openalex.org/W7130653606", "hasDoi": true, "hasReview": true, "authors": ["Imelda Darmayanti Manurung"], "categories": ["Transformative learning", "Formative assessment", "Competence (human resources)", "Equity (law)", "Computer science"]}, {"id": "2", "source": "OPENALEX", "score": 21, "day": "2025-06-30", "title": "Teaching Tomorrow Today: Responsible AI Integration in Primary Education", "content": "---\ntitle: Teaching Tomorrow Today: Responsible AI Integration in Primary Education\nauthors: [Natalie Beach, Amber Spears, Lindsey Braisted]\nyear: 2025\njournal: International Journal of Intelligent Computing Research\ndoi: https://doi.org/10.20533/ijicr.2042.4655.2025.0162\nresearch_type: 이론적 연구\nmethodology: 문헌 연구 및 실천 경험\ndata_type: 문헌 및 사례 연구\nsample: 명시되지 않음\ncontext: 초등 교육\ntheoretical_framework: TPACK, 기술 수용 모델(TAM)\nkeywords: [인공지능, 초등 교육, AI 문해력, 디지털 네이티브 신화, 윤리적 기술 사용, 교사 준비도, 다국어 학습자, 기술 통합, TPACK 프레임워크, 기술 수용 모델]\n---\n\n# APA 7th style\n\n# Summary\n이 논문은 초등 교육에서 인공지능(AI)의 책임 있는 통합을 탐구하며, \"디지털 네이티브\"라는 지속적인 신화를 도전하고, 초기 교육에서 발달에 적합한 AI 문해력을 옹호한다. AI 기술이 학생들의 생활에 점점 더 많이 존재하지만, 많은 어린이들이 이를 비판적이고 윤리적으로 사용할 준비가 되어 있지 않다. 교육자들은 AI 교육을 시작하거나 자신의 실천에서 AI를 사용하는 방법에 대해 불확실함을 느끼고 있다. 이 논문은 교사에게는 AI를 계획 및 교수에 통합하기 위한 저위험의 실용적인 전략을 제공하고, 학생에게는 AI의 작동 방식과 책임감 있게 참여하는 방법에 대한 기초 지식을 제공하는 이중 초점의 해결책을 제안한다.\n\n# Research Logic\n## Problem\nAI 기술의 통합이 증가하고 있지만, 학생들은 이를 비판적으로 사용할 준비가 되어 있지 않으며, 교육자들은 AI 교육에 대한 불확실성을 느끼고 있다.\n\n## Theory\n\"디지털 네이티브\" 신화는 학생들이 기술을 자연스럽게 이해한다고 가정하지만, 이는 실제로는 많은 학생들이 비판적이고 윤리적으로 기술을 사용할 준비가 되어 있지 않음을 간과한다.\n\n## Design\n문헌 연구, 실천 경험, 워크숍을 통해 AI 도구의 교육적 잠재력과 윤리적 고려사항을 분석한다.\n\n## Findings\nAI의 책임 있는 통합을 위해 교사에게 저위험의 실용적인 전략을 제공하고, 학생에게는 AI의 기초 지식을 제공하는 것이 중요하다는 것을 발견했다.\n\n## Conclusion\nAI의 전면적인 채택이 아닌, 학생의 주체성과 교사의 전문성을 존중하는 의도적이고 단계적인 통합이 필요하다.\n\n# Key Findings\n- AI 기술의 통합이 증가하고 있지만, 많은 학생들이 이를 비판적으로 사용할 준비가 되어 있지 않다.\n- 교육자들은 AI 교육에 대한 불확실성을 느끼고 있으며, 이는 학생들에게 부정적인 영향을 미칠 수 있다.\n- AI 문해력은 단순한 기술적 능력이 아니라 디지털 시민으로서의 기초가 되어야 한다.\n\n# Contributions\n## Theoretical\nAI 문해력에 대한 새로운 이론적 프레임워크를 제시하고, 디지털 네이티브 신화에 대한 비판적 논의를 포함한다.\n\n## Methodological\n문헌 연구와 실천 경험을 결합하여 AI 교육의 실용적인 접근 방식을 제안한다.\n\n## Practical\n교사와 학생을 위한 저위험의 AI 통합 전략을 제공하여 실제 교육 현장에서의 적용 가능성을 높인다.\n\n# Limitations\n- 연구 샘플이 명시되지 않아 일반화에 한계가 있다.\n- 특정 교육 환경에 대한 구체적인 사례가 부족하다.\n\n# Transferable Insights\n- AI 교육은 모든 학생에게 필수적이며, 이를 위한 체계적인 접근이 필요하다.\n- 교사에게 AI 통합에 대한 지원을 제공하는 것이 중요하다.\n\n# Idea Seeds\n1. AI 문해력을 위한 커리큘럼 개발\n2. 교사를 위한 AI 교육 워크숍 프로그램\n3. 학생의 AI 사용을 지원하는 가이드라인 마련\n\n# Citation Snippets\n> Beach, N., Spears, A., & Braisted, L. (2025). Teaching Tomorrow Today: Responsible AI Integration in Primary Education. International Journal of Intelligent Computing Research.\n\ntags: #인공지능, #초등교육, #AI문해력, #디지털네이티브, #윤리적기술사용, #교사준비도, #기술통합\n\n---\n\n요약: 이 논문은 초등 교육에서 인공지능(AI)의 책임 있는 통합을 다루며, 학생들이 AI를 비판적으로 사용할 준비가 되어 있지 않음을 지적한다. 교육자들은 AI 교육에 대한 불확실성을 느끼고 있으며, 저위험의 실용적인 전략을 통해 AI 문해력을 학생들에게 제공해야 한다는 점을 강조한다.", "link": "https://doi.org/10.20533/ijicr.2042.4655.2025.0162", "altLink": "https://openalex.org/W4414828197", "hasDoi": true, "hasReview": true, "authors": ["Natalie Beach", "Amber Spears", "Lindsey Braisted"], "categories": ["Medical education", "Pedagogy", "Engineering ethics", "Computer science", "Sociology"]}, {"id": "3", "source": "OPENALEX", "score": 20, "day": "2026-01-01", "title": "From Sage to Architect: A Framework for Reconstructing Teacher Education in the AI Era", "content": "---\ntitle: From Sage to Architect: A Framework for Reconstructing Teacher Education in the AI Era\nauthors: Yunlu Li\nyear: 2026\njournal: Journal of Education and Practice\ndoi: 10.7176/JEP/17-2-02\nresearch_type: 이론적 연구\nmethodology: 문헌 분석\ndata_type: 명시되지 않음\nsample: 명시되지 않음\ncontext: 인공지능 시대의 교사 교육\ntheoretical_framework: TELA 모델 (Technological Pedagogical Fluency, Ethical Stewardship, Learning Experience Architecture, Affective Engagement)\nkeywords: [교사 교육, 인공지능, AI 리터러시, 교수법 변혁, 전문성 개발]\n---\n\n# APA 7th style\n\n# Summary\n이 논문은 인공지능(AI)의 발전이 교육 생태계에 미치는 영향을 분석하고, 교사 교육 프로그램의 개혁을 위한 TELA 모델을 제안한다. AI는 교육의 기초가 되었으며, 교사들은 이를 효과적으로 활용할 수 있는 능력을 갖추어야 한다. 그러나 현재의 교사 교육 프로그램은 AI 통합을 단순한 기술적 추가로 축소하고 있어, 교사의 역할을 \"지식의 현자\"에서 \"학습의 설계자\"로 재정의할 필요가 있다. 이 연구는 교사 교육의 커리큘럼과 실습을 개혁하기 위한 실행 가능한 경로를 제시한다.\n\n# Research Logic\n## Problem\nAI의 발전이 교육 시스템에 미치는 영향과 교사 교육 프로그램의 비효율성.\n## Theory\nTELA 모델을 통해 교사의 역할과 교육 목표의 변화를 제안.\n## Design\nAI의 다면적 영향을 분석하고, 교사 교육의 새로운 프레임워크를 제안.\n## Findings\nAI는 교육의 기초가 되었으며, 교사 교육은 이를 반영해야 한다.\n## Conclusion\n교사 교육 프로그램은 AI 통합을 통해 미래 지향적인 교육자로서의 역량을 키워야 한다.\n\n# Key Findings\n- AI는 교육의 기초로 자리 잡고 있으며, 교사 교육의 개혁이 필요하다.\n- TELA 모델은 교사 교육의 새로운 프레임워크를 제공한다.\n- 교사의 역할이 \"지식의 현자\"에서 \"학습의 설계자\"로 변화해야 한다.\n\n# Contributions\n## Theoretical\nAI 시대에 맞는 교사 교육의 이론적 프레임워크 제시.\n## Methodological\nTELA 모델을 통한 체계적인 접근법 제안.\n## Practical\n교사 교육 프로그램의 실질적인 개혁 방안 제시.\n\n# Limitations\n- 연구의 샘플과 데이터 유형이 명시되지 않음.\n- AI 통합의 구체적인 실행 방안에 대한 논의 부족.\n\n# Transferable Insights\n- AI 통합을 위한 교사 교육의 필요성.\n- 교사의 역할 변화에 대한 체계적인 접근 필요.\n\n# Idea Seeds\n1. AI 리터러시 교육을 위한 커리큘럼 개발.\n2. 교사 교육 프로그램에서의 윤리적 책임 강조.\n3. AI 도구를 활용한 학습 경험 설계 방법론 연구.\n\n# Citation Snippets\n> Li, Y. (2026). From Sage to Architect: A Framework for Reconstructing Teacher Education in the AI Era. Journal of Education and Practice, 17(2), 1-15. https://doi.org/10.7176/JEP/17-2-02\n\ntags: #교사교육, #인공지능, #AI리터러시, #교수법변혁, #전문성개발, #교육개혁, #TELA모델\n\n---\n\n요약: 이 논문은 인공지능의 발전이 교육 생태계에 미치는 영향을 분석하고, 교사 교육 프로그램의 개혁을 위한 TELA 모델을 제안한다. AI는 교육의 기초가 되었으며, 교사들은 이를 효과적으로 활용할 수 있는 능력을 갖추어야 한다. 현재의 교사 교육 프로그램은 AI 통합을 단순한 기술적 추가로 축소하고 있어, 교사의 역할을 \"지식의 현자\"에서 \"학습의 설계자\"로 재정의할 필요가 있다.", "link": "https://doi.org/10.7176/jep/17-2-02", "altLink": "https://openalex.org/W7134057508", "hasDoi": true, "hasReview": true, "authors": ["Yunlu Li"], "categories": ["Teacher education", "Pedagogy", "Sociology", "Mathematics education", "Data collection"]}, {"id": "4", "source": "OPENALEX", "score": 19, "day": "2025-12-30", "title": "AI in School EFL Learning: A Systematic Review of Impact Pathways for Engagement, Achievement, and Satisfaction", "content": "---\ntitle: AI in School EFL Learning: A Systematic Review of Impact Pathways for Engagement, Achievement, and Satisfaction\nauthors: [Arnab Kundu, Tripti Bej]\nyear: 2025\njournal: Journal of Language and Education\ndoi: https://doi.org/10.17323/jle.2025.22083\nresearch_type: 체계적 문헌 고찰\nmethodology: 질적 해석적 체계적 검토\ndata_type: 경험적 연구\nsample: K–12 EFL 학습자\ncontext: 학교 기반 영어 외국어 교육\ntheoretical_framework: AI Impact Pathways Framework\nkeywords: [인공지능, EFL 학습, 참여, 학업 성취, 학습 만족도, 영향 경로, 학교 교육, 체계적 검토]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 학교 기반 영어 외국어(EFL) 교육에서 인공지능(AI)의 통합이 학습자의 참여, 성취 및 만족도에 미치는 영향을 체계적으로 검토한다. 99개의 기록을 검색한 후, 23개의 경험적 연구가 포함되었으며, AI 도구가 학습자의 참여를 증진시키고, 개인화된 지원 및 피드백을 통해 성취를 향상시키며, 자율성과 유용성 인식을 통해 만족도를 높이는 경로를 제시한다. 연구 결과는 AI의 효과적인 통합을 위한 맥락적 조절 변수를 식별하고, AI Impact Pathways Framework를 통해 이론적 이해를 발전시킨다.\n\n# Research Logic\n## Problem\nAI가 학교 EFL 교육에서 학습자의 참여, 성취 및 만족도에 미치는 영향 경로가 충분히 이론화되지 않음.\n## Theory\nAI Impact Pathways Framework를 통해 AI의 효과가 어떻게 발생하는지를 설명.\n## Design\n질적 해석적 체계적 검토 방법론을 사용하여 23개의 경험적 연구를 분석.\n## Findings\nAI 도구는 참여를 증진시키고, 성취를 향상시키며, 만족도를 높이는 세 가지 상호 관련된 경로를 제시.\n## Conclusion\nAI 통합의 효과는 기술적 요인뿐만 아니라 교육적 및 맥락적 요인에 의해 매개됨.\n\n# Key Findings\n- AI 도구는 상호작용성을 증가시켜 학습자의 참여를 증진시킴.\n- 개인화된 지원과 반복적인 피드백이 학업 성취를 향상시킴.\n- AI가 자율성과 유용성 인식을 지원할 때 학습 만족도가 증가함.\n\n# Contributions\n## Theoretical\nAI Impact Pathways Framework를 통해 AI의 교육적 효과를 설명하는 새로운 이론적 틀 제공.\n## Methodological\n체계적 문헌 고찰을 통해 AI의 교육적 통합에 대한 경험적 증거를 종합.\n## Practical\n학교에서 AI 통합을 위한 맥락적이고 공정한 설계 지침 제공.\n\n# Limitations\n- 연구의 범위가 K–12 EFL 교육에 국한됨.\n- AI의 효과에 대한 장기적 연구가 부족함.\n\n# Transferable Insights\n- AI 통합의 효과는 교육적 맥락에 따라 달라질 수 있음.\n- 교사의 준비도와 디지털 인프라가 AI의 효과에 중요한 영향을 미침.\n\n# Idea Seeds\n1. AI 도구의 효과적인 통합을 위한 교사 연수 프로그램 개발.\n2. 다양한 교육적 맥락에서 AI의 효과를 비교하는 연구.\n3. AI 도구 사용에 대한 학생의 인식과 반응을 조사하는 질적 연구.\n\n# Citation Snippets\n> Kundu, A., & Bej, T. (2025). AI in school EFL learning: A systematic review of impact pathways for engagement, achievement, and satisfaction. Journal of Language and Education, 11(4), 131-148. https://doi.org/10.17323/jle.2025.22083\n\ntags: #인공지능, #EFL학습, #학습참여, #학업성취, #학습만족도, #영향경로, #학교교육, #체계적검토", "link": "https://doi.org/10.17323/jle.2025.22083", "altLink": "https://openalex.org/W7133301649", "hasDoi": true, "hasReview": true, "authors": ["Arnab Kundu", "Tripti Bej"], "categories": ["Psychology", "Vocabulary", "Perception", "Empirical research", "Thematic analysis"]}, {"id": "5", "source": "OPENALEX", "score": 16, "day": "2025-11-10", "title": "AI-Enhanced Computational Thinking: A Comprehensive Review of Ethical Frameworks and Pedagogical Integration for Equitable Higher Education", "content": "The rapid integration of artificial intelligence technologies into higher education presents unprecedented opportunities for enhancing computational thinking development while simultaneously raising significant concerns about educational equity and algorithmic bias. This comprehensive review examines the intersection of AI integration, computational thinking pedagogy, and diversity, equity, and inclusion imperatives in higher education through a comprehensive narrative review of 167 sources of current literature and theoretical frameworks. From distilling principles from Human–AI Symbiotic Theory (HAIST) and established pedagogical integration models, this review synthesizes evidence-based strategies for ensuring that AI-enhanced computational thinking environments advance rather than undermine educational equity. The analysis reveals that effective AI integration in computational thinking education requires comprehensive frameworks that integrate ethical AI governance with pedagogical design principles, creating practical guidance for institutions seeking to harness AI’s potential while protecting historically marginalized students from algorithmic discrimination. This review contributes to the growing body of knowledge on responsible AI implementation in educational settings and provides actionable recommendations for educators, researchers, and policymakers working to create more effective, engaging, and equitable AI-enhanced learning environments.", "link": "https://doi.org/10.3390/educsci15111515", "altLink": "https://openalex.org/W4416088853", "hasDoi": true, "hasReview": false, "authors": ["John Chick"], "categories": ["Engineering ethics", "Computational thinking", "Higher education", "Equity (law)", "Inclusion (mineral)"]}, {"id": "6", "source": "ERIC", "score": 15, "day": "명시되지 않음", "title": "Human vs. AI: Does AI Learning Assistant Enhance Students&apos; Innovation Behavior?", "content": "Students are increasingly utilizing AI educational tools in their daily learning, complementing human instructors. Yet, little is known about how and when learning assistant type (Human vs. AI) influences students' innovation behavior. To better understand these ambiguities, based on self-determination theory and organizational climate theory, the current study constructs a dual pathway model and conducts three online experimental studies to explore the mixed effects of learning assistant type on students' innovation behavior. Study 1 provides sufficient evidence that AI (vs. Human) learning assistants will both enhance students' perceived autonomy, thereby promoting their innovation behavior (autonomous pathway), and increase students' self-esteem threat, thereby inhibiting their innovation behavior (competent pathway). Study 2 shows that high organizational readiness of the college will strengthen the autonomous pathway and buffer the competent pathway. Study 3 further demonstrates that the anthropomorphic design of AI learning assistants is beneficial for enhancing students' innovation behavior through increased perceived autonomy and decreased self-esteem threat. These findings deepen our understanding of the differences of students' perceptions and responses towards human and AI learning assistants, and they provide valuable practical implications for the promotion of AI learning assistants.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Lijuan Luo", "Jinmiao Hu", "Yujie Zheng"], "categories": ["ERIC"]}, {"id": "7", "source": "ERIC", "score": 15, "day": "명시되지 않음", "title": "Socially Shared Regulation of Learning and Artificial Intelligence: Opportunities to Support Socially Shared Regulation", "content": "Supporting learners in achieving high-level socially shared regulation of learning (SSRL) in the online collaborative learning (OCL) context presents challenges that the utilization of artificial intelligence (AI) technologies may help solve. However, the effective uses of AI to support multifaceted areas (cognition, metacognition, and motivation) and phases (forethought, performance, and reflection) of SSRL remain elusive. Furthermore, research on developing an educational AI and what pedagogical attributes and elements are required for AI to support students' SSRL effectively is limited. This study, therefore, aims to investigate students' perceptions of AI applications in enhancing SSRL and to explore the essential pedagogical elements necessary for AI to support SSRL during the OCL. To achieve these aims, the study conducted Focus Group Interviews facilitated by 9 scenarios of AI application storyboards and paper prototypes with 30 undergraduate and graduate students. The study findings show that students perceive various types of AI to support cognitive, metacognitive, and motivational areas across different SSRL phases. The study also found that students viewed AI as an active learning agent, serving in roles previously inhabited solely by human educators and students. Furthermore, the study reveals seven key pedagogical elements across TPACK components such as pedagogical, content, technological, pedagogical content, technological pedagogical, technological content, and technological pedagogical content knowledge deemed crucial by students for AI to support SSRL in OCL effectively. These findings offer implications for using and designing educationally relevant AI to support SSRL in OCL environments.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Jinhee Kim", "Rita Detrick", "Seongryeong Yu"], "categories": ["ERIC"]}, {"id": "8", "source": "ARXIV", "score": 15, "day": "2026-02-26", "title": "Towards LLM-Empowered Knowledge Tracing via LLM-Student Hierarchical Behavior Alignment in Hyperbolic Space", "content": "Knowledge Tracing (KT) diagnoses students' concept mastery through continuous learning state monitoring in education.Existing methods primarily focus on studying behavioral sequences based on ID or textual information.While existing methods rely on ID-based sequences or shallow textual features, they often fail to capture (1) the hierarchical evolution of cognitive states and (2) individualized problem difficulty perception due to limited semantic modeling. Therefore, this paper proposes a Large Language Model Hyperbolic Aligned Knowledge Tracing(L-HAKT). First, the teacher agent deeply parses question semantics and explicitly constructs hierarchical dependencies of knowledge points; the student agent simulates learning behaviors to generate synthetic data. Then, contrastive learning is performed between synthetic and real data in hyperbolic space to reduce distribution differences in key features such as question difficulty and forgetting patterns. Finally, by optimizing hyperbolic curvature, we explicitly model the tree-like hierarchical structure of knowledge points, precisely characterizing differences in learning curve morphology for knowledge points at different levels. Extensive experiments on four real-world educational datasets validate the effectiveness of our Large Language Model Hyperbolic Aligned Knowledge Tracing (L-HAKT) framework.", "link": "https://arxiv.org/abs/2602.22879v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Xingcheng Fu", "Shengpeng Wang", "Yisen Gao"], "categories": ["cs.AI"]}, {"id": "9", "source": "ARXIV", "score": 15, "day": "2026-02-19", "title": "Instructor-Aligned Knowledge Graphs for Personalized Learning", "content": "Mastering educational concepts requires understanding both their prerequisites (e.g., recursion before merge sort) and sub-concepts (e.g., merge sort as part of sorting algorithms). Capturing these dependencies is critical for identifying students' knowledge gaps and enabling targeted intervention for personalized learning. This is especially challenging in large-scale courses, where instructors cannot feasibly diagnose individual misunderstanding or determine which concepts need reinforcement. While knowledge graphs offer a natural representation for capturing these conceptual relationships at scale, existing approaches are either surface-level (focusing on course-level concepts like \"Algorithms\" or logistical relationships such as course enrollment), or disregard the rich pedagogical signals embedded in instructional materials. We propose InstructKG, a framework for automatically constructing instructor-aligned knowledge graphs that capture a course's intended learning progression. Given a course's lecture materials (slides, notes, etc.), InstructKG extracts significant concepts as nodes and infers learning dependencies as directed edges (e.g., \"part-of\" or \"depends-on\" relationships). The framework synergizes the rich temporal and semantic signals unique to educational materials (e.g., \"recursion\" is taught before \"mergesort\"; \"recursion\" is mentioned in the definition of \"merge sort\") with the generalizability of large language models. Through experiments on real-world, diverse lecture materials across multiple courses and human-based evaluation, we demonstrate that InstructKG captures rich, instructor-aligned learning progressions.", "link": "https://arxiv.org/abs/2602.17111v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Abdulrahman AlRabah", "Priyanka Kargupta", "Jiawei Han"], "categories": ["cs.AI"]}];

  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
</html>
