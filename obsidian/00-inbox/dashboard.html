<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-04-13 23:41</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "ARXIV", "score": 19, "day": "2026-04-10", "title": "Structuring versus Problematizing: How LLM-based Agents Scaffold Learning in Diagnostic Reasoning", "content": "---\ntitle: Structuring versus Problematizing: How LLM-based Agents Scaffold Learning in Diagnostic Reasoning\nauthors: [Fatma Betül Güreş, Tanya Nazaretsky, Seyed Parsa Neshaei, Tanja Käser]\nyear: 2026\njournal: LAK 2026\ndoi: https://doi.org/10.1145/3785022.3785105\nresearch_type: 실험적 연구\nmethodology: 그룹 간 실험\ndata_type: 정량적 데이터\nsample: 63명의 직업학교 학생\ncontext: 약사 기술자 교육을 위한 시나리오 기반 학습 환경\ntheoretical_framework: Reiser의 구조화 및 문제화 이론\nkeywords: [large language models, scenario-based learning, simulations, discourse analysis]\n---\n\n# APA 7th style\n\n# Summary\n이 연구는 약사 기술자 교육을 위한 시나리오 기반 학습 환경인 PharmaSim Switch를 소개하며, 대규모 언어 모델(LLM)과 학습 분석(LA)을 활용한 약사 에이전트가 두 가지 이론 기반 스캐폴딩 접근법인 구조화와 문제화를 통해 학습을 지원하는 방식을 탐구한다. 63명의 직업학교 학생들이 두 가지 스캐폴딩 조건 하에서 학습 시나리오를 수행한 결과, 두 접근법 모두 진단 전략 사용을 지원하는 데 효과적이었다. 성과는 시나리오의 복잡성에 의해 주로 영향을 받았으며, 구조화 접근법은 더 정확한 참여를 유도하고, 문제화 접근법은 더 건설적인 참여를 이끌어냈다. 이러한 결과는 LA 및 LLM 기반 시스템 설계 시 스캐폴딩 접근법의 결합의 가치를 강조한다.\n\n# Research Logic\n## Problem\n학생들이 진단적 추론을 개발하는 데 어려움을 겪고 있으며, 이는 교육 분야에서 중요한 도전 과제이다.\n## Theory\nReiser의 구조화 및 문제화 이론을 기반으로 하여, 두 가지 스캐폴딩 접근법이 학습자에게 미치는 영향을 분석한다.\n## Design\n63명의 직업학교 학생들이 두 가지 스캐폴딩 조건 하에서 학습 시나리오를 수행하는 그룹 간 실험을 실시하였다.\n## Findings\n구조화 접근법은 더 정확한 참여를 유도하고, 문제화 접근법은 더 깊은 참여를 이끌어냈다. 성과는 주로 시나리오의 복잡성에 의해 영향을 받았다.\n## Conclusion\n스캐폴딩 접근법의 결합이 진단적 추론을 효과적으로 촉진할 수 있음을 보여준다.\n\n# Key Findings\n- 두 가지 스캐폴딩 접근법 모두 진단 전략 사용을 지원하는 데 효과적이었다.\n- 성과는 시나리오의 복잡성에 의해 주로 영향을 받았다.\n- 구조화 접근법은 더 정확한 참여를 유도하고, 문제화 접근법은 더 깊은 참여를 이끌어냈다.\n\n# Contributions\n## Theoretical\n진단적 추론을 지원하는 스캐폴딩 접근법에 대한 이론적 이해를 확장하였다.\n## Methodological\nLA 및 LLM 기반 시스템에서 스캐폴딩 접근법의 비교 연구를 통해 방법론적 기여를 하였다.\n## Practical\n교육 현장에서의 스캐폴딩 설계에 대한 실용적인 통찰을 제공하였다.\n\n# Limitations\n- 연구 샘플이 제한적이며, 특정 직업학교 학생들로만 구성되었다.\n- 스캐폴딩 접근법의 장기적인 효과에 대한 데이터가 부족하다.\n\n# Transferable Insights\n- 다양한 스캐폴딩 접근법의 결합이 학습 성과에 긍정적인 영향을 미칠 수 있다.\n- 시나리오의 복잡성이 학습 성과에 미치는 영향을 고려해야 한다.\n\n# Idea Seeds\n1. 다양한 교육 분야에서 스캐폴딩 접근법의 효과를 비교하는 연구.\n2. LLM을 활용한 개인화된 학습 경로 설계.\n3. 스캐폴딩 접근법의 장기적인 효과를 평가하는 후속 연구.\n\n# Citation Snippets\n> Güreş, F. B., Nazaretsky, T., Neshaei, S. P., & Käser, T. (2026). Structuring versus Problematizing: How LLM-based Agents Scaffold Learning in Diagnostic Reasoning. In LAK26: 16th International Learning Analytics and Knowledge Conference (LAK 2026), April 27-May 01, 2026, Bergen, Norway. ACM. https://doi.org/10.1145/3785022.3785105\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #education, #learning analytics, #llm classroom, #ai pedagogy", "link": "https://arxiv.org/abs/2604.09158v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Fatma Betül Güreş", "Tanya Nazaretsky", "Seyed Parsa Neshaei"], "categories": ["cs.HC", "cs.AI"]}, {"id": "1", "source": "ARXIV", "score": 19, "day": "2026-04-10", "title": "Temporal Dropout Risk in Learning Analytics: A Harmonized Survival Benchmark Across Dynamic and Early-Window Representations", "content": "---\ntitle: Temporal Dropout Risk in Learning Analytics: A Harmonized Survival Benchmark Across Dynamic and Early-Window Representations\nauthors: [Rafael da Silva, Jeff Eicher, Gregory Longo]\nyear: 2026\njournal: 명시되지 않음\ndoi: https://arxiv.org/abs/2604.08870v1\nresearch_type: 실증 연구\nmethodology: 서바이벌 분석\ndata_type: OULAD 데이터셋\nsample: 32,593명의 등록\ncontext: 학습 분석 및 교육 데이터 마이닝\ntheoretical_framework: 명시되지 않음\nkeywords: [Learning Analytics, dropout prediction, temporal risk modelling, survival analysis, time-to-event modelling, model benchmarking, explainability, calibration, early warning, OULAD]\n---\n\n# APA 7th style\n\n# Summary\n학생의 중퇴는 학습 분석에서 지속적인 문제로 여겨지며, 본 연구는 Open University Learning Analytics Dataset(OULAD)를 활용하여 시간적 중퇴 위험 모델링을 위한 서바이벌 지표를 제시한다. 연구는 동적 주간 모델과 비교 가능한 연속 시간 모델을 비교하며, 예측 성능, 제거 분석, 설명 가능성 및 보정의 네 가지 분석 레이어를 통합한다. 결과는 각 모델 군 내에서 별도로 보고되며, 주요 발견은 중퇴 위험의 주요 신호가 인구 통계적 또는 구조적 요인이 아닌 시간적 및 행동적 요인이라는 것이다. 이러한 결과는 학습 분석에서 중퇴 위험을 정적 배경 속성이 아닌 시간적-행동적 과정으로 자리매김하는 데 기여한다.\n\n# Research Logic\n## Problem\n학생 중퇴는 고등 교육에서 지속적인 도전 과제로, 시간적 위험 패턴을 식별하는 데 어려움이 있다.\n## Theory\n중퇴 위험은 정적 조건이 아니라 시간에 따라 변화하는 과정으로 이해되어야 한다.\n## Design\nOULAD 데이터셋을 기반으로 한 서바이벌 분석을 통해 동적 및 연속 시간 모델을 비교하였다.\n## Findings\nRandom Survival Forest가 비교 가능한 모델 군에서 우수한 성능을 보였으며, 시간적 및 행동적 신호가 주요 예측 요인으로 나타났다.\n## Conclusion\n중퇴 위험은 정적 속성이 아닌 시간적-행동적 과정으로 이해되어야 하며, 이를 위한 통합된 벤치마크의 필요성이 강조된다.\n\n# Key Findings\n- Random Survival Forest가 비교 가능한 모델 군에서 우수한 성능을 보였다.\n- 시간적 및 행동적 신호가 중퇴 위험 예측에서 주요한 역할을 한다.\n- 보정 분석에서 XGBoost AFT 모델이 체계적 편향을 보였다.\n\n# Contributions\n## Theoretical\n중퇴 위험을 시간적-행동적 과정으로 재정의함.\n## Methodological\n서바이벌 분석을 위한 통합된 벤치마크를 제시함.\n## Practical\n학생 지원 및 개입 결정을 위한 예측 모델의 보정 필요성을 강조함.\n\n# Limitations\n- 연구는 특정 데이터셋에 국한되어 있어 일반화에 한계가 있다.\n- 모델 비교가 단일한 평가 기준에 의존하고 있어 다각적인 해석이 필요하다.\n\n# Transferable Insights\n- 시간적 및 행동적 신호는 학생 중퇴 위험 예측에서 더 유용한 정보를 제공한다.\n- 예측 모델의 보정 및 해석 가능성이 교육적 결정에 필수적이다.\n\n# Idea Seeds\n1. 다양한 교육 환경에서의 중퇴 위험 예측 모델 비교 연구.\n2. 시간적 신호를 활용한 개입 전략 개발.\n3. 학습 분석을 통한 학생 지원 시스템 개선 방안 연구.\n\n# Citation Snippets\n> da Silva, R., Eicher, J., & Longo, G. (2026). Temporal Dropout Risk in Learning Analytics: A Harmonized Survival Benchmark Across Dynamic and Early-Window Representations. \n\ntags: #학습분석, #중퇴예측, #서바이벌분석, #시간적위험모델링, #모델벤치마킹, #설명가능성, #보정\n\n---\n\n학생 중퇴는 학습 분석에서 중요한 문제로, 본 연구는 OULAD 데이터셋을 활용하여 시간적 중퇴 위험 모델링을 위한 서바이벌 벤치마크를 제시한다. 연구 결과, 중퇴 위험의 주요 신호는 시간적 및 행동적 요인으로 나타났으며, 이는 중퇴 위험을 정적 속성이 아닌 시간적-행동적 과정으로 이해해야 함을 시사한다.", "link": "https://arxiv.org/abs/2604.08870v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Rafael da Silva", "Jeff Eicher", "Gregory Longo"], "categories": ["cs.LG", "cs.AI"]}, {"id": "2", "source": "ARXIV", "score": 16, "day": "2026-04-09", "title": "Scaffolding Human-AI Collaboration: A Field Experiment on Behavioral Protocols and Cognitive Reframing", "content": "---\ntitle: Scaffolding Human-AI Collaboration: A Field Experiment on Behavioral Protocols and Cognitive Reframing\nauthors: [Alex Farach, Alexia Cambon, Lev Tankelevitch, Connie Hsueh, Rebecca Janssen]\nyear: 2026\njournal: 명시되지 않음\ndoi: https://arxiv.org/abs/2604.08678v1\nresearch_type: 실험 연구\nmethodology: 필드 실험\ndata_type: 문서 품질, 자기 보고 경험, 신념 변화\nsample: 388명\ncontext: Fortune 500 소매업체\ntheoretical_framework: 스캐폴딩 이론, 사회 기술 시스템 이론\nkeywords: [generative AI, human-AI collaboration, organizational adoption, field experiment, scaffolding]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 Fortune 500 소매업체의 388명을 대상으로 인간-AI 협업을 위한 두 가지 스캐폴딩 개입의 효과를 실험적으로 검토하였다. 행동적 스캐폴딩 개입은 쌍 간의 공동 AI 사용을 요구하는 구조적 프로토콜을 포함하였으며, 이는 비구조적 사용에 비해 문서 품질이 낮고 문서 생산량이 현저히 감소하는 결과를 초래하였다. 반면, 인지적 스캐폴딩 개입은 AI를 사고 파트너로 재구성하는 파트너십 교육을 포함하였으며, 이는 문서 품질이 높은 결과를 가져왔다. 결과적으로, 인지적 스캐폴딩은 참가자들의 긍정적인 신념 변화를 유도하였으나, 이는 훈련에 의한 진정한 변화라기보다는 회복 효과로 해석될 수 있다. 연구 결과는 AM/PM 세션 혼합, 차별적 이탈, 문서 길이에 대한 LLM 채점의 민감성 등 설계의 한계에 영향을 받는다.\n\n# Research Logic\n## Problem\nAI 도구의 활용이 불균형적이며, 접근성보다 사용 방식이 중요함을 보여준다.\n\n## Theory\n스캐폴딩 이론을 통해 인간-AI 협업의 효과적인 사용을 위한 두 가지 개입(행동적 및 인지적 스캐폴딩)을 제안한다.\n\n## Design\n388명의 참가자를 대상으로 두 가지 스캐폴딩 개입을 비교하는 필드 실험을 수행하였다.\n\n## Findings\n행동적 스캐폴딩은 문서 품질과 생산성을 저하시키고, 인지적 스캐폴딩은 문서 품질을 향상시켰다.\n\n## Conclusion\nAI 도구의 효과적인 사용을 위해서는 구조적 프로토콜과 사고 파트너로서의 인식 변화가 필요하다.\n\n# Key Findings\n- 행동적 스캐폴딩은 문서 품질을 저하시켰다.\n- 인지적 스캐폴딩은 문서 품질을 향상시켰다.\n- 참가자들은 인지적 스캐폴딩을 통해 긍정적인 신념 변화를 경험하였다.\n\n# Contributions\n## Theoretical\n스캐폴딩 이론을 AI 협업에 적용하여 새로운 통찰을 제공한다.\n\n## Methodological\n필드 실험을 통해 스캐폴딩 개입의 효과를 실증적으로 검증하였다.\n\n## Practical\nAI 도구의 효과적인 사용을 위한 교육 및 프로토콜 개발에 기여할 수 있다.\n\n# Limitations\n- AM/PM 세션 혼합으로 인한 혼란이 존재한다.\n- 문서 길이에 대한 LLM 채점의 민감성이 결과에 영향을 미쳤다.\n\n# Transferable Insights\n- AI 도구의 효과적인 사용을 위해서는 구조적 지원이 필요하다.\n- 인지적 변화가 AI 활용에 긍정적인 영향을 미칠 수 있다.\n\n# Idea Seeds\n1. AI 도구 사용을 위한 교육 프로그램 개발.\n2. 다양한 산업에서의 스캐폴딩 개입 효과 연구.\n3. AI와 인간의 협업을 위한 새로운 프로토콜 설계.\n\n# Citation Snippets\n> Farach, A., Cambon, A., Tankelevitch, L., Hsueh, C., & Janssen, R. (2026). Scaffolding Human-AI Collaboration: A Field Experiment on Behavioral Protocols and Cognitive Reframing. \n\ntags: #human-ai_collaboration, #classroom_ai, #ai_tutoring, #instructional_design, #scaffolding, #tpack, #ai_literacy, #education, #learning_analytics, #ai_pedagogy\n\n---\n\n요약: 본 연구는 Fortune 500 소매업체의 388명을 대상으로 인간-AI 협업을 위한 두 가지 스캐폴딩 개입의 효과를 실험적으로 검토하였다. 행동적 스캐폴딩은 문서 품질을 저하시켰고, 인지적 스캐폴딩은 문서 품질을 향상시켰다. 연구 결과는 AI 도구의 효과적인 사용을 위해 구조적 프로토콜과 사고 파트너로서의 인식 변화가 필요함을 시사한다.", "link": "https://arxiv.org/abs/2604.08678v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Alex Farach", "Alexia Cambon", "Lev Tankelevitch"], "categories": ["econ.GN", "cs.HC"]}, {"id": "3", "source": "ARXIV", "score": 13, "day": "2026-04-10", "title": "Enhancing LLM Problem Solving via Tutor-Student Multi-Agent Interaction", "content": "---\ntitle: LLM 문제 해결 향상을 위한 튜터-학생 다중 에이전트 상호작용\nauthors: Nurullah Eymen Özdemir, Erhan Oztop\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2604.08931v1\nresearch_type: 실험적 연구\nmethodology: 다중 에이전트 시스템\ndata_type: 코드 생성 문제\nsample: APPS 벤치마크의 100개 문제\ncontext: 자율 코드 생성\ntheoretical_framework: 발달 이론, 동료 튜터링 이론\nkeywords: [peer tutoring, scaffolding, large language models, multi-agent systems, code generation]\n---\n\n# APA 7th style\n\n# Summary\n이 연구는 튜터-학생 다중 에이전트 시스템이 대형 언어 모델(LLM)의 문제 해결 능력을 향상시킬 수 있는지를 탐구한다. 연구진은 학생 에이전트가 솔루션을 생성하고 반복적으로 개선하는 역할을 맡고, 튜터 에이전트가 구조화된 피드백을 제공하는 비대칭 역할을 부여하였다. 제안된 PETITE 프레임워크는 APPS 코딩 벤치마크에서 기존의 방법들과 비교하여 유사하거나 더 높은 정확도를 달성하면서도 토큰 소비를 크게 줄이는 성과를 보였다. 이러한 결과는 발달 이론에 기반한 역할 차별화 상호작용 구조가 LLM 문제 해결을 향상시키는 데 효과적임을 시사한다.\n\n# Research Logic\n## Problem\nLLM의 문제 해결 성능이 기존 방법론에 비해 낮은 문제를 해결하고자 함.\n## Theory\n발달 이론과 동료 튜터링 이론을 기반으로 한 비대칭 역할의 상호작용 구조가 효과적일 것이라는 가설.\n## Design\n학생 에이전트와 튜터 에이전트의 비대칭 역할을 가진 다중 에이전트 시스템을 설계.\n## Findings\nPETITE 프레임워크가 기존의 Self-Consistency, Self-Refine, Multi-Agent Debate, Multi-Agent Review 방법보다 유사하거나 더 높은 정확도를 보이며, 토큰 소비를 줄임.\n## Conclusion\n발달 이론에 기반한 역할 차별화 상호작용이 LLM의 문제 해결 성능을 향상시키는 유효한 방법임을 확인.\n\n# Key Findings\n- PETITE 프레임워크는 비대칭 역할을 통해 LLM의 문제 해결 성능을 향상시킴.\n- 기존 방법들보다 유사하거나 더 높은 정확도를 달성하였음.\n- 토큰 소비를 현저히 줄이는 성과를 보임.\n\n# Contributions\n## Theoretical\n발달 이론과 동료 튜터링 이론을 LLM에 적용한 새로운 이론적 기여.\n## Methodological\n비대칭 역할을 통한 다중 에이전트 시스템의 설계 및 구현.\n## Practical\n효율적인 코드 생성 및 피드백 제공을 통한 교육적 활용 가능성 제시.\n\n# Limitations\n- 연구는 APPS 벤치마크에 국한되어 있어 일반화 가능성에 한계가 있음.\n- 비대칭 역할의 효과를 다른 도메인에 적용한 연구가 필요함.\n\n# Transferable Insights\n- 비대칭 역할의 상호작용 구조가 다른 AI 시스템에도 적용 가능할 수 있음.\n- 발달 이론을 기반으로 한 교육적 접근이 AI 튜터링 시스템에 유용할 수 있음.\n\n# Idea Seeds\n1. PETITE 프레임워크를 다른 문제 해결 도메인에 적용하여 효과를 검증.\n2. 비대칭 역할의 상호작용을 통해 다양한 학습 환경에서의 효과 분석.\n3. LLM의 피드백 메커니즘을 개선하기 위한 추가 연구.\n\n# Citation Snippets\n> Özdemir, N. E., & Oztop, E. (2026). Enhancing LLM Problem Solving via Tutor-Student Multi-Agent Interaction. arXiv. https://arxiv.org/abs/2604.08931v1\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy\n\n---\n\n이 연구는 LLM의 문제 해결 성능을 향상시키기 위한 튜터-학생 다중 에이전트 시스템의 효과를 탐구하며, 비대칭 역할의 상호작용이 성과를 높일 수 있음을 보여준다. APPS 벤치마크에서의 실험을 통해 기존 방법보다 높은 정확도와 낮은 토큰 소비를 달성하였다.", "link": "https://arxiv.org/abs/2604.08931v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Nurullah Eymen Özdemir", "Erhan Oztop"], "categories": ["cs.AI", "cs.MA"]}, {"id": "4", "source": "ARXIV", "score": 11, "day": "2026-04-10", "title": "A Mathematical Framework for Temporal Modeling and Counterfactual Policy Simulation of Student Dropout", "content": "---\ntitle: A Mathematical Framework for Temporal Modeling and Counterfactual Policy Simulation of Student Dropout\nauthors: [Rafael da Silva, Jeff Eicher, Gregory Longo]\nyear: 2026\njournal: arXiv\ndoi: https://doi.org/10.48550/arXiv.2604.08874\nresearch_type: 이론적 연구\nmethodology: 패널 데이터 분석, 로지스틱 회귀\ndata_type: LMS 참여 데이터, 행정적 철회 기록\nsample: 고등 교육 기관의 학생\ncontext: 고등 교육에서의 학생 이탈\ntheoretical_framework: 시간적 모델링, 정책 시뮬레이션\nkeywords: [학생 이탈, 학습 분석, 생존 분석, 시간적 모델링, 정책 시뮬레이션]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 고등 교육에서 학생 이탈을 분석하기 위한 시간적 모델링 프레임워크와 반사실적 정책 시뮬레이션 레이어를 제안한다. LMS 참여 데이터와 행정적 철회 기록을 사용하여 이탈을 시간-사건 결과로 운영화하고, 주간 위험을 패널 데이터의 로지스틱 회귀를 통해 모델링하였다. 모델은 훈련 데이터에서 0.8350, 테스트 데이터에서 0.8405의 AUC를 달성하였으며, 정책 시뮬레이션을 통해 다양한 시나리오에 따른 생존 차이를 분석하였다. 성별에 따른 하위 그룹 분석을 통해 시나리오에 따른 생존 격차를 정량화하였으나, 결과는 인과적 식별이 이루어지지 않았다.\n\n# Research Logic\n## Problem\n고등 교육에서 학생 이탈 문제는 개인, 가족, 기관 및 사회에 상당한 비용을 초래한다. 기존 연구는 정적 위험 추정에 초점을 맞추어 이탈 시점을 명확히 하지 못하였다.\n\n## Theory\n이 연구는 시간적 위험 모델링과 정책 시뮬레이션을 통해 이탈 예측의 한계를 극복하고자 하였다.\n\n## Design\n패널 데이터 분석을 통해 주간 위험을 로지스틱 회귀로 모델링하고, 반사실적 시뮬레이션을 통해 정책 효과를 비교하였다.\n\n## Findings\n모델은 주간 위험을 효과적으로 예측하였으며, 성별에 따른 생존 격차를 분석하였다. 그러나 인과적 효과는 식별되지 않았다.\n\n## Conclusion\n제안된 프레임워크는 관찰 데이터의 제약 속에서도 내부 구조적 시나리오 비교를 지원할 수 있음을 보여준다.\n\n# Key Findings\n- 모델은 훈련 데이터에서 AUC 0.8350, 테스트 데이터에서 AUC 0.8405를 달성하였다.\n- 정책 시뮬레이션을 통해 생존 차이를 분석하였으며, 성별에 따른 격차를 정량화하였다.\n- 결과는 인과적 식별이 이루어지지 않았으며, 시나리오 비교의 가능성을 보여주었다.\n\n# Contributions\n## Theoretical\n시간적 모델링과 정책 시뮬레이션의 통합을 통해 학생 이탈 연구의 새로운 방향을 제시하였다.\n\n## Methodological\n패널 데이터 분석과 로지스틱 회귀를 활용한 새로운 분석 방법론을 개발하였다.\n\n## Practical\n고등 교육 기관에서의 이탈 예측 및 개입 정책 수립에 기여할 수 있는 실용적인 프레임워크를 제공하였다.\n\n# Limitations\n- 인과적 효과를 식별할 수 있는 데이터가 부족하다.\n- 특정 시나리오에 대한 결과가 제한적이다.\n\n# Transferable Insights\n- 시간적 모델링은 다양한 교육 환경에서 학생 이탈 예측에 적용 가능하다.\n- 정책 시뮬레이션은 교육 개입의 효과를 평가하는 데 유용할 수 있다.\n\n# Idea Seeds\n1. 다른 교육 환경에서의 시간적 모델링 적용 연구.\n2. 다양한 인구 집단에 대한 정책 시뮬레이션의 효과 분석.\n3. LMS 데이터의 활용을 통한 학생 참여 증진 방안 연구.\n\n# Citation Snippets\n> da Silva, R., Eicher, J., & Longo, G. (2026). A Mathematical Framework for Temporal Modeling and Counterfactual Policy Simulation of Student Dropout. arXiv. https://doi.org/10.48550/arXiv.2604.08874\n\ntags: #학생이탈, #학습분석, #생존분석, #시간적모델링, #정책시뮬레이션\n\n---\n\n요약: 본 연구는 고등 교육에서 학생 이탈을 분석하기 위한 시간적 모델링 프레임워크를 제안하며, LMS 데이터를 활용하여 주간 위험을 모델링하고 정책 시뮬레이션을 통해 생존 차이를 분석하였다. 결과는 인과적 식별이 이루어지지 않았으나, 제안된 프레임워크는 내부 구조적 시나리오 비교를 지원할 수 있음을 보여준다.", "link": "https://arxiv.org/abs/2604.08874v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Rafael da Silva", "Jeff Eicher", "Gregory Longo"], "categories": ["cs.LG", "cs.AI"]}, {"id": "5", "source": "ARXIV", "score": 10, "day": "2026-04-09", "title": "Towards Generalizable Representations of Mathematical Strategies", "content": "Pretrained encoders for mathematical texts have achieved significant improvements on various tasks such as formula classification and information retrieval. Yet they remain limited in representing and capturing student strategies for entire solution pathways. Previously, this has been accomplished either through labor-intensive manual labeling, which does not scale, or by learning representations tied to platform-specific actions, which limits generalizability. In this work, we present a novel approach for learning problem-invariant representations of entire algebraic solution pathways. We first construct transition embeddings by computing vector differences between consecutive algebraic states encoded by high-capacity pretrained models, emphasizing transformations rather than problem-specific features. Sequence-level embeddings are then learned via SimCSE, using contrastive objectives to position semantically similar solution pathways close in embedding space while separating dissimilar strategies. We evaluate these embeddings through multiple tasks, including multi-label action classification, solution efficiency prediction, and sequence reconstruction, and demonstrate their capacity to encode meaningful strategy information. Furthermore, we derive embedding-based measures of strategy uniqueness, diversity, and conformity that correlate with both short-term and distal learning outcomes, providing scalable proxies for mathematical creativity and divergent thinking. This approach facilitates platform-agnostic and cross-problem analyses of student problem-solving behaviors, demonstrating the effectiveness of transition-based sequence embeddings for educational data mining and automated assessment.", "link": "https://arxiv.org/abs/2604.08693v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Siddhartha Pradhan", "Ethan Prihar", "Erin Ottmar"], "categories": ["cs.CY", "cs.HC", "cs.IR"]}, {"id": "6", "source": "ARXIV", "score": 8, "day": "2026-04-08", "title": "Chatbot-Based Assessment of Code Understanding in Automated Programming Assessment Systems", "content": "Large Language Models (LLMs) challenge conventional automated programming assessment because students can now produce functionally correct code without demonstrating corresponding understanding. This paper makes two contributions. First, it reports a saturation-based scoping review of conversational assessment approaches in programming education. The review identifies three dominant architectural families: rule-based or template-driven systems, LLM-based systems, and hybrid systems. Across the literature, conversational agents appear promising for scalable feedback and deeper probing of code understanding, but important limitations remain around hallucinations, over-reliance, privacy, integrity, and deployment constraints. Second, the paper synthesizes these findings into a Hybrid Socratic Framework for integrating conversational verification into Automated Programming Assessment Systems (APASs). The framework combines deterministic code analysis with a dual-agent conversational layer, knowledge tracking, scaffolded questioning, and guardrails that tie prompts to runtime facts. The paper also discusses practical safeguards against LLM-generated explanations, including proctored deployment modes, randomized trace questions, stepwise reasoning tied to concrete execution states, and local-model deployment options for privacy-sensitive settings. Rather than replacing conventional testing, the framework is intended as a complementary layer for verifying whether students understand the code they submit.", "link": "https://arxiv.org/abs/2604.07304v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Eduard Frankford", "Erik Cikalleshi", "Ruth Breu"], "categories": ["cs.SE", "cs.AI"]}, {"id": "7", "source": "ARXIV", "score": 8, "day": "2026-04-08", "title": "EmoMAS: Emotion-Aware Multi-Agent System for High-Stakes Edge-Deployable Negotiation with Bayesian Orchestration", "content": "Large language models (LLMs) has been widely used for automated negotiation, but their high computational cost and privacy risks limit deployment in privacy-sensitive, on-device settings such as mobile assistants or rescue robots. Small language models (SLMs) offer a viable alternative, yet struggle with the complex emotional dynamics of high-stakes negotiation. We introduces EmoMAS, a Bayesian multi-agent framework that transforms emotional decision-making from reactive to strategic. EmoMAS leverages a Bayesian orchestrator to coordinate three specialized agents: game-theoretic, reinforcement learning, and psychological coherence models. The system fuses their real-time insights to optimize emotional state transitions while continuously updating agent reliability based on negotiation feedback. This mixture-of-agents architecture enables online strategy learning without pre-training. We further introduce four high-stakes, edge-deployable negotiation benchmarks across debt, healthcare, emergency response, and educational domains. Through extensive agent-to-agent simulations across all benchmarks, both SLMs and LLMs equipped with EmoMAS consistently surpass all baseline models in negotiation performance while balancing ethical behavior. These results show that strategic emotional intelligence is also the key driver of negotiation success. By treating emotional expression as a strategic variable within a Bayesian multi-agent optimization framework, EmoMAS establishes a new paradigm for effective, private, and adaptive negotiation AI suitable for high-stakes edge deployment.", "link": "https://arxiv.org/abs/2604.07003v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Yunbo Long", "Yunhan Liu", "Liming Xu"], "categories": ["cs.AI"]}, {"id": "8", "source": "ARXIV", "score": 8, "day": "2026-04-07", "title": "Understanding Educators' Perceptions of AI-generated Non-consensual Intimate Imagery", "content": "AI-generated non-consensual intimate imagery (AIG-NCII) is an emerging social problem due to the advancement of AI tools. While recent incidents in middle and high schools have highlighted the urgency of this issue, there is limited understanding of what concrete supports schools need to effectively address AIG-NCII. To fill this gap, we conducted an interview study with 20 educators in the U.S. and investigated their attitudes, experiences, and practices related to AIG-NCII. Educators expressed concerns about both students' and their own vulnerability, as AIG-NCII may cause moral decline among students, while educators themselves could become victims. Nevertheless, existing practices in schools are limited, and they lack both training and systematic policies. Challenges such as a lack of resources, unclear legal boundaries, and limited knowledge of AI make implementation difficult. The findings of this paper contribute to interactive educational tool design, curriculum design, and policy-making, especially regarding the need for multi-stakeholder strategies to address issues surrounding AIG-NCII.", "link": "https://arxiv.org/abs/2604.06131v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Tongxin Li", "Katelyn M Reyes", "Liezeil Jimenez"], "categories": ["cs.HC"]}, {"id": "9", "source": "ARXIV", "score": 8, "day": "2026-04-06", "title": "Demonstrating SIMA-Play: A Serious Game for Forest Management Decision-Making through Board Game and Digital Simulation", "content": "Board games have shown promise as educational tools, but their use in engaging learners with the complex, long-term trade-offs of forest management remains strikingly underdeveloped. Addressing this gap, we investigate how forest growth simulation data can inform decision-making through information visualization and gameplay mechanics. We designed a serious game, SIMA-Play, that enables players to make informed forest management decisions under dynamic environmental and market conditions, simulating forest growth over time and comparing player performance across economic and sustainability outcomes. By using visualization to give players feedback on their choices, at the end of the game, it supports systems thinking and makes the trade-offs in forestry practices easier to understand and discuss. The study concludes with a research roadmap that outlines future experiments, longitudinal studies, and digital versions of SIMA-Play to assess its long-term effects on learning and engagement.", "link": "https://arxiv.org/abs/2604.04904v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Arka Majhi", "Daniel Fernández Galeote", "Timo Nummenmaa"], "categories": ["cs.HC", "cs.CY"]}];

  btn.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSort(btn) {
  currentSort = btn.dataset.sort;
  document.querySelectorAll('#sortGroup .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  render();
}

function toggleFavorite(id, e) {
  e.stopPropagation();
  const idx = favorites.indexOf(id);
  if (idx === -1) {
    favorites.push(id);
  } else {
    favorites.splice(idx, 1);
  }
  localStorage.setItem('favorites', JSON.stringify(favorites));
  applyFilters();
}

function recordVisit(id) {
  if (!visited.includes(id)) {
    visited.push(id);
  }
  localStorage.setItem('visited', JSON.stringify(visited));
}

function recordSearch(query) {
  if (query.trim() && !searchHistory.includes(query)) {
    searchHistory.unshift(query);
    if (searchHistory.length > 10) searchHistory.pop();
    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
  }
}

function downloadJSON() {
  const data = JSON.stringify(filtered, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadCSV() {
  const headers = ['제목', '출처', '스코어', '리뷰여부', '링크'];
  const rows = filtered.map(p => [
    '"' + p.title.replace(/"/g, '""') + '"',
    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
</html>
