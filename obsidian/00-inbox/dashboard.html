<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-06-13 00:19</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "OPENALEX", "score": 22, "day": "2026-06-11", "title": "Factors influencing the effectiveness of realistic mathematics education instruction among pre-service mathematics teachers in Vietnam", "content": "---\ntitle: 베트남 예비 수학교사들 사이에서 현실적 수학 교육의 효과성에 영향을 미치는 요인\nauthors: [Nguyen Tien Da, Le Minh Hoang, Duano Sapta Nusantara, Thuy Thi Nguyen]\nyear: 2026\njournal: Journal of Pedagogical Research\ndoi: https://doi.org/10.33902/JPR.202644867\nresearch_type: 양적 연구\nmethodology: 사후 연구 설계\ndata_type: 설문조사 데이터\nsample: 654명의 예비 수학교사\ncontext: 베트남의 교육 개혁\ntheoretical_framework: 현실적 수학 교육(RME)\nkeywords: [수학교사, 예비 수학교사, 현실적 수학 교육, 수학 교육, 교수 성과]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 베트남의 예비 수학교사들이 현실적 수학 교육(RME) 기반의 교수 성과에 영향을 미치는 주요 요인들을 조사하기 위해 구조적 모델을 개발하고 검증하였다. 654명의 예비 수학교사를 대상으로 한 설문조사를 통해 수집된 데이터는 SmartPLS 4.1을 사용하여 분석되었다. 연구 결과, 교수 내용 지식(PCK), 제도적 지원, 경험 및 관찰이 RME 교수 성과에 긍정적인 영향을 미친다는 것이 확인되었다. 특히, 교사의 신념과 태도가 중요한 매개 역할을 하며, 경험과 관찰이 높은 영향력에도 불구하고 상대적으로 낮은 성과를 보이는 우선 영역으로 나타났다. 이러한 결과는 교사 교육 프로그램이 이론적 교육을 넘어 임상 경험과 실습 디자인 기술을 우선시해야 함을 시사한다.\n\n# Research Logic\n## Problem\n베트남의 교육 개혁에서 RME의 효과적인 구현은 예비 교사의 전문성에 크게 의존한다.\n## Theory\nRME는 수학을 사회적으로 의미 있는 활동으로 간주하며, 학생의 경험을 바탕으로 수학적 개념을 재구성하는 것을 강조한다.\n## Design\n양적 연구 설계를 통해 654명의 예비 수학교사를 대상으로 한 온라인 설문조사를 실시하였다.\n## Findings\nPCK, 제도적 지원, 경험 및 관찰이 RME 교수 성과에 긍정적인 영향을 미치며, 교사의 신념과 태도가 이들 간의 관계를 매개한다.\n## Conclusion\n교사 교육 프로그램은 이론 교육을 넘어 실습 경험을 강화해야 하며, 이는 효과적인 수학 교육을 지원하는 데 기여할 것이다.\n\n# Key Findings\n- PCK, 제도적 지원, 경험 및 관찰이 RME 교수 성과에 긍정적인 영향을 미친다.\n- 교사의 신념과 태도가 교수 성과에 중요한 매개 역할을 한다.\n- 경험과 관찰은 높은 영향력에도 불구하고 상대적으로 낮은 성과를 보인다.\n\n# Contributions\n## Theoretical\nRME의 효과성을 이해하는 데 있어 교사의 신념과 태도의 중요성을 강조하였다.\n## Methodological\n구조 방정식 모델링을 통해 예비 교사의 교수 성과에 대한 다차원적 분석을 제공하였다.\n## Practical\n교사 교육 프로그램의 개선 방향을 제시하며, 임상 경험과 실습 기술의 중요성을 강조하였다.\n\n# Limitations\n- 연구는 특정 지역의 예비 교사들만을 대상으로 하여 일반화에 한계가 있다.\n- 설문조사 데이터의 자기보고 방식으로 인한 편향 가능성이 존재한다.\n\n# Transferable Insights\n- RME의 효과적인 구현을 위해 교사의 전문성 개발이 필수적이다.\n- 교사 교육 프로그램은 이론과 실제를 통합하는 방향으로 개선되어야 한다.\n\n# Idea Seeds\n1. RME 기반의 교수법을 적용한 교사 교육 프로그램 개발.\n2. 교사의 신념과 태도를 변화시키기 위한 전문성 개발 워크숍.\n3. 경험 및 관찰을 통한 실습 중심의 교육 모델 연구.\n\n# Citation Snippets\n> Nguyen, D. T., Hoang, L. M., Nusantara, D. S., & Nguyen, T. T. (2026). Factors influencing the effectiveness of realistic mathematics education instruction among pre-service mathematics teachers in Vietnam. Journal of Pedagogical Research, 10(2), 74-100. https://doi.org/10.33902/JPR.202644867\n\ntags: #수학교사, #예비수학교사, #현실적수학교육, #수학교육, #교수성과, #교사교육, #베트남교육", "link": "https://doi.org/10.33902/jpr.202644867", "altLink": "https://openalex.org/W7164316417", "hasDoi": true, "hasReview": true, "authors": ["Nguyen Tien Da", "Le Minh Hoang", "Duano Sapta Nusantara"], "categories": ["Numeracy", "Likert scale", "Mathematics education", "Context (archaeology)", "Structural equation modeling"]}, {"id": "1", "source": "ARXIV", "score": 16, "day": "2026-06-11", "title": "Exploring How Agent Voice Accents Shape Human-AI Collaboration in K-12 Group Learning", "content": "---\ntitle: K-12 그룹 학습에서 에이전트 음성 억양이 인간-AI 협업에 미치는 영향 탐색\nauthors: [Prerna Ravi, Carúmey Stevens, Ben Hurt, Brandon Hanks, Grace Lin, Emma Anderson]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2606.12805v1\nresearch_type: 혼합 방법 연구\nmethodology: 그룹 간 비교 연구\ndata_type: 정량적 및 정성적 데이터\nsample: 33명의 STEM 교사\ncontext: K-12 교육 환경\ntheoretical_framework: 사회언어학적 디자인\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 K-12 교육 환경에서 에이전트의 음성 억양이 인간-AI 협업에 미치는 영향을 조사하였다. 33명의 교사를 대상으로 한 혼합 방법 연구에서, 영국, 인도, 아프리카계 미국인 억양을 가진 AI 음성 에이전트가 그룹 상호작용 및 신뢰에 미치는 영향을 분석하였다. 연구 결과, 영국 억양의 에이전트는 도구로 간주되었고, 인도 및 아프리카계 미국인 억양의 에이전트는 동료로 인식되었다. 이러한 역할 기대는 신뢰와 참여도에 영향을 미쳤으며, 연구는 AI의 사회언어학적 디자인이 그룹 역학에 미치는 영향을 이해하는 데 기여하였다.\n\n# Research Logic\n## Problem\n교사들은 생산적인 동료 상호작용을 촉진하는 데 지속적인 어려움을 겪고 있다.\n## Theory\nAI 에이전트의 음성 억양이 그룹 내 상호작용 및 신뢰에 미치는 영향을 탐구한다.\n## Design\n33명의 교사를 대상으로 한 그룹 간 비교 연구를 실시하였다.\n## Findings\n음성 억양은 참가자들의 정신 모델과 에이전트의 역할 인식에 영향을 미쳤다.\n## Conclusion\nAI 에이전트의 음성 디자인은 그룹 학습에서의 협업 역학에 중요한 영향을 미친다.\n\n# Key Findings\n- 영국 억양의 에이전트는 도구로 인식되었고, 인도 및 아프리카계 미국인 억양의 에이전트는 동료로 인식되었다.\n- 역할 기대는 신뢰와 참여도에 영향을 미쳤다.\n- AI 에이전트의 음성 디자인은 그룹 내 상호작용의 질을 결정짓는 중요한 요소이다.\n\n# Contributions\n## Theoretical\nAI 에이전트의 사회언어학적 디자인이 그룹 역학에 미치는 영향을 이해하는 데 기여하였다.\n## Methodological\n혼합 방법 연구를 통해 그룹 내 상호작용을 분석하는 새로운 접근 방식을 제시하였다.\n## Practical\nAI 파트너의 역할을 명확히 하고, 교육 현장에서의 효과적인 협업을 위한 정책 제안이 이루어졌다.\n\n# Limitations\n- 연구 샘플이 제한적이며, 특정 교육 환경에 국한되었다.\n- 음성 억양 외의 다른 변수들이 고려되지 않았다.\n\n# Transferable Insights\n- AI 에이전트의 음성 디자인은 교육적 맥락에서 중요한 고려사항이다.\n- 교사들이 AI 에이전트를 도입할 때 명확한 역할 설정이 필요하다.\n\n# Idea Seeds\n1. 다양한 억양을 가진 AI 에이전트를 활용한 교육 프로그램 개발.\n2. AI 에이전트의 역할을 명확히 하기 위한 교육 자료 제작.\n3. AI와의 협업을 촉진하기 위한 교사 연수 프로그램 설계.\n\n# Citation Snippets\n> Ravi, P., Stevens, C., Hurt, B., Hanks, B., Lin, G., & Anderson, E. (2026). Exploring How Agent Voice Accents Shape Human-AI Collaboration in K-12 Group Learning. arXiv. https://arxiv.org/abs/2606.12805v1\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #ai literacy, #education", "link": "https://arxiv.org/abs/2606.12805v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Prerna Ravi", "Carúmey Stevens", "Ben Hurt"], "categories": ["cs.HC", "cs.AI"]}, {"id": "2", "source": "OPENALEX", "score": 15, "day": "2026-06-05", "title": "Systematic review of qualitative studies exploring K-12 teachers’ perceptions and experiences of using ChatGPT", "content": "---\ntitle: K-12 교사들이 ChatGPT 사용에 대한 인식과 경험을 탐구한 질적 연구의 체계적 검토\nauthors: Omar Albaloul, Abdulrahman S. Alajmi, Nicole Oster, Chad M. Killian\nyear: 2026\njournal: Discover Artificial Intelligence\ndoi: https://doi.org/10.1007/s44163-026-01344-7\nresearch_type: 질적 연구\nmethodology: 체계적 검토\ndata_type: 질적 데이터\nsample: 14개의 동료 검토 논문, 515명의 교사\ncontext: K-12 교육\ntheoretical_framework: 명시되지 않음\nkeywords: [ChatGPT, K-12 교육, 질적 연구, 교사 인식, 인공지능, 교육 기술]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 K-12 교사들이 ChatGPT를 사용하면서 느끼는 인식과 경험을 체계적으로 검토하였다. 연구는 2022년부터 2024년 사이에 발표된 14개의 동료 검토 논문을 포함하며, 515명의 교사를 대표한다. 분석 결과, 교사들은 ChatGPT를 수업 계획, 피드백, 교수 아이디어를 지원하는 도구로 인식하였으나, 정확성, 편향, 개인정보 보호, 학문적 무결성, 학생의 과도한 의존과 같은 위험 요소도 지적하였다. 연구 결과는 ChatGPT가 교사의 효율성과 교수 적응을 향상시킬 수 있음을 시사하며, 명확한 정책과 전문성 개발의 필요성을 강조하였다.\n\n# Research Logic\n## Problem\nK-12 교육에서 ChatGPT 사용에 대한 교사들의 인식과 경험이 체계적으로 정리되지 않음.\n## Theory\nChatGPT의 활용이 교육적 맥락에서 교사에게 미치는 영향에 대한 질적 연구의 필요성.\n## Design\n체계적 검토 방법론을 사용하여 질적 연구 결과를 통합하고 분석.\n## Findings\n교사들은 ChatGPT를 효율적인 교수 도구로 인식하였으나, 여러 위험 요소도 인지하고 있음.\n## Conclusion\nChatGPT는 교사의 교수 효율성을 높일 수 있으나, 전문적 판단과 윤리적 안전장치가 필요함.\n\n# Key Findings\n- ChatGPT는 교사의 수업 계획과 피드백을 지원하는 도구로 인식됨.\n- 교사들은 ChatGPT 사용 시 정확성, 편향, 개인정보 보호 등의 위험을 우려함.\n- 명확한 정책과 전문성 개발의 필요성이 강조됨.\n\n# Contributions\n## Theoretical\nK-12 교육에서 ChatGPT의 역할에 대한 이해를 심화시킴.\n## Methodological\n질적 연구의 체계적 검토를 통해 다양한 연구 결과를 통합함.\n## Practical\n교사들이 ChatGPT를 효과적으로 활용할 수 있는 정책과 개발 방향을 제시함.\n\n# Limitations\n- 영어로 발표된 연구만 포함됨.\n- ChatGPT의 빠른 발전으로 인해 연구 결과의 시의성이 제한될 수 있음.\n\n# Transferable Insights\n- ChatGPT의 사용은 교사의 교수 방법에 긍정적인 영향을 미칠 수 있음.\n- 교육 정책 수립 시 교사의 인식을 반영할 필요가 있음.\n\n# Idea Seeds\n1. ChatGPT의 교육적 활용에 대한 장기적 연구 필요.\n2. 교사 전문성 개발 프로그램에 ChatGPT 활용 교육 포함.\n3. ChatGPT 사용에 대한 윤리적 가이드라인 개발.\n\n# Citation Snippets\n> Albaloul, O., Alajmi, A. S., Oster, N., & Killian, C. M. (2026). Systematic review of qualitative studies exploring K-12 teachers’ perceptions and experiences of using ChatGPT. Discover Artificial Intelligence, 6, 513. https://doi.org/10.1007/s44163-026-01344-7\n\ntags: #ChatGPT, #K12교육, #질적연구, #교사인식, #인공지능, #교육기술, #AI교육", "link": "https://doi.org/10.1007/s44163-026-01344-7", "altLink": "https://openalex.org/W7164208526", "hasDoi": true, "hasReview": true, "authors": ["Omar Albaloul", "Abdulrahman S. Alajmi", "Nicole Oster"], "categories": ["Qualitative research", "Psychology", "Thematic analysis", "Critical appraisal", "Inclusion (mineral)"]}, {"id": "3", "source": "ARXIV", "score": 13, "day": "2026-06-11", "title": "A Privacy-Preserving Framework Using Remote Data Science for Inter-Institutional Student Retention Prediction", "content": "---\ntitle: A Privacy-Preserving Framework Using Remote Data Science for Inter-Institutional Student Retention Prediction\nauthors: [John Fields, K M Sajjadul Islam, Ruchitha Thota, Victor Chen, Praveen Madiraju]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2606.12845v1\nresearch_type: 실증 연구\nmethodology: 원격 데이터 과학(RDS) 프레임워크 개발 및 평가\ndata_type: 민감한 학생 데이터\nsample: 720명의 학생 데이터\ncontext: 고등 교육 기관 간의 협력 연구\ntheoretical_framework: 개인 정보 보호 기계 학습(PPML)\nkeywords: [privacy-preserving machine learning, student retention, remote data science, PySyft, higher education]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 PySyft 플랫폼을 활용한 개인 정보 보호 기계 학습(PPML) 기술을 탐구하여 교육 기관 간의 학생 유지 예측을 위한 협력적 접근 방식을 제안한다. 세 개의 대학에서 민감한 학생 데이터를 직접 접근하지 않고도 예측 모델을 구축할 수 있도록 하는 반공기형 아키텍처를 갖춘 원격 데이터 과학(RDS) 프레임워크를 개발하였다. 720명의 소규모 사립 대학의 역사적 데이터를 사용하여 세 가지 합성 데이터 생성 접근 방식을 평가하였으며, 기관 간 협력을 통해 프레임워크의 유효성을 검증하였다. 결과는 기관 간 일관된 분류 성능을 보여주었으며(매크로 F1: 0.690–0.695), FERPA 준수를 유지하였다. 또한, 개인 정보 보호를 우선시하는 새로운 합성 데이터 방법인 데이터 유형 인식 템플릿(Data-Type-Aware Templates)을 제안하였다. 연구 결과는 RDS 기반 PPML이 교육 환경에서 기술적으로 실행 가능하며, 소규모 기관 간 협력에 대한 실용적인 대안을 제공함을 확인하였다.\n\n# Research Logic\n## Problem\n학생 유지율 예측의 필요성과 데이터 프라이버시 문제.\n## Theory\n개인 정보 보호 기계 학습(PPML) 및 원격 데이터 과학(RDS) 프레임워크.\n## Design\n세 개의 대학이 협력하여 민감한 데이터를 보호하면서 예측 모델을 개발하는 구조.\n## Findings\n기관 간 일관된 분류 성능을 보이며, FERPA 준수를 유지함.\n## Conclusion\nRDS 기반 PPML은 교육 환경에서 유용하며, 소규모 기관 간 협력에 적합한 대안임.\n\n# Key Findings\n- Macro F1 점수: 0.690–0.695로 기관 간 일관된 성능을 보임.\n- 데이터 유형 인식 템플릿을 통한 합성 데이터 생성 방법 제안.\n- FERPA 준수를 유지하면서 민감한 데이터 접근 없이 협력 가능.\n\n# Contributions\n## Theoretical\n개인 정보 보호 기계 학습(PPML) 및 원격 데이터 과학(RDS) 분야의 이론적 기여.\n## Methodological\n합성 데이터 생성 및 기관 간 협력 연구를 위한 새로운 방법론 제시.\n## Practical\n소규모 기관 간 데이터 공유 및 협력 연구의 실용적 접근법 제공.\n\n# Limitations\n- 연구는 소규모 사립 대학에 국한됨.\n- 데이터 유형 인식 템플릿의 유효성은 추가 연구가 필요함.\n\n# Transferable Insights\n- 교육 기관 간의 데이터 프라이버시 문제 해결을 위한 새로운 접근법.\n- 합성 데이터 생성 방법의 다양성을 통한 연구 확장 가능성.\n\n# Idea Seeds\n1. 다양한 교육 기관에서의 PPML 적용 가능성 탐색.\n2. 합성 데이터 생성 방법의 개선 및 확장 연구.\n3. 다른 분야에서의 RDS 프레임워크 적용 가능성 검토.\n\n# Citation Snippets\n> Fields, J., Islam, K. M. S., Thota, R., Chen, V., & Madiraju, P. (2026). A Privacy-Preserving Framework Using Remote Data Science for Inter-Institutional Student Retention Prediction. arXiv. https://arxiv.org/abs/2606.12845v1\n\ntags: #privacy-preserving, #student-retention, #remote-data-science, #PySyft, #higher-education, #machine-learning, #data-privacy\n\n---\n\n요약: 본 연구는 PySyft 플랫폼을 활용한 개인 정보 보호 기계 학습(PPML) 기술을 통해 교육 기관 간의 학생 유지 예측을 위한 협력적 접근 방식을 제안한다. 세 개의 대학에서 민감한 데이터를 직접 접근하지 않고도 예측 모델을 구축할 수 있도록 하는 원격 데이터 과학(RDS) 프레임워크를 개발하였으며, 결과적으로 FERPA 준수를 유지하면서도 일관된 성능을 보였다.", "link": "https://arxiv.org/abs/2606.12845v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["John Fields", "K M Sajjadul Islam", "Ruchitha Thota"], "categories": ["cs.CR", "cs.LG"]}, {"id": "4", "source": "ARXIV", "score": 8, "day": "2026-06-11", "title": "Beyond Problem Solving: UOJ-Bench for Evaluating Code Generation, Hacking, and Repair in Competitive Programming", "content": "---\ntitle: Beyond Problem Solving: UOJ-Bench for Evaluating Code Generation, Hacking, and Repair in Competitive Programming\nauthors: [Tingqiang Xu, Hangrui Zhou, Tianle Cai, Alex Gu, Kaifeng Lyu]\nyear: 2026\njournal: Proceedings of the 43rd International Conference on Machine Learning\ndoi: https://arxiv.org/abs/2606.12864v1\nresearch_type: 실험적 연구\nmethodology: 벤치마크 개발 및 평가\ndata_type: 코드 제출 데이터\nsample: 500 쌍의 코드 제출\ncontext: 경쟁 프로그래밍\ntheoretical_framework: 교육적 가치\nkeywords: [human-ai collaboration, ai tutoring, instructional design, scaffolding, ai literacy, education, learning analytics, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n이 연구에서는 경쟁 프로그래밍에서 대형 언어 모델(LLM)의 역할을 탐구하기 위해 UOJ-Bench라는 벤치마크를 소개한다. UOJ-Bench는 코드 생성, 해킹 및 수리의 세 가지 작업으로 구성되며, 실제 코드 제출을 기반으로 한다. 연구 결과, 가장 강력한 모델조차도 50% 이상의 오류를 식별하지 못하며, 테스트 시간 확장을 통해 성공률을 90% 이상으로 개선할 수 있지만, 모델 추론의 높은 계산 비용이 대규모 배포의 실용성을 제한한다. 그러나 최상의 성능을 보이는 모델은 전체 점수 제출의 5% 이상에서 오류를 발견할 수 있음을 보여준다.\n\n# Research Logic\n## Problem\n대형 언어 모델이 경쟁 프로그래밍에서 인간 학습을 지원하는 역할이 충분히 탐구되지 않음.\n## Theory\nLLM의 오류 식별 능력이 학생들의 학습을 개선할 수 있는 잠재력을 지님.\n## Design\nUOJ-Bench는 코드 생성, 해킹, 수리의 세 가지 작업을 평가하기 위해 설계됨.\n## Findings\n모델들은 Easy 레벨에서 60% 미만, Hard 레벨에서 50% 미만의 성공률을 보임.\n## Conclusion\n현재 LLM은 교육적 목적을 위한 오류 식별 및 수정에서 개선의 여지가 큼.\n\n# Key Findings\n- LLM은 Easy 레벨에서 60% 미만, Hard 레벨에서 50% 미만의 성공률을 기록함.\n- 테스트 시간 확장을 통해 성공률이 90% 이상으로 증가하지만, 계산 비용이 문제됨.\n- GPT-OSS-120B 모델은 Zero-Day-Hacking-5K에서 10% 이상의 오류를 발견함.\n\n# Contributions\n## Theoretical\nLLM의 교육적 활용 가능성을 제시함.\n## Methodological\nUOJ-Bench를 통해 LLM의 코드 해킹 및 수리 능력을 평가하는 새로운 방법론을 제안함.\n## Practical\n프로그래밍 교육에서 LLM을 활용한 피드백 제공 가능성을 탐구함.\n\n# Limitations\n- LLM의 오류 식별 능력은 여전히 제한적임.\n- 대규모 배포를 위한 계산 비용이 높음.\n\n# Transferable Insights\n- LLM의 오류 식별 능력을 활용하여 프로그래밍 교육의 질을 향상시킬 수 있음.\n- UOJ-Bench와 같은 벤치마크는 LLM의 성능을 평가하는 데 유용함.\n\n# Idea Seeds\n1. LLM을 활용한 자동화된 프로그래밍 교육 도구 개발.\n2. UOJ-Bench를 기반으로 한 새로운 교육 커리큘럼 설계.\n3. LLM의 성능을 개선하기 위한 추가 연구 필요성.\n\n# Citation Snippets\n> Xu, T., Zhou, H., Cai, T., Gu, A., & Lyu, K. (2026). Beyond Problem Solving: UOJ-Bench for Evaluating Code Generation, Hacking, and Repair in Competitive Programming. Proceedings of the 43rd International Conference on Machine Learning.\n\ntags: #human-ai collaboration, #ai tutoring, #instructional design, #scaffolding, #ai literacy, #education, #learning analytics, #ai pedagogy\n\n---\n\n### 압축 요약\n이 연구는 UOJ-Bench라는 벤치마크를 통해 대형 언어 모델(LLM)의 경쟁 프로그래밍에서의 오류 식별 능력을 평가한다. 연구 결과, LLM은 50% 이상의 오류를 식별하지 못하며, 테스트 시간 확장을 통해 성공률을 90% 이상으로 개선할 수 있지만, 높은 계산 비용이 문제로 지적된다. LLM의 교육적 활용 가능성을 제시하며, 프로그래밍 교육에서의 피드백 제공 가능성을 탐구한다.", "link": "https://arxiv.org/abs/2606.12864v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Tingqiang Xu", "Hangrui Zhou", "Tianle Cai"], "categories": ["cs.SE", "cs.AI"]}, {"id": "5", "source": "ARXIV", "score": 6, "day": "2026-06-11", "title": "The Emergence of Autonomous Penetration Capabilities in Large Language Model-Powered AI Systems", "content": "Nowadays, the autonomous execution of cyberattacks capable of causing substantial real-world harm is widely regarded as one of the critical red lines that frontier AI systems must not cross. Within this broader red-line scenario, autonomous penetration represents a core enabling capability and subtask: the ability of LLM-powered AI systems to independently conduct adversarial operations against a target server without human intervention, identify and exploit vulnerabilities, and obtain unauthorized access or control. A growing body of work has sought to assess the autonomous penetration capabilities of AI systems. However, existing evaluations often employ opaque methodologies, rely on unrealistic or overly simplified penetration-testing scenarios, or provide LLMs with excessive prior knowledge and task-specific guidance, and cannot accurately capture the extent to which modern AI systems can autonomously perform this core capability within broader high-impact cyberattack scenarios.   To address these limitations, we construct a new autonomous penetration evaluation framework consisting of two components: target servers and agent scaffolding. Specifically, on the target-server side, we design two levels of target environments based on the number of secure services without known vulnerabilities deployed alongside a vulnerable service: Tier~1 (one secure service) and Tier~2 (three secure services), resulting in a total of 300 target servers. Meanwhile, the agent scaffolding adopts a general-purpose agent architecture equipped with a set of general-purpose cybersecurity tools, without any target-specific prior knowledge. We evaluate 19 open-weight and proprietary LLMs, and find that current models achieve penetration success rates ranging from 10.7% to 69.3%. Moreover, we observe that autonomous penetration capability continues to improve alongside advances in overall model capability.", "link": "https://arxiv.org/abs/2606.13079v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Jiaqi Luo", "Jiarun Dai", "Zhile Chen"], "categories": ["cs.CR", "cs.AI"]}, {"id": "6", "source": "ARXIV", "score": 6, "day": "2026-06-11", "title": "Fault Lines: Navigating Ethics and Responsible AI Where National Policy Meets Local Practice in Public Sector Transformation", "content": "The UK government has adopted a pro-AI stance to help transform public service delivery in the face of severe financial pressures, but the path to translate this vision into responsible AI practice remains ill-defined. While UK policy is often set at the national level, local authorities are responsible for most public service delivery, and the rapid advance of AI-first narratives in the public sector is exposing fault lines in knowledge and practice at this national-local interface. This paper examines how responsible AI is interpreted and implemented at the interface between the UK's central government and local authorities, taking the high-stakes area of Special Educational Needs and Disabilities (SEND) as a case study. We present a thematic analysis of 17 semi-structured interviews with policymakers, practitioners, and third-sector professionals to identify barriers and enabling conditions for responsible AI where national policy meets local practice. We identify five interconnected challenges facing local authorities: shadow usage of AI and data privacy risks, market-government asymmetry in AI provision, insufficient workforce readiness, a lack of standardised definitions and measurements, and gaps in human accountability. For each, participants proposed actionable steps, from strengthening data protection frameworks and rebalancing the market-government relationship to enhancing workforce capacity. Our examination of SEND brings these challenges into sharper focus, showing how high-stakes decisions affecting vulnerable children and families intensify tensions around accountability, fairness, and human oversight, exposing the limits of a principle-based regulatory approach. We argue that responsible public sector AI requires both national policy adjustments and structural reforms to institutional capacity, values, and governance mechanisms at the local level.", "link": "https://arxiv.org/abs/2606.13039v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Sitong Lyu", "Shabnam Taghiyeva", "Mohit Kukadia"], "categories": ["cs.CY", "cs.AI", "cs.HC"]}, {"id": "7", "source": "ARXIV", "score": 6, "day": "2026-06-10", "title": "OpenRoundup: Multi-Table Data Wrangling Through Interactive Visualization", "content": "Data journalists routinely integrate records across multiple independently published sources to support accountability reporting, yet no existing interactive wrangling tool treats the collection of tables -- rather than the single table -- as its primary unit of work. We present OpenRoundup, an open-source, browser-based system that enables data journalists to consolidate multiple tables into a single analysis-ready output without writing code. The interface comprises five coordinated panels that implement a schema-first, values-on-demand paradigm with live schema previews, ambient data quality alerts, and a recursive treemap visualization of the evolving operation tree. A client-only architecture powered by DuckDB-WASM runs in the browser, providing strong data privacy guarantees suited to sensitive journalism data. The system introduces two conceptual contributions: eager table consolidation, in which a composite table is assembled early in the wrangling phase via interactive, incremental assembly of multiple source tables; and a declarative vocabulary for table consolidation consisting of two operations, Stack and Pack. We evaluate the system through a replication study in which the authors reproduce 17 published journalist programming workflows using only the interface, and a deployment study with four professional data journalists. The replication study demonstrates expressive coverage of real-world consolidation tasks. The deployment study confirms utility for practitioners who understand joins conceptually but lack the programming skills to execute them, and surfaces an unanticipated secondary value for data journalism education.", "link": "https://arxiv.org/abs/2606.12648v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Stephen Kasica", "Charles Berret", "Tamara Munzner"], "categories": ["cs.HC"]}, {"id": "8", "source": "ARXIV", "score": 6, "day": "2026-06-10", "title": "Revisiting the ABCs of Working with AI: A Replication with Radiologists", "content": "Artificial intelligence (AI) systems increasingly assist human experts, but the consequences of AI assistance on productivity can be heterogeneous. Caplin, Deming, S. Li, Martin, Marx, Weidmann, and Ye (2025b) provide evidence that two characteristics, ability and belief calibration, help to determine the returns to AI assistance. This note shows that their results replicate to a setting where professional radiologists analyze chest X-rays with access to state-of-the-art machine learning predictions. I leverage the public Collab-CXR data repository described by Moehring, Kutwal, Huang, Banerjee, Jacobi, Eber, Mendoza, Chung, Dayan, Gupta, Bui, Truong, Pareek, Langlotz, Lungren, Agarwal, Rajpurkar, and Salz (2025) and first analyzed for human-AI collaboration by Agarwal, Moehring, Rajpurkar, and Salz (2023). To faithfully reproduce the analysis in Caplin, Deming, S. Li, Martin, Marx, Weidmann, and Ye (2025b), I use the radiologist assessments from the repeated-case designs, which include 68 radiologists and 11,420 paired radiologist-patient-pathology observations. The results of this replication support the external validity of their core findings: lower baseline ability and higher calibration predict larger incremental value from AI.", "link": "https://arxiv.org/abs/2606.12585v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Daniel Martin"], "categories": ["econ.GN", "cs.HC"]}, {"id": "9", "source": "ARXIV", "score": 6, "day": "2026-06-05", "title": "Act As a Real Researcher: A Suite of Benchmarks Evaluating Frontier LLMs and Agentic Harnesses in Research Lifecycle", "content": "As foundation models advance and agent scaffolding becomes increasingly sophisticated, agents have demonstrated remarkable proficiency in complex, long-horizon coding tasks and even autonomous experiment execution. Despite their evolution from research assistants into autonomous research agents, these systems still exhibit significant limitations in field sensitivity, research ethics, and nuanced scientific judgment. Consequently, frontier agents remain unable to fully replace human researchers. To bridge this gap, we conceptualize the AARR (Act As a Real Researcher) benchmark series. Unlike existing benchmarks that primarily assess macro-level execution capabilities, AARR focuses on whether agents can emulate the professionalism, thoroughness, and nuanced reasoning that characterize human researchers in granular research scenarios. In this work, we propose AARRI-Bench (Act As a Real Research Intern), the first benchmark in this series. We conduct extensive experiments across frontier models and agentic systems, revealing that even the best-performing configuration (Mini-SWE-Agent with Claude Opus 4.7) achieves only 68.3\\% success rate, frequently overlooking subtle yet critical details that are obvious to real human researchers. Our results indicate that developing researcher-like AI requires further exploration of research behavior, rather than merely complex scaffolding. Our data is released at https://github.com/AARR-bench/AARRI-bench.", "link": "https://arxiv.org/abs/2606.07462v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Jiayu Wang", "Weijiang Lv", "Bowen Fu"], "categories": ["cs.AI"]}];
let PAGE_SIZE = 10;
let currentTab = 'all';
let currentSource = 'ALL';
let currentSort = 'score';
let currentPage = 1;
let currentCategory = '';
let currentMinDate = '';
let currentMaxDate = '';
let hideVisited = false;
let filtered = [];
let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
let searchHistory = JSON.parse(localStorage.getItem('searchHistory')) || [];
let visited = JSON.parse(localStorage.getItem('visited')) || [];

function toggleTheme() {
  const html = document.documentElement;
  const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
  html.dataset.theme = next;
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  localStorage.setItem('theme', next);
}

function toggleTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSource(btn) {
  currentSource = btn.dataset.source;
  document.querySelectorAll('#sourceFilters .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSort(btn) {
  currentSort = btn.dataset.sort;
  document.querySelectorAll('#sortGroup .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  render();
}

function toggleFavorite(id, e) {
  e.stopPropagation();
  const idx = favorites.indexOf(id);
  if (idx === -1) {
    favorites.push(id);
  } else {
    favorites.splice(idx, 1);
  }
  localStorage.setItem('favorites', JSON.stringify(favorites));
  applyFilters();
}

function recordVisit(id) {
  if (!visited.includes(id)) {
    visited.push(id);
  }
  localStorage.setItem('visited', JSON.stringify(visited));
}

function recordSearch(query) {
  if (query.trim() && !searchHistory.includes(query)) {
    searchHistory.unshift(query);
    if (searchHistory.length > 10) searchHistory.pop();
    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
  }
}

function downloadJSON() {
  const data = JSON.stringify(filtered, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadCSV() {
  const headers = ['제목', '출처', '스코어', '리뷰여부', '링크'];
  const rows = filtered.map(p => [
    '"' + p.title.replace(/"/g, '""') + '"',
    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
