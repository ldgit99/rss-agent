<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-06-08 00:05</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "ARXIV", "score": 11, "day": "2026-05-28", "title": "Uncertainty-Aware Transfer Learning for Cross-Building Energy Forecasting: Toward Robust and Scalable District-Level Energy Management", "content": "---\ntitle: Uncertainty-Aware Transfer Learning for Cross-Building Energy Forecasting: Toward Robust and Scalable District-Level Energy Management\nauthors: [Shadmehr Zaregarizi, Khashayar Yavari]\nyear: 2026\njournal: Proceedings of 6th ACM International Workshop on Big Data and Machine Learning for Smart Buildings and Cities (BALANCES’26)\ndoi: https://doi.org/10.1145/nnnnnnn.nnnnnnn\nresearch_type: 실험적 연구\nmethodology: 전이 학습 프레임워크, 몬테카를로 드롭아웃\ndata_type: 고해상도 실측 데이터\nsample: Aalborg University의 교육 건물 및 EMPA의 NEST 건물\ncontext: 덴마크 및 스위스의 다중 건물 에너지 관리\ntheoretical_framework: 전이 학습, 불확실성 정량화\nkeywords: [전이 학습, 건물 에너지 예측, Temporal Fusion Transformer, Transfer Robustness Index, 지역 에너지 관리, 불확실성 정량화, 데이터 부족, 스마트 빌딩]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 지역 수준의 에너지 관리를 위한 전이 학습 프레임워크를 제안하며, Temporal Fusion Transformer(TFT)를 기반으로 한다. 연구는 덴마크 Aalborg University와 스위스 EMPA의 NEST 건물에서 수집된 고해상도 실측 데이터를 사용하여 평가되었다. Transfer Robustness Index(TRI)를 도입하여 도메인 간 일반화 품질을 정량화하며, Probe-Only 미세 조정 전략이 가장 우수한 성능을 보였다(TRI = 3,097). 몬테카를로 드롭아웃을 통해 예측 구간의 커버리지 확률이 93.2%로 나타났으며, 데이터 부족 분석을 통해 목표 도메인 데이터가 증가함에 따라 성능이 향상됨을 확인하였다.\n\n# Research Logic\n## Problem\n지역 수준의 에너지 예측을 위한 모델 재사용의 어려움과 불확실성 추정의 필요성.\n## Theory\n전이 학습과 불확실성 정량화 이론을 기반으로 한 접근.\n## Design\nTemporal Fusion Transformer(TFT) 기반의 전이 학습 프레임워크 설계.\n## Findings\nProbe-Only 미세 조정 전략이 가장 높은 TRI 값을 기록하며, 몬테카를로 드롭아웃을 통한 예측 구간의 신뢰성 확보.\n## Conclusion\nTFT 기반의 전이 학습 프레임워크가 지역 에너지 관리에 효과적임을 입증.\n\n# Key Findings\n- Probe-Only 미세 조정 전략이 TRI = 3,097로 가장 높은 성능을 기록.\n- 몬테카를로 드롭아웃을 통한 예측 구간 커버리지 확률이 93.2%.\n- 데이터 부족 분석 결과, 목표 도메인 데이터가 증가할수록 성능이 향상됨.\n\n# Contributions\n## Theoretical\n전이 학습과 불확실성 정량화의 새로운 통합 모델 제안.\n## Methodological\nTransfer Robustness Index(TRI)라는 새로운 평가 지표 도입.\n## Practical\n지역 에너지 관리에 대한 실용적인 가이드라인 제공.\n\n# Limitations\n- 연구는 단일 목표 사례 연구로 한정됨.\n- 고주파 스파이크로 인한 부정적인 R² 값 발생.\n\n# Transferable Insights\n- 전이 학습 전략의 효과적인 적용 가능성.\n- 데이터 부족 상황에서의 성능 향상 가능성.\n\n# Idea Seeds\n1. 다양한 건물 유형에 대한 전이 학습 전략 확장.\n2. 불확실성 정량화를 위한 새로운 메트릭 개발.\n3. 다중 목표 예측을 위한 모델 확장.\n\n# Citation Snippets\n> Zaregarizi, S., & Yavari, K. (2026). Uncertainty-Aware Transfer Learning for Cross-Building Energy Forecasting: Toward Robust and Scalable District-Level Energy Management. In Proceedings of 6th ACM International Workshop on Big Data and Machine Learning for Smart Buildings and Cities (BALANCES’26). https://doi.org/10.1145/nnnnnnn.nnnnnnn\n\ntags: #전이학습, #건물에너지예측, #TemporalFusionTransformer, #TransferRobustnessIndex, #지역에너지관리, #불확실성정량화, #스마트빌딩\n\n---\n\n요약: 본 연구는 지역 수준의 에너지 관리를 위한 전이 학습 프레임워크를 제안하며, Temporal Fusion Transformer(TFT)를 기반으로 하여 덴마크와 스위스의 데이터를 분석하였다. Probe-Only 미세 조정 전략이 가장 높은 성능을 보였으며, 몬테카를로 드롭아웃을 통한 예측 구간의 신뢰성도 확보되었다. 데이터 부족 분석을 통해 목표 도메인 데이터의 중요성을 강조하였다.", "link": "https://arxiv.org/abs/2605.29733v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Shadmehr Zaregarizi", "Khashayar Yavari"], "categories": ["cs.AI"]}, {"id": "1", "source": "ARXIV", "score": 11, "day": "2026-05-28", "title": "EvoMD-LLM: Learning the Language of Species Evolution in Reactive Molecular Dynamics", "content": "---\ntitle: EvoMD-LLM: Learning the Language of Species Evolution in Reactive Molecular Dynamics\nauthors: [Zhichen Tang, Zhengzheng Dang, Yulin Chen, Jixin Wu, Haiwen Li, Yanming Wang]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2605.29394v1\nresearch_type: 이론적 연구\nmethodology: 실험적 연구\ndata_type: 분자 동역학 데이터\nsample: 명시되지 않음\ncontext: 분자 동역학 시뮬레이션\ntheoretical_framework: 상징적 시간 언어 모델링\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 EvoMD-LLM(Evolutionary Molecular Dynamics Large Language Model)이라는 프레임워크를 제안하여, 분자 동역학을 상징적 시간 언어 모델링 문제로 재구성한다. 이 모델은 분자 사건의 시퀀스를 생성하고, 각 토큰은 화학 종과 그 지속 시간을 나타내며, 이를 통해 LLM이 시간에 따른 조합적 진화를 학습할 수 있도록 한다. EvoMD-LLM은 시간적 스캐폴딩을 통해 이벤트 지속 시간을 명시적 언어 토큰으로 처리하며, 이는 전통적인 시퀀스 모델링 접근법에 비해 무효 또는 환각된 분자 출력을 크게 줄인다. 여러 시간 예측 작업에서 최대 66.14%의 정확도를 달성하며, 순차 신경망 및 언어 기반 기준을 지속적으로 초과하는 성능을 보인다. 이 연구는 상징적 시간 언어 모델링이 동적 물리 시뮬레이션에서 LLM을 기반으로 하는 효과적인 프레임워크임을 입증한다.\n\n# Research Logic\n## Problem\n대규모 언어 모델(LLMs)은 정적 과학적 추론에서는 뛰어나지만, 동적 물리 과정의 시간 구조를 모델링하는 데 어려움을 겪는다.\n\n## Theory\nEvoMD-LLM은 분자 동역학을 상징적 사건 시퀀스로 재구성하여 LLM이 시간적 진화를 모델링할 수 있도록 한다.\n\n## Design\n모델은 분자 사건을 지속 시간과 함께 토큰화하여, 시간적 스캐폴딩을 통해 물리적 일관성을 유지한다.\n\n## Findings\nEvoMD-LLM은 여러 시간 예측 작업에서 최대 66.14%의 정확도를 달성하며, 기존의 신경망 및 언어 기반 모델보다 우수한 성능을 보인다.\n\n## Conclusion\n상징적 시간 언어 모델링은 LLM이 동적 물리 시뮬레이션에 효과적으로 적용될 수 있는 프레임워크임을 입증하였다.\n\n# Key Findings\n- EvoMD-LLM은 최대 66.14%의 정확도를 달성하였다.\n- 시간적 스캐폴딩이 무효 또는 환각된 분자 출력을 크게 줄였다.\n- 모델은 화학 지식을 통합하여 자신의 예측에 대한 해석을 생성할 수 있다.\n\n# Contributions\n## Theoretical\n상징적 시간 언어 모델링의 새로운 접근법을 제안하였다.\n\n## Methodological\nEvoMD-LLM의 구조적 설계와 시간적 스캐폴딩 기법을 통해 예측 정확도를 높였다.\n\n## Practical\n동적 물리 시뮬레이션에서 LLM의 적용 가능성을 확장하였다.\n\n# Limitations\n- 샘플 크기 및 데이터의 다양성이 명시되지 않았다.\n- 특정 화학 반응에 대한 일반화 가능성에 대한 추가 연구가 필요하다.\n\n# Transferable Insights\n- 상징적 시간 언어 모델링은 다른 동적 시스템에도 적용 가능할 수 있다.\n- 시간적 스캐폴딩 기법은 다양한 AI 모델에 통합될 수 있다.\n\n# Idea Seeds\n1. EvoMD-LLM의 구조를 다른 과학적 시뮬레이션에 적용하기.\n2. 시간적 스캐폴딩을 활용한 교육적 AI 도구 개발.\n3. 다양한 화학 반응에 대한 예측 정확도 향상 연구.\n\n# Citation Snippets\n> Tang, Z., Dang, Z., Chen, Y., Wu, J., Li, H., & Wang, Y. (2026). EvoMD-LLM: Learning the Language of Species Evolution in Reactive Molecular Dynamics. arXiv. https://arxiv.org/abs/2605.29394v1\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy\n\n---\n\n### 압축 요약\nEvoMD-LLM은 분자 동역학을 상징적 시간 언어 모델링 문제로 재구성하여, LLM이 시간에 따른 조합적 진화를 학습할 수 있도록 하는 프레임워크이다. 이 모델은 최대 66.14%의 정확도를 달성하며, 시간적 스캐폴딩을 통해 무효 또는 환각된 분자 출력을 줄인다. 연구 결과는 LLM이 동적 물리 시뮬레이션에 효과적으로 적용될 수 있음을 보여준다.", "link": "https://arxiv.org/abs/2605.29394v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Zhichen Tang", "Zhengzheng Dang", "Yulin Chen"], "categories": ["cs.AI"]}, {"id": "2", "source": "ARXIV", "score": 11, "day": "2026-05-27", "title": "On Compositional Learning Behaviours in Formal Mathematics", "content": "---\ntitle: On Compositional Learning Behaviours in Formal Mathematics\nauthors: Kevin Yandoka Denamganaï\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2605.28512v1\nresearch_type: 이론적 연구\nmethodology: 실험적 방법론\ndata_type: 정량적 데이터\nsample: 10개의 Lean 4 정리 증명기\ncontext: 형식 수학의 어려운 부분을 정복하기 위한 자기 진화 과학 에이전트의 요구\ntheoretical_framework: 구성적 학습 행동(Compositional Learning Behaviours, CLBs)\nkeywords: [compositional learning, formal mathematics, theorem proving, AI competency, symbolic processing]\n---\n\n# APA 7th style\n\n# Summary\n이 연구는 형식 수학의 어려운 부분을 정복하기 위해 자기 진화 과학 에이전트가 요구하는 구성적 학습 행동(Compositional Learning Behaviours, CLBs)의 필요성을 다룬다. 연구자는 S2B-LM이라는 새로운 평가 도구를 제안하여 CLB 능력을 측정하고, 10개의 Lean 4 정리 증명기를 평가하였다. 결과적으로, CLB 능력은 형식 수학 검증의 어려운 부분에 대해 필요하지만 충분하지 않다는 것을 발견하였다. 이 연구는 CLB 능력이 높은 모델이 올림피아드 수준의 성과를 달성하는 데 필수적임을 보여준다.\n\n# Research Logic\n## Problem\n형식 수학의 어려운 부분을 해결하기 위한 AI 모델의 능력 평가의 필요성.\n## Theory\n구성적 학습 행동(Compositional Learning Behaviours, CLBs)이 형식 수학 검증에 필수적이라는 이론적 주장.\n## Design\nS2B-LM을 통한 CLB 능력 평가 및 10개의 Lean 4 정리 증명기 비교.\n## Findings\nCLB 능력은 형식 수학 검증의 어려운 부분에 대해 필요하지만 충분하지 않으며, CLB 점수가 높은 모델이 올림피아드 수준의 성과를 달성함.\n## Conclusion\nCLB 능력은 형식 수학 검증에서 중요한 역할을 하지만, 단독으로는 충분하지 않음을 확인.\n\n# Key Findings\n- CLB 능력은 형식 수학 검증의 어려운 부분에 대해 필요하지만 충분하지 않다.\n- CLB 점수가 높은 모델이 올림피아드 수준의 성과를 달성하는 경향이 있다.\n- 모델의 규모는 CLB 능력의 대체가 될 수 없다.\n\n# Contributions\n## Theoretical\nCLB 능력이 형식 수학 검증에서의 성과에 미치는 영향을 이론적으로 설명.\n## Methodological\nS2B-LM을 통해 CLB 능력을 보다 정확하게 평가할 수 있는 방법론 제안.\n## Practical\n형식 수학 검증을 위한 AI 모델 개발에 있어 CLB 능력의 중요성을 강조.\n\n# Limitations\n- 연구에서 사용된 데이터는 Lean 4 정리 증명기에 국한됨.\n- CLB 능력 외의 다른 요인들이 성과에 미치는 영향을 충분히 고려하지 않음.\n\n# Transferable Insights\n- AI 모델의 성능 평가에서 CLB 능력의 중요성을 인식할 필요가 있음.\n- 형식 수학 검증에 대한 AI 접근 방식의 개선을 위한 새로운 평가 도구의 필요성.\n\n# Idea Seeds\n1. CLB 능력을 향상시키기 위한 새로운 학습 알고리즘 개발.\n2. 다양한 AI 모델에서 CLB 능력을 비교하는 연구.\n3. CLB 능력과 다른 성과 지표 간의 관계를 탐구하는 연구.\n\n# Citation Snippets\n> Denamganaï, K. Y. (2026). On Compositional Learning Behaviours in Formal Mathematics. arXiv. https://arxiv.org/abs/2605.28512v1\n\ntags: #compositional_learning, #formal_mathematics, #theorem_proving, #AI_competency, #symbolic_processing\n\n---\n\n요약: 이 연구는 형식 수학의 어려운 부분을 정복하기 위해 필요한 구성적 학습 행동(Compositional Learning Behaviours, CLBs)의 중요성을 다룬다. 연구자는 S2B-LM이라는 새로운 평가 도구를 제안하고, 10개의 Lean 4 정리 증명기를 평가하여 CLB 능력이 형식 수학 검증에서 필요하지만 충분하지 않음을 발견하였다.", "link": "https://arxiv.org/abs/2605.28512v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Kevin Yandoka Denamganaï"], "categories": ["cs.CL"]}, {"id": "3", "source": "ARXIV", "score": 10, "day": "2026-06-03", "title": "Caliper: Probing Lexical Anchors versus Causal Structure in LLMs", "content": "---\ntitle: Caliper: Probing Lexical Anchors versus Causal Structure in LLMs\nauthors: [Zhenyu Yu, Shuigeng Zhou]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2606.04915v1\nresearch_type: 실험적 연구\nmethodology: 제어된 교란 실험\ndata_type: LLMs 성능 데이터\nsample: 14개의 instruction-tuned LLMs\ncontext: 인과 추론 벤치마크 CLadder, CRASS, e-CARE\ntheoretical_framework: 구조적 인과 모델\nkeywords: [인과 추론, LLM, 교란 실험, 구조적 인과 모델, 성능 평가]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 대형 언어 모델(LLM)이 인과 추론 벤치마크에서 50%에서 70%의 정확도를 달성하는 이유가 구조적 추론인지 아니면 어휘적 패턴 매칭인지에 대한 논란을 다룬다. 연구팀은 Caliper라는 제어된 교란을 도입하여 의미 변수 이름을 자리 표시자 토큰으로 교체하면서 인과 그래프와 각 질문의 확률적 사양을 유지한다. 3.8B에서 671B까지의 아홉 개의 instruction-tuned LLM을 대상으로 한 실험 결과, 어휘적 익명화가 정확도를 7.6, 27.0, 11.1 pp 감소시키며, CRASS와 e-CARE에서는 각각 29.6 및 18.0 pp의 감소를 보였다. 구조적 스캐폴딩과 몇 샷 학습이 정확도 차이를 줄이는 데 기여했지만, 이는 주로 작은 모델의 P0 정확도를 낮추는 방식으로 나타났다.\n\n# Research Logic\n## Problem\n대형 언어 모델의 인과 추론 능력이 구조적 추론인지 어휘적 패턴 매칭인지 명확하지 않음.\n## Theory\n구조적 인과 모델(SCM)을 기반으로 한 인과 추론의 정확도를 평가.\n## Design\nCaliper라는 제어된 교란을 통해 어휘적 요소를 제거하고 인과 구조를 유지하는 실험 설계.\n## Findings\n대부분의 모델에서 어휘적 익명화가 인과 추론 정확도를 감소시킴.\n## Conclusion\n현재의 instruction-tuned LLM은 어휘적 앵커가 제거되면 구조적 인과 추론의 증거가 부족함.\n\n# Key Findings\n- 어휘적 익명화가 LLM의 인과 추론 정확도를 7.6에서 29.6 pp까지 감소시킴.\n- 구조적 스캐폴딩과 몇 샷 학습이 정확도 차이를 줄이지만, 주로 작은 모델에서 나타남.\n- 40개의 모델-벤치마크 셀 중 39개에서 긍정적인 정확도 차이를 보임.\n\n# Contributions\n## Theoretical\n구조적 인과 모델을 통한 인과 추론의 이해를 심화.\n## Methodological\nCaliper 교란을 통한 새로운 평가 방법론 제시.\n## Practical\nLLM의 인과 추론 능력에 대한 실질적인 통찰 제공.\n\n# Limitations\n- 실험에 사용된 모델의 범위가 제한적임.\n- 어휘적 익명화의 효과가 모든 유형의 질문에 동일하게 적용되지 않을 수 있음.\n\n# Transferable Insights\n- LLM의 인과 추론 능력 평가에 있어 어휘적 요소의 중요성 강조.\n- 교육 및 AI 시스템 설계에서 LLM의 한계를 이해하는 데 기여.\n\n# Idea Seeds\n1. Caliper 방법론을 다른 유형의 AI 모델에 적용하여 인과 추론 능력 평가.\n2. LLM의 어휘적 패턴 매칭과 구조적 추론 간의 관계를 심층적으로 분석.\n3. 교육적 맥락에서 LLM의 인과 추론 능력을 향상시키기 위한 스캐폴딩 전략 개발.\n\n# Citation Snippets\n> Yu, Z., & Zhou, S. (2026). Caliper: Probing Lexical Anchors versus Causal Structure in LLMs. arXiv. https://arxiv.org/abs/2606.04915v1\n\ntags: #인과추론, #LLM, #교란실험, #구조적인과모델, #성능평가, #AI교육, #AI스캐폴딩\n\n---\n\n요약: 본 연구는 대형 언어 모델의 인과 추론 능력이 구조적 추론인지 어휘적 패턴 매칭인지에 대한 논란을 다루며, Caliper라는 제어된 교란을 통해 인과 추론의 정확도를 평가하였다. 연구 결과, 어휘적 익명화가 정확도를 유의미하게 감소시키며, 구조적 스캐폴딩과 몇 샷 학습이 일부 정확도 차이를 줄이는 데 기여함을 발견하였다.", "link": "https://arxiv.org/abs/2606.04915v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Zhenyu Yu", "Shuigeng Zhou"], "categories": ["cs.CL", "cs.IR"]}, {"id": "4", "source": "ARXIV", "score": 10, "day": "2026-05-29", "title": "Effects of Varying LLM Access on Essay Writing Behavior", "content": "---\ntitle: Effects of Varying LLM Access on Essay Writing Behavior\nauthors: [Julia Christenson, Karin de Langis, Shirley Anugrah Hayati, Dongyeop Kang]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2606.00250v1\nresearch_type: 실험적 연구\nmethodology: 파일럿 연구\ndata_type: 정량적 데이터\nsample: 24명의 대학생\ncontext: 대학 교육\ntheoretical_framework: 인간-인공지능 협업 이론\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 대형 언어 모델(LLM)이 대학에서의 교육 및 학습에 미치는 영향을 조사하며, LLM 접근 수준에 따라 학생들의 작문 성과, 참여도 및 저작권 인식이 어떻게 달라지는지를 분석하였다. 24명의 대학생이 LLM 접근이 없는 그룹, 제한된 접근 그룹(최대 3개의 프롬프트, 응답 100단어 제한), 무제한 접근 그룹으로 무작위 배정되어 짧은 에세이를 작성하였다. 전반적인 에세이 품질은 그룹 간 통계적으로 유의미한 차이가 없었으나, 작문 행동과 저작권 인식에서는 뚜렷한 차이를 보였다. 제한된 접근 그룹은 더 높은 소유감을 보고하였고, 무제한 접근 그룹은 더 많은 시간을 소요하며 LLM 출력과 유사한 에세이를 작성하였다. 연구 결과는 LLM 접근을 제한하는 것이 저작권 신뢰를 유지하면서 AI 지원의 이점을 보존할 수 있음을 시사한다.\n\n# Research Logic\n## Problem\nLLM의 사용이 학생들의 작문 능력 및 저작권 인식에 미치는 영향을 이해할 필요가 있다.\n## Theory\nLLM 접근 수준이 작문 행동과 저작권 인식에 미치는 영향을 분석하는 인간-인공지능 협업 이론을 기반으로 한다.\n## Design\n24명의 대학생을 세 그룹으로 나누어 LLM 접근 수준에 따라 에세이를 작성하게 하였다.\n## Findings\n제한된 LLM 접근이 학생들의 저작권 인식을 높이고, 무제한 접근은 창의적 표현을 감소시켰다.\n## Conclusion\nLLM 접근을 제한하는 것이 학생들의 저작권 신뢰를 유지하는 데 도움이 될 수 있다.\n\n# Key Findings\n- 제한된 LLM 접근 그룹은 62.5%가 에세이를 독립 작업으로 제출할 의향이 있다고 응답하였다.\n- 무제한 접근 그룹은 더 많은 시간을 소요하고 LLM 출력과 유사한 에세이를 작성하였다.\n- 작문 품질은 그룹 간 통계적으로 유의미한 차이가 없었다.\n\n# Contributions\n## Theoretical\nLLM 접근 수준이 작문 행동과 저작권 인식에 미치는 영향을 규명하였다.\n## Methodological\n파일럿 연구를 통해 LLM 사용의 다양한 접근 방식을 실험적으로 검증하였다.\n## Practical\n교육 현장에서 LLM 사용을 어떻게 제한할 것인지에 대한 실질적인 지침을 제공하였다.\n\n# Limitations\n- 샘플 크기가 작아 일반화 가능성이 제한적이다.\n- 연구 설계가 단기적이며 장기적인 효과를 평가하지 못하였다.\n\n# Transferable Insights\n- LLM 접근을 제한하는 것이 학생들의 저작권 신뢰를 높일 수 있다.\n- 다양한 LLM 접근 방식이 학생들의 작문 행동에 미치는 영향을 이해하는 데 도움이 된다.\n\n# Idea Seeds\n1. LLM 접근 수준에 따른 장기적인 학습 효과를 연구할 필요가 있다.\n2. 다양한 학문 분야에서 LLM 사용의 차이를 조사할 수 있다.\n3. LLM 사용에 대한 학생들의 인식을 심층적으로 분석하는 연구가 필요하다.\n\n# Citation Snippets\n> Christenson, J., de Langis, K., Hayati, S. A., & Kang, D. (2026). Effects of Varying LLM Access on Essay Writing Behavior. arXiv. https://arxiv.org/abs/2606.00250v1\n\ntags: #human-ai collaboration, #ai tutoring, #instructional design, #scaffolding, #ai literacy, #education, #ai pedagogy", "link": "https://arxiv.org/abs/2606.00250v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Julia Christenson", "Karin de Langis", "Shirley Anugrah Hayati"], "categories": ["cs.CL", "cs.AI", "cs.HC"]}, {"id": "5", "source": "ARXIV", "score": 10, "day": "2026-05-29", "title": "TeachObs: A Human-Validated Benchmark for Multimodal Teaching Observation and Model Evaluation", "content": "Classroom videos contain observable teaching practices, but their pedagogical and visual signals are rarely organized in forms suitable for model evaluation. We present \\textit{TeachObs}, a human-validated benchmark for multimodal teaching observation in classroom videos. \\textit{TeachObs} includes 30 public lesson videos from eight countries divided into 5,158 fixed 15-second scenes. Seven researchers annotated each scene with 39 binary observation codes, covering 20 visual codes, such as gesture, board work, pointing, and visual materials, and 19 nonvisual codes, such as instruction, monitoring, questioning, feedback, and reflection. Gold segment labels are constructed using reliability- and prevalence-aware rules based on Krippendorff's alpha. In addition to segment-level labels, three expert raters produced lesson-level ratings and qualitative evaluations of instructional design, instructional delivery, learner response, learning materials, and lesson closure across the 30 lessons, with rater coverage detailed in the body. Using these two human reference layers, we evaluate five vision-capable frontier LLMs across three tracks - text-only segment coding, text + frame segment coding, and lesson-level coverage scored under an LLM-as-judge protocol - and find that no single model consistently outperforms others across all three tracks, that adding a mid-frame inflates both true and false attributions per scene, and that model evaluations over-rate procedurally clear lessons relative to expert raters. \\textit{TeachObs} therefore supports both fine-grained annotation benchmarking and whole-lesson evaluation, showing where AI systems can assist classroom video analysis and where expert judgment remains necessary across varied subjects, classroom formats, and annotation difficulty levels.", "link": "https://arxiv.org/abs/2605.30673v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Yeil Jeong", "Youngjin Yoo", "Seobin Sohn"], "categories": ["cs.CL"]}, {"id": "6", "source": "ARXIV", "score": 10, "day": "2026-05-28", "title": "A Multi-AI-agent Framework Enabling End-to-end Finite Element Analysis for Solid Mechanics Problems", "content": "Finite element analysis (FEA) is the most important numerical approach for solid mechanics. Challenges of FEA include a steep learning curve for entry-level users and potential false simulations due to incorrect definitions of key simulation components, such as boundary conditions, load cases, and solution variables. Years of engineering experience are usually necessary for real-world problem-solving. To address these issues, we present AbaqusAgent, a multi-agent framework grounded in large language models (LLMs) for solid mechanics analyses. AbaqusAgent is developed to facilitate analysis case generation and execution using Abaqus, one of the most widely used FEA packages, by turning users' natural-language instructions into executed FEA analyses and result visualization. AbaqusAgent is composed of six agents, including interpreter, architect, input writer, runner, reviewer, and visualizer agents, encompassing all the essential pre-processing and post-processing steps of standard FEA analyses. A wide variety of 50 solid mechanics problems have been successfully validated, achieving an overall success rate of 86%. Beyond improving the efficiency of FEA for solid mechanics problems and lowering the barrier to computational mechanics education, AbaqusAgent advances the human-simulation interaction paradigm and enables integration with AI-empowered optimization and material characterization workflows. The code is available at https://github.com/LIRAM-LIN/AbaqusAgent", "link": "https://arxiv.org/abs/2606.00138v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Titu Ranjan Sarker", "Muhammed Jawaad Zulqernine", "Ling Yue"], "categories": ["cs.AI"]}, {"id": "7", "source": "ARXIV", "score": 8, "day": "2026-06-02", "title": "\"**Important** You should give me full credits!\": Exploring Prompt Injection Attacks on LLM-Based Automatic Grading Systems", "content": "The emergence of large language models (LLMs) has significantly accelerated recent research on LLM-based automatic grading (AG) systems. Benefiting from the strong instruction-following capabilities and broad prior knowledge of LLMs, educators can deploy AG systems across diverse tasks using only natural language rubrics while achieving satisfactory grading performance. Despite these advantages, new security concerns may also arise. In particular, prompt injection (PI) attacks have recently become a major threat to LLM-based applications. In the context of AG, attackers can potentially exploit PI vulnerabilities to manipulate grading systems into assigning artificially high scores regardless of the actual answer quality. Such behavior poses serious risks to the fairness, reliability, and integrity of educational assessment. In this work, we study PI attacks in AG systems, and systematically investigate the effectiveness of such attacks in educational scenarios. We further evaluate the effectiveness of existing defensive strategies against these attacks. Through comprehensive experiments under rubric-based grading settings, we demonstrate that current LLM-based AG systems remain highly vulnerable to PI attacks. We hope that our findings raise awareness of this emerging threat and motivate future research toward secure, robust, and trustworthy LLM-based educational systems.", "link": "https://arxiv.org/abs/2606.03090v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Hang Li", "Fedor Filippov", "Yuling Lin"], "categories": ["cs.CR", "cs.AI"]}, {"id": "8", "source": "ARXIV", "score": 8, "day": "2026-06-02", "title": "A Locally Deployed RAG-Based Academic Advising System for Course Selection", "content": "The correct sequence of courses in the curriculum based on prerequisites between courses is of great importance for students to develop their knowledge and skills holistically. However, students crafting this sequence in isolation frequently struggle with recognition limitations and information overload that leads to confusion. Simultaneously, education institutions encounter difficulties in providing adequate academic advice for the correct sequence due to limited education resources. To address these challenges, we propose a locally deployed RAG-based academic advising system grounded in syllabus information. By combining large language models with retrieval from structured syllabus data, the system is designed to support course selection, prerequisite understanding, and personalized study planning in a privacy-preserving manner.", "link": "https://arxiv.org/abs/2606.02983v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Feng Li", "Yoritaka Iwata"], "categories": ["cs.CL"]}, {"id": "9", "source": "ARXIV", "score": 8, "day": "2026-06-01", "title": "An NLP-Driven Framework for Curriculum-Labor Market Alignment: Schema-Constrained LLM Extraction, ESCO-Anchored Semantic Matching, and Multi-Dimensional Gap Quantification", "content": "Schema-constrained information extraction from diverse educational and labor-market corpora remains an open challenge in natural language processing because existing pipelines rely primarily on lexical-surface methods that cannot recover implicit competencies, lack grounding in shared taxonomies, and provide no formal measures of extraction reliability or document-level completeness. To address these limitations, this paper proposes a four-stage NLP framework that combines (i) schema-constrained prompting of a two-model frontier-LLM ensemble against a JSON Schema-enforced seven-slot competency formalism, (ii) Sentence-BERT (SBERT) alignment of the extracted records against an eleven-domain ESCO v1.2.1 controlled vocabulary, (iii) a two-tier adjudication protocol that resolves inter-model disagreements, and (iv) a verification mechanism that combines per-slot Cohen's kappa, schema conformance, and document-level completeness audits. The framework is instantiated for a critical application in higher-education quality assurance, namely curriculum-labor market alignment for the ABET-accredited BSc Computer Science program at the United Arab Emirates University. The pipeline extracts 400 competency records from the 85-course 2025-2026 study plan and aligns them, under a five-scope analysis ranging from the computing core to a probability-weighted student trajectory, with 30 job postings (483 requirement clauses) at an SBERT cosine threshold of 0.50. The extractor achieves Cohen's kappa of 0.79 on the skill slot, with 100% schema conformance and 100% document-level completeness. The alignment surfaces interpretable supply-demand gaps of 25.0% in general and transversal skills, 13.8% in algorithms and computational theory, and 12.2% in software engineering and project management, with a near-zero 1.8% gap in artificial intelligence and data science despite 38.6% supply coverage.", "link": "https://arxiv.org/abs/2606.01982v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Sherzod Turaev", "Mary John", "Mamoun Awad"], "categories": ["cs.AI"]}];

function setSort(btn) {
  currentSort = btn.dataset.sort;
  document.querySelectorAll('#sortGroup .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  render();
}

function toggleFavorite(id, e) {
  e.stopPropagation();
  const idx = favorites.indexOf(id);
  if (idx === -1) {
    favorites.push(id);
  } else {
    favorites.splice(idx, 1);
  }
  localStorage.setItem('favorites', JSON.stringify(favorites));
  applyFilters();
}

function recordVisit(id) {
  if (!visited.includes(id)) {
    visited.push(id);
  }
  localStorage.setItem('visited', JSON.stringify(visited));
}

function recordSearch(query) {
  if (query.trim() && !searchHistory.includes(query)) {
    searchHistory.unshift(query);
    if (searchHistory.length > 10) searchHistory.pop();
    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
  }
}

function downloadJSON() {
  const data = JSON.stringify(filtered, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadCSV() {
  const headers = ['제목', '출처', '스코어', '리뷰여부', '링크'];
  const rows = filtered.map(p => [
    '"' + p.title.replace(/"/g, '""') + '"',
    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
