<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-03-17 23:32</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "OPENALEX", "score": 16, "day": "2026-02-12", "title": "Future-Proofing Foundational Reading Instruction: Unveiling Teachers’ Experiences and Perspectives on AI Integration", "content": "---\ntitle: Future-Proofing Foundational Reading Instruction: Unveiling Teachers’ Experiences and Perspectives on AI Integration\nauthors: [Catherine Esguerra, Danilo Estipona Despi]\nyear: 2026\njournal: International Journal for Multidisciplinary Research (IJFMR)\ndoi: https://openalex.org/W7128909196\nresearch_type: 질적 연구\nmethodology: 근거 이론 설계\ndata_type: 주제 분석\nsample: 9명의 공립 초등학교 독서 코디네이터 및 1단계 교사\ncontext: 필리핀 소르소곤 시\ntheoretical_framework: C.A.R.E. 전문성 개발 프레임워크\nkeywords: [인공지능, 기초 독서, 문해 교육, 교사 경험, 전문성 개발, C.A.R.E. 프레임워크]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 인공지능(AI)이 교육에 통합됨에 따라 교사들이 기초 독서 교육을 어떻게 지원하고 있는지를 탐구하였다. 필리핀 소르소곤 시의 공립 초등학교에서 선정된 9명의 교사들이 참여한 구조화된 포커스 그룹 토론을 통해 데이터가 수집되었으며, 주제 분석을 통해 신뢰성과 타당성을 확보하였다. 연구 결과, 교사들은 AI의 교육적 가치를 인식하게 되었으며, 개인화, 학습자 참여, 차별화된 교육 및 평가 효율성을 향상시킬 수 있는 잠재력을 인정하였다. 그러나 AI가 교사의 전문성을 대체하는 것이 아니라 보완하는 역할을 해야 한다는 점과 함께, 인프라 부족, 정책 방향의 불명확성, 데이터 프라이버시 및 윤리에 대한 우려가 제기되었다. 연구는 AI가 기초 독서 교육을 강화할 수 있는 가능성을 제시하며, 책임 있는 통합을 위한 C.A.R.E. 프레임워크를 제안하였다.\n\n# Research Logic\n## Problem\nAI 통합에 대한 교사들의 경험과 인식 부족.\n## Theory\nAI는 교육의 개인화 및 효율성을 높일 수 있는 도구로 인식됨.\n## Design\n근거 이론 설계를 통한 질적 연구.\n## Findings\n교사들은 AI의 교육적 가치를 인식하였으나, 인프라 및 지원 부족 문제를 경험함.\n## Conclusion\nAI는 기초 독서 교육을 강화할 수 있으며, 책임 있는 통합을 위한 체계적 접근이 필요함.\n\n# Key Findings\n- 교사들은 AI의 교육적 가치를 인식하고 개인화 및 참여를 증진할 수 있는 잠재력을 인정함.\n- AI 통합에 대한 초기 두려움에서 정보에 기반한 긍정적인 인식으로 변화함.\n- 인프라 부족과 정책 방향의 불명확성이 AI 통합의 장애물로 작용함.\n\n# Contributions\n## Theoretical\nAI의 교육적 가치에 대한 새로운 통찰 제공.\n## Methodological\n근거 이론 설계를 통한 질적 데이터 수집 및 분석 방법론 제시.\n## Practical\n교사들이 AI를 효과적으로 활용할 수 있도록 지원하는 프레임워크 제안.\n\n# Limitations\n- 연구 샘플이 제한적이며, 특정 지역에 국한됨.\n- AI 통합에 대한 교사들의 경험이 다양하지 않을 수 있음.\n\n# Transferable Insights\n- AI 통합을 위한 체계적 접근이 필요함.\n- 교사 교육 및 지원 시스템의 강화가 중요함.\n\n# Idea Seeds\n1. AI 기반 교육 도구의 개발 및 평가.\n2. 교사 전문성 개발을 위한 지속적인 교육 프로그램 설계.\n3. AI 통합을 위한 정책 방향 설정 및 지원 체계 구축.\n\n# Citation Snippets\n> Esguerra, C. L., & Despi, D. E. (2026). Future-Proofing Foundational Reading Instruction: Unveiling Teachers’ Experiences and Perspectives on AI Integration. International Journal for Multidisciplinary Research (IJFMR).\n\ntags: #인공지능, #기초독서, #문해교육, #교사경험, #전문성개발, #C.A.R.E프레임워크, #교육기술\n\n---\n\n요약: 본 연구는 필리핀 소르소곤 시의 교사들이 인공지능(AI)을 기초 독서 교육에 통합하는 경험과 인식을 탐구하였다. 연구 결과, 교사들은 AI의 교육적 가치를 인식하게 되었으나, 인프라 부족과 정책 방향의 불명확성 등 여러 도전에 직면하고 있음을 보여준다. AI는 교육의 개인화와 효율성을 높일 수 있는 잠재력을 가지고 있으며, 책임 있는 통합을 위한 체계적 접근이 필요하다.", "link": "https://doi.org/10.36948/ijfmr.2026.v08i01.68680", "altLink": "https://openalex.org/W7128909196", "hasDoi": true, "hasReview": true, "authors": ["Catherine Esguerra", "Danilo Estipona Despi"], "categories": ["Reading (process)", "Pedagogy", "Credibility", "Literacy", "Situated"]}, {"id": "1", "source": "OPENALEX", "score": 16, "day": "2026-02-06", "title": "Evaluating Augmented Reality Activities Designed Within the 5E Model in Biology Education", "content": "---\ntitle: Augmented Reality Activities Designed Within the 5E Model in Biology Education의 평가\nauthors: Christina Volioti, Christos Orovas, Sophia Rapti, Paschalina Gkiosi, Theodosios Sapounidis, Euclid Keramopoulos\nyear: 2026\njournal: 명시되지 않음\ndoi: https://openalex.org/W7128037394\nresearch_type: Usability 연구\nmethodology: 명시되지 않음\ndata_type: 명시되지 않음\nsample: 195명 (교육 학생, 공학 학생, 고등학교 1학년 학생)\ncontext: 고등학교 생물 교육\ntheoretical_framework: 5E 모델 (Engagement, Exploration, Explanation, Elaboration, Evaluation)\nkeywords: [augmented reality, 5E 모델, 생물 교육, 사용자 경험, 교육 기술]\n---\n\n# APA 7th style\n\n# Summary\n이 연구는 5E 모델에 기반하여 개발된 증강 현실(AR) 애플리케이션의 사용성을 평가한다. 195명의 사용자를 대상으로 한 연구는 교육 학생, 공학 학생, 고등학교 1학년 학생 등 다양한 배경을 가진 참가자들로 구성되었다. 연구 결과, 사용자들은 전반적으로 수용 가능한 사용성을 느꼈으나, 젊고 경험이 적은 사용자들은 더 많은 안내가 필요하다고 응답하였다. 이 연구는 학습 결과나 교수법의 효과성을 평가하기보다는 AR 애플리케이션의 사용성 인식과 상호작용을 조사하는 데 중점을 두었다. 결과는 AR 애플리케이션 설계와 관련된 사용성 문제를 강조하며, 사용자 중심 설계와 교육적 프레임워크의 결합의 중요성을 부각시킨다.\n\n# Research Logic\n## Problem\nAR 애플리케이션의 사용성이 교육적 맥락에서 어떻게 인식되는가?\n## Theory\n5E 모델을 기반으로 한 AR 애플리케이션의 설계와 사용성 평가.\n## Design\n195명의 다양한 배경을 가진 참가자들을 대상으로 한 사용성 연구.\n## Findings\n사용자들은 전반적으로 수용 가능한 사용성을 느꼈으나, 젊고 경험이 적은 사용자들은 더 많은 안내를 요구하였다.\n## Conclusion\nAR 애플리케이션의 설계는 사용자 중심 접근법과 교육적 프레임워크의 결합이 필요하다.\n\n# Key Findings\n- AR 애플리케이션은 5E 모델에 따라 구조화된 활동을 포함하고 있다.\n- 사용자들은 전반적으로 수용 가능한 사용성을 보고하였다.\n- 젊고 경험이 적은 사용자들은 추가적인 안내가 필요하다고 느꼈다.\n\n# Contributions\n## Theoretical\n5E 모델을 기반으로 한 AR 애플리케이션의 사용성 평가에 대한 기여.\n## Methodological\n다양한 배경을 가진 사용자들을 대상으로 한 사용성 연구 설계.\n## Practical\n교육적 맥락에서 AR 애플리케이션 설계 시 사용자 중심 접근법의 중요성 강조.\n\n# Limitations\n- 연구의 구체적인 방법론이 명시되지 않음.\n- 학습 결과나 교수법의 효과성에 대한 평가가 포함되지 않음.\n\n# Transferable Insights\n- AR 애플리케이션 설계 시 사용자 경험을 고려해야 함.\n- 교육적 프레임워크와 기술적 설계를 통합하는 것이 중요함.\n\n# Idea Seeds\n1. 5E 모델을 기반으로 한 다른 과목에 대한 AR 애플리케이션 개발.\n2. 사용자 경험을 개선하기 위한 추가적인 안내 자료 개발.\n3. AR 애플리케이션의 학습 효과성을 평가하기 위한 후속 연구.\n\n# Citation Snippets\n> Volioti, C., Orovas, C., Rapti, S., Gkiosi, P., Sapounidis, T., & Keramopoulos, E. (2026). Evaluating Augmented Reality Activities Designed Within the 5E Model in Biology Education.\n\ntags: #증강현실, #5E모델, #생물교육, #사용자경험, #교육기술, #사용성연구, #교육프레임워크\n\n---\n\n압축 요약: 이 연구는 5E 모델에 기반하여 개발된 증강 현실 애플리케이션의 사용성을 평가하였다. 195명의 다양한 배경을 가진 참가자들을 대상으로 한 결과, 사용자들은 전반적으로 수용 가능한 사용성을 느꼈으나, 젊고 경험이 적은 사용자들은 더 많은 안내가 필요하다고 응답하였다. 연구는 AR 애플리케이션 설계 시 사용자 중심 접근법과 교육적 프레임워크의 결합의 중요성을 강조한다.", "link": "https://doi.org/10.3390/info17020164", "altLink": "https://openalex.org/W7128037394", "hasDoi": true, "hasReview": true, "authors": ["Christina Volioti", "Christos Orovas", "Sophia Rapti"], "categories": ["Usability", "Usability engineering", "Augmented reality", "Computer science", "Perception"]}, {"id": "2", "source": "OPENALEX", "score": 16, "day": "2026-02-06", "title": "PROGRAMLAMA EĞİTİMİNDE ÜRETKEN YAPAY ZEKÂNIN ENTEGRASYONU: ÖĞRENCİ ETKİLEŞİMLERİ VE ÖĞRENME ÇIKTILARINA YÖNELİK KEŞFEDİCİ BİR ÇALIŞMA", "content": "---\ntitle: 프로그램 교육에서 생성적 인공지능의 통합: 학생 상호작용 및 학습 결과에 대한 탐색적 연구\nauthors: Hacer Güner\nyear: 2026\njournal: 명시되지 않음\ndoi: 명시되지 않음\nresearch_type: 탐색적 연구\nmethodology: 혼합 방법 연구\ndata_type: 양적 및 질적 데이터\nsample: 158명의 학부생\ncontext: 입문 프로그래밍 과정\ntheoretical_framework: 명시되지 않음\nkeywords: [인공지능, 프로그래밍 교육, 학생-인공지능 상호작용, 학습 경험]\n---\n\n# APA 7th style\n\n# Summary\n이 연구는 학생들이 입문 프로그래밍 과정에서 ChatGPT와 어떻게 상호작용하는지, 그리고 교육적 접근 방식이 이들의 상호작용 패턴, 학습 결과 및 인식에 어떤 영향을 미치는지를 조사한다. 혼합 방법 연구 설계를 사용하여 세 가지 통합 전략(자유 사용, 효과적인 프롬프트에 대한 명시적 교육, 구조화된 스캐폴딩)을 학기 중 세 번의 수업 실습 세션에서 구현하였다. 양적 데이터는 사전 지식 테스트와 세션 후 퀴즈를 통해 수집되었으며, 질적 데이터는 ChatGPT 상호작용 로그와 학생 반성을 포함한다. 총 158명의 학부생이 참여하였고, 2,388개의 ChatGPT 프롬프트가 주제별로 분석되었다. 프롬프트 행동에 따라 \"AI 의존 코드 생성기\", \"AI 의존 코드 생성기 및 개선자\", \"AI 지원 코드 개선자\", \"AI 협력적 코더\", \"AI 독립 코더\"와 같은 다양한 상호작용 프로필이 식별되었다. 통계 분석 결과, 교육 조건에 따라 프로필 분포에서 유의미한 차이가 나타났으며, 이는 교육 설계가 학생들이 AI 도구와 상호작용하는 방식에 강한 영향을 미친다는 것을 보여준다. 사후 테스트 결과는 명시적 교육 후 성과가 유의미하게 향상되었음을 나타내며, 프롬프트 작성 교육과 AI 문해력의 가치를 강조한다. 질적 결과는 접근성과 편의성에서 학습 지원, 과제 진행 및 개인화된 도움의 가치로의 전환을 보여준다. 그러나 오해, 제한된 피드백 및 과도한 의존과 같은 도전 과제가 여전히 존재한다. 전반적으로, 결과는 AI 강화 프로그래밍 교육에서 교육적 중재의 중요성을 강조한다.\n\n# Research Logic\n## Problem\n학생들이 AI 도구와 상호작용하는 방식과 그에 따른 학습 결과의 차이를 이해하는 것이 필요하다.\n## Theory\n명시적 교육과 스캐폴딩이 학생들의 AI 도구 사용에 미치는 영향을 탐구한다.\n## Design\n혼합 방법 연구 설계를 통해 양적 및 질적 데이터를 수집하였다.\n## Findings\n학생들의 프로그래밍 사전 지식 수준에 따라 AI 도구에 대한 의존도가 달라지며, 명시적 교육이 성과 향상에 기여함을 발견하였다.\n## Conclusion\nAI 도구 사용에 있어 교육적 중재가 필수적이며, 학생들의 인식 변화가 중요하다.\n\n# Key Findings\n- 학생들은 AI 도구에 대한 의존도가 사전 지식 수준에 따라 다르다.\n- 명시적 교육이 학생들의 성과를 유의미하게 향상시킨다.\n- 질적 데이터는 학생들의 인식 변화가 학습 지원의 가치로 이동했음을 보여준다.\n\n# Contributions\n## Theoretical\nAI 도구 사용에 대한 교육적 접근 방식의 이론적 기초를 제공한다.\n## Methodological\n혼합 방법 연구 설계를 통해 다양한 데이터 수집 방법을 활용하였다.\n## Practical\n프롬프트 작성 교육과 AI 문해력의 중요성을 강조하여 교육 실천에 기여한다.\n\n# Limitations\n- 연구는 특정 교육 환경에 국한되어 일반화에 한계가 있다.\n- 질적 데이터 수집의 주관성이 결과에 영향을 미칠 수 있다.\n\n# Transferable Insights\n- 교육적 중재가 AI 도구 사용에 미치는 영향을 다른 교육 분야에 적용할 수 있다.\n- 학생들의 인식 변화가 학습 결과에 미치는 영향을 탐구할 수 있다.\n\n# Idea Seeds\n1. AI 도구 사용에 대한 다양한 교육적 접근 방식을 비교하는 연구.\n2. AI 문해력 향상을 위한 교육 프로그램 개발.\n3. 학생들의 AI 도구 사용 패턴을 분석하는 장기 연구.\n\n# Citation Snippets\n> Güner, H. (2026). 프로그램 교육에서 생성적 인공지능의 통합: 학생 상호작용 및 학습 결과에 대한 탐색적 연구.\n\ntags: #인공지능, #프로그래밍교육, #학생AI상호작용, #학습경험, #AI문해력, #교육적중재, #혼합방법연구\n\n---\n\n요약: 이 연구는 학생들이 ChatGPT와 상호작용하는 방식을 조사하고, 교육적 접근 방식이 이들의 학습 결과에 미치는 영향을 분석하였다. 명시적 교육이 학생들의 성과 향상에 기여하며, AI 도구 사용에 있어 교육적 중재의 중요성을 강조한다.", "link": "https://openalex.org/W7128287385", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["hacer güner"], "categories": ["Code (set theory)", "Qualitative property", "Computer science", "Task (project management)", "Psychology"]}, {"id": "3", "source": "OPENALEX", "score": 16, "day": "2026-01-01", "title": "Navigating the Future of Education: A Review on Telecommunications and AI Technologies, Ethical Implications, and Equity Challenges", "content": "---\ntitle: 교육의 미래 탐색: 통신 및 AI 기술, 윤리적 함의 및 형평성 도전 과제에 대한 리뷰\nauthors: Christos Koukaras, Stavros G. Stavrinides, Euripides Hatzikraniotis, Maria Mitsiaki, Paraskevas Koukaras, Christos Tjortjis\nyear: 2026\njournal: 명시되지 않음\ndoi: 명시되지 않음\nresearch_type: 문헌 리뷰\nmethodology: 문헌 종합\ndata_type: 명시되지 않음\nsample: 명시되지 않음\ncontext: 인공지능(AI)과 통신 기술의 융합\ntheoretical_framework: AI-Enabled Telecommunication-Based Education (AITE)\nkeywords: [AI 교육, 통신 기술, 윤리적 함의, 형평성, 적응형 학습 시스템, 지능형 튜터링 시스템, AI 기반 평가, 교육 생태계]\n---\n\n# APA 7th style\n\n# Summary\n본 리뷰는 인공지능(AI)과 통신 기술의 융합이 교육 생태계를 어떻게 향상시키는지를 조사한다. 2022년부터 2025년까지의 최근 문헌을 종합하여, AI 기반 교육(AITE)의 새로운 패러다임을 제시하며, 저지연 및 고대역폭 연결이 실시간 개인화, 지속적인 피드백, 확장 가능한 학습 모델을 가능하게 한다고 주장한다. 그러나 윤리적 거버넌스, 데이터 프라이버시, 알고리즘 공정성, 디지털 인프라 접근의 불균형과 같은 지속적인 도전 과제가 존재한다. 마지막으로, 윤리적 AI 배치, 회복력 있는 아키텍처, 포괄적인 정책 설계에 대한 향후 연구 방향을 제시한다.\n\n# Research Logic\n## Problem\nAI와 통신 기술의 통합이 교육에 미치는 영향과 그에 따른 윤리적 및 형평성 문제.\n## Theory\nAI-Enabled Telecommunication-Based Education (AITE) 이론을 기반으로 한 교육 생태계의 변화.\n## Design\n문헌 리뷰를 통해 AI와 통신 기술의 융합을 분석.\n## Findings\n1. 저지연, 고대역폭 연결이 개인화된 학습을 가능하게 함.\n2. 지속적인 피드백과 확장 가능한 학습 모델의 필요성.\n3. 윤리적 거버넌스와 데이터 프라이버시 문제의 심각성.\n## Conclusion\nAI와 통신 기술의 융합은 교육의 변화를 이끌지만, 형평성을 보장하기 위한 정책적 노력이 필요함.\n\n# Key Findings\n- AI와 통신 기술의 융합이 교육 생태계를 향상시킴.\n- 저지연 및 고대역폭 연결이 실시간 개인화 학습을 가능하게 함.\n- 윤리적 거버넌스와 데이터 프라이버시 문제의 해결이 필요함.\n\n# Contributions\n## Theoretical\nAI-Enabled Telecommunication-Based Education (AITE) 이론의 발전.\n## Methodological\n문헌 종합을 통한 새로운 연구 방향 제시.\n## Practical\n교육 정책 설계에 대한 실질적인 제안.\n\n# Limitations\n- 특정 데이터 유형 및 샘플에 대한 정보 부족.\n- 연구 기간이 제한적임.\n\n# Transferable Insights\n- AI와 통신 기술의 융합이 교육 혁신에 기여할 수 있음.\n- 윤리적 문제 해결을 위한 정책적 접근이 필요함.\n\n# Idea Seeds\n1. AI 기반 교육의 윤리적 거버넌스 모델 개발.\n2. 디지털 인프라 접근성을 높이기 위한 정책 제안.\n3. AI와 통신 기술의 융합을 통한 새로운 교육 모델 연구.\n\n# Citation Snippets\n> Koukaras, C., Stavrinides, S. G., Hatzikraniotis, E., Mitsiaki, M., Koukaras, P., & Tjortjis, C. (2026). Navigating the Future of Education: A Review on Telecommunications and AI Technologies, Ethical Implications, and Equity Challenges.\n\ntags: #AI교육, #통신기술, #윤리적함의, #형평성, #적응형학습, #지능형튜터링, #AI기반평가\n\n---\n\n요약: 본 논문은 AI와 통신 기술의 융합이 교육 생태계에 미치는 영향을 분석하며, 저지연 및 고대역폭 연결을 통한 개인화된 학습의 가능성을 제시한다. 그러나 윤리적 거버넌스와 데이터 프라이버시 문제는 여전히 해결해야 할 과제로 남아 있다.", "link": "https://doi.org/10.3390/telecom7010002", "altLink": "https://openalex.org/W7117995729", "hasDoi": true, "hasReview": true, "authors": ["Christos Koukaras", "Stavros G. Stavrinides", "Euripides Hatzikraniotis"], "categories": ["Software deployment", "Computer science", "Knowledge management", "Equity (law)", "Scalability"]}, {"id": "4", "source": "OPENALEX", "score": 16, "day": "2025-12-05", "title": "A scoping review of contemporary frameworks, challenges, and future directions on educational technology for digital generations", "content": "---\ntitle: A scoping review of contemporary frameworks, challenges, and future directions on educational technology for digital generations\nauthors: [Оксана Константиновна Коробкова, Natalya A. Galchenko, Natalia A. Orekhovskaya, Ekaterina Aleksandровна Drozdova, O.V. Zakharova, Alisa V. Lobuteva]\nyear: 2025\njournal: Contemporary Educational Technology\ndoi: https://doi.org/10.30935/cedtech/17517\nresearch_type: Scoping Review\nmethodology: 체계적 문헌 검토\ndata_type: 문헌\nsample: 46개의 출판물\ncontext: 디지털 세대를 위한 교육 기술\ntheoretical_framework: 기술 수용 모델(TAM, UTAUT)\nkeywords: [educational technology, digital generation, Gen Z, Gen alpha, scoping review]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 디지털 세대를 위한 교육 기술의 기존 프레임워크, 도전 과제 및 미래 방향을 체계적으로 검토하는 것을 목표로 한다. Arksey와 O'Malley(2005)가 제안한 방법론을 활용하여 2016년부터 2025년까지 WoS 및 Scopus 데이터베이스에 발표된 영어 연구를 체계적으로 검색하였으며, 46개의 출판물이 분석에 포함되었다. 결과적으로, 기술 수용 모델(TAM 및 UTAUT)이 교육 기술 분야에서 가장 일반적으로 사용되며, 디지털 학습 인프라와 모바일-사회적 학습 생태계가 주요 기술 범주로 인식되었다. 연구는 디지털 격차가 심화되었고, 교사의 준비 부족이 기술 통합의 주요 장애물임을 밝혀냈으며, 적응형 학습 방법이 중간에서 상당한 효과 크기를 보임을 강조하였다. 결과는 디지털 세대의 기술 상호작용 패턴을 포괄하는 새로운 이론적 프레임워크의 필요성을 강조한다.\n\n# Research Logic\n## Problem\n디지털 세대를 위한 교육 기술의 기존 프레임워크가 현재의 요구를 충족하지 못하고 있음.\n## Theory\n기술 수용 모델(TAM, UTAUT)이 디지털 세대의 실제를 반영하지 못함.\n## Design\n체계적 문헌 검토를 통해 2016-2025년 기간의 연구를 분석함.\n## Findings\n디지털 격차가 심화되었고, 교사의 준비 부족이 기술 통합의 주요 장애물로 나타남.\n## Conclusion\n새로운 이론적 프레임워크와 포괄적인 디지털 형평성 이니셔티브의 필요성이 강조됨.\n\n# Key Findings\n- 기술 수용 모델(TAM, UTAUT)이 교육 기술 분야에서 가장 일반적으로 사용됨.\n- 28%의 학생이 인터넷 접근이 부족하여 디지털 격차가 심화됨.\n- 적응형 학습 방법이 중간에서 상당한 효과 크기를 보임.\n\n# Contributions\n## Theoretical\n디지털 세대의 기술 상호작용 패턴을 반영하는 새로운 이론적 프레임워크 제안.\n## Methodological\n체계적 문헌 검토 방법론의 적용을 통해 교육 기술 연구의 방향성을 제시.\n## Practical\n교육자와 정책 입안자에게 실질적인 기술 통합 전략을 제공.\n\n# Limitations\n- 연구 기간이 2016-2025년으로 제한되어 있음.\n- 특정 기술 모델에 대한 의존성이 있음.\n\n# Transferable Insights\n- 디지털 세대의 요구를 반영한 교육 기술 개발 필요.\n- 교사의 디지털 역량 강화를 위한 지속적인 투자 필요.\n\n# Idea Seeds\n1. 디지털 세대를 위한 맞춤형 교육 기술 개발.\n2. 교사 교육 프로그램의 디지털 역량 강화.\n3. 디지털 형평성을 위한 정책 제안.\n\n# Citation Snippets\n> Korobkova, O. K., Galchenko, N. A., Orekhovskaya, N. A., Drozdova, E. A., Zakharova, O. V., & Lobuteva, A. V. (2025). A scoping review of contemporary frameworks, challenges, and future directions on educational technology for digital generations. Contemporary Educational Technology, 17(4), ep611. https://doi.org/10.30935/cedtech/17517\n\ntags: #educational_technology, #digital_generation, #Gen_Z, #Gen_alpha, #scoping_review, #technology_acceptance_model, #digital_equity", "link": "https://doi.org/10.30935/cedtech/17517", "altLink": "https://openalex.org/W4417050364", "hasDoi": true, "hasReview": true, "authors": ["Оксана Константиновна Коробкова", "Natalya A. Galchenko", "Natalia A. Orekhovskaya"], "categories": ["Obstacle", "Educational technology", "Field (mathematics)", "The Internet", "Scopus"]}, {"id": "5", "source": "OPENALEX", "score": 16, "day": "2025-11-28", "title": "Exploring Artificial Intelligence in Inclusive Education: A Systematic Review of Empirical Studies", "content": "This systematic review synthesizes empirical evidence on the role of Artificial Intelligence (AI) in inclusive education. The review aimed to examine (1) the impact of AI technologies on learning outcomes and engagement among students with special needs, (2) barriers and enablers influencing AI adoption by educators, and (3) the role of theoretical frameworks in guiding AI-based interventions. A comprehensive search was conducted in Scopus, Web of Science, DOAJ, and Google Scholar for English-language, peer-reviewed studies published between 2020 and 2025. Sixteen (16) studies met the inclusion criteria and were appraised using the Mixed Methods Appraisal Tool (MMAT). Findings indicate that AI tools enhance personalization, accessibility, and engagement, particularly for learners with disabilities, while barriers such as infrastructure gaps and low digital literacy persist. Enablers include institutional support and teacher training, though theoretical frameworks were inconsistently applied. Limitations include the exclusion of grey literature and reliance on short-term studies. AI can advance inclusive education when integrated with ethical, pedagogical, and institutional strategies, while future research should prioritize longitudinal, theory-driven, and culturally responsive models.", "link": "https://doi.org/10.3390/app152312624", "altLink": "https://openalex.org/W4416850926", "hasDoi": true, "hasReview": false, "authors": ["Jiahui Li", "Yuyang Yan", "Xiaojun Zeng"], "categories": ["Empirical research", "Inclusion (mineral)", "Knowledge management", "Grey literature", "Psychology"]}, {"id": "6", "source": "ARXIV", "score": 15, "day": "2026-03-11", "title": "HEAL: Hindsight Entropy-Assisted Learning for Reasoning Distillation", "content": "Distilling reasoning capabilities from Large Reasoning Models (LRMs) into smaller models is typically constrained by the limitation of rejection sampling. Standard methods treat the teacher as a static filter, discarding complex \"corner-case\" problems where the teacher fails to explore valid solutions independently, thereby creating an artificial \"Teacher Ceiling\" for the student. In this work, we propose Hindsight Entropy-Assisted Learning (HEAL), an RL-free framework designed to bridge this reasoning gap. Drawing on the educational theory of the Zone of Proximal Development(ZPD), HEAL synergizes three core modules: (1) Guided Entropy-Assisted Repair (GEAR), an active intervention mechanism that detects critical reasoning breakpoints via entropy dynamics and injects targeted hindsight hints to repair broken trajectories; (2) Perplexity-Uncertainty Ratio Estimator (PURE), a rigorous filtering protocol that decouples genuine cognitive breakthroughs from spurious shortcuts; and (3) Progressive Answer-guided Curriculum Evolution (PACE), a three-stage distillation strategy that organizes training from foundational alignment to frontier breakthrough. Extensive experiments on multiple benchmarks demonstrate that HEAL significantly outperforms traditional SFT distillation and other baselines.", "link": "https://arxiv.org/abs/2603.10359v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Wenjing Zhang", "Jiangze Yan", "Jieyun Huang"], "categories": ["cs.AI", "cs.LG"]}, {"id": "7", "source": "ARXIV", "score": 15, "day": "2026-03-08", "title": "Optimizing LLM Annotation of Classroom Discourse through Multi-Agent Orchestration", "content": "Large language models (LLMs) are increasingly positioned as scalable tools for annotating educational data, including classroom discourse, interaction logs, and qualitative learning artifacts. Their ability to rapidly summarize instructional interactions and assign rubric-aligned labels has fueled optimism about reducing the cost and time associated with expert human annotation. However, growing evidence suggests that single-pass LLM outputs remain unreliable for high-stakes educational constructs that require contextual, pedagogical, or normative judgment, such as instructional intent or discourse moves. This tension between scale and validity sits at the core of contemporary education data science. In this work, we present and empirically evaluate a hierarchical, cost-aware orchestration framework for LLM-based annotation that improves reliability while explicitly modeling computational tradeoffs. Rather than treating annotation as a one-shot prediction problem, we conceptualize it as a multi-stage epistemic process comprising (1) an unverified single-pass annotation stage, in which models independently assign labels based on the rubric; (2) a self-verification stage, in which each model audits its own output against rubric definitions and revises its label if inconsistencies are detected; and (3) a disagreement-centric adjudication stage, in which an independent adjudicator model examines the verified labels and justifications and determines a final label in accordance with the rubric. This structure mirrors established human annotation workflows in educational research, where initial coding is followed by self-checking and expert resolution of disagreements.", "link": "https://arxiv.org/abs/2603.13353v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Bakhtawar Ahtisham", "Kirk Vanacore", "Rene F. Kizilcec"], "categories": ["cs.AI"]}, {"id": "8", "source": "ARXIV", "score": 15, "day": "2026-03-07", "title": "SuperSkillsStack: Agency, Domain Knowledge, Imagination, and Taste in Human-AI Design Education", "content": "This study examines how students integrate generative artificial intelligence (AI) into design projects through the lens of the SuperSkillsStack framework, which identifies four key human competencies for effective human-AI collaboration: Agency, Domain Knowledge, Imagination, and Taste. As generative AI increasingly transforms creative practice, design education must consider how human capabilities are cultivated alongside technological tools. Using qualitative thematic analysis, this study analyzes reflective writings from 80 student design teams participating in a human-centered design course. The findings show that students primarily used AI during the early stages of the design process, including brainstorming, information synthesis, and problem framing. However, students consistently relied on human judgment to interpret contextual information, validate AI-generated outputs, and refine design solutions. Domain knowledge derived from field observations enabled students to detect inaccuracies in AI suggestions, while taste played a critical role in evaluating and selecting meaningful ideas. The results suggest that generative AI functions primarily as a cognitive accelerator rather than a replacement for human creativity. The study highlights the importance of cultivating higher-order human capabilities to support effective human-AI collaboration in design education.", "link": "https://arxiv.org/abs/2603.07016v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Qian Huang", "King Wang Poon"], "categories": ["cs.CY", "cs.AI"]}, {"id": "9", "source": "OPENALEX", "score": 15, "day": "2026-03-02", "title": "Generative AI Integration in Education: Theoretical Review and Future Directions Informed by the ADO Framework", "content": "The accelerated integration of Generative Artificial Intelligence (GenAI) tools such as ChatGPT is transforming learner engagement, instructional design, and institutional governance in education. This systematic literature review synthesizes theory-driven scholarship on GenAI adoption and pedagogical use through the Antecedents–Decisions–Outcomes (ADO) framework, examining how cognitive, motivational, technological, and institutional factors collectively shape implementation and learning outcomes. Drawing primarily on the Technology Acceptance Model (TAM), Self-Determination Theory (SDT), and Institutional Theory, the review integrates complementary insights from Constructivist Learning and Diffusion of Innovations perspectives to conceptualize how antecedents influence decision-making and outcomes across educational settings. The findings indicate that learner motivation, perceived usefulness, digital literacy, and institutional readiness constitute key antecedents affecting GenAI adoption. Decision processes—spanning instructional design, ethical regulation, and pedagogical adaptation—mediate how these antecedents translate into practice. Outcomes reveal a dual trajectory: GenAI enhances personalization, feedback, and self-regulated learning, yet introduces challenges related to ethical ambiguity and overreliance. The review offers a conceptually integrated synthesis that bridges motivational, technological, and organizational perspectives, advancing a theoretical roadmap for ethical and sustainable GenAI adoption. For educators and policymakers, the findings emphasize transparent governance, faculty capacity-building, and equitable access to ensure that innovation remains aligned with pedagogical integrity and human-centered values.", "link": "https://doi.org/10.3390/info17030241", "altLink": "https://openalex.org/W7133229326", "hasDoi": true, "hasReview": false, "authors": ["Raghu Raman", "Krishnashree Achuthan", "Payel Das"], "categories": ["Ambiguity", "Scholarship", "Knowledge management", "Generative grammar", "Engineering ethics"]}];
let PAGE_SIZE = 10;
let currentTab = 'all';
let currentSource = 'ALL';
let currentSort = 'score';
let currentPage = 1;
let currentCategory = '';
let currentMinDate = '';
let currentMaxDate = '';
let hideVisited = false;
let filtered = [];
let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
let searchHistory = JSON.parse(localStorage.getItem('searchHistory')) || [];
let visited = JSON.parse(localStorage.getItem('visited')) || [];

function toggleTheme() {
  const html = document.documentElement;
  const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
  html.dataset.theme = next;
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  localStorage.setItem('theme', next);
}

function toggleTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSource(btn) {
  currentSource = btn.dataset.source;
  document.querySelectorAll('#sourceFilters .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSort(btn) {
  currentSort = btn.dataset.sort;
  document.querySelectorAll('#sortGroup .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  render();
}

function toggleFavorite(id, e) {
  e.stopPropagation();
  const idx = favorites.indexOf(id);
  if (idx === -1) {
    favorites.push(id);
  } else {
    favorites.splice(idx, 1);
  }
  localStorage.setItem('favorites', JSON.stringify(favorites));
  applyFilters();
}

function recordVisit(id) {
  if (!visited.includes(id)) {
    visited.push(id);
  }
  localStorage.setItem('visited', JSON.stringify(visited));
}

function recordSearch(query) {
  if (query.trim() && !searchHistory.includes(query)) {
    searchHistory.unshift(query);
    if (searchHistory.length > 10) searchHistory.pop();
    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
  }
}

function downloadJSON() {
  const data = JSON.stringify(filtered, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadCSV() {
  const headers = ['제목', '출처', '스코어', '리뷰여부', '링크'];
  const rows = filtered.map(p => [
    '"' + p.title.replace(/"/g, '""') + '"',
    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
