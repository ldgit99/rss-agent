<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-04-09 23:37</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "ERIC", "score": 27, "day": "명시되지 않음", "title": "How Can the AI-Generated Curriculum Gap in Teacher Education Be Addressed?", "content": "---\ntitle: How Can the AI-Generated Curriculum Gap in Teacher Education Be Addressed?\nauthors: [Antarjyami Mahala, Bhavin Chauhan]\nyear: 명시되지 않음\njournal: ERIC\ndoi: 명시되지 않음\nresearch_type: 문헌 분석\nmethodology: 명시되지 않음\ndata_type: 명시되지 않음\nsample: 명시되지 않음\ncontext: 교육 기술 및 교사 교육\ntheoretical_framework: AI 문해력, 윤리적 고려사항\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n이 논문은 디지털 혁신 시대에 인공지능(AI)이 교육을 혁신하고 있으며, 교사 준비 과정에서 AI 생성 커리큘럼의 격차를 해소해야 한다고 주장한다. AI 문해력, AI 기반 교수 전략, 윤리적 고려사항의 커리큘럼 격차를 분석하고, 이를 해결하기 위한 포괄적인 프레임워크를 제안한다. 이 프레임워크는 AI 문해력, 기술적 능력, AI 증강 교수 방법론, 윤리적 AI 구현, 데이터 문해력 및 개인 정보 보호를 포함한다. 또한, 기존 구조 내에서 이 프레임워크를 구현하기 위한 AI 통합 모델을 제시하며, 인식 제고, 기술 개발, 완전 통합을 통해 진행된다. 이러한 목표를 통해 AI 중심의 세계에서 교사 교육에 대한 논의에 기여하고, 교육 기관, 정책 입안자 및 교사 교육자에게 통찰을 제공한다.\n\n# Research Logic\n## Problem\nAI 생성 커리큘럼의 격차가 교사 교육 프로그램에서 존재함.\n## Theory\nAI 문해력 및 윤리적 고려사항이 교사 교육에 필수적임.\n## Design\nAI 관련 콘텐츠, 기술 및 윤리적 문제를 통합하는 프레임워크 제안.\n## Findings\nAI 문해력과 기술적 능력의 중요성이 강조됨.\n## Conclusion\nAI 중심의 교육 환경에서 교사 교육의 필요성이 증가하고 있으며, 이를 위한 체계적인 접근이 요구됨.\n\n# Key Findings\n- AI 문해력과 기술적 능력의 통합이 필요함.\n- 윤리적 AI 구현이 교사 교육의 중요한 요소임.\n- AI 증강 교수 방법론이 교육의 질을 향상시킬 수 있음.\n\n# Contributions\n## Theoretical\nAI 문해력 및 윤리적 고려사항에 대한 새로운 통찰 제공.\n## Methodological\nAI 통합 모델을 통한 교사 교육 프레임워크 제안.\n## Practical\n교육 기관 및 정책 입안자에게 실질적인 가이드라인 제공.\n\n# Limitations\n- 연구 방법론에 대한 구체적인 설명이 부족함.\n- 실증적 데이터의 부족으로 인한 제한.\n\n# Transferable Insights\n- AI 문해력 교육의 필요성이 모든 교육 과정에 적용 가능함.\n- 윤리적 AI 사용에 대한 교육이 필수적임.\n\n# Idea Seeds\n1. AI 문해력 교육을 위한 커리큘럼 개발.\n2. 교사 교육 프로그램 내 AI 통합 모델의 실증적 연구.\n3. 윤리적 AI 사용에 대한 워크숍 및 세미나 개최.\n\n# Citation Snippets\n>\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy\n\n---\n\n요약: 이 논문은 AI 생성 커리큘럼의 격차를 해소하기 위한 교사 교육 프로그램의 필요성을 강조하며, AI 문해력과 윤리적 고려사항을 포함한 포괄적인 프레임워크를 제안한다. AI 중심의 교육 환경에서 교사 교육의 중요성이 증가하고 있음을 보여준다.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Antarjyami Mahala", "Bhavin Chauhan"], "categories": ["ERIC"]}, {"id": "1", "source": "ERIC", "score": 26, "day": "명시되지 않음", "title": "AI Literacy: A Core Practice in World Language Education", "content": "---\ntitle: AI Literacy: A Core Practice in World Language Education\nauthors: [Xinyue Lu, Anna Zaitseva, Francis John Troyan]\nyear: 명시되지 않음\njournal: 명시되지 않음\ndoi: 명시되지 않음\nresearch_type: 다중 사례 연구\nmethodology: 사례 연구\ndata_type: 질적 데이터\nsample: 3명의 교사 후보자\ncontext: 세계 언어 교육\ntheoretical_framework: 명시되지 않음\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 인공지능(AI) 혁신, 특히 ChatGPT의 출현이 세계 언어(WL) 교육에 미치는 기회와 도전 과제를 다룬다. WL 교사 교육 프로그램은 예비 교사들이 이러한 기술을 효과적으로 통합할 수 있도록 \"AI 리터러시\"를 준비해야 한다. 이 다중 사례 연구는 WL 교사 자격 프로그램에서 AI 리터러시가 \"핵심 실천\"으로 활용될 수 있는 방법을 조사하였다. 연구는 세 명의 교사 후보자가 수업 계획 활동에서 생성적 AI(챗봇)를 어떻게 활용했는지를 분석하였으며, AI 리터러시의 발전 양상을 네 가지 영역(기술적 숙련도, 교수법적 적합성, 전문적 작업, 윤리적 사용)에서 평가하였다. 참가자들은 AI에 대한 비판적 태도를 발전시켰으며, 이는 그들의 전문적 정체성의 변화에 의해 형성되었다. 본 연구는 교사 교육에서 AI 리터러시의 중요성을 강조하며, AI 통합 시 교사 후보자의 전문적 정체성 개발을 중심에 두어야 함을 제안한다.\n\n# Research Logic\n## Problem\nAI 기술의 통합이 세계 언어 교육에 미치는 영향과 예비 교사들의 준비 부족 문제.\n## Theory\nAI 리터러시가 교사 교육에서 핵심 실천으로 자리 잡을 수 있는 가능성.\n## Design\n다중 사례 연구를 통해 세 명의 교사 후보자의 경험을 분석.\n## Findings\n참가자들은 AI 리터러시의 네 가지 영역에서 다양한 발전을 보였으며, AI에 대한 비판적 태도를 형성하였다.\n## Conclusion\nAI 리터러시는 교사 후보자의 전문적 정체성 개발과 AI 통합에 중요한 역할을 한다.\n\n# Key Findings\n- AI 리터러시는 기술적 숙련도, 교수법적 적합성, 전문적 작업, 윤리적 사용의 네 가지 영역에서 발전하였다.\n- 참가자들은 AI에 대한 비판적 태도를 발전시켰다.\n- 전문적 정체성의 변화가 AI 리터러시의 발전에 영향을 미쳤다.\n\n# Contributions\n## Theoretical\nAI 리터러시의 개념을 교사 교육의 핵심 실천으로 제안.\n## Methodological\n다중 사례 연구를 통해 질적 데이터 수집 및 분석 방법론을 활용.\n## Practical\n교사 후보자들이 AI를 효과적으로 통합할 수 있도록 지원하는 실천적 접근법 제시.\n\n# Limitations\n- 연구의 샘플 크기가 작아 일반화에 한계가 있다.\n- 연구 기간이 명시되지 않아 장기적 효과를 평가하기 어렵다.\n\n# Transferable Insights\n- AI 리터러시는 다양한 교육 맥락에서 교사 교육에 적용될 수 있다.\n- 전문적 정체성 개발이 AI 통합의 중요한 요소임을 강조한다.\n\n# Idea Seeds\n1. AI 리터러시 교육을 위한 커리큘럼 개발.\n2. 교사 후보자들의 AI 사용 경험을 공유하는 플랫폼 구축.\n3. AI 통합에 대한 지속적인 전문성 개발 프로그램 설계.\n\n# Citation Snippets\n>\n\ntags: #ai_literacy, #teacher_education, #world_languages, #ai_integration, #professional_identity, #qualitative_research, #case_study\n\n---\n\n요약: 본 연구는 AI 리터러시가 세계 언어 교육에서 교사 후보자들의 전문적 정체성 개발과 AI 통합에 중요한 역할을 한다는 점을 강조한다. 세 명의 교사 후보자가 AI를 활용한 수업 계획 활동에서 다양한 발전을 보였으며, 이는 그들의 비판적 태도 형성에 기여하였다. AI 리터러시를 교사 교육의 핵심 실천으로 제안하며, 실천적 접근법을 통해 예비 교사들을 지원할 필요성을 제기한다.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Xinyue Lu", "Anna Zaitseva", "Francis John Troyan"], "categories": ["ERIC"]}, {"id": "2", "source": "ARXIV", "score": 17, "day": "2026-04-08", "title": "Designing Safe and Accountable GenAI as a Learning Companion with Women Banned from Formal Education", "content": "---\ntitle: Designing Safe and Accountable GenAI as a Learning Companion with Women Banned from Formal Education\nauthors: [Hamayoon Behmanush, Freshta Akhtari, Ingmar Weber, Vikram Kamath Cannanure]\nyear: 2026\njournal: arXiv\ndoi: https://doi.org/XXXXXXX.XXXXXXX\nresearch_type: 질적 연구\nmethodology: 원격 참여 설계 연구\ndata_type: 질적 데이터, 양적 데이터\nsample: 20명의 아프가니스탄 여성\ncontext: 아프가니스탄의 성별 제한 교육 환경\ntheoretical_framework: 참여 설계, 책임 있는 AI\nkeywords: [여성, 성별 제한, 온라인 자기 학습, 참여 설계, GenAI 학습 동반자, 책임 있는 GenAI]\n---\n\n# APA 7th style\n\n# Summary\n이 연구는 아프가니스탄의 성별 제한 교육 환경에서 여성들이 GenAI를 학습 동반자로 어떻게 구상하는지를 탐구한다. 20명의 여성과의 원격 참여 설계 연구를 통해, 참가자들은 GenAI를 정보 출처가 아닌 항상 이용 가능한 동료이자 멘토로 인식하며, 학습 공동체의 부재를 보완하는 역할을 강조하였다. 그러나 이 동반자는 개인 정보 보호 및 감시 위험, 문화적으로 안전하지 않은 지원 등으로 제약을 받는다. 연구 결과, GenAI와의 참여적 설계는 참가자들의 포부(p=.01), 인식된 주체성(p=.01), 그리고 인식된 기회(p=.03)를 유의미하게 증가시켰다. 이는 안전하고 책임 있는 GenAI가 단순한 해악 감소를 넘어 여성들이 학습 및 고용의 미래를 상상하고 추구할 수 있도록 적극적으로 지원할 수 있음을 보여준다.\n\n# Research Logic\n## Problem\n여성들이 공식 교육에서 배제되는 상황에서 GenAI가 어떻게 안전하고 책임 있게 학습을 지원할 수 있는지에 대한 이해 부족.\n## Theory\n참여 설계와 책임 있는 AI의 이론적 틀을 통해 여성들의 경험을 반영한 GenAI 설계 필요성.\n## Design\n20명의 아프가니스탄 여성과의 원격 참여 설계 세션을 통해 GenAI의 역할과 요구 사항을 탐구.\n## Findings\n참가자들은 GenAI를 정보 출처가 아닌 동료로 인식하며, 안전과 개인 정보 보호의 필요성을 강조.\n## Conclusion\n책임 있는 GenAI 설계는 여성들이 학습 및 고용의 미래를 상상하고 추구할 수 있도록 지원해야 함.\n\n# Key Findings\n- GenAI는 정보 출처가 아닌 항상 이용 가능한 동료로 인식됨.\n- 개인 정보 보호 및 감시 위험이 동반자의 역할을 제약함.\n- 참여적 설계가 참가자들의 포부와 인식된 주체성을 유의미하게 증가시킴.\n\n# Contributions\n## Theoretical\n성별 제한 교육 환경에서 GenAI의 책임 있는 설계에 대한 새로운 통찰 제공.\n## Methodological\n참여 설계를 통해 질적 및 양적 데이터를 통합하여 연구 결과를 도출함.\n## Practical\n여성들이 안전하게 GenAI를 활용할 수 있는 설계 방향 제시.\n\n# Limitations\n- 연구 샘플이 제한적이며, 특정 지역에 국한됨.\n- 감시 환경에서의 개인 정보 보호 문제에 대한 깊이 있는 분석 부족.\n\n# Transferable Insights\n- 성별 제한 환경에서의 GenAI 설계는 안전성과 개인 정보 보호를 중심으로 해야 함.\n- 참여적 설계 접근법이 다양한 맥락에서 유용할 수 있음.\n\n# Idea Seeds\n1. GenAI의 안전한 사용을 위한 사용자 제어 기능 강화.\n2. 문화적으로 적합한 지원을 제공하는 GenAI 설계.\n3. 학습 공동체를 재구성하기 위한 AI 기반 가상 학습 공간 개발.\n\n# Citation Snippets\n> Behmanush, H., Akhtari, F., Weber, I., & Cannanure, V. K. (2026). Designing Safe and Accountable GenAI as a Learning Companion with Women Banned from Formal Education. arXiv:2604.07253v1.\n\ntags: #여성, #GenAI, #참여설계, #교육기술, #책임있는AI, #온라인학습, #안전한학습\n\n---\n\n요약: 이 연구는 아프가니스탄의 성별 제한 교육 환경에서 여성들이 GenAI를 학습 동반자로 어떻게 구상하는지를 탐구하며, GenAI의 역할과 개인 정보 보호의 필요성을 강조한다. 참여적 설계가 여성들의 포부와 주체성을 증가시키는 데 긍정적인 영향을 미쳤음을 보여준다.", "link": "https://arxiv.org/abs/2604.07253v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Hamayoon Behmanush", "Freshta Akhtari", "Ingmar Weber"], "categories": ["cs.CY", "cs.AI"]}, {"id": "3", "source": "ARXIV", "score": 17, "day": "2026-04-08", "title": "Workmanship of Learning: Embedding Craftsmanship Values in AI-Integrated Educational Tools", "content": "---\ntitle: Workmanship of Learning: Embedding Craftsmanship Values in AI-Integrated Educational Tools\nauthors: [Tuan-Ting Huang, Janet Yi-Ching Huang, Stephan Wensveen]\nyear: 2026\njournal: CHI EA\ndoi: https://doi.org/10.1145/3772363.3798399\nresearch_type: 질적 연구\nmethodology: Research through Design (RtD)\ndata_type: 인터뷰 및 관찰\nsample: 5명의 디자인 실무자\ncontext: 네덜란드, 에인트호번 기술대학교의 학부 과정\ntheoretical_framework: AI Craftsmanship\nkeywords: [AI 윤리적 가치, 디자인 교육, 장인정신, AI 장인정신, 인공지능]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 생성적 AI가 디자인 교육에 미치는 영향을 탐구하며, 장인정신의 가치를 통합한 AI Craftsmanship 프레임워크를 제안한다. 연구자들은 AI 통합 창의적 코딩 도구를 설계하고, 이를 통해 디자인 실무자들과의 세션을 통해 장인정신의 가치가 어떻게 나타나는지를 조사하였다. 연구 결과, 위험, 리듬, 배려와 같은 장인정신의 가치가 불균등하게 나타났으며, 이러한 가치가 학습 동기를 어떻게 형성하는지를 보여준다. AI Craftsmanship는 디자인 교육에서 반영적이고 책임 있는 학습을 지원하는 도구로서의 가능성을 제시한다.\n\n# Research Logic\n## Problem\n생성적 AI의 자동화와 효율성 강조가 디자인 교육의 탐구적이고 반영적인 학습 과정을 위협하고 있다.\n## Theory\nAI Craftsmanship는 장인정신의 전통에서 유래한 가치 중심의 프레임워크로, 위험, 리듬, 배려를 학습의 중심으로 삼는다.\n## Design\nAI 통합 창의적 코딩 도구를 설계하여 장인정신의 가치를 인터페이스와 상호작용에 통합하였다.\n## Findings\n장인정신의 가치가 불균등하게 나타났으며, 위험과 리듬은 초기 이해를 형성하고, 배려는 반영적 실천을 통해 나타났다.\n## Conclusion\nAI Craftsmanship는 디자인 교육에서 반영적이고 책임 있는 학습을 위한 가치 중심의 접근 방식을 제공한다.\n\n# Key Findings\n- 위험과 리듬은 초기 학습 과정에서 중요한 역할을 하며, 배려는 반영적 실천을 통해 나타난다.\n- AI의 역할이 제한될 때, 학습자는 더 많은 탐구와 실험을 할 수 있다.\n- 장인정신의 가치가 학습 동기를 형성하는 데 기여한다.\n\n# Contributions\n## Theoretical\nAI Craftsmanship라는 개념적 프레임워크를 제안하여 AI와 학습자 간의 관계를 재조명한다.\n## Methodological\nResearch through Design 접근 방식을 통해 장인정신의 가치를 도구 설계에 통합하는 방법론을 제시한다.\n## Practical\nAI 통합 도구가 디자인 교육에서 반영적이고 책임 있는 학습을 지원할 수 있는 가능성을 보여준다.\n\n# Limitations\n- 연구 샘플이 소수의 디자인 실무자에 국한되어 있어 일반화에 한계가 있다.\n- AI 도구의 효과에 대한 장기적인 연구가 필요하다.\n\n# Transferable Insights\n- AI 도구 설계 시 장인정신의 가치를 통합하는 것이 중요하다.\n- 학습자의 탐구적 경험을 지원하는 도구 설계가 필요하다.\n\n# Idea Seeds\n1. AI 도구에서 장인정신의 가치를 더욱 명확히 드러내는 방법 탐색.\n2. 다양한 디자인 배경을 가진 학습자를 대상으로 한 연구 확장.\n3. AI 도구의 장기적 효과를 평가하기 위한 후속 연구 계획.\n\n# Citation Snippets\n> Huang, T.-T., Huang, J. Y.-C., & Wensveen, S. (2026). Workmanship of Learning: Embedding Craftsmanship Values in AI-Integrated Educational Tools. In Extended Abstracts of the 2026 CHI Conference on Human Factors in Computing Systems (CHI EA ’26), April 13–17, 2026, Barcelona, Spain. ACM, New York, NY, USA.\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy\n\n---\n\n요약: 본 연구는 생성적 AI가 디자인 교육에 미치는 영향을 탐구하며, 장인정신의 가치를 통합한 AI Craftsmanship 프레임워크를 제안한다. 연구자들은 AI 통합 창의적 코딩 도구를 설계하고, 이를 통해 디자인 실무자들과의 세션을 통해 장인정신의 가치가 어떻게 나타나는지를 조사하였다. 연구 결과, 위험, 리듬, 배려와 같은 장인정신의 가치가 불균등하게 나타났으며, 이러한 가치가 학습 동기를 어떻게 형성하는지를 보여준다. AI Craftsmanship는 디자인 교육에서 반영적이고 책임 있는 학습을 지원하는 도구로서의 가능성을 제시한다.", "link": "https://arxiv.org/abs/2604.07118v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Tuan-Ting Huang", "Janet Yi-Ching Huang", "Stephan Wensveen"], "categories": ["cs.HC"]}, {"id": "4", "source": "ERIC", "score": 16, "day": "명시되지 않음", "title": "Towards an AI-Literate Future: A Systematic Literature Review Exploring Education, Ethics, and Applications", "content": "---\ntitle: Towards an AI-Literate Future: A Systematic Literature Review Exploring Education, Ethics, and Applications\nauthors: Gabriele Biagini\nyear: 명시되지 않음\njournal: ERIC\ndoi: 명시되지 않음\nresearch_type: 문헌 리뷰\nmethodology: 체계적 문헌 검토\ndata_type: 문헌\nsample: 323개의 기록 중 87개의 고품질 연구\ncontext: 인공지능(AI) 문해력의 발전과 교육적 적용\ntheoretical_framework: 명시되지 않음\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 인공지능(AI) 문해력의 발전을 조사하며, 21세기 다양한 분야에서 AI의 변혁적 영향을 인정한다. AI의 기원부터 현재 교육 및 일상생활에서의 광범위한 역할까지, 본 논문은 현대 사회에서 AI 문해력의 관련성과 복잡성을 탐구한다. 323개의 기록을 포함한 체계적 문헌 검토를 통해 87개의 고품질 연구를 분석하였으며, AI 문해력과 관련된 중심 주제와 정의를 식별하였다. 연구 결과, AI 문해력은 기술적 숙련도를 넘어 윤리적 고려사항, 사회적 영향 및 실용적 응용을 포함한다는 것을 밝혀냈다. 주요 주제로는 K-12 교육에서의 AI 문해력, AI 문해력 커리큘럼 개발, 교육 및 직장에서의 AI 통합 등이 있다. 또한, AI 문해력 모델과 프레임워크의 중요성을 강조하며, AI 및 디지털 상호작용 문해력의 필요성을 제시한다. 마지막으로, AI 문해력 연구의 출판 경향이 중국과 미국에서 강하게 성장하고 있음을 나타내며, 정책 및 교육에서 AI 문해력의 중요성을 강조한다.\n\n# Research Logic\n## Problem\nAI 문해력의 필요성과 그 복잡성에 대한 이해 부족.\n## Theory\nAI 문해력은 기술적 숙련도뿐만 아니라 윤리적 및 사회적 고려를 포함해야 한다.\n## Design\n체계적 문헌 검토를 통해 AI 문해력 관련 연구를 분석.\n## Findings\nAI 문해력은 교육 및 직장에서의 윤리적, 사회적 영향과 관련된 다양한 주제를 포함한다.\n## Conclusion\nAI 문해력 교육은 포괄적이고 적응 가능한 교육 패러다임을 필요로 하며, 다학제적 협력이 중요하다.\n\n# Key Findings\n- AI 문해력은 기술적 숙련도를 넘어 윤리적 고려와 사회적 영향을 포함한다.\n- K-12 교육에서의 AI 문해력의 중요성이 강조된다.\n- AI 문해력 연구는 중국과 미국에서 강한 성장세를 보인다.\n\n# Contributions\n## Theoretical\nAI 문해력의 정의와 주제를 명확히 하여 이론적 기초를 제공.\n## Methodological\n체계적 문헌 검토 방법론을 통해 연구의 rigor를 강화.\n## Practical\nAI 문해력 교육 프로그램 개발을 위한 실질적인 방향 제시.\n\n# Limitations\n- 연구의 출판 연도 및 구체적인 데이터 출처가 명시되지 않음.\n- 특정 교육 환경에서의 AI 문해력 적용에 대한 구체적인 사례 부족.\n\n# Transferable Insights\n- AI 문해력은 다양한 교육 환경에서 적용 가능하며, 윤리적 고려가 필수적임.\n- 다학제적 접근이 AI 문해력 교육 프로그램 개발에 기여할 수 있음.\n\n# Idea Seeds\n1. AI 문해력 교육을 위한 커리큘럼 개발 방안.\n2. AI 윤리 교육을 포함한 통합 교육 모델 연구.\n3. AI 문해력 향상을 위한 학습 분석 도구 개발.\n\n# Citation Snippets\n> Biagini, G. (명시되지 않음). Towards an AI-Literate Future: A Systematic Literature Review Exploring Education, Ethics, and Applications.\n\ntags: #ai_literacy, #education, #ethics, #ai_in_classroom, #learning_analytics, #ai_pedagogy, #interdisciplinary_collaboration", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Gabriele Biagini"], "categories": ["ERIC"]}, {"id": "5", "source": "ARXIV", "score": 13, "day": "2026-04-08", "title": "NIRVANA: A Comprehensive Dataset for Reproducing How Students Use Generative AI for Essay Writing", "content": "With the rapid adoption of AI writing assistants in education, educators and researchers need empirical evidence to understand the impact on student writing and inform effective pedagogical design. Despite widespread use, we lack systematic understanding of how students engage with these tools during authentic writing tasks: when they seek assistance, what they ask, and how they incorporate AI-generated content into their essays. This gap limits evidence-based policy development and rigorous evaluation of generative AI's learning effects. To address this gap, we introduce NIRVANA, a dataset capturing how university students use generative AI while writing an analytical essay. The dataset includes 77 students who completed an essay task with access to ChatGPT, recording keystroke-level writing behavior, full ChatGPT conversation histories, and all text copied from ChatGPT, enabling a complete reconstruction of the writing process and revealing how AI assistance shapes student work. Our analysis identifies key behavioral patterns, including variation in ChatGPT query frequency and its relationship to essay characteristics such as length and readability. We identify four writing profiles based on students' contribution and revision patterns: Lead Authors, Collaborators, Drafters, and Vibe Writers. To support deeper investigation, we developed a replay interface that reconstructs the writing process; qualitative analysis of sampled replays demonstrates how this tool enables systematic examination of student-AI interactions.", "link": "https://arxiv.org/abs/2604.07344v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Andrew Jelson", "Daniel Manesh", "Sangwook Lee"], "categories": ["cs.HC"]}, {"id": "6", "source": "ARXIV", "score": 13, "day": "2026-04-07", "title": "Application-Driven Pedagogical Knowledge Optimization of Open-Source LLMs via Reinforcement Learning and Supervised Fine-Tuning", "content": "We present an innovative multi-stage optimization strategy combining reinforcement learning (RL) and supervised fine-tuning (SFT) to enhance the pedagogical knowledge of large language models (LLMs), as illustrated by EduQwen 32B-RL1, EduQwen 32B-SFT, and an optional third-stage model EduQwen 32B-SFT-RL2: (1) RL optimization that implements progressive difficulty training, focuses on challenging examples, and employs extended reasoning rollouts; (2) a subsequent SFT phase that leverages the RL-trained model to synthesize high-quality training data with difficulty-weighted sampling; and (3) an optional second round of RL optimization. EduQwen 32B-RL1, EduQwen 32B-SFT, and EduQwen 32B-SFT-RL2 are an application-driven family of open-source pedagogical LLMs built on a dense Qwen3-32B backbone. These models remarkably achieve high enough accuracy on the Cross-Domain Pedagogical Knowledge (CDPK) Benchmark to establish new state-of-the-art (SOTA) results across the interactive Pedagogy Benchmark Leaderboard and surpass significantly larger proprietary systems such as the previous benchmark leader Gemini-3 Pro. These dense 32-billion-parameter models demonstrate that domain-specialized optimization can transform mid-sized open-source LLMs into true pedagogical domain experts that outperform much larger general-purpose systems, while preserving the transparency, customizability, and cost-efficiency required for responsible educational AI deployment.", "link": "https://arxiv.org/abs/2604.06385v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Navan Preet Singh", "Xiaokun Wang", "Anurag Garikipati"], "categories": ["cs.CL"]}, {"id": "7", "source": "ERIC", "score": 12, "day": "명시되지 않음", "title": "Group-AI Collaboration Enhances Creativity Performance: The Roles of Perspective-Taking and AI Utilisation Strategies", "content": "Background: The rise of generative artificial intelligence (AI) in educational research has prompted growing interest in how such tools might support collaborative knowledge construction and creative thinking. While most studies focus on individual-AI interaction, less is known about group-level cognitive and interactional processes when AI is integrated into shared problem-solving settings. Objectives: This study investigates how group collaboration with AI supports creativity-relevant processes in collaborative learning contexts and explores the psychological mechanisms that mediate this effect. Methods: Using a within-subject experimental design, 96 university students engaged in a scientific divergent application task under three collaboration modes: group-AI collaboration, individual-AI collaboration and human-only group collaboration. The study adopted a mixed-method approach, combining behavioural coding of perspective-taking and AI utilisation strategies with statistical modelling to examine mediation effects. Tasks were designed to simulate open-ended learning scenarios that emphasise ideation, problem-solving and conceptual integration--core components of collaborative learning. Results and Conclusions: Group-AI collaboration led to the most creative outputs in terms of usefulness, originality and quality. This effect was mediated by two key mechanisms: strategic use of AI as a generative and exploratory resource and selective, high-quality integration of both peer and AI-generated ideas. While these findings stem from a controlled setting, they offer initial evidence that AI-supported group work may enrich collaborative ideation processes and hold promise for future instructional design and group-based learning practices.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Zhihao Zhou", "Letao Xiao", "Jiayi Wang"], "categories": ["ERIC"]}, {"id": "8", "source": "ARXIV", "score": 12, "day": "2026-04-08", "title": "The Impact of Steering Large Language Models with Persona Vectors in Educational Applications", "content": "Activation-based steering can personalize large language models at inference time, but its effects in educational settings remain unclear. We study persona vectors for seven character traits in short-answer generation and automated scoring on the ASAP-SAS benchmark across three models spanning two architectures. Persona steering lowers answer quality overall, with much larger effects on open-ended English Language Arts (ELA) prompts than on factual science prompts; interpretive and argumentative tasks are up to 11x more sensitive. On the scoring side, we observe predictable valence-aligned calibration shifts: evil and impolite scorers grade more harshly, while good and optimistic scorers grade more leniently. ELA tasks are 2.5-3x more susceptible to scorer personalization than science tasks, and the Mixture-of-Experts model shows roughly 6x larger calibration shifts than the dense models. To our knowledge, this is the first study to systematically examine the effects of activation-steered persona traits in educational generation and scoring, and the results highlight the need for task-aware and architecture-aware calibration when deploying steered models in educational settings.", "link": "https://arxiv.org/abs/2604.07102v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Yongchao Wu", "Aron Henriksson"], "categories": ["cs.CL", "cs.AI"]}, {"id": "9", "source": "ARXIV", "score": 11, "day": "2026-04-08", "title": "Critical Inker: Scaffolding Critical Thinking in AI-Assisted Writing Through Socratic Questioning", "content": "As Large Language Models (LLMs) increasingly automate writing tasks, there is a growing risk of cognitive deskilling where users offload critical thinking to the system. To address this, we introduce Critical Inker, a writing tool designed to scaffold critical reflection during writing through logical analysis and socratic feedback. We present two methods: (1) A Socratic chatbot using questions to help them realize and fix logical errors in their writing and (2) Visual Feedback, which highlights logical errors in the text without dialog. We detail the technical implementation of the system and evaluate its argument extraction and logical validity accuracy. Our evaluation shows a 91.2% argument overlap with ground truth argument annotations and 87% validity accuracy. Finally, we conducted a small-scale pilot and discuss early qualitative results.", "link": "https://arxiv.org/abs/2604.07167v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Philipp Hugenroth", "Valdemar Danry", "Pattie Maes"], "categories": ["cs.HC"]}];
let PAGE_SIZE = 10;
let currentTab = 'all';
let currentSource = 'ALL';
let currentSort = 'score';
let currentPage = 1;
let currentCategory = '';
let currentMinDate = '';
let currentMaxDate = '';
let hideVisited = false;
let filtered = [];
let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
let searchHistory = JSON.parse(localStorage.getItem('searchHistory')) || [];
let visited = JSON.parse(localStorage.getItem('visited')) || [];

function toggleTheme() {
  const html = document.documentElement;
  const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
  html.dataset.theme = next;
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  localStorage.setItem('theme', next);
}

function toggleTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSource(btn) {
  currentSource = btn.dataset.source;
  document.querySelectorAll('#sourceFilters .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSort(btn) {
  currentSort = btn.dataset.sort;
  document.querySelectorAll('#sortGroup .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  render();
}

function toggleFavorite(id, e) {
  e.stopPropagation();
  const idx = favorites.indexOf(id);
  if (idx === -1) {
    favorites.push(id);
  } else {
    favorites.splice(idx, 1);
  }
  localStorage.setItem('favorites', JSON.stringify(favorites));
  applyFilters();
}

function recordVisit(id) {
  if (!visited.includes(id)) {
    visited.push(id);
  }
  localStorage.setItem('visited', JSON.stringify(visited));
}

function recordSearch(query) {
  if (query.trim() && !searchHistory.includes(query)) {
    searchHistory.unshift(query);
    if (searchHistory.length > 10) searchHistory.pop();
    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
  }
}

function downloadJSON() {
  const data = JSON.stringify(filtered, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadCSV() {
  const headers = ['제목', '출처', '스코어', '리뷰여부', '링크'];
  const rows = filtered.map(p => [
    '"' + p.title.replace(/"/g, '""') + '"',
    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

  const state = {
    tab: currentTab,

    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
</html>
