<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-06-10 00:11</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "OPENALEX", "score": 15, "day": "2026-06-07", "title": "ENHANCING DIGITAL LITERACY IN ENGLISH TEACHERS THROUGH EDUTECHNO-PRENEURSHIP IN ELT", "content": "---\ntitle: ENHANCING DIGITAL LITERACY IN ENGLISH TEACHERS THROUGH EDUTECHNO-PRENEURSHIP IN ELT\nauthors: [Maisa, Naufal Ahnaf Widiyana, Muhammad Indraha Sukmana, Muhammad Fikri Fanani, Mahmud]\nyear: 2026\njournal: FRASA: English Education and Literature Journal\ndoi: https://doi.org/10.47701/frasa.v7i2.5218\nresearch_type: 탐색적 사례 연구\nmethodology: 질적 사례 연구\ndata_type: 인터뷰, 설문지, 관찰\nsample: 4명 (예비 교사 2명, 현직 교사 2명)\ncontext: 인도네시아의 영어 교육\ntheoretical_framework: 디지털 문해력과 에듀테크노프레너십의 관계\nkeywords: [디지털 문해력, 예비 교사, 에듀테크노프레너십, 교육 기술, 혁신적 교수법]\n---\n\n# APA 7th style\n\n# Summary\n디지털 시대의 교육은 영어 교사, 특히 예비 교사들이 강력한 디지털 기술 능력을 개발해야 함을 요구한다. 본 탐색적 사례 연구는 디지털 문해력 능력이 영어 교육에서 에듀테크노프레너십의 발전을 어떻게 지원하는지를 조사하였다. 연구에는 온라인 영어 수업 경험이 있는 예비 교사 2명과 현직 교사 2명이 참여하였으며, 데이터는 반구조화된 인터뷰, 디지털 문해력 설문지, 수업 및 플랫폼 관찰을 통해 수집되었다. 데이터 분석 결과, 에듀테크노프레너십, 디지털 문해력 능력, 기술의 주도적 역할, 개인화된 학습, 유연성과 접근성, 협력 및 파트너십의 여섯 가지 주요 주제가 도출되었다. 연구 결과, 참가자 중 75%가 에듀테크노프레너십을 교육, 기술, 기업가 정신의 통합으로 인식하였으며, 모든 참가자는 디지털 문해력 능력이 우수한 것으로 나타났다.\n\n# Research Logic\n## Problem\n디지털 시대에 영어 교사들이 디지털 기술을 효과적으로 활용하지 못하는 문제.\n## Theory\n디지털 문해력이 에듀테크노프레너십의 발전에 기여하는 역할.\n## Design\n질적 사례 연구를 통해 참가자들의 경험과 인식을 심층적으로 분석.\n## Findings\n75%의 참가자가 에듀테크노프레너십을 교육과 기술의 통합으로 인식하며, 모든 참가자가 높은 디지털 문해력 능력을 보임.\n## Conclusion\n디지털 문해력은 영어 교사들이 에듀테크노프레너십을 발전시키는 데 중요한 기반이 됨.\n\n# Key Findings\n- 75%의 참가자가 에듀테크노프레너십을 교육, 기술, 기업가 정신의 통합으로 인식.\n- 모든 참가자가 디지털 문해력 능력이 우수한 것으로 평가됨.\n- 기술이 교육적 변화의 주도적 역할을 한다는 인식이 높음.\n\n# Contributions\n## Theoretical\n디지털 문해력과 에듀테크노프레너십 간의 관계를 명확히 함.\n## Methodological\n질적 사례 연구를 통해 심층적인 데이터 수집 및 분석 방법론 제시.\n## Practical\n영어 교사 교육 프로그램에서 디지털 문해력 교육의 필요성을 강조.\n\n# Limitations\n- 샘플 크기가 작아 일반화에 한계가 있음.\n- 특정 지역(인도네시아)에서의 연구로 다른 문화적 맥락에 대한 적용이 어려움.\n\n# Transferable Insights\n- 디지털 문해력은 교사 교육에서 필수적인 요소임.\n- 에듀테크노프레너십은 교사들이 기술을 활용하여 교육적 문제를 해결하는 데 기여할 수 있음.\n\n# Idea Seeds\n1. 디지털 문해력 교육 프로그램 개발.\n2. 에듀테크노프레너십을 위한 교사 연수 프로그램 설계.\n3. 다양한 디지털 플랫폼 활용 사례 연구.\n\n# Citation Snippets\n> Maisa., Widiyana, N. A., Fanani, M. F., Sukmana, M. I., & Mahmud. (2026). Enhancing digital literacy in English teachers through edutechno-preneurship in ELT. FRASA: English Education and Literature Journal, 7(1), 183–194. https://doi.org/10.47701/frasa.v7i2.5218\n\ntags: #디지털문해력, #예비교사, #에듀테크노프레너십, #교육기술, #혁신적교수법\n\n---\n\n요약: 본 연구는 디지털 문해력이 영어 교육에서 에듀테크노프레너십의 발전을 지원하는 방식을 탐구하였다. 4명의 참가자를 대상으로 한 질적 사례 연구를 통해, 디지털 문해력 능력이 교사들의 교육적 혁신과 기업가 정신에 기여하는 중요한 요소임을 밝혔다. 75%의 참가자가 에듀테크노프레너십을 교육과 기술의 통합으로 인식하였으며, 모든 참가자가 높은 디지털 문해력 능력을 보였다.", "link": "https://doi.org/10.47701/frasa.v7i2.5218", "altLink": "https://openalex.org/W7163808883", "hasDoi": true, "hasReview": true, "authors": ["Maisa", "Naufal Ahnaf Widiyana", "Muhammad Indraha Sukmana"], "categories": ["Digital literacy", "Enabling", "Competence (human resources)", "Digital storytelling", "Literacy"]}, {"id": "1", "source": "ARXIV", "score": 15, "day": "2026-06-06", "title": "Voting Protocols as Coordination Mechanisms for Role-Constrained Multi-Agent Tutoring Systems", "content": "---\ntitle: Voting Protocols as Coordination Mechanisms for Role-Constrained Multi-Agent Tutoring Systems\nauthors: [Eric S. Qiu, Joyce Gill]\nyear: 2026\njournal: Proceedings of the 43rd International Conference on Machine Learning\ndoi: https://arxiv.org/abs/2606.08030v1\nresearch_type: 실험적 연구\nmethodology: 시뮬레이션 기반 실험\ndata_type: 시뮬레이션 데이터\nsample: 1,200 시뮬레이션 상호작용\ncontext: 교육 기술 및 다중 에이전트 시스템\ntheoretical_framework: 협력적 AI, 역할 제약 다중 에이전트 시스템\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 역할 제약이 있는 다중 에이전트 튜터링 시스템에서 투표 프로토콜이 협력에 미치는 영향을 분석한다. 네 가지 역할(스캐폴딩, 오해, 동기 부여, 메타인지)을 가진 교육 에이전트가 서로 다른 개입을 제안할 때, 단일 응답만이 학습자에게 전달될 수 있는 상황에서 투표 프로토콜이 어떻게 협력을 형성하는지를 연구하였다. 간단한 투표, 순위 투표, 누적 투표, 승인 투표의 네 가지 프로토콜을 SciQ와 HumanEval 벤치마크를 기반으로 한 두 가지 시뮬레이션 튜터링 환경에서 비교하였다. 1,200회의 시뮬레이션 상호작용을 통해 에이전트의 심의와 투표 프로토콜 유형이 최종 응답에 미치는 영향을 발견하였으며, 이는 집단 결정에 의미 있는 영향을 미친다. 연구 결과, 프로토콜 선택이 역할 전문화된 교육 에이전트 간의 협력 패턴과 관련이 있음을 보여준다.\n\n# Research Logic\n## Problem\n다중 에이전트 튜터링 시스템에서 여러 에이전트가 서로 다른 개입을 제안할 때, 최종적으로 어떤 응답이 학습자에게 전달될지를 결정하는 협력 문제.\n\n## Theory\n협력적 AI 이론을 기반으로 하여, 에이전트 간의 목표가 부분적으로 일치하지만 동일하지 않은 상황에서의 조정 메커니즘을 탐구.\n\n## Design\n네 가지 역할을 가진 교육 에이전트를 사용하여 각 에이전트가 제안하는 응답을 투표 프로토콜을 통해 결정하는 시뮬레이션 실험 설계.\n\n## Findings\n투표 프로토콜의 유형에 따라 에이전트 간의 협력 행동이 달라지며, 짧은 튜터링 상호작용에서도 학습 성과가 측정 가능함을 발견.\n\n## Conclusion\n투표 프로토콜의 선택이 역할 전문화된 교육 에이전트 간의 협력 패턴에 영향을 미치며, 이는 교육적 효과성에 중요한 함의를 가진다.\n\n# Key Findings\n- 투표 프로토콜의 유형에 따라 에이전트 간의 협력 행동이 달라진다.\n- 에이전트의 심의 과정이 최종 응답에 미치는 영향이 크다.\n- 짧은 튜터링 상호작용에서도 학습 성과가 측정 가능하다.\n\n# Contributions\n## Theoretical\n역할 제약 다중 에이전트 시스템의 협력적 조정 메커니즘에 대한 이해를 심화.\n\n## Methodological\n투표 프로토콜을 통한 협력 행동 분석을 위한 새로운 평가 프레임워크 제공.\n\n## Practical\n교육 에이전트 설계 시 투표 프로토콜의 중요성을 강조하며, 효과적인 튜터링 시스템 개발에 기여.\n\n# Limitations\n- 시뮬레이션 환경의 한계로 인해 실제 교육 환경에서의 적용 가능성에 대한 검증이 필요하다.\n- 다양한 학습자 특성을 반영한 추가 연구가 요구된다.\n\n# Transferable Insights\n- 다중 에이전트 시스템에서의 협력적 결정 메커니즘의 중요성.\n- 교육 기술에서의 역할 전문화가 학습 성과에 미치는 영향.\n\n# Idea Seeds\n1. 다양한 교육 환경에서의 투표 프로토콜 효과 분석.\n2. 역할 제약 다중 에이전트 시스템의 실제 교육 적용 사례 연구.\n3. 에이전트 간의 협력 행동을 극대화하기 위한 새로운 프로토콜 개발.\n\n# Citation Snippets\n> Qiu, E. S., & Gill, J. (2026). Voting Protocols as Coordination Mechanisms for Role-Constrained Multi-Agent Tutoring Systems. Proceedings of the 43rd International Conference on Machine Learning.\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy", "link": "https://arxiv.org/abs/2606.08030v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Eric S. Qiu", "Joyce Gill"], "categories": ["cs.MA", "cs.AI"]}, {"id": "2", "source": "ARXIV", "score": 14, "day": "2026-06-07", "title": "Hybrid E-Assessment in Higher Education: Semi-Automated Grading of Paper-Based Written Examinations", "content": "---\ntitle: Hybrid E-Assessment in Higher Education: Semi-Automated Grading of Paper-Based Written Examinations\nauthors: [Hartwig Grabowski, Michael Canz]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2606.08855v1\nresearch_type: 이론적 연구\nmethodology: 문헌 분석 및 제안\ndata_type: 질적 데이터\nsample: 명시되지 않음\ncontext: 고등 교육의 평가 시스템\ntheoretical_framework: 교육 평가 이론\nkeywords: [하이브리드 전자 평가, 종합 평가, 반자동 채점, 필기 인식, 대형 언어 모델]\n---\n\n# APA 7th style\n\n# Summary\n본 논문은 고등 교육에서의 종합 평가에 있어 완전 디지털 및 부분 디지털 전자 평가 접근 방식의 한계를 분석한다. 특히, 폐쇄형 질문 형식으로 인한 교육적 협소화와 대규모 학생 집단에서의 조직적, 기술적, 법적 제약에 초점을 맞춘다. 대안으로, 종합 평가의 문제 지향적 과제를 유지하면서 반자동 채점을 가능하게 하는 하이브리드 전자 평가 접근 방식을 제안한다. 이 접근 방식은 학생들이 손으로 입력한 구조화된 답변 형식으로 평가 관련 중간 결과를 인코딩하며, 필기 인식의 신뢰성을 높이기 위해 최근의 비전 기반 대형 언어 모델을 활용한다.\n\n# Research Logic\n## Problem\n완전 디지털 및 부분 디지털 접근 방식의 한계로 인해 종합 평가의 질이 저하됨.\n\n## Theory\n교육 평가 이론에 기반하여, 평가가 학습에 미치는 영향을 분석.\n\n## Design\n하이브리드 전자 평가 접근 방식을 제안하며, 반자동 채점을 위한 구조화된 답변 형식을 도입.\n\n## Findings\n하이브리드 접근 방식이 평가의 유효성, 공정성 및 확장성을 개선할 수 있음을 발견.\n\n## Conclusion\n기술이 평가 설계를 제한하지 않도록 하여, 종합 평가의 질을 높일 수 있는 가능성을 제시.\n\n# Key Findings\n- 하이브리드 전자 평가 접근 방식이 종합 평가의 유효성을 높일 수 있음.\n- 반자동 채점 시스템이 필기 인식의 신뢰성을 개선할 수 있음.\n- 대형 언어 모델을 활용하여 채점의 공정성을 강화할 수 있음.\n\n# Contributions\n## Theoretical\n종합 평가의 교육적 가치와 기술적 접근 방식 간의 관계를 명확히 함.\n\n## Methodological\n하이브리드 전자 평가의 설계 및 구현을 위한 새로운 방법론 제안.\n\n## Practical\n고등 교육에서의 평가 방식 개선을 위한 실용적인 지침 제공.\n\n# Limitations\n- 특정 기술적 구현의 한계로 인해 인식 성능이 불완전할 수 있음.\n- 대규모 학생 집단에서의 적용 가능성에 대한 실증적 검증 부족.\n\n# Transferable Insights\n- 하이브리드 평가 방식은 다양한 교육 환경에 적용 가능.\n- 반자동 채점 시스템은 다른 과목에서도 활용될 수 있는 가능성 있음.\n\n# Idea Seeds\n1. 하이브리드 전자 평가의 다양한 과목 적용 가능성 연구.\n2. 반자동 채점 시스템의 성능 개선을 위한 기술적 접근 방식 탐색.\n3. 학생들의 필기 인식 성능 향상을 위한 교육적 개입 방안 개발.\n\n# Citation Snippets\n> Grabowski, H., & Canz, M. (2026). Hybrid E-Assessment in Higher Education: Semi-Automated Grading of Paper-Based Written Examinations. arXiv. https://arxiv.org/abs/2606.08855v1\n\ntags: #하이브리드전자평가, #종합평가, #반자동채점, #필기인식, #대형언어모델, #교육평가, #고등교육", "link": "https://arxiv.org/abs/2606.08855v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Hartwig Grabowski", "Michael Canz"], "categories": ["cs.AI", "cs.CV", "cs.CY"]}, {"id": "3", "source": "ARXIV", "score": 11, "day": "2026-06-08", "title": "Automated IEP Generation from Traditional Chinese Parent-Teacher Interviews via Corpus-Grounded Feature Diffusion", "content": "---\ntitle: Automated IEP Generation from Traditional Chinese Parent-Teacher Interviews via Corpus-Grounded Feature Diffusion\nauthors: [Kuanlin Chen, Cheng-En Ou]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2606.09603v1\nresearch_type: 실험적 연구\nmethodology: 저자 제안의 저자 중심 파이프라인\ndata_type: 텍스트 데이터\nsample: 582개 샘플\ncontext: 대만의 전통 중국어 특수 교육\ntheoretical_framework: 산업 공학 관점\nkeywords: [IEP, 전통 중국어 NLP, 합성 데이터 생성, 특징 확산, LLM-판사, 문법 제약 디코딩, QLoRA, 산업 공학]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 전통 중국어의 개별화 교육 프로그램(IEP) 생성을 위한 자동화 시스템을 제안한다. 연구는 데이터 부족, 엄격한 개인정보 보호 규정, 지역 평가 기준의 부재로 인해 전통 중국어에서의 자동화된 IEP 생성이 거의 탐구되지 않았음을 지적한다. 저자들은 Corpus-Grounded Feature Diffusion(CGFD) 기반의 저자원 미세 조정 파이프라인을 제안하며, 이를 통해 582개의 샘플을 생성하고, 문법 제약 디코딩(GCD)을 통한 추론을 수행하였다. 연구 결과, GCD가 전통 중국어의 토큰 예산 하에서 비생산적임을 발견하였고, GCD를 사용하지 않은 경로가 더 높은 신뢰성과 속도를 보였다. 이 시스템은 전통 중국어 특수 교육 NLP의 격차를 해소하고, 산업 공학 패러다임 하에서 확장 가능하고 개인정보를 보호하는 로컬 추론 솔루션을 제공한다.\n\n# Research Logic\n## Problem\n전통 중국어에서의 IEP 작성은 데이터 부족과 개인정보 보호 문제로 인해 자동화가 거의 이루어지지 않음.\n## Theory\n산업 공학 관점에서 IEP 작성의 비효율성을 해결하기 위한 자동화 필요성.\n## Design\nCorpus-Grounded Feature Diffusion(CGFD) 기반의 저자원 미세 조정 파이프라인 설계.\n## Findings\nGCD가 전통 중국어의 토큰 예산 하에서 비생산적이며, GCD를 사용하지 않은 경로가 더 높은 성능을 보임.\n## Conclusion\n제안된 시스템은 전통 중국어 특수 교육 분야의 NLP 격차를 해소하고, 개인정보 보호를 유지하는 로컬 추론 솔루션을 제공함.\n\n# Key Findings\n- GCD를 사용하지 않은 경로가 100%의 스키마 통과율을 달성하며, GCD 경로보다 34% 낮은 중간 지연 시간을 기록함.\n- BERTScore F1 = 0.779로, 여러 모델의 제로샷 기준을 초과함.\n- 제안된 시스템은 전통 중국어 특수 교육 NLP의 격차를 해소함.\n\n# Contributions\n## Theoretical\n전통 중국어 특수 교육 NLP 분야의 연구 기여.\n## Methodological\n저자원 환경에서의 합성 데이터 생성 방법론 확장.\n## Practical\n개인정보 보호를 유지하는 로컬 IEP 생성 솔루션 제공.\n\n# Limitations\n- 전통 중국어의 특정 문법적 제약으로 인해 GCD의 비효율성 발견.\n- 데이터 부족으로 인한 일반화 가능성의 제한.\n\n# Transferable Insights\n- 저자원 환경에서의 데이터 생성 및 처리 방법론의 적용 가능성.\n- 특수 교육 분야에서의 AI 활용 방안 제시.\n\n# Idea Seeds\n1. 전통 중국어 외 다른 언어로의 IEP 자동화 시스템 개발.\n2. GCD의 효율성을 높이기 위한 새로운 접근법 연구.\n3. AI 기반 교육 도구의 사용자 경험 개선 방안 탐색.\n\n# Citation Snippets\n> Chen, K., & Ou, C.-E. (2026). Automated IEP Generation from Traditional Chinese Parent-Teacher Interviews via Corpus-Grounded Feature Diffusion. arXiv. https://arxiv.org/abs/2606.09603v1\n\ntags: #IEP, #전통중국어, #NLP, #합성데이터, #AI, #교육기술, #산업공학\n\n---\n\n요약: 본 연구는 전통 중국어에서의 개별화 교육 프로그램(IEP) 자동화를 위한 시스템을 제안하며, 데이터 부족과 개인정보 보호 문제를 해결하고자 한다. 연구 결과, 문법 제약 디코딩(GCD)이 비생산적임을 발견하고, GCD를 사용하지 않은 경로가 더 높은 성능을 보였다. 이 시스템은 전통 중국어 특수 교육 NLP의 격차를 해소하고 개인정보를 보호하는 로컬 추론 솔루션을 제공한다.", "link": "https://arxiv.org/abs/2606.09603v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Kuanlin Chen", "Cheng-En Ou"], "categories": ["cs.CL"]}, {"id": "4", "source": "ARXIV", "score": 10, "day": "2026-06-08", "title": "Orange Lab: Lowering Barriers to Data Mining through Embedded Interactive Workflows", "content": "---\ntitle: Orange Lab: Lowering Barriers to Data Mining through Embedded Interactive Workflows\nauthors: \n  - Matej Bevec\n  - Aleš Erjavec\n  - Vesna Tanko\n  - Lena Trnovec\n  - Lan Žagar\n  - Ana Farič\n  - Janez Demšar\n  - Blaž Zupan\nyear: 2026\njournal: Arxiv\ndoi: https://doi.org/10.1145/nnnnnnn.nnnnnnn\nresearch_type: 실험적 연구\nmethodology: 웹 기반 협업 환경 설계 및 구현\ndata_type: 데이터 분석 워크플로우\nsample: 명시되지 않음\ncontext: 데이터 리터러시 교육\ntheoretical_framework: 시각적 프로그래밍, 데이터 흐름 패러다임\nkeywords: [visual programming, dataflow, exploratory data analysis, data mining, machine learning, web-based systems, data literacy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 Orange Lab이라는 웹 기반 협업 환경을 통해 데이터 분석 워크플로우의 시각적 프로그래밍을 지원하고, 이를 통해 데이터 과학의 민주화를 촉진하는 방법을 제시한다. Orange Lab은 사용자가 모듈형 구성 요소를 통해 기계 학습 워크플로우를 시각적으로 구성할 수 있도록 하며, 각 구성 요소 간의 상호작용이 원활하게 전파되어 정적 파이프라인을 동적이고 반응적인 시스템으로 변환한다. 연구의 주요 기여는 구성 요소 노출(component exposition) 패러다임으로, 이를 통해 사용자는 선택된 워크플로우 구성 요소를 임의의 웹 맥락에 삽입할 수 있으며, 이는 사용자 친화적인 분석 뷰와 내러티브 중심의 경험을 가능하게 한다. 데이터 리터러시 교육에의 적용을 통해 Orange Lab이 진입 장벽을 낮추고 데이터 과학의 민주화를 지원함을 보여준다.\n\n# Research Logic\n## Problem\n데이터 분석 파이프라인의 공유 및 적응이 어려워 데이터 과학의 접근성이 제한됨.\n## Theory\n시각적 프로그래밍과 데이터 흐름 패러다임을 활용하여 비전문가도 데이터 분석에 참여할 수 있도록 함.\n## Design\n웹 기반 협업 환경에서 모듈형 구성 요소를 통해 기계 학습 워크플로우를 시각적으로 구성.\n## Findings\n구성 요소 노출 패러다임을 통해 사용자 친화적인 인터페이스를 제공하며, 데이터 리터러시 교육에서 효과적임을 입증.\n## Conclusion\nOrange Lab은 데이터 과학의 민주화를 지원하며, 비전문가가 데이터 분석에 쉽게 접근할 수 있도록 돕는다.\n\n# Key Findings\n- Orange Lab은 시각적 프로그래밍을 통해 데이터 분석의 접근성을 높인다.\n- 구성 요소 노출 패러다임을 통해 사용자 맞춤형 분석 뷰를 생성할 수 있다.\n- 데이터 리터러시 교육에서 효과적으로 활용될 수 있음을 입증하였다.\n\n# Contributions\n## Theoretical\n데이터 과학의 민주화에 기여하는 새로운 시각적 프로그래밍 접근법 제시.\n## Methodological\n웹 기반 협업 환경에서의 데이터 분석 워크플로우 설계 및 구현 방법론 제안.\n## Practical\n비전문가가 데이터 분석에 쉽게 접근할 수 있도록 돕는 도구 제공.\n\n# Limitations\n- 특정 교육 맥락에서만 검증되었으며, 일반화 가능성에 대한 추가 연구 필요.\n- 사용자 인터페이스의 복잡성에 대한 학습 곡선이 존재할 수 있음.\n\n# Transferable Insights\n- 데이터 분석 도구의 접근성을 높이기 위한 시각적 프로그래밍의 중요성.\n- 교육적 맥락에서의 데이터 분석 도구 활용 가능성.\n\n# Idea Seeds\n1. Orange Lab을 활용한 다양한 교육 프로그램 개발.\n2. 다른 도메인에서의 데이터 분석 도구로의 확장 가능성 탐색.\n3. 사용자 경험을 개선하기 위한 인터페이스 디자인 연구.\n\n# Citation Snippets\n> Bevec, M., Erjavec, A., Tanko, V., Trnovec, L., Žagar, L., Farič, A., Demšar, J., & Zupan, B. (2026). Orange Lab: Lowering Barriers to Data Mining through Embedded Interactive Workflows. Arxiv. https://doi.org/10.1145/nnnnnnn.nnnnnnn\n\ntags: #데이터과학, #시각적프로그래밍, #데이터리터러시, #기계학습, #웹기반시스템, #교육, #협업환경", "link": "https://arxiv.org/abs/2606.09239v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Matej Bevec", "Aleš Erjavec", "Vesna Tanko"], "categories": ["cs.LG", "cs.HC"]}, {"id": "5", "source": "ARXIV", "score": 9, "day": "2026-06-07", "title": "Distilling LLM Reasoning into an Interpretable Policy Tree for Human-AI Collaboration", "content": "Constructing efficient and reliable policies to assist humans is indispensable for human-AI collaboration. Existing methods mainly follow two lines of work. Most prior work relies on multi-agent reinforcement learning (MARL) to learn black-box policies, which limits interpretability and raises safety concerns. Recent methods query large language models (LLMs) at each decision step, causing slow responses and high inference costs. We propose Collaboration Policy Tree (Co-pi-tree), a closed-loop method that learns an executable policy tree consisting of a partner-behavior prediction tree and an agent-action selection tree. Co-pi-tree constructs a policy by distilling LLM reasoning into policy tree code. It then evaluates the policy through partner interaction, obtains feedback, and uses natural language to summarize the interaction feedback to improve problematic branches. Experiments in Overcooked-AI show that Co-pi-tree improves average reward by 35.4% over the baseline average, while reducing the number of LLM queries by 77.7% and test-time latency by 97.1%. Project page: https://beiwenzhang.github.io/Co-pi-tree/", "link": "https://arxiv.org/abs/2606.08596v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Beiwen Zhang", "Yongheng Liang", "Guowei Zou"], "categories": ["cs.AI", "cs.HC"]}, {"id": "6", "source": "ARXIV", "score": 8, "day": "2026-06-07", "title": "Impacts of Histories and Models on LLM Grading: A Study in Advanced Software Engineering Courses", "content": "Graduate-level research reading report assessment creates a substantial labor burden for educators. While large language models (LLMs) hold great potential for automating academic grading, their reliability for this specialized task remains understudied, particularly regarding grading consistency, the lack of which represents a primary obstacle to educational fairness. This paper proposes a human-aligned LLM-assisted grading workflow and presents a case study based on 180 student submissions from a graduate advanced software engineering course. We evaluate two mainstream LLMs, Grok and GPT, in terms of grading consistency and alignment with human scores. We find LLMs exhibit distinct levels of intra-model consistency and significant inter-model grading inconsistencies, while simple ensemble approaches cannot improve alignment with human evaluation. Critically, continuous interaction history drives systematic drift in models' grading standards away from human expert scores. Our findings demonstrate LLMs' potential in reducing grading workload for educators in graduate education, while highlighting that indiscriminate LLM grading may introduce systemic unfairness, suggesting that specific operational practices are required to mitigate such disparities.", "link": "https://arxiv.org/abs/2606.08400v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Qilin Zhou", "Zhuo Wang", "Yue Li"], "categories": ["cs.SE", "cs.AI", "cs.CL"]}, {"id": "7", "source": "ARXIV", "score": 8, "day": "2026-06-05", "title": "TibetCPR: A Multimodal Tactile Feedback System to Enhance Cardiopulmonary Resuscitation Training in High-Altitude Regions of Tibet", "content": "High-quality cardiopulmonary resuscitation (CPR) requires stable control of compression rhythm and depth, yet most training systems presuppose instructor mediation, repeated practice, and explanatory guidance-assumptions that do not hold in the Tibet Autonomous Region, where instruction is fragmented and learners' linguistic and educational backgrounds are heterogeneous. We present TibetCPR, a low-cost, self-guided CPR training system that pairs depth-driven electrotactile feedback with rhythm-driven visual cues within a Tibetan-language narrative. In a randomised study with 40 lay community members aged 19--56, the experimental group showed progressive minute-by-minute stabilisation of rhythm and depth across a 10-minute intervention, substantially exceeding an unguided-practice control, with gains transferring to an unscaffolded one-minute post-test. Qualitative accounts described the feedback as legible through participants' bodily action, and usability was high (SUS = 84.3). We synthesise three transferable design principles for self-guided embodied training: feedback as a calibration reference, not an immediate corrector; modality temporal granularity matched to behaviour's temporal structure; and autonomous interpretability as a deployment prerequisite, not an after-effect of usability.", "link": "https://arxiv.org/abs/2606.07765v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Yibo Meng", "Ruiqi Chen", "Zhiming Liu"], "categories": ["cs.HC"]}, {"id": "8", "source": "ARXIV", "score": 6, "day": "2026-06-08", "title": "Civil Court Simulation with Large Language Models", "content": "Court simulation bridges legal education and judicial practice, yet human-based simulations are costly and difficult to scale. Large language models (LLMs) offer a scalable alternative, but existing court-simulation research mainly focuses on criminal cases. Civil litigation is more common in practice and harder to simulate because its claims, liability, and remedies are more flexible. We present a multi-agent court simulation framework for Chinese civil cases. The framework organizes role-based interaction through a five-stage civil trial procedure and integrates memory module and statute retrieval to support long-process adjudication. Experiments show that the framework produces reliable civil judgments, with clear strengths in liability allocation and multi-item adjudication. Further experiments show that memory quality substantially affects downstream simulation quality. Through a five-layer factor framework, we analyze how legal grounding, information conditions, judicial capability and role orientation, organizational pressure, and social context affect the framework's reliability and behavior. These results support the effectiveness of the proposed framework for civil court simulation. The dataset and code are available at: https://github.com/foggpoy/Civil-Court.", "link": "https://arxiv.org/abs/2606.09632v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Yifan Chen", "Haitao Li", "Kaiyuan Zhang"], "categories": ["cs.CL"]}, {"id": "9", "source": "ARXIV", "score": 6, "day": "2026-06-08", "title": "Structure-Aware Modeling of Multiple-Choice Questions Improves Automatic Difficulty Estimation", "content": "Automatic Question Difficulty Estimation (AQDE) holds growing promise for educational assessment because it has the potential to yield difficulty estimates that are competitive with expert judgment, while helping reduce the time and financial burden associated with pilot administrations and scaling to digital testing contexts. Prior AQDE studies report mixed evidence on whether adding distractors as additional text to the question stem and the correct key consistently improves difficulty prediction. We hypothesize that the effectiveness of distractor information depends on its structural representation, and that explicitly modeling distractors as separate components improves difficulty estimation over baselines that omit this information. To address this, we designed controlled architectures that model MCQ components as distinct inputs to isolate the contribution of distractor content and order. Specifically, we represented distractors by encoding each distractor as its own text input and aggregating their representations either with order-aware concatenation (with positional tags) or with an order-invariant summation. We evaluated these architectures using two Chilean datasets (Natural and Social Sciences, 2016-2020; 4,114 multiple-choice questions). Compared to a simpler model that only used the question stem and the key, our best distractor-aware architecture achieved higher predictive performance, reaching R^2 = 0.83 for Natural Sciences and R^2 = 0.71 for Social Sciences items. An order-invariant variant achieved nearly the same accuracy with approximately half as many parameters, offering a favorable accuracy-efficiency trade-off. These results show that structural information (especially distractor content) drives gains in predictive accuracy, supporting the development of efficient, structure-aware models that are computationally viable for large-scale educational applications.", "link": "https://arxiv.org/abs/2606.08988v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Gabriel Ortega", "Abelino Jiménez", "Séverin Lions"], "categories": ["cs.CL", "cs.LG"]}];
let PAGE_SIZE = 10;
let currentTab = 'all';
let currentSource = 'ALL';
let currentSort = 'score';
let currentPage = 1;
let currentCategory = '';
let currentMinDate = '';
let currentMaxDate = '';
let hideVisited = false;
let filtered = [];
let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
let searchHistory = JSON.parse(localStorage.getItem('searchHistory')) || [];
let visited = JSON.parse(localStorage.getItem('visited')) || [];

function toggleTheme() {
  const html = document.documentElement;
  const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
  html.dataset.theme = next;
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  localStorage.setItem('theme', next);
}

function toggleTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSource(btn) {
  currentSource = btn.dataset.source;
  document.querySelectorAll('#sourceFilters .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSort(btn) {
  currentSort = btn.dataset.sort;
  document.querySelectorAll('#sortGroup .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  render();
}

function toggleFavorite(id, e) {
  e.stopPropagation();
  const idx = favorites.indexOf(id);
  if (idx === -1) {
    favorites.push(id);
  } else {
    favorites.splice(idx, 1);
  }
  localStorage.setItem('favorites', JSON.stringify(favorites));
  applyFilters();
}

function recordVisit(id) {
  if (!visited.includes(id)) {
    visited.push(id);
  }
  localStorage.setItem('visited', JSON.stringify(visited));
}

function recordSearch(query) {
  if (query.trim() && !searchHistory.includes(query)) {
    searchHistory.unshift(query);
    if (searchHistory.length > 10) searchHistory.pop();
    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
  }
}

function downloadJSON() {
  const data = JSON.stringify(filtered, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadCSV() {
  const headers = ['제목', '출처', '스코어', '리뷰여부', '링크'];
  const rows = filtered.map(p => [
    '"' + p.title.replace(/"/g, '""') + '"',
    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
