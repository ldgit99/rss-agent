<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-06-07 00:03</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "ARXIV", "score": 24, "day": "2026-06-03", "title": "The Role of Instructional Guidance in Generative AI-Assisted Learning: Empirical Evidence from Construction Engineering Education", "content": "---\ntitle: The Role of Instructional Guidance in Generative AI-Assisted Learning: Empirical Evidence from Construction Engineering Education\nauthors: [Xiaoyu Hou, Bo Xiao, Hexu Liu, Shane Mueller]\nyear: 2026\njournal: 명시되지 않음\ndoi: https://arxiv.org/abs/2606.05509v1\nresearch_type: 실증 연구\nmethodology: 통제된 실험\ndata_type: 양적 데이터\nsample: 명시되지 않음\ncontext: 건설 교육\ntheoretical_framework: 생성 학습 이론 (Generative Learning Theory)\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 생성 인공지능(AI)이 건설 교육에서 학생의 자기 주도 학습을 지원하는 방식과 그 상호작용을 구조화하는 교수 안내의 역할을 조사하였다. 연구에서는 생성 학습 이론에 기반한 다섯 단계의 프롬프트 프레임워크를 도입하여 학습자의 상호작용을 안내하였다. 세 가지 학습 조건(슬라이드 기반 학습, 비프롬프트 AI 지원 학습, 프롬프트 AI 지원 학습)을 비교하는 통제된 실험을 통해 학습 성과를 평가하였다. 결과적으로 프롬프트 조건이 개방형 과제에서 약 2-3점의 향상을 보였으며(p < 0.01), 다중 선택 과제에서는 유의미한 차이가 없었다. 이 연구는 AI 지원 학습의 효과가 상호작용의 구조에 따라 달라진다는 것을 시사하며, 제안된 프레임워크는 건설 교육에서 생성 AI 시스템의 통합을 위한 기초를 제공한다.\n\n# Research Logic\n## Problem\n학생들이 생성 AI와 상호작용할 때 비구조적인 접근이 깊은 인지 과정에 대한 참여를 제한한다는 문제를 다룬다.\n\n## Theory\n생성 학습 이론(Generative Learning Theory)을 기반으로 하여 학습자가 정보를 조직하고 이전 지식과 연결하여 이해를 구축하는 과정을 설명한다.\n\n## Design\n슬라이드 기반 학습, 비프롬프트 AI 지원 학습, 프롬프트 AI 지원 학습의 세 가지 조건을 비교하는 통제된 실험을 설계하였다.\n\n## Findings\n프롬프트 조건에서 개방형 과제의 성과가 유의미하게 향상되었으며, 비프롬프트 조건은 슬라이드 기반 학습과 유사한 성과를 보였다.\n\n## Conclusion\nAI 지원 학습의 효과는 상호작용의 구조에 따라 달라지며, 구조화된 프롬프트가 학습 성과를 개선할 수 있음을 보여준다.\n\n# Key Findings\n- 프롬프트 조건에서 개방형 과제 점수가 약 2-3점 향상됨(p < 0.01).\n- 비프롬프트 조건은 슬라이드 기반 학습과 유사한 성과를 보임.\n- AI 지원 학습의 효과는 상호작용의 구조에 의존함.\n\n# Contributions\n## Theoretical\n생성 학습 이론을 기반으로 한 교수 안내의 중요성을 강조함.\n\n## Methodological\n구조화된 프롬프트를 통한 학습 성과 개선의 실증적 증거를 제공함.\n\n## Practical\n건설 교육에서 AI 시스템의 효과적인 통합을 위한 프레임워크를 제안함.\n\n# Limitations\n- 샘플 크기 및 특성이 명시되지 않음.\n- 특정 교육 맥락에 국한된 결과일 수 있음.\n\n# Transferable Insights\n- 구조화된 프롬프트가 학습 성과에 미치는 긍정적인 영향을 다른 교육 분야에도 적용할 수 있음.\n- AI와의 상호작용을 개선하기 위한 교수 설계의 필요성을 강조함.\n\n# Idea Seeds\n1. 다양한 교육 분야에서의 구조화된 프롬프트 적용 연구.\n2. AI 지원 학습 환경에서의 사용자 경험 개선 방안 탐색.\n3. 생성 학습 이론을 기반으로 한 새로운 교수 전략 개발.\n\n# Citation Snippets\n> Hou, X., Xiao, B., Liu, H., & Mueller, S. (2026). The Role of Instructional Guidance in Generative AI-Assisted Learning: Empirical Evidence from Construction Engineering Education. \n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #ai literacy, #education\n\n---\n\n요약: 본 연구는 생성 AI가 건설 교육에서 학생의 자기 주도 학습을 지원하는 방식과 교수 안내의 역할을 조사하였다. 다섯 단계의 프롬프트 프레임워크를 통해 학습자의 상호작용을 구조화하였고, 프롬프트 조건에서 개방형 과제 성과가 유의미하게 향상됨을 발견하였다. AI 지원 학습의 효과는 상호작용의 구조에 따라 달라진다는 점을 강조하였다.", "link": "https://arxiv.org/abs/2606.05509v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Xiaoyu Hou", "Bo Xiao", "Hexu Liu"], "categories": ["cs.HC", "cs.AI"]}, {"id": "1", "source": "ARXIV", "score": 19, "day": "2026-06-03", "title": "Large Language Models in K-12 Education: Alignment with State Curriculum Standards and Student Personas", "content": "---\ntitle: K-12 교육에서의 대형 언어 모델: 주 교육 과정 기준 및 학생 페르소나와의 정렬\nauthors: [Lisa Korver, Tomo Lazovich, Sherief Reda]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2606.04846v1\nresearch_type: 실증 연구\nmethodology: LLM 기반 파이프라인 개발 및 제어된 실험\ndata_type: 질적 및 양적 데이터\nsample: 미국 내 다양한 주의 교육 과정 기준\ncontext: K-12 교육 환경에서의 LLM 사용\ntheoretical_framework: 교육 과정 정렬 이론\nkeywords: [대형 언어 모델, 교육, 윤리적 고려, 교육 과정, 학생 페르소나, AI 교육]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 대형 언어 모델(LLMs)이 K-12 교육에서 주 교육 과정 기준과 얼마나 잘 정렬되는지를 분석한다. 미국의 교육 과정 기준은 주마다 상이하므로, LLM이 이러한 차이를 반영하는지 평가하기 위해 LLM 기반의 파이프라인을 개발하였다. 또한, 사용자 페르소나(지리적 위치, 학년, 성별, 인종 등)에 따라 LLM의 반응이 어떻게 달라지는지를 제어된 실험을 통해 조사하였다. 연구 결과, LLM은 역사적 주제의 제시 방식을 조정할 수 있지만, 이는 주의 정치적 성향에 따라 달라지며 실제 교육 과정 내용을 반드시 반영하지는 않는다. 이러한 발견은 LLM의 사용이 학생의 학습 결과에 미칠 수 있는 잠재적 위험을 강조하며, 더 강력한 정렬 기법의 필요성을 제기한다.\n\n# Research Logic\n## Problem\n대형 언어 모델이 주 교육 과정 기준과 얼마나 잘 정렬되는지에 대한 명확한 이해 부족.\n\n## Theory\n교육 과정 정렬 이론을 기반으로 LLM의 반응이 주별 교육 기준과 어떻게 일치하는지를 분석.\n\n## Design\nLLM 기반 파이프라인을 통해 미국 역사 교육 과정의 변이를 식별하고, 제어된 실험을 통해 사용자 페르소나에 따른 LLM 반응의 민감성을 평가.\n\n## Findings\nLLM은 주별 역사적 주제의 제시 방식을 조정할 수 있으나, 이는 정치적 성향에 따라 달라지며, 인종이나 성별에 대한 민감성은 낮다.\n\n## Conclusion\nLLM의 사용이 학생의 학습 결과에 미치는 위험을 강조하며, 교육 과정 기준과의 정렬을 위한 더 강력한 기법이 필요하다.\n\n# Key Findings\n- LLM은 주별 교육 과정 기준의 차이를 반영하지 못할 수 있다.\n- LLM의 반응은 주의 정치적 성향에 따라 달라질 수 있다.\n- LLM은 학생의 학년에는 잘 적응하지만, 인종이나 성별에는 민감하지 않다.\n\n# Contributions\n## Theoretical\n교육 과정 정렬 이론에 대한 새로운 통찰 제공.\n\n## Methodological\nLLM 기반의 새로운 평가 메트릭스 및 파이프라인 개발.\n\n## Practical\nK-12 교육에서 LLM 사용 시 주 교육 기준과의 정렬 필요성 강조.\n\n# Limitations\n- 연구는 특정 주의 교육 과정 기준에 국한되어 있다.\n- LLM의 반응을 평가하는 데 사용된 페르소나의 다양성이 제한적이다.\n\n# Transferable Insights\n- LLM의 교육적 활용에 있어 주 교육 기준과의 정렬이 중요하다.\n- 사용자 페르소나에 따른 LLM의 반응 차이를 이해하는 것이 필요하다.\n\n# Idea Seeds\n1. LLM의 교육 과정 정렬을 위한 자동화된 평가 도구 개발.\n2. 다양한 주의 교육 기준을 반영한 LLM 훈련 데이터셋 구축.\n3. LLM의 반응을 개선하기 위한 사용자 피드백 시스템 설계.\n\n# Citation Snippets\n> Korver, L., Lazovich, T., & Reda, S. (2026). Large Language Models in K-12 Education: Alignment with State Curriculum Standards and Student Personas. arXiv. https://arxiv.org/abs/2606.04846v1\n\ntags: #대형언어모델, #교육, #AI교육, #교육과정, #학생페르소나, #윤리적고려, #AI리터러시\n\n---\n\n요약: 본 연구는 대형 언어 모델(LLMs)이 K-12 교육에서 주 교육 과정 기준과 얼마나 잘 정렬되는지를 분석하고, 사용자 페르소나에 따른 LLM의 반응 변화를 조사하였다. 연구 결과, LLM은 주의 정치적 성향에 따라 역사적 주제를 조정할 수 있지만, 실제 교육 과정 내용과는 일치하지 않을 수 있음을 발견하였다. 이러한 결과는 LLM의 사용이 학생의 학습 결과에 미칠 수 있는 위험을 강조하며, 교육 과정 기준과의 정렬을 위한 개선이 필요함을 시사한다.", "link": "https://arxiv.org/abs/2606.04846v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Lisa Korver", "Tomo Lazovich", "Sherief Reda"], "categories": ["cs.CL"]}, {"id": "2", "source": "ARXIV", "score": 15, "day": "2026-05-30", "title": "Where's the Structure? A Systematic Literature Review of Empirical Research on Human-AI Collaboration and Hybrid Intelligence for Learning", "content": "---\ntitle: Where's the Structure? A Systematic Literature Review of Empirical Research on Human-AI Collaboration and Hybrid Intelligence for Learning\nauthors: [Luis P. Prieto, Juan I. Asensio-Pérez, María Jesús Rodríguez-Triana, Mohamed Saban, Yannis Dimitriadis]\nyear: 2026\njournal: 명시되지 않음\ndoi: https://arxiv.org/abs/2606.05222v1\nresearch_type: 문헌 리뷰\nmethodology: 체계적 문헌 리뷰\ndata_type: 실증 연구\nsample: 62개의 연구\ncontext: 교육적 맥락\ntheoretical_framework: 하이브리드 지능, 인간-AI 협력\nkeywords: [human-ai collaboration, hybrid intelligence, education, learning support, systematic literature review]\n---\n\n# APA 7th style\n\n# Summary\n이 논문은 교육적 맥락에서 학습 지원을 위한 인간-AI 협력 및 하이브리드 지능에 대한 실증 연구 62편을 체계적으로 검토한 결과를 보고한다. 연구는 협력 프로세스, 구조 및 적용 맥락을 특징짓고, 새로운 설계 지식과 연구의 공백을 추출한다. 연구자와 기술 설계자는 이러한 결과를 바탕으로 교육 실천 및 향후 연구를 위한 보다 효과적인 AI 기반 협력 기술을 구조화하는 출발점으로 활용할 수 있다.\n\n# Research Logic\n## Problem\n인간-AI 협력이 비구조적 상호작용으로 인해 효과적인 학습 경험을 제공하지 못할 수 있다는 문제를 다룬다.\n## Theory\n하이브리드 지능 및 인간-AI 협력의 개념을 기반으로 하여, 인간과 AI의 상호작용을 통해 학습을 지원하는 방안을 모색한다.\n## Design\n체계적 문헌 리뷰 방법론을 사용하여 1,632개의 자료 중 62개의 연구를 심층 분석하였다.\n## Findings\n협력 프로세스와 구조에 대한 다양한 연구 결과를 제시하며, 교육적 맥락에서의 AI 활용에 대한 설계 지식을 도출하였다.\n## Conclusion\n효과적인 인간-AI 협력을 위한 구조적 접근이 필요하며, 이를 통해 교육 기술 설계에 기여할 수 있음을 강조한다.\n\n# Key Findings\n- 인간-AI 협력의 비구조적 상호작용이 학습 효과에 부정적인 영향을 미칠 수 있다.\n- 협력 프로세스의 구조화가 학습 성과를 향상시킬 수 있는 가능성이 있다.\n- 새로운 설계 패턴이 교육 기술 개발에 유용할 수 있다.\n\n# Contributions\n## Theoretical\n하이브리드 지능 및 인간-AI 협력의 이론적 기초를 강화한다.\n## Methodological\n체계적 문헌 리뷰를 통해 연구의 공백과 향후 연구 방향을 제시한다.\n## Practical\nAI 기반 교육 기술 설계에 대한 실질적인 지침을 제공한다.\n\n# Limitations\n- 연구의 범위가 특정 교육적 맥락에 국한되어 있다.\n- 비구조적 상호작용의 부정적 영향에 대한 명확한 증거가 부족하다.\n\n# Transferable Insights\n- 인간-AI 협력의 구조적 접근이 학습 성과에 긍정적인 영향을 미칠 수 있다.\n- 교육 기술 설계에서 협력 프로세스를 명확히 정의하는 것이 중요하다.\n\n# Idea Seeds\n1. 인간-AI 협력의 구조적 요소를 정의하는 연구.\n2. 다양한 교육적 맥락에서의 하이브리드 지능 활용 사례 분석.\n3. AI 기반 교육 기술의 효과성을 평가하기 위한 새로운 평가 도구 개발.\n\n# Citation Snippets\n> Prieto, L. P., Asensio-Pérez, J. I., Rodríguez-Triana, M. J., Saban, M., & Dimitriadis, Y. (2026). Where's the Structure? A Systematic Literature Review of Empirical Research on Human-AI Collaboration and Hybrid Intelligence for Learning.\n\ntags: #human-ai collaboration, #hybrid intelligence, #education, #learning support, #systematic literature review, #AI pedagogy, #instructional design", "link": "https://arxiv.org/abs/2606.05222v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Luis P. Prieto", "Juan I. Asensio-Pérez", "María Jesús Rodríguez-Triana"], "categories": ["cs.CY", "cs.AI", "cs.HC"]}, {"id": "3", "source": "ARXIV", "score": 13, "day": "2026-06-04", "title": "Causal Scaffolding for Physical Reasoning: A Benchmark for Causally-Informed Physical World Understanding in VLMs", "content": "---\ntitle: Causal Scaffolding for Physical Reasoning: A Benchmark for Causally-Informed Physical World Understanding in VLMs\nauthors: [Tianyi Tang, Zhuoyi Lin, Zeyu Feng, Tianyi Ma, Yew-Soon Ong, Ivor Tsang, Haiyan Yin]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2606.05966v1\nresearch_type: 기초 연구\nmethodology: 실험적 연구\ndata_type: 비디오 및 이미지 기반 질문\nsample: 3,000개 이상의 질문\ncontext: 물리적 세계 이해를 위한 비전-언어 모델(VLMs)의 causal reasoning\ntheoretical_framework: Pearl의 인과적 사다리\nkeywords: [causal reasoning, physical reasoning, vision-language models, causal graphs, benchmark, AI, machine learning]\n---\n\n# APA 7th style\n\n# Summary\n이 연구는 물리적 세계에 대한 이해와 추론이 지능적 행동의 기초임을 강조하며, 현재의 비전-언어 모델(VLMs)이 인과적 물리적 추론에서 실패하는 문제를 다룬다. 이를 해결하기 위해 CausalPhys라는 벤치마크를 소개하며, 3,000개 이상의 비디오 및 이미지 기반 질문을 통해 인과적 이해를 평가할 수 있는 구조적 인과 그래프를 제공한다. 연구는 VLM의 인과적 추론 실패를 진단하고, Causal Rationale-informed Fine-Tuning (CRFT) 방법론을 통해 모델의 추론 정확성과 해석 가능성을 향상시키는 방법을 제안한다. 이 연구는 VLMs의 물리적 추론 능력을 향상시키기 위한 강력한 기초를 마련한다.\n\n# Research Logic\n## Problem\n현재의 VLMs는 인과적 물리적 추론에서 신뢰할 수 없는 결과를 생성하며, 이는 물리적 상호작용에 대한 이해 부족에서 기인한다.\n\n## Theory\nPearl의 인과적 사다리를 기반으로 한 인과적 이해의 수준을 정의하고, 이를 통해 VLM의 물리적 추론 능력을 평가한다.\n\n## Design\nCausalPhys 벤치마크는 3,000개 이상의 질문과 전문가가 주석을 단 인과 그래프를 포함하여, 물리적 세계의 다양한 시나리오를 포괄한다.\n\n## Findings\nVLMs는 인과적 의존성을 포착하는 데 시스템적인 격차가 있으며, CRFT 방법론을 통해 이러한 격차를 줄일 수 있음을 발견하였다.\n\n## Conclusion\nCausalPhys는 VLMs의 물리적 추론 능력을 향상시키기 위한 체계적이고 해석 가능한 평가 기준을 제공하며, 인과적 학습의 필요성을 강조한다.\n\n# Key Findings\n- CausalPhys는 3,000개 이상의 비디오 및 이미지 기반 질문을 포함한다.\n- VLMs의 인과적 추론 실패를 진단할 수 있는 새로운 메트릭을 제안한다.\n- CRFT 방법론은 VLM의 추론 정확성과 해석 가능성을 크게 향상시킨다.\n\n# Contributions\n## Theoretical\n인과적 물리적 추론을 위한 새로운 평가 기준과 메트릭을 제시하였다.\n\n## Methodological\nCausalPhys 벤치마크와 CRFT 방법론을 통해 VLM의 인과적 이해를 체계적으로 평가할 수 있는 방법을 개발하였다.\n\n## Practical\nVLMs의 물리적 추론 능력을 향상시키기 위한 실용적인 접근 방식을 제공한다.\n\n# Limitations\n- 현재 벤치마크는 특정 물리적 시나리오에 국한되어 있다.\n- 인과적 이해의 복잡성을 완전히 포착하지 못할 수 있다.\n\n# Transferable Insights\n- 인과적 추론을 위한 데이터셋 구축의 중요성을 강조한다.\n- VLMs의 인과적 이해를 향상시키기 위한 체계적인 접근 방식이 필요하다.\n\n# Idea Seeds\n1. 다양한 물리적 시나리오를 포함하는 추가적인 벤치마크 개발.\n2. 인과적 추론을 위한 교육 프로그램 개발.\n3. VLMs의 인과적 이해를 평가하기 위한 새로운 메트릭 개발.\n\n# Citation Snippets\n> Tang, T., Lin, Z., Feng, Z., Ma, T., Ong, Y.-S., Tsang, I., & Yin, H. (2026). Causal scaffolding for physical reasoning: A benchmark for causally-informed physical world understanding in VLMs. arXiv. https://arxiv.org/abs/2606.05966v1\n\ntags: #causal_reasoning, #physical_reasoning, #vision_language_models, #causal_graphs, #benchmark, #AI, #machine_learning", "link": "https://arxiv.org/abs/2606.05966v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Tianyi Tang", "Zhuoyi Lin", "Zeyu Feng"], "categories": ["cs.DB", "cs.AI"]}, {"id": "4", "source": "ARXIV", "score": 13, "day": "2026-06-02", "title": "Behavioral and Performance Indicators of Depression and Anxiety in Electronic Learning Systems", "content": "---\ntitle: 전자 학습 시스템에서 우울증 및 불안의 행동 및 성과 지표\nauthors: Arya VarastehNezhad, Fattaneh Taghiyareh\nyear: 2026\njournal: 명시되지 않음\ndoi: https://arxiv.org/abs/2606.04254v1\nresearch_type: 정량적 관찰 연구\nmethodology: LMS 이벤트 로그, 학업 기록, Beck 우울증 척도-II 및 Beck 불안 척도 점수를 통합하여 분석\ndata_type: LMS 이벤트 로그, 설문조사 데이터\nsample: 97명의 대학생\ncontext: 이란의 한 대학교에서 진행된 두 개의 컴퓨터 공학 과정\ntheoretical_framework: 명시되지 않음\nkeywords: [우울증, 불안, 전자 학습, 학습 분석, 행동 모델링, Moodle, 교육 데이터 마이닝]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 Moodle 기반 학습 관리 시스템에서 파생된 행동 및 성과 지표가 대학생의 우울증 및 불안과 관련이 있는지를 조사하였다. 97명의 학생을 대상으로 한 정량적 관찰 연구로, LMS 이벤트 로그와 자가 보고된 우울증 및 불안 점수를 통합하여 분석하였다. 분석 결과, 특정 행동 지표가 우울증 및 불안과 유의미한 상관관계를 보였으며, 이러한 지표는 학생의 정신 건강 상태를 조기에 인식하는 데 기여할 수 있음을 시사한다. 그러나 이러한 지표는 임상 진단의 대체물로 해석되어서는 안 된다.\n\n# Research Logic\n## Problem\n대학생의 정신 건강 문제, 특히 우울증과 불안이 학업 성과에 미치는 영향.\n## Theory\nLMS 데이터가 학생의 정신 건강 상태를 반영할 수 있다는 가설.\n## Design\n정량적 관찰 연구 설계, LMS 로그와 자가 보고 데이터를 통합.\n## Findings\n우울증은 시간적 활동 패턴의 변화, 긴 세션 지속 시간, 짧은 숙제 제출 기한과 관련이 있었고, 불안은 집중된 시간적 참여와 세션 기반 차이와 관련이 있었다.\n## Conclusion\nLMS 데이터는 학생의 정신 건강과 관련된 행동 신호를 제공할 수 있으며, 조기 인식을 위한 교육적 지원에 활용될 수 있다.\n\n# Key Findings\n- 우울증은 시간적 활동 패턴의 변화와 관련이 있다.\n- 불안은 집중된 시간적 참여와 관련이 있다.\n- LMS 데이터는 학생의 정신 건강 상태를 조기에 인식하는 데 유용할 수 있다.\n\n# Contributions\n## Theoretical\n정신 건강과 학습 행동 간의 관계에 대한 새로운 통찰 제공.\n## Methodological\n정량적 데이터 분석을 통해 LMS 로그와 정신 건강 측정 도구를 통합한 연구 설계.\n## Practical\n교육적 지원을 위한 조기 인식 시스템 개발에 기여.\n\n# Limitations\n- 연구는 특정 대학의 두 개 과정에 국한되어 일반화에 한계가 있다.\n- 행동 지표는 임상 진단의 대체물이 아니므로 주의가 필요하다.\n\n# Transferable Insights\n- LMS 데이터는 학생의 정신 건강 상태를 반영할 수 있는 유용한 지표가 될 수 있다.\n- 교육적 개입을 위한 조기 경고 시스템 개발에 활용 가능하다.\n\n# Idea Seeds\n1. LMS 데이터를 활용한 정신 건강 모니터링 시스템 개발.\n2. 다양한 교육 환경에서의 행동 지표 연구 확장.\n3. 학생의 정신 건강을 지원하는 맞춤형 학습 경로 설계.\n\n# Citation Snippets\n> VarastehNezhad, A., & Taghiyareh, F. (2026). Behavioral and Performance Indicators of Depression and Anxiety in Electronic Learning Systems. \n\ntags: #우울증, #불안, #전자학습, #학습분석, #행동모델링, #Moodle, #교육데이터마이닝\n\n---\n\n### 압축 요약\n본 연구는 Moodle 기반 학습 관리 시스템에서 파생된 행동 및 성과 지표가 대학생의 우울증 및 불안과 관련이 있는지를 조사하였다. 97명의 학생을 대상으로 한 정량적 관찰 연구로, 특정 행동 지표가 우울증 및 불안과 유의미한 상관관계를 보였으며, 이러한 지표는 학생의 정신 건강 상태를 조기에 인식하는 데 기여할 수 있음을 시사한다. \n\n### Reviewer Comments\n이 연구는 LMS 데이터를 활용하여 학생의 정신 건강 상태를 분석하는 데 기여하고 있으며, 정량적 접근 방식이 잘 적용되었다. 그러나 연구의 일반화 가능성을 높이기 위해 다양한 교육 환경에서의 추가 연구가 필요하다.", "link": "https://arxiv.org/abs/2606.04254v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Arya VarastehNezhad", "Fattaneh Taghiyareh"], "categories": ["cs.HC", "cs.CY"]}, {"id": "5", "source": "ARXIV", "score": 12, "day": "2026-06-02", "title": "Thinking Through Signs: PEEL as a Semiotic Scaffolding for Epistemically Accountable AI-Enabled Research", "content": "Large language models are reshaping research practice while quietly eroding researchers epistemic accountability. This commentary introduces PEEL - Protocols for Epistemically Engaged Literacy in AI, a working scaffolding that combines deterministic distant reading via Voyant Tools with LLM interpretation via Claude, grounded in Peircean semiotics and abductive reasoning. Applied to AI-generated condensations of three source texts, PEEL reveals systematic distortions in quantity, term frequency, and epistemic voice that are invisible without non-AI measurement -- and yields three design implications: deterministic instruments must accompany AI tools; fluency is not fidelity; epistemic authority must be designed in, not assumed.", "link": "https://arxiv.org/abs/2606.04152v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Clarisse de Souza", "Gabriel Barbosa", "Simone Diniz Junqueira Barbosa"], "categories": ["cs.AI", "cs.CY"]}, {"id": "6", "source": "ARXIV", "score": 12, "day": "2026-05-27", "title": "Robo-Blocks: Generative Scaffolding in End-User Design and Programming of Social Robots", "content": "Programming social robots is challenging for novice robot programmers due to required expertise in planning, interaction design, and programming. While large language models (LLMs) hold significant promise through code generation from natural-language descriptions, they can obscure critical elements of programming and supplant designer intent, eventually resulting in over-reliance instead of developing programming skills. In this paper, we explore how LLM-based social-robot-programming tools can support novice robot programmers through a Research through Design (RtD) process. We designed and prototyped Robo-Blocks, a block-based programming environment that leverages LLMs to offer novice robot programmers generative scaffolding through structured narratives that connect high-level ideas to executable robot behaviors. Through deployment with novices, we discovered emerging user personas and usage patterns for generative scaffolding and showed how this scaffolding shapes end-user design and programming strategies. We present design insights for the effective use of generative scaffolding and its integration into the practice of social-robot programming.", "link": "https://arxiv.org/abs/2605.28154v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Arissa J. Sato", "Callie Y. Kim", "Nathan Thomas White"], "categories": ["cs.HC", "cs.RO"]}, {"id": "7", "source": "ARXIV", "score": 11, "day": "2026-06-04", "title": "Staying with the Uncertainty: Uncertainty-Scaffolding Strategies for Artificial Moral Advisors in LLM-to-LLM Simulated Conversations", "content": "LLMs are increasingly deployed as Artificial Moral Advisors (AMA) in a variety of contexts: what kind of conversational patterns should they display? In this paper, we study how AMA can help their interlocutors \"stay with the uncertainty\". We propose three modes of uncertainty (Perspective-Multiplying, Tension-Preserving, Process-Reflecting) and compare them against three control conditions (Baseline, Persuasive, Sycophantic). A user-agent LLM engages in a dialogue on an ethical dilemma with an AMA following a specific uncertainty strategy, and completes pre- and post-conversation questionnaires. We further examine the effect of two persona prompt formats (Declarative and Narrative). We found that (1) no single model dominates as a simulated user agent, with open models aligning with human ambiguity through between-persona divergence and closed models through within-persona hedging; (2) declarative personas better capture initial stance diversity while narrative personas show more realistic belief revision; (3) all six AMA strategies produce distinguishable conversational patterns; and (4) uncertainty strategies differ not in how much stance revision they produce, but in the quality of engagement they sustain.", "link": "https://arxiv.org/abs/2606.05890v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Salvatore Greco", "Hainiu Xu", "Jacopo Domenicucci"], "categories": ["cs.CL", "cs.AI"]}, {"id": "8", "source": "ARXIV", "score": 11, "day": "2026-06-03", "title": "Creative Reading: Scaffolding Reading for Transformation", "content": "Reading augmentation systems increasingly help readers process text at scale. While these tools address real constraints of time and cognitive load, they often implicitly frame reading as information transmission, or \"reading to discard,\" delegating interpretation and effort to the machine. Yet this delegation changes the outcome of reading. For example, in scholarly reading, deciding what a research text implies and why it matters is central to the work of scholarly production. We propose creative reading as an alternative goal: reading augmentation that supports readers in creating both readings and themselves as readers. By putting literary and narrative theories into conversation with scholarly sensemaking and creativity support, we present a provocation-oriented design space for valuing the process of reading as a way of preserving a plurality of readings and transforming readers over time.", "link": "https://arxiv.org/abs/2606.04308v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Sophia Liu", "Sarah Abowitz", "Yijun Liu"], "categories": ["cs.HC", "cs.IR", "cs.SI"]}, {"id": "9", "source": "ARXIV", "score": 11, "day": "2026-05-30", "title": "AI Sovereignty as National Learning Capacity: A Human-Centered Learning Mechanics Viewpoint on France, the United States, and China", "content": "Artificial Intelligence is often discussed in France in terms of investment, compute capacity, regulation, employment, sovereignty, and education. These dimensions are usually treated separately. This viewpoint paper proposes a unified interpretation: France should be understood as a \\emph{national AI learning system}. Building on Human-Centered Learning Mechanics (HCLM), recently formulated as a dynamical framework for entropy-regulated representation learning, we interpret national AI development as a controlled balance between information injection and entropy dissipation. Information injection corresponds to compute, data, talent, research, capital, industrial deployment, and institutional experimentation. Entropy dissipation corresponds to organizational complexity, coordination frictions, energy constraints, regulatory uncertainty, talent mobility pressures, and opportunities to strengthen industrial absorption. The central claim is that AI sovereignty does not emerge from scale alone but from a country's capacity to regulate its own information dynamics. This paper connects HCLM with neural scaling laws, endogenous growth theory, creative destruction, and game theory. It argues that the French AI debate should move beyond the binary opposition between techno-optimism and regulation-first caution. A competitive and human-centered AI strategy requires a controlled regime in which information injection grows faster than institutional dissipation, while avoiding unstable, unequal, or energy-intensive expansion. We provide a mathematical model, measurable policy indicators, game-theoretic propositions, illustrative simulations of national AI regimes, and concrete policy implications for France. The proposed viewpoint reframes AI policy as the governance of an open, strategic, non-equilibrium learning system.", "link": "https://arxiv.org/abs/2606.00729v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Kim Phuc Tran"], "categories": ["cs.AI"]}];

    '"' + p.title.replace(/"/g, '""') + '"',
    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
