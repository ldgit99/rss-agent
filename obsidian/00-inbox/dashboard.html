<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-03-03 23:16</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "ERIC", "score": 37, "day": "명시되지 않음", "title": "Fostering Students&apos; AI Literacy Development through Educational Games: AI Knowledge, Affective and Cognitive Engagement", "content": "---\ntitle: Fostering Students' AI Literacy Development through Educational Games: AI Knowledge, Affective and Cognitive Engagement\nauthors: Davy Tsz Kit Ng, Chen Xinyu, Jac Ka Lok Leung, Samuel Kai Wah Chu\nyear: 명시되지 않음\njournal: 명시되지 않음\ndoi: 명시되지 않음\nresearch_type: 준실험 연구\nmethodology: 준실험적 접근 및 포커스 그룹 인터뷰\ndata_type: 정량적 및 정성적 데이터\nsample: 명시되지 않음\ncontext: 중등 교육\ntheoretical_framework: 명시되지 않음\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 교육 게임을 통해 학생들의 AI 리터러시 개발을 촉진하는 방법을 탐구하였다. TreasureIsland라는 온라인 플랫폼을 개발하여, 학생들이 게임을 통해 AI 개념을 효과적으로 이해할 수 있는지를 조사하였다. 준실험적 방법을 통해 게임 기반 접근 방식의 효과를 평가하였으며, 정량적 결과를 보완하기 위해 포커스 그룹 인터뷰를 실시하였다. 연구 결과, 플랫폼은 학생들의 동기, 자기 효능감, 진로 관심 및 AI 개념 이해를 향상시켰으나, AI 사용에 대한 자신감 및 AI 적용, 평가, 창작 능력은 향상되지 않았다. 연구는 게임 메커니즘을 통한 경쟁적 학습 환경 조성, 스캐폴딩 모듈 및 피드백 제공, 복잡한 AI 개념의 시각화를 통한 AI 리터러시 증진 가능성을 제시하였다.\n\n# Research Logic\n## Problem\nAI 리터러시 교육에서 초보 학습자에 대한 효과적인 스캐폴딩과 동기 지원의 필요성.\n## Theory\n게임 기반 접근 방식이 AI 리터러시와 학습 동기를 증진할 수 있다는 기존 연구에 기반.\n## Design\nTreasureIsland 플랫폼을 활용한 준실험적 연구 설계.\n## Findings\n플랫폼 사용이 학생들의 동기, 자기 효능감, 진로 관심 및 AI 개념 이해를 향상시켰으나, AI 사용 자신감 및 고차원적 인지 능력은 향상되지 않음.\n## Conclusion\n게임화는 학습자의 AI 리터러시를 촉진하는 데 효과적이며, 교육 설계자와 교사에게 유용한 통찰을 제공함.\n\n# Key Findings\n- TreasureIsland 플랫폼은 학생들의 동기와 자기 효능감을 향상시킴.\n- AI 개념 및 윤리에 대한 이해가 증가하였으나, AI 적용 능력은 향상되지 않음.\n- 게임 메커니즘을 통한 경쟁적 환경 조성이 효과적임.\n\n# Contributions\n## Theoretical\nAI 리터러시 교육에 대한 경험적 및 이론적 기초 제공.\n## Methodological\n준실험적 접근과 포커스 그룹 인터뷰를 통한 데이터 수집 방법론 제안.\n## Practical\n게임화된 플랫폼을 통한 교육적 접근 방식의 실용성 증대.\n\n# Limitations\n- 샘플 크기 및 특성이 명시되지 않음.\n- 연구 기간 및 환경적 요인에 대한 정보 부족.\n\n# Transferable Insights\n- 게임 기반 학습이 AI 리터러시 교육에 긍정적인 영향을 미칠 수 있음.\n- 스캐폴딩 및 피드백 제공이 학습 효과를 증대시킬 수 있음.\n\n# Idea Seeds\n1. AI 리터러시 교육을 위한 다양한 게임 기반 플랫폼 개발.\n2. flipped classroom 및 프로젝트 기반 학습 요소 통합 연구.\n3. AI 리터러시 향상을 위한 장기적인 연구 설계.\n\n# Citation Snippets\n>\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #ai literacy, #education\n\n---\n\n요약: 본 연구는 TreasureIsland 플랫폼을 통해 학생들의 AI 리터러시를 증진시키는 방법을 탐구하였다. 게임 기반 접근 방식이 학생들의 동기와 AI 개념 이해를 향상시키는 데 효과적이었으나, AI 사용 자신감 및 고차원적 인지 능력은 향상되지 않았다. 연구는 교육 설계자에게 유용한 통찰을 제공한다.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": true, "authors": [], "categories": []}, {"id": "1", "source": "ERIC", "score": 34, "day": "명시되지 않음", "title": "Learning Design to Support Student-AI Collaboration: Perspectives of Leading Teachers for AI in Education", "content": "---\ntitle: Learning Design to Support Student-AI Collaboration: Perspectives of Leading Teachers for AI in Education\nauthors: [Kim, Jinhee, Lee, Hyunkyung, Cho, Young Hoan]\nyear: 명시되지 않음\njournal: ERIC\ndoi: 명시되지 않음\nresearch_type: 질적 연구\nmethodology: 심층 인터뷰\ndata_type: 질적 데이터\nsample: 10명의 한국 AI 교육 분야 선도 교사\ncontext: K-12 교육\ntheoretical_framework: 명시되지 않음\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n학생과 AI의 협업을 지원하기 위한 학습 설계는 여전히 도전적인 목표로 남아 있다. 본 연구는 AI가 협업 학습 에이전트로 도입될 때 필요한 커리큘럼 설계, 학생-AI 상호작용, 학습 환경에 대한 교사들의 관점을 탐구하였다. 10명의 한국 AI 교육 분야 선도 교사와의 심층 인터뷰를 통해, 교사들은 SAC(학생-AI 협업)를 위한 최적의 학습 목표로 역량 및 주제 지식 구축을 인식하였다. SAC는 학제 간 학습, 진정한 문제 해결, 창의적 과제를 통해 촉진될 수 있으며, AI 원칙, 데이터 리터러시, 오류 분석, AI 윤리 교육이 중요하다고 강조되었다. 교사들은 학생들이 AI와의 협업을 세 단계로 발전시킬 것이라고 예상하였다: (1) AI에 대해 배우기, (2) AI로부터 배우기, (3) 함께 배우기.\n\n# Research Logic\n## Problem\n학생과 AI의 협업을 지원하는 학습 설계의 필요성.\n## Theory\nAI 교육의 효과적인 설계를 위한 교사들의 관점.\n## Design\n심층 인터뷰를 통한 질적 연구.\n## Findings\n교사들은 SAC를 위한 최적의 학습 목표와 방법을 제시하였다.\n## Conclusion\nAI와의 협업을 통한 학습 목표와 환경의 중요성을 강조하였다.\n\n# Key Findings\n- SAC를 위한 최적의 학습 목표는 역량 및 주제 지식 구축이다.\n- SAC는 학제 간 학습과 진정한 문제 해결을 통해 촉진될 수 있다.\n- AI 원칙, 데이터 리터러시, 오류 분석 교육이 SAC에 필수적이다.\n\n# Contributions\n## Theoretical\nAI 교육 설계에 대한 교사들의 관점을 제공.\n## Methodological\n심층 인터뷰를 통한 질적 데이터 수집 방법론 제시.\n## Practical\nAI와의 협업을 위한 교육 정책 및 설계에 대한 실질적인 제안.\n\n# Limitations\n- 연구 샘플의 제한성으로 인한 일반화의 어려움.\n- AI 교육 정책에 대한 구체적인 사례 부족.\n\n# Transferable Insights\n- SAC를 위한 효과적인 학습 환경 설계의 필요성.\n- AI와의 협업을 위한 단계적 접근법의 중요성.\n\n# Idea Seeds\n1. AI와의 협업을 위한 커리큘럼 개발.\n2. 교사 연수를 통한 AI 교육 역량 강화.\n3. SAC를 위한 평가 도구 개발.\n\n# Citation Snippets\n>\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #ai literacy, #education\n\n---\n\n학생과 AI의 협업을 지원하기 위한 학습 설계에 대한 교사들의 관점을 탐구한 연구로, SAC의 최적 학습 목표와 방법을 제시하였다. 교사들은 AI 원칙과 데이터 리터러시 교육이 중요하다고 강조하며, 학생들이 AI와의 협업을 통해 발전할 수 있는 단계적 접근법을 제안하였다.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": true, "authors": [], "categories": []}, {"id": "2", "source": "ERIC", "score": 32, "day": "명시되지 않음", "title": "Integrating Generative AI in Teacher Education: A Qualitative Exploration of TPACK Growth and Critical Reflection", "content": "---\ntitle: Integrating Generative AI in Teacher Education: A Qualitative Exploration of TPACK Growth and Critical Reflection\nauthors: [Min Jou, Tzu-Hsuan Kuo, Yu-Chun Chiang, Yungwei Hao, Chun-Chiang Huang]\nyear: 명시되지 않음\njournal: 명시되지 않음\ndoi: 명시되지 않음\nresearch_type: 질적 연구\nmethodology: 주제 분석\ndata_type: 반성 저널, 인터뷰, 교수 자료\nsample: 예비 교사\ncontext: 직업 교육\ntheoretical_framework: TPACK\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 생성적 AI 기술이 예비 교사의 교수적 사고 및 수업 설계 관행에 미치는 영향을 조사하였다. 질적 프레임워크를 바탕으로, 연구는 ChatGPT 및 이미지 생성기와 같은 도구를 통합한 과제 기반 학습 환경에서 학생들을 참여시켰다. 데이터는 반성 저널, 인터뷰 및 교수 자료를 통해 수집되었으며, 주제 분석을 통해 세 가지 핵심 성장 경로가 드러났다: (1) AI 도구 사용에 대한 불확실성에서 자신감으로의 전환, (2) 반복적인 설계와 반성을 통한 TPACK의 상황적 발전, (3) AI 윤리, 정확성 및 편향에 대한 비판적 인식의 출현. 학생들은 AI가 수업 창의성을 지원할 수 있는 방법을 탐구하는 동시에 콘텐츠 신뢰성과 자동화된 출력의 한계에 대한 우려를 표명하였다. 이들의 반성은 AI를 단순한 도구가 아닌 교수적 추론의 공동 참여자로 이해하는 진화하는 과정을 보여주었다. 연구 결과는 생성적 AI의 의미 있는 통합이 기술적 훈련 이상의 것을 요구하며, 교수적 프레이밍, 윤리적 담론 및 반성적 공간이 필요함을 시사한다.\n\n# Research Logic\n## Problem\n예비 교사들이 생성적 AI를 효과적으로 활용하는 데 필요한 교수적 사고와 설계 능력의 부족.\n## Theory\nTPACK 이론을 통해 AI 통합의 교수적 맥락을 탐구.\n## Design\n과제 기반 학습 환경에서 AI 도구를 활용한 질적 연구 설계.\n## Findings\nAI 도구 사용에 대한 자신감 증가, TPACK의 발전, AI 윤리에 대한 비판적 인식의 출현.\n## Conclusion\nAI 통합 교육은 기술적 훈련뿐만 아니라 비판적이고 적응적인 교수적 사고를 요구함.\n\n# Key Findings\n- AI 도구 사용에 대한 불확실성에서 자신감으로의 전환이 이루어졌다.\n- 반복적인 설계와 반성을 통해 TPACK이 상황적으로 발전하였다.\n- AI 윤리, 정확성 및 편향에 대한 비판적 인식이 나타났다.\n\n# Contributions\n## Theoretical\nTPACK 이론을 기반으로 한 AI 통합 교육의 새로운 통찰 제공.\n## Methodological\n질적 연구 방법론을 통해 예비 교사의 경험을 심층적으로 탐구.\n## Practical\nAI 통합 교육 프로그램의 설계에 대한 실질적인 지침 제시.\n\n# Limitations\n- 연구의 샘플 크기와 맥락이 제한적이다.\n- 데이터 수집 방법의 다양성이 부족하다.\n\n# Transferable Insights\n- 생성적 AI의 효과적인 통합을 위한 교수적 프레이밍의 중요성.\n- AI 윤리에 대한 비판적 담론의 필요성.\n\n# Idea Seeds\n1. AI 도구 사용에 대한 교육 프로그램 개발.\n2. AI 윤리 교육을 포함한 커리큘럼 설계.\n3. TPACK 기반의 교수적 사고 훈련 프로그램 개발.\n\n# Citation Snippets\n>\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy\n\n---\n\n요약: 본 연구는 생성적 AI 기술이 예비 교사의 교수적 사고 및 수업 설계에 미치는 영향을 질적으로 탐구하였다. 연구 결과, AI 도구 사용에 대한 자신감 증가와 TPACK의 발전, AI 윤리에 대한 비판적 인식이 나타났다. 이러한 통합은 기술적 훈련뿐만 아니라 비판적이고 적응적인 교수적 사고를 요구함을 시사한다.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": true, "authors": [], "categories": []}, {"id": "3", "source": "ERIC", "score": 32, "day": "명시되지 않음", "title": "AI &amp; Data Competencies: Scaffolding Holistic AI Literacy in Higher Education", "content": "---\ntitle: AI & Data Competencies: Scaffolding Holistic AI Literacy in Higher Education\nauthors: Kathleen Kennedy, Anuj Gupta\nyear: 명시되지 않음\njournal: 명시되지 않음\ndoi: 명시되지 않음\nresearch_type: 이론적 연구\nmethodology: 협력적 개발 과정\ndata_type: 명시되지 않음\nsample: 명시되지 않음\ncontext: 고등 교육\ntheoretical_framework: AI 및 데이터 관련 역량 프레임워크\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n이 장에서는 고등 교육에서 AI 문해력을 통합하기 위한 포괄적인 도구인 AI 및 데이터 역량 학습 성과 프레임워크를 소개한다. 이 프레임워크는 협력적 과정을 통해 개발되었으며, 네 가지 숙련도 수준과 일곱 가지 지식 차원에 걸쳐 주요 AI 및 데이터 관련 역량을 정의한다. 교육자들이 AI 학습을 지원할 수 있도록 구조화된 접근 방식을 제공하며, 기술적 기술과 윤리적 고려사항 및 사회문화적 인식을 균형 있게 다룬다. 이 장에서는 프레임워크의 개발 과정, 구조 및 커리큘럼 설계, 학습 활동 및 평가에서의 실용적인 전략을 설명한다. 구현 과정에서의 도전과제와 AI 교육의 미래 방향도 다룬다. 이 프레임워크는 학생들이 학문적 및 전문적 맥락에서 생성적 AI 기능을 활용할 수 있도록 준비시키는 로드맵을 제공한다.\n\n# Research Logic\n## Problem\nAI 문해력의 통합이 고등 교육에서 필요하지만, 이를 위한 명확한 프레임워크가 부족하다.\n\n## Theory\nAI 및 데이터 관련 역량을 정의하고, 이를 통해 교육자들이 학생 학습을 지원할 수 있는 방법을 제시한다.\n\n## Design\n협력적 개발 과정을 통해 프레임워크를 설계하고, 네 가지 숙련도 수준과 일곱 가지 지식 차원을 포함한다.\n\n## Findings\n프레임워크는 기술적 기술, 윤리적 고려사항 및 사회문화적 인식을 균형 있게 다루며, 교육자들에게 실용적인 전략을 제공한다.\n\n## Conclusion\nAI 문해력 개발을 위한 구조적 접근 방식이 필요하며, 이 프레임워크는 학생들이 AI 기능을 효과적으로 활용할 수 있도록 돕는다.\n\n# Key Findings\n- AI 및 데이터 역량을 네 가지 숙련도 수준으로 정의함.\n- 교육자들이 AI 학습을 지원할 수 있는 구조화된 접근 방식을 제공함.\n- 윤리적 고려사항과 사회문화적 인식을 포함하여 기술적 기술과의 균형을 맞춤.\n\n# Contributions\n## Theoretical\nAI 문해력의 포괄적인 정의와 교육적 적용을 위한 이론적 기초를 제공함.\n\n## Methodological\n협력적 개발 과정을 통해 프레임워크의 설계 및 구현 방법론을 제시함.\n\n## Practical\n교육자들이 커리큘럼 설계 및 학습 활동에서 AI 문해력을 효과적으로 통합할 수 있는 전략을 제공함.\n\n# Limitations\n- 연구의 구체적인 출판 연도 및 저널 정보가 명시되지 않음.\n- 실증적 데이터나 사례 연구가 포함되지 않음.\n\n# Transferable Insights\n- AI 문해력 통합을 위한 구조적 접근 방식의 필요성.\n- 교육자들이 AI 교육을 효과적으로 수행하기 위한 실용적인 전략의 중요성.\n\n# Idea Seeds\n1. AI 문해력 교육을 위한 다양한 평가 도구 개발.\n2. AI 및 데이터 역량 프레임워크의 국제적 적용 가능성 탐색.\n3. 교육자와 학생 간의 협력적 AI 학습 환경 조성.\n\n# Citation Snippets\n>\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #ai literacy, #education\n\n---\n\n이 장에서는 AI 문해력을 통합하기 위한 포괄적인 프레임워크를 제시하며, 교육자들이 이를 통해 학생 학습을 지원할 수 있는 방법을 설명한다. 프레임워크는 기술적 기술과 윤리적 고려사항을 균형 있게 다루며, AI 교육의 미래 방향을 제시한다.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": true, "authors": [], "categories": []}, {"id": "4", "source": "ERIC", "score": 31, "day": "명시되지 않음", "title": "Microlearning and Generative AI for Pre-Service Teacher Education: A Qualitative Case Study", "content": "---\ntitle: Microlearning and Generative AI for Pre-Service Teacher Education: A Qualitative Case Study\nauthors: [Lucas Kohnke, Di Zou, Haoran Xie]\nyear: 명시되지 않음\njournal: ERIC\ndoi: 명시되지 않음\nresearch_type: 질적 연구\nmethodology: 사례 연구\ndata_type: 반사 저널, 반구조화 인터뷰\nsample: 19명\ncontext: 영어 교육\ntheoretical_framework: TPACK, 자기 조절 학습(SRL)\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 생성 인공지능(GenAI) 도구의 급속한 발전이 예비 교사들에게 기술적 교수 콘텐츠 지식(TPACK) 및 자기 조절 학습(SRL) 전략 개발의 필요성을 강조하고 있음을 보여준다. 기존의 교사 교육 프로그램은 AI 문해력 및 교수 적응 기술을 갖추기 위한 구조화된 접근 방식이 부족하다. 이 질적 사례 연구는 마이크로러닝 모듈을 활용하여 예비 교사들의 TPACK 및 SRL을 향상시키는 방법을 조사하였다. 13주 동안 19명의 참가자가 GenAI 중심의 마이크로러닝 모듈에 참여하여 AI 도구를 적응시키는 능력을 발전시켰다. 주제 분석 결과, 마이크로러닝이 GenAI 역량 개발에 구조적이고 낮은 인지 부담의 접근 방식을 제공했으며, 참가자들이 AI를 수업 계획에 활용하는 데 자신감과 자율성을 얻었다는 점이 드러났다.\n\n# Research Logic\n## Problem\n예비 교사들이 AI 통합을 위한 문해력 및 교수 적응 기술 부족.\n## Theory\nTPACK 및 자기 조절 학습(SRL) 이론을 기반으로 한 연구.\n## Design\n질적 사례 연구 디자인, 마이크로러닝 모듈 활용.\n## Findings\n1. 마이크로러닝이 GenAI 역량 개발에 효과적임.\n2. 참가자들이 AI 사용에 대한 자신감과 자율성을 얻음.\n3. SRL 전략이 AI 통합에 필수적임.\n## Conclusion\n마이크로러닝은 AI 문해력과 교수적 AI 응용을 연결하는 잠재력을 지닌 모델임.\n\n# Key Findings\n- 마이크로러닝은 구조적이고 낮은 인지 부담의 접근 방식을 제공함.\n- 참가자들은 AI를 수업 계획에 활용하는 데 자신감을 얻음.\n- SRL 전략이 AI 통합 과정에서 중요함.\n\n# Contributions\n## Theoretical\nTPACK 및 SRL 이론의 적용을 통한 새로운 통찰 제공.\n## Methodological\n질적 사례 연구를 통한 마이크로러닝의 효과 분석.\n## Practical\n예비 교사 교육에 대한 실용적인 마이크로러닝 모델 제안.\n\n# Limitations\n- 연구 기간이 13주로 제한됨.\n- 참가자 수가 19명으로 소규모임.\n\n# Transferable Insights\n- 마이크로러닝이 AI 통합 교육에 효과적일 수 있음.\n- SRL 전략이 다양한 교육 환경에서 유용할 수 있음.\n\n# Idea Seeds\n1. 마이크로러닝 모듈을 다른 과목에 적용한 연구.\n2. AI 도구의 효과를 비교하는 연구.\n3. SRL 전략을 활용한 교사 교육 프로그램 개발.\n\n# Citation Snippets\n>\n\ntags: #human-ai_collaboration, #classroom_ai, #ai_tutoring, #instructional_design, #scaffolding, #tpack, #ai_literacy, #teacher_ai, #education, #learning_analytics, #llm_classroom, #ai_pedagogy\n\n---\n\n요약: 본 연구는 예비 교사들이 생성 인공지능 도구를 효과적으로 통합하기 위한 TPACK 및 SRL 전략 개발의 필요성을 강조하며, 마이크로러닝 모듈을 통해 이들 역량을 향상시키는 방법을 제시한다. 연구 결과, 참가자들은 AI 사용에 대한 자신감을 얻고, SRL 전략이 AI 통합에 필수적임을 확인하였다.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": true, "authors": [], "categories": []}, {"id": "5", "source": "ERIC", "score": 31, "day": "명시되지 않음", "title": "A Survey Study on AI Literacy of Nakhon Sawan Rajabhat University&apos;s Digital Technology Teacher Students in Thailand", "content": "In the realm of education, the integration of AI literacy into computer science teaching is becoming increasingly crucial (Walsh et al., 2023; Voulgari et al., 2022; Velander et al., 2023). Teachers play a pivotal role in bridging the gap between research and practical knowledge transfer of AIrelated skills, necessitating a solid foundation in AI-related technological, pedagogical, and content knowledge (TPACK) (Velander et al., 2023). As AI systems permeate various aspects of society, including education, teachers must adapt and develop competencies in AI to effectively impart these skills to students (Kreinsen &amp; Schulz, 2023). The incorporation of AI ethics into the curriculum requires teachers to navigate complex issues such as biases related to race, gender, and social class, challenging both computer science and humanities educators to step out of their comfort zones and collaborate to provide high-quality instruction (Walsh et al., 2023). By leveraging their expertise in different domains and receiving support from research teams, teachers can create engaging learning experiences that prepare students for the ethical and technical challenges posed by AI systems (Walsh et al., 2023). This article aimed to study the AI literacy level of teacher students major in digital technology who study at Nakhon Sawan Rajabhat University in Thailand. There were 98 students responded the AI literacy questionnaire which contained of 4 factors (Knowledge and Use of AI 24 questions, Creation of AI 3 questions, AI Self-Efficacy 6 questions, and AI Self-Competency 7 questions). The results showed that, 1) there were no statistically significant differences in gender among Knowledge and Use, AI Self-Efficacy, and AI Self-Competency while has statistically highly significant as P &lt; 0.05 in Creation of AI factor, 2) there were no statistically significant different in level of study and use of time used of computer among AI literacy factors, and 3) there was relationship between AI literacy factors with statistically highly significant as P &lt; 0.01.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": false, "authors": [], "categories": []}, {"id": "6", "source": "ERIC", "score": 31, "day": "명시되지 않음", "title": "AI Literacy in the Classroom: Transforming Education through Educational Technologies", "content": "The integration of Artificial Intelligence (AI) literacy into college curricula is a pressing but complex challenge, particularly in non-technical fields like business. This paper presents a case study of a pedagogical intervention designed to embed AI literacy within a required college mathematics course. The intervention employed a Problem-Based Learning (PBL) framework where 120 business students used tools like ChatGPT and matrix calculators to solve an authentic data-driven business problem. We analyzed data from the final assessment artifact -- a digital magazine -- to evaluate the development of specific AI literacy competencies. Initial findings from this pilot implementation indicate that the PBL approach was effective in developing students' skills in data-driven argumentation, critical evaluation of AI-generated outputs, and the ability to connect abstract mathematical models to practical AI applications. The study demonstrates a promising replicable model for integrating AI literacy into foundational courses, but also highlights key challenges, including the need for explicit scaffolding in critical AI evaluation. This paper contributes empirical insights from an initial implementation, offering a practical framework and actionable lessons for educators designing AI literacy curricula.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": false, "authors": [], "categories": []}, {"id": "7", "source": "ERIC", "score": 31, "day": "명시되지 않음", "title": "Rethinking English Language Arts Classrooms with Artificial Intelligence Education: Teachers&apos; Confidence and Views", "content": "Artificial Intelligence (AI) literacy skills have become essential to prepare youths for 21st- century needs. Despite the efforts to broaden AI education in K-12 classrooms, teaching AI concepts is mostly limited to Computer Science classrooms. Nonetheless, approximately half of U.S. high school students cannot access any Computer Science classes. This causes unequal access to AI education. To tackle this challenge, the utilization of curriculum integration emerges as a potent and effective strategy to facilitate interdisciplinary learning. Integrating AI concepts into non-STEM classrooms, especially English Language Art (ELA) classrooms can broaden access to AI education and reduce inequalities. However, teachers are key stakeholders in effective curriculum integration. Their views and confidence level play a critical role in providing sustainable curriculum integration. The current literature is limited in explaining high school ELA teachers' level of confidence and views in the context of integrating AI concepts into their classrooms. Thus, this study aims to fulfill the gaps in the research of non-STEM teachers' pedagogical beliefs, confidence, and experiences in learning and teaching AI concepts. Specifically, this study answers four research questions: 1) What was ELA teachers' level of confidence in integrating AI into their classrooms before and after participating in a curricular professional development program? 2) What were ELA teachers' views of integrating AI into ELA classrooms after participating in a curricular professional development program? 3) What challenges and opportunities do high school ELA teachers identify after they implement AI curricula in their classrooms? 4) What recommendations do ELA teachers offer to their ELA colleagues for implementing AI curricula in their classrooms? By following the Social Cognitive Theory (SCT) and Technological Pedagogical Content Knowledge (TPACK), this study examines ELA teachers' experiences in a curricular professional development program and their classroom implementations. The findings of this study revealed that after attending the PD, teachers' level of confidence in presenting and explaining AI topics to their students and facilitating and supporting students around AI concepts increased significantly. Teachers considered several factors (e.g., relevancy of the topics, opportunities for their students, and opportunities for their professional growth) when they were sharing their views on the integration. Additionally, after teachers implemented an AI curriculum into their classrooms, they identified opportunities (e.g., introducing AI-empowered careers and supporting students' critical thinking skills), challenges (e.g., technology issues), and needs for changes (e.g., adding scaffolding activities). Regarding the findings, this study discussed the implications for curriculum developers, ELA teachers, and make suggestions for educational researchers in the field of AI education. [The dissertation citations contained here are published with the permission of ProQuest LLC. Further reproduction is prohibited without permission. Copies of dissertations may be obtained by Telephone (800) 1-800-521-0600. Web page: http://www.proquest.com/en-US/products/dissertations/individuals.shtml.]", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": false, "authors": [], "categories": []}, {"id": "8", "source": "ERIC", "score": 30, "day": "명시되지 않음", "title": "Artificial Intelligence Integration in Teacher Education: Navigating Benefits, Challenges, and Transformative Pedagogy", "content": "This article explores the potential uses, benefits, and challenges of artificial intelligence (AI) tools for teacher educators and their teacher candidates. It begins with a brief introduction to the topic, followed by a discussion of existing literature concerning the impact of AI on K-12 education; the importance of preparing AI-literate teachers; and specific issues related to AI's use in teacher education, which includes studies on perceptions about AI utilization in education. The author also examines the challenges of AI implementation in the preparation of teachers; poses critical questions and ethical, pedagogical, and philosophical concerns faculty and students must consider; and provides ideas on using AI tools in courses through exemplar activities. The various activities illustrate the integration of AI- and non-AI-based activities to promote AI literacy among teachers. The goal of these activities is to support candidates' competency development to become effective teachers while understanding the potential of AI tools for assisting in planning instruction and creating curricula. The exemplars also focus on developing critical thinking, creativity, and collaboration in carrying out pedagogical tasks. The author advocates for embracing AI tools in education cautiously and strategically by recognizing their power to transform teaching and learning for teachers and students.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": false, "authors": [], "categories": []}, {"id": "9", "source": "OPENALEX", "score": 30, "day": "2025-12-12", "title": "Generative <scp>AI<\/scp> in Mathematics, Science, and <scp>STEM<\/scp> Education: Research, Applications, and Emerging Themes", "content": "The advent of generative artificial intelligence (GenAI) has ushered in a transformative era for mathematics, science, and STEM education. GenAI is a highly sophisticated technology capable of mastering human language and leveraging human knowledge to identify patterns beyond human perception (Bozkurt 2023a). Its applications in natural language processing include chatbots, virtual assistants, language translation, and text generation, with growing research interest in its intuitive, human-like interaction capabilities (Bozkurt 2023b, Bozkurt and Sharma 2024; Lim 2024; Sharma and Bozkurt 2024). The emergence of tools like ChatGPT and other large language models (LLM) has introduced both opportunities and challenges (Redmond-Sanogo et al. 2024). From enhancing instructional strategies to streamlining assessment, GenAI is reshaping the educational landscape. However GenAI is not a replacement for teachers but a powerful tool to complement their work (NCTM, 2024). Although GenAI has the potential to enhance efficiency and creativity, its limitations and ethical considerations necessitate thoughtful integration (Khennouche et al. 2024; Liu et al. 2024). The editorial, Navigating the Artificial Intelligence Frontier (Redmond-Sanogo et al. 2024), illuminated the role of GenAI in fostering efficiency and critical thinking while cautioning against over-reliance on tools. It shared the need for understanding the complex interplay between technology, pedagogy, and ethical considerations in mathematics, science, and STEM education. This special issue explores the implications of GenAI in mathematics and STEM education, offering insights into its integration in classrooms, teacher preparation programs, and mathematics teacher education programs. This introductory article provides an overview of the special issue, situates it within the current literature, and highlights the emerging themes, trends, and future directions in GenAI research and practice. Since the publication of Navigating the Artificial Intelligence Frontier (Redmond-Sanogo et al. 2024), the academic discourse around GenAI integration has expanded significantly. In fact, at the recent 2024 School Science and Mathematics Association (SSMA) Convention in Knoxville, Tennessee, AI was the main topic in seven presentations and mentioned in several others. Recent research on GenAI in mathematics, science, and STEM education generally focuses on three main areas: perceptions of GenAI, its applications in teaching and learning, and strategies for developing AI literacy and skills among students. One of the central themes in the recent literature is educators' perceptions of GenAI, as these perceptions play a critical role in determining AI's adoption and integration in educational contexts (Ingersoll and Strong 2011; Venhatesh et al. 2003; Yue et al. 2024). Yue et al. (2024) highlighted the importance of teacher perceptions, noting that teachers with positive perceptions “often craft more robust and stimulating learning experiences that nurture higher-order thinking and problem solving abilities, which are essential for AI literacy” (p. 19509). Their study of 1664 K-12 teachers from Mainland China revealed that those with higher technological pedagogical content knowledge (TPACK), confidence, and positive perceptions were more likely to adopt GenAI in their classrooms. Similarly, Galindo-Dominguez et al. (2024) surveyed educators across primary and secondary schools in Spain, finding that while many recognized GenAI's potential to foster personalized learning and improve efficiency, teachers were concerned about its accuracy and ethical implications. Expanding on this, Collie and Martin (2024) investigated the role of contextual, occupational, and background factors on 389 Australian teachers' motivation and engagement with GenAI. Their findings indicated that professional growth striving and autonomy-supportive leadership were significant predictors of teachers valuing and integrating GenAI, with secondary teachers showing greater motivation and engagement than their elementary counterparts. Lim (2024), through a metaphor analysis of preservice early childhood educators, identified both positive and negative conceptualizations of AI in education. Positive metaphors, such as AI as “seed” and “key,” represented innovation and potential, while negative metaphors such as “maze,” reflected the complexity and challenges of AI integration. Chiu et al. (2024) emphasized the need for increased AI literacy among educators, showing that positive perceptions were often correlated with familiarity and confidence in using AI tools. Opesemowo (2025) highlighted a dual perspective, expressing optimism about the potential of AI to transform education while also acknowledging ethical and equity concerns. Collectively, these studies reveal the dual nature of educators' perceptions of GenAI, reflecting both optimism and apprehension. They underscore the critical importance of targeted professional development and revisions to teacher education programs to build confidence, address misconceptions, and promote equitable and effective GenAI integration. While educators' perceptions of GenAI shape its adoption and integration, its practical applications in teaching and learning reveal the transformative potential of this technology across various educational disciplines. The application of Gen AI in teaching and learning has shown promising results across mathematics, science, and STEM education. Huang and Qiao (2024) demonstrated that incorporating AI into a Science, Technology, Liberal Arts, and Mathematics (STEAM) curriculum improved high school students' computational thinking and interdisciplinary problem-solving skills. Similarly, Marouf et al. (2024) emphasized the benefits of intelligent tutoring systems in supporting personalized learning pathways. Bewersdorff et al. (2025) examined the potential of multimodal large language models (MLLMs) to transform science education. Their research highlighted the role of MLLMs in fostering engagement, personalized learning, and supporting multimodal content creation. Bozkurt and Sharma (2024) also hypothesized that ChatBots have the potential to “act as conversational agents that bridge the gap between traditional educational methods and the dynamic, social, and individualized needs of students” (p. vii). They conducted a systematic review of AI applications in education, identifying best practices for incorporating GenAI into instructional strategies. They highlighted the potential of AI to support differentiated instruction, automate routine tasks, and facilitate student engagement through interactive simulations and personalized feedback. (Gadanidis and Johnathan Tan 2024) explored the integration of AI concepts into Canadian mathematics curricula, showcasing how abstract mathematical principles underpin AI technologies like neural networks. Their work suggests that connecting AI with mathematics can demystify AI systems and foster deeper engagement. Despite these successes, Gadanidis and Johnathan Tan (2024) critiqued the current lack of alignment between AI tools and core disciplinary knowledge, particularly in mathematics education. Assessment practices are pivotal when integrating GenAI into education. Mao et al. (2023) reviewed the opportunities and challenges of using GenAI for assessments. They found that effective assessment frameworks should ensure that AI-enhanced tools align with learning objectives and are tailored to meet diverse learner needs. For instance, integrating adaptive learning systems allows for formative assessments that adjust to a student's current understanding, providing immediate feedback and customized learning pathways. (Bozkurt and Sharma 2024) emphasized that assessments using GenAI should not solely focus on outcomes but also consider the learning process, leveraging AI's ability to provide insight into student engagement and cognitive development. Furthermore, their analysis demonstrates the importance of using GenAI to streamline grading practices while ensuring fairness and reducing educator workload. Recommendations also highlight the need for educators to critically evaluate AI-driven assessment tools, ensuring transparency in scoring and feedback mechanisms. Gadanidis and Johnathan Tan (2024) suggest that integrating AI with project-based assessments can foster creativity and collaboration, bridging the gap between theoretical knowledge and practical application. However, challenges persist, including potential biases in AI algorithms and the risk of over-reliance on automated systems. Addressing these issues requires teachers and preservice teachers to build their capacity to design and interpret AI-augmented assessments. These findings suggest that while GenAI can enhance teaching and learning, careful design and alignment with educational goals are critical. Leveraging GenAI thoughtfully ensures that technology complements rather than replaces current teaching methods. Next, we will discuss the effective implementation, which requires a parallel focus on developing AI literacy and skills among both students and educators. AI literacy is a multidimensional concept encompassing the ability to understand AI principles, apply and use AI technologies, evaluate and create AI solutions, and consider ethical implications (Ng et al. 2021). It also involves fostering knowledge, skills, and values or attitudes as core educational outcomes, as highlighted by UNESCO (2022). Developing AI literacy and skills among students and teachers is essential for preparing them to navigate a technology-driven world (Touretzky et al. 2019). Specifically, providing early education on the foundational principles, ethical considerations, and societal effects of AI technology can promote AI's conscious and safe use while fostering the development of informed and responsible AI users (Ng et al. 2021). Gadanidis and Johnathan Tan (2024) conducted a study in Canada to explore how the mathematical principles used to develop AI systems to learn, make predictions, and generate outputs (neural networks) are taught in schools. They found that AI concepts were taught in the last 2 years of school and wanted to determine how AI literacy and a foundational understanding of AI concepts (linear algebra, big data management, statistics and probability, and differential and multivariate calculus) could be taught in earlier grades. They provided examples of ways they developed the foundational understanding of concepts such as limit, infinity, and matrices as early as second grade. They called for resources that integrate AI concepts into K-12 curricula while maintaining a strong connection to disciplinary knowledge. Huang and Qiao (2024) also recommended expanding research to other grade levels to refine pedagogical models and ensure seamless integration of AI across diverse educational contexts. Yang et al. (2024) explored the development of AI literacy in Kindergarten children in Hong Kong through technology-enhanced embodied learning. They discovered that when guided by the teacher, children could develop AI literacy through age-appropriate interactions. In addition to developing students' AI literacy and knowledge, Galindo-Dominguez et al. (2024) proposed tailoring AI training programs to the specific needs of educators at various educational levels to build their confidence and competence in using AI tools effectively. They highlighted that empowering teachers with practical training and resources can bridge the gap between theoretical knowledge and the practical application of AI in diverse educational settings. These strategies are essential to ensure that both students and teachers are equipped to navigate and leverage AI in educational settings. By equipping educators and students with the necessary skills to effectively navigate and leverage GenAI in educational settings, these strategies lay the foundation for exploring the broader implications and innovative contributions of GenAI, as highlighted in this special issue. This special issue presents a curated collection of articles addressing the multifaceted impact of GenAI in mathematics and STEM education. These collectively advance our understanding of GenAI's role in education. They address topics such as teacher perceptions and instructional innovations. They also examine GenAI from multiple perspectives—from mathematics teacher educators, to inservice teachers, to preservice teachers, and as tools for curriculum development. The four articles in this special issue each bring a unique perspective and insight into GenAI's role within the mathematics and STEM education community. The first article, “Exploring AI Integration in Math Education: Preservice Teachers' Experiences and Reflections on Problem-Posing Activities with ChatGPT” by Kim, Park, and Joung, investigated how prospective mathematics teachers interacted with ChatGPT, a GenAI chatbot, when exploring problems in mathematics education. Specifically, this study examined how they recognized and corrected errors in problems posed by ChatGPT. While prospective mathematics teachers effectively identified and verified correct problems, they had difficulties identifying and correcting these errors. This study suggests that using AI-based activities in teacher preparation programs provides opportunities for future educators to adapt to the AI-driven educational landscape. While AI tools have the potential to enhance learning, they can't replace the human teacher. This article also explored the ethical issues associated with AI, such as privacy and educational surveillance issues. While this study had a small sample size and only focused on fractions, it does provide insight and suggestions for future research areas. Secondly, in “Empowering Mathematics Teacher Educators: Exploring AI-Driven Mathematical Tasks,” Aqazade, Mauntel, and Atabas explores how mathematics teacher educators design mathematical tasks to support future mathematics teachers in using AI tools effectively. It investigates how the mathematics teacher educators' knowledge domains of content, pedagogy, technology, contextual, and pedagogical content knowledge inform their engineering of generating tasks through ChatGPT. The authors find that MTEs primarily use pedagogical and pedagogical content knowledge to craft prompts and that their prompt engineering techniques involve revising, generating, or editing tasks. Critical friend dialogues helped the authors identify key lessons learned. Lessons include different conceptualizations of a mathematical task, the importance of articulating learning goals, and the need to navigate and revise these goals during ChatGPT interactions. Findings from this study illuminate the potential of GenAI tools in mathematics teacher education when critically evaluated to ensure high-quality experiences. Using a TPACK- integrated model of mathematics teacher educator knowledge, future opportunities include exploring the role of AI tools in mathematics teaching and learning. In “STEM Teachers' Perceptions, Familiarity, and Support Needs for Integrating Generative Artificial Intelligence in K-12 Education,” Cheah and Kim used self-reporting to explore the perceptions, familiarity, and support needs of K-12 STEM teachers in using GenAI. This study found diverse perceptions let PAGE_SIZE = 10;
let currentTab = 'all';
let currentSource = 'ALL';
let currentSort = 'score';
let currentPage = 1;
let currentCategory = '';
let currentMinDate = '';
let currentMaxDate = '';
let hideVisited = false;
let filtered = [];
let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
let searchHistory = JSON.parse(localStorage.getItem('searchHistory')) || [];
let visited = JSON.parse(localStorage.getItem('visited')) || [];

function toggleTheme() {
  const html = document.documentElement;
  const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
  html.dataset.theme = next;
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  localStorage.setItem('theme', next);
}

function toggleTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSource(btn) {
  currentSource = btn.dataset.source;
  document.querySelectorAll('#sourceFilters .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSort(btn) {
  currentSort = btn.dataset.sort;
  document.querySelectorAll('#sortGroup .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  render();
}

function toggleFavorite(id, e) {
  e.stopPropagation();
  const idx = favorites.indexOf(id);
  if (idx === -1) {
    favorites.push(id);
  } else {
    favorites.splice(idx, 1);
  }
  localStorage.setItem('favorites', JSON.stringify(favorites));
  applyFilters();
}

function recordVisit(id) {
  if (!visited.includes(id)) {
    visited.push(id);
  }
  localStorage.setItem('visited', JSON.stringify(visited));
}

function recordSearch(query) {
  if (query.trim() && !searchHistory.includes(query)) {
    searchHistory.unshift(query);
    if (searchHistory.length > 10) searchHistory.pop();
    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
  }
}

function downloadJSON() {
  const data = JSON.stringify(filtered, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadCSV() {
  const headers = ['제목', '출처', '스코어', '리뷰여부', '링크'];
  const rows = filtered.map(p => [
    '"' + p.title.replace(/"/g, '""') + '"',
    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
