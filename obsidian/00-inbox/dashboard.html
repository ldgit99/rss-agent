<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-04-21 23:33</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "ARXIV", "score": 21, "day": "2026-04-20", "title": "Teaching Usable Privacy in HCI Education: Designing, Implementing, and Evaluating an Active Learning Graduate", "content": "---\ntitle: HCI 교육에서 사용 가능한 프라이버시 교육: 능동적 학습 대학원 과정의 설계, 구현 및 평가\nauthors: [Sanchari Das, Dhiman Goswami, Michelle Melo, Aditya Johri, Vivian G. Motti]\nyear: 2026\njournal: EduCHI 2026\ndoi: https://doi.org/10.1145/3803869.3803883\nresearch_type: 교육 연구\nmethodology: 혼합 방법 평가\ndata_type: 정량적 및 정성적 데이터\nsample: 2024-2025년 두 개의 과정 제공\ncontext: 대학원 교육\ntheoretical_framework: 현대 프라이버시 연구 및 현대 프라이버시 프레임워크\nkeywords: [Usable Privacy, Higher Education, Graduate Course, Education Intervention, Use Cases, Role Playing]\n---\n\n# APA 7th style\n\n# Summary\n디지털 시스템이 광범위한 데이터 수집 및 추론에 의존함에 따라, HCI 분야의 미래 디자이너와 연구자들에게 사용 가능한 프라이버시 교육이 필수적이다. 본 논문에서는 능동적이고 실천 지향적인 교수법을 통해 사용 가능한 프라이버시를 주제로 한 15주 대학원 과정의 설계, 구현 및 평가를 제시한다. 이 과정은 사례 연구, 역할 놀이, 사례 기반 토론, 초청 강연 및 다단계 연구 프로젝트를 통합하여 학생들이 다양한 이해관계자의 관점에서 프라이버시를 사고할 수 있도록 지원한다. 두 해에 걸쳐 실시된 혼합 방법 평가 결과, 학생 참여도 증가, 프라이버시 설계의 트레이드오프를 명확히 설명하는 능력 향상, 이론과 실제 간의 강한 연결이 나타났다. 이 연구는 HCI 교육에서 사용 가능한 프라이버시를 가르치는 경험적으로 기반한 모델을 제공하며, 교육자들이 커리큘럼에 프라이버시를 통합하는 데 필요한 실행 가능한 지침을 제시한다.\n\n# Research Logic\n## Problem\n디지털 시스템의 데이터 수집 및 추론에 따른 프라이버시 교육의 필요성이 증가하고 있으나, 기존 교육은 단편적이고 이론 중심적이다.\n## Theory\n프라이버시는 사회 기술적 디자인 문제로 접근해야 하며, 학생들이 다양한 이해관계자의 관점을 이해하도록 돕는 것이 중요하다.\n## Design\n15주 과정은 능동적 학습 이론에 기반하여 설계되었으며, 역할 놀이와 사례 기반 학습을 포함한다.\n## Findings\n학생 참여도 증가, 프라이버시 설계의 트레이드오프를 설명하는 능력 향상, 이론과 실제 간의 연결 강화가 관찰되었다.\n## Conclusion\n이 과정은 HCI 교육에서 사용 가능한 프라이버시를 효과적으로 가르치는 모델을 제공하며, 교육자들이 이를 채택할 수 있도록 지원하는 자료를 제공한다.\n\n# Key Findings\n- 학생 참여도가 증가하였다.\n- 프라이버시 설계의 트레이드오프를 설명하는 능력이 향상되었다.\n- 이론과 실제 간의 연결이 강화되었다.\n\n# Contributions\n## Theoretical\n사용 가능한 프라이버시 교육에 대한 경험적으로 기반한 모델을 제시하였다.\n## Methodological\n혼합 방법 평가를 통해 교육 효과를 정량적 및 정성적으로 분석하였다.\n## Practical\n교육자들이 프라이버시를 커리큘럼에 통합할 수 있도록 구체적인 과제 설명 및 채점 기준을 제공하였다.\n\n# Limitations\n- 과정의 효과는 특정 교육 환경에 국한될 수 있다.\n- 평가 결과가 두 해에 걸쳐 수집되었으나, 장기적인 효과에 대한 데이터는 부족하다.\n\n# Transferable Insights\n- 능동적 학습 방법이 학생 참여를 증진시킬 수 있다.\n- 다양한 이해관계자의 관점을 통합하는 것이 프라이버시 교육에 효과적이다.\n\n# Idea Seeds\n1. 다양한 프라이버시 관련 사례를 포함한 추가적인 교육 자료 개발.\n2. 온라인 플랫폼을 통한 원격 교육 과정 설계.\n3. 다른 분야와의 융합 교육 프로그램 개발.\n\n# Citation Snippets\n> Das, S., Goswami, D., Melo, M., Johri, A., & Motti, V. G. (2026). Teaching Usable Privacy in HCI Education: Designing, Implementing, and Evaluating an Active Learning Graduate Course. In EduCHI 2026: 8th Annual Symposium on HCI Education (EduCHI ’26), May 20–22, 2026, Toronto, ON, Canada. ACM, New York, NY, USA.\n\ntags: #사용가능한프라이버시, #HCI교육, #대학원과정, #능동적학습, #사례연구, #역할놀이, #교육개입\n\n---\n\n요약: 본 논문은 HCI 교육에서 사용 가능한 프라이버시를 주제로 한 15주 과정의 설계와 평가를 다룬다. 능동적 학습 방법을 통해 학생들의 참여도와 프라이버시 설계의 이해도를 높이는 데 성공하였다. 이 과정은 교육자들이 프라이버시를 효과적으로 가르칠 수 있는 모델을 제공한다.", "link": "https://arxiv.org/abs/2604.17796v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Sanchari Das", "Dhiman Goswami", "Michelle Melo"], "categories": ["cs.CY", "cs.HC"]}, {"id": "1", "source": "ARXIV", "score": 19, "day": "2026-04-19", "title": "Agentic Education: Using Claude Code to Teach Claude Code", "content": "---\ntitle: Agentic Education: Using Claude Code to Teach Claude Code\nauthors: Zain Naboulsi\nyear: 2026\njournal: 명시되지 않음\ndoi: https://arxiv.org/abs/2604.17460v1\nresearch_type: 실험적 연구\nmethodology: 파일럿 평가\ndata_type: 양적 데이터\nsample: 27명\ncontext: AI 코딩 도구 교육\ntheoretical_framework: Bloom의 분류학, 책임 점진적 이양, 인지 부하 이론, 구성주의\nkeywords: [AI 코딩 도우미, Claude Code, 커리큘럼 설계, 프롬프트 엔지니어링, 자동 업데이트 커리큘럼, 점진적 책임 이양, 적응형 학습, 주체적 코딩 도구, 자기 효능감]\n---\n\n# APA 7th style\n\n# Summary\nAI 코딩 도우미의 사용이 증가하고 있으나, 이러한 도구를 학습하기 위한 구조화된 교육 프레임워크는 부족하다. 본 연구에서는 hands-on 프로젝트 구성을 통해 Claude Code를 학습하기 위한 모듈형 상호작용 커리큘럼인 cc-self-train을 제안한다. 이 시스템은 다섯 가지 기여를 포함하며, 파일럿 평가 결과 27명의 참가자에서 모든 평가된 기술 영역에서 통계적으로 유의미한 자기 효능감 향상을 보였다(p < 0.001). 본 연구는 자동 업데이트 교육 시스템 설계에 대한 함의를 논의한다.\n\n# Research Logic\n## Problem\nAI 코딩 도구의 사용 증가에도 불구하고, 효과적인 학습 경로가 부족하다.\n## Theory\nBloom의 분류학과 점진적 책임 이양 이론을 기반으로 한 교육 설계.\n## Design\n모듈형 커리큘럼을 통해 실습 중심의 학습 경험 제공.\n## Findings\n파일럿 평가에서 자기 효능감이 유의미하게 향상되었다.\n## Conclusion\n자동 업데이트 교육 시스템의 설계에 대한 새로운 통찰을 제공한다.\n\n# Key Findings\n- cc-self-train 커리큘럼은 50개의 모듈로 구성되어 있다.\n- 모든 평가된 기술 영역에서 자기 효능감이 통계적으로 유의미하게 향상되었다(p < 0.001).\n- 다섯 가지 프로젝트 도메인에서 동일한 기능 시퀀스를 공유하여 전이 학습을 가능하게 한다.\n\n# Contributions\n## Theoretical\nAI 도구 교육에 대한 새로운 교육 프레임워크 제시.\n## Methodological\n파일럿 평가를 통한 실증적 증거 제공.\n## Practical\nAI 코딩 도구의 효과적인 학습 경로 제공.\n\n# Limitations\n- 샘플 크기가 작아 일반화에 한계가 있다.\n- 특정 도구(Claude Code)에 국한된 연구이다.\n\n# Transferable Insights\n- 점진적 책임 이양 이론은 다른 교육 환경에서도 적용 가능하다.\n- 자동 업데이트 시스템은 빠르게 변화하는 기술 환경에서 유용할 수 있다.\n\n# Idea Seeds\n1. 다른 AI 도구에 대한 유사한 커리큘럼 개발.\n2. 다양한 학습 스타일에 맞춘 적응형 학습 시스템 설계.\n3. AI 도구 사용에 대한 메타인지 훈련 프로그램 개발.\n\n# Citation Snippets\n> Naboulsi, Z. (2026). Agentic Education: Using Claude Code to Teach Claude Code. \n\ntags: #AI코딩도우미, #ClaudeCode, #커리큘럼설계, #자동업데이트, #적응형학습, #자기효능감, #교육기술\n\n---\n\n### 압축 요약\nAI 코딩 도우미의 사용이 증가하고 있지만, 효과적인 학습 경로는 부족하다. 본 연구는 hands-on 프로젝트를 통해 Claude Code를 학습하는 모듈형 커리큘럼인 cc-self-train을 제안하며, 파일럿 평가에서 자기 효능감이 유의미하게 향상되었다(p < 0.001). 이 연구는 자동 업데이트 교육 시스템 설계에 대한 새로운 통찰을 제공한다.", "link": "https://arxiv.org/abs/2604.17460v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Zain Naboulsi"], "categories": ["cs.CY", "cs.AI", "cs.HC", "cs.SE"]}, {"id": "2", "source": "ERIC", "score": 18, "day": "명시되지 않음", "title": "Framing Human-AI Collaboration in Language Education", "content": "---\ntitle: Framing Human-AI Collaboration in Language Education\nauthors: [Glenn Stockwell, Yijen Wang]\nyear: 명시되지 않음\njournal: ERIC\ndoi: 명시되지 않음\nresearch_type: 명시되지 않음\nmethodology: 명시되지 않음\ndata_type: 명시되지 않음\nsample: 명시되지 않음\ncontext: 명시되지 않음\ntheoretical_framework: 협력 학습, 인간-AI 팀워크, 직장 내 협력\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n이 논문은 언어 교육에서 생성적 인공지능의 사용 증가와 함께 인간-AI 상호작용을 \"협력\"으로 설명하는 경향을 분석한다. 협력의 정의를 명확히 하고, 인간-AI 상호작용이 이러한 요구 사항과 얼마나 일치하는지를 고려한다. 논문은 협력의 일곱 가지 특징을 식별하며, 언어 교육에서의 인간-AI 상호작용이 표면적으로는 협력과 유사하지만, 공유된 목적, 상호 이해, 분산된 책임이 결여되어 있음을 강조한다. 이러한 차이는 AI 사용에 대한 교사, 학습자 및 연구자의 해석에 중요한 영향을 미친다. 논문은 언어 교육에서 인간-AI 관계에 대한 주장이 이론적으로 근거 있고 교육적으로 의미가 있도록 하기 위해 협력에 대한 개념적 정밀성이 필요하다고 주장한다.\n\n# Research Logic\n## Problem\n인간-AI 상호작용을 협력으로 간주하는 경향의 문제점.\n## Theory\n협력의 정의와 인간-AI 상호작용의 차이.\n## Design\n협력의 일곱 가지 특징을 기반으로 한 분석.\n## Findings\n인간-AI 상호작용은 협력의 표면적 유사성을 가지지만, 근본적으로는 차이가 있음.\n## Conclusion\n협력에 대한 개념적 정밀성이 필요함.\n\n# Key Findings\n- 인간-AI 상호작용은 협력의 일곱 가지 특징 중 일부를 충족하지 않음.\n- 공유된 목적과 상호 이해가 결여되어 있음.\n- AI 사용에 대한 해석에 중요한 영향을 미침.\n\n# Contributions\n## Theoretical\n협력 개념에 대한 명확한 정의 제공.\n## Methodological\n인간-AI 상호작용 분석을 위한 새로운 프레임워크 제안.\n## Practical\n교사와 학습자가 AI를 이해하고 활용하는 데 도움을 줄 수 있는 통찰 제공.\n\n# Limitations\n- 연구의 구체적인 방법론이 명시되지 않음.\n- 데이터 유형 및 샘플에 대한 정보 부족.\n\n# Transferable Insights\n- 인간-AI 협력의 개념적 정밀성이 필요함.\n- 교육 현장에서 AI의 역할에 대한 명확한 이해가 중요함.\n\n# Idea Seeds\n1. 인간-AI 협력의 정의를 명확히 하기 위한 추가 연구 필요.\n2. 교육 현장에서 AI의 책임과 평가 기준 설정.\n3. 협력의 개념을 바탕으로 한 AI 교육 프로그램 개발.\n\n# Citation Snippets\n>\n\ntags: #human-ai collaboration, #ai pedagogy, #education, #learning analytics, #instructional design, #ai literacy, #teacher ai", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Glenn Stockwell", "Yijen Wang"], "categories": ["ERIC"]}, {"id": "3", "source": "ARXIV", "score": 16, "day": "2026-04-09", "title": "Scaffolding Human-AI Collaboration: A Field Experiment on Behavioral Protocols and Cognitive Reframing", "content": "---\ntitle: Scaffolding Human-AI Collaboration: A Field Experiment on Behavioral Protocols and Cognitive Reframing\nauthors: [Alex Farach, Alexia Cambon, Lev Tankelevitch, Connie Hsueh, Rebecca Janssen]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2604.08678v2\nresearch_type: 실험 연구\nmethodology: 필드 실험\ndata_type: 정량적 데이터\nsample: 388명\ncontext: Fortune 500 소매업체\ntheoretical_framework: 스캐폴딩 이론, 사회기술 시스템 이론\nkeywords: [human-ai collaboration, scaffolding, cognitive reframing, behavioral protocols, generative AI, productivity]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 Fortune 500 소매업체의 388명을 대상으로 인간-AI 협업을 위한 두 가지 스캐폴딩 개입의 효과를 실험적으로 분석하였다. 행동적 스캐폴딩 개입은 쌍으로 AI를 공동 사용하도록 요구하는 구조적 프로토콜을 포함하였으며, 이는 비구조적 사용에 비해 문서 품질이 낮고 문서 생산량이 현저히 감소하는 결과를 초래하였다. 반면, 인지적 스캐폴딩 개입은 AI를 사고 파트너로 재구성하는 파트너십 훈련을 포함하였으며, 이는 문서 품질을 향상시키는 긍정적인 효과를 보였다. 그러나 이러한 결과는 설계의 한계로 인해 주의 깊게 해석해야 한다.\n\n# Research Logic\n## Problem\nAI 도구의 접근성은 높아졌지만, 생산성 향상은 불균형적이며, 이는 사람들이 AI를 어떻게 사용하는지가 중요함을 시사한다.\n\n## Theory\n스캐폴딩 이론을 기반으로 행동적 스캐폴딩과 인지적 스캐폴딩의 두 가지 접근 방식을 구분하여 AI 사용을 지원하는 방법을 탐구하였다.\n\n## Design\n388명의 참가자를 대상으로 필드 실험을 실시하였으며, 두 가지 스캐폴딩 개입을 비교하였다.\n\n## Findings\n행동적 스캐폴딩은 문서 품질을 저하시켰고, 인지적 스캐폴딩은 문서 품질을 향상시켰다. 그러나 긍정적인 신념 변화는 훈련에 의한 것이 아닐 수 있다.\n\n## Conclusion\nAI 사용의 효과는 스캐폴딩의 유형에 따라 다르며, 행동적 스캐폴딩은 문서 품질을 저하시킬 수 있다.\n\n# Key Findings\n- 행동적 스캐폴딩은 문서 품질을 저하시켰다.\n- 인지적 스캐폴딩은 문서 품질을 향상시켰다.\n- 긍정적인 신념 변화는 훈련의 효과가 아닐 수 있다.\n\n# Contributions\n## Theoretical\n스캐폴딩 이론을 AI 협업에 적용하여 새로운 통찰을 제공하였다.\n\n## Methodological\n필드 실험을 통해 스캐폴딩 개입의 효과를 실증적으로 검증하였다.\n\n## Practical\nAI 도구 사용에 대한 구조적 지원의 필요성을 강조하였다.\n\n# Limitations\n- AM/PM 세션 혼란으로 인한 설계의 한계.\n- 문서 길이에 대한 LLM 채점의 민감성.\n\n# Transferable Insights\n- 스캐폴딩의 유형에 따라 AI 사용의 효과가 달라질 수 있다.\n- 인지적 스캐폴딩이 문서 품질 향상에 기여할 수 있다.\n\n# Idea Seeds\n1. AI 도구 사용에 대한 다양한 스캐폴딩 개입을 개발할 수 있다.\n2. 조직 내 AI 사용의 최적화를 위한 교육 프로그램을 설계할 수 있다.\n3. 스캐폴딩 효과를 측정하기 위한 새로운 평가 도구를 개발할 수 있다.\n\n# Citation Snippets\n> Farach, A., Cambon, A., Tankelevitch, L., Hsueh, C., & Janssen, R. (2026). Scaffolding Human-AI Collaboration: A Field Experiment on Behavioral Protocols and Cognitive Reframing. arXiv.\n\ntags: #human-ai_collaboration, #scaffolding, #cognitive_reframing, #behavioral_protocols, #generative_ai, #productivity, #education", "link": "https://arxiv.org/abs/2604.08678v2", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Alex Farach", "Alexia Cambon", "Lev Tankelevitch"], "categories": ["econ.GN", "cs.HC"]}, {"id": "4", "source": "ARXIV", "score": 15, "day": "2026-04-20", "title": "Fast and Forgettable: A Controlled Study of Novices' Performance, Learning, Workload, and Emotion in AI-Assisted and Human Pair Programming Paradigms", "content": "---\ntitle: Fast and Forgettable: A Controlled Study of Novices' Performance, Learning, Workload, and Emotion in AI-Assisted and Human Pair Programming Paradigms\nauthors: [Nicholas Gardella, James Prather, Juho Leinonen, Paul Denny, Raymond Pettit, Sara L. Riggs]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2604.18538v1\nresearch_type: 실험적 연구\nmethodology: 혼합 방법 연구\ndata_type: 정량적 및 정성적 데이터\nsample: 22명\ncontext: AI 보조 및 인간 페어 프로그래밍 환경\ntheoretical_framework: 통제-가치 이론\nkeywords: [AI, 페어 프로그래밍, 학습, 감정, 교육 기술]\n---\n\n# APA 7th style\n\n# Summary\n이 연구는 AI 보조 프로그래밍과 인간 페어 프로그래밍 간의 성과, 학습, 작업 부담 및 감정의 차이를 비교하기 위해 수행된 통제된 실험이다. 22명의 참가자가 GitHub Copilot과 함께 프로그래밍을 수행한 결과, AI와 함께 작업할 때 성과는 더 높았으나, 인간 파트너와의 작업에서 더 긍정적이고 자극적인 감정을 경험했다. 연구 결과는 AI가 작업 부담을 줄이는 데 기여했지만, 인간 상호작용의 감정적 이점이 여전히 중요하다는 것을 보여준다. 교육자들은 AI를 수용하는 것 외에도 페어 프로그래밍을 교육 도구로 재검토할 것을 권장한다.\n\n# Research Logic\n## Problem\nAI 보조 프로그래밍의 효과에 대한 경험적 증거 부족.\n## Theory\n통제-가치 이론을 통해 인간-인간과 인간-AI 프로그래밍 팀 간의 감정적 차이를 분석.\n## Design\n22명의 참가자가 20분 동안 팀으로 및 개별적으로 프로그래밍을 수행.\n## Findings\nAI와 함께 작업할 때 성과는 높았으나, 인간 파트너와의 작업에서 더 긍정적인 감정을 경험.\n## Conclusion\nAI는 작업 부담을 줄이지만, 인간 상호작용의 감정적 이점이 중요함.\n\n# Key Findings\n- GitHub Copilot과 함께 작업할 때 성과가 유의미하게 향상됨.\n- 인간 파트너와의 작업에서 감정적 반응이 더 긍정적임.\n- AI 조건에서 재시험 성과 감소가 관찰되었으나 유의미하지 않음.\n\n# Contributions\n## Theoretical\nAI와 인간 상호작용의 감정적 차이에 대한 이해를 심화.\n## Methodological\n혼합 방법 연구 설계를 통해 다양한 데이터 수집.\n## Practical\n교육자들에게 페어 프로그래밍의 재검토를 권장.\n\n# Limitations\n- 샘플 크기가 작음.\n- 특정 프로그래밍 언어(Python)에 국한됨.\n\n# Transferable Insights\n- AI 도구의 사용이 학습에 미치는 영향을 신중히 고려해야 함.\n- 인간 상호작용의 감정적 이점이 학습 성과에 미치는 영향을 인식해야 함.\n\n# Idea Seeds\n1. AI와 인간의 협업을 최적화하기 위한 교육 프로그램 개발.\n2. 다양한 프로그래밍 언어에서의 AI 도구 효과 연구.\n3. 감정적 반응을 측정하기 위한 새로운 평가 도구 개발.\n\n# Citation Snippets\n> Gardella, N., Prather, J., Leinonen, J., Denny, P., Pettit, R., & Riggs, S. L. (2026). Fast and Forgettable: A Controlled Study of Novices' Performance, Learning, Workload, and Emotion in AI-Assisted and Human Pair Programming Paradigms. arXiv. https://arxiv.org/abs/2604.18538v1\n\ntags: #AI, #페어프로그래밍, #교육기술, #학습, #감정, #프로그래밍, #인공지능", "link": "https://arxiv.org/abs/2604.18538v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Nicholas Gardella", "James Prather", "Juho Leinonen"], "categories": ["cs.HC"]}, {"id": "5", "source": "ARXIV", "score": 15, "day": "2026-04-19", "title": "Persona-Based Requirements Engineering for Explainable Multi-Agent Educational Systems: A Scenario Simulator for Clinical Reasoning Training", "content": "As Artificial Intelligence (AI) and Agentic AI become increasingly integrated across sectors such as education and healthcare, it is critical to ensure that Multi-Agent Education System (MAES) is explainable from the early stages of requirements engineering (RE) within the AI software development lifecycle. Explainability is essential to build trust, promote transparency, and enable effective human-AI collaboration. Although personas are well-established in human-computer interaction to represent users and capture their needs and behaviors, their role in RE for explainable MAES remains underexplored. This paper proposes a human-first, persona-driven, explainable MAES RE framework and demonstrates the framework through a MAES for clinical reasoning training. The framework integrates personas and user stories throughout the RE process to capture the needs, goals, and interactions of various stakeholders, including medical educators, medical students, AI patient agent, and clinical agents (physical exam agent, diagnostic agent, clinical intervention agent, supervisor agent, evaluation agent). The goals, underlying models, and knowledge base shape agent interactions and inform explainability requirements that guided the clinical reasoning training of medical students. A post-usage survey found that more than 78\\% of medical students reported that MAES improved their clinical reasoning skills. These findings demonstrate that RE based on persona effectively connects technical requirements with non-technical medical students from a human-centered approach, ensuring that explainable MAES are trustworthy, interpretable, and aligned with authentic clinical scenarios from the early stages of the AI system engineering. The partial MAES for the clinical scenario simulator is~\\href{https://github.com/2sigmaEdTech/MAS/}{open sourced here}.", "link": "https://arxiv.org/abs/2604.17186v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Weibing Zheng", "Laurah Turner", "Jess Kropczynski"], "categories": ["cs.SE", "cs.AI", "cs.ET", "cs.HC", "cs.MA"]}, {"id": "6", "source": "ARXIV", "score": 14, "day": "2026-04-20", "title": "Community-Led AI Integration for Wildfire Risk Assessment: A Participatory AI Literacy and Explainability Integration (PALEI) Framework in Los Angeles, CA", "content": "Climate-driven wildfires are intensifying, particularly in urban regions such as Southern California. Yet, traditional fire risk communication tools often fail to gain public trust due to inaccessible design, non-transparent outputs, and limited contextual relevance. These challenges are especially critical in high-risk communities, where trust depends on how clearly and locally information is presented. Neighborhoods such as Pacific Palisades, Pasadena, and Altadena in Los Angeles exemplify these conditions. This study introduces a community-led approach for integrating AI into wildfire risk assessment using the Participatory AI Literacy and Explainability Integration (PALEI) framework. PALEI emphasizes early literacy building, value alignment, and participatory evaluation before deploying predictive models, prioritizing clarity, accessibility, and mutual learning between developers and residents. Early engagement findings show strong acceptance of visual, context-specific risk communication, positive fairness perceptions, and clear adoption interest, alongside privacy and data security concerns that influence trust. Participants emphasized localized imagery, accessible explanations, neighborhood-specific mitigation guidance, and transparent communication of uncertainty. The outcome is a mobile application co-designed with users and stakeholders, enabling residents to scan visible property features and receive interpretable fire risk scores with tailored recommendations. By embedding local context into design, the tool becomes an everyday resource for risk awareness and preparedness. This study argues that user experience is central to ethical and effective AI deployment and provides a replicable, literacy-first pathway for applying the PALEI framework to climate-related hazards.", "link": "https://arxiv.org/abs/2604.17755v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Sanaz Sadat Hosseini", "Mona Azarbayjani", "Mohammad Pourhomayoun"], "categories": ["cs.CY", "cs.AI"]}, {"id": "7", "source": "ARXIV", "score": 14, "day": "2026-04-18", "title": "Bridging Coarse and Fine Recognition: A Hybrid Approach for Open-Ended Multi-Granularity Object Recognition in Interactive Educational Games", "content": "Recent advances in Multimodal Large Language Models (MLLMs) have enabled open-ended object recognition, yet they struggle with fine-grained tasks. In contrast, CLIP-style models excel at fine-grained recognition but lack broad coverage of general object categories. To bridge this gap, we propose \\textbf{HyMOR}, a \\textbf{Hy}brid \\textbf{M}ulti-granularity open-ended \\textbf{O}bject \\textbf{R}ecognition framework that integrates an MLLM with a CLIP model. In HyMOR, the MLLM performs open-ended and coarse-grained object recognition, while the CLIP model specializes in fine-grained identification of domain-specific objects such as animals and plants. This hybrid design enables accurate object understanding across multiple semantic granularities, serving as a robust perceptual foundation for downstream multi-modal content generation and interactive gameplay. To support evaluation in content-rich and educational scenarios, we introduce TBO (TextBook Objects), a dataset containing 20,942 images annotated with 8,816 object categories extracted from textbooks. Extensive experiments demonstrate that HyMOR narrows the fine-grained recognition gap with CLIP to 0.2\\% while improving general object recognition by 2.5\\% over a baseline MLLM, measured by average Sentence-BERT (SBert) similarity. Overall, HyMOR achieves a 23.2\\% improvement in average SBert across all evaluated datasets, highlighting its effectiveness in enabling accurate perception for multi-modal game content generation and interactive learning applications.", "link": "https://arxiv.org/abs/2604.16785v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Hanling Yi", "Feng Lin", "Mao Luo"], "categories": ["cs.CV", "cs.AI"]}, {"id": "8", "source": "ARXIV", "score": 14, "day": "2026-04-17", "title": "Evaluating Adaptive Personalization of Educational Readings with Simulated Learners", "content": "We present a framework for evaluating adaptive personalization of educational reading materials with theory-grounded simulated learners. The system builds a learning-objective and knowledge-component ontology from open textbooks, curates it in a browser-based Ontology Atlas, labels textbook chunks with ontology entities, and generates aligned reading-assessment pairs. Simulated readers learn from passages through a Construction-Integration-inspired memory model with DIME-style reader factors, KREC-style misconception revision, and an open New Dale-Chall readability signal. Answers are produced by score-based option selection over the learner's explicit memory state, while BKT drives adaptation. Across three sampled subject ontologies and matched cohorts of 50 simulated learners per condition, adaptive reading significantly improved outcomes in computer science, yielded smaller positive but inconclusive gains in inorganic chemistry, and was neutral to slightly negative in general biology.", "link": "https://arxiv.org/abs/2604.16744v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Ryan T. Woo", "Anmol Rao", "Aryan Keluskar"], "categories": ["cs.CL", "cs.AI", "cs.HC"]}, {"id": "9", "source": "ARXIV", "score": 13, "day": "2026-04-19", "title": "Developing Models of Procedural Skills using an AI-assisted Text-to-Model Approach", "content": "Scalable AI tutoring for procedural skill learning requires structured knowledge representations, yet constructing these representations remains a labor-intensive bottleneck. This paper presents a human-in-the-loop text-to-model pipeline that uses large language models to transform instructional materials into schema-complete Task-Method-Knowledge models of procedural skills through ontology-constrained prompting and template-based generation. The approach automates structural scaffolding while preserving expert oversight for validating causal transitions and failure conditions. We apply the pipeline to instructional materials from a graduate-level online AI course, constructing 23 procedural skill models. AI-assisted authoring reduced expert modeling time by 50-70% while producing structurally valid and highly reproducible models under fixed-input conditions. We evaluate structural validity, semantic alignment, reproducibility, and refinement effort to characterize authoring scalability. Results indicate that AI-assisted text-to-model methods can substantially lower the cost of constructing structured procedural representations, making course-wide deployment of structured AI coaching systems practically feasible.", "link": "https://arxiv.org/abs/2604.17624v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Rahul K. Dass", "Shubham Puri", "Arpit Khandelwal"], "categories": ["cs.HC"]}];
let PAGE_SIZE = 10;
let currentTab = 'all';
let currentSource = 'ALL';
let currentSort = 'score';
let currentPage = 1;
let currentCategory = '';
let currentMinDate = '';
let currentMaxDate = '';
let hideVisited = false;
let filtered = [];
let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
let searchHistory = JSON.parse(localStorage.getItem('searchHistory')) || [];
let visited = JSON.parse(localStorage.getItem('visited')) || [];

function toggleTheme() {
  const html = document.documentElement;
  const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
  html.dataset.theme = next;
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  localStorage.setItem('theme', next);
}

function toggleTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSource(btn) {
  currentSource = btn.dataset.source;
  document.querySelectorAll('#sourceFilters .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSort(btn) {
  currentSort = btn.dataset.sort;
  document.querySelectorAll('#sortGroup .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  render();
}

function toggleFavorite(id, e) {
  e.stopPropagation();
  const idx = favorites.indexOf(id);
  if (idx === -1) {
    favorites.push(id);
  } else {
    favorites.splice(idx, 1);
  }
  localStorage.setItem('favorites', JSON.stringify(favorites));
  applyFilters();
}

function recordVisit(id) {
  if (!visited.includes(id)) {
    visited.push(id);
  }
  localStorage.setItem('visited', JSON.stringify(visited));
}

function recordSearch(query) {
  if (query.trim() && !searchHistory.includes(query)) {
    searchHistory.unshift(query);
    if (searchHistory.length > 10) searchHistory.pop();
    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
  }
}

function downloadJSON() {
  const data = JSON.stringify(filtered, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadCSV() {
  const headers = ['제목', '출처', '스코어', '리뷰여부', '링크'];
  const rows = filtered.map(p => [
    '"' + p.title.replace(/"/g, '""') + '"',
    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
