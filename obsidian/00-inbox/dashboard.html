<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-04-15 23:40</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "ARXIV", "score": 24, "day": "2026-04-12", "title": "Tracing Prompt-Level Trajectories to Understand Student Learning with AI in Programming Education", "content": "---\ntitle: Tracing Prompt-Level Trajectories to Understand Student Learning with AI in Programming Education\nauthors: [Tianyu Shao, Miguel Feijóo-García, Yi Zhang, Hugo Castellanos, Tawfiq Salem, Alejandra Magana, Tianyi Li]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2604.10400v1\nresearch_type: 실증 연구\nmethodology: 질적 분석\ndata_type: 대화 기록 및 코드 제출\nsample: 163명의 학생\ncontext: 미국의 대형 R1 연구 대학의 파이썬 프로그래밍 수업\ntheoretical_framework: 인지 도구 이론, 인간-컴퓨터 상호작용(HCI)\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 ChatGPT와 같은 AI 도구가 프로그래밍 교육에서 학생들이 AI와 상호작용하는 방식을 조사하였다. 163명의 학생들이 수행한 파이썬 과제를 분석하여, 학생-LLM 대화 기록과 최종 코드 제출물을 비교하였다. 연구 결과, 학생들은 AI에 대한 의존도에 따라 다양한 상호작용 경로를 보였으며, 대부분의 학생들이 AI가 생성한 코드를 직접 복사했지만, 많은 학생들이 반복적인 수정 과정을 통해 코드를 생성하였다. 이러한 상호작용 경로는 학생들의 자기 조절 및 학습 지향성을 이해하는 데 중요한 통찰을 제공하며, 개인화된 학생-AI 협력 학습을 촉진하는 교육 AI 시스템 설계에 대한 시사점을 제시한다.\n\n# Research Logic\n## Problem\nAI 도구의 사용이 증가함에 따라 학생들이 프로그래밍 교육에서 AI와 어떻게 상호작용하는지에 대한 이해가 필요하다.\n\n## Theory\n인지 도구 이론과 HCI 관점에서 AI 도구가 문제 해결 과정에서 학생의 인지적 노력을 어떻게 재분배하는지를 탐구한다.\n\n## Design\n단일 세션의 프로그래밍 과제를 통해 학생들의 LLM 사용 패턴을 분석하였다.\n\n## Findings\n학생들은 AI와의 상호작용에서 다양한 경로를 보였으며, 80% 이상의 학생들이 AI가 생성한 코드를 재사용하였다.\n\n## Conclusion\n학생들의 상호작용 경로는 AI 지원 프로그래밍 학습에서 중요한 요소로 작용하며, 교육적 설계에 대한 시사점을 제공한다.\n\n# Key Findings\n- 학생들은 AI와의 상호작용에서 8가지의 상호작용 경로를 식별하였다.\n- 80% 이상의 학생들이 AI가 생성한 코드를 직접 재사용하였다.\n- 상호작용 경로는 학생들의 자기 조절 및 학습 성과와 밀접한 관련이 있다.\n\n# Contributions\n## Theoretical\n학생-AI 상호작용의 경로를 이해하는 새로운 이론적 틀을 제공한다.\n\n## Methodological\n단일 문제 해결 과정에서의 학생-LLM 상호작용을 분석한 데이터 세트를 제공한다.\n\n## Practical\nAI 지원 학습을 위한 과제 설계 및 평가에 대한 실용적인 시사점을 제시한다.\n\n# Limitations\n- 연구는 단일 세션에 국한되어 있어 장기적인 학습 효과를 평가하지 못하였다.\n- 샘플의 다양성이 부족하여 일반화에 한계가 있다.\n\n# Transferable Insights\n- AI 도구의 사용이 학생의 문제 해결 전략에 미치는 영향을 이해할 수 있다.\n- 교육적 맥락에서 AI 도구의 효과적인 활용 방안을 모색할 수 있다.\n\n# Idea Seeds\n1. AI 도구 사용에 대한 학생의 메타인지 훈련 프로그램 개발.\n2. 다양한 프로그래밍 과제에서의 AI 도구 사용 패턴 비교 연구.\n3. AI와의 협업을 통한 문제 해결 능력 향상 방안 모색.\n\n# Citation Snippets\n> Shao, T., Feijóo-García, M., Zhang, Y., Castellanos, H., Salem, T., Magana, A., & Li, T. (2026). Tracing Prompt-Level Trajectories to Understand Student Learning with AI in Programming Education. arXiv. https://arxiv.org/abs/2604.10400v1\n\ntags: #human-ai collaboration, #ai tutoring, #instructional design, #scaffolding, #ai literacy, #education, #ai pedagogy", "link": "https://arxiv.org/abs/2604.10400v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Tianyu Shao", "Miguel Feijóo-García", "Yi Zhang"], "categories": ["cs.HC"]}, {"id": "1", "source": "ARXIV", "score": 22, "day": "2026-04-13", "title": "A Simulation-Based Method for Testing Collaborative Learning Scaffolds Using LLM-Based Multi-Agent Systems", "content": "---\ntitle: A Simulation-Based Method for Testing Collaborative Learning Scaffolds Using LLM-Based Multi-Agent Systems\nauthors: [Han Wua, Lishan Zhang, Chunming Lu]\nyear: 2026\njournal: 명시되지 않음\ndoi: https://arxiv.org/abs/2604.11161v1\nresearch_type: 실험적 연구\nmethodology: 시뮬레이션 기반 연구\ndata_type: 질적 데이터\nsample: 1명의 교사 에이전트와 5명의 학생 역할\ncontext: 중국, 교육 연구\ntheoretical_framework: ICAP 프레임워크\nkeywords: [LLM, Multi-agent systems, Collaborative learning, Generative AI, Instructional Scaffolds]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 LLM 기반의 다중 에이전트 시스템을 활용하여 협력 학습 과정과 교수 스캐폴딩의 효과를 조사하는 시뮬레이션 방법을 제안한다. 연구는 \"Deep Think before Speak\"와 \"Direct Speak\"라는 두 가지 스캐폴딩 전략을 비교하며, 고전 중국 시 감상 과제를 통해 평가를 진행하였다. 결과적으로 \"Deep Think before Speak\" 스캐폴딩이 에이전트의 담론 다양성과 상호작용 깊이를 유의미하게 향상시켰으며, ICAP 프레임워크와 일치하는 복잡한 상호작용 패턴을 촉진하였다. 이 연구는 LLM 기반 다중 에이전트 시스템을 사용하여 실제 협력 학습 역학을 시뮬레이션하는 것이 가능하다는 것을 입증하였다.\n\n# Research Logic\n## Problem\n전통적인 협력 학습 스캐폴딩 연구는 시간과 자원이 많이 소모되어 교수 전략의 신속한 반복과 최적화를 방해한다.\n## Theory\nICAP 프레임워크를 기반으로 하여 스캐폴딩이 학습자의 참여 수준을 높이는 방법을 탐구한다.\n## Design\nMetaGPT 프레임워크와 GPT-4o를 사용하여 시뮬레이션 시스템을 구현하고, 두 가지 스캐폴딩 전략을 비교하였다.\n## Findings\n\"Deep Think before Speak\" 스캐폴딩이 담론의 다양성과 상호작용 깊이를 증가시키고, 내용 반복성을 감소시켰다.\n## Conclusion\nLLM 기반 다중 에이전트 시스템을 통해 협력 학습의 실제 역학을 효과적으로 시뮬레이션할 수 있음을 보여준다.\n\n# Key Findings\n- \"Deep Think before Speak\" 스캐폴딩이 담론의 다양성과 깊이를 유의미하게 향상시켰다.\n- 스캐폴딩이 복잡한 상호작용 패턴을 촉진하였다.\n- 연구 결과는 ICAP 프레임워크와 일치하였다.\n\n# Contributions\n## Theoretical\n협력 학습 스캐폴딩의 효과를 LLM 기반 시뮬레이션을 통해 검증함으로써 이론적 기여를 한다.\n## Methodological\n다중 에이전트 시스템을 활용한 새로운 연구 방법론을 제시한다.\n## Practical\n교실에서의 스캐폴딩 전략 개발에 대한 실용적인 통찰을 제공한다.\n\n# Limitations\n- 연구는 특정 과제에 국한되어 일반화 가능성이 제한적이다.\n- LLM의 한계로 인해 시뮬레이션의 정확성이 영향을 받을 수 있다.\n\n# Transferable Insights\n- LLM 기반 시스템이 교육 연구에서의 시뮬레이션 도구로 유용할 수 있다.\n- 다양한 스캐폴딩 전략의 효과를 사전 검토할 수 있는 방법론을 제공한다.\n\n# Idea Seeds\n1. LLM 기반 시스템을 활용한 다양한 학습 환경에서의 스캐폴딩 효과 연구.\n2. 다른 교육적 맥락에서의 협력 학습 시뮬레이션 적용.\n3. 스캐폴딩 전략의 지속적인 개선을 위한 피드백 메커니즘 개발.\n\n# Citation Snippets\n> Wua, H., Zhang, L., & Lu, C. (2026). A Simulation-Based Method for Testing Collaborative Learning Scaffolds Using LLM-Based Multi-Agent Systems. \n\ntags: #human-ai_collaboration, #classroom_ai, #ai_tutoring, #instructional_design, #scaffolding, #tpack, #ai_literacy, #education, #learning_analytics, #llm_classroom, #ai_pedagogy", "link": "https://arxiv.org/abs/2604.11161v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Han Wua", "Lishan Zhang", "Chunming Lu"], "categories": ["cs.HC", "cs.MA"]}, {"id": "2", "source": "ARXIV", "score": 19, "day": "2026-04-13", "title": "Enabling and Inhibitory Pathways of Students' AI Use Concealment Intention in Higher Education: Evidence from SEM and fsQCA", "content": "---\ntitle: 학생들의 AI 사용 은폐 의도의 촉진 및 억제 경로: SEM 및 fsQCA의 증거\nauthors: Yiran Du, Huimin He\nyear: 2026\njournal: 명시되지 않음\ndoi: 명시되지 않음\nresearch_type: 양적 연구\nmethodology: 구조 방정식 모델링(SEM) 및 퍼지 집합 질적 비교 분석(fsQCA)\ndata_type: 설문조사 데이터\nsample: 1,346명의 대학생\ncontext: 고등 교육\ntheoretical_framework: 인지-정서-행동(CAC) 프레임워크\nkeywords: [AI 사용 은폐 의도, 부정적 평가에 대한 두려움, 심리적 안전, 고등 교육, 인지-정서-행동 프레임워크]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 고등 교육에서 학생들의 AI 사용 은폐 의도를 조사하며, 인지-정서-행동(CAC) 프레임워크를 통합하여 구조 방정식 모델링(SEM)과 퍼지 집합 질적 비교 분석(fsQCA)을 결합한 이중 방법론을 사용하였다. 1,346명의 대학생 데이터를 바탕으로, 연구 결과는 은폐 의도를 형성하는 두 가지 상반된 메커니즘을 밝혀냈다. 촉진 경로에서는 인식된 낙인, 인식된 위험, 정책 불확실성이 부정적 평가에 대한 두려움을 증가시켜 은폐를 촉진하는 반면, 억제 경로에서는 AI 자기 효능감, 인식된 공정성, 사회적 지원이 심리적 안전을 강화하여 은폐 의도를 감소시킨다. SEM 결과는 가설 관계와 매개 효과를 확인하였으며, fsQCA는 여러 구성 경로를 식별하여 조건 간의 동등성을 강조하였다. 본 연구는 은폐를 독립적인 행동 결과로 개념화하고, 순수 효과와 구성적 관점을 통합한 미세한 설명을 제공함으로써 문헌에 기여한다. 실용적 함의는 명확한 기관 정책, 적절한 AI 사용의 낙인 제거, 지원적인 학습 환경의 조성을 강조한다.\n\n# Research Logic\n## Problem\nAI 사용 은폐 의도에 대한 이해 부족.\n## Theory\n인지-정서-행동(CAC) 프레임워크를 통한 설명.\n## Design\n양적 연구, 구조 방정식 모델링 및 fsQCA 결합.\n## Findings\n은폐 의도에 대한 두 가지 메커니즘: 촉진 경로와 억제 경로.\n## Conclusion\n명확한 정책과 지원 환경이 필요함.\n\n# Key Findings\n- 인식된 낙인, 위험, 정책 불확실성이 부정적 평가에 대한 두려움을 증가시킴.\n- AI 자기 효능감, 공정성, 사회적 지원이 심리적 안전을 강화함.\n- 부정적 평가에 대한 두려움이 은폐 의도에 미치는 영향 확인.\n\n# Contributions\n## Theoretical\n은폐을 독립적인 행동 결과로 개념화.\n## Methodological\n구조 방정식 모델링과 fsQCA의 결합 사용.\n## Practical\n명확한 정책과 지원적 환경의 필요성 강조.\n\n# Limitations\n- 표본이 중국 대학생으로 한정됨.\n- 연구 설계의 일반화 가능성 제한.\n\n# Transferable Insights\n- AI 사용에 대한 부정적 인식 감소 필요.\n- 심리적 안전을 증진시키는 환경 조성의 중요성.\n\n# Idea Seeds\n1. AI 사용에 대한 긍정적 인식 증진 프로그램 개발.\n2. 대학 내 AI 사용 관련 정책 개선 방안 연구.\n3. 심리적 안전을 증진하기 위한 교수법 개발.\n\n# Citation Snippets\n> Du, Y., & He, H. (2026). Enabling and Inhibitory Pathways of Students' AI Use Concealment Intention in Higher Education: Evidence from SEM and fsQCA. \n\ntags: #AI사용 #은폐의도 #심리적안전 #고등교육 #정책 #AI교육 #인지정서행동\n\n---\n\n요약: 본 연구는 고등 교육에서 학생들의 AI 사용 은폐 의도를 조사하며, 인지-정서-행동(CAC) 프레임워크를 기반으로 하여 두 가지 메커니즘을 밝혀냈다. 촉진 경로는 부정적 평가에 대한 두려움을 증가시키고, 억제 경로는 심리적 안전을 강화하여 은폐 의도를 감소시킨다. 연구 결과는 명확한 정책과 지원 환경의 필요성을 강조한다.", "link": "https://arxiv.org/abs/2604.10978v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Yiran Du", "Huimin He"], "categories": ["cs.HC", "cs.AI"]}, {"id": "3", "source": "ARXIV", "score": 18, "day": "2026-04-12", "title": "Participatory, not Punitive: Student-Driven AI Policy Recommendations in a Design Classroom", "content": "---\ntitle: Participatory, not Punitive: Student-Driven AI Policy Recommendations in a Design Classroom\nauthors: [Kaoru Seki, Manisha Vijay, Yasmine Kotturi]\nyear: 2026\njournal: Proceedings of the 2026 CHI Conference on Human Factors in Computing Systems (CHI ’26)\ndoi: https://doi.org/10.1145/3772318.3790691\nresearch_type: 질적 연구\nmethodology: 참여적 디자인 워크숍\ndata_type: 인터뷰, 정책 권고, 아티팩트\nsample: 10명의 대학원 디자인 학생\ncontext: 미국의 소수자 서비스 대학\ntheoretical_framework: 참여적 거버넌스, 학생 주도 정책 디자인\nkeywords: [generative AI, participatory governance, higher education, student perspectives, design pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 생성적 AI가 교육을 재편하고 있는 가운데, 학생들이 참여하지 않은 대학 AI 정책이 주로 남용을 처벌하는 데 초점을 맞추고 있음을 지적한다. 연구진은 미국의 소수자 서비스 대학에서 진행된 세 차례의 워크숍을 통해 학생 주도의 AI 정책 디자인이 이러한 단절을 어떻게 해결할 수 있는지를 탐구하였다. 8명의 참가자는 AI 사용에 대한 솔직한 경험을 공유하고, 10개의 정책 권고안을 공동 저술하여 캠퍼스에서 유통된 자작 잡지에 시각화하였다. 이 과정에서 학생들은 교수진과의 이중 기준 문제를 포함한 다양한 우려를 드러냈으며, 학생 참여가 정책 이상의 가치를 지닌다고 주장한다.\n\n# Research Logic\n## Problem\n대학 AI 정책이 학생들의 관점을 반영하지 않고, 주로 처벌적 접근을 취하고 있음.\n## Theory\n학생들이 AI 정책 디자인에 참여함으로써 더 나은 정책 결과를 도출할 수 있다는 주장.\n## Design\n학생 주도의 워크숍을 통해 정책 권고안을 공동 저술하는 참여적 디자인 접근.\n## Findings\n학생들은 AI 사용에 대한 다양한 경험을 공유하고, 정책 권고안을 통해 기존 정책의 문제점을 드러냄.\n## Conclusion\n학생 참여는 정책 결과를 넘어 교육적 가치가 있으며, 다양한 분야에서의 참여를 촉진할 수 있는 전략을 제안함.\n\n# Key Findings\n- 학생들이 AI 사용에 대한 솔직한 경험을 공유함으로써 정책 권고안이 도출됨.\n- 교수진과 학생 간의 이중 기준 문제를 지적함.\n- 참여적 디자인 과정이 학생들의 AI 사용 방식을 변화시킴.\n\n# Contributions\n## Theoretical\n학생 주도의 정책 디자인의 중요성을 강조하며, 참여적 거버넌스의 이론적 기초를 확립함.\n## Methodological\n학생 주도의 워크숍과 자작 잡지를 활용한 새로운 연구 방법론을 제안함.\n## Practical\n학생들의 목소리를 반영한 AI 정책 권고안을 제공하여 교육 현장에서의 실질적인 변화를 도모함.\n\n# Limitations\n- 연구 샘플이 소수자 서비스 대학의 학생들로 한정되어 일반화에 한계가 있음.\n- 정책 권고안의 실제 적용 여부에 대한 후속 연구가 필요함.\n\n# Transferable Insights\n- 학생 참여를 통한 정책 디자인이 교육적 효과를 높일 수 있음.\n- 다양한 분야에서의 참여적 접근이 필요함.\n\n# Idea Seeds\n1. 다른 대학에서도 유사한 참여적 디자인 워크숍을 실시하여 정책 개발에 학생들을 포함시킬 수 있음.\n2. AI 사용에 대한 학생들의 경험을 바탕으로 한 교육 자료 개발.\n3. 정책 권고안을 지속적으로 업데이트하고 피드백을 받을 수 있는 플랫폼 구축.\n\n# Citation Snippets\n> Seki, K., Vijay, M., & Kotturi, Y. (2026). Participatory, not Punitive: Student-Driven AI Policy Recommendations in a Design Classroom. In Proceedings of the 2026 CHI Conference on Human Factors in Computing Systems (CHI ’26). https://doi.org/10.1145/3772318.3790691\n\ntags: #human-ai_collaboration, #classroom_ai, #ai_tutoring, #instructional_design, #scaffolding, #tpack, #ai_literacy, #teacher_ai, #education, #learning_analytics, #llm_classroom, #ai_pedagogy\n\n---\n\n요약: 본 연구는 생성적 AI가 교육에 미치는 영향을 탐구하며, 학생들이 참여하지 않은 AI 정책이 주로 처벌적이라는 점을 지적한다. 연구진은 학생 주도의 워크숍을 통해 AI 정책 권고안을 도출하고, 이 과정에서 학생들의 목소리가 정책에 반영될 수 있는 방법을 제시한다.", "link": "https://arxiv.org/abs/2604.10851v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Kaoru Seki", "Manisha Vijay", "Yasmine Kotturi"], "categories": ["cs.HC"]}, {"id": "4", "source": "ARXIV", "score": 18, "day": "2026-04-10", "title": "Toward using Speech to Sense Student Emotion in Remote Learning Environments", "content": "---\ntitle: 원격 학습 환경에서 학생 감정을 감지하기 위한 음성 활용\nauthors: Sargam Vyas, Bogdan Vlasenko, André Mayoraz, Egon Werlen, Per Bergamin, Mathew Magimai-Doss\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2604.09881v1\nresearch_type: 실험적 연구\nmethodology: 데이터 세트 개발, 주관적 평가, 자동 감정 예측 연구\ndata_type: 음성 데이터\nsample: 79명의 학생\ncontext: 원격 학습 환경\ntheoretical_framework: 감정 예측, 다차원 감정 모델링\nkeywords: [음성 처리, 학습자 감정, 감정 레이블링, 감정 예측, 원격 학습]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 원격 학습 환경에서 학생의 감정을 감지하기 위해 음성을 활용하는 방법을 탐구한다. 연구자들은 자가 조절 과제를 통해 수집된 음성이 감정의 차원을 나타내는지, 그리고 이러한 감정 변화를 자동으로 예측할 수 있는지를 조사하였다. 데이터 세트는 자발적인 독백 음성을 포함하며, 주관적 평가와 자동 감정 예측 연구를 통해 분석되었다. 연구 결과, 음성 기반 자가 조절 과제가 원격 학습 환경에서 학생의 감정을 감지하는 수단이 될 수 있음을 나타낸다. 이는 교육 설계와 피드백 생성을 통해 학습 경험을 향상시킬 수 있는 가능성을 열어준다.\n\n# Research Logic\n## Problem\n원격 학습 환경에서 감정적 단서의 부족으로 인해 학습 경험이 저하되는 문제.\n## Theory\n감정은 학습 과정에서 중요한 역할을 하며, 감정 예측 기술을 통해 이를 해결할 수 있음.\n## Design\n자가 조절 과제를 통해 수집된 음성을 기반으로 감정 변화를 분석.\n## Findings\n음성 데이터에서 감정의 차원적 변화를 감지할 수 있으며, 자동 예측이 가능함.\n## Conclusion\n음성 기반 자가 조절 과제가 원격 학습에서 학생 감정을 감지하는 효과적인 방법이 될 수 있음.\n\n# Key Findings\n- 자발적인 독백 음성이 감정의 차원적 변화를 나타냄.\n- 감정 예측 모델이 음성 데이터를 기반으로 신뢰성 있게 작동함.\n- 원격 학습 환경에서 감정 인식의 필요성이 강조됨.\n\n# Contributions\n## Theoretical\n감정 예측 연구에 대한 새로운 통찰 제공.\n## Methodological\n자가 조절 과제를 통한 데이터 수집 방법론 제안.\n## Practical\n원격 학습 환경에서 감정 인식을 통한 교육 설계 개선 가능성 제시.\n\n# Limitations\n- 연구 샘플이 제한적임.\n- 감정 예측의 정확성은 다양한 요인에 따라 달라질 수 있음.\n\n# Transferable Insights\n- 음성 기반 감정 인식 기술이 원격 학습에 적용될 수 있음.\n- 자가 조절 과제가 학습자의 감정 상태를 이해하는 데 유용할 수 있음.\n\n# Idea Seeds\n1. 다양한 감정 예측 모델을 비교하는 연구.\n2. 다른 학습 환경에서의 음성 감정 인식 적용 가능성 탐구.\n3. 감정 인식 기술을 활용한 개인화된 학습 피드백 시스템 개발.\n\n# Citation Snippets\n> Vyas, S., Vlasenko, B., Mayoraz, A., Werlen, E., Bergamin, P., & Magimai-Doss, M. (2026). Toward using Speech to Sense Student Emotion in Remote Learning Environments. arXiv. https://arxiv.org/abs/2604.09881v1\n\ntags: #음성처리, #학습자감정, #감정예측, #원격학습, #교육설계, #자가조절, #감정인식", "link": "https://arxiv.org/abs/2604.09881v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Sargam Vyas", "Bogdan Vlasenko", "André Mayoraz"], "categories": ["eess.AS", "cs.HC"]}, {"id": "5", "source": "ARXIV", "score": 18, "day": "2026-04-06", "title": "EduIllustrate: Towards Scalable Automated Generation Of Multimodal Educational Content", "content": "Large language models are increasingly used as educational assistants, yet evaluation of their educational capabilities remains concentrated on question-answering and tutoring tasks. A critical gap exists for multimedia instructional content generation -- the ability to produce coherent, diagram-rich explanations that combine geometrically accurate visuals with step-by-step reasoning. We present EduIllustrate, a benchmark for evaluating LLMs on interleaved text-diagram explanation generation for K-12 STEM problems. The benchmark comprises 230 problems spanning five subjects and three grade levels, a standardized generation protocol with sequential anchoring to enforce cross-diagram visual consistency, and an 8-dimension evaluation rubric grounded in multimedia learning theory covering both text and visual quality. Evaluation of ten LLMs reveals a wide performance spread: Gemini 3.0 Pro Preview leads at 87.8\\%, while Kimi-K2.5 achieves the best cost-efficiency (80.8\\% at \\\\$0.12/problem). Workflow ablation confirms sequential anchoring improves Visual Consistency by 13\\% at 94\\% lower cost. Human evaluation with 20 expert raters validates LLM-as-judge reliability for objective dimensions ($ρ\\geq 0.83$) while revealing limitations on subjective visual assessment.", "link": "https://arxiv.org/abs/2604.05005v2", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Shuzhen Bi", "Mingzi Zhang", "Zhuoxuan Li"], "categories": ["cs.CY", "cs.AI", "cs.CL"]}, {"id": "6", "source": "ARXIV", "score": 15, "day": "2026-04-13", "title": "Examining EAP Students' AI Disclosure Intention: A Cognition-Affect-Conation Perspective", "content": "The growing use of generative artificial intelligence (AI) in academic writing has raised increasing concerns regarding transparency and academic integrity in higher education. This study examines the psychological factors influencing English for Academic Purposes (EAP) students' intention to disclose their use of AI tools. Drawing on the cognition-affect-conation framework, the study proposes a model integrating both enabling and inhibiting factors shaping disclosure intention. A sequential explanatory mixed-methods design was employed. Quantitative data from 324 EAP students at an English-medium instruction university in China were analysed using structural equation modelling, followed by semi-structured interviews with 15 students to further interpret the findings. The quantitative results indicate that psychological safety positively predicts AI disclosure intention, whereas fear of negative evaluation negatively predicts it. The qualitative findings further reveal that supportive teacher practices and clear guidance foster psychological safety, while policy ambiguity and reputational concerns intensify fear of negative evaluation and discourage disclosure. These findings highlight the importance of clear institutional policies and supportive pedagogical environments in promoting transparent AI use.", "link": "https://arxiv.org/abs/2604.10991v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Yiran Du", "Huimin He"], "categories": ["cs.HC", "cs.AI"]}, {"id": "7", "source": "ARXIV", "score": 14, "day": "2026-04-11", "title": "Building Regulation Capacity in Human-AI Collaborative Learning: A Human-Centred GenAI System", "content": "Collaborative learning works when groups regulate together by setting shared goals, coordinating participation, monitoring progress, and responding to breakdowns through co-regulation (CoRL) and socially shared regulation (SSRL). As generative AI (GenAI) enters group work, however, it remains unclear whether and how it supports these socially distributed regulation processes. This doctoral project proposes a GenAI-supported collaborative learning system grounded in CoRL and SSRL to strengthen groups' socially distributed regulation capacity. The system links three components: (1) group activity generation; (2) an in-group support agent that provides process-focused prompts without giving solutions; and (3) an embedded learning analytics dashboard that turns interaction traces into timely summaries for monitoring and decision making. The project progresses from mechanism to design to impact: it first identifies how GenAI reshapes regulation patterns and which patterns indicate more effective Human-AI collaboration, then builds an integrated GenAI system that targets these patterns, and finally evaluates whether the GenAI system improves regulation capacity and group performance across varying levels of GenAI involvement. Expected contributions include a teacher-in-the-loop system for Human-AI collaboration and process-level evidence on how GenAI reconfigures CoRL and SSRL in group work.", "link": "https://arxiv.org/abs/2604.10221v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Yujing Zhang", "Jionghao Lin"], "categories": ["cs.HC"]}, {"id": "8", "source": "ARXIV", "score": 14, "day": "2026-04-11", "title": "Edu-MMBias: A Three-Tier Multimodal Benchmark for Auditing Social Bias in Vision-Language Models under Educational Contexts", "content": "As Vision-Language Models (VLMs) become integral to educational decision-making, ensuring their fairness is paramount. However, current text-centric evaluations neglect the visual modality, leaving an unregulated channel for latent social biases. To bridge this gap, we present Edu-MMBias, a systematic auditing framework grounded in the tri-component model of attitudes from social psychology. This framework diagnoses bias across three hierarchical dimensions: cognitive, affective, and behavioral. Utilizing a specialized generative pipeline that incorporates a self-correct mechanism and human-in-the-loop verification, we synthesize contamination-resistant student profiles to conduct a holistic stress test on state-of-the-art VLMs. Our extensive audit reveals critical, counter-intuitive patterns: models exhibit a compensatory class bias favoring lower-status narratives while simultaneously harboring deep-seated health and racial stereotypes. Crucially, we find that visual inputs act as a safety backdoor, triggering a resurgence of biases that bypass text-based alignment safeguards and revealing a systematic misalignment between latent cognition and final decision-making. The contributions of this paper are available at: https://anonymous.4open.science/r/EduMMBias-63B2.", "link": "https://arxiv.org/abs/2604.10200v2", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Ruijia Li", "Mingzi Zhang", "Zengyi Yu"], "categories": ["cs.AI", "cs.CV"]}, {"id": "9", "source": "ARXIV", "score": 14, "day": "2026-04-06", "title": "CAGE: Bridging the Accuracy-Aesthetics Gap in Educational Diagrams via Code-Anchored Generative Enhancement", "content": "Educational diagrams -- labeled illustrations of biological processes, chemical structures, physical systems, and mathematical concepts -- are essential cognitive tools in K-12 instruction. Yet no existing method can generate them both accurately and engagingly. Open-source diffusion models produce visually rich images but catastrophically garble text labels. Code-based generation via LLMs guarantees label correctness but yields visually flat outputs. Closed-source APIs partially bridge this gap but remain unreliable and prohibitively expensive at educational scale. We quantify this accuracy-aesthetics dilemma across all three paradigms on 400 K-12 diagram prompts, measuring both label fidelity and visual quality through complementary automated and human evaluation protocols. To resolve it, we propose CAGE (Code-Anchored Generative Enhancement): an LLM synthesizes executable code producing a structurally correct diagram, then a diffusion model conditioned on the programmatic output via ControlNet refines it into a visually polished graphic while preserving label fidelity. We also introduce EduDiagram-2K, a collection of 2,000 paired programmatic-stylized diagrams enabling this pipeline, and present proof-of-concept results and a research agenda for the multimedia community.", "link": "https://arxiv.org/abs/2604.09691v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Dikshant Kukreja", "Kshitij Sah", "Karan Goyal"], "categories": ["cs.CV", "cs.AI"]}];
let PAGE_SIZE = 10;
let currentTab = 'all';
let currentSource = 'ALL';
let currentSort = 'score';
let currentPage = 1;
let currentCategory = '';
let currentMinDate = '';
let currentMaxDate = '';
let hideVisited = false;
let filtered = [];
let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
let searchHistory = JSON.parse(localStorage.getItem('searchHistory')) || [];
let visited = JSON.parse(localStorage.getItem('visited')) || [];

function toggleTheme() {
  const html = document.documentElement;
  const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
  html.dataset.theme = next;
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  localStorage.setItem('theme', next);
}

function toggleTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSource(btn) {
  currentSource = btn.dataset.source;
  document.querySelectorAll('#sourceFilters .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSort(btn) {
  currentSort = btn.dataset.sort;
  document.querySelectorAll('#sortGroup .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  render();
}

function toggleFavorite(id, e) {
  e.stopPropagation();
  const idx = favorites.indexOf(id);
  if (idx === -1) {
    favorites.push(id);
  } else {
    favorites.splice(idx, 1);
  }
  localStorage.setItem('favorites', JSON.stringify(favorites));
  applyFilters();
}

function recordVisit(id) {
  if (!visited.includes(id)) {
    visited.push(id);
  }
  localStorage.setItem('visited', JSON.stringify(visited));
}

function recordSearch(query) {
  if (query.trim() && !searchHistory.includes(query)) {
    searchHistory.unshift(query);
    if (searchHistory.length > 10) searchHistory.pop();
    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
  }
}

function downloadJSON() {
  const data = JSON.stringify(filtered, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadCSV() {
  const headers = ['제목', '출처', '스코어', '리뷰여부', '링크'];
  const rows = filtered.map(p => [
    '"' + p.title.replace(/"/g, '""') + '"',
    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
</html>
