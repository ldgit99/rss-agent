<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-05-23 23:56</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "ARXIV", "score": 28, "day": "2026-05-17", "title": "Expert Cognition Dashboard: From Learning Analytics to Cognition Intelligence in AI-Driven Education", "content": "---\ntitle: Expert Cognition Dashboard: From Learning Analytics to Cognition Intelligence in AI-Driven Education\nauthors: [Annie Yuan]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2605.17263v1\nresearch_type: 이론적 연구\nmethodology: 문헌 연구 및 개념적 프레임워크 제안\ndata_type: 명시되지 않음\nsample: 명시되지 않음\ncontext: AI 기반 교육 시스템\ntheoretical_framework: AI Expert Feedback Ecology\nkeywords: [Expert Cognition Dashboard, Cognition intelligence, Cognitive Middleware, AI Expert Feedback Ecology, Longitudinal Cognition Modeling, Transformation-Aware Human–AI Collaboration, Continuous Cognition Partners, AI Twin, AI Tutor, Identity Cognition, Interpretive Analytics, Multi-Level Cognition Aggregation]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 AI 기반 교육 시스템에서 학습 분석 대시보드의 한계를 지적하고, 전문가의 인지 구조를 반영한 Expert Cognition Dashboard (ECD)를 제안한다. ECD는 학습자의 행동을 전문가와 유사한 인지 구조로 해석할 수 있도록 설계되었으며, 이를 통해 AI 시스템이 학습자의 인지적 어려움을 식별하고 개인화된 개입을 지원할 수 있도록 한다. 연구는 ECD의 세 가지 계층 구조(개별 인지 대시보드, 수업 인지 대시보드, AI Twin 전문가 대시보드)를 통해 AI 기반 교육 시스템에서의 인지 지능의 필요성을 강조한다. \n\n# Research Logic\n## Problem\n기존 AI 교육 시스템은 행동 분석에 의존하여 학습자의 인지적 발전을 충분히 설명하지 못한다.\n## Theory\n전문가의 인지 구조를 반영한 새로운 대시보드가 필요하다.\n## Design\nExpert Cognition Dashboard (ECD)라는 개념을 제안하고, 이를 통해 학습자의 행동을 인지 구조로 변환하는 방법을 설명한다.\n## Findings\nECD는 학습자의 인지적 어려움을 식별하고, 개인화된 개입을 가능하게 한다.\n## Conclusion\n대시보드는 단순한 시각화 도구가 아니라, AI 기반 교육 시스템의 인지 인프라로 기능해야 한다.\n\n# Key Findings\n- ECD는 학습자의 행동을 전문가의 인지 구조로 해석할 수 있도록 한다.\n- ECD는 AI Twin을 통해 반복적인 학습자의 어려움을 식별하고 적응형 과제를 생성한다.\n- ECD는 인지 지능으로의 전환을 통해 AI 기반 교육 시스템의 발전을 촉진한다.\n\n# Contributions\n## Theoretical\n전문가 인지 모델을 기반으로 한 새로운 교육 분석 프레임워크를 제안한다.\n## Methodological\n인지 중심의 대시보드 설계를 통해 AI 교육 시스템의 접근 방식을 혁신한다.\n## Practical\n교사와 AI 간의 협업을 통해 개인화된 교육 개입을 지원한다.\n\n# Limitations\n- ECD의 실증적 검증이 부족하다.\n- 다양한 교육 환경에서의 적용 가능성에 대한 논의가 필요하다.\n\n# Transferable Insights\n- AI 기반 교육 시스템에서 인지 중심의 접근 방식이 필요하다.\n- 전문가의 인지 구조를 반영한 데이터 해석이 중요하다.\n\n# Idea Seeds\n1. ECD의 실증적 연구를 위한 파일럿 프로그램 개발.\n2. 다양한 교육 환경에서 ECD의 적용 가능성 탐색.\n3. ECD를 활용한 교사 연수 프로그램 개발.\n\n# Citation Snippets\n> Yuan, A. (2026). Expert Cognition Dashboard: From Learning Analytics to Cognition Intelligence in AI-Driven Education. arXiv. \n\ntags: #human-ai_collaboration, #classroom_ai, #ai_tutoring, #instructional_design, #scaffolding, #tpack, #ai_literacy, #teacher_ai, #education, #learning_analytics, #llm_classroom, #ai_pedagogy", "link": "https://arxiv.org/abs/2605.17263v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Annie Yuan"], "categories": ["cs.HC"]}, {"id": "1", "source": "ARXIV", "score": 28, "day": "2026-05-15", "title": "Access Timing as Scaffolding: A Reinforcement Learning Approach to GenAI in Education", "content": "---\ntitle: Access Timing as Scaffolding: A Reinforcement Learning Approach to GenAI in Education\nauthors: [Janne Rotter, Pau Benazet i Montobbio, Davinia Hernández-Leo]\nyear: 2026\njournal: IEEE Transactions on Learning Technologies\ndoi: 명시되지 않음\nresearch_type: 실험 연구\nmethodology: 혼합 방법 연구\ndata_type: 양적 및 질적 데이터\nsample: N=105\ncontext: 교육 기술 및 인공지능\ntheoretical_framework: 메타인지 이론, 인지 부하 이론, 생산적 실패\nkeywords: [Generative AI, Reinforcement Learning, Metacognition, Intelligent Tutoring Systems, Productive Failure, AI Access Timing]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 교육 환경에서 생성적 인공지능(GenAI)의 접근 타이밍을 암묵적 스캐폴딩으로 간주하고, 강화 학습(RL) 에이전트를 통해 학생들이 GenAI에 접근해야 할 시점을 결정하는 방법을 제안한다. N=105명의 참가자를 대상으로 한 혼합 방법 연구에서, 연구 결과는 전략적으로 타이밍이 조정된 GenAI 접근이 무제한 접근보다 학습 성과와 메타인지 정확성을 향상시키고, 완전한 접근 금지에 비해 과제 오류와 과제 소요 시간을 줄이는 것으로 나타났다. 그러나 자가 보고된 메타인지 인식에서는 조건 간 차이가 나타나지 않았다. 이 연구는 교육자들이 GenAI 접근 타이밍을 어떻게 조정할 수 있는지를 탐구하는 새로운 연구 영역을 열어준다.\n\n# Research Logic\n## Problem\nGenAI의 무제한 사용이 학생들의 과도한 의존과 메타인지 disengagement를 초래할 수 있음.\n## Theory\n접근 타이밍을 스캐폴딩의 한 형태로 보고, 메타인지 이론과 인지 부하 이론을 기반으로 한 보상 함수를 사용.\n## Design\n혼합 방법 연구로, N=105명의 참가자를 대상으로 한 통제된 실험.\n## Findings\n전략적으로 조정된 GenAI 접근이 학습 성과를 향상시키고, 과제 오류 및 소요 시간을 줄임.\n## Conclusion\nGenAI 접근 타이밍은 교육적 목표를 지원하는 효과적인 방법으로, 교육자들이 이를 활용할 수 있는 방법을 제시.\n\n# Key Findings\n- 전략적으로 조정된 GenAI 접근이 학습 성과를 향상시킴.\n- 메타인지 정확성이 향상되었으나 자가 보고된 메타인지 인식에서는 차이가 없음.\n- 과제 오류와 소요 시간이 줄어듦.\n\n# Contributions\n## Theoretical\nGenAI 접근 타이밍을 스캐폴딩의 한 형태로 제안하여 새로운 이론적 틀을 제공.\n## Methodological\n혼합 방법 연구를 통해 GenAI 사용의 효과를 실증적으로 검증.\n## Practical\n교육자들이 GenAI 접근 타이밍을 조정하여 학습 성과를 향상시킬 수 있는 방법을 제시.\n\n# Limitations\n- 자가 보고된 메타인지 인식의 차이가 나타나지 않음.\n- 연구 샘플이 제한적일 수 있음.\n\n# Transferable Insights\n- GenAI 접근 타이밍이 학습 성과에 미치는 긍정적인 영향을 다른 교육 환경에서도 적용 가능.\n- 메타인지 기술 향상을 위한 접근 타이밍의 중요성을 강조.\n\n# Idea Seeds\n1. 다양한 교육 환경에서 GenAI 접근 타이밍의 효과를 비교 연구.\n2. 메타인지 기술 향상을 위한 GenAI 사용 가이드라인 개발.\n3. GenAI와 인간 간의 협력적 학습 모델 개발.\n\n# Citation Snippets\n> Rotter, J., Benazet i Montobbio, P., & Hernández-Leo, D. (2026). Access Timing as Scaffolding: A Reinforcement Learning Approach to GenAI in Education. IEEE Transactions on Learning Technologies.\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #education, #learning analytics, #llm classroom, #ai pedagogy", "link": "https://arxiv.org/abs/2605.15850v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Janne Rotter", "Pau Benazet i Montobbio", "Davinia Hernández-Leo"], "categories": ["cs.CY", "cs.AI", "cs.HC"]}, {"id": "2", "source": "ARXIV", "score": 25, "day": "2026-05-16", "title": "Cross-modal Affinity-aligned Multimodal Learning Analytics for Predicting Student Collaboration Satisfaction in Game-Based Learning", "content": "---\ntitle: Cross-modal Affinity-aligned Multimodal Learning Analytics for Predicting Student Collaboration Satisfaction in Game-Based Learning\nauthors: [Wen-Hsin Tsai, Chia-Ming Lee, Yuk-Ying Tung]\nyear: 2026\njournal: 명시되지 않음\ndoi: 명시되지 않음\nresearch_type: 실험 연구\nmethodology: 실험적 접근법\ndata_type: 다중 모달 데이터\nsample: 50명의 중학생\ncontext: EcoJourneys 협력 학습 환경\ntheoretical_framework: 명시되지 않음\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 협력적 게임 기반 학습 환경에서 학생의 협력 만족도를 예측하기 위한 Affinity-Aligned Multimodal Learning Analytics (AAMLA) 프레임워크를 제안한다. AAMLA의 핵심 구성 요소인 Cross-modal Affinity-guided Modality Alignment (CAMA) 모듈은 모달리티 간의 관계를 명시적으로 모델링하고, 대조 학습을 통해 모달리티 일관성을 강화하여 비정보적 모달리티를 적응적으로 억제한다. 50명의 중학생을 대상으로 한 실험 결과, AAMLA는 단일 모달 기준선 및 이전의 교차 주의 접근법에 비해 일관된 성능 향상을 보였으며, SHAP 및 t-SNE 분석을 통해 CAMA가 학생 협력 모델링을 위한 강력하고 해석 가능한 교차 모달 표현을 생성함을 확인하였다.\n\n# Research Logic\n## Problem\n학생의 협력 만족도를 자동으로 예측하는 것이 어렵고, 모달리티 저하가 주요 장애물로 작용한다.\n## Theory\n모달리티 간의 관계를 명시적으로 모델링하고, 대조 학습을 통해 모달리티 일관성을 유지하는 것이 중요하다.\n## Design\nAAMLA 프레임워크는 다양한 모달리티의 데이터를 통합하여 협력 만족도를 예측한다.\n## Findings\nAAMLA는 단일 모달 접근법 및 이전의 교차 주의 접근법에 비해 성능이 우수하며, 모달리티 저하 조건에서도 안정적인 예측을 제공한다.\n## Conclusion\nCAMA 모듈은 비정보적 모달리티를 효과적으로 억제하면서도 유용한 정보를 유지하여, 협력 만족도 예측의 신뢰성을 높인다.\n\n# Key Findings\n- AAMLA는 단일 모달 기준선보다 우수한 성능을 보였다.\n- CAMA 모듈은 모달리티 저하 조건에서도 안정적인 예측을 가능하게 한다.\n- SHAP 및 t-SNE 분석을 통해 CAMA의 해석 가능성이 입증되었다.\n\n# Contributions\n## Theoretical\n모달리티 간의 관계를 명시적으로 모델링하는 새로운 접근법을 제안하였다.\n## Methodological\n대조 학습을 활용한 모달리티 일관성 유지 방법론을 개발하였다.\n## Practical\n학생의 협력 만족도를 자동으로 예측할 수 있는 실용적인 도구를 제공하였다.\n\n# Limitations\n- 연구 샘플이 중학생으로 제한되어 있어 일반화에 한계가 있다.\n- 모달리티 저하 조건에서의 성능 향상에 대한 추가 연구가 필요하다.\n\n# Transferable Insights\n- 다양한 모달리티를 통합하여 협력적 학습 환경에서의 학생 행동을 분석할 수 있다.\n- 모달리티 간의 관계를 명시적으로 모델링하는 것이 예측 성능을 향상시킬 수 있다.\n\n# Idea Seeds\n1. AAMLA 프레임워크를 다른 교육 환경에 적용하여 효과를 검증할 수 있다.\n2. 다양한 연령대의 학생을 대상으로 한 연구를 통해 일반화 가능성을 높일 수 있다.\n3. 모달리티 저하에 대한 대처 방안을 추가적으로 연구할 수 있다.\n\n# Citation Snippets\n> Tsai, W.-H., Lee, C.-M., & Tung, Y.-Y. (2026). Cross-modal Affinity-aligned Multimodal Learning Analytics for Predicting Student Collaboration Satisfaction in Game-Based Learning.\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy\n\n---\n\n### 압축 요약\n본 연구는 협력적 게임 기반 학습 환경에서 학생의 협력 만족도를 예측하기 위한 AAMLA 프레임워크를 제안하며, CAMA 모듈을 통해 모달리티 간의 관계를 명시적으로 모델링하고 비정보적 모달리티를 억제하는 방법을 제시한다. 50명의 중학생을 대상으로 한 실험에서 AAMLA는 기존 방법들보다 우수한 성능을 보였으며, 해석 가능성 또한 입증되었다.", "link": "https://arxiv.org/abs/2605.16806v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Wen-Hsin Tsai", "Chia-Ming Lee", "Yuk-Ying Tung"], "categories": ["cs.LG", "cs.AI", "cs.CV"]}, {"id": "3", "source": "ARXIV", "score": 21, "day": "2026-05-18", "title": "The Hidden Cost of Contextual Sycophancy: an AI Literacy Intervention in Human-AI Collaboration", "content": "---\ntitle: The Hidden Cost of Contextual Sycophancy: an AI Literacy Intervention in Human-AI Collaboration\nauthors: [Cansu Koyuturk, Sabrina Guidotti, Dimitri Ognibene]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2605.18372v2\nresearch_type: 실험 연구\nmethodology: 혼합 설계 실험\ndata_type: 양적 데이터\nsample: 60명\ncontext: 교육 환경에서의 인간-인공지능 협력\ntheoretical_framework: 사회문화적 학습 이론\nkeywords: [human-ai collaboration, ai literacy, sycophancy, decision-making, prompting]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 대형 언어 모델(LLM)이 교육 환경에서 사용자 신념에 맞추어 잘못된 정보를 제공하는 경향인 '아첨'이 학습 및 의사결정에 미치는 영향을 조사하였다. 60명의 참가자를 대상으로 한 실험에서, 참가자들은 AI 보조 도구와 협력하여 분석적 생존 순위 작업을 수행하였다. 연구 결과, 초기 사용자 입력의 품질이 AI 피드백의 질에 큰 영향을 미치며, 잘못된 사용자 입력이 AI의 조언 품질을 저하시킨다는 것을 발견하였다. AI 문해력 및 프롬프트 개입이 효과를 보였으나, 사용자 오류의 전파를 완전히 제거하지는 못하였다. 이는 AI 지원의 독립성을 보장하기 위한 시스템 차원의 접근이 필요함을 시사한다.\n\n# Research Logic\n## Problem\nLLM의 아첨 경향이 학습 및 의사결정에 미치는 부정적 영향.\n## Theory\n사회문화적 학습 이론에 기반하여, AI와의 상호작용이 학습에 미치는 영향을 분석.\n## Design\n혼합 설계 실험을 통해 참가자들이 AI와 협력하여 문제를 해결하는 과정 관찰.\n## Findings\n사용자의 초기 입력 품질이 AI 조언의 질에 영향을 미치며, 사용자 오류가 AI 피드백에 전파됨.\n## Conclusion\nAI 문해력 및 프롬프트 개입이 효과적이나, 시스템 차원의 접근이 필요함.\n\n# Key Findings\n- LLM은 사용자 입력의 품질에 민감하게 반응함.\n- 사용자 오류의 전파가 AI 피드백의 질을 저하시킴.\n- 프롬프트 개입이 AI의 아첨 경향을 완화하였으나, 오류 전파는 여전히 존재함.\n\n# Contributions\n## Theoretical\nLLM의 아첨 경향과 학습 결과 간의 관계에 대한 새로운 통찰 제공.\n## Methodological\n혼합 설계 실험을 통한 실증적 데이터 수집.\n## Practical\nAI 문해력 향상을 위한 교육적 개입의 필요성 강조.\n\n# Limitations\n- 연구 샘플이 제한적이며, 일반화 가능성에 한계가 있음.\n- 프롬프트 개입의 효과가 제한적임.\n\n# Transferable Insights\n- 사용자 입력의 품질이 AI 피드백에 미치는 영향은 다양한 교육 환경에 적용 가능.\n- AI 문해력 향상을 위한 교육적 개입은 필수적임.\n\n# Idea Seeds\n1. AI 문해력 교육 프로그램 개발.\n2. 다양한 교육 환경에서의 LLM 사용에 대한 연구.\n3. AI와의 협력에서의 사용자 오류 감소를 위한 전략 개발.\n\n# Citation Snippets\n> Koyuturk, C., Guidotti, S., & Ognibene, D. (2026). The Hidden Cost of Contextual Sycophancy: an AI Literacy Intervention in Human-AI Collaboration. arXiv. \n\ntags: #human-ai_collaboration, #ai_literacy, #sycophancy, #decision_making, #prompting, #education, #learning_analytics", "link": "https://arxiv.org/abs/2605.18372v2", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Cansu Koyuturk", "Sabrina Guidotti", "Dimitri Ognibene"], "categories": ["cs.HC", "cs.AI", "cs.CY", "cs.ET"]}, {"id": "4", "source": "ARXIV", "score": 20, "day": "2026-05-15", "title": "Can Vision Language Models Be Adaptive in Mathematics Education? A Learner Model-based Rubric Study", "content": "---\ntitle: Can Vision Language Models Be Adaptive in Mathematics Education? A Learner Model-based Rubric Study\nauthors: Jie Gao, Yongan Yu, Junzhu Su, Yiran Lin, Adam K. Dube, Jackie Chi Kit Cheung\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2605.16011v1\nresearch_type: 실험 연구\nmethodology: 준실험적 설계\ndata_type: 양적 데이터\nsample: TIMSS 수학 항목\ncontext: 수학 교육에서의 비전 언어 모델(VLM) 활용\ntheoretical_framework: 적응 학습 프레임워크\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 비전 언어 모델(VLM)이 수학 교육에서 학습자의 다양한 프로필에 적응할 수 있는 능력을 평가하기 위한 적응성 평가 루브릭을 제안한다. 연구는 학습자의 인지적, 동기적, 복잡성 측면을 포함한 세 가지 차원으로 적응성을 형식화하며, VLM의 응답의 정확성과 품질을 추가적으로 평가한다. 실험 결과, VLM 모델 간의 적응성에서 측정 가능한 차이가 나타났으며, 현재 VLM이 제한된 학습자 정보를 받을 때 일관되게 적응형 교육 응답을 생성하는 데 어려움을 겪고 있음을 보여준다.\n\n# Research Logic\n## Problem\nVLM이 수학 교육에서 학습자의 다양한 프로필에 적응할 수 있는지에 대한 체계적인 평가 프레임워크가 부족하다.\n## Theory\n적응 학습 프레임워크에 기반하여 학습자의 인지적 및 동기적 특성을 고려한 루브릭을 개발하였다.\n## Design\n학습자 프로필과 수학 문제를 결합하여 VLM의 응답을 평가하는 준실험적 설계를 사용하였다.\n## Findings\nVLM 모델 간의 적응성 차이가 존재하며, 제한된 정보로는 일관된 적응형 응답을 생성하기 어렵다는 결과를 도출하였다.\n## Conclusion\nVLM의 적응형 교육 능력을 평가하기 위한 체계적인 접근이 필요하며, 이를 통해 개인화된 학습 지원 도구 개발에 기여할 수 있다.\n\n# Key Findings\n- VLM은 학습자의 다양한 프로필에 적응하는 데 한계가 있다.\n- 적응성 평가에서 인지적, 동기적, 복잡성 차원이 중요하다.\n- 현재 VLM은 제한된 학습자 정보에 대해 일관된 응답을 생성하지 못한다.\n\n# Contributions\n## Theoretical\n적응 학습 이론에 기반한 새로운 평가 루브릭을 제안하였다.\n## Methodological\nVLM의 적응성을 평가하기 위한 체계적이고 정량적인 방법론을 개발하였다.\n## Practical\n수학 교육에서 VLM을 활용한 개인화된 학습 지원의 가능성을 제시하였다.\n\n# Limitations\n- 실험은 제한된 학습자 프로필을 사용하여 진행되었다.\n- 실제 교육 환경에서의 적용 가능성에 대한 검증이 필요하다.\n\n# Transferable Insights\n- VLM의 적응성 평가를 위한 체계적인 루브릭 개발이 필요하다.\n- 다양한 학습자 프로필을 고려한 교육적 접근이 중요하다.\n\n# Idea Seeds\n1. VLM의 적응성을 평가하기 위한 추가적인 차원 개발.\n2. 다양한 교육 환경에서의 VLM 활용 가능성 탐색.\n3. 학습자 피드백을 반영한 VLM 개선 방안 연구.\n\n# Citation Snippets\n> Gao, J., Yu, Y., Su, J., Lin, Y., Dube, A. K., & Cheung, J. C. K. (2026). Can Vision Language Models Be Adaptive in Mathematics Education? A Learner Model-based Rubric Study. arXiv. https://arxiv.org/abs/2605.16011v1\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #ai literacy, #education", "link": "https://arxiv.org/abs/2605.16011v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Jie Gao", "Yongan Yu", "Junzhu Su"], "categories": ["cs.CL", "cs.AI"]}, {"id": "5", "source": "ARXIV", "score": 19, "day": "2026-05-19", "title": "Multi-Week, In-Class Deployments of Telepresence Robots With Four Homebound K-12 Students: Benefits, Challenges, and Recommendations", "content": "Missing significant amounts of school during K-12 education is known to put students' cognitive and social development at risk. Alternatives such as home instruction and online learning are common, but lack sufficient interaction with peers and teachers in the classroom. Mobile remote presence systems, or telepresence robots, are promising for homebound students because they provide embodiment and mobility in addition to the real-time participation offered by video conferencing technologies. Research is needed, however, for telepresence robots to meet the complex needs of homebound students participating remotely in the K-12 classroom context. We present findings from four multi-week deployments with homebound K-12 students attending classes via telepresence robots. The homebound students' experiences were documented in a total of 15 interviews and analyzed qualitatively as case studies. The homebound student participants and their deployment contexts differed from one another along multiple dimensions, and while some benefits of mobile remote attendance were enjoyed by all participants, each participant also experienced unique benefits. Some challenges with hearing, seeing, and moving the robot around the classroom warranted improvements to the design of the telepresence system. Other challenges suggested priorities for managing a classroom deployment, such as ensuring that the remote student is included in classroom activities, accountable to the teacher, and treated with respect by classmates. Based on insights from the study, we make recommendations for real-world deployment procedures in similar contexts.", "link": "https://arxiv.org/abs/2605.20431v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Matthew Rueben", "Rhianna Lee", "Thomas R. Groechel"], "categories": ["cs.HC", "cs.RO"]}, {"id": "6", "source": "ARXIV", "score": 19, "day": "2026-05-15", "title": "See Before You Code: Learning Visual Priors for Spatially Aware Educational Animation Generation", "content": "Large language models can generate executable code for educational animations, but the resulting renders often exhibit visual defects, including element overlap, misalignment, and broken animation continuity. These defects cannot be reliably detected from the code alone and become apparent only after execution. We formalize this problem as render-feedback-aware constrained code generation: given a natural language specification, the model must generate executable code whose rendered output satisfies structured quality criteria that can be evaluated only after rendering. To address this problem, we introduce OmniManim, a render-feedback-aware educational animation generation framework built around a shared scene state, explicit visual planning, structured post-render diagnostics, and localized repair. Within OmniManim, the Vision Agent is a task-specific visual planning module: it predicts sparse keyframe layouts with coarse-to-fine bounding-box denoising and optimizes an interpolation-aware objective to reduce intermediate-frame failures induced by downstream animation interpolation. We further construct two datasets, ManimLayout-1K and EduRequire-500, and provide a reproducible evaluation protocol covering executability, instructional quality, visual quality, and efficiency. On EduRequire-500, OmniManim improves measured render quality over both single-model baselines and existing multi-agent frameworks. Systematic ablation studies further verify that explicit visual planning, especially its coarse spatial prior, bounding-box refinement, and interpolation-aware optimization, is central to these gains.", "link": "https://arxiv.org/abs/2605.15585v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Yuejia Li", "Ke He", "Junheng Li"], "categories": ["cs.AI", "cs.CV"]}, {"id": "7", "source": "OPENALEX", "score": 19, "day": "2026-05-15", "title": "Readiness of Arabic Language Teachers to Integrate Large Language Models (LLMs) in their Teaching Practices: Challenges and Opportunities", "content": "This study examines Arabic language teachers’ readiness to integrate Large Language Models (LLMs) into instructional practices, identifies key challenges, and explores strategic opportunities for pedagogical use. A qualitative library research design was applied using descriptive-analytical and comparative methods based on peer-reviewed literature (2019–2025) on artificial intelligence, language education, and teacher readiness. Findings indicate that teacher readiness remains at an early, uneven stage, shaped by a socio-technical configuration comprising digital literacy, pedagogical competence, psychological disposition, and institutional support. From a TPACK perspective, technological knowledge is less developed than pedagogical and content knowledge, limiting effective integration of AI in Arabic language learning. Psychological barriers such as technological anxiety and low self-efficacy, along with unequal infrastructure and policy support, further constrain adoption. However, gradual exposure to AI tools fosters experiential learning and incremental development of readiness. Despite challenges, LLMs offer opportunities for improved learning effectiveness, personalized instruction, the development of higher-order thinking, and the integration of Islamic educational values. The study conceptualizes teacher readiness as a socio-technical and developmental construct. It highlights the need for AI literacy development, curriculum redesign, and institutional policy support to ensure ethical and sustainable integration of LLMs in Arabic language education.", "link": "https://doi.org/10.29240/jba.v10i1.15202", "altLink": "https://openalex.org/W7161989015", "hasDoi": true, "hasReview": false, "authors": ["Harmanto Raharjo", "Naih Nurjanah", "Ghufran Akbar"], "categories": ["Curriculum", "Experiential learning", "Literacy", "Pedagogy", "Language acquisition"]}, {"id": "8", "source": "ARXIV", "score": 17, "day": "2026-05-18", "title": "Towards SocratiCode: Designing a Generative AI-Based Programming Tutor for K-12 Students through a 4-Week Participatory Design Study", "content": "Generative AI creates new opportunities for programming education, but many existing systems remain overly directive, producing lengthy explanations and premature solutions that can overwhelm K-12 novices. In this paper, we present a participatory design study of how an adaptive tutorial system, SocratiCode, evolved toward a Socratic tutoring model for beginner programming instruction. Drawing on weekly learner feedback, we iteratively refined the system over a four-week study with two K-12 students learning Python. Across iterations, the system shifted from flexible tutorial generation toward a more dialogic form of support characterized by guided questioning, reflection prompts, misconception checks, incremental hints, and mandatory pauses for learner input. Our preliminary observations suggest that this Socratic shift improved explanation clarity, supported problem-solving engagement, and better aligned instruction with novice learners' needs, especially when combined with human guidance. We argue that generative AI in K-12 programming education may be most effective not as an answer engine, but as a Socratic, adaptive learning companion embedded within a human-guided instructional framework.", "link": "https://arxiv.org/abs/2605.17857v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Cassandra Lucas", "Anshul Bihani", "Rohini Kukka"], "categories": ["cs.HC"]}, {"id": "9", "source": "ARXIV", "score": 17, "day": "2026-05-14", "title": "Eskwai for Students: Generative AI Assistant for Legal Education in Ghana", "content": "Recent advances in generative AI have shown their potential to be leveraged for legal education. Yet, work on the development and deployment of such systems for legal education in the Global South is limited. In this work, we developed Eskwai for Students, a generative AI assistant to help law students with their legal education. Eskwai for Students is a retrieval augmented generation (RAG) system that provides answers to a wide range of legal questions for law students grounded in a curated database of over 12K case laws and 1.4K legislation in Ghana. We deployed Eskwai for Students in a longitudinal study of 30 months (2.5 years) used by 3.1K law students in Ghana who made 32K queries. We evaluated the helpfulness of our AI, and provided insight into the kinds of queries law students submit to this generative AI tool, which raises some ethical concerns. This work contributes to an understanding of how law students in the Global South are using generative AI for their studies and the ways it could be leveraged responsibly to advance legal education.", "link": "https://arxiv.org/abs/2605.15380v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["George Boateng", "Philemon Badu", "Patrick Agyeman-Budu"], "categories": ["cs.CL", "cs.CY", "cs.HC"]}];
let PAGE_SIZE = 10;
let currentTab = 'all';
let currentSource = 'ALL';
let currentSort = 'score';
let currentPage = 1;
let currentCategory = '';
let currentMinDate = '';
let currentMaxDate = '';
let hideVisited = false;
let filtered = [];
let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
let searchHistory = JSON.parse(localStorage.getItem('searchHistory')) || [];
let visited = JSON.parse(localStorage.getItem('visited')) || [];

function toggleTheme() {
  const html = document.documentElement;
  const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
  html.dataset.theme = next;
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  localStorage.setItem('theme', next);
}

function toggleTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSource(btn) {
  currentSource = btn.dataset.source;
  document.querySelectorAll('#sourceFilters .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSort(btn) {
  currentSort = btn.dataset.sort;
  document.querySelectorAll('#sortGroup .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  render();
}

function toggleFavorite(id, e) {
  e.stopPropagation();
  const idx = favorites.indexOf(id);
  if (idx === -1) {
    favorites.push(id);
  } else {
    favorites.splice(idx, 1);
  }
  localStorage.setItem('favorites', JSON.stringify(favorites));
  applyFilters();
}

function recordVisit(id) {
  if (!visited.includes(id)) {
    visited.push(id);
  }
  localStorage.setItem('visited', JSON.stringify(visited));
}

function recordSearch(query) {
  if (query.trim() && !searchHistory.includes(query)) {
    searchHistory.unshift(query);
    if (searchHistory.length > 10) searchHistory.pop();
    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
  }
}

function downloadJSON() {
  const data = JSON.stringify(filtered, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadCSV() {
  const headers = ['제목', '출처', '스코어', '리뷰여부', '링크'];
  const rows = filtered.map(p => [
    '"' + p.title.replace(/"/g, '""') + '"',
    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
