<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-04-04 23:31</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "ARXIV", "score": 22, "day": "2026-04-02", "title": "Grounding AI-in-Education Development in Teachers' Voices: Findings from a National Survey in Indonesia", "content": "---\ntitle: Grounding AI-in-Education Development in Teachers' Voices: Findings from a National Survey in Indonesia\nauthors: [Nurul Aisyah, Muhammad Dehan Al Kautsar, Arif Hidayat, Fajri Koto]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2604.01630v1\nresearch_type: 설문조사\nmethodology: 전국적 온라인 설문조사\ndata_type: 양적 데이터\nsample: 349명의 K-12 교사\ncontext: 인도네시아\ntheoretical_framework: 명시되지 않음\nkeywords: [AI, 교육, 교사, 설문조사, 인도네시아, 교수법, 기술 수용]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 인도네시아 K-12 교사 349명을 대상으로 한 설문조사를 통해 AI의 사용 현황과 교사들이 필요로 하는 지원을 조사하였다. 연구 결과, 교사들은 주로 교수법, 콘텐츠 개발 및 교육 매체를 위해 AI를 사용하고 있으며, 초등학교 교사들이 가장 일관되게 AI를 활용하는 반면, 고등학교 교사들은 상대적으로 적은 사용을 보였다. 교사들은 AI를 통해 수업 준비의 부담을 줄이고자 하나, 일반적인 출력물, 인프라 제약 및 맥락적 일치 부족이 효과적인 교실 통합을 방해하고 있다.\n\n# Research Logic\n## Problem\n인도네시아 교육 현장에서 AI 사용에 대한 대규모 교사 중심의 증거가 부족하여 적절한 AI 시스템과 정책 개발이 저해되고 있다.\n\n## Theory\nAI 도구의 사용과 교사들이 필요로 하는 지원에 대한 이해 부족이 AI 통합의 장애물로 작용하고 있다.\n\n## Design\n전국적 온라인 설문조사를 통해 다양한 학교 수준과 지역의 교사들로부터 데이터를 수집하였다.\n\n## Findings\n교사들은 AI를 주로 수업 준비와 평가에 활용하며, 동아시아 지역의 교사들이 AI의 가치를 더 높게 평가하고 있다. 그러나 인프라와 기술 접근성의 제약이 존재한다.\n\n## Conclusion\nAI 시스템은 더 많은 맥락 인식과 교육적 기반을 갖추어야 하며, 인프라 제약을 고려한 설계가 필요하다.\n\n# Key Findings\n- 초등학교 교사들이 AI를 가장 일관되게 사용하고 있다.\n- AI 사용의 주요 목적은 수업 준비의 부담을 줄이는 것이다.\n- 인프라 제약과 일반적인 출력물이 교실 통합의 장애물로 작용하고 있다.\n\n# Contributions\n## Theoretical\nAI 통합에 대한 교사들의 요구와 도전 과제를 명확히 하여 이론적 기초를 제공한다.\n\n## Methodological\n전국적 설문조사를 통해 다양한 교사 특성을 반영한 데이터를 수집하였다.\n\n## Practical\nAI 교육 도구 개발자들에게 교사들의 필요와 도전 과제를 기반으로 한 실질적인 권고안을 제시한다.\n\n# Limitations\n- 설문조사의 응답자는 자발적으로 참여하였으므로 표본 편향이 있을 수 있다.\n- 특정 지역이나 학교 유형에 대한 대표성이 부족할 수 있다.\n\n# Transferable Insights\n- AI 도구의 효과적인 통합을 위해 교사들의 실제 요구를 반영해야 한다.\n- 인프라 개선이 AI 교육 도구의 성공적인 사용에 필수적이다.\n\n# Idea Seeds\n1. AI 도구의 맥락적 적합성을 높이기 위한 연구 필요.\n2. 교사 교육 프로그램에 AI 활용 교육 포함.\n3. AI 도구의 사용자 피드백 시스템 구축.\n\n# Citation Snippets\n> Aisyah, N., Kautsar, M.D.A., Hidayat, A., & Koto, F. (2026). Grounding AI-in-Education Development in Teachers' Voices: Findings from a National Survey in Indonesia. arXiv. https://arxiv.org/abs/2604.01630v1\n\ntags: #AI, #교육, #교사, #설문조사, #인도네시아, #교수법, #기술수용", "link": "https://arxiv.org/abs/2604.01630v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Nurul Aisyah", "Muhammad Dehan Al Kautsar", "Arif Hidayat"], "categories": ["cs.CL"]}, {"id": "1", "source": "OPENALEX", "score": 22, "day": "2026-04-01", "title": "Artificial Intelligence and Youth: Cognitive, Educational, and Behavioral Impacts", "content": "---\ntitle: Artificial Intelligence and Youth: Cognitive, Educational, and Behavioral Impacts\nauthors: [Daniele Giansanti, Claudia Cosenza]\nyear: 2026\njournal: 명시되지 않음\ndoi: https://openalex.org/W7147320584\nresearch_type: 서술적 리뷰\nmethodology: 서술적 리뷰\ndata_type: 경험적 연구, 심리측정 도구, 국제 정책 프레임워크\nsample: 청소년 및 초기 경력 전문가\ncontext: 교육 및 직업 환경\ntheoretical_framework: 명시되지 않음\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n이 리뷰는 인공지능(AI)과 생성적 AI(GenAI)가 청소년 및 초기 경력 전문가에게 미치는 인지적, 교육적, 행동적 영향을 분석한다. AI는 학습 효율성, 창의성 및 전문적 의사결정을 향상시키지만, 인지적 의존성과 중독적 행동을 촉진할 수 있다. 효과적인 전략으로는 구조화된 교수법, 인간의 감독, 반성적 실천, AI 리터러시 및 윤리적 지침이 포함된다. 책임 있는 AI 통합을 위해서는 메타인지 전략, 감독 및 거버넌스를 결합한 다차원적 접근이 필요하다.\n\n# Research Logic\n## Problem\nAI와 GenAI의 과도한 의존이 청소년의 비판적 사고 및 자율적 문제 해결 능력에 부정적인 영향을 미칠 수 있다.\n## Theory\nAI의 사용이 청소년의 인지적, 교육적, 행동적 차원에 미치는 영향을 탐구한다.\n## Design\n서술적 리뷰를 통해 다양한 경험적 연구와 정책 프레임워크를 종합적으로 분석하였다.\n## Findings\nAI는 학습 효율성을 높이고 창의성을 증진시키지만, 인지적 의존과 중독적 행동을 유발할 수 있다. CAIDS 및 PCGUS와 같은 도구가 비적응적 패턴을 식별하는 데 유용하다.\n## Conclusion\n책임 있는 AI 통합은 자율성 및 인지적 발전을 보존하기 위해 다차원적 접근이 필요하다.\n\n# Key Findings\n- AI는 학습 효율성과 창의성을 향상시킨다.\n- AI 의존성 및 중독적 행동을 촉진할 수 있다.\n- 구조화된 교수법과 인간의 감독이 효과적인 전략으로 제시된다.\n\n# Contributions\n## Theoretical\nAI와 GenAI의 교육적 통합에 대한 새로운 통찰을 제공한다.\n## Methodological\n서술적 리뷰를 통해 다양한 연구 결과를 종합적으로 분석하였다.\n## Practical\nAI 리터러시 및 윤리적 지침의 필요성을 강조한다.\n\n# Limitations\n- 특정 데이터 세트에 대한 명시적 분석이 부족하다.\n- 연구의 범위가 청소년 및 초기 경력 전문가로 제한된다.\n\n# Transferable Insights\n- AI의 책임 있는 사용을 위한 교육적 접근이 필요하다.\n- 메타인지 전략과 감독의 중요성을 강조한다.\n\n# Idea Seeds\n1. AI 리터러시 교육 프로그램 개발\n2. AI 의존성 평가 도구의 확장\n3. 교육 현장에서의 AI 통합 사례 연구\n\n# Citation Snippets\n>\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #ai literacy, #education\n\n---\n\n이 논문은 AI와 GenAI의 청소년에 대한 영향을 다루며, 책임 있는 통합을 위한 다차원적 접근의 필요성을 강조한다. AI의 긍정적 효과와 함께 부정적 영향을 고려하여 교육적 전략을 제안한다.", "link": "https://doi.org/10.3390/ai7040121", "altLink": "https://openalex.org/W7147320584", "hasDoi": true, "hasReview": true, "authors": ["Daniele Giansanti", "Claudia Cosenza"], "categories": ["Metacognition", "Psychology", "Cognition", "Competence (human resources)", "Compromise"]}, {"id": "2", "source": "ARXIV", "score": 19, "day": "2026-04-01", "title": "Democratizing Foundations of Problem-Solving with AI: A Breadth-First Search Curriculum for Middle School Students", "content": "---\ntitle: AI를 통한 문제 해결의 민주화: 중학생을 위한 너비 우선 탐색 커리큘럼\nauthors: Griffin Pitts, Kimia Fazeli, Tirth Bhatt, Jennifer Albert, Marnie Hill, Tiffany Barnes, Shiyan Jiang, Bita Akram\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2604.01396v1\nresearch_type: 교육 연구\nmethodology: 혼합 방법\ndata_type: 정량적 및 정성적 데이터\nsample: 103명의 중학생 (N=59)\ncontext: 미국의 한 농촌 중학교\ntheoretical_framework: AI4K12 Big Ideas\nkeywords: [AI 교육, 문제 해결, 너비 우선 탐색, 과학 교육, 교육 설계, 상호작용 학습 환경, AI 문해력]\n---\n\n# APA 7th style\n\n# Summary\n이 연구는 AI가 학생들의 일상에서 점점 더 보편화됨에 따라 K-12 AI 교육의 주요 과제가 기존 과목 교육에 의미 있게 통합될 수 있는 학습 경험을 설계하는 것임을 강조한다. 본 논문은 너비 우선 탐색(BFS)을 활용하여 AI 문제 해결을 위한 접근 가능한 진입점을 제공하는 AI4K12에 맞춘 커리큘럼의 설계 및 구현을 제시한다. 학생들은 비연결 활동과 상호작용 시뮬레이션 환경을 통해 BFS를 배우고, 이를 과학적 맥락에서 바이러스 확산 및 접촉 추적에 적용하였다. 연구 결과, 학생들은 커리큘럼에 생산적으로 참여하였고, BFS 및 AI 문제 해결에 대한 이해가 향상되었으며, 과학 교육과의 연계에서 이점을 얻었다. 교사의 피드백은 이 모듈이 과학 교육과 잘 맞아떨어지며, 의도된 과학 학습 결과를 지원한다고 나타났다.\n\n# Research Logic\n## Problem\nK-12 AI 교육에서 AI 학습 경험을 기존 과목 교육에 통합하는 것이 주요 과제이다.\n\n## Theory\nAI4K12 Big Ideas에 기반하여 AI 개념과 절차를 이해하는 것이 중요하다.\n\n## Design\n너비 우선 탐색(BFS)을 중학교 과학 교육에 통합한 커리큘럼을 설계하였다.\n\n## Findings\n학생들은 BFS에 대한 이해가 향상되었고, 커리큘럼에 대한 참여도가 높았다.\n\n## Conclusion\nAI 문제 해결에 대한 접근성을 넓히기 위한 커리큘럼 및 설계 고려사항을 제시하였다.\n\n# Key Findings\n- 학생들은 BFS에 대한 이해가 유의미하게 향상되었다 (pre: M=0.683, post: M=0.790, p=0.006).\n- 64.5%의 학생들이 BFS를 사용하여 최단 경로를 정확히 식별하였다.\n- 교사는 커리큘럼이 과학 교육과 잘 통합되었다고 평가하였다.\n\n# Contributions\n## Theoretical\nAI 문제 해결의 기초를 민주화하는 이론적 기여를 제공하였다.\n\n## Methodological\n혼합 방법을 통해 정량적 및 정성적 데이터를 수집하고 분석하였다.\n\n## Practical\nAI 교육을 기존 과목 교육에 통합하는 실용적인 접근 방식을 제시하였다.\n\n# Limitations\n- 연구는 특정 농촌 중학교에서만 수행되었다.\n- 학생들의 사전 지식 차이를 충분히 고려하지 못하였다.\n\n# Transferable Insights\n- AI 교육을 기존 교육과 통합하는 것이 중요하다.\n- 학생의 참여를 유도하기 위한 상호작용적 활동이 효과적이다.\n\n# Idea Seeds\n1. 다른 과목에 AI 문제 해결 접근 방식을 통합하는 연구.\n2. 다양한 배경을 가진 학생들을 위한 맞춤형 AI 교육 자료 개발.\n3. 교사 교육을 위한 AI 문해력 향상 프로그램 개발.\n\n# Citation Snippets\n> Pitts, G., Fazeli, K., Bhatt, T., Albert, J., Hill, M., Barnes, T., Jiang, S., & Akram, B. (2026). Democratizing Foundations of Problem-Solving with AI: A Breadth-First Search Curriculum for Middle School Students. arXiv. https://arxiv.org/abs/2604.01396v1\n\ntags: #AI교육, #문제해결, #너비우선탐색, #과학교육, #교육설계, #상호작용학습환경, #AI문해력", "link": "https://arxiv.org/abs/2604.01396v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Griffin Pitts", "Kimia Fazeli", "Tirth Bhatt"], "categories": ["cs.CY", "cs.ET", "cs.HC"]}, {"id": "3", "source": "OPENALEX", "score": 17, "day": "2026-04-03", "title": "Reimagining teacher-AI co-design in learning task design: trends and perspectives", "content": "---\ntitle: Reimagining teacher-AI co-design in learning task design: trends and perspectives\nauthors: Zongran Wang, Liu Mingzhuo, A.Y.M. Atiquil Islam\nyear: 2026\njournal: Humanities and Social Sciences Communications\ndoi: https://doi.org/10.1057/s41599-026-06981-y\nresearch_type: 체계적 리뷰\nmethodology: 주제 코딩\ndata_type: 경험적 연구\nsample: 28개의 연구\ncontext: 교육적 맥락\ntheoretical_framework: 명시되지 않음\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n이 체계적 리뷰는 2015년부터 2025년까지 발표된 28개의 경험적 연구를 종합하여 교사가 인공지능(AI), 특히 생성적 AI(GenAI)와 협력하여 학습 과제를 설계하는 방식을 탐구한다. 리뷰는 사용된 이론적 프레임워크, 구현된 AI 기능, 교사-AI 협력 모드, 협력을 형성하는 목표에 관한 네 가지 연구 질문에 초점을 맞춘다. 주제 코딩 결과, GenAI 도구는 수업 계획, 프롬프트 생성 및 창의적 아이디어 발산을 지원하는 데 주로 사용되며, 전통적인 AI 도구는 분석 설계 및 피드백 설계에 일반적으로 사용된다. 교사-AI 협력은 다양한 형태로 나타나며, AI와 GenAI는 주로 보조자 또는 콘텐츠 생성자로 기능하고, 덜 자주 공동 설계자 또는 대화 파트너로 기능한다. AI 기능 분석 결과, 도구는 효율성, 반응성, 창의성 및 형평성과 같은 네 가지 교육적 특성과의 정렬에 따라 선택된다. 이 리뷰는 AI 도구와 함께 설계하는 과정에서 교사의 역할이 진화하고 있음을 강조하며, 교사-AI 공동 설계의 공정하고 맥락에 민감한 이론적 모델에 대한 추가 연구의 필요성을 강조한다.\n\n# Research Logic\n## Problem\n교사와 AI 간의 협력적 설계가 교육적 맥락에서 어떻게 이루어지는지에 대한 체계적인 이해 부족.\n## Theory\nAI와 GenAI의 통합이 교사 설계 과정에 미치는 영향.\n## Design\n28개의 경험적 연구를 주제 코딩을 통해 분석.\n## Findings\nGenAI 도구는 주로 수업 계획 및 창의적 아이디어 발산에 사용되며, AI는 보조자 역할을 수행.\n## Conclusion\n교사-AI 협력의 진화된 역할과 공정한 설계 모델에 대한 연구 필요.\n\n# Key Findings\n- GenAI 도구는 수업 계획 및 프롬프트 생성에 주로 사용됨.\n- AI는 보조자 또는 콘텐츠 생성자로서 기능하며, 공동 설계자 역할은 드물게 수행됨.\n- 도구 선택은 효율성, 반응성, 창의성, 형평성과의 정렬에 기반함.\n\n# Contributions\n## Theoretical\nAI와 교사 간의 협력적 설계에 대한 새로운 이론적 통찰 제공.\n## Methodological\n체계적 리뷰를 통해 기존 연구의 경향과 공백을 분석.\n## Practical\n교사-AI 협력 설계의 실제 적용을 위한 지침 제공.\n\n# Limitations\n- 연구 샘플이 28개로 제한되어 일반화에 한계가 있음.\n- AI 도구의 실제 사용 사례에 대한 심층적 분석 부족.\n\n# Transferable Insights\n- AI와의 협력적 설계가 교육적 효과를 높일 수 있는 가능성.\n- 교사-AI 협력의 다양한 형태와 그에 따른 도전 과제.\n\n# Idea Seeds\n1. AI 도구의 효과적인 통합을 위한 교사 교육 프로그램 개발.\n2. 교사-AI 협력의 성공 사례 연구.\n3. AI 도구의 사용이 학습 성과에 미치는 영향 분석.\n\n# Citation Snippets\n> Wang, Z., Mingzhuo, L., & Islam, A.A. (2026). Reimagining teacher-AI co-design in learning task design: trends and perspectives. Humanities and Social Sciences Communications. https://doi.org/10.1057/s41599-026-06981-y\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy", "link": "https://doi.org/10.1057/s41599-026-06981-y", "altLink": "https://openalex.org/W7148631659", "hasDoi": true, "hasReview": true, "authors": ["Zongran Wang", "Liu Mingzhuo", "A.Y.M. Atiquil Islam"], "categories": ["Task (project management)", "Psychology", "Computer science", "Knowledge management", "Experiential learning"]}, {"id": "4", "source": "ARXIV", "score": 16, "day": "2026-04-02", "title": "Generative AI Spotlights the Human Core of Data Science: Implications for Education", "content": "---\ntitle: Generative AI Spotlights the Human Core of Data Science: Implications for Education\nauthors: Nathan Taback\nyear: 2026\njournal: 명시되지 않음\ndoi: https://arxiv.org/abs/2604.02238v1\nresearch_type: 이론적 연구\nmethodology: 문헌 분석\ndata_type: 명시되지 않음\nsample: 명시되지 않음\ncontext: 데이터 과학 교육\ntheoretical_framework: Donoho의 Greater Data Science 프레임워크\nkeywords: [generative AI, data science education, greater data science, surveillance capitalism, human-in-the-loop, learning outcomes]\n---\n\n# APA 7th style\n\n# Summary\n이 논문은 생성적 인공지능(GAI)이 데이터 과학 교육에서 인간의 사고 중심을 강조해야 한다고 주장한다. GAI는 데이터 정리, 요약, 시각화, 모델링 및 보고서 초안 작성과 같은 많은 일상적인 데이터 과학 작업을 수행할 수 있지만, 문제 정의, 측정 및 설계, 인과 식별, 통계 및 계산적 추론, 윤리 및 책임, 의미 부여와 같은 인간의 역량은 여전히 필수적이다. Donoho의 Greater Data Science 프레임워크를 바탕으로 GAI의 영향을 분석하며, 데이터 과학 교육 과정은 이러한 인간 중심의 역량에 초점을 맞추어야 한다고 제안한다.\n\n# Research Logic\n## Problem\nGAI의 발전이 데이터 과학 교육에서 인간의 사고를 약화시키는 것이 아니라 오히려 강화해야 한다는 문제 제기.\n\n## Theory\nDonoho의 Greater Data Science 프레임워크와 McLuhan-Culkin의 도구와 인간의 상호작용에 대한 통찰을 기반으로 함.\n\n## Design\n문헌 분석을 통해 GAI의 데이터 과학 교육에 대한 영향을 체계적으로 탐구.\n\n## Findings\nGAI는 데이터 처리의 많은 부분을 자동화했지만, 여전히 인간의 판단과 윤리가 중요한 역할을 한다는 발견.\n\n## Conclusion\n데이터 과학 교육 과정은 인간 중심의 역량을 강조하고, 학습 성과와 평가에서 이러한 역량을 명시적으로 평가해야 한다는 결론.\n\n# Key Findings\n- GAI는 데이터 과학의 많은 작업을 자동화하지만, 인간의 사고와 판단은 여전히 필수적이다.\n- 데이터 과학 교육 과정은 인간 중심의 역량에 초점을 맞추어야 한다.\n- GAI의 발전은 데이터 과학의 본질적 구조를 드러내며, 교육 방법론에 중요한 영향을 미친다.\n\n# Contributions\n## Theoretical\nGAI와 데이터 과학 교육의 관계를 재조명하고, 인간 중심의 역량의 중요성을 강조.\n\n## Methodological\n문헌 분석을 통해 GAI의 교육적 함의를 체계적으로 정리.\n\n## Practical\n데이터 과학 교육 과정 설계에 대한 실질적인 제안 제공.\n\n# Limitations\n- 특정 통계적 데이터나 사례 연구가 부족함.\n- GAI의 발전 속도에 대한 예측이 불확실함.\n\n# Transferable Insights\n- GAI의 자동화가 인간의 판단을 대체할 수 없음을 인식해야 함.\n- 데이터 과학 교육에서 인간 중심의 역량을 강조하는 것이 중요함.\n\n# Idea Seeds\n1. GAI를 활용한 데이터 과학 교육의 새로운 커리큘럼 개발.\n2. 인간 중심의 역량을 평가하기 위한 새로운 평가 도구 설계.\n3. GAI와 협력하는 데이터 과학 교육 모델 연구.\n\n# Citation Snippets\n> Taback, N. (2026). Generative AI Spotlights the Human Core of Data Science: Implications for Education. \n\ntags: #generativeAI, #dataScienceEducation, #greaterDataScience, #surveillanceCapitalism, #humanInTheLoop, #learningOutcomes\n\n---\n\n요약: 이 논문은 생성적 인공지능(GAI)이 데이터 과학 교육에서 인간의 사고 중심을 강조해야 한다고 주장하며, GAI의 발전이 인간의 역량을 약화시키기보다는 오히려 강화해야 한다고 강조한다. 데이터 과학 교육 과정은 이러한 인간 중심의 역량에 초점을 맞추어야 한다.", "link": "https://arxiv.org/abs/2604.02238v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Nathan Taback"], "categories": ["cs.CY", "cs.AI", "stat.AP"]}, {"id": "5", "source": "ARXIV", "score": 14, "day": "2026-04-02", "title": "Captioning Daily Activity Images in Early Childhood Education: Benchmark and Algorithm", "content": "Image captioning for Early Childhood Education (ECE) is essential for automated activity understanding and educational assessment. However, existing methods face two key challenges. First, the lack of large-scale, domain-specific datasets limits the model's ability to capture fine-grained semantic concepts unique to ECE scenarios, resulting in generic and imprecise descriptions. Second, conventional training paradigms exhibit limitations in enhancing professional object description capability, as supervised learning tends to favor high-frequency expressions, while reinforcement learning may suffer from unstable optimization on difficult samples.   To address these limitations, we introduce ECAC, a large-scale benchmark for ECE daily activity image captioning, comprising 256,121 real-world images annotated with expert-level captions and fine-grained labels. ECAC is further equipped with a domain-oriented evaluation protocol, the Teaching Toy Recognition Score (TTS), to explicitly measure professional object naming accuracy. Furthermore, we propose RSRS (Reward-Conditional Switch of Reinforcement Learning and Supervised Fine-Tuning), a hybrid training framework that dynamically alternates between RL and supervised optimization. By rerouting hard samples with zero rewards to supervised fine-tuning, RSRS effectively mitigates advantage collapse and enables stable optimization for fine-grained recognition. Leveraging ECAC and RSRS, we develop KinderMM-Cap-3B, a domain-adapted multimodal large language model. Extensive experiments demonstrate that our model achieves a TTS of 51.06, substantially outperforming state-of-the-art baselines while maintaining superior caption quality, highlighting its potential for specialized educational applications.", "link": "https://arxiv.org/abs/2604.01941v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Sixing Li", "Zhibin Gu", "Ziqi Zhang"], "categories": ["cs.CV", "cs.AI"]}, {"id": "6", "source": "OPENALEX", "score": 14, "day": "2026-04-01", "title": "Navigating the Dual-View Phenomenon: Social Ambivalence, Ambivalence Literacy, and Lecturer Role Transformation in AI-Integrated Transnational STEM Education", "content": "Generative AI chatbots are becoming routine study companions in STEM, which raises a pedagogical question: what do students expect human lecturers to do differently when AI support is ubiquitous? This study examines STEM undergraduates’ expectations for a transformation of the lecturer role and their social ambivalence toward AI chatbots in Sino-foreign transnational education (TNE) programmes in China. We administered an online survey to 467 consenting undergraduates across four partnership institutions (three with sufficient subgroup sizes for institutional comparison). The survey instrument captured adoption readiness, perceived AI-enabled learning enhancement, expected changes to the lecturer role (multi-select), perceived social enhancement and social reduction mechanisms, and perceived support needs; it also asked an open-ended question, collecting 454 usable comments. We report descriptive statistics, χ2 tests, Spearman correlations, and exploratory content analysis results. Students expected lecturers to shift from content delivery to facilitation: 52.7% anticipated that chatbots would handle routine questions, enabling more discussion and practical activities, and 49.7% expected greater emphasis on guiding deep thinking and problem solving. Perceived social impacts were strongly ambivalent: 92.2% endorsed at least one social enhancement and at least one social reduction mechanism, and enhancement and reduction indices were positively associated (ρ = 0.547, p &lt; 0.001), a pattern that remained stable under alternative scoring and response-style trimming (ρ range = 0.526–0.590). Importantly, higher social ambivalence was linked to stronger expectations of lecturer governance and orchestration, including the curation of chatbot resources (42.5% vs. 9.7% in high vs. low ambivalence; χ2(1) = 44.12, p &lt; 0.001) and accuracy checking (27.6% vs. 13.4%; χ2(1) = 8.82, p = 0.003). We therefore propose ambivalence literacy as a conceptual framework for responsible AI integration: a teachable capability to recognise and navigate simultaneous social benefits and risks of AI use, and to translate that recognition into concrete expectations for lecturer governance, orchestration, and facilitative teaching design in AI-integrated transnational STEM programmes.", "link": "https://doi.org/10.3390/educsci16040554", "altLink": "https://openalex.org/W7147720984", "hasDoi": true, "hasReview": false, "authors": ["Kamalanathan Kajan", "W. Y. Shi", "Dariusz Wanatowski"], "categories": ["Ambivalence", "Chatbot", "Psychology", "General partnership", "Higher education"]}, {"id": "7", "source": "ARXIV", "score": 13, "day": "2026-04-02", "title": "Impact of Multimodal and Conversational AI on Learning Outcomes and Experience", "content": "Multimodal Large Language Models (MLLMs) offer an opportunity to support multimedia learning through conversational systems grounded in educational content. However, while conversational AI is known to boost engagement, its impact on learning in visually-rich STEM domains remains under-explored. Moreover, there is limited understanding of how multimodality and conversationality jointly influence learning in generative AI systems. This work reports findings from a randomized controlled online study (N = 124) comparing three approaches to learning biology from textbook content: (1) a document-grounded conversational AI with interleaved text-and-image responses (MuDoC), (2) a document-grounded conversational AI with text-only responses (TexDoC), and (3) a textbook interface with semantic search and highlighting (DocSearch). Learners using MuDoC achieved the highest post-test scores and reported the most positive learning experience. Notably, while TexDoC was rated as significantly more engaging and easier to use than DocSearch, it led to the lowest post-test scores, revealing a disconnect between student perceptions and learning outcomes. Interpreted through the lens of the Cognitive Load Theory, these findings suggest that conversationality reduces extraneous load, while visual-verbal integration induced by multimodality increases germane load, leading to better learning outcomes. When conversationality is not complemented by multimodality, reduced cognitive effort may instead inflate perceived understanding without improving learning outcomes.", "link": "https://arxiv.org/abs/2604.02221v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Karan Taneja", "Anjali Singh", "Ashok K. Goel"], "categories": ["cs.HC", "cs.AI"]}, {"id": "8", "source": "ARXIV", "score": 13, "day": "2026-03-31", "title": "Kwame 2.0: Human-in-the-Loop Generative AI Teaching Assistant for Large Scale Online Coding Education in Africa", "content": "Providing timely and accurate learning support in large-scale online coding courses is challenging, particularly in resource-constrained contexts. We present Kwame 2.0, a bilingual (English-French) generative AI teaching assistant built using retrieval-augmented generation and deployed in a human-in-the-loop forum within SuaCode, an introductory mobile-based coding course for learners across Africa. Kwame 2.0 retrieves relevant course materials and generates context-aware responses while encouraging human oversight and community participation. We deployed the system in a 15-month longitudinal study spanning 15 cohorts with 3,717 enrollments across 35 African countries. Evaluation using community feedback and expert ratings shows that Kwame 2.0 provided high-quality and timely support, achieving high accuracy on curriculum-related questions, while human facilitators and peers effectively mitigated errors, particularly for administrative queries. Our findings demonstrate that human-in-the-loop generative AI systems can combine the scalability and speed of AI with the reliability of human support, offering an effective approach to learning assistance for underrepresented populations in resource-constrained settings at scale.", "link": "https://arxiv.org/abs/2603.29159v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["George Boateng", "Samuel Boateng", "Victor Kumbol"], "categories": ["cs.CL", "cs.CY", "cs.HC"]}, {"id": "9", "source": "ARXIV", "score": 11, "day": "2026-03-31", "title": "AI-Generated Prior Authorization Letters: Strong Clinical Content, Weak Administrative Scaffolding", "content": "Prior authorization remains one of the most burdensome administrative processes in U.S. healthcare, consuming billions of dollars and thousands of physician hours each year. While large language models have shown promise across clinical text tasks, their ability to produce submission-ready prior authorization letters has received only limited attention, with existing work confined to single-case demonstrations rather than structured multi-scenario evaluation. We assessed three commercially available LLMs (GPT-4o, Claude Sonnet 4.5, and Gemini 2.5 Pro) across 45 physician-validated synthetic scenarios spanning rheumatology, psychiatry, oncology, cardiology, and orthopedics. All three models generated letters with strong clinical content: accurate diagnoses, well-structured medical necessity arguments, and thorough step therapy documentation. However, a secondary analysis of real-world administrative requirements revealed consistent gaps that clinical scoring alone did not capture, including absent billing codes, missing authorization duration requests, and inadequate follow-up plans. These findings reframe the question: the challenge for clinical deployment is not whether LLMs can write clinically adequate letters, but whether the systems built around them can supply the administrative precision that payer workflows require.", "link": "https://arxiv.org/abs/2603.29366v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Moiz Sadiq Awan", "Maryam Raza"], "categories": ["cs.AI"]}];
let PAGE_SIZE = 10;
let currentTab = 'all';
let currentSource = 'ALL';
let currentSort = 'score';
let currentPage = 1;
let currentCategory = '';
let currentMinDate = '';
let currentMaxDate = '';
let hideVisited = false;
let filtered = [];
let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
let searchHistory = JSON.parse(localStorage.getItem('searchHistory')) || [];
let visited = JSON.parse(localStorage.getItem('visited')) || [];

function toggleTheme() {
  const html = document.documentElement;
  const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
  html.dataset.theme = next;
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  localStorage.setItem('theme', next);
}

function toggleTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSource(btn) {
  currentSource = btn.dataset.source;
  document.querySelectorAll('#sourceFilters .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSort(btn) {
  currentSort = btn.dataset.sort;
  document.querySelectorAll('#sortGroup .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  render();
}

function toggleFavorite(id, e) {
  e.stopPropagation();
  const idx = favorites.indexOf(id);
  if (idx === -1) {
    favorites.push(id);
  } else {
    favorites.splice(idx, 1);
  }
  localStorage.setItem('favorites', JSON.stringify(favorites));
  applyFilters();
}

function recordVisit(id) {
  if (!visited.includes(id)) {
    visited.push(id);
  }
  localStorage.setItem('visited', JSON.stringify(visited));
}

function recordSearch(query) {
  if (query.trim() && !searchHistory.includes(query)) {
    searchHistory.unshift(query);
    if (searchHistory.length > 10) searchHistory.pop();
    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
  }
}

function downloadJSON() {
  const data = JSON.stringify(filtered, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadCSV() {
  const headers = ['제목', '출처', '스코어', '리뷰여부', '링크'];
  const rows = filtered.map(p => [
    '"' + p.title.replace(/"/g, '""') + '"',
    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
</html>
