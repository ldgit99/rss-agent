<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-03-15 23:28</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

const PAPERS = [{"id": "0", "source": "OPENALEX", "score": 18, "day": "2025-11-08", "title": "Innovative Language Learning: AI and Mobile Technologies in Post-Pandemic Landscape", "content": "---\ntitle: Innovative Language Learning: AI and Mobile Technologies in Post-Pandemic Landscape\nauthors: Edgar R. Eslit\nyear: 2025\njournal: 명시되지 않음\ndoi: 명시되지 않음\nresearch_type: 현상학적 연구\nmethodology: 질적 연구\ndata_type: 경험적 데이터\nsample: 10명의 참가자\ncontext: St. Michael’s College, Iligan City\ntheoretical_framework: 사회문화 이론, 구성주의 학습 이론, TPACK 프레임워크\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 St. Michael’s College의 영어학 학사(Bachelor of Arts in English Language, BAEL) 학생들과 교육자들 사이에서 팬데믹 이후 문학 및 언어 학습의 변화를 현상학적으로 탐구한다. 10명의 참가자의 경험을 바탕으로 Duolingo, Grammarly, ChatGPT와 같은 플랫폼이 교실 수업과 독립 학습을 어떻게 재구성하는지를 분석하였다. 이 도구들은 학습을 개인화하고 학생의 동기를 증가시키며, 즉각적인 피드백을 제공하여 더 매력적이고 반응적인 학습 환경을 조성하는 것으로 나타났다. 그러나 디지털 도구에 대한 불평등한 접근과 디지털 리터러시의 지속적인 필요와 같은 도전 과제도 강조되었다. 연구는 기술이 신중하게 통합될 때 의미 있는 협력과 깊은 학습을 촉진할 수 있음을 강조하며, BAEL 학생들의 특정 문학 및 언어 요구에 맞춘 프로그램을 제안하였다.\n\n# Research Logic\n## Problem\n팬데믹 이후 문학 및 언어 학습의 변화와 기술 통합의 필요성.\n## Theory\n사회문화 이론, 구성주의 학습 이론, TPACK 프레임워크.\n## Design\n현상학적 접근을 통한 질적 연구.\n## Findings\n1. AI 도구가 학습 개인화 및 동기 부여에 기여.\n2. 디지털 도구 접근의 불균형 문제.\n3. 기술 통합의 필요성 강조.\n## Conclusion\n기술이 신중하게 통합될 때 교육 혁신과 학습 향상에 기여할 수 있음.\n\n# Key Findings\n- AI 도구는 학습을 개인화하고 학생의 동기를 증가시킴.\n- 디지털 도구에 대한 접근의 불균형이 존재함.\n- 기술 통합이 의미 있는 협력과 깊은 학습을 촉진함.\n\n# Contributions\n## Theoretical\n기술 통합의 이론적 기초를 제공.\n## Methodological\n현상학적 접근을 통한 질적 데이터 수집 방법론 제시.\n## Practical\nBAEL 학생들을 위한 맞춤형 교육 프로그램 제안.\n\n# Limitations\n- 샘플 크기가 작음.\n- 특정 지역에 국한된 연구 결과.\n\n# Transferable Insights\n- AI 도구의 효과적인 통합이 학습 경험을 향상시킬 수 있음.\n- 디지털 리터러시 교육의 필요성이 강조됨.\n\n# Idea Seeds\n1. AI 도구를 활용한 맞춤형 학습 프로그램 개발.\n2. 디지털 리터러시 향상을 위한 교육 과정 설계.\n3. 다양한 교육 환경에서의 기술 통합 연구.\n\n# Citation Snippets\n>\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy\n\n---\n\n요약: 본 연구는 팬데믹 이후 문학 및 언어 학습의 변화를 탐구하며, AI 도구가 학습을 개인화하고 동기를 증가시키는 데 기여함을 보여준다. 그러나 디지털 도구 접근의 불균형과 디지털 리터러시의 필요성도 강조된다. 연구는 BAEL 학생들을 위한 맞춤형 교육 프로그램을 제안한다.", "link": "https://doi.org/10.47191/ijsshr/v8-i11-15", "altLink": "https://openalex.org/W4416028555", "hasDoi": true, "hasReview": true, "authors": ["Edgar R. Eslit"], "categories": ["Sociocultural evolution", "Nature versus nurture", "Bachelor", "Computer science", "Narrative"]}, {"id": "1", "source": "OPENALEX", "score": 18, "day": "2025-10-21", "title": "The Impact of AI Powered Project Based Learning on Student Understanding and Critical Thinking in Social Studies", "content": "---\ntitle: AI 기반 프로젝트 기반 학습이 사회 과목에서 학생 이해도 및 비판적 사고에 미치는 영향\nauthors: Mario P. Tamana\nyear: 2025\njournal: International Journal on Culture, History, and Religion\ndoi: https://doi.org/10.63931/ijchr.v7iSI3.391\nresearch_type: 질적 연구\nmethodology: 반구조화 인터뷰 및 포커스 그룹 토론\ndata_type: 질적 데이터\nsample: 중등 및 대학 교사와 학생\ncontext: 사회 과목 교육\ntheoretical_framework: 명시되지 않음\nkeywords: [AI 기반 학습, 비판적 사고, 사회 과목, 인공지능]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 AI 기반 문제 중심 학습(PBL)이 사회 과목에서 학생의 지식 습득과 비판적 사고에 미치는 영향을 조사하였다. 질적 방법을 사용하여 AI 매개 PBL 활동에 참여한 교사와 학생을 대상으로 인터뷰를 실시하였다. 연구 결과, AI 기반 PBL은 학생의 개념적 이해를 증진시키고, 실제 문제와 역사적 사례를 다루면서 비판적 사고 및 분석 능력을 강화하는 데 기여하였다. 참여자들은 AI가 개인화된 피드백과 적응형 학습 경로를 통해 동기와 참여를 증가시켰다고 강조하였다. 그러나 기술 접근성 제한, 교사 교육 부족, 데이터 프라이버시 문제 등 여러 장벽이 존재하였다. 연구는 AI 도구가 사회 과목 교육과 문화적으로 및 교육학적으로 정렬되어야 한다고 강조하며, 교사 교육 및 기술 접근성을 개선할 것을 권장하였다.\n\n# Research Logic\n## Problem\nAI 기반 PBL의 효과와 사회 과목 교육에서의 적용 가능성 부족.\n## Theory\nAI와 PBL의 통합이 학생의 비판적 사고 및 참여를 증진할 수 있다는 가설.\n## Design\n질적 연구 설계를 통해 교사와 학생의 경험을 탐구.\n## Findings\nAI 기반 PBL이 학생의 이해도와 비판적 사고를 향상시킴.\n## Conclusion\nAI 기반 PBL은 사회 과목 교육에서 효과적인 교수법으로 자리 잡을 수 있으며, 이를 위한 제도적 지원이 필요함.\n\n# Key Findings\n- AI 기반 PBL은 학생의 개념적 이해를 증진시킴.\n- 비판적 사고 및 문제 해결 능력이 강화됨.\n- 개인화된 피드백이 학생의 동기와 참여를 증가시킴.\n\n# Contributions\n## Theoretical\nAI와 PBL의 통합에 대한 새로운 통찰 제공.\n## Methodological\n질적 연구 방법론을 통해 심층적인 데이터 수집.\n## Practical\nAI 기반 PBL의 효과적인 적용을 위한 교사 교육 및 정책 제안.\n\n# Limitations\n- 기술 접근성의 제한으로 인한 연구 결과의 일반화 어려움.\n- 교사 교육의 부족으로 인한 PBL 적용의 비효율성.\n\n# Transferable Insights\n- AI 도구는 학생의 개인적 요구에 맞춘 학습 경험을 제공할 수 있음.\n- PBL은 학생의 비판적 사고 및 협력적 학습을 촉진하는 데 효과적임.\n\n# Idea Seeds\n1. AI 기반 PBL을 활용한 다양한 사회 과목 프로젝트 개발.\n2. 교사 교육 프로그램에 AI 도구 사용법 포함.\n3. 기술 접근성을 높이기 위한 정책 제안.\n\n# Citation Snippets\n> Tamana, M. (2025). The Impact of AI-Powered Project-Based Learning on Student Understanding and Critical Thinking in Social Studies. International Journal on Culture, History, and Religion, 7(SI3), 448-461. https://doi.org/10.63931/ijchr.v7iSI3.391\n\ntags: #AI기반학습, #비판적사고, #사회과목, #인공지능, #프로젝트기반학습, #교육기술, #교사교육", "link": "https://doi.org/10.63931/ijchr.v7isi3.391", "altLink": "https://openalex.org/W4415372006", "hasDoi": true, "hasReview": true, "authors": ["Mario P. Tamana"], "categories": ["Transformative learning", "Critical thinking", "Curriculum", "Social studies", "Project-based learning"]}, {"id": "2", "source": "OPENALEX", "score": 18, "day": "2025-09-22", "title": "Innovative Pedagogical Models in Mathematics Education: A Systematic Review of Global Challenges, Trends, and Future Research Directions", "content": "---\ntitle: Innovative Pedagogical Models in Mathematics Education: A Systematic Review of Global Challenges, Trends, and Future Research Directions\nauthors: [Us Madi, Er Gusni]\nyear: 2025\njournal: 명시되지 않음\ndoi: 명시되지 않음\nresearch_type: 체계적 리뷰\nmethodology: 문헌 종합\ndata_type: 62개의 동료 검토 연구\nsample: 명시되지 않음\ncontext: 수학 교육\ntheoretical_framework: 보편적 학습 설계(UDL), 역량 기반 학습(CBL), 혼합 및 하이플렉스 교육, 민족수학, 문화적으로 반응하는 교육학\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n이 체계적 리뷰는 전 세계적인 도전과 교육 우선순위 변화 속에서 수학 교육의 혁신적인 교육 모델의 발전을 조사한다. 62개의 동료 검토 연구의 결과를 종합하여, 보편적 학습 설계(UDL), 역량 기반 학습(CBL), 혼합 및 하이플렉스 교육, 민족수학, 문화적으로 반응하는 교육학과 같은 프레임워크가 수학 교육을 보다 포괄적이고 학습자 중심의 기술 적응적 관행으로 재편하고 있음을 강조한다. 이러한 모델은 특히 문화적 및 언어적으로 다양한 맥락에서 학생의 참여, 주도성 및 차별화된 성취를 향상시키는 데 중요한 이점을 보여주었다. 그러나 이들의 구현은 지리적 및 구조적으로 불균형하며, 고소득 국가(HICs)는 더 많은 제도적 지원과 인프라를 누리는 반면, 저소득 및 중간 소득 국가(LMICs)는 체계적 제약에 직면해 있다. 이 리뷰는 향후 실천 및 연구를 위한 세 가지 전략적 명령을 식별한다: 맥락 민감형 공동 설계, 방법론적 다양화, 정책 및 실천 간의 체계적 통합. 전반적으로 이 연구는 혁신적인 교육학이 글로벌 불균형을 해결하고 수학 교육을 교육 형평성, 평생 학습 및 지속 가능한 발전의 촉매로 자리매김할 수 있는 변혁적 잠재력을 확인한다.\n\n# Research Logic\n## Problem\n전 세계적으로 수학 교육의 혁신적인 모델이 필요함.\n## Theory\n보편적 학습 설계(UDL) 및 문화적으로 반응하는 교육학 등 다양한 이론적 프레임워크가 적용됨.\n## Design\n62개의 동료 검토 연구를 종합하여 체계적 리뷰를 수행함.\n## Findings\n혁신적인 교육 모델이 학생의 참여와 성취를 향상시키지만, 구현의 불균형이 존재함.\n## Conclusion\n혁신적인 교육학은 교육 형평성을 증진할 수 있는 잠재력을 지님.\n\n# Key Findings\n- 혁신적인 교육 모델이 학생의 참여와 성취를 향상시킴.\n- 고소득 국가와 저소득 국가 간의 교육 자원 불균형이 존재함.\n- 향후 연구 및 실천을 위한 맥락 민감형 공동 설계와 방법론적 다양화가 필요함.\n\n# Contributions\n## Theoretical\n혁신적인 교육 모델의 이론적 기초를 강화함.\n## Methodological\n체계적 리뷰 방법론을 통해 다양한 연구 결과를 종합함.\n## Practical\n교육 형평성을 위한 실천적 접근 방안을 제시함.\n\n# Limitations\n- 연구의 지리적 및 구조적 불균형이 명시됨.\n- 특정 교육 모델의 효과에 대한 구체적인 데이터 부족.\n\n# Transferable Insights\n- 혁신적인 교육 모델은 다양한 교육 환경에서 적용 가능함.\n- 교육 형평성을 위한 정책적 통합의 필요성이 강조됨.\n\n# Idea Seeds\n1. 혁신적인 교육 모델의 효과를 측정하기 위한 장기 연구 필요.\n2. 저소득 국가에서의 교육 자원 배분 개선 방안 모색.\n3. 문화적 다양성을 반영한 교육 커리큘럼 개발.\n\n# Citation Snippets\n>\n\ntags: #수학교육, #혁신적교육모델, #교육형평성, #체계적리뷰, #문화적반응교육학, #보편적학습설계, #역량기반학습\n\n---\n\n요약: 이 체계적 리뷰는 수학 교육의 혁신적인 교육 모델의 발전을 조사하며, 62개의 연구 결과를 종합하여 학생 참여와 성취를 향상시키는 다양한 프레임워크를 강조한다. 그러나 이러한 모델의 구현은 지리적 불균형이 있으며, 향후 연구를 위한 전략적 접근이 필요함을 제시한다.", "link": "https://doi.org/10.26803/ijlter.24.9.9", "altLink": "https://openalex.org/W4414392879", "hasDoi": true, "hasReview": true, "authors": ["Us Madi", "Er Gusni"], "categories": ["Transformative learning", "Face (sociological concept)", "Lifelong learning", "Pedagogy", "Sociology"]}, {"id": "3", "source": "ARXIV", "score": 17, "day": "2026-03-08", "title": "Directing the Robot: Scaffolding Creative Human-AI-Robot Interaction", "content": "---\ntitle: Directing the Robot: Scaffolding Creative Human-AI-Robot Interaction\nauthors: [Jordan Aiko Deja, Isidro Butaslac III, Nicko Reginio Caluya, Maheshya Weerasinghe]\nyear: 2026\njournal: The 3rd InterAI Workshop at CHI 2026\ndoi: https://doi.org/10.1145/nnnnnnn.nnnnnnn\nresearch_type: 이론적 연구\nmethodology: 사례 연구\ndata_type: 질적 데이터\nsample: 명시되지 않음\ncontext: 창의적, 교육적, 공공 환경\ntheoretical_framework: 스캐폴딩 이론\nkeywords: [human-ai collaboration, scaffolding, creativity, robotics, interactive AI, education, agency]\n\n---\n\n# APA 7th style\n\n# Summary\n이 논문은 로봇이 산업 환경을 넘어 창의적이고 교육적인 환경으로 확장됨에 따라 인간-AI-로봇 상호작용의 새로운 프레임을 제안한다. 저자들은 AI와 로봇 간의 상호작용을 스캐폴딩으로 재구성하여, 인간이 로봇의 행동을 형성하고 제어할 수 있는 인프라를 제공한다고 주장한다. 이 연구는 창의적 실천, 교수-학습, 그리고 구체적인 상호작용 시나리오를 통해 인간이 로봇 행동의 '행정 감독' 역할을 수행할 수 있음을 보여준다. 마지막으로, 저자들은 사회적, 확장 가능하며 임무 중심의 맥락에서의 도전 과제를 논의하고, 로봇과 AI와의 상호작용을 자율성의 문제가 아닌 인간의 창의성을 지원하는 지속적인 지원으로 재고할 것을 제안한다.\n\n# Research Logic\n## Problem\n로봇과 AI의 상호작용이 주로 성과와 효율성에 초점을 맞추고 있어 인간이 감독자로 위치하게 되는 문제.\n\n## Theory\nAI와 로봇 간의 상호작용을 스캐폴딩으로 재구성하여 인간의 창의성과 주체성을 강조.\n\n## Design\n창의적 실천과 학습을 중심으로 한 사례 연구를 통해 스캐폴딩의 개념을 탐구.\n\n## Findings\n인간은 로봇 행동의 의도를 정의하고 수정할 수 있으며, AI는 이를 매개하는 역할을 수행한다.\n\n## Conclusion\nAI는 인간의 창의성을 지원하는 도구로 기능해야 하며, 자율성을 극대화하기보다는 인간의 주체성을 유지하는 방향으로 설계되어야 한다.\n\n# Key Findings\n- AI는 인간의 의도를 매개하여 로봇의 행동을 형성할 수 있다.\n- 인간은 로봇의 '행정 감독' 역할을 수행하며, 창의적 과정에서 주체성을 유지한다.\n- 스캐폴딩은 인간과 로봇 간의 협업을 위한 핵심 상호작용 원칙으로 자리잡아야 한다.\n\n# Contributions\n## Theoretical\nAI와 로봇 간의 상호작용을 스캐폴딩으로 재구성하여 새로운 이론적 틀을 제공.\n\n## Methodological\n사례 연구를 통해 스캐폴딩의 개념을 실증적으로 탐구.\n\n## Practical\n로봇과 AI의 상호작용 설계에 있어 인간의 창의성과 주체성을 강조하는 방향으로의 실천적 제안.\n\n# Limitations\n- 연구의 사례가 제한적이며, 다양한 맥락에서의 일반화가 필요하다.\n- 실험적 데이터가 부족하여 이론적 주장에 대한 실증적 검증이 필요하다.\n\n# Transferable Insights\n- 스캐폴딩 개념은 다양한 교육적 및 창의적 맥락에서 적용 가능하다.\n- 인간의 주체성을 강조하는 AI 설계 원칙은 다른 기술적 시스템에도 적용될 수 있다.\n\n# Idea Seeds\n1. 다양한 창의적 환경에서의 스캐폴딩 적용 사례 연구.\n2. AI와 로봇 간의 상호작용에서 인간의 주체성을 평가하는 새로운 메트릭 개발.\n3. 스캐폴딩을 통한 협업 모델의 확장 가능성 탐구.\n\n# Citation Snippets\n> Deja, J. A., Butaslac, I., Caluya, N. R., & Weerasinghe, M. (2026). Directing the Robot: Scaffolding Creative Human–AI–Robot Interaction. In The 3rd InterAI Workshop: \"Interactive AI for Human-Centered Robotics at ACM CHI 2026, April 13–17, 2026, Barcelona, Spain.\n\ntags: #human-ai collaboration, #scaffolding, #creativity, #robotics, #interactive AI, #education, #agency\n\n---\n\n요약: 이 논문은 로봇과 AI의 상호작용을 스캐폴딩으로 재구성하여 인간의 창의성과 주체성을 강조하는 새로운 프레임을 제안한다. 저자들은 인간이 로봇 행동의 감독자로서 의도를 정의하고 수정할 수 있는 역할을 수행할 수 있음을 보여준다. AI는 이러한 과정을 매개하며, 창의적이고 교육적인 환경에서의 협업을 지원하는 방향으로 설계되어야 한다.", "link": "https://arxiv.org/abs/2603.07748v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Jordan Aiko Deja", "Isidro Butaslac", "Nicko Reginio Caluya"], "categories": ["cs.HC", "cs.RO"]}, {"id": "4", "source": "OPENALEX", "score": 17, "day": "2026-01-16", "title": "Six Institutional Intervention Areas to Support Ethical and Effective Student Use of Generative AI in Higher Education: A Narrative Review", "content": "---\ntitle: Six Institutional Intervention Areas to Support Ethical and Effective Student Use of Generative AI in Higher Education: A Narrative Review\nauthors: [Shan Jayasinghe, Kelum A. A. Gamage, Dandan Yang, Chuang Cheng, Chamara Disanayake, Uje D. Apeji]\nyear: 2026\njournal: 명시되지 않음\ndoi: https://openalex.org/W7124438828\nresearch_type: 서사적 리뷰\nmethodology: 체계적 리뷰\ndata_type: 문헌\nsample: 96개의 동료 검토 논문\ncontext: 고등 교육\ntheoretical_framework: 명시되지 않음\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 논문은 생성적 AI 도구의 고등 교육 통합이 개인화된 학습과 학문적 생산성에 미치는 영향을 다룬다. 그러나 이러한 도구의 규제되지 않은 사용은 학문적 무결성, 비판적 사고 및 교육적 형평성에 대한 우려를 초래한다. 96개의 동료 검토 논문에서 통합된 통찰력을 바탕으로, 커리큘럼 통합, 정책 및 거버넌스, 교수 개발, 학생 중심 전략, 평가 적응, 기술 인프라 등 여섯 가지 주요 개입 주제를 식별하였다. 이들 주제는 학생들이 AI와 윤리적이고 효과적으로 상호작용할 수 있도록 안내하는 포괄적인 개입 프레임워크를 형성한다. 본 논문은 기관들이 단편적인 정책을 넘어 시스템적 문화 및 교수법 변화를 촉진해야 함을 강조하며, 교육자와 정책 입안자에게 책임 있는 AI 통합을 위한 실행 가능한 전략을 제공한다.\n\n# Research Logic\n## Problem\n생성적 AI 도구의 규제되지 않은 사용으로 인한 학문적 무결성 및 교육적 형평성 문제.\n## Theory\nAI 도구의 효과적인 통합을 위한 이론적 틀의 필요성.\n## Design\n96개의 동료 검토 논문을 기반으로 한 체계적 리뷰.\n## Findings\n여섯 가지 주요 개입 주제를 통해 AI 사용의 윤리적 및 효과적 접근 방안 제시.\n## Conclusion\n기관들이 AI 통합을 위한 포괄적인 정책을 마련해야 함.\n\n# Key Findings\n- 생성적 AI 도구의 통합은 개인화된 학습 기회를 제공한다.\n- 여섯 가지 개입 주제는 AI 사용의 윤리적 접근을 위한 프레임워크를 형성한다.\n- 시스템적 변화가 필요하며, 단편적인 정책을 넘어서는 접근이 요구된다.\n\n# Contributions\n## Theoretical\nAI 통합을 위한 새로운 이론적 틀 제시.\n## Methodological\n체계적 리뷰 방법론을 통한 포괄적 분석 제공.\n## Practical\n교육자와 정책 입안자를 위한 실행 가능한 전략 제안.\n\n# Limitations\n- 특정 교육 기관의 사례 연구 부족.\n- 생성적 AI 도구의 장기적 영향에 대한 연구 부족.\n\n# Transferable Insights\n- AI 도구의 윤리적 사용을 위한 정책 개발의 필요성.\n- 교수법 변화가 AI 통합에 미치는 긍정적 영향.\n\n# Idea Seeds\n1. AI 도구의 효과적인 사용을 위한 교수법 개발.\n2. 생성적 AI 도구의 윤리적 사용을 위한 교육 프로그램 설계.\n3. 정책 입안자와 교육자 간의 협력 모델 구축.\n\n# Citation Snippets\n> Jayasinghe, S., Gamage, K. A. A., Yang, D., Cheng, C., Disanayake, C., & Apeji, U. D. (2026). Six Institutional Intervention Areas to Support Ethical and Effective Student Use of Generative AI in Higher Education: A Narrative Review. \n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy\n\n---\n\n요약: 본 논문은 생성적 AI 도구의 고등 교육 통합에 따른 기회와 도전을 다룬다. 여섯 가지 개입 주제를 통해 AI 사용의 윤리적 접근을 위한 프레임워크를 제시하며, 시스템적 변화의 필요성을 강조한다. 교육자와 정책 입안자에게 실행 가능한 전략을 제공한다.", "link": "https://doi.org/10.3390/educsci16010137", "altLink": "https://openalex.org/W7124438828", "hasDoi": true, "hasReview": true, "authors": ["Shan Jayasinghe", "Kelum A. A. Gamage", "Dandan Yang"], "categories": ["Transformative learning", "Curriculum", "Generative grammar", "Intervention (counseling)", "Engineering ethics"]}, {"id": "5", "source": "OPENALEX", "score": 17, "day": "2025-12-29", "title": "Pedagogical Transformation in the Digital Age: An Analysis of AI's Impact on Teacher Strategies in Primary Education", "content": "The fast adoption of artificial intelligence (AI) in primary education is transforming the past practices of teaching but there is little empirical evidence on the effects of it on the teaching behaviors of teachers. This paper discusses the role of AI technology in changing the teaching techniques in the primary school through the use of the technology acceptance model (TAM) as the theoretical framework. A quantitative methodology was embraced, and a sample size of 466 vocational and basic-stage teachers in various provinces in China was used in gathering data through a five point Likert scale questionnaire. The hybrid Linear Discriminant Analysis-Random Forest (LDA-RF) model was used to categorize and forecast the determinants of the AI-assisted teaching performance. The findings prove that perceived usefulness, perceived ease of use, and ease of learning significantly affect AI adoption with the highest level of accuracy 91.0, precision 88.7, and F1-score 89.5. The results emphasize the great potential of AI to increase the teaching innovation, individual learning, and decision-making processes based on data. But the use of self-reported information and the constraints provided by the context impairs generalizability. Future research ought to assume longitudinal, multi-regional and explainable AI methods to enhance robustness and explainability.", "link": "https://doi.org/10.26417/gdmcc175", "altLink": "https://openalex.org/W7117555715", "hasDoi": true, "hasReview": false, "authors": ["Luo Li"], "categories": ["Likert scale", "Vocational education", "Mathematics education", "Context (archaeology)", "Categorization"]}, {"id": "6", "source": "OPENALEX", "score": 17, "day": "2025-12-18", "title": "Generative AI in Teaching and Learning: Benefits and Challenges", "content": "Recent advancements in Artificial Intelligence (AI), particularly Generative AI (GenAI), have brought both transformative opportunities and significant challenges to the future of teaching and learning practices. This article provides an overview of popular GenAI tools and explores strategies for integrating them into classroom instructions, their ethical considerations, and challenges. This work includes narratives of implementation demonstrating how specific GenAI tools were utilized by the authors, including the use of ChatGPT for drafting an assignment, NotebookLM for curating content, developing formative assessments, and providing study materials for students, and the application of AI-integrated assessment tools like Gradescope to streamline grading in large classes. In addition, we present a summary of guidelines for educators and institutions to ensure the responsible and effective use of GenAI in educational settings. While GenAI offers powerful possibilities for enhancing teaching and learning, the human element remains irreplaceable. The role of the teacher must shift from being the sage on the stage to the guide on the side, providing authentic, AI-enhanced learning experiences. To succeed in this evolving educational landscape and prepare for the future workforce, students require intrinsic motivation, emotional intelligence, and meaningful human connections, in addition to their technical skills.", "link": "https://doi.org/10.3126/jnphyssoc.v11i1.87466", "altLink": "https://openalex.org/W4417466663", "hasDoi": true, "hasReview": false, "authors": ["Umesh Silwal", "Rudra Kafle", "Ramesh Dhungana"], "categories": ["Formative assessment", "Transformative learning", "Generative grammar", "Grading (engineering)", "Computer science"]}, {"id": "7", "source": "OPENALEX", "score": 17, "day": "2025-12-04", "title": "A systematic review of the literature on TPACK instruments used with pre-service teachers from 2017 to 2023 focused on selecting digital resources", "content": "Abstract Following the PRISMA methodology, this systematic literature review addresses instruments that utilize the TPACK framework in studies conducted from 2017 to 2023. The review focuses on pre-service teachers across all subjects and school types, and the facet of selecting digital resources (dRs). The latter was identified as a research gap in existing TPACK reviews. The novelty of the review lies in several key findings. First, consistent with previous reviews, self-report instruments remain the most commonly used TPACK instruments. Second, reviewing the existing TPACK instruments indicated that selecting dRs is assessed in only about a third of the instruments. If so, it is inconsistently linked to TPACK components. However, when the facet of selecting dRs is included, the rationale for selection is consistent with the TPACK component definitions. Third, the analysis of the dRs studied in TPACK assessments underscores the developmental nature of dRs and highlights the need to cultivate and evaluate the digital competence facet of selecting dRs. Notably, dRs that promote “Self-directed learning” and learner “Collaboration” showed a small but increasing trend. Fourth, evaluating the reasoning behind selecting dRs when assessing pre-service teachers is empirically underrepresented. Additionally, concise TPACK assessments utilizing open-text prompts to evaluate pre-service teachers’ rationale for selecting dRs are methodically and empirically underrepresented. In contrast, two TPACK rubrics that examine the alignment of dRs to learning content and teaching strategy have become the de facto standard when evaluating lesson plans and observations.", "link": "https://doi.org/10.1007/s40692-025-00379-6", "altLink": "https://openalex.org/W4416991215", "hasDoi": true, "hasReview": false, "authors": ["Peter Gonscherowski", "Benjamin Rott"], "categories": ["Rubric", "Facet (psychology)", "Psychology", "Competence (human resources)", "Novelty"]}, {"id": "8", "source": "OPENALEX", "score": 17, "day": "2025-11-29", "title": "From Screen to Practice: Integrating AI, YouTube, and Orange Data Mining in ELT", "content": "Graduate-level English Language Teaching (ELT) is undergoing a deep transformation as shaped by the convergence of artificial intelligence (AI), YouTube, and data science. Yet, despite the increasing availability of digital tools, a persistent practical gap remains between technological innovation and pedagogical implementation particularly in a blended learning environment. This study addresses that gap by examining how AI, YouTube, and Orange Data Mining. It is anchored in constructivist pedagogy, personalization theory, Technological Pedagogical Content Knowledge (TPACK) framework, and Data-informed learning models which can meaningfully enhance blended ELT instruction. Guided by a qualitative research design which is rooted in the interpretivist tradition, the study draws insights from semi-structured interviews, classroom observations, and participation of 20 graduate students from SMCII, AY 2024-2025. Findings reveal that AI fosters tailored learning experiences, YouTube enriches multimodal engagement, and data science enables real-time instructional responsiveness. However, disparities in digital fluency, confidence in using educational technologies, and limited training opportunities emerged as significant barriers to effective implementation. In response, the Tri-Tech ELT for Grad School program was designed as a practical model to address these barriers through structured training, professional development, and ongoing mentorship. This framework promotes not only the integration of digital innovations but also cultivates a reflective, learner-centered approach that sustains pedagogical depth. The study underscores the importance of aligning technological advancement with human-centered teaching practices, ensuring that digital tools empower rather than overwhelm. By actively addressing issues of access, preparedness, and relational pedagogy, the research affirms that innovation in graduate ELT must be both inclusive and intentional. Overall, the findings highlight that when educators are equipped with the right support systems and theoretical grounding, technology can expand the transformative potential of graduate English language education.", "link": "https://doi.org/10.63941/dit.adsimrj.2025.1.4.112", "altLink": "https://openalex.org/W4416892246", "hasDoi": true, "hasReview": false, "authors": ["Edgar Eslit", "Melchora Lector"], "categories": ["Personalization", "Computer science", "Digital transformation", "Blended learning", "Orange (colour)"]}, {"id": "9", "source": "OPENALEX", "score": 17, "day": "2025-10-09", "title": "Teaching and learning with AI: an Integrated AI-Oriented Pedagogical Model", "content": "Abstract The emergence of Generative Artificial Intelligence (GenAI) marks a fundamental transformation in education, mirroring wider technological changes across society. This conceptual article positions GenAI not merely as a tool, but as a relational paradigm shift that redefines pedagogy. Drawing on posthumanist and phenomenological perspectives, we explore how AI reshapes educational practice, focusing on shifts in pedagogy, teacher identity and student engagement. Posthumanism challenges anthropocentric assumptions, inviting new collaborations between human and machine. Phenomenology foregrounds the lived experiences of learners and educators in AI-mediated environments, emphasising the affective and relational dimensions of technological integration. By synthesising these perspectives through the interconnected dimensions of Positionality, Relationality and Functionality, we outline the educational implications of GenAI. Teacher positionality shifts from authoritative knowledge-holder to facilitator; relationality reframes AI as a co-creative presence; and functionality opens new modes of assessment, feedback and creative production. These principles inform the development of the ‘Integrated AI-Oriented Pedagogy Model’ for reimagining classroom practice and teacher education. A fictional classroom narrative is offered to illustrate the complexity of GenAI integration, showing the tensions and possibilities educators navigate. This work contributes to emerging scholarship on ethical and effective AI use in education, advocating for approaches that respect human experience while embracing the agency of intelligent technologies.", "link": "https://doi.org/10.1007/s13384-025-00913-6", "altLink": "https://openalex.org/W4414995506", "hasDoi": true, "hasReview": false, "authors": ["Edwin Creely", "Kelly Carabott"], "categories": ["Posthumanism", "Sociology", "Mirroring", "Phenomenology (philosophy)", "Scholarship"]}];

function downloadJSON() {
  const data = JSON.stringify(filtered, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadCSV() {
  const headers = ['제목', '출처', '스코어', '리뷰여부', '링크'];
  const rows = filtered.map(p => [
    '"' + p.title.replace(/"/g, '""') + '"',
    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
