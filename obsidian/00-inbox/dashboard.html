<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-04-06 23:35</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "ARXIV", "score": 16, "day": "2026-04-03", "title": "Comparing the Impact of Pedagogy-Informed Custom and General-Purpose GAI Chatbots on Students' Science Problem-Solving Processes and Performance Using Heterogeneous Interaction Network Analysis", "content": "---\ntitle: \"Comparing the Impact of Pedagogy-Informed Custom and General-Purpose GAI Chatbots on Students' Science Problem-Solving Processes and Performance Using Heterogeneous Interaction Network Analysis\"\nauthors: \n  - Hanyu Su\n  - Huilin Zhang\n  - Shihui Feng\nyear: 2026\njournal: 명시되지 않음\ndoi: https://arxiv.org/abs/2604.03022v1\nresearch_type: 실험 연구\nmethodology: 내적 요인 설계\ndata_type: 대화 데이터\nsample: 48명의 중학생\ncontext: 홍콩, 중국\ntheoretical_framework: 소크라틱 질문법\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n이 연구는 과학 교육에서 문제 해결 과정에 대한 맞춤형 GAI 챗봇과 일반용 GAI 챗봇의 영향을 비교하였다. 48명의 중학생이 두 가지 챗봇을 사용하여 과학 문제 해결 과제를 수행하였으며, 3297개의 학생-챗봇 대화가 수집되어 분석되었다. 연구 결과, 맞춤형 챗봇을 사용할 때 학생들은 더 높은 상호작용 강도와 인지적 상호작용 다양성을 보였으며, 문제 해결 성과는 두 챗봇 조건 간에 통계적으로 유의미한 차이가 없었다. 이 연구는 맞춤형 챗봇이 인지적 오프로드를 줄이고 인지적 참여를 촉진하는 데 기여할 수 있음을 보여준다.\n\n# Research Logic\n## Problem\n일반용 챗봇이 학생들의 인지적 오프로드를 유발할 수 있다는 문제를 다루고자 하였다.\n## Theory\n소크라틱 질문법을 기반으로 한 맞춤형 챗봇이 학생들의 문제 해결 과정에 미치는 영향을 탐구하였다.\n## Design\n내적 요인 설계를 사용하여 두 가지 챗봇을 비교하는 실험을 진행하였다.\n## Findings\n맞춤형 챗봇 사용 시 학생들의 상호작용 강도와 인지적 다양성이 증가하였으나, 문제 해결 성과는 두 챗봇 간에 차이가 없었다.\n## Conclusion\n맞춤형 챗봇이 인지적 참여를 증진시키고, 일반용 챗봇보다 더 효과적인 지원을 제공할 수 있음을 제시하였다.\n\n# Key Findings\n- 맞춤형 챗봇 사용 시 학생들의 상호작용 강도가 유의미하게 증가하였다.\n- 학생들은 맞춤형 챗봇의 안내를 따르며 사고하고 반성하는 경향이 있었다.\n- 문제 해결 성과는 두 챗봇 조건 간에 통계적으로 유의미한 차이가 없었다.\n\n# Contributions\n## Theoretical\n맞춤형 챗봇이 인지적 오프로드를 줄이고 인지적 참여를 촉진한다는 새로운 이론적 통찰을 제공하였다.\n## Methodological\nHeterogeneous Interaction Network Analysis(HINA)를 사용하여 학생-챗봇 대화를 분석하는 방법론적 기여를 하였다.\n## Practical\n과학 교육에서 GAI 챗봇의 설계 및 통합에 대한 실질적인 통찰을 제공하였다.\n\n# Limitations\n- 샘플 크기가 상대적으로 작아 일반화에 한계가 있다.\n- 연구는 특정 과학 문제 해결 과제에 국한되어 있다.\n\n# Transferable Insights\n- 맞춤형 챗봇이 학생들의 인지적 참여를 증진시킬 수 있는 가능성을 제시한다.\n- 교육적 목표에 맞춘 챗봇 설계의 중요성을 강조한다.\n\n# Idea Seeds\n1. 다양한 과목에 맞춤형 챗봇을 적용하여 효과를 비교하는 연구.\n2. 챗봇 사용 후 학생들의 인지적 변화에 대한 장기적 연구.\n3. 맞춤형 챗봇의 설계 원칙을 개발하여 교육 현장에 적용하기.\n\n# Citation Snippets\n> Su, H., Zhang, H., & Feng, S. (2026). Comparing the Impact of Pedagogy-Informed Custom and General-Purpose GAI Chatbots on Students' Science Problem-Solving Processes and Performance Using Heterogeneous Interaction Network Analysis. \n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #ai literacy, #education", "link": "https://arxiv.org/abs/2604.03022v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Hanyu Su", "Huilin Zhang", "Shihui Feng"], "categories": ["cs.SI", "cs.AI", "cs.HC"]}, {"id": "1", "source": "ARXIV", "score": 14, "day": "2026-04-03", "title": "Beyond the AI Tutor: Social Learning with LLM Agents", "content": "---\ntitle: Beyond the AI Tutor: Social Learning with LLM Agents\nauthors: [Harsh Kumar, Zi Kang Mu, Jonathan Vincentius, Ashton Anderson]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2604.02677v1\nresearch_type: 실험 연구\nmethodology: 통제된 실험\ndata_type: 양적 데이터\nsample: N=562 (수학 문제 해결 연구 N=315, 작문 연구 N=247)\ncontext: AI 기반 교육 도구의 다자간 상호작용\ntheoretical_framework: Vygotsky의 근접 발달 영역, Bandura의 사회 학습 이론\nkeywords: [교육, 대화형 AI, 대규모 언어 모델, 사회적 학습, 튜터링, 수학 교육, 작문]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 다자간 LLM(대규모 언어 모델) 구성이 단일 LLM 튜터보다 학습 성과를 향상시킬 수 있는지를 조사한다. 두 가지 통제된 실험을 통해, 첫 번째 실험에서는 SAT 수준의 수학 문제를 해결하는 과정에서 LLM 튜터와 동료 LLM의 존재가 학습 성과에 미치는 영향을 분석하였다. 두 번째 실험에서는 참가자들이 단일 LLM 또는 두 개의 LLM을 사용하여 작문을 수행하는 동안 아이디어의 동질성을 피하는 방법을 탐구하였다. 결과적으로, 다자간 LLM 환경이 학습에 긍정적인 영향을 미칠 수 있음을 보여준다.\n\n# Research Logic\n## Problem\n단일 LLM 튜터링 모델이 아닌 다자간 상호작용이 학습 성과에 미치는 영향을 이해할 필요가 있다.\n\n## Theory\n사회적 학습 이론에 따르면, 다수의 관점과 동료 간의 상호작용이 학습에 긍정적인 영향을 미친다.\n\n## Design\n두 가지 실험을 통해 다자간 LLM의 효과를 비교하였다: 수학 문제 해결과 작문 과제.\n\n## Findings\n다자간 LLM 구성은 단일 LLM보다 높은 학습 성과를 나타내며, 특히 동료와의 상호작용이 중요한 역할을 한다.\n\n## Conclusion\n다자간 LLM 환경은 단일 튜터링보다 더 나은 학습 결과를 제공할 수 있으며, 이는 교육 설계에 중요한 시사점을 제공한다.\n\n# Key Findings\n- 다자간 LLM 구성에서 동료와의 상호작용이 학습 성과를 향상시킴.\n- 수학 문제 해결에서 LLM 튜터와 동료의 조합이 가장 높은 정확도를 기록함.\n- 작문 과제에서 두 개의 LLM을 사용하는 것이 아이디어의 동질성을 피하는 데 효과적임.\n\n# Contributions\n## Theoretical\n사회적 학습 이론을 LLM 환경에 적용하여 다자간 상호작용의 중요성을 강조함.\n\n## Methodological\n다자간 LLM 환경의 효과를 실험적으로 검증한 최초의 연구 중 하나로, 연구 설계의 엄밀성을 보여줌.\n\n## Practical\n교육 현장에서 LLM 도구의 설계와 활용에 대한 실질적인 지침을 제공함.\n\n# Limitations\n- 연구 샘플이 특정한 교육 맥락에 국한되어 일반화에 한계가 있음.\n- 다자간 LLM의 상호작용 방식이 모든 학습자에게 동일하게 적용되지 않을 수 있음.\n\n# Transferable Insights\n- 다자간 LLM 환경은 다양한 학습 스타일을 가진 학생들에게 유용할 수 있음.\n- 교육 설계에서 동료 상호작용을 통합하는 것이 학습 효과를 높일 수 있음.\n\n# Idea Seeds\n1. 다자간 LLM 환경을 활용한 새로운 교육 프로그램 개발.\n2. 다양한 학습 과제를 위한 LLM의 역할 특화 연구.\n3. LLM과 인간 교사의 협업 모델 탐구.\n\n# Citation Snippets\n> Kumar, H., Mu, Z. K., Vincentius, J., & Anderson, A. (2026). Beyond the AI Tutor: Social Learning with LLM Agents. arXiv. https://arxiv.org/abs/2604.02677v1\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy", "link": "https://arxiv.org/abs/2604.02677v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Harsh Kumar", "Zi Kang", "Mu"], "categories": ["cs.HC", "cs.CY"]}, {"id": "2", "source": "ARXIV", "score": 13, "day": "2026-04-03", "title": "Same Feedback, Different Source: How AI vs. Human Feedback Attribution and Credibility Shape Learner Behavior in Computing Education", "content": "---\ntitle: Same Feedback, Different Source: How AI vs. Human Feedback Attribution and Credibility Shape Learner Behavior in Computing Education\nauthors: [Caitlin Morris, Pattie Maes]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2604.03075v1\nresearch_type: 실험 연구\nmethodology: 3조건 실험\ndata_type: 정량적 데이터\nsample: N=148\ncontext: 컴퓨터 교육\ntheoretical_framework: 사회적 존재 이론, 자기 결정 이론, 신뢰와 진정성\nkeywords: [AI 피드백, 학습자 행동, 피드백 출처, 교육 기술, 컴퓨터 교육, 인간-AI 협력, 교육적 설계]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 AI 시스템이 교육적 역할을 수행함에 따라 학습자가 피드백의 출처를 어떻게 인식하는지가 학습 행동에 미치는 영향을 조사하였다. 148명의 참가자를 대상으로 한 3조건 실험에서, 참가자들은 AI 또는 인간 조교로부터 피드백을 받고, 피드백의 출처에 따라 학습 행동이 어떻게 달라지는지를 분석하였다. 결과적으로, 인간 출처로 인식된 피드백을 받은 참가자들은 더 많은 시간을 투자하였고, 피드백의 신뢰성이 낮은 경우에는 오히려 부정적인 결과를 보였다. 이러한 결과는 교육자들에게 투명한 AI 피드백의 중요성을 시사한다.\n\n# Research Logic\n## Problem\nAI와 인간 피드백의 출처가 학습자 행동에 미치는 영향을 명확히 이해할 필요가 있다.\n## Theory\n사회적 존재 이론과 자기 결정 이론을 통해 피드백 출처가 학습자의 동기와 행동에 미치는 영향을 설명한다.\n## Design\n3조건 실험 설계를 통해 AI와 인간 피드백의 출처를 분리하여 분석하였다.\n## Findings\n인간 출처로 인식된 피드백이 학습자의 시간 투자에 긍정적인 영향을 미쳤으나, 신뢰성이 낮은 경우에는 부정적인 결과를 초래하였다.\n## Conclusion\n신뢰할 수 있는 인간 피드백이 동기를 유발할 수 있지만, 신뢰성이 결여된 경우에는 오히려 부정적인 영향을 미친다.\n\n# Key Findings\n- 인간 출처로 인식된 피드백을 받은 참가자들은 더 많은 시간을 투자하였다 (d=0.61, p=.013).\n- 피드백의 전달 지연이 코드 복잡성을 증가시켰으나 시간 측정에는 영향을 미치지 않았다.\n- 인간 출처를 믿지 않는 참가자들은 투명한 AI 피드백을 받은 참가자들보다 더 나쁜 결과를 보였다 (코드 복잡성 d=0.77, p=.003).\n\n# Contributions\n## Theoretical\n피드백 출처가 학습자 행동에 미치는 영향을 설명하는 새로운 이론적 통찰을 제공한다.\n## Methodological\n피드백 출처와 전달 타이밍을 분리하여 분석한 실험적 접근 방식을 제시한다.\n## Practical\n컴퓨터 교육에서 AI 피드백의 투명성을 강조하여 교육적 설계에 기여한다.\n\n# Limitations\n- 연구 참가자의 프로그래밍 경험이 다양하여 결과의 일반화에 한계가 있다.\n- 피드백의 신뢰성에 대한 탐색적 분석이 필요하다.\n\n# Transferable Insights\n- AI 피드백의 출처가 학습자의 동기와 행동에 미치는 영향을 고려해야 한다.\n- 교육적 설계에서 피드백의 신뢰성을 높이는 방법을 모색해야 한다.\n\n# Idea Seeds\n1. AI 피드백의 신뢰성을 높이기 위한 방법론 개발.\n2. 다양한 교육 환경에서 피드백 출처의 효과를 비교하는 연구.\n3. 학습자의 AI 문해력을 향상시키기 위한 교육 프로그램 설계.\n\n# Citation Snippets\n> Morris, C., & Maes, P. (2026). Same Feedback, Different Source: How AI vs. Human Feedback Attribution and Credibility Shape Learner Behavior in Computing Education. arXiv.\n\ntags: #AI피드백, #학습자행동, #피드백출처, #교육기술, #컴퓨터교육, #인간AI협력, #교육적설계\n\n---\n\n요약: 본 연구는 AI와 인간 피드백의 출처가 학습자 행동에 미치는 영향을 조사하였다. 148명의 참가자를 대상으로 한 실험에서, 인간 출처로 인식된 피드백이 학습자의 시간 투자에 긍정적인 영향을 미쳤으나, 신뢰성이 낮은 경우에는 부정적인 결과를 초래하였다. 이러한 결과는 교육자들에게 투명한 AI 피드백의 중요성을 시사한다.", "link": "https://arxiv.org/abs/2604.03075v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Caitlin Morris", "Pattie Maes"], "categories": ["cs.HC"]}, {"id": "3", "source": "ARXIV", "score": 12, "day": "2026-04-03", "title": "Train Yourself as an LLM: Exploring Effects of AI Literacy on Persuasion via Role-playing LLM Training", "content": "---\ntitle: Train Yourself as an LLM: Exploring Effects of AI Literacy on Persuasion via Role-playing LLM Training\nauthors: [Qihui Fan, Min Ge, Chenyan Jia, Weiyan Shi]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2604.02637v1\nresearch_type: 실험 연구\nmethodology: 2 × 3 between-subjects 연구\ndata_type: 양적 데이터\nsample: 274명\ncontext: AI 문해력 및 설득력 있는 AI 상호작용\ntheoretical_framework: AI 문해력 이론\nkeywords: [AI 문해력, 설득, 역할 놀이, 교육 기술, 인간-기계 협력]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 대형 언어 모델(LLM)의 설득력 있는 특성이 개인의 의견과 결정을 어떻게 영향을 미치는지를 탐구하며, AI 문해력을 향상시키기 위한 역할 놀이 기반의 인터랙티브한 교육 도구인 LLMimic을 제안한다. 274명의 참가자를 대상으로 한 2 × 3 between-subjects 연구에서, LLMimic을 사용한 그룹은 AI 문해력이 유의미하게 향상되었고(p < .001), 설득 성공률이 감소하였다(p < .05). 특히, 호텔 추천 시 진실성과 사회적 책임 수준이 향상되었다(p < 0.01). 이러한 결과는 LLMimic이 AI 문해력을 개선하고 설득적인 AI와의 상호작용을 보다 정보에 기반한 방식으로 지원할 수 있음을 시사한다.\n\n# Research Logic\n## Problem\n대형 언어 모델의 설득력이 증가함에 따라, 사람들이 AI가 생성한 정보에 의해 영향을 받을 가능성이 커지고 있다. 기존의 대응 방식은 사용자를 수동적인 수용자로 간주하고 있다.\n\n## Theory\nAI 문해력은 사용자가 AI가 생성한 콘텐츠를 비판적으로 평가할 수 있도록 돕는 중요한 요소로 작용한다.\n\n## Design\nLLMimic은 참가자가 LLM의 역할을 맡고, 세 가지 주요 훈련 단계를 거치는 역할 놀이 기반의 교육 도구이다.\n\n## Findings\nLLMimic은 참가자의 AI 문해력을 유의미하게 향상시켰고, 설득 성공률을 감소시켰으며, 윤리적 설득 시 진실성과 사회적 책임을 증가시켰다.\n\n## Conclusion\nLLMimic은 AI 문해력을 향상시키고, 설득적인 AI와의 상호작용에서 보다 비판적인 접근을 가능하게 하는 효과적인 도구로 자리 잡을 수 있다.\n\n# Key Findings\n- LLMimic은 참가자의 AI 문해력을 유의미하게 향상시켰다 (p < .001).\n- 설득 성공률이 42% 감소하였다 (β=−0.54, OR=0.58, p= .045).\n- 호텔 추천 시 진실성과 사회적 책임 수준이 향상되었다 (p < 0.01).\n\n# Contributions\n## Theoretical\nAI 문해력의 중요성을 강조하고, 설득적인 AI에 대한 비판적 접근을 촉진하는 이론적 기초를 제공한다.\n\n## Methodological\n역할 놀이 기반의 교육 도구를 활용한 새로운 연구 방법론을 제시한다.\n\n## Practical\nAI 문해력을 향상시키기 위한 교육 도구 개발에 대한 실용적인 지침을 제공한다.\n\n# Limitations\n- 샘플의 다양성이 부족할 수 있다.\n- 연구 결과의 일반화 가능성에 대한 제한이 있다.\n\n# Transferable Insights\n- AI 문해력 향상을 위한 역할 놀이 기반 접근 방식의 효과를 다른 교육 분야에 적용할 수 있다.\n- 설득적인 AI와의 상호작용에서 비판적 사고를 촉진하는 방법론을 개발할 수 있다.\n\n# Idea Seeds\n1. LLMimic의 교육 내용을 다양한 문화적 맥락에 맞춰 조정하기.\n2. 다른 AI 시스템에 대한 문해력 교육 도구 개발.\n3. LLMimic의 효과를 장기적으로 평가하기 위한 후속 연구 설계.\n\n# Citation Snippets\n> Fan, Q., Ge, M., Jia, C., & Shi, W. (2026). Train Yourself as an LLM: Exploring Effects of AI Literacy on Persuasion via Role-playing LLM Training. arXiv. https://arxiv.org/abs/2604.02637v1\n\ntags: #AI문해력, #설득, #교육기술, #역할놀이, #인간기계협력, #AI교육, #LLM", "link": "https://arxiv.org/abs/2604.02637v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Qihui Fan", "Min Ge", "Chenyan Jia"], "categories": ["cs.CL"]}, {"id": "4", "source": "ARXIV", "score": 12, "day": "2026-04-02", "title": "Mitigating LLM biases toward spurious social contexts using direct preference optimization", "content": "---\ntitle: LLM의 잘못된 사회적 맥락에 대한 편향 완화: 직접 선호 최적화를 통한 접근\nauthors: [Hyunji Nam, Dorottya Demszky]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2604.02585v1\nresearch_type: 실증 연구\nmethodology: 실험적 접근\ndata_type: 텍스트 데이터\nsample: NCTE 데이터셋 (669개 샘플)\ncontext: 교육 평가\ntheoretical_framework: 편향 완화 이론\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 대형 언어 모델(LLM)이 잘못된 사회적 맥락에 민감하게 반응하여 발생하는 편향을 완화하는 방법을 제안한다. 연구진은 미국 교실 전사 데이터셋(NCTE)과 전문가 평가 점수를 활용하여 7가지 범주의 잘못된 맥락에 대한 모델의 강건성을 평가하였다. 연구 결과, 관련 없는 맥락 정보가 모델 예측을 최대 1.48점까지 변화시킬 수 있으며, 대형 모델이 더 높은 예측 정확도를 보임에도 불구하고 더 큰 민감성을 나타내는 경향이 있음을 발견하였다. 기존의 편향 완화 방법은 효과적이지 않았으며, 연구진은 새로운 방법인 **Debiasing-DPO**를 제안하여 편향을 84% 줄이고 예측 정확도를 평균 52% 향상시켰다.\n\n# Research Logic\n## Problem\nLLM의 잘못된 사회적 맥락에 대한 민감성이 교육 평가와 같은 고위험 결정에서 편향된 결과를 초래할 수 있다.\n\n## Theory\n편향 완화 이론을 바탕으로, 모델의 편향된 추론과 중립적인 추론을 결합하여 학습하는 방법을 제안한다.\n\n## Design\nNCTE 데이터셋을 사용하여 7가지 범주의 잘못된 맥락을 평가하고, 다양한 LLM 모델을 비교 분석하였다.\n\n## Findings\n모델의 예측은 관련 없는 맥락에 따라 최대 1.48점까지 변화하며, Debiasing-DPO 방법을 통해 편향을 84% 줄이고 예측 정확도를 52% 향상시킬 수 있었다.\n\n## Conclusion\n모델의 강건성은 자연스럽게 발생하지 않으며, 제안된 방법이 예측 정확도와 강건성을 동시에 향상시킬 수 있음을 보여준다.\n\n# Key Findings\n- 관련 없는 사회적 맥락이 모델 예측에 최대 1.48점의 변화를 초래할 수 있다.\n- Debiasing-DPO 방법은 편향을 84% 줄이고 예측 정확도를 52% 향상시킨다.\n- 대형 모델이 더 높은 예측 정확도를 보이지만, 잘못된 맥락에 대한 민감성이 더 크다.\n\n# Contributions\n## Theoretical\n편향 완화 이론에 대한 새로운 통찰을 제공하며, LLM의 강건성에 대한 이해를 심화시킨다.\n\n## Methodological\nDebiasing-DPO라는 새로운 학습 방법론을 제안하여 기존의 편향 완화 방법의 한계를 극복한다.\n\n## Practical\n교육 평가에서 LLM의 활용을 개선하고, 교사 평가의 공정성을 높이는 데 기여할 수 있다.\n\n# Limitations\n- 연구는 특정 데이터셋(NCTE)에 국한되어 있으며, 일반화 가능성에 제한이 있다.\n- 제안된 방법의 효과는 다른 유형의 LLM에 대해 추가적인 검증이 필요하다.\n\n# Transferable Insights\n- LLM의 편향 문제는 교육 외의 다른 분야에서도 유사하게 발생할 수 있다.\n- 잘못된 맥락에 대한 민감성을 줄이는 방법론은 다양한 AI 응용 분야에 적용 가능하다.\n\n# Idea Seeds\n1. 다양한 교육 환경에서 Debiasing-DPO의 효과를 검증하는 연구.\n2. 다른 유형의 LLM에 대한 편향 완화 방법의 적용 가능성 탐색.\n3. AI 기반 교육 도구의 공정성을 높이기 위한 정책 제안.\n\n# Citation Snippets\n> Nam, H., & Demszky, D. (2026). Mitigating LLM biases toward spurious social contexts using direct preference optimization. arXiv. https://arxiv.org/abs/2604.02585v1\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy\n\n---\n\n### 압축 요약\n본 연구는 대형 언어 모델(LLM)의 잘못된 사회적 맥락에 대한 민감성을 평가하고, 이를 완화하기 위한 새로운 방법인 Debiasing-DPO를 제안한다. 연구 결과, 이 방법은 편향을 84% 줄이고 예측 정확도를 52% 향상시키는 효과가 있음을 보여준다. LLM의 강건성은 자연스럽게 발생하지 않으며, 제안된 방법이 교육 평가에서의 공정성을 높이는 데 기여할 수 있다.", "link": "https://arxiv.org/abs/2604.02585v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Hyunji Nam", "Dorottya Demszky"], "categories": ["cs.AI", "cs.CL"]}, {"id": "5", "source": "ARXIV", "score": 11, "day": "2026-04-03", "title": "Toward an Artificial General Teacher: Procedural Geometry Data Generation and Visual Grounding with Vision-Language Models", "content": "We study visual explanation in geometry education as a Referring Image Segmentation (RIS) problem: given a diagram and a natural language description, the task is to produce a pixel-level mask for the referred geometric element. However, existing RIS models trained on natural image benchmarks such as RefCOCO fail catastrophically on geometric diagrams due to the fundamental domain shift between photographic scenes and abstract, textureless schematics. To address the absence of suitable training data, we present a fully automated procedural data engine that generates over 200,000 synthetic geometry diagrams with pixel-perfect segmentation masks and linguistically diverse referring expressions, requiring zero manual annotation. We further propose domain-specific fine-tuning of vision-language models (VLMs), demonstrating that a fine-tuned Florence-2 achieves 49% IoU and 85% Buffered IoU (BIoU), compared to <1% IoU in zero-shot settings. We introduce Buffered IoU, a geometry-aware evaluation metric that accounts for thin-structure localization, and show that it better reflects true segmentation quality than standard IoU. Our results establish a foundation for building Artificial General Teachers (AGTs) capable of providing visually grounded, step-by-step explanations of geometry problems.", "link": "https://arxiv.org/abs/2604.02893v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Hai Nguyen-Truong", "Alper Balbay", "Tunga Bayrak"], "categories": ["cs.CV", "cs.AI", "cs.LG"]}, {"id": "6", "source": "ARXIV", "score": 11, "day": "2026-04-03", "title": "Generative AI Use in Professional Graduate Thesis Writing: Adoption, Perceived Outcomes, and the Role of a Research-Specialized Agent", "content": "This paper reports a survey of generative AI use among 83 MBA thesis students in Japan (target population 230; 36.1% response rate), conducted after thesis examiner evaluation. AI use was nearly universal: 95.2% reported at least some use and 77.1% heavy use. Students engaged AI across the full research-writing workflow - literature review, drafting, and consultation when stuck - reporting benefits centered on clearer argument and structure (82.3%), better revision quality (73.4%), and faster writing (70.9%), with a mean perceived quality improvement of 6.27 out of 7. Concerns about output accuracy (75.9%) and citation handling persisted alongside these gains. Among respondents who rated GAMER PAT, a research-specialized agent, against other AI, preferences significantly favored it for inquiry deepening and structural organization (both p < 0.05, exact binomial). A preliminary qualitative analysis of follow-up interviews further reveals active epistemic vigilance strategies and differentiated tool use across thesis phases. The central implication is not adoption itself but a shift in the educational challenge toward verification, source governance, and AI tool design - with GAMER PAT offering preliminary evidence that research-specialized scaffolding matters.", "link": "https://arxiv.org/abs/2604.02792v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Kenji Saito", "Rei Tajika", "Satoru Shibuya"], "categories": ["cs.CY", "cs.HC"]}, {"id": "7", "source": "ARXIV", "score": 8, "day": "2026-04-02", "title": "Beyond Detection: Ethical Foundations for Automated Dyslexic Error Attribution", "content": "Dyslexic spelling errors exhibit systematic phonological and orthographic patterns that distinguish them from the errors produced by typically developing writers. While this observation has motivated dyslexic-specific spell-checking and assistive writing tools, prior work has focused predominantly on error correction rather than attribution, and has largely neglected the ethical risks. The risk of harmful labelling, covert screening, algorithmic bias, and institutional misuse that automated classification of learners entails requires the development of robust ethical and legal frameworks for research in this area. This paper addresses both gaps. We formulate dyslexic error attribution as a binary classification task. Given a misspelt word and its correct target form, determine whether the error pattern is characteristic of a dyslexic or non-dyslexic writer. We develop a comprehensive feature set capturing orthographic, phonological, and morphological properties of each error, and propose a twin-input neural model evaluated against traditional machine learning baselines under writer-independent conditions. The neural model achieves 93.01% accuracy and an F1-score of 94.01%, with phonetically plausible errors and vowel confusions emerging as the strongest attribution signals. We situate these technical results within an explicit ethics-first framework, analysing fairness across subgroups, the interpretability requirements of educational deployment, and the conditions, consent, transparency, human oversight, and recourse, under which a system could be responsibly used. We provide concrete guidelines for ethical deployment and an open discussion of the systems limitations and misuse potential. Our results demonstrate that dyslexic error attribution is feasible at high accuracy while underscoring that feasibility alone is insufficient for deployment in high-stakes educational contexts.", "link": "https://arxiv.org/abs/2604.01853v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Samuel Rose", "Debarati Chakraborty"], "categories": ["cs.CL", "cs.AI"]}, {"id": "8", "source": "ARXIV", "score": 8, "day": "2026-04-01", "title": "Open-Domain Safety Policy Construction", "content": "Moderation layers are increasingly a core component of many products built on user- or model-generated content. However, drafting and maintaining domain-specific safety policies remains costly. We present Deep Policy Research (DPR), a minimal agentic system that drafts a full content moderation policy based on only human-written seed domain information. DPR uses a single web search tool and lightweight scaffolding to iteratively propose search queries, distill diverse web sources into policy rules, and organize rules into an indexed document. We evaluate DPR on (1) the OpenAI undesired content benchmark across five domains with two compact reader LLMs and (2) an in-house multimodal advertisement moderation benchmark. DPR consistently outperforms definition-only and in-context learning baselines, and in our end-to-end setting it is competitive with expert-written policy sections in several domains. Moreover, under the same seed specification and evaluation protocol, DPR outperforms a general-purpose deep research system, suggesting that a task-specific, structured research loop can be more effective than generic web research for policy drafting. We release our experiment code at https://github.com/xiaowu0162/deep-policy-research.", "link": "https://arxiv.org/abs/2604.01354v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Di Wu", "Siyue Liu", "Zixiang Ji"], "categories": ["cs.CL"]}, {"id": "9", "source": "ARXIV", "score": 8, "day": "2026-04-01", "title": "Assessing Affective Objectives for Communicative Visualizations", "content": "Using learning objectives to define designer intents for communicative visualizations can be a powerful design tool. Cognitive and affective objectives are concrete and specific, which can be translated to assessments when creating, evaluating, or comparing visualization ideas. However, while there are many well-validated assessments for cognitive objectives, affective objectives are uniquely challenging. It is easy to see if a visualization helps someone remember the number of patients in a clinic, but harder to observe the change in their attitudes around donations to a crisis. In this work, we define a set of criteria for selecting assessments--from education, advocacy, economics, health, and psychology--that align with affective objectives. We illustrate the use of the framework in a complex affective design task that combines personal narratives and visualizations. Our chosen assessments allow us to evaluate different designs in the context of our objectives and competing psychological theories.", "link": "https://arxiv.org/abs/2604.01183v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Elsie Lee-Robbins", "Eytan Adar"], "categories": ["cs.HC"]}];

  localStorage.setItem('theme', next);
}

}

function toggleFavorite(id, e) {
  e.stopPropagation();
  const idx = favorites.indexOf(id);
  if (idx === -1) {
    favorites.push(id);
  } else {
    favorites.splice(idx, 1);
  }
  localStorage.setItem('favorites', JSON.stringify(favorites));
  applyFilters();
}

function recordVisit(id) {
  if (!visited.includes(id)) {
    visited.push(id);
  }
  localStorage.setItem('visited', JSON.stringify(visited));
}

function recordSearch(query) {
  if (query.trim() && !searchHistory.includes(query)) {
    searchHistory.unshift(query);
    if (searchHistory.length > 10) searchHistory.pop();
    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
  }
}

function downloadJSON() {
  const data = JSON.stringify(filtered, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadCSV() {
  const headers = ['제목', '출처', '스코어', '리뷰여부', '링크'];
  const rows = filtered.map(p => [
    '"' + p.title.replace(/"/g, '""') + '"',
    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
