<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-06-11 00:13</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "OPENALEX", "score": 31, "day": "2026-06-09", "title": "Integrating Artificial Intelligence in Classroom Learning: Opportunities and Challenges for Student-Centered Pedagogy", "content": "---\ntitle: 인공지능을 교실 학습에 통합하기: 학생 중심 교육을 위한 기회와 도전\nauthors: [Khaidir Ali, Önder Kutlu]\nyear: 2026\njournal: Journal of Educatio et Didactica\ndoi: https://openalex.org/W7164032365\nresearch_type: 질적 연구\nmethodology: 사례 연구\ndata_type: 질적 데이터\nsample: 15명의 교사, 강사, 교육 관리자, 학생, 커리큘럼 담당자, 교육 기술 전문가\ncontext: 인도네시아 자카르타와 탕게랑의 Global Future Senior High School 및 Digital Learning University\ntheoretical_framework: 구성주의 학습 이론, 기술-교수-내용 지식(TPACK) 이론, 혁신 확산 이론\nkeywords: [인공지능, 교실 학습, 학생 중심 교육, 디지털 교육, 교육 기술, 질적 사례 연구]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 교실 학습에 인공지능(AI)을 통합하는 것과 관련된 기회, 도전 및 교육적 변화를 분석한다. 질적 접근법을 사용하여 사례 연구 디자인을 채택하였으며, 인도네시아의 두 교육 기관에서 AI 기반 교육 기술이 어떻게 구현되고 있는지를 탐구하였다. 연구 결과, AI 통합은 개인화된 학습, 학생 참여, 협력적 참여 및 교수 유연성을 향상시켰으나, 기술적 준비, 윤리적 문제, 학문적 무결성 및 교육적 적응과 관련된 도전 과제가 여전히 존재함을 발견하였다. 연구는 디지털 교수법 훈련, 기술 지원 및 윤리적 AI 리터러시 프로그램의 강화를 권장한다.\n\n# Research Logic\n## Problem\nAI 통합이 학생 중심 교육에 미치는 영향과 그에 따른 도전 과제를 이해하는 것이 필요하다.\n## Theory\n구성주의 학습 이론, TPACK 이론, 혁신 확산 이론을 통해 AI 통합의 교육적 함의를 분석하였다.\n## Design\n질적 사례 연구 방법을 통해 15명의 다양한 교육 관련 인물들의 경험을 조사하였다.\n## Findings\nAI 통합이 개인화된 학습과 학생 참여를 증진시키지만, 기술적 준비와 윤리적 문제 등의 도전 과제가 존재함을 발견하였다.\n## Conclusion\nAI의 효과적인 통합을 위해서는 교육적 전략과 지원이 필요하다.\n\n# Key Findings\n- AI 통합은 개인화된 학습과 학생 참여를 향상시킨다.\n- 기술적 준비와 윤리적 문제는 여전히 중요한 도전 과제이다.\n- 디지털 교수법 훈련과 기술 지원의 필요성이 강조된다.\n\n# Contributions\n## Theoretical\nAI 통합의 교육적 변화를 이해하는 데 기여하며, 학생 중심 교육의 개념을 확장한다.\n## Methodological\n질적 사례 연구 접근법을 통해 AI 통합의 복잡성을 심층적으로 탐구하였다.\n## Practical\n교사와 교육 정책 입안자에게 AI 기반 교육 전략 설계에 대한 실질적인 지침을 제공한다.\n\n# Limitations\n- 연구는 특정 지역의 교육적 맥락에 제한되어 있다.\n- AI 기술의 빠른 발전으로 인해 연구 결과의 장기적 유효성이 제한될 수 있다.\n\n# Transferable Insights\n- AI 통합의 성공은 기술적 준비뿐만 아니라 교육자들의 교수법적 역량에 달려 있다.\n- 교육적 혁신을 위한 포괄적인 전략이 필요하다.\n\n# Idea Seeds\n1. AI 기반 학습 도구의 효과를 평가하기 위한 장기 연구 필요.\n2. 다양한 교육 환경에서 AI 통합의 비교 연구.\n3. 윤리적 AI 사용을 위한 교육 프로그램 개발.\n\n# Citation Snippets\n> Ali, K., & Kutlu, Ö. (2026). Integrating Artificial Intelligence in Classroom Learning: Opportunities and Challenges for Student-Centered Pedagogy. Journal of Educatio et Didactica, 2(2).\n\ntags: #인공지능, #교실학습, #학생중심교육, #디지털교육, #교육기술, #질적연구, #AI리터러시\n\n---\n\n요약: 본 연구는 인공지능(AI)의 교실 학습 통합이 학생 중심 교육에 미치는 영향을 분석하였다. AI는 개인화된 학습과 학생 참여를 증진시키지만, 기술적 준비와 윤리적 문제 등의 도전 과제가 존재한다. 연구는 디지털 교수법 훈련과 기술 지원의 필요성을 강조하며, AI 통합을 위한 교육적 전략을 제안한다.", "link": "https://doi.org/10.67171/0gqhqw80", "altLink": "https://openalex.org/W7164032365", "hasDoi": true, "hasReview": true, "authors": ["Khaidir Ali", "Önder Kutlu"], "categories": ["Curriculum", "Technology integration", "Educational technology", "Pedagogy", "Adaptation (eye)"]}, {"id": "1", "source": "OPENALEX", "score": 21, "day": "2026-05-14", "title": "Learning Beyond the Screen: Hybrid Ecological Classrooms and Students’ Cognitive Engagement", "content": "---\ntitle: Learning Beyond the Screen: Hybrid Ecological Classrooms and Students’ Cognitive Engagement\nauthors: [Nabilla Aurel, Fajri Sandi Nurrohim, Hasan Ikra]\nyear: 2026\njournal: Journal of Educatio et Didactica\ndoi: https://openalex.org/W7164014498\nresearch_type: 질적 연구\nmethodology: 사례 연구\ndata_type: 인터뷰, 관찰, 문서 분석\nsample: 9명 (교사 6명, 기관 리더 3명)\ncontext: Nusantara Integrated Learning School, 하이브리드 학습 시스템\ntheoretical_framework: 구성주의 학습 이론, 생태계 이론, 인지 참여 이론\nkeywords: [하이브리드 생태 교실, 인지 참여, 질적 사례 연구, 구성주의 학습, 교육 혁신]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 하이브리드 생태 교실이 전통적인 화면 기반 학습 환경을 넘어 학생들의 인지 참여를 어떻게 향상시키는지를 조사하는 것을 목표로 한다. 질적 접근법을 사용하여 사례 연구 설계를 채택하였으며, 교육적 실천, 기술 통합 및 학습자 참여 간의 상호작용에 대한 심층적이고 맥락이 풍부한 통찰을 포착하고자 하였다. 연구 결과, 학습 환경이 일관되게 통합되고 적응적 교수법과 학생의 적극적인 참여가 지원될 때 인지 참여가 유의미하게 향상됨을 발견하였다. 그러나 기관 정책과 교실 실행 간의 정렬 문제는 여전히 남아 있다. 연구는 생태적 학습 설계를 강화하고 교사 역량을 향상시키며 시스템적 일관성을 보장할 것을 권장한다.\n\n# Research Logic\n## Problem\n기술 통합과 의미 있는 인지 참여 간의 지속적인 격차.\n\n## Theory\n구성주의, 생태계, 인지 참여 이론을 통해 하이브리드 학습 환경의 복잡성을 탐구.\n\n## Design\n사례 연구를 통해 하이브리드 생태 교실의 효과를 분석.\n\n## Findings\n인지 참여는 학습 환경의 일관된 통합과 적응적 교수법에 의해 향상됨.\n\n## Conclusion\n하이브리드 생태 교실의 설계와 실행에서 생태적 학습 설계의 중요성을 강조.\n\n# Key Findings\n- 하이브리드 생태 교실은 인지 참여를 유의미하게 향상시킴.\n- 적응적 교수법과 학생의 적극적인 참여가 필수적임.\n- 기관 정책과 교실 실행 간의 정렬 문제 존재.\n\n# Contributions\n## Theoretical\n구성주의와 생태계 이론을 통합한 새로운 모델 제안.\n\n## Methodological\n질적 사례 연구를 통해 하이브리드 학습 환경의 복잡성을 탐구.\n\n## Practical\n교사와 교육 정책 입안자에게 실용적인 설계 원칙 제공.\n\n# Limitations\n- 연구 결과의 일반화 가능성 제한.\n- 인지 참여 측정의 복잡성.\n\n# Transferable Insights\n- 하이브리드 학습 환경 설계 시 생태적 요소 고려 필요.\n- 기술과 교육적 설계의 통합 중요성 강조.\n\n# Idea Seeds\n1. 다양한 교육 맥락에서 하이브리드 생태 교실의 효과 연구.\n2. 장기적인 인지 개발에 대한 하이브리드 환경의 영향 조사.\n3. 고급 분석 및 학습 기술 통합 방안 탐색.\n\n# Citation Snippets\n> Aurel, N., Nurrohim, F. S., & Ikra, H. (2026). Learning Beyond the Screen: Hybrid Ecological Classrooms and Students’ Cognitive Engagement. Journal of Educatio et Didactica, 2(1).\n\ntags: #하이브리드_생태_교실, #인지_참여, #질적_연구, #구성주의_학습, #교육_혁신, #교실_설계, #기술_통합\n\n---\n\n### 압축 요약\n본 연구는 하이브리드 생태 교실이 학생들의 인지 참여를 어떻게 향상시키는지를 조사하였다. 질적 사례 연구를 통해, 일관된 학습 환경 통합과 적응적 교수법이 인지 참여에 긍정적인 영향을 미친다는 결과를 도출하였다. 그러나 기관 정책과 교실 실행 간의 정렬 문제는 여전히 해결해야 할 과제로 남아 있다.", "link": "https://doi.org/10.67171/q47m5314", "altLink": "https://openalex.org/W7164014498", "hasDoi": true, "hasReview": true, "authors": ["Nabilla Aurel", "Fajri Sandi Nurrohim", "Hasan Ikra"], "categories": ["Hybrid learning", "Psychology", "Cognition", "Institution", "Active learning (machine learning)"]}, {"id": "2", "source": "ARXIV", "score": 16, "day": "2026-06-09", "title": "A Case Study Reexamining the Cold-Start Problem in Knowledge Tracing Models and Implications for SafeInsights, an Education Research Infrastructure", "content": "---\ntitle: A Case Study Reexamining the Cold-Start Problem in Knowledge Tracing Models and Implications for SafeInsights, an Education Research Infrastructure\nauthors: [Jiayi Zhang, Ryan S. Baker, Debshila Basu Mallick, Cristina Heffernan, Neil Heffernan]\nyear: 2026\njournal: Proceedings of Seventh Annual Workshop on A/B Testing and Platform-Enabled Learning Engineering (PELE)\ndoi: https://doi.org/10.1145/nnnnnnn.nnnnnnn\nresearch_type: 사례 연구\nmethodology: 데이터 분석 및 모델 성능 평가\ndata_type: 교육 데이터셋\nsample: 4,743명의 학생\ncontext: ASSISTments 플랫폼의 FoundationalASSIST 데이터셋\ntheoretical_framework: 지식 추적 모델\nkeywords: [Knowledge Tracing, Data Enclave, SafeInsights, Open Datasets]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 지식 추적(KT) 모델의 콜드 스타트 문제를 재검토하고, SafeInsights라는 교육 연구 인프라의 함의를 탐구한다. KT 모델은 학생의 학습 이력을 기반으로 지식 상태를 예측하는 데 널리 사용되지만, 특정 데이터셋과 학습 맥락에서 평가되는 경우가 많아 일반화 가능성에 대한 의문이 제기된다. 본 연구는 Zhang et al. (2021)의 분석을 반복하고 확장하여, ASSISTments의 최신 데이터셋인 FoundationalASSIST를 사용하여 KT 모델의 성능을 문제 유형에 따라 평가하였다. 결과는 KT 모델의 성능이 학생의 연습 경로와 문제 유형에 따라 다름을 보여준다. 또한, 교육 데이터 마이닝 연구의 재현성 문제를 식별하고, SafeInsights와 같은 개인 정보 보호 연구 인프라의 활용 가능성을 제시한다.\n\n# Research Logic\n## Problem\nKT 모델의 성능이 특정 데이터셋과 맥락에 국한되어 일반화 가능성에 대한 의문이 제기됨.\n## Theory\nKT 모델의 성능은 문제 유형과 학생의 연습 경로에 따라 달라질 수 있음.\n## Design\nASSISTments의 FoundationalASSIST 데이터셋을 사용하여 KT 모델 성능을 평가하고, 문제 유형에 따른 성능 차이를 분석함.\n## Findings\nKT 모델의 성능은 문제 유형에 따라 다르며, 깊이 있는 학습 기반 모델이 초기 예측에서 더 나은 성능을 보임.\n## Conclusion\nKT 모델의 성능 평가에서 문제 유형을 고려하는 것이 중요하며, SafeInsights와 같은 인프라가 교육 연구에 기여할 수 있음.\n\n# Key Findings\n- KT 모델의 성능은 학생의 연습 경로에 따라 다름.\n- 문제 유형에 따라 KT 모델의 성능 차이가 존재함.\n- 깊이 있는 학습 기반 KT 모델이 초기 예측에서 더 나은 성능을 보임.\n\n# Contributions\n## Theoretical\nKT 모델의 성능 평가에 대한 새로운 통찰을 제공함.\n## Methodological\nSafeInsights를 활용한 데이터 분석 방법론을 제시함.\n## Practical\n교육 연구에서 개인 정보 보호를 고려한 데이터 활용 방안을 제시함.\n\n# Limitations\n- 연구에 사용된 데이터셋이 특정 플랫폼에 국한됨.\n- 개인 정보 보호 문제로 인해 데이터 접근성이 제한됨.\n\n# Transferable Insights\n- KT 모델의 성능은 다양한 맥락에서 재검토되어야 함.\n- 개인 정보 보호를 고려한 연구 인프라의 필요성이 강조됨.\n\n# Idea Seeds\n1. 다양한 교육 플랫폼에서 KT 모델의 성능 비교 연구.\n2. 개인 정보 보호를 고려한 데이터 분석 방법론 개발.\n3. KT 모델의 문제 유형별 성능 차이를 분석하는 추가 연구.\n\n# Citation Snippets\n> Zhang, J., Baker, R. S., Mallick, D. B. B., Heffernan, C., & Heffernan, N. (2026). A Case Study Reexamining the Cold-Start Problem in Knowledge Tracing Models and Implications for SafeInsights, an Education Research Infrastructure. In Proceedings of Seventh Annual Workshop on A/B Testing and Platform-Enabled Learning Engineering (PELE). ACM.\n\ntags: #knowledge_tracing, #data_enclave, #safeinsights, #educational_research, #privacy_preserving, #learning_analytics, #model_performance\n\n---\n\n요약: 본 연구는 지식 추적 모델의 콜드 스타트 문제를 재검토하고, SafeInsights라는 교육 연구 인프라의 활용 가능성을 탐구한다. KT 모델의 성능은 학생의 연습 경로와 문제 유형에 따라 다르며, 깊이 있는 학습 기반 모델이 초기 예측에서 더 나은 성능을 보인다. 연구는 개인 정보 보호를 고려한 데이터 분석 방법론의 필요성을 강조한다.", "link": "https://arxiv.org/abs/2606.11004v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Jiayi Zhang", "Ryan S. Baker", "Debshila Basu Mallick"], "categories": ["cs.HC"]}, {"id": "3", "source": "ARXIV", "score": 15, "day": "2026-06-08", "title": "Culturally-Aware AI for Cross-Boundary Community Learning: Undergraduate Innovation at the Intersection of Computation and Design", "content": "---\ntitle: Culturally-Aware AI for Cross-Boundary Community Learning: Undergraduate Innovation at the Intersection of Computation and Design\nauthors: [Jiaojiao Zhao, Weisheng Zhang, Jiawen Cai, Haibin Gao, Luyao Zhang]\nyear: 2026\njournal: arXiv\ndoi: https://doi.org/10.48550/arXiv.2606.09041\nresearch_type: 사례 연구\nmethodology: 참여적 행동 연구, 사례 연구\ndata_type: 질적 데이터\nsample: 두 명의 학부생\ncontext: 아시아-태평양 지역의 커뮤니티 기반 학습\ntheoretical_framework: 문화적 인식이 있는 인공지능 교육\nkeywords: [AIED, 커뮤니티 기반 학습, 문화 데이터 시각화, 인간-AI 협력, 집단 지성, 경계 간 교육, 아시아-태평양]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 인공지능 교육(AIED)에서 기술 발전이 인간 중심의 기반과 문화적 맥락에 대한 충분한 주의 없이 진행되고 있음을 지적한다. 아시아-태평양 지역의 커뮤니티 기반 학습을 통해 학부생들이 문화유산 보존 및 지속 가능한 발전을 위한 AI 솔루션을 개발하는 과정을 보고한다. 연구는 교육, 기술, 문화의 세 가지 차원에서 커뮤니티 참여형 컴퓨팅이 인간 중심의 AIED를 어떻게 실현하는지를 분석하며, 사회복지와 컴퓨터 과학 간의 학문적 경계를 허물어 다자간 협력을 촉진하는 문화적 인식이 있는 AIED의 협력적 프레임워크를 제안한다.\n\n# Research Logic\n## Problem\nAIED 연구에서 문화적 맥락이 부족하고 커뮤니티 기반 학습이 저조하게 나타나는 문제.\n## Theory\n문화적 인식이 있는 AIED의 필요성과 커뮤니티 참여형 교육의 중요성.\n## Design\n두 명의 학부생이 참여한 사례 연구로, 커뮤니티 기반 학습을 통해 AI 솔루션을 개발.\n## Findings\n학생들은 커뮤니티 이해관계자의 의견을 반영하여 AI 프로토타입을 설계하고, 집단 지성을 통해 지속 가능한 결과를 도출.\n## Conclusion\nAIED는 문화적 맥락을 고려하여 설계되어야 하며, 커뮤니티 기반 학습이 이를 가능하게 한다.\n\n# Key Findings\n- 커뮤니티 기반 학습을 통해 학생들이 문화적 맥락을 반영한 AI 솔루션을 개발함.\n- 학생들은 프로젝트의 성공을 위해 커뮤니티의 요구를 충족시키는 데 책임감을 느꼈음.\n- AI와 인간의 협력이 집단 지성을 통해 지속 가능한 결과를 도출하는 데 기여함.\n\n# Contributions\n## Theoretical\n문화적 인식이 있는 AIED의 프레임워크를 제안하여 기존 이론에 기여.\n## Methodological\n참여적 행동 연구를 통해 커뮤니티 기반 학습의 효과를 실증적으로 분석.\n## Practical\nAI 솔루션을 통해 문화유산 보존과 지속 가능한 발전에 기여하는 실제 사례 제공.\n\n# Limitations\n- 단일 사례 연구로 일반화의 한계가 있음.\n- 아시아-태평양 지역의 특정 맥락에 국한됨.\n\n# Transferable Insights\n- 커뮤니티 참여형 교육이 AIED에서 중요한 역할을 할 수 있음.\n- 문화적 맥락을 고려한 AI 설계의 필요성을 강조.\n\n# Idea Seeds\n1. 다양한 문화적 배경을 가진 학생들이 참여하는 다문화 AI 교육 프로그램 개발.\n2. 커뮤니티 기반 학습을 통한 AI 솔루션의 지속 가능성 평가 연구.\n3. AI와 인간의 협력을 통한 교육적 성과 향상 방안 탐색.\n\n# Citation Snippets\n> Zhao, J., Zhang, W., Cai, J., Gao, H., & Zhang, L. (2026). Culturally-Aware AI for Cross-Boundary Community Learning: Undergraduate Innovation at the Intersection of Computation and Design. arXiv. https://doi.org/10.48550/arXiv.2606.09041\n\ntags: #AIED, #커뮤니티기반학습, #문화적인식, #인간AI협력, #집단지성, #지속가능발전, #교육기술", "link": "https://arxiv.org/abs/2606.09041v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Jiaojiao Zhao", "Weisheng Zhang", "Jiawen Cai"], "categories": ["cs.CY", "cs.AI", "cs.GR", "cs.HC", "cs.MM"]}, {"id": "4", "source": "OPENALEX", "score": 15, "day": "2026-01-01", "title": "Enhancing Academic Literacy through AI-Supported Writing Analytics in Multilingual Higher Education", "content": "---\ntitle: AI 지원 작문 분석을 통한 다국어 고등 교육에서의 학문적 문해력 향상\nauthors: Riki Nasrullah, Septia Rizqi Nur Abni\nyear: 2026\njournal: Journal of Educational Technology Development and Exchange\ndoi: https://doi.org/10.18785/jetde.1902.08\nresearch_type: 준실험적 연구\nmethodology: 준실험적 설계, 반복 측정 분석\ndata_type: 양적 데이터\nsample: 124명의 학부생\ncontext: 다국어 고등 교육\ntheoretical_framework: 명시되지 않음\nkeywords: [academic literacy, academic writing, artificial intelligence, higher education, multilingualism]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 다국어 고등 교육에서 AI 지원 작문 분석이 학문적 문해력에 미치는 장기적인 영향을 조사하였다. 124명의 학부생을 대상으로 두 학기 동안 준실험적 설계를 사용하였으며, 실험군은 GPT 기반 분석 도구를 사용하고 대조군은 전통적인 피드백을 받았다. 연구 결과, 실험군이 학문적 문해력에서 더 큰 향상을 보였으며, 표면적인 편집에서 전반적인 수정으로의 변화와 더 깊은 메타인지적 참여가 나타났다.\n\n# Research Logic\n## Problem\nAI 지원 작문 분석이 다국어 학생들의 학문적 문해력에 미치는 장기적 효과에 대한 연구 부족.\n## Theory\nAI 기술의 발전이 학문적 작문 교육에 미치는 잠재적 영향.\n## Design\n준실험적 설계로 실험군과 대조군을 설정하여 두 학기 동안 비교 분석.\n## Findings\n실험군이 대조군에 비해 학문적 문해력에서 유의미한 향상을 보임.\n## Conclusion\nAI 지원 도구가 학문적 문해력 향상에 효과적임을 입증.\n\n# Key Findings\n- 실험군의 학문적 문해력 점수가 두 학기 동안 지속적으로 증가함.\n- AI 도구 사용으로 인해 수정 행동이 표면적 편집에서 전반적 수정으로 변화함.\n- 메타인지적 참여가 심화됨.\n\n# Contributions\n## Theoretical\nAI 기술이 학문적 문해력 교육에 미치는 영향에 대한 새로운 통찰 제공.\n## Methodological\n장기적 연구 설계와 학습 분석의 통합을 통한 방법론적 기여.\n## Practical\n다국어 학생을 위한 학문적 문해력 개발 커리큘럼 개발에 기여.\n\n# Limitations\n- 연구 샘플이 특정 지역의 대학생으로 제한됨.\n- AI 도구의 효과에 대한 장기적인 추적 연구 부족.\n\n# Transferable Insights\n- AI 도구가 학문적 작문 교육에서 효과적으로 활용될 수 있음.\n- 다국어 환경에서의 학습자 지원을 위한 새로운 교육 방법론 개발 가능성.\n\n# Idea Seeds\n1. AI 도구를 활용한 작문 교육의 커리큘럼 개발.\n2. 다국어 학생을 위한 맞춤형 학습 자료 제작.\n3. AI와 인간 교사의 협업 모델 연구.\n\n# Citation Snippets\n> Nasrullah, R., & Abni, S. R. (2026). Enhancing academic literacy through AI-supported writing analytics in multilingual higher education. Journal of Educational Technology Development and Exchange, 19(2), 166-184. https://doi.org/10.18785/jetde.1902.08\n\ntags: #AI, #학문적문해력, #작문분석, #고등교육, #다국어교육, #학습분석, #메타인지\n\n---\n\n요약: 본 연구는 AI 지원 작문 분석이 다국어 고등 교육에서 학문적 문해력에 미치는 장기적인 영향을 조사하였다. 124명의 학부생을 대상으로 한 준실험적 설계에서 실험군은 GPT 기반 도구를 사용하여 학문적 문해력에서 유의미한 향상을 보였다.", "link": "https://doi.org/10.18785/jetde.1902.08", "altLink": "https://openalex.org/W7163893288", "hasDoi": true, "hasReview": true, "authors": ["Riki Nasrullah", "Septia Rizqi Nur Abni"], "categories": ["Learning analytics", "Higher education", "Analytics", "Literacy", "Mathematics education"]}, {"id": "5", "source": "ARXIV", "score": 11, "day": "2026-06-09", "title": "KG-SoftMAP: Soft Knowledge-Graph Priors for Bayesian Network Structure Learning from Sparse Discrete Data", "content": "Learning Bayesian network (BN) structure from sparse discrete data is hard: when each instance records only a few variables, most variable pairs lack the joint observations needed for reliable scoring, and data-only methods recover little structure. Imperfect domain knowledge, expressible as a weighted directed knowledge graph (KG), is often available. We propose KG-SoftMAP, which encodes such a KG as a soft, confidence-weighted, data-overridable edge prior and maximizes a MAP objective combining the BDeu score with a logit-form prior; the KG may be expert-curated or LLM-extracted. On controlled synthetic benchmarks, the only setting with ground-truth DAGs, KG-SoftMAP recovers partial directed structure at $ρ=0.05$ (DF1 $0.14$ to $0.29$, versus near-zero baselines) and substantially more once $ρ\\geq0.2$ (DF1 $0.46$ to $0.96$), when paired with an informative but imperfect KG; recovery degrades gracefully as KG quality drops. On real sparse educational data, which has no ground-truth DAG, we evaluate deployment-facing measures only: prediction, calibration, and KG-consistency. The learned BN is best read as a diagnostic model: on SAF it trails logistic regression by $0.03$ F1_FAIL while providing KG-consistent edges, calibrated joint probabilities, and inference from arbitrary observed concept subsets; when no meaningful KG exists, discriminative logistic regression is preferable.", "link": "https://arxiv.org/abs/2606.10358v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Guoliang Xu", "James E. Corter"], "categories": ["cs.LG", "cs.AI"]}, {"id": "6", "source": "ARXIV", "score": 8, "day": "2026-06-09", "title": "Large-scale semantic mapping of learner agency and autonomy reveals what measurement and generative AI research overlook", "content": "Learner agency and autonomy are foundational to personal development, yet a pervasive \"jingle-jangle\" fallacy (i.e. identical terms denoting different constructs, distinct terms denoting identical ones) has substantially hindered cumulative knowledge. Treating meaning as a phenomenon constituted through use in linguistic practice, we extracted 8,954 definitions and 2,700 scale items from over 14,000 publications, to investigate how researchers actually used learner agency and autonomy with a semantic analysis pipeline. The definitional landscape of two constructs resolves into three dimensions: regulation and control of learning (task), intrinsic motivation and internal decision-making (person), and social-relational action (sociocultural), thereby empirically quantifying the jingle-jangle fallacy. Existing scales, however, systematically underrepresent the sociocultural dimension. Critically, current generative AI research in education concentrates on learning regulation and control, narrowing the behavioral repertoire that AI-mediated learning environments are designed to cultivate. Beyond conceptual clarification, this work carries direct implications for conceptualization, measurement, and practice towards supporting the multidimensional learner agency and autonomy.", "link": "https://arxiv.org/abs/2606.10881v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Fei Qin", "Xiaobo Liu", "Yaowen Zhang"], "categories": ["cs.AI"]}, {"id": "7", "source": "ARXIV", "score": 6, "day": "2026-06-09", "title": "VISTA: A Versatile Interactive User Simulation Toolkit for Agent Evaluation", "content": "Evaluation remains a critical bottleneck for interactive agent development. Existing evaluation methods often rely on static benchmarks, which fail to capture the dynamic, multi-step nature of agentic behavior and struggle to expose meaningful failure modes. While user-simulation-based evaluation offers a promising alternative, existing simulation frameworks suffer from two major limitations. First, they provide limited mechanisms for evaluating the quality and comprehensiveness of simulated interactions, making it difficult to assess whether a simulator sufficiently explores an agent's capabilities and failure modes. Second, most frameworks are restricted to either UI-only actions or API-only actions, limiting their ability to model the full range of realistic user behaviors. To address these limitations, we propose VISTA, a Versatile Interactive user Simulation Toolkit for Agent evaluation. Our toolkit includes a suite of six metrics for measuring the realism, capability coverage, and interaction effectiveness of simulated interactions. In addition, we develop a hybrid user simulator that integrates both UI-based interactions and API-based interactions, enabling more realistic and comprehensive evaluation across diverse interactive environments. We evaluate VISTA in e-commerce shopping and education customer service settings and demonstrate that it produces more realistic and comprehensive evaluations than existing methods.", "link": "https://arxiv.org/abs/2606.11079v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Yunan Lu", "Ryan Shea", "Yusen Zhang"], "categories": ["cs.CL"]}, {"id": "8", "source": "ARXIV", "score": 6, "day": "2026-06-09", "title": "Do VLMs Reason Like Engineers? A Benchmark and a Stage-wise Evaluation", "content": "Vision-Language Models (VLMs) demonstrate strong performance on general multimodal reasoning benchmarks, yet their ability to perform engineering reasoning remains largely unexplored. Unlike general visual question answering, engineering problem solving requires interpreting technical diagrams, selecting governing physical principles, and maintaining physically consistent multi-step reasoning. These capabilities are increasingly important for AI systems used in engineering education, scientific assistance, and technical decision-making, where reasoning failures may produce physically invalid yet superficially plausible solutions. Existing benchmarks primarily evaluate final answers and provide limited assessment of intermediate reasoning processes. We introduce EngVQA, a multimodal benchmark for evaluating engineering reasoning across 5 engineering subjects containing 696 problems. We introduce an 8-stage automatic evaluation framework for assessing VLM-generated solutions. The framework independently evaluates each stage of the solution, enabling fine-grained analysis of reasoning failures. We benchmark multiple state-of-the-art open and closed source VLMs on our evaluation framework and demonstrate substantial limitations in current engineering reasoning capabilities. Human evaluation shows strong agreement with our automated framework, achieving a Pearson correlation of 0.975 and a mean absolute error of 0.67 on a 10-point grading scale. Our results highlight the importance of process-oriented evaluation for reliable assessment of multimodal engineering reasoning systems.", "link": "https://arxiv.org/abs/2606.10833v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Syed Wasiq", "Syed Mohamad Tawseeq", "Yashwant Pravinrao Bangde"], "categories": ["cs.AI"]}, {"id": "9", "source": "ARXIV", "score": 6, "day": "2026-06-09", "title": "The Order Matters: Sequential Fine-Tuning of LLaMA for Coherent Automated Essay Scoring", "content": "Automated Essay Scoring (AES) systems must judge interdependent discourse elements (e.g., lead, claim, evidence, conclusion), yet most approaches treat these in isolation, harming coherence and generalization. We investigate task-aware fine-tuning of LLaMA-3.1-8B for AES using parameter-efficient LoRA with 4-bit quantization and compare three training curricula: (i) Sequential (progressively fine-tuning on lead, then position, then claim, then evidence, then conclusion), (ii) Independent (task-specific models), and (iii) Randomized (shuffled multi-task). Experiments on the PERSUADE~2.0 corpus show that modeling task dependencies matters: Sequential fine-tuning yields the strongest overall results, including F1 scores of 65% (evidence) and 87% (conclusion) and corresponding accuracies of 63% and 85%, surpassing Independent training and outperforming a general-purpose LLaMA-70B baseline on conclusion despite its far larger capacity. Randomized training improves position scoring (57% F1) but is less consistent elsewhere. These findings indicate that (1) curriculum design aligned with discourse structure can materially improve AES, and (2) small, task-optimized models can be competitive with substantially larger Large Language Models (LLM), offering a practical path to scalable, cost-effective assessment. We release templates and implementation details to facilitate reproduction and future work on curriculum design for educational NLP.", "link": "https://arxiv.org/abs/2606.10327v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Ali Keramati", "Mark Warschauer"], "categories": ["cs.CL", "cs.LG"]}];

function toggleFavorite(id, e) {
  e.stopPropagation();
  const idx = favorites.indexOf(id);
  if (idx === -1) {
    favorites.push(id);
  } else {
    favorites.splice(idx, 1);
  }
  localStorage.setItem('favorites', JSON.stringify(favorites));
  applyFilters();
}

function recordVisit(id) {
  if (!visited.includes(id)) {
    visited.push(id);
  }
  localStorage.setItem('visited', JSON.stringify(visited));
}

function recordSearch(query) {
  if (query.trim() && !searchHistory.includes(query)) {
    searchHistory.unshift(query);
    if (searchHistory.length > 10) searchHistory.pop();
    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
  }
}

    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
