<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-03-31 23:33</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "ARXIV", "score": 19, "day": "2026-03-28", "title": "From Tool to Teammate: LLM Coding Agents as Collaborative Partners for Behavioral Labeling in Educational Dialogue Analysis", "content": "---\ntitle: From Tool to Teammate: LLM Coding Agents as Collaborative Partners for Behavioral Labeling in Educational Dialogue Analysis\nauthors: [Eason Chen, Isabel Wang, Nina Yuan, Sophia Judicke, Kayla Beigh, Xinyi Tang]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2603.27440v1\nresearch_type: 실험적 연구\nmethodology: 반복적 개선 프로세스\ndata_type: 대화 데이터\nsample: 659 AI 튜터링 세션\ncontext: 대학교의 이산 수학 과정\ntheoretical_framework: 도움 요청 이론\nkeywords: [LLM labeling, behavioral analytics, prompt engineering, AI tutoring, educational data mining]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 교육 대화 분석에서 튜터링 대화의 행동 분석이 학생 학습 이해에 필수적임을 강조하며, LLM 코딩 에이전트가 교육 대화를 라벨링하는 데 있어 자율적으로 프롬프트를 개선하는 방법론을 제시한다. 659개의 AI 튜터링 세션을 대상으로 한 실험에서, 4배 교차 검증을 통해 최상의 에이전트가 테스트에서 $κ=0.78$ (SD$=0.08$)을 달성하여 인간 간의 일치도와 일치함을 확인하였다. 연구는 반복적 프로세스가 인간 코더가 혼란의 표현을 참여로 간주하는 패턴을 드러내는 등 중요한 통찰을 제공함을 보여준다. 최적 지점을 넘어서는 반복은 성능 저하를 초래할 수 있음을 강조하며, 모든 프롬프트와 반복 로그, 데이터를 공개하였다.\n\n# Research Logic\n## Problem\n튜터링 대화의 행동 라벨링은 수작업으로 인한 병목 현상이 존재한다.\n## Theory\n도움 요청 이론을 기반으로 하여 학생의 행동을 분석한다.\n## Design\nLLM 코딩 에이전트가 자율적으로 프롬프트를 개선하는 반복적 프로세스를 설계하였다.\n## Findings\n최상의 에이전트는 $κ=0.78$을 달성하였으며, 인간 간의 일치도와 일치하였다.\n## Conclusion\nLLM 코딩 에이전트는 교육 대화의 라벨링을 개선할 수 있는 잠재력을 지니고 있으며, 반복적 개선이 성능 향상에 기여함을 보여준다.\n\n# Key Findings\n- LLM 코딩 에이전트는 자율적으로 프롬프트를 개선할 수 있다.\n- 최상의 에이전트는 $κ=0.78$을 달성하여 인간 코더와의 일치도를 보였다.\n- 반복적 프로세스에서 혼란의 표현이 참여로 간주되는 패턴이 드러났다.\n\n# Contributions\n## Theoretical\n도움 요청 이론을 통해 행동 라벨링의 새로운 통찰을 제공하였다.\n## Methodological\nLLM 코딩 에이전트를 활용한 반복적 개선 프로세스를 제안하였다.\n## Practical\n교육 대화 분석의 효율성을 높이는 방법론을 제시하였다.\n\n# Limitations\n- 반복적 개선이 항상 성능 향상을 보장하지 않는다.\n- 특정 에이전트의 성능 차이가 존재할 수 있다.\n\n# Transferable Insights\n- LLM 코딩 에이전트의 자율적 개선 가능성은 다양한 교육 환경에 적용될 수 있다.\n- 반복적 오류 분석이 교육 데이터 라벨링의 품질을 향상시킬 수 있다.\n\n# Idea Seeds\n1. LLM 코딩 에이전트를 활용한 다양한 교육 대화 분석 연구.\n2. 다른 교육 환경에서의 LLM 기반 라벨링 시스템 개발.\n3. 반복적 개선 프로세스의 최적화 연구.\n\n# Citation Snippets\n> Chen, E., Wang, I., Yuan, N., Judicke, S., Beigh, K., & Tang, X. (2026). From Tool to Teammate: LLM Coding Agents as Collaborative Partners for Behavioral Labeling in Educational Dialogue Analysis. arXiv. https://arxiv.org/abs/2603.27440v1\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy", "link": "https://arxiv.org/abs/2603.27440v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Eason Chen", "Isabel Wang", "Nina Yuan"], "categories": ["cs.HC"]}, {"id": "1", "source": "ARXIV", "score": 18, "day": "2026-03-27", "title": "KI-Adventskalender: An Informal Learning Intervention for Data & AI Literacy", "content": "---\ntitle: KI-Adventskalender: An Informal Learning Intervention for Data & AI Literacy\nauthors: [Rahul Sharma, Lars Henrich, Larisa Ivanova, Arsalan Karimzadmotallebiazar, Annette Bieniusa, Leo Van Waveren, Sebastian Vollmer]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2603.26906v1\nresearch_type: 실험적 연구\nmethodology: 플랫폼 로그 분석\ndata_type: 양적 데이터\nsample: 2024-2025년 두 해의 사용자 참여 데이터\ncontext: 고등학교 학생을 위한 비공식 데이터 및 AI 리터러시 학습\ntheoretical_framework: 데이터 리터러시, AI 리터러시\nkeywords: [데이터 리터러시, AI 리터러시, 게임화 학습, 학습 분석]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 고등학교 학생들을 위한 비공식 학습 플랫폼인 KI-Adventskalender의 효과를 분석하였다. 이 플랫폼은 12월 한 달 동안 매일 24개의 짧은 마이크로 챌린지를 제공하여 데이터 중심의 역량과 사회 기술적 주제를 다룬다. 2025년에는 참여율이 33.5% 증가하였고, 중간 지점인 12일에 도달한 사용자 중 75% 이상이 최종 챌린지를 완료하였다. 연구 결과, 과제의 난이도와 성공률 간의 관계가 명확히 드러났으며, 향후 측정 방법론에 대한 개선이 필요함을 제안하였다.\n\n# Research Logic\n## Problem\nAI 시스템의 출력은 데이터 품질, 평가 선택 및 모델링 가정에 따라 달라지며, 이러한 개념을 이해하는 것이 중요하다.\n## Theory\n데이터 및 AI 리터러시는 비판적 사고와 개념적 이해를 요구하며, 기존의 교육 방법론은 이러한 요구를 충족하지 못하고 있다.\n## Design\nKI-Adventskalender는 매일 새로운 과제를 제공하는 디지털 플랫폼으로, 사용자가 자율적으로 참여할 수 있도록 설계되었다.\n## Findings\n2025년에는 초기 참여자 수가 47% 증가하였고, 중간 지점 이후 사용자 유지율이 높아졌다.\n## Conclusion\n플랫폼의 구조적 변화가 사용자 경험에 긍정적인 영향을 미쳤으며, 향후 연구에서 보다 정교한 측정 방법이 필요하다.\n\n# Key Findings\n- 2025년 참여자 수가 33.5% 증가하였다.\n- 중간 지점인 12일에 도달한 사용자 중 75% 이상이 최종 챌린지를 완료하였다.\n- 과제의 난이도와 성공률 간의 관계가 명확히 드러났다.\n\n# Contributions\n## Theoretical\n데이터 및 AI 리터러시의 개념적 이해를 심화시켰다.\n## Methodological\n플랫폼 로그 분석을 통한 사용자 참여 및 성과 측정 방법론을 제시하였다.\n## Practical\n비공식 학습 환경에서의 데이터 리터러시 교육을 위한 실용적인 접근 방식을 제공하였다.\n\n# Limitations\n- 데이터 수집 과정에서 개인 정보 보호 문제를 고려하였다.\n- 특정 과제의 난이도와 성공률 간의 관계를 명확히 규명하지 못하였다.\n\n# Transferable Insights\n- 비공식 학습 플랫폼의 구조적 변화가 사용자 참여에 긍정적인 영향을 미칠 수 있다.\n- 데이터 리터러시 교육에서의 게임화 요소가 효과적일 수 있다.\n\n# Idea Seeds\n1. 비공식 학습 플랫폼의 구조적 개선 방안 연구.\n2. 데이터 리터러시 교육을 위한 다양한 게임화 요소 개발.\n3. 사용자 참여를 높이기 위한 새로운 평가 방법론 제안.\n\n# Citation Snippets\n> Sharma, R., Henrich, L., Ivanova, L., Karimzadmotallebiazar, A., Bieniusa, A., Van Waveren, L., & Vollmer, S. (2026). KI-Adventskalender: An Informal Learning Intervention for Data & AI Literacy. arXiv. https://arxiv.org/abs/2603.26906v1\n\ntags: #데이터리터러시, #AI리터러시, #게임화학습, #학습분석, #비공식학습, #교육기술, #학생참여", "link": "https://arxiv.org/abs/2603.26906v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Rahul Sharma", "Lars Henrich", "Larisa Ivanova"], "categories": ["cs.HC"]}, {"id": "2", "source": "ARXIV", "score": 16, "day": "2026-03-30", "title": "SLOW: Strategic Logical-inference Open Workspace for Cognitive Adaptation in AI Tutoring", "content": "---\ntitle: SLOW: Strategic Logical-inference Open Workspace for Cognitive Adaptation in AI Tutoring\nauthors: [Yuang Wei, Ruijia Li, Bo Jiang]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2603.28062v1\nresearch_type: 이론 기반 연구\nmethodology: 혼합 방법론\ndata_type: 질적 및 양적 데이터\nsample: 명시되지 않음\ncontext: AI 튜터링 시스템\ntheoretical_framework: 이중 과정 이론\nkeywords: [human-ai collaboration, ai tutoring, instructional design, scaffolding, ai literacy, education, learning analytics, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 대형 언어 모델(LLM)이 교육 대화에서 보여주는 유창성을 바탕으로, 기존의 직관적이고 단일 통과 생성 방식의 튜터링 시스템의 한계를 지적한다. SLOW라는 새로운 튜터링 프레임워크를 제안하며, 이는 학습자의 상태 추론과 교수 행동 선택을 명확히 분리하여 의도적인 학습자 상태 추론을 지원한다. SLOW는 학습자의 언어에서 인과적 증거를 파싱하고, 모호한 인지 진단을 수행하며, 정서적 경로를 예측하여 교수 전략을 안내한다. 하이브리드 인간-AI 평가를 통해 개인화, 정서적 민감성 및 명확성에서 유의미한 개선을 보여주었다. 이 연구는 LLM 기반 적응 교육의 해석 가능성과 교육적 유효성을 향상시키는 데 기여한다.\n\n# Research Logic\n## Problem\n기존 LLM 기반 튜터링 시스템은 학습자 상태 진단과 교수 행동 선택이 얽혀 있어 명확한 교육적 의사결정을 방해한다.\n\n## Theory\n이중 과정 이론에 기반하여, SLOW는 '느린 사고'를 통해 학습자 상태 추론을 외부화하고 명확한 의사결정 경로를 제공한다.\n\n## Design\nSLOW는 증거 파싱, 인지 검증, 정서 예측, 전략 통합의 네 가지 단계로 구성된 협력적 추론 구조를 갖춘다.\n\n## Findings\nSLOW는 개인화, 정서적 민감성, 명확성에서 유의미한 개선을 보여주며, 각 모듈의 필요성을 입증하는 연구 결과를 도출하였다.\n\n## Conclusion\nSLOW는 LLM 기반 튜터링 시스템의 해석 가능성과 신뢰성을 높이며, 교육적 효과성을 지원하는 구조적 기초를 제공한다.\n\n# Key Findings\n- SLOW 프레임워크는 학습자 상태 추론과 교수 행동 선택을 명확히 분리한다.\n- 하이브리드 인간-AI 평가에서 개인화 및 정서적 민감성이 유의미하게 개선되었다.\n- 각 모듈의 필요성을 입증하는 연구 결과가 도출되었다.\n\n# Contributions\n## Theoretical\nSLOW는 기존 LLM 기반 튜터링 시스템의 구조적 한계를 드러내고, 이론 기반의 명확한 추론 경로를 제시한다.\n\n## Methodological\n혼합 방법론을 통해 질적 및 양적 데이터를 수집하고 분석하여 연구의 신뢰성을 높였다.\n\n## Practical\nSLOW는 교육적 의사결정의 투명성을 높이고, 교수 전략의 적응성을 향상시킨다.\n\n# Limitations\n- 샘플 크기 및 다양성이 명시되지 않아 일반화에 한계가 있다.\n- 실제 교육 환경에서의 적용 가능성에 대한 추가 연구가 필요하다.\n\n# Transferable Insights\n- LLM 기반 튜터링 시스템의 설계 시, 학습자 상태 추론과 교수 행동 선택의 분리를 고려해야 한다.\n- 정서적 경로 예측이 교수 전략의 효과성을 높일 수 있다.\n\n# Idea Seeds\n1. SLOW 프레임워크를 다양한 교육 환경에 적용하여 효과성을 검증하는 연구.\n2. LLM의 정서적 민감성을 높이기 위한 추가적인 알고리즘 개발.\n3. SLOW의 모듈을 다른 AI 기반 교육 시스템에 통합하는 방안 탐색.\n\n# Citation Snippets\n> Wei, Y., Li, R., & Jiang, B. (2026). SLOW: Strategic Logical-inference Open Workspace for Cognitive Adaptation in AI Tutoring. arXiv. https://arxiv.org/abs/2603.28062v1\n\ntags: #human-ai collaboration, #ai tutoring, #instructional design, #scaffolding, #ai literacy, #education, #learning analytics, #ai pedagogy", "link": "https://arxiv.org/abs/2603.28062v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Yuang Wei", "Ruijia Li", "Bo Jiang"], "categories": ["cs.AI"]}, {"id": "3", "source": "ARXIV", "score": 15, "day": "2026-03-30", "title": "Evaluating LLMs for Answering Student Questions in Introductory Programming Courses", "content": "---\ntitle: LLM을 활용한 프로그래밍 수업에서 학생 질문 응답 평가\nauthors: [Thomas Van Mullem, Bart Mesuere, Peter Dawyndt]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2603.28295v1\nresearch_type: 실험적 연구\nmethodology: 데이터 수집 및 평가 프레임워크 개발\ndata_type: 질적 데이터\nsample: 170개의 학생 질문\ncontext: CS1 프로그래밍 수업\ntheoretical_framework: LLM-as-a-Judge\nkeywords: [human-ai collaboration, ai tutoring, instructional design, ai literacy, education, learning analytics, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 대규모 언어 모델(LLM)이 프로그래밍 교육에서 학생 질문에 대한 응답을 제공하는 능력을 평가한다. 170개의 실제 학생 질문을 기반으로 한 평가 프레임워크를 개발하였으며, LLM이 제공하는 응답의 교육적 정확성을 평가하기 위해 LLM-as-a-Judge 메트릭을 도입하였다. 연구 결과, Gemini 3 flash 모델이 일반 교육자의 응답 품질 기준을 초과하는 성과를 보였으며, 교육적 맥락에 맞춘 \"teacher-in-the-loop\" 구현을 제안하였다. 이 연구는 교육적 LLM 도구 개발에서 사전 검증 프로세스의 필요성을 강조한다.\n\n# Research Logic\n## Problem\n학생들이 LLM을 사용하여 프로그래밍 문제를 해결할 때, 완전한 솔루션을 제공받아 학습 과정이 저해되는 문제를 다룬다.\n\n## Theory\nLLM의 교육적 활용 가능성을 탐구하며, LLM-as-a-Judge 메트릭을 통해 응답의 교육적 정확성을 평가한다.\n\n## Design\n170개의 학생 질문을 포함한 데이터셋을 수집하고, 전문가의 응답을 기준으로 하여 LLM의 성능을 평가하는 프레임워크를 설계하였다.\n\n## Findings\nGemini 3 flash 모델이 교육자의 응답 품질 기준을 초과하며, LLM의 응답이 교육적 맥락에 잘 맞는다는 것을 발견하였다.\n\n## Conclusion\nLLM의 안전하고 효과적인 활용을 위해 교육자의 검증을 포함한 시스템 구현이 필요하며, 사전 검증 프로세스의 중요성을 강조한다.\n\n# Key Findings\n- LLM은 교육자의 응답 품질 기준을 초과하는 성과를 보였다.\n- LLM-as-a-Judge 메트릭이 교육적 정확성을 평가하는 데 효과적이었다.\n- \"teacher-in-the-loop\" 접근 방식이 LLM의 위험을 완화하는 데 기여할 수 있다.\n\n# Contributions\n## Theoretical\nLLM의 교육적 활용 가능성과 평가 방법론에 대한 새로운 통찰을 제공한다.\n\n## Methodological\nLLM-as-a-Judge 메트릭을 통한 교육적 응답 평가의 새로운 접근 방식을 제시한다.\n\n## Practical\n교육자가 LLM을 안전하게 활용할 수 있는 방법론을 제안한다.\n\n# Limitations\n- 연구에 사용된 데이터셋이 특정 프로그래밍 수업에 국한되어 있다.\n- LLM의 응답 품질이 모든 교육적 맥락에 적용될 수 있는지는 명시되지 않음.\n\n# Transferable Insights\n- LLM의 교육적 활용을 위한 사전 검증 프로세스의 필요성.\n- LLM과 교육자 간의 협력 모델의 중요성.\n\n# Idea Seeds\n1. 다양한 교육적 맥락에서 LLM의 응답 품질을 평가하는 연구.\n2. LLM의 응답을 개선하기 위한 교육자의 피드백 시스템 개발.\n3. LLM의 교육적 활용을 위한 윤리적 가이드라인 수립.\n\n# Citation Snippets\n> Van Mullem, T., Mesuere, B., & Dawyndt, P. (2026). Evaluating LLMs for Answering Student Questions in Introductory Programming Courses. arXiv. https://arxiv.org/abs/2603.28295v1\n\ntags: #human-ai collaboration, #ai tutoring, #instructional design, #ai literacy, #education, #learning analytics, #ai pedagogy\n\n---\n\n요약: 본 연구는 LLM이 프로그래밍 교육에서 학생 질문에 대한 응답을 제공하는 능력을 평가하며, Gemini 3 flash 모델이 교육자의 응답 품질 기준을 초과하는 성과를 보였음을 발견하였다. LLM-as-a-Judge 메트릭을 통해 교육적 정확성을 평가하고, 교육자의 검증을 포함한 시스템 구현의 필요성을 강조한다.", "link": "https://arxiv.org/abs/2603.28295v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Thomas Van Mullem", "Bart Mesuere", "Peter Dawyndt"], "categories": ["cs.AI"]}, {"id": "4", "source": "ARXIV", "score": 14, "day": "2026-03-30", "title": "Mapping data literacy trajectories in K-12 education", "content": "---\ntitle: K-12 교육에서 데이터 리터러시 경로 매핑\nauthors: [Robert Whyte, Manni Cheung, Katharine Childs, Jane Waite, Sue Sentance]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2603.28317v1\nresearch_type: 문헌 리뷰\nmethodology: 체계적 문헌 검토\ndata_type: 문헌\nsample: 84개의 연구\ncontext: K-12 교육\ntheoretical_framework: 데이터 패러다임 프레임워크\nkeywords: [데이터 리터러시, K-12, 문헌 리뷰, 데이터 기반, 학습 경로]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 K-12 교육에서 데이터 리터러시 기술의 중요성을 강조하며, 데이터 기반 시스템의 이해가 전통적인 규칙 기반 프로그래밍에서의 패러다임 전환을 의미함을 설명한다. 84개의 연구를 체계적으로 검토하여 K-12 학습자들이 다양한 맥락에서 데이터와 상호작용하는 방식을 이해하고자 하였다. 연구자들은 학습 활동을 지식 기반 또는 데이터 기반 시스템과 투명하거나 불투명한 모델로 구분하는 데이터 패러다임 프레임워크를 제안하였다. 이 프레임워크를 통해 학습자들이 따르는 경로를 시각화하고, 데이터 리터러시의 개념이 학습 맥락에 따라 어떻게 달라지는지를 반영할 수 있는 네 가지 경로를 제시하였다.\n\n# Research Logic\n## Problem\nK-12 교육에서 데이터 리터러시 기술의 필요성과 그 교육 방법에 대한 불확실성.\n## Theory\n데이터 패러다임 프레임워크를 통해 학습 활동을 두 가지 차원(논리와 설명 가능성)으로 구분.\n## Design\n체계적 문헌 검토를 통해 84개의 연구를 분석.\n## Findings\n대부분의 연구가 미국에서 수행되었으며, 데이터 리터러시 경험은 주로 단일 패러다임 내에서 이루어짐.\n## Conclusion\n데이터 리터러시 교육은 다양한 패러다임을 통해 이루어져야 하며, 이를 위한 명확한 경로 설정이 필요함.\n\n# Key Findings\n- 데이터 리터러시 기술은 K-12 교육에서 필수적이다.\n- 데이터 패러다임 프레임워크는 학습 활동을 효과적으로 분류하는 데 유용하다.\n- 학습자들은 지식 기반에서 데이터 기반으로의 전환을 경험하며, 이 과정에서 다양한 경로를 따른다.\n\n# Contributions\n## Theoretical\n데이터 리터러시의 개념을 명확히 하고, 교육적 맥락에서의 변화를 설명하는 프레임워크 제공.\n## Methodological\n체계적 문헌 검토 방법론을 통해 K-12 교육에서의 데이터 리터러시 연구를 종합적으로 분석.\n## Practical\n교육자들이 데이터 리터러시 학습 환경을 설계하는 데 유용한 경로를 제시.\n\n# Limitations\n- 연구는 주로 미국의 사례에 국한되어 있어, 다른 국가의 맥락을 반영하지 못함.\n- 데이터 리터러시의 개념이 다양한 맥락에서 어떻게 다르게 적용되는지에 대한 심층적인 분석 부족.\n\n# Transferable Insights\n- 데이터 리터러시 교육은 다양한 학문 분야와의 통합적 접근이 필요하다.\n- 교육자들은 데이터 기반 시스템의 투명성과 불투명성을 고려하여 학습 경로를 설계해야 한다.\n\n# Idea Seeds\n1. K-12 교육에서 데이터 리터러시를 위한 통합 커리큘럼 개발.\n2. 데이터 기반 교육 도구의 투명성을 높이기 위한 연구.\n3. 다양한 학문 분야에서의 데이터 리터러시 적용 사례 연구.\n\n# Citation Snippets\n> Whyte, R., Cheung, M., Childs, K., Waite, J., & Sentance, S. (2026). Mapping data literacy trajectories in K-12 education. arXiv. https://arxiv.org/abs/2603.28317v1\n\ntags: #데이터리터러시, #K12, #문헌리뷰, #데이터기반, #학습경로, #교육기술, #AI교육\n\n---\n\n요약: 본 연구는 K-12 교육에서 데이터 리터러시 기술의 중요성을 강조하며, 데이터 기반 시스템의 이해가 전통적인 규칙 기반 프로그래밍에서의 패러다임 전환을 의미함을 설명한다. 84개의 연구를 체계적으로 검토하여 K-12 학습자들이 다양한 맥락에서 데이터와 상호작용하는 방식을 이해하고자 하였다. 연구자들은 학습 활동을 지식 기반 또는 데이터 기반 시스템과 투명하거나 불투명한 모델로 구분하는 데이터 패러다임 프레임워크를 제안하였다.", "link": "https://arxiv.org/abs/2603.28317v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Robert Whyte", "Manni Cheung", "Katharine Childs"], "categories": ["cs.CY", "cs.AI"]}, {"id": "5", "source": "ARXIV", "score": 13, "day": "2026-03-27", "title": "Unlocking Open-Player-Modeling-enhanced Game-Based Learning: The Open Player Socially Analytical Intelligence Architecture", "content": "Game-Based Learning (GBL) is a learner-engaging pedagogical methodology, yet adapting games to heterogeneous learners requires transparent, real-time Open Player Models (OPMs). We contribute to the community Open Player Socially Analytical Intelligence (OPSAI), an architecture implementing OPM beyond conceptual frameworks and validated in a GBL application. It decouples gameplay telemetry and analysis from the game engine and automatically derives pedagogically actionable insights, supporting the transparency of computational player models while making them accessible to players. OPSAI comprises three logical layers: a Frontend that both provides the GBL experience and collects information needed for analytics; a stateless Backend that hosts transparent analytics services producing reflective prompts, recommendations, and visualization guides; and a two-tier Log Storage that balances heavy raw gameplay data with lightweight reference indices for low-latency queries. By feeding analytics outputs back into the game interface, OPSAI closes the feedback loop between play and learning, empowering teachers, researchers, and learners alike. We further showcase OPSAI with a full deployment on the Parallel GBL environment, featuring live play traces, peer comparisons, and personalized suggestions, demonstrating a reusable blueprint for future educational games.", "link": "https://arxiv.org/abs/2603.26915v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Zhiyu Lin", "Boyd Fox", "Devon Mckee"], "categories": ["cs.HC"]}, {"id": "6", "source": "ARXIV", "score": 12, "day": "2026-03-27", "title": "Multi-Level Barriers to Generative AI Adoption Across Disciplines and Professional Roles in Higher Education", "content": "Generative Artificial Intelligence (GenAI) is rapidly reshaping higher education, yet barriers to its adoption across different disciplines and institutional roles remain underexplored. Existing literature frequently attributes adoption barriers to individual-level factors such as perceived usefulness and ease of use. This study instead investigates whether such barriers are structurally produced. Drawing on a multi-method survey analysis of 272 academic and professional services (PSs) staff at a Russell Group university, we examine how disciplinary contexts and institutional roles shape perceived barriers. By integrating multinomial logistic regression (MLR), structural equation modelling (SEM), and semantic clustering of open-ended responses, we move beyond descriptive accounts to provide a multi-level explanation of GenAI adoption. Our findings reveal clear, systematic differences: non-STEM academics primarily report ethical and cultural barriers related to academic integrity, whereas STEM and PSs staff disproportionately emphasize institutional, governance, and infrastructure constraints. We conclude that GenAI adoption barriers are deeply embedded in organizational ecosystems and epistemic norms, suggesting that universities must move beyond generalized training to develop role-specific governance and support frameworks.", "link": "https://arxiv.org/abs/2603.27052v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Jianhua Yang", "Kerem Öge", "Adrian von Mühlenen"], "categories": ["cs.CY", "cs.AI"]}, {"id": "7", "source": "ARXIV", "score": 12, "day": "2026-03-23", "title": "Silicon Bureaucracy and AI Test-Oriented Education: Contamination Sensitivity and Score Confidence in LLM Benchmarks", "content": "Public benchmarks increasingly govern how large language models (LLMs) are ranked, selected, and deployed. We frame this benchmark-centered regime as Silicon Bureaucracy and AI Test-Oriented Education, and argue that it rests on a fragile assumption: that benchmark scores directly reflect genuine generalization. In practice, however, such scores may conflate exam-oriented competence with principled capability, especially when contamination and semantic leakage are difficult to exclude from modern training pipelines. We therefore propose an audit framework for analyzing contamination sensitivity and score confidence in LLM benchmarks. Using a router-worker setup, we compare a clean-control condition with noisy conditions in which benchmark problems are systematically deleted, rewritten, and perturbed before being passed downstream. For a genuinely clean benchmark, noisy conditions should not consistently outperform the clean-control baseline. Yet across multiple models, we find widespread but heterogeneous above-baseline gains under noisy conditions, indicating that benchmark-related cues may be reassembled and can reactivate contamination-related memory. These results suggest that similar benchmark scores may carry substantially different levels of confidence. Rather than rejecting benchmarks altogether, we argue that benchmark-based evaluation should be supplemented with explicit audits of contamination sensitivity and score confidence.", "link": "https://arxiv.org/abs/2603.21636v2", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Yiliang Song", "Hongjun An", "Jiangan Chen"], "categories": ["cs.AI", "cs.CL"]}, {"id": "8", "source": "ARXIV", "score": 11, "day": "2026-03-30", "title": "Filipino Students' Willingness to Use AI for Mental Health Support: A Path Analysis of Behavioral, Emotional, and Contextual Factors", "content": "This study examined how behavioral, emotional, and contextual factors influence Filipino students' willingness to use artificial intelligence (AI) for mental health support. Results showed that habit had the strongest effect on willingness, followed by comfort, emotional benefit, facilitating conditions, and perceived usefulness. Students who used AI tools regularly felt more confident and open to relying on them for emotional support. Empathy, privacy, and accessibility also increased comfort and trust in AI systems. The findings highlight that emotional safety and routine use are essential in promoting willingness. The study recommends AI literacy programs, empathic design, and ethical policies that support responsible and culturally sensitive use of AI for student mental health care.", "link": "https://arxiv.org/abs/2603.27994v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["John Paul P. Miranda", "Rhiziel P. Manalese", "Ivan G. Liwanag"], "categories": ["cs.HC", "cs.CY"]}, {"id": "9", "source": "ARXIV", "score": 10, "day": "2026-03-30", "title": "Moving Beyond Review: Applying Language Models to Planning and Translation in Reflection", "content": "Reflective writing is known to support the development of students' metacognitive skills, yet learners often struggle to engage in deep reflection, limiting learning gains. Although large language models (LLMs) have been shown to improve writing skills, their use as conversational agents for reflective writing has produced mixed results and has largely focused on providing feedback on reflective texts, rather than support during planning and organizing. In this paper, inspired by the Cognitive Process Theory of writing (CPT), we propose the first application of LLMs to the planning and translation steps of reflective writing. We introduce Pensée, a tool to explore the effects of explicit AI support during these stages by scaffolding structured reflection planning using a conversational agent, and supporting translation by automatically extracting key concepts. We evaluate Pensée in a controlled between-subjects experiment (N=93), manipulating AI support across writing phases. Results show significantly greater reflection depth and structural quality when learners receive support during planning and translation stages of CPT, though these effects reduce in a delayed post-test. Analyses of learner behavior and perceptions further illustrate how CPT-aligned conversational support shapes reflection processes and learner experience, contributing empirical evidence for theory-driven uses of LLMs in AI-supported reflective writing.", "link": "https://arxiv.org/abs/2603.28596v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Seyed Parsa Neshaei", "Richard Lee Davis", "Tanja Käser"], "categories": ["cs.HC", "cs.AI", "cs.CL"]}];

function toggleTheme() {

  html.dataset.theme = next;
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  localStorage.setItem('theme', next);
}

function toggleTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  currentPage = 1;
  applyFilters();
}

  document.querySelectorAll('#sourceFilters .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

function toggleFavorite(id, e) {
  e.stopPropagation();
  const idx = favorites.indexOf(id);
  if (idx === -1) {
    favorites.push(id);
  } else {
    favorites.splice(idx, 1);
  }
  localStorage.setItem('favorites', JSON.stringify(favorites));
  applyFilters();
}

function recordVisit(id) {
  if (!visited.includes(id)) {
    visited.push(id);
  }
  localStorage.setItem('visited', JSON.stringify(visited));
}

function recordSearch(query) {
  if (query.trim() && !searchHistory.includes(query)) {
    searchHistory.unshift(query);
    if (searchHistory.length > 10) searchHistory.pop();
    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
  }
}

function downloadJSON() {
  const data = JSON.stringify(filtered, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadCSV() {
  const headers = ['제목', '출처', '스코어', '리뷰여부', '링크'];
  const rows = filtered.map(p => [
    '"' + p.title.replace(/"/g, '""') + '"',
    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
