<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-03-22 23:27</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

const PAPERS = [{"id": "0", "source": "OPENALEX", "score": 16, "day": "2026-03-20", "title": "The Intersection Between Moodle, Active Methodologies, and Artificial Intelligence in Higher Education: A Narrative Review and Thematic Analysis", "content": "---\ntitle: The Intersection Between Moodle, Active Methodologies, and Artificial Intelligence in Higher Education: A Narrative Review and Thematic Analysis\nauthors: María Alonzo-Godoy, M. Pilar Martínez-Agut, Anna Monzó-Martínez\nyear: 2026\njournal: 명시되지 않음\ndoi: 명시되지 않음\nresearch_type: 내러티브 리뷰 및 주제 분석\nmethodology: 주제 분석\ndata_type: 문헌\nsample: 49개의 기사\ncontext: 고등 교육\ntheoretical_framework: 명시되지 않음\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 고등 교육에서의 교수 직업의 변화를 다루며, 능동적 방법론, 학습 관리 시스템, 인공지능의 융합이 교수 역할에 미치는 영향을 통합적으로 분석한다. 49개의 기사를 대상으로 한 내러티브 리뷰와 주제 분석을 통해, 교사는 단순한 콘텐츠 전달자가 아니라 형성적 경험의 설계자, 비판적 안내자, AI 사용에 대한 윤리적 기준으로서의 역할을 수행해야 함을 강조한다. 기술은 교사의 역할을 대체하는 것이 아니라, 비판적이고 적응적인 학습을 설계하는 건축가로서의 새로운 프로필을 제안한다.\n\n# Research Logic\n## Problem\n고등 교육에서 능동적 방법론, 학습 관리 시스템, 인공지능의 통합적 분석 부족.\n## Theory\n교사의 역할 변화와 기술의 윤리적 사용에 대한 새로운 관점.\n## Design\n49개의 기사를 대상으로 한 내러티브 리뷰 및 주제 분석.\n## Findings\n교사는 콘텐츠 전달자가 아닌 형성적 경험의 설계자이며, AI 사용에 대한 윤리적 기준을 제시해야 한다.\n## Conclusion\n기술은 교사의 역할을 대체하는 것이 아니라, 새로운 교수 프로필을 제안한다.\n\n# Key Findings\n- 교수는 콘텐츠 전달자가 아닌 형성적 경험의 설계자로서의 역할을 수행해야 한다.\n- AI는 교육에서 비판적이고 적응적인 학습을 설계하는 데 기여할 수 있다.\n- 기술의 사용은 윤리적 기준을 필요로 하며, 교사는 이러한 기준을 제시해야 한다.\n\n# Contributions\n## Theoretical\n교사의 역할 변화에 대한 새로운 이론적 관점을 제공.\n## Methodological\n내러티브 리뷰와 주제 분석을 통한 통합적 접근법 제시.\n## Practical\nAI와 교육의 융합에 대한 실질적인 통찰 제공.\n\n# Limitations\n- 연구의 범위가 49개의 기사로 제한됨.\n- 특정 교육 환경에 대한 구체적인 사례 부족.\n\n# Transferable Insights\n- AI와 교육의 융합은 교수법에 대한 새로운 접근을 요구한다.\n- 교사의 역할 변화는 교육 기술의 발전과 밀접하게 연결되어 있다.\n\n# Idea Seeds\n1. AI를 활용한 교수법 개발 연구.\n2. 교사의 윤리적 기준 설정을 위한 프레임워크 제안.\n3. 능동적 학습 환경에서의 AI 활용 사례 연구.\n\n# Citation Snippets\n>\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy\n\n---\n\n짧은 요약: 본 연구는 고등 교육에서 능동적 방법론, 학습 관리 시스템, 인공지능의 융합이 교수 역할에 미치는 영향을 분석한다. 교사는 콘텐츠 전달자가 아닌 형성적 경험의 설계자이며, AI 사용에 대한 윤리적 기준을 제시해야 한다는 점을 강조한다. 기술은 교사의 역할을 대체하는 것이 아니라, 새로운 교수 프로필을 제안한다.", "link": "https://doi.org/10.3390/educsci16030480", "altLink": "https://openalex.org/W7139107413", "hasDoi": true, "hasReview": true, "authors": ["María Alonzo-Godoy", "M. Pilar Martínez-Agut", "Anna Monzó-Martínez"], "categories": ["Intersection (aeronautics)", "Formative assessment", "Narrative", "Thematic analysis", "Thematic map"]}, {"id": "1", "source": "ERIC", "score": 13, "day": "명시되지 않음", "title": "Development and Validation of an Artificial Intelligence Literacy Assessment for Kindergarten Children", "content": "---\ntitle: Development and Validation of an Artificial Intelligence Literacy Assessment for Kindergarten Children\nauthors: Jiahong Su\nyear: 명시되지 않음\njournal: ERIC\ndoi: 명시되지 않음\nresearch_type: 양적 연구\nmethodology: 평가 도구 개발 및 검증\ndata_type: 설문조사 데이터\nsample: 215명의 어린이, 19명의 전문가\ncontext: 유치원 교육\ntheoretical_framework: 명시되지 않음\nkeywords: [인공지능 문해력, 유치원, 평가 도구, 교육 설계, 학습 분석]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 유치원 아동의 인공지능(AI) 문해력 수준을 평가하기 위한 포괄적인 평가 도구(AI4KGA)를 제안하고 검증하였다. 연구에는 215명의 어린이와 19명의 전문가가 참여하였으며, 평가 도구의 타당성과 신뢰성은 전문가 평가와 크론바흐 알파 및 항목 반응 이론을 통해 평가되었다. 연구 결과, AI4KGA는 유효하고 신뢰할 수 있는 도구로 확인되었으며, 어린 나이의 아동이 더 낮은 점수를 기록하고, 여아가 남아보다 약간 높은 점수를 기록하는 경향이 있음을 발견하였다. AI4KGA는 정책 입안자, 교육자, 교육 설계자, 연구자 및 교육 기관 등 다양한 이해관계자에게 적용 가능성이 있다.\n\n# Research Logic\n## Problem\n유치원 아동의 AI 문해력 수준을 평가하고 적절한 교육 과정을 개발할 필요성.\n## Theory\n명시되지 않음.\n## Design\nAI 문해력 평가 도구(AI4KGA)의 개발 및 전문가 검증.\n## Findings\nAI4KGA는 유효하고 신뢰할 수 있으며, 어린 아동이 더 낮은 점수를 기록하고 여아가 남아보다 높은 점수를 기록함.\n## Conclusion\nAI4KGA는 유치원 아동의 AI 문해력 평가에 기여할 수 있으며, AI 문해력 교육의 발전에 기여할 수 있다.\n\n# Key Findings\n- AI4KGA는 유효하고 신뢰할 수 있는 평가 도구로 확인됨.\n- 어린 아동이 더 낮은 AI 문해력 점수를 기록함.\n- 여아가 남아보다 높은 AI 문해력 점수를 기록함.\n\n# Contributions\n## Theoretical\nAI 문해력 평가의 이론적 기초를 제공함.\n## Methodological\n신뢰성 있는 평가 도구 개발을 위한 방법론적 기여.\n## Practical\n정책 입안자 및 교육자에게 유용한 도구 제공.\n\n# Limitations\n- 연구의 출판 연도가 명시되지 않음.\n- 샘플의 다양성이 제한적일 수 있음.\n\n# Transferable Insights\n- AI 문해력 평가 도구는 다른 교육 단계에도 적용 가능함.\n- 교육 설계에 있어 AI 문해력의 중요성을 강조함.\n\n# Idea Seeds\n1. AI 문해력 교육 프로그램 개발을 위한 추가 연구 필요.\n2. 다양한 연령대의 아동을 대상으로 한 평가 도구 확장.\n3. AI 문해력 교육의 효과를 측정하기 위한 장기 연구.\n\n# Citation Snippets\n> Su, J. (명시되지 않음). Development and Validation of an Artificial Intelligence Literacy Assessment for Kindergarten Children.\n\ntags: #인공지능문해력, #유치원, #교육설계, #학습분석, #AI교육, #평가도구, #교육연구\n\n---\n\n요약: 본 연구는 유치원 아동의 AI 문해력 평가를 위한 AI4KGA 도구를 개발하고 검증하였다. 215명의 아동과 19명의 전문가가 참여하였으며, 평가 도구는 유효하고 신뢰할 수 있는 것으로 확인되었다. 연구 결과, 어린 아동이 더 낮은 점수를 기록하고 여아가 남아보다 높은 점수를 기록하는 경향이 발견되었다. AI4KGA는 다양한 교육 이해관계자에게 유용할 수 있다.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Jiahong Su"], "categories": ["ERIC"]}, {"id": "2", "source": "ARXIV", "score": 13, "day": "2026-03-16", "title": "Can LLMs Model Incorrect Student Reasoning? A Case Study on Distractor Generation", "content": "---\ntitle: \"Can LLMs Model Incorrect Student Reasoning? A Case Study on Distractor Generation\"\nauthors: \n  - \"Yanick Zengaffinen\"\n  - \"Andreas Opedal\"\n  - \"Donya Rooein\"\n  - \"Kv Aditya Srivatsa\"\n  - \"Shashank Sonkar\"\n  - \"Mrinmaya Sachan\"\nyear: 2026\njournal: \"arXiv\"\ndoi: \"https://arxiv.org/abs/2603.15547v1\"\nresearch_type: \"실증 연구\"\nmethodology: \"정량적 분석 및 질적 분석\"\ndata_type: \"대량 언어 모델의 추론 추적\"\nsample: \"240개의 선택형 질문에 대한 오답 생성 추적\"\ncontext: \"교육에서의 AI 활용 및 학생 모델링\"\ntheoretical_framework: \"학습 과학 이론 및 오류 시뮬레이션 이론\"\nkeywords: [\"human-ai collaboration\", \"classroom ai\", \"ai tutoring\", \"instructional design\", \"scaffolding\", \"tpack\", \"ai literacy\", \"teacher ai\", \"education\", \"learning analytics\", \"llm classroom\", \"ai pedagogy\"]\n---\n\n# APA 7th style\n\n# Summary\n이 연구는 대량 언어 모델(LLM)이 학생의 오해를 모델링할 수 있는지를 조사한다. 연구진은 LLM이 다중 선택 질문의 오답 생성 과정에서 오해를 어떻게 추론하는지를 분석하고, 이를 통해 LLM의 추론 절차와 학습 과학의 모범 사례 간의 정렬을 비교한다. 분석 결과, LLM은 문제를 올바르게 해결한 후 여러 잠재적 오해를 시뮬레이션하고, 최종적으로 오답을 선택하는 과정을 거친다. 연구는 LLM이 올바른 해답을 제공할 때 오답의 품질이 8% 향상된다는 점을 강조하며, 이는 오답 생성 과정에서 올바른 해답에 대한 고정이 중요함을 시사한다.\n\n# Research Logic\n## Problem\n학생의 오해를 모델링하는 것이 교육 AI에서 중요한 문제임.\n## Theory\nLLM의 추론 과정이 학습 과학의 모범 사례와 어떻게 정렬되는지를 분석.\n## Design\n240개의 오답 생성 추적을 분석하여 LLM의 전략을 분류하는 세분화된 체계 개발.\n## Findings\nLLM은 문제를 올바르게 해결한 후 오해를 시뮬레이션하고, 오답을 선택하는 과정에서 오류가 발생하는 경향이 있음.\n## Conclusion\nLLM은 올바른 해답에 고정될 때 오답 생성에서 효과적으로 학생의 오해를 모델링할 수 있음.\n\n# Key Findings\n- LLM은 문제를 올바르게 해결한 후 여러 오해를 시뮬레이션함.\n- 오답 생성에서의 오류는 주로 올바른 해답 복구 실패에서 발생함.\n- 올바른 해답을 제공할 때 오답의 품질이 8% 향상됨.\n\n# Contributions\n## Theoretical\n학생 모델링 및 오답 생성에 대한 새로운 통찰 제공.\n## Methodological\nLLM의 추론 과정을 분석하기 위한 체계적 접근법 제안.\n## Practical\n교육 AI 도구의 신뢰성을 높이기 위한 실용적인 지침 제공.\n\n# Limitations\n- LLM의 성능 향상에 대한 추가적인 연구 필요.\n- 특정 문제 유형에 대한 일반화의 한계 존재.\n\n# Transferable Insights\n- LLM의 오답 생성 과정에서 올바른 해답의 중요성 강조.\n- 교육 AI 도구의 신뢰성을 높이기 위한 명확한 지침 필요.\n\n# Idea Seeds\n1. LLM의 오답 생성 전략을 개선하기 위한 추가적인 연구.\n2. 교육 현장에서 LLM을 활용한 학생 모델링의 실제 적용 사례 연구.\n3. LLM의 추론 과정을 기반으로 한 교육 콘텐츠 개발.\n\n# Citation Snippets\n> Zengaffinen, Y., Opedal, A., Rooein, D., Srivatsa, K. A., Sonkar, S., & Sachan, M. (2026). Can LLMs Model Incorrect Student Reasoning? A Case Study on Distractor Generation. arXiv. https://arxiv.org/abs/2603.15547v1\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy", "link": "https://arxiv.org/abs/2603.15547v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Yanick Zengaffinen", "Andreas Opedal", "Donya Rooein"], "categories": ["cs.CL", "cs.AI", "cs.HC"]}, {"id": "3", "source": "ARXIV", "score": 13, "day": "2026-03-05", "title": "Building Effective AI Coding Agents for the Terminal: Scaffolding, Harness, Context Engineering, and Lessons Learned", "content": "---\ntitle: Building Effective AI Coding Agents for the Terminal: Scaffolding, Harness, Context Engineering, and Lessons Learned\nauthors: Nghi D. Q. Bui\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2603.05344v3\nresearch_type: 기술 보고서\nmethodology: 시스템 아키텍처 설계\ndata_type: 명시되지 않음\nsample: 명시되지 않음\ncontext: AI 코딩 지원의 발전\ntheoretical_framework: 복합 AI 시스템 아키텍처\nkeywords: [AI 코딩 에이전트, OPENDEV, 명령줄 인터페이스, 안전성, 컨텍스트 관리, 자율 소프트웨어 공학]\n---\n\n# APA 7th style\n\n# Summary\n본 논문에서는 OPENDEV라는 오픈 소스 명령줄 코딩 에이전트를 제안한다. 이 에이전트는 복합 AI 시스템 아키텍처를 기반으로 하여 효율적인 컨텍스트 관리와 안전성을 보장하며, 개발자가 소스 제어, 빌드 실행 및 환경 배포를 관리하는 터미널에서 직접 작동한다. OPENDEV는 작업 부하에 특화된 모델 라우팅, 계획과 실행을 분리하는 이중 에이전트 아키텍처, 지연 도구 발견 및 적응형 컨텍스트 압축을 통해 기존의 문제를 해결한다. 또한, 프로젝트별 지식을 세션 간에 축적하는 자동화된 메모리 시스템을 채택하고, 명시적 추론 단계를 통해 안전하고 확장 가능한 터미널 중심 AI 지원의 기초를 제공한다.\n\n# Research Logic\n## Problem\nAI 코딩 지원의 복잡한 IDE 플러그인에서 터미널 네이티브 에이전트로의 전환이 필요하다.\n## Theory\n복합 AI 시스템 아키텍처를 통해 다양한 모델과 도구를 조합하여 효율성을 극대화할 수 있다.\n## Design\nOPENDEV는 네 가지 주요 레이어로 구성된 아키텍처를 통해 에이전트의 추론, 도구 실행 및 컨텍스트 관리를 수행한다.\n## Findings\nOPENDEV는 안전성 및 컨텍스트 관리의 문제를 해결하며, 자율 소프트웨어 공학을 위한 견고한 기초를 제공한다.\n## Conclusion\nOPENDEV는 터미널 중심 AI 지원의 새로운 패러다임을 제시하며, 향후 연구 및 개발에 중요한 기초 자료가 될 것이다.\n\n# Key Findings\n- OPENDEV는 복합 AI 시스템 아키텍처를 통해 작업 부하에 특화된 모델 라우팅을 구현한다.\n- 이중 에이전트 아키텍처를 통해 계획과 실행을 분리하여 효율성을 높인다.\n- 자동화된 메모리 시스템을 통해 프로젝트별 지식을 축적하고, 명시적 추론 단계를 통해 안전성을 강화한다.\n\n# Contributions\n## Theoretical\n복합 AI 시스템 아키텍처의 적용을 통해 AI 코딩 지원의 이론적 기초를 확립한다.\n## Methodological\n명령줄 인터페이스 기반의 자율 코딩 에이전트 설계 방법론을 제시한다.\n## Practical\n터미널 중심의 AI 지원 시스템을 통해 개발자 생산성을 향상시킬 수 있는 실용적인 솔루션을 제공한다.\n\n# Limitations\n- 기존 시스템과의 비교 분석이 부족하다.\n- 실제 사용 사례에 대한 데이터가 명시되지 않았다.\n\n# Transferable Insights\n- 복합 AI 시스템 아키텍처는 다양한 도구와 모델의 조합을 통해 효율성을 극대화할 수 있다.\n- 안전성과 컨텍스트 관리의 중요성을 강조하며, 이를 위한 설계 원칙이 필요하다.\n\n# Idea Seeds\n1. OPENDEV의 아키텍처를 기반으로 한 교육용 AI 도구 개발.\n2. 다양한 프로그래밍 언어에 대한 지원을 포함한 확장 가능성 연구.\n3. AI 코딩 에이전트의 사용자 경험 개선을 위한 인터페이스 디자인 연구.\n\n# Citation Snippets\n> Bui, N. D. Q. (2026). Building Effective AI Coding Agents for the Terminal: Scaffolding, Harness, Context Engineering, and Lessons Learned. arXiv. https://arxiv.org/abs/2603.05344v3\n\ntags: #AI코딩에이전트, #OPENDEV, #명령줄인터페이스, #안전성, #컨텍스트관리, #자율소프트웨어공학, #복합AI시스템\n\n---\n\n압축 요약: 본 논문은 OPENDEV라는 오픈 소스 명령줄 코딩 에이전트를 제안하며, 복합 AI 시스템 아키텍처를 통해 효율적인 컨텍스트 관리와 안전성을 보장한다. 이 에이전트는 개발자가 소스 제어 및 환경 배포를 관리하는 터미널에서 직접 작동하며, 자율 소프트웨어 공학을 위한 견고한 기초를 제공한다.", "link": "https://arxiv.org/abs/2603.05344v3", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Nghi D. Q. Bui"], "categories": ["cs.AI"]}, {"id": "4", "source": "ARXIV", "score": 13, "day": "2026-03-05", "title": "HACHIMI: Scalable and Controllable Student Persona Generation via Orchestrated Agents", "content": "---\ntitle: HACHIMI: Scalable and Controllable Student Persona Generation via Orchestrated Agents\nauthors: Yilin Jiang, Fei Tan, Xuanyu Yin, Jing Leng, Aimin Zhou\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2603.04855v2\nresearch_type: 이론적 연구\nmethodology: 다중 에이전트 프레임워크\ndata_type: 합성 데이터\nsample: 1,000,000명의 학생 페르소나\ncontext: 교육 LLM을 위한 페르소나 생성\ntheoretical_framework: 교육 이론에 기반한 페르소나 생성\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 교육 LLM을 위한 학생 페르소나(Student Personas, SPs)의 생성 방법론을 제안한다. 기존의 방법들이 비효율적이고 이론적 기반이 부족한 점을 보완하기 위해, HACHIMI라는 다중 에이전트 프레임워크를 통해 이론 정렬 및 분포 제어가 가능한 페르소나 생성을 정형화하였다. HACHIMI는 1~12학년을 위한 1,000,000개의 페르소나로 구성된 HACHIMI-1M 코퍼스를 생성하며, 내재적 평가에서 높은 유효성과 다양성을 보여준다. 외부 평가에서는 생성된 페르소나가 CEPS 및 PISA 2022 설문에 응답하는 학생 에이전트로서의 역할을 수행하며, 수학 및 호기심/성장 구성 요소에서 인간과의 강한 정렬을 나타낸다.\n\n# Research Logic\n## Problem\n기존의 학생 페르소나 생성 방식은 비효율적이며 교육 이론과 인구 분포에 대한 통제가 부족하다.\n## Theory\n이론 정렬 및 분포 제어가 가능한 페르소나 생성(TAD-PG)을 통해 교육적 목표와 일치하는 페르소나를 생성한다.\n## Design\nHACHIMI는 다중 에이전트 협업을 통해 페르소나를 생성하며, 각 페르소나는 이론 기반의 교육 스키마로 분해된다.\n## Findings\nHACHIMI는 높은 유효성과 정확한 분포를 보여주며, 생성된 페르소나는 학생 에이전트로서 실제 학생들과 유사한 행동을 보인다.\n## Conclusion\nHACHIMI는 교육 AI 시스템의 성능 평가를 위한 표준화된 합성 학생 집단을 제공한다.\n\n# Key Findings\n- HACHIMI는 1,000,000개의 이론 기반 페르소나를 생성하였다.\n- 생성된 페르소나는 CEPS 및 PISA 2022 설문에서 높은 정렬성을 보였다.\n- 페르소나의 다양성과 유효성이 입증되었다.\n\n# Contributions\n## Theoretical\n이론 정렬 및 분포 제어가 가능한 페르소나 생성이라는 새로운 연구 과제를 제안하였다.\n## Methodological\n다중 에이전트 \"Propose-Validate-Revise\" 프레임워크를 통해 교육 이론 검증과 다양성 관리를 통합하였다.\n## Practical\nHACHIMI-1M 코퍼스를 통해 교육 AI 연구에 필요한 고품질 페르소나 데이터를 제공하였다.\n\n# Limitations\n- 페르소나 생성 과정에서의 이론적 제약이 충분히 반영되지 않을 수 있다.\n- 생성된 페르소나의 실제 적용 가능성에 대한 추가 연구가 필요하다.\n\n# Transferable Insights\n- 교육 AI 시스템의 성능 평가를 위한 합성 데이터의 중요성을 강조한다.\n- 이론 기반 페르소나 생성의 필요성을 제시한다.\n\n# Idea Seeds\n1. HACHIMI를 활용한 다양한 교육 환경에서의 페르소나 적용 연구.\n2. 페르소나의 심리적 특성과 학습 성과 간의 관계 분석.\n3. HACHIMI를 기반으로 한 맞춤형 교육 콘텐츠 개발.\n\n# Citation Snippets\n> Jiang, Y., Tan, F., Yin, X., Leng, J., & Zhou, A. (2026). HACHIMI: Scalable and Controllable Student Persona Generation via Orchestrated Agents. arXiv. https://arxiv.org/abs/2603.04855v2\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy\n\n---\n\n요약: 본 연구는 HACHIMI라는 다중 에이전트 프레임워크를 통해 교육 LLM을 위한 이론 정렬 및 분포 제어가 가능한 학생 페르소나를 생성하는 방법론을 제안한다. 1,000,000개의 페르소나를 생성하여 높은 유효성과 다양성을 입증하였으며, 교육 AI 시스템의 성능 평가를 위한 표준화된 데이터를 제공한다.", "link": "https://arxiv.org/abs/2603.04855v2", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Yilin Jiang", "Fei Tan", "Xuanyu Yin"], "categories": ["cs.CL"]}, {"id": "5", "source": "OPENALEX", "score": 13, "day": "2026-03-02", "title": "The Transformation, Challenges, and Reinvention of China's Design Education Model in the AIGC Era", "content": "With the paradigm shift driven by Artificial Intelligence Generated Content (AIGC) technology, the design industry is undergoing unprecedented transformation and reconstruction. China's traditional design education model faces severe challenges, as long-standing emphases on hand-drawing skills and mastery of classical software increasingly fail to meet the evolving demands of the AIGC era. This paper proposes that design education must undergo a comprehensive Four-Dimensional Reconstruction encompassing four key dimensions: educational objectives, curriculum system, assessment mechanisms, and pedagogical environments. Drawing on a systematic literature review, the study develops a conceptual model aimed at cultivating design talents equipped with AI literacy, critical thinking, and interdisciplinary integration capabilities. The findings indicate that design education in the AIGC era requires not merely technological updates, nor isolated reforms in educational philosophy, teaching methods, or evaluation systems, but rather a holistic, all-dimensional reconstruction to align with the profound changes in the field.", "link": "https://doi.org/10.62762/jsspa.2025.202588", "altLink": "https://openalex.org/W7133189904", "hasDoi": true, "hasReview": false, "authors": ["Yifan Yang", "Ruoyu Fu", "Liqun Xiang"], "categories": ["Curriculum", "Engineering ethics", "Design education", "Key (lock)", "Engineering"]}, {"id": "6", "source": "OPENALEX", "score": 13, "day": "2026-03-02", "title": "Teachers’ Attitude, Competence, and Challenges in Using Artificial Intelligence in Teaching Secondary Science", "content": "This study aimed to assess teachers’ attitudes, perceived competence, and challenges in using AI in teaching secondary science, examining differences based on age, sex, highest educational attainment, years of teaching experience, number of relevant trainings, and specialization. The study was conducted in the different high schools in the District II of Ifugao, Philippines. A quantitative descriptive research design was employed. Data were collected using an adapted questionnaire and analyzed using frequencies and percentages, and mean. Key findings indicated that teachers held a very positive attitude toward AI in science education, recognizing its ability to enhance learning, personalize instruction, and support critical thinking. Teachers perceived competence was examined using three domains: general competence, access to resources, and professional development. Respondents rated themselves very high (very competent) in general competence, demonstrating confidence in understanding AI concepts, integrating AI with traditional teaching methods, and evaluating AI’s effectiveness. Access to AI tools and support was also rated very high, with teachers reporting sufficient availability of software, technical support, and instructional materials. Professional development was rated high; teachers actively sought AI-related learning and perceived training opportunities as available, but the actual receipt, quality, and relevance of training were limited. The most severe challenges identified included concerns about data privacy, reliability of AI-based assessments, ethical issues, institutional policy ambiguity, and keeping up with rapid technological developments. The study recommends an action plan to enhance teachers’ knowledge and understanding of AI and its applications in science education, strengthen skills for integrating AI into lesson planning, instruction, and assessment aligned with MELCs, and promote ethical, responsible, and secure use of AI in compliance with DepEd data privacy and child protection policies.", "link": "https://doi.org/10.12691/education-14-3-3", "altLink": "https://openalex.org/W7133349507", "hasDoi": true, "hasReview": false, "authors": ["Marjorie L. Chinaman", "Madeilyn B. Estacio", "Romiro G. Bautista"], "categories": ["Competence (human resources)", "Psychology", "Relevance (law)", "Action plan", "Plan (archaeology)"]}, {"id": "7", "source": "OPENALEX", "score": 13, "day": "2026-02-27", "title": "Redefining personalized learning in the artificial intelligence era: an updated systematic review from 2019 to 2025", "content": "Abstract The integration of artificial intelligence (AI) in education is prompting a reevaluation of personalized learning terminology and its impact on teaching practices and learner engagement. Personalized learning (PL) involves various instructional strategies tailored to individual student needs and interests, utilizing data and technology to boost engagement and success. The evolving landscape requires a clear understanding of how AI can support personalized learning, distinguishing it from traditional methods. The variability in PL terminology reflects diverse interpretations of AI technologies in education, necessitating a common framework to clarify definitions and practices. This document presents an overview of the latest research literature on personalized learning, highlighting how technology is transforming the framework and effectiveness of individualized learning experiences. By analyzing reputable articles from 6 databases, the review seeks to provide insights into how AI can redefine personalized learning, enabling more precise definitions. The findings emphasize the use of PL terms in technological contexts and call for a unified term to enhance clarity and effectiveness in educational technology practices. Ultimately, the review aims to inform educators and policymakers about precise terms defining personalized learning in the AI context.", "link": "https://doi.org/10.1186/s40561-026-00440-6", "altLink": "https://openalex.org/W7131780708", "hasDoi": true, "hasReview": false, "authors": ["Fatima Khalifeh", "Raúl Santiago", "Ramon Palau"], "categories": ["Terminology", "CLARITY", "Computer science", "Personalized learning", "Artificial intelligence"]}, {"id": "8", "source": "OPENALEX", "score": 13, "day": "2026-02-18", "title": "EFL Learning Improvement Through the SAMR Learning Model: A Technology Integration Framework in the Digital Era", "content": "The rapid development of digital technology has transformed the landscape of English as a Foreign Language (EFL) education, making technology integration not only beneficial but essential. This study examines the application of the SAMR (Substitution, Augmentation, Modification, Redefinition) model as a framework for enhancing learning outcomes in digital EFL environments. Through a literature review approach, the research synthesizes findings from recent studies to identify effective strategies, pedagogical benefits, and challenges associated with implementing technology using the SAMR model. The analysis indicates that technology integration at the higher levels of SAMR—Modification and Redefinition—enables deeper learning experiences by promoting collaboration, creativity, and communicative competence. Meanwhile, even basic levels of integration, such as Substitution and Augmentation, contribute to improved efficiency and accessibility of EFL learning materials. However, the study also highlights challenges, including limited digital literacy among teachers, inadequate infrastructure, and varying student readiness. Overall, the findings demonstrate that the SAMR model plays a significant role in enhancing student engagement, interactivity, and autonomy, ultimately supporting more meaningful and dynamic EFL learning in the digital era.", "link": "https://doi.org/10.58344/jii.v5i2.7416", "altLink": "https://openalex.org/W7130337365", "hasDoi": true, "hasReview": false, "authors": ["Siti Wahdatul Alawiah", "Yayu Heryatun", "Fadilla Oktaviana"], "categories": ["Digital era", "Technology integration", "Digital literacy", "Educational technology", "Technological literacy"]}, {"id": "9", "source": "OPENALEX", "score": 13, "day": "2025-12-31", "title": "Technology-Driven Interaction and English Language Learning Outcomes: The Mediating Effects of Engagement and Motivation", "content": "In the digital era, English language education is undergoing a profound transformation from traditional classrooms to smart learning environments driven by technology-based interaction. Understanding how technology-driven interaction (TDI) influences students’ learning success has become crucial in optimizing the effectiveness of modern English education. This study aimed to examine the direct and indirect effects of TDI on self-reported English learning outcomes (OUT) through the mediating roles of student engagement (ENG) and motivation (MOT). Using a quantitative design, data were collected from 300 English language learners in Pakistan and Indonesia through a structured online questionnaire and analyzed using structural equation modeling. The results revealed that TDI had a significant positive impact on both ENG and MOT, which in turn strongly influenced OUT. Moreover, both ENG and MOT significantly mediated the relationship between TDI and OUT, indicating that technology enhances learning outcomes primarily by increasing students’ engagement and motivation. These findings support theoretical frameworks such as Self-Determination Theory and the Community of Inquiry model, emphasizing the psychological mechanisms linking technology use to learning success. This study contributes to the growing body of research on technology-enhanced language learning by proposing a dual mediation model that explains how digital interaction translates into measurable academic achievement. Practically, the findings highlight the need to design technology-based English learning systems that foster engagement, sustain motivation, and enhance meaningful learning outcomes in smart educational environments.", "link": "https://doi.org/10.58418/ijeqqr.v4i2.161", "altLink": "https://openalex.org/W7121230872", "hasDoi": true, "hasReview": false, "authors": ["T. Karki Hussain", "Eka Wilany", "Aulia Putri"], "categories": ["Mediation", "Psychology", "Structural equation modeling", "Language acquisition", "English language"]}];

}

function recordSearch(query) {
  if (query.trim() && !searchHistory.includes(query)) {
    searchHistory.unshift(query);
    if (searchHistory.length > 10) searchHistory.pop();
    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
  }
}

function downloadJSON() {
  const data = JSON.stringify(filtered, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadCSV() {
  const headers = ['제목', '출처', '스코어', '리뷰여부', '링크'];
  const rows = filtered.map(p => [
    '"' + p.title.replace(/"/g, '""') + '"',
    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
