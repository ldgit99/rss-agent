<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-04-12 23:34</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "OPENALEX", "score": 21, "day": "2026-04-10", "title": "Pedagogical Use of Responsible Generative AI in Higher Education; Opportunities and Challenges: A Systematic Literature Review", "content": "---\ntitle: Pedagogical Use of Responsible Generative AI in Higher Education; Opportunities and Challenges: A Systematic Literature Review\nauthors: [Md Zainal Abedin, Ahmad Hayajneh, B. Raahemi]\nyear: 2026\njournal: 명시되지 않음\ndoi: https://openalex.org/W7153094648\nresearch_type: 체계적 문헌 검토\nmethodology: PRISMA 2020 및 Kitchenham 방법론\ndata_type: 문헌\nsample: 30개의 동료 검토 논문\ncontext: 고등 교육\ntheoretical_framework: 명시되지 않음\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 체계적 문헌 검토는 2019년부터 2025년까지 발표된 30개의 동료 검토 논문을 분석하여, 생성적 인공지능(GenAI)이 고등 교육의 교육학, 학생 참여 및 학사 관리에 미치는 영향을 조사하였다. 분석 결과, 맞춤형 교육, 비판적 사고 촉진, 다양한 학습자를 위한 접근성 향상, 다중 모달 콘텐츠 개발 및 피드백을 통한 교육 혁신, AI를 공동 교사로 간주하는 협력적 방법 등 다섯 가지 기회가 도출되었다. 또한, 학문적 무결성 위험, GenAI에 대한 과도한 의존, 교수진의 준비 부족, 지역 및 글로벌 차원의 인프라 및 정책 차이 등 네 가지 지속적인 도전 과제가 나타났다. 윤리적 문제와 관련된 데이터 프라이버시, 알고리즘 편향, 투명성 및 책임성의 교차점은 기관의 위험과 사회적 가치를 반영하는 거버넌스의 필요성을 강조한다.\n\n# Research Logic\n## Problem\n고등 교육에서 GenAI의 책임 있는 사용에 대한 기회와 도전 과제를 규명할 필요성.\n## Theory\nGenAI의 교육적 잠재력과 윤리적 고려 사항의 통합.\n## Design\n체계적 문헌 검토를 통한 데이터 분석.\n## Findings\n다섯 가지 기회와 네 가지 도전 과제를 도출.\n## Conclusion\nGenAI의 교육적 통합을 위한 전략적 접근 필요.\n\n# Key Findings\n- 맞춤형 및 적응형 교육의 기회.\n- 비판적 사고의 의도적 촉진.\n- 다양한 학습자를 위한 접근성 향상.\n\n# Contributions\n## Theoretical\nGenAI의 교육적 통합을 위한 이론적 모델 제시.\n## Methodological\n체계적 문헌 검토 방법론의 적용.\n## Practical\n고등 교육 기관에서 GenAI 구현을 위한 권장 모델 제공.\n\n# Limitations\n- 연구 샘플의 제한성.\n- 특정 기간 내 발표된 논문에 국한됨.\n\n# Transferable Insights\n- GenAI의 교육적 활용을 위한 윤리적 고려 사항의 중요성.\n- 교수진의 준비 상태가 교육적 변화에 미치는 영향.\n\n# Idea Seeds\n1. GenAI를 활용한 맞춤형 학습 프로그램 개발.\n2. 교수진을 위한 GenAI 교육 프로그램 설계.\n3. GenAI의 윤리적 사용을 위한 정책 개발.\n\n# Citation Snippets\n> Abedin, M. Z., Hayajneh, A., & Raahemi, B. (2026). Pedagogical Use of Responsible Generative AI in Higher Education; Opportunities and Challenges: A Systematic Literature Review.\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #ai literacy, #education\n\n---\n\n짧은 요약: 본 연구는 생성적 인공지능(GenAI)이 고등 교육에 미치는 영향을 체계적으로 검토하였다. 30개의 논문을 분석하여 맞춤형 교육, 비판적 사고 촉진 등 다섯 가지 기회를 도출하였고, 학문적 무결성 위험 등 네 가지 도전 과제를 제시하였다. GenAI의 책임 있는 사용을 위한 전략적 접근이 필요함을 강조하였다.", "link": "https://doi.org/10.3390/aieduc2020011", "altLink": "https://openalex.org/W7153094648", "hasDoi": true, "hasReview": true, "authors": ["Md Zainal Abedin", "Ahmad Hayajneh", "B. Raahemi"], "categories": ["Systematic review", "Engineering ethics", "Preparedness", "Higher education", "Corporate governance"]}, {"id": "1", "source": "ARXIV", "score": 11, "day": "2026-04-04", "title": "Amplifying Rural Educators' Perspectives: A Qualitative Study of Generative AI's Impact in Rural U.S. High Schools", "content": "---\ntitle: \"Amplifying Rural Educators' Perspectives: A Qualitative Study of Generative AI's Impact in Rural U.S. High Schools\"\nauthors: \n  - Shira Michel\n  - Benjamin Taylor\n  - Sabrina Parra Díaz\n  - Joseph B. Wiggins\n  - Ed Finn\n  - Mahsan Nourani\nyear: 2026\njournal: CHI '26\ndoi: https://doi.org/10.1145/3772318.3790489\nresearch_type: 질적 연구\nmethodology: 온라인 설문조사 및 심층 인터뷰\ndata_type: 질적 데이터\nsample: 31명의 농촌 고등학교 교육자\ncontext: 미국 농촌 고등학교\ntheoretical_framework: 비판적 농촌 이론\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 농촌 고등학교 교육자들이 생성적 인공지능(GenAI)을 어떻게 활용하고 있는지를 조사하였다. 연구 결과, 농촌 교육자들은 GenAI를 통해 교육 업무를 간소화할 수 있지만, 자원 불균형으로 인해 의미 있는 통합이 제한된다는 점이 드러났다. 교육자들은 인프라 장벽, 채택에 대한 저항, AI 리터러시 교육 부족 등의 문제를 언급하며, 이러한 장애물들이 교육적 기회를 확대하는 데 큰 장애가 된다고 밝혔다. 그럼에도 불구하고, 교육자들은 GenAI가 자신과 학생들을 지원할 수 있는 잠재력을 가지고 있다고 인식하고 있으며, 농촌 특화 디자인 접근 방식의 필요성을 강조하였다.\n\n# Research Logic\n## Problem\n농촌 교육자들이 GenAI를 통합하는 데 직면한 도전과 기회.\n## Theory\n비판적 농촌 이론을 통해 농촌 교육 환경의 구조적 불평등을 분석.\n## Design\n온라인 설문조사 및 심층 인터뷰를 통한 질적 연구 설계.\n## Findings\n농촌 교육자들은 GenAI의 잠재력을 인식하지만, 자원 부족과 인프라 문제로 인해 통합이 제한됨.\n## Conclusion\n농촌 교육자들의 목소리를 중심으로 GenAI의 교육적 기회를 탐색하고, 농촌 특화 디자인 접근 방식의 필요성을 강조.\n\n# Key Findings\n- 농촌 교육자들은 GenAI를 통해 교육 업무를 간소화할 수 있다고 인식함.\n- 인프라 장벽과 AI 리터러시 교육 부족이 GenAI 통합의 주요 장애물로 작용함.\n- 농촌 교육자들은 GenAI가 학생들에게 맞춤형 교육을 제공할 수 있는 잠재력을 가지고 있다고 믿음.\n\n# Contributions\n## Theoretical\n농촌 교육 환경에서의 기술 통합에 대한 새로운 통찰 제공.\n## Methodological\n농촌 교육자들의 경험을 반영한 질적 연구 방법론 개발.\n## Practical\n농촌 교육자들을 위한 GenAI 통합을 위한 정책 및 디자인 접근 방식 제안.\n\n# Limitations\n- 연구 샘플이 제한적이며, 특정 지역에 국한됨.\n- 농촌 교육자들의 경험이 다른 지역 교육자들과 다를 수 있음.\n\n# Transferable Insights\n- 농촌 교육자들의 목소리를 반영한 기술 통합의 중요성.\n- GenAI의 효과적인 통합을 위한 농촌 특화 디자인 접근 방식 필요.\n\n# Idea Seeds\n1. 농촌 교육자들을 위한 AI 리터러시 교육 프로그램 개발.\n2. GenAI를 활용한 맞춤형 교육 자료 제작.\n3. 농촌 학교의 인프라 개선을 위한 정책 제안.\n\n# Citation Snippets\n> Michel, S., Taylor, B., Parra Díaz, S., Wiggins, J. B., Finn, E., & Nourani, M. (2026). Amplifying Rural Educators’ Perspectives: A Qualitative Study on the Impacts of Generative AI in Rural U.S. High Schools. In Proceedings of the 2026 CHI Conference on Human Factors in Computing Systems (CHI ’26), April 13–17, 2026, Barcelona, Spain. https://doi.org/10.1145/3772318.3790489\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy", "link": "https://arxiv.org/abs/2604.03542v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Shira Michel", "Benjamin Taylor", "Sabrina Parra Díaz"], "categories": ["cs.HC", "cs.CY"]}, {"id": "2", "source": "ARXIV", "score": 10, "day": "2026-04-09", "title": "Human-AI Collaboration Reconfigures Group Regulation from Socially Shared to Hybrid Co-Regulation", "content": "---\ntitle: Human-AI Collaboration Reconfigures Group Regulation from Socially Shared to Hybrid Co-Regulation\nauthors: [Yujing Zhang, Xianghui Meng, Shihui Feng, Jionghao Lin]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2604.08344v1\nresearch_type: 실험 연구\nmethodology: 병행 그룹 무작위 실험\ndata_type: 질적 데이터\nsample: 71명의 대학생\ncontext: 협력 학습에서의 생성 AI 사용\ntheoretical_framework: 공동 조절 및 사회적으로 공유된 조절 이론\nkeywords: [human-ai collaboration, collaborative learning, co-regulation, socially shared regulation, generative AI, educational technology]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 생성 AI(GenAI)가 협력 학습에서 그룹의 조절 방식을 어떻게 변화시키는지를 조사하였다. 71명의 대학생을 대상으로 한 병행 그룹 무작위 실험을 통해, GenAI가 사용되는 경우와 사용되지 않는 경우의 협력 조절 차이를 분석하였다. 결과적으로, GenAI의 사용은 사회적으로 공유된 조절에서 하이브리드 공동 조절로의 전환을 촉진하며, 지시적, 장애 지향적, 정서적 조절 과정의 비율이 증가하는 것으로 나타났다. 이러한 결과는 GenAI가 협력 과정에서 조절 책임의 분배를 재구성함을 시사하며, AI 지원 협력 학습의 인간 중심 설계에 대한 함의를 제공한다.\n\n# Research Logic\n## Problem\n협력 학습에서 생성 AI의 사용이 그룹 조절 방식에 미치는 영향이 명확히 규명되지 않음.\n## Theory\n공동 조절(Co-regulation)과 사회적으로 공유된 조절(Socially Shared Regulation) 이론을 기반으로 함.\n## Design\n병행 그룹 무작위 실험을 통해 Human-AI 그룹과 Human-Human 그룹 간의 조절 차이를 비교함.\n## Findings\nGenAI의 사용은 사회적으로 공유된 조절에서 하이브리드 공동 조절로의 전환을 촉진함.\n## Conclusion\nGenAI는 협력 과정에서 조절 책임의 분배를 재구성하며, 교육적 GenAI 설계에 대한 새로운 방향을 제시함.\n\n# Key Findings\n- GenAI 사용 시 하이브리드 공동 조절의 비율이 증가함.\n- 지시적, 장애 지향적, 정서적 조절 과정의 비율이 Human-AI 그룹에서 높음.\n- 참여 초점의 분포는 두 조건 간에 유사함.\n\n# Contributions\n## Theoretical\nGenAI가 협력 조절 이론에 미치는 영향을 실증적으로 규명함.\n## Methodological\n병행 그룹 무작위 실험을 통해 조절 방식의 차이를 정량적으로 분석함.\n## Practical\nAI 지원 협력 학습의 설계에 대한 실용적인 함의를 제공함.\n\n# Limitations\n- 샘플 크기가 상대적으로 작고 인구 통계적으로 편향됨.\n- 텍스트 기반 상호작용에 국한되어 있음.\n\n# Transferable Insights\n- GenAI는 협력 학습에서 조절 책임의 재분배를 촉진할 수 있음.\n- 다양한 협력 환경에서의 GenAI의 효과를 추가적으로 연구할 필요가 있음.\n\n# Idea Seeds\n1. 다양한 인구 통계적 배경을 가진 참가자를 포함한 연구 설계.\n2. GenAI의 다양한 형태가 협력 조절에 미치는 영향을 비교하는 연구.\n3. 멀티모달 협력 학습 환경에서의 GenAI 활용 방안 탐색.\n\n# Citation Snippets\n> Zhang, Y., Meng, X., Feng, S., & Lin, J. (2026). Human-AI Collaboration Reconfigures Group Regulation from Socially Shared to Hybrid Co-Regulation. arXiv. https://arxiv.org/abs/2604.08344v1\n\ntags: #human-ai collaboration, #collaborative learning, #co-regulation, #socially shared regulation, #generative AI, #educational technology\n\n---\n\n요약: 본 연구는 생성 AI가 협력 학습에서 그룹의 조절 방식을 변화시키는지를 조사하였다. 실험 결과, GenAI의 사용은 사회적으로 공유된 조절에서 하이브리드 공동 조절로의 전환을 촉진하며, 조절 책임의 재분배를 시사한다.", "link": "https://arxiv.org/abs/2604.08344v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Yujing Zhang", "Xianghui Meng", "Shihui Feng"], "categories": ["cs.AI", "cs.HC"]}, {"id": "3", "source": "ARXIV", "score": 10, "day": "2026-04-09", "title": "Language Preferences and Practices in Multilingual EdTech: Flexible Primary Language Use with Secondary Language Support", "content": "---\ntitle: Language Preferences and Practices in Multilingual EdTech: Flexible Primary Language Use with Secondary Language Support\nauthors: [Christine Kwon, Phenyo Phemelo Moletsane, Michael W. Asher, Dieyu Ouyang, Lingkan Wang, Debbie Eleene Conejo, John Stamper, Paulo F. Carvalho, Amy Ogan]\nyear: 2026\njournal: 명시되지 않음\ndoi: https://arxiv.org/abs/2604.07843v1\nresearch_type: 준실험 연구\nmethodology: 혼합 방법\ndata_type: 정량적 및 정성적 데이터\nsample: 29명의 Hybrid 그룹 참가자\ncontext: 우간다의 농촌 지역\ntheoretical_framework: 다언어 교육 이론\nkeywords: [multilingual education, EdTech, learner agency, bilingual instruction, remote learning]\n---\n\n# APA 7th style\n\n# Summary\n이 연구는 우간다의 원격 교육 기술 과정에서 학습자들이 영어, 레브-랑고(현지 언어), 또는 두 언어의 혼합 모드(Hybrid)를 선택할 수 있는 상황에서 언어 사용을 탐구하였다. Hybrid 옵션을 선택한 학습자들은 두 언어를 탐색하는 과정에서 긍정적인 학습 결과를 보였으며, 특히 두 언어를 모두 사용하는 학습자들이 더 높은 과정 참여도를 나타냈다. 이 연구는 다언어 교육의 필요성과 학습자의 주체성을 강조하며, 포괄적인 다언어 학습 솔루션 설계를 위한 통찰을 제공한다.\n\n# Research Logic\n## Problem\n식민지 언어가 교육에서 지배적이며, 이는 지역 언어를 소외시키고 학습자의 이해를 제한한다는 문제를 다룬다.\n\n## Theory\n다언어 교육 이론을 기반으로 하여, 학습자가 두 언어를 어떻게 탐색하고 사용하는지를 분석한다.\n\n## Design\n우간다의 농촌 지역에서 진행된 준실험 연구로, 학습자들은 영어와 레브-랑고 중에서 선택할 수 있었다.\n\n## Findings\nHybrid 옵션을 선택한 학습자들은 두 언어를 모두 사용한 경우 더 높은 과정 참여도와 긍정적인 학습 결과를 보였다.\n\n## Conclusion\n이 연구는 원격 교육 환경에서 학습자가 언어를 탐색하는 방식에 대한 최초의 실증적 증거를 제공하며, 다언어 교육 솔루션 설계에 대한 통찰을 제시한다.\n\n# Key Findings\n- Hybrid 학습자들은 두 언어를 모두 사용한 경우 더 높은 과정 참여도를 보였다.\n- 언어 복잡성을 관리하는 방법에 대한 학습자의 통찰이 공유되었다.\n- 학습자의 주체성이 다언어 원격 교육에서 중요한 역할을 한다는 것을 입증하였다.\n\n# Contributions\n## Theoretical\n다언어 교육 이론에 대한 새로운 실증적 증거를 제공한다.\n\n## Methodological\n혼합 방법을 사용하여 정량적 및 정성적 데이터를 통합한 연구 디자인을 제시한다.\n\n## Practical\n다언어 교육 솔루션 설계에 대한 실질적인 통찰을 제공하여, 교육 기술 개발자와 강사에게 유용하다.\n\n# Limitations\n- 연구는 특정 지역(우간다)에 국한되어 있어 일반화에 제한이 있다.\n- 참가자 수가 상대적으로 적어 통계적 유의성을 확보하기 어려울 수 있다.\n\n# Transferable Insights\n- 다언어 교육 환경에서 학습자의 주체성을 고려한 설계가 필요하다.\n- 원격 교육 기술에서 언어 선택의 유연성을 제공하는 것이 중요하다.\n\n# Idea Seeds\n1. 다언어 교육을 위한 새로운 교육 기술 플랫폼 개발.\n2. 다양한 문화적 배경을 반영한 교육 콘텐츠 제작.\n3. 언어 전환을 지원하는 AI 기반 학습 도구 연구.\n\n# Citation Snippets\n> Kwon, C., Moletsane, P. P., Asher, M. W., Ouyang, D., Wang, L., Conejo, D. E., Stamper, J., Carvalho, P. F., & Ogan, A. (2026). Language Preferences and Practices in Multilingual EdTech: Flexible Primary Language Use with Secondary Language Support. \n\ntags: #다언어교육, #교육기술, #학습자주체성, #이중언어교육, #원격학습", "link": "https://arxiv.org/abs/2604.07843v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Christine Kwon", "Phenyo Phemelo Moletsane", "Michael W. Asher"], "categories": ["cs.HC"]}, {"id": "4", "source": "ARXIV", "score": 10, "day": "2026-04-08", "title": "Why teaching resists automation in an AI-inundated era: Human judgment, non-modular work, and the limits of delegation", "content": "---\ntitle: Why teaching resists automation in an AI-inundated era: Human judgment, non-modular work, and the limits of delegation\nauthors: Songhee Han\nyear: 2026\njournal: 명시되지 않음\ndoi: 명시되지 않음\nresearch_type: 개념적 논의\nmethodology: 문헌 검토 및 경험적 연구 분석\ndata_type: 문헌 및 사례 연구\nsample: 명시되지 않음\ncontext: 교육 기술 및 인공지능\ntheoretical_framework: 인간 인지 및 사회적 상호작용 이론\nkeywords: [automation, human factor, large language model (LLM), teaching]\n---\n\n# APA 7th style\n\n# Summary\n이 논문은 교육에서 인공지능(AI)의 자동화 가능성에 대한 논의를 다루며, 교수법이 실제로는 더 분리 가능하지 않다는 주장을 제기한다. 저자는 AI가 일부 제한된 기능을 지원할 수 있지만, 교육적 작업은 본질적으로 해석적이고 관계적이며 전문적 판단에 기반하기 때문에 의미 있는 방식으로 자동화하기 어렵다고 주장한다. 교육과 학습은 인간의 인지, 행동, 동기 및 사회적 상호작용에 의해 형성되며, 이는 완전히 명시되거나 예측될 수 없다. 따라서 교육 실천이 인간의 인지와 학습에 대한 이해에 의존하는 한, 교수는 자동화에 저항하는 전문적인 작업으로 남아있다.\n\n# Research Logic\n## Problem\nAI의 발전으로 교육에서 교수법의 자동화 가능성이 제기되고 있으나, 교수법이 실제로는 더 복잡하고 비모듈화된 작업이라는 점을 간과하고 있다.\n\n## Theory\n교육은 인간의 인지, 동기, 사회적 상호작용에 의해 형성되며, 이는 자동화하기 어려운 복잡성을 내포하고 있다.\n\n## Design\n문헌 검토와 경험적 연구를 통해 AI의 한계와 교육적 작업의 본질을 분석하였다.\n\n## Findings\nAI는 일부 제한된 작업을 지원할 수 있지만, 교육적 판단과 관계적 책임이 필요한 작업은 여전히 인간의 몫이다.\n\n## Conclusion\nAI는 정보 접근성을 향상시킬 수 있으나, 효과적인 교육에 필요한 인간의 판단과 관계적 책임을 제거하지는 않는다.\n\n# Key Findings\n- 교육적 작업은 해석적이고 관계적이며 전문적 판단에 기반한다.\n- AI는 일부 표면적 작업에서 성과를 보이나, 교육적 판단이 필요한 작업에서는 한계를 보인다.\n- 교육은 인간의 인지와 사회적 상호작용에 의해 형성되며, 이는 자동화하기 어렵다.\n\n# Contributions\n## Theoretical\n교수법의 자동화 가능성에 대한 기존의 가정을 도전하며, 교육적 작업의 본질에 대한 새로운 이해를 제공한다.\n\n## Methodological\n문헌 검토와 경험적 연구를 통합하여 AI의 교육적 적용에 대한 실질적인 통찰을 제공한다.\n\n## Practical\nAI 도구의 사용에 대한 정책적 접근을 제안하며, 교육자들이 AI를 어떻게 활용해야 하는지에 대한 방향성을 제시한다.\n\n# Limitations\n- 연구의 범위가 특정 문헌에 국한되어 있어 일반화에 한계가 있다.\n- 경험적 데이터의 부족으로 인해 주장에 대한 실증적 검증이 부족하다.\n\n# Transferable Insights\n- 교육적 작업의 복잡성을 이해하는 것이 AI 도구의 효과적인 활용에 필수적이다.\n- 교육 정책은 AI 도구의 사용을 지원하되, 교육자의 전문성을 강조해야 한다.\n\n# Idea Seeds\n1. AI 도구의 교육적 활용을 위한 전문성 개발 프로그램 설계.\n2. 교육적 판단의 중요성을 강조하는 정책 제안.\n3. AI와 인간의 협업을 통한 교육적 접근법 개발.\n\n# Citation Snippets\n> Han, S. (2026). Why teaching resists automation in an AI-inundated era: Human judgment, non-modular work, and the limits of delegation.\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy\n\n---\n\n요약: 이 논문은 교육에서 AI의 자동화 가능성에 대한 비판적 논의를 제기하며, 교수법이 본질적으로 해석적이고 관계적이라는 점을 강조한다. AI는 일부 작업을 지원할 수 있지만, 교육적 판단이 필요한 작업은 여전히 인간의 몫으로 남아있다.", "link": "https://arxiv.org/abs/2604.07285v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Songhee Han"], "categories": ["cs.CL", "cs.CY"]}, {"id": "5", "source": "ARXIV", "score": 10, "day": "2026-04-08", "title": "SentinelSphere: Integrating AI-Powered Real-Time Threat Detection with Cybersecurity Awareness Training", "content": "The field of cybersecurity is confronted with two interrelated challenges: a worldwide deficit of qualified practitioners and ongoing human-factor weaknesses that account for the bulk of security incidents. To tackle these issues, we present SentinelSphere, a platform driven by artificial intelligence that unifies machine learning-based threat identification with security training powered by a Large Language Model (LLM). The detection module uses an Enhanced Deep Neural Network (DNN) trained on the CIC-IDS2017 and CIC-DDoS2019 benchmark datasets, enriched with novel HTTP-layer feature engineering that captures application level attack signatures. For the educational component, we deploy a quantised variant of Phi-4 model (Q4_K_M), fine-tuned for the cybersecurity domain, enabling deployment on commodity hardware requiring only 16 GB of RAM without dedicated GPU resources. Experimental results show that the Enhanced DNN attains high detection accuracy while substantially lowering false positives relative to baseline models, and maintains strong recall across critical attack categories such as DDoS, brute force, and web-based exploits. Validation workshops involving industry professionals and university students confirmed that the Traffic Light visualisation system and conversational AI assistant are both intuitive and effective for users without technical backgrounds. SentinelSphere illustrates that coupling intelligent threat detection with adaptive, LLM-driven security education can meaningfully address both technical and human-factor cybersecurity vulnerabilities within a single, cohesive framework.", "link": "https://arxiv.org/abs/2604.06900v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Nikolaos D. Tantaroudas", "Ilias Karachalios", "Andrew J. McCracken"], "categories": ["cs.CE", "cs.AI", "cs.CR", "cs.CY"]}, {"id": "6", "source": "ARXIV", "score": 10, "day": "2026-04-07", "title": "Dialogue Act Patterns in GenAI-Mediated L2 Oral Practice: A Sequential Analysis of Learner-Chatbot Interactions", "content": "While generative AI (GenAI) voice chatbots offer scalable opportunities for second language (L2) oral practice, the interactional processes related to learners' gains remain underexplored. This study investigates dialogue act (DA) patterns in interactions between Grade 9 Chinese English as a foreign language (EFL) learners and a GenAI voice chatbot over a 10-week intervention. Seventy sessions from 12 students were annotated by human coders using a pedagogy-informed coding scheme, yielding 6,957 coded DAs. DA distributions and sequential patterns were compared between high- and low-progress sessions. At the DA level, high-progress sessions showed more learner-initiated questions, whereas low-progress sessions exhibited higher rates of clarification-seeking, indicating greater comprehension difficulty. At the sequential level, high-progress sessions were characterised by more frequent prompting-based corrective feedback sequences, consistently positioned after learner responses, highlighting the role of feedback type and timing in effective interaction. Overall, these findings underscore the value of a dialogic lens in GenAI chatbot design, contribute a pedagogy-informed DA coding framework, and inform the design of adaptive GenAI chatbots for L2 education.", "link": "https://arxiv.org/abs/2604.05702v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Liqun He", "Shijun", "Chen"], "categories": ["cs.CL", "cs.HC"]}, {"id": "7", "source": "ARXIV", "score": 9, "day": "2026-04-01", "title": "Fatigue-Aware Learning to Defer via Constrained Optimisation", "content": "Learning to defer (L2D) enables human-AI cooperation by deciding when an AI system should act autonomously or defer to a human expert. Existing L2D methods, however, assume static human performance, contradicting well-established findings on fatigue-induced degradation. We propose Fatigue-Aware Learning to Defer via Constrained Optimisation (FALCON), which explicitly models workload-varying human performance using psychologically grounded fatigue curves. FALCON formulates L2D as a Constrained Markov Decision Process (CMDP) whose state includes both task features and cumulative human workload, and optimises accuracy under human-AI cooperation budgets via PPO-Lagrangian training. We further introduce FA-L2D, a benchmark that systematically varies fatigue dynamics from near-static to rapidly degrading regimes. Experiments across multiple datasets show that FALCON consistently outperforms state-of-the-art L2D methods across coverage levels, generalises zero-shot to unseen experts with different fatigue patterns, and demonstrates the advantage of adaptive human-AI collaboration over AI-only or human-only decision-making when coverage lies strictly between 0 and 1.", "link": "https://arxiv.org/abs/2604.00904v2", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Zheng Zhang", "Cuong C. Nguyen", "David Rosewarne"], "categories": ["cs.LG"]}, {"id": "8", "source": "ARXIV", "score": 8, "day": "2026-04-09", "title": "LLM-Based Data Generation and Clinical Skills Evaluation for Low-Resource French OSCEs", "content": "Objective Structured Clinical Examinations (OSCEs) are the standard method for assessing medical students' clinical and communication skills through structured patient interviews. In France, however, the organization of training sessions is limited by human and logistical constraints, restricting students' access to repeated practice and structured feedback. Recent advances in Natural Language Processing (NLP) and Large Language Models (LLMs) now offer the opportunity to automatically evaluate such medical interviews, thereby alleviating the need for human examiners during training. Yet, real French OSCE annotated transcripts remain extremely scarce, limiting reproducible research and reliable benchmarking. To address these challenges, we investigate the use of LLMs for both generating and evaluating French OSCE dialogues in a low-resource context. We introduce a controlled pipeline that produces synthetic doctor-patient interview transcripts guided by scenario-specific evaluation criteria, combining ideal and perturbed performances to simulate varying student skill levels. The resulting dialogues are automatically silver-labeled through an LLM-assisted framework supporting adjustable evaluation strictness. Benchmarking multiple open-source and proprietary LLMs shows that mid-size models ($\\le$32B parameters) achieve accuracies comparable to GPT-4o ($\\sim$90\\%) on synthetic data, highlighting the feasibility of locally deployable, privacy-preserving evaluation systems for medical education.", "link": "https://arxiv.org/abs/2604.08126v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Tian Huang", "Tom Bourgeade", "Irina Illina"], "categories": ["cs.CL"]}, {"id": "9", "source": "ARXIV", "score": 8, "day": "2026-04-08", "title": "From Uncertainty to Possibility: Early Computing Experiences for Rural Girls", "content": "Girls remain underrepresented in computing, and rural contexts often compound barriers of access, language, and gender norms. Prior work in computing education highlights that confidence and belonging can shape participation, yet most evidence comes from well-resourced, English-dominant settings. Less is known about how locally grounded pathways can build programming self-efficacy and broaden career interest for adolescent girls. We addressed this gap by delivering a curriculum that began with digital foundations and unplugged problem-solving, then progressed to block-based programming activities, supported by parent awareness and teacher training in gender-responsive practices. Pre and post-surveys showed a reliable increase in programming self-efficacy, and career aspirations shifted toward technology. Complementary qualitative data indicate that mastery experiences, peer collaboration, and the creation of personal projects were key drivers of confidence, suggesting design priorities for scalable, locally relevant programmes in low-resource communities that can shift perceptions of who belongs in computing.", "link": "https://arxiv.org/abs/2604.07638v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Poornima Meegammana", "Niranjan Meegammana", "Chathurika Jayalath"], "categories": ["cs.HC"]}];

    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
