<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-05-26 00:07</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "ARXIV", "score": 15, "day": "2026-05-14", "title": "Adesua: Development and Feasibility Study of an AI WhatsApp Bot for Science Learning in West Africa", "content": "---\ntitle: Adesua: Development and Feasibility Study of an AI WhatsApp Bot for Science Learning in West Africa\nauthors: [George Boateng, Evans Atompoya, Philemon Badu, Samuel John, Samuel Ansah, Patrick Agyeman-Budu, Victor Wumbor-Apin Kumbol]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2605.15376v1\nresearch_type: 실험적 연구\nmethodology: 정량적 평가\ndata_type: 사용자 피드백 및 성과 데이터\nsample: 56명의 사용자 (가나)\ncontext: 서부 아프리카의 중고등학교 과학 교육\ntheoretical_framework: 생성적 AI, 교육 기술\nkeywords: [AI 교육 보조, 질문 응답, 과학 교육, 평가, 모바일 학습, LLM, 생성적 AI]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 서부 아프리카의 과학 교육을 위한 WhatsApp 기반 AI 교육 보조 도구인 Adesua의 개발 및 타당성 연구를 다룬다. Adesua는 WhatsApp의 광범위한 사용을 활용하여 중학교 및 고등학교 학생들에게 접근 가능한 학습 지원을 제공한다. 이 시스템은 33년간의 국가 시험 문제와 교과서 내용을 통합하여 대화형 질문 응답 및 자동 평가 기능을 제공한다. 2025년 6개월간의 타당성 배포에서 56명의 사용자가 참여하였으며, AI 생성 답변의 유용성에 대한 높은 평가(93.75%)를 받았다. 이러한 초기 결과는 자원이 제한된 교육 환경에서 개인화된 학습 지원의 가능성을 제시한다.\n\n# Research Logic\n## Problem\n서부 아프리카의 교육 시스템은 높은 학생-교사 비율과 자격을 갖춘 교사의 부족으로 인해 개인화된 학습 지원이 부족하다.\n\n## Theory\n생성적 AI 기술을 활용하여 개인화된 교육 지원을 제공할 수 있는 가능성을 탐구한다.\n\n## Design\nWhatsApp 플랫폼을 활용한 AI 교육 보조 도구인 Adesua를 설계하고 구현하였다.\n\n## Findings\n사용자들은 AI 생성 답변의 유용성을 높게 평가하였으며, 시스템의 사용 패턴이 긍정적이었다.\n\n## Conclusion\nAdesua는 자원이 제한된 교육 환경에서 개인화된 학습 지원을 제공할 수 있는 잠재력을 지닌다.\n\n# Key Findings\n- Adesua는 WhatsApp을 통해 과학 교육을 지원하는 AI 교육 보조 도구로 설계되었다.\n- 6개월간의 타당성 연구에서 56명의 사용자가 참여하였다.\n- AI 생성 답변의 유용성에 대한 평가가 93.75%로 나타났다.\n\n# Contributions\n## Theoretical\n생성적 AI를 활용한 교육 지원의 새로운 모델을 제시하였다.\n\n## Methodological\n정량적 평가를 통해 사용자 피드백을 수집하고 분석하였다.\n\n## Practical\n자원이 제한된 교육 환경에서의 개인화된 학습 지원의 가능성을 탐구하였다.\n\n# Limitations\n- 사용자의 수가 적어 결과의 일반화에 한계가 있다.\n- AI의 응답 정확성에 대한 추가적인 검증이 필요하다.\n\n# Transferable Insights\n- WhatsApp과 같은 플랫폼을 활용한 교육 지원의 가능성을 보여준다.\n- 생성적 AI를 통한 개인화된 학습 경험 제공의 중요성을 강조한다.\n\n# Idea Seeds\n1. 다른 과목에 대한 AI 교육 보조 도구 개발.\n2. 사용자 피드백을 기반으로 한 지속적인 시스템 개선.\n3. 다양한 교육 환경에서의 적용 가능성 탐색.\n\n# Citation Snippets\n> Boateng, G., Atompoya, E., Badu, P., John, S., Ansah, S., Agyeman-Budu, P., & Kumbol, V. (2026). Adesua: Development and Feasibility Study of an AI WhatsApp Bot for Science Learning in West Africa. arXiv. https://arxiv.org/abs/2605.15376v1\n\ntags: #AI교육보조, #과학교육, #생성적AI, #모바일학습, #교육기술, #서부아프리카, #개인화학습", "link": "https://arxiv.org/abs/2605.15376v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["George Boateng", "Evans Atompoya", "Philemon Badu"], "categories": ["cs.CL", "cs.CY"]}, {"id": "1", "source": "ARXIV", "score": 14, "day": "2026-05-19", "title": "Puzzled By ChatGPT? No more! A Jigsaw Puzzle to Promote AI Literacy and Awareness", "content": "---\ntitle: Puzzled By ChatGPT? No more! A Jigsaw Puzzle to Promote AI Literacy and Awareness\nauthors: [Francesca Padovani, Malvina Nissim]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2605.20404v1\nresearch_type: 실험적 연구\nmethodology: 게임 기반, 상호작용적 접근\ndata_type: 질적 데이터\nsample: 비전문가 및 전문가 그룹\ncontext: 비공식 학습 환경\ntheoretical_framework: Geertz의 Deep Play 개념\nkeywords: [AI 리터러시, 퍼즐, 교육, 게임 기반 학습, 협력적 학습]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 Generative AI의 급속한 채택에 따른 AI 리터러시의 필요성을 강조하며, 이를 해결하기 위해 만화 기반 인포그래픽을 포함한 퍼즐을 제안한다. 이 퍼즐은 AI의 작동 방식, 능력, 한계 및 사회적 함의를 설명하는 정보를 제공하며, 참여자들은 퍼즐 조립을 통해 이러한 개념을 탐구할 수 있다. 연구진은 전문가와 비전문가가 함께 참여한 협업 세션을 통해 시각적 콘텐츠를 개발하였으며, 이는 비공식 학습 맥락에서 AI 시스템의 복잡한 개념을 이해하는 데 도움을 준다.\n\n# Research Logic\n## Problem\nGenerative AI의 확산으로 인해 일반 대중의 AI 이해 및 리터러시가 필요하다.\n## Theory\nGeertz의 Deep Play 개념을 기반으로 한 놀이를 통한 학습의 중요성.\n## Design\n게임 기반의 퍼즐을 통해 AI 개념을 탐구하는 상호작용적 접근.\n## Findings\n퍼즐 조립 과정에서 참여자들은 AI 시스템의 복잡한 개념을 비판적으로 반영하고 이해할 수 있었다.\n## Conclusion\n퍼즐은 AI 리터러시를 증진시키는 효과적인 도구로 작용할 수 있다.\n\n# Key Findings\n- 퍼즐은 AI 시스템의 작동 방식과 사회적 함의를 탐구하는 데 도움을 준다.\n- 참여자들은 협력적 상호작용을 통해 AI 개념에 대한 이해를 심화시켰다.\n- 비공식 학습 환경에서의 놀이 기반 접근이 효과적임을 보여준다.\n\n# Contributions\n## Theoretical\nAI 리터러시와 놀이 기반 학습의 관계를 탐구하는 새로운 시각을 제공.\n## Methodological\n게임 기반 학습 도구로서 퍼즐의 개발 및 평가 방법론 제시.\n## Practical\n비전문가를 위한 AI 교육 자료로서의 퍼즐 활용 가능성.\n\n# Limitations\n- 초기 테스트가 비구조적이며 정량적 데이터 수집이 이루어지지 않음.\n- 다양한 청중에 대한 반응을 정량적으로 평가하지 못함.\n\n# Transferable Insights\n- 게임 기반 학습 도구가 AI 리터러시 증진에 기여할 수 있음.\n- 협력적 학습 환경이 복잡한 개념 이해에 효과적임을 시사.\n\n# Idea Seeds\n1. AI 리터러시 교육을 위한 다양한 게임 기반 자료 개발.\n2. 퍼즐을 활용한 워크숍 및 교육 프로그램 설계.\n3. AI 시스템의 사회적 함의를 탐구하는 추가적인 시각적 자료 제작.\n\n# Citation Snippets\n> Padovani, F., & Nissim, M. (2026). Puzzled By ChatGPT? No more! A Jigsaw Puzzle to Promote AI Literacy and Awareness. arXiv. https://arxiv.org/abs/2605.20404v1\n\ntags: #AI리터러시, #퍼즐, #교육, #게임기반학습, #협력적학습, #비공식학습, #GenerativeAI", "link": "https://arxiv.org/abs/2605.20404v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Francesca Padovani", "Malvina Nissim"], "categories": ["cs.CL"]}, {"id": "2", "source": "ARXIV", "score": 14, "day": "2026-05-18", "title": "Generative AI and the Productivity Divide: Human-AI Complementarities in Education", "content": "---\ntitle: Generative AI and the Productivity Divide: Human-AI Complementarities in Education\nauthors: [Lihi Idan, Bharat Anand]\nyear: 2026\njournal: 명시되지 않음\ndoi: https://arxiv.org/abs/2605.18143v1\nresearch_type: 실험 연구\nmethodology: 무작위 대조 실험\ndata_type: 정량적 데이터\nsample: 179명 (대학생)\ncontext: Texas A&M University\ntheoretical_framework: 인간-인공지능 상호보완성\nkeywords: [human-ai collaboration, ai tutoring, instructional design, scaffolding, ai literacy, education, learning analytics, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 생성적 인공지능(GenAI)이 지식 근로자의 생산성에 미치는 영향을 분석하기 위해 무작위 대조 실험을 실시하였다. 연구 결과, GenAI 접근이 평균적으로 작업 성과를 유의미하게 향상시켰으나, 성과 향상의 분포는 매우 불균형적이었다. 성과 향상은 GPA나 사전 지식에 의해 예측되지 않았고, 오히려 AI 상호작용 능력(AIC)에 의해 결정되었다. AIC가 높은 참가자는 큰 성과 향상을 경험한 반면, AIC가 낮은 참가자는 제한적이거나 부정적인 결과를 보였다. 개념적 지도와 같은 스캐폴딩 개입은 성과 변동성을 줄이는 데 효과적이었다. 이 연구는 GenAI가 평균 생산성을 높이는 동시에 새로운 형태의 능력 불평등을 초래함을 보여준다.\n\n# Research Logic\n## Problem\nGenAI의 생산성 효과가 사용자 간에 어떻게 다르게 나타나는지를 이해하는 것이 중요하다.\n## Theory\nAI 상호작용 능력(AIC)이 개인의 성과에 미치는 영향을 분석한다.\n## Design\n무작위 대조 실험을 통해 GenAI와 전통적 자원의 효과를 비교하였다.\n## Findings\nAIC가 높은 참가자는 GenAI를 통해 큰 성과 향상을 경험하였고, 스캐폴딩 개입이 성과 변동성을 줄이는 데 기여하였다.\n## Conclusion\n조직은 GenAI 접근을 단순한 도구 제공으로 보지 말고, AIC를 개발하기 위한 교육과 표준화된 작업 절차를 병행해야 한다.\n\n# Key Findings\n- GenAI 접근은 평균적으로 작업 성과를 유의미하게 향상시켰다.\n- AIC가 높은 참가자는 큰 성과 향상을 경험하였다.\n- 스캐폴딩 개입이 성과 변동성을 줄이는 데 효과적이었다.\n\n# Contributions\n## Theoretical\nAIC를 새로운 인간 자본 차원으로 제안하여 디지털 상호보완성 문헌과 연결하였다.\n## Methodological\n무작위 대조 실험을 통해 GenAI의 생산성 효과에 대한 인과적 증거를 제공하였다.\n## Practical\n조직이 GenAI를 효과적으로 활용하기 위한 교육 및 프로세스 설계의 필요성을 강조하였다.\n\n# Limitations\n- 연구 샘플이 대학생으로 제한되어 일반화에 한계가 있다.\n- 실험 환경이 실제 직장 환경과 다를 수 있다.\n\n# Transferable Insights\n- AIC 개발을 위한 교육 프로그램 설계의 중요성을 강조한다.\n- 스캐폴딩 개입이 성과 변동성을 줄이는 데 기여할 수 있음을 보여준다.\n\n# Idea Seeds\n1. AIC 개발을 위한 맞춤형 교육 프로그램 설계.\n2. GenAI 사용에 대한 피드백 메커니즘 구축.\n3. 다양한 산업에서의 GenAI 효과 분석 연구.\n\n# Citation Snippets\n> Idan, L., & Anand, B. (2026). Generative AI and the Productivity Divide: Human-AI Complementarities in Education. \n\ntags: #human-ai collaboration, #ai tutoring, #instructional design, #scaffolding, #ai literacy, #education, #learning analytics, #ai pedagogy", "link": "https://arxiv.org/abs/2605.18143v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Lihi Idan", "Bharat Anand"], "categories": ["cs.AI"]}, {"id": "3", "source": "ARXIV", "score": 13, "day": "2026-05-20", "title": "Faster Completion, Less Learning: Generative AI Reduced Study Time on Math Problems and the Knowledge They Build", "content": "---\ntitle: Faster Completion, Less Learning: Generative AI Reduced Study Time on Math Problems and the Knowledge They Build\nauthors: [Sina Rismanchian, Hasan Uzun, Jeffrey Matayoshi, Eric Cosyn, Eyad Kurd-Misto]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2605.21629v1\nresearch_type: 양적 연구\nmethodology: 준실험적 설계\ndata_type: 행동 추적 데이터\nsample: 320만 개 ALEKS 학습 상호작용\ncontext: 대학 및 중고등학교 수학 교육\ntheoretical_framework: 인지 과학, 능동 학습 이론\nkeywords: [generative AI, 학습 시간, 지속적 학습, AI 사용, 교육 정책, 평가, 인지 포기]\n---\n\n# APA 7th style\n\n# Summary\n이 연구는 생성적 AI가 학생들의 학습 과정에 미친 영향을 분석하고, 그 결과가 지속적인 학습 성과에 미치는 영향을 평가한다. 320만 개의 ALEKS 학습 상호작용 데이터를 사용하여, AI에 취약한 문제에서의 학습 시간이 ChatGPT 출시 이후 26.9% 감소했음을 발견하였다. 고등학생은 31.3%, 중학생은 9.0%의 감소를 보였으며, 5학년 학생은 변화가 없었다. 프로토링이 이루어진 경우, 대학생의 학습 시간 감소는 사라졌다. 이 연구는 생성적 AI가 학생들의 학습 방식과 지식 형성에 미친 영향을 보여주는 대규모 행동 및 결과 증거를 제공한다.\n\n# Research Logic\n## Problem\n학생들이 생성적 AI에 의해 학습 방식이 어떻게 변화했는지와 그 변화가 지속적인 학습 성과에 미치는 영향을 이해하는 것이 필요하다.\n\n## Theory\n능동적 인지 참여가 학습 성과에 긍정적인 영향을 미친다는 인지 과학 이론에 기반한다.\n\n## Design\n10년간의 ALEKS 학습 상호작용 데이터를 활용한 준실험적 설계로, AI에 취약한 문제와 저항하는 문제를 비교 분석하였다.\n\n## Findings\nAI에 취약한 문제에서의 학습 시간이 ChatGPT 출시 이후 감소하였고, 프로토링이 이루어진 경우 이러한 감소가 사라졌다.\n\n## Conclusion\n생성적 AI는 학생들의 학습 방식에 중대한 변화를 초래하였으며, 이는 교육 연구 및 정책에 직접적인 영향을 미친다.\n\n# Key Findings\n- 대학생의 AI 취약 문제 학습 시간은 26.9% 감소.\n- 고등학생의 학습 시간은 31.3% 감소.\n- 프로토링이 이루어진 경우 학습 시간 감소가 사라짐.\n\n# Contributions\n## Theoretical\n생성적 AI의 사용이 학습 방식에 미치는 영향을 설명하는 새로운 이론적 틀을 제공.\n\n## Methodological\n대규모 행동 추적 데이터를 활용한 준실험적 접근법을 통해 AI의 영향을 정량적으로 분석.\n\n## Practical\n교육 정책 및 평가 방식에 대한 실질적인 시사점을 제공.\n\n# Limitations\n- 연구는 특정 플랫폼(ALEKS)에 국한되어 있어 일반화에 한계가 있음.\n- AI 사용의 장기적인 영향을 평가하기 위한 추가 연구 필요.\n\n# Transferable Insights\n- 생성적 AI의 사용이 학습 시간과 성과에 미치는 영향을 이해하는 데 중요한 기초 자료 제공.\n- 교육 현장에서 AI 도구의 사용에 대한 정책 수립에 기여할 수 있음.\n\n# Idea Seeds\n1. AI 도구 사용의 장기적인 학습 효과를 평가하기 위한 후속 연구 필요.\n2. 다양한 교육 환경에서 AI의 영향을 비교 분석하는 연구 제안.\n3. AI 사용에 대한 학생들의 인식 변화에 대한 질적 연구 필요.\n\n# Citation Snippets\n> Rismanchian, S., Uzun, H., Matayoshi, J., Cosyn, E., & Kurd-Misto, E. (2026). Faster Completion, Less Learning: Generative AI Reduced Study Time on Math Problems and the Knowledge They Build. arXiv. https://arxiv.org/abs/2605.21629v1\n\ntags: #generativeAI, #학습시간, #지속적학습, #AI사용, #교육정책, #평가, #인지포기", "link": "https://arxiv.org/abs/2605.21629v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Sina Rismanchian", "Hasan Uzun", "Jeffrey Matayoshi"], "categories": ["cs.CY", "cs.AI", "cs.HC"]}, {"id": "4", "source": "ARXIV", "score": 13, "day": "2026-05-15", "title": "Examining University Students' Artificial Intelligence-Generated Content (AIGC) Verification Intention from a Protection Motivation Perspective", "content": "---\ntitle: 대학생의 인공지능 생성 콘텐츠(AIGC) 검증 의도에 대한 보호 동기 이론 관점의 연구\nauthors: Yiran Du\nyear: 2026\njournal: 명시되지 않음\ndoi: https://arxiv.org/abs/2605.16642v1\nresearch_type: 양적 연구\nmethodology: 구조 방정식 모델링(SEM), 퍼지 집합 질적 비교 분석(fsQCA)\ndata_type: 설문조사 데이터\nsample: 432명 대학생\ncontext: 고등 교육\ntheoretical_framework: 보호 동기 이론(Protection Motivation Theory)\nkeywords: [인공지능 생성 콘텐츠, 검증 의도, 보호 동기 이론, 고등 교육, fsQCA]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 대학생들이 인공지능 생성 콘텐츠(AIGC)의 검증 의도를 보호 동기 이론의 관점에서 조사하였다. 432명의 AIGC 사용 경험이 있는 학생들을 대상으로 한 단면 조사에서, 구조 방정식 모델링(SEM)을 통해 위협 평가, 대처 평가, 보호 동기 및 AIGC 검증 의도 간의 가설적 관계를 검증하였다. 결과적으로 보호 동기가 AIGC 검증 의도를 긍정적으로 예측하며, 인식된 심각성, 인식된 취약성, 반응 효능 및 자기 효능감이 보호 동기에 긍정적인 영향을 미치는 것으로 나타났다. 반면, 비적응적 보상과 반응 비용은 부정적인 영향을 미쳤다. fsQCA 결과는 높은 검증 의도로 이어지는 세 가지 구성 경로를 제시하였으며, 모든 경로에서 보호 동기가 핵심 조건으로 나타났다. 이 연구는 AIGC 검증에 대한 학생들의 의도가 위험 인식과 대처 능력 인식 모두에 의존한다는 점을 시사한다.\n\n# Research Logic\n## Problem\n대학생들이 AIGC를 사용할 때, 그 내용의 정확성을 검증하려는 의도가 부족할 수 있다.\n\n## Theory\n보호 동기 이론을 통해 학생들의 AIGC 검증 의도를 설명하고자 한다.\n\n## Design\n단면 조사 설계를 통해 432명의 대학생을 대상으로 데이터를 수집하였다.\n\n## Findings\n보호 동기는 AIGC 검증 의도를 긍정적으로 예측하며, 인식된 심각성, 취약성, 반응 효능 및 자기 효능감이 보호 동기에 긍정적인 영향을 미친다.\n\n## Conclusion\n학생들이 AIGC를 검증하려는 의도는 위험 인식과 대처 능력 인식에 따라 달라진다.\n\n# Key Findings\n- 보호 동기가 AIGC 검증 의도를 긍정적으로 예측함.\n- 인식된 심각성, 취약성, 반응 효능 및 자기 효능감이 보호 동기에 긍정적인 영향을 미침.\n- 비적응적 보상과 반응 비용은 보호 동기에 부정적인 영향을 미침.\n\n# Contributions\n## Theoretical\n보호 동기 이론을 AIGC 검증 맥락에 확장함.\n\n## Methodological\n구조 방정식 모델링과 fsQCA를 결합하여 검증 의도에 대한 경로를 분석함.\n\n## Practical\n고등 교육에서 AIGC의 비판적이고 책임 있는 사용을 촉진하기 위한 시사점을 제공함.\n\n# Limitations\n- 연구는 단면적 설계로 인해 인과관계를 명확히 할 수 없음.\n- 표본이 특정 지역의 대학생으로 제한되어 일반화에 한계가 있음.\n\n# Transferable Insights\n- AIGC 사용 시 검증 의도를 높이기 위한 교육적 개입 필요.\n- 보호 동기 이론을 기반으로 한 교육 프로그램 개발 가능성.\n\n# Idea Seeds\n1. AIGC 검증을 위한 교육 프로그램 개발.\n2. 학생들의 AIGC 사용 경험에 대한 심층 인터뷰 연구.\n3. AIGC 검증 의도와 실제 행동 간의 관계 조사.\n\n# Citation Snippets\n> Du, Y. (2026). Examining University Students' Artificial Intelligence-Generated Content (AIGC) Verification Intention from a Protection Motivation Perspective. \n\ntags: #인공지능생성콘텐츠, #검증의도, #보호동기이론, #고등교육, #fsQCA, #교육기술, #정보리터러시\n\n---\n\n요약: 본 연구는 대학생의 AIGC 검증 의도를 보호 동기 이론을 통해 분석하였다. 432명의 학생을 대상으로 한 조사 결과, 보호 동기가 검증 의도에 긍정적인 영향을 미치며, 인식된 심각성, 취약성, 반응 효능 및 자기 효능감이 보호 동기에 기여하는 것으로 나타났다. 비적응적 보상과 반응 비용은 부정적인 영향을 미쳤다.", "link": "https://arxiv.org/abs/2605.16642v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Yiran Du"], "categories": ["cs.HC"]}, {"id": "5", "source": "ARXIV", "score": 12, "day": "2026-05-21", "title": "StanBKT: Rethinking Parameter Estimation in Bayesian Knowledge Tracing", "content": "Bayesian Knowledge Tracing (BKT) is a widely used and interpretable student modeling approach in intelligent tutoring systems and educational data mining. However, most implementations rely on expectation-maximization or related optimization methods that yield only point estimates, limiting uncertainty quantification and principled comparisons across learners and conditions. We introduce StanBKT, an open-source Python package for estimating BKT models using Bayesian inference in Stan. StanBKT provides a unified framework supporting Hamiltonian Monte Carlo, variational inference, Pathfinder, and optimization-based estimation while preserving the hidden Markov structure and interpretability of classical BKT. It supports standard, grouped, and hierarchical BKT models, flexible prior specification, posterior predictive inference, and utilities for visualization and diagnostics. We evaluate StanBKT on large-scale observational and controlled educational datasets. On the ASSISTments 2020 dataset, we show that supported inference methods achieve comparable predictive performance while differing in computational efficiency and posterior fidelity. We further demonstrate how posterior inference enables principled comparison of condition-specific parameters in an educational intervention involving perceptual cue manipulations. Results illustrate how uncertainty quantification facilitates more reliable interpretation of differences in learning, forgetting, guessing, and slipping parameters across experimental conditions. Overall, StanBKT extends BKT beyond point estimation by providing a flexible framework for probabilistic student modeling, uncertainty quantification, and hierarchical inference in educational data mining.", "link": "https://arxiv.org/abs/2605.23048v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Siddhartha Pradhan", "Yanping Pei", "Morgan Lee"], "categories": ["cs.HC", "cs.CY", "stat.AP", "stat.ME"]}, {"id": "6", "source": "ARXIV", "score": 12, "day": "2026-05-20", "title": "Teaching AI Through Benchmark Construction: QuestBench as a Course-Based Practice for Accountable Knowledge Work", "content": "As AI becomes part of everyday learning, many courses teach students to use it mainly as a productivity tool: how to prompt, search, summarize, write, code, and use tools more efficiently. We argue that AI education also needs a setting in which students learn to test AI and understand their own role in judging machine-produced knowledge. To this end, we introduce a course-based practice that teaches AI through benchmark construction, using deep research systems as a concrete example of AI-era knowledge work. Students turn disciplinary knowledge into verifiable expert-level questions, review one another's designs for ambiguity and shortcuts, and evaluate AI systems on the resulting tasks. This activity gives students direct exposure to a powerful tool while asking them to specify what a trustworthy answer would require. The produced benchmark, QuestBench, consists of 256 questions across 14 humanities and social-science domains. Evaluation on QuestBench shows that student-designed tasks reveal hidden failures in current deep research systems: across thirteen evaluated systems, the mean question-level pass rate is only 16.85%, and the best-performing system, GPT-5.5, reaches a 57.58% pass rate. The failures are educationally useful because they show how fluent, source-backed answers can still miss the right query, source, term, or evidence standard. Reflections from five student contributors suggest that benchmark construction can help students see professional knowledge not only as content AI may retrieve, but as the basis for judging AI outputs. We present QuestBench as a benchmark artifact and as a reusable classroom setting for a larger educational question: how students can remain responsible knowledge actors as AI enters learning and professional work. The dataset is available at https://huggingface.co/datasets/PKUAIWeb/QuestBench/tree/main.", "link": "https://arxiv.org/abs/2605.21413v2", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Haiyang Shen", "Jiuzheng Wang", "Taian Guo"], "categories": ["cs.AI"]}, {"id": "7", "source": "ARXIV", "score": 12, "day": "2026-05-14", "title": "Capability Conditioned Scaffolding for Professional Human LLM Collaboration", "content": "Large language model personalization typically adapts outputs to user preferences and style but does not account for differences in user evaluation capacity across domains of expertise. This limitation can encourage Professional Domain Drift, where users rely on AI generated reasoning in domains they cannot reliably evaluate. We introduce Capability Conditioned Scaffolding, a typed framework that partitions expertise into strong, mixed, and weak domains and conditions intervention behavior on structured capability profiles. A pilot evaluation across multiple MMLU subsets and four LLM substrates shows consistent profile conditioned intervention behavior, including categorical inversion under profile swapping and selective activation in mixed domain risk zones. These findings suggest that capability aware scaffolding can support more reliable professional human AI collaboration beyond stylistic personalization.", "link": "https://arxiv.org/abs/2605.15404v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Sen Yang", "Yinglei Ma"], "categories": ["cs.CL"]}, {"id": "8", "source": "ARXIV", "score": 11, "day": "2026-05-22", "title": "Convex Optimization for Alignment and Preference Learning on a Single GPU", "content": "Fine-tuning large language models (LLMs) to align with human preferences has driven the success of systems such as Gemini and ChatGPT. However, approaches like Reinforcement Learning from Human Feedback (RLHF) remain computationally expensive and complex. Direct Preference Optimization (DPO) offers a simpler alternative but has limitations such as inconsistent ranking accuracy, high dependence on GPU resources, and expensive hyperparameter tuning. We propose the Convex Optimization for Alignment and Preference Learning Algorithm (COALA): a novel lightweight strategy with strong theoretical guarantees. By leveraging the convex optimization reformulation of neural networks, COALA eliminates the need for a reference model and obtains significant reduction in both training time and VRAM consumption, thus enabling efficient training on a single GPU. Experiments across four datasets--including a 26621-sample synthetic Educational Feedback dataset--and six models (including Llama-3.1-8B) demonstrate COALA's competitive performance and efficiency while utilizing as little as ~17.6% of DPO's total TFLOPs. COALA exhibits stable, monotonically increasing rewards and reaches peak margins in significantly shorter time in comparison to traditional methods such as DPO and ORPO. To the best of our knowledge, this is the first time convex optimization has been effectively applied to preference fine-tuning of LLMs.", "link": "https://arxiv.org/abs/2605.23244v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Miria Feng", "Mert Pilanci"], "categories": ["cs.LG"]}, {"id": "9", "source": "ARXIV", "score": 11, "day": "2026-05-21", "title": "Superhuman Safe and Agile Racing through Multi-Agent Reinforcement Learning", "content": "Autonomous systems have achieved superhuman performance in isolation or simulation, yet they remain brittle in shared, dynamic real-world spaces. This failure stems from the dominant single-agent paradigm for physical applications, where other actors are ignored or treated as environmental noise, preventing effective coordination. Here we show that multi-agent reinforcement learning provides the essential safety scaffolding required for real-world interaction. Using high-speed quadrotor racing as a high-stakes testbed, we train agents to navigate complex aerodynamic interactions and strategic maneuvering with a variable number of racers. Through league-based self-play, agents evolve sophisticated anticipatory behaviors, including proactive collision avoidance, overtaking, and handling multi-agent physical interactions, including aerodynamic downwash. Our agents outperform a champion-level human pilot in multi-player races at speeds exceeding 22 m/s, while simultaneously reducing collision rates by 50 % compared to state-of-the-art single-agent baselines. Crucially, training with diverse artificial agents enables zero-shot generalization to safer human interaction. These results suggest that the path to robust robotic co-existence lies not in isolated safety constraints, but in the rigorous demands of multi-agent interaction. Multimedia materials are available at: https://rpg.ifi.uzh.ch/marl", "link": "https://arxiv.org/abs/2605.22748v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Ismail Geles", "Leonard Bauersfeld", "Markus Wulfmeier"], "categories": ["cs.RO", "cs.AI", "cs.LG", "cs.MA"]}];
let PAGE_SIZE = 10;
let currentTab = 'all';
let currentSource = 'ALL';
let currentSort = 'score';
let currentPage = 1;
let currentCategory = '';
let currentMinDate = '';
let currentMaxDate = '';
let hideVisited = false;
let filtered = [];
let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
let searchHistory = JSON.parse(localStorage.getItem('searchHistory')) || [];
let visited = JSON.parse(localStorage.getItem('visited')) || [];

function toggleTheme() {
  const html = document.documentElement;
  const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
  html.dataset.theme = next;
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  localStorage.setItem('theme', next);
}

function toggleTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSource(btn) {
  currentSource = btn.dataset.source;
  document.querySelectorAll('#sourceFilters .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSort(btn) {
  currentSort = btn.dataset.sort;
  document.querySelectorAll('#sortGroup .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  render();
}

function toggleFavorite(id, e) {
  e.stopPropagation();
  const idx = favorites.indexOf(id);
  if (idx === -1) {
    favorites.push(id);
  } else {
    favorites.splice(idx, 1);
  }
  localStorage.setItem('favorites', JSON.stringify(favorites));
  applyFilters();
}

function recordVisit(id) {
  if (!visited.includes(id)) {
    visited.push(id);
  }
  localStorage.setItem('visited', JSON.stringify(visited));
}

function recordSearch(query) {
  if (query.trim() && !searchHistory.includes(query)) {
    searchHistory.unshift(query);
    if (searchHistory.length > 10) searchHistory.pop();
    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
  }
}

function downloadJSON() {
  const data = JSON.stringify(filtered, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadCSV() {
  const headers = ['제목', '출처', '스코어', '리뷰여부', '링크'];
  const rows = filtered.map(p => [
    '"' + p.title.replace(/"/g, '""') + '"',
    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

  const state = {
    tab: currentTab,

  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
</html>
