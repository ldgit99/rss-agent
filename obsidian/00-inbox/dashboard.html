<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-06-12 00:18</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

const PAPERS = [{"id": "0", "source": "ERIC", "score": 28, "day": "명시되지 않음", "title": "Teacher Support, AI Literacy, Personal Best Goals, and Engagement in AI-Supported English Learning: A Goal-Setting Theory Perspective", "content": "---\ntitle: Teacher Support, AI Literacy, Personal Best Goals, and Engagement in AI-Supported English Learning: A Goal-Setting Theory Perspective\nauthors: Yaoqing Xi, Bin Xue\nyear: 명시되지 않음\njournal: 명시되지 않음\ndoi: 명시되지 않음\nresearch_type: 양적 연구\nmethodology: 구조 방정식 모델링\ndata_type: 설문조사 데이터\nsample: 573명의 중국 직업대학 학생\ncontext: 직업 교육\ntheoretical_framework: 목표 설정 이론\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 인공지능(AI)이 지원하는 영어 학습 환경에서의 참여를 이해하기 위해 목표 설정 이론을 바탕으로 교사 지원, AI 문해력, 개인 최선 목표 및 참여 간의 관계를 조사하였다. 573명의 AI 지원 영어 학습 경험이 있는 중국 직업대학 학생을 대상으로 데이터를 수집하였으며, 구조 방정식 모델링을 통해 가설 관계와 매개 효과를 검증하였다. 연구 결과, 교사 지원과 AI 문해력은 개인 최선 목표 및 참여와 긍정적인 상관관계를 보였으며, 개인 최선 목표는 참여와 긍정적인 상관관계를 가지며 교사 지원과 AI 문해력과 참여를 연결하는 동기적 상관관계로 작용하였다. 본 연구는 직업대학 학생들의 AI 지원 언어 학습 참여에 대한 연구의 중요한 공백을 메우며, AI 지원 직업 영어 교육 설계에 기여할 수 있는 통찰을 제공한다.\n\n# Research Logic\n## Problem\nAI 지원 영어 학습 환경에서의 학생 참여를 이해하는 데 있어 기존 연구의 공백.\n## Theory\n목표 설정 이론을 기반으로 한 연구.\n## Design\n구조 방정식 모델링을 사용하여 가설 관계를 검증.\n## Findings\n교사 지원과 AI 문해력이 개인 최선 목표 및 참여에 긍정적인 영향을 미침.\n## Conclusion\nAI 지원 영어 학습에서 교사 지원과 AI 문해력이 참여를 증진시키는 중요한 요소임을 확인.\n\n# Key Findings\n- 교사 지원과 AI 문해력은 개인 최선 목표에 긍정적인 영향을 미친다.\n- 개인 최선 목표는 참여와 긍정적인 상관관계를 가진다.\n- 개인 최선 목표는 교사 지원과 AI 문해력과 참여를 연결하는 매개 역할을 한다.\n\n# Contributions\n## Theoretical\n목표 설정 이론을 기반으로 한 새로운 통찰 제공.\n## Methodological\n구조 방정식 모델링을 통한 데이터 분석 방법론 제시.\n## Practical\nAI 지원 직업 영어 교육 설계에 대한 실질적인 기여.\n\n# Limitations\n- 연구의 시기 및 출처가 명시되지 않음.\n- 표본이 중국 직업대학 학생으로 한정되어 일반화에 제한이 있을 수 있음.\n\n# Transferable Insights\n- AI 문해력과 교사 지원의 중요성을 강조하는 교육적 통찰.\n- 직업 교육 맥락에서 AI 지원 학습의 효과성을 높이기 위한 전략 제안.\n\n# Idea Seeds\n1. AI 문해력 향상을 위한 교사 연수 프로그램 개발.\n2. AI 지원 학습 환경에서의 참여 증진을 위한 개인 최선 목표 설정 전략 연구.\n3. 다양한 교육 맥락에서의 AI 지원 학습 효과 비교 연구.\n\n# Citation Snippets\n>\n\ntags: #human-ai_collaboration, #classroom_ai, #ai_tutoring, #instructional_design, #scaffolding, #tpack, #ai_literacy, #teacher_ai, #education, #learning_analytics, #llm_classroom, #ai_pedagogy\n\n---\n\n요약: 본 연구는 AI 지원 영어 학습에서 교사 지원과 AI 문해력이 참여에 미치는 영향을 분석하였다. 573명의 중국 직업대학 학생을 대상으로 한 구조 방정식 모델링 결과, 교사 지원과 AI 문해력이 개인 최선 목표 및 참여에 긍정적인 영향을 미친다는 것을 확인하였다.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Yaoqing Xi", "Bin Xue"], "categories": ["ERIC"]}, {"id": "1", "source": "ERIC", "score": 27, "day": "명시되지 않음", "title": "Game-Based Learning for Asynchronous AI Literacy Course: Approach to Improve Students' Cognitive, Behavioural, Affective, and Ethical Learning of AI", "content": "---\ntitle: Game-Based Learning for Asynchronous AI Literacy Course: Approach to Improve Students' Cognitive, Behavioural, Affective, and Ethical Learning of AI\nauthors: Jinhee Kim, Guang Yang, Wing Sha Chan, Xi Lin, Yukyeong Song, Na Li\nyear: 명시되지 않음\njournal: ERIC\ndoi: 명시되지 않음\nresearch_type: 혼합 방법 연구\nmethodology: 설문조사 및 인터뷰\ndata_type: 양적 및 질적 데이터\nsample: 4898명의 1학년 학부생\ncontext: 고등 교육에서의 AI 리터러시 교육\ntheoretical_framework: 명시되지 않음\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 다양한 전공의 4898명의 1학년 학부생을 대상으로 한 의무적인 비동기 AI 리터러시 과정에서 게임 기반 학습(GBL)의 대규모 사용을 조사하였다. 혼합 방법 설계를 통해 311개의 유효한 사전 및 사후 설문 응답과 20개의 인터뷰를 분석하였다. 연구 결과, 인지적, 행동적, 정서적 차원에서 AI 리터러시의 유의미한 향상이 나타났으나, 윤리적 학습의 향상은 통계적으로 유의하지 않았다. 질적 결과는 GBL이 학생들의 인식적 호기심과 AI 윤리에 대한 참여를 자극했음을 보여주며, 교육적, 기술적, 학습자 중심의 도전 과제를 드러냈다. 본 연구는 대규모 경험적 증거를 제공하고 고등 교육에서 AI 리터러시 통합을 위한 교수 설계 프레임워크를 제안한다.\n\n# Research Logic\n## Problem\n고등 교육에서 AI 리터러시를 확장하는 데 지속적인 도전이 존재함.\n## Theory\n게임 기반 학습이 AI 리터러시 교육에 미치는 영향에 대한 기존 연구의 격차를 다룸.\n## Design\n혼합 방법 연구 설계를 통해 양적 및 질적 데이터를 수집.\n## Findings\n인지적, 행동적, 정서적 차원에서 AI 리터러시의 유의미한 향상, 윤리적 학습은 유의하지 않음.\n## Conclusion\nGBL이 학생들의 AI 윤리에 대한 참여를 자극하며, 교수 설계 프레임워크의 필요성을 제안.\n\n# Key Findings\n- GBL을 통한 AI 리터러시의 인지적, 행동적, 정서적 향상.\n- 윤리적 학습의 향상은 통계적으로 유의하지 않음.\n- GBL이 학생들의 인식적 호기심과 참여를 자극함.\n\n# Contributions\n## Theoretical\nGBL의 효과에 대한 새로운 경험적 증거 제공.\n## Methodological\n혼합 방법 연구 설계를 통한 데이터 수집 및 분석.\n## Practical\nAI 리터러시 교육을 위한 교수 설계 프레임워크 제안.\n\n# Limitations\n- 연구의 특정 맥락에 국한된 결과.\n- 윤리적 학습 향상에 대한 통계적 유의성 부족.\n\n# Transferable Insights\n- GBL이 다양한 전공의 학생들에게 효과적일 수 있음.\n- AI 리터러시 교육에서의 교수 설계의 중요성.\n\n# Idea Seeds\n1. GBL을 활용한 AI 윤리 교육 프로그램 개발.\n2. 다양한 전공 학생들을 위한 맞춤형 AI 리터러시 과정 설계.\n3. AI 리터러시 향상을 위한 추가적인 질적 연구 필요.\n\n# Citation Snippets\n>\n\ntags: #human-ai_collaboration, #classroom_ai, #ai_tutoring, #instructional_design, #scaffolding, #tpack, #ai_literacy, #teacher_ai, #education, #learning_analytics, #llm_classroom, #ai_pedagogy\n\n---\n\n짧은 요약: 본 연구는 4898명의 1학년 학부생을 대상으로 한 비동기 AI 리터러시 과정에서 게임 기반 학습의 효과를 조사하였다. 인지적, 행동적, 정서적 차원에서 AI 리터러시의 유의미한 향상이 나타났으나, 윤리적 학습의 향상은 통계적으로 유의하지 않았다. 연구는 GBL이 학생들의 참여를 자극하며, AI 리터러시 통합을 위한 교수 설계 프레임워크를 제안한다.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Jinhee Kim", "Guang Yang", "Wing Sha Chan"], "categories": ["ERIC"]}, {"id": "2", "source": "OPENALEX", "score": 18, "day": "2026-03-16", "title": "Impact of Digital Learning Tools on the Academic Performance of Elementary Students: A Study in the Context of Lahore, Pakistan", "content": "---\ntitle: 초등학생의 학업 성취도에 대한 디지털 학습 도구의 영향: 파키스탄 라호르 맥락에서의 연구\nauthors: [Noor ul Ain Riaz, Misbah Malik, Saman Riaz, Muhammad Mujeeb Riaz]\nyear: 2026\njournal: ACADEMIA International Journal for Social Sciences\ndoi: 10.63056/academia.5.3(s7).2026.2073\nresearch_type: 질적 연구\nmethodology: 반구조화 인터뷰\ndata_type: 질적 데이터\nsample: 12명의 초등학교 교사\ncontext: 파키스탄 라호르의 사립학교\ntheoretical_framework: 구성주의 학습 이론, 기술 수용 모델(TAM)\nkeywords: [디지털 학습 도구, 초등 교육, 학업 성취도, 교사 인식, 구성주의, 기술 수용 모델, 파키스탄]\n\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 파키스탄 라호르의 사립학교에서 1-5학년 학생들의 학업 성취도에 대한 디지털 학습 도구의 영향을 조사하였다. 질적 해석주의 접근법을 사용하여 5개 사립학교 네트워크의 12명의 초등학교 교사와 반구조화 인터뷰를 진행하였다. 연구는 구성주의 학습 이론과 기술 수용 모델(TAM)을 이론적 틀로 사용하였으며, 주제 분석을 통해 학생 참여 증대, 시각적 및 다중 모달 디지털 자원의 활용, 교사의 적응 문제, 디지털 산만함, 인프라 문제, 부모의 디지털 리터러시와 가정 학습 환경의 조절 효과 등 6개의 주요 주제를 도출하였다. 결과는 디지털 학습 도구의 영향이 교사의 역량, 교육 설계 품질, 학교 지원 및 맥락의 조합에 의해 매개된다는 것을 보여준다.\n\n# Research Logic\n## Problem\n디지털 학습 도구의 효과에 대한 체계적이고 지역 기반의 증거 부족.\n## Theory\n구성주의 학습 이론과 기술 수용 모델(TAM)을 기반으로 한 연구.\n## Design\n반구조화 인터뷰를 통한 질적 데이터 수집.\n## Findings\n디지털 학습 도구가 학생 참여와 학업 성취도에 긍정적인 영향을 미침.\n## Conclusion\n교사의 전문성 개발과 교육적 설계의 질이 디지털 도구의 효과를 극대화하는 데 중요함.\n\n# Key Findings\n- 디지털 학습 도구 사용이 학생 참여를 유의미하게 증가시킴.\n- 교사의 적응 문제와 교육적 전문성 개발의 필요성이 강조됨.\n- 부모의 디지털 리터러시가 학생의 학업 성취도에 조절 효과를 미침.\n\n# Contributions\n## Theoretical\n구성주의 학습 이론과 기술 수용 모델을 통한 새로운 통찰 제공.\n## Methodological\n질적 연구를 통해 지역적 맥락에서의 증거 기반 제공.\n## Practical\n교사의 전문성 개발과 교육 설계의 중요성을 강조함.\n\n# Limitations\n- 연구 샘플이 제한적이며, 특정 지역에 국한됨.\n- 질적 연구의 특성상 일반화에 한계가 있음.\n\n# Transferable Insights\n- 디지털 학습 도구의 효과는 교사의 역량에 따라 달라짐.\n- 교육적 설계의 질이 학생 학습에 미치는 영향이 중요함.\n\n# Idea Seeds\n1. 디지털 학습 도구의 효과를 측정하기 위한 양적 연구 필요.\n2. 교사 전문성 개발 프로그램의 설계 및 평가 연구.\n3. 부모의 디지털 리터러시 향상을 위한 프로그램 개발.\n\n# Citation Snippets\n> Riaz, N. U. A., Malik, M., Riaz, S., & Riaz, M. M. (2026). 초등학생의 학업 성취도에 대한 디지털 학습 도구의 영향: 파키스탄 라호르 맥락에서의 연구. ACADEMIA International Journal for Social Sciences, 5(3), 253-267. https://doi.org/10.63056/academia.5.3(s7).2026.2073\n\ntags: #디지털학습도구, #초등교육, #학업성취도, #교사인식, #구성주의, #기술수용모델, #파키스탄\n\n---\n\n요약: 본 연구는 파키스탄 라호르의 사립학교에서 디지털 학습 도구가 초등학생의 학업 성취도에 미치는 영향을 조사하였다. 질적 연구를 통해 교사들의 인식을 분석하였으며, 디지털 도구의 효과는 교사의 전문성과 교육 설계의 질에 의해 매개된다는 결과를 도출하였다.", "link": "https://doi.org/10.63056/academia.5.3(s7).2026.2073", "altLink": "https://openalex.org/W7164019086", "hasDoi": true, "hasReview": true, "authors": ["Noor ul Ain Riaz", "Misbah Malik", "Saman Riaz"], "categories": ["Mathematics education", "Context (archaeology)", "Digital literacy", "Thematic analysis", "Pedagogy"]}, {"id": "3", "source": "ARXIV", "score": 15, "day": "2026-06-10", "title": "Hey Chat, Can You Teach Me? Structuring Socratic Dialogue for Human Learning in the Wild", "content": "---\ntitle: Hey Chat, Can You Teach Me? Structuring Socratic Dialogue for Human Learning in the Wild\nauthors: [Sidney Tio, Arunesh Sinha, Pradeep Varakantham]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2606.11744v1\nresearch_type: 실험적 연구\nmethodology: 강화 학습 기반 시스템\ndata_type: 대화 데이터\nsample: STEM 및 비-STEM 주제\ncontext: 비구조적 학습 환경\ntheoretical_framework: 소크라틱 대화, 지식 그래프\nkeywords: [human-ai collaboration, ai tutoring, instructional design, scaffolding, ai literacy, education, learning analytics, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 대규모 언어 모델(LLM)이 비구조적 대화를 통해 학습을 지원하는 방식의 한계를 분석하고, 이를 해결하기 위한 새로운 튜터링 시스템을 제안한다. 기존의 LLM은 학생의 지식 상태를 추론하고 커리큘럼을 구성하는 데 어려움을 겪는다. 연구진은 학생의 질문을 기반으로 지식 그래프를 생성하고, 이를 통해 커리큘럼의 순서를 결정하는 경량화된 정책을 도입하였다. 이 시스템은 소크라틱 대화를 통해 학생의 이해도를 평가하고, STEM 및 비-STEM 주제에서 기존 모델보다 우수한 성과를 보였다. 명시된 커리큘럼 구조는 모델의 크기를 확장하는 것만으로는 얻을 수 없는 성과를 제공한다.\n\n# Research Logic\n## Problem\n대규모 언어 모델이 비구조적 대화에서 학생의 지식 상태를 추론하고 커리큘럼을 효과적으로 구성하는 데 어려움이 있다.\n\n## Theory\n소크라틱 대화와 지식 그래프를 활용하여 학생의 이해도를 평가하고, 커리큘럼의 순서를 결정하는 새로운 접근 방식을 제안한다.\n\n## Design\n학생의 질문을 기반으로 지식 그래프를 생성하고, 강화 학습을 통해 커리큘럼 순서를 결정하는 경량화된 정책을 개발하였다.\n\n## Findings\n제안된 시스템은 기존의 휴리스틱 기준선 및 일반 목적 모델보다 학생의 커리큘럼 마스터리 속도와 대화 턴 수에서 우수한 성과를 보였다.\n\n## Conclusion\n명시된 커리큘럼 구조는 LLM의 성능을 향상시키며, 비구조적 학습 환경에서 효과적인 튜터링을 가능하게 한다.\n\n# Key Findings\n- 제안된 시스템은 학생의 질문을 기반으로 지식 그래프를 생성하여 커리큘럼을 구성한다.\n- 소크라틱 대화를 통해 학생의 이해도를 평가하고, 이를 바탕으로 다음 학습 주제를 결정한다.\n- 기존의 LLM보다 학생의 커리큘럼 마스터리 속도가 향상되었다.\n\n# Contributions\n## Theoretical\n소크라틱 대화와 지식 그래프를 활용한 새로운 튜터링 모델을 제안하였다.\n\n## Methodological\n강화 학습 기반의 경량화된 정책을 통해 커리큘럼 순서를 결정하는 방법론을 개발하였다.\n\n## Practical\n비구조적 학습 환경에서 LLM을 활용한 효과적인 튜터링 시스템을 구현하였다.\n\n# Limitations\n- 연구는 특정 STEM 및 비-STEM 주제에 국한되어 있다.\n- 시스템의 일반화 가능성에 대한 추가 연구가 필요하다.\n\n# Transferable Insights\n- 지식 그래프를 활용한 커리큘럼 구성 방식은 다양한 교육 환경에 적용 가능하다.\n- 소크라틱 대화 방식은 학생의 이해도를 평가하는 데 효과적이다.\n\n# Idea Seeds\n1. 다양한 주제에 대한 지식 그래프를 확장하여 시스템의 적용 범위를 넓힐 수 있다.\n2. 소크라틱 대화의 효과를 평가하기 위한 실험적 연구를 진행할 수 있다.\n3. LLM의 성능을 향상시키기 위한 추가적인 커리큘럼 구조 연구를 수행할 수 있다.\n\n# Citation Snippets\n> Tio, S., Sinha, A., & Varakantham, P. (2026). Hey Chat, Can You Teach Me? Structuring Socratic Dialogue for Human Learning in the Wild. arXiv. https://arxiv.org/abs/2606.11744v1\n\ntags: #human-ai collaboration, #ai tutoring, #instructional design, #scaffolding, #ai literacy, #education, #learning analytics, #ai pedagogy", "link": "https://arxiv.org/abs/2606.11744v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Sidney Tio", "Arunesh Sinha", "Pradeep Varakantham"], "categories": ["cs.CL", "cs.AI"]}, {"id": "4", "source": "ARXIV", "score": 12, "day": "2026-06-10", "title": "Semantic Grading of Written Answers in Low-Resource Language Bangla Using a Fine-Tuned Lightweight Language Model", "content": "---\ntitle: \"Semantic Grading of Written Answers in Low-Resource Language Bangla Using a Fine-Tuned Lightweight Language Model\"\nauthors: \n  - Meherun Farzana\n  - Aniket Joarder\n  - Mahmudul Hasan\n  - Md. Mosaddek Khan\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2606.11931v1\nresearch_type: 실험적 연구\nmethodology: QLoRA로 미세 조정된 경량 언어 모델을 사용한 자동 평가 시스템 개발\ndata_type: 합성 데이터셋\nsample: 122,710개의 질문-참조 쌍\ncontext: 방글라어 교육 환경\ntheoretical_framework: 의미적 정확성을 우선시하는 평가 시스템\nkeywords: [Bangla, 자동 평가, 의미적 정확성, 교육 NLP, 경량 언어 모델]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 방글라어의 저자원 교육 환경을 위한 이중 언어 평가 시스템을 제안한다. 이 시스템은 의미적 정확성을 우선시하며, 경량 언어 모델을 미세 조정하여 학생의 답변을 평가하고 점수와 피드백을 생성한다. 연구 결과, QLoRA로 미세 조정된 Qwen3-8B 모델이 인간 평가자와의 일치도에서 0.936의 상관계수를 기록하며, 가장 높은 피드백 신뢰도를 보였다(RoRa = 0.819). 이 시스템은 방글라어 교육에서의 자동 평가의 필요성을 충족시키고, 교사들이 더 나은 피드백을 제공할 수 있도록 지원한다.\n\n# Research Logic\n## Problem\n방글라어는 교육 NLP 연구에서 소외되어 있으며, 많은 지역에서 자격을 갖춘 교사의 접근이 제한되어 있다. 이로 인해 수작업으로 채점하는 경우가 많아 피드백이 지연되고 일관성이 결여된다.\n\n## Theory\n기존의 자동 평가 시스템은 주로 표면적 일치에 의존하였으나, 본 연구는 의미적 정확성을 중심으로 한 평가 접근 방식을 채택하였다.\n\n## Design\n이 연구는 QLoRA로 미세 조정된 경량 언어 모델을 사용하여 질문, 참조 답변, 학생 답변을 기반으로 점수와 피드백을 생성하는 시스템을 설계하였다.\n\n## Findings\nQLoRA로 미세 조정된 Qwen3-8B 모델은 인간 평가자와의 상관관계에서 0.936을 기록하였으며, MAE는 0.725로 나타났다. 또한, 피드백의 신뢰도(RoRa)는 0.819로 확인되었다.\n\n## Conclusion\n본 연구는 방글라어 교육 환경에서의 자동 평가 시스템의 필요성을 강조하며, 교사들이 보다 효율적으로 학생의 답변을 평가할 수 있도록 지원하는 방법을 제시하였다.\n\n# Key Findings\n- QLoRA로 미세 조정된 Qwen3-8B 모델이 인간 평가자와의 높은 일치도를 보였다(상관계수 0.936).\n- 피드백의 신뢰도는 0.819로, 의미적 정확성을 우선시하는 평가의 효과를 입증하였다.\n- 합성 데이터셋을 통해 다양한 학생 답변 변형을 생성하고 평가하였다.\n\n# Contributions\n## Theoretical\n의미적 정확성을 중심으로 한 새로운 평가 모델을 제안하여 교육 NLP 연구에 기여하였다.\n\n## Methodological\nQLoRA를 활용한 경량 언어 모델의 미세 조정 방법론을 개발하였다.\n\n## Practical\n방글라어 교육 환경에서의 자동 평가 시스템을 통해 교사들이 보다 효율적으로 학생의 답변을 평가할 수 있는 실용적인 도구를 제공하였다.\n\n# Limitations\n- 방글라어 교육 자료의 부족으로 인해 합성 데이터셋의 품질이 제한적일 수 있다.\n- 시스템의 배포가 저자원 환경에서의 실제 적용에 대한 추가적인 검증이 필요하다.\n\n# Transferable Insights\n- 저자원 언어 환경에서도 효과적인 자동 평가 시스템을 구축할 수 있는 가능성을 보여준다.\n- 의미적 정확성을 우선시하는 평가 접근 방식이 교육 현장에서의 피드백 품질을 향상시킬 수 있음을 시사한다.\n\n# Idea Seeds\n1. 다른 저자원 언어에 대한 유사한 평가 시스템 개발.\n2. 학생의 답변에 대한 개인화된 피드백 생성 방법 연구.\n3. 교사와 학생 간의 상호작용을 증진시키는 AI 기반 도구 개발.\n\n# Citation Snippets\n> Farzana, M., Joarder, A., Hasan, M., & Khan, M. M. (2026). Semantic Grading of Written Answers in Low-Resource Language Bangla Using a Fine-Tuned Lightweight Language Model. arXiv. https://arxiv.org/abs/2606.11931v1\n\ntags: #Bangla, #자동_평가, #의미적_정확성, #교육_NLP, #경량_언어_모델, #합성_데이터셋, #QLoRA\n\n---\n\n요약: 본 연구는 방글라어 교육 환경을 위한 이중 언어 평가 시스템을 제안하며, QLoRA로 미세 조정된 경량 언어 모델을 사용하여 학생의 답변을 평가하고 피드백을 생성한다. 연구 결과, 이 시스템은 인간 평가자와의 높은 일치도를 보이며, 방글라어 교육에서의 자동 평가의 필요성을 충족시킨다.", "link": "https://arxiv.org/abs/2606.11931v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Meherun Farzana", "Aniket Joarder", "Mahmudul Hasan"], "categories": ["cs.CL"]}, {"id": "5", "source": "ARXIV", "score": 11, "day": "2026-06-10", "title": "Identifying cybersickness causes in virtual reality games using symbolic machine learning algorithms", "content": "Virtual reality (VR) and head-mounted displays are constantly gaining popularity in various fields such as education, military, entertainment, and health. Although such technologies provide a high sense of immersion, they can also trigger symptoms of discomfort. This condition is called cybersickness (CS) and is quite popular in recent virtual reality publications. This work proposes a novel experimental analysis using symbolic machine learning to rank potential causes of CS in VR games. We estimate CS causes and rank them according to their impact using classical machine learning. Experiments are performed using two virtual reality games and 6 experimental protocols along with 37 valid samples from a total of 88 volunteers. Our results show that rotation and acceleration triggered cybersickness more frequently in a flight game in contrast to a race game. We could also observe that subjects that are less experienced with VR are more prone to feel discomfort. Former experience plays a more important role on the race game, as this game provides more liberty to the user in terms of controllers, more displacement alternatives and a more user-controlled acceleration. Furthermore, different causes that trigger discomfort arise based on short or long term VR exposures. We suggest strategies for mitigating CS for these two scenarios: short and long term exposure experiences and compare the two highlighted scenarios (race and flight).", "link": "https://arxiv.org/abs/2606.12214v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Thiago Porcino", "Erick Oliveira Rodrigues", "Flavia Bernardini"], "categories": ["cs.HC", "cs.GR"]}, {"id": "6", "source": "ARXIV", "score": 8, "day": "2026-06-10", "title": "IntElicit: Eliciting and Assessing Contextualized Creativity via Dialogue Policy Optimization", "content": "Contextualized assessment offers high ecological validity for evaluating creativity but introduces a critical challenge: observed performance may be confounded with cognitive proficiency (domain knowledge) and agency (willingness to engage). Meanwhile, in the age of generative AI, creative problem solving increasingly occurs in tool-mediated and human--AI interactive environments, making fully static assessment less aligned with contemporary creative practice. To address these issues, this paper proposes IntElicit, a framework for eliciting and assessing contextualized creativity via dialogue policy optimization. IntElicit functions as a constrained adaptive AI Interviewer: it provides non-directive knowledge and agency scaffolds in multi-turn interaction to reduce non-creative confounders, while preserving participants' responsibility for generating the creative content being evaluated. Specifically, to tackle sparse rewards and potential reward hacking (e.g., answer dictation) in open-ended educational dialogue, IntElicit introduces a decomposed process reward mechanism. This mechanism aligns the policy with pedagogical elicitation, rewarding prompts that draw out participant reasoning rather than producing optimal answers on their behalf. Extensive experiments, including participant simulation and a human subject study (N=64), show that IntElicit improves elicited creative outcomes over expert-designed baselines. Together, the results suggest that interactive elicitation can reveal creative potential that static FPSP-style assessment may miss, providing a formative and diagnostic lens for contextualized creativity assessment in AI-mediated learning contexts.", "link": "https://arxiv.org/abs/2606.12086v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Mingjia Li", "Jin Wu", "Hong Qian"], "categories": ["cs.AI", "cs.LG"]}, {"id": "7", "source": "ARXIV", "score": 6, "day": "2026-06-10", "title": "Agents All the Way Down; A Methodology for Building Custom AI Agents from Substrate to Production", "content": "Custom AI agents areagents that live inside their own   application, talk to their own data and tools, enforce their own security boundaries,   and carry their own brand and audit trail. What separates them from the general-purpose   tier is fit, not capability: each is built for one job, by the   engineer who will maintain it. No published practice sets out how to build one end to   end. The pieces are everywhere (function-calling APIs, the Model Context Protocol, code   agents to pair with), but the practice that chains them lives in podcasts, blogs, and   leaked system prompts. This paper writes that practice down as a methodology, Agents All   the Way Down: two preconditions crossed once and kept, then three practices repeated   for the agent's life. The preconditions are (P1) Substrate, the LLM as a software   component, framed as tools, then system, then messages under prompt-caching; and (P2)   Building blocks: function calling, MCP, CLI orchestration, the liteshell pattern, the   agent loop, skills, characters, hooks, and scaffolding. The practices are (P3) prototype   with a general-purpose agent; (P4) harvest, fold, and ship the result as a CLI, the   Turtle pattern; and (P5) agent-tests-agent, in which a general-purpose agent drives it   through behavioural scenarios, a complement to classical testing, not a replacement. The   working loop is P3 to P4 to P5 and back, and one corollary falls out for free:   multi-agent orchestration is just CLI composition. The methodology is framework-free by   construction. It was distilled from the AAC, a custom agent for the open-source LAMB   platform, built in about ten days by one developer with an AI pair-programmer and in   production . We present it as a transferable practice, independent of any language or framework.", "link": "https://arxiv.org/abs/2606.11869v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Marc Alier Forment", "Juanan Pereira", "Francisco José García-Peñalvo"], "categories": ["cs.SE", "cs.AI"]}, {"id": "8", "source": "ARXIV", "score": 6, "day": "2026-06-10", "title": "Can AI Reason Like an Urban Planner? Benchmarking Large Language Models Against Professional Judgment", "content": "Problem, Research Strategy, and Findings: The rise of large language models (LLMs) raises a key question for urban planning: which forms of professional planning knowledge can AI replicate, and which still require human judgment? Although AI tools are increasingly used in planning practice, there is still no systematic framework for testing whether they can reason with the contextual sensitivity, value awareness, and institutional literacy central to planning expertise. This paper introduces Urban Planning Bench (UPBench), a domain-specific evaluation framework that assesses LLM reasoning through a 4x5 matrix of four knowledge pillars and five cognitive levels adapted from Bloom's revised taxonomy. Evaluating 25 LLMs with automated scoring and expert review, we find a non-monotonic cognitive curve: models perform better on higher-order analytical tasks than on factual recall and integrative judgment. This suggests that planning knowledge often treated as lower-order is deeply shaped by institutional, jurisdictional, and temporal context, making it hard for LLMs to generalize. We summarize these limits as four epistemic diagnostics: regulatory hallucination, conceptual conflation, wickedness paralysis, and phronetic deficit.   Takeaway for Practice: The findings support differential delegation in planning. LLMs can assist with cross-disciplinary synthesis, literature review, scenario generation, and preliminary policy analysis. However, they remain unreliable for jurisdiction-specific regulation, normative conflict resolution, and context-sensitive procedure. Agencies should require verification for AI-assisted regulatory analysis, while planning education should emphasize institutional literacy, normative judgment, and contextual sensitivity.", "link": "https://arxiv.org/abs/2606.11678v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Yijie Deng", "He Zhu", "Wen Wang"], "categories": ["cs.CL"]}, {"id": "9", "source": "ARXIV", "score": 6, "day": "2026-06-08", "title": "Regimes: An Auditable, Held-Out-Gated Improvement Loop Demonstrated on LongMemEval with ActiveGraph", "content": "Autonomous improvement loops are hard to trust because the improvement process is usually external scaffolding bolted onto the agent: failures go unlogged, diagnoses cannot be replayed, and promote-or-discard decisions land in a side database rather than the agent's own history. We show that an event-sourced agent runtime removes that friction and turns controlled improvement into a first-class workflow. When the agent's state is a deterministic projection of an append-only event log, failures are recorded, a run replays exactly from its log, candidate patches scope to typed pipeline seams, gates are auditable, and every promotion or discard is itself an event. We demonstrate this with Regimes, a loop on the ActiveGraph runtime that diagnoses failed evaluations, proposes a repair at a pipeline point, and promotes it only after static checks, sandbox execution, in-sample evaluation, and held-out validation. The loop is target-agnostic: the same control flow runs against different tasks through a common interface. On LongMemEval-S the dominant failure is not retrieval but reconciliation: the evidence is already in the assembled context, yet the reader answers incorrectly. Across five seeded held-out splits, Regimes discovers reader-prompt repairs that improve final held-out accuracy by +0.05 to +0.10 in four splits and +0.01 in one over-promotion split; two splits are individually significant (seed 5 unadjusted for its sequential promotion structure), and the pooled count is descriptive only, since the splits share one 500-question pool. The durable contributions are ActiveGraph as an auditable substrate that makes controlled improvement loops tractable, the held-out-gated loop it supports, the failure-regime taxonomy routing each failure to a pipeline location (whose marginal value over an unrouted baseline is the primary open question), and the prompt-as-discovery-probe hypothesis.", "link": "https://arxiv.org/abs/2606.10241v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Yohei Nakajima"], "categories": ["cs.AI"]}];
let PAGE_SIZE = 10;
let currentTab = 'all';
let currentSource = 'ALL';
let currentSort = 'score';
let currentPage = 1;
let currentCategory = '';
let currentMinDate = '';
let currentMaxDate = '';
let hideVisited = false;
let filtered = [];
let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
let searchHistory = JSON.parse(localStorage.getItem('searchHistory')) || [];
let visited = JSON.parse(localStorage.getItem('visited')) || [];

function toggleTheme() {
  const html = document.documentElement;
  const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
  html.dataset.theme = next;
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  localStorage.setItem('theme', next);
}

function toggleTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSource(btn) {
  currentSource = btn.dataset.source;
  document.querySelectorAll('#sourceFilters .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSort(btn) {
  currentSort = btn.dataset.sort;
  document.querySelectorAll('#sortGroup .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  render();
}

function toggleFavorite(id, e) {
  e.stopPropagation();
  const idx = favorites.indexOf(id);
  if (idx === -1) {
    favorites.push(id);
  } else {
    favorites.splice(idx, 1);
  }
  localStorage.setItem('favorites', JSON.stringify(favorites));
  applyFilters();
}

function recordVisit(id) {
  if (!visited.includes(id)) {
    visited.push(id);
  }
  localStorage.setItem('visited', JSON.stringify(visited));
}

function recordSearch(query) {
  if (query.trim() && !searchHistory.includes(query)) {
    searchHistory.unshift(query);
    if (searchHistory.length > 10) searchHistory.pop();
    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
  }
}

function downloadJSON() {
  const data = JSON.stringify(filtered, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadCSV() {
  const headers = ['제목', '출처', '스코어', '리뷰여부', '링크'];
  const rows = filtered.map(p => [
    '"' + p.title.replace(/"/g, '""') + '"',
    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
