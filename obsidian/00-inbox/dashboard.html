<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-03-09 23:29</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "OPENALEX", "score": 23, "day": "2026-02-24", "title": "Reconceptualizing Teacher Education and Lifelong learning in the era of Artificial Intelligence.", "content": "---\ntitle: 인공지능 시대의 교사 교육 및 평생 학습 재구성\nauthors: Sarnendu Rakshit\nyear: 2026\njournal: International Journal for Multidisciplinary Research (IJFMR)\ndoi: https://openalex.org/W7131634474\nresearch_type: 문헌 리뷰\nmethodology: 체계적 문헌 검토\ndata_type: 문헌\nsample: 2020-2025년 발표된 동료 검토 저널 기사\ncontext: 인공지능이 교육 생태계에 미치는 영향\ntheoretical_framework: TPACK, 성인 학습 이론, 변혁적 학습 이론, AI 윤리 프레임워크\nkeywords: [인공지능, 교사 교육, 평생 학습, AI 윤리, 전문성 개발]\n---\n\n# APA 7th style\n\n# Summary\n이 연구는 인공지능(AI)이 교사 교육 및 평생 학습에 미치는 영향을 비판적으로 반영하며, 최근 연구의 체계적 검토와 강력한 이론적 통합을 통해 AI의 역할을 탐구한다. 연구는 TPACK, 성인 학습 이론, 변혁적 학습 이론 및 AI 윤리 프레임워크에 중점을 두고 있으며, AI의 변형 능력은 교육적으로 기반을 두고 윤리적으로 관리되며 전문적으로 개입된 구현에 의존한다고 주장한다. 주요 발견은 AI가 개인화된 교사 준비를 풍부하게 하고, 긍정적인 반성과 실천을 통해 평생 전문 학습을 확장한다는 것이다. 그러나 알고리즘 편향, 기술 저하, 데이터 감시에 대한 위험이 여전히 주요 우려 사항으로 남아 있다. 연구는 AI가 교사의 역량을 향상시키는 전문적 증강 시스템으로 기능해야 한다고 결론짓는다.\n\n# Research Logic\n## Problem\nAI의 급속한 발전이 교사 교육 및 평생 학습에 미치는 영향과 그에 따른 도전 과제를 탐구한다.\n## Theory\nTPACK, 성인 학습 이론, 변혁적 학습 이론 및 AI 윤리 프레임워크를 통합하여 AI의 교육적 역할을 설명한다.\n## Design\n체계적 문헌 검토를 통해 2020-2025년 발표된 연구를 분석한다.\n## Findings\nAI는 개인화된 교사 준비를 강화하고 평생 학습을 확장하지만, 알고리즘 편향과 같은 위험이 존재한다.\n## Conclusion\nAI는 교사의 역량을 증대시키는 전문적 도구로 기능해야 하며, 단순한 대체 수단이 되어서는 안 된다.\n\n# Key Findings\n- AI는 개인화된 교사 준비를 풍부하게 한다.\n- AI는 평생 전문 학습을 확장하는 데 기여한다.\n- 알고리즘 편향과 데이터 감시 등의 위험이 존재한다.\n\n# Contributions\n## Theoretical\nAI와 교육의 통합에 대한 새로운 이론적 통찰을 제공한다.\n## Methodological\n체계적 문헌 검토 방법론을 통해 연구의 신뢰성을 높인다.\n## Practical\nAI를 활용한 교사 교육 및 평생 학습의 실천적 접근 방안을 제시한다.\n\n# Limitations\n- 연구는 특정 기간(2020-2025)의 문헌에 국한된다.\n- AI의 실제 적용 사례에 대한 구체적인 데이터 부족.\n\n# Transferable Insights\n- AI는 교육적 맥락에서 교사의 전문성을 증대시킬 수 있는 잠재력을 지닌다.\n- AI 통합 시 윤리적 고려가 필수적이다.\n\n# Idea Seeds\n1. AI 기반의 교사 교육 프로그램 개발.\n2. 알고리즘 편향을 줄이기 위한 윤리적 가이드라인 마련.\n3. AI를 활용한 개인화된 평생 학습 플랫폼 구축.\n\n# Citation Snippets\n> Rakshit, S. (2026). 인공지능 시대의 교사 교육 및 평생 학습 재구성. International Journal for Multidisciplinary Research (IJFMR).\n\ntags: #인공지능, #교사교육, #평생학습, #AI윤리, #전문성개발, #TPACK, #변혁적학습\n\n---\n\n요약: 이 연구는 인공지능이 교사 교육과 평생 학습에 미치는 영향을 비판적으로 분석하며, AI의 역할이 교육적이고 윤리적으로 관리되어야 함을 강조한다. AI는 개인화된 교사 준비를 강화하고 평생 학습을 확장하는 데 기여하지만, 알고리즘 편향과 같은 위험이 존재한다.", "link": "https://doi.org/10.36948/ijfmr.2026.v08i01.69724", "altLink": "https://openalex.org/W7131634474", "hasDoi": true, "hasReview": true, "authors": ["Sarnendu Rakshit"], "categories": ["Lifelong learning", "Transformative learning", "Pedagogy", "Curriculum", "Thematic analysis"]}, {"id": "1", "source": "OPENALEX", "score": 20, "day": "2026-02-24", "title": "Generative AI as a Collaborative Partner Empowering Tanzanian Secondary School Teachers to Deliver Personalised Learning and Overcome Barriers to Equitable Adoption", "content": "---\ntitle: Generative AI as a Collaborative Partner Empowering Tanzanian Secondary School Teachers to Deliver Personalised Learning and Overcome Barriers to Equitable Adoption\nauthors: Juliana Kamaghe\nyear: 2026\njournal: 명시되지 않음\ndoi: 명시되지 않음\nresearch_type: 혼합 방법 연구\nmethodology: 수렴적 병행 혼합 방법 설계\ndata_type: 정량적 및 정성적 데이터\nsample: 120명의 교사\ncontext: 탄자니아 다르에스살람 및 도도마\ntheoretical_framework: 명시되지 않음\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 탄자니아의 중학교 교사들이 생성적 AI를 활용하여 개인화된 학습 경로를 보다 효율적이고 효과적으로 제공할 수 있는 방법을 탐구한다. 연구는 정량적 실험 요소와 정성적 데이터를 통합한 수렴적 병행 혼합 방법 설계를 사용하였다. 120명의 교사가 ChatGPT와 Grok와 같은 AI 도구를 사용하여 수업 계획, 평가 및 적응형 콘텐츠 제공을 실험하였으며, 결과적으로 학생 참여도와 학업 성적이 유의미하게 향상되었다. 그러나 교사들은 교육 부족과 인프라 문제와 같은 도전 과제도 경험하였다. 연구는 전문 개발과 디지털 업그레이드가 지원될 때 생성적 AI가 확장 가능하고 포괄적인 솔루션이 될 수 있음을 결론짓는다.\n\n# Research Logic\n## Problem\n과밀한 교실과 제한된 자원으로 인해 다양한 학생의 요구를 충족하는 데 어려움이 있다.\n## Theory\n명시되지 않음\n## Design\n혼합 방법 연구 설계로 정량적 및 정성적 데이터를 통합하였다.\n## Findings\n학생 참여도는 2.8에서 4.3으로, 학업 성적은 61%에서 75%로 증가하였다.\n## Conclusion\n전문 개발과 디지털 업그레이드가 지원될 때 생성적 AI는 교육의 형평성을 높일 수 있는 잠재력을 지닌다.\n\n# Key Findings\n- 학생 참여도가 2.8에서 4.3으로 증가하였다.\n- 학업 성적이 61%에서 75%로 향상되었다.\n- 교사들은 AI 도구가 직관적이고 유용하다고 인식하였다.\n\n# Contributions\n## Theoretical\n생성적 AI의 교육적 활용에 대한 새로운 통찰을 제공한다.\n## Methodological\n혼합 방법 연구 설계를 통해 정량적 및 정성적 데이터의 통합 분석을 시도하였다.\n## Practical\nAI 도구의 사용이 교사와 학생 모두에게 긍정적인 영향을 미칠 수 있음을 보여준다.\n\n# Limitations\n- 연구의 맥락이 특정 지역(다르에스살람 및 도도마)으로 제한되어 있다.\n- 교사 교육 및 인프라 문제에 대한 구체적인 해결책이 제시되지 않았다.\n\n# Transferable Insights\n- 생성적 AI는 교육의 개인화 및 형평성을 높이는 데 기여할 수 있다.\n- 전문 개발과 인프라 개선이 동반되어야 효과적이다.\n\n# Idea Seeds\n1. 생성적 AI 도구의 효과적인 사용을 위한 교사 교육 프로그램 개발.\n2. rural 지역의 교육 인프라 개선 방안 모색.\n3. AI 도구 사용에 대한 윤리적 가이드라인 수립.\n\n# Citation Snippets\n>\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #ai literacy, #education\n\n---\n\n요약: 본 연구는 탄자니아 중학교 교사들이 생성적 AI를 활용하여 개인화된 학습을 제공하는 방법을 탐구하였다. 연구 결과, 학생 참여도와 학업 성적이 유의미하게 향상되었으며, 교사들은 AI 도구의 유용성을 인식하였다. 그러나 교육 부족과 인프라 문제는 여전히 해결해야 할 과제로 남아 있다.", "link": "https://doi.org/10.61538/jipe.v17i2.1983", "altLink": "https://openalex.org/W7131288854", "hasDoi": true, "hasReview": true, "authors": ["Juliana Kamaghe"], "categories": ["Qualitative property", "Focus group", "Qualitative research", "Literacy", "Thematic analysis"]}, {"id": "2", "source": "ARXIV", "score": 16, "day": "2026-03-06", "title": "Beyond Scores: Explainable Intelligent Assessment Strengthens Pre-service Teachers' Assessment Literacy", "content": "---\ntitle: Beyond Scores: Explainable Intelligent Assessment Strengthens Pre-service Teachers' Assessment Literacy\nauthors: [Yuang Wei, Fei Wang, Yifan Zhang, Brian Y. Lim, Bo Jiang]\nyear: 2026\njournal: Proceedings of the 2026 CHI Conference on Human Factors in Computing Systems\ndoi: https://doi.org/10.1145/3772318.3791230\nresearch_type: 실험적 연구\nmethodology: 사전-사후 통제 연구\ndata_type: 정량적 및 정성적 데이터\nsample: 21명의 예비 교사\ncontext: 교육 기술 및 평가 문해력\ntheoretical_framework: 평가 문해력 이론\nkeywords: [Assessment Literacy, Explainable Models, Pre-service Teachers, Cognitive Diagnosis, Intelligent Assessment System]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 예비 교사들의 평가 문해력(Assessment Literacy, AL)을 향상시키기 위한 eXplainable Intelligent Assessment(XIA) 플랫폼을 제안한다. 전통적인 교사 양성 프로그램은 이론적 지식에 중점을 두지만, 디지털 평가 도구는 종종 불투명한 점수나 매개변수를 제공하여 반성과 전이를 방해한다. 21명의 예비 교사를 대상으로 한 사전-사후 통제 연구에서, XIA는 반성, 자기 조절 및 평가 인식을 지원하고 평가 오류를 줄이는 데 기여한 것으로 나타났다. 인터뷰 결과, 점수 기반 판단에서 증거 기반 추론으로의 전환이 확인되었다. 이 연구는 지능형 평가 도구 설계에 대한 통찰을 제공하며, 설명적 스캐폴딩이 평가 이론과 교실 실천을 연결하는 방법을 보여준다.\n\n# Research Logic\n## Problem\n예비 교사들이 평가 데이터를 해석하고 이를 교육적 결정으로 전환하는 데 어려움을 겪고 있다.\n## Theory\n평가 문해력(AL)은 평가 관련 지식, 해석 및 평가 기술, 인지적 및 반성적 성향을 포함하는 다차원적 능력으로 정의된다.\n## Design\nXIA 플랫폼은 설명적 스캐폴딩을 통해 AL을 촉진하도록 설계되었으며, 정량적 작업과 설문지, 정성적 인터뷰를 결합하여 평가되었다.\n## Findings\nXIA는 반성, 자기 조절 및 평가 인식을 지원하며, 더 정확한 판단과 적은 평가 오류와 연관되어 있다.\n## Conclusion\n설명적 스캐폴딩이 평가 문해력의 특정 하위 구성 요소를 개선하는 데 기여한다는 초기 증거를 제공한다.\n\n# Key Findings\n- XIA 플랫폼이 예비 교사의 반성과 자기 조절을 지원하였다.\n- 평가 오류가 감소하였다.\n- 점수 기반 판단에서 증거 기반 추론으로의 전환이 이루어졌다.\n\n# Contributions\n## Theoretical\n지능형 평가 도구 설계에 대한 이론적 통찰을 제공한다.\n## Methodological\n설명적 스캐폴딩을 통한 평가 문해력 향상에 대한 실증적 증거를 제시한다.\n## Practical\n교사들이 평가 데이터를 효과적으로 해석하고 활용할 수 있는 도구를 제공한다.\n\n# Limitations\n- 연구 샘플 크기가 작아 일반화에 한계가 있다.\n- 연구 기간이 짧아 장기적인 효과를 평가하기 어렵다.\n\n# Transferable Insights\n- 설명적 스캐폴딩이 교육적 결정 과정에서 중요한 역할을 할 수 있다.\n- 평가 문해력 향상을 위한 도구 설계 시 교사 중심의 접근이 필요하다.\n\n# Idea Seeds\n1. 다양한 교육 환경에서 XIA 플랫폼의 적용 가능성 탐색.\n2. 다른 교육 수준의 교사들을 대상으로 한 연구 확장.\n3. XIA의 기능을 개선하기 위한 사용자 피드백 수집 및 분석.\n\n# Citation Snippets\n> Yuang Wei, Fei Wang, Yifan Zhang, Brian Y. Lim, and Bo Jiang. (2026). Beyond Scores: Explainable Intelligent Assessment Strengthens Pre-service Teachers’ Assessment Literacy. In Proceedings of the 2026 CHI Conference on Human Factors in Computing Systems (CHI ’26).\n\ntags: #평가문해력, #설명가능한모델, #예비교사, #인지진단, #지능형평가시스템, #교육기술, #교실실천", "link": "https://arxiv.org/abs/2603.06059v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Yuang Wei", "Fei Wang", "Yifan Zhang"], "categories": ["cs.HC"]}, {"id": "3", "source": "OPENALEX", "score": 16, "day": "2025-08-22", "title": "Interdisciplinary Knowledge Graph-Driven STEM Teacher Assistant Agent: Model Construction and Evaluation", "content": "---\ntitle: Interdisciplinary Knowledge Graph-Driven STEM Teacher Assistant Agent: Model Construction and Evaluation\nauthors: [Zijian Yuan, Simin Zhan, Baohui Zhang]\nyear: 2025\njournal: 명시되지 않음\ndoi: https://openalex.org/W7109216873\nresearch_type: 실험적 연구\nmethodology: 혼합 방법론\ndata_type: 정량적 및 정성적 데이터\nsample: 21명의 현직 교사\ncontext: 중국의 교육 개혁\ntheoretical_framework: 명시되지 않음\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 중국의 교육 개혁에 따른 학제 간 학습의 중요성을 강조하며, STEM 교사들이 직면한 여러 도전 과제를 해결하기 위해 AI 기반의 STEM 교사 보조 에이전트를 제안한다. 이 시스템은 86,542개의 노드를 포함하는 학제 간 지식 그래프와 DeepSeek-R1-671B 모델을 활용하여, 교사들에게 설명 가능한 교육 지원을 제공한다. SciCurriculum-QA라는 226개 항목의 벤치마크를 통해 시스템의 효능을 평가하였으며, RAGAS 프레임워크를 사용하여 여러 지표에서 우수한 성과를 보였다. 또한, 21명의 현직 교사를 대상으로 한 질적 연구를 통해 교육적 자신감과 교실 적용 가능성이 향상되었음을 확인하였다.\n\n# Research Logic\n## Problem\nSTEM 교사들은 단편화된 학문 지식과 협업 부족, 학제 간 수업 설계 경험 부족 등의 문제에 직면하고 있다.\n\n## Theory\n명시되지 않음\n\n## Design\nAI 기반의 STEM 교사 보조 에이전트를 개발하고, 이를 평가하기 위한 벤치마크와 실험을 설계하였다.\n\n## Findings\nSciKG-RAG 모델은 Faithfulness (0.8064), Answer Relevancy (0.8785), Context Precision (0.9467), Context Recall (0.8702)에서 우수한 성과를 보였다.\n\n## Conclusion\nAI 에이전트는 교사들의 학제 간 교육 역량을 향상시킬 잠재력이 있음을 보여준다.\n\n# Key Findings\n- AI 기반 STEM 교사 보조 에이전트가 교사들에게 설명 가능한 지원을 제공한다.\n- SciKG-RAG 모델이 여러 지표에서 우수한 성과를 기록하였다.\n- 현직 교사들이 교육적 자신감과 교실 적용 가능성을 높였다고 보고하였다.\n\n# Contributions\n## Theoretical\n학제 간 교육의 필요성과 AI의 역할에 대한 이해를 심화시킨다.\n\n## Methodological\n혼합 방법론을 통해 정량적 및 정성적 데이터를 수집하고 분석하였다.\n\n## Practical\n교사들이 AI를 활용하여 학제 간 수업을 효과적으로 설계할 수 있는 방법을 제시한다.\n\n# Limitations\n- 연구의 샘플 크기가 제한적이다.\n- 특정 지역(중국)에 국한된 결과일 수 있다.\n\n# Transferable Insights\n- AI 기술이 교육 현장에서의 협업을 촉진할 수 있는 가능성을 보여준다.\n- 학제 간 교육 설계에 대한 새로운 접근 방식을 제공한다.\n\n# Idea Seeds\n1. AI 기반의 교육 도구를 활용한 교사 연수 프로그램 개발.\n2. 다양한 교육 환경에서의 AI 활용 사례 연구.\n3. 학제 간 교육을 위한 커리큘럼 개발에 대한 연구.\n\n# Citation Snippets\n> Yuan, Z., Zhan, S., & Zhang, B. (2025). Interdisciplinary Knowledge Graph-Driven STEM Teacher Assistant Agent: Model Construction and Evaluation. \n\ntags: #human-ai_collaboration, #classroom_ai, #ai_tutoring, #instructional_design, #scaffolding, #tpack, #ai_literacy, #teacher_ai, #education, #learning_analytics, #llm_classroom, #ai_pedagogy\n\n---\n\n요약: 본 연구는 AI 기반 STEM 교사 보조 에이전트를 통해 STEM 교육의 학제 간 접근 방식을 지원하는 방법을 제시한다. 연구 결과, 이 시스템은 교사들의 교육적 자신감과 수업 적용 가능성을 높이는 데 기여할 수 있음을 보여준다.", "link": "https://doi.org/10.1145/3768421.3768501", "altLink": "https://openalex.org/W7109216873", "hasDoi": true, "hasReview": true, "authors": ["Zijian Yuan", "Simin Zhan", "Baohui Zhang"], "categories": ["Context (archaeology)", "Discipline", "Key (lock)", "Psychology", "Computer science"]}, {"id": "4", "source": "OPENALEX", "score": 15, "day": "2025-12-10", "title": "Teaching English in the Age of AI: A Qualitative Study of Primary English Teachers’ Perceptions", "content": "---\ntitle: Teaching English in the Age of AI: A Qualitative Study of Primary English Teachers’ Perceptions\nauthors: [Amy Xin, Melor Md Yunus, Hanita Hanim Ismail]\nyear: 2025\njournal: International Journal of Research and Innovation in Social Science (IJRISS)\ndoi: https://dx.doi.org/10.47772/IJRISS.2025.91100348\nresearch_type: 질적 연구\nmethodology: 질적 접근\ndata_type: 인터뷰, 관찰, 체크리스트 분석\nsample: 말레이시아의 6명의 경험이 풍부한 초등 영어 교사\ncontext: 말레이시아 초등학교\ntheoretical_framework: TPACK, 구성주의 학습 이론\nkeywords: [AI, 영어 교육, 교사 인식, 교육 기술, 교수 설계, 스캐폴딩, TPACK, AI 문해력]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 말레이시아 초등 영어 교사들이 AI 도구를 활용하여 수업 계획을 설계하고 구현하는 방식을 조사하고, AI가 학생들에게 미치는 영향에 대한 인식을 설명하는 것을 목적으로 한다. 질적 접근을 통해 6명의 경험이 풍부한 초등 교사들로부터 반구조화된 인터뷰, 관찰 및 AI 강화 수업 계획 분석을 통해 데이터를 수집하였다. 연구 결과, 교사들은 AI를 활용하여 차별화된 콘텐츠를 생성하고, 지역 상황 및 학습자 다양성에 맞춘 창의적인 수업 계획을 수립하는 데 주로 사용하였으며, 교사의 지도적 실행이 교육적 및 문화적 관련성을 유지하는 데 중요하다고 강조하였다. 또한, AI는 낮은 수준의 학생들의 참여도와 동기, 자신감을 향상시키는 데 기여하며, AI 문해력의 지속적인 전문성 개발의 중요성을 나타내었다.\n\n# Research Logic\n## Problem\nAI 도구의 사용이 증가하면서 초등 교육에서의 교사 경험이 충분히 탐구되지 않음.\n## Theory\nTPACK 및 구성주의 학습 이론을 통해 AI 통합의 효과를 분석.\n## Design\n질적 연구 디자인을 통해 교사들의 경험과 인식을 심층적으로 조사.\n## Findings\nAI는 차별화된 콘텐츠 생성 및 학생 참여 증진에 기여하며, 교사의 역할이 중요함.\n## Conclusion\n교사 에이전시, 프롬프트 엔지니어링, 반성적 실천이 AI 통합의 핵심 요소임.\n\n# Key Findings\n- AI는 차별화된 콘텐츠 생성에 주로 사용됨.\n- AI 사용이 낮은 수준의 학생들의 동기와 자신감을 향상시킴.\n- 교사의 지도적 역할이 교육적 및 문화적 관련성을 유지하는 데 중요함.\n\n# Contributions\n## Theoretical\nTPACK 및 구성주의 이론을 통해 AI 통합의 교육적 효과를 설명.\n## Methodological\n질적 접근을 통해 교사의 경험을 심층적으로 탐구.\n## Practical\nAI 도구의 효과적인 활용을 위한 교사 전문성 개발 필요성 강조.\n\n# Limitations\n- 연구 샘플이 제한적이며, 특정 지역에 국한됨.\n- AI 도구의 신뢰성 및 과도한 의존에 대한 우려가 있음.\n\n# Transferable Insights\n- AI 도구의 효과적인 활용을 위해 교사의 전문성 개발이 필수적임.\n- AI 통합 시 교육적 및 문화적 맥락을 고려해야 함.\n\n# Idea Seeds\n1. AI 문해력 향상을 위한 교사 연수 프로그램 개발.\n2. AI 도구의 신뢰성을 높이기 위한 평가 기준 마련.\n3. AI와 인간 교사의 협력 모델 연구.\n\n# Citation Snippets\n> \"AI는 차별화된 콘텐츠 생성 및 학생 참여 증진에 기여하며, 교사의 역할이 중요함.\"\n\ntags: #AI, #영어교육, #교사인식, #교육기술, #교수설계, #TPACK, #AI문해력", "link": "https://doi.org/10.47772/ijriss.2025.91100348", "altLink": "https://openalex.org/W4417203537", "hasDoi": true, "hasReview": true, "authors": ["Amy Xin", "Melor Md Yunus", "Hanita Hanim Ismail"], "categories": ["Perception", "Qualitative research", "Psychology", "Mathematics education", "Pedagogy"]}, {"id": "5", "source": "OPENALEX", "score": 15, "day": "2025-09-25", "title": "A Systematic Review of Generative AI in K–12: Mapping Goals, Activities, Roles, and Outcomes via the 3P Model", "content": "Generative AI is reshaping k–12 learning as a multi-agent system in which goals, activities, and roles co-evolve across formal and informal environments. Following PRISMA and appraising quality with MMAT, we synthesize 84 peer-reviewed empirical studies (2020–2025) involving learners aged 3–18. Using Biggs’s 3P model as a systems lens and embedding CIMO logic, we code learning objectives, activity designs, AI role paradigms, and outcomes. Seven recurring objectives emerge (language/literacy; STEM; creativity; socioemotional skills; feedback literacy and self-regulation; motivation; AI literacy). Five dominant activity patterns are identified: dialogic tutoring and formative feedback, generative iterative co-creation, project-based problem-solving, simulation/game-based learning, and assessment support. Across studies, AI roles shift from AI-directed to AI-supported/empowered, re-allocating agency among students, teachers, and caregivers via feedback loops. Reported outcomes span three categories—epistemic, practice, and affective/identity—with opportunities of deeper knowledge, improved practice, and stronger engagement, and risks of hallucinations, reduced originality, over-reliance, motivational loss, and ethical concerns. We propose a goal–activity–role alignment heuristic for instructional design, plus safeguards around teacher professional development, feedback literacy, and ethics. We call for longitudinal and cross-cultural research to evaluate the impacts of GenAI in k–12.", "link": "https://doi.org/10.3390/systems13100840", "altLink": "https://openalex.org/W4414511128", "hasDoi": true, "hasReview": false, "authors": ["Xiaoling Lin", "Hao Tan"], "categories": ["Formative assessment", "Computer science", "Generative grammar", "Quality (philosophy)", "Agency (philosophy)"]}, {"id": "6", "source": "OPENALEX", "score": 15, "day": "2025-05-12", "title": "The Impact of AI-Assisted Blended Learning on Writing Efficacy and Resilience", "content": "This study examines the impact of artificial intelligence (AI)-assisted blended learning on writing self-efficacy and resilience among lower intermediate English as a foreign language learners. Using a quasi-experimental design, it compares outcomes of an experimental group using AI tools with a control group receiving traditional instruction. Results show AI tools enhance linguistic accuracy, performance self-efficacy, and resilience, while traditional methods effectively support self-regulation and metacognitive growth. AI tools provide personalized feedback, reduce cognitive load, boost confidence, and expand vocabulary. However, challenges like over-reliance on AI and creativity concerns emphasize the need for balanced integration with teacher guidance. These findings highlight the complementary strengths of AI and traditional pedagogy, stressing the value of integrating technological advancements with reflective practices to optimize writing development. The research offers insights into AI's potential to enhance language education while addressing its limitations for responsible and effective use.", "link": "https://doi.org/10.4018/ijcallt.377174", "altLink": "https://openalex.org/W4410293042", "hasDoi": true, "hasReview": false, "authors": ["Zola Chi-Chin Lai"], "categories": ["Resilience (materials science)", "Blended learning", "Psychology", "Mathematics education", "Computer science"]}, {"id": "7", "source": "OPENALEX", "score": 15, "day": "2024-08-06", "title": "Using Artificial Intelligence in English As A Foreign Language Classrooms: Ethical Concerns and Future Prospects", "content": "This qualitative study aimed to explore how teachers of English perceive the advantages and disadvantages of using artificial intelligence by Saudi students who study English as a Foreign Language. The study used semi-structured interviews to delve into teachers’ pedagogical beliefs, ethical concerns, and expectations regarding using artificial intelligence tools by Saudi students, using the College of Languages and Translation at Al-Imam Mohammed Bin Saud Islamic University as a case study. The main research question focused on examining the positive and negative impacts of artificial intelligence on students’ language performance. The study findings revealed several themes from teachers’ interviews, including strategies for implementing artificial intelligence in the classroom, the impacts of artificial intelligence on students’ language proficiency, and the importance of guiding students to effectively use artificial intelligence applications. The findings also highlighted teachers’ expectations for expanding open-source language learning online channels and the widespread use of robots in English classrooms. The study recommends aligning professional development programs with language curricula to equip teachers with the necessary skills for effectively integrating artificial intelligence technologies into the classroom. The significance of this study stems from its contribution to the current debate on using artificial intelligence in education, presenting empirical evidence on its impacts on students’ language performance.", "link": "https://doi.org/10.31235/osf.io/gr8yt", "altLink": "https://openalex.org/W4401375653", "hasDoi": true, "hasReview": false, "authors": ["Arab World English Journal"], "categories": ["Foreign language", "Curriculum", "Psychology", "Mathematics education", "Empirical research"]}, {"id": "8", "source": "OPENALEX", "score": 15, "day": "2024-02-19", "title": "Implications of Artificial Intelligence for Teaching and Learning", "content": "Artificial Intelligence (AI) has significantly transformed teaching and learning, facilitating a shift from teacher-centered to student-centered education. This review outlines the broad implications of AI for education and synthesizes both the opportunities and challenges associated with its implementation. Examining over 55 papers related to the impacts of AI on education, the review encompasses various educational contexts, avoiding a singular focus on specific types of education or the teaching of AI alone. According to the review, AI introduces new opportunities for creating intelligent content that enhances learning experiences, fostering interactivity and a student-centered approach. Smart content enables instructors to integrate multimedia, interactive tools, AI-related wearables, and information technologies, diversifying learning modes and engaging students more effectively. The creation of smart content aligns with smart education frameworks to ensure efficient content development. AI also contributes to the development of intelligent tutoring systems, which simulate human tutors to deliver personalized and adaptive educational experiences. These systems can host smart content, enabling independent learning. Additionally, AI improves virtual learning environments by analyzing student data to tailor content and delivery methods based on individual needs. It automates tasks such as grading and feedback, allowing teachers to concentrate on other essential responsibilities. While AI brings significant benefits, it is not without limitations. Challenges include infrastructure requirements, considerations of inclusion and equity, teacher readiness and preparation, data quality and inclusivity, profit orientation, data privacy and ethical concerns, and the potential for unequal access. Addressing these limitations is crucial for maximizing the positive impacts of AI in the realm of education.", "link": "https://doi.org/10.53623/apga.v3i2.404", "altLink": "https://openalex.org/W4391962388", "hasDoi": true, "hasReview": false, "authors": ["Kuok Ho Daniel Tang"], "categories": ["Artificial intelligence", "Computer science", "Mathematics education", "Psychology"]}, {"id": "9", "source": "OPENALEX", "score": 15, "day": "2024-01-26", "title": "How should we change teaching and assessment in response to increasingly powerful generative Artificial Intelligence? Outcomes of the ChatGPT teacher survey", "content": "Abstract There has been widespread media commentary about the potential impact of generative Artificial Intelligence (AI) such as ChatGPT on the Education field, but little examination at scale of how educators believe teaching and assessment should change as a result of generative AI. This mixed methods study examines the views of educators ( n = 318) from a diverse range of teaching levels, experience levels, discipline areas, and regions about the impact of AI on teaching and assessment, the ways that they believe teaching and assessment should change, and the key motivations for changing their practices. The majority of teachers felt that generative AI would have a major or profound impact on teaching and assessment, though a sizeable minority felt it would have a little or no impact. Teaching level, experience, discipline area, region, and gender all significantly influenced perceived impact of generative AI on teaching and assessment. Higher levels of awareness of generative AI predicted higher perceived impact, pointing to the possibility of an ‘ignorance effect’. Thematic analysis revealed the specific curriculum, pedagogy, and assessment changes that teachers feel are needed as a result of generative AI, which centre around learning with AI, higher-order thinking, ethical values, a focus on learning processes and face-to-face relational learning. Teachers were most motivated to change their teaching and assessment practices to increase the performance expectancy of their students and themselves. We conclude by discussing the implications of these findings in a world with increasingly prevalent AI.", "link": "https://doi.org/10.1007/s10639-023-12405-0", "altLink": "https://openalex.org/W4391256306", "hasDoi": true, "hasReview": false, "authors": ["Matt Bower", "Jodie Torrington", "Jennifer W. M. Lai"], "categories": ["Generative grammar", "Curriculum", "Psychology", "Ignorance", "Teaching method"]}];

    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));

  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');

  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
</html>
