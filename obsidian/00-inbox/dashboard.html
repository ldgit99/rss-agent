<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-03-23 23:32</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "ARXIV", "score": 16, "day": "2026-03-11", "title": "PRIME-CVD: A Parametrically Rendered Informatics Medical Environment for Education in Cardiovascular Risk Modelling", "content": "---\ntitle: PRIME-CVD: A Parametrically Rendered Informatics Medical Environment for Education in Cardiovascular Risk Modelling\nauthors: [Nicholas I-Hsien Kuo, Marzia Hoque Tania, Blanca Gallego, Louisa Jorm]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2603.19299v1\nresearch_type: 실험적 연구\nmethodology: 파라메트릭 시뮬레이션\ndata_type: 합성 데이터\nsample: 50,000명의 성인\ncontext: 심혈관 질환 예방 교육\ntheoretical_framework: 인포매틱스 교육\nkeywords: [심혈관 위험 모델링, 교육, 합성 데이터, 데이터 청소, 인과 추론, 정책 관련 위험 모델링]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 PRIME-CVD라는 파라메트릭 시뮬레이션 기반의 의료 환경을 소개하며, 이는 심혈관 질환 예방 교육을 위해 설계되었다. PRIME-CVD는 50,000명의 성인으로 구성된 두 개의 합성 데이터 자산을 포함하고 있으며, 이는 공개적으로 접근 가능한 호주 인구 통계 및 역학적 효과 추정치를 기반으로 생성되었다. 데이터 자산 1은 탐색적 분석 및 생존 모델링에 적합한 청정 코호트를 제공하며, 데이터 자산 2는 EMR 스타일의 데이터베이스로 재구성되어 실제 의료 기록의 구조적 이질성을 반영한다. 이 연구는 민감한 정보를 노출하지 않으면서 데이터 청소, 조화, 인과 추론 및 정책 관련 위험 모델링 교육을 가능하게 한다.\n\n# Research Logic\n## Problem\n실제 환자 수준의 전자 의료 기록(EMR) 데이터 접근의 어려움으로 인해 심혈관 위험 모델링 교육의 재현성 및 투명성이 제한되고 있다.\n\n## Theory\n의료 인포매틱스 교육을 위한 실질적이고 안전한 데이터 접근의 필요성이 강조된다.\n\n## Design\nPRIME-CVD는 파라메트릭 시뮬레이션을 통해 생성된 합성 데이터를 사용하여 교육적 목적에 맞게 설계되었다.\n\n## Findings\nPRIME-CVD는 교육적 활용을 위해 두 개의 데이터 자산을 제공하며, 이는 실제 EMR 데이터의 구조적 이질성을 모방한다.\n\n## Conclusion\nPRIME-CVD는 민감한 정보를 포함하지 않으면서도 교육적 목적을 달성할 수 있는 혁신적인 데이터 환경을 제공한다.\n\n# Key Findings\n- PRIME-CVD는 50,000명의 성인으로 구성된 합성 데이터 자산을 제공한다.\n- 데이터 자산 1은 청정하고 분석 준비가 완료된 코호트를 제공한다.\n- 데이터 자산 2는 EMR 스타일의 데이터베이스로 재구성되어 실제 의료 기록의 이질성을 반영한다.\n\n# Contributions\n## Theoretical\n의료 인포매틱스 교육의 필요성과 합성 데이터의 활용 가능성을 제시한다.\n\n## Methodological\n파라메트릭 시뮬레이션을 통한 데이터 생성 방법론을 개발하였다.\n\n## Practical\n민감한 정보를 노출하지 않으면서도 교육적 훈련을 위한 실질적인 데이터 자산을 제공한다.\n\n# Limitations\n- 합성 데이터의 실제 환자 데이터와의 차이로 인해 제한된 현실성을 가질 수 있다.\n- 데이터 자산의 사용이 특정 교육 목표에 국한될 수 있다.\n\n# Transferable Insights\n- 합성 데이터는 교육적 목적에 적합한 안전한 대안이 될 수 있다.\n- 데이터 청소 및 조화의 중요성을 강조하는 교육적 접근법이 필요하다.\n\n# Idea Seeds\n1. PRIME-CVD를 기반으로 한 다양한 교육 모듈 개발.\n2. 합성 데이터의 활용을 통한 다른 의료 분야 교육 프로그램 설계.\n3. 데이터 분석 및 모델링 기술을 향상시키기 위한 실습 과제 개발.\n\n# Citation Snippets\n> Kuo, N. I.-H., Tania, M. H., Gallego, B., & Jorm, L. (2026). PRIME-CVD: A Parametrically Rendered Informatics Medical Environment for Education in Cardiovascular Risk Modelling. arXiv. https://arxiv.org/abs/2603.19299v1\n\ntags: #심혈관위험모델링, #의료교육, #합성데이터, #데이터청소, #인과추론, #정책모델링, #의료인포매틱스", "link": "https://arxiv.org/abs/2603.19299v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Nicholas I-Hsien Kuo", "Marzia Hoque Tania", "Blanca Gallego"], "categories": ["cs.LG"]}, {"id": "1", "source": "ARXIV", "score": 15, "day": "2026-03-20", "title": "Plagiarism or Productivity? Students Moral Disengagement and Behavioral Intentions to Use ChatGPT in Academic Writing", "content": "---\ntitle: Plagiarism or Productivity? Students Moral Disengagement and Behavioral Intentions to Use ChatGPT in Academic Writing\nauthors: [John Paul P. Miranda, Rhiziel P. Manalese, Mark Anthony A. Castro, Renen Paul M. Viado, Vernon Grace M. Maniago, Rudante M. Galapon, Jovita G. Rivera, Amado B. Martinez]\nyear: 2026\njournal: 2025 International Workshop on Artificial Intelligence and Education (WAIE)\ndoi: https://doi.org/10.1109/WAIE67422.2025.11381217\nresearch_type: 정량적 연구\nmethodology: 구조 방정식 모델링\ndata_type: 설문조사 데이터\nsample: 418명의 필리핀 대학생\ncontext: 필리핀 고등 교육\ntheoretical_framework: 도덕적 이탈 이론, 계획 행동 이론\nkeywords: [ChatGPT, 도덕적 이탈, 학문적 진실성, 행동 의도, 계획 행동 이론]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 필리핀 대학생들이 학술 작문에서 ChatGPT를 사용하려는 의도에 도덕적 이탈이 미치는 영향을 조사하였다. 연구 모델은 도덕적 정당화, 완곡한 명명, 책임 전가, 결과 최소화, 비난 귀속의 다섯 가지 메커니즘을 분석하였다. 총 418명의 ChatGPT 경험이 있는 학생들이 참여하였으며, 결과는 여러 도덕적 이탈 메커니즘이 학생들의 태도와 통제감을 영향을 미친다는 것을 보여주었다. 비난 귀속이 가장 강한 영향을 미쳤으며, 태도가 행동 의도에 가장 큰 영향을 미쳤다. 이 모델은 의도의 변동성의 절반 이상을 설명하였다. 학생들은 종종 제도적 공백과 동료 행동을 통해 AI 사용을 정당화하며, 명확한 학문적 진실성 정책과 윤리적 지침의 필요성을 강조하였다.\n\n# Research Logic\n## Problem\n학생들이 ChatGPT를 사용하려는 의도에 영향을 미치는 도덕적 이탈 메커니즘을 이해하는 것이 필요하다.\n## Theory\n도덕적 이탈 이론과 계획 행동 이론을 통합하여 학생들의 행동 의도를 설명한다.\n## Design\n구조 방정식 모델링을 통해 도덕적 이탈 메커니즘과 행동 의도 간의 관계를 분석하였다.\n## Findings\n비난 귀속이 가장 큰 영향을 미치며, 태도가 행동 의도에 가장 큰 영향을 미친다.\n## Conclusion\n학생들은 AI 사용에 대한 명확한 정책과 윤리적 지침이 필요하다는 것을 인식하고 있다.\n\n# Key Findings\n- 비난 귀속이 학생들의 태도에 가장 큰 영향을 미친다.\n- 태도가 행동 의도에 가장 큰 영향을 미친다.\n- 도덕적 이탈 메커니즘이 학생들의 AI 사용 정당화에 기여한다.\n\n# Contributions\n## Theoretical\n도덕적 이탈 이론과 계획 행동 이론의 통합적 이해를 제공한다.\n## Methodological\n구조 방정식 모델링을 통한 정량적 분석 방법을 제시한다.\n## Practical\nAI 사용에 대한 명확한 정책과 윤리적 지침의 필요성을 강조한다.\n\n# Limitations\n- 연구는 필리핀 대학생을 대상으로 하여 일반화에 한계가 있다.\n- 감정적 요인과 동료의 영향이 충분히 고려되지 않았다.\n\n# Transferable Insights\n- 도덕적 이탈 메커니즘은 다른 문화적 맥락에서도 유사한 영향을 미칠 수 있다.\n- AI 사용에 대한 정책 개발 시 학생들의 인식을 반영해야 한다.\n\n# Idea Seeds\n1. 다양한 문화적 배경에서의 도덕적 이탈 메커니즘 연구.\n2. AI 사용에 대한 윤리적 교육 프로그램 개발.\n3. 학생들의 행동 의도에 영향을 미치는 감정적 요인 분석.\n\n# Citation Snippets\n> Miranda, J. P. P., Manalese, R. P., Castro, M. A. A, Viado, R. P. M., Maniago, V. G. M., Galapon, R. M., Rivera, J. G., & Martinez Jr., A. B. (2025). Plagiarism or Productivity? Students Moral Disengagement and Behavioral Intentions to Use ChatGPT in Academic Writing. 2025 International Workshop on Artificial Intelligence and Education (WAIE) (pp. 383-387). IEEE. https://doi.org/10.1109/WAIE67422.2025.11381217\n\ntags: #ChatGPT, #도덕적이탈, #학문적진실성, #행동의도, #계획행동이론, #AI교육, #윤리적지침", "link": "https://arxiv.org/abs/2603.19549v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["John Paul P. Miranda", "Rhiziel P. Manalese", "Mark Anthony A. Castro"], "categories": ["cs.CY", "cs.AI", "cs.ET", "stat.AP"]}, {"id": "2", "source": "OPENALEX", "score": 13, "day": "2025-12-15", "title": "Child-centered integration of generative AI in early learning: balancing promises and challenges", "content": "---\ntitle: 아동 중심의 생성적 AI 통합: 약속과 도전의 균형\nauthors: Κλεοπάτρα Νικολοπούλου\nyear: 2025\njournal: AI, Brain and Child\ndoi: https://doi.org/10.1007/s44436-025-00023-1\nresearch_type: 개념적 논문\nmethodology: 문헌 검토 및 이론적 분석\ndata_type: 명시되지 않음\nsample: 명시되지 않음\ncontext: 조기 아동 교육(ECE)\ntheoretical_framework: 발달 심리학, 사회문화적 학습 이론, 교육 기술 프레임워크, 윤리적 패러다임\nkeywords: [생성적 인공지능, 조기 아동 교육, 아동 중심 통합, 발달 적합성, 윤리]\n---\n\n# APA 7th style\n\n# Summary\n이 논문은 생성적 인공지능(GenAI)이 조기 아동 교육(ECE)에서의 역할과 그로 인해 발생하는 복잡한 문제들을 다룬다. GenAI는 개인화된 학습, 다중 모드 스토리텔링, 놀이 기반 교수법 지원, 교사의 업무 부담 경감 등의 기회를 제공하지만, 화면 기반 상호작용에 대한 과도한 의존, 놀이와 사회적 관계의 대체, 불공정한 접근, 알고리즘 편향, 아동의 프라이버시 및 안전에 대한 위협과 같은 도전과 위험도 동반한다. 이 논문은 GenAI를 발달 심리학 및 사회문화적 학습 이론과 연결하여, 정책 및 실천적 함의를 제시하며, 아동 중심의 GenAI 통합을 위한 개념적 프레임워크를 제안한다.\n\n# Research Logic\n## Problem\n조기 아동 교육에서의 GenAI 통합의 적절성과 윤리적 문제.\n## Theory\n발달 심리학 및 사회문화적 학습 이론을 통한 GenAI의 역할 분석.\n## Design\n문헌 검토 및 이론적 분석을 통한 개념적 논의.\n## Findings\nGenAI의 기회와 도전, 그리고 정책적 함의.\n## Conclusion\n아동 중심의 GenAI 사용을 위한 발달 적합성, 윤리적 안전장치, 사회문화적 중재의 필요성.\n\n# Key Findings\n- GenAI는 개인화된 학습과 창의적 스토리텔링을 지원할 수 있다.\n- 그러나 아동의 발달에 적합하지 않은 사용은 위험을 초래할 수 있다.\n- 정책적 규제와 교사 전문성 개발이 필수적이다.\n\n# Contributions\n## Theoretical\n발달 심리학과 사회문화적 이론을 통한 GenAI의 통합 이해.\n## Methodological\n이론적 분석을 통한 GenAI의 교육적 적용에 대한 새로운 통찰 제공.\n## Practical\n교사와 정책 입안자에게 GenAI 통합을 위한 실천적 지침 제시.\n\n# Limitations\n- 연구의 구체적인 데이터나 샘플이 명시되지 않음.\n- GenAI의 실제 적용 사례 부족.\n\n# Transferable Insights\n- GenAI는 아동의 언어 발달과 창의성을 지원할 수 있는 잠재력을 지님.\n- 교육적 맥락에서의 GenAI 사용은 신중하게 접근해야 함.\n\n# Idea Seeds\n1. GenAI를 활용한 개인화된 학습 자료 개발.\n2. 교사와 아동 간의 협력적 스토리텔링 프로젝트.\n3. GenAI의 윤리적 사용을 위한 교육 프로그램 개발.\n\n# Citation Snippets\n> Nikolopoulou, K. (2025). Child-centered integration of generative AI in early learning: balancing promises and challenges. AI, Brain and Child, 1(21). https://doi.org/10.1007/s44436-025-00023-1\n\ntags: #생성적AI, #조기아동교육, #아동중심통합, #발달적합성, #윤리, #교육기술, #정책\n\n---\n\n요약: 이 논문은 조기 아동 교육에서 생성적 인공지능의 통합이 가져오는 기회와 도전을 분석한다. 개인화된 학습과 창의적 스토리텔링의 가능성에도 불구하고, 발달 적합성 및 윤리적 문제를 강조하며, 정책적 규제와 교사 전문성 개발의 필요성을 제시한다.", "link": "https://doi.org/10.1007/s44436-025-00023-1", "altLink": "https://openalex.org/W4417319470", "hasDoi": true, "hasReview": true, "authors": ["Κλεοπάτρα Νικολοπούλου"], "categories": ["Sociocultural evolution", "Engineering ethics", "Formative assessment", "Generative grammar", "Sociology"]}, {"id": "3", "source": "OPENALEX", "score": 13, "day": "2025-12-06", "title": "A decade of innovation in language education: Insights from eight leading CALL-related journals", "content": "---\ntitle: A decade of innovation in language education: Insights from eight leading CALL-related journals\nauthors: [Junjie Gavin Wu, Sangmin‐Michelle Lee, Di Zou, Junhua Xian]\nyear: 2025\njournal: Applied Language Sciences\ndoi: https://doi.org/10.65553/ALS.250102\nresearch_type: 체계적 문헌 검토\nmethodology: BERTopic 모델링\ndata_type: 문헌\nsample: 1,098편의 논문\ncontext: CALL 관련 저널\ntheoretical_framework: 명시되지 않음\nkeywords: [innovation in CALL, topic modeling, review, generative AI, core research topics]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 2015년부터 2025년까지의 1,098편의 논문을 분석하여 컴퓨터 보조 언어 학습(CALL) 분야의 혁신을 다루고 있다. 연구는 주제 모델링을 통해 핵심 연구 주제를 식별하고, 이들 주제의 발전 과정을 탐구하였다. 연구 결과, L2 말하기에서의 정서, 교사 개발, 모바일 및 몰입형 기술 등 9개의 주요 주제가 도출되었으며, 생성적 인공지능(GenAI)이 CALL 혁신의 독특한 변환자로 부각되었다. 마지막으로, 연구는 교사와 연구자에게 실용적인 시사점을 제공한다.\n\n# Research Logic\n## Problem\n기술 발전이 CALL 분야에서의 혁신을 어떻게 이끌어내고 있는지에 대한 체계적인 분석 부족.\n## Theory\n기술이 언어 교육에서 혁신을 촉진하는 역할에 대한 기존 연구의 한계.\n## Design\n체계적 문헌 검토 방법을 사용하여 CALL 관련 저널에서의 연구 동향을 분석.\n## Findings\n9개의 핵심 주제가 도출되었으며, 각 주제는 서로 다른 발전 생애 주기를 겪고 있음.\n## Conclusion\nGenAI는 CALL 혁신의 중요한 요소로 자리잡고 있으며, 교사와 연구자에게 실질적인 시사점을 제공함.\n\n# Key Findings\n- L2 말하기에서의 정서적 요소가 주요 연구 주제로 부각됨.\n- 교사 개발 및 CALL 교육법이 혁신적 학습의 기초로 강조됨.\n- 모바일 및 몰입형 기술이 CALL 혁신에 중요한 역할을 함.\n\n# Contributions\n## Theoretical\nCALL 분야의 혁신적 주제에 대한 체계적 이해를 제공.\n## Methodological\nBERTopic 모델링을 통한 데이터 기반의 주제 분석 방법론 제시.\n## Practical\n교사와 연구자에게 기술 통합 및 혁신적 교육 방법에 대한 실용적 시사점 제공.\n\n# Limitations\n- 연구는 특정 CALL 저널에 한정되어 있어 일반화에 한계가 있음.\n- 기술적 도구의 실제 적용 사례에 대한 심층적인 분석 부족.\n\n# Transferable Insights\n- 기술 통합이 언어 교육에서 혁신을 이끌어낼 수 있는 방법에 대한 통찰 제공.\n- 교사 개발이 혁신적 교육 실천의 핵심 요소임을 강조.\n\n# Idea Seeds\n1. GenAI를 활용한 맞춤형 언어 학습 도구 개발.\n2. 교사 전문성 개발을 위한 혁신적 교육 프로그램 설계.\n3. 모바일 학습 도구의 효과적인 통합 방안 연구.\n\n# Citation Snippets\n> Wu, J. G., Lee, S. M., Zou, D., & Xian, J. (2025). A decade of innovation in language education: Insights from eight leading CALL-related journals. *Applied Language Sciences*, 1, 250102. https://doi.org/10.65553/ALS.250102\n\ntags: #CALL, #innovation, #GenAI, #teacher_development, #topic_modeling, #language_learning, #educational_technology", "link": "https://doi.org/10.65553/als.250102", "altLink": "https://openalex.org/W7128767334", "hasDoi": true, "hasReview": true, "authors": ["Junjie Gavin Wu", "Sangmin‐Michelle Lee", "Di Zou"], "categories": ["Generative grammar", "Knowledge management", "Engineering ethics", "Affect (linguistics)", "Computer science"]}, {"id": "4", "source": "OPENALEX", "score": 13, "day": "2025-11-01", "title": "Enhancing The Methodological Training Of Future Foreign Language Teachers Through Innovative Technologies", "content": "---\ntitle: 외국어 교사의 방법론적 훈련 향상을 위한 혁신 기술\nauthors: Erkulova Feruza Melikuziyevna\nyear: 2025\njournal: International Journal of Pedagogics\ndoi: 10.37547/ijp/Volume05Issue11-30\nresearch_type: 실증 연구\nmethodology: 문헌 분석 및 이론적 프레임워크\ndata_type: 명시되지 않음\nsample: 명시되지 않음\ncontext: 글로벌화 및 디지털화\ntheoretical_framework: Toffler, Vygotsky, Dewey, Rogers\nkeywords: [방법론적 훈련, 혁신 기술, ICT, CLIL, 하이브리드 학습, 교사 교육, 디지털 교육학]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 글로벌화와 디지털화의 맥락에서 외국어 교육의 방법론적 훈련을 혁신 기술을 통해 향상시키는 방안을 분석한다. ICT, 디지털 교육학, 하이브리드 교수 모델의 통합을 통해 예비 외국어 교사들의 방법론적 역량을 최적화하기 위한 주요 전략을 제시한다. 연구 결과, 개인화된 학습 경로, 하이브리드 모델, 디지털 협업 환경이 반성적 실천과 전문적 성장에 실질적으로 기여함을 보여준다.\n\n# Research Logic\n## Problem\n디지털 시대에 외국어 교육의 방법론적 훈련이 혁신 기술에 의존하고 있음.\n## Theory\nToffler, Vygotsky, Dewey, Rogers의 이론적 프레임워크를 바탕으로 함.\n## Design\n문헌 분석 및 이론적 접근을 통해 연구 설계.\n## Findings\n개인화된 학습 경로와 디지털 협업 환경이 반성적 실천을 향상시킴.\n## Conclusion\n혁신 기술의 통합이 외국어 교사의 방법론적 훈련에 필수적임을 강조.\n\n# Key Findings\n- 혁신 기술이 외국어 교육의 방법론적 훈련에 긍정적인 영향을 미침.\n- 개인화된 학습 경로가 학습자의 반성적 실천을 촉진함.\n- 하이브리드 교수 모델이 교사의 전문적 성장에 기여함.\n\n# Contributions\n## Theoretical\n디지털 교육학과 방법론적 훈련의 통합에 대한 새로운 이론적 통찰 제공.\n## Methodological\n하이브리드 교수 모델을 통한 혁신적인 교수 설계 제안.\n## Practical\n예비 외국어 교사를 위한 실질적인 교육 방법론 제공.\n\n# Limitations\n- 연구 샘플에 대한 구체적인 정보 부족.\n- 실증적 데이터의 제한으로 인해 일반화의 어려움.\n\n# Transferable Insights\n- 디지털 도구의 통합이 교육적 효과를 극대화할 수 있음.\n- 반성적 실천을 촉진하는 교수 방법의 필요성.\n\n# Idea Seeds\n1. 디지털 협업 환경을 활용한 교사 교육 프로그램 개발.\n2. 개인화된 학습 경로를 위한 AI 기반 튜터링 시스템 연구.\n3. 하이브리드 교수 모델의 효과를 평가하기 위한 실증 연구.\n\n# Citation Snippets\n> Erkulova, F. M. (2025). Enhancing The Methodological Training Of Future Foreign Language Teachers Through Innovative Technologies. International Journal of Pedagogics, 5(11), 133-140. https://theusajournals.com/index.php/ijp/article/download/7766/7197/10870\n\ntags: #방법론적훈련, #혁신기술, #ICT, #하이브리드학습, #교사교육, #디지털교육학, #외국어교육\n\n---\n\n요약: 본 연구는 외국어 교육의 방법론적 훈련을 혁신 기술을 통해 향상시키는 방안을 제시하며, ICT와 하이브리드 모델의 통합이 교사의 전문적 성장에 기여함을 강조한다. 개인화된 학습 경로와 디지털 협업 환경이 반성적 실천을 촉진하는 데 중요한 역할을 한다.", "link": "https://doi.org/10.37547/ijp/volume05issue11-30", "altLink": "https://openalex.org/W4416570008", "hasDoi": true, "hasReview": true, "authors": ["Erkulova Feruza Melikuziyevna"], "categories": ["Context (archaeology)", "Globalization", "Foreign language", "Knowledge management", "Key (lock)"]}, {"id": "5", "source": "ERIC", "score": 12, "day": "명시되지 않음", "title": "Cypriot Teachers&apos; Digital Skills and Attitudes towards AI", "content": "Artificial Intelligence (AI) is now everywhere, including in the classroom. Thus, it is crucial for teachers not only to be able to use AI, but also to understand it, as they bear the responsibility of teaching the next generation with and about AI. Although there have been extensive discussions about the importance of digital skills and knowledge of AI, limited research has focused on the attitudes, digital skills, and AI literacy levels of teachers, within small populations where English is not the native language, such as Cyprus. Our study addresses this gap by adapting the General Attitudes Towards AI Scale (GAAIS) and the AI Literacy Scale (AILS) into the Greek language, and investigating the digital skills, attitudes towards AI, AI literacy, and intentions to teach and use AI among teachers in Cyprus. The Greek versions of GAAIS and AILS have been validated, demonstrating good validity and reliability. Our findings also indicate that Cypriot teachers generally possess intermediate digital skills, but maintain neutral attitudes towards AI and exhibit intermediate levels of AI literacy. Moreover, we discovered significant positive correlations between teachers' digital skills and their AI literacy, attitudes towards AI, and intentions to use and teach AI.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Maria Kasinidou", "Styliani Kleanthoys", "Jahna Otterbacher"], "categories": ["ERIC"]}, {"id": "6", "source": "ARXIV", "score": 12, "day": "2026-03-13", "title": "Virtual reality for large-scale laboratories based on colorized point clouds: design and pedagogical impact", "content": "Effective laboratory training is essential in engineering education, yet conventional on-site instruction is often constrained by time, accessibility, and safety considerations. To address these challenges, this study presents the design, implementation, and evaluation of a web-based virtual reality (WebVR) representation of a large-scale engineering laboratory constructed from massive colorized point cloud data. This study proposes a novel WebVR framework that integrates Unity and Potree for high-fidelity point-cloud visualization combined with advanced interactive capabilities in a browser-based virtual laboratory. It supports immersive first-person exploration, guided navigation, interactive hotspots conveying equipment and safety information, as well as emergency evacuation simulations. The usability, educational effectiveness, and overall acceptance of the virtual laboratory were evaluated through an anonymous questionnaire administered to students and laboratory staff. The results indicate overwhelmingly positive feedback, with all participants rating the system as \"good\" or \"excellent\" across all evaluation dimensions. Participants particularly emphasized the benefits of immersive exploration and self-directed learning. In addition, qualitative feedback was systematically analyzed to inform future enhancements of the virtual environment. Overall, the findings demonstrate that the WebVR-based virtual laboratory can effectively complement conventional on-site laboratory instruction, offering a scalable, accessible, and low-risk platform that enhances learning experiences in engineering education.", "link": "https://arxiv.org/abs/2603.12727v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Lei Fan", "Yuxin Li"], "categories": ["cs.HC"]}, {"id": "7", "source": "ARXIV", "score": 12, "day": "2026-03-12", "title": "CHiL(L)Grader: Calibrated Human-in-the-Loop Short-Answer Grading", "content": "Scaling educational assessment with large language models requires not just accuracy, but the ability to recognize when predictions are trustworthy. Instruction-tuned models tend to be overconfident, and their reliability deteriorates as curricula evolve, making fully autonomous deployment unsafe in high-stakes settings. We introduce CHiL(L)Grader, the first automated grading framework that incorporates calibrated confidence estimation into a human-in-the-loop workflow. Using post-hoc temperature scaling, confidence-based selective prediction, and continual learning, CHiL(L)Grader automates only high-confidence predictions while routing uncertain cases to human graders, and adapts to evolving rubrics and unseen questions. Across three short-answer grading datasets, CHiL(L)Grader automatically scores 35-65% of responses at expert-level quality (QWK >= 0.80). A QWK gap of 0.347 between accepted and rejected predictions confirms the effectiveness of the confidence-based routing. Each correction cycle strengthens the model's grading capability as it learns from teacher feedback. These results show that uncertainty quantification is key for reliable AI-assisted grading.", "link": "https://arxiv.org/abs/2603.11957v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Pranav Raikote", "Korbinian Randl", "Ioanna Miliou"], "categories": ["cs.CL"]}, {"id": "8", "source": "ARXIV", "score": 12, "day": "2026-03-12", "title": "Scaling Laws for Educational AI Agents", "content": "While scaling laws for Large Language Models (LLMs) have been extensively studied along dimensions of model parameters, training data, and compute, the scaling behavior of LLM-based educational agents remains unexplored. We propose that educational agent capability scales not merely with the underlying model size, but through structured dimensions that we collectively term the Agent Scaling Law: role definition clarity, skill depth, tool completeness, runtime capability, and educator expertise injection. Central to this framework is AgentProfile, a structured JSON-based specification that serves as the mechanism enabling systematic capability growth of educational agents. We present EduClaw, a profile-driven multi-agent platform that operationalizes this scaling law, demonstrating its effectiveness through the construction and deployment of 330+ educational agent profiles encompassing 1,100+ skill modules across K-12 subjects. Our empirical observations suggest that educational agent performance scales predictably with profile structural richness. We identify two complementary scaling axes -- Tool Scaling and Skill Scaling -- as future directions, arguing that the path to more capable educational AI lies not solely in larger models, but in stronger structured capability systems.", "link": "https://arxiv.org/abs/2603.11709v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Mengsong Wu", "Hao Hao", "Shuzhen Bi"], "categories": ["cs.AI"]}, {"id": "9", "source": "ARXIV", "score": 12, "day": "2026-03-08", "title": "Safety Under Scaffolding: How Evaluation Conditions Shape Measured Safety", "content": "Safety benchmarks evaluate language models in isolation, typically using multiple-choice format; production deployments wrap these models in agentic scaffolds that restructure inputs through reasoning traces, critic agents, and delegation pipelines. We report one of the largest controlled studies of scaffold effects on safety (N = 62,808; six frontier models, four deployment configurations), combining pre-registration, assessor blinding, equivalence testing, and specification curve analysis. Map-reduce scaffolding degrades measured safety (NNH = 14), yet two of three scaffold architectures preserve safety within practically meaningful margins. Investigating the map-reduce degradation revealed a deeper measurement problem: switching from multiple-choice to open-ended format on identical items shifts safety scores by 5-20 percentage points, larger than any scaffold effect. Within-format scaffold comparisons are consistent with practical equivalence under our pre-registered +/-2 pp TOST margin, isolating evaluation format rather than scaffold architecture as the operative variable. Model x scaffold interactions span 35 pp in opposing directions (one model degrades by -16.8 pp on sycophancy under map-reduce while another improves by +18.8 pp on the same benchmark), ruling out universal claims about scaffold safety. A generalisability analysis yields G = 0.000: model safety rankings reverse so completely across benchmarks that no composite safety index achieves non-zero reliability, making per-model, per-configuration testing a necessary minimum standard. We release all code, data, and prompts as ScaffoldSafety.", "link": "https://arxiv.org/abs/2603.10044v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["David Gringras"], "categories": ["cs.SE", "cs.AI", "cs.CL", "cs.LG"]}];
let PAGE_SIZE = 10;
let currentTab = 'all';
let currentSource = 'ALL';
let currentSort = 'score';
let currentPage = 1;
let currentCategory = '';
let currentMinDate = '';
let currentMaxDate = '';
let hideVisited = false;
let filtered = [];
let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
let searchHistory = JSON.parse(localStorage.getItem('searchHistory')) || [];
let visited = JSON.parse(localStorage.getItem('visited')) || [];

function toggleTheme() {
  const html = document.documentElement;
  const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
  html.dataset.theme = next;
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  localStorage.setItem('theme', next);
}

function toggleTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSource(btn) {
  currentSource = btn.dataset.source;
  document.querySelectorAll('#sourceFilters .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSort(btn) {
  currentSort = btn.dataset.sort;
  document.querySelectorAll('#sortGroup .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  render();
}

function toggleFavorite(id, e) {
  e.stopPropagation();
  const idx = favorites.indexOf(id);
  if (idx === -1) {
    favorites.push(id);
  } else {
    favorites.splice(idx, 1);
  }
  localStorage.setItem('favorites', JSON.stringify(favorites));
  applyFilters();
}

function recordVisit(id) {
  if (!visited.includes(id)) {
    visited.push(id);
  }
  localStorage.setItem('visited', JSON.stringify(visited));
}

function recordSearch(query) {
  if (query.trim() && !searchHistory.includes(query)) {
    searchHistory.unshift(query);
    if (searchHistory.length > 10) searchHistory.pop();
    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
  }
}

function downloadJSON() {
  const data = JSON.stringify(filtered, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadCSV() {
  const headers = ['제목', '출처', '스코어', '리뷰여부', '링크'];
  const rows = filtered.map(p => [
    '"' + p.title.replace(/"/g, '""') + '"',
    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
