<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-03-03 23:26</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "ARXIV", "score": 26, "day": "2026-03-02", "title": "Modeling Grammatical Hypothesis Testing in Young Learners: A Sequence-Based Learning Analytics Study of Morphosyntactic Reasoning in an Interactive Game", "content": "---\ntitle: 어린 학습자에서의 문법 가설 검증 모델링: 상호작용 게임에서의 형태통사적 추론에 대한 순서 기반 학습 분석 연구\nauthors: Thierry Geoffre, Trystan Geoffre\nyear: 2026\njournal: LAK '26\ndoi: https://arxiv.org/abs/2603.02084v1\nresearch_type: 실증 연구\nmethodology: 순서 기반 학습 분석\ndata_type: 행동 데이터\nsample: 100명의 초등학생 (8-11세)\ncontext: 스위스 프랑스어 사용 지역의 초등학교\ntheoretical_framework: 형태통사적 이론\nkeywords: [learning analytics, grammatical reasoning, morphosyntax, action sequences, primary education, French language, stealth assessment]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 초등학생의 문법적 추론을 순서 기반 학습 분석 접근법을 통해 조사하였다. 프랑스어의 형태통사적 일치를 목표로 하는 상호작용 게임에서의 세밀한 행동 시퀀스를 활용하였다. 전통적인 평가 방식과 달리, 각 슬라이더 움직임을 가설 검증 행동으로 간주하여 문장 구성 중 실시간 인지 전략을 포착하였다. 100명의 학생으로부터 597회의 게임 세션(9,783 행동)을 분석한 결과, 결정사와 동사가 주요 어려움의 지점으로 나타났으며, 학습자들이 동사를 먼저 고정하고 이전 요소를 조정하는 경향이 있음을 발견하였다. 본 연구는 순서 기반 분석이 언어적 추론의 숨겨진 차원을 드러낼 수 있음을 보여주며, 언어적으로 다양한 교실에서 실시간 스캐폴딩 및 교사 도구의 기초를 제공한다.\n\n# Research Logic\n## Problem\n언어적 다양성과 발달적 언어 장애로 인해 초등학생들이 프랑스어의 문법적 구조를 이해하는 데 어려움을 겪고 있다.\n\n## Theory\n형태통사적 이론에 기반하여, 문법적 일치의 인지적 과정을 탐구한다.\n\n## Design\n상호작용 게임 'Tirettes'를 통해 학생들의 행동 시퀀스를 분석하였다.\n\n## Findings\n결정사와 동사에서 높은 오류율이 나타났으며, 학습자들이 동사를 먼저 고정하는 경향이 관찰되었다.\n\n## Conclusion\n순서 기반 학습 분석은 언어적 추론의 복잡성을 이해하는 데 기여하며, 개인화된 학습 경로를 지원할 수 있는 가능성을 제시한다.\n\n# Key Findings\n- 결정사와 동사가 주요 오류 지점으로 나타났다.\n- 학습자들은 동사를 먼저 고정하고 이전 요소를 조정하는 경향이 있다.\n- 적은 해결책을 가진 연습에서는 느리고 불규칙한 수렴이 관찰되었다.\n\n# Contributions\n## Theoretical\n형태통사적 추론의 새로운 분석 틀을 제공한다.\n\n## Methodological\n행동 데이터 기반의 분석 방법론을 제시한다.\n\n## Practical\n교사 도구 및 실시간 스캐폴딩의 기초를 마련한다.\n\n# Limitations\n- 연구는 특정 지역의 초등학교에 국한되어 있다.\n- 게임 기반 학습의 효과를 일반화하기에는 제한적이다.\n\n# Transferable Insights\n- 순서 기반 학습 분석은 다른 언어 학습 환경에서도 적용 가능하다.\n- 실시간 피드백 메커니즘은 다양한 학습자에게 유용할 수 있다.\n\n# Idea Seeds\n1. 다양한 언어에 대한 형태통사적 추론 분석 연구.\n2. 게임 기반 학습의 효과를 평가하기 위한 장기 연구.\n3. AI 기반 개인화 학습 도구 개발.\n\n# Citation Snippets\n> Geoffre, T., & Geoffre, T. (2026). Modeling Grammatical Hypothesis Testing in Young Learners: A Sequence-Based Learning Analytics Study of Morphosyntactic Reasoning in an Interactive Game. LAK '26.\n\ntags: #learning_analytics, #grammatical_reasoning, #morphosyntax, #action_sequences, #primary_education, #french_language, #stealth_assessment\n\n---\n\n### 압축 요약\n본 연구는 초등학생의 문법적 추론을 순서 기반 학습 분석을 통해 조사하였다. 100명의 학생으로부터 597회의 게임 세션을 분석한 결과, 결정사와 동사가 주요 오류 지점으로 나타났으며, 학습자들이 동사를 먼저 고정하는 경향이 관찰되었다. 연구는 순서 기반 분석이 언어적 추론의 복잡성을 이해하는 데 기여할 수 있음을 보여준다.", "link": "https://arxiv.org/abs/2603.02084v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Thierry Geoffre", "Trystan Geoffre"], "categories": ["cs.CL"]}, {"id": "1", "source": "ERIC", "score": 20, "day": "명시되지 않음", "title": "From Technology-Challenged Teachers to Empowered Digitalized Citizens: Exploring the Profiles and Antecedents of Teacher AI Literacy in the Chinese EFL Context", "content": "---\ntitle: From Technology-Challenged Teachers to Empowered Digitalized Citizens: Exploring the Profiles and Antecedents of Teacher AI Literacy in the Chinese EFL Context\nauthors: [Ziwen Pan, Yongliang Wang]\nyear: 명시되지 않음\njournal: ERIC\ndoi: 명시되지 않음\nresearch_type: 양적 및 질적 연구\nmethodology: 잠재 프로필 분석, 다항 로지스틱 회귀 분석, 반구조화 인터뷰\ndata_type: 설문조사 데이터, 인터뷰 데이터\nsample: 782명의 영어 교사\ncontext: 중국 EFL 맥락\ntheoretical_framework: AI 문해력\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 중국 EFL 맥락에서 교사의 AI 문해력에 대한 연구로, 782명의 영어 교사를 대상으로 AI 문해력의 개인차를 분석하고, 연령 및 교육 경력과의 관계를 조사하였다. 연구진은 AI 문해력을 측정하기 위한 신뢰할 수 있는 도구가 부족하다는 점을 인식하고, \"AI 지식\", \"AI 사용\", \"AI 평가\", \"AI 설계\", \"AI 윤리\"의 다섯 가지 하위 척도로 구성된 척도를 개발하고 검증하였다. 잠재 프로필 분석 결과, 네 가지의 AI 문해력 프로필이 도출되었으며, 다항 로지스틱 회귀 분석을 통해 AI 문해력과 연령 및 교육 경력 간의 유의미한 관계가 나타났다. 또한, 32명의 응답자를 대상으로 한 반구조화 인터뷰를 통해 질적 데이터를 분석하여 교사들의 AI 문해력에 대한 인식을 심층적으로 이해하였다.\n\n# Research Logic\n## Problem\n중국 EFL 맥락에서 교사의 AI 문해력에 대한 연구가 부족함.\n## Theory\nAI 문해력의 개념과 그 중요성.\n## Design\n양적 및 질적 연구 방법을 결합하여 교사 AI 문해력을 분석.\n## Findings\n네 가지 AI 문해력 프로필이 발견되었으며, 연령 및 교육 경력과의 유의미한 관계가 확인됨.\n## Conclusion\n교사의 AI 문해력 향상을 위한 이론적 및 실용적 함의를 제공.\n\n# Key Findings\n- AI 문해력 프로필: Poor AI literacy (C1: 12.1%), Moderate AI literacy (C2: 45.5%), Good AI literacy (C3: 28.4%), Excellent AI literacy (C4: 14.1%).\n- 연령 및 교육 경력과 AI 문해력 간의 유의미한 관계 발견.\n- 질적 데이터 분석을 통해 교사들의 AI 문해력에 대한 인식 심화.\n\n# Contributions\n## Theoretical\nAI 문해력의 개념을 명확히 하고, 교육 분야에서의 중요성을 강조.\n## Methodological\n신뢰할 수 있는 AI 문해력 측정 도구 개발 및 검증.\n## Practical\n교사의 AI 문해력 향상을 위한 교육적 시사점 제공.\n\n# Limitations\n- 연구의 시계열적 한계로 인한 일반화의 어려움.\n- 표본의 다양성이 부족할 수 있음.\n\n# Transferable Insights\n- AI 문해력 향상을 위한 교육 프로그램 개발 필요.\n- 교사의 연령 및 경력에 따른 맞춤형 지원 필요.\n\n# Idea Seeds\n1. AI 문해력 향상을 위한 교사 연수 프로그램 개발.\n2. 다양한 교육 맥락에서의 AI 문해력 연구 확장.\n3. AI 문해력 평가 도구의 국제적 비교 연구.\n\n# Citation Snippets\n> Pan, Z., & Wang, Y. (n.d.). From Technology-Challenged Teachers to Empowered Digitalized Citizens: Exploring the Profiles and Antecedents of Teacher AI Literacy in the Chinese EFL Context.\n\ntags: #human-ai collaboration, #ai literacy, #teacher ai, #education, #learning analytics, #ai pedagogy, #instructional design\n\n---\n\n요약: 본 연구는 중국 EFL 맥락에서 782명의 영어 교사를 대상으로 AI 문해력의 개인차를 분석하고, 연령 및 교육 경력과의 관계를 조사하였다. 네 가지 AI 문해력 프로필이 도출되었으며, 교사들의 AI 문해력에 대한 인식을 심층적으로 이해하기 위한 질적 데이터 분석도 포함되었다.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Ziwen Pan", "Yongliang Wang"], "categories": ["ERIC"]}, {"id": "2", "source": "OPENALEX", "score": 19, "day": "2019-12-01", "title": "Scaffolding support through integration of learning material", "content": "---\ntitle: Scaffolding support through integration of learning material\nauthors: [Christian Grévisse, Steffen Rothkugel, Robert Reuter]\nyear: 2019\njournal: Smart Learning Environments\ndoi: https://doi.org/10.1186/s40561-019-0107-0\nresearch_type: 실험적 연구\nmethodology: 혼합 방법\ndata_type: 정량적 및 정성적 데이터\nsample: 고등학생 및 대학생\ncontext: 교육 기술 및 학습 환경\ntheoretical_framework: 인지 부하 이론, 구성주의\nkeywords: [scaffolding, learning material, integration, semantic annotation]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 학습 자료의 통합을 통해 학생들에게 스캐폴딩 지원을 제공하는 ALMA-Yactul 생태계를 제안한다. 이 생태계는 의미적 주석을 기반으로 하여 학습자가 현재의 학습 과제와 관련된 자료를 쉽게 검색할 수 있도록 돕는다. 연구 결과, 전통적인 검색 과정에 비해 프로그래밍 관련 과제를 해결하는 데 있어 고등학생들이 유의미한 성과를 보였으며, 이는 스캐폴딩 지원의 효과를 입증한다. 또한, 교사들은 Office 365와 같은 도구에서 반자동 주석 지원을 통해 콘텐츠의 재사용성을 높일 수 있다. 이 연구는 기술 통합 모델에 대한 평가를 포함하여, 다양한 응용 프로그램에서의 활용 가능성을 보여준다.\n\n# Research Logic\n## Problem\n학습 자료의 양이 증가함에 따라 학생과 교사 모두에게 정보 검색의 어려움이 발생한다. 특히, 학생들은 필요한 정보를 찾기 위해 추가적인 검색을 해야 하며, 이는 학습 성과에 부정적인 영향을 미칠 수 있다.\n\n## Theory\n인지 부하 이론에 따르면, 학습자는 과제 수행 중 관련 정보를 검색하는 데 필요한 인지 자원을 소모하게 되어 학습 과정에 부정적인 영향을 미칠 수 있다.\n\n## Design\nALMA-Yactul 생태계는 의미적 주석을 통해 학습 자료를 통합하고, 학생들이 현재의 학습 과제와 관련된 자료를 쉽게 찾을 수 있도록 지원하는 구조로 설계되었다.\n\n## Findings\n고등학생들이 스캐폴딩 지원을 통해 프로그래밍 관련 과제를 해결하는 데 있어 전통적인 검색 방법에 비해 유의미한 성과를 보였다.\n\n## Conclusion\nALMA-Yactul 생태계는 학습 자료의 통합을 통해 학생들에게 효과적인 스캐폴딩 지원을 제공하며, 교사들에게는 콘텐츠의 재사용성을 높이는 데 기여할 수 있다.\n\n# Key Findings\n- ALMA-Yactul 생태계는 학습 자료의 통합을 통해 학생들에게 스캐폴딩 지원을 제공한다.\n- 고등학생들이 스캐폴딩 지원을 통해 프로그래밍 과제를 해결하는 데 있어 성과가 향상되었다.\n- 교사들은 반자동 주석 지원을 통해 콘텐츠의 재사용성을 높일 수 있다.\n\n# Contributions\n## Theoretical\n인지 부하 이론과 구성주의에 기반한 스캐폴딩 지원의 효과를 입증하였다.\n\n## Methodological\n혼합 방법을 사용하여 정량적 및 정성적 데이터를 수집하고 분석하였다.\n\n## Practical\nALMA-Yactul 생태계는 교육 현장에서의 학습 자료 통합 및 스캐폴딩 지원을 위한 실용적인 도구로 기능할 수 있다.\n\n# Limitations\n- 연구는 특정 학습 환경에 국한되어 있으며, 다양한 교육 맥락에서의 일반화가 필요하다.\n- 스캐폴딩 지원의 장기적인 효과에 대한 추가 연구가 필요하다.\n\n# Transferable Insights\n- 스캐폴딩 지원은 다양한 학습 환경에서 학습 성과를 향상시킬 수 있는 잠재력을 지닌다.\n- 의미적 주석을 통한 학습 자료의 통합은 교육 기술의 발전에 기여할 수 있다.\n\n# Idea Seeds\n1. ALMA-Yactul 생태계를 다른 학문 분야에 적용하여 효과를 검증하는 연구.\n2. 스캐폴딩 지원의 장기적인 효과를 평가하기 위한 후속 연구.\n3. 다양한 교육 도구와의 통합 가능성을 탐색하는 연구.\n\n# Citation Snippets\n> Grévisse, C., Rothkugel, S., & Reuter, R. A. P. (2019). Scaffolding support through integration of learning material. *Smart Learning Environments*, 6(1), 28. https://doi.org/10.1186/s40561-019-0107-0\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy\n\n---\n\n**압축 요약**  \n본 연구는 ALMA-Yactul 생태계를 통해 학습 자료의 통합과 스캐폴딩 지원을 제공하며, 고등학생들이 프로그래밍 과제를 해결하는 데 있어 유의미한 성과를 보였음을 입증한다. 교사들은 반자동 주석 지원을 통해 콘텐츠의 재사용성을 높일 수 있다. 이 연구는 교육 기술의 발전에 기여할 수 있는 실용적인 도구로 기능할 수 있다.", "link": "https://doi.org/10.1186/s40561-019-0107-0", "altLink": "https://openalex.org/W2996442609", "hasDoi": true, "hasReview": true, "authors": ["Christian Grévisse", "Steffen Rothkugel", "Robert Reuter"], "categories": ["Plug-in", "Suite", "Computer science", "Task (project management)", "Reusability"]}, {"id": "3", "source": "ERIC", "score": 16, "day": "명시되지 않음", "title": "ChatGPT and Imaginaries of the Future of Education: Insights of Finnish Teacher Educators", "content": "---\ntitle: ChatGPT와 교육의 미래에 대한 상상: 핀란드 교사 교육자들의 통찰\nauthors: [Henriikka Vartiainen, Teemu Valtonen, Juho Kahila, Matti Tedre]\nyear: 명시되지 않음\njournal: ERIC\ndoi: 명시되지 않음\nresearch_type: 질적 연구\nmethodology: 워크숍 기반 연구\ndata_type: 명시되지 않음\nsample: 핀란드 교사 교육자들\ncontext: 핀란드 교육 시스템\ntheoretical_framework: 명시되지 않음\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 핀란드 교사 교육자들이 교육에서 생성적 AI의 사용에 대해 어떻게 인식하고 있는지를 조사하였다. 연구는 교사 교육 워크숍을 통해 진행되었으며, 참가자들은 생성적 AI의 작동 방식에 대해 배우고, 협력적으로 탐구한 후 그 잠재력과 도전에 대해 반성하였다. 연구 결과는 교육 정책, 평가 및 교육의 사회문화적 맥락에 대한 깊은 이해에 뿌리를 둔 세밀하고 사려 깊은 상상력을 드러낸다. 교사들은 AI가 학습자의 주체성, 메타인지, 자기 조절 등에 미치는 영향에 대한 견해를 공유하였다.\n\n# Research Logic\n## Problem\n생성적 AI의 교육적 사용에 대한 교사 교육자들의 다양한 희망과 우려를 점검할 필요성이 대두됨.\n## Theory\n기존의 기술 결정론적 서사에서 벗어나 AI가 교육적 실천과 어떻게 조화를 이룰 수 있는지를 탐구.\n## Design\n핀란드의 교사 교육자들을 대상으로 한 워크숍을 통해 질적 데이터를 수집.\n## Findings\nAI는 형성적 평가 관행과 메타인지, 자기 조절, 책임감 및 웰빙의 발전을 지원하는 수단으로 인식됨.\n## Conclusion\nAI 교육은 사회적 및 윤리적 관점을 비판적으로 통합하고, 지속 가능한 AI의 미래 비전을 촉진할 필요가 있음.\n\n# Key Findings\n- 핀란드 교사 교육자들은 생성적 AI의 교육적 잠재력을 긍정적으로 평가함.\n- AI는 학습자의 주체성과 자기 조절 능력 향상에 기여할 수 있음.\n- 교육 정책 및 사회문화적 맥락에 대한 깊은 이해가 AI 활용에 중요한 요소로 작용함.\n\n# Contributions\n## Theoretical\n기존의 기술 결정론적 관점을 넘어서는 새로운 교육적 상상력을 제시.\n## Methodological\n워크숍 기반의 질적 연구 방법론을 통해 교육자들의 실제 경험을 반영.\n## Practical\nAI 교육의 필요성과 사회적, 윤리적 관점을 통합한 교육적 접근 방식을 제안.\n\n# Limitations\n- 연구의 샘플이 핀란드 교사 교육자들로 한정되어 있어 일반화에 한계가 있음.\n- 데이터 수집 방법이 워크숍에 의존하여 다양한 맥락을 포괄하지 못할 수 있음.\n\n# Transferable Insights\n- 생성적 AI의 교육적 활용에 대한 교사들의 인식은 지역적 맥락에 따라 다를 수 있음.\n- AI 교육은 기술적 측면뿐만 아니라 사회적, 윤리적 측면을 고려해야 함.\n\n# Idea Seeds\n1. 생성적 AI를 활용한 형성적 평가 도구 개발.\n2. AI 교육을 위한 교사 연수 프로그램 설계.\n3. AI의 사회적 책임을 강조하는 교육 커리큘럼 개발.\n\n# Citation Snippets\n> Vartiainen, H., Valtonen, T., Kahila, J., & Tedre, M. (n.d.). ChatGPT와 교육의 미래에 대한 상상: 핀란드 교사 교육자들의 통찰. ERIC.\n\ntags: #human-ai_collaboration, #classroom_ai, #ai_tutoring, #instructional_design, #scaffolding, #ai_literacy, #education, #ai_pedagogy\n\n---\n\n짧은 요약: 본 연구는 핀란드 교사 교육자들이 생성적 AI의 교육적 사용에 대한 인식을 조사하였다. 연구 결과, AI는 학습자의 주체성과 자기 조절 능력 향상에 기여할 수 있는 도구로 인식되었으며, AI 교육은 사회적 및 윤리적 관점을 통합해야 한다는 필요성이 강조되었다.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Henriikka Vartiainen", "Teemu Valtonen", "Juho Kahila"], "categories": ["ERIC"]}, {"id": "4", "source": "ERIC", "score": 16, "day": "명시되지 않음", "title": "Human-AI Collaboration Patterns in AI-Assisted Academic Writing", "content": "---\ntitle: Human-AI Collaboration Patterns in AI-Assisted Academic Writing\nauthors: [Andy Nguyen, Yvonne Hong, Belle Dang, Xiaoshan Huang]\nyear: 명시되지 않음\njournal: ERIC\ndoi: 명시되지 않음\nresearch_type: 질적 연구\nmethodology: AI 기반 학습 분석 접근법\ndata_type: 기록된 활동 데이터\nsample: 10명의 박사 과정 학생\ncontext: 고등 교육에서의 AI 활용\ntheoretical_framework: 명시되지 않음\nkeywords: [human-ai collaboration, academic writing, generative AI, learning analytics, doctoral students]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 AI 지원 도구와의 협업에서 박사 과정 학생들이 사용하는 전략을 조사하며, AI가 학술 작문에 미치는 영향을 분석한다. 10명의 박사 과정 학생의 626개의 기록된 활동을 분석하였으며, AI 기반 학습 분석 접근법을 통해 세 가지 계층적 분석을 수행하였다. 연구 결과, GAI 도구와의 반복적이고 상호작용적인 과정에 참여하는 학생들이 더 나은 작문 성과를 달성하는 경향이 있는 반면, GAI를 단순한 정보 출처로 사용하는 학생들은 낮은 성과를 보였다. 이는 고등 교육에서의 인간-AI 협업에 대한 추가 연구의 필요성을 강조하며, 맞춤형 교육 전략의 개발에 대한 시사점을 제공한다.\n\n# Research Logic\n## Problem\nAI가 학술 작문에 미치는 영향과 인간-AI 상호작용의 역동성이 명확히 규명되지 않음.\n## Theory\nAI와의 협업이 학술 작문 성과에 미치는 영향에 대한 이론적 배경이 부족함.\n## Design\n10명의 박사 과정 학생의 GAI 도구와의 상호작용을 기록하고 분석함.\n## Findings\n반복적이고 상호작용적인 접근이 작문 성과를 향상시킴.\n## Conclusion\nAI 도구와의 효과적인 협업이 학술 작문 성과에 긍정적인 영향을 미친다는 점을 강조함.\n\n# Key Findings\n- GAI 도구와의 반복적 상호작용이 작문 성과를 향상시킴.\n- 단순한 정보 출처로 GAI를 사용하는 경우 낮은 성과를 보임.\n- 인간-AI 협업의 중요성이 고등 교육에서 강조됨.\n\n# Contributions\n## Theoretical\nAI와의 협업이 학술 작문 성과에 미치는 영향을 이론적으로 탐구함.\n## Methodological\nAI 기반 학습 분석 접근법을 통해 질적 연구의 새로운 방법론을 제시함.\n## Practical\n고등 교육에서의 AI 활용에 대한 맞춤형 교육 전략 개발에 기여함.\n\n# Limitations\n- 연구 샘플이 제한적임.\n- 연구 기간 및 맥락이 명시되지 않음.\n\n# Transferable Insights\n- AI 도구와의 효과적인 협업 전략이 필요함.\n- 고등 교육에서 AI 활용의 중요성을 인식해야 함.\n\n# Idea Seeds\n1. GAI 도구와의 협업을 위한 교육 프로그램 개발.\n2. 다양한 학문 분야에서의 AI 활용 연구 확대.\n3. 인간-AI 상호작용의 역동성을 탐구하는 추가 연구.\n\n# Citation Snippets\n> Nguyen, A., Hong, Y., Dang, B., & Huang, X. (명시되지 않음). Human-AI Collaboration Patterns in AI-Assisted Academic Writing. ERIC.\n\ntags: #human-ai collaboration, #academic writing, #generative AI, #learning analytics, #doctoral students, #AI pedagogy, #education\n\n---\n\n요약: 본 연구는 AI 지원 도구와의 협업에서 박사 과정 학생들이 사용하는 전략을 조사하며, AI가 학술 작문에 미치는 영향을 분석한다. 연구 결과, GAI 도구와의 반복적이고 상호작용적인 과정이 작문 성과를 향상시키는 경향이 있음을 보여준다.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Andy Nguyen", "Yvonne Hong", "Belle Dang"], "categories": ["ERIC"]}, {"id": "5", "source": "ERIC", "score": 16, "day": "명시되지 않음", "title": "Analysis of Influencing Factors on Teachers&apos; AI Literacy under the SOR Framework: An Empirical Study Based on PLS-SEM and fsQCA", "content": "This study, grounded in the stimulus-organism-response (SOR) theory, aims to explore how stimulus factors (school support) influence cognitive organisms (psychological resilience, self-efficacy, attitude toward AI, and acceptance of AI), which in turn enhance behavioral responses (AI literacy), while also examining the detrimental effects of AI anxiety. A cross-sectional design was employed, utilizing sample data from 1,518 teachers. The results of PLS-SEM indicate that school support exerts a significant positive impact on psychological resilience, self-efficacy, attitude toward AI, and acceptance of AI. These cognitive factors, in turn, significantly enhance AI literacy. However, while AI anxiety negatively affects these cognitive factors, it does not exhibit a significant direct impact on AI literacy. Additionally, the study reveals the mediating roles of psychological resilience, self-efficacy, attitude toward AI, and acceptance of AI in the relationship between school support and AI literacy. The findings of fsQCA identify five high-level configurational pathways and one non-high-level pathway, demonstrating an asymmetric relationship between these configurations. The consistency values of all six pathways exceed 0.9, indicating that these configurations are sufficient conditions influencing teachers' AI literacy. This study provides a theoretical framework for analyzing factors affecting teachers' AI literacy and offers practical guidance for policy interventions and innovative practices to enhance teachers' AI literacy.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Yimin Ning", "Hanyi Zheng", "Hongde Wu"], "categories": ["ERIC"]}, {"id": "6", "source": "ERIC", "score": 16, "day": "명시되지 않음", "title": "Differences in Student-AI Interaction Process on a Drawing Task: Focusing on Students&apos; Attitude towards AI and the Level of Drawing Skills", "content": "Recent advances and applications of artificial intelligence (AI) have increased the opportunities for students to interact with AI in their learning tasks. Although various fields of scholarly research have investigated human-AI collaboration, the underlying processes of how students collaborate with AI in a student-AI teaming scenario have been scarcely investigated. To develop effective AI applications in education, it is necessary to understand differences in the student-AI interaction (SAI) process depending on students' characteristics. The present study attempts to fill this gap by exploring the differences in the SAI process amongst students with varying drawing proficiencies and attitudes towards AI in performing a public advertisement drawing task. Based on the empirical evidence obtained from the think-aloud protocols of 20 Korean undergraduate students, the study first conducted a lag sequential analysis to identify statistically significant linear patterns of each group and then chronologically incorporated them into the SAI duration via coded activity alignment series to distinguish the overall SAI process of each group. The study revealed the distinctive differences in SAI processes of students with different attitudes towards AI and drawing skills. To better facilitate student-AI teams for learning, a range of implications of educational AI development and instructional design is discussed.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Jinhee Kim", "Yoonhee Ham", "Sang-Soog Lee"], "categories": ["ERIC"]}, {"id": "7", "source": "ERIC", "score": 16, "day": "명시되지 않음", "title": "Empowering Online Adult Educators: Integrating Artificial Intelligence for Enhanced Instructional Strategies", "content": "This article explores how artificial intelligence (AI) can support online adult learning by aligning with Knowles' four principles of andragogy: involvement, experience, problem-centeredness, and relevance. Three activities were analyzed using a comparative case study (CCS) method. Each case represents a distinct instructional application of ChatGPT: supporting online discussions, simulating professional interviews, and providing assignment feedback. Findings show that the integration of AI in learning can motivate learner autonomy, provide timely feedback, and encourage reflective and relevant engagement with AI-generated content. However, challenges such as shallow AI responses, emotional disconnect, and concerns regarding trust and accuracy were observed. The findings also indicate a shift in faculty's role from content deliverer to AI-assisted learning facilitator, requiring new competencies in AI literacy, the ethical use of AI, and instructional design. This study contributes to the emerging field of AI in Adult Education (AIAD) by highlighting both the practical opportunities and important considerations for adult educators interested in integrating AI in their teaching.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Xi Lin", "Steve W. Schmidt"], "categories": ["ERIC"]}, {"id": "8", "source": "ERIC", "score": 16, "day": "명시되지 않음", "title": "How AI Makes its Mark on Instructional Design", "content": "Artificial Intelligence (AI) has revolutionized various aspects of human activities, profoundly impacting the landscape of higher education, particularly in the domain of teaching and learning. This paper aims to discuss the topic of instructional design from both a human and technological perspective. A comparison between current learning methods and AI-enabled learning approach will be presented. Additionally, the potential shifts of the current ID practices, especially the role of AI in the instructional process, including its impact on analysis, design, development, and evaluation will also be discussed. By leveraging AI functionality, humans can be released from performing fundamental activities and focus on tasks or activities which are more complex. Hence, this paper will also provide some insights on some new emerging roles (i.e., AI content strategist and AI technology specialist) that are prospering and certain specific roles (i.e., content accessor and learning experience designer) that are gaining more significance in the instructional design process. It is also crucial to understand how human and machine interact and the ways it allows an improvement of the learning experience of the individuals in the AI-enabled learning ecosystem. Hence, the potential benefits and challenges will be discussed and recommendations for future practice will also be offered.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Lay Kee Ch'ng"], "categories": ["ERIC"]}, {"id": "9", "source": "ERIC", "score": 16, "day": "명시되지 않음", "title": "Artificial Intelligence (AI) Literacy in Early Childhood Education: An Intervention Study in Hong Kong", "content": "The issue of Artificial Intelligence (AI) literacy is gaining popularity in the field of education. Most research on AI literacy has focused on primary, secondary, and higher education, and there has been limited examination of AI literacy programs in early childhood education. This study aimed to evaluate the impact of an eight-week AI literacy program on young children's AI literacy, AI-related creativity, and their perceptions of the AI4KG program. A total of 26 young children (average age of 4 years) enrolled in the program at a kindergarten in Hong Kong were the subjects of the study. The results indicated that (1) young children were capable of learning basic AI concepts and knowledge; (2) in terms of AI-related creativity, younger children were able to design a chatting robot via imagination, while older children created an AI robot to assist people in their drawings; (3) in regards to the children's perceptions of the AI4KG program, older children who enjoyed the activity were able to train AI, while younger children preferred to draw the future AI city and participate in the AI story activity. This study highlights the positive benefits of AI literacy education in preparing young children for an AI-driven future.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Jiahong Su", "Weipeng Yang"], "categories": ["ERIC"]}];

}

  const headers = ['제목', '출처', '스코어', '리뷰여부', '링크'];
  const rows = filtered.map(p => [
    '"' + p.title.replace(/"/g, '""') + '"',
    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
