<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-03-20 23:28</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "ARXIV", "score": 24, "day": "2026-03-19", "title": "CyberJustice Tutor: An Agentic AI Framework for Cybersecurity Learning via Think-Plan-Act Reasoning and Pedagogical Scaffolding", "content": "---\ntitle: CyberJustice Tutor: An Agentic AI Framework for Cybersecurity Learning via Think-Plan-Act Reasoning and Pedagogical Scaffolding\nauthors: [Baiqiang Wang, Yan Bai, Juan Li]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2603.18470v1\nresearch_type: 실험 연구\nmethodology: 사용자 연구\ndata_type: 정량적 및 정성적 데이터\nsample: 123명 (학생, 교육자, 법 집행관 포함)\ncontext: 사이버 보안 교육\ntheoretical_framework: Vygotsky의 근접 발달 영역(ZPD)\nkeywords: [Agentic AI, Intelligent Tutoring Systems, Cybersecurity Education]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 사이버 보안 교육을 위한 CyberJustice Tutor라는 교육 대화 시스템을 제안한다. 이 시스템은 \"Think-Plan-Act\" 인지 사이클을 활용하여 목표 분해, 장기 계획 수립 및 동적 맥락 유지를 가능하게 한다. Vygotsky의 근접 발달 영역(ZPD)에 기반한 교육적 스캐폴딩 레이어를 통합하여 학습자의 실시간 진행 상황에 따라 지원을 조정한다. 123명의 참가자를 대상으로 한 사용자 연구 결과, 응답 속도(4.7/5), 사용 용이성(4.4/5), 정확성(4.3/5)에서 높은 사용자 수용성을 보였다. 질적 피드백은 에이전트 구조가 개인화된 학습 경로를 안내하는 데 매우 효과적이라고 평가되었다.\n\n# Research Logic\n## Problem\n사이버 보안 교육에서 LLM의 통합은 반응형 챗봇의 \"무상태성\"과 법적 맥락에서의 환각 위험으로 인해 제한되고 있다.\n## Theory\nVygotsky의 근접 발달 영역(ZPD)을 기반으로 한 교육적 스캐폴딩을 통해 학습자의 필요에 맞춘 지원을 제공한다.\n## Design\n\"Think-Plan-Act\" 인지 사이클을 사용하여 목표를 분해하고 장기적인 교육 계획을 수립한다.\n## Findings\n사용자 연구에서 높은 응답 속도, 사용 용이성 및 정확성을 기록하며, 에이전트 구조의 효과성을 입증하였다.\n## Conclusion\nCyberJustice Tutor는 전문 교육을 위한 에이전틱 AI의 가능성과 사용성을 보여준다.\n\n# Key Findings\n- CyberJustice Tutor는 \"Think-Plan-Act\" 인지 사이클을 통해 목표 분해 및 장기 계획 수립을 가능하게 한다.\n- 사용자 연구에서 응답 속도 4.7/5, 사용 용이성 4.4/5, 정확성 4.3/5를 기록하였다.\n- 에이전트 구조는 개인화된 학습 경로를 효과적으로 안내하는 것으로 평가되었다.\n\n# Contributions\n## Theoretical\n에이전틱 AI 프레임워크와 Vygotsky의 ZPD를 통합하여 교육적 스캐폴딩의 새로운 모델을 제시하였다.\n## Methodological\n사용자 연구를 통해 시스템의 유용성과 수용성을 실증적으로 검증하였다.\n## Practical\n전문 교육에 적합한 AI 기반 교육 도구의 설계 및 구현에 기여하였다.\n\n# Limitations\n- 연구 샘플이 특정 집단(학생, 교육자, 법 집행관)으로 제한되어 일반화에 한계가 있다.\n- 장기적인 효과에 대한 검증이 필요하다.\n\n# Transferable Insights\n- 에이전틱 AI는 교육적 맥락에서 효과적인 개인화된 학습 경로를 제공할 수 있다.\n- Vygotsky의 이론을 기반으로 한 스캐폴딩 전략이 학습 효과를 향상시킬 수 있다.\n\n# Idea Seeds\n1. 다양한 교육 분야에 적용 가능한 에이전틱 AI 모델 개발.\n2. 사용자 피드백을 통한 지속적인 시스템 개선 메커니즘 구축.\n3. 법적 맥락에서의 AI 활용에 대한 윤리적 고려 사항 연구.\n\n# Citation Snippets\n> Wang, B., Bai, Y., & Li, J. (2026). CyberJustice Tutor: An Agentic AI Framework for Cybersecurity Learning via Think-Plan-Act Reasoning and Pedagogical Scaffolding. arXiv. https://arxiv.org/abs/2603.18470v1\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy", "link": "https://arxiv.org/abs/2603.18470v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Baiqiang Wang", "Yan Bai", "Juan Li"], "categories": ["cs.HC"]}, {"id": "1", "source": "ARXIV", "score": 19, "day": "2026-03-18", "title": "TeachingCoach: A Fine-Tuned Scaffolding Chatbot for Instructional Guidance to Instructors", "content": "---\ntitle: TeachingCoach: A Fine-Tuned Scaffolding Chatbot for Instructional Guidance to Instructors\nauthors: [Isabel Molnar, Peiyu Li, Si Chen, Sugana Chawla, James Lang, Ronald Metoyer, Ting Hua, Nitesh V. Chawla]\nyear: 2026\njournal: Proceedings of ACM Learning at Scale conference\ndoi: https://doi.org/10.1145/nnnnnnn.nnnnnnn\nresearch_type: 실험적 연구\nmethodology: 사용자 연구 및 전문가 평가\ndata_type: 대화 데이터\nsample: 41명의 고등 교육 강사\ncontext: 고등 교육 강사의 전문성 개발 지원\ntheoretical_framework: 교육학적 원칙 및 대화형 AI\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\nTeachingCoach는 고등 교육 강사를 위한 교육적 지원을 제공하는 챗봇으로, 실시간 대화형 지침을 통해 강사의 전문성 개발을 지원한다. 이 시스템은 교육 자료에서 추출한 교육학적 규칙을 기반으로 하여 합성 대화를 생성하고, 이를 통해 강사가 문제를 식별하고 진단하며 전략을 개발할 수 있도록 돕는다. 전문가 평가 결과, TeachingCoach는 GPT-4o 미니 기준 모델보다 더 명확하고 반영적이며 응답성이 높은 지침을 제공하는 것으로 나타났다. 사용자 연구에서는 대화의 깊이와 상호작용 효율성 간의 균형을 강조하며, 교육학적으로 기반한 합성 데이터 챗봇이 교육 지원을 개선할 수 있음을 보여준다.\n\n# Research Logic\n## Problem\n고등 교육 강사들은 시기적절하고 교육학적으로 기반이 있는 지원을 받기 어려운 상황에 처해 있다.\n## Theory\nTeachingCoach는 교육학적 원칙에 기반하여 강사에게 대화형 지침을 제공하는 시스템이다.\n## Design\n데이터 중심의 파이프라인을 통해 교육 자료에서 교육학적 규칙을 추출하고, 이를 기반으로 합성 대화를 생성하여 모델을 미세 조정한다.\n## Findings\nTeachingCoach는 GPT-4o 미니 모델보다 더 높은 평가를 받았으며, 대화의 깊이와 상호작용 효율성 간의 트레이드오프가 존재한다.\n## Conclusion\nTeachingCoach는 교육 지원을 개선할 수 있는 가능성을 보여주며, 향후 교육 챗봇 시스템의 확장 가능성을 제시한다.\n\n# Key Findings\n- TeachingCoach는 GPT-4o 미니 모델보다 명확하고 반영적인 지침을 제공한다.\n- 사용자 연구에서 대화의 깊이와 상호작용 효율성 간의 균형이 중요하다는 점이 강조되었다.\n- 교육학적으로 기반한 합성 데이터 챗봇이 교육 지원을 개선할 수 있는 가능성이 있다.\n\n# Contributions\n## Theoretical\n교육학적 원칙에 기반한 대화형 AI의 가능성을 제시한다.\n## Methodological\n합성 데이터 생성 및 전문가 평가를 통한 연구 설계를 사용하였다.\n## Practical\n고등 교육 강사를 위한 실시간 지원 시스템의 설계 및 구현 가능성을 보여준다.\n\n# Limitations\n- 연구 샘플이 제한적이며, 특정 지역의 강사들로만 구성되었다.\n- 대화의 깊이와 효율성 간의 트레이드오프가 모든 사용자에게 동일하게 적용되지 않을 수 있다.\n\n# Transferable Insights\n- 교육학적 원칙을 기반으로 한 AI 시스템의 개발이 필요하다.\n- 사용자 요구에 따라 대화형 AI의 깊이와 효율성을 조정할 수 있는 시스템이 필요하다.\n\n# Idea Seeds\n1. TeachingCoach의 기능을 확장하여 다양한 교육 환경에 맞춤형 지원을 제공할 수 있는 방법.\n2. AI 기반 교육 지원 시스템의 사용자 경험을 개선하기 위한 연구.\n3. 교육학적 원칙을 기반으로 한 다른 분야의 AI 시스템 개발 가능성 탐색.\n\n# Citation Snippets\n> Molnar, I., Li, P., Chen, S., Chawla, S., Lang, J., Metoyer, R., Hua, T., & Chawla, N. V. (2026). TeachingCoach: A Fine-Tuned Scaffolding Chatbot for Instructional Guidance to Instructors. In Proceedings of ACM Learning at Scale conference (Learning@Scale ’26). ACM.\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #ai literacy, #education", "link": "https://arxiv.org/abs/2603.18189v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Isabel Molnar", "Peiyu Li", "Si Chen"], "categories": ["cs.AI"]}, {"id": "2", "source": "ARXIV", "score": 14, "day": "2026-03-18", "title": "EDM-ARS: A Domain-Specific Multi-Agent System for Automated Educational Data Mining Research", "content": "---\ntitle: EDM-ARS: A Domain-Specific Multi-Agent System for Automated Educational Data Mining Research\nauthors: [Chenguang Pan, Zhou Zhang, Weixuan Xiao, Chengyuan Yao]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2603.18273v1\nresearch_type: 기술 보고서\nmethodology: 다중 에이전트 시스템\ndata_type: 교육 데이터\nsample: HSLS:09 데이터셋 (약 23,500명 학생)\ncontext: 교육 데이터 마이닝\ntheoretical_framework: 명시되지 않음\nkeywords: [교육 데이터 마이닝, 자동화 연구, 다중 에이전트 시스템, 대형 언어 모델]\n---\n\n# APA 7th style\n\n# Summary\n이 기술 보고서에서는 교육 데이터 마이닝 자동화 연구 시스템(EDM-ARS)을 제시한다. EDM-ARS는 교육 연구 생애 주기의 각 단계에 교육 전문 지식을 통합한 도메인 특화 다중 에이전트 파이프라인으로, 예측 모델링 작업에 초점을 맞춘다. 이 시스템은 문제 제기, 데이터 처리, 분석, 비평, 작성을 담당하는 다섯 개의 LLM 기반 에이전트를 조정하여 완전한 LaTeX 원고를 생성한다. 현재 시스템의 한계로는 단일 데이터셋 범위와 공식적인 논문 출력이 있으며, 향후 인과 추론 및 다중 데이터셋 일반화를 지원할 계획이다.\n\n# Research Logic\n## Problem\n기존의 자동화 연구 시스템은 교육 데이터 마이닝 분야의 전문 지식을 결여하고 있어, 방법론적으로 결함이 있는 연구 결과를 초래할 수 있다.\n\n## Theory\nEDM-ARS는 교육 데이터 마이닝의 표준화된 방법론을 기반으로 하여, 도메인 지식을 구조적으로 통합한 시스템이다.\n\n## Design\nEDM-ARS는 다섯 개의 전문 에이전트를 통해 연구 질문을 정의하고, 데이터를 처리하며, 분석을 수행하고, 최종적으로 논문을 작성하는 구조로 설계되었다.\n\n## Findings\nEDM-ARS는 주어진 연구 프롬프트와 데이터셋을 바탕으로 완전한 LaTeX 원고를 생성하며, 각 단계에서의 품질 검토를 통해 신뢰성을 높인다.\n\n## Conclusion\nEDM-ARS는 교육 연구 커뮤니티를 지원하기 위해 오픈 소스로 제공되며, 향후 다양한 교육 데이터 마이닝 작업을 지원할 예정이다.\n\n# Key Findings\n- EDM-ARS는 다섯 개의 LLM 기반 에이전트를 통해 교육 데이터 마이닝 연구를 자동화한다.\n- 시스템은 각 단계에서 품질 검토를 수행하여 신뢰성을 높인다.\n- 현재는 HSLS:09 데이터셋을 사용하며, 향후 다양한 데이터셋을 지원할 계획이다.\n\n# Contributions\n## Theoretical\nEDM-ARS는 교육 데이터 마이닝의 방법론적 지식을 구조적으로 통합한 최초의 시스템이다.\n\n## Methodological\n자동화된 연구 파이프라인을 통해 교육 연구의 효율성을 높인다.\n\n## Practical\n교육 연구자들이 보다 쉽게 연구를 수행할 수 있도록 지원하는 오픈 소스 프로젝트로 제공된다.\n\n# Limitations\n- 단일 데이터셋에 대한 범위 제한.\n- 공식적인 논문 출력의 형식적 구조.\n\n# Transferable Insights\n- 도메인 특화 지식의 중요성을 강조한다.\n- 자동화된 연구 시스템의 품질 검토 메커니즘의 필요성을 보여준다.\n\n# Idea Seeds\n1. 다양한 교육 데이터셋을 지원하는 EDM-ARS의 확장.\n2. 인과 추론 및 전이 학습을 위한 추가 기능 개발.\n3. 교육 데이터 마이닝 외의 다른 분야로의 적용 가능성 탐색.\n\n# Citation Snippets\n> Pan, C., Zhang, Z., Xiao, W., & Yao, C. (2026). EDM-ARS: A Domain-Specific Multi-Agent System for Automated Educational Data Mining Research. arXiv. https://arxiv.org/abs/2603.18273v1\n\ntags: #교육데이터마이닝, #자동화연구, #다중에이전트시스템, #대형언어모델, #EDMARS, #교육연구, #AI교육", "link": "https://arxiv.org/abs/2603.18273v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Chenguang Pan", "Zhou Zhang", "Weixuan Xiao"], "categories": ["cs.AI"]}, {"id": "3", "source": "OPENALEX", "score": 14, "day": "2026-01-16", "title": "Can Generative Artificial Intelligence Effectively Enhance Students’ Mathematics Learning Outcomes?—A Meta-Analysis of Empirical Studies from 2023 to 2025", "content": "---\ntitle: Can Generative Artificial Intelligence Effectively Enhance Students’ Mathematics Learning Outcomes?—A Meta-Analysis of Empirical Studies from 2023 to 2025\nauthors: Baoxin Liu, Wenlan Zhang, Fangfang Wang\nyear: 2026\njournal: MDPI Education Sciences\ndoi: https://doi.org/10.3390/educsci16010140\nresearch_type: 메타 분석\nmethodology: 사전 등록된 메타 분석\ndata_type: 양적 데이터\nsample: 22개의 실증 연구, 46개의 독립 샘플, N = 5232\ncontext: 수학 교육\ntheoretical_framework: 명시되지 않음\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 생성적 인공지능(GenAI)이 학생들의 수학 학습 성과에 미치는 영향을 체계적으로 검토한 메타 분석이다. 2023년부터 2025년까지 발표된 22개의 실증 연구를 분석한 결과, GenAI는 학생들의 수학 학습 성과에 중간 정도의 긍정적인 영향을 미치는 것으로 나타났다(g = 0.534). GenAI의 교육 통합 수준, 샘플 크기, 학습 내용이 이 효과에 주요한 영향을 미치는 요인으로 밝혀졌다. 특히 창의적 변환 통합 모드에서 효과가 가장 두드러졌으며, 기하학 학습에 적용될 때 유의미한 결과를 보였다.\n\n# Research Logic\n## Problem\n생성적 인공지능의 수학 교육에서의 효과에 대한 실증적 결과가 일관되지 않음.\n## Theory\nGenAI의 통합 수준과 학습 환경이 학습 성과에 미치는 영향을 분석.\n## Design\n22개의 실증 연구를 대상으로 한 메타 분석.\n## Findings\nGenAI는 학생들의 수학 학습 성과에 중간 정도의 긍정적 영향을 미침(g = 0.534).\n## Conclusion\nGenAI의 효과는 창의적 변환 통합 모드에서 가장 두드러지며, 협력 학습 접근법이 성과를 강화함.\n\n# Key Findings\n- GenAI는 학생들의 수학 학습 성과에 중간 정도의 긍정적인 영향을 미침(g = 0.534).\n- 창의적 변환 통합 모드에서 효과가 가장 두드러짐.\n- 협력 학습 접근법이 수학 학습 성과를 유의미하게 향상시킴.\n\n# Contributions\n## Theoretical\nGenAI의 교육적 통합이 학습 성과에 미치는 영향을 체계적으로 분석함.\n## Methodological\n사전 등록된 메타 분석을 통해 연구의 신뢰성을 높임.\n## Practical\n미래의 인간-기계 협력 학습 환경 구축에 대한 참고 자료 제공.\n\n# Limitations\n- 교육 단계와 개입 기간이 유의미한 조절 효과를 보이지 않음.\n- 연구의 일부 변수에 대한 명시적 설명 부족.\n\n# Transferable Insights\n- GenAI의 효과는 교육 통합 수준에 따라 달라질 수 있음.\n- 협력 학습 접근법이 학습 성과를 향상시킬 수 있는 가능성.\n\n# Idea Seeds\n1. GenAI의 다양한 통합 모드에 대한 추가 연구 필요.\n2. 협력 학습과 GenAI의 상호작용에 대한 심층 분석.\n3. GenAI의 비인지적 성과에 대한 연구 필요.\n\n# Citation Snippets\n> Liu, B., Zhang, W., & Wang, F. (2026). Can Generative Artificial Intelligence Effectively Enhance Students’ Mathematics Learning Outcomes?—A Meta-Analysis of Empirical Studies from 2023 to 2025. MDPI Education Sciences, 16(1), 140. https://doi.org/10.3390/educsci16010140\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy\n\n---\n\n요약: 본 연구는 생성적 인공지능이 학생들의 수학 학습 성과에 미치는 영향을 분석한 메타 분석으로, GenAI는 중간 정도의 긍정적 영향을 미치는 것으로 나타났다. 특히 창의적 변환 통합 모드와 협력 학습 접근법이 효과를 강화하는 주요 요인으로 확인되었다.", "link": "https://doi.org/10.3390/educsci16010140", "altLink": "https://openalex.org/W7124443394", "hasDoi": true, "hasReview": true, "authors": ["Baoxin Liu", "Wenlan Zhang", "Fangfang Wang"], "categories": ["Moderation", "Transformative learning", "Mathematics education", "Empirical research", "Metacognition"]}, {"id": "4", "source": "OPENALEX", "score": 14, "day": "2025-12-31", "title": "How AI shapes self-regulated learning in foreign language education", "content": "---\ntitle: How AI shapes self-regulated learning in foreign language education\nauthors: [Fanfan Hou, Changyin Zhou]\nyear: 2025\njournal: Discover Computing\ndoi: https://doi.org/10.1007/s10791-025-09801-0\nresearch_type: 실증 연구\nmethodology: 혼합 방법론\ndata_type: 양적 및 질적 데이터\nsample: 180명의 설문 응답자 및 14명의 반구조화 인터뷰 참가자\ncontext: 중국의 영어 외국어 학습자\ntheoretical_framework: Zimmerman의 자기조절 학습 이론\nkeywords: [인공지능, 외국어 학습, 자기조절 학습]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 인공지능(AI)이 외국어 교육에서 자기조절 학습(SRL)에 미치는 영향을 분석하였다. Zimmerman의 SRL 이론을 바탕으로, AI 지원 환경에서 중국 EFL 학습자들의 SRL 구조적 차원과 기제를 탐구하였다. 혼합 방법론을 통해 180명의 설문 응답과 14명의 반구조화 인터뷰 데이터를 수집하였으며, 탐색적 요인 분석(EFA), 확인적 요인 분석(CFA), 구조 방정식 모델링(SEM)을 사용하여 AI 지원 SRL의 잠재적 차원을 규명하였다. 연구 결과, SRL은 세 가지 단계로 구성되며, 각 단계 간의 상호작용이 발견되었다. 이 연구는 AI 통합의 교육적 최적화를 위한 실증적 증거를 제공한다.\n\n# Research Logic\n## Problem\nAI 지원 환경에서 학습자들이 어떻게 자기조절 학습을 수행하는지에 대한 이해가 부족하다.\n## Theory\nZimmerman의 자기조절 학습 이론을 기반으로 하여 AI와의 상호작용을 통한 SRL의 구조를 탐구한다.\n## Design\n혼합 방법론을 사용하여 양적 및 질적 데이터를 수집하고 분석하였다.\n## Findings\nSRL은 세 가지 단계(예비 단계, 수행 단계, 자기 반성 단계)로 구성되며, 각 단계 간의 상호작용이 존재한다.\n## Conclusion\nAI는 SRL의 구조와 실행 방식을 재구성하며, 교육적 맥락에서의 효과적인 AI 도구 설계를 위한 실질적인 함의를 제공한다.\n\n# Key Findings\n- SRL은 예비 단계, 수행 단계, 자기 반성 단계의 세 가지 단계로 구성된다.\n- 예비 단계는 수행 단계에 긍정적인 영향을 미치며, 자기 반성 단계와의 상관관계가 있다.\n- 수행 단계에서 자기 반성 단계로의 경로는 유의미하지 않다.\n\n# Contributions\n## Theoretical\nZimmerman의 SRL 모델을 확장하여 AI와의 공동 조절의 새로운 특성을 강조한다.\n## Methodological\n혼합 방법론을 통해 SRL의 내부 구조를 체계적으로 검증하였다.\n## Practical\nAI 도구의 효과적인 설계 및 구현을 위한 교육적 함의를 제공한다.\n\n# Limitations\n- 외국어 학습 맥락에서의 실증적 검증이 제한적이다.\n- SRL의 세 단계 모델이 AI 지원 외국어 학습에 충분히 통합되지 않았다.\n\n# Transferable Insights\n- AI 지원 환경에서의 SRL 구조는 다른 교육 분야에도 적용 가능하다.\n- 자기조절 학습의 메커니즘은 다양한 학습 환경에서 유사하게 나타날 수 있다.\n\n# Idea Seeds\n1. AI 도구를 활용한 자기조절 학습 훈련 프로그램 개발.\n2. 다양한 교육 맥락에서의 AI와 SRL의 상호작용 연구.\n3. AI 지원 학습 환경에서의 학습자 피드백 메커니즘 탐구.\n\n# Citation Snippets\n> Hou, F., & Zhou, C. (2025). How AI shapes self-regulated learning in foreign language education. Discover Computing, 28, 344. https://doi.org/10.1007/s10791-025-09801-0\n\ntags: #인공지능, #외국어학습, #자기조절학습, #교육기술, #혼합방법론, #교육적최적화, #AI교육\n\n---\n\n요약: 본 연구는 AI가 외국어 교육에서 자기조절 학습에 미치는 영향을 분석하였다. Zimmerman의 이론을 바탕으로, AI 지원 환경에서의 학습자들의 SRL 구조를 탐구하였으며, 세 가지 단계로 구성된 SRL의 상호작용을 규명하였다. 이 연구는 AI 통합의 교육적 최적화를 위한 실증적 증거를 제공한다.", "link": "https://doi.org/10.1007/s10791-025-09801-0", "altLink": "https://openalex.org/W7117784070", "hasDoi": true, "hasReview": true, "authors": ["Fanfan Hou", "Changyin Zhou"], "categories": ["Structural equation modeling", "Mathematics education", "Path analysis (statistics)", "Psychology", "Foreign language"]}, {"id": "5", "source": "OPENALEX", "score": 14, "day": "2025-12-15", "title": "Artificial Intelligence in Mathematics Education: A Systematic Review of Global Trends and Emerging Themes", "content": "Artificial intelligence (AI) is rapidly reshaping mathematics education, yet the field remains conceptually and methodologically fragmented. This study presents a PRISMA-guided systematic review of peer-reviewed, open-access research on AI in mathematics education published between 2020 and 2024. Searches across five databases yielded 28 primary studies, which were analysed in terms of publication patterns, methodological characteristics, educational levels, AI tools, and emergent themes. Findings show a sharp rise in publications from 2024, dominated by empirical, qualitative, and descriptive designs, with relatively few mixed-methods or purely quantitative studies. Research is geographically concentrated in the United States and other high-income countries, and most work focuses on secondary and higher education, with fewer studies in early childhood, primary schooling, or low-resource contexts. The AI tools reported include large language model–based chatbots, AI-enhanced learning platforms, adaptive and predictive systems, text-analysis tools, machine-learning applications, and STEAM/robotics environments. Thematic synthesis identifies five main foci: AI-supported mathematical thinking and problem solving; personalised and inclusive learning; teacher knowledge, readiness, and pedagogical transformation; ethics, explainability, and equity; and emerging multimodal and robotics-based innovations. Overall, AI shows promise for enriching mathematical reasoning, differentiation, and teacher learning, but the evidence base remains fragmented and Western-centric, indicating the importance of longitudinal, mixed-methods, and equity-oriented research and robust teacher preparation.", "link": "https://doi.org/10.12973/jmste.2.2.153", "altLink": "https://openalex.org/W4417525187", "hasDoi": true, "hasReview": false, "authors": ["S. Nanda", "Deepak Kumar Pradhan"], "categories": ["Field (mathematics)", "Mathematics education", "Artificial intelligence", "Thematic map", "Thematic analysis"]}, {"id": "6", "source": "OPENALEX", "score": 14, "day": "2025-12-12", "title": "EFL pre-service teachers’ professional identity in the age of AI: An integrative review (2015-2025)", "content": "The rapid integration of artificial intelligence (AI) into education is transforming how teachers are prepared and how their professional identities evolve within digitally mediated environments. While prior studies have examined AI’s influence on teaching effectiveness and digital competence, comparatively little attention has been given to its impact on the identity formation of English as a Foreign Language (EFL) pre-service teachers. This integrative review therefore aims to provide a consolidated understanding of how AI shapes their emerging teacher identities. It synthesizes 31 empirical studies published between 2015 and 2025 from Scopus and Web of Science, following PRISMA-guided screening and MMAT quality appraisal. A mixed analytical strategy combining quantitative trend mapping and qualitative thematic synthesis was employed to trace how AI use interacts with self-efficacy, reflective practice, professional agency, and ethical reasoning in teacher education. The findings indicate three interconnected roles of AI in the development of professional identity: (1) as a reflective partner that enhances metacognitive awareness through adaptive and dialogic feedback; (2) as a pedagogical scaffold that improves efficacy, motivation, and agency during lesson design and microteaching; and (3) as an ethical mediator that encourages reflection on authenticity, authorship, and moral responsibility. Across contexts, AI integration strengthens professional identity when embedded within human-centered, ethically framed pedagogies that balance automation with reflective judgment. The review concludes by proposing an AI-enhanced identity ecology and outlining implications for reflective pedagogy, ethical AI literacy, and identity-oriented teacher education, along with directions for future longitudinal and cross-cultural research.", "link": "https://doi.org/10.59429/esp.v10i12.4361", "altLink": "https://openalex.org/W4417263742", "hasDoi": true, "hasReview": false, "authors": ["Mian Zhu", "Supyan Hussin", "Harwati Hashim"], "categories": ["Dialogic", "Identity (music)", "Metacognition", "Pedagogy", "Psychology"]}, {"id": "7", "source": "OPENALEX", "score": 14, "day": "2025-12-10", "title": "AI and Teacher Development", "content": "This chapter argues that teachers are central to turning curriculum into real learning, yet many places in the Global South face shortages, uneven preparation, heavy workloads, and weak ongoing support. AI may be able to help, if used well, in reducing the load of administrative tasks, helping plan lessons and create differentiated materials, offer scalable coaching and simulations, and supporting professional learning communities. But we warn that impact depends on strong foundations: teacher AI literacy (teaching about, with, and critically on AI), ethical safeguards and privacy, reliable infrastructure, and keeping teacher judgment in the loop. We stresses that effective tools must embed local pedagogy and subject expertise, not just generic technology. The chapter concludes that AI’s role is to augment, not automate, professional capacity. Realizing its potential requires systemic investment in teacher training, ethical frameworks, and the co-design of AI tools imbued with local pedagogical and content knowledge to empower teachers as critical, reflective practitioners.", "link": "https://doi.org/10.1007/978-3-032-11449-5_6", "altLink": "https://openalex.org/W4417187865", "hasDoi": true, "hasReview": false, "authors": ["Fernando Reimers", "Zainab Azim", "Maria-Renée Palomo"], "categories": ["Coaching", "Professional development", "Pedagogy", "Curriculum", "Face (sociological concept)"]}, {"id": "8", "source": "OPENALEX", "score": 14, "day": "2025-11-18", "title": "Harnessing Artificial Intelligence and Its Impact on Pre-Service Teacher’s Technological, Pedagogical, and Content Knowledge Skills: A Meta-Analysis", "content": "As education shifts into the digital age, technology, especially artificial intelligence (AI), plays an increasingly vital role in improving teaching and learning. This meta-analysis investigates how AI impacts the development of Technological Pedagogical and Content Knowledge (TPACK) skills among pre-service teachers. By reviewing data from various studies published between 2010 and 2023, we explore how AI can help integrate technology into educational settings. Our findings reveal that AI interventions generally positively affect TPACK skills, although the extent of these effects varies significantly across studies. Factors such as sample size, duration of the intervention, and the quality of AI tools used all contribute to these differences. Importantly, larger sample sizes and well-designed AI applications lead to more significant improvements in TPACK skills. However, challenges still exist, particularly the need for adequate training and institutional support for pre-service teachers. This research highlights the necessity of establishing the best practices for incorporating AI into teacher training programs. By addressing the gaps in current literature, this study offers valuable insights into the effective use of AI in enhancing TPACK skills and advocates for further investigation in this critical area of educational technology.", "link": "https://doi.org/10.22329/jtl.v19i3.9429", "altLink": "https://openalex.org/W4416366201", "hasDoi": true, "hasReview": false, "authors": ["Asri Widowati", "Arina Zaida Ilma"], "categories": ["Quality (philosophy)", "Psychological intervention", "Knowledge management", "Sample (material)", "Applications of artificial intelligence"]}, {"id": "9", "source": "OPENALEX", "score": 14, "day": "2025-11-16", "title": "Advancing Conceptual Understanding: A Meta-Analysis on the Impact of Digital Technologies in Higher Education Mathematics", "content": "The integration of digital technologies in mathematics is becoming increasingly significant, particularly in promoting conceptual understanding and student engagement. This study systematically reviews the literature on applications of Computer Algebra Systems, Artificial Intelligence, Visualisation Tools, augmented-reality technologies, Statistical Software, game-based learning and cloud-based learning in higher education mathematics. This meta-analysis synthesises findings from 88 empirical studies conducted between 1990 and 2025 to evaluate the impact of these technologies. The included studies encompass diverse geographical regions, providing a comprehensive global perspective on the integration of digital technologies in higher mathematics education. Using the PRISMA framework and quantitative effect size calculations, the results indicate that all interventions had a statistically significant impact on student performance. Among them, Visualisation Tools demonstrated the highest average percentage improvement in academic performance (39%), whereas cloud-based learning and game-based approaches, while beneficial, showed comparatively modest gains. The findings highlight the effectiveness of an interactive environment in fostering a deeper understanding of mathematical concepts. This study provides insights for educators and policymakers seeking to improve the quality and equity of mathematics education in the digital era.", "link": "https://doi.org/10.3390/educsci15111544", "altLink": "https://openalex.org/W4416337235", "hasDoi": true, "hasReview": false, "authors": ["Anastasia Sofroniou", "Mansi Patel", "Bhairavi Premnath"], "categories": ["Higher education", "Mathematics education", "Technology integration", "Perspective (graphical)", "Equity (law)"]}];

  const rows = filtered.map(p => [
    '"' + p.title.replace(/"/g, '""') + '"',
    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
