<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-03-16 23:31</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "OPENALEX", "score": 20, "day": "2025-10-16", "title": "How AI feedback supports lesson planning in vocational teacher education: a longitudinal intervention study using an analytical AI platform", "content": "---\ntitle: How AI feedback supports lesson planning in vocational teacher education: a longitudinal intervention study using an analytical AI platform\nauthors: [Julia Pargmann, Florian Berding, Karin Rebmann, Elisabeth Riebenbauer]\nyear: 2025\njournal: Empirical Research in Vocational Education and Training\ndoi: https://doi.org/10.1186/s40461-025-00202-7\nresearch_type: 실증 연구\nmethodology: 종단적 개입 연구\ndata_type: 양적 데이터\nsample: 103명\ncontext: 직업 교육, 비즈니스 교육\ntheoretical_framework: TPACK 모델, AI 문해력\nkeywords: [lesson planning, teacher education, artificial intelligence, AI feedback]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 직업 교육에서 수업 계획을 향상시키기 위해 분석적 인공지능(AI)의 사용을 탐구한다. 103명의 참가자를 대상으로 한 종단적 연구에서 실험 그룹은 AI 피드백을 받았고, 대조 그룹은 인간 피드백을 받았다. 결과는 AI 피드백이 특정 차원에서 인간 피드백을 초과하거나 동등할 수 있음을 보여주며, 수업 계획의 여러 측면을 개선하는 데 기여한다. 그러나 AI의 사용이 자동적으로 AI 문해력이나 태도, 동기를 향상시키지 않는다는 점도 발견되었다. 연구는 분석적 AI 플랫폼이 전통적인 피드백을 효과적으로 보완할 수 있지만, 전체적인 프레임워크 내에서 사용되어야 함을 제안한다.\n\n# Research Logic\n## Problem\n대학 강사들이 수업 계획에 대한 세부적이고 개인화된 피드백을 제공하는 것이 어렵다.\n## Theory\nAI는 수업 계획 및 피드백 과정에서 효과적인 도구가 될 수 있다.\n## Design\n103명의 참가자를 대상으로 실험 그룹과 대조 그룹을 설정하여 피드백의 효과를 비교하였다.\n## Findings\nAI 피드백은 특정 차원에서 인간 피드백과 동등하거나 이를 초과하는 성과를 보였다.\n## Conclusion\nAI 플랫폼은 전통적인 피드백을 보완할 수 있지만, 전체적인 교육적 맥락에서 사용되어야 한다.\n\n# Key Findings\n- AI 피드백이 특정 내용 관련 지속 가능성, 행동 지향성, 기술 사용 등에서 개선을 가져왔다.\n- AI 사용이 자동적으로 AI 문해력이나 동기를 향상시키지 않음을 발견하였다.\n- 분석적 AI 플랫폼이 전통적인 피드백을 효과적으로 보완할 수 있음을 제안하였다.\n\n# Contributions\n## Theoretical\nAI의 교육적 활용에 대한 새로운 통찰을 제공한다.\n## Methodological\n종단적 개입 연구 디자인을 통해 피드백의 효과를 평가하였다.\n## Practical\n교사 교육에서 AI 피드백의 실제 적용 가능성을 탐구하였다.\n\n# Limitations\n- 연구 샘플이 제한적이며, 특정 교육 맥락에 국한될 수 있다.\n- AI 피드백의 장기적인 효과에 대한 추가 연구가 필요하다.\n\n# Transferable Insights\n- AI 피드백은 수업 계획의 질을 향상시킬 수 있는 잠재력을 지닌다.\n- 교육적 피드백 과정에서 AI의 역할을 재고할 필요가 있다.\n\n# Idea Seeds\n1. AI 피드백의 장기적인 효과를 평가하기 위한 후속 연구 필요.\n2. 다양한 교육 맥락에서 AI 피드백의 적용 가능성 탐구.\n3. AI 문해력 향상을 위한 교육 프로그램 개발.\n\n# Citation Snippets\n> Pargmann, J., Berding, F., Rebmann, K., & Riebenbauer, E. (2025). How AI feedback supports lesson planning in vocational teacher education: a longitudinal intervention study using an analytical AI platform. Empirical Research in Vocational Education and Training, 17(26). https://doi.org/10.1186/s40461-025-00202-7\n\ntags: #인공지능, #수업계획, #교사교육, #AI피드백, #직업교육, #AI문해력, #교육기술\n\n---\n\n요약: 본 연구는 직업 교육에서 수업 계획을 향상시키기 위해 분석적 인공지능(AI)의 사용을 탐구하였다. 103명의 참가자를 대상으로 한 종단적 연구에서 AI 피드백이 특정 차원에서 인간 피드백을 초과하거나 동등할 수 있음을 보여주었다. 그러나 AI의 사용이 자동적으로 AI 문해력이나 태도, 동기를 향상시키지 않는다는 점도 발견되었다.", "link": "https://doi.org/10.1186/s40461-025-00202-7", "altLink": "https://openalex.org/W4415263639", "hasDoi": true, "hasReview": true, "authors": ["Julia Pargmann", "Florian Berding", "Karin Rebmann"], "categories": ["Vocational education", "Control (management)", "Computer science", "Action (physics)", "Generative grammar"]}, {"id": "1", "source": "OPENALEX", "score": 19, "day": "2026-01-01", "title": "Future-Ready Learning: Emerging Tech Shaping the Evolution of Computer Science Education", "content": "---\ntitle: Future-Ready Learning: Emerging Tech Shaping the Evolution of Computer Science Education\nauthors: [Olugbenga Gabriel Akindoju, Olasunkanmi A. Gbeleyi, Esther Oluwafunmilayo Peter, A. Foluso Ebisin, Adeleye J. Adedamola, Famuyide J. Alaba, Ayinde B. Oyeniran]\nyear: 2026\njournal: International Journal of Research and Innovation in Social Science\ndoi: https://doi.org/10.47772/IJRISS.2026.10200378\nresearch_type: 혼합 방법 연구\nmethodology: 개념 분석 및 실증적 증거 결합\ndata_type: 정량적 및 정성적 데이터\nsample: 나이지리아 및 국제적 맥락에서의 응답자\ncontext: 나이지리아의 컴퓨터 과학 교육\ntheoretical_framework: TPACK, TAM, SAMR 모델\nkeywords: [computer science education, digital pedagogy, artificial intelligence, gamified learning, adaptive systems, digital literacy, equity]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 나이지리아의 컴퓨터 과학 교육에서 혁신적인 교수 및 학습 방법을 탐구하며, 인공지능, 가상 및 증강 현실, 게임화된 교실, 적응형 학습 시스템의 통합을 분석한다. 혼합 방법 접근법을 사용하여 개념 분석과 실증적 증거를 결합하였으며, 연구 도구의 신뢰성은 0.72로 확인되었다. 연구 결과, 인공지능과 가상 현실은 학습자와 강사에게 널리 수용되었으나, 게임화 및 협업 플랫폼은 인프라 및 문화적 장벽으로 인해 저조하게 활용되고 있음을 나타낸다. 응답자들은 불량한 인터넷 연결, 높은 디지털 도구 비용, 교육자의 제한된 디지털 기술을 주요 도전 과제로 지적하였다. 이 연구는 나이지리아 고등 교육에서 기술 채택의 현실을 강조하고, 이론과 실제 간의 격차를 해소하기 위한 학습자 중심의 교수법과 디지털 리터러시 프레임워크의 중요성을 강조한다.\n\n# Research Logic\n## Problem\n전통적인 교육 관행과 현대 노동 시장의 역동성 간의 불일치 문제.\n## Theory\nTPACK, TAM, SAMR 모델을 기반으로 한 기술 통합 및 교육 혁신 이론.\n## Design\n혼합 방법 연구로, 개념 분석과 실증적 데이터를 결합.\n## Findings\n인공지능과 가상 현실의 수용은 높지만, 게임화와 협업 플랫폼의 활용은 낮음.\n## Conclusion\n디지털 시대의 혁신적이고 포괄적인 컴퓨터 과학 교육 재설계 필요성.\n\n# Key Findings\n- 인공지능과 가상 현실은 학습자와 강사에게 널리 수용됨.\n- 게임화 및 협업 플랫폼은 인프라 및 문화적 장벽으로 인해 저조하게 활용됨.\n- 주요 도전 과제로 불량한 인터넷 연결, 높은 디지털 도구 비용, 제한된 디지털 기술이 지적됨.\n\n# Contributions\n## Theoretical\n기술 채택 및 교육 혁신 이론에 대한 기여.\n## Methodological\n혼합 방법 연구 접근법의 적용 및 신뢰성 검증.\n## Practical\n디지털 인프라 투자 및 평생 학습 촉진을 위한 실용적 권고.\n\n# Limitations\n- 나이지리아 및 국제적 맥락에 국한된 연구.\n- 특정 기술에 대한 접근성 문제로 인한 일반화의 한계.\n\n# Transferable Insights\n- 디지털 리터러시와 교육 혁신 간의 관계를 이해하는 데 기여.\n- 기술 통합의 성공을 위한 제도적 지원의 중요성 강조.\n\n# Idea Seeds\n1. 나이지리아의 디지털 교육 인프라 개선 방안 연구.\n2. 게임화된 학습 환경의 효과성 평가.\n3. 교육자 디지털 기술 역량 강화를 위한 프로그램 개발.\n\n# Citation Snippets\n> Akindoju, O. G., Gbeleyi, O. A., Peter, E. O., Ebisin, A. F., Adedamola, A. J., Alaba, F. J., & Oyeniran, A. B. (2026). Future-Ready Learning: Emerging Tech Shaping the Evolution of Computer Science Education. *International Journal of Research and Innovation in Social Science*, 10(2), 5102-5116. https://doi.org/10.47772/IJRISS.2026.10200378\n\ntags: #computer_science_education, #digital_pedagogy, #artificial_intelligence, #gamified_learning, #digital_literacy, #equity, #inclusive_education\n\n---\n\n**압축 요약**  \n본 연구는 나이지리아의 컴퓨터 과학 교육에서 인공지능, 가상 현실, 게임화된 학습 방법의 통합을 탐구하며, 기술 채택의 현실과 교육 혁신의 필요성을 강조한다. 연구 결과, 인공지능과 가상 현실은 널리 수용되지만, 게임화는 인프라 및 문화적 장벽으로 인해 저조하게 활용되고 있다. 디지털 리터러시와 교육 혁신 간의 관계를 이해하고, 포괄적인 교육 접근법의 필요성을 제시한다.", "link": "https://doi.org/10.47772/ijriss.2026.10200378", "altLink": "https://openalex.org/W7135393841", "hasDoi": true, "hasReview": true, "authors": ["Olugbenga Gabriel Akindoju", "Olasunkanmi A. Gbeleyi", "Esther Oluwafunmilayo Peter"], "categories": ["Lifelong learning", "Enabling", "Knowledge management", "The Internet", "Engineering ethics"]}, {"id": "2", "source": "OPENALEX", "score": 18, "day": "2025-11-20", "title": "The MIND model a microlearning AI-integrated instructional design for enhanced learning outcomes", "content": "---\ntitle: The MIND model a microlearning AI-integrated instructional design for enhanced learning outcomes\nauthors: [Wali Khan Monib, Atika Qazi, Rosyzie Anna Awg Haji Mohd Apong, José H. Santos, Malissa Maria Mahmud]\nyear: 2025\njournal: Scientific Reports\ndoi: https://doi.org/10.1038/s41598-025-24910-y\nresearch_type: 실험적 연구\nmethodology: 혼합 방법론\ndata_type: 정량적 및 정성적 데이터\nsample: MIND 모델(실험군)과 ADDIE 모델(대조군) 비교\ncontext: 마이크로러닝 및 AI 통합 교육 설계\ntheoretical_framework: TPACK 프레임워크, 학습 결과에 영향을 미치는 요인(FIL) 프레임워크\nkeywords: [AI, 마이크로러닝, 교육 설계 프레임워크, 학습 결과, 지식 및 기술 향상, 평생 학습]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 마이크로러닝의 효과적인 설계를 위한 새로운 MIND 모델을 개발하였다. 이 모델은 TPACK 및 FIL 프레임워크를 기반으로 하여, MIND 모델이 ADDIE 모델보다 학습 결과를 향상시키는 데 효과적임을 입증하였다. 혼합 방법론을 통해 MIND 모델의 효과를 검증하였으며, 정량적 분석 결과 ANCOVA를 통해 MIND 모델이 지식 습득, 모듈 내용 이해 및 지식 적용에서 유의미한 향상을 보였다. 또한, 성별, 고용 상태 및 지역에 관계없이 일관된 학습 결과를 나타내었고, 연령대에 따라 학습 성과의 차이를 보였다. 질적 데이터 분석 결과, MIND 모델을 활용한 모듈은 미디어 풍부성, 상호작용, 참여도, 자기 개념, 동기 및 만족감을 제공하여 학습 결과에 기여하였다.\n\n# Research Logic\n## Problem\n기존의 교육 설계 프레임워크가 마이크로러닝의 효과적인 설계를 지원하지 못함.\n## Theory\nTPACK 및 FIL 프레임워크를 기반으로 한 새로운 교육 설계 모델 필요.\n## Design\nMIND 모델과 ADDIE 모델을 비교하는 실험적 연구 설계.\n## Findings\nMIND 모델이 ADDIE 모델보다 학습 결과에서 유의미한 향상을 보임.\n## Conclusion\nMIND 모델은 마이크로러닝 설계에 있어 혁신적인 접근법으로, 다양한 학습자 요구에 적응할 수 있는 유연성을 제공함.\n\n# Key Findings\n- MIND 모델이 ADDIE 모델보다 지식 습득 및 적용에서 유의미한 향상.\n- 성별, 고용 상태, 지역에 관계없이 일관된 학습 결과.\n- 연령대에 따라 학습 성과의 차이가 있으며, 젊은 학습자가 더 높은 성과를 보임.\n\n# Contributions\n## Theoretical\nMIND 모델은 TPACK 및 FIL 프레임워크를 통합하여 교육 설계 이론에 기여.\n## Methodological\n혼합 방법론을 통해 교육 설계의 효과를 검증하는 새로운 접근법 제시.\n## Practical\n마이크로러닝 설계에 있어 AI 통합의 실용적인 지침 제공.\n\n# Limitations\n- 연구 샘플의 제한으로 일반화 가능성에 한계.\n- MIND 모델의 장기적 효과에 대한 추가 연구 필요.\n\n# Transferable Insights\n- AI 통합 교육 설계의 필요성과 효과성 강조.\n- 다양한 학습자 요구를 반영한 교육 설계의 중요성.\n\n# Idea Seeds\n1. MIND 모델을 활용한 다양한 교육 환경에서의 적용 가능성 연구.\n2. AI 기술을 활용한 개인화된 학습 경험 설계.\n3. MIND 모델의 장기적 효과를 평가하기 위한 후속 연구.\n\n# Citation Snippets\n> Monib, W. K., Qazi, A., Awg Haji Mohd Apong, R. A., Santos, J. H., & Mahmud, M. M. (2025). The MIND model a microlearning AI-integrated instructional design for enhanced learning outcomes. *Scientific Reports*, 15, 41020. https://doi.org/10.1038/s41598-025-24910-y\n\ntags: #AI, #마이크로러닝, #교육설계, #TPACK, #FIL, #학습결과, #평생학습\n\n---\n\n요약: 본 연구는 MIND 모델을 개발하여 마이크로러닝의 효과적인 설계를 지원하고, 기존의 ADDIE 모델보다 학습 결과를 향상시키는 데 기여함을 입증하였다. MIND 모델은 TPACK 및 FIL 프레임워크를 기반으로 하여, 다양한 학습자 요구에 적응할 수 있는 유연성을 제공한다.", "link": "https://doi.org/10.1038/s41598-025-24910-y", "altLink": "https://openalex.org/W4416404748", "hasDoi": true, "hasReview": true, "authors": ["Wali Khan Monib", "Atika Qazi", "Rosyzie Anna Awg Haji Mohd Apong"], "categories": ["ADDIE Model", "Instructional design", "Computer science", "Thematic analysis", "Educational technology"]}, {"id": "3", "source": "ARXIV", "score": 17, "day": "2026-03-13", "title": "The RIGID Framework: Research-Integrated, Generative AI-Mediated Instructional Design", "content": "---\ntitle: The RIGID Framework: Research-Integrated, Generative AI-Mediated Instructional Design\nauthors: [Yerin Kwak, Zachary A. Pardos]\nyear: 2026\njournal: 명시되지 않음\ndoi: https://arxiv.org/abs/2603.12781v1\nresearch_type: 이론적 연구\nmethodology: 프레임워크 제안\ndata_type: 명시되지 않음\nsample: 명시되지 않음\ncontext: 교육 설계 및 학습 과학\ntheoretical_framework: 명시되지 않음\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 논문은 교육 설계(ID)와 학습 과학(LS) 간의 통합을 위한 RIGID(Research-Integrated, Generative AI-Mediated Instructional Design) 프레임워크를 제안한다. 연구자들은 ID가 연구 기반 지식과 교육적 최선의 관행을 통합하는 데 어려움을 겪고 있으며, 이를 해결하기 위해 생성적 AI의 활용 가능성을 탐구한다. RIGID 프레임워크는 분석, 설계, 구현 및 평가 단계에서 LS 연구를 ID 워크플로우에 체계적으로 통합하는 방법을 제시하며, 인간 전문성을 유지하면서도 운영적이고 맥락에 민감한 접근 방식을 제공한다. 이 연구는 ID와 LS 간의 구조적 통합이 제한적이라는 점을 강조하며, 두 분야의 상호 보완적인 통찰력을 활용할 수 있는 기회를 모색한다.\n\n# Research Logic\n## Problem\nID와 LS 간의 통합 부족으로 인해 연구 기반 지식의 활용이 제한적이다.\n## Theory\nID와 LS는 학습 경험 개선을 위한 설계 지향적 접근을 공유하지만, 이들의 통합은 제한적이다.\n## Design\nRIGID 프레임워크는 생성적 AI를 매개로 하여 ID 프로세스에 LS 연구를 통합하는 구조를 제안한다.\n## Findings\nRIGID 프레임워크는 ID의 모든 단계에서 연구 기반 설계를 가능하게 하며, 인간 전문성을 유지한다.\n## Conclusion\nID와 LS의 통합은 교육 설계의 질을 향상시키고, 연구 기반 혁신의 지속 가능성을 높일 수 있다.\n\n# Key Findings\n- RIGID 프레임워크는 ID의 분석, 설계, 구현, 평가 단계에서 LS 연구를 통합한다.\n- 생성적 AI는 ID 프로세스의 각 단계에서 연구 통합을 매개하는 역할을 한다.\n- 인간 전문성을 유지하면서도 운영적이고 맥락에 민감한 설계를 가능하게 한다.\n\n# Contributions\n## Theoretical\nID와 LS 간의 통합을 위한 새로운 프레임워크를 제안하여 이론적 기여를 한다.\n## Methodological\n생성적 AI를 활용한 ID 프로세스의 체계적 통합 방법론을 제시한다.\n## Practical\n교육 현장에서 연구 기반 설계를 실현할 수 있는 실용적인 접근 방식을 제공한다.\n\n# Limitations\n- RIGID 프레임워크의 실제 적용 사례가 부족하다.\n- 생성적 AI의 활용에 대한 구체적인 지침이 명시되지 않음.\n\n# Transferable Insights\n- 연구 기반 설계의 필요성을 강조하며, 교육 현장에서의 적용 가능성을 제시한다.\n- 생성적 AI의 활용이 교육 설계의 효율성을 높일 수 있는 잠재력을 보여준다.\n\n# Idea Seeds\n1. RIGID 프레임워크를 기반으로 한 교육 설계 도구 개발.\n2. 생성적 AI를 활용한 맞춤형 학습 경험 설계 연구.\n3. ID와 LS의 통합을 위한 교육 정책 개발.\n\n# Citation Snippets\n> Kwak, Y., & Pardos, Z. A. (2026). The RIGID Framework: Research-Integrated, Generative AI-Mediated Instructional Design. \n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #ai literacy, #education\n\n---\n\n요약: 본 논문은 RIGID 프레임워크를 통해 교육 설계와 학습 과학의 통합을 제안하며, 생성적 AI의 활용 가능성을 탐구한다. 이 프레임워크는 ID의 모든 단계에서 연구 기반 설계를 가능하게 하여 교육의 질을 향상시킬 수 있는 방법을 제시한다.", "link": "https://arxiv.org/abs/2603.12781v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Yerin Kwak", "Zachary A. Pardos"], "categories": ["cs.CY", "cs.AI", "cs.HC"]}, {"id": "4", "source": "OPENALEX", "score": 17, "day": "2025-10-08", "title": "PROJECT-BASED LEARNING WITH AI-INTEGRATION TO FOSTER CRITICAL THINKING SKILLS AND SELF-EFFICACY OF PRE-SERVICE TEACHERS", "content": "---\ntitle: PROJECT-BASED LEARNING WITH AI-INTEGRATION TO FOSTER CRITICAL THINKING SKILLS AND SELF-EFFICACY OF PRE-SERVICE TEACHERS\nauthors: Dahrul Aman Harahap, Muhammad Faizin, Vinsensia Anisa Citta Erydani, Sri Widi Lestari, Desi Surlitasari Dewi, Mega Aulia Ardhi\nyear: 2025\njournal: Jurnal Eduscience\ndoi: https://openalex.org/W4415366055\nresearch_type: 실험적 연구\nmethodology: 사전-사후 실험 설계\ndata_type: 양적 데이터\nsample: 46명의 예비 교사\ncontext: 인도네시아의 사립 대학교\ntheoretical_framework: 프로젝트 기반 학습(PjBL), 인공지능(AI) 통합\nkeywords: [critical thinking, self-efficacy, project-based learning, artificial intelligence, pre-service teachers]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 인도네시아의 예비 교사들이 수업 설계 과정에서 인공지능(AI) 도구와 결합된 프로젝트 기반 학습(PjBL)의 유용성을 평가하는 것을 목표로 하였다. 46명의 예비 교사를 대상으로 한 사전-사후 실험 설계를 통해, 25문항의 비판적 사고 설문지와 10문항의 자기 효능감 척도를 사용하여 데이터를 수집하였다. 연구 결과, AI 지원 PBL 개입 후 비판적 사고(t = -116.464, p < .001)와 자기 효능감(t = -56.328, p < .001) 모두에서 통계적으로 유의미한 향상이 나타났다. 이러한 결과는 AI 기술을 통합한 프로젝트 기반 학습이 예비 교사들의 인지적 및 정서적 준비성을 크게 향상시킬 수 있음을 시사한다.\n\n# Research Logic\n## Problem\nAI 통합 PBL이 예비 교사의 비판적 사고 및 자기 효능감에 미치는 영향을 규명할 필요성이 있다.\n## Theory\n비판적 사고와 자기 효능감은 교육적 성공을 위한 필수 역량으로 인식된다.\n## Design\n사전-사후 실험 설계를 통해 46명의 예비 교사를 대상으로 연구를 수행하였다.\n## Findings\nAI 지원 PBL 개입 후 비판적 사고와 자기 효능감 모두에서 유의미한 향상이 관찰되었다.\n## Conclusion\nAI 기술을 통합한 PBL이 예비 교사의 교육적 준비성을 향상시키는 데 기여할 수 있다.\n\n# Key Findings\n- AI 지원 PBL 개입 후 비판적 사고 점수가 유의미하게 향상되었다 (t = -116.464, p < .001).\n- 자기 효능감 점수 또한 유의미하게 향상되었다 (t = -56.328, p < .001).\n- AI 도구의 사용이 학습 참여도와 효과성을 높이는 데 기여하였다.\n\n# Contributions\n## Theoretical\nAI 통합 PBL의 효과에 대한 실증적 증거를 제공하여 교육 이론에 기여한다.\n## Methodological\n사전-사후 설계의 사용으로 양적 연구의 필요성을 강조한다.\n## Practical\n예비 교사 교육과정 설계에 대한 실용적인 통찰을 제공한다.\n\n# Limitations\n- 단일 기관에서의 연구로 일반화 가능성이 제한된다.\n- 대조군이 없는 설계로 인한 외부 요인의 영향을 배제할 수 없다.\n\n# Transferable Insights\n- AI 도구의 통합이 교육적 성과에 긍정적인 영향을 미칠 수 있다.\n- 프로젝트 기반 학습이 예비 교사의 자기 효능감과 비판적 사고를 동시에 향상시킬 수 있는 가능성이 있다.\n\n# Idea Seeds\n1. 다양한 교육 환경에서 AI 통합 PBL의 효과를 비교 연구할 필요가 있다.\n2. 비판적 사고와 자기 효능감 간의 상관관계를 심층적으로 분석할 수 있는 연구가 필요하다.\n3. AI 도구의 구체적인 활용 사례를 개발하여 교육 현장에 적용할 수 있는 방법을 모색해야 한다.\n\n# Citation Snippets\n> Harahap, D. A., Faizin, M., Erydani, V. A. C., Lestari, S. W., Dewi, D. S., & Ardhi, M. A. (2025). PROJECT-BASED LEARNING WITH AI-INTEGRATION TO FOSTER CRITICAL THINKING SKILLS AND SELF-EFFICACY OF PRE-SERVICE TEACHERS. Jurnal Eduscience.\n\ntags: #비판적사고, #자기효능감, #프로젝트기반학습, #인공지능, #예비교사, #교육기술, #교수설계\n\n---\n\n요약: 본 연구는 인도네시아의 예비 교사들을 대상으로 AI 통합 프로젝트 기반 학습이 비판적 사고와 자기 효능감에 미치는 영향을 분석하였다. 연구 결과, AI 지원 PBL 개입 후 두 변수 모두에서 유의미한 향상이 나타났으며, 이는 AI 기술이 교육적 준비성을 향상시키는 데 기여할 수 있음을 시사한다.", "link": "https://doi.org/10.36987/jes.v12i5.7851", "altLink": "https://openalex.org/W4415366055", "hasDoi": true, "hasReview": true, "authors": ["Dahrul Aman Harahap", "Muhammad Faizin", "Vinsensia Anisa Citta Erydani"], "categories": ["Critical thinking", "Psychology", "Mathematics education", "Normality", "Preparedness"]}, {"id": "5", "source": "OPENALEX", "score": 17, "day": "2025-09-30", "title": "Communication technologies in STEM education: A systematic review", "content": "classrooms, yet evidence on their collective impact remains scattered across single‑tool case studies. This systematic review closes that gap by analyzing nineteen empirical investigations published between 2020 and 2025 that deploy learning‑management systems, mobile applications, extended reality (XR) environments and artificial‑intelligence tutors in K‑12 and tertiary science, technology, engineering, and mathematics (STEM) settings. Using a mixed method comparative synthesis, the study maps how these tools converge into integrated communication ecosystems and how their orchestration shapes conceptual understanding, collaboration dynamics and equity of access. The findings show that learning‑management platforms and mobile messaging now anchor almost three quarters of deployments, providing a backbone for scheduling, resource distribution and threaded dialogue that bridges classroom and home. When these platforms are paired with short, scaffolded XR sessions and real‑time, artificial intelligence‑driven feedback loops, learners achieve double‑digit gains in spatial reasoning, problem-solving and motivation while low‑performing students close achievement gaps by up to thirty per cent. The review also uncovers persistent barriers: bandwidth constraints, high hardware costs and limited teacher data literacy temper the transformative potential of these tools, particularly in rural and linguistically diverse contexts. By clustering technologies, pedagogical approaches and methodological choices into a single analytic matrix, the review offers the first holistic blueprint for designing inclusive, data‑rich STEM ecosystems. However, methodological heterogeneity, study durations shorter than one school term and convenience sampling from high‑connectivity regions limit generalizability and call for longitudinal, multi‑site designs and living evidence reviews. Overall, the study argues that communication technologies will reach their full promise only when technical ingenuity is matched by pedagogical wisdom and structural commitment.", "link": "https://doi.org/10.29333/ejmste/17178", "altLink": "https://openalex.org/W4414633341", "hasDoi": true, "hasReview": false, "authors": ["Naziya Tasilova", "Gulbakyt K. Shashayeva", "Zauresh Sh. Yernazarova"], "categories": ["Computer science", "Gadget", "Transformative learning", "Scope (computer science)", "Generalizability theory"]}, {"id": "6", "source": "OPENALEX", "score": 17, "day": "2025-09-28", "title": "Pedagogical Approaches to Integrating Generative AI in the Undergraduate Writing Classroom", "content": "For many teachers, the recent proliferation of generative artificial intelligence (AI)writing tools has ushered in a wave of fears about the consequences for students’ writingdevelopment. In undergraduate writing courses, which often focus on preparing their students forthe communication expectations of their future professions, educators need to make challengingdecisions about how to responsibly introduce their students to generative AI withoutcompromising opportunities for students to develop their own writing skills. This NationalScience Foundation-funded study investigates the diverse pedagogical approaches employed byfour upper-division engineering writing instructors toward integrating AI in their classrooms.Through qualitative analysis of teacher interviews and classroom observations conducted overthe course of two academic quarters, we shed light on instructors’ perceptions of the role of AI inwriting and their approaches to integrating AI in scaffolding students’ writing development. Inparticular, we observe that instructors’ views of how students develop agency in their writingwere primary drivers of their choices about how to integrate AI into their courses. These viewswere pivotal in instructors’ decision-making at all stages of implementation, including theirchoices about the extent to which they integrated generative AI into instruction as well as thetopics they chose to focus on in their instruction about AI use. We conclude by highlightingpromising strategies for incorporating generative AI to support the teaching and learning ofwriting.", "link": "https://doi.org/10.35542/osf.io/ves79_v1", "altLink": "https://openalex.org/W4414581804", "hasDoi": true, "hasReview": false, "authors": ["Waverly Tseng", "Tamara Tate", "Beth Harnick-Shapiro"], "categories": ["Generative grammar", "Agency (philosophy)", "Focus (optics)", "Computer science", "Qualitative research"]}, {"id": "7", "source": "ARXIV", "score": 16, "day": "2026-03-09", "title": "Sandpiper: Orchestrated AI-Annotation for Educational Discourse at Scale", "content": "Digital educational environments are expanding toward complex AI and human discourse, providing researchers with an abundance of data that offers deep insights into learning and instructional processes. However, traditional qualitative analysis remains a labor-intensive bottleneck, severely limiting the scale at which this research can be conducted. We present Sandpiper, a mixed-initiative system designed to serve as a bridge between high-volume conversational data and human qualitative expertise. By tightly coupling interactive researcher dashboards with agentic Large Language Model (LLM) engines, the platform enables scalable analysis without sacrificing methodological rigor. Sandpiper addresses critical barriers to AI adoption in education by implementing context-aware, automated de-identification workflows supported by secure, university-housed infrastructure to ensure data privacy. Furthermore, the system employs schema-constrained orchestration to eliminate LLM hallucinations and enforces strict adherence to qualitative codebooks. An integrated evaluations engine allows for the continuous benchmarking of AI performance against human labels, fostering an iterative approach to model refinement and validation. We propose a user study to evaluate the system's efficacy in improving research efficiency, inter-rater reliability, and researcher trust in AI-assisted qualitative workflows.", "link": "https://arxiv.org/abs/2603.08406v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Daryl Hedley", "Doug Pietrzak", "Jorge Dias"], "categories": ["cs.HC", "cs.CL"]}, {"id": "8", "source": "ARXIV", "score": 16, "day": "2026-03-07", "title": "Student Preferences for Online Interaction Platforms in Blended Learning: A Mixed-Methods Study", "content": "As higher education increasingly adopts blended learning, understanding students preferences for online interaction platforms becomes critical for effective course delivery and engagement. This study investigates the platforms undergraduate students prefer for academic communication and explores the underlying reasons for these choices. Data were collected from 37 students enrolled in two summer courses at a Ghanaian university using a structured questionnaire consisting of both closed and open-ended items. Quantitative results revealed a strong preference for instant messaging platforms such as WhatsApp and Telegram over institutional learning management systems. Qualitative content analysis of the open-ended responses identified five key factors influencing platform preference: convenience and familiarity, ease of use, accessibility, popularity among peers, and support for real-time interactions. These findings highlight a significant mismatch between students communication habits and institutional platform offerings. The study highlights the importance of aligning digital learning strategies with students lived digital experiences to enhance interaction, collaboration, and learner satisfaction in blended learning environments.", "link": "https://arxiv.org/abs/2603.07186v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Lois Fajuyigbe", "Kaisu Mumuni", "Felix Nti Koranteng"], "categories": ["cs.HC"]}, {"id": "9", "source": "OPENALEX", "score": 16, "day": "2026-02-27", "title": "Integration of a Collaborative Artificial Intelligence in Improving Student Learning Outcomes in Data Analytics", "content": "<title>Abstract<\/title> Generative Artificial Intelligence (GenAI) tools commonly used in higher education predominantly support one-to-one interactions between learners and technology, with limited emphasis on collaborative learning. This non-equivalent quasi-experimental study investigated the effects of integrating let PAGE_SIZE = 10;
let currentTab = 'all';
let currentSource = 'ALL';
let currentSort = 'score';
let currentPage = 1;
let currentCategory = '';
let currentMinDate = '';
let currentMaxDate = '';
let hideVisited = false;
let filtered = [];
let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
let searchHistory = JSON.parse(localStorage.getItem('searchHistory')) || [];
let visited = JSON.parse(localStorage.getItem('visited')) || [];

function toggleTheme() {
  const html = document.documentElement;
  const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
  html.dataset.theme = next;
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  localStorage.setItem('theme', next);
}

function toggleTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSource(btn) {
  currentSource = btn.dataset.source;
  document.querySelectorAll('#sourceFilters .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSort(btn) {
  currentSort = btn.dataset.sort;
  document.querySelectorAll('#sortGroup .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  render();
}

function toggleFavorite(id, e) {
  e.stopPropagation();
  const idx = favorites.indexOf(id);
  if (idx === -1) {
    favorites.push(id);
  } else {
    favorites.splice(idx, 1);
  }
  localStorage.setItem('favorites', JSON.stringify(favorites));
  applyFilters();
}

function recordVisit(id) {
  if (!visited.includes(id)) {
    visited.push(id);
  }
  localStorage.setItem('visited', JSON.stringify(visited));
}

function recordSearch(query) {
  if (query.trim() && !searchHistory.includes(query)) {
    searchHistory.unshift(query);
    if (searchHistory.length > 10) searchHistory.pop();
    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
  }
}

function downloadJSON() {
  const data = JSON.stringify(filtered, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadCSV() {
  const headers = ['제목', '출처', '스코어', '리뷰여부', '링크'];
  const rows = filtered.map(p => [
    '"' + p.title.replace(/"/g, '""') + '"',
    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
</html>
