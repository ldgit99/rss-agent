<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-06-09 00:04</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "OPENALEX", "score": 25, "day": "2026-05-04", "title": "Digital Storytelling in Elementary EFL Classrooms: Students’ Multidimensional Engagement and Teachers’ Pedagogical Challenges", "content": "---\ntitle: 초등 EFL 교실에서의 디지털 스토리텔링: 학생들의 다차원적 참여와 교사의 교수적 도전\nauthors: [Luh Gede Eka Wahyuni, Ni Made Ratminingsih, Made Hery Santosa]\nyear: 2026\njournal: 명시되지 않음\ndoi: 명시되지 않음\nresearch_type: 질적 연구\nmethodology: 해석적 현상학적 사례 연구\ndata_type: 인터뷰 데이터\nsample: 21명의 4-6학년 학생 및 3명의 영어 교사\ncontext: 인도네시아 북발리의 공립 초등학교\ntheoretical_framework: 명시되지 않음\nkeywords: [디지털 스토리텔링, 영어 문해력, 학생 참여, 교수적 도전, 다중 모달 학습]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 초등 EFL 교실에서 디지털 스토리텔링이 학생들의 영어 문해력 강화를 어떻게 지원하는지를 탐구한다. 연구는 4-6학년 학생 21명과 영어 교사 3명을 대상으로 하여, 학생들의 인지적, 정서적, 행동적 참여를 분석하고 교사들이 직면한 교수적 도전을 조사하였다. 결과적으로, 학생들은 디지털 스토리텔링을 긍정적으로 인식하며, 언어 이해에서 고차원적 참여로의 발전을 보였다. 그러나 교사들은 콘텐츠 선택, 준비 시간, 학습자 다양성, 기술적 제약 및 교실 관리와 관련된 도전에 직면하였다. 그럼에도 불구하고 교사들은 스캐폴딩, 동료 튜터링, 협력적 계획 및 디지털 자원의 유연한 사용을 통해 적응적인 교수법을 보여주었다.\n\n# Research Logic\n## Problem\n디지털 스토리텔링의 효과적인 구현에 있어 교사들이 직면하는 도전.\n## Theory\n명시되지 않음\n## Design\n해석적 현상학적 사례 연구 디자인.\n## Findings\n학생들은 디지털 스토리텔링을 통해 동기 부여, 적극적인 참여 및 학습 전이를 경험하였다. 교사들은 다양한 교수적 도전에 직면하였다.\n## Conclusion\n교사의 적응적 교수법이 디지털 스토리텔링의 효과를 극대화하는 데 중요함을 강조한다.\n\n# Key Findings\n- 학생들은 디지털 스토리텔링을 통해 언어 이해에서 고차원적 참여로 발전하였다.\n- 디지털 스토리텔링은 어휘 학습과 협업을 지원하는 다중 모달 학습 경험을 제공하였다.\n- 교사들은 콘텐츠 선택 및 기술적 제약과 같은 여러 도전에 직면하였다.\n\n# Contributions\n## Theoretical\n디지털 스토리텔링의 교육적 효과에 대한 이해를 심화시킴.\n## Methodological\n해석적 현상학적 접근을 통해 학생과 교사의 경험을 심층적으로 탐구함.\n## Practical\n교사들이 디지털 스토리텔링을 효과적으로 활용하기 위한 적응적 교수법을 제안함.\n\n# Limitations\n- 연구 샘플이 소규모로 제한되어 일반화에 한계가 있음.\n- 특정 지역의 사례로 제한되어 다양한 교육 환경에 대한 적용 가능성이 낮음.\n\n# Transferable Insights\n- 디지털 스토리텔링의 효과적인 구현을 위한 교사의 적응적 교수법의 중요성.\n- 기술적 제약을 극복하기 위한 협력적 접근의 필요성.\n\n# Idea Seeds\n1. 다양한 교육 환경에서의 디지털 스토리텔링 적용 연구.\n2. 교사의 기술적 역량 강화를 위한 연수 프로그램 개발.\n3. 학생 참여를 극대화하기 위한 디지털 도구의 활용 방안 탐구.\n\n# Citation Snippets\n>\n\ntags: #디지털스토리텔링, #영어문해력, #학생참여, #교수적도전, #다중모달학습, #적응적교수법, #기술적제약\n\n---\n\n요약: 본 연구는 초등 EFL 교실에서 디지털 스토리텔링이 학생들의 영어 문해력 강화를 지원하는 방식을 탐구하였다. 학생들은 긍정적인 참여를 보였으나, 교사들은 여러 교수적 도전에 직면하였다. 교사의 적응적 교수법이 디지털 스토리텔링의 효과를 극대화하는 데 중요함을 강조하였다.", "link": "https://doi.org/10.29408/veles.v10i1.31917", "altLink": "https://openalex.org/W7160876533", "hasDoi": true, "hasReview": true, "authors": ["Luh Gede Eka Wahyuni", "Ni Made Ratminingsih", "Made Hery Santosa"], "categories": ["Digital storytelling", "Digital literacy", "Storytelling", "Vocabulary", "Psychology"]}, {"id": "1", "source": "OPENALEX", "score": 25, "day": "2026-04-15", "title": "Artificial Intelligence in Education: A Mixed-Methods Case Study of AI-Mediated Adaptive Teaching Using Large Language Models", "content": "---\ntitle: 인공지능 교육: 대규모 언어 모델을 활용한 AI 매개 적응형 교수법의 혼합 방법 사례 연구\nauthors: N A Shepherd\nyear: 2026\njournal: 명시되지 않음\ndoi: 명시되지 않음\nresearch_type: 혼합 방법 연구\nmethodology: 양적 및 질적 데이터 수집\ndata_type: 설문조사, 학습 분석, 포커스 그룹\nsample: 11명의 고급 6학년 학생\ncontext: STEM 및 인문학 분야\ntheoretical_framework: Bloom의 2-시그마 가설\nkeywords: [인공지능, 교육, 적응형 학습, 학습 분석, 메타인지, 학습자 주도성, AI 협업]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 대규모 언어 모델(LLM)을 중등 교육에 통합하는 과정에서의 기회와 도전 과제를 탐구하는 혼합 방법 사례 연구이다. 6주간의 파일럿 개입을 통해 11명의 고급 6학년 학생을 대상으로 ChatGPT의 적응형 학습 모드(AI-튜터, AI-학생, AI-시뮬레이터)의 효과성을 평가하였다. 양적 데이터는 주간 리커트 척도 평가(242회 관찰), 자기 효능감 설문조사, 학습 분석을 통해 수집되었으며, 질적 데이터는 포커스 그룹과 개방형 반응을 통해 보완되었다. 결과적으로 AI-시뮬레이터 모드는 개념 이해와 자기 조절 학습에서 가장 높은 평균 효과성 점수(M = 4.45, SD = 0.52)를 기록하였다. 연구 결과는 학습자 주도성과 동료와의 대화를 강조하는 AI 모드가 인지적 및 정서적 결과에서 우수한 성과를 나타낸다는 것을 시사한다.\n\n# Research Logic\n## Problem\n대규모 언어 모델을 교육에 통합할 때의 기회와 도전 과제.\n## Theory\nBloom의 2-시그마 가설을 기반으로 한 학습 성과 분석.\n## Design\n혼합 방법 연구로 양적 및 질적 데이터 수집.\n## Findings\nAI-시뮬레이터 모드가 가장 높은 효과성 점수(M = 4.45)와 자기 효능감의 유의미한 향상(t(10) = 3.84, p = .003)을 보임.\n## Conclusion\nLLM은 교육적 패러다임 전환을 위한 도구로서, 전문가의 설계가 필수적임을 강조.\n\n# Key Findings\n- AI-시뮬레이터 모드가 개념 이해에서 가장 높은 효과성 점수(M = 4.45)를 기록.\n- 자기 효능감 향상에서 문제 해결(t(10) = 3.84, p = .003) 및 지적 위험 감수(t(10) = 2.91, p = .016)에서 유의미한 결과 도출.\n- 학습자 주도성과 동료 대화의 중요성이 강조됨.\n\n# Contributions\n## Theoretical\nAI 통합 교육의 이론적 기초를 확립.\n## Methodological\n혼합 방법 연구 설계의 유효성을 입증.\n## Practical\nAI 도구의 교육적 활용 방안 제시.\n\n# Limitations\n- 표본 크기가 작아 일반화에 한계가 있음.\n- 연구 기간이 짧아 장기적 효과 분석 부족.\n\n# Transferable Insights\n- AI 도구는 교육적 설계의 필수 요소로 작용해야 함.\n- 학습자 주도성을 강조하는 교수법이 효과적임.\n\n# Idea Seeds\n1. AI 기반 학습 도구의 장기적 효과 연구.\n2. 다양한 학습 환경에서의 AI 활용 방안 탐색.\n3. 학습자 주도성을 증진시키기 위한 교수법 개발.\n\n# Citation Snippets\n> Shepherd, N. A. (2026). 인공지능 교육: 대규모 언어 모델을 활용한 AI 매개 적응형 교수법의 혼합 방법 사례 연구.\n\ntags: #인공지능, #교육, #적응형학습, #학습분석, #메타인지, #학습자주도성, #AI협업\n\n---\n\n요약: 본 연구는 대규모 언어 모델을 중등 교육에 통합하는 과정에서의 기회와 도전 과제를 탐구하며, AI-시뮬레이터 모드가 가장 높은 효과성을 보였음을 강조한다. 연구 결과는 AI 도구의 교육적 활용에 있어 전문가의 설계가 필수적임을 시사한다.", "link": "https://doi.org/10.61424/issej.v4i2.766", "altLink": "https://openalex.org/W7154489691", "hasDoi": true, "hasReview": true, "authors": ["N A Shepherd"], "categories": ["Metacognition", "Agency (philosophy)", "Thematic analysis", "Cognition", "Psychology"]}, {"id": "2", "source": "ARXIV", "score": 19, "day": "2026-06-04", "title": "Elmes*: Automated Construction of Fine-Grained Evaluation Rubrics for Large Language Models in Long-Tail Educational Scenarios", "content": "---\ntitle: Elmes*: Automated Construction of Fine-Grained Evaluation Rubrics for Large Language Models in Long-Tail Educational Scenarios\nauthors: [Tao Liu, Ye Lu, Ruohua Zhang, Siyu Song, Wentao Liu, Aimin Zhou, Hao Hao]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2606.06546v1\nresearch_type: 실험적 연구\nmethodology: 다중 에이전트 평가 엔진 및 자기 진화형 루브릭 합성\ndata_type: 교육 시나리오 데이터\nsample: 330개 시나리오, 11개 과목, 3개 학년대, 10개 과제 유형\ncontext: 교육 기술에서 대형 언어 모델(LLM)의 평가\ntheoretical_framework: Shulman의 교수 내용 지식(PCK), Vygotsky의 근접 발달 영역, TPACK 모델\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 교육에서 대형 언어 모델(LLM)의 평가를 위한 Elmes* 프레임워크를 소개하며, 이는 시나리오별 세부 평가 루브릭을 자동으로 생성하고 적용하는 시스템이다. Elmes*는 교사-학생-판별자 간의 상호작용을 위한 다중 에이전트 엔진과 평가 기준 및 테스트 데이터를 공동 최적화하는 자기 진화형 모듈인 SceneGen을 결합한다. 연구 결과, 교육적 능력은 다차원적이며, LLM의 성능 차이는 주로 창의성과 가치 통합에서 발생함을 보여준다. Elmes*는 교육적으로 기반한 LLM 평가를 위한 확장 가능한 진단 인프라를 제공한다.\n\n# Research Logic\n## Problem\n기존의 LLM 평가 기준은 교육적 맥락에서의 다차원적 요구를 충족하지 못하고, 수동으로 설계된 루브릭에 의존하여 확장성이 떨어진다.\n\n## Theory\n이 연구는 교육적 평가의 다차원성을 강조하며, Shulman의 PCK, Vygotsky의 이론, TPACK 모델을 기반으로 한다.\n\n## Design\nElmes*는 다중 에이전트 평가 엔진과 SceneGen 모듈을 통해 자동화된 루브릭 생성을 구현한다.\n\n## Findings\n실험 결과, LLM의 교육적 능력은 창의성과 가치 통합에서 주로 차이를 보이며, 교육 전문화된 모델이 가장 높은 평가 점수를 기록하였다.\n\n## Conclusion\nElmes*는 교육적 맥락에서 LLM 평가의 효율성을 높이고, 교육적 기준에 맞춘 평가 루브릭을 자동으로 생성할 수 있는 가능성을 제시한다.\n\n# Key Findings\n- Elmes*는 330개의 교육 시나리오를 포함하는 Edu-330 벤치마크를 구축하였다.\n- LLM의 성능 차이는 주로 창의성과 가치 통합에서 발생하였다.\n- 전문가 점수와 LLM 점수 간의 일치성을 높이기 위해 몇 가지 조정이 필요함을 발견하였다.\n\n# Contributions\n## Theoretical\n교육적 평가의 다차원성을 강조하고, 새로운 평가 기준을 제시하였다.\n\n## Methodological\n자동화된 루브릭 생성 및 평가 방법론을 개발하였다.\n\n## Practical\n교육적 맥락에서 LLM의 평가를 위한 실용적인 도구를 제공하였다.\n\n# Limitations\n- 연구는 특정 교육 시나리오에 국한되어 있으며, 일반화 가능성이 제한적이다.\n- LLM의 평가 기준이 전문가의 주관적 판단에 의존할 수 있다.\n\n# Transferable Insights\n- 교육적 평가에서 LLM의 다차원적 능력을 평가하는 방법론이 필요하다.\n- 자동화된 평가 루브릭 생성의 필요성이 강조된다.\n\n# Idea Seeds\n1. 다양한 교육적 맥락에서의 LLM 평가 기준 개발.\n2. LLM의 교육적 효과성을 높이기 위한 추가 연구.\n3. Elmes* 프레임워크의 확장 가능성 탐색.\n\n# Citation Snippets\n> Liu, T., Lu, Y., Zhang, R., Song, S., Liu, W., Zhou, A., & Hao, H. (2026). Automated construction of fine-grained evaluation rubrics for large language models in long-tail educational scenarios. arXiv. https://arxiv.org/abs/2606.06546v1\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy", "link": "https://arxiv.org/abs/2606.06546v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Tao Liu", "Ye Lu", "Ruohua Zhang"], "categories": ["cs.LG"]}, {"id": "3", "source": "OPENALEX", "score": 18, "day": "2026-05-31", "title": "A Human-Centred Framework for Teacher Professional Development in AI-Supported Science Teaching", "content": "---\ntitle: A Human-Centred Framework for Teacher Professional Development in AI-Supported Science Teaching\nauthors: Konstantinos T. Kotsis\nyear: 2026\njournal: 명시되지 않음\ndoi: 명시되지 않음\nresearch_type: 명시되지 않음\nmethodology: 명시되지 않음\ndata_type: 명시되지 않음\nsample: 명시되지 않음\ncontext: 과학 교육에서 AI의 활용\ntheoretical_framework: UNESCO AI Competency Framework for Teachers, TPACK, AI-TPACK, Human-Centric Artificial Intelligence Pedagogy\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 논문은 AI 지원 과학 교육에서 교사 전문성 개발을 위한 인간 중심의 프레임워크를 제안한다. AI는 과학 교육에서 점점 더 중요한 역할을 하고 있지만, 많은 과학 교사들은 이러한 도구를 효과적으로 활용하기 위한 준비가 부족하다. 기존의 전문성 개발 프로그램은 AI 응용 프로그램에 대한 기술적 친숙함에 중점을 두고 있으며, 과학 교육의 실천적 측면에는 상대적으로 적은 관심을 기울이고 있다. 제안된 프레임워크는 AI 및 데이터 리터러시, AI 매개 탐구를 위한 교수 내용 지식, 윤리 및 인간의 주체성, 적응적 사용을 위한 설계 역량, 지속적인 협력적 전문 학습의 다섯 가지 차원으로 구성된다. 이 프레임워크는 과학 교육에 적합한 전문성 개발 구조로 번역되어, 교사들이 AI를 비판적으로 평가하고 적응하며 인간화할 수 있는 능력을 기르는 데 중점을 둔다.\n\n# Research Logic\n## Problem\nAI 도구에 대한 과학 교사의 준비 부족.\n## Theory\nAI 및 데이터 리터러시, TPACK, AI-TPACK.\n## Design\n인간 중심의 전문성 개발 프레임워크.\n## Findings\n교사들이 AI를 효과적으로 활용하기 위해 필요한 다섯 가지 차원 제안.\n## Conclusion\nAI 지원 과학 교육의 효과는 도구 접근성보다 교사의 비판적 평가 및 적응 능력에 달려 있다.\n\n# Key Findings\n- AI 지원 과학 교육에서 교사 전문성 개발을 위한 다섯 가지 차원 제안.\n- 기존의 전문성 개발 프로그램의 한계 지적.\n- AI 도구의 비판적 활용을 위한 교사의 역량 강화 필요성 강조.\n\n# Contributions\n## Theoretical\nAI 및 데이터 리터러시와 TPACK의 통합적 접근 제안.\n## Methodological\nAI 지원 교육을 위한 전문성 개발 구조의 개념적 합성.\n## Practical\n교사들이 AI를 효과적으로 활용할 수 있도록 돕는 실질적인 로드맵 제공.\n\n# Limitations\n- 연구의 구체적인 방법론 및 데이터 유형 명시되지 않음.\n- 샘플 크기 및 맥락에 대한 정보 부족.\n\n# Transferable Insights\n- AI 도구의 효과적인 활용을 위한 교사 교육의 중요성.\n- 과학 교육에서의 윤리적 판단 및 인간의 주체성 강조.\n\n# Idea Seeds\n1. AI 지원 교육을 위한 교사 연수 프로그램 개발.\n2. AI 도구의 윤리적 사용에 대한 교육 자료 제작.\n3. AI와 과학 교육의 통합적 접근을 위한 연구 진행.\n\n# Citation Snippets\n>\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy\n\n---\n\n요약: 본 논문은 AI 지원 과학 교육에서 교사 전문성 개발을 위한 인간 중심의 프레임워크를 제안하며, AI 도구의 효과적인 활용을 위해 교사의 비판적 평가 및 적응 능력의 중요성을 강조한다. 다섯 가지 차원으로 구성된 이 프레임워크는 과학 교육의 실천적 측면을 반영하고 있다.", "link": "https://doi.org/10.59324/jaitd.2026.2(3).02", "altLink": "https://openalex.org/W7163220646", "hasDoi": true, "hasReview": true, "authors": ["Konstantinos T. Kotsis"], "categories": ["Professional development", "Competence (human resources)", "Discipline", "Engineering ethics", "Science education"]}, {"id": "4", "source": "ARXIV", "score": 17, "day": "2026-06-05", "title": "Toward a Metaphysics of Learning Analytics: Ontological Positioning of Data, Inference, and Normativity", "content": "---\ntitle: Toward a Metaphysics of Learning Analytics: Ontological Positioning of Data, Inference, and Normativity\nauthors: Kensuke Takii\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2606.06851v1\nresearch_type: 이론적 연구\nmethodology: 기술적 메타물리학\ndata_type: 질적 데이터\nsample: 명시되지 않음\ncontext: 학습 분석(LA) 분야\ntheoretical_framework: 메타물리학\nkeywords: [learning analytics, ontology, data, inference, normativity]\n---\n\n# APA 7th style\n\n# Summary\n이 논문은 학습 분석(LA)의 메타물리학을 확립하기 위해 \"LA란 무엇인가?\"라는 존재론적 질문을 다룬다. LA의 정의와 원칙을 추적하여 LA의 정체성을 내부에서 도출하고, LA가 작동하는 데이터의 존재 유형을 규명하며, 학습자를 포함한 여덟 개의 존재론적 전제 조건을 식별한다. 또한, LA가 데이터를 기반으로 규범을 도출하지 않음을 명확히 하고, LA의 목적과 운영이 혼동되는 특정 LA 관행을 '규범 내재 LA'로 명명하여 존재론적 긴장을 드러낸다. 이 논문은 LA의 메타물리학이 외부에서 강요된 것이 아니라 LA 자체가 항상 암묵적으로 전제해온 것임을 강조한다.\n\n# Research Logic\n## Problem\nLA의 존재론적 기초에 대한 논의가 부족하다.\n## Theory\nLA의 정의와 원칙을 바탕으로 존재론적 질문을 탐구한다.\n## Design\nLA의 메타물리학을 기술적 메타물리학의 틀로 설명한다.\n## Findings\nLA는 데이터를 기반으로 규범을 도출하지 않으며, 특정 LA 관행이 LA의 목적과 혼동되고 있음을 드러낸다.\n## Conclusion\nLA의 메타물리학은 LA의 내부 원칙에서 도출된 정체성을 반영한다.\n\n# Key Findings\n- LA는 데이터를 기반으로 규범을 도출하지 않는다.\n- '규범 내재 LA'라는 개념이 LA의 목적과 운영의 혼동을 드러낸다.\n- LA의 존재론적 전제 조건으로 학습자가 필수적이다.\n\n# Contributions\n## Theoretical\nLA의 존재론적 기초에 대한 새로운 통찰을 제공한다.\n## Methodological\n기술적 메타물리학을 통해 LA의 정체성을 탐구하는 방법론을 제시한다.\n## Practical\nLA의 실천적 적용에서의 규범적 판단을 재검토할 필요성을 강조한다.\n\n# Limitations\n- LA의 메타물리학에 대한 논의가 제한적이다.\n- 특정 LA 관행의 규범적 혼동에 대한 구체적인 사례가 부족하다.\n\n# Transferable Insights\n- LA의 정의와 원칙을 재검토할 필요가 있다.\n- 데이터의 존재론적 성격에 대한 깊은 이해가 필요하다.\n\n# Idea Seeds\n1. LA의 메타물리학을 기반으로 한 새로운 연구 방향 제안.\n2. LA의 규범적 판단을 재구성하기 위한 프레임워크 개발.\n3. 데이터의 존재론적 성격에 대한 심층 연구.\n\n# Citation Snippets\n> Takii, K. (2026). Toward a Metaphysics of Learning Analytics: Ontological Positioning of Data, Inference, and Normativity. arXiv. \n\ntags: #learning_analytics, #ontology, #data, #inference, #normativity, #metaphysics, #education, #philosophy", "link": "https://arxiv.org/abs/2606.06851v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Kensuke Takii"], "categories": ["cs.CY", "cs.HC"]}, {"id": "5", "source": "ARXIV", "score": 8, "day": "2026-06-01", "title": "When Meaning Travels: A Granular Lens on Hybrid-MoE's Role in Idiomatic Understanding for Language Models", "content": "In the contemporary epoch of multilingual education, learning idioms provides a fascinating gateway towards creativity, cultural values, historical context, and diverse perspectives inherent to various linguistic traditions. This paper showcases the navigation of retaining figurative and cultural semantics in low-resource Southeast Asian languages such as Hindi, Bengali, and Thai, where culturally rich idioms pose significant obstacles for computational modeling and cross-linguistic transfer due to their deep metaphorical complexity. To tackle such complexity, we present Varnika, a reconstructed multimodal idiom corpus comprising 3,533 multilingual idioms, enriched with seven idiomatic tones aligned with both textual and visual representations. Additionally, to infer informative idiomatic understanding, we introduce a Hybrid Mixture-of-Experts (HybridMoE) framework that embeds multiple idiomatic expert opinions while mitigating expert sparsity by integrating outputs from both selected and unselected experts through controlled hybridization, further augmented with Idiomatic Property Signals via masked multimodal embeddings. To analyze the performance across multiple dimensions, we propose the IDIO-TONE and Idiomatic Validation Score, a three-stage evaluation pipeline measuring (i) literal translation fidelity, (ii) visual-semantic alignment, and (iii) idiomatic meaning retention. Empirical evaluations highlight that HybridMoE achieves 5--6\\% performance gains across advanced vision language models, demonstrating improved representation of figurative language and culturally embedded meaning in multilingual multimodal settings", "link": "https://arxiv.org/abs/2606.01671v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Sarmistha Das", "Vaibhav Vishal", "Shreyas Guha"], "categories": ["cs.CL"]}, {"id": "6", "source": "ARXIV", "score": 8, "day": "2026-05-31", "title": "Tackling the Root of Misinformation by Teaching Laypeople about Logical Fallacies via Socratic Questioning and Critical Argumentation", "content": "Identifying logical fallacies in everyday discourse is challenging for many people. This challenge is amplified in the era of Large Language Models (LLMs), where malicious agents can deploy fallacious arguments to disseminate misinformation at scale. In this work, we explore the potential of LLMs as part of the solution. We introduce LFTutor, an intelligent tutoring system which uses LLMs to tutor laypeople and help them learn about logical fallacies. LFTutor integrates intent-driven Socratic questioning and critical argumentation principles to actively engage learners to reflect on their reasoning. Through both automatic and human evaluations, we demonstrate that LFTutor significantly outperforms baseline LLMs lacking these pedagogical strategies. This work highlights the promise of combining LLMs with pedagogical scaffolding to foster critical thinking and argument literacy in the age of AI.", "link": "https://arxiv.org/abs/2606.01020v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Minjing Shi", "Junling Wang", "Jingwei Ni"], "categories": ["cs.AI", "cs.LG"]}, {"id": "7", "source": "ARXIV", "score": 8, "day": "2026-05-28", "title": "World Models: A Comprehensive Survey of Architectures, Methodologies, Reasoning Paradigms, and Applications", "content": "World models, internal simulators that learn the structure and dynamics of an environment, have emerged as a central paradigm in the pursuit of artificial general intelligence, enabling agents to predict, plan, and reason within learned representations. Despite rapid progress across reinforcement learning, robotics, autonomous driving, and video generation, the field lacks a unified framework integrating its diverse architectural choices, training methods, reasoning mechanisms, and application settings. This survey addresses that gap with a multi-axis taxonomy organized along four dimensions: (i) architecture, encompassing representation format, dynamics formulation, input modality, learning paradigm, and downstream application; (ii) methodological family, including state-space and recurrent approaches, transformer-based models, diffusion-based generators, physics-informed networks, and language-augmented multimodal systems; (iii) reasoning strategy, covering imagination-based planning, latent policy learning, counterfactual reasoning, and planning under uncertainty; and (iv) application domain, spanning robotics, autonomous driving, video prediction, multimodal agents, reinforcement learning, scientific modeling, medical imaging, educational measurement, and business and finance. Tracing the field from early cognitive-science foundations to milestone systems such as PlaNet, the Dreamer family, MuZero, Sora, Cosmos, and Genie, we examine how these dimensions interact and highlight the recent convergence of chain-of-thought reasoning with world-model imagination. We review evaluation protocols and benchmarks, identify persistent challenges such as compounding prediction errors, sim-to-real transfer, and fragmented evaluation, and outline future directions toward unified multimodal world models, foundation-scale interactive simulators, and safe deployment in safety-critical domains.", "link": "https://arxiv.org/abs/2606.00133v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Arif Hassan Zidan", "Yi Pan", "Hanqi Jiang"], "categories": ["cs.LG", "cs.ET"]}, {"id": "8", "source": "ARXIV", "score": 8, "day": "2026-05-28", "title": "Discovering a Zeta Map Algorithm on Dyck Paths via Mechanistic Interpretability", "content": "Machine learning is increasingly used in mathematical discovery, but in mathematics the desired output is often not a prediction itself, but an explicit construction that can be checked independently. We study this setting through the zeta map on Dyck paths, a classical bijection in the combinatorics of the q,t-Catalan numbers. We train a deliberately small one-layer, one-head encoder-decoder transformer on this map and analyze its learned computation using mechanistic interpretability tools, including decoder cross-attention analysis, linear probing, and causal intervention. The analysis reveals a level-based mechanism: encoder representations make path levels linearly accessible, while the decoder selects and traverses input positions in a structured way. Translating these signals into combinatorics leads to the scaffolding map, an explicit peak-centered traversal algorithm for Dyck paths. We prove that this algorithm agrees with the zeta map, modulo a reversal convention in the labeling. This gives a controlled example of AI-assisted mathematical discovery in which mechanistic interpretability turns model behavior into a precise, human-verifiable combinatorial algorithm.", "link": "https://arxiv.org/abs/2605.30482v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Xiaoyu Huang", "Blake Jackson", "Kyu-Hwan Lee"], "categories": ["cs.LG"]}, {"id": "9", "source": "ARXIV", "score": 8, "day": "2026-05-28", "title": "AfriScience-MT: Towards Decolonizing Science in Africa through Text Translation", "content": "The dominance of colonial languages in African education and scientific communication limits how hundreds of millions of speakers of African languages access and produce scientific knowledge. A core obstacle is the lack of established scientific terminology in these languages. We introduce AfriScience-MT, a parallel corpus covering six African languages (Amharic, Hausa, Luganda, Northern Sotho, Yorùbá, and isiZulu) across 11 scientific domains. Professional translators, working with expert science communicators, translated plain-language summaries of scientific papers into each target language and created new terms where none existed. We benchmark machine translation systems and large language models in zero-shot, few-shot, and fine-tuned settings. Our results show that closed-source models outperform all open-source models at both the sentence and document levels: GPT-5.4 and Gemini-3.1-Flash-Lite lead with average sentence-level COMET scores of 68.3 and 68.0, respectively, and tie at an average document-level COMET of 48.3. Among open systems, fine-tuned NLLB-1.3B reaches 67.3 at the sentence level, and TranslateGemma-12B reaches 44.0 at the document level with 1-shot in-context learning. We release AfriScience-MT to support benchmarking and document-level scientific MT for African languages.", "link": "https://arxiv.org/abs/2605.29741v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Idris Abdulmumin", "Tajuddeen Gwadabe", "Shamsuddeen Hassan Muhammad"], "categories": ["cs.CL"]}];

let filtered = [];
let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
let searchHistory = JSON.parse(localStorage.getItem('searchHistory')) || [];
let visited = JSON.parse(localStorage.getItem('visited')) || [];

function toggleTheme() {
  const html = document.documentElement;
  const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
  html.dataset.theme = next;
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  localStorage.setItem('theme', next);
}

function toggleTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSource(btn) {
  currentSource = btn.dataset.source;
  document.querySelectorAll('#sourceFilters .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSort(btn) {
  currentSort = btn.dataset.sort;
  document.querySelectorAll('#sortGroup .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  render();
}

function toggleFavorite(id, e) {
  e.stopPropagation();
  const idx = favorites.indexOf(id);
  if (idx === -1) {
    favorites.push(id);
  } else {
    favorites.splice(idx, 1);
  }
  localStorage.setItem('favorites', JSON.stringify(favorites));
  applyFilters();
}

function recordVisit(id) {
  if (!visited.includes(id)) {
    visited.push(id);
  }
  localStorage.setItem('visited', JSON.stringify(visited));
}

function recordSearch(query) {
  if (query.trim() && !searchHistory.includes(query)) {
    searchHistory.unshift(query);
    if (searchHistory.length > 10) searchHistory.pop();
    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
  }
}

function downloadJSON() {
  const data = JSON.stringify(filtered, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadCSV() {
  const headers = ['제목', '출처', '스코어', '리뷰여부', '링크'];
  const rows = filtered.map(p => [
    '"' + p.title.replace(/"/g, '""') + '"',
    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
