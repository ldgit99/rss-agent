<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-06-14 00:05</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "ARXIV", "score": 6, "day": "2026-06-05", "title": "UrduMMLU: A Massive Multitask Benchmark for Urdu Language Understanding", "content": "---\ntitle: UrduMMLU: A Massive Multitask Benchmark for Urdu Language Understanding\nauthors: [Ahmer Tabassum, Sarfraz Ahmad, Hasan Iqbal, Owais Aijaz, Momina Ahsan, Preslav Nakov]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2606.07167v1\nresearch_type: 실험적 연구\nmethodology: 대규모 데이터 수집 및 평가\ndata_type: 객관식 질문 (MCQ)\nsample: 26,431개의 질문\ncontext: 우르두어 교육 및 평가\ntheoretical_framework: MMLU 스타일 벤치마크\nkeywords: [우르두어, MMLU, 대규모 언어 모델, 교육 평가, 객관식 질문]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 2억 3천만 명 이상이 사용하는 우르두어를 위한 대규모 다중 작업 벤치마크인 UrduMMLU를 소개한다. UrduMMLU는 26개 과목과 5개 도메인에서 수집된 26,431개의 우르두어 객관식 질문(MCQ)으로 구성되어 있으며, 원주율 교육 자료에서 직접 수집되었다. 연구진은 30개의 대규모 언어 모델(LLM)을 평가하여, Gemini-3.5-Flash 모델이 90.20%와 90.34%의 정확도로 가장 높은 성능을 보였음을 확인하였다. 연구 결과, 우르두어 중심의 인문학 과목에서 많은 모델이 STEM 과목에 비해 25에서 40점의 성능 저하를 보였으며, 이는 현재 LLM이 지역적 지식에 대한 불균형을 나타낸다.\n\n# Research Logic\n## Problem\n우르두어 교육 및 문화적 맥락에서의 모델 성능 평가 부족.\n## Theory\nMMLU 스타일 벤치마크의 필요성 및 지역적 교육 자료의 중요성.\n## Design\n26,431개의 MCQ를 포함하는 UrduMMLU 벤치마크 설계.\n## Findings\n우르두어 중심의 인문학 과목에서 LLM의 성능 저하 확인.\n## Conclusion\n우르두어 지식의 불균형을 해결하기 위한 보다 나은 벤치마크 필요.\n\n# Key Findings\n- UrduMMLU는 26,431개의 MCQ로 구성되어 있으며, 이는 우르두어 교육 자료에서 직접 수집됨.\n- Gemini-3.5-Flash 모델이 90.20%와 90.34%의 정확도로 가장 높은 성능을 기록.\n- 인문학 과목에서 LLM의 성능이 STEM 과목에 비해 25에서 40점 낮음.\n\n# Contributions\n## Theoretical\n우르두어 교육 평가를 위한 새로운 벤치마크 개발.\n## Methodological\n이중 인간 주석을 통한 고품질 질문 및 답변 생성.\n## Practical\n우르두어 LLM 개발을 위한 데이터셋 및 평가 코드 공개.\n\n# Limitations\n- 기존의 영어 중심 벤치마크와의 비교 한계.\n- 지역적 지식의 불균형 문제.\n\n# Transferable Insights\n- 다국어 교육 평가의 필요성.\n- 지역적 교육 자료의 중요성 강조.\n\n# Idea Seeds\n1. 우르두어 외 다른 언어를 위한 유사한 벤치마크 개발.\n2. LLM의 지역적 지식 향상을 위한 추가 연구.\n3. 교육 현장에서의 LLM 활용 방안 탐색.\n\n# Citation Snippets\n> Tabassum, A., Ahmad, S., Iqbal, H., Aijaz, O., Ahsan, M., & Nakov, P. (2026). UrduMMLU: A Massive Multitask Benchmark for Urdu Language Understanding. arXiv. https://arxiv.org/abs/2606.07167v1\n\ntags: #우르두어, #MMLU, #대규모언어모델, #교육평가, #객관식질문, #언어이해, #인문학\n\n---\n\n요약: 본 연구는 우르두어를 위한 대규모 다중 작업 벤치마크인 UrduMMLU를 소개하며, 26,431개의 객관식 질문을 포함한다. 연구 결과, Gemini-3.5-Flash 모델이 가장 높은 성능을 보였고, 인문학 과목에서 LLM의 성능 저하가 관찰되었다. 이는 우르두어 지식의 불균형을 나타내며, 보다 나은 벤치마크의 필요성을 강조한다.", "link": "https://arxiv.org/abs/2606.07167v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Ahmer Tabassum", "Sarfraz Ahmad", "Hasan Iqbal"], "categories": ["cs.CL", "cs.AI"]}, {"id": "1", "source": "ARXIV", "score": 6, "day": "2026-06-05", "title": "Evidence-Based Intelligent Diagnostic and Therapeutic Visualization System with Large Language Models: Multi-Turn Interaction and Multimodal Treatment Plan Generation", "content": "---\ntitle: Evidence-Based Intelligent Diagnostic and Therapeutic Visualization System with Large Language Models: Multi-Turn Interaction and Multimodal Treatment Plan Generation\nauthors: [Yunhan Wang, Yuda Wang, Zhiying Tu, Mingqiang Song, Li Song, Kun Li, Dianhui Chu, Bolin Zhang]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2606.06869v1\nresearch_type: 실험적 연구\nmethodology: 사례 연구 및 자동화된 쌍 비교 평가\ndata_type: 정량적 데이터\nsample: 30 사례\ncontext: 전통 중국 의학 진단\ntheoretical_framework: 지식 그래프 기반 시각화 및 다중 모드 상호작용\nkeywords: [AI, 전통 중국 의학, 진단 지원 시스템, 지식 그래프, 의료 시각화, 대형 언어 모델]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 기존의 AI 지원 전통 중국 의학 진단 도구의 문제점을 해결하기 위해 지식 강화 시각 진단 시스템을 제안한다. 이 시스템은 241개의 증후, 1,263개의 증상, 2,485개의 관계로 구성된 Neo4j 지식 그래프를 기반으로 하며, 다단계 증상 매칭 파이프라인과 정보 이득 기반의 능동적 질문 전략을 포함한다. 연구 결과, 지식 그래프 제약이 비표준 출력을 32% 감소시켰으며, 진단 신뢰도(Cohen's d = 1.82, p < 0.001)와 인지 부하가 개선되었다. 제안된 시스템은 전통 중국 의학의 진단 추론의 투명성과 치료 계획의 해석 가능성을 향상시킨다.\n\n# Research Logic\n## Problem\n기존 AI 지원 전통 중국 의학 도구의 불투명한 추론 과정과 수동적 상호작용 문제.\n## Theory\n지식 그래프 기반의 시각화와 다중 모드 상호작용을 통한 진단 및 치료 계획의 투명성 향상.\n## Design\nNeo4j 지식 그래프를 활용한 다단계 증상 매칭 및 능동적 질문 전략.\n## Findings\n비표준 출력 감소, 진단 신뢰도 및 인지 부하 개선.\n## Conclusion\n제안된 시스템은 전통 중국 의학의 진단 및 치료 과정에서 신뢰성을 높이는 실용적인 솔루션을 제공한다.\n\n# Key Findings\n- 지식 그래프 제약으로 비표준 출력 32% 감소.\n- 진단 신뢰도 개선 (Cohen's d = 1.82, p < 0.001).\n- 인지 부하 감소 (5개 차원 중 4개에서 개선).\n\n# Contributions\n## Theoretical\n전통 중국 의학 진단의 투명성과 해석 가능성 향상.\n## Methodological\n지식 그래프와 다중 모드 상호작용을 통합한 새로운 진단 시스템 설계.\n## Practical\n신뢰할 수 있는 AI 지원 전통 중국 의학 응용을 위한 실용적인 솔루션 제공.\n\n# Limitations\n- 연구 샘플 크기가 30으로 제한적임.\n- 특정 환경에서의 적용 가능성에 대한 검증 필요.\n\n# Transferable Insights\n- 지식 그래프를 통한 진단 시스템의 투명성 향상 가능성.\n- 다중 모드 상호작용이 사용자 이해도를 높일 수 있음.\n\n# Idea Seeds\n1. 다양한 의료 분야에 적용 가능한 지식 그래프 기반 진단 시스템 개발.\n2. 사용자 맞춤형 치료 계획을 위한 AI 기반 개인화 시스템 연구.\n3. 다중 모드 상호작용을 통한 교육적 도구 개발.\n\n# Citation Snippets\n> Wang, Y., Wang, Y., Tu, Z., Song, M., Song, L., Li, K., Chu, D., & Zhang, B. (2026). Evidence-Based Intelligent Diagnostic and Therapeutic Visualization System with Large Language Models: Multi-Turn Interaction and Multimodal Treatment Plan Generation. arXiv. https://arxiv.org/abs/2606.06869v1\n\ntags: #AI, #전통중국의학, #진단지원시스템, #지식그래프, #의료시각화, #대형언어모델\n\n---\n\n## 압축 요약\n본 연구는 전통 중국 의학 진단 도구의 문제를 해결하기 위해 지식 강화 시각 진단 시스템을 제안하며, 이 시스템은 Neo4j 지식 그래프를 기반으로 한다. 연구 결과, 비표준 출력이 32% 감소하고 진단 신뢰도가 유의미하게 향상되었다. 제안된 시스템은 진단 및 치료 과정의 투명성을 높이는 데 기여한다.", "link": "https://arxiv.org/abs/2606.06869v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Yunhan Wang", "Yuda Wang", "Zhiying Tu"], "categories": ["cs.AI"]}, {"id": "2", "source": "ARXIV", "score": 6, "day": "2026-06-04", "title": "An Infectious Disease Spread Simulation Based on Large Language Model Decision Making", "content": "---\ntitle: 전염병 확산 시뮬레이션: 대형 언어 모델 의사결정 기반\nauthors: [Yonchanok Khaokaew, Ruochen Kong, Andreas Zufle, Hao Xue, Taylor Anderson, Chandini Raina MacIntyre, Matthew Scotch, Flora D. Salim, David J Heslop]\nyear: 2026\njournal: Proceedings of the 32nd ACM SIGKDD Conference on Knowledge Discovery and Data Mining\ndoi: https://doi.org/10.1145/3770855.3818983\nresearch_type: 실험적 연구\nmethodology: 에이전트 기반 시뮬레이션\ndata_type: 합성 인구 데이터\nsample: 샌프란시스코 및 애틀랜타 지역의 인구\ncontext: 전염병 확산 및 공공 보건 개입\ntheoretical_framework: 계획된 행동 이론\nkeywords: [전염병, 시뮬레이션, 건강 행동, 대형 언어 모델, 생성적 AI]\n---\n\n# APA 7th style\n\n# Summary\n이 연구는 전염병 발생 시 개인의 의사결정을 모델링하여 행동 역학을 이해하고 효과적인 공공 보건 개입을 지원하는 것을 목표로 한다. 대형 언어 모델(LLM)을 활용하여 에이전트의 의사결정을 생성하고, 이를 기반으로 한 공간적 에이전트 기반 시뮬레이션 프레임워크를 개발하였다. 연구 결과, 소득과 교육 수준이 보고율 변동의 주요 요인으로 나타났으며, 지리적 요인, LLM 모델 선택, 메시지 프레이밍도 일정한 영향을 미쳤다. 이 프레임워크는 사회적 및 지리적 이질성을 포착하여 공간 역학 모델링과 편향 인식 행동 분석을 지원한다.\n\n# Research Logic\n## Problem\n전염병 발생 시 개인의 의사결정이 전염병 확산에 미치는 영향을 이해하는 것이 중요하다.\n\n## Theory\n계획된 행동 이론을 기반으로 하여 개인의 행동 결정이 사회적 요인과 정보에 의해 어떻게 영향을 받는지를 탐구한다.\n\n## Design\n대형 언어 모델을 활용한 에이전트 기반 시뮬레이션을 통해 다양한 인구 통계적 특성을 가진 에이전트를 생성하고, 이들의 의사결정을 모델링하였다.\n\n## Findings\n소득과 교육 수준이 보고율 변동에 가장 큰 영향을 미치며, 지리적 요인과 메시지 프레이밍도 영향을 미친다.\n\n## Conclusion\nLLM 기반 의사결정 프레임워크는 전염병 모델링에서 개인의 행동 이질성을 포착하고, 공공 보건 연구에 유용한 도구가 될 수 있다.\n\n# Key Findings\n- 소득과 교육 수준이 보고율 변동의 주요 요인으로 작용한다.\n- 지리적 요인과 LLM 모델 선택이 보고율에 미치는 영향이 존재한다.\n- LLM을 통한 의사결정이 실제 인구의 행동 패턴을 반영한다.\n\n# Contributions\n## Theoretical\nLLM 기반 의사결정 모델이 전염병 확산 연구에 기여할 수 있는 새로운 이론적 틀을 제공한다.\n\n## Methodological\n에이전트 기반 시뮬레이션에 LLM을 통합하여 보다 정교한 행동 모델링을 가능하게 한다.\n\n## Practical\n공공 보건 개입을 위한 데이터 기반 의사결정 지원 도구로 활용될 수 있다.\n\n# Limitations\n- 특정 지역(샌프란시스코 및 애틀랜타)에서만 연구가 수행되어 일반화에 한계가 있다.\n- LLM의 결정이 실제 행동과 일치하지 않을 수 있는 가능성이 존재한다.\n\n# Transferable Insights\n- LLM을 활용한 의사결정 모델링은 다양한 분야에 적용 가능하다.\n- 인구 통계적 특성이 행동 결정에 미치는 영향을 분석하는 데 유용하다.\n\n# Idea Seeds\n1. LLM을 활용한 다른 전염병 모델링 연구 확장.\n2. 다양한 지역에서의 데이터 수집을 통한 일반화 가능성 검토.\n3. LLM의 의사결정 정확성을 높이기 위한 추가 연구.\n\n# Citation Snippets\n> Khaokaew, Y., Kong, R., Zufle, A., Xue, H., Anderson, T., MacIntyre, C. R., Scotch, M., Salim, F. D., & Heslop, D. J. (2026). An Infectious Disease Spread Simulation Based on Large Language Model Decision Making. In Proceedings of the 32nd ACM SIGKDD Conference on Knowledge Discovery and Data Mining.\n\ntags: #전염병, #시뮬레이션, #건강행동, #대형언어모델, #생성적AI, #공공보건, #에이전트기반모델", "link": "https://arxiv.org/abs/2606.06360v2", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Yonchanok Khaokaew", "Ruochen Kong", "Andreas Zufle"], "categories": ["cs.AI"]}, {"id": "3", "source": "ARXIV", "score": 6, "day": "2026-06-04", "title": "Architecting Strategic Influence: Operationalising the UXR Point of View Framework for Research Function Maturity", "content": "---\ntitle: Architecting Strategic Influence: Operationalising the UXR Point of View Framework for Research Function Maturity\nauthors: [Rohinin Singh, Renee Barsoum]\nyear: 2026\njournal: 명시되지 않음\ndoi: https://arxiv.org/abs/2606.05826v1\nresearch_type: 사례 연구\nmethodology: 구조적 3단계 반복 방법론\ndata_type: 명시되지 않음\nsample: 명시되지 않음\ncontext: UXR 기능의 성숙도 전환\ntheoretical_framework: UXR 관점 프레임워크\nkeywords: [User Experience Research, Maturity Models, Strategic Influence, Organizational Adaptation, Point of View Framework, Playbook]\n---\n\n# APA 7th style\n\n# Summary\n이 사례 연구는 사용자 경험 연구(UXR) 관점 프레임워크의 체계적 적용이 UXR 기능의 성숙도를 높이는 효과적인 운영적 발판이 됨을 보여준다. '공격적' 및 '방어적' 전략을 통합한 이 플레이북은 UXR 리더들이 이해관계자 편향, 반응적 작업, 통찰력 분산과 같은 일반적인 제도적 장벽을 체계적으로 탐색할 수 있도록 돕는 적응 가능한 도구 키트를 제공한다. 성장 전략의 선제적이고 목적 있는 적용을 통해 연구 기능이 증거 기반의 실행 가능한 관점을 제공할 수 있는 전략적 파트너로 자리 잡을 가능성이 크게 향상된다. 이 분석은 플레이북 기반의 성숙도 전략이 연구 기능이 전술적 실행을 넘어 장기 비즈니스 전략을 직접 형성할 수 있도록 어떻게 권한을 부여하는지를 보여준다.\n\n# Research Logic\n## Problem\nUXR 기능의 성숙도를 높이는 데 필요한 체계적이고 전략적인 접근 방식 부족.\n## Theory\nUXR 관점 프레임워크를 통한 데이터의 조직적 이해 전환.\n## Design\n구조적 3단계 반복 방법론을 통해 조직적 복잡성을 관리.\n## Findings\nUXR 기능이 전략적 파트너로 자리 잡기 위해 필요한 성장 전략과 실행 방안 제시.\n## Conclusion\nUXR 기능의 성숙도를 높이기 위해서는 체계적이고 전략적인 접근이 필수적이며, 이를 통해 조직 내에서의 영향력을 강화할 수 있다.\n\n# Key Findings\n- UXR 기능의 성숙도를 높이기 위한 체계적 접근 필요.\n- 공격적 및 방어적 전략을 통한 조직적 장벽 탐색 가능.\n- 연구 기능이 전략적 파트너로 자리 잡기 위한 성장 전략 제시.\n\n# Contributions\n## Theoretical\nUXR 관점 프레임워크의 체계적 적용을 통한 이론적 기여.\n## Methodological\n구조적 3단계 반복 방법론의 개발 및 적용.\n## Practical\nUXR 기능의 성숙도를 높이기 위한 실용적인 전략 제공.\n\n# Limitations\n- 사례 연구의 일반화 가능성 제한.\n- 데이터 유형 및 샘플에 대한 정보 부족.\n\n# Transferable Insights\n- UXR 기능의 성숙도를 높이기 위한 체계적 접근은 다른 분야에도 적용 가능.\n- 공격적 및 방어적 전략의 통합은 다양한 조직적 상황에서 유용할 수 있음.\n\n# Idea Seeds\n1. UXR 기능의 성숙도를 높이기 위한 추가적인 사례 연구 필요.\n2. 공격적 및 방어적 전략의 효과를 비교 분석하는 연구.\n3. UXR 관점 프레임워크의 다른 분야 적용 가능성 탐색.\n\n# Citation Snippets\n> Singh, R., & Barsoum, R. (2026). Architecting Strategic Influence: Operationalising the UXR Point of View Framework for Research Function Maturity. \n\ntags: #UXR, #MaturityModels, #StrategicInfluence, #OrganizationalAdaptation, #PointOfViewFramework, #Playbook\n\n---\n\n이 연구는 사용자 경험 연구(UXR) 기능의 성숙도를 높이기 위한 체계적 접근의 필요성을 강조하며, 공격적 및 방어적 전략을 통해 조직적 장벽을 탐색할 수 있는 방법을 제시한다. 이를 통해 UXR 기능이 전략적 파트너로 자리 잡을 수 있는 가능성을 높인다.", "link": "https://arxiv.org/abs/2606.05826v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Rohinin Singh", "Renee Barsoum"], "categories": ["cs.HC"]}, {"id": "4", "source": "ARXIV", "score": 6, "day": "2026-06-04", "title": "Fix the Mind, Not the Move: Interpretable AI Assistance via Knowledge-Gap Localization", "content": "---\ntitle: Fix the Mind, Not the Move: Interpretable AI Assistance via Knowledge-Gap Localization\nauthors: [Ayano Hiranaka, Ya-Chuan Hsu, Stefanos Nikolaidis, Erdem Bıyık, Daniel Seita]\nyear: 2026\njournal: Proceedings of the 43rd International Conference on Machine Learning\ndoi: https://arxiv.org/abs/2606.05602v1\nresearch_type: 실험적 연구\nmethodology: 사용자 연구 및 실험적 검증\ndata_type: 행동 데이터\nsample: 20명 사용자\ncontext: AI 보조 시스템의 인간-기계 협력\ntheoretical_framework: 지식 격차 이론\nkeywords: [human-ai collaboration, ai tutoring, instructional design, scaffolding, ai literacy, education, learning analytics, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구에서는 인간-기계 협력에서 AI 보조 시스템이 사용자의 오해를 진단하고 이를 교정하기 위한 SENSEI 프레임워크를 제안한다. SENSEI는 사용자의 상호작용 행동을 분석하여 지식 격차를 파악하고, 이를 바탕으로 최소한의 수정 제안을 제공한다. 연구 결과, SENSEI는 90%의 학생 오해를 성공적으로 교정하며, 장기적인 작업 성과를 향상시키는 데 기여함을 보여준다. 이 연구는 AI 보조 시스템의 지식 기반 지원의 필요성을 강조하며, 행동 수정이 아닌 지식 수정의 중요성을 부각시킨다.\n\n# Research Logic\n## Problem\nAI 보조 시스템이 사용자의 오해를 해결하지 않고 단기적인 행동 수정에만 집중하는 문제.\n## Theory\n지식 격차 이론을 바탕으로, 사용자의 오해를 진단하고 교정하는 것이 장기적인 성과 향상에 필수적임을 주장.\n## Design\nSENSEI 프레임워크를 통해 사용자의 행동 데이터를 분석하고, 지식 격차를 파악하여 교정 제안을 생성.\n## Findings\nSENSEI는 90%의 오해를 교정하며, 사용자 연구를 통해 실제 인간 오해를 효과적으로 진단하고 교정할 수 있음을 입증.\n## Conclusion\nAI 보조 시스템은 행동 수정뿐만 아니라 지식 수정을 통해 사용자의 장기적인 성과를 향상시킬 수 있다.\n\n# Key Findings\n- SENSEI는 사용자의 행동 데이터를 기반으로 지식 격차를 효과적으로 진단함.\n- 90%의 학생 오해를 성공적으로 교정함.\n- 장기적인 작업 성과 향상에 기여함.\n\n# Contributions\n## Theoretical\n지식 격차 이론을 기반으로 한 AI 보조 시스템의 필요성을 강조.\n## Methodological\n구조화된 지식 진단 및 교정 방법론을 제안.\n## Practical\nAI 보조 시스템의 실제 적용 가능성을 보여주며, 교육 현장에서의 활용 가능성을 제시.\n\n# Limitations\n- 연구 샘플이 20명으로 제한되어 일반화에 한계가 있음.\n- 특정 작업에 국한된 결과로, 다양한 도메인에 대한 검증이 필요함.\n\n# Transferable Insights\n- AI 보조 시스템은 행동 수정뿐만 아니라 지식 교정의 중요성을 인식해야 함.\n- 사용자 행동 데이터를 기반으로 한 지식 진단이 효과적임을 보여줌.\n\n# Idea Seeds\n1. 다양한 도메인에서 SENSEI 프레임워크의 적용 가능성 탐색.\n2. AI 보조 시스템의 사용자 경험 개선을 위한 추가 연구.\n3. 지식 격차 진단을 위한 새로운 알고리즘 개발.\n\n# Citation Snippets\n> Hiranaka, A., Hsu, Y.-C., Nikolaidis, S., Bıyık, E., & Seita, D. (2026). Fix the Mind, Not the Move: Interpretable AI Assistance via Knowledge-Gap Localization. Proceedings of the 43rd International Conference on Machine Learning.\n\ntags: #human-ai collaboration, #ai tutoring, #instructional design, #scaffolding, #ai literacy, #education, #learning analytics, #ai pedagogy", "link": "https://arxiv.org/abs/2606.05602v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Ayano Hiranaka", "Ya-Chuan Hsu", "Stefanos Nikolaidis"], "categories": ["cs.AI", "cs.HC", "cs.LG"]}, {"id": "5", "source": "ARXIV", "score": 6, "day": "2026-06-03", "title": "Evaluating Large Language Models in Dynamic Clinical Decision-Making with Standardized Patient Cases", "content": "Large language models (LLMs) are increasingly proposed as clinical agents, yet static, single-turn benchmarks cannot capture how a model dynamically delivers care across an encounter: gathering information, planning treatment, and adapting longitudinal management across successive patient states. Medical education has long addressed an analogous challenge through standardized patients (SPs): trained actors who consistently portray clinical cases, enabling realistic practice and objective, scripted assessment. Here we introduce MedSP1000, an SP-derived interactive benchmark for clinical-agent evaluation, including 1,638 SP cases with 24,602 trajectory-level peer-reviewed rubrics. MedSP1000 converts peer-reviewed SP teaching cases into executable scenarios with defined SP case scripts, clinical environment contexts, and human-validated structured rubric. In each simulation evaluation run, a clinical agent interacts in closed loop with a patient agent and an environment controller, and its behaviour is scored throughout the encounter against expert criteria specified in the original materials. Applying MedSP1000 to a range of general-purpose and medically specialized LLMs, we find that performance on static benchmarks does not reliably translate to such educational scenarios. The best-performing model, GPT-5.5, completes only 60.4% of expert-defined rubric items, whereas the strongest medically specialized model reaches 40.0%; increasing test-time compute produces no measurable gain. These results suggest that current LLMs, including agentic systems tuned for medicine, are not yet reliable enough to be safely integrated into actual clinical practice. More broadly, MedSP1000 shows how process-level, SP-style evaluation can reveal clinically relevant failure modes that single-turn benchmarks miss.", "link": "https://arxiv.org/abs/2606.05112v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Cheng Liang", "Pengcheng Qiu", "Ya Zhang"], "categories": ["cs.CL"]}, {"id": "6", "source": "ARXIV", "score": 6, "day": "2026-06-03", "title": "ProHiFlo: Hierarchical Flow Matching with Functional Guidance for De Novo Protein Generation", "content": "De novo protein generation has transformative potential in therapeutic design, enzyme engineering, and synthetic biology. While diffusion-based and flow matching approaches have achieved progress, they typically operate at single resolution and lack mechanisms for incorporating functional constraints. We introduce ProHiFlo, a hierarchical flow matching framework with three innovations: (1) coarse-to-fine generation that models backbone geometry before refining to all-atom coordinates, reducing computational cost while maintaining accuracy; (2) functional guidance leveraging pretrained predictors to steer generation toward desired properties without retraining; (3) adaptive SE(3)-equivariant architecture for efficient multi-scale processing. Experiments on unconditional generation, motif scaffolding, and functional design demonstrate state-ofthe-art performance while requiring 4 fewer sampling steps. On enzyme active site scaffolding, ProHiFlo achieves 58.9% success rate compared to 41.2% for RFDiffusion.", "link": "https://arxiv.org/abs/2606.11243v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Chuanzhen Wang", "Meade Cleti", "Pete Jano"], "categories": ["cs.LG", "cs.CL"]}, {"id": "7", "source": "ARXIV", "score": 6, "day": "2026-06-02", "title": "VidMsg: A Benchmark for Implicit Message Inference in Short Videos", "content": "Understanding short online videos involves more than identifying visible objects and actions; video makers often include an underlying message or purpose in the clip. We introduce VidMsg, a benchmark for evaluating implicit message understanding in short, internet-native video clips. VidMsg contains 400 YouTube-derived clips across 9 practical topic areas and 52 fine-grained target messages, covering domains such as career and finance, education, health and well-being, culture, safety, sustainability, and lifestyle. VidMsg is constructed through a message-first pipeline: an LLM first translates target messages into indirect search scenarios, which are used to retrieve candidate clips. Human annotators then retain clips that convey the intended message without being overly explicit. VidMsg is designed primarily for bidirectional message-clip retrieval for scalable applications such as video search and recommendation, where systems must capture holistic video understanding. In addition to retrieval, VidMsg includes a diagnostic multiple-choice QA benchmark, where models select the intended message of a clip from semantically related alternatives. Experiments with contemporary video-language and retrieval models show that strong models often fail on VidMsg, because the task requires pragmatic inference, integration of contextual cues, and discrimination among semantically close messages. We also introduce VidVec-Msg, a baseline method that improves message-oriented retrieval while leaving substantial headroom for future work.", "link": "https://arxiv.org/abs/2606.03635v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Issar Tzachor", "Michael Green", "Rami Ben-Ari"], "categories": ["cs.CV", "cs.AI"]}, {"id": "8", "source": "ARXIV", "score": 6, "day": "2026-06-02", "title": "TurtleAI: Benchmarking Multimodal Models for Visual Programming in Turtle Graphics", "content": "Vision-language models (VLMs) have been explored for visual programming, where they generate code to solve visual tasks. However, most prior work focuses on visual programming for productivity; it remains unclear how well current VLMs perform on education-oriented visual programming and what factors limit their performance. To bridge this gap, we introduce TurtleAI, a benchmark containing 823 tasks curated based on real-world visual programming tasks in the Turtle Graphics domain. Solving these tasks requires models to perceive geometric patterns, reason about spatial relationships, and synthesize Python code that faithfully reproduces geometric patterns. We evaluate 20+ VLMs, including GPT-5, GPT-4o, and Qwen2-VL-72B, and find that they struggle significantly, with most achieving success rates below 30%. To address these limitations, we propose a data generation technique that requires only a small set of seed samples. Fine-tuning Qwen2-VL-72B on the resulting synthetic data yields an improvement of about 20% on real-world tasks. Our failure analysis reveals that GPT-4o struggles with spatial reasoning and precise visual replication, whereas fine-tuning primarily improves the alignment between visual reasoning and code implementation.", "link": "https://arxiv.org/abs/2606.03626v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Chao Wen", "Jacqueline Staub", "Adish Singla"], "categories": ["cs.CV", "cs.AI", "cs.CY"]}, {"id": "9", "source": "ARXIV", "score": 6, "day": "2026-06-02", "title": "GTBench: A Curriculum-Grounded Benchmark for Evaluating LLMs as Mathematical Research Assistants in Graph Theory", "content": "Large language models (LLMs) are increasingly used as self-study assistants in technical disciplines, yet their reliability as mathematical reasoning assistants remains poorly understood. We introduce GTBench, a curriculum-grounded benchmark for evaluating LLMs as mathematical research assistants in graph theory, comprising 63 problems organized into three groups of increasing difficulty: undergraduate definitions and basic properties (Group 1), algorithm tracing and structural reasoning (Group 2), and graduate-level proof construction (Group 3). Problems are sourced from verified academic materials including Diestel's Graph Theory. We evaluate five frontier models -- GPT-5, Claude Sonnet 4.6, Gemini 2.5 Flash-Lite, Llama 3.3 70B, and Mistral Large 3 -- under zero-shot and chain-of-thought prompting, using exact-match and LLM-as-judge evaluation for Groups 1 and 2, and a hybrid human expert and LLM-as-judge protocol for Group 3. Our results reveal a pronounced performance hierarchy: GPT-5 approaches ceiling on Group 1 (95.8% zero-shot) and maintains meaningful accuracy on graduate proofs (82%), while all other models degrade substantially with difficulty, with Llama achieving 0% under human evaluation on Group 3 zero-shot. Failure mode analysis shows that correct algorithm, wrong execution errors dominate Groups 1 and 2, while Group 3 additionally surfaces incomplete reasoning failures and reveals systematic disagreement between human evaluators and the automated judge, particularly on verbose or near-complete proofs (kappa = 0.48-0.83 across human pairs). GTBench provides the first curriculum-grounded evaluation framework for graph-theoretic reasoning in LLMs, with direct implications for the governance of AI tools in mathematical education and scientific research.", "link": "https://arxiv.org/abs/2606.03144v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Noujoud Nader", "Ibrahem Aljabea", "Patrick Diehl"], "categories": ["cs.AI"]}];
let PAGE_SIZE = 10;
let currentTab = 'all';
let currentSource = 'ALL';
let currentSort = 'score';
let currentPage = 1;
let currentCategory = '';
let currentMinDate = '';
let currentMaxDate = '';
let hideVisited = false;
let filtered = [];
let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
let searchHistory = JSON.parse(localStorage.getItem('searchHistory')) || [];
let visited = JSON.parse(localStorage.getItem('visited')) || [];

function toggleTheme() {
  const html = document.documentElement;
  const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
  html.dataset.theme = next;
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  localStorage.setItem('theme', next);
}

function toggleTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSource(btn) {
  currentSource = btn.dataset.source;
  document.querySelectorAll('#sourceFilters .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSort(btn) {
  currentSort = btn.dataset.sort;
  document.querySelectorAll('#sortGroup .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  render();
}

function toggleFavorite(id, e) {
  e.stopPropagation();
  const idx = favorites.indexOf(id);
  if (idx === -1) {
    favorites.push(id);
  } else {
    favorites.splice(idx, 1);
  }
  localStorage.setItem('favorites', JSON.stringify(favorites));
  applyFilters();
}

function recordVisit(id) {
  if (!visited.includes(id)) {
    visited.push(id);
  }
  localStorage.setItem('visited', JSON.stringify(visited));
}

function recordSearch(query) {
  if (query.trim() && !searchHistory.includes(query)) {
    searchHistory.unshift(query);
    if (searchHistory.length > 10) searchHistory.pop();
    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
  }
}

function downloadJSON() {
  const data = JSON.stringify(filtered, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadCSV() {
  const headers = ['제목', '출처', '스코어', '리뷰여부', '링크'];
  const rows = filtered.map(p => [
    '"' + p.title.replace(/"/g, '""') + '"',
    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
