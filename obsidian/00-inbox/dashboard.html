<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-03-19 23:29</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "ARXIV", "score": 21, "day": "2026-03-18", "title": "Large Language Models in Teaching and Learning: Reflections on Implementing an AI Chatbot in Higher Education", "content": "---\ntitle: 대형 언어 모델을 활용한 교수 및 학습: 고등 교육에서 AI 챗봇 구현에 대한 성찰\nauthors: Fiammetta Caccavale, Carina L. Gargalo, Julian Kager, Magdalena Skowyra, Steen Larsen, Krist V. Gernaey, Ulrich Krühne\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2603.17773v1\nresearch_type: 실험적 연구\nmethodology: 혼합 방법론\ndata_type: 정량적 및 정성적 데이터\nsample: 2024년 및 2025년 학기 동안의 학생들\ncontext: 고등 교육에서의 AI 챗봇 활용\ntheoretical_framework: 명시되지 않음\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 고등 교육에서 대형 언어 모델(LLM)을 활용한 AI 챗봇의 구현을 통해 발생할 수 있는 위험을 분석하고자 하였다. 연구팀은 RAG 모델에 기반한 생성 AI 어시스턴트를 구현하여, 교사가 주도하던 시간 소모적인 과제를 대체하였다. 세 가지 실험을 통해 학생들의 동기, LLM과 인간 교사 간의 인식 차이, AI가 생성한 응답의 질, LLM이 학생들의 학업 성과에 미치는 영향을 평가하였다. 결과는 LLM의 교육적 가능성을 제시하며, 향후 LLM의 도입에 따른 도전과 기회를 논의하였다.\n\n# Research Logic\n## Problem\n대형 언어 모델의 도입이 교육에 미치는 긍정적 및 부정적 영향을 평가할 필요가 있다.\n## Theory\nAI 기술의 통합이 교육의 질을 향상시킬 수 있지만, 잘못된 정보 제공 및 비전문적 지식의 한계가 존재한다.\n## Design\n혼합 방법론을 통해 세 가지 실험을 설계하고, 학생들의 경험을 정량적 및 정성적으로 분석하였다.\n## Findings\n학생들은 LLM과의 상호작용에서 긍정적인 경험을 보고하였으며, AI의 응답 품질에 대한 인식이 개선되었다.\n## Conclusion\nLLM의 교육적 활용은 가능성이 있지만, 신중한 접근이 필요하다.\n\n# Key Findings\n- LLM과의 상호작용이 학생들의 동기를 증가시켰다.\n- AI가 생성한 응답의 질이 학생들의 학업 성과에 긍정적인 영향을 미쳤다.\n- LLM 사용에 대한 학생들의 인식이 긍정적으로 변화하였다.\n\n# Contributions\n## Theoretical\nAI와 교육의 통합에 대한 새로운 통찰을 제공하였다.\n## Methodological\n혼합 방법론을 통한 실험적 접근을 제시하였다.\n## Practical\nAI 챗봇의 교육적 활용 가능성을 탐색하였다.\n\n# Limitations\n- 연구 샘플이 제한적이며, 특정 학기와 코스에 국한되었다.\n- AI 챗봇의 한계와 오류 가능성에 대한 충분한 검토가 필요하다.\n\n# Transferable Insights\n- LLM의 활용은 교육적 상호작용을 개선할 수 있는 잠재력이 있다.\n- AI 도구의 효과적인 통합을 위해 교사 교육이 필수적이다.\n\n# Idea Seeds\n1. LLM을 활용한 맞춤형 학습 경로 개발.\n2. AI 챗봇을 통한 협동 학습 촉진 방안 모색.\n3. AI의 윤리적 사용을 위한 가이드라인 개발.\n\n# Citation Snippets\n> Caccavale, F., Gargalo, C. L., Kager, J., Skowyra, M., Larsen, S., Gernaey, K. V., & Krühne, U. (2026). Large Language Models in Teaching and Learning: Reflections on Implementing an AI Chatbot in Higher Education. arXiv. https://arxiv.org/abs/2603.17773v1\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy\n\n---\n\n요약: 본 연구는 고등 교육에서 대형 언어 모델을 활용한 AI 챗봇의 구현을 분석하였다. 연구 결과, LLM과의 상호작용이 학생들의 동기와 학업 성과에 긍정적인 영향을 미쳤으며, AI의 응답 품질에 대한 인식이 개선되었다. 그러나 AI 도구의 효과적인 통합을 위해 신중한 접근과 교사 교육이 필요하다.", "link": "https://arxiv.org/abs/2603.17773v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Fiammetta Caccavale", "Carina L. Gargalo", "Julian Kager"], "categories": ["cs.CY", "cs.HC"]}, {"id": "1", "source": "ARXIV", "score": 20, "day": "2026-03-18", "title": "SafeTutors: Benchmarking Pedagogical Safety in AI Tutoring Systems", "content": "---\ntitle: SafeTutors: Benchmarking Pedagogical Safety in AI Tutoring Systems\nauthors: [Rima Hazra, Bikram Ghuku, Ilona Marchenko, Yaroslava Tokarieva, Sayan Layek, Somnath Banerjee, Julia Stoyanovich, Mykola Pechenizkiy]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2603.17373v1\nresearch_type: 실험적 연구\nmethodology: 벤치마크 개발 및 평가\ndata_type: 정량적 데이터\nsample: 10개의 오픈 웨이트 LLMs (3.8B–72B) 및 1개의 블랙박스 LLM\ncontext: 수학, 물리학, 화학 교육\ntheoretical_framework: 학습 과학 이론에 기반한 위험 분류 체계\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 AI 튜터 시스템의 교육적 안전성을 평가하기 위한 벤치마크인 SafeTutors를 소개한다. 기존의 평가 방식은 문제 해결 정확도와 일반적인 안전성을 개별적으로 평가하여, 모델이 학생-튜터 상호작용에서 교육적으로 효과적이고 안전한지를 포착하지 못하고 있다. 연구진은 안전한 튜터링이 전통적인 LLM 안전성과 근본적으로 다르며, 주된 위험은 유해한 내용이 아니라 학습의 침식이라고 주장한다. SafeTutors는 수학, 물리학, 화학을 포함한 교육적 맥락에서 안전성과 교육 효과성을 동시에 평가하는 체계를 제공하며, 11개의 위험 차원과 48개의 하위 위험으로 구성된 이론적으로 기반한 위험 분류 체계를 통해 이를 실현한다. 연구 결과, 모든 모델이 광범위한 해를 보이며, 다중 턴 대화에서 교육적 실패율이 17.7%에서 77.8%로 증가함을 발견하였다.\n\n# Research Logic\n## Problem\nAI 튜터의 안전성과 교육적 효과성을 동시에 평가할 수 있는 체계의 부재.\n## Theory\n안전한 튜터링은 유해한 내용의 회피뿐만 아니라 교육적 효과성을 포함해야 한다는 이론적 주장.\n## Design\nSafeTutors 벤치마크는 11개의 위험 차원과 48개의 하위 위험을 포함하여 설계됨.\n## Findings\n모든 모델이 60% 이상의 해를 보이며, 다중 턴 대화에서 교육적 실패율이 급증함.\n## Conclusion\nAI 튜터의 평가에서 교육 지원과 해의 회피를 동시에 측정할 필요성이 강조됨.\n\n# Key Findings\n- 모든 모델이 최소 60%의 해를 보이며, 다중 턴 대화에서 교육적 실패율이 77.8%로 증가함.\n- 모델의 규모가 안전성을 일관되게 개선하지 않음.\n- 수학, 물리학, 화학 과목에 따라 해의 유형이 다르게 나타남.\n\n# Contributions\n## Theoretical\nAI 튜터의 안전성과 교육적 효과성을 동시에 평가하는 새로운 이론적 틀 제공.\n## Methodological\n다중 턴 대화에서의 안전성과 교육적 효과성을 평가하는 벤치마크 개발.\n## Practical\nAI 튜터의 설계 및 평가에 있어 교육적 안전성을 고려해야 함을 강조.\n\n# Limitations\n- 연구는 특정 과목(수학, 물리학, 화학)에 국한됨.\n- 다중 턴 대화의 복잡성을 완전히 반영하지 못할 수 있음.\n\n# Transferable Insights\n- AI 튜터의 설계 시 교육적 안전성을 고려해야 함.\n- 다중 턴 대화에서의 상호작용이 교육적 결과에 미치는 영향을 분석할 필요가 있음.\n\n# Idea Seeds\n1. AI 튜터의 교육적 안전성을 평가하기 위한 추가적인 위험 차원 개발.\n2. 다양한 학습 환경에서의 AI 튜터의 효과성 연구.\n3. AI 튜터와 학생 간의 상호작용을 개선하기 위한 설계 원칙 제안.\n\n# Citation Snippets\n> Hazra, R., Ghuku, B., Marchenko, I., Tokarieva, Y., Layek, S., Banerjee, S., Stoyanovich, J., & Pechenizkiy, M. (2026). SafeTutors: Benchmarking Pedagogical Safety in AI Tutoring Systems. arXiv. https://arxiv.org/abs/2603.17373v1\n\ntags: #human-ai collaboration, #ai tutoring, #instructional design, #scaffolding, #ai literacy, #education, #learning analytics", "link": "https://arxiv.org/abs/2603.17373v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Rima Hazra", "Bikram Ghuku", "Ilona Marchenko"], "categories": ["cs.CL"]}, {"id": "2", "source": "ARXIV", "score": 18, "day": "2026-03-18", "title": "GUIDE: GenAI Units In Digital Design Education", "content": "---\ntitle: GUIDE: GenAI Units In Digital Design Education\nauthors: [Weihua Xiao, Jason Blocklove, Matthew DeLorenzo, Johann Knechtel, Ozgur Sinanoglu, Kanad Basu, Jeyavijayan Rajendran, Siddharth Garg, Ramesh Karri]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2603.17296v1\nresearch_type: 교육 기술\nmethodology: 사례 연구\ndata_type: 교육 자료\nsample: 4개 과정 인스턴스\ncontext: 디지털 디자인 교육\ntheoretical_framework: 표준화된 교육 단위\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\nGUIDE(GenAI Units In Digital Design Education)는 실행 가능한 Google Colab 실험실과 기타 자료를 포함한 오픈 코스웨어 저장소이다. 본 논문에서는 슬라이드, 짧은 비디오, 실행 가능한 실험실 및 관련 논문으로 구성된 표준화된 교육 단위를 기반으로 한 저장소의 구조와 교육 접근 방식을 설명한다. GUIDE는 VeriThoughts, LLM 기반 테스트벤치 생성, LLMPirate와 같은 세 가지 대표 단위를 통해 실제 적용 사례를 보여준다. 또한, GUIDE 단위를 전체 학기 과정으로 조합한 네 가지 예시 과정(GUIDE4ChipDesign, Build your ASIC, GUIDE4HardwareSecurity, Hardware Design)을 제공하며, 각 과정의 학습 결과와 캡스톤 프로젝트를 설명한다.\n\n# Research Logic\n## Problem\n디지털 디자인 교육에서 LLM을 활용한 교육 자료의 신속한 업데이트와 다양한 학생 배경을 수용하는 것이 필요하다.\n\n## Theory\n표준화된 교육 단위를 통해 일관된 학습 경험을 제공하고, 교육 자료의 재사용성을 높인다.\n\n## Design\n모듈화된 구조로 구성된 GUIDE는 각 단위가 명확한 교육 목표를 가지고 있으며, 슬라이드, 비디오, 실험실 및 관련 논문으로 구성된다.\n\n## Findings\nGUIDE는 LLM을 활용한 디지털 디자인 교육의 효과성을 입증하며, 다양한 학생 배경을 고려한 교육 자료를 제공한다.\n\n## Conclusion\nGUIDE는 디지털 디자인 교육에서 LLM의 활용을 통해 교육의 질을 향상시키고, 학생들의 학습 경험을 개선할 수 있는 가능성을 제시한다.\n\n# Key Findings\n- GUIDE는 표준화된 교육 단위를 통해 일관된 학습 경험을 제공한다.\n- LLM을 활용한 다양한 교육 자료가 학생들의 이해를 돕는다.\n- GUIDE 단위는 쉽게 업데이트 가능하여 교육의 최신성을 유지한다.\n\n# Contributions\n## Theoretical\n표준화된 교육 단위를 통한 교육 접근 방식의 효과성을 제시한다.\n\n## Methodological\n실행 가능한 교육 자료를 제공하여 교육자들이 쉽게 활용할 수 있도록 한다.\n\n## Practical\n학생들이 LLM을 활용한 디지털 디자인 기술을 실습할 수 있는 기회를 제공한다.\n\n# Limitations\n- 교육 자료의 업데이트 주기가 빠르게 변할 수 있다.\n- 다양한 학생 배경을 모두 수용하기 위한 추가적인 조정이 필요할 수 있다.\n\n# Transferable Insights\n- LLM을 활용한 교육 자료는 다양한 분야에 적용 가능하다.\n- 표준화된 교육 단위는 다른 교육 과정에서도 활용될 수 있다.\n\n# Idea Seeds\n1. LLM을 활용한 다른 분야의 교육 자료 개발.\n2. GUIDE의 모듈화된 구조를 기반으로 한 새로운 교육 과정 설계.\n3. 다양한 학생 배경을 고려한 맞춤형 교육 자료 개발.\n\n# Citation Snippets\n> Xiao, W., Blocklove, J., DeLorenzo, M., Knechtel, J., Sinanoglu, O., Basu, K., Rajendran, J., Garg, S., & Karri, R. (2026). GUIDE: GenAI Units In Digital Design Education. arXiv. https://arxiv.org/abs/2603.17296v1\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy\n\n---\n\n## 압축 요약\nGUIDE(GenAI Units In Digital Design Education)는 디지털 디자인 교육을 위한 오픈 코스웨어 저장소로, LLM을 활용한 교육 자료를 제공한다. 표준화된 교육 단위를 통해 일관된 학습 경험을 제공하며, 다양한 학생 배경을 수용할 수 있는 구조를 갖추고 있다. GUIDE는 교육의 질을 향상시키고, 학생들의 실습 기회를 확대하는 데 기여한다.", "link": "https://arxiv.org/abs/2603.17296v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Weihua Xiao", "Jason Blocklove", "Matthew DeLorenzo"], "categories": ["cs.CY", "cs.AI"]}, {"id": "3", "source": "ARXIV", "score": 17, "day": "2026-03-17", "title": "When Openclaw Agents Learn from Each Other: Insights from Emergent AI Agent Communities for Human-AI Partnership in Education", "content": "---\ntitle: When Openclaw Agents Learn from Each Other: Insights from Emergent AI Agent Communities for Human-AI Partnership in Education\nauthors: Eason Chen, Ce Guan, Ahmed Elshafiey, Zhonghao Zhao, Joshua Zekeri, Afeez Edeifo Shaibu, Emmanuel Osadebe Prince, Cyuan-Jhen Wu\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2603.16663v2\nresearch_type: 탐색적 연구\nmethodology: 질적 관찰\ndata_type: 플랫폼 데이터\nsample: 167,963 등록된 AI 에이전트\ncontext: AI 에이전트 커뮤니티\ntheoretical_framework: Vygotsky의 스캐폴딩 이론\nkeywords: [human-ai collaboration, peer learning, AI agent communities, bidirectional scaffolding, teachable agents, trust in AI, educational design]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 AI 에이전트가 서로 학습하는 현상을 탐구하며, 167,000개 이상의 에이전트가 참여하는 커뮤니티에서의 상호작용을 분석하였다. 연구 결과, 인간이 에이전트를 구성하는 과정에서 '양방향 스캐폴딩'이 발생하며, 에이전트 간의 동료 학습이 자발적으로 이루어짐을 발견하였다. 또한, 에이전트들이 공유 메모리 아키텍처를 발전시키고, 신뢰 역학과 플랫폼의 지속 가능성에 대한 설계 제약을 드러내었다. 이 연구는 다중 에이전트 교육 시스템의 원칙적 설계를 위한 통찰을 제공하며, \"AI 에이전트 팀원에게 가르치기\"라는 교육 설계를 제안하였다.\n\n# Research Logic\n## Problem\nAI가 도구에서 팀원으로 발전하는 과정에서의 이해 부족.\n## Theory\nVygotsky의 스캐폴딩 이론을 기반으로 한 양방향 학습 동역학.\n## Design\n다양한 플랫폼에서의 질적 관찰을 통한 탐색적 연구.\n## Findings\n1. 인간은 에이전트를 구성하면서 학습하며, 양방향 스캐폴딩이 발생한다.\n2. 에이전트 간의 동료 학습이 자발적으로 이루어진다.\n3. 에이전트들은 공유 메모리 아키텍처를 발전시킨다.\n## Conclusion\nAI 에이전트 커뮤니티의 동적 현상은 다중 에이전트 교육 시스템 설계에 유용한 통찰을 제공한다.\n\n# Key Findings\n- 인간-에이전트 간의 양방향 스캐폴딩이 발생한다.\n- 에이전트 간의 동료 학습이 자발적으로 이루어진다.\n- 에이전트들은 공유 메모리 아키텍처를 발전시킨다.\n\n# Contributions\n## Theoretical\nAI 에이전트 간의 상호작용을 통한 학습 이론의 확장.\n## Methodological\n질적 관찰을 통한 새로운 연구 질문 제시.\n## Practical\nAI 에이전트 팀원 교육 설계의 구체적 사례 제공.\n\n# Limitations\n- 연구는 특정 플랫폼에 국한되어 있으며, 일반화의 한계가 있다.\n- 연구자의 주관적 경험이 분석에 영향을 미칠 수 있다.\n\n# Transferable Insights\n- AI 에이전트 간의 동료 학습은 교육적 맥락에서도 적용 가능하다.\n- 양방향 스캐폴딩을 통한 학습 과정은 교육 설계에 유용할 수 있다.\n\n# Idea Seeds\n1. AI 에이전트 간의 동료 학습을 활용한 교육 프로그램 개발.\n2. 양방향 스캐폴딩을 기반으로 한 교육 설계 연구.\n3. AI 에이전트의 신뢰 구축을 위한 설계 원칙 탐구.\n\n# Citation Snippets\n> Chen, E., Guan, C., Elshafiey, A., Zhao, Z., Zekeri, J., Shaibu, A. E., Osadebe Prince, E., & Wu, C.-J. (2026). When Openclaw Agents Learn from Each Other: Insights from Emergent AI Agent Communities for Human-AI Partnership in Education. arXiv. https://arxiv.org/abs/2603.16663v2\n\ntags: #human-ai collaboration, #peer learning, #AI agent communities, #bidirectional scaffolding, #teachable agents, #trust in AI, #educational design", "link": "https://arxiv.org/abs/2603.16663v2", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Eason Chen", "Ce Guan", "Ahmed Elshafiey"], "categories": ["cs.CY", "cs.AI", "cs.HC", "cs.MA"]}, {"id": "4", "source": "ERIC", "score": 14, "day": "명시되지 않음", "title": "From Chalkboards to ChatGPT: Navigating the Future of Teaching with Generative AI", "content": "---\ntitle: From Chalkboards to ChatGPT: Navigating the Future of Teaching with Generative AI\nauthors: [Beck Graefe, Andrew Porter, Jane Indorf, Soyeon Ahn, Ching-Hua Chuan, Michael Gaines]\nyear: 명시되지 않음\njournal: ERIC\ndoi: 명시되지 않음\nresearch_type: 질적 연구\nmethodology: 사전 및 사후 설문조사\ndata_type: 양적 데이터\nsample: 12명의 학부 거주 과학자, 6명의 대학원 펠로우, 8명의 전문 교사\ncontext: 대학 아웃리치 프로그램\ntheoretical_framework: 명시되지 않음\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 교육자들이 생성적 AI를 사용하고 학생들에게 이를 안내하는 데 대한 일반적인 태도와 자신감을 조사하고, 교육자들의 AI 문해력을 향상시키기 위해 설계된 워크숍의 효과를 평가한다. 연구 참가자는 12명의 학부 거주 과학자, 6명의 대학원 펠로우, 8명의 전문 교사로 구성되었다. 사전 및 사후 설문조사를 통해 AI 문해력과 편안함의 변화를 평가하였으며, 참가자들은 AI 도구 사용에 대한 자신감, AI 생성 콘텐츠의 편향 인식, AI 사용의 윤리적 함의에 대한 이해가 증가했다고 보고하였다. 연구는 교육자들의 생성적 AI에 대한 문해력을 향상시키기 위한 다세대 교육 프로그램의 중요성을 강조하며, 이러한 교육이 교육적 실천에의 통합을 증진시킬 수 있음을 시사한다.\n\n# Research Logic\n## Problem\n교육자들이 생성적 AI를 효과적으로 사용하고 학생들에게 이를 안내하는 데 어려움을 겪고 있음.\n## Theory\nAI 문해력 향상을 위한 교육적 접근법의 필요성.\n## Design\n사전 및 사후 설문조사를 통한 워크숍 효과 평가.\n## Findings\n참가자들이 AI 도구 사용에 대한 자신감과 AI 콘텐츠의 편향 인식이 증가함.\n## Conclusion\n다세대 교육 프로그램이 교육자들의 AI 문해력 향상에 기여할 수 있음.\n\n# Key Findings\n- 교육자들은 AI 도구 사용에 대한 자신감이 증가하였다.\n- AI 생성 콘텐츠의 편향을 인식하는 능력이 향상되었다.\n- AI 사용의 윤리적 함의에 대한 이해가 깊어졌다.\n\n# Contributions\n## Theoretical\nAI 문해력 향상을 위한 교육적 이론의 발전.\n## Methodological\n사전 및 사후 설문조사를 통한 효과적인 평가 방법 제시.\n## Practical\n교육자들을 위한 AI 문해력 향상 프로그램의 필요성 강조.\n\n# Limitations\n- 연구의 샘플 크기가 상대적으로 작음.\n- 연구 기간이 명시되지 않아 장기적 효과 평가가 어려움.\n\n# Transferable Insights\n- 다세대 협업이 교육적 결과를 향상시킬 수 있음.\n- 교육자들의 AI 문해력 향상을 위한 지속적인 교육의 필요성.\n\n# Idea Seeds\n1. 다양한 연령대의 교육자들을 위한 맞춤형 AI 교육 프로그램 개발.\n2. AI 문해력 향상을 위한 온라인 플랫폼 구축.\n3. 교육 현장에서의 AI 활용 사례 연구 진행.\n\n# Citation Snippets\n> Graefe, B., Porter, A., Indorf, J., Ahn, S., Chuan, C.-H., & Gaines, M. (n.d.). From Chalkboards to ChatGPT: Navigating the Future of Teaching with Generative AI. ERIC.\n\ntags: #human-ai_collaboration, #classroom_ai, #ai_tutoring, #instructional_design, #scaffolding, #tpack, #ai_literacy, #teacher_ai, #education, #learning_analytics, #llm_classroom, #ai_pedagogy\n\n---\n\n요약: 본 연구는 교육자들의 생성적 AI 사용에 대한 태도와 자신감을 조사하고, AI 문해력 향상을 위한 워크숍의 효과를 평가하였다. 참가자들은 AI 도구 사용에 대한 자신감과 AI 콘텐츠의 편향 인식이 증가하였으며, 다세대 교육 프로그램의 중요성을 강조하였다.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Beck Graefe", "Andrew Porter", "Jane Indorf"], "categories": ["ERIC"]}, {"id": "5", "source": "ERIC", "score": 14, "day": "명시되지 않음", "title": "Validating Student AI Competency Self-Efficacy (SAICS) Scale and Its Framework", "content": "Nurturing student artificial intelligence (AI) competency is crucial in the future of K-12 education. Students with strong AI competency should be able to ethically, safely, healthily, and productively integrate AI into their learning. Research on student AI competency is still in its infancy, primarily focusing on theoretical and professional discussions, along with qualitative investigations. This two-stage study aims to propose an AI competency framework for students and confirm the reliability and validity of its scale--student AI competency self-efficacy (SAICS)--in K-12 education. In stage 1, we used a three-round Delphi study to propose the framework and its scale. The framework has eight dimensions: interdisciplinary learning with AI, assessment with AI, decision-making with AI, data, ethics and AI, designing AI, multimedia creation with AI, human-centric learning, and confidence with AI. Each dimension contains four items. In stage 2, we involved 448 students to validate the scale using confirmatory factor analysis and model comparisons. The analyses showed that the scale is consistent across male and female students. The SAICS scale comprises 32 items and addresses eight dimensions of AI competency. Researchers can use the framework and SAICS to design their interventions and correlational research associated with student AI competency. Teachers can use them to develop learning outcomes for AI-based learning activities, and policymakers can use them to establish national AI standards.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Thomas K. F. Chiu", "Murat Çoban", "Ismaila Temitayo Sanusi"], "categories": ["ERIC"]}, {"id": "6", "source": "ERIC", "score": 14, "day": "명시되지 않음", "title": "&quot;Gotta Love Some Human Connection&quot;: Humanizing Data Expression in an Age of AI", "content": "Rapidly developing technological advances have raised new questions about what makes us uniquely human. As data and generative AI become more powerful, what does it mean to learn, teach, create, make meaning, and express ourselves, even as machines are trained to take care of these tasks for us? With youth, and in the context of literacy and media education, we embrace this moment to broaden our social imaginations. Our collaboration with journalists ages 14-25 from 2019 to 2023 has yielded a corpus of over 30 multimodal compositions constructed with and/or about AI reaching audiences in the millions. On the basis of these youth texts -- produced within our participatory research at YR Media, a national STEAM learning center and platform for emerging BIPOC content creators -- we developed the conceptual framework presented here: &quot;Humanizing Data Expression&quot; (HDE). The key role of expression in HDE distinguishes the human from the machine through the lens of storytelling. Analysis of this corpus (podcasts, web-based interactives, videos, radio features, online posts, social media assets) revealed four literacy practices of YR Media authors as they made sense of AI: (1) &quot;contextualize&quot;: try out AI-powered features, reveal how it works; (2) &quot;unveil authorship&quot;: introduce AI creators and processes; (3) &quot;grapple&quot;: explore tensions and paradoxes; (4) &quot;play&quot;: hack, mess with, outsmart, exaggerate AI. From these insights, we end with implications of HDE as a framework for learning and teaching AI literacy, including its potential for critically transforming data literacy practice and pedagogy across schools, teaching, and teacher education.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Cherise McBride", "Clifford H. Lee", "Elisabeth Soep"], "categories": ["ERIC"]}, {"id": "7", "source": "ARXIV", "score": 14, "day": "2026-03-10", "title": "Tracing Everyday AI Literacy Discussions at Scale: How Online Creative Communities Make Sense of Generative AI", "content": "Developing AI literacy is increasingly urgent as generative AI reshapes creative practice. Yet most AI literacy frameworks are top-down and expert-driven, overlooking how literacy emerges organically in creative communities. To address this gap, we performed a large-scale analysis of 122k Reddit conversations from 80 creative-oriented subreddits over a three-year period. Our analysis identified four consistent themes in AI literacy-related discussions, and we further traced how discourse shifted alongside major AI events. Surprisingly, creators primarily frame AI literacy around how to use tools effectively, foregrounding practice and task skills, while discussions of AI capabilities and ethics surge only around high-profile events. Our findings suggest that AI literacy is dynamic, practice-driven, and event-responsive rather than static or purely conceptual. This study provides insights for researchers, designers, and policymakers to develop learning resources, community support, and policies that better promote AI literacy in creative communities.", "link": "https://arxiv.org/abs/2603.09055v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Haidan Liu", "Poorvi Bhatia", "Nicholas Vincent"], "categories": ["cs.HC"]}, {"id": "8", "source": "ARXIV", "score": 14, "day": "2026-03-05", "title": "The Trilingual Triad Framework: Integrating Design, AI, and Domain Knowledge in No-code AI Smart City Course", "content": "This paper introduces the \"Trilingual Triad\" framework, a model that explains how students learn to design with generative artificial intelligence (AI) through the integration of Design, AI, and Domain Knowledge. As generative AI rapidly enters higher education, students often engage with these systems as passive users of generated outputs rather than active creators of AI-enabled knowledge tools. This study investigates how students can transition from using AI as a tool to designing AI as a collaborative teammate. The research examines a graduate course, Creating the Frontier of No-code Smart Cities at the Singapore University of Technology and Design (SUTD), in which students developed domain-specific custom GPT systems without coding. Using a qualitative multi-case study approach, three projects - the Interview Companion GPT, the Urban Observer GPT, and Buddy Buddy - were analyzed across three dimensions: design, AI architecture, and domain expertise. The findings show that effective human-AI collaboration emerges when these three \"languages\" are orchestrated together: domain knowledge structures the AI's logic, design mediates human-AI interaction, and AI extends learners' cognitive capacity. The Trilingual Triad framework highlights how building AI systems can serve as a constructionist learning process that strengthens AI literacy, metacognition, and learner agency.", "link": "https://arxiv.org/abs/2603.05036v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Qian Huang", "King Wang Poon"], "categories": ["cs.AI"]}, {"id": "9", "source": "OPENALEX", "score": 14, "day": "2026-02-12", "title": "Artificial Intelligence in Veterinary Education: Preparing the Workforce for Clinical Applications in Diagnostics and Animal Health", "content": "Artificial intelligence (AI), including machine learning (ML) and deep learning (DL), is rapidly transforming clinical veterinary practice by enhancing diagnostics, disease surveillance and decision support processes across animal health domains. The safe and effective clinical deployment of these technologies, however, depends critically on the preparedness of the veterinary workforce, positioning veterinary education as a strategic enabler of translational adoption. This narrative review examines the integration of AI within veterinary education as a foundational step toward its responsible application in clinical practice. We synthesize current evidence on AI-driven tools relevant to veterinary curricula, including generative and multimodal large language models, intelligent tutoring systems, virtual and augmented reality platforms and AI-based decision support tools applied to imaging, epidemiology, parasitology, food safety and animal health. Particular attention is given to how the structured educational use of AI mirrors real-world clinical workflows and supports the development of competencies essential for clinical translation, such as data interpretation, uncertainty management, ethical reasoning and professional accountability. The review further addresses ethical, regulatory and cognitive considerations associated with AI adoption, including algorithmic bias, data privacy, equity of access and the risks of overreliance, emphasizing their direct implications for diagnostic reliability and animal welfare. By framing veterinary education as a controlled and reflective environment for AI engagement, this article highlights how pedagogically grounded training can facilitate safer clinical deployment, foster interdisciplinary collaboration and align technological innovation with professional standards in veterinary medicine.", "link": "https://doi.org/10.3390/vetsci13020181", "altLink": "https://openalex.org/W7128731513", "hasDoi": true, "hasReview": false, "authors": ["Esteban Pérez-García", "Ana S. Ramírez", "Miguel Ángel Quintana-Suárez"], "categories": ["Preparedness", "Workflow", "Workforce", "Workgroup", "Enabling"]}];

    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
  }
}

}

function downloadCSV() {
  const headers = ['제목', '출처', '스코어', '리뷰여부', '링크'];
  const rows = filtered.map(p => [
    '"' + p.title.replace(/"/g, '""') + '"',
    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
