<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-03-24 23:31</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "ARXIV", "score": 16, "day": "2026-03-22", "title": "Assessing Data Literacy in K--12 Education: Challenges and Opportunities", "content": "---\ntitle: K–12 교육에서 데이터 리터러시 평가: 도전과 기회\nauthors: [Annabel Goldman, Yuan Cui, Matthew Kay]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2603.21382v1\nresearch_type: 질적 연구\nmethodology: 반구조화 인터뷰\ndata_type: 인터뷰 데이터\nsample: 13명의 교사\ncontext: K–12 교육\ntheoretical_framework: 데이터 리터러시, 데이터 시각화, 인간-컴퓨터 상호작용\nkeywords: [데이터 리터러시, K–12 교육, 데이터 시각화, 평가, 교육 기술]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 K–12 교육에서 데이터 리터러시의 평가에 대한 교사들의 인식을 조사하였다. 13명의 교사를 대상으로 한 반구조화 인터뷰를 통해, 데이터 리터러시를 평가하는 데 있어 네 가지 주요 도전 과제가 도출되었다: (1) 데이터 시각화와 데이터 리터러시 간의 개념적 모호성, (2) 실제 데이터와 합성 데이터 사용 간의 트레이드오프, (3) 도메인에 적합한 시각적 표현 및 데이터 시각화의 찾기 및 조정의 어려움, (4) 데이터 리터러시와 도메인 특정 학습 목표 간의 균형. 연구 결과는 교사들이 데이터 리터러시를 평가하는 데 있어 보다 나은 지원을 받을 수 있는 기회를 제시한다.\n\n# Research Logic\n## Problem\nK–12 교육에서 데이터 리터러시의 개념이 모호하여 교사들이 이를 다르게 해석하고 있음.\n\n## Theory\n데이터 리터러시와 데이터 시각화 간의 관계를 명확히 할 필요가 있음.\n\n## Design\n13명의 교사를 대상으로 한 반구조화 인터뷰를 통해 데이터 리터러시에 대한 인식을 조사함.\n\n## Findings\n교사들은 데이터 시각화와 데이터 리터러시를 혼동하며, 평가 설계에서 여러 도전 과제에 직면하고 있음.\n\n## Conclusion\n교사들이 데이터 리터러시를 효과적으로 평가할 수 있도록 지원하는 방안이 필요함.\n\n# Key Findings\n- 데이터 시각화와 데이터 리터러시 간의 개념적 모호성이 존재함.\n- 실제 데이터와 합성 데이터 사용 간의 트레이드오프가 있음.\n- 도메인에 적합한 시각적 표현을 찾고 조정하는 데 어려움이 있음.\n\n# Contributions\n## Theoretical\n데이터 리터러시와 데이터 시각화 간의 관계를 명확히 함.\n\n## Methodological\n반구조화 인터뷰를 통한 질적 데이터 수집 방법론을 제시함.\n\n## Practical\n교사들이 데이터 리터러시를 평가하는 데 필요한 지원 방안을 제안함.\n\n# Limitations\n- 샘플 크기가 작아 일반화에 한계가 있음.\n- 특정 지역의 교사들만을 대상으로 하여 문화적 차이를 반영하지 못함.\n\n# Transferable Insights\n- 데이터 리터러시의 개념을 명확히 정의할 필요가 있음.\n- 교사들에게 데이터 시각화 도구에 대한 교육이 필요함.\n\n# Idea Seeds\n1. 데이터 리터러시 교육을 위한 교사 연수 프로그램 개발.\n2. 데이터 시각화 도구의 사용을 촉진하기 위한 온라인 플랫폼 구축.\n3. 데이터 리터러시 평가를 위한 표준화된 도구 개발.\n\n# Citation Snippets\n> Goldman, A., Cui, Y., & Kay, M. (2026). Assessing Data Literacy in K–12 Education: Challenges and Opportunities. arXiv. https://arxiv.org/abs/2603.21382v1\n\ntags: #데이터리터러시, #K12교육, #데이터시각화, #교육기술, #평가, #교사연수, #교육혁신\n\n---\n\n요약: 본 연구는 K–12 교육에서 데이터 리터러시 평가의 도전 과제를 다루고 있으며, 교사들의 인식을 통해 데이터 시각화와 데이터 리터러시 간의 관계를 명확히 할 필요성을 강조하고 있다. 연구 결과는 교사들이 데이터 리터러시를 효과적으로 평가할 수 있도록 지원하는 방안을 제안한다.", "link": "https://arxiv.org/abs/2603.21382v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Annabel Goldman", "Yuan Cui", "Matthew Kay"], "categories": ["cs.HC"]}, {"id": "1", "source": "ARXIV", "score": 14, "day": "2026-03-11", "title": "Abjad-Kids: An Arabic Speech Classification Dataset for Primary Education", "content": "---\ntitle: Abjad-Kids: An Arabic Speech Classification Dataset for Primary Education\nauthors: [Abdul Aziz Snoubara, Baraa Al_Maradni, Haya Al_Naal, Malek Al_Madrmani, Roaa Jdini, Seedra Zarzour, Khloud Al Jallad]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2603.20255v1\nresearch_type: 데이터셋 개발\nmethodology: 계층적 오디오 분류\ndata_type: 오디오 샘플\nsample: 46,397\ncontext: 아랍어 아동 교육\ntheoretical_framework: 언어학적 지식 기반 분류\nkeywords: [speech classification, child speech classification, Arabic Speech classification, low-resource language, numbers speech classification, alphabets speech classification]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 아동을 위한 아랍어 음성 분류 데이터셋인 Abjad-Kids를 제안한다. 이 데이터셋은 3세에서 12세 사이의 아동으로부터 수집된 46,397개의 오디오 샘플로 구성되어 있으며, 알파벳, 숫자 및 색상 학습에 중점을 두고 있다. 연구진은 CNN-LSTM 아키텍처를 기반으로 한 계층적 오디오 분류 방법론을 제안하며, 정적 언어학적 그룹화와 동적 클러스터링 기반 그룹화를 평가하였다. 실험 결과, 정적 언어학적 그룹화가 우수한 성능을 보였으며, 데이터 증강 기법을 통해 모델의 일반화 능력을 향상시켰다. 그러나 제한된 샘플 수로 인한 과적합 문제도 나타났다. Abjad-Kids는 공개될 예정이며, 아랍어 아동 음성 분류 연구에 기여할 것으로 기대된다.\n\n# Research Logic\n## Problem\n아랍어 아동 음성 데이터셋의 부족으로 인해 아동 음성 연구가 제한적이다.\n## Theory\n언어학적 지식을 활용한 계층적 분류 방법론이 아랍어 음성 인식에 적합하다는 이론적 근거를 제시한다.\n## Design\nCNN-LSTM 아키텍처를 기반으로 한 두 단계의 계층적 분류 모델을 설계하였다.\n## Findings\n정적 언어학적 그룹화가 동적 클러스터링보다 우수한 성능을 보였으며, 데이터 증강이 모델의 일반화에 기여하였다.\n## Conclusion\nAbjad-Kids 데이터셋은 아랍어 아동 음성 연구의 중요한 자원이 될 것으로 기대된다.\n\n# Key Findings\n- Abjad-Kids 데이터셋은 3세에서 12세 아동의 46,397개의 오디오 샘플로 구성된다.\n- 정적 언어학적 그룹화가 동적 클러스터링보다 우수한 성능을 보였다.\n- 데이터 증강 기법이 모델의 일반화 능력을 향상시켰으나 과적합 문제가 발생하였다.\n\n# Contributions\n## Theoretical\n아랍어 아동 음성 인식에 대한 새로운 이론적 접근을 제시하였다.\n## Methodological\n계층적 오디오 분류 방법론을 개발하여 아동 음성 인식의 효율성을 높였다.\n## Practical\nAbjad-Kids 데이터셋은 아랍어 아동 음성 연구에 실질적인 기여를 할 것이다.\n\n# Limitations\n- 샘플 수의 제한으로 인한 과적합 문제 발생.\n- 데이터셋의 다양성이 부족하여 일반화에 한계가 있을 수 있다.\n\n# Transferable Insights\n- 아랍어와 같은 저자원 언어의 아동 음성 연구에 대한 필요성을 강조한다.\n- 계층적 분류 방법론이 다양한 언어적 특성을 가진 데이터셋에 적용 가능함을 보여준다.\n\n# Idea Seeds\n1. Abjad-Kids 데이터셋을 기반으로 한 다양한 언어 모델 개발.\n2. 아동 음성 인식의 정확성을 높이기 위한 추가 데이터 수집 방안 모색.\n3. 다른 저자원 언어에 대한 유사한 데이터셋 구축 연구.\n\n# Citation Snippets\n> Snoubara, A. A., Al_Maradni, B., Al_Naal, H., Al_Madrmani, M., Jdini, R., Zarzour, S., & Al Jallad, K. (2026). Abjad-Kids: An Arabic Speech Classification Dataset for Primary Education. arXiv. https://arxiv.org/abs/2603.20255v1\n\ntags: #아랍어, #음성인식, #아동교육, #데이터셋, #기계학습, #교육기술, #언어학", "link": "https://arxiv.org/abs/2603.20255v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Abdul Aziz Snoubara", "Baraa Al_Maradni", "Haya Al_Naal"], "categories": ["cs.CL", "cs.HC", "cs.LG", "cs.SD", "eess.AS"]}, {"id": "2", "source": "ARXIV", "score": 12, "day": "2026-03-23", "title": "Silicon Bureaucracy and AI Test-Oriented Education: Contamination Sensitivity and Score Confidence in LLM Benchmarks", "content": "---\ntitle: Silicon Bureaucracy and AI Test-Oriented Education: Contamination Sensitivity and Score Confidence in LLM Benchmarks\nauthors: [Yiliang Song, Hongjun An, Jiangan Chen, Xuanchen Yan, Huan Song, Jiawei Shao, Xuelong Li]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2603.21636v1\nresearch_type: 이론적 연구\nmethodology: 감사 프레임워크 제안, 라우터-작업자 설정 비교\ndata_type: 대규모 언어 모델 벤치마크 데이터\nsample: 여러 모델\ncontext: LLM 벤치마크의 신뢰성 및 오염 민감도 분석\ntheoretical_framework: 실리콘 관료제 및 AI 시험 지향 교육\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 대규모 언어 모델(LLM)의 벤치마크가 어떻게 평가되고 선택되는지를 분석하며, 이를 '실리콘 관료제'와 'AI 시험 지향 교육'으로 프레이밍한다. 연구자들은 벤치마크 점수가 진정한 일반화 능력을 반영한다는 가정이 불안정하다고 주장하며, 오염 민감도와 점수 신뢰성을 분석하기 위한 감사 프레임워크를 제안한다. 라우터-작업자 설정을 통해 청정 조건과 노이즈 조건을 비교한 결과, 노이즈 조건에서의 성능 향상이 청정 조건을 지속적으로 초과하는 경우가 많음을 발견하였다. 이는 벤치마크 점수가 신뢰성을 다르게 가질 수 있음을 시사하며, 벤치마크 평가에 대한 명시적인 감사가 필요하다고 결론짓는다.\n\n# Research Logic\n## Problem\nLLM 벤치마크 점수가 진정한 일반화 능력을 반영하지 않는다는 문제.\n## Theory\n벤치마크 점수는 시험 지향적 능력과 원칙적 능력을 혼합하여 측정한다는 이론.\n## Design\n라우터-작업자 설정을 통해 청정 조건과 노이즈 조건을 비교하는 실험 설계.\n## Findings\n노이즈 조건에서의 성능이 청정 조건을 초과하는 경우가 발견됨.\n## Conclusion\n벤치마크 점수는 신뢰성이 다를 수 있으며, 감사가 필요하다는 결론.\n\n# Key Findings\n- 벤치마크 점수는 시험 지향적 능력과 원칙적 능력을 혼합하여 측정한다.\n- 노이즈 조건에서의 성능 향상이 청정 조건을 지속적으로 초과하는 경우가 많음.\n- 벤치마크 점수의 신뢰성을 평가하기 위한 감사가 필요함.\n\n# Contributions\n## Theoretical\nLLM 벤치마크의 신뢰성에 대한 새로운 이론적 프레임워크 제안.\n## Methodological\n라우터-작업자 기반의 감사 방법론 개발.\n## Practical\n벤치마크 평가의 신뢰성을 높이기 위한 실용적인 접근법 제안.\n\n# Limitations\n- 연구에서 사용된 모델의 다양성이 제한적일 수 있음.\n- 벤치마크의 오염 민감도 분석이 모든 상황에 적용되지 않을 수 있음.\n\n# Transferable Insights\n- LLM 벤치마크의 신뢰성을 높이기 위한 감사 프레임워크는 다른 분야에도 적용 가능.\n- 벤치마크 점수의 해석 방식이 교육 및 AI 평가에 중요한 영향을 미칠 수 있음.\n\n# Idea Seeds\n1. 다양한 모델에 대한 오염 민감도 분석을 위한 추가 연구.\n2. 교육 현장에서 AI 벤치마크의 신뢰성을 높이기 위한 실용적 가이드라인 개발.\n3. AI 평가에서 벤치마크 점수의 해석을 위한 새로운 기준 설정.\n\n# Citation Snippets\n> Song, Y., An, H., Chen, J., Yan, X., Song, H., Shao, J., & Li, X. (2026). Silicon Bureaucracy and AI Test-Oriented Education: Contamination Sensitivity and Score Confidence in LLM Benchmarks. arXiv. https://arxiv.org/abs/2603.21636v1\n\ntags: #human-ai collaboration, #ai tutoring, #instructional design, #ai literacy, #education, #learning analytics, #ai pedagogy", "link": "https://arxiv.org/abs/2603.21636v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Yiliang Song", "Hongjun An", "Jiangan Chen"], "categories": ["cs.AI", "cs.CL"]}, {"id": "3", "source": "OPENALEX", "score": 12, "day": "2026-03-07", "title": "Reconceptualizing Teaching in The Era of Artificial Intelligence: Evidence from Contemporary Research", "content": "---\ntitle: 인공지능 시대의 교육 재구성: 현대 연구의 증거\nauthors: Kiran Soni\nyear: 2026\njournal: Journal on Innovations in Teaching and Learning\ndoi: https://doi.org/10.46632/jitl/5/1/8\nresearch_type: 문헌 연구\nmethodology: 기술적 분석\ndata_type: 문헌 및 정책 문서\nsample: 명시되지 않음\ncontext: 교육 기술 및 인공지능\ntheoretical_framework: TPACK\nkeywords: [인공지능, 교육, 개인화 학습, 적응 학습, 지능형 튜터링 시스템, 교육 기술, 게임화, 예측 분석]\n---\n\n# APA 7th style\n\n# Summary\n본 논문은 인공지능(AI)이 교육 시스템에 미치는 영향을 분석하며, 개인화된 교육, 교사의 효율성 향상, 데이터 기반 의사결정의 중요성을 강조한다. AI의 활용은 적응형 학습 시스템, 지능형 튜터링, 자동 채점, 예측 분석 및 게임화와 같은 다양한 방법으로 이루어진다. 또한, Heuristics 기반 학습 시스템, Napkin AI, NotebookLM과 같은 실제 AI 응용 프로그램이 교사에게 지식 생성 및 조직을 지원하는 방법을 논의한다. 그러나 데이터 프라이버시, 디지털 격차, 알고리즘 편향과 같은 문제를 해결해야 공정하고 윤리적인 교육 실천이 가능하다고 주장한다. 결론적으로, AI는 교사의 파트너로서 교육의 효율성, 참여도 및 혁신을 증진시킨다고 제안한다.\n\n# Research Logic\n## Problem\nAI의 교육적 활용이 교사와 학생의 역할을 어떻게 변화시키는가?\n## Theory\nAI는 교육에서 개인화된 학습 경험을 제공하고, 교사의 효율성을 높이며, 데이터 기반 의사결정을 지원한다.\n## Design\n문헌 및 정책 문서에 대한 기술적 분석을 통해 AI의 교육적 활용을 탐구한다.\n## Findings\nAI는 교육의 효율성과 참여도를 높이며, 교사와 학생 간의 협력적 관계를 강화한다.\n## Conclusion\nAI는 교사의 대체가 아닌 파트너로서 교육의 질을 향상시키는 도구로 기능한다.\n\n# Key Findings\n- AI는 개인화된 학습 경험을 제공하여 학생의 참여도를 높인다.\n- AI 기반 시스템은 교사의 업무 부담을 줄이고, 교육의 질을 향상시킨다.\n- AI의 효과적인 활용은 교사의 기술적 역량에 크게 의존한다.\n\n# Contributions\n## Theoretical\nAI와 교육의 통합에 대한 새로운 이론적 틀을 제시한다.\n## Methodological\n문헌 연구를 통해 AI의 교육적 활용에 대한 종합적인 분석을 제공한다.\n## Practical\nAI 도구의 실제 적용 사례를 통해 교육 현장에서의 활용 가능성을 제시한다.\n\n# Limitations\n- 연구는 문헌 기반으로 제한되어 있으며, 실증적 데이터가 부족하다.\n- 특정 AI 도구의 효과에 대한 구체적인 사례 연구가 부족하다.\n\n# Transferable Insights\n- AI는 교육의 개인화 및 효율성을 높이는 데 중요한 역할을 한다.\n- 교사의 AI 활용 능력이 교육의 질에 미치는 영향이 크다.\n\n# Idea Seeds\n1. AI 기반 교육 도구의 효과를 평가하기 위한 실증 연구 필요.\n2. 교사의 AI 활용 능력을 향상시키기 위한 교육 프로그램 개발.\n3. AI의 윤리적 사용을 위한 정책 개발 필요.\n\n# Citation Snippets\n> Soni, K. (2026). 인공지능 시대의 교육 재구성: 현대 연구의 증거. Journal on Innovations in Teaching and Learning, 5(1), 53–61. https://doi.org/10.46632/jitl/5/1/8\n\ntags: #인공지능, #교육, #개인화학습, #적응학습, #지능형튜터링시스템, #교육기술, #게임화, #예측분석\n\n---\n\n요약: 본 논문은 인공지능이 교육 시스템에 미치는 영향을 분석하며, AI의 활용이 개인화된 학습과 교사의 효율성을 어떻게 향상시키는지를 논의한다. AI는 교육의 질을 높이는 도구로 기능하며, 교사의 역할 변화와 함께 데이터 기반 의사결정의 중요성을 강조한다.", "link": "https://doi.org/10.46632/jitl/5/1/8", "altLink": "https://openalex.org/W7135390381", "hasDoi": true, "hasReview": true, "authors": ["Kiran Soni"], "categories": ["Engineering ethics", "Computer science", "Sociology", "Artificial intelligence", "Applications of artificial intelligence"]}, {"id": "4", "source": "OPENALEX", "score": 12, "day": "2026-02-19", "title": "AI Adoption in K–12 Education: A Model of Skills Transformation, Productivity, and Institutional Readiness", "content": "---\ntitle: AI Adoption in K–12 Education: A Model of Skills Transformation, Productivity, and Institutional Readiness\nauthors: [Tarek Elmourad, Lycourgos Hadjiphanis, Kyriakos Christofi, Pieris Chourides, Alexios Kythreotis]\nyear: 2026\njournal: 명시되지 않음\ndoi: 명시되지 않음\nresearch_type: 양적 연구\nmethodology: 설문조사\ndata_type: 설문 데이터\nsample: 602명의 교사\ncontext: 아랍에미리트의 K-12 교육\ntheoretical_framework: 기술-조직-환경 프레임워크, 행동 인식 이론\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 아랍에미리트의 K-12 교육에서 인공지능(AI) 채택 준비의 결정 요인을 조사하였다. 602명의 공립 및 사립 학교 교사로부터 수집된 양적 설문 데이터를 기반으로 하여, 기술적 준비뿐만 아니라 문화적 준비의 중요성을 강조하였다. 연구는 기술-조직-환경 프레임워크와 행동 인식 이론을 바탕으로 하여, 전문성 개발, 학교의 격려, AI 도구 접근성, 일과 삶의 균형, 교육 경험, 기관 준비 상태 등이 인식된 유용성에 미치는 영향을 분석하였다. 결과적으로, 인식, 리더십 지원, 인프라 정렬이 변화에 중요한 역할을 한다는 것을 보여주었다.\n\n# Research Logic\n## Problem\nAI 통합을 위한 적절한 전문성과 자원의 부족.\n## Theory\n기술-조직-환경 프레임워크 및 행동 인식 이론.\n## Design\n양적 설문조사를 통한 데이터 수집.\n## Findings\n문화적 준비가 기술적 준비만큼 중요하며, 인식, 리더십 지원, 인프라 정렬이 변화에 영향을 미침.\n## Conclusion\n정책 입안자와 학교 리더에게 AI 통합을 위한 실질적인 지침을 제공.\n\n# Key Findings\n- 문화적 준비가 기술적 준비와 동등하게 중요함.\n- 인식, 리더십 지원, 인프라 정렬이 AI 통합에 중요한 역할을 함.\n- 전문성 개발과 학교의 격려가 AI 채택 준비에 긍정적인 영향을 미침.\n\n# Contributions\n## Theoretical\nAI 통합에 대한 새로운 설명적 프레임워크 제시.\n## Methodological\n양적 데이터 수집을 통한 실증적 분석.\n## Practical\nAI 통합을 위한 전문성 개발 및 리더십 전략 설계에 대한 실질적 시사점 제공.\n\n# Limitations\n- 연구의 범위가 아랍에미리트로 한정됨.\n- 설문 데이터의 주관성 가능성.\n\n# Transferable Insights\n- AI 통합을 위한 문화적 준비의 중요성.\n- 교육 기관에서의 리더십 지원의 필요성.\n\n# Idea Seeds\n1. AI 통합을 위한 문화적 준비를 평가하는 도구 개발.\n2. 리더십 지원이 AI 통합에 미치는 영향을 분석하는 후속 연구.\n3. 다양한 교육 환경에서의 AI 채택 준비를 비교하는 연구.\n\n# Citation Snippets\n> Elmourad, T., Hadjiphanis, L., Christofi, K., Chourides, P., & Kythreotis, A. (2026). AI Adoption in K–12 Education: A Model of Skills Transformation, Productivity, and Institutional Readiness.\n\ntags: #human-ai_collaboration, #classroom_ai, #ai_tutoring, #instructional_design, #scaffolding, #tpack, #ai_literacy, #teacher_ai, #education, #learning_analytics, #llm_classroom, #ai_pedagogy", "link": "https://doi.org/10.3390/educsci16020337", "altLink": "https://openalex.org/W7130652400", "hasDoi": true, "hasReview": true, "authors": ["Tarek Elmourad", "Lycourgos Hadjiphanis", "Kyriakos Christofi"], "categories": ["Perception", "Knowledge management", "Public relations", "Psychology", "Professional development"]}, {"id": "5", "source": "OPENALEX", "score": 12, "day": "2026-02-19", "title": "Green education for sustainable development goals: Environmental, social, and economic resilience", "content": "Although the issue of sustainability has been acknowledged by many, the structural systems of education world over have not been able to resolve the issue of incorporating green education principles that are sensitive enough to tackle issues of environmental degradation, social inequity as well as economic instability. The modeling of the modern educational systems still tends to separate the aspect of sustainability and make it a single topic not a paradigm shift towards a comprehensive resilience in all three pillars of sustainable development. This literature review attempts to explore the changing frontiers of green education and its important role in attainment of Sustainable Development Goals with the major focus on developing environmental stewardship, social equity, and economic viability. The discussion demonstrates that there are five significant pedagogical strategies, which include experiential learning ecosystems, digital sustainability platforms, community-based collaborative models, systems thinking frameworks, and transformative action competence development. The new trends are the use of artificial intelligence to achieve personalized sustainability education, gamification of environmental education, virtual reality to experience an ecological environment, blockchain to monitor sustainability credentials, and citizen science programs that would make the transition between formal and informal education. Green education has shown quantifiable behavior change effects, policy effects, innovation capability, and community stability on implementation of green education using holistic, context-sensitive strategies.", "link": "https://doi.org/10.70593/deepsci.0202004", "altLink": "https://openalex.org/W7130644456", "hasDoi": true, "hasReview": false, "authors": ["Anita Padhy", "Jayesh Rane"], "categories": ["Sustainability", "Transformative learning", "Sustainable development", "Education for sustainable development", "Experiential learning"]}, {"id": "6", "source": "OPENALEX", "score": 12, "day": "2025-11-19", "title": "Artificial Intelligence in Curriculum Development: A Global Systematic Review of Trends, Challenges, and Strategic Directions", "content": "Artificial Intelligence (AI) is reshaping curriculum development by enabling more personalised, efficient, and responsive learning design. Evidence on its system-level impact, however, remains fragmented across disciplines and educational levels, leaving limited guidance for coherent curriculum decisions. This systematic review synthesises recent scholarship to map trends, implementation challenges, and strategic directions for AI-integrated curriculum development. Following the Preferred Reporting Items for Systematic Reviews and Meta-Analyses (PRISMA) protocol, studies were retrieved from Scopus, Web of Science (WoS), and the Education Resources Information Center (ERIC) for the years 2023 to 2025. A total of 779 records were identified, from which 36 high- and moderate-quality studies were included after screening and appraisal. Thematic analysis yielded three domains: (1) curriculum design and integration, indicating movement toward adaptive and ethically aligned frameworks; (2) pedagogical practice and teacher preparation, underscoring the centrality of AI literacy and context-sensitive professional learning; and (3) strategic planning and innovation, highlighting institutional readiness, policy alignment, and equity considerations. While the evidence suggests meaningful potential for curriculum reform, uneven implementation is driven by infrastructure gaps and limited educator capacity. This review consolidates current knowledge and contributes an integrated lens that connects curriculum design logics with governance and ethical safeguards. Practical implications include prioritising teacher AI literacy, formalising institutional readiness assessments, and embedding equity criteria into curriculum decision-making to support responsible and scalable adoption.", "link": "https://doi.org/10.46303/jcsr.2025.30", "altLink": "https://openalex.org/W4416430185", "hasDoi": true, "hasReview": false, "authors": ["Mior Syazril Mohamed Sapawi", "Nik Mohd Rahimi"], "categories": ["Curriculum", "Engineering ethics", "Equity (law)", "Curriculum mapping", "Corporate governance"]}, {"id": "7", "source": "OPENALEX", "score": 12, "day": "2025-11-08", "title": "Integration of Generative Artificial Intelligence in Design Education: Evidence Review (2020–2024)", "content": "Generative technologies are reshaping creative industries and design workflows.This transformation is rapidly reaching undergraduate, studio-based design programs but the empirical picture remains fragmented with inconsistent reporting.A formal synthesis of the emerging evidence is essential to map its course and support informed decision-making.This evidence review maps how generative AI (GenAI) is being integrated into undergraduate and studio-based design education, synthesizing classroom practices, enabling and constraining conditions, pedagogical framings, and directions for future research.As GenAI tools enter art and design programs at pace, evidence remains fragmented across contexts and methods; consolidating it can guide practice, streamline integration, and help set a focused research agenda for design education.We conducted a PRISMA-ScR-aligned evidence mapping of empirical studies published 2020-2024.Systematic searches in Web of Science and Scopus identified studies of GenAI in design-education settings that reported learner, process, or artefact outcomes.After screening, we charted context, use case, and outcomes and produced a narrative synthesis; given the heterogeneity of designs and measures, we did not conduct a formal risk-of-bias assessment.The review contributes a design-education-specific evidence map, classifying GenAI use cases, cataloguing adoption enablers and barriers, and outlining a practical agenda for assessment and study design.Findings show GenAI is being", "link": "https://doi.org/10.6007/ijarbss/v15-i11/26903", "altLink": "https://openalex.org/W4416027651", "hasDoi": true, "hasReview": false, "authors": ["Noraffandy Yahaya", "Sumera Gulzar", "Jamalludin Harun"], "categories": ["Computer science", "Artificial intelligence", "Generative grammar", "Applications of artificial intelligence", "Feature (linguistics)"]}, {"id": "8", "source": "OPENALEX", "score": 12, "day": "2025-10-24", "title": "Educational technology and assessment: a comprehensive bibliometric analysis (2010–2024)", "content": "Abstract This study presents an in-depth bibliometric analysis of global research trends in educational technology and assessment from 2010 to 2024, focusing on Scopus-indexed publications. With the increasing integration of digital innovations—such as game-based learning, augmented reality, and artificial intelligence—there is a pressing need to systematically chart scholarly contributions, thematic developments, and research gaps in this dynamic field. Using VOSviewer software, the study analyzes thematic networks, author collaborations, and keyword distributions drawn from 1142 sources, including journal articles, conference proceedings, and book chapters. The analysis addresses publication growth trajectories, prominent scholars and institutions, and the geographic distribution of research activity. Results reveal a substantial rise in output, with a notable peak in 2021, coinciding with a global shift toward digital education in the aftermath of the COVID-19 pandemic. Frequently occurring keywords such as \"educational technology,\" \"game-based learning,\" and \"augmented reality\" highlight key areas of scholarly focus. The United States and China lead in research volume, while Taiwan and Malaysia display significant upward trends in scholarly output. Influential journals such as Computers and Education and Educational Technology Research and Development are identified as key publication outlets. The findings highlight a shift from traditional educational technologies to more adaptive, AI-powered approaches that prioritize personalized learning and multimodal collaboration. The study advocates for expanded inquiry into artificial intelligence and gamification to advance inclusive and sustainable educational strategies.", "link": "https://doi.org/10.1007/s44217-025-00872-1", "altLink": "https://openalex.org/W4415503848", "hasDoi": true, "hasReview": false, "authors": ["Tri Hastiti Fiskawarni", "Nurfadilah Nurfadilah", "Rezkawati Saad"], "categories": ["China", "Educational research", "Thematic analysis", "Bibliometrics", "Educational technology"]}, {"id": "9", "source": "OPENALEX", "score": 12, "day": "2025-10-14", "title": "Literature Review: The Use of GeoGebra Software on Mathematical Comprehension Ability", "content": "This study aims to comprehensively analyze the role of GeoGebra software in enhancing students’ mathematical comprehension skills through a systematic review of literature published between 2020 and 2025. Employing a library research method, this paper synthesizes findings from previous empirical and conceptual studies related to GeoGebra-based mathematics learning. As a dynamic and technology-driven tool, GeoGebra has proven effective in transforming abstract mathematical concepts into concrete, visual, and interactive representations. The findings reveal that GeoGebra significantly facilitates students’ understanding of complex topics such as algebra, geometry, trigonometry, and calculus, which are often challenging to grasp through conventional teaching approaches. By integrating visualization, simulation, and manipulation of mathematical objects, GeoGebra supports students in bridging theoretical knowledge with practical application, thereby fostering deeper conceptual understanding and active engagement in the learning process. Furthermore, the review highlights the pivotal role of teachers in effectively incorporating GeoGebra into instructional practices. Teachers are encouraged to utilize GeoGebra to design problem-based, exploratory, and collaborative learning environments that stimulate student motivation, creativity, and self-directed learning. Overall, this study concludes that the integration of GeoGebra in mathematics education not only enhances cognitive understanding but also cultivates essential 21st-century learning skills. Thus, GeoGebra serves as an innovative pedagogical tool aligned with the demands of digital-era education and offers promising implications for improving mathematics teaching and learning outcomes.", "link": "https://doi.org/10.20944/preprints202510.0925.v1", "altLink": "https://openalex.org/W4415214953", "hasDoi": true, "hasReview": false, "authors": ["Torang Siregar"], "categories": ["Computer science", "GRASP", "Comprehension", "Mathematical software", "Bridging (networking)"]}];

function toggleFavorite(id, e) {
  e.stopPropagation();
  const idx = favorites.indexOf(id);
  if (idx === -1) {
    favorites.push(id);
  } else {
    favorites.splice(idx, 1);
  }
  localStorage.setItem('favorites', JSON.stringify(favorites));
  applyFilters();
}

function recordVisit(id) {
  if (!visited.includes(id)) {
    visited.push(id);
  }
  localStorage.setItem('visited', JSON.stringify(visited));
}

function recordSearch(query) {
  if (query.trim() && !searchHistory.includes(query)) {
    searchHistory.unshift(query);
    if (searchHistory.length > 10) searchHistory.pop();
    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
  }
}

function downloadJSON() {
  const data = JSON.stringify(filtered, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadCSV() {
  const headers = ['제목', '출처', '스코어', '리뷰여부', '링크'];
  const rows = filtered.map(p => [
    '"' + p.title.replace(/"/g, '""') + '"',
    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
</html>
