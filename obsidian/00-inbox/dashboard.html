<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-04-24 23:39</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "ARXIV", "score": 20, "day": "2026-04-22", "title": "AFRILANGTUTOR: Advancing Language Tutoring and Culture Education in Low-Resource Languages with Large Language Models", "content": "---\ntitle: AFRILANGTUTOR: Advancing Language Tutoring and Culture Education in Low-Resource Languages with Large Language Models\nauthors: Tadesse Destaw Belay, Shahriar Kabir Nahin, Israel Abebe Azime, Ocean Monjur, Shamsuddeen Hassan Muhammad, Seid Muhie Yimam, Anshuman Chhabra\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2604.20996v1\nresearch_type: 실험적 연구\nmethodology: 데이터 생성 및 모델 훈련\ndata_type: 다국어 데이터셋\nsample: 10개 아프리카 언어\ncontext: 저자들은 아프리카 저자원 언어에 대한 AI 기반 언어 교육 시스템을 개발하고 평가함.\ntheoretical_framework: 대규모 언어 모델(LLM) 및 교육적 활용\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 아프리카의 저자원 언어를 위한 언어 학습 시스템 개발의 필요성을 다룬다. 저자들은 AFRILANGDICT라는 194.7K 개의 아프리카 언어-영어 사전 항목을 소개하고, 이를 기반으로 AFRILANGEDU라는 78.9K 개의 다중 턴 훈련 예제를 생성하여 AFRILANGTUTOR라는 언어 튜터링 모델을 훈련시켰다. 연구 결과, AFRILANGEDU로 훈련된 모델이 기존 모델보다 일관되게 우수한 성능을 보였으며, SFT와 DPO의 결합이 1.8%에서 15.5%의 성능 향상을 가져왔다. 이 연구는 저자원 언어 교육을 위한 AI 시스템의 발전에 기여할 것으로 기대된다.\n\n# Research Logic\n## Problem\n저자원 언어에 대한 충분한 훈련 자원의 부족으로 인해 AI 시스템 개발이 어려움.\n\n## Theory\n대규모 언어 모델(LLM)을 활용하여 저자원 언어의 교육적 활용 가능성을 탐구.\n\n## Design\nAFRILANGDICT와 AFRILANGEDU를 기반으로 한 데이터 생성 및 모델 훈련.\n\n## Findings\nAFRILANGEDU로 훈련된 모델이 기존 모델보다 성능이 우수하며, SFT와 DPO의 결합이 성능 향상에 기여함.\n\n## Conclusion\n저자원 언어 교육을 위한 AI 시스템의 가능성을 제시하고, 향후 연구를 위한 자원을 제공함.\n\n# Key Findings\n- AFRILANGDICT는 194.7K 개의 아프리카 언어-영어 사전 항목으로 구성됨.\n- AFRILANGEDU는 78.9K 개의 다중 턴 훈련 예제를 포함함.\n- SFT와 DPO의 결합이 1.8%에서 15.5%의 성능 향상을 가져옴.\n\n# Contributions\n## Theoretical\n저자원 언어 교육을 위한 AI 시스템의 이론적 기초를 제공함.\n\n## Methodological\n데이터 생성 및 모델 훈련을 위한 새로운 방법론을 제시함.\n\n## Practical\n저자원 언어 교육을 위한 실용적인 AI 도구를 개발함.\n\n# Limitations\n- 연구는 특정 아프리카 언어에 국한됨.\n- 모델의 일반화 가능성에 대한 추가 검증이 필요함.\n\n# Transferable Insights\n- 저자원 언어 교육에 대한 AI의 활용 가능성을 보여줌.\n- 데이터 생성 방법론이 다른 언어 교육에 적용될 수 있음.\n\n# Idea Seeds\n1. 저자원 언어를 위한 추가적인 데이터셋 개발.\n2. 다양한 문화적 맥락을 반영한 튜터링 모델 연구.\n3. AI 기반 언어 교육의 효과성 평가를 위한 장기 연구.\n\n# Citation Snippets\n> Belay, T. D., Nahin, S. K., Azime, I. A., Monjur, O., Muhammad, S. H., Yimam, S. M., & Chhabra, A. (2026). AFRILANGTUTOR: Advancing Language Tutoring and Culture Education in Low-Resource Languages with Large Language Models. arXiv. https://arxiv.org/abs/2604.20996v1\n\ntags: #human-ai collaboration, #ai tutoring, #instructional design, #education, #learning analytics, #ai pedagogy, #low-resource languages\n\n---\n\n요약: 본 연구는 저자원 언어를 위한 AI 기반 언어 교육 시스템 개발을 다루며, AFRILANGDICT와 AFRILANGEDU를 통해 모델 훈련을 수행하였다. 연구 결과, 저자원 언어 교육에서 AI의 효과적인 활용 가능성을 제시하고, 향후 연구를 위한 자원을 제공하였다.", "link": "https://arxiv.org/abs/2604.20996v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Tadesse Destaw Belay", "Shahriar Kabir Nahin", "Israel Abebe Azime"], "categories": ["cs.CL"]}, {"id": "1", "source": "ARXIV", "score": 19, "day": "2026-04-22", "title": "Synthetic Data in Education: Empirical Insights from Traditional Resampling and Deep Generative Models", "content": "---\ntitle: Synthetic Data in Education: Empirical Insights from Traditional Resampling and Deep Generative Models\nauthors: [Tapiwa Amion Chinodakufa, Ashfaq Ali Shafin, Khandaker Mamun Ahmed]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2604.21031v1\nresearch_type: 실증 연구\nmethodology: 비교 연구\ndata_type: 학생 성과 데이터\nsample: 10,000명의 학생 기록\ncontext: 교육 기술\ntheoretical_framework: 명시되지 않음\nkeywords: [synthetic data, resampling, deep learning, privacy, educational technology]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 교육 기술에서 데이터 부족 및 개인 정보 보호 문제를 해결하기 위한 합성 데이터 생성의 가능성을 탐구한다. 전통적인 리샘플링 기법과 현대의 심층 학습 접근 방식을 비교하는 최초의 체계적인 벤치마크를 제시하며, 10,000개의 학생 성과 데이터를 사용하여 세 가지 리샘플링 방법(SMOTE, Bootstrap, Random Oversampling)과 세 가지 심층 학습 모델(Autoencoder, Variational Autoencoder, Copula-GAN)을 평가하였다. 결과적으로 리샘플링 방법은 거의 완벽한 유용성을 달성하지만 개인 정보 보호에는 실패하는 반면, 심층 학습 모델은 강력한 개인 정보 보호를 제공하나 유용성에서 상당한 비용을 초래하는 것으로 나타났다. Variational Autoencoders는 83.3%의 예측 성능을 유지하면서 완전한 개인 정보 보호를 보장하는 최적의 절충안으로 부각되었다.\n\n# Research Logic\n## Problem\n교육 기술에서 데이터 부족과 개인 정보 보호 문제 해결의 필요성.\n## Theory\n리샘플링 기법과 심층 학습 모델의 비교를 통한 합성 데이터 생성의 유용성 평가.\n## Design\n10,000개의 학생 성과 데이터를 기반으로 한 비교 연구 설계.\n## Findings\n리샘플링 방법은 높은 유용성을 보이나 개인 정보 보호에 실패하고, 심층 학습 모델은 강력한 개인 정보 보호를 제공하나 유용성에서 손해를 본다.\n## Conclusion\n전통적인 리샘플링은 내부 개발에 적합하고, Variational Autoencoders는 외부 데이터 공유에 적합하다.\n\n# Key Findings\n- 리샘플링 방법은 TSTR 점수 0.997로 거의 완벽한 유용성을 달성하였으나, 개인 정보 보호는 실패하였다(DCR ~ 0.00).\n- 심층 학습 모델은 강력한 개인 정보 보호를 제공하였으나 유용성에서 손해를 보았다(DCR ~ 1.00).\n- Variational Autoencoders는 83.3%의 예측 성능을 유지하면서 완전한 개인 정보 보호를 보장하였다.\n\n# Contributions\n## Theoretical\n합성 데이터 생성에 대한 체계적인 비교 연구를 통해 이론적 기초를 제공.\n## Methodological\n리샘플링 기법과 심층 학습 모델의 성능을 비교하는 실증적 방법론 제시.\n## Practical\n교육 데이터 생성 시 리샘플링과 심층 학습 모델 선택에 대한 실용적인 지침 제공.\n\n# Limitations\n- 특정 데이터셋에 한정된 연구 결과로 일반화의 한계가 있음.\n- 개인 정보 보호와 유용성 간의 절충안에 대한 추가 연구 필요.\n\n# Transferable Insights\n- 교육 기술에서 합성 데이터 생성의 중요성 및 접근 방식에 대한 이해 증진.\n- 데이터 부족 문제 해결을 위한 다양한 방법론의 필요성 강조.\n\n# Idea Seeds\n1. 다양한 교육 환경에서의 합성 데이터 활용 방안 연구.\n2. 개인 정보 보호를 강화한 새로운 합성 데이터 생성 기법 개발.\n3. 합성 데이터의 유용성을 높이기 위한 심층 학습 모델의 최적화 연구.\n\n# Citation Snippets\n> Chinodakufa, T. A., Shafin, A. A., & Ahmed, K. M. (2026). Synthetic Data in Education: Empirical Insights from Traditional Resampling and Deep Generative Models. arXiv. https://arxiv.org/abs/2604.21031v1\n\ntags: #synthetic_data, #resampling, #deep_learning, #privacy, #educational_technology, #learning_analytics, #data_generation\n\n---\n\n요약: 본 연구는 교육 기술에서 합성 데이터 생성의 가능성을 탐구하며, 전통적인 리샘플링 기법과 심층 학습 모델을 비교하였다. 10,000개의 학생 성과 데이터를 사용하여 리샘플링 방법은 높은 유용성을 보이나 개인 정보 보호에 실패하고, 심층 학습 모델은 강력한 개인 정보 보호를 제공하나 유용성에서 손해를 본다는 결과를 도출하였다. Variational Autoencoders가 최적의 절충안으로 제시되었다.", "link": "https://arxiv.org/abs/2604.21031v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Tapiwa Amion Chinodakufa", "Ashfaq Ali Shafin", "Khandaker Mamun Ahmed"], "categories": ["cs.LG", "cs.AI"]}, {"id": "2", "source": "ARXIV", "score": 16, "day": "2026-04-23", "title": "Locating acts of mechanistic reasoning in student team conversations with mechanistic machine learning", "content": "---\ntitle: 학생 팀 대화에서 기계적 추론 행위 찾기\nauthors: Kaitlin Gili, Mainak Nistala, Kristen Wendell, Michael C. Hughes\nyear: 2026\njournal: arXiv\ndoi: https://doi.org/10.48550/arXiv.2604.21870\nresearch_type: 실험적 연구\nmethodology: 기계 학습 모델\ndata_type: 대화 기록\nsample: 학부 공학 학생 그룹\ncontext: STEM 교육\ntheoretical_framework: 기계적 추론 이론\nkeywords: [기계적 추론, 기계 학습, STEM 교육, 대화 분석, 교육 기술]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 STEM 교육에서 학생들의 기계적 추론을 식별하기 위한 해석 가능한 기계 학습 모델을 제안한다. 이 모델은 학생들의 발언과 그룹의 기여를 바탕으로 개별 학생이 기계적 추론에 참여하고 있을 확률을 시간에 따라 출력한다. 실험을 통해 유도 편향이 포함된 모델과 포함되지 않은 모델을 비교하여, 유도 편향이 모델의 일반화 능력을 향상시킨다는 결과를 도출하였다. 연구 결과는 STEM 교육 연구자들이 이 도구를 채택할 수 있도록 실용적인 권장 사항을 제시하며, 기계적 해석이 가능한 모델의 개발을 촉진할 것으로 기대된다.\n\n# Research Logic\n## Problem\nSTEM 교육 연구자들은 학생들의 기계적 추론을 깊이 분석하기 위해 대화 기록에서 해당 순간을 식별하는 데 어려움을 겪고 있다.\n\n## Theory\n기계적 추론은 과학 및 공학 교육에서 중요한 요소로, 학생들이 문제를 해결하는 데 필요한 관계를 이해하는 데 도움을 준다.\n\n## Design\n해석 가능한 기계 학습 모델을 설계하여, 학생들의 발언을 기반으로 기계적 추론의 확률을 추정한다.\n\n## Findings\n유도 편향이 포함된 모델이 포함되지 않은 모델보다 일반화 능력이 향상되었음을 보여준다.\n\n## Conclusion\n기계적 해석이 가능한 모델의 개발은 STEM 교육 연구자와 기계 학습 연구자 모두에게 유용할 것이다.\n\n# Key Findings\n- 기계적 추론을 식별하기 위한 해석 가능한 기계 학습 모델이 제안되었다.\n- 유도 편향이 포함된 모델이 일반화 능력을 향상시켰다.\n- 연구 결과는 STEM 교육 연구자들에게 실용적인 권장 사항을 제공한다.\n\n# Contributions\n## Theoretical\n기계적 추론의 개념을 교육적 맥락에서 명확히 하고, 기계 학습 모델의 해석 가능성을 강조한다.\n\n## Methodological\n기계적 추론을 자동으로 식별할 수 있는 새로운 기계 학습 접근 방식을 제시한다.\n\n## Practical\nSTEM 교육 연구자들이 대화 분석을 효율적으로 수행할 수 있는 도구를 제공한다.\n\n# Limitations\n- 모델의 일반화 능력은 특정 데이터셋에 의존할 수 있다.\n- 기계적 추론의 정의가 연구자에 따라 달라질 수 있다.\n\n# Transferable Insights\n- 기계 학습 모델의 해석 가능성은 교육 연구에서 중요한 요소이다.\n- 자동화된 도구는 대규모 데이터 분석을 용이하게 한다.\n\n# Idea Seeds\n1. 기계적 추론을 다른 교육 분야에 적용할 수 있는 방법 탐색.\n2. 다양한 학생 그룹을 대상으로 한 모델의 유효성 검증.\n3. 기계적 추론의 정의를 확장하여 다양한 맥락에서 적용 가능성 탐구.\n\n# Citation Snippets\n> Gili, K., Nistala, M., Wendell, K., & Hughes, M. C. (2026). Locating acts of mechanistic reasoning in student team conversations with mechanistic machine learning. arXiv. https://doi.org/10.48550/arXiv.2604.21870\n\ntags: #기계적추론, #기계학습, #STEM교육, #대화분석, #교육기술\n\n---\n\n요약: 본 연구는 STEM 교육에서 학생들의 기계적 추론을 식별하기 위한 해석 가능한 기계 학습 모델을 제안하며, 유도 편향이 포함된 모델이 일반화 능력을 향상시킨다는 결과를 도출하였다. 연구 결과는 교육 연구자들에게 실용적인 권장 사항을 제공한다.", "link": "https://arxiv.org/abs/2604.21870v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Kaitlin Gili", "Mainak Nistala", "Kristen Wendell"], "categories": ["physics.ed-ph", "cs.LG"]}, {"id": "3", "source": "ARXIV", "score": 15, "day": "2026-04-23", "title": "Enabling and Inhibitory Pathways of University Students' Willingness to Disclose AI Use: A Cognition-Affect-Conation Perspective", "content": "---\ntitle: 대학생의 AI 사용 공개 의지의 촉진 및 억제 경로: 인지-정서-행동 관점\nauthors: Yiran Du, Huimin He\nyear: 2026\njournal: 명시되지 않음\ndoi: https://arxiv.org/abs/2604.21733v1\nresearch_type: 혼합 방법 연구\nmethodology: 순차적 설명적 혼합 방법 설계\ndata_type: 설문조사 데이터 및 반구조화 인터뷰\nsample: 546명의 대학생 (설문조사), 22명의 대학생 (인터뷰)\ncontext: 고등 교육에서의 AI 사용\ntheoretical_framework: 인지-정서-행동(CAC) 프레임워크\nkeywords: [AI 사용, 공개 의지, 고등 교육, 인지-정서-행동 프레임워크]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 고등 교육에서 인공지능(AI)의 통합이 대학생의 AI 사용 공개 의지에 미치는 심리적 메커니즘을 조사하였다. 인지-정서-행동(CAC) 프레임워크를 적용하여, 546명의 대학생을 대상으로 한 설문조사와 22명의 반구조화 인터뷰를 통해 데이터가 수집되었다. 연구 결과, 심리적 안전감이 AI 사용 공개 의지를 유의미하게 증가시키며, 이는 인식된 공정성, 교사 지원, 조직 지원에 의해 긍정적으로 형성된다. 반면, 평가에 대한 두려움은 공개 의지와 심리적 안전감을 감소시키며, 이는 인식된 낙인, 불확실성, 개인 정보 보호 우려에 의해 강화된다. 본 연구는 AI 사용 공개에 대한 심리적 메커니즘의 이중 역할을 강조하며, 고등 교육에서 책임 있는 AI 투명성을 촉진하기 위한 지원적 환경의 중요성을 강조한다.\n\n# Research Logic\n## Problem\n대학생들이 AI 사용을 공개하는 데 있어 심리적 요인과 그 메커니즘이 부족하게 연구되었다.\n\n## Theory\n인지-정서-행동(CAC) 프레임워크를 통해 학생들의 AI 사용 공개 의지를 설명하였다.\n\n## Design\n혼합 방법 연구로, 설문조사와 반구조화 인터뷰를 통해 데이터를 수집하였다.\n\n## Findings\n심리적 안전감은 AI 사용 공개 의지를 증가시키고, 평가에 대한 두려움은 이를 감소시킨다.\n\n## Conclusion\n지원적 기관 환경과 명확한 지침이 AI 사용 공개를 촉진하는 데 중요하다.\n\n# Key Findings\n- 심리적 안전감은 AI 사용 공개 의지를 증가시킨다.\n- 평가에 대한 두려움은 공개 의지를 감소시킨다.\n- 인식된 공정성, 교사 지원, 조직 지원이 심리적 안전감을 높인다.\n\n# Contributions\n## Theoretical\nCAC 프레임워크를 통해 AI 사용 공개 의지의 심리적 메커니즘을 설명하였다.\n\n## Methodological\n혼합 방법 연구 설계를 통해 정량적 및 정성적 데이터를 통합하였다.\n\n## Practical\n고등 교육에서 AI 사용에 대한 투명성을 촉진하기 위한 정책적 제안을 제공하였다.\n\n# Limitations\n- 표본의 다양성이 부족할 수 있다.\n- 연구 결과의 일반화 가능성이 제한적이다.\n\n# Transferable Insights\n- 심리적 안전감을 높이는 환경이 AI 사용 공개를 촉진할 수 있다.\n- 정책의 명확성이 학생들의 공개 의지에 긍정적인 영향을 미친다.\n\n# Idea Seeds\n1. AI 사용에 대한 정책 개발 시 학생들의 심리적 안전감을 고려해야 한다.\n2. 교사와 학생 간의 신뢰 구축을 위한 프로그램 개발 필요.\n3. AI 사용에 대한 사회적 인식 개선을 위한 캠페인 필요.\n\n# Citation Snippets\n> Du, Y., & He, H. (2026). Enabling and Inhibitory Pathways of University Students' Willingness to Disclose AI Use: A Cognition-Affect-Conation Perspective. \n\ntags: #AI사용 #공개의지 #고등교육 #인지정서행동 #심리적안전감 #정책개발 #교육정책\n\n---\n\n짧은 요약: 본 연구는 대학생의 AI 사용 공개 의지를 조사하며, 심리적 안전감이 이를 증가시키고 평가에 대한 두려움이 감소시킨다는 결과를 도출하였다. 인식된 공정성과 지원이 심리적 안전감을 높이는 데 기여하며, 고등 교육에서 AI 사용의 책임 있는 투명성을 촉진하기 위한 환경의 중요성을 강조한다.", "link": "https://arxiv.org/abs/2604.21733v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Yiran Du", "Huimin He"], "categories": ["cs.AI"]}, {"id": "4", "source": "ARXIV", "score": 10, "day": "2026-04-16", "title": "The Semi-Executable Stack: Agentic Software Engineering and the Expanding Scope of SE", "content": "---\ntitle: The Semi-Executable Stack: Agentic Software Engineering and the Expanding Scope of SE\nauthors: [Robert Feldt, Per Lenberg, Julian Frattini, Dhasarathy Parthasarathy]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2604.15468v2\nresearch_type: 개념적 연구\nmethodology: 사례 연구\ndata_type: 문헌 기반\nsample: 명시되지 않음\ncontext: 소프트웨어 공학 및 AI 시스템\ntheoretical_framework: 반응적 소프트웨어 공학\nkeywords: [agentic software engineering, semi-executable artifacts, software engineering, AI systems, organizational routines, diagnostic model]\n---\n\n# APA 7th style\n\n# Summary\n본 논문은 AI 기반 시스템이 소프트웨어 공학에 미치는 영향을 분석하며, 소프트웨어 공학의 범위가 실행 가능한 코드에서 반실행 가능한 아티팩트로 확장되고 있음을 주장한다. 저자들은 반실행 가능한 스택을 제안하여, 이 새로운 범위가 어떻게 소프트웨어 공학의 객체를 변화시키는지를 설명한다. 이 모델은 실행 가능한 아티팩트, 교육 아티팩트, 조정된 실행, 통제 시스템, 운영 논리, 사회적 적합성의 여섯 개 링으로 구성된다. 저자들은 세 가지 사례를 통해 이 모델의 유용성을 입증하고, 기존의 반대 의견을 공학적 목표로 재구성한다. 마지막으로, 유산 소프트웨어 공학 프로세스의 보존과 정화에 대한 기준을 제시한다.\n\n# Research Logic\n## Problem\nAI 기반 시스템이 소프트웨어 공학의 중요성을 감소시킬 것이라는 우려가 존재한다.\n## Theory\n소프트웨어 공학의 범위가 실행 가능한 코드에서 반실행 가능한 아티팩트로 확장되고 있다는 주장.\n## Design\n여섯 개 링으로 구성된 반실행 가능한 스택 모델을 제안.\n## Findings\nAI 시스템의 발전이 소프트웨어 공학의 객체를 확장시키며, 이는 새로운 공학적 목표를 제시한다.\n## Conclusion\n소프트웨어 공학은 축소되지 않고, 오히려 새로운 형태의 아티팩트를 포함하여 확장되고 있다.\n\n# Key Findings\n- AI 기반 시스템은 소프트웨어 공학의 범위를 확장시킨다.\n- 반실행 가능한 아티팩트는 인간의 해석에 의존한다.\n- 기존의 반대 의견은 공학적 목표로 재구성될 수 있다.\n\n# Contributions\n## Theoretical\n반실행 가능한 아티팩트의 정의와 소프트웨어 공학의 새로운 범위를 제시.\n## Methodological\n여섯 개 링으로 구성된 진단 모델을 개발.\n## Practical\n유산 소프트웨어 공학 프로세스의 보존과 정화에 대한 기준 제공.\n\n# Limitations\n- 실증적 데이터 부족.\n- 특정 사례에 국한된 분석.\n\n# Transferable Insights\n- AI 시스템의 발전이 소프트웨어 공학의 객체를 변화시킬 수 있다.\n- 반실행 가능한 아티팩트의 중요성이 증가하고 있다.\n\n# Idea Seeds\n1. 반실행 가능한 아티팩트의 구체적인 사례 연구.\n2. AI 시스템의 조직적 통합에 대한 연구.\n3. 소프트웨어 공학 교육 과정의 재설계.\n\n# Citation Snippets\n> Feldt, R., Lenberg, P., Frattini, J., & Parthasarathy, D. (2026). The Semi-Executable Stack: Agentic Software Engineering and the Expanding Scope of SE. arXiv. \n\ntags: #agentic_software_engineering, #semi_executable_artifacts, #software_engineering, #AI_systems, #organizational_routines, #diagnostic_model\n\n---\n\n요약: 본 논문은 AI 기반 시스템이 소프트웨어 공학의 범위를 확장하고 있음을 주장하며, 반실행 가능한 아티팩트를 포함한 새로운 모델을 제안한다. 이 모델은 소프트웨어 공학의 객체를 재구성하고, 기존의 반대 의견을 공학적 목표로 전환할 수 있는 가능성을 제시한다.", "link": "https://arxiv.org/abs/2604.15468v2", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Robert Feldt", "Per Lenberg", "Julian Frattini"], "categories": ["cs.SE", "cs.AI"]}, {"id": "5", "source": "OPENALEX", "score": 9, "day": "2026-04-22", "title": "A Mixed-Method Meta-Analysis on the Dual Impact of Generative AI on Undergraduates’ Critical Thinking in Higher Education", "content": "명시되지 않음", "link": "https://doi.org/10.21203/rs.3.rs-9461812/v1", "altLink": "https://openalex.org/W7155157977", "hasDoi": true, "hasReview": false, "authors": ["Jecha Jecha", "Yu Liang", "Jining Han"], "categories": ["Critical thinking", "Generative grammar", "Cognition", "Framing (construction)", "Curriculum"]}, {"id": "6", "source": "ARXIV", "score": 6, "day": "2026-04-23", "title": "On Reasoning Behind Next Occupation Recommendation", "content": "In this work, we develop a novel reasoning approach to enhance the performance of large language models (LLMs) in future occupation prediction. In this approach, a reason generator first derives a ``reason'' for a user using his/her past education and career history. The reason summarizes the user's preference and is used as the input of an occupation predictor to recommend the user's next occupation. This two-step occupation prediction approach is, however, non-trivial as LLMs are not aligned with career paths or the unobserved reasons behind each occupation decision. We therefore propose to fine-tune LLMs improving their reasoning and occupation prediction performance. We first derive high-quality oracle reasons, as measured by factuality, coherence and utility criteria, using a LLM-as-a-Judge. These oracle reasons are then used to fine-tune small LLMs to perform reason generation and next occupation prediction. Our extensive experiments show that: (a) our approach effectively enhances LLM's accuracy in next occupation prediction making them comparable to fully supervised methods and outperforming unsupervised methods; (b) a single LLM fine-tuned to perform reason generation and occupation prediction outperforms two LLMs fine-tuned to perform the tasks separately; and (c) the next occupation prediction accuracy depends on the quality of generated reasons. Our code is available at https://github.com/Sarasarahhhhh/job_prediction.", "link": "https://arxiv.org/abs/2604.21204v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Shan Dong", "Palakorn Achananuparp", "Hieu Hien Mai"], "categories": ["cs.CL", "cs.AI", "cs.IR"]}, {"id": "7", "source": "ARXIV", "score": 6, "day": "2026-04-22", "title": "Using Machine Mental Imagery for Representing Common Ground in Situated Dialogue", "content": "Situated dialogue requires speakers to maintain a reliable representation of shared context rather than reasoning only over isolated utterances. Current conversational agents often struggle with this requirement, especially when the common ground must be preserved beyond the immediate context window. In such settings, fine-grained distinctions are frequently compressed into purely textual representations, leading to a critical failure mode we call \\emph{representational blur}, in which similar but distinct entities collapse into interchangeable descriptions. This semantic flattening creates an illusion of grounding, where agents appear locally coherent but fail to track shared context persistently over time. Inspired by the role of mental imagery in human reasoning, and based on the increased availability of multimodal models, we explore whether conversational agents can be given an analogous ability to construct some depictive intermediate representations during dialogue to address these limitations. Thus, we introduce an active visual scaffolding framework that incrementally converts dialogue state into a persistent visual history that can later be retrieved for grounded response generation. Evaluation on the IndiRef benchmark shows that incremental externalization itself improves over full-dialog reasoning, while visual scaffolding provides additional gains by reducing representational blur and enforcing concrete scene commitments. At the same time, textual representations remain advantageous for non-depictable information, and a hybrid multimodal setting yields the best overall performance. Together, these findings suggest that conversational agents benefit from an explicitly multimodal representation of common ground that integrates depictive and propositional information.", "link": "https://arxiv.org/abs/2604.21144v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Biswesh Mohapatra", "Giovanni Duca", "Laurent Romary"], "categories": ["cs.CL", "cs.AI", "cs.HC"]}, {"id": "8", "source": "ARXIV", "score": 6, "day": "2026-04-20", "title": "AIT Academy: Cultivating the Complete Agent with a Confucian Three-Domain Curriculum", "content": "What does it mean to give an AI agent a complete education? Current agent development produces specialists systems optimized for a single capability dimension, whether tool use, code generation, or security awareness that exhibit predictable deficits wherever they were not trained. We argue this pattern reflects a structural absence: there is no curriculum theory for agents, no principled account of what a fully developed agent should know, be, and be able to do across the full scope of intelligent behavior.   This paper introduces the AIT Academy (Agents Institute of Technology Academy), a curriculum framework for cultivating AI agents across the tripartite structure of human knowledge. Grounded in Kagan's Three Cultures and UNESCO ISCED-F 2013, AIT organizes agent capability development into three domains: Natural Science and Technical Reasoning (Domain I), Humanities and Creative Expression (Domain II), and Social Science and Ethical Reasoning (Domain III). The Confucian Six Arts (liuyi) a 2,500-year-old holistic education system are reinterpreted as behavioral archetypes that map directly onto trainable agent capabilities within each domain.   Three representative training grounds instantiate the framework across multiple backbone LLMs: the ClawdGO Security Dojo (Domain I), Athen's Academy (Domain II), and the Alt Mirage Stage (Domain III). Experiments demonstrate a 15.9-point improvement in security capability scores under weakest-first curriculum scheduling, and a 7-percentage-point gain in social reasoning performance under principled attribution modeling. A cross-domain finding Security Awareness Calibration Pathology (SACP), in which over-trained Domain I agents fail on out-of-distribution evaluation illustrates the diagnostic value of a multi-domain perspective unavailable to any single-domain framework.", "link": "https://arxiv.org/abs/2604.17989v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Jiaqi Li", "Lvyang Zhang", "Yang Zhao"], "categories": ["cs.AI"]}, {"id": "9", "source": "ARXIV", "score": 6, "day": "2026-04-19", "title": "Generative AI Technologies, Techniques & Tensions: A Primer", "content": "Generative AI systems have entered everyday academic, professional, and personal life with remarkable speed, yet most users encounter them as mysterious artifacts rather than intelligible systems. This chapter discusses large language models within a broader historical shift in computing paradigms and argues that many of the confusions surrounding their use arise from a mismatch between how these systems are built, how they behave, and how people expect computers to behave writ large. Rather than treating generative AI as a monolithic technology, the chapter decomposes it into interacting components, spanning data, models, product features, and user inputs, each introducing distinct affordances and tensions. Particular attention is given to the statistical and data-based foundations of these systems and to the fact that their surface behavior is explicitly human-like, a combination that places them squarely within the intellectual traditions of educational and behavioral research. From this perspective, educational researchers are unusually well positioned to study, evaluate, and productively use generative AI systems, drawing on established methods for modeling latent processes, managing uncertainty, and interpreting complex human-system interactions. The goal is to equip readers with a conceptual map that supports more informed experimentation, critical interpretation, and responsible use as these systems continue to evolve.", "link": "https://arxiv.org/abs/2604.17497v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["John T. Behrens"], "categories": ["cs.CY", "cs.AI", "cs.HC"]}];

  localStorage.setItem('visited', JSON.stringify(visited));
}

function recordSearch(query) {
  if (query.trim() && !searchHistory.includes(query)) {
    searchHistory.unshift(query);
    if (searchHistory.length > 10) searchHistory.pop();
    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
  }
}

function downloadJSON() {
  const data = JSON.stringify(filtered, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadCSV() {
  const headers = ['제목', '출처', '스코어', '리뷰여부', '링크'];
  const rows = filtered.map(p => [
    '"' + p.title.replace(/"/g, '""') + '"',
    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
