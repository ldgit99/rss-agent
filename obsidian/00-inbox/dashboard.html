<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-03-29 10:20</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

const PAPERS = [{"id": "0", "source": "OPENALEX", "score": 15, "day": "2026-03-13", "title": "The RIGID Framework: Research-Integrated, Generative AI-Mediated Instructional Design", "content": "---\ntitle: The RIGID Framework: Research-Integrated, Generative AI-Mediated Instructional Design\nauthors: [Yerin Kwak, Zachary A. Pardos]\nyear: 2026\njournal: 명시되지 않음\ndoi: https://openalex.org/W7138824207\nresearch_type: 이론적 연구\nmethodology: 명시되지 않음\ndata_type: 명시되지 않음\nsample: 명시되지 않음\ncontext: 교육 설계 및 학습 과학\ntheoretical_framework: RIGID 프레임워크\nkeywords: [instructional design, learning sciences, generative AI]\n---\n\n# APA 7th style\n\n# Summary\n이 논문은 교육 설계(ID)와 학습 과학(LS) 간의 통합을 위한 RIGID(Research-Integrated, Generative AI-Mediated Instructional Design) 프레임워크를 제안한다. 연구자들은 ID가 연구 기반 지식과 교육학적 최선의 관행을 통합하는 데 어려움을 겪고 있으며, 이를 해결하기 위해 LS 연구를 ID 프로세스에 체계적으로 통합할 필요성을 강조한다. RIGID 프레임워크는 분석, 설계, 구현 및 평가 단계에서 LS 연구를 통합하고, 생성적 AI를 활용하여 이 통합을 매개하는 방법을 제시한다. 이 프레임워크는 연구 통합 교육 설계를 가능하게 하며, 인간의 전문성을 중심으로 유지하는 것을 목표로 한다.\n\n# Research Logic\n## Problem\n교육 설계에서 연구 기반 지식과 최선의 관행을 통합하는 데 어려움이 존재한다.\n## Theory\nID와 LS는 학습 경험을 개선하기 위한 디자인 중심 접근 방식을 공유하지만, 두 분야 간의 구조적 통합이 부족하다.\n## Design\nRIGID 프레임워크는 ID 프로세스 전반에 걸쳐 LS 연구를 통합하는 체계적인 접근 방식을 제공한다.\n## Findings\nRIGID 프레임워크는 교육 설계의 모든 단계에서 연구 통합을 가능하게 하며, 생성적 AI를 통해 이 통합을 지원한다.\n## Conclusion\nRIGID 프레임워크는 교육 설계의 연구 기반 통합을 촉진하며, 인간의 전문성을 유지하는 데 중점을 둔다.\n\n# Key Findings\n- RIGID 프레임워크는 ID와 LS 간의 통합을 위한 체계적인 접근 방식을 제공한다.\n- 생성적 AI는 ID 프로세스의 각 단계에서 연구 통합을 매개하는 역할을 한다.\n- 이 프레임워크는 교육 설계의 질을 향상시키는 데 기여할 수 있다.\n\n# Contributions\n## Theoretical\nID와 LS 간의 통합을 위한 새로운 이론적 프레임워크를 제시한다.\n## Methodological\nID 프로세스에 LS 연구를 통합하는 방법론적 접근을 제공한다.\n## Practical\n교육 현장에서 연구 기반 교육 설계를 구현할 수 있는 실용적인 지침을 제공한다.\n\n# Limitations\n- RIGID 프레임워크의 실제 적용 사례가 부족하다.\n- 생성적 AI의 활용에 대한 구체적인 방법론이 명시되지 않았다.\n\n# Transferable Insights\n- 교육 설계에서 연구 기반 접근 방식의 중요성을 강조한다.\n- 생성적 AI의 활용이 교육 설계에 미치는 영향을 탐구할 수 있는 기회를 제공한다.\n\n# Idea Seeds\n1. RIGID 프레임워크의 실제 적용 사례 연구.\n2. 생성적 AI를 활용한 교육 설계 도구 개발.\n3. ID와 LS 간의 통합을 위한 추가 연구 필요성.\n\n# Citation Snippets\n> Kwak, Y., & Pardos, Z. A. (2026). The RIGID Framework: Research-Integrated, Generative AI-Mediated Instructional Design. \n\ntags: #human-ai_collaboration, #classroom_ai, #ai_tutoring, #instructional_design, #scaffolding, #tpack, #ai_literacy, #teacher_ai, #education, #learning_analytics, #llm_classroom, #ai_pedagogy\n\n---\n\n요약: 이 논문은 RIGID 프레임워크를 통해 교육 설계와 학습 과학의 통합을 제안하며, 생성적 AI를 활용하여 연구 기반 교육 설계를 가능하게 하는 방법을 모색한다. 이 프레임워크는 교육 현장에서의 연구 통합을 촉진하고, 인간의 전문성을 유지하는 데 중점을 둔다.", "link": "https://openalex.org/W7138824207", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Yerin Kwak", "Zachary A. Pardos"], "categories": ["Operationalization", "Generative grammar", "Computer science", "Workflow", "Instructional design"]}, {"id": "1", "source": "OPENALEX", "score": 11, "day": "2026-03-10", "title": "Educating with intelligence: How future teachers interact with generative artificial intelligence for lesson planning", "content": "---\ntitle: Educating with intelligence: How future teachers interact with generative artificial intelligence for lesson planning\nauthors: [Cándida Marcela Rodríguez Chávez, Luis Alonso Castañeda Negrete, Alejandro Guadalupe Rincón Castillo]\nyear: 2026\njournal: 명시되지 않음\ndoi: 명시되지 않음\nresearch_type: 기술적 연구\nmethodology: 기술적 질적 연구\ndata_type: 설문조사\nsample: 127명의 6학기 학생\ncontext: 멕시코 자카테카스의 초등교육 학사 과정\ntheoretical_framework: 명시되지 않음\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 미래의 초등교육 교사들이 수업 계획 설계에서 생성적 인공지능(GenAI)과 상호작용하는 방식을 분석하였다. 127명의 6학기 초등교육 학사 과정 학생을 대상으로 한 설문조사를 통해, 학생들은 GenAI 콘텐츠의 정제, 교육적 검증, 피드백 및 평가 전략을 탐색하였다. 결과적으로, 대부분의 학생들이 수동 편집(58%)과 반복적인 프롬프트(32%)를 선호하며, 이는 GenAI에 대한 능동적이고 비판적인 역할을 나타낸다. 공식 출처 검증 및 맥락에 맞춘 적응은 높은 수준의 교육적 문해력과 관련이 있다. 실용성(48%)과 교육과정 정렬(32%)이 가장 가치 있는 평가 기준으로 나타났다. 연구는 미래 교사들이 GenAI 생성 콘텐츠에 대한 인간의 통제를 우선시하는 실용적이고 반성적인 접근 방식을 채택하고 있음을 결론짓는다.\n\n# Research Logic\n## Problem\n미래 교사들이 GenAI와 어떻게 상호작용하는지에 대한 이해 부족.\n## Theory\nGenAI의 교육적 활용에 대한 이론적 틀 명시되지 않음.\n## Design\n설문조사를 통한 기술적 질적 연구.\n## Findings\n대부분의 학생들이 수동 편집과 반복적 프롬프트를 선호하며, 공식 출처 검증이 일반적임.\n## Conclusion\n미래 교사들은 GenAI 콘텐츠에 대해 비판적이고 실용적인 접근 방식을 채택해야 함.\n\n# Key Findings\n- 학생들은 GenAI 콘텐츠의 수동 편집을 선호함.\n- 공식 출처 검증 및 맥락 적응이 높은 교육적 문해력과 관련됨.\n- 실용성과 교육과정 정렬이 가장 중요한 평가 기준으로 나타남.\n\n# Contributions\n## Theoretical\nGenAI와 교육적 상호작용에 대한 새로운 통찰 제공.\n## Methodological\n설문조사를 통한 데이터 수집 방법론의 적용.\n## Practical\n미래 교사 교육에서 GenAI 활용에 대한 실용적 지침 제시.\n\n# Limitations\n- 연구의 이론적 틀 명시되지 않음.\n- 표본의 지역적 한계로 일반화 가능성 제한.\n\n# Transferable Insights\n- GenAI 활용에 대한 비판적 접근의 중요성.\n- 교육적 문해력을 높이기 위한 공식 출처 검증의 필요성.\n\n# Idea Seeds\n1. GenAI와의 상호작용을 위한 교육 프로그램 개발.\n2. GenAI 활용에 대한 교사 연수 과정 설계.\n3. GenAI의 교육적 효과를 평가하기 위한 장기 연구 필요.\n\n# Citation Snippets\n> Rodríguez Chávez, C. M., Castañeda Negrete, L. A., & Rincón Castillo, A. G. (2026). Educating with intelligence: How future teachers interact with generative artificial intelligence for lesson planning.\n\ntags: #human-ai_collaboration, #classroom_ai, #ai_tutoring, #instructional_design, #scaffolding, #tpack, #ai_literacy, #teacher_ai, #education, #learning_analytics, #llm_classroom, #ai_pedagogy\n\n---\n\n요약: 본 연구는 미래 초등교육 교사들이 생성적 인공지능(GenAI)과 상호작용하는 방식을 분석하였다. 127명의 학생을 대상으로 한 설문조사 결과, 수동 편집과 반복적 프롬프트가 선호되었으며, 공식 출처 검증이 일반적이었다. 연구는 미래 교사들이 GenAI 콘텐츠에 대해 비판적이고 실용적인 접근 방식을 채택해야 함을 강조한다.", "link": "https://doi.org/10.33010/ie_rie_rediech.v17i0.2695", "altLink": "https://openalex.org/W7134978856", "hasDoi": true, "hasReview": true, "authors": ["Cándida Marcela Rodríguez Chávez", "Luis Alonso Castañeda Negrete", "Alejandro Guadalupe Rincón Castillo"], "categories": ["Metacognition", "Context (archaeology)", "Reflexivity", "Generative grammar", "Mathematics education"]}, {"id": "2", "source": "OPENALEX", "score": 11, "day": "2026-02-24", "title": "A meta-analysis of generative AI effects on language proficiency and affective–cognitive outcomes in language learning", "content": "---\ntitle: A meta-analysis of generative AI effects on language proficiency and affective–cognitive outcomes in language learning\nauthors: [Mirka Saarela, Sachini Gunasekara, Prabha M. Kumarage]\nyear: 2026\njournal: Discover Computing\ndoi: https://doi.org/10.1007/s10791-026-10015-1\nresearch_type: 메타 분석\nmethodology: 메타 분석\ndata_type: 실험 연구\nsample: 51개 연구, 175개의 독립 효과 크기\ncontext: 언어 교육\ntheoretical_framework: 사회문화적 이론, 상호작용 이론\nkeywords: [Generative AI, 언어 교육, 메타 분석, 언어 능력, 정서-인지 결과, 제2외국어 학습]\n---\n\n# APA 7th style\n\n# Summary\n본 메타 분석은 생성적 인공지능(GenAI) 도구가 제2외국어 및 외국어 학습 결과에 미치는 영향을 평가하기 위해 51개의 연구에서 보고된 175개의 독립 효과 크기를 종합하였다. 결과적으로 GenAI 도구는 언어 능력 및 정서-인지 결과에 대해 큰 통계적으로 유의미한 효과를 나타냈다. 조절 분석 결과, 효과는 개입 기간, 교수 설정, 학습자 특성 및 목표 언어에 따라 달라지는 것으로 나타났다. 비공식 학습 환경에서, 생산적 기술에 대해, 그리고 덜 일반적으로 가르치는 언어에 대한 연구에서 더 강한 효과가 관찰되었다. 이러한 발견은 제2언어 습득의 사회문화적 및 상호작용 이론을 지지하며, GenAI 도구의 맞춤형 통합의 필요성을 강조한다.\n\n# Research Logic\n## Problem\nGenAI 도구의 효과성과 그 영향을 형성하는 요인에 대한 명확한 이해 부족.\n## Theory\n사회문화적 이론 및 상호작용 이론을 통해 GenAI의 학습 지원 메커니즘 탐색.\n## Design\n51개의 실험 연구를 종합하여 메타 분석 수행.\n## Findings\nGenAI 도구는 언어 능력 및 정서-인지 결과에 대해 큰 효과를 보였으며, 효과는 다양한 조절 요인에 따라 달라짐.\n## Conclusion\nGenAI 도구의 효과적인 통합을 위해서는 교육적 맥락에 맞춘 접근이 필요함.\n\n# Key Findings\n- GenAI 도구는 언어 능력 및 정서-인지 결과에 대해 큰 효과를 나타냄.\n- 비공식 학습 환경에서 더 강한 효과가 관찰됨.\n- 개입 기간, 교수 설정, 학습자 특성에 따라 효과가 달라짐.\n\n# Contributions\n## Theoretical\n제2언어 습득 이론에 대한 새로운 통찰 제공.\n## Methodological\n메타 분석을 통해 GenAI 도구의 효과를 체계적으로 평가.\n## Practical\n교육자 및 정책 입안자에게 GenAI 도구의 효과적인 활용 방안 제시.\n\n# Limitations\n- 연구의 대부분이 단기 개입에 집중됨.\n- 비공식 학습 맥락에 대한 연구가 많음.\n\n# Transferable Insights\n- GenAI 도구는 다양한 학습 환경에서 맞춤형 학습 경험을 제공할 수 있음.\n- 교육적 맥락에 따라 GenAI 도구의 효과가 달라질 수 있음을 인식해야 함.\n\n# Idea Seeds\n1. GenAI 도구를 활용한 장기적인 언어 학습 연구 필요.\n2. 다양한 언어 및 문화적 맥락에서의 GenAI 도구 효과 분석.\n3. GenAI 도구의 사용이 학습자의 정서적 반응에 미치는 영향 연구.\n\n# Citation Snippets\n> Saarela, M., Gunasekara, S., & Kumarage, P. M. (2026). A meta-analysis of generative AI effects on language proficiency and affective–cognitive outcomes in language learning. Discover Computing, 29, 116. https://doi.org/10.1007/s10791-026-10015-1\n\ntags: #GenerativeAI, #언어교육, #메타분석, #언어능력, #정서인지결과, #제2외국어학습, #AI교육\n\n---\n\n요약: 본 연구는 생성적 인공지능(GenAI) 도구가 언어 학습에 미치는 영향을 메타 분석을 통해 평가하였다. 51개의 연구에서 175개의 효과 크기를 종합한 결과, GenAI 도구는 언어 능력 및 정서-인지 결과에 대해 유의미한 효과를 보였으며, 효과는 학습 환경 및 개입 기간에 따라 달라지는 것으로 나타났다. 이러한 결과는 GenAI 도구의 맞춤형 통합의 필요성을 강조한다.", "link": "https://doi.org/10.1007/s10791-026-10015-1", "altLink": "https://openalex.org/W7131242050", "hasDoi": true, "hasReview": true, "authors": ["Mirka Saarela", "Sachini Gunasekara", "Prabha M. Kumarage"], "categories": ["Language proficiency", "Language acquisition", "Psychology", "Foreign language", "Language learning strategies"]}, {"id": "3", "source": "OPENALEX", "score": 11, "day": "2026-01-14", "title": "Technologies for Supporting Academic Development", "content": "---\ntitle: Technologies for Supporting Academic Development\nauthors: [Paolo Fusco, Alessio Di Paolo, Michele Domenico Todino]\nyear: 2026\njournal: 명시되지 않음\ndoi: https://openalex.org/W7124172473\nresearch_type: 문헌 리뷰\nmethodology: 체계적 리뷰\ndata_type: 문헌\nsample: 명시되지 않음\ncontext: 디지털 시대의 대학 교육\ntheoretical_framework: TPACK (Technological Pedagogical Content Knowledge)\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 논문은 디지털 시대의 대학 교육 품질 향상을 위한 핵심 전략으로서 학문적 발전(Academic Development, AD)을 지원하는 기술에 대한 비판적 분석을 제안한다. TPACK 프레임워크가 교육 기술의 효과적인 통합을 위한 중요한 모델로 부각되며, 혼합 학습, 플립드 클래스룸, 실천 공동체와 같은 혁신적 접근 방식이 교육 혁신을 촉진하는 데 상당한 잠재력을 지니고 있음을 보여준다. 그러나 변화에 대한 저항, 제도적 인정 부족, 기술적 교육 격차, 교수 역할에 대한 정체성 긴장과 같은 구조적 비판점이 강조된다. \"증거의 시대\" 개념은 증거 기반의 개인화된 협력 프로그램으로의 미래 지향성을 제시하며, 정책 입안자와 기관을 위한 운영적 권고사항을 통해 교육을 핵심 학문 활동으로 가치화할 필요성을 강조한다.\n\n# Research Logic\n## Problem\n디지털 시대의 대학 교육 품질 향상에 대한 필요성.\n## Theory\nTPACK 프레임워크와 혁신적 교육 접근 방식.\n## Design\n체계적 문헌 리뷰를 통한 비판적 분석.\n## Findings\n교육 기술 통합의 필요성과 구조적 비판점.\n## Conclusion\n교육의 가치화를 위한 정책적 권고와 방향 제시.\n\n# Key Findings\n- TPACK 프레임워크는 교육 기술 통합의 중요한 모델이다.\n- 혼합 학습 및 플립드 클래스룸과 같은 혁신적 접근 방식이 교육 혁신을 촉진할 수 있다.\n- 변화에 대한 저항과 기술적 교육 격차가 주요 구조적 비판점으로 나타났다.\n\n# Contributions\n## Theoretical\n기존 이론적 프레임워크와 포스트 팬데믹 변화를 통합한 비판적 분석.\n## Methodological\n체계적 문헌 리뷰를 통한 심층적 통찰 제공.\n## Practical\n정책 입안자와 교육 기관을 위한 운영적 권고 제시.\n\n# Limitations\n- 연구 샘플에 대한 구체적인 정보 부족.\n- 특정 기술의 효과성에 대한 실증적 데이터 부족.\n\n# Transferable Insights\n- TPACK 프레임워크는 다양한 교육 환경에서 적용 가능하다.\n- 교육 혁신을 위한 정책적 접근은 변화 관리의 중요성을 강조해야 한다.\n\n# Idea Seeds\n1. TPACK 프레임워크를 기반으로 한 교육 기술 통합 모델 개발.\n2. 플립드 클래스룸의 효과성을 평가하기 위한 실증 연구.\n3. 교육 혁신을 촉진하기 위한 정책적 전략 수립.\n\n# Citation Snippets\n> Fusco, P., Di Paolo, A., & Todino, M. D. (2026). Technologies for Supporting Academic Development. \n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy\n\n---\n\n요약: 본 논문은 디지털 시대의 대학 교육 품질 향상을 위한 학문적 발전을 지원하는 기술에 대한 비판적 분석을 제공한다. TPACK 프레임워크와 혁신적 교육 접근 방식이 강조되며, 변화에 대한 저항과 기술적 교육 격차가 주요 비판점으로 지적된다. 정책 입안자와 기관을 위한 운영적 권고가 제시된다.", "link": "https://doi.org/10.3390/encyclopedia6010018", "altLink": "https://openalex.org/W7124172473", "hasDoi": true, "hasReview": true, "authors": ["Paolo Fusco", "Alessio Di Paolo", "Michele Domenico Todino"], "categories": ["Engineering ethics", "Knowledge management", "Quality (philosophy)", "Sociology", "Technology integration"]}, {"id": "4", "source": "OPENALEX", "score": 11, "day": "2026-01-01", "title": "Impact of ZEP QUIZ on Vocabulary Acquisition and Engagement among Year 3 Remedial ESL Learners: A Quasi-Experimental Study", "content": "---\ntitle: ZEP QUIZ가 3학년 보충 ESL 학습자의 어휘 습득 및 참여도에 미치는 영향: 준실험적 연구\nauthors: [Betty Chieng Shu Wen, Nur Ainil Sulaiman]\nyear: 2026\njournal: INTERNATIONAL JOURNAL OF RESEARCH AND INNOVATION IN SOCIAL SCIENCE (IJRISS)\ndoi: https://doi.org/10.47772/IJRISS.2026.10100320\nresearch_type: 준실험적 연구\nmethodology: 준실험적 사전/사후 비동등 대조군 설계\ndata_type: 정량적 및 정성적 데이터\nsample: 12명의 보충 학습자 (실험군 6명, 대조군 6명)\ncontext: 말레이시아 달랏의 농촌 지역 중국어 매체 초등학교\ntheoretical_framework: 인지 처리 이론, 동기 이론\nkeywords: [ZEP QUIZ, gamification, artificial intelligence, vocabulary acquisition, ESL learners, quasi-experimental design]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 말레이시아의 농촌 지역에서 영어 노출이 부족한 3학년 보충 ESL 학습자를 대상으로 ZEP QUIZ라는 AI 기반의 게임화된 전자 학습 플랫폼이 어휘 습득 및 학습자의 참여도에 미치는 영향을 실증적으로 조사하였다. 12명의 보충 학습자가 사전 능력에 따라 매칭되어 실험군과 대조군으로 나뉘었으며, 실험군은 6주간 ZEP QUIZ를 사용한 반면 대조군은 전통적인 정적 워크시트를 사용하였다. 비모수 통계 분석 결과, 실험군은 어휘 점수에서 통계적으로 유의미한 향상을 보였으며(Z = -2.20, p = .028), 대조군은 미미한 향상(p = .046)을 나타냈다. 주제 분석을 통해 \"시각적 스캐폴딩\", \"게임화된 자율성\", \"안전한 실패 환경\"이 참여의 주요 요인으로 확인되었다. 이 연구는 자원이 제한된 환경에서 적응형 AI 도구의 잠재력을 검증하며, 말레이시아 교육 청사진(2013-2025)의 목표와 일치한다.\n\n# Research Logic\n## Problem\n어휘 습득은 ESL 학습에서 병목 현상으로 작용하며, 농촌 지역의 보충 학습자들은 영어 노출 부족으로 인해 심각한 어려움을 겪고 있다.\n\n## Theory\n인지 처리 이론과 동기 이론을 바탕으로 ZEP QUIZ의 특성이 학습자의 인지적 처리 및 동기를 증진시킬 것으로 가정하였다.\n\n## Design\n준실험적 사전/사후 비동등 대조군 설계를 사용하여 12명의 보충 학습자를 대상으로 연구를 진행하였다.\n\n## Findings\n실험군은 어휘 점수에서 통계적으로 유의미한 향상(Z = -2.20, p = .028)을 보였으며, 대조군은 미미한 향상(p = .046)을 나타냈다.\n\n## Conclusion\nZEP QUIZ는 자원이 제한된 환경에서 어휘 습득과 학습자의 참여도를 향상시키는 데 효과적임을 입증하였다.\n\n# Key Findings\n- ZEP QUIZ 사용 시 어휘 점수가 통계적으로 유의미하게 향상되었다.\n- 실험군의 효과 크기는 크며(r = 0.63), 대조군은 미미한 향상을 보였다.\n- 참여도에 있어 \"시각적 스캐폴딩\", \"게임화된 자율성\", \"안전한 실패 환경\"이 주요 요인으로 작용하였다.\n\n# Contributions\n## Theoretical\n어휘 습득 및 학습 참여에 대한 AI 기반 게임화 도구의 효과를 실증적으로 입증하였다.\n\n## Methodological\n준실험적 설계를 통해 농촌 보충 학습자의 어휘 습득 연구에 대한 새로운 통찰을 제공하였다.\n\n## Practical\n보충 학습 교육에서 ZEP QUIZ와 같은 AI 도구의 활용 가능성을 제시하였다.\n\n# Limitations\n- 샘플 크기가 작아(12명) 일반화에 한계가 있다.\n- 연구 기간이 6주로, 장기적인 효과를 반영하지 못할 수 있다.\n\n# Transferable Insights\n- 자원이 제한된 환경에서도 AI 기반 도구가 효과적일 수 있음을 보여준다.\n- 게임화된 학습 도구가 학습자의 참여도를 높이는 데 기여할 수 있다.\n\n# Idea Seeds\n1. ZEP QUIZ의 장기적인 효과를 평가하기 위한 후속 연구 필요.\n2. 다양한 학습 환경에서의 ZEP QUIZ 적용 가능성 탐색.\n3. 다른 언어 기술(쓰기, 말하기 등)에서의 효과 분석.\n\n# Citation Snippets\n> Chieng Shu Wen, B., & Sulaiman, N. A. (2026). Impact of ZEP QUIZ on Vocabulary Acquisition and Engagement among Year 3 Remedial ESL Learners: A Quasi-Experimental Study. *INTERNATIONAL JOURNAL OF RESEARCH AND INNOVATION IN SOCIAL SCIENCE (IJRISS)*.\n\ntags: #ZEPQUIZ, #게임화, #인공지능, #어휘습득, #ESL학습자, #준실험적연구, #교육기술", "link": "https://doi.org/10.47772/ijriss.2026.10100320", "altLink": "https://openalex.org/W7128296634", "hasDoi": true, "hasReview": true, "authors": ["Betty Chieng Shu Wen", "Nur Ainil Sulaiman"], "categories": ["Remedial education", "Vocabulary", "Psychology", "Mathematics education", "Blueprint"]}, {"id": "5", "source": "OPENALEX", "score": 11, "day": "2026-01-01", "title": "Educating with intelligence: How future teachers interact with generative artificial intelligence for lesson planning", "content": "This study analyzes the interaction between future primary education teachers and generative artificial intelligence (GenAI) in the design of lesson plans. Using a descriptive quantitative approach, a questionnaire was administered to 127 sixth semester students enrolled in a Bachelor’s Degree in Primary Education in Zacatecas, Mexico. The instrument, which showed high reliability (a = 0.89), explored strategies for refinement, pedagogical verification, feedback, and evaluation of GenAI content. The results indicate that most students prefer manual editing (58%) and iterative prompting (32%), suggesting an active and critical role in relation to GenAI. Verifying with official sources and adapting to context are common practices, associated with higher levels of pedagogical literacy. Practical applicability (48%) and curricular alignment (32%) were the most valued evaluation criteria. User profiles were identified based on their strategies and confidence level in GenAI. The study concludes that future teachers adopt a pragmatic and reflexive approach, prioritizing human control over GenAI-generated content. It is recommended that they strengthen their training in advanced prompting, critical verification, and metacognitive skills for responsible pedagogical integration of GenAI.", "link": "https://openalex.org/W7136095204", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Cándida Marcela Rodríguez Chávez", "Luis Alonso Castañeda Negrete", "Alejandro Guadalupe Rincón Castillo"], "categories": ["Metacognition", "Context (archaeology)", "Reflexivity", "Generative grammar", "Mathematics education"]}, {"id": "6", "source": "OPENALEX", "score": 11, "day": "2025-12-30", "title": "Unpacking the role of AI in transforming English language teacher professionalism", "content": "Since its launch in November 2022, Chat-Generative Pre-trained Transformer, i.e., ChatGPT, as an advanced artificial intelligence-powered chatbot simulating human interaction and offering tailored feedback, has provoked mixed feelings in education. To promote its potential pedagogical relevance, its role from the perspectives of English language teachers needs to be explored further. Thus, the current study aims to investigate teachers’ behavior patterns, perceptions, and suggestions about the role of ChatGPT in developing teacher professionalism. Accordingly, a case study was carried out involving 11 graduate students pursuing a degree in English Language Teaching (ELT). While two participants had recently completed their pre-service teacher training and were not actively teaching at the time of the study, the remaining participants were in-service English language teachers employed in diverse educational contexts, including public schools and higher education institutions. A self-administered written survey with ten items was utilized to gather the qualitative data, which was analyzed through manual thematic content analysis. The participants’ self-reports illustrated varied instrumental genesis of ChatGPT that requires teachers to be active users rather than passive recipients. Still, they remained conscious of the numerous inherent challenges, limitations, and ethical concerns raised in existing research, in light of which the participants offered suggestions to mitigate those challenges. The study concludes by suggesting AI-empowered teacher professional development that emphasizes teacher agency rather than positioning teachers as mere recipients of ChatGPT outcomes.", "link": "https://doi.org/10.29329/pedper.2025.120", "altLink": "https://openalex.org/W7119793780", "hasDoi": true, "hasReview": false, "authors": ["Sakire ERBAY CETINKAYA", "Servet Çelik"], "categories": ["Unpacking", "Feeling", "Thematic analysis", "Pedagogy", "Agency (philosophy)"]}, {"id": "7", "source": "ERIC", "score": 10, "day": "명시되지 않음", "title": "Exploring the Relationship between Teachers&apos; AI Attitudes, AI Self-Efficacy, and AI Technological Pedagogical Content Knowledge", "content": "This study examines the relationships between teachers' attitudes toward artificial intelligence (AI), AI self-efficacy, and AI technological pedagogical content knowledge (AI-TPACK). The participants comprised 524 teachers working in preschool and primary schools. Data were collected using AI attitude, AI self-efficacy, and AI-TPACK scales. Pearson correlation analysis and structural equation modelling (SEM) were employed for data analysis. The findings indicate that teachers' AI self-efficacy is significantly and positively associated with AI attitudes and AI-TPACK. Furthermore, teachers' positive attitudes toward AI significantly influenced their AI-TPACK and AI self-efficacy. In contrast, negative attitudes toward AI were negatively correlated with AI self-efficacy but did not show a significant relationship with AI-TPACK. Additionally, AI-TPACK played a mediating role in the relationship between attitudes toward AI and AI self-efficacy. These findings contribute to the growing body of research on teachers' attitudes toward AI, AI self-efficacy, and AI-TPACK.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Mustafa Erol", "Merve Canbeldek Erol", "Ahmet Erol"], "categories": ["ERIC"]}, {"id": "8", "source": "ERIC", "score": 10, "day": "명시되지 않음", "title": "Human vs. AI: What Makes Students Prefer to Self-Disclosure to AI Teaching Assistant? The Effect of Psychological Safety and Relationship Norms", "content": "What makes students prefer to self-disclosure to AI teaching assistant (AI TA) than human teaching assistants? Understanding this question can help online learning platforms better understand students' needs in the data collection stage to provide more appropriate recommendations and deploy AI and human-AI collaboration more effectively. Based on stimulus-organism-response (SOR) theory, using semi-structured interviews and a quantitative survey, this study explores the influencing factors and underlying mechanisms of students' preferences for self-disclosure to AI TA. The results show that AI TA has better perceived privacy, fairness, and service attitude than human TA, so students have higher psychological safety when interacting with AI TA and prefer self-disclosure to AI TA. This study also explores the effects of relationship norms on self-disclosure and finds that students are more willing to self-disclosure to AI TA when they want to establish communal relationships with it. These results provide suggestions for the deployment of AI TA and the design of human-AI collaboration and provide new enlightenment for self-disclosure, AI TA, and human-AI interaction research.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Ziqing Peng", "Yan Wan"], "categories": ["ERIC"]}, {"id": "9", "source": "ERIC", "score": 9, "day": "명시되지 않음", "title": "Whose Feedback Matters? Exploring Human and AI-Supported Writing Feedback Practices in a South African Writing Centre", "content": "In the context of the growing reliance on artificial intelligence (AI) tools for academic writing, this article explores how undergraduate students at a South African writing centre perceive and use feedback from both human tutors and AI-based tools. Drawing on Feedback Literacy and Critical Digital Pedagogy, the study investigates the strengths and limitations of AI-generated and human feedback, as well as how resource constraints shape student practices. Using qualitative interviews with 10 undergraduate students across diverse disciplines, the findings reveal that while AI tools offer efficiency for surface-level corrections, students express a strong preference for the relational, dialogic, and context-sensitive nature of human feedback. Students strategically blend AI and tutor feedback, demonstrating emerging feedback literacy, yet their practices remain constrained by infrastructural barriers and algorithmic biases. The study highlights the risk that AI-generated feedback may reinforce educational inequalities if digital divides and linguistic diversity are not adequately addressed. It calls for feedback ecologies that balance technological innovation with human care, supporting equitable, and inclusive writing development in under-resourced, multilingual higher education settings.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Lutendo Nendauni"], "categories": ["ERIC"]}];

  currentSort = btn.dataset.sort;
  document.querySelectorAll('#sortGroup .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  render();
}

function toggleFavorite(id, e) {
  e.stopPropagation();
  const idx = favorites.indexOf(id);
  if (idx === -1) {
    favorites.push(id);
  } else {
    favorites.splice(idx, 1);
  }
  localStorage.setItem('favorites', JSON.stringify(favorites));
  applyFilters();
}

function recordVisit(id) {
  if (!visited.includes(id)) {
    visited.push(id);
  }
  localStorage.setItem('visited', JSON.stringify(visited));
}

function recordSearch(query) {
  if (query.trim() && !searchHistory.includes(query)) {
    searchHistory.unshift(query);
    if (searchHistory.length > 10) searchHistory.pop();
    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
  }
}

function downloadJSON() {
  const data = JSON.stringify(filtered, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadCSV() {
  const headers = ['제목', '출처', '스코어', '리뷰여부', '링크'];
  const rows = filtered.map(p => [
    '"' + p.title.replace(/"/g, '""') + '"',
    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
