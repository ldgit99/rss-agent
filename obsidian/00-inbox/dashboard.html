<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-04-18 23:33</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "ARXIV", "score": 8, "day": "2026-04-14", "title": "PAL: Personal Adaptive Learner", "content": "---\ntitle: PAL: Personal Adaptive Learner\nauthors: [Megha Chakraborty, Darssan L. Eswaramoorthi, Madhur Thareja, Het Riteshkumar Shah, Finlay Palmer, Aryaman Bahl, Michelle A Ihetu, Amit Sheth]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2604.13017v1\nresearch_type: 실험적 연구\nmethodology: 혼합 방법론\ndata_type: 다중 모달 데이터\nsample: 명시되지 않음\ncontext: AI 기반 교육 플랫폼\ntheoretical_framework: 적응 학습 이론\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\nPAL(개인 맞춤형 학습자)는 AI 기반 플랫폼으로, 강의 비디오를 상호작용 학습 경험으로 변환한다. PAL은 다중 모달 강의 내용을 지속적으로 분석하고, 학습자의 반응에 따라 다양한 난이도의 질문을 동적으로 제시한다. 세션 종료 시, PAL은 주요 개념을 강화하고 학습자의 관심사에 맞춘 예제를 포함한 개인화된 요약을 생성한다. 이 연구는 AI가 정적 개인화에서 벗어나 실시간으로 개인화된 지원을 제공할 수 있는 방법을 제시하며, AI 기반 교육의 핵심 과제를 해결하는 데 기여한다.\n\n# Research Logic\n## Problem\n기존 AI 교육 플랫폼은 정적 적응에 한정되어 있어 학습자의 변화하는 이해에 실시간으로 대응하지 못한다.\n## Theory\nPAL은 적응 학습 이론에 기반하여 학습자의 성과에 맞춰 콘텐츠를 실시간으로 조정한다.\n## Design\nPAL은 강의 비디오를 분석하고, 질문 생성 및 난이도 조정을 위한 하이브리드 강화 학습 알고리즘을 사용한다.\n## Findings\nPAL은 학습자의 반응에 따라 질문의 난이도를 조정하고, 세션 종료 후 개인화된 요약을 제공하여 학습 효과를 높인다.\n## Conclusion\nAI는 정적 개인화에서 벗어나 실시간으로 개인화된 학습 지원을 제공할 수 있으며, 이는 AI 기반 교육의 주요 도전 과제를 해결하는 데 기여한다.\n\n# Key Findings\n- PAL은 강의 비디오를 분석하여 실시간으로 적응하는 질문을 생성한다.\n- 하이브리드 강화 학습 알고리즘을 통해 질문의 난이도를 동적으로 조정한다.\n- 세션 종료 시 개인화된 요약을 제공하여 학습자의 이해를 강화한다.\n\n# Contributions\n## Theoretical\nAI 기반 교육에서의 개인화 및 적응 학습 이론에 대한 새로운 통찰을 제공한다.\n## Methodological\n다중 모달 데이터 분석 및 하이브리드 강화 학습 알고리즘을 활용한 새로운 연구 방법론을 제시한다.\n## Practical\n실시간으로 학습자의 필요에 맞춘 교육 지원을 제공하는 플랫폼을 개발한다.\n\n# Limitations\n- 샘플 크기 및 데이터의 다양성이 명시되지 않음.\n- 실험적 검증이 제한적일 수 있음.\n\n# Transferable Insights\n- AI 기반 교육 플랫폼의 실시간 적응 가능성은 학습자의 참여도를 높일 수 있다.\n- 개인화된 학습 경험은 학습자의 동기 부여 및 이해도를 향상시킬 수 있다.\n\n# Idea Seeds\n1. PAL의 알고리즘을 다른 교육 콘텐츠에 적용하여 효과를 비교할 수 있다.\n2. 협동 학습 환경에서 PAL의 적용 가능성을 탐색할 수 있다.\n3. PAL의 피드백 루프를 확장하여 학습자의 지속적인 개선을 지원할 수 있다.\n\n# Citation Snippets\n> Chakraborty, M., Eswaramoorthi, D. L., Thareja, M., Shah, H. R., Palmer, F., Bahl, A., Ihetu, M. A., & Sheth, A. (2026). PAL: Personal Adaptive Learner. arXiv. https://arxiv.org/abs/2604.13017v1\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy\n\n---\n\n요약: PAL은 AI 기반의 개인 맞춤형 학습 플랫폼으로, 강의 비디오를 분석하여 실시간으로 학습자의 반응에 맞춘 질문을 생성하고, 세션 종료 후 개인화된 요약을 제공한다. 이 연구는 AI가 정적 개인화에서 벗어나 실시간 지원을 제공할 수 있는 방법을 제시하며, 교육의 핵심 과제를 해결하는 데 기여한다.", "link": "https://arxiv.org/abs/2604.13017v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Megha Chakraborty", "Darssan L. Eswaramoorthi", "Madhur Thareja"], "categories": ["cs.AI", "cs.HC"]}, {"id": "1", "source": "ARXIV", "score": 8, "day": "2026-04-13", "title": "Towards Platonic Representation for Table Reasoning: A Foundation for Permutation-Invariant Retrieval", "content": "---\ntitle: Towards Platonic Representation for Table Reasoning: A Foundation for Permutation-Invariant Retrieval\nauthors: [Willy Carlos Tchuitcheu, Tan Lu, Ann Dooms]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2604.12133v1\nresearch_type: 이론적 연구\nmethodology: 회고적 분석 및 실험적 방법론\ndata_type: 테이블 데이터\nsample: 명시되지 않음\ncontext: 테이블 표현 학습 및 정보 검색\ntheoretical_framework: 플라톤적 표현 가설\nkeywords: [Table Representation Learning, Permutation Invariance, Platonic Representation Hypothesis, Evaluation Metrics, Semantic Drift, Table Reasoning, Information Retrieval]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 테이블 표현 학습(Table Representation Learning, TRL)의 기존 접근 방식이 자연어 처리(NLP)의 순차적 패러다임을 채택하고 있으며, 이로 인해 테이블의 기하학적 및 관계적 구조가 손실된다는 점을 지적한다. 연구자들은 플라톤적 표현 가설(Platonic Representation Hypothesis, PRH)을 제안하며, 이는 테이블 추론을 위한 의미적으로 강력한 잠재 공간이 본질적으로 순열 불변(Permutation Invariant, PI)해야 한다고 주장한다. 이를 입증하기 위해, 연구진은 테이블 추론 작업에 대한 회고적 분석을 수행하고, 두 가지 원칙적인 메트릭을 도입하여 구조적 무결성을 진단하는 프레임워크를 제안한다. 실험 결과, 현대의 대형 언어 모델(LLMs)에서 테이블 임베딩이 레이아웃의 작은 변화에 대해 상당한 의미적 변화를 겪는다는 점을 확인하였다. 마지막으로, 연구진은 구조 인식을 강화한 TRL 인코더 아키텍처를 제안하며, 이는 플라톤적 이상에 가까운 기하학적 안정성을 보여준다.\n\n# Research Logic\n## Problem\n기존 테이블 표현 방식이 테이블의 구조적 특성을 손실하고 있음.\n## Theory\n플라톤적 표현 가설(PRH)은 테이블 추론을 위한 의미적으로 안정적인 잠재 공간이 순열 불변이어야 한다고 주장.\n## Design\n회고적 분석과 실험적 방법론을 통해 테이블 임베딩의 구조적 무결성을 평가.\n## Findings\n현대 LLMs는 테이블 레이아웃의 작은 변화에 대해 의미적 변화를 겪으며, 이는 정보 검색 시스템의 취약성을 드러냄.\n## Conclusion\n구조 인식을 강화한 TRL 인코더가 테이블 추론의 새로운 방향을 제시할 수 있음.\n\n# Key Findings\n- 테이블의 순열 불변성(PI)이 테이블 추론에 필수적임.\n- 현대 LLMs는 테이블 임베딩에서 구조적 무결성을 유지하지 못함.\n- 제안된 TRL 인코더는 기하학적 안정성을 향상시킴.\n\n# Contributions\n## Theoretical\n플라톤적 표현 가설을 통해 테이블 표현 학습의 이론적 기초를 제공.\n## Methodological\n구조적 무결성을 평가하기 위한 새로운 메트릭을 제안.\n## Practical\n정보 검색 시스템에서 테이블 임베딩의 안정성을 향상시킬 수 있는 방법론 제시.\n\n# Limitations\n- 실험 샘플의 구체적인 수치가 명시되지 않음.\n- 특정 테이블 구조에 대한 일반화 가능성에 대한 논의가 부족함.\n\n# Transferable Insights\n- 테이블 표현의 구조적 특성을 유지하는 것이 정보 검색의 성능을 향상시킬 수 있음.\n- 플라톤적 표현 가설은 다양한 데이터 구조에 적용 가능할 수 있음.\n\n# Idea Seeds\n1. 테이블 임베딩의 구조적 무결성을 평가하기 위한 새로운 메트릭 개발.\n2. 다양한 데이터 유형에 대한 플라톤적 표현 가설의 적용 가능성 탐색.\n3. TRL 인코더의 성능을 개선하기 위한 추가적인 실험 설계.\n\n# Citation Snippets\n> Tchuitcheu, W. C., Lu, T., & Dooms, A. (2026). Towards Platonic Representation for Table Reasoning: A Foundation for Permutation-Invariant Retrieval. arXiv. https://arxiv.org/abs/2604.12133v1\n\ntags: #table_representation_learning, #permutation_invariance, #platonic_representation_hypothesis, #evaluation_metrics, #semantic_drift, #table_reasoning, #information_retrieval", "link": "https://arxiv.org/abs/2604.12133v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Willy Carlos Tchuitcheu", "Tan Lu", "Ann Dooms"], "categories": ["cs.AI"]}, {"id": "2", "source": "ARXIV", "score": 8, "day": "2026-04-13", "title": "Three Roles, One Model: Role Orchestration at Inference Time to Close the Performance Gap Between Small and Large Agents", "content": "---\ntitle: Three Roles, One Model: Role Orchestration at Inference Time to Close the Performance Gap Between Small and Large Agents\nauthors: [S. Aaron McClendon, Jorge Gallego-Feliciano, Stavros Zervoudakis, Antonios Saravanos]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2604.11465v2\nresearch_type: 실험적 연구\nmethodology: 세 가지 역할의 추론 시간 스캐폴딩 파이프라인 설계 및 평가\ndata_type: 성능 평가 데이터\nsample: Qwen3-8B 모델\ncontext: AppWorld 벤치마크\ntheoretical_framework: 추론 시간 구조의 효과\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n이 연구는 대형 언어 모델(LLM) 에이전트의 성능 격차를 줄이기 위해 작은 모델의 추론 시간 스캐폴딩을 평가한다. Qwen3-8B 모델을 AppWorld 벤치마크에서 평가한 결과, 기본 모델은 FP16에서 5.4%, AWQ에서 3.0%의 작업 목표 달성률을 보였다. 그러나 세 가지 역할을 가진 스캐폴딩 파이프라인을 적용한 후 FP16에서 8.9%, AWQ에서 5.9%로 성능이 향상되었다. 특히 난이도 1 작업에서 두 배 이상의 성능 향상이 나타났다. 이 연구는 작은 모델이 구조화된 추론 시간 개입을 통해 대형 모델과 경쟁할 수 있음을 보여준다.\n\n# Research Logic\n## Problem\n작은 모델이 복잡한 다단계 환경에서 성능을 발휘하지 못하는 문제.\n## Theory\n추론 시간 스캐폴딩이 작은 모델의 성능을 향상시킬 수 있다는 이론.\n## Design\n세 가지 역할(요약 모델, 주 에이전트 모델, 수정 모델)을 가진 스캐폴딩 파이프라인 설계.\n## Findings\n스캐폴딩을 통해 성능이 FP16에서 5.4%에서 8.9%로, AWQ에서 3.0%에서 5.9%로 증가.\n## Conclusion\n구조화된 추론 시간 개입이 작은 모델을 대형 모델과 경쟁 가능하게 만든다는 결론.\n\n# Key Findings\n- 스캐폴딩을 통해 FP16에서 8.9%, AWQ에서 5.9%의 작업 목표 달성률을 기록.\n- 난이도 1 작업에서 성능이 FP16에서 15.8%에서 26.3%로 증가.\n- 스캐폴딩된 8B 모델이 DeepSeek-Coder 33B Instruct(7.1%)를 초과하는 성과를 보임.\n\n# Contributions\n## Theoretical\n작은 모델의 실패 모드를 실증적으로 분석하고, 추론 시간 구조의 중요성을 강조.\n## Methodological\n추론 시간 스캐폴딩을 위한 진단 중심 설계 방법론 제시.\n## Practical\n소비자 등급 하드웨어에서 작은 모델의 성능을 실질적으로 향상시키는 방법 제공.\n\n# Limitations\n- 통계적으로 유의미한 차이가 발견되지 않음.\n- 모델의 크기와 성능 간의 관계를 완전히 설명하지 못함.\n\n# Transferable Insights\n- 작은 모델의 성능 향상을 위한 추론 시간 개입의 가능성.\n- 구조화된 추론 시간 접근 방식이 다양한 환경에 적용될 수 있음.\n\n# Idea Seeds\n1. 다양한 스캐폴딩 전략을 적용한 다른 모델의 성능 비교 연구.\n2. 교육 환경에서 AI 모델의 역할을 확장하는 방법 탐색.\n3. 추론 시간 스캐폴딩의 효과를 다른 벤치마크에 적용해 보는 연구.\n\n# Citation Snippets\n> McClendon, S. A., Gallego-Feliciano, J., Zervoudakis, S., & Saravanos, A. (2026). Three Roles, One Model: Role Orchestration at Inference Time to Close the Performance Gap Between Small and Large Agents. arXiv. https://arxiv.org/abs/2604.11465v2\n\ntags: #human-ai collaboration, #ai tutoring, #instructional design, #scaffolding, #ai literacy, #education, #learning analytics\n\n---\n\n짧은 요약: 이 연구는 작은 모델의 성능을 향상시키기 위한 추론 시간 스캐폴딩을 평가하였다. Qwen3-8B 모델을 AppWorld 벤치마크에서 테스트한 결과, 스캐폴딩을 통해 FP16에서 8.9%, AWQ에서 5.9%의 작업 목표 달성률을 기록하며 성능이 두 배 이상 향상되었다. 이 연구는 작은 모델이 구조화된 개입을 통해 대형 모델과 경쟁할 수 있음을 보여준다.", "link": "https://arxiv.org/abs/2604.11465v2", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["S. Aaron McClendon", "Jorge Gallego-Feliciano", "Stavros Zervoudakis"], "categories": ["cs.AI"]}, {"id": "3", "source": "ARXIV", "score": 8, "day": "2026-04-08", "title": "EmoMAS: Emotion-Aware Multi-Agent System for High-Stakes Edge-Deployable Negotiation with Bayesian Orchestration", "content": "---\ntitle: EmoMAS: Emotion-Aware Multi-Agent System for High-Stakes Edge-Deployable Negotiation with Bayesian Orchestration\nauthors: [Yunbo Long, Yuhan Liu, Liming Xu]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2604.07003v2\nresearch_type: 이론적 연구\nmethodology: 베이지안 다중 에이전트 시스템\ndata_type: 시뮬레이션 데이터\nsample: 다양한 고위험 협상 시나리오\ncontext: 부채, 의료, 긴급 대응, 교육 분야\ntheoretical_framework: 베이지안 최적화\nkeywords: [emotion-aware, multi-agent system, negotiation, Bayesian orchestration, emotional intelligence, edge deployment, small language models, large language models]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 고위험 협상에서 감정 인식을 고려한 다중 에이전트 시스템인 EmoMAS를 제안한다. EmoMAS는 베이지안 오케스트레이터를 활용하여 게임 이론, 강화 학습, 심리적 일관성 모델을 조정하며, 실시간으로 감정 상태 전환을 최적화한다. 이 시스템은 부채, 의료, 긴급 대응 및 교육 분야의 네 가지 협상 벤치마크에서 성능을 평가하였으며, EmoMAS를 장착한 SLM과 LLM이 모든 기준 모델을 초과하는 성과를 보였다. 연구 결과는 전략적 감정 지능이 협상 성공의 핵심 요소임을 입증하였다.\n\n# Research Logic\n## Problem\n고위험 협상에서 감정의 복잡한 역학을 처리할 수 있는 경량 모델의 필요성.\n## Theory\n베이지안 최적화 프레임워크를 통한 감정 표현의 전략적 변수화.\n## Design\n세 가지 전문 에이전트(게임 이론, 강화 학습, 심리적 일관성 모델)를 조정하는 베이지안 오케스트레이터 설계.\n## Findings\nEmoMAS는 모든 벤치마크에서 기준 모델을 초과하는 성과를 달성하며, 전략적 감정 지능이 협상 성공에 기여함을 보여줌.\n## Conclusion\nEmoMAS는 고위험 환경에서 효과적이고 적응 가능한 협상 AI의 새로운 패러다임을 제시함.\n\n# Key Findings\n- EmoMAS는 고위험 협상에서 감정 상태 전환을 최적화함.\n- SLM과 LLM 모두 EmoMAS를 통해 기준 모델을 초과하는 성과를 보임.\n- 전략적 감정 지능이 협상 성공의 주요 요인임을 입증함.\n\n# Contributions\n## Theoretical\n감정 표현을 전략적 변수로 다루는 새로운 이론적 프레임워크 제시.\n## Methodological\n베이지안 다중 에이전트 시스템을 통한 실시간 학습 및 최적화 방법론 개발.\n## Practical\n고위험 환경에서의 협상 AI 적용 가능성을 높임.\n\n# Limitations\n- 특정 협상 시나리오에 대한 일반화의 한계.\n- 감정 인식의 정확성에 대한 의존성.\n\n# Transferable Insights\n- 감정 지능이 중요한 역할을 하는 다양한 협상 환경에 적용 가능.\n- 경량 모델의 활용이 데이터 프라이버시를 보장할 수 있음.\n\n# Idea Seeds\n1. EmoMAS의 감정 인식 기능을 교육 분야에 적용한 연구.\n2. 다양한 문화적 배경에서의 감정 인식 및 협상 전략 비교.\n3. EmoMAS를 활용한 실시간 협상 훈련 시스템 개발.\n\n# Citation Snippets\n> Long, Y., Liu, Y., & Xu, L. (2026). EmoMAS: Emotion-Aware Multi-Agent System for High-Stakes Edge-Deployable Negotiation with Bayesian Orchestration. arXiv. https://arxiv.org/abs/2604.07003v2\n\ntags: #감정인식, #다중에이전트시스템, #협상, #베이지안오케스트레이션, #감정지능, #엣지배포, #소형언어모델, #대형언어모델\n\n---\n\n요약: 본 연구는 EmoMAS라는 감정 인식 기반의 다중 에이전트 시스템을 제안하며, 고위험 협상에서의 성과를 향상시키기 위한 방법론을 제시한다. EmoMAS는 다양한 협상 시나리오에서 감정 상태 전환을 최적화하여 협상 성공에 기여하는 전략적 감정 지능의 중요성을 입증하였다.", "link": "https://arxiv.org/abs/2604.07003v2", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Yunbo Long", "Yuhan Liu", "Liming Xu"], "categories": ["cs.AI"]}, {"id": "4", "source": "ARXIV", "score": 6, "day": "2026-04-16", "title": "Blinded Multi-Rater Comparative Evaluation of a Large Language Model and Clinician-Authored Responses in CGM-Informed Diabetes Counseling", "content": "---\ntitle: Blinded Multi-Rater Comparative Evaluation of a Large Language Model and Clinician-Authored Responses in CGM-Informed Diabetes Counseling\nauthors: [Zhijun Guo, Alvina Lai, Emmanouil Korakas, Aristeidis Vagenas, Irshad Ahamed, Christo Albor, Hengrui Zhang, Justin Healy, Kezhi Li]\nyear: 2026\njournal: 명시되지 않음\ndoi: https://arxiv.org/abs/2604.15124v1\nresearch_type: 실험적 연구\nmethodology: 블라인드 다중 평가\ndata_type: CGM 데이터 및 임상 사례\nsample: 6명의 영국 당뇨병 전문가\ncontext: CGM 기반 당뇨 상담\ntheoretical_framework: 명시되지 않음\nkeywords: [continuous glucose monitoring, large language model, retrieval augmented generation, conversational agent, patient-facing AI, clinical evaluation, diabetes care]\n---\n\n# APA 7th style\n\n# Summary\n이 연구는 지속적인 혈당 모니터링(CGM) 데이터를 해석하고 당뇨 상담을 지원하기 위해 개발된 검색 기반 대화형 에이전트(CA)의 효과를 평가하였다. 6명의 영국 당뇨병 전문가가 CA가 생성한 응답과 임상의가 작성한 응답을 비교하여 품질을 평가하였다. 결과적으로 CA의 응답이 임상의의 응답보다 높은 품질 점수를 기록하였으며, 특히 공감과 실행 가능성에서 큰 차이를 보였다. 그러나 이 연구는 CA의 자율적인 치료 결정 지원 가능성을 입증하지 않으며, 실제 임상 환경에서의 검증이 필요하다.\n\n# Research Logic\n## Problem\nCGM 데이터 해석의 어려움과 당뇨 상담 시 환자 교육의 필요성.\n## Theory\n검색 기반 LLM 시스템이 CGM 데이터 해석에 효과적일 수 있다는 가정.\n## Design\n블라인드 다중 평가를 통해 CA와 임상의의 응답을 비교.\n## Findings\nCA의 응답이 임상의의 응답보다 평균적으로 높은 품질 점수를 기록함.\n## Conclusion\n검색 기반 LLM 시스템은 CGM 검토 및 환자 교육의 보조 도구로서 가치를 가질 수 있으나, 자율적인 치료 결정에는 적합하지 않음.\n\n# Key Findings\n- CA의 평균 품질 점수는 4.37로, 임상의의 3.58보다 높음 (P<.001).\n- 공감에서의 평균 차이는 1.062 (95% CI 0.948-1.177).\n- 실행 가능성에서의 평균 차이는 0.992 (95% CI 0.877-1.106).\n\n# Contributions\n## Theoretical\nLLM 기반 시스템의 효과에 대한 새로운 통찰 제공.\n## Methodological\n블라인드 다중 평가 방법론의 적용.\n## Practical\nCGM 데이터 해석을 위한 실용적인 도구로서의 가능성 제시.\n\n# Limitations\n- 연구는 제한된 데이터셋과 소규모 전문가 패널을 사용함.\n- 자율적인 치료 결정 지원 가능성을 입증하지 않음.\n\n# Transferable Insights\n- LLM 기반 도구가 환자 교육에 기여할 수 있는 가능성.\n- CGM 데이터 해석의 표준화된 접근 방식 필요성.\n\n# Idea Seeds\n1. LLM을 활용한 환자 맞춤형 교육 프로그램 개발.\n2. CGM 데이터 해석을 위한 추가적인 임상 연구 수행.\n3. LLM의 안전성과 효과성을 검증하기 위한 대규모 연구 필요.\n\n# Citation Snippets\n> Guo, Z., Lai, A., Korakas, E., Vagenas, A., Ahamed, I., Albor, C., Zhang, H., Healy, J., & Li, K. (2026). Blinded Multi-Rater Comparative Evaluation of a Large Language Model and Clinician-Authored Responses in CGM-Informed Diabetes Counseling. \n\ntags: #CGM, #LLM, #diabetes, #patientEducation, #clinicalEvaluation, #AI, #healthcare\n\n---\n\n요약: 이 연구는 CGM 데이터를 해석하기 위한 LLM 기반 대화형 에이전트의 효과를 평가하였다. 연구 결과, CA의 응답이 임상의의 응답보다 높은 품질 점수를 기록하였으나, 자율적인 치료 결정 지원에는 적합하지 않음을 밝혔다.", "link": "https://arxiv.org/abs/2604.15124v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Zhijun Guo", "Alvina Lai", "Emmanouil Korakas"], "categories": ["cs.CL"]}, {"id": "5", "source": "ARXIV", "score": 6, "day": "2026-04-15", "title": "Deployment of AI-Assisted Interventions: Capacity Constraints and Noisy Compliance", "content": "AI tools increasingly guide targeted interventions in healthcare, education, and recruiting. Algorithms score individuals, trigger outreach to those above a threshold (e.g., high-risk or high-value), and encourage them to request service; then providers deliver service to those who request. Standard practice sets the threshold and selects the algorithm to maximize predictive accuracy, assuming that better predictions yield better outcomes. We show that this approach is suboptimal when limited service capacity and probabilistic behavioral responses influence who receives service. In such settings, the optimal score threshold must balance two effects: ensuring all capacity is filled (utilization) and ensuring high-value individuals are served despite competition between requests (cannibalization). We characterize the optimal threshold and prove that policies based solely on predictive accuracy are generally suboptimal. Further, because optimal thresholds vary with service capacity, algorithm selection metrics like AUC, which weight all thresholds equally, are misaligned with operational performance. We introduce a new metric--Operational AUC (OpAUC)--and show it leads to optimal algorithm selection. Finally, we conduct a case study on sepsis early warning data and illustrate the magnitude of improvement that can be achieved from improved threshold and algorithm selection.", "link": "https://arxiv.org/abs/2604.14370v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Carri W. Chan", "Yi Han", "Hannah Li"], "categories": ["stat.ME", "cs.LG"]}, {"id": "6", "source": "ARXIV", "score": 6, "day": "2026-04-15", "title": "\"I'm Not Able to Be There for You\": Emotional Labour, Responsibility, and AI in Peer Support", "content": "Peer support is increasingly positioned as a scalable response to gaps in mental health care, particularly in digitally mediated settings, yet what counts as peer support and how responsibility is distributed remain unevenly defined in practice. Drawing on interviews with peer supporters, we show how lived experience, moral commitment, and self-identification shape participation while blurring expectations around scope, authority, and accountability. Institutional ambiguity concentrates emotional labour, boundary-setting, and escalation of responsibility at the individual level, often without consistent organisational scaffolding. Participants evaluated AI not primarily through empathy or technical capability, but through how technologies redistribute risk, labour, and accountability within already fragile support roles. Building on these findings, we outline design futures for an AI-supported peer support ecosystem that foregrounds responsibility as a central design concern rather than treating AI as a mechanism of scale.", "link": "https://arxiv.org/abs/2604.14007v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Kellie Yu Hui Sim", "Kenny Tsu Wei Choo"], "categories": ["cs.HC"]}, {"id": "7", "source": "ARXIV", "score": 6, "day": "2026-04-14", "title": "IDEA: An Interpretable and Editable Decision-Making Framework for LLMs via Verbal-to-Numeric Calibration", "content": "Large Language Models are increasingly deployed for decision-making, yet their adoption in high-stakes domains remains limited by miscalibrated probabilities, unfaithful explanations, and inability to incorporate expert knowledge precisely. We propose IDEA, a framework that extracts LLM decision knowledge into an interpretable parametric model over semantically meaningful factors. Through joint learning of verbal-to-numerical mappings and decision parameters via EM, correlated sampling that preserves factor dependencies, and direct parameter editing with mathematical guarantees, IDEA produces calibrated probabilities while enabling quantitative human-AI collaboration. Experiments across five datasets show IDEA with Qwen-3-32B (78.6%) outperforms DeepSeek R1 (68.1%) and GPT-5.2 (77.9%), achieving perfect factor exclusion and exact calibration -- precision unattainable through prompting alone. The implementation is publicly available at https://github.com/leonbig/IDEA.", "link": "https://arxiv.org/abs/2604.12573v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Yanji He", "Yuxin Jiang", "Yiwen Wu"], "categories": ["cs.AI"]}, {"id": "8", "source": "ARXIV", "score": 6, "day": "2026-04-13", "title": "The A-R Behavioral Space: Execution-Level Profiling of Tool-Using Language Model Agents in Organizational Deployment", "content": "Large language models (LLMs) are increasingly deployed as tool-augmented agents capable of executing system-level operations. While existing benchmarks primarily assess textual alignment or task success, less attention has been paid to the structural relationship between linguistic signaling and executable behavior under varying autonomy scaffolds. This study introduces an execution-layer be-havioral measurement approach based on a two-dimensional A-R space defined by Action Rate (A) and Refusal Signal (R), with Divergence (D) capturing coor-dination between the two. Models are evaluated across four normative regimes (Control, Gray, Dilemma, and Malicious) and three autonomy configurations (di-rect execution, planning, and reflection). Rather than assigning aggregate safety scores, the method characterizes how execution and refusal redistribute across contextual framing and scaffold depth. Empirical results show that execution and refusal constitute separable behavioral dimensions whose joint distribution varies systematically across regimes and autonomy levels. Reflection-based scaffolding often shifts configurations toward higher refusal in risk-laden contexts, but redis-tribution patterns differ structurally across models. The A-R representation makes cross-sectional behavioral profiles, scaffold-induced transitions, and coordination variability directly observable. By foregrounding execution-layer characterization over scalar ranking, this work provides a deployment-oriented lens for analyzing and selecting tool-enabled LLM agents in organizational settings where execution privileges and risk tolerance vary.", "link": "https://arxiv.org/abs/2604.12116v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Shasha Yu", "Fiona Carroll", "Barry L. Bentley"], "categories": ["cs.AI", "cs.SE"]}, {"id": "9", "source": "ARXIV", "score": 6, "day": "2026-04-13", "title": "AI Integrity: A New Paradigm for Verifiable AI Governance", "content": "AI systems increasingly shape high-stakes decisions in healthcare, law, defense, and education, yet existing governance paradigms -- AI Ethics, AI Safety, and AI Alignment -- share a common limitation: they evaluate outcomes rather than verifying the reasoning process itself. This paper introduces AI Integrity, a concept defined as a state in which the Authority Stack of an AI system -- its layered hierarchy of values, epistemological standards, source preferences, and data selection criteria -- is protected from corruption, contamination, manipulation, and bias, and maintained in a verifiable manner. We distinguish AI Integrity from the three existing paradigms, define the Authority Stack as a 4-layer cascade model (Normative, Epistemic, Source, and Data Authority) grounded in established academic frameworks -- Schwartz Basic Human Values for normative authority, Walton argumentation schemes with GRADE/CEBM hierarchies for epistemic authority, and Source Credibility Theory for source authority -- characterize the distinction between legitimate cascading and Authority Pollution, and identify Integrity Hallucination as the central measurable threat to value consistency. We further specify the PRISM (Profile-based Reasoning Integrity Stack Measurement) framework as the operational methodology, defining six core metrics and a phased research roadmap. Unlike normative frameworks that prescribe which values are correct, AI Integrity is a procedural concept: it requires that the path from evidence to conclusion be transparent and auditable, regardless of which values a system holds.", "link": "https://arxiv.org/abs/2604.11065v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Seulki Lee"], "categories": ["cs.AI"]}];
let PAGE_SIZE = 10;
let currentTab = 'all';
let currentSource = 'ALL';
let currentSort = 'score';

let currentCategory = '';
let currentMinDate = '';
let currentMaxDate = '';
let hideVisited = false;
let filtered = [];
let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
let searchHistory = JSON.parse(localStorage.getItem('searchHistory')) || [];
let visited = JSON.parse(localStorage.getItem('visited')) || [];

function toggleTheme() {
  const html = document.documentElement;
  const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
  html.dataset.theme = next;
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  localStorage.setItem('theme', next);
}

function toggleTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSource(btn) {
  currentSource = btn.dataset.source;
  document.querySelectorAll('#sourceFilters .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSort(btn) {
  currentSort = btn.dataset.sort;
  document.querySelectorAll('#sortGroup .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  render();
}

function toggleFavorite(id, e) {
  e.stopPropagation();
  const idx = favorites.indexOf(id);
  if (idx === -1) {
    favorites.push(id);
  } else {
    favorites.splice(idx, 1);
  }
  localStorage.setItem('favorites', JSON.stringify(favorites));
  applyFilters();
}

function recordVisit(id) {
  if (!visited.includes(id)) {
    visited.push(id);
  }
  localStorage.setItem('visited', JSON.stringify(visited));
}

function recordSearch(query) {
  if (query.trim() && !searchHistory.includes(query)) {
    searchHistory.unshift(query);
    if (searchHistory.length > 10) searchHistory.pop();
    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
  }
}

function downloadJSON() {
  const data = JSON.stringify(filtered, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadCSV() {
  const headers = ['제목', '출처', '스코어', '리뷰여부', '링크'];
  const rows = filtered.map(p => [
    '"' + p.title.replace(/"/g, '""') + '"',

    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
