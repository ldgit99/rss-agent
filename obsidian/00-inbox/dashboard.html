<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-04-23 23:43</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "ARXIV", "score": 15, "day": "2026-04-21", "title": "Hint-Writing with Deferred AI Assistance: Fostering Critical Engagement in Data Science Education", "content": "---\ntitle: Hint-Writing with Deferred AI Assistance: Fostering Critical Engagement in Data Science Education\nauthors: [Anjali Singh, Christopher Brooks, Warren Li, Juho Kim, Xu Wang]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2604.19931v1\nresearch_type: 실험 연구\nmethodology: 무작위 대조 실험\ndata_type: 정량적 데이터\nsample: 대학원생 97명\ncontext: 데이터 과학 교육\ntheoretical_framework: 메타인지, 인공지능 지원 학습\nkeywords: [hint writing, deferred AI assistance, data science education]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 데이터 과학 교육에서 개인화되고 확장 가능한 힌트 작성 활동을 위한 세 가지 디자인을 조사하였다. 연구 결과, AI 지원을 지연시키는 방식이 가장 높은 품질의 힌트를 생성하는 것으로 나타났다. 학생들은 이 디자인을 통해 스스로 식별하기 어려운 다양한 오류를 발견할 수 있었으며, AI 출력과 비판적으로 상호작용하는 기회를 가졌다. 이러한 결과는 학생-AI 협력 학습 경험을 설계할 때 학생의 참여를 유지하고 적절한 인지 부담을 유지하는 데 중요한 고려사항을 강조한다.\n\n# Research Logic\n## Problem\nAI의 사용이 증가함에 따라 학생들이 AI에 의존하게 되는 문제를 해결할 필요성이 대두됨.\n## Theory\n메타인지와 AI 지원 학습의 이론적 틀을 바탕으로, AI 지원이 학습 과정에 미치는 영향을 분석.\n## Design\n세 가지 힌트 작성 디자인(기본, AI 지원, 지연 AI 지원)을 비교하는 무작위 대조 실험 실시.\n## Findings\n지연 AI 지원이 가장 높은 품질의 힌트를 생성하며, 학생들이 오류를 더 잘 식별할 수 있도록 도움.\n## Conclusion\nAI 지원을 지연시키는 방식이 학생의 비판적 사고와 메타인지 능력을 향상시키는 데 효과적임을 확인.\n\n# Key Findings\n- 지연 AI 지원이 가장 높은 품질의 힌트를 생성함.\n- 학생들이 오류를 식별하는 데 있어 지연 AI 지원이 효과적임.\n- 학생들은 AI 출력과의 비판적 상호작용을 통해 디버깅 기술을 연습할 수 있었음.\n\n# Contributions\n## Theoretical\nAI와 메타인지 이론을 통합하여 학생-AI 협력 학습의 중요성을 강조.\n## Methodological\n무작위 대조 실험을 통해 AI 지원의 효과를 실증적으로 검증.\n## Practical\nAI 지원 학습 경험 설계에 대한 실용적인 지침 제공.\n\n# Limitations\n- AI 출력의 부정확성과 중복성으로 인한 부정적인 영향이 완전히 상쇄되지 않음.\n- 연구 샘플이 특정 대학원생으로 제한되어 일반화에 한계가 있음.\n\n# Transferable Insights\n- AI 지원을 지연시키는 방식이 학생의 비판적 사고를 촉진할 수 있음.\n- 데이터 과학 교육에서 AI와의 비판적 상호작용을 통해 학습 효과를 높일 수 있는 방법 제시.\n\n# Idea Seeds\n1. 다양한 학습 환경에서 지연 AI 지원의 효과를 비교 연구.\n2. AI 지원 학습에서 메타인지 훈련 프로그램 개발.\n3. 학생-AI 협력 학습을 위한 새로운 인터페이스 디자인 연구.\n\n# Citation Snippets\n> Singh, A., Brooks, C., Li, W., Kim, J., & Wang, X. (2026). Hint-Writing with Deferred AI Assistance: Fostering Critical Engagement in Data Science Education. arXiv. https://arxiv.org/abs/2604.19931v1\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy\n\n---\n\n요약: 본 연구는 데이터 과학 교육에서 AI 지원을 지연시키는 방식이 학생의 힌트 작성 품질을 향상시키는지 조사하였다. 연구 결과, 지연 AI 지원이 학생들이 오류를 더 잘 식별하도록 도와주며, 비판적 사고와 메타인지 능력을 증진시키는 데 효과적임을 확인하였다.", "link": "https://arxiv.org/abs/2604.19931v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Anjali Singh", "Christopher Brooks", "Warren Li"], "categories": ["cs.HC"]}, {"id": "1", "source": "ARXIV", "score": 12, "day": "2026-04-21", "title": "Separable Pathways for Causal Reasoning: How Architectural Scaffolding Enables Hypothesis-Space Restructuring in LLM Agents", "content": "---\ntitle: Separable Pathways for Causal Reasoning: How Architectural Scaffolding Enables Hypothesis-Space Restructuring in LLM Agents\nauthors: [John Alderete, Sebastian Benthal, Connie Xu, John Xing]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2604.20039v1\nresearch_type: 실험적 연구\nmethodology: 실험적 설계\ndata_type: 실험 데이터\nsample: 1,085 실험 시도\ncontext: 인공지능 에이전트의 인과 추론 능력\ntheoretical_framework: 인과 모델링, 계층적 베이지안 추론\nkeywords: [인과 추론, AI 에이전트, 구조적 스캐폴딩, 가설 공간 재구성, LLM]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 인과 추론을 위한 구조적 스캐폴딩이 LLM 에이전트의 가설 공간 재구성을 어떻게 가능하게 하는지를 탐구한다. 연구팀은 1,085회의 실험을 통해 두 가지 구성 요소인 맥락 그래프와 동적 행동이 각각의 독립적인 기여를 한다는 것을 발견하였다. 맥락 그래프는 전환 후 가설 공간 내에서의 추론 품질을 향상시키며, 동적 행동은 현재 가설 공간이 부적절할 때 이를 감지하고 확장하는 역할을 한다. 이 연구는 AI 에이전트가 새로운 인과 구조를 발견하는 데 필요한 능력을 갖추도록 하는 방법론적 기초를 제공한다.\n\n# Research Logic\n## Problem\n현재 AI 에이전트는 고정된 프레임워크 내에서 신념을 업데이트할 수 있지만, 가설 공간 자체를 수정하는 능력이 부족하다.\n\n## Theory\n인간의 인과 모델링 능력을 AI에 적용하기 위해 계층적 베이지안 추론을 기반으로 한 구조적 스캐폴딩을 제안한다.\n\n## Design\n세 가지 에이전트를 사용하여 각기 다른 구조적 기능을 평가하는 계층적 설계를 채택하였다.\n\n## Findings\n맥락 그래프는 94%의 정확도 향상을 이끌어내며, 동적 행동은 가설 공간의 적합성을 감지하여 이를 확장한다.\n\n## Conclusion\n구조적 스캐폴딩은 LLM 에이전트의 인과 추론 능력을 향상시키는 데 중요한 역할을 한다.\n\n# Key Findings\n- 맥락 그래프는 전환 후 가설 공간 내에서의 추론 품질을 94% 향상시킨다.\n- 동적 행동은 가설 공간의 적합성을 감지하고 이를 확장하는 역할을 한다.\n- 두 구성 요소는 서로를 대체하지 않으며, 독립적으로 기여한다.\n\n# Contributions\n## Theoretical\n인과 추론의 구조적 스캐폴딩에 대한 새로운 이론적 기초를 제공한다.\n\n## Methodological\n가설 공간 재구성을 위한 실험적 설계를 제안한다.\n\n## Practical\nAI 에이전트의 인과 추론 능력을 향상시키기 위한 실용적인 방법론을 제시한다.\n\n# Limitations\n- 연구는 특정 실험 환경에 국한되어 있으며, 일반화 가능성에 대한 검증이 필요하다.\n- 동적 행동의 효과를 평가하기 위한 추가적인 실험이 요구된다.\n\n# Transferable Insights\n- AI 에이전트의 인과 추론 능력을 향상시키기 위한 구조적 접근법의 필요성을 강조한다.\n- 다양한 교육적 맥락에서 AI 활용을 위한 설계 원칙을 제시한다.\n\n# Idea Seeds\n1. AI 에이전트의 인과 추론 능력을 평가하기 위한 새로운 실험적 프레임워크 개발.\n2. 교육 현장에서의 AI 활용을 위한 구조적 스캐폴딩 모델 설계.\n3. 동적 행동을 통한 AI 에이전트의 적응 능력 향상 연구.\n\n# Citation Snippets\n> Alderete, J., Benthal, S., Xu, C., & Xing, J. (2026). Separable pathways for causal reasoning: How architectural scaffolding enables hypothesis-space restructuring in LLM agents. arXiv. https://arxiv.org/abs/2604.20039v1\n\ntags: #인과추론, #AI에이전트, #구조적스캐폴딩, #가설공간재구성, #LLM, #교육기술, #인공지능교육", "link": "https://arxiv.org/abs/2604.20039v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["John Alderete", "Sebastian Benthal", "Connie Xu"], "categories": ["cs.AI", "cs.LG"]}, {"id": "2", "source": "ARXIV", "score": 10, "day": "2026-04-13", "title": "RAG-KT: Cross-platform Explainable Knowledge Tracing with Multi-view Fusion Retrieval Generation", "content": "---\ntitle: RAG-KT: Cross-platform Explainable Knowledge Tracing with Multi-view Fusion Retrieval Generation\nauthors: [Zhiyi Duan, Hongyu Yuan, Rui Liu]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2604.10960v2\nresearch_type: 이론적 연구\nmethodology: 실험적 연구\ndata_type: 공공 데이터셋\nsample: 세 가지 공공 KT 벤치마크\ncontext: 교육 데이터 마이닝\ntheoretical_framework: 지식 추적(KT)\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구에서는 RAG-KT라는 새로운 지식 추적(KT) 패러다임을 제안한다. 기존의 딥러닝 기반 KT 모델은 플랫폼 특정 식별자와 잠재 표현에 의존하여 일반화 및 해석이 어려운 문제를 가지고 있다. RAG-KT는 다양한 플랫폼에서 수집된 교육 데이터를 통합하여 신뢰할 수 있는 맥락 제약 추론을 가능하게 하며, 다중 소스 구조적 맥락을 구축하여 각 예측에 대해 보완적인 정보를 검색한다. 실험 결과, RAG-KT는 정확성과 강건성에서 일관된 향상을 보여주며, 특히 크로스 플랫폼 조건에서 강력한 성능을 발휘한다.\n\n# Research Logic\n## Problem\n기존 KT 모델은 플랫폼 특정 식별자에 의존하여 일반화가 어렵고 해석 가능성이 낮다.\n## Theory\nRAG-KT는 다중 소스 지식 그래프와 구조적 검색을 통해 KT의 해석 가능성과 크로스 플랫폼 일반화를 개선한다.\n## Design\nRAG-KT는 다중 소스 지식 기반을 구축하고, 다중 뷰 검색 메커니즘을 통해 관련 맥락 정보를 검색한다.\n## Findings\nRAG-KT는 세 가지 공공 KT 벤치마크에서 정확성과 강건성을 일관되게 향상시켰다.\n## Conclusion\nRAG-KT는 기존 KT 방법의 한계를 극복하고, 해석 가능성과 크로스 플랫폼 일반화를 제공한다.\n\n# Key Findings\n- RAG-KT는 기존 KT 모델보다 높은 정확성을 보였다.\n- 다중 소스 구조적 맥락을 통해 해석 가능한 분석 보고서를 생성한다.\n- 크로스 플랫폼 조건에서도 강력한 성능을 유지한다.\n\n# Contributions\n## Theoretical\nKT의 해석 가능성과 크로스 플랫폼 일반화 문제를 해결하는 새로운 패러다임을 제안하였다.\n## Methodological\n다중 소스 지식 그래프와 다중 뷰 검색 메커니즘을 통해 KT의 성능을 향상시켰다.\n## Practical\n교육 데이터의 이질성을 고려한 KT 모델을 통해 실제 교육 환경에서의 적용 가능성을 높였다.\n\n# Limitations\n- 특정 플랫폼에 대한 의존성이 여전히 존재할 수 있다.\n- 데이터의 이질성으로 인해 예측 정확도가 제한될 수 있다.\n\n# Transferable Insights\n- 다양한 플랫폼에서의 교육 데이터를 통합하는 방법론은 다른 교육 기술 연구에 적용 가능하다.\n- KT의 해석 가능성을 높이는 접근법은 교육자에게 유용한 정보를 제공할 수 있다.\n\n# Idea Seeds\n1. RAG-KT의 구조적 검색 메커니즘을 다른 교육 기술 분야에 적용하기.\n2. 다양한 교육 플랫폼에서의 데이터 통합 방법론 개발.\n3. KT의 해석 가능성을 높이기 위한 추가적인 분석 도구 개발.\n\n# Citation Snippets\n> Duan, Z., Yuan, H., & Liu, R. (2026). RAG-KT: Cross-platform Explainable Knowledge Tracing with Multi-view Fusion Retrieval Generation. arXiv. https://arxiv.org/abs/2604.10960v2\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy\n\n---\n\n요약: 본 연구에서는 RAG-KT라는 새로운 지식 추적 패러다임을 제안하며, 기존 KT 모델의 한계를 극복하고 해석 가능성과 크로스 플랫폼 일반화를 제공한다. RAG-KT는 다중 소스 구조적 맥락을 통해 예측의 정확성과 강건성을 향상시키며, 교육 데이터의 이질성을 고려한 접근법을 통해 실제 교육 환경에서의 적용 가능성을 높인다.", "link": "https://arxiv.org/abs/2604.10960v2", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Zhiyi Duan", "Hongyu Yuan", "Rui Liu"], "categories": ["cs.AI"]}, {"id": "3", "source": "ARXIV", "score": 9, "day": "2026-04-21", "title": "Relationships Between Trust, Compliance, and Performance for Novice Programmers Using AI Code Generation", "content": "---\ntitle: Relationships Between Trust, Compliance, and Performance for Novice Programmers Using AI Code Generation\nauthors: [Nicholas Gardella, Matthew L. Bolton, Sara L. Riggs]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2604.18948v1\nresearch_type: 실증 연구\nmethodology: 혼합 방법\ndata_type: 주관적 및 객관적 데이터\nsample: 27명의 초보 프로그래머\ncontext: 인공지능 기반 개발 환경(AIDE)에서의 프로그래밍\ntheoretical_framework: 신뢰, 준수, 성과 간의 순환 관계\nkeywords: [인공지능, 신뢰, 준수, 프로그래밍, 인간-자동화 상호작용]\n---\n\n# APA 7th style\n\n# Summary\n이 연구는 초보 프로그래머가 인공지능 기반 개발 환경(AIDE)에 대한 신뢰가 코딩 성과 및 AI 준수와 어떻게 관련되는지를 탐구하였다. 27명의 초보 프로그래머를 대상으로 한 결과, 신뢰와 준수 간의 관계는 발견되지 않았으나, 준수는 성과와 긍정적인 상관관계를 보였고, 성과는 이후 신뢰를 증가시키는 것으로 나타났다. 이러한 결과는 AIDE와의 상호작용에서 신뢰의 유용성에 대한 새로운 질문을 제기하며, 불완전한 AI의 권고에 대한 준수에 대한 신뢰의 영향을 추가 연구할 필요성을 강조한다.\n\n# Research Logic\n## Problem\n초보 프로그래머가 AIDE와 상호작용할 때 신뢰가 준수 및 성과에 미치는 영향을 이해하는 것이 필요하다.\n\n## Theory\n신뢰, 준수, 성과 간의 순환 관계를 기반으로 하여, 신뢰가 준수에 영향을 미치고 준수가 성과에 영향을 미친다는 이론적 모델을 검토하였다.\n\n## Design\n27명의 초보 프로그래머를 대상으로 주관적 신뢰 측정과 객관적 성과 및 AIDE 준수 측정을 실시하였다.\n\n## Findings\n신뢰와 준수 간의 관계는 발견되지 않았으나, 준수는 성과와 강한 상관관계를 보였고, 성과는 이후 신뢰를 증가시켰다.\n\n## Conclusion\n신뢰의 유용성에 대한 새로운 질문을 제기하며, AIDE와의 상호작용에서 신뢰가 준수에 미치는 영향을 추가 연구할 필요가 있다.\n\n# Key Findings\n- 신뢰와 준수 간의 관계는 발견되지 않음.\n- 준수는 성과와 긍정적인 상관관계를 가짐.\n- 성과는 이후 신뢰를 증가시킴.\n\n# Contributions\n## Theoretical\n신뢰, 준수, 성과 간의 관계에 대한 새로운 통찰을 제공함.\n\n## Methodological\n혼합 방법을 사용하여 신뢰와 성과 간의 관계를 측정하는 새로운 접근법을 제시함.\n\n## Practical\nAI 사용 교육 및 훈련 콘텐츠 설계에 대한 실질적인 지침을 제공함.\n\n# Limitations\n- 샘플 크기가 작아 일반화에 제한이 있음.\n- 연구 환경이 특정 AIDE에 국한되어 있음.\n\n# Transferable Insights\n- 신뢰가 반드시 준수로 이어지지 않음을 인식해야 함.\n- 성과 향상을 위해 신뢰를 관리하는 방법에 대한 추가 연구 필요.\n\n# Idea Seeds\n1. AIDE와의 상호작용에서 신뢰를 높이기 위한 교육 프로그램 개발.\n2. 신뢰와 준수 간의 관계를 탐구하는 추가 연구 설계.\n3. 다양한 프로그래밍 환경에서의 AIDE 효과 분석.\n\n# Citation Snippets\n> Gardella, N., Bolton, M. L., & Riggs, S. L. (2026). Relationships Between Trust, Compliance, and Performance for Novice Programmers Using AI Code Generation. arXiv. https://arxiv.org/abs/2604.18948v1\n\ntags: #인공지능, #신뢰, #프로그래밍, #교육, #AI, #자동화, #학습분석\n\n---\n\n요약: 이 연구는 초보 프로그래머가 인공지능 기반 개발 환경(AIDE)에 대한 신뢰가 코딩 성과 및 AI 준수와 어떻게 관련되는지를 탐구하였다. 신뢰와 준수 간의 관계는 발견되지 않았으나, 준수는 성과와 긍정적인 상관관계를 보였고, 성과는 이후 신뢰를 증가시키는 것으로 나타났다. 이러한 결과는 AIDE와의 상호작용에서 신뢰의 유용성에 대한 새로운 질문을 제기한다.", "link": "https://arxiv.org/abs/2604.18948v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Nicholas Gardella", "Matthew L. Bolton", "Sara L. Riggs"], "categories": ["cs.HC"]}, {"id": "4", "source": "ARXIV", "score": 8, "day": "2026-04-19", "title": "Unveiling Deepfakes: A Frequency-Aware Triple Branch Network for Deepfake Detection", "content": "---\ntitle: Unveiling Deepfakes: A Frequency-Aware Triple Branch Network for Deepfake Detection\nauthors: [Qihao Shen, Jiaxing Xuan, Zhenguang Liu, Sifan Wu, Yutong Xie, Zhaoyan Ming, Yingying Jiao, kui Ren]\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2604.17477v1\nresearch_type: 실험적 연구\nmethodology: 실험적 방법론\ndata_type: 대규모 벤치마크 데이터셋\nsample: 6개의 대규모 데이터셋\ncontext: 딥페이크 탐지\ntheoretical_framework: 상호 정보 이론\nkeywords: [deepfake detection, multimedia security, image forensics, trustworthy AI]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 딥페이크 탐지를 위한 새로운 접근법으로, 주파수 인식 삼중 분기 네트워크를 제안한다. 기존의 방법들이 특정 주파수 영역에 집중함으로써 발생하는 과적합 문제를 해결하기 위해, 원본 이미지와 다양한 주파수 채널로 재구성된 이미지를 동시에 학습하여 공간적 및 주파수적 특징을 포착한다. 연구 결과, 제안된 방법이 6개의 대규모 벤치마크 데이터셋에서 기존 방법들보다 우수한 성능을 보임을 확인하였다. 이 연구는 딥페이크 탐지의 복잡성을 해결하기 위한 새로운 방향을 제시한다.\n\n# Research Logic\n## Problem\n딥페이크 기술의 발전으로 인해 진짜와 가짜의 경계가 모호해지고 있으며, 이는 신원 도용 및 잘못된 정보 유포와 같은 심각한 사회적 문제를 야기하고 있다.\n\n## Theory\n본 연구는 상호 정보 이론에 기반하여 특징 분리 및 융합 손실을 수학적으로 도출하여, 원본 이미지와 주파수 채널에서 학습된 특징들이 서로 보완적이도록 유도한다.\n\n## Design\n삼중 분기 네트워크를 설계하여 공간적 및 주파수적 특징을 동시에 캡처하고, 동적 주파수 채널 선택 모듈을 통해 중요한 주파수 채널을 선택한다.\n\n## Findings\n제안된 방법은 6개의 대규모 데이터셋에서 기존의 방법들보다 일관되게 우수한 성능을 달성하였다.\n\n## Conclusion\n본 연구는 딥페이크 탐지의 효과성을 높이기 위한 새로운 방법론을 제시하며, 향후 연구에 기여할 수 있는 기초 자료를 제공한다.\n\n# Key Findings\n- 제안된 삼중 분기 네트워크는 공간적 및 주파수적 특징을 동시에 학습하여 딥페이크 탐지의 정확성을 향상시킨다.\n- 동적 주파수 채널 선택 모듈을 통해 중요한 주파수 정보를 효과적으로 활용한다.\n- 6개의 대규모 데이터셋에서 기존 방법들보다 우수한 성능을 기록하였다.\n\n# Contributions\n## Theoretical\n상호 정보 이론을 기반으로 한 특징 분리 및 융합 손실의 수학적 도출.\n\n## Methodological\n삼중 분기 네트워크 설계를 통해 공간적 및 주파수적 특징을 통합적으로 학습하는 방법론 제시.\n\n## Practical\n딥페이크 탐지의 정확성을 높이는 실용적인 접근법 제공.\n\n# Limitations\n- 특정 데이터셋에 대한 성능 평가에 국한되어 있어, 일반화 가능성에 대한 추가 연구가 필요하다.\n- 다양한 딥페이크 생성 기술에 대한 포괄적인 대응이 필요하다.\n\n# Transferable Insights\n- 주파수 도메인 분석의 중요성을 강조하며, 다양한 주파수 채널을 활용한 탐지 방법론의 필요성을 제시한다.\n- 딥페이크 탐지의 복잡성을 해결하기 위한 다각적인 접근법의 필요성을 강조한다.\n\n# Idea Seeds\n1. 다양한 주파수 채널을 활용한 딥페이크 탐지 기술의 발전 방향.\n2. 상호 정보 이론을 활용한 다른 이미지 처리 분야의 응용 가능성.\n3. 딥페이크 탐지 기술의 실시간 적용 가능성에 대한 연구.\n\n# Citation Snippets\n> Shen, Q., Xuan, J., Liu, Z., Wu, S., Xie, Y., Ming, Z., Jiao, Y., & Ren, K. (2026). Unveiling Deepfakes: A Frequency-Aware Triple Branch Network for Deepfake Detection. arXiv. https://arxiv.org/abs/2604.17477v1\n\ntags: #deepfake, #detection, #multimedia_security, #image_forensics, #trustworthy_AI, #frequency_analysis, #machine_learning", "link": "https://arxiv.org/abs/2604.17477v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Qihao Shen", "Jiaxing Xuan", "Zhenguang Liu"], "categories": ["cs.CV", "cs.LG"]}, {"id": "5", "source": "ARXIV", "score": 8, "day": "2026-04-18", "title": "DART: Mitigating Harm Drift in Difference-Aware LLMs via Distill-Audit-Repair Training", "content": "Large language models (LLMs) tuned for safety often avoid acknowledging demographic differences, even when such acknowledgment is factually correct (e.g., ancestry-based disease incidence) or contextually justified (e.g., religious hiring preferences). This identity-blindness yields incorrect responses, unnecessary refusals, or generic \"equal-treatment\" defaults. We study this via difference-awareness classification: given a question involving demographic groups, the task is not to answer directly, but to classify whether a correct answer requires recognizing group differences (yes) or whether groups should be treated identically (no). Crucially, fine-tuning for accuracy triggers harm drift: model-generated explanations become increasingly harmful as decision accuracy improves, whether by elaborating harmful content, introducing problematic assumptions, or failing to flag harms the baseline identified. To mitigate this, we introduce DART (Distill--Audit--Repair Training), which distills label-conditioned reasoning from a teacher, audits outputs for harm drift cases relative to baseline, and repairs problematic cases via severity-weighted fine-tuning. On eight benchmarks, DART improves Llama-3-8B-Instruct accuracy from 39.0% to 68.8%, with largest gains on equal-treatment prompts (11.3% -> 72.6%), while reducing harm drift cases by 72.6%. It also transfers to 280 open-ended real-world queries across medical, legal, policy, and educational domains, improving difference-appropriate responses from 39.8% to 77.5% while reducing refusals from 34.3% to 3.0%. Our results demonstrate that accuracy and safety need not conflict when explicit detection and repair mechanisms are in place.", "link": "https://arxiv.org/abs/2604.16845v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Ziwen Pan", "Zihan Liang", "Jad Kabbara"], "categories": ["cs.CL"]}, {"id": "6", "source": "ARXIV", "score": 6, "day": "2026-04-22", "title": "ActuBench: A Multi-Agent LLM Pipeline for Generation and Evaluation of Actuarial Reasoning Tasks", "content": "We present ActuBench, a multi-agent LLM pipeline for the automated generation and evaluation of advanced actuarial assessment items aligned with the International Actuarial Association (IAA) Education Syllabus. The pipeline separates four LLM roles by adapter: one agent drafts items, one constructs distractors, a third independently verifies both stages and drives bounded one-shot repair loops, and a cost-optimized auxiliary agent handles Wikipedia-note summarization and topic labelling. The items, per-model responses and complete leaderboard are published as a browsable web interface at https://actubench.de/en/, allowing readers and practitioners to inspect individual items without a repository checkout. We evaluate 50 language models from eight providers on two complementary benchmarks -- 100 empirically hardest multiple-choice items and 100 open-ended items scored by an LLM judge -- and report three headline findings. First, multi-agent verification is load-bearing: the independent verifier flags a majority of drafted items on first pass, most of which the one-shot repair loop resolves. Second, locally-hosted open-weights inference sits on the cost-performance Pareto front: a Gemma~4 model running on consumer hardware and a Cerebras-hosted 120B open-weights model dominate the near-zero-cost region, with the latter within one item of the top of the leaderboard. Third, MCQ and LLM-as-Judge rankings differ meaningfully: the MCQ scaffold inflates the performance ceiling, and Judge-mode evaluation is needed to discriminate at the frontier.", "link": "https://arxiv.org/abs/2604.20273v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Jan-Philipp Schmidt"], "categories": ["cs.AI", "cs.CL"]}, {"id": "7", "source": "ARXIV", "score": 6, "day": "2026-04-21", "title": "Structured Disagreement in Health-Literacy Annotation: Epistemic Stability, Conceptual Difficulty, and Agreement-Stratified Inference", "content": "Annotation pipelines in Natural Language Processing (NLP) commonly assume a single latent ground truth per instance and resolve disagreement through label aggregation. Perspectivist approaches challenge this view by treating disagreement as potentially informative rather than erroneous. We present a large-scale analysis of graded health-literacy annotations from 6,323 open-ended COVID-19 responses collected in Ecuador and Peru. Each response was independently labeled by multiple annotators using proportional correctness scores, reflecting the degree to which responses align with normative public-health guidelines, allowing us to analyze the full distribution of judgments rather than aggregated labels. Variance decomposition shows that question-level conceptual difficulty accounts for substantially more variance than annotator identity, indicating that disagreement is structured by the task itself rather than driven by individual raters. Agreement-stratified analyses further reveal that key social-scientific effects, including country, education, and urban-rural differences, vary in magnitude and in some cases reverse direction across levels of inter-annotator agreement. These findings suggest that graded health-literacy evaluation contains both epistemically stable and unstable components, and that aggregating across them can obscure important inferential differences. We therefore argue that strong perspectivist modeling is not only conceptually justified but statistically necessary for valid inference in graded interpretive tasks.", "link": "https://arxiv.org/abs/2604.19943v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Olga Kellert", "Sriya Kondury", "Candice Koo"], "categories": ["cs.CL"]}, {"id": "8", "source": "ARXIV", "score": 6, "day": "2026-04-21", "title": "Four-Axis Decision Alignment for Long-Horizon Enterprise AI Agents", "content": "Long-horizon enterprise agents make high-stakes decisions (loan underwriting, claims adjudication, clinical review, prior authorization) under lossy memory, multi-step reasoning, and binding regulatory constraints. Current evaluation reports a single task-success scalar that conflates distinct failure modes and hides whether an agent is aligned with the standards its deployment environment requires. We propose that long-horizon decision behavior decomposes into four orthogonal alignment axes, each independently measurable and failable: factual precision (FRP), reasoning coherence (RCS), compliance reconstruction (CRR), and calibrated abstention (CAR). CRR is a novel regulatory-grounded axis; CAR is a measurement axis separating coverage from accuracy. We exercise the decomposition on a controlled benchmark (LongHorizon-Bench) covering loan qualification and insurance claims adjudication with deterministic ground-truth construction. Running six memory architectures, we find structure aggregate accuracy cannot see: retrieval collapses on factual precision; schema-anchored architectures pay a scaffolding tax; plain summarization under a fact-preservation prompt is a strong baseline on FRP, RCS, EDA, and CRR; and all six architectures commit on every case, exposing a decisional-alignment axis the field has not targeted. The decomposition also surfaced a pre-registered prediction of our own, that summarization would fail factual recall, which the data reversed at large magnitude, an axis-level reversal aggregate accuracy would have hidden. Institutional alignment (regulatory reconstruction) and decisional alignment (calibrated abstention) are under-represented in the alignment literature and become load-bearing once decisions leave the laboratory. The framework transfers to any regulated decisioning domain via two steps: build a fact schema, and calibrate the CRR auditor prompt.", "link": "https://arxiv.org/abs/2604.19457v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Vasundra Srininvasan"], "categories": ["cs.AI"]}, {"id": "9", "source": "ARXIV", "score": 6, "day": "2026-04-20", "title": "STaD: Scaffolded Task Design for Identifying Compositional Skill Gaps in LLMs", "content": "Benchmarks are often used as a standard to understand LLM capabilities in different domains. However, aggregate benchmark scores provide limited insight into compositional skill gaps of LLMs and how to improve them. To make these weaknesses visible, we propose Scaffolded Task Design (STaD) framework. STaD generates controlled variations of benchmark tasks based on the concept of scaffolding, which introduces structured, incremental support in a step-by-step manner. Rather than inspecting failures individually, this approach enables systematic and scalable probing of model behavior by identifying the specific reasoning skill compositions they lack. Treating the LLM as a black box, our experiments on six models of varying sizes reveal multiple failure points in three reasoning benchmarks and highlight each model's unique and distinct skill gaps.", "link": "https://arxiv.org/abs/2604.18177v2", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Sungeun An", "Swanand Ravindra Kadhe", "Shailja Thakur"], "categories": ["cs.CL", "cs.AI"]}];

  if (query.trim() && !searchHistory.includes(query)) {
    searchHistory.unshift(query);
    if (searchHistory.length > 10) searchHistory.pop();
    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
  }
}

function downloadJSON() {
  const data = JSON.stringify(filtered, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadCSV() {
  const headers = ['제목', '출처', '스코어', '리뷰여부', '링크'];
  const rows = filtered.map(p => [
    '"' + p.title.replace(/"/g, '""') + '"',
    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
</body>
