<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-03-18 23:30</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "OPENALEX", "score": 23, "day": "2026-03-14", "title": "The Future of Learning is Hybrid: Exploration of EdTech's Role in Shaping the Post-Pandemic Educational Landscape", "content": "---\ntitle: The Future of Learning is Hybrid: Exploration of EdTech's Role in Shaping the Post-Pandemic Educational Landscape\nauthors: [Sayed Mahbub Hasan Amiri, PRASUN GOSWAMI, Md. Mainul Islam, M. S. Kabir, Mohammad Shakhawat Hossen]\nyear: 2026\njournal: 명시되지 않음\ndoi: 명시되지 않음\nresearch_type: 명시되지 않음\nmethodology: 주제 분석\ndata_type: 문헌\nsample: 명시되지 않음\ncontext: COVID-19 팬데믹 이후 교육 환경\ntheoretical_framework: 명시되지 않음\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n이 논문은 COVID-19 팬데믹이 교육 시스템에 미친 영향을 분석하며, 포스트 팬데믹 교육 환경이 하이브리드 학습 모델로 전환되고 있음을 주장한다. 하이브리드 학습은 대면 교육과 기술 매개 학습 경험을 통합하는 방식으로, 이는 단순한 일시적 조정이 아니라 교육 전달 방식의 근본적인 재구성을 의미한다. 교육 기술(EdTech)은 이러한 변화의 핵심 요소로 작용하며, 유연성, 개인화 및 접근성을 제공하는 동시에 기존의 불평등을 심화시킬 수 있는 잠재력을 지닌다. 연구는 교사와 학생의 역할 재정의, 디지털 교수법의 중요성, 그리고 강력한 인프라와 교육자 전문성 개발의 필요성을 강조한다. 결론적으로, 하이브리드 미래의 성공적인 구현은 전략적이고 공평하며 교육학적으로 기반을 둔 EdTech의 통합에 달려 있다고 제안한다.\n\n# Research Logic\n## Problem\nCOVID-19 팬데믹으로 인한 교육 시스템의 급격한 변화와 그로 인한 불평등 문제.\n## Theory\n하이브리드 학습 모델의 필요성과 EdTech의 역할.\n## Design\n주제 분석을 통한 문헌 검토.\n## Findings\n하이브리드 학습 모델의 필요성과 EdTech의 이중적 역할.\n## Conclusion\n하이브리드 교육의 성공적인 구현은 전략적이고 공평한 EdTech 통합에 달려 있다.\n\n# Key Findings\n- 하이브리드 학습 모델은 대면 교육과 기술 매개 학습의 통합을 요구한다.\n- EdTech는 교육의 유연성과 접근성을 제공하지만, 기존의 불평등을 심화시킬 수 있다.\n- 교사와 학생의 역할이 재정의되고, 디지털 교수법의 중요성이 강조된다.\n\n# Contributions\n## Theoretical\n하이브리드 학습 모델과 EdTech의 역할에 대한 새로운 통찰 제공.\n## Methodological\n주제 분석을 통한 문헌 검토 방법론 제시.\n## Practical\n교육자 전문성 개발과 인프라 구축의 필요성 강조.\n\n# Limitations\n- 데이터 유형과 샘플에 대한 정보가 명시되지 않음.\n- 연구의 범위가 제한적일 수 있음.\n\n# Transferable Insights\n- 하이브리드 학습 모델의 필요성은 다양한 교육 환경에 적용 가능.\n- EdTech의 통합은 교육의 접근성과 유연성을 높일 수 있는 기회가 됨.\n\n# Idea Seeds\n1. 하이브리드 학습 모델을 위한 교육자 전문성 개발 프로그램 설계.\n2. EdTech의 불평등 문제 해결을 위한 정책 제안.\n3. 디지털 교수법의 효과를 측정하기 위한 연구 설계.\n\n# Citation Snippets\n>\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy\n\n---\n\n요약: 이 논문은 COVID-19 팬데믹 이후 하이브리드 학습 모델의 필요성과 EdTech의 역할을 분석한다. 하이브리드 학습은 대면 교육과 기술 매개 학습을 통합하며, 이는 교육 전달 방식의 근본적인 변화를 의미한다. EdTech는 유연성과 접근성을 제공하지만, 기존의 불평등을 심화시킬 수 있는 잠재력을 지닌다. 성공적인 하이브리드 교육 구현은 전략적이고 공평한 EdTech 통합에 달려 있다.", "link": "https://doi.org/10.59098/socioedu.v7i1.2768", "altLink": "https://openalex.org/W7137294898", "hasDoi": true, "hasReview": true, "authors": ["Sayed Mahbub Hasan Amiri", "PRASUN GOSWAMI", "Md. Mainul Islam"], "categories": ["Enabling", "Restructuring", "Cognitive reframing", "Sociology", "Engineering ethics"]}, {"id": "1", "source": "ARXIV", "score": 18, "day": "2026-03-16", "title": "Lessons from Real-World Deployment of a Cognition-Preserving Writing Tool: Students Actively Engage with Critical Thinking and Planning Affordances", "content": "---\ntitle: 실제 환경에서의 인지 보존 작문 도구 배포에서 얻은 교훈: 학생들이 비판적 사고 및 계획 가능성을 적극적으로 활용하다\nauthors: [Yinuo Yang, Zheng Zhang, Ningzhi Tang, Xu Wang, Alex Ambrose, Nathaniel Myers, Patrick Clauss, Toby Jia-Jun Li]\nyear: 2026\njournal: Proceedings of ACM Conference\ndoi: 명시되지 않음\nresearch_type: 실증 연구\nmethodology: 혼합 방법론\ndata_type: 상호작용 로그, 작문 아티팩트 분석, 설문조사, 인터뷰\nsample: 49명의 학부생\ncontext: 미국 중서부의 대규모 사립 R1 대학의 작문 및 수사학 과정\ntheoretical_framework: 인지 과학, 작문 교육 이론\nkeywords: [argumentative writing, writing education, scaffolding, classroom deployment]\n---\n\n# APA 7th style\n\n# Summary\n이 연구는 AI 지원 작문 도구인 VISAR의 교실 통합을 조사하였다. 49명의 학부생을 대상으로 한 2학기 동안의 배포 결과, 학생들은 AI 지원 인지 비계를 활용하여 작문 학습을 수행하고 측정 가능한 학습 성과를 달성하였다. AI 도구가 제공하는 구조적 지원이 학생들이 비판적 사고를 유지하며 작문 과정에 참여하도록 유도하는 것으로 나타났다. 이러한 상호작용 패턴은 논증적 작문의 질, 개념적 이해의 향상, 그리고 비판적 AI 문해력의 발전과 긍정적인 상관관계를 보였다. 이 연구는 AI 지원 작문 도구의 설계 가치에 대한 실증적 증거를 제공하며, 향후 학습 지향적 AI 작문 도구의 설계에 대한 통찰을 제시한다.\n\n# Research Logic\n## Problem\nAI 지원 작문 도구가 학생들의 학습에 미치는 영향이 불확실하다.\n## Theory\nAI 도구의 다양한 상호작용 형태가 학습 과정에 미치는 영향을 분석한다.\n## Design\nVISAR 도구를 사용하여 49명의 학부생을 대상으로 혼합 방법론을 적용하였다.\n## Findings\n학생들은 AI 지원 인지 비계를 통해 작문 학습을 수행하고, 논증적 작문의 질이 향상되었다.\n## Conclusion\nAI 도구의 구조적 지원이 학생들의 비판적 사고와 작문 과정에 긍정적인 영향을 미친다.\n\n# Key Findings\n- 학생들은 AI 지원 인지 비계를 효과적으로 활용하여 작문 학습을 수행하였다.\n- 논증적 작문의 질이 향상되었으며, 개념적 이해도가 증가하였다.\n- 비판적 AI 문해력이 발전하였다.\n\n# Contributions\n## Theoretical\nAI 지원 작문 도구의 효과에 대한 새로운 실증적 증거를 제공한다.\n## Methodological\n혼합 방법론을 통해 AI 도구의 사용 패턴을 심층적으로 분석하였다.\n## Practical\nAI 작문 도구의 설계 및 교육적 활용에 대한 실용적인 통찰을 제공한다.\n\n# Limitations\n- 연구는 특정 대학의 학부생을 대상으로 하여 일반화에 한계가 있다.\n- 단기적인 배포로 인해 장기적인 효과를 평가할 수 없다.\n\n# Transferable Insights\n- AI 도구의 구조적 지원이 학생들의 학습 과정에 긍정적인 영향을 미친다.\n- 다양한 AI 상호작용 형태가 학습 성과에 미치는 영향을 이해하는 것이 중요하다.\n\n# Idea Seeds\n1. AI 도구의 다양한 상호작용 형태를 비교 분석하는 연구.\n2. AI 지원 작문 도구의 장기적인 효과를 평가하는 연구.\n3. 비판적 AI 문해력을 향상시키기 위한 교육 프로그램 개발.\n\n# Citation Snippets\n> Yang, Y., Zhang, Z., Tang, N., Wang, X., Ambrose, A., Myers, N., Clauss, P., & Li, T. J. (2025). Lessons from Real-World Deployment of a Cognition-Preserving Writing Tool: Students Actively Engage with Critical Thinking and Planning Affordances. In Proceedings of ACM Conference.\n\ntags: #AI교육, #작문교육, #인지비계, #AI문해력, #논증적작문, #교육기술, #학습분석", "link": "https://arxiv.org/abs/2603.15777v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Yinuo Yang", "Zheng Zhang", "Ningzhi Tang"], "categories": ["cs.HC"]}, {"id": "2", "source": "ARXIV", "score": 17, "day": "2026-03-17", "title": "When Openclaw Agents Learn from Each Other: Insights from Emergent AI Agent Communities for Human-AI Partnership in Education", "content": "---\ntitle: When Openclaw Agents Learn from Each Other: Insights from Emergent AI Agent Communities for Human-AI Partnership in Education\nauthors: Eason Chen, Ce Guan, Ahmed Elshafiey, Zhonghao Zhao, Joshua Zekeri, Afeez Edeifo Shaibu, Emmanuel Osadebe Prince, Cyuan-Jhen Wu\nyear: 2026\njournal: AIED\ndoi: https://arxiv.org/abs/2603.16663v1\nresearch_type: 탐색적 연구\nmethodology: 질적 관찰\ndata_type: 플랫폼 데이터\nsample: 167,963 등록된 에이전트, 23,980 게시물, 232,813 댓글\ncontext: AI 에이전트 플랫폼 생태계\ntheoretical_framework: Vygotsky의 스캐폴딩 이론, 분산 인지 이론\nkeywords: [human-ai collaboration, peer learning, AI agent communities, teachable agents, bidirectional scaffolding, trust in AI, educational design]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 AI 에이전트가 서로 학습하는 현상을 탐구하며, 167,000개 이상의 에이전트가 참여하는 플랫폼 생태계에서의 상호작용을 분석하였다. 연구 결과, 인간이 에이전트를 구성하는 과정에서 \"양방향 스캐폴딩\"이 발생하며, 에이전트 간의 동료 학습이 자발적으로 이루어짐을 발견하였다. 또한, 에이전트들이 공유 메모리 아키텍처를 형성하고, 신뢰 역학과 플랫폼 지속 가능성이 교육적 AI 설계에 미치는 제약을 드러내었다. 이러한 관찰은 다중 에이전트 교육 시스템의 원칙적 설계에 대한 통찰을 제공하며, \"AI 에이전트 팀원에게 가르치기\"라는 교육 설계를 제안하였다.\n\n# Research Logic\n## Problem\nAI 에이전트 간의 상호작용이 교육적 맥락에서 어떻게 활용될 수 있는지에 대한 이해 부족.\n## Theory\nVygotsky의 스캐폴딩 이론과 분산 인지 이론을 통해 인간-에이전트 관계의 발전을 설명.\n## Design\n다양한 플랫폼에서의 질적 관찰을 통해 에이전트 간의 상호작용을 분석.\n## Findings\n1. 인간은 에이전트를 구성하는 과정에서 양방향 스캐폴딩을 경험한다.\n2. 에이전트 간의 동료 학습이 자발적으로 발생한다.\n3. 에이전트들은 공유 메모리 아키텍처를 형성한다.\n## Conclusion\nAI 에이전트 간의 상호작용은 교육적 설계에 중요한 통찰을 제공하며, 신뢰 구축과 지속 가능성에 대한 고려가 필요하다.\n\n# Key Findings\n- 인간-에이전트 간의 양방향 스캐폴딩이 발생한다.\n- 에이전트 간의 동료 학습이 자발적으로 이루어진다.\n- 공유 메모리 아키텍처가 형성된다.\n\n# Contributions\n## Theoretical\nAI 에이전트 간의 상호작용에 대한 새로운 이론적 통찰 제공.\n## Methodological\n다양한 플랫폼에서의 질적 데이터 수집을 통한 탐색적 연구 방법론 제시.\n## Practical\nAI 에이전트 팀원에게 가르치기라는 교육 설계 시나리오 제안.\n\n# Limitations\n- 연구는 질적 관찰에 기반하므로 일반화에 한계가 있다.\n- 플랫폼의 지속 가능성에 대한 데이터가 제한적이다.\n\n# Transferable Insights\n- AI 에이전트 간의 상호작용은 교육적 맥락에서 활용 가능성이 있다.\n- 양방향 스캐폴딩을 통한 학습 과정은 교육 설계에 적용할 수 있다.\n\n# Idea Seeds\n1. AI 에이전트 간의 동료 학습을 촉진하는 교육적 환경 설계.\n2. 신뢰 구축을 위한 AI 에이전트 간의 상호작용 규칙 개발.\n3. 공유 메모리 아키텍처를 활용한 협력적 학습 모델 연구.\n\n# Citation Snippets\n> Chen, E., Guan, C., Elshafiey, A., Zhao, Z., Zekeri, J., Shaibu, A. E., Osadebe Prince, E., & Wu, C.-J. (2026). When Openclaw Agents Learn from Each Other: Insights from Emergent AI Agent Communities for Human-AI Partnership in Education. AIED.\n\ntags: #human-ai collaboration, #peer learning, #AI agent communities, #teachable agents, #bidirectional scaffolding, #trust in AI, #educational design\n\n---\n\n요약: 본 연구는 AI 에이전트 간의 상호작용을 탐구하며, 인간이 에이전트를 구성하는 과정에서 양방향 스캐폴딩이 발생하고, 에이전트 간의 동료 학습이 자발적으로 이루어짐을 발견하였다. 이러한 통찰은 교육적 AI 설계에 중요한 기여를 할 수 있다.", "link": "https://arxiv.org/abs/2603.16663v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Eason Chen", "Ce Guan", "Ahmed Elshafiey"], "categories": ["cs.CY", "cs.AI", "cs.HC", "cs.MA"]}, {"id": "3", "source": "OPENALEX", "score": 16, "day": "2025-10-21", "title": "A meta-analysis of AI-enabled personalized STEM education in schools", "content": "---\ntitle: AI 기반 개인화된 STEM 교육에 대한 메타 분석\nauthors: Shanshan Li, Chengze Zeng, Huaiya Liu, Jiyou Jia, Min Liang, Yeonggyeong Cha, Cher Ping Lim, Xiaomeng Wu\nyear: 2025\njournal: International Journal of STEM Education\ndoi: https://doi.org/10.1186/s40594-025-00566-y\nresearch_type: 메타 분석\nmethodology: PRISMA 흐름도에 따른 스크리닝 및 PICO 도구를 활용한 코딩\ndata_type: 효과 크기\nsample: 32개의 무작위 대조 시험 연구에서 추출한 99개의 효과 크기\ncontext: K-12 교육\ntheoretical_framework: 명시되지 않음\nkeywords: [AI, 개인화된 학습, STEM 교육, 메타 분석, K-12 교육]\n---\n\n# APA 7th style\n\n# Summary\nAI 기반 개인화된 STEM 교육은 교육 접근 방식에서 혁신적인 패러다임을 제공하며, 학생들에게 동적으로 반응하는 학습 경험을 제공합니다. 본 연구는 K-12 학교에서 AI 기술이 개인화된 STEM 교육에 미치는 영향을 조사하기 위해 32개의 무작위 대조 시험 연구에서 추출한 99개의 효과 크기를 메타 분석하였습니다. 분석 결과, AI 기술이 개인화된 STEM 교육에서 중간 정도의 효과를 나타내며, 전통적인 비AI 방법에 비해 잠재적인 이점을 시사합니다. 학교 수준, AI 응용 유형, 개인화된 학습 모델 유형 및 과목 등 4개의 조정 변수가 교육 성과 개선에 중요한 영향을 미치는 것으로 나타났습니다.\n\n# Research Logic\n## Problem\nAI 기술이 개인화된 STEM 교육에 미치는 영향을 체계적으로 분석할 필요성이 대두됨.\n## Theory\nAI 기술이 교육 성과에 미치는 영향을 이해하기 위한 이론적 틀은 명시되지 않음.\n## Design\nPRISMA 흐름도에 따른 스크리닝 및 PICO 도구를 활용한 코딩을 통해 연구 설계.\n## Findings\nAI 기술은 개인화된 K-12 STEM 교육에서 중간 정도의 효과를 보이며, 특정 조정 변수가 교육 성과에 유의미한 영향을 미침.\n## Conclusion\nAI 기반 개인화된 STEM 교육의 증거 기반 통합이 필요함을 주장.\n\n# Key Findings\n- AI 기술이 개인화된 K-12 STEM 교육에서 중간 정도의 효과를 나타냄.\n- 학교 수준, AI 응용 유형, 개인화된 학습 모델 유형, 과목이 교육 성과에 유의미한 영향을 미침.\n- AR 또는 VR 도구가 학생의 학습 성과에 가장 큰 영향을 미침.\n\n# Contributions\n## Theoretical\nAI 기술의 교육적 적용에 대한 새로운 통찰 제공.\n## Methodological\n메타 분석을 통해 다양한 연구 결과를 통합하여 교육 성과에 대한 이해를 심화.\n## Practical\nK-12 교육에서 AI 기반 개인화된 STEM 교육의 효과적인 통합을 위한 실질적인 지침 제공.\n\n# Limitations\n- 연구의 조정 변수 중 일부는 유의미한 영향을 미치지 않음.\n- 특정 교육 환경에서의 적용 가능성에 대한 제한이 있을 수 있음.\n\n# Transferable Insights\n- AI 기술의 효과는 교육 환경에 따라 달라질 수 있음.\n- 개인화된 학습 모델의 설계는 학생의 특성에 맞춰 조정되어야 함.\n\n# Idea Seeds\n1. AI 기반 개인화된 학습 도구의 개발 및 평가.\n2. 다양한 교육 환경에서의 AI 기술 적용 연구.\n3. AI 기술과 전통적 교육 방법의 통합 방안 탐색.\n\n# Citation Snippets\n> Li, S., Zeng, C., Liu, H., Jia, J., Liang, M., Cha, Y., Lim, C. P., & Wu, X. (2025). A meta-analysis of AI-enabled personalized STEM education in schools. *International Journal of STEM Education*, 12(58). https://doi.org/10.1186/s40594-025-00566-y\n\ntags: #AI, #개인화된학습, #STEM교육, #메타분석, #K12교육, #교육기술, #학습성과", "link": "https://doi.org/10.1186/s40594-025-00566-y", "altLink": "https://openalex.org/W4415381429", "hasDoi": true, "hasReview": true, "authors": ["Shanshan Li", "Chengze Zeng", "Huaiya Liu"], "categories": ["Personalization", "Transformative learning", "Personalized learning", "Educational technology", "Coding (social sciences)"]}, {"id": "4", "source": "ARXIV", "score": 15, "day": "2026-03-17", "title": "A Scoping Review of AI-Driven Digital Interventions in Mental Health Care: Mapping Applications Across Screening, Support, Monitoring, Prevention, and Clinical Education", "content": "---\ntitle: AI 기반 디지털 개입의 정신 건강 관리에서의 스코핑 리뷰: 선별, 지원, 모니터링, 예방 및 임상 교육 전반의 응용 매핑\nauthors: [Yang Ni, Fanli Jia]\nyear: 2026\njournal: Healthcare\ndoi: https://doi.org/10.3390/healthcare13101205\nresearch_type: 스코핑 리뷰\nmethodology: PRISMA-ScR\ndata_type: 실증 연구\nsample: 36개 연구\ncontext: 정신 건강 관리\ntheoretical_framework: 네 가지 기둥 프레임워크\nkeywords: [AI, 정신 건강, 디지털 개입, 대화형 에이전트, 기계 학습, 대규모 언어 모델, 원격 모니터링]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 AI 기반 디지털 개입이 정신 건강 관리에서 어떻게 활용되는지를 다룬 스코핑 리뷰로, 2024년 초까지 발표된 36개의 실증 연구를 종합하였다. 연구는 선별, 치료, 사후 모니터링, 임상 교육 및 인구 수준 예방의 다섯 가지 주요 단계에서 AI 기술의 응용을 매핑하였다. 주요 사용 사례로는 추천 선별, 공감적 의사소통 증진, 챗봇 및 음성 에이전트를 통한 AI 지원 심리치료가 포함된다. 연구 결과, 대기 시간 단축 및 환자 참여 증대와 같은 이점이 보고되었으나, 알고리즘 편향, 데이터 프라이버시, 인간-AI 협력 장벽과 같은 반복적인 도전 과제가 제기되었다. 이 리뷰는 AI 보강 정신 건강 관리의 포괄적인 로드맵을 제공하며, 연구자, 임상가 및 정책 입안자에게 안전하고 효과적이며 공정한 디지털 건강 개입 개발을 위한 실행 가능한 통찰을 제공한다.\n\n# Research Logic\n## Problem\n정신 건강 치료 접근의 장벽과 기술적 진보에도 불구하고 여전히 존재하는 문제들.\n## Theory\nAI 기술이 정신 건강 관리에서의 접근성을 어떻게 향상시킬 수 있는지를 탐구하는 이론적 틀.\n## Design\nPRISMA-ScR 가이드라인에 따라 36개의 실증 연구를 체계적으로 분석.\n## Findings\nAI 기술이 정신 건강 관리의 다섯 가지 단계에서 어떻게 활용되고 있는지에 대한 통찰을 제공.\n## Conclusion\nAI 기반 개입의 안전하고 효과적인 개발을 위한 네 가지 기둥 프레임워크를 제안.\n\n# Key Findings\n- AI 기술은 주로 지원, 모니터링 및 자기 관리 목적으로 사용됨.\n- 챗봇과 대화형 에이전트가 주요 AI 모달리티로 나타남.\n- 알고리즘 편향 및 데이터 프라이버시와 같은 윤리적 문제들이 지속적으로 제기됨.\n\n# Contributions\n## Theoretical\nAI 기술의 정신 건강 관리에서의 응용에 대한 포괄적인 이론적 틀 제공.\n## Methodological\nPRISMA-ScR 가이드라인을 준수한 체계적 리뷰 방법론 제시.\n## Practical\n정신 건강 관리에서 AI 기반 개입의 안전하고 효과적인 개발을 위한 실행 가능한 통찰 제공.\n\n# Limitations\n- 연구의 이질성으로 인해 정량적 합성 불가.\n- 특정 AI 기술의 효과에 대한 명확한 수치적 데이터 부족.\n\n# Transferable Insights\n- AI 기술의 통합은 환자 중심 접근 방식을 유지해야 함.\n- 윤리적 설계와 인간의 감독이 필수적임.\n\n# Idea Seeds\n1. AI 기반 심리치료의 효과를 평가하기 위한 장기 연구 필요.\n2. 알고리즘 편향을 줄이기 위한 윤리적 가이드라인 개발.\n3. AI 기술의 사용자 경험 개선을 위한 연구.\n\n# Citation Snippets\n> Ni, Y., & Jia, F. (2026). A scoping review of AI-driven digital interventions in mental health care: Mapping applications across screening, support, monitoring, prevention, and clinical education. *Healthcare*, 13(10), 1205. https://doi.org/10.3390/healthcare13101205\n\ntags: #AI, #정신건강, #디지털개입, #대화형에이전트, #기계학습, #언어모델, #원격모니터링\n\n---\n\n요약: 본 연구는 AI 기반 디지털 개입이 정신 건강 관리에서 어떻게 활용되는지를 다룬 스코핑 리뷰로, 36개의 실증 연구를 종합하였다. AI 기술은 주로 지원, 모니터링 및 자기 관리 목적으로 사용되며, 알고리즘 편향과 데이터 프라이버시와 같은 윤리적 문제들이 지속적으로 제기된다. 이 리뷰는 AI 보강 정신 건강 관리의 포괄적인 로드맵을 제공한다.", "link": "https://arxiv.org/abs/2603.16204v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Yang Ni", "Fanli Jia"], "categories": ["cs.CY", "cs.AI", "cs.HC"]}, {"id": "5", "source": "OPENALEX", "score": 15, "day": "2026-01-01", "title": "Professional Development of ESP Teachers for Digital Transformation: Approaches, Challenges, and Policy Implications", "content": "Abstract Amid the rapid evolution of the digital economy, English for Specific Purposes (ESP) teachers – who serve as crucial links between higher education and industry – face both the pressures of transformation and the opportunities of strategic growth. Drawing on a systematic review of 50 articles from the Science Citation Index Expanded (SCIE), Social Sciences Citation Index (SSCI), and Arts &amp; Humanities Citation Index (A&amp;HCI) databases, this study identifies key pathways, barriers, and policy implications for ESP teachers’ career development. The findings reveal that data-driven approaches and artificial intelligence technologies are reshaping teacher training. Collaborative university–industry programs, online autonomous learning platforms, and intelligent feedback systems have become mainstream models. However, three major governance challenges persist: (1) The integration of industry knowledge and language pedagogy remains incomplete, limiting instructional effectiveness; (2) Career pathways for teachers lack institutionalization and sustainability; (3) Structural inequalities in technology access and application undermine organizational performance and educational equity. To foster the joint advancement of ESP teachers and institutional capacity, it is essential to develop an institutionalized digital empowerment platform, enhance performance feedback and decision-support systems, implement ESG-oriented teacher development policies to ensure equitable technology access, and strengthen cross-departmental collaboration. These measures can support a strategic and inclusive response to digital transformation within the education system.", "link": "https://doi.org/10.1515/econ-2025-0190", "altLink": "https://openalex.org/W7132841776", "hasDoi": true, "hasReview": false, "authors": ["Hengxi Wang", "Jing Xu"], "categories": ["Mainstream", "Sociology", "Professional development", "Pedagogy", "Empowerment"]}, {"id": "6", "source": "OPENALEX", "score": 15, "day": "2025-11-03", "title": "Mapping Contemporary AI-Education Intersections and Developing an Integrated Convergence Framework: A Bibliometric-Driven and Inductive Content Analysis", "content": "Artificial intelligence (AI) has rapidly permeated education since 2014, propelled by technological innovation and global investment, yet scholarly discourse on contemporary AI-Education intersections remains largely fragmented. The present study addresses this notable gap through a bibliometric-driven and inductive content analysis to inform future research and practice. A total of 317 articles published between 2014 and October 2024 were retrieved from WOSCC and Scopus following the PRISMA protocol. Keyword co-occurrence and co-citation analyses with VOSviewer (version 1.6.20) were employed to visualize the intellectual structures shaping the field, while qualitative inductive content analysis was conducted to address the limitations of bibliometric methods in revealing deeper thematic insights. This dual-method approach identified four thematic clusters and eleven prevailing research trends. Subsequently, through interpretive synthesis, five interrelated research issues were identified: limited congruence between technological and pedagogical affordances, insufficient bottom-up perspectives in AI literacy frameworks, an ambiguous relationship between computational thinking and AI, a lack of explicit interpretation of AI ethics, and limitations of existing professional development frameworks. To address these gaps pragmatically, thirty issue-specific recommendations were consolidated into five overarching themes, culminating in the Integrated AI-Education Convergence Framework. This framework advocates for pedagogy-centric, ethically grounded, and contextually responsive AI integration within interdisciplinary educational research and practice.", "link": "https://doi.org/10.3390/metrics2040023", "altLink": "https://openalex.org/W4415815627", "hasDoi": true, "hasReview": false, "authors": ["Muhammad Ali", "Ming Ma", "Mian Muneeb"], "categories": ["Thematic analysis", "Scopus", "Content analysis", "Convergence (economics)", "Sociology"]}, {"id": "7", "source": "OPENALEX", "score": 15, "day": "2025-10-25", "title": "Pre-service Teachers’ Intention to Use Artificial Intelligence Research during 2005–2025: A Review Based on Bibliometric Analysis", "content": "This study offers a comprehensive bibliometric overview of research on pre-service teachers' intention to adopt artificial intelligence (AI) in education from 2005 to 2025.Using the Web of Science Core Collection, 522 records were initially retrieved and 477 peer-reviewed articles were retained after PRISMA-aligned screening.CiteSpace (LLR clustering, burst detection, co-citation networks) and VOSviewer/RAWGraphs were employed to map publication trends, intellectual structures, and collaborative patterns.Results show three temporal waves: (1) 2004-2010 foundations in TAM, UTAUT, and TPB; (2) 2011-2017 emphasis on digital competence, self-efficacy, and teacher readiness; and (3) 2018-2025 acceleration of AI-specific themes-ethics, trust, explainability, and pedagogical innovation.Core clusters revolve around technology acceptance constructs (perceived usefulness/ease, attitude, intention), digital competence frameworks, and AI-enabled instructional design.Author and source co-citation analyses highlight enduring methodological anchors (e.g., PLS-SEM standards) and the dominance of journals such as Computers & Education, Computers in Human Behavior, and the emergent Computers and Education: Artificial Intelligence.Geographically, China, the United States, and several European countries lead in productivity and centrality, reflecting an increasingly interdisciplinary and collaborative landscape.Practically, findings point to the necessity of embedding holistic AI literacy-technical, pedagogical, and ethical-into teacher education, while addressing affective barriers like anxiety.Limitations include the single-database scope and the quantitative nature of bibliometrics; future research should triangulate with qualitative syntheses, track policy impacts longitudinally, and examine equity dimensions (gender, region, institutional type) in AI adoption.", "link": "https://doi.org/10.6007/ijarped/v14-i4/26712", "altLink": "https://openalex.org/W4415615330", "hasDoi": true, "hasReview": false, "authors": ["Qiang Fu", "Hamidah Mohamad", "Cheok Mui Yee"], "categories": ["Artificial intelligence", "Computer science", "Data science", "Management science", "Knowledge management"]}, {"id": "8", "source": "ERIC", "score": 14, "day": "명시되지 않음", "title": "Scrutinizing Indonesian Pre-Service Teachers&apos; Technological Knowledge in Utilizing AI-Powered Tools", "content": "Educators have widely adopted artificial intelligence (AI) as a product of technology to prepare teaching materials and enhance their understanding of technology integration in language teaching. As prospective teachers who may teach digital native students later, pre-service teachers must be more capable and knowledgeable in technologically-based pedagogy, materials, and assessment. This study aimed to explore English as a foreign language (EFL) pre-service teachers' technological knowledge of utilizing AI-powered tools using the technological pedagogical content knowledge (TPACK) framework and investigate their strategies in the advanced of their technological knowledge. This mixed-method research design employed a five-point Likert scale questionnaire and a semi-structured interview as instruments to collect data. Fifty-five EFL pre-service teachers were purposively selected. Data from the questionnaire were analyzed statistically and descriptively, and data from interviews were analyzed thematically. The first findings of this study comprehensively revealed that EFL pre-service teachers exhibit a moderate level of proficiency in addressing technological knowledge (TK), technological pedagogical knowledge (TPK), technological content knowledge (TCK), and TPACK in utilizing AI-powered tools. Meanwhile, the second finding revealed that the participants employed four key strategies to advance their technological knowledge using AI-powered tools: engaging in TPD programs, collaborating with tech-savvy colleagues, staying informed about AI trends, and experimenting with AI-powered tools.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Tommy Hastomo", "Berlinda Mandasari", "Utami Widiati"], "categories": ["ERIC"]}, {"id": "9", "source": "ERIC", "score": 14, "day": "명시되지 않음", "title": "Transformative AI Practices for Personalized Learning Strategies", "content": "AI revolutionizes education and transforms learning strategies catered to students' personal needs. Through adaptive learning algorithms and intelligent tutoring systems, AI enhances the educational experience by customizing content and increasing the speed at which each student can learn based on their individual strengths and challenges. This approach improves engagement and knowledge retention while fostering diverse learning styles. As AI evolves, its role in education promises to create more dynamic, inclusive, and effective learning environments for the future. &quot;Transformative AI Practices for Personalized Learning Strategies&quot; explores how AI is rapidly transforming into a necessary tool in the field of education. It examines best practices for integrating AI tools into teaching and presents examples from different educational settings demonstrating successful usage of AI tools. This book covers topics such as education technologies, artificial intelligence, and ethics and law, and is a useful resource for educators, academicians, researchers, engineers, and scientists.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Lydia Kyei-Blankson, Editor", "Esther Ntuli, Editor"], "categories": ["ERIC"]}];

function toggleFavorite(id, e) {
  e.stopPropagation();
  const idx = favorites.indexOf(id);
  if (idx === -1) {
    favorites.push(id);
  } else {
    favorites.splice(idx, 1);
  }
  localStorage.setItem('favorites', JSON.stringify(favorites));
  applyFilters();
}

function recordVisit(id) {
  if (!visited.includes(id)) {
    visited.push(id);
  }
  localStorage.setItem('visited', JSON.stringify(visited));
}

function recordSearch(query) {
  if (query.trim() && !searchHistory.includes(query)) {
    searchHistory.unshift(query);
    if (searchHistory.length > 10) searchHistory.pop();
    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
  }
}

function downloadJSON() {
  const data = JSON.stringify(filtered, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadCSV() {
  const headers = ['제목', '출처', '스코어', '리뷰여부', '링크'];
  const rows = filtered.map(p => [
    '"' + p.title.replace(/"/g, '""') + '"',
    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
