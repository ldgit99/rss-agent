<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-03-07 23:21</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "OPENALEX", "score": 32, "day": "2025-01-01", "title": "Constructing an Application Framework for Educational AI Agents to Promote Deep Integration of Teacher TPACK", "content": "---\ntitle: Constructing an Application Framework for Educational AI Agents to Promote Deep Integration of Teacher TPACK\nauthors: Jinying Chen\nyear: 2025\njournal: 명시되지 않음\ndoi: 명시되지 않음\nresearch_type: 명시되지 않음\nmethodology: 명시되지 않음\ndata_type: 명시되지 않음\nsample: 명시되지 않음\ncontext: 교육 AI 에이전트의 활용\ntheoretical_framework: TPACK\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 교육 AI 에이전트의 자율적이고 적응적인 특성이 교사 전문성 개발에 새로운 기회를 제공함을 강조한다. 그러나 현재의 기술적 응용은 표면적이며, 교사의 기술-교수-내용 지식(TPACK)의 깊은 통합을 효과적으로 촉진하지 못하고 있다. 연구자는 TPACK 이론적 구성 요소의 심층 분석과 교육 AI 에이전트의 핵심 기능을 분해하여, TPACK의 깊은 통합을 지향하는 교육 AI 에이전트의 응용 프레임워크(AIA-TPACK Framework)를 구축하고자 한다. 이 프레임워크는 \"교사-에이전트 협력\"을 중심으로 하며, \"맥락 인식 및 진단\", \"실천 내 스캐폴딩\", \"반성적 실천 및 반복\"의 세 가지 동적 단계로 전개된다. 이 연구는 이 프레임워크의 구현이 AI 기술을 단순한 지식 영역의 강화에서 모든 TPACK 요소의 체계적 통합 및 공동 진화로 전환할 수 있음을 제안한다.\n\n# Research Logic\n## Problem\n현재 교육 AI 기술의 응용이 교사의 TPACK 깊은 통합을 촉진하지 못하고 있음.\n## Theory\nTPACK 이론적 구성 요소를 기반으로 한 연구.\n## Design\nAIA-TPACK Framework의 구축을 위한 심층 분석 및 기능 분해.\n## Findings\n프레임워크는 교육 AI 에이전트의 다면적 역할을 규명하고, 교사 전문성 개발을 위한 실질적인 경로를 제시함.\n## Conclusion\nAI 기술의 활용이 TPACK의 체계적 통합으로 전환될 수 있는 가능성을 제시함.\n\n# Key Findings\n- 교육 AI 에이전트는 교사-에이전트 협력을 통해 TPACK의 깊은 통합을 지원할 수 있음.\n- AIA-TPACK Framework는 세 가지 동적 단계로 구성됨.\n- 이 프레임워크는 교사 전문성 개발을 위한 이론적 모델과 실천적 경로를 제공함.\n\n# Contributions\n## Theoretical\nTPACK 이론의 심화된 이해를 제공함.\n## Methodological\n교육 AI 에이전트의 기능 분석을 통한 새로운 프레임워크 제안.\n## Practical\n교사 전문성 개발을 위한 실질적인 응용 경로를 제시함.\n\n# Limitations\n- 연구의 구체적인 방법론 및 데이터 유형이 명시되지 않음.\n- 샘플 크기 및 맥락에 대한 정보가 부족함.\n\n# Transferable Insights\n- 교육 AI 에이전트의 활용이 교사 전문성 개발에 기여할 수 있는 방법을 제시함.\n- TPACK의 통합적 접근 방식이 교육 기술의 발전에 중요한 역할을 할 수 있음.\n\n# Idea Seeds\n1. 교육 AI 에이전트의 기능을 확장하여 다양한 교육 환경에 적용할 수 있는 방법 탐색.\n2. TPACK의 다른 구성 요소와의 상호작용을 연구하여 프레임워크의 유용성을 검증.\n3. 교사와 AI 간의 협력 모델을 개발하여 실제 교육 현장에서의 적용 가능성 평가.\n\n# Citation Snippets\n>\n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy\n\n---\n\n요약: 본 연구는 교육 AI 에이전트의 TPACK 깊은 통합을 위한 응용 프레임워크를 제안하며, 교사 전문성 개발에 기여할 수 있는 방법을 모색한다. AIA-TPACK Framework는 교사-에이전트 협력을 중심으로 세 가지 단계로 구성되어 있으며, AI 기술의 체계적 통합 가능성을 제시한다.", "link": "https://doi.org/10.4236/jcc.2025.1311013", "altLink": "https://openalex.org/W4416684670", "hasDoi": true, "hasReview": true, "authors": ["Jinying Chen"], "categories": ["Construct (python library)", "Technology integration", "Deep integration", "Computer science", "Knowledge management"]}, {"id": "1", "source": "OPENALEX", "score": 23, "day": "2025-10-03", "title": "The Future of Learning is Hybrid: Exploration of EdTech's Role in Shaping the Post-Pandemic Educational Landscape", "content": "---\ntitle: The Future of Learning is Hybrid: Exploration of EdTech's Role in Shaping the Post-Pandemic Educational Landscape\nauthors: [Sayed Mahbub Hasan Amiri, P. Goswami, Md. Mainul Islam, M. S. Kabir, Mohammad Shakhawat Hossen, Chandan Kumar Barmmon, Sayed Majhab Hasan Amiri]\nyear: 2025\njournal: 명시되지 않음\ndoi: https://doi.org/10.21203/rs.3.rs-7754491/v1\nresearch_type: 문헌 분석\nmethodology: 주제 분석\ndata_type: 문헌\nsample: 명시되지 않음\ncontext: COVID-19 팬데믹 이후 교육 환경\ntheoretical_framework: Community of Inquiry\nkeywords: [Hybrid Learning, Educational Technology, Post-Pandemic Education, Digital Divide, Equity in Education, Future of Education]\n---\n\n# APA 7th style\n\n# Summary\n이 논문은 COVID-19 팬데믹이 교육 시스템에 미친 영향을 분석하고, 포스트 팬데믹 교육 환경에서 하이브리드 학습 모델의 필요성을 주장한다. 하이브리드 학습은 대면 교육과 기술 매개 학습 경험을 통합하며, 이는 단순한 임시 조정이 아니라 교육 전달 방식의 근본적인 재구성을 의미한다. 연구는 교육 기술(EdTech)의 이중 역할을 탐구하며, 이는 유연성, 개인화 및 접근성을 가능하게 하는 동시에 기존의 불평등을 증폭시킬 수 있는 잠재력을 지닌다. 논문은 교사와 학생의 역할 재정의, 디지털 교육학의 중요성, 강력한 인프라와 교사 전문성 개발의 필요성을 강조한다. 결론적으로, 하이브리드 미래의 성공적인 구현은 전략적이고 공평하며 교육학적으로 기반이 마련된 EdTech 통합에 달려 있다고 주장한다.\n\n# Research Logic\n## Problem\nCOVID-19 팬데믹으로 인한 교육 시스템의 급격한 변화와 디지털 격차의 심화.\n## Theory\n하이브리드 학습 모델과 Community of Inquiry 이론을 기반으로 한 교육적 접근.\n## Design\n문헌 분석을 통한 주제 분석 방법론.\n## Findings\n하이브리드 학습의 필요성과 EdTech의 역할, 디지털 교육학의 중요성, 교육 불평등 문제.\n## Conclusion\n하이브리드 학습 모델의 성공적인 구현은 공정하고 전략적인 EdTech 통합에 의존한다.\n\n# Key Findings\n- 하이브리드 학습 모델은 대면 교육과 온라인 학습의 통합을 통해 교육의 유연성과 접근성을 증대시킨다.\n- EdTech는 교육의 개인화와 협업을 촉진하지만, 디지털 격차 문제를 해결하지 않으면 불평등을 심화시킬 수 있다.\n- 교사와 학생의 역할 재정의와 디지털 교육학의 중요성이 강조된다.\n\n# Contributions\n## Theoretical\n하이브리드 학습 모델과 Community of Inquiry 이론의 통합적 접근.\n## Methodological\n주제 분석을 통한 문헌 연구 방법론의 적용.\n## Practical\n하이브리드 학습 모델의 구현을 위한 정책 및 실천적 권장 사항 제공.\n\n# Limitations\n- 연구의 샘플 크기 및 범위가 명시되지 않음.\n- 특정 지역이나 교육 시스템에 대한 구체적인 사례 부족.\n\n# Transferable Insights\n- 하이브리드 학습 모델은 다양한 교육 환경에 적용 가능.\n- EdTech의 효과적인 통합은 교육의 형평성을 높이는 데 기여할 수 있음.\n\n# Idea Seeds\n1. 하이브리드 학습 모델의 효과를 평가하기 위한 실증 연구 필요.\n2. 디지털 격차 해소를 위한 정책 제안 개발.\n3. 교사 전문성 개발을 위한 지속적인 교육 프로그램 설계.\n\n# Citation Snippets\n> Amiri, S. M. H., Goswami, P., Islam, M. M., Kabir, M. S., Hossen, M. S., Barmmon, C. K., & Amiri, S. M. H. (2025). The Future of Learning is Hybrid: Exploration of EdTech's Role in Shaping the Post-Pandemic Educational Landscape. \n\ntags: #하이브리드학습, #교육기술, #포스트팬데믹교육, #디지털격차, #교육형평성, #미래교육\n\n---\n\n요약: 이 논문은 COVID-19 팬데믹 이후 교육 환경에서 하이브리드 학습 모델의 필요성을 강조하며, 교육 기술의 역할과 디지털 격차 문제를 다룬다. 하이브리드 학습은 대면 교육과 기술 매개 학습을 통합하여 교육의 유연성과 접근성을 높이며, 성공적인 구현은 공정하고 전략적인 EdTech 통합에 달려 있다고 주장한다.", "link": "https://doi.org/10.21203/rs.3.rs-7754491/v1", "altLink": "https://openalex.org/W4414788835", "hasDoi": true, "hasReview": true, "authors": ["Sayed Mahbub Hasan Amiri", "P. Goswami", "Md. Mainul Islam"], "categories": ["Enabling", "Restructuring", "Cognitive reframing", "Sociology", "Engineering ethics"]}, {"id": "2", "source": "OPENALEX", "score": 23, "day": "2025-08-30", "title": "Content Validation and Teacher Perspectives on an Interactive Module for the Arabic Language in Primary Education", "content": "---\ntitle: Content Validation and Teacher Perspectives on an Interactive Module for the Arabic Language in Primary Education\nauthors: [Siti Sharah Rajab, Nurahimah Mohd-Yusoff, Mohamed Abdulaziz]\nyear: 2025\njournal: The Eurasia Proceedings of Educational and Social Sciences\ndoi: https://openalex.org/W4416865398\nresearch_type: Design and Development Research (DDR)\nmethodology: Mixed methods (quantitative and qualitative)\ndata_type: Content validity analysis, semi-structured interviews\nsample: 5 educational experts, 5 primary Arabic teachers\ncontext: Malaysian primary education\ntheoretical_framework: Mayer’s Cognitive Theory of Multimedia Learning (CTML), Technology-Usability-Pedagogy (TUP) framework\nkeywords: [interactive learning module, content validation, Arabic language education, primary education]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 말레이시아 초등 교육을 위한 TAALIM-EDU 상호작용 아랍어 모듈을 설계, 개발 및 검증하는 것을 목표로 하였다. 연구는 세 가지 단계로 진행되었으며, 첫째, 기존 아랍어 학습 자료의 주요 결핍을 식별하기 위한 요구 분석을 실시하였다. 둘째, Mayer의 멀티미디어 학습 이론에 따라 체계적인 설계 및 개발이 이루어졌다. 셋째, 전문가 검증 및 교사 피드백을 통한 평가가 진행되었다. 콘텐츠 유효성 지수(CVI) 분석을 통해 평균 S-CVI 1.00을 달성하였으며, 이는 콘텐츠의 우수한 관련성과 명확성을 나타낸다. 교사 인터뷰를 통해 강력한 사용성, 효과적인 멀티미디어 통합 및 최선의 교수법과의 정렬이 드러났다.\n\n# Research Logic\n## Problem\n아랍어 교육에서 상호작용 멀티미디어의 통합이 제한적이며, 이는 학생 참여와 콘텐츠 접근성의 격차를 초래하고 있다.\n## Theory\nMayer의 멀티미디어 학습 이론(CTML)과 TUP 모델을 기반으로 하여 교육 자료의 설계 및 평가를 진행하였다.\n## Design\n디자인 및 개발 연구(DDR) 접근법을 사용하여 요구 분석, 설계 및 개발, 평가의 세 단계를 포함하였다.\n## Findings\n전문가 검증을 통해 콘텐츠 유효성이 입증되었으며, 교사 피드백을 통해 모듈의 사용성과 교수법적 정렬이 확인되었다.\n## Conclusion\nTAALIM-EDU 모듈은 아랍어 교육의 질을 향상시키기 위한 검증된 이론 기반의 상호작용 모듈 모델을 제공한다.\n\n# Key Findings\n- 콘텐츠 유효성 지수(CVI) 분석에서 평균 S-CVI 1.00을 달성하였다.\n- 교사들은 모듈의 사용성이 높고 멀티미디어 통합이 효과적이라고 평가하였다.\n- 교사들은 게임화 및 신기술을 통한 향후 개선을 제안하였다.\n\n# Contributions\n## Theoretical\nMayer의 멀티미디어 학습 이론을 기반으로 한 교육 모듈 설계의 중요성을 강조하였다.\n## Methodological\n디자인 및 개발 연구 접근법을 통해 체계적인 평가 방법론을 제시하였다.\n## Practical\n교사와 교육 정책 입안자에게 실질적인 교육 자료 개발 방향을 제공하였다.\n\n# Limitations\n- 연구 샘플이 제한적이며, 일반화 가능성이 낮다.\n- 교사 피드백이 특정 지역의 맥락에 국한될 수 있다.\n\n# Transferable Insights\n- 멀티미디어 학습 자료의 설계는 교육적 효과를 극대화하기 위해 이론적 기반이 필요하다.\n- 교사의 피드백은 교육 자료의 실제적 적용 가능성을 높이는 데 필수적이다.\n\n# Idea Seeds\n1. 다양한 학습 스타일을 고려한 멀티미디어 자료 개발.\n2. 게임화 요소를 포함한 교육 모듈 설계.\n3. 교사 연수를 통한 신기술 활용 능력 향상.\n\n# Citation Snippets\n> Rajab, S. S., Mohd-Yusoff, N., & Abdulaziz, M. (2025). Content Validation and Teacher Perspectives on an Interactive Module for the Arabic Language in Primary Education. The Eurasia Proceedings of Educational and Social Sciences.\n\ntags: #interactive_learning, #content_validation, #arabic_language_education, #primary_education, #educational_technology, #teacher_feedback, #multimedia_learning", "link": "https://doi.org/10.55549/epess.921", "altLink": "https://openalex.org/W4416865398", "hasDoi": true, "hasReview": true, "authors": ["Siti Sharah Rajab", "Nurahimah Mohd-Yusoff", "Mohamed Abdulaziz"], "categories": ["Curriculum", "Relevance (law)", "Arabic", "Content analysis", "Content validity"]}, {"id": "3", "source": "OPENALEX", "score": 21, "day": "2025-12-20", "title": "A Conceptual Framework for AI-Enhanced Pedagogical Competence in Secondary Mathematics Education", "content": "---\ntitle: A Conceptual Framework for AI-Enhanced Pedagogical Competence in Secondary Mathematics Education\nauthors: [Fasya Abdull Hamid, Nurwana Ahmad]\nyear: 2025\njournal: Perspektif Jurnal Sains Sosial Dan Kemanusiaan\ndoi: https://doi.org/10.37134/perspektif.vol17.sp.4.2025\nresearch_type: 개념적 연구\nmethodology: 개념적 방법론\ndata_type: 문헌 검토 및 이론적 통합\nsample: 명시되지 않음\ncontext: 중등 수학 교육\ntheoretical_framework: AI-강화 교수 역량 프레임워크\nkeywords: [AI, 교육, 수학 교육, 교수 역량, 데이터 리터러시, 윤리적 인식, 반성적 적응성, 협력적 참여]\n\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 인공지능(AI)의 급속한 발전이 중등 수학 교육에 미치는 영향을 분석하고, 교수 역량을 재정의하는 프레임워크를 제안한다. 이 프레임워크는 교수 지식(Pedagogical Knowledge, PK), 내용 지식(Content Knowledge, CK), 기술 지식(Technological Knowledge, TK)을 통합하고, 데이터 리터러시, 윤리적 인식, 반성적 적응성, 협력적 참여와 같은 횡단적 역량을 포함한다. 연구는 AI가 교육에서의 역할을 재조명하며, 기존의 TPACK 모델이 AI의 특정 요구를 충족하지 못하는 한계를 강조한다. 제안된 프레임워크는 AI를 교수의 파트너로 간주하며, 적응적 교수법과 윤리적 의사결정을 지원하는 방향으로 나아가야 함을 제시한다.\n\n# Research Logic\n## Problem\nAI의 발전이 중등 수학 교육에서 교수 역량의 전통적인 기대를 도전하고 있음.\n## Theory\n기존의 TPACK 모델이 AI의 요구를 충족하지 못하고, 새로운 프레임워크가 필요함.\n## Design\n문헌 검토, AI의 교실 내 응용에 대한 통찰 종합, 국제 정책 권장 사항과의 역량 정렬을 통해 개발됨.\n## Findings\nAI는 교수의 파트너로 작용하며, 적응적 교수법과 윤리적 의사결정을 지원함.\n## Conclusion\nAI 통합이 교육적으로 건전하고 윤리적으로 기반을 두며, 전문적으로 권한을 부여하는 방향으로 나아가야 함.\n\n# Key Findings\n- AI는 교수의 파트너로 작용하여 적응적 교수법을 지원함.\n- 기존의 TPACK 모델은 AI의 특정 요구를 충족하지 못함.\n- 데이터 리터러시와 윤리적 인식이 교수 역량의 핵심 요소로 강조됨.\n\n# Contributions\n## Theoretical\nAI-강화 교수 역량 프레임워크를 통해 기존 모델의 한계를 보완함.\n## Methodological\n개념적 방법론을 통해 AI 통합의 필요성을 체계적으로 분석함.\n## Practical\n교육자와 정책 입안자에게 AI 통합에 대한 실질적인 지침을 제공함.\n\n# Limitations\n- 연구의 샘플이 명시되지 않음.\n- 실증적 데이터 부족으로 인해 프레임워크의 적용 가능성에 대한 검증이 필요함.\n\n# Transferable Insights\n- AI 통합 교육에서의 교수 역량 재정의 필요성.\n- 데이터 리터러시와 윤리적 인식의 중요성 강조.\n\n# Idea Seeds\n1. AI 기반의 교수법 개발을 위한 교육자 연수 프로그램.\n2. AI와 인간 교사의 협력 모델 연구.\n3. 데이터 리터러시 교육을 위한 커리큘럼 개발.\n\n# Citation Snippets\n> Abdull Hamid, F., & Ahmad, N. J. (2025). A Conceptual Framework for AI-Enhanced Pedagogical Competence in Secondary Mathematics Education. Perspektif Jurnal Sains Sosial Dan Kemanusiaan, 17(Isu Khas), 43-58. https://doi.org/10.37134/perspektif.vol17.sp.4.2025\n\ntags: #AI, #교육, #수학교육, #교수역량, #데이터리터러시, #윤리적인식, #AI통합", "link": "https://doi.org/10.37134/perspektif.vol17.sp.4.2025", "altLink": "https://openalex.org/W7117707941", "hasDoi": true, "hasReview": true, "authors": ["Fasya  Abdull Hamid", "Nurwana Ahmad"], "categories": ["Competence (human resources)", "Conceptual framework", "Mathematics education", "Computer science", "Pedagogy"]}, {"id": "4", "source": "OPENALEX", "score": 21, "day": "2025-12-20", "title": "Psychological foundations of technology-mediated educational process management: a narrative review", "content": "---\ntitle: 기술 매개 교육 과정 관리의 심리적 기초: 서사적 리뷰\nauthors: [Olena Pinska, Svitlana V. Shokaliuk, Halyna Alieka, Iryna S. Zakarliuka]\nyear: 2025\njournal: Educational Technology Quarterly\ndoi: 10.55056/etq.1213\nresearch_type: 서사적 리뷰\nmethodology: Scopus AI를 활용한 문헌 발견 및 서사적 분석\ndata_type: 문헌\nsample: 명시되지 않음\ncontext: 기술 매개 교육 환경\ntheoretical_framework: 인지 부하 이론, 자기 결정 이론, 자기 조절 학습 이론, 사회 인지 이론, 정서적 관점\nkeywords: [교육 기술, 심리적 기초, 학습 관리, 인지 부하 이론, 자기 결정 이론, 자기 조절 학습, 기술 강화 학습, 교육 과정 관리, 통합 프레임워크]\n---\n\n# APA 7th style\n\n# Summary\n본 서사적 리뷰는 기술 매개 교육 과정 관리의 심리적 기초에 대한 연구를 종합하여 이론적 경관을 포괄적으로 매핑한다. 인지 부하 이론, 자기 결정 이론, 자기 조절 학습 프레임워크, 사회 인지 이론 및 정서적 관점이 학습 관리 시스템, 적응형 학습 플랫폼, 지능형 튜터링 시스템 및 학습 분석 애플리케이션의 설계에 어떻게 기여하는지를 분석한다. 이 리뷰는 심리적 연구와 교육 기술 실천 간의 중요한 격차를 드러내며, 이를 해결하기 위한 심리적 통합 프레임워크(PI-ETM)를 제안한다. 이 프레임워크는 심리적 기초, 교육 패러다임 정렬, 기술 구현 및 맥락적 실행을 연결하는 네 가지 레이어로 구성된다.\n\n# Research Logic\n## Problem\n기술의 발전이 심리적 기초에 대한 이해를 초과하여 교육 기술의 설계 및 구현에 대한 체계적인 이해가 부족하다.\n## Theory\n인지 부하 이론, 자기 결정 이론, 자기 조절 학습 이론, 사회 인지 이론 및 정서적 관점이 교육 기술 설계에 영향을 미친다.\n## Design\nScopus AI를 활용한 서사적 리뷰 방법론을 통해 문헌을 분석하고 통합 프레임워크를 제안한다.\n## Findings\n심리적 연구와 교육 기술 실천 간의 격차가 존재하며, 다양한 학습자 집단과 문화적 맥락에 대한 충분한 고려가 부족하다.\n## Conclusion\n심리적 통합 프레임워크는 교육 기술 관리의 이론적 및 실천적 지침을 제공한다.\n\n# Key Findings\n- 심리적 기초와 교육 기술 간의 연결이 부족하다.\n- 기술 구현의 이론적 근거가 부족하다.\n- 다양한 학습자 집단에 대한 고려가 부족하다.\n\n# Contributions\n## Theoretical\n심리적 기초와 교육 기술 간의 이론적 통합 기회를 제시한다.\n## Methodological\nAI 기반 문헌 발견 방법론을 통해 기존의 리뷰 방법론을 보완한다.\n## Practical\n교육 기술 설계자와 교육자에게 실용적인 지침을 제공한다.\n\n# Limitations\n- Scopus AI의 한계로 인해 문헌의 포괄성이 제한될 수 있다.\n- 서사적 리뷰의 주관성으로 인해 재현성이 제한될 수 있다.\n\n# Transferable Insights\n- 심리적 원칙을 교육 기술 설계에 통합하는 방법론적 접근이 필요하다.\n- 교육 기술의 발전에 따른 심리적 연구의 적시 적용이 중요하다.\n\n# Idea Seeds\n1. 심리적 기초를 기반으로 한 교육 기술 설계 가이드라인 개발\n2. 다양한 학습자 집단을 위한 맞춤형 교육 기술 솔루션 연구\n3. AI와 교육 기술의 융합을 통한 새로운 학습 경험 창출\n\n# Citation Snippets\n> Pinska, O., Shokaliuk, S. V., Alieka, H., & Zakarliuka, I. S. (2025). Psychological foundations of technology-mediated educational process management: a narrative review. Educational Technology Quarterly, 4, 449–474. https://doi.org/10.55056/etq.1213\n\ntags: #교육기술, #심리적기초, #학습관리, #인지부하이론, #자기결정이론, #자기조절학습, #기술강화학습, #교육과정관리, #통합프레임워크\n\n---\n\n요약: 이 논문은 기술 매개 교육 과정 관리의 심리적 기초를 서사적으로 리뷰하며, 심리적 연구와 교육 기술 실천 간의 격차를 드러낸다. 이를 해결하기 위해 심리적 통합 프레임워크를 제안하고, 교육 기술 설계에 대한 실용적인 지침을 제공한다.", "link": "https://doi.org/10.55056/etq.1213", "altLink": "https://openalex.org/W7116952260", "hasDoi": true, "hasReview": true, "authors": ["Olena Pinska", "Svitlana V. Shokaliuk", "Halyna Alieka"], "categories": ["Process (computing)", "Engineering ethics", "Scholarship", "Knowledge management", "Educational research"]}, {"id": "5", "source": "OPENALEX", "score": 18, "day": "2026-02-17", "title": "Who Is Doing the Thinking? AI as a Dynamic Cognitive Partner: A Learner-Informed Framework", "content": "Artificial intelligence is increasingly embedded in education, yet there remains a need to explain how students conceptualize AI's role in their thinking and learning. This study proposes a framework positioning AI as a dynamic cognitive partner whose function shifts across learning situations. Using qualitative analysis of written responses from 133 secondary students in Hong Kong following completion of an AI literacy course, we identified nine interrelated dimensions through which learners described AI as partnering with their cognition: conceptual scaffolding for difficult ideas; feedback and error detection; idea stimulation; cognitive organization; adaptive tutoring support; metacognitive monitoring support; task and cognitive load regulation; learning continuity beyond classroom boundaries; and explanation reframing through representational flexibility during moments of being stuck or overwhelmed. Across these dimensions, students distinguished between productive support that extends understanding and unproductive reliance that replaces cognitive effort, indicating situational awareness of when AI should and should not be used. Grounded in sociocultural theory, distributed cognition, self-regulated learning, and cognitive load perspectives, the framework clarifies how AI becomes integrated into learners' cognitive activity while illuminating the boundary between cognitive extension and substitution.", "link": "https://openalex.org/W7130482148", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["C. K. Y Chan"], "categories": ["Cognitive reframing", "Cognition", "Metacognition", "Flexibility (engineering)", "Psychology"]}, {"id": "6", "source": "ERIC", "score": 15, "day": "명시되지 않음", "title": "The Affordances of Artificial Intelligence-Based Tools for Supporting 21st-Century Skills: A Systematic Review of Empirical Research in Higher Education", "content": "Twenty-first-century skills should be integrated into higher education to prepare students for complex working-life challenges. Artificial intelligence (AI)-powered tools have the potential to optimise skill development among higher education students. Therefore, it is important to conceptualise relevant affordances of AI systems for 21st-century skills development in higher education. This study aimed to present an overview of journal articles published in the Web of Science database that specifically addressed the affordances of AI-based tools for 21st-century skills development. Four distinct categories of AI-based tools (intelligent tutoring systems, chatbots, AI-powered dashboards and automated grading systems) were identified as capable of promoting six main 21st-century skills (collaboration, communication, creativity, critical thinking, information and communication technology and problem-solving). The review revealed that the utilisation of AI-based tools might contribute to the simultaneous development of multiple 21stcentury skills (e.g., collaboration and critical thinking). The results showed that adaptive feedback from AI plays a significant role as a facilitator in the development of 21st-century skills. Furthermore, the utilisation of diverse functional AI affordances (e.g., prediction and profiling) might contribute to the development of various skills. AI-based technologies appeared to target the 21st-century skills of problem-solving and its subskills the most.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Ismail Celik", "Egle Gedrimiene", "Signe Siklander"], "categories": ["ERIC"]}, {"id": "7", "source": "ERIC", "score": 15, "day": "명시되지 않음", "title": "My Teammate Is AI: Understanding Students&apos; Perceptions of Student-AI Collaboration in Drawing Tasks", "content": "Educators expect artificial intelligence (AI) to augment student capabilities and rapidly transform teaching and learning practices. However, little is known about students' perceptions of AI and what they expect from AI in student-AI teaming. There is a lack of holistic understanding of the nature, effects, and areas of improvement in teamwork by students and AI on learning. This study aims to explore students' perceptions and experiences about student-AI collaboration (SAC) to provide effective measures for the successful integration and implementation of SAC. In-depth interviews were carried out with 20 undergraduate students in South Korea after a drawing task with AutoDraw. This study found that students expected AI to serve various roles, including a learning mate, a tutor, and an effective tool to complete the task during SAC. Students perceived that SAC could benefit both the students' affective domain and task performance. In contrast, students addressed multiple barriers to SAC both from the AI-related and student-related aspects. These findings can provide insights into the dynamic interaction between students and AI for problem-solving performance and meaningful learning. This study also provides implications on AI literacy education and the design of educational AI that can be made pedagogically rich to enhance student-AI teams.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Jinhee Kim", "Young Hoan Cho"], "categories": ["ERIC"]}, {"id": "8", "source": "ERIC", "score": 15, "day": "명시되지 않음", "title": "Lesson Study as an Approach to Facilitate the Integration of Gen-AI into EFL Curriculum Design in Higher Education", "content": "Purpose: This study investigates how English as a Foreign Language (EFL) teachers from higher education develop and refine their curriculum design with Generative Artificial Intelligence (Gen-AI) collaboration during the Lesson Study (LS). Design/methodology/approach: Through a qualitative case study approach, we followed six English teachers in their collaborative work with a Gen-AI teaching assistant (Kimi) over a 6-month semester. Data were collected through the recordings of LS cycles, teacher interviews and reflections and documentation of teacher-AI interactions etc. Findings: The findings revealed three key aspects of Gen-AI integration in designing EFL curriculum: First, teachers progressively discovered Kimi's capabilities in lesson planning, material development, and activity design, showing value in generating differentiated learning resources. Second, the teachers developed sophisticated collaboration patterns with the Gen-AI, demonstrating iterative refinement approaches and strategic integration of Gen-AI suggestions throughout the LS cycles. Third, teachers' critical reflections showed evolution in their evaluation and application of Gen-AI contributions, maintaining professional agency while leveraging Gen-AI capabilities effectively. Research limitations/implications: This study has several limitations that inform future research directions. Our investigation focused specifically on EFL higher education using a single Gen-AI tool (Kimi), which may limit the generalizability of the findings to other educational contexts and AI platforms. Practical implications: These findings suggest that Gen-AI integration through LS can enhance teachers' professional practice while promoting critical engagement with Gen-AI tools. The study provides insights into how Gen-AI can be meaningfully integrated into teacher professional development through collaborative LS approaches. Originality/value: The study demonstrates how the LS framework supports balanced AI integration while maintaining teacher agency. In addition, it reveals the process of AI capability discovery and strategic implementation in EFL teaching.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Zhi Jian Zhao", "Jiajia Li", "Yujia Hong"], "categories": ["ERIC"]}, {"id": "9", "source": "ERIC", "score": 15, "day": "명시되지 않음", "title": "Self-Regulated Learning with AI: A Comparative Analysis of General-Purpose and Task-Specific Platforms", "content": "Artificial intelligence (AI) offers opportunities for enhancing student self-regulated learning (SRL). This study investigates how two types of AI platforms--general-purpose AI (e.g., ChatGPT) and task-specific AI (e.g., EduGPT)--support SRL and satisfy students' psychological needs. Grounded in Zimmerman's SRL model and Self-Determination Theory (SDT), we examine the cognitive and motivational affordances provided by each AI type across multiple SRL phases. An experimental design involving 258 undergraduate students was implemented over an eight-week period. Participants were divided into three groups: general-purpose AI, task-specific AI, and control group. MANOVA results revealed that general-purpose AI tools primarily supported higher levels of autonomy and encouraged SRL skills such as goal setting, metacognitive reflection, and independent problem-solving. In contrast, task-specific AI tools were more effective in fostering competence and relatedness by providing structured guidance, timely feedback, and opportunities for social interaction, thereby enhancing effort regulation and social support. Thematic analysis further demonstrated distinct patterns in SRL strategies, with general-purpose AI promoting flexible self-directed learning, while task-specific AI provided scaffolding that encouraged incremental skill-building and collaboration. These findings underscore the complementary roles of the two AI tools in educational contexts, suggesting that a hybrid approach may optimize SRL.", "link": "https://eric.ed.gov/", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Xiu-Yi Wu", "Davy Tsz Kit Ng", "Thomas K. F. Chiu"], "categories": ["ERIC"]}];

function toggleTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSource(btn) {
  currentSource = btn.dataset.source;
  document.querySelectorAll('#sourceFilters .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSort(btn) {
  currentSort = btn.dataset.sort;
  document.querySelectorAll('#sortGroup .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  render();
}

function toggleFavorite(id, e) {
  e.stopPropagation();
  const idx = favorites.indexOf(id);
  if (idx === -1) {
    favorites.push(id);
  } else {
    favorites.splice(idx, 1);
  }
  localStorage.setItem('favorites', JSON.stringify(favorites));
  applyFilters();
}

function recordVisit(id) {
  if (!visited.includes(id)) {
    visited.push(id);
  }
  localStorage.setItem('visited', JSON.stringify(visited));
}

function recordSearch(query) {
  if (query.trim() && !searchHistory.includes(query)) {
    searchHistory.unshift(query);
    if (searchHistory.length > 10) searchHistory.pop();
    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
  }
}

function downloadJSON() {
  const data = JSON.stringify(filtered, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadCSV() {
  const headers = ['제목', '출처', '스코어', '리뷰여부', '링크'];
  const rows = filtered.map(p => [
    '"' + p.title.replace(/"/g, '""') + '"',
    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
