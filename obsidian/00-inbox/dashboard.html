<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>논문 요약 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
  <style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --ink: #191f28;
  --muted: #6b7684;
  --sub: #4e5968;
  --line: #e5e8eb;
  --line-light: #f3f5f7;
  --brand: #3182f6;
  --brand-bg: #e8f3ff;
  --brand-hover: #1b64da;
  --green: #05c46b;
  --green-bg: #e6f9f0;
  --yellow: #f59e0b;
  --yellow-bg: #fef3c7;
  --radius-card: 20px;
  --shadow: 0 2px 12px rgba(25,31,40,0.07);
}
[data-theme="dark"] {
  --bg: #131722;
  --card: #1e2330;
  --ink: #e5e8eb;
  --muted: #8b95a1;
  --sub: #a0aab4;
  --line: #2c3444;
  --line-light: #1a2638;
  --brand: #4d9cf8;
  --brand-bg: #172340;
  --brand-hover: #70b4ff;
  --green: #0be881;
  --green-bg: #0d3325;
  --yellow: #fcd34d;
  --yellow-bg: #664400;
  --shadow: none;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
  transition: background 0.2s, color 0.2s;
  line-height: 1.5;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 64px; }

/* ── Header ── */
.site-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 12px; color: var(--muted); white-space: nowrap; }
.btn-icon { 
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; cursor: pointer;
  font-size: 18px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--brand); color: var(--brand); }
.btn-theme { white-space: nowrap; padding: 6px 14px; }

/* ── Tabs ── */
.tabs-section {
  display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--line); overflow-x: auto;
  padding-bottom: 12px;
}
.tab-btn {
  border: none; background: transparent; padding: 6px 14px; 
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -12px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

/* ── Stats section ── */
.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-chip {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.stat-chip .num { color: var(--ink); font-size: 18px; font-weight: 800; }
.stat-chip.accent { border-color: var(--brand); background: var(--brand-bg); color: var(--brand); }
.stat-chip.accent .num { color: var(--brand); }

/* ── Chart Container ── */
.charts-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.chart-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px; min-height: 250px;
}
.chart-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--ink); }
.chart-box canvas { max-width: 100%; }

/* ── Tags cloud ── */
.tags-section {
  margin-bottom: 20px; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px;
}
.tags-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
.tags-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-item {
  background: var(--line-light); color: var(--sub); 
  border-radius: 12px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
}
.tag-item:hover { border-color: var(--brand); color: var(--brand); }

/* ── Toolbar ── */
.toolbar {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 8px; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-input {
  flex: 1; min-width: 160px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--ink); outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--brand); }
.search-input::placeholder { color: var(--muted); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 20px; background: var(--line); }
.btn-filter {
  border: 1px solid var(--line); border-radius: 999px;
  padding: 6px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-filter:hover { border-color: var(--brand); color: var(--brand); }
.btn-filter.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.input-label { font-size: 12px; color: var(--muted); font-weight: 700; white-space: nowrap; }
.input-group {
  display: flex; gap: 6px; align-items: center;
}
.input-sm {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  background: var(--bg); color: var(--ink); transition: border-color 0.15s;
}
.input-sm:focus { border-color: var(--brand); outline: none; }
.result-info { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-left: 2px; }

/* ── Action buttons ── */
.action-buttons {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-action {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--sub); transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.btn-action:hover { border-color: var(--brand); color: var(--brand); }

/* ── Date section ── */
.row-block { margin-bottom: 32px; }
.row-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.day-divider { flex: 1; height: 1px; background: var(--line); }

/* ── Grid layout ── */
.row-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
.row-grid.featured { 
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 14px;
}
.featured-card { 
  grid-row: span 2;
  min-height: auto;
}

/* ── Card ── */
.tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-card); padding: 16px;
  min-height: 300px; display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative; cursor: pointer;
  overflow: hidden;
}
.tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(49, 130, 246, 0.03) 100%);
  pointer-events: none;
}
.tile:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 12px 24px rgba(49, 130, 246, 0.15);
  border-color: var(--brand);
}
[data-theme="dark"] .tile:hover { 
  box-shadow: 0 12px 24px rgba(77, 156, 248, 0.25);
}
.tile.visited { opacity: 0.85; }
.tile-head {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 10px; gap: 6px; z-index: 1; position: relative;
}
.tile-actions {
  display: flex; gap: 6px;
}
.btn-star {
  background: none; border: none; font-size: 16px; cursor: pointer;
  transition: all 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}
.btn-star:hover { transform: scale(1.2); }
.btn-star.active { color: var(--yellow); }
.badge-wrap { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.badge {
  background: var(--brand-bg); color: var(--brand);
  border-radius: 999px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
}
.review-tag {
  background: var(--green-bg); color: var(--green);
  border-radius: 999px; padding: 3px 8px;
  font-size: 11px; font-weight: 700;
}
.score {
  color: var(--muted); font-size: 11px; font-weight: 700;
  white-space: nowrap; padding-top: 2px;
}
.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  position: relative; z-index: 1;
}
.featured-card .card-title {
  font-size: 16px; -webkit-line-clamp: 4;
}
.content-wrap {
  position: relative; flex: 1; overflow: hidden;
  max-height: 160px; margin-bottom: 12px;
}
.featured-card .content-wrap {
  max-height: 200px;
}
.content-wrap::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none;
}
.content {
  font-size: 12px; line-height: 1.6; color: var(--sub);
  position: relative; z-index: 1;
}
.content p { margin-bottom: 4px; }
.content h1, .content h2, .content h3,
.content h4, .content h5, .content h6 {
  font-size: 12px; font-weight: 700; margin: 6px 0 2px; color: var(--ink);
}
.content ul, .content ol { padding-left: 14px; margin-bottom: 4px; }
.content li { margin-bottom: 2px; }
.content blockquote {
  border-left: 3px solid var(--brand); padding-left: 8px;
  color: var(--muted); margin: 4px 0; font-style: italic;
}
.content code {
  background: var(--bg); border-radius: 4px;
  padding: 1px 4px; font-size: 11px; font-family: monospace;
}
.content strong { color: var(--ink); font-weight: 700; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
.card-link {
  text-decoration: none; color: var(--brand); font-size: 12px; font-weight: 700;
  padding: 5px 12px; border: 1px solid var(--brand);
  border-radius: 8px; transition: all 0.15s;
  white-space: nowrap;
}
.card-link:hover { background: var(--brand); color: #fff; }
.card-link.alt {
  color: var(--muted); border-color: var(--line); font-weight: 600;
}
.card-link.alt:hover { background: var(--line); color: var(--ink); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal-content {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; max-width: 700px; width: 90%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: slideUp 0.3s;
}
.modal-close {
  position: sticky; top: 0; right: 0; padding: 12px 16px;
  background: var(--card); border: none; font-size: 24px; cursor: pointer;
  color: var(--muted); float: right; z-index: 10;
}
.modal-close:hover { color: var(--brand); }
.modal-body { padding: 20px; clear: both; }
.modal-body h3 { font-size: 18px; font-weight: 800; margin-bottom: 12px; color: var(--ink); }
.modal-body .content { font-size: 13px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 64px 20px; color: var(--muted);
  background: var(--card); border: 1px dashed var(--line); border-radius: 16px;
}
.empty-state p { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state small { font-size: 13px; }

/* ── Pagination ── */
.pagination {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; margin-top: 40px; flex-wrap: wrap;
}
.btn-page {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 7px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--ink);
  transition: all 0.15s; min-width: 38px;
}
.btn-page:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-page.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ── Responsive ── */
@media (max-width: 1200px) { 
  .row-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1.5fr 1fr 1fr; }
  .charts-container { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .row-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .row-grid.featured { grid-template-columns: 1fr 1fr; }
  .charts-container { grid-template-columns: 1fr; }
  .tile:hover { transform: translateY(-2px); }
}
@media (max-width: 560px) {
  .wrap { padding: 16px 12px 40px; }
  .row-grid { grid-template-columns: 1fr; }
  .row-grid.featured { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
  .stats-container { grid-template-columns: repeat(2, 1fr); }
  .tabs-section { gap: 4px; }
  .toolbar { flex-direction: column; position: static; }
  .search-input { min-width: 100%; }
  .filter-group { width: 100%; }
  .modal-content { width: 95%; }
}

/* ── Score bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--yellow); }
.score-dot.low { background: var(--muted); }
.score-text { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }

/* ── Authors on card ── */
.card-authors {
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Category filter ── */
.cat-filter-wrap {
  margin-bottom: 16px; background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; padding: 10px 14px;
}
.cat-filter-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.cat-filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tag {
  background: var(--line-light); color: var(--sub);
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.cat-tag:hover { border-color: var(--brand); color: var(--brand); }
.cat-tag.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.cat-tag-clear {
  color: var(--muted); font-size: 11px; cursor: pointer; margin-right: 4px;
  padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; transition: all 0.15s;
}
.cat-tag-clear:hover { color: var(--brand); border-color: var(--brand); }

/* ── Date filter ── */
.input-date {
  border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px;
  font-size: 12px; background: var(--bg); color: var(--ink);
  cursor: pointer; transition: border-color 0.15s; max-width: 130px;
}
.input-date:focus { border-color: var(--brand); outline: none; }

/* ── Hide visited toggle ── */
.btn-visited {
  border: 1px solid var(--line); border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.btn-visited:hover { border-color: var(--brand); color: var(--brand); }
.btn-visited.active { background: var(--brand-bg); border-color: var(--brand); color: var(--brand); }

/* ── Back to top ── */
.btn-back-top {
  position: fixed; bottom: 28px; right: 24px;
  background: var(--brand); color: #fff; border: none;
  border-radius: 50%; width: 44px; height: 44px;
  font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(49,130,246,0.35);
  z-index: 500; transition: all 0.2s;
}
.btn-back-top.visible { display: flex; }
.btn-back-top:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,130,246,0.45); }

/* ── Search hint ── */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--muted); pointer-events: none; background: var(--bg); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line); }
</style>
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div class="header-left">
        <h1>📚 논문 대시보드</h1>
        <span class="subtitle">AI &amp; Education 관련 최신 논문 큐레이션</span>
      </div>
      <div class="header-right">
        <span class="updated">✏️ 2026-04-16 23:39</span>
        <button class="btn-icon btn-theme" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙 다크 모드</button>
      </div>
    </header>

    <div class="tabs-section">
      <button class="tab-btn active" data-tab="all" onclick="toggleTab('all')">전체</button>
      <button class="tab-btn" data-tab="reviewed" onclick="toggleTab('reviewed')">리뷰 완료</button>
      <button class="tab-btn" data-tab="favorites" onclick="toggleTab('favorites')">⭐ 즐겨찾기</button>
    </div>

    <div class="stats-container" id="statsBar"></div>

    <div class="charts-container">
      <div class="chart-box">
        <h3>출처별 분포</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-action" onclick="downloadJSON()" title="JSON 다운로드">📥 JSON</button>
      <button class="btn-action" onclick="downloadCSV()" title="CSV 다운로드">📊 CSV</button>
      <button class="btn-action" onclick="shareCurrentView()" title="현재 필터 공유">🔗 공유</button>
    </div>

    <div class="cat-filter-wrap">
      <div class="cat-filter-label">카테고리 필터</div>
      <div class="cat-filter-tags" id="catFilterTags"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search"
               placeholder="🔍 제목 · 내용 검색..." oninput="applyFilters()" style="width:100%" />
        <span class="search-hint">/ 단축키</span>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sourceFilters">
        <button class="btn-filter active" data-source="ALL" onclick="setSource(this)">전체</button>
        <button class="btn-filter" data-source="ARXIV" onclick="setSource(this)">arXiv</button>
        <button class="btn-filter" data-source="ERIC" onclick="setSource(this)">ERIC</button>
        <button class="btn-filter" data-source="OPENALEX" onclick="setSource(this)">OpenAlex</button>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group" id="sortGroup">
        <button class="btn-filter active" data-sort="score" onclick="setSort(this)">점수순</button>
        <button class="btn-filter" data-sort="date" onclick="setSort(this)">최신순</button>
        <button class="btn-filter" data-sort="review" onclick="setSort(this)">리뷰순</button>
      </div>
      <div class="filter-divider"></div>
      <div class="input-group">
        <label class="input-label">최소 점수</label>
        <select class="input-sm" id="scoreFilter" onchange="applyFilters()">
          <option value="0">전체</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
          <option value="15">15+</option>
          <option value="20">20+</option>
        </select>
      </div>
      <div class="filter-divider"></div>

  <script>
const PAPERS = [{"id": "0", "source": "ARXIV", "score": 19, "day": "2026-04-08", "title": "Assessing the Impact and Underlying Pathways of Sequenced AI feedback on Student Learning", "content": "---\ntitle: 학생 학습에 대한 순차적 AI 피드백의 영향 및 기저 경로 평가\nauthors: Jie Cao, Chloe Qianhui Zhao, Christian Schunn, Elizabeth A. McLaughlin, Jionghao Lin, Kenneth R. Koedinger\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2604.07469v2\nresearch_type: 실험 연구\nmethodology: 무작위 배정 실험\ndata_type: 정량적 데이터\nsample: 199명\ncontext: 온라인 고등 교육\ntheoretical_framework: 학습자 중심 피드백 이론\nkeywords: [AI 피드백, 학습 성과, 인지 참여, 행동 참여, 정서적 인식]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 순차적 AI 피드백이 학생 학습에 미치는 영향을 평가하고, 이러한 피드백이 학습 성과, 인지 및 행동 참여, 정서적 인식에 미치는 영향을 분석하였다. 199명의 참가자를 무작위로 배정하여 순차적 또는 비순차적 AI 피드백을 제공하였고, 결과적으로 순차적 피드백이 약간 높은 행동 참여를 유도하였으나, 학습 성과는 비순차적 피드백에 비해 유의미하게 낮았다. 이는 순차적 피드백이 긍정적인 정서적 경로를 통해 학습 참여를 촉진하지만, 높은 정신적 노력을 요구하여 학습 성과에 부정적인 영향을 미친다는 것을 시사한다. 연구 결과는 AI 기반 피드백 시스템 설계에 대한 중요한 통찰을 제공한다.\n\n# Research Logic\n## Problem\n순차적 AI 피드백이 학생의 학습 성과에 미치는 영향이 불확실하다.\n## Theory\n학습자 중심 피드백 이론에 기반하여, 피드백이 학생의 참여와 자율성을 어떻게 촉진하는지를 탐구한다.\n## Design\n199명의 참가자를 대상으로 순차적 및 비순차적 AI 피드백을 비교하는 무작위 배정 실험을 실시하였다.\n## Findings\n순차적 피드백은 행동 참여를 증가시키지만, 학습 성과는 비순차적 피드백보다 낮았다.\n## Conclusion\n순차적 피드백은 긍정적인 인식을 유도하지만, 실제 학습 성과에는 부정적인 영향을 미친다.\n\n# Key Findings\n- 순차적 AI 피드백은 행동 참여를 약간 증가시켰다.\n- 순차적 피드백은 학생의 독립성을 지원하는 것으로 인식되었다.\n- 순차적 피드백은 높은 정신적 노력을 요구하여 학습 성과를 저하시켰다.\n\n# Contributions\n## Theoretical\nAI 피드백의 효과에 대한 새로운 통찰을 제공하며, 학습자 중심 피드백 이론을 확장한다.\n## Methodological\n무작위 배정 실험을 통해 피드백 유형의 영향을 비교하는 방법론적 기여를 한다.\n## Practical\nAI 기반 피드백 시스템 설계 시 고려해야 할 요소들을 제시한다.\n\n# Limitations\n- 샘플 크기가 제한적이며, 특정 교육 환경에 국한될 수 있다.\n- 피드백의 장기적인 효과에 대한 분석이 부족하다.\n\n# Transferable Insights\n- 순차적 피드백이 긍정적인 정서적 반응을 유도할 수 있지만, 학습 성과에 부정적 영향을 미칠 수 있다.\n- AI 피드백 설계 시 학생의 정신적 부담을 고려해야 한다.\n\n# Idea Seeds\n1. 다양한 교육 환경에서 순차적 피드백의 효과를 비교하는 연구.\n2. AI 피드백의 장기적 효과를 평가하는 연구.\n3. 학생의 정신적 부담을 줄이기 위한 피드백 설계 개선 방안.\n\n# Citation Snippets\n> Cao, J., Zhao, C. Q., Schunn, C., McLaughlin, E. A., Lin, J., & Koedinger, K. R. (2026). Assessing the Impact and Underlying Pathways of Sequenced AI feedback on Student Learning. arXiv. https://arxiv.org/abs/2604.07469v2\n\ntags: #AI피드백, #학습성과, #인지참여, #행동참여, #정서적인식, #교육기술, #피드백디자인\n\n---\n\n짧은 요약: 본 연구는 순차적 AI 피드백이 학생의 학습 성과에 미치는 영향을 분석하였다. 결과적으로 순차적 피드백은 행동 참여를 증가시켰으나, 학습 성과는 비순차적 피드백보다 낮았다. 이는 AI 피드백 설계 시 긍정적인 인식과 학습 성과 간의 균형을 고려해야 함을 시사한다.", "link": "https://arxiv.org/abs/2604.07469v2", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Jie Cao", "Chloe Qianhui Zhao", "Christian Schunn"], "categories": ["cs.HC"]}, {"id": "1", "source": "ARXIV", "score": 17, "day": "2026-04-15", "title": "Automatically Inferring Teachers' Geometric Content Knowledge: A Skills Based Approach", "content": "---\ntitle: Automatically Inferring Teachers' Geometric Content Knowledge: A Skills Based Approach\nauthors: Ziv Fenigstein, Kobi Gal, Avi Segal, Osama Swidan, Inbal Israel, Hassan Ayoob\nyear: 2026\njournal: arXiv\ndoi: https://arxiv.org/abs/2604.13666v1\nresearch_type: 실험적 연구\nmethodology: 자동화된 분류 접근법\ndata_type: 응답 데이터\nsample: 31명의 예비 교사\ncontext: 기하학 교육\ntheoretical_framework: Van Hiele 모델\nkeywords: [기하학, 교육 기술, AI, 교사 교육, 자동화 평가]\n---\n\n# APA 7th style\n\n# Summary\n이 연구는 교사의 기하학적 내용 지식을 평가하기 위한 자동화된 접근법을 개발하였다. Van Hiele 모델을 기반으로 하여, 연구자들은 기하학적 추론 수준을 33개의 세부 기술로 분해한 구조화된 기술 사전을 구축하였다. 31명의 예비 교사가 기하학 문제를 해결한 226개의 응답을 수집하고, 전문가들이 각 응답을 Van Hiele 수준으로 주석 처리하였다. 연구 결과, 기술 정보를 포함한 분류 접근법이 기존의 기준선보다 유의미하게 성능이 향상되었음을 보여주었다. 이 연구는 기하학 교육의 대규모 평가를 가능하게 하는 이론 기반의 방법을 제공한다.\n\n# Research Logic\n## Problem\n교사의 기하학적 내용 지식을 평가하는 것은 교육 품질을 높이는 데 필수적이나, 기존 방법은 시간과 비용이 많이 소요된다.\n## Theory\nVan Hiele 모델은 기하학적 사고를 다섯 개의 계층적 수준으로 설명하며, 각 수준은 특정한 사고 기술을 포함한다.\n## Design\n31명의 예비 교사가 기하학 문제에 대한 응답을 제공하고, 이를 기반으로 두 가지 분류 접근법(RAG, MTL)을 개발하였다.\n## Findings\n기술 정보를 포함한 분류 접근법이 기준선보다 모든 평가 지표에서 유의미하게 우수한 성과를 보였다.\n## Conclusion\n이 연구는 기하학적 추론 수준을 자동으로 분류하는 첫 번째 접근법을 제시하며, 대규모 평가와 개인화된 교사 학습 시스템을 지원할 수 있는 가능성을 보여준다.\n\n# Key Findings\n- 기술 정보를 포함한 분류 접근법이 기존 방법보다 성능이 향상됨.\n- 226개의 응답 데이터셋이 구축되어 기하학적 사고 수준을 평가하는 데 사용됨.\n- Van Hiele 모델을 기반으로 한 자동화된 평가 방법이 제안됨.\n\n# Contributions\n## Theoretical\n기하학적 사고의 평가를 위한 새로운 이론적 기초 제공.\n## Methodological\n기술 기반 분류 접근법을 통한 자동화된 평가 방법 개발.\n## Practical\n교사의 기하학적 내용 지식을 대규모로 평가할 수 있는 실용적인 방법 제시.\n\n# Limitations\n- 연구 샘플이 제한적이며, 다양한 교육 환경에서의 일반화 가능성에 대한 검증이 필요함.\n- 기하학적 사고 수준의 평가가 특정 문제 유형에 의존할 수 있음.\n\n# Transferable Insights\n- 기술 기반 접근법이 교육 평가의 효율성을 높일 수 있음.\n- 대규모 데이터 수집 및 분석을 통한 교육 연구의 확장 가능성.\n\n# Idea Seeds\n1. 다양한 과목에 대한 유사한 자동화된 평가 방법 개발.\n2. 기술 사전을 확장하여 다른 교육 분야에 적용 가능성 탐색.\n3. 교사 교육 프로그램에 통합하여 실시간 피드백 제공.\n\n# Citation Snippets\n> Fenigstein, Z., Gal, K., Segal, A., Swidan, O., Israel, I., & Ayoob, H. (2026). Automatically Inferring Teachers' Geometric Content Knowledge: A Skills Based Approach. arXiv. https://arxiv.org/abs/2604.13666v1\n\ntags: #기하학, #교육기술, #AI, #교사교육, #자동화평가, #기술사전, #VanHiele모델", "link": "https://arxiv.org/abs/2604.13666v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Ziv Fenigstein", "Kobi Gal", "Avi Segal"], "categories": ["cs.CY", "cs.AI", "cs.LG"]}, {"id": "2", "source": "ARXIV", "score": 13, "day": "2026-04-14", "title": "A sequential explanatory mixed-methods study on the acceptance of a social robot for EFL speaking practice among Chinese primary school students: Insights from the Computers Are Social Actors (CASA) paradigm", "content": "---\ntitle: 중국 초등학생의 EFL 말하기 연습을 위한 소셜 로봇 수용에 대한 순차적 설명 혼합 방법 연구: CASA 패러다임의 통찰\nauthors: Yiran Du, Jinlong Li, Huimin He, Chenghao Wang, Bin Zou\nyear: 2026\njournal: 명시되지 않음\ndoi: 명시되지 않음\nresearch_type: 혼합 방법 연구\nmethodology: 순차적 설명 혼합 방법\ndata_type: 양적 및 질적 데이터\nsample: 436명의 초등학생 및 12명의 심층 인터뷰 참가자\ncontext: 중국 초등학교 EFL 교육\ntheoretical_framework: 기술 수용 모델(TAM), 컴퓨터는 사회적 행위자(CASA) 패러다임\nkeywords: [소셜 로봇, 기술 수용 모델, EFL 말하기 연습, 초등 교육, CASA 패러다임]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 중국 초등학생의 EFL 말하기 연습을 위한 소셜 로봇 수용을 조사하였다. 기술 수용 모델(TAM)과 컴퓨터는 사회적 행위자(CASA) 패러다임을 통합하여, 로봇 사용에 대한 행동 의도에 영향을 미치는 기능적 및 사회적 요인을 탐구하였다. 436명의 학생으로부터 수집된 양적 데이터는 구조 방정식 모델링을 통해 분석되었으며, 12명의 학생과의 질적 인터뷰를 통해 결과를 해석하였다. 연구 결과, 인식된 즐거움과 사용 용이성이 수용의 가장 강력한 예측 변수로 나타났으며, 사회적 속성은 즐거움을 크게 향상시켰다. 감정적 및 사회적 참여가 교육 로봇 수용의 중심 요소임을 강조하였다.\n\n# Research Logic\n## Problem\n중국에서 EFL 말하기 연습을 위한 소셜 로봇의 수용이 제한적이다.\n## Theory\n기술 수용 모델(TAM)과 CASA 패러다임을 통해 수용 요인을 분석하였다.\n## Design\n양적 및 질적 연구를 결합한 순차적 설명 혼합 방법을 사용하였다.\n## Findings\n인식된 즐거움과 사용 용이성이 수용에 가장 큰 영향을 미쳤으며, 사회적 속성이 긍정적 경험을 증대시켰다.\n## Conclusion\n감정적 및 사회적 참여가 교육 로봇의 수용에 중요한 역할을 한다.\n\n# Key Findings\n- 인식된 즐거움과 사용 용이성이 소셜 로봇 수용의 주요 예측 변수이다.\n- 사회적 속성(따뜻함, 인격화, 사회적 존재감)이 즐거움을 증대시킨다.\n- 인식된 지능은 유용성에 영향을 미치지만 사용 용이성에는 영향을 미치지 않는다.\n\n# Contributions\n## Theoretical\nTAM과 CASA 패러다임의 통합을 통해 로봇 수용에 대한 새로운 통찰을 제공한다.\n## Methodological\n양적 및 질적 방법의 결합을 통해 포괄적인 이해를 도모하였다.\n## Practical\n교육 로봇 설계 시 감정적 및 사회적 요소를 고려해야 함을 강조한다.\n\n# Limitations\n- 연구 샘플이 특정 지역의 초등학교에 국한되어 일반화에 한계가 있다.\n- 질적 데이터의 해석이 주관적일 수 있다.\n\n# Transferable Insights\n- 소셜 로봇의 설계 시 사회적 속성을 강화해야 한다.\n- 교육 기술의 수용을 높이기 위해 감정적 참여를 촉진해야 한다.\n\n# Idea Seeds\n1. 다양한 사회적 속성을 가진 로봇의 효과 비교 연구.\n2. 로봇과의 상호작용이 학생의 언어 능력에 미치는 장기적 영향 분석.\n3. 다른 문화권에서의 소셜 로봇 수용 연구.\n\n# Citation Snippets\n> Du, Y., Li, J., He, H., Wang, C., & Zou, B. (2026). A sequential explanatory mixed-methods study on the acceptance of a social robot for EFL speaking practice among Chinese primary school students: Insights from the Computers Are Social Actors (CASA) paradigm.\n\ntags: #소셜로봇, #기술수용모델, #EFL, #초등교육, #CASA, #교육기술, #로봇학습\n\n---\n\n요약: 본 연구는 중국 초등학생의 EFL 말하기 연습을 위한 소셜 로봇 수용을 조사하였다. 기술 수용 모델과 CASA 패러다임을 통합하여, 인식된 즐거움과 사용 용이성이 수용의 주요 요인임을 발견하였다. 감정적 및 사회적 참여가 로봇 수용에 중요한 역할을 한다는 점을 강조하였다.", "link": "https://arxiv.org/abs/2604.12789v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Yiran Du", "Jinlong Li", "Huimin He"], "categories": ["cs.HC"]}, {"id": "3", "source": "ARXIV", "score": 13, "day": "2026-04-14", "title": "A Scoping Review of Large Language Model-Based Pedagogical Agents", "content": "---\ntitle: A Scoping Review of Large Language Model-Based Pedagogical Agents\nauthors: Shan Li, Juan Zheng\nyear: 2026\njournal: 명시되지 않음\ndoi: https://arxiv.org/abs/2604.12253v1\nresearch_type: 스코핑 리뷰\nmethodology: PRISMA-ScR 가이드라인에 따른 문헌 분석\ndata_type: 문헌\nsample: 52개 연구\ncontext: 교육 환경\ntheoretical_framework: 명시되지 않음\nkeywords: [Large Language Model, LLM, Pedagogical Agent, AI in Education, Multi-agent]\n---\n\n# APA 7th style\n\n# Summary\n본 스코핑 리뷰는 교육 환경에서의 대형 언어 모델(LLM) 기반 교수 에이전트의 발전을 조사하였다. 전통적인 교수 에이전트와 달리 LLM의 통합은 자연어 이해, 추론 및 적응에서 전례 없는 능력을 제공한다. 2022년 11월부터 2025년 1월까지 5개의 주요 데이터베이스에서 52개의 연구를 분석한 결과, K-12, 고등 교육 및 비공식 학습 맥락에서 다양한 LLM 기반 에이전트를 발견하였다. 이 연구는 상호작용 접근 방식, 도메인 범위, 역할 복잡성 및 시스템 통합의 네 가지 주요 설계 차원을 식별하였다. 또한 다중 에이전트 시스템, 가상 학생 시뮬레이션, 몰입형 기술 통합 및 학습 분석과의 조합과 같은 새로운 경향을 논의하였다. 이 리뷰는 LLM 기반 교수 에이전트에 대한 포괄적인 이해를 제공하며, 이 분야의 미래 개발을 위한 중요한 영역을 식별한다.\n\n# Research Logic\n## Problem\nLLM 기반 교수 에이전트의 설계 및 구현에 대한 명확한 이해 부족.\n## Theory\nLLM의 통합이 교육적 상호작용을 어떻게 변화시키는지에 대한 이론적 탐구.\n## Design\nPRISMA-ScR 가이드라인에 따른 스코핑 리뷰 방법론.\n## Findings\n다양한 교육 맥락에서 LLM 기반 교수 에이전트의 광범위한 적용과 네 가지 설계 차원 발견.\n## Conclusion\nLLM 기반 교수 에이전트는 개인화된 학습을 혁신할 잠재력을 지니며, 연구의 공백과 윤리적 고려사항을 강조.\n\n# Key Findings\n- LLM 기반 교수 에이전트는 K-12, 고등 교육 및 비공식 학습 맥락에서 다양하게 활용되고 있다.\n- 상호작용 접근 방식, 도메인 범위, 역할 복잡성 및 시스템 통합의 네 가지 설계 차원이 식별되었다.\n- 다중 에이전트 시스템 및 몰입형 기술과의 통합이 새로운 경향으로 나타났다.\n\n# Contributions\n## Theoretical\nLLM 기반 교수 에이전트의 설계 및 구현에 대한 이론적 기초 제공.\n## Methodological\nPRISMA-ScR 가이드라인을 통한 체계적이고 투명한 연구 방법론 제시.\n## Practical\n교육자와 연구자에게 LLM 기반 교수 에이전트의 현재 상태와 미래 방향에 대한 통찰 제공.\n\n# Limitations\n- LLM 기반 교수 에이전트의 적용 사례가 제한적이다.\n- 연구의 대부분이 영어로 진행되어 언어적 편향이 존재할 수 있다.\n\n# Transferable Insights\n- LLM 기반 교수 에이전트의 설계 차원은 다른 교육 기술 개발에 적용 가능하다.\n- 윤리적 고려사항은 모든 교육 기술 개발에 필수적으로 포함되어야 한다.\n\n# Idea Seeds\n1. LLM 기반 교수 에이전트의 효과를 평가하기 위한 실험적 연구 설계.\n2. 다양한 교육 환경에서의 LLM 기반 에이전트의 사용자 경험 연구.\n3. LLM과 몰입형 기술의 통합을 통한 새로운 교육 모델 개발.\n\n# Citation Snippets\n> Li, S., & Zheng, J. (2026). A Scoping Review of Large Language Model-Based Pedagogical Agents. \n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy\n\n---\n\n요약: 본 연구는 LLM 기반 교수 에이전트의 교육적 활용을 조사하며, 다양한 교육 맥락에서의 적용 사례와 설계 차원을 제시한다. LLM의 통합은 교육적 상호작용을 혁신할 잠재력을 지니며, 연구의 공백과 윤리적 고려사항을 강조한다.", "link": "https://arxiv.org/abs/2604.12253v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Shan Li", "Juan Zheng"], "categories": ["cs.AI"]}, {"id": "4", "source": "ARXIV", "score": 13, "day": "2026-04-13", "title": "Mathematics Teachers Interactions with a Multi-Agent System for Personalized Problem Generation", "content": "---\ntitle: Mathematics Teachers Interactions with a Multi-Agent System for Personalized Problem Generation\nauthors: [Candace Walkington, Theodora Beauchamp, Fareya Ikram, Merve Koçyiğit Gürbüz, Fangli Xia, Margan Lee, Andrew Lan]\nyear: 2026\njournal: 명시되지 않음\ndoi: https://arxiv.org/abs/2604.12066v1\nresearch_type: 실증 연구\nmethodology: 질적 및 양적 분석\ndata_type: 텍스트 데이터, 로그 데이터, 설문 응답\nsample: 8명의 중학교 수학 교사 및 364명의 학생\ncontext: 미국 중학교 수학 교육\ntheoretical_framework: 관심 이론\nkeywords: [human-ai collaboration, classroom ai, ai tutoring, instructional design, scaffolding, tpack, ai literacy, teacher ai, education, learning analytics, llm classroom, ai pedagogy]\n---\n\n# APA 7th style\n\n# Summary\n본 연구는 중학교 수학 문제를 개인화하기 위한 다중 에이전트 시스템을 조사하였다. 교사는 기본 문제와 원하는 주제를 입력하고, 대형 언어 모델(LLM)이 문제를 생성하며, 네 개의 AI 에이전트가 각각 수학적 정확성, 진정성, 가독성 및 현실성을 평가한다. 8명의 중학교 수학 교사가 ASSISTments를 사용하여 212개의 문제를 생성하고 이를 학생들에게 배포하였다. 연구 결과, 교사와 학생 모두 문제의 현실적 맥락을 수정하고자 하였으며, 이는 진정성과 적합성 문제를 나타낸다. 에이전트는 문제 작성 중 많은 현실성 문제를 감지하였으나, 최종 버전에서는 교사와 학생이 지적한 현실성 문제는 적었다. 가독성과 수학적 환각 문제도 드물게 나타났다. 본 연구는 교사 통제를 지원하는 개인화 다중 에이전트 시스템의 함의를 제시한다.\n\n# Research Logic\n## Problem\n중학교 수학 문제의 개인화 과정에서 교사와 학생의 요구를 충족시키는 데 어려움이 있다.\n\n## Theory\n관심 이론에 기반하여, 개인화된 과제가 학생의 학습 동기와 참여를 증진시킬 수 있음을 제시한다.\n\n## Design\n다중 에이전트 시스템을 통해 교사가 문제를 입력하고 AI가 이를 평가 및 수정하는 구조로 설계되었다.\n\n## Findings\n교사와 학생은 문제의 진정성과 현실성을 수정하고자 하였으며, 최종 문제에서 현실성 문제는 적었다.\n\n## Conclusion\n교사 통제를 지원하는 개인화 시스템이 학생의 흥미를 유도할 수 있는 가능성을 보여준다.\n\n# Key Findings\n- 교사와 학생 모두 문제의 맥락을 수정하고자 하였다.\n- 최종 문제에서 현실성 문제는 드물게 나타났다.\n- 가독성 문제와 수학적 환각 문제도 적게 발생하였다.\n\n# Contributions\n## Theoretical\n관심 이론을 기반으로 한 개인화된 학습 경험의 중요성을 강조하였다.\n\n## Methodological\n다중 에이전트 시스템의 설계와 평가 방법론을 제시하였다.\n\n## Practical\n교사와 학생의 요구를 반영한 문제 생성 시스템의 실제 적용 가능성을 보여주었다.\n\n# Limitations\n- 연구 샘플이 제한적이며, 특정 지역의 교사와 학생에 국한되었다.\n- 다중 에이전트 시스템의 효과성에 대한 장기적인 데이터가 부족하다.\n\n# Transferable Insights\n- 개인화된 학습 경험을 제공하기 위해 교사의 전문 지식을 활용할 필요가 있다.\n- AI 시스템의 설계 시 학생의 흥미와 현실성을 고려해야 한다.\n\n# Idea Seeds\n1. 다양한 주제를 반영한 문제 생성 시스템 개발.\n2. 학생의 피드백을 실시간으로 반영하는 AI 시스템 개선.\n3. 교사와 학생 간의 협력적 문제 해결을 위한 플랫폼 구축.\n\n# Citation Snippets\n> Walkington, C., Beauchamp, T., Ikram, F., Gürbüz, M. K., Xia, F., Lee, M., & Lan, A. (2026). Mathematics Teachers Interactions with a Multi-Agent System for Personalized Problem Generation. \n\ntags: #human-ai collaboration, #classroom ai, #ai tutoring, #instructional design, #scaffolding, #tpack, #ai literacy, #teacher ai, #education, #learning analytics, #llm classroom, #ai pedagogy\n\n---\n\n요약: 본 연구는 중학교 수학 문제의 개인화를 위한 다중 에이전트 시스템을 조사하였다. 교사와 학생 모두 문제의 진정성과 현실성을 수정하고자 하였으며, 최종 문제에서 현실성 문제는 드물게 나타났다. 연구는 교사 통제를 지원하는 개인화 시스템의 가능성을 제시한다.", "link": "https://arxiv.org/abs/2604.12066v1", "altLink": "", "hasDoi": false, "hasReview": true, "authors": ["Candace Walkington", "Theodora Beauchamp", "Fareya Ikram"], "categories": ["cs.AI", "cs.CY"]}, {"id": "5", "source": "ARXIV", "score": 13, "day": "2026-04-12", "title": "Perceived Importance of Cognitive Skills Among Computing Students in the Era of AI", "content": "The availability and increasing integration of generative AI tools have transformed computing education. While AI in education presents opportunities, it also raises new concerns about how these powerful know-it-all AI tools, which are becoming widespread, impact cognitive skill development among students. Cognitive skills are essential for academic success and professional competence. It relates to the ability to understand, analyze, evaluate, synthesize information and more. The extensive use of these AI tools can aid in cognitive offloading, freeing up cognitive resources to be used in other tasks and activities. However, cognitive offloading may inadvertently lead to diminishing cognitive involvement in learning and related activities when using AI tools. Understanding cognitive skills' impact in the era of AI is essential to align curricular design with evolving workforce demands and changing work environment and processes. To address this concern and to develop an understanding of how the importance of cognitive skills changes with increasing integration of AI, we conducted a researcher-monitored and regulated quantitative survey of undergraduate computing students. We examined students' perceptions of cognitive skills across three temporal frames: prior to widespread AI adoption (past), current informal and formal use of AI in learning contexts (present), and future with even more AI integration in professional environments (future). In the study, students rated the importance of 11 cognitive skills. Our analysis reveals that students expect all 11 cognitive skills to be of diminishing importance in the future, when AI use and integration increases. Our findings highlight the need for educational interventions that explicitly reinforce cognitive skill development within learning environments that are now often relying on AI.", "link": "https://arxiv.org/abs/2604.10730v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Neha Rani", "Erta Cenko", "Laura Melissa Cruz Castro"], "categories": ["cs.CY", "cs.AI"]}, {"id": "6", "source": "ARXIV", "score": 13, "day": "2026-04-12", "title": "Teaching Language Models How to Code Like Learners: Conversational Serialization for Student Simulation", "content": "Artificial models that simulate how learners act and respond within educational systems are a promising tool for evaluating tutoring strategies and feedback mechanisms at scale. However, many existing approaches in programming education rely on prompting large, proprietary language models, raising concerns around privacy, cost, and dependence. In this work, we propose a method for training open-weight artificial programming learners using authentic student process data. Our approach serializes temporal log traces into a conversational format, representing each student's problem-solving process as a dialogue between the learner and their automated assessment system. Student code submissions and environment feedback, such as test outcomes, grades, and error traces, form alternating conversational turns, enabling models to learn from the iterative debugging process. We additionally introduce a training pipeline combining supervised fine-tuning with preference optimization to align models with authentic student debugging behavior. We evaluate our framework by training Qwen models at 4B and 8B scales on a large-scale dataset of real student submissions to Python programming assignments. Our results show that incorporating environment feedback strengthens the models' ability to replicate student debugging behavior, improving over both prior code-only approaches and prompted large language models baselines in functional alignment and code similarity. We release our code to support reproducibility.", "link": "https://arxiv.org/abs/2604.10720v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Charles Koutcheme", "Arto Hellas", "Juho Leinonen"], "categories": ["cs.AI", "cs.CL", "cs.CY"]}, {"id": "7", "source": "ARXIV", "score": 12, "day": "2026-04-13", "title": "Use of AI Tools: Guidelines to Maintain Academic Integrity in Computing Colleges", "content": "The rapid adoption of AI tools such as ChatGPT has significantly transformed academic practices, offering considerable benefits for both students and faculty in computing disciplines. These tools have been shown to enhance learning efficiency, academic self-efficacy, and confidence. However, their increasing use also raises pressing concerns regarding the preservation of academic integrity -- an essential pillar of the educational process. This paper explores the implications of widespread AI tool usage within computing colleges, with a particular focus on how to align their use with the principles of academic honesty. We begin by classifying common assessment techniques employed in computing education and examine how each may be impacted by AI-assisted tools. Building on this foundation, we propose a set of general guidelines applicable across various assessment formats to help instructors responsibly integrate AI tools into their pedagogy. Furthermore, we provide targeted, assessment-specific recommendations designed to uphold educational objectives while mitigating risks of academic misconduct. These guidelines serve as a practical framework for instructors aiming to balance the pedagogical advantages of AI tools with the imperative of maintaining academic integrity in computing education. Finally, we introduce a formal model that provides a structured mathematical framework for evaluating student assessments in the presence of AI-assisted tools.", "link": "https://arxiv.org/abs/2604.11111v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Hatem M. El-boghdadi", "Toqeer Ali Syed", "Ali Akarma"], "categories": ["cs.CY", "cs.AI", "cs.CL", "cs.ET"]}, {"id": "8", "source": "ARXIV", "score": 11, "day": "2026-04-13", "title": "SHARE: Social-Humanities AI for Research and Education", "content": "This intermediate technical report introduces the SHARE family of base models and the MIRROR user interface. The SHARE models are the first causal language models fully pretrained by and for the social sciences and humanities (SSH). Their performance in modelling SSH texts is close to that of general purpose models (Phi-4) which use 100 times more tokens, as shown by our custom SSH Cloze benchmark. The MIRROR user interface is designed for reviewing text inputs from the SSH disciplines while preserving critical engagement. By prototyping a generative AI interface that does not generate any text, we propose a way to harness the capabilities of the SHARE models without compromising the integrity of SSH principles and norms.", "link": "https://arxiv.org/abs/2604.11152v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["João Gonçalves", "Sonia de Jager", "Petr Knoth"], "categories": ["cs.CL"]}, {"id": "9", "source": "ARXIV", "score": 11, "day": "2026-04-12", "title": "Enhanced Self-Learning with Epistemologically-Informed LLM Dialogue", "content": "Large Language Models (LLMs) have advanced self-learning tools, enabling more personalized interactions. However, learners struggle to engage in meaningful dialogue and process complex information. To alleviate this, we incorporate epistemological frameworks within an LLM-based approach to self-learning, reducing the cognitive load on learners and fostering deeper engagement and holistic understanding. Through a formative study (N=26), we identified epistemological differences in self-learner interaction patterns. Building upon these findings, we present \\textit{CausaDisco}, a dialogue-based interactive system that integrates Aristotle's \\textit{Four Causes} framework into LLM prompts to enhance cognitive support for self-learning. This approach guides learners' self-learning journeys by automatically generating coherent and contextually appropriate follow-up questions. A controlled study (N=36) demonstrated that, compared to baseline, \\textit{CausaDisco} fostered more engaging interactions, inspired sophisticated exploration, and facilitated multifaceted perspectives. This research contributes to HCI by expanding the understanding of LLMs as educational agents and providing design implications for this emerging class of tools.", "link": "https://arxiv.org/abs/2604.10545v1", "altLink": "", "hasDoi": false, "hasReview": false, "authors": ["Yi-Fan Cao", "Kento Shigyo", "Yitong Gu"], "categories": ["cs.HC"]}];
let PAGE_SIZE = 10;
let currentTab = 'all';
let currentSource = 'ALL';
let currentSort = 'score';
let currentPage = 1;
let currentCategory = '';
let currentMinDate = '';
let currentMaxDate = '';
let hideVisited = false;
let filtered = [];
let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
let searchHistory = JSON.parse(localStorage.getItem('searchHistory')) || [];
let visited = JSON.parse(localStorage.getItem('visited')) || [];

function toggleTheme() {
  const html = document.documentElement;
  const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
  html.dataset.theme = next;
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  localStorage.setItem('theme', next);
}

function toggleTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSource(btn) {
  currentSource = btn.dataset.source;
  document.querySelectorAll('#sourceFilters .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  applyFilters();
}

function setSort(btn) {
  currentSort = btn.dataset.sort;
  document.querySelectorAll('#sortGroup .btn-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  render();
}

function toggleFavorite(id, e) {
  e.stopPropagation();
  const idx = favorites.indexOf(id);
  if (idx === -1) {
    favorites.push(id);
  } else {
    favorites.splice(idx, 1);
  }
  localStorage.setItem('favorites', JSON.stringify(favorites));
  applyFilters();
}

function recordVisit(id) {
  if (!visited.includes(id)) {
    visited.push(id);
  }
  localStorage.setItem('visited', JSON.stringify(visited));
}

function recordSearch(query) {
  if (query.trim() && !searchHistory.includes(query)) {
    searchHistory.unshift(query);
    if (searchHistory.length > 10) searchHistory.pop();
    localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
  }
}

function downloadJSON() {
  const data = JSON.stringify(filtered, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadCSV() {
  const headers = ['제목', '출처', '스코어', '리뷰여부', '링크'];
  const rows = filtered.map(p => [
    '"' + p.title.replace(/"/g, '""') + '"',
    p.source,
    p.score,
    p.hasReview ? '예' : '아니오',
    p.link
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'papers_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function shareCurrentView() {
  const state = {
    tab: currentTab,
    source: currentSource,
    sort: currentSort,
    minScore: document.getElementById('scoreFilter').value,
    search: document.getElementById('searchInput').value
  };
  const url = window.location.href.split('#')[0] + '#' + btoa(JSON.stringify(state));
  const text = '현재 필터 상태: ' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  } else {
    alert('공유 링크:\n' + url);
  }
}

function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;
  const minDateEl = document.getElementById('minDateFilter');
  const maxDateEl = document.getElementById('maxDateFilter');
  currentMinDate = minDateEl ? minDateEl.value : '';
  currentMaxDate = maxDateEl ? maxDateEl.value : '';

  recordSearch(query);

  filtered = PAPERS.filter(function(p) {
    if (currentTab === 'reviewed' && !p.hasReview) return false;
    if (currentTab === 'favorites' && !favorites.includes(p.id)) return false;
    if (hideVisited && visited.includes(p.id)) return false;
    if (currentSource !== 'ALL' && p.source !== currentSource) return false;
    if (p.score < minScore) return false;
    if (currentCategory && !(p.categories || []).some(function(c) { return c === currentCategory; })) return false;
    if (currentMinDate && p.day < currentMinDate) return false;
    if (currentMaxDate && p.day > currentMaxDate) return false;
    if (query) {
      const inTitle = p.title.toLowerCase().indexOf(query) !== -1;
      const inContent = (p.content || '').toLowerCase().indexOf(query) !== -1;
      if (!inTitle && !inContent) return false;
    }
    return true;
  });
  currentPage = 1;
  saveHashState();
  renderStats();
  render();
}

function mdToHtml(text) {
  try {
    const parsed = marked.parse(text);
    return (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(parsed) : parsed;
  } catch(e) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

function openModal(p, e) {
  if (e) e.preventDefault();
  recordVisit(p.id);
  const modal = document.getElementById('detailModal');
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalBadges').innerHTML = '<span class="badge">' + p.source + '</span>' + (p.hasReview ? '<span class="review-tag">리뷰</span>' : '');
  document.getElementById('modalContent').innerHTML = mdToHtml(p.content);
  document.getElementById('modalScore').textContent = 'Score: ' + p.score;
  document.getElementById('modalLink').href = p.link;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function renderCard(p, isFeatured) {
  const article = document.createElement('article');
  article.className = 'tile' + (isFeatured ? ' featured-card' : '') + (visited.includes(p.id) ? ' visited' : '');
  article.title = p.title;
  article.style.cursor = 'pointer';
  article.onclick = function(e) { openModal(p, e); };

  const head = document.createElement('div');
  head.className = 'tile-head';

  const actions = document.createElement('div');
  actions.className = 'tile-actions';
  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (favorites.includes(p.id) ? ' active' : '');
  starBtn.textContent = '⭐';
  starBtn.title = favorites.includes(p.id) ? '즐겨찾기 제거' : '즐겨찾기';
  starBtn.onclick = function(e) { toggleFavorite(p.id, e); };
  actions.appendChild(starBtn);

  const badgeWrap = document.createElement('span');
  badgeWrap.className = 'badge-wrap';
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = p.source;
  badgeWrap.appendChild(badge);
  if (p.hasReview) {
    const rt = document.createElement('span');
    rt.className = 'review-tag';
    rt.textContent = '리뷰';
    badgeWrap.appendChild(rt);
  }

  const scoreWrap = document.createElement('span');
  scoreWrap.className = 'score-bar-wrap';
  const dot = document.createElement('span');
  const scoreLevel = p.score >= 20 ? 'high' : p.score >= 10 ? 'mid' : 'low';
  dot.className = 'score-dot ' + scoreLevel;
  const scoreText = document.createElement('span');
  scoreText.className = 'score-text';
  scoreText.textContent = 'S' + p.score;
  scoreWrap.appendChild(dot);
  scoreWrap.appendChild(scoreText);

  head.appendChild(actions);
  head.appendChild(badgeWrap);
  head.appendChild(scoreWrap);

  const titleEl = document.createElement('h3');
  titleEl.className = 'card-title';
  titleEl.textContent = p.title;

  const authorsEl = document.createElement('div');
  authorsEl.className = 'card-authors';
  const authorList = p.authors || [];
  if (authorList.length > 0) {
    const shown = authorList.slice(0, 2);
    authorsEl.textContent = shown.join(', ') + (authorList.length > 2 ? ' 외 ' + (authorList.length - 2) + '명' : '');
  } else {
    authorsEl.style.display = 'none';
  }

  const contentWrap = document.createElement('div');
  contentWrap.className = 'content-wrap';
  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.innerHTML = mdToHtml(p.content);
  contentWrap.appendChild(contentEl);

  const footer = document.createElement('div');
  footer.className = 'card-footer';

  const linkEl = document.createElement('a');
  linkEl.className = 'card-link';
  linkEl.href = p.link;
  linkEl.target = '_blank';
  linkEl.rel = 'noreferrer';
  linkEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
  linkEl.textContent = p.hasDoi ? 'DOI' : '논문 보기';
  footer.appendChild(linkEl);

  if (p.altLink) {
    const altEl = document.createElement('a');
    altEl.className = 'card-link alt';
    altEl.href = p.altLink;
    altEl.target = '_blank';
    altEl.rel = 'noreferrer';
    altEl.onclick = function(e) { e.stopPropagation(); recordVisit(p.id); };
    altEl.textContent = '원문';
    footer.appendChild(altEl);
  }

  article.appendChild(head);
  article.appendChild(titleEl);
  article.appendChild(authorsEl);
  article.appendChild(contentWrap);
  article.appendChild(footer);
  return article;
}

function renderStats() {
  const total = PAPERS.length;
  const reviewed = PAPERS.filter(p => p.hasReview).length;
  const sources = [...new Set(PAPERS.map(p => p.source))].length;
  const allFavs = PAPERS.filter(p => favorites.includes(p.id)).length;
  const avgScore = total > 0 ? Math.round(PAPERS.reduce((s, p) => s + p.score, 0) / total) : 0;
  const latestDay = PAPERS.map(p => p.day).filter(d => d && d !== '명시되지 않음').sort().reverse()[0] || '-';

  const sb = document.getElementById('statsBar');
  sb.innerHTML = '';
  const chips = [
    { num: total, label: '모든 논문' },
    { num: reviewed, label: '리뷰 완료', accent: true },
    { num: allFavs, label: '즐겨찾기' },
    { num: avgScore, label: '평균 점수' },
    { num: sources, label: '출처 수' },
    { num: latestDay, label: '최신 날짜', isText: true },
  ];
  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'stat-chip' + (c.accent ? ' accent' : '');
    const num = document.createElement('span');
    num.className = 'num';
    if (c.isText) num.style.fontSize = '13px';
    num.textContent = c.num;
    el.appendChild(num);
    el.appendChild(document.createTextNode(' ' + c.label));
    sb.appendChild(el);
  });

  renderSourceChart();
}

function renderSourceChart() {
  const sourceCounts = {};
  PAPERS.forEach(p => {
    sourceCounts[p.source] = (sourceCounts[p.source] || 0) + 1;
  });
  
  const canvas = document.getElementById('sourceChart');
  if (!canvas || typeof Chart === 'undefined') return;
  
  if (canvas.chart) canvas.chart.destroy();
  
  const isDark = document.documentElement.dataset.theme === 'dark';
  const textColor = isDark ? '#a0aab4' : '#6b7684';
  const borderColor = isDark ? '#2c3444' : '#e5e8eb';
  
  canvas.chart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: Object.keys(sourceCounts),
      datasets: [{
        data: Object.values(sourceCounts),
        backgroundColor: ['#3182f6', '#05c46b', '#f59e0b'],
        borderColor: [borderColor, borderColor, borderColor],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 11 } } }
      }
    }
  });
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const dashboard = document.getElementById('dashboard');

  document.getElementById('resultInfo').textContent =
    '총 ' + filtered.length + '편 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  dashboard.innerHTML = '';
  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    const ep = document.createElement('p');
    ep.textContent = '검색 조건에 맞는 논문이 없습니다.';
    const es = document.createElement('small');
    es.textContent = '필터를 변경하거나 검색어를 확인해 주세요.';
    empty.appendChild(ep);
    empty.appendChild(es);
    dashboard.appendChild(empty);
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const sorted = page.slice().sort(function(a, b) {
    if (currentSort === 'review') {
      return (b.hasReview ? 1 : 0) - (a.hasReview ? 1 : 0) || b.score - a.score;
    }
    if (currentSort === 'date') {
      return b.day < a.day ? -1 : b.day > a.day ? 1 : b.score - a.score;
    }
    return b.score - a.score || (b.day < a.day ? -1 : b.day > a.day ? 1 : 0);
  });

  const groups = {};
  sorted.forEach((p, idx) => {
    if (!groups[p.day]) groups[p.day] = [];
    groups[p.day].push({...p, index: idx});
  });

  Object.keys(groups).sort().reverse().forEach(day => {
    const section = document.createElement('section');
    section.className = 'row-block';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-block-head';
    const h2 = document.createElement('h2');
    h2.className = 'day-label';
    h2.textContent = day;
    const divider = document.createElement('span');
    divider.className = 'day-divider';
    rowHead.appendChild(h2);
    rowHead.appendChild(divider);

    const grid = document.createElement('div');
    grid.className = 'row-grid' + (start === 0 && groups[day][0].index === 0 ? ' featured' : '');
    groups[day].forEach((p, idx) => {
      grid.appendChild(renderCard(p, start === 0 && idx === 0));
    });

    section.appendChild(rowHead);
    section.appendChild(grid);
    dashboard.appendChild(section);
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages > 1) {
    const prev = document.createElement('button');
    prev.className = 'btn-page';
    prev.textContent = '← 이전';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goPage(currentPage - 1));
    pg.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      (n => {
        const btn = document.createElement('button');
        btn.className = 'btn-page' + (n === currentPage ? ' active' : '');
        btn.textContent = n;
        btn.addEventListener('click', () => goPage(n));
        pg.appendChild(btn);
      })(i);
    }

    const next = document.createElement('button');
    next.className = 'btn-page';
    next.textContent = '다음 →';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goPage(currentPage + 1));
    pg.appendChild(next);
  }
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleHideVisited() {
  hideVisited = !hideVisited;
  const btn = document.getElementById('hideVisitedBtn');
  if (btn) btn.classList.toggle('active', hideVisited);
  currentPage = 1;
  applyFilters();
}

function setPageSize(val) {
  PAGE_SIZE = parseInt(val) || 10;
  currentPage = 1;
  render();
}

function setCategory(cat) {
  currentCategory = (currentCategory === cat) ? '' : cat;
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function clearCategory() {
  currentCategory = '';
  renderCategoryTags();
  currentPage = 1;
  applyFilters();
}

function renderCategoryTags() {
  const container = document.getElementById('catFilterTags');
  if (!container) return;
  const allCats = {};
  PAPERS.forEach(function(p) {
    (p.categories || []).forEach(function(c) {
      if (c && c.trim()) allCats[c.trim()] = (allCats[c.trim()] || 0) + 1;
    });
  });
  const sorted = Object.entries(allCats).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 30);
  container.innerHTML = '';
  if (currentCategory) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'cat-tag-clear';
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = clearCategory;
    container.appendChild(clearBtn);
  }
  sorted.forEach(function(entry) {
    const cat = entry[0], count = entry[1];
    const el = document.createElement('button');
    el.className = 'cat-tag' + (currentCategory === cat ? ' active' : '');
    el.textContent = cat + ' (' + count + ')';
    el.onclick = function() { setCategory(cat); };
    container.appendChild(el);
  });
}

function saveHashState() {
  try {
    const state = {
      tab: currentTab,
      source: currentSource,
      sort: currentSort,
      minScore: document.getElementById('scoreFilter').value,
      search: document.getElementById('searchInput').value,
      cat: currentCategory,
      minDate: currentMinDate,
      maxDate: currentMaxDate,
      hide: hideVisited,
      page: currentPage,
      pageSize: PAGE_SIZE
    };
    history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
  } catch(e) {}
}

function loadHashState() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const state = JSON.parse(decodeURIComponent(atob(hash)));
    if (state.tab) {
      currentTab = state.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === state.tab);
      });
    }
    if (state.source) {
      currentSource = state.source;
      document.querySelectorAll('#sourceFilters .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.source === state.source);
      });
    }
    if (state.sort) {
      currentSort = state.sort;
      document.querySelectorAll('#sortGroup .btn-filter').forEach(function(b) {
        b.classList.toggle('active', b.dataset.sort === state.sort);
      });
    }
    if (state.minScore) {
      const el = document.getElementById('scoreFilter');
      if (el) el.value = state.minScore;
    }
    if (state.search) {
      const el = document.getElementById('searchInput');
      if (el) el.value = state.search;
    }
    if (state.cat) currentCategory = state.cat;
    if (state.minDate) {
      currentMinDate = state.minDate;
      const el = document.getElementById('minDateFilter');
      if (el) el.value = state.minDate;
    }
    if (state.maxDate) {
      currentMaxDate = state.maxDate;
      const el = document.getElementById('maxDateFilter');
      if (el) el.value = state.maxDate;
    }
    if (state.hide) {
      hideVisited = state.hide;
      const btn = document.getElementById('hideVisitedBtn');
      if (btn) btn.classList.toggle('active', hideVisited);
    }
    if (state.page) currentPage = state.page;
    if (state.pageSize) {
      PAGE_SIZE = state.pageSize;
      const el = document.getElementById('pageSizeSelect');
      if (el) el.value = state.pageSize;
    }
  } catch(e) {}
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
  }
  filtered = PAPERS.slice();
  loadHashState();
  renderCategoryTags();
  renderStats();
  applyFilters();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target.id === 'detailModal') closeModal();
  });
  window.addEventListener('scroll', function() {
    const btn = document.getElementById('backToTop');
    if (btn) btn.classList.toggle('visible', window.scrollY > 400);
  });
})();
</script>
